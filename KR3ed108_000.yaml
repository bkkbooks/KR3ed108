而發然舌下有金津玉液二穴通於腎經水枯方生此症診其左尺洪數者是也六味湯加生地草河車各二錢葛根花粉丹皮各一錢元參二錢二服用十八味神藥收功吹藥如前喉癰門十一上齶癰上齶癰高如桃核桂下不能飲食因肺家炙爆之毒積久而發宜用解毒之劑加草河車三錢石膏五分地丁生地各二錢歸尾穿山甲赤芍皂角刺各錢半丹皮花粉葛根各一錢七八服兼玉樞丹每日五分並用吹藥據理或遲至二三月收功亦有之舌門一木舌木舌因心脾肝三經積熱舌粗紫脹不能言語此多食炙爆所致急砭出紫血搽吹藥大承氣湯兼黃連解毒湯加山梔木通連翹花粉各二錢赤芍草河車各三錢二服不應加生軍瀉毒再用六味湯漱口吐出左右寸關脈洪大者實症可治六脈細者虛症難治舌門二白腫舌白腫舌因風寒積內六脈弦緊舌腫硬痛六味湯加細辛三分蘇葉一錢半白芷一錢當歸錢半川芎葛根各一錢如有白苔黑點而滑者用淡附子乾薑各五分煎服外用乾薑冰片麝香青皮等分為末擦患處舌門三爛邊舌爛邊舌因脾經濕熱不清大舌邊上發疳白點而爛六味湯加小生地二錢滑石三錢淡竹葉一錢苡仁豬苓各錢半澤瀉車前甘草梢各一錢服二劑外用吹藥唇牙內腫爛同此治法舌門四紅點紫舌紅點紫舌因心脾二經熱極所致滿口紅點紫色作爛而痛或身有赤斑六味湯加熟石膏一兩葛根錢半川連一錢黃芩二錢黃柏一錢木通山梔各一錢甚者加生軍三錢如六脈不數不可用此方外用吹藥擦患處舌門五純紫舌純紫舌因傷寒用蔥酒發汗酒毒入心以致大舌純紫宜用升麻葛根各一錢枳椇子二錢石膏二錢川連一錢五分如心煩加山梔淡豆豉各一錢噁心欲吐恐防發斑另芫荽一兩又用芫荽沖燒酒搌背為要外用吹藥舌門六座舌蓮花座舌蓮花因脾經熱毒積久而發生於牙根內面走竄如蓮花一座急針患處出血搽吹藥再針左右少商穴用六味湯加草河車二錢歸尾赤芍各一錢川連連翹各一錢生軍三錢山梔木通各一錢生地二錢穿山甲一錢生石膏五分服二劑如不退用十八味神藥收功舌門七重舌重舌大舌之下又生小舌以致大舌反粗短小舌長痛此心脾之毒左寸右關兩部脈洪大者是也久之必爛爛則難痊初起即針出惡血搽吹藥服黃連解毒湯加生軍五錢如瀉五六日即愈玉樞丹十八味神藥亦可服舌門八蓮花舌蓮花舌因心肺之火飛騰舌底即針刺小舌出血吹藥用三黃石膏湯加甘草五分草河車二錢外針商陽穴即愈舌門九焦黃舌焦黃舌因嗜酒太過遇寒而起大舌乾黃三黃湯加枳椇子生石膏人中黃身發寒熱用大柴胡湯加羌活錢半如嘔吐心煩脈象洪大加生軍四錢佐以牛蒡赤芍乾葛之類再無不應舌門十舌上珠舌上珠此心脾積熱舌生白泡大小不一六脈洪大搽吹藥用三黃湯加石膏五錢草河車二錢地丁一錢兼服玉樞丹五分如六脈遲細者不可用前藥舌門十一舌下珠舌下珠此脾腎兩虛之症六味湯加鹽炒元參生地鹽炒知母黃柏木通等分煎服兼搽吹藥余藥照前舌門十二左雀舌左雀舌因多食煎炒炙爆之物積毒於胃故發於舌之旁似生小舌位近牙根初起針破出血搽吹藥用六味湯加三黃湯涼膈散治之久之必爛用龍骨生肌散收功舌門十三右雀舌右雀舌亦因積毒治法如左雀舌大同小異用六味湯加犀角地黃湯治之搽藥同前小舌門一胃火小舌胃火小舌因脾經火毒郁久而發小舌生白點爛胃脈浮洪用六味湯加生石膏四兩酒炒黃芩二錢花粉三錢葛根二錢山梔一錢二服如不愈用吹藥兼服柏枝汁此乃多食炙爆醇酒厚味或魚骨刺傷非結毒可比須診脈浮洪者屬胃火脈沉實者屬結毒詳辨為要小舌門二胃毒小舌胃毒小舌因毒結胃經發於小舌形如前症胃脈沉實而洪大者是結毒臨症不可忽有紅腫爛者治法亦同前用十八味神藥同玉樞丹一錢土茯苓每日四兩煎湯代水多吃為妙如一月不愈宜合結毒紫金丹一料沖玉樞丹同服土茯苓湯下每晚三錢可收功小舌門三積熱小舌積熱小舌因肝胃二經火毒飛騰所以小舌長硬白衣裹滿咽物不下右關之脈浮大六味湯加山梔一錢連翹二錢酒炒黃芩二錢黃柏一錢半生石膏三錢滑石二錢赤芍木通葛根各一錢外吹藥兼用玉樞丹二三次無不愈小舌門四純白小舌純白小舌因胃經積毒小舌忽變白色軟大而腫痛右關之脈洪沉先用玉樞丹每服七分或十服或五服再用土茯苓煎湯代水後用廣瘡藥二十一服銀花湯下如胃脈不沉反洪大作火症看用六味湯加生石膏三錢酒炒黃芩車前各二錢山梔一錢木通一錢滑石三錢葛根三錢天花粉一錢半山豆根二錢三服此即一症兩治之法臨症細參脈理然後用藥慎之慎之小舌門五懸旗小舌懸旗風生小舌下垂尖頭似圓眼核大紅如櫻桃因多食厚味火酒以致胃火鬱盛而發六味湯加甘草五分枳椇子一錢赤芍二錢草河車二錢二服可愈如腫處出血用吹藥胃脈浮洪者是也雜症門一松子喉疔松子喉疔生於關內小舌左右兩邊形如松子淡紅而硬大痛難食背寒身熱兩寸關脈緊盛乃風火鬱積之症也六味湯加蘇葉赤芍羌活連翹穿山甲草河車各一錢來日去蘇葉羌活二味加乳香三分玉樞丹一錢研細沖服二日可愈外兼用吹藥雜症門二走馬牙疳走馬牙疳因脾經積受熱毒太重而起牙肉先腫日久腐爛此為急證齒落肉黑不治脈浮洪者生沉細者死脈大而有力尚可用重藥救之脈遲細者藥不能投臨症詳脈治之初起未爛即針腫處出血搽吹藥已爛不必針搽吹藥用川連葛根連翹犀角生地各二錢白蘚皮甘草貝母花粉各一錢半生石膏一兩草河車一兩入大鍋煎服三四碗連三劑如脈數便結加生軍一兩或可救遲則不治矣雜症門三喉單喉單此症因肝火鬱熱動風而生關口上部下垂根大頭小紅色大痛先針兩邊患處出血吹藥漱六味湯一服來日加柴胡鉤藤赤芍生地丹皮草河車各二錢連翹黃芩黃連各一錢煎服可愈雜症門四喉菌喉菌因胎毒所致或因心胃火邪生於喉內如菌樣故名喉菌不可用刀針服黃連解毒湯玉樞丹可使其不發熱然未見全消者雜症門五喉瘤喉瘤因鬱怒傷肝或迎風高叫或本原不足或誦讀太急以致氣血相凝生於關內不時而發治以調本養原之藥玉樞丹地黃丸俱可常服難許速痊外吹藥雜症門六又喉瘤又喉瘤生於關外亦名瘤治法同前因部位各別故繪圖備閲雜症門七左陰瘡左陰瘡生於頰車之下內熱外寒皮色不變身發寒熱腫大如鰻鯉瘟六味湯加萬靈丹同藥化下如變紅色用喉癰藥治之便結加生軍三錢玉樞丹亦可服症屬少陰心腎則如此若症屬少陽膽三焦用柴胡牛蒡並六味湯漱之雜症門八右陰瘡右陰瘡治法如左陰瘡張氏湯藥列方七十二症主治六味湯不論紅白初起漱一服後再加減桔梗生甘草防風荊芥穗殭蠶薄荷八仙散喉中爛破者服人中白一兩生軍一兩二錢生石膏五錢元參一兩黃芩酒炒一兩四錢元明粉七錢殭蠶三錢瓜硝八錢輕粉一錢不可輕用共為細末用煉蜜為錠每重二錢舌津化下連連不斷則爛自去矣玉樞丹治一切喉毒山慈菰二兩洗淨為末麝香三錢大戟淨末五錢草河車淨末五錢雄黃五錢五倍子淨二兩千金子淨末一兩共為末米飲調和搗千餘下為度每服五六分甚者一錢十八味神藥川連五分白蘚皮五分黃芩二錢酒炒地丁二錢當歸二錢草河車二錢山梔錢半生龜板三錢木通一錢生甘草二錢川芎一錢半連翹二錢乳香五分去油銀花一錢五分角刺一錢五分知母二錢鹽水炒結毒加土茯苓鮮首烏火症爛喉加生石膏大黃各四錢知柏地黃丸治陰虛火動骨痿髓枯能壯水制火如尺脈旺者宜之即六味地黃湯加知母黃柏地黃山萸肉山藥茯苓丹皮澤瀉知母黃柏犀角地黃湯即六味地黃丸加石膏犀角石膏熟地犀角山萸丹皮澤瀉茯苓淮藥三黃湯治火症黃連黃柏黃芩俱鹽水炒加石膏炒山梔涼膈散治心火上盛中焦燥實煩躁口渴目赤頭眩口瘡唇裂吐血衄血大小便祕諸風瘈瘲胃熱發斑發狂小兒急慢驚風痘瘡黑陷等症連翹一錢大黃三錢芒硝一錢甘草一錢炒山梔一錢半黃芩一錢半薄荷一錢竹葉十片四物湯治一切血虛症川芎當歸生地白芍附桂八味丸治相火不足虛羸少氣能益陽消陰尺脈弱者宜之即六味地黃加附桂附子制肉桂各三分冷服大承氣湯治傷寒陽邪入里胃實不大便發熱譫語自汗不惡寒痞滿燥實堅全見雜病三焦大熱脈沉實者亦治陽明剛痙大黃五錢芒硝三錢厚朴一錢五分枳實一錢五分黃連解毒湯治一切火熱表裡俱盛狂躁煩心口燥咽乾大熱以致乾嘔吐血衄血熱甚發斑等症黃連一錢炒山梔八分黃柏八分黃芩一錢大柴胡湯治傷寒發熱汗出不解陽邪熱結在裡嘔利寒熱煩渴譫妄腹滿便祕表症未除里症又急脈洪或沉實弦數之症大黃黃芩半夏白芍柴胡枳實引加薑棗
