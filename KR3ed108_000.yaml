body:
  text: 附録咽喉祕集序十三科內喉齒有專科豈不目會厭之關為十一經綰轂式飲式食或消或息所繫綦重非寬髀大軱比然業擅專門治一症必齗齗責值投方寸匕藥取刀貝至不訾病者澀嗌膳啖不能嗛於口癐癐呼暴不可須臾忍聞有能已之者大願免於患苦倒廩傾囷葉拱以進無毫毛顧籍心乃稍效之以見其功遼緩之以引其時必蘄盈溪壑而後屬饜嗟咨養人之患以為利藪此巫匠之心也躬竊憫然思有以激勵之顧無所得方有以張氏吳氏咽喉祕集本見示寫圖備症述原處方昭晰無疑雖使不習衙推者操藥以修其效可局足而待其便益有三焉資舟資車卒然遘疾檢書按症能辨其輕重危險不至適適規規驚懼憂疑便益一操不律書赫蹄呼童市之肆咄嗟立具無大藥苦乏之患便益二肘後之祕傳於副墨上池之水遍丐醫門柔存剛亡之宜五臟六腑之匯誦習其書忸憂其說千金之劍必不獨知洴澼之方無所市重便益三衷是三端亟授二氏以激勵乎享帚自珍者雖然諺有之肺腑而能語醫師色如土是書行恐世其業者以祕密藏中休糧方為張吳兩先生髮其覆當有分衛無所之嘆也光緒癸未仲秋合肥張紹棠又堂甫書於醉秋檻咽喉祕集上吳張氏原本總論夫左為咽屬胃右為喉屬肺乃一身百節之關呼吸出入之門內經云一陰一陽結而為痹一陰者手少陰君火心之脈氣也一陽者手少陽相火三焦之脈氣也二脈共絡於喉氣熱則內結結甚則腫脹脹甚則氣痹痹者不仁之謂此喉痹之所由名而乳蛾喉痹纏喉等症皆痹類也吳氏說有風寒火濕毒虛之別或風火相搏或寒暑相聚其症變幻不一如漫腫而多痰風與濕也淡白而牙緊風寒也紫色不腫而爛者風伏寒也紅腫而脈浮者風火也脈沉實爛而不腫者毒也脈細數而浮者虛火也脈細而緩者虛寒也六者之象可類推也大凡初起之症診右寸洪緊肺風也兩關浮數胃火肝風也左寸浮洪心火也右寸沉遲肺伏寒也右寸洪細肺伏熱也右尺洪大三焦火旺也左尺浮洪而有力腎虛火炎也六脈大略論治俱可用六味湯加減症若凶險脈宜細診再察形窮源對症用藥自然可愈經云神聖工巧不過望聞問切細心推詳庶無差誤耳張氏說喉症分經喉有二孔左為咽屬胃納食之關右為喉屬肺納氣之關口內上齶屬胃陰下齶屬脾陽舌之中屬心四圍屬肺舌根亦屬心小舌又名蒂丁屬胃喉之左右舌根屬肝外兩耳垂下亦屬肝牙根上屬胃下屬脾舌胎白主寒黃主熱焦熱甚黑熱極凡舌胎不單論色但有津者非真熱不可概投涼藥宜引火歸原大舌邊乃脾火可用清涼之劑喉癰地位屬肝再連內寸許或爛或腫俱屬脾胃火毒之症結毒亦有之但結毒者兩關脈必沉兩關脈浮非結毒也此分經大略再考圖形便悉張氏說咽喉治法要論醫者當審其病由參之時令必須大涌其痰去痰之法先備溫水使病人漱口如點刺或吹藥令其垂頭流去痰涎俟痰涎少止仍以溫水頻頻漱之如虛弱人及病勢重者須要著人扶好或用銀針刺其患處風熱則散之火症則清之甚者下之陰寒者溫之若初起驟用寒涼之藥則上熱未除中寒復生其毒乘虛而入即喘不休死不救矣大抵風熱症十之七火症十之三寒症十無一二也病昏沉痰多氣急飲食不進發熱不退牙關緊閉脈息微弱者症必重人事不醒痰氣上攻聲如雷嗆食眼張天柱倒陷面墨色焦鼻如煙煤張煽不定目睛突出汗發如雨咽喉干痛聲啞無痰手足麻至膝蓋發喘及厄脈息如絲乃死症也臨症用藥生死反掌醫者不可懷希冀之心故意延挨病者不可起懈怠之念以致決裂古云走馬看咽喉不待少頃者即此謂也遇症用藥後痰少腫退即愈如已潰用藥後越兩日即可進飲食者三日後無不收功喉癬用藥後患處要變紅色知痛癢有津液潤澤者可治用刀針須向自己勾來不可向病人口內剔去咽喉忌下刀之地有四處嚨化啞門穴喉關兩坳上舌下筋若用刀其刀頭上須蘸巳藥或申亥藥庶不作痛臨症先診其脈象輕重後看其患處深淺若脈絶脈怪脈死則無須用藥矣因毒已入腹非藥力所能挽回也纏喉風及陰虛喉癬二症最險而難治至危而不易識纏喉風內外無形其患在關內上面有紅絲如未入心尚可用藥已入心則不治凡遇此症宜早治在一日半日之內可保無虞陰虛喉癬如癆蝦皮形有青白點子高低大小狀如暑天㾦子其症雖危延日最久或一年半載而死或一月或半月而死如起病數日之前治之十症可得九愈看喉腫處其色變紅者即成膿之候可不刺而自潰也喉症用糯米泔水或甘桔湯或薄荷湯俱要溫和為主山楂焙燥磨細末煎藥內可加一撮乃消腫去毒治咽喉之要藥也以上十四條吳氏說病人壯者藥可猛弱者攻宜緩動針不可傷小舌要緊夜晚看症宜加倍細心藥用六味湯天明覆看再為加減凡針舌下兩邊青筋血紅生血黑死服宜清膈消痰解毒之劑以上四條張氏說四絶症走馬喉風鎖喉風走馬牙疳纏喉風此皆凶險之症若不吐不瀉針之無血藥不能入皆為不治慎之慎之十六絶形舌卷囊縮角弓反張油汗如珠十指無血喉啞嗆食喉干無痰吐血喉癬六脈沉細聲如鋸拽大便十日不通鼻煽唇青天柱倒塌脈細身涼兩目直視壅痰氣塞喉菌不治凡診脈一呼一吸四五至者平和脈也三至為遲六至為數病脈也脈式脈遲則寒脈數則熱細緩則虛寒細數則虛熱六脈一理針穴凡六穴應病行針頭面頰車穴在耳垂下八分足陽明胃經右手少商穴在大指內甲角手太陰肺經中衝穴在中指內甲角手厥陰心包絡經少衝穴在小指內甲角手太陽小腸經左手商陽穴在食指內甲角手陽明大腸經關衝穴在無名指外甲角手少陽三焦經吳氏咽喉二十四大症歌訣今存二十二症喉痹鬱火攻兮喉痹成或生左右小棋形鮮紅酒毒光如鏡腫在喉間風熱勝其症形小而圓初起或消或刺均可如其色紫紅平塌光如鏡者不可刺宜內消因其毒發於本源故也喉閉積熱風痰喉欲閉因生血泡在喉間忽然壅塞櫻桃似點刺流涎病即安其症宜發表清熱先用針點後吹子醜二藥纏喉風惡寒惡痛名陰毒外內無形氣短促胸前紅腫足多寒若見紅絲針貴刺藥宜發表吹藥先用巳藥如見紅絲即刺斷再用子藥嗆喉風此症謂之飛絲毒口中發泡醜藥覆燥極點痰熱在心忽然嗆食終非福用針挑破血泡後上醜藥兼吹子藥煎藥宜清熱祛痰啞喉風啞瘴喉風犯咽隔口不言兮牙關塞面紫唇清冷涕流風疏痰降即無厄其症牙關緊閉先用巳藥後用申藥前後抹之風痰去盡為度煎藥先發表後清熱弄舌喉風體發熱兮口內腫舌出頻將兩手弄筆針患處去痰涎解毒疏風清熱壅用三稜針刺破少商穴先用巳藥後用子藥爛喉風爛喉風症頻頻熱唇若塗朱口內裂看其患處淺和深藥宜子醜兼調攝子醜二藥和勻上之再用巳藥收功煎藥宜清熱單乳蛾喉內腫如桃李形或左或右單蛾名此症早治可速退痰消毒散自然平此症不論已成未成皆可刺其形大則長初用巳藥後用子醜二藥收功煎藥先發表後清熱喉癰七情鬱結病成癰六日之內可刺膿不治須防成冷瘻巳申藥到定收功其患在喉嚨化合後之正中到四五日後可刺早刺防復腫未刺前及未潰前吹藥先用巳藥後用申藥潰後用子醜二藥煎藥先發表後清熱牙疔太陰脾土足陽明二火交攻疔即成患在牙齦如豆大排針點破即安寧先用申藥後用子藥牙宣此症起時因胃熱壅而宣露常流血藥吹酉未即能除清胃煎來功奏捷先用子藥後用酉藥未藥二種止血煎藥宜清胃火木舌舌病心經受風熱忽然腫破口難說看時左右共宜針藥用梔連火氣滅吹申藥看紫色處用小刀點之出血後用子藥重舌蓮花之症看如何三舌攢在舌底疴戌藥頻搽宜更點清心瀉火莫蹉跎用申藥吹之不退再用戌藥上三症用清熱解毒煎藥重齶體雖不熱獨心勞舌上生來似小桃藥用黃連解毒飲吹宜冰片不須刀用子藥吹之走馬牙疳小兒疳症屬於脾黑腐沿開臭不宜子醜合參兼卯藥穿腮落齒總難醫先用米泔水洗淨或溫水亦可藥用子醜和勻敷上如不應乃險症也煎藥用解毒散痧痘口疳痘余痧後口生疳爛在牙齦痘毒傳若是見痧生滿口須從心胃二經參吹子醜卯藥煎藥宜瀉心胃二火雙乳蛾雙蛾兩兩生喉間關上輕兮關下難氣吹好似紅李子輕消重刺去風痰其形與單蛾同刺不論已成未成先吹巳藥不退再點子藥煎藥先發表後清熱螞蝗疔疼而微白螞蝗疔齶上生來韭菜形內不腫兮發寒熱速宜針刺自然平用申藥點去惡血後上子藥煎藥有表發表無表解毒瀉火連珠風兩坳深處患連珠初起沿開白色余日久漸成八九點藥和子醜病當除和勻子醜巳藥吹之兼上寅藥煎藥宜清熱解毒陰虛喉風癬症原來因損肺斑生苔癬若蝦皮時時發熱頻頻嗽面赤聲嘶病可虞其症虛弱不宜發表須用滋補兼解毒上半月痛甚者乃氣虛下半月痛甚者乃血虛吹卯藥並上醜酉二藥如日久不減者不治楊梅癬喉楊梅結毒癬由生片白喉中穢氣聞白色變黃才可治酉隨子醜共追尋和勻子醜二藥吹入後用酉藥收功煎藥宜解毒咬牙風咬牙即是鎖喉風毒在牙齦胃火攻不治恐成牙漏症開關辰藥子收功先用辰藥擦牙齦縫中如腫不退再用子藥煎藥宜清熱解毒吳氏丹藥列方子藥明硃砂六分硼砂五錢梅花冰片五分元明粉五錢制研末治喉中潰爛長肉生肌生新去腐醜藥雄精一錢梅花冰片五分膽礬二分火煅研末治口內腐爛用少許不宜多孕婦忌寅藥青黛一兩人中白五錢黑山梔五錢梅花冰片一錢厚朴切片用黑棗去核三兩包厚朴火上煅存性五錢研末治口疳如神如遇傷寒後口疳另加坑磚一角火煅研末五錢卯藥梅花冰片一錢雄精一錢靛花二錢元明粉二錢硼砂五錢粉甘草一錢川黃連二錢人中白三錢煅存性銅青五錢煅黃柏二錢蜜炙雞內金二錢鈔紙二張上寫年月日合煅存性枯礬一錢鹿角霜一兩研末能解毒退腫生肌去腐治陰虛喉癬更佳辰藥上好膽礬冬月取青魚膽汁和勻成塊陰乾刮下用瓷瓶收貯其藥過一二年可用研末治牙關緊閉食不能進口不能開用雞毛蘸抹兩牙底令其流出痰涎少頃即開矣巳藥梅花冰片二分半雄精二錢焰硝一兩五錢要槍硝煅乃佳巳藥之性與申藥同論其功更速如痛重者先用巳藥後用申藥吹之治單雙蛾初起一二日用此藥開痰即愈未潰可用已潰不可用孕婦忌午藥川黃連一錢明礬一錢牙皂一錢去皮弦新瓦上焙枯存性研末入上二味研末吹患處扶好病人囑其垂頭流去痰涎其藥不可多用如聲似雷音以溫水調藥徐徐漱之治喉中痰塞其功與辰藥同但其性太猛不宜輕且不如用辰藥平穩臨時看症酌之孕婦忌未藥雄精二錢朴硝五錢硼砂五錢研末如喉嚨緊閉不能吹藥用此藥吹入鼻內其口即開開後或點或刺或消腫用巳申之藥如腐爛用子藥一切喉症皆可用申藥元明粉一兩雄精一錢去痰消腫不剛不柔神妙莫測孕婦及虛弱人病熱沉重者皆不可用酉藥雞內金一錢要不落水者瓦上焙乾為末梅冰片一分研末吹患處可止痛如腐爛疼痛加子藥若要收口加兒茶二錢戊藥硼砂二錢元明粉二錢青鹽一錢用火煅紅放在地上越一日去火毒研末擦重舌蓮花舌名紫雪丹餘症切不可用亥藥巴豆二十一粒生礬一兩入銀罐內滾之看礬枯去巴豆每一兩礬加小薑黃末一錢麵糊為丸用雄黃末二錢為衣丸如桐子大每服七爛薑湯下用辰藥後可服此丸重者用之輕者不用此丹開關竅利痰乃起死回生之靈丹也名回生丹青金錠元胡索三錢或一枚或二枚牙皂十四條去皮弦研末加青黛六分麝香五釐用水丸重五分遇症用新汲井水磨化以棉紙條蘸藥入鼻孔內如病重者研末吹之中風及小兒驚內皆可用鎖匙散即已藥去雄黃專治雙乳蛾及其神效玉鎖匙明礬一兩銀罐內溶化即下巴豆二十一粒候礬枯取起放在地上越宿次早去巴豆用礬研末治症同上孕婦忌緑袍散厚黃柏二兩青魚膽一兩黃柏火上炙乾取起以魚膽塗上再炙再塗以膽盡為度切片研末加入人中白三錢青黛三錢膽礬三錢硼砂三錢研末治口疳疔瘡喉蛾穿方人指甲清水洗淨瓦上焙黃色為度每甲末一分加梅片一釐又方用壁錢窩將簪夾住向燈上燒灰研末吹之牙宣七葉一枝花即三七用七分加牛膝三分梅片少許研末吹之如神通關散青鹽一錢白礬一錢硼砂五分咽喉腫痛滴水不下吹之止疼走馬牙疳方梅冰片三分人中白三錢火煅赤砒一錢半黑棗七個去核將砒分作七處入棗內炭火煅煙將盡取出存性用米泔水洗淨患處將藥抹上如在晚上擦更妥附煎方牛蒡子玄參防風皂角刺蔓荊子蟬蛻石膏擦過前藥用此方白水煎服三劑忌發物煎炒椒蒜穿蛾方土大黃曬乾研細末用箸頭蘸藥點之蛾即破喉蛾方麝香二分半梅片二分半鰾珠五分牛黃二分半黃連五分硃砂五錢兒茶五分血竭二分半硼砂一錢二分共為細末吹患處附漱口方防風甘草銀花薄荷荊芥鹽梅栗蒲殼先煎此藥漱口後吹前藥忌發物煎炒椒治喉痹喉癰喉蛾等症回雪品雪呂雪三方回雪麝香一分冰片二分牙硝一錢硼砂四錢品雪冰片二分牙硝二錢硼砂四錢呂雪牙硝二錢硼砂四錢以上諸藥不見火研極細末每次一二分奇效治喉風喉痹喉蛾等症喉科第一要藥凡遇不治之症吹此藥即可開關真牛黃一錢露蜂房五錢黃色者佳焙存性大冰片一錢青黛二錢硼砂二錢熊膽二錢要五月五日午時合又方真牛黃一分冰片一分硼砂二分雄黃二分川連一錢黃柏一錢硃砂二錢青黛二錢青魚膽二個治喉風蛇蛻不拘多少陰陽瓦焙灰吹之即愈張氏咽喉七十二症治圖說咽喉門一簾珠喉簾珠喉滿喉如白細網狀兩邊微腫根有白點帶紅色小舌紅腫咽水大痛此症因鬱積熱毒而發其脈兩寸浮洪兩尺亦數大而洪此上盛下虛之症也宜清火用六味湯加鹽炒黃柏二錢酒炒黃芩二錢鹽炒知母二錢熟石膏五錢山豆根二錢鹽炒元參二錢山梔一錢木通一錢生地二錢服一劑來日再加連翹三錢紫花地丁三錢熟地二錢丹皮二錢草河車二錢川連一錢金汁一杯或煎柏枝汁一杯沖服乃妙外吹藥六七日可愈咽喉門二嗆食啞喉嗆食啞喉此症因伏邪在肺聲啞嗆食六脈遲細甚屬陰症余曾治一人年二十患此三年飲食少進病在將危余診視再三病雖久脈尚有力根或可治用六味湯加麻黃二錢桂枝一錢蘇葉三錢木通一錢細辛二錢白芷一錢訶子二錢皂核三錢姜炒半夏二錢連服五六日病雖退而聲啞未除換加桔梗一兩訶子七錢甘草七錢薄荷一錢以上俱童便炒麻黃一錢煎數沸含嗽徐徐咽下服十劑乃愈後用補藥健脾咽喉門三內外腫喉內外腫喉此症生於喉關之下陰陽相結內外皆腫或有爛斑火鬱之症用六味湯加炒黃芩三錢熟軍五錢海浮石二錢外吹藥來日換加丹皮一錢半生地二錢酒炒黃芩二錢生石膏三錢炒山梔一錢木通一錢即針少商商陽兩手四穴如背寒加羌活胃泛加葛根柏枝汁亦可漱之咽喉門四風熱喉風熱喉此症感風熱而起滿喉發細紅點根帶淡白舌下兩邊三四塊六脈洪緊用六味湯加鹽炒元參二錢酒炒黃芩三錢山梔一錢花粉一錢一服可愈外用吹藥兼服八仙散咽喉門五紫色虛喉紫色虛喉喉間紫紅久之變爛如生漆色因初起便服寒涼之藥故也此症肺胃伏寒平而不腫飲食難進吐出乃腐肉者宜急治之如誤認為火熱之症反以三黃犀角羚羊角等藥則吃成死症矣余見此等紫色之症不論名色喉間絶無影形滿喉皆紫脈緩身涼者用六味湯加細辛五分葛根一錢蘇葉一錢白芷川芎麻黃各一錢服後紫變為紅換加鹽炒元參二錢酒炒黃芩二錢花粉二錢即愈咽喉門六喉癬喉癬此症因腎虛火旺髮癬於喉不腫而微紅上有斑點青白不一如芥子大或針孔緑豆大每點生芒刺入水大痛喉間聲啞咳嗽無痰六脈細數者用知柏地黃湯兼四物湯加麥冬炒元參鹽炒女貞子枸杞人參洋參二參或煎藥不用入丸藥亦可首烏阿膠各二錢十服後用桂附八味丸加女貞枸杞二參俱鹽炒淡鹽湯下每服四錢如前知柏地黃湯四物湯服後不應酌加附桂每服各三錢冷服此引火歸原之法也如六脈洪數恐難脫體外兼用吹藥治之咽喉門七喉疳喉疳此症腎虛火旺沸騰上部而發喉間上齶有青白紅點平坦無刺故名喉疳聲不啞不咳嗽兩尺脈虛者是也先用六味湯去荊防蠶三味加鹽炒元參一錢酒炒黃芩二錢丹皮二錢生地二錢鹽炒山梔一錢鹽炒水拌再炒女貞子一錢半鹽炒知母一錢半男加龜板五錢女加鱉甲五錢服五劑或十劑如不愈再加附桂各三分另煎入藥冷服愈後合桂附八味丸加元參知母女貞枸杞各藥俱鹽水炒服一料可愈外用吹藥咽喉門八飛揚喉飛揚喉此症風熱上壅上齶紅腫氣不能通咽物不下從小舌中飛揚滿口此係凶惡之症急什患處出血泄氣吹藥內服六味湯加連翹葛根黃柏山梔木通各一錢生石膏四錢一二服可愈咽喉門九虛啞喉虛啞喉喉間不腫兩邊關內少有紅點聲啞不明牙關不開此症乃內外風火因喜食酸澀之物肺氣不清故也用六味湯加細辛三錢蘇葉二錢服一劑聲音不啞換加生地丹皮各二錢鹽水炒山梔木通花粉各一錢二服愈矣咽喉門十聲啞喉聲啞喉此症寒伏肺腑不腫不