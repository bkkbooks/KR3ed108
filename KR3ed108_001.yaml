body:
  text: 卷一頭部偏正頭風此症發時雖盛暑亦覺畏風痛不可忍用蕎麥粉炒熱加醋再炒乘熱敷上用布包緊勿令見風冷則隨換日夜不斷有人患頭風十年不愈照此治之其病若失愈後鼻流黃水數日從此斷根屢試神驗此治頭風第一方也並治尋常傷風頭痛惟氣虛及風火蟲痛不效又方生大烏頭去皮四兩南星泡一兩共為末每服二錢用薄荷七片鹽梅一個煎水臨睡調服雖二十年頭風亦效或用生南星生烏頭等分為末蔥汁調貼太陽穴亦可又方用手撳按頭上有一處按著更痠痛者可硃筆記之用斑蝥一個去頭翅足研末安於所記痛處以小黃蜆殼或核桃殼蓋上用布扎好過夜起一小泡以針刺出黃水其痛若失曾治數人愈後多年不發又方硫磺一錢川椒取紅色者去子為末三分二味拌勻鎔成小餅左痛塞左鼻清涕從右鼻出右痛塞右鼻正痛左右俱塞清涕流盡即愈神驗又方畢撥末三錢入豬膽內候乾取出再用真川芎白芷藁本真青黛元胡索各二錢為末水和為丸如蓮子大令病人仰睡用一丸水化灌入鼻中覺藥味至喉微有酸氣令病人坐起口咬銅錢一個口內有涎出盈盆即愈或加皂角末一錢亦可又方白芷二兩五錢真川芎甘草川烏頭半生半熟明天麻各一兩共為末每服一錢食後服細茶薄荷湯下百藥不效者一服即愈效驗甚速又方白芷三錢天麻防風各一錢荊芥一錢半共研末煎服此林屋山人經驗方也又方真蘄艾揉融為丸時時向鼻嗅之以黃水出盡為度又方鳳尾草搗融加麝香一分拌勻敷囟門上甚效又方都梁丸昔王定國病頭風至都梁求名醫楊介治之連進三丸即時病去其方用白芷酒洗為末蜜丸彈子大清茶或荊芥湯化下食後服忌食各色魚又方明天麻白芷為末蜜丸重二錢每服一丸先將荊芥一錢細辛三分煎湯細嚼甚者不過一丸食後服忌食各色魚又方生牛蒡子梗葉無梗葉用根亦可取自然汁二碗陳酒一碗食鹽八分共熬成膏搽之須極力搽熱乃效凡頭風抽掣作痛者用此必愈又方到牛車處候牛下糞即將熱糞敷頭上用布包緊快走十里如頭上癢更要快走不可停步亦不可擦動候癢止解下視之有無數細白蟲伏糞上即愈有人頭痛百藥不效後用此方斷根此陝西名醫傳出之方也尋常感冒風寒頭痛照上偏正頭風第一方治之雷頭風痛頭風攻目者亦治頭痛而起核塊或頭中如雷鳴者是也用川芎白芷防風羌活天麻甘菊薄荷甘草等味治之如不見效用天麻升麻各一錢新荷葉一大張煎服或不省人事用地膚子同生薑搗爛熱酒沖服取汗即愈又方山羊糞炒枯研每服二錢酒送下百藥不效者服此即愈此林屋山人經驗方也熱痰頭痛栝蔞一個牛子四兩焙共為末每用三錢食後酒沖服忌食動風發熱之物氣虛頭痛春茶葉末水調成膏攤碗內覆轉用巴豆四十粒作兩次燒煙燻之曝乾研細每服二分滾水衝下食後服又方照前烏頭南星方最效厥陰風火上衝頭痛肝脈弦者是用清障救睛散見目部治之神效無比肝脈不弦者不效頭風目痛制香附二兩藿香甘草各二錢共為末每服二錢滾鹽湯下終年頭似痛而非痛此腎水不足火邪衝上作痛用熟地玉竹各一兩山茱肉四錢真山藥元參川芎當歸各三錢五味麥冬各二錢水煎服服後頭痛更甚至重二劑斷根屢試如神藥味不可加減稍有加減則不效有人患此數年百藥不愈二劑而安永不復發真奇方也腦後作痛此風入腎經所致用熟地五錢真山藥炒雲苓當歸各三錢川芎陳皮炙草各一錢天麻錢半炒芍二錢麻黃三分水煎服頭腦鳴響狀如蟲蛀名天白蟻以春茶子為末別樣茶子亦可惟打油之茶子則不用吹入鼻中取效如不見效即照頭風各方治之又方土茯苓煮豬肉食之神效前後忌茶十日頭腦暈眩暈眩雖然小症然而大病皆起於暈眩眼目一時昏花卒致猝倒而不可救者也宜早治之用臺黨半夏各三錢白朮當歸熟地白芍各一兩川芎五錢茱肉五錢天麻一錢陳皮五分水煎服數劑見效此方名防眩湯專治氣血之虛不治頭目之暈蓋氣血足則陰陽和陰陽和則邪火散自不致於暈眩多服數劑受益無窮不可因一二劑不能收功便棄而不能用也又方白果二個去殼生搗爛沖滾水空心服至重五服即安老年更效婦人血風頭暈欲死倒地不知人事生蒼耳草嫩心陰乾為末每用一錢酒調服神驗此物能通頂門故易奏效也搖頭下血此肝風甚也用防風三兩天花粉黃耆蜜炙羌活白芍各五錢犀角銼碎甘草各二錢半蛇蛻炙赤勾藤麻黃各一錢共研末棗肉和丸梧子大薄荷湯下五七十丸腦漏從腦頂一股酸氣由鼻孔流出黃水臭不可聞治法見鼻部鼻淵門腎氣上攻頭頂不能轉動大熟附子二錢川椒二十粒用面塞滿椒口內生薑七片水煎加鹽少許服頭面發熱有光彩他人手近之如火燒蔥汁五錢酒調服吐出如蟲即安頭面腫大此名大頭瘟自頸至頂腫成一桶咽喉閉塞治法見卷十五瘟疫門頭上生瘡如葡萄痛甚參看卷十一葡萄瘡方此名鬈毛毒瘡用黃柏一兩乳香二錢半共為末槐花煎濃汁調作餅貼於瘡口並用吳萸研末醋調敷兩足心即愈頭頂結核如寡蛋響者此命門火虧也用寡蛋水酒煮老每食一二個酒送下服至數十個自愈又方七制固脂丸見內外備用諸方每服三錢服至半月必愈或照下頭頂白色腫塊治之必愈頭頂生白色腫塊小兒頭髮內生白色腫塊名𤺪疒貢頭多有誤認跌腫漫不加意及至高大作痛方延醫治庸醫以頭為首陽誤用寒涼解毒是以潰爛者內膿復疒貢增出者不一珠未知此患色白其膿不紅乃陰寒虛弱之症用小金丹初起三服而消已潰爛者服七丸而愈外貼陽和解凝膏大人患之名曰發疽服陽和自愈小金陽和各方均見陰疽門又方如愈而復發者用緑雲膏見癰毒諸方門貼之最為神效頭頂生瘡或紅或白甚至紫黑色其人喉有痰涎或能言或不能言此名劈腦疳瘡用木鱉子焙枯存性三分加頂上梅花冰片三四釐共為細末吹入喉內即吐出痰涎而瘡亦愈喉內無痰色不紅紫或先白後紅者仍照前小金丹各方治之發中生癤如珠相染不已此名火珠遲則難治急用生蘿蔔搗爛好醋泡透敷此林屋山人經驗方也又方內服地丁飲見疔瘡門一二劑外用菊花葉搗融調蜜敷或用燕泥散見癰毒通治門敷均效小兒頭面胎毒浮水石煅存性研末放碗內童便調勻用艾絨燒煙燻透以裡面均帶黃色為止俟冷用麻油調敷雖十年不愈者敷三五日必愈神效無比一切瘡毒年久不愈者皆可治又方白龍散水牛屎曬乾燒枯存性燒太過不效擦患處即收水脫痂而愈並治痘後餘毒又方桐油調輕粉塗之多年不愈者皆效又方用米湯油洗淨取燕子窩泥用麻油調敷數日即愈米湯油即米鍋水面濃汁也頭面紅癤名曰石癤紫薇花半茶鍾煮精豬肉食之可保一年不生又方洞天鮮草膏見癰毒諸方貼一日全消潰者貼之亦愈用連翹花粉赤芍銀花甘草車前滑石澤瀉各一錢煎溫服即無熱毒之患男婦大小暑天宜服此林屋山人祕方也又方苦蕒菜梗折斷有白汁出取汁搽之即消初起者最為神效又方大黃遠志等分為末豬膽汁調搽極效又方黃柏真川連黃芩各等分研末醋調服效又方菊花葉搗汁調白蜜敷之用渣敷四圍留頭不敷俟毒水流盡即消頭上軟癤軟癤愈而復發最難除根用枳殼一個鮮者更佳又名臭橘子無鮮者用干枳殼蒸融攤冷用刳去瓤以麵糊塗抹枳殼四圍合蓋癤上旁安一燈芯以通膿水數日即愈愈後並無疤痕又方一野芋頭磨醋敷又方舊船底陳石灰研末油調敷又方生半夏生山藥各等分研末用蔥頭搗敷此治初起甚效又方豬頭上毛貓頸上毛各一撮燒灰雄鼠糞一粒兩頭尖者是共研末香油調敷雖數年不愈亦效又方五倍子七個研末麻油四兩熬至一半瀝盡渣搽四五遍即愈切忌水洗頭上生瘡干而無膿抱過雞蛋殼名鳳凰窩燒灰存性研極細麻油調搽千層瘡此瘡生在頭面好而復發生生不已故名千層俟破口時用新鮮橄欖核無鮮者用鹽橄欖核以水煮去鹽味亦可燒灰和雞蛋油見癰毒諸方以鴨毛調敷禿頭瘡又名臘梨頭香黃散松香二兩為末入蔥管內用線扎定水煮融化去蔥研末黃丹一兩水飛無名異一錢炒宮粉一錢炒輕粉三分炒共為細末香油調搽並治頭面黃水瘡俱極神效又方牛牙散見癰毒諸方敷之生肌斷根神效之至又方白油膏見腿部臁瘡方貼之雖多年不愈亦效又方先用刀將瘡刺破以熟蕎麵將頭面上四圍高高敷之取一雄雞宰殺以熱血灌人頭頂數日生肌而愈落頭疸俗名砍頭瘡此疽生在腦後由小而大系屬陰症斷不可服寒涼等藥倘醫不得法即腐爛落頭而死大半系冤孽所侵即照卷十一陰疽各方治之並查看陰疽孽報見陰疽卷末為要頭角太陽生瘡當日頭重如山二日即變青紫三日青至心胸而死此症有因好服春方藥而生者有因食煎炒厚味而生者初起用金銀花二斤煎湯飲數十碗方可少解其毒然必潰爛再用金銀花元參各三兩當歸二兩甘草一兩水煎日服一劑七日始可收口又手腳指頭生瘡亦多不救亦可以此法治之太陽出血有人兩太陽陡起紅瘡用手抓破出血如線不止用瘦豬肉一厚片貼之即止或用穿山甲尾上者佳炒研細末敷亦止內服元麥地黃湯見內外備用諸方即愈發瘤多生耳後發下寸許按之不痛用針刺破擠盡粉發用生肌藥敷之自愈發落重生黑芝麻梗柳樹枝各等分熬水洗頭發易生而且潤婦人以此二味泡油搽頭更妙小兒發稀洗之亦生又方旱蓮草又名墨頭墨斗墨東搗敷易生而多又方嫩棗樹皮一大把砍作尺余長滿插淨瓷瓶內勿令到底上面以火燃之下面流汁水先用溫水洗頭後將棗汁擦之即生髮矣發易脫落棐子三個核桃二個又名胡桃側柏葉一兩共搗泥泡雪水梳頭發永不落而且光潤發短而少桑葉麻葉用淘米水煮汁洗之洗至七次可長數寸發黃而赤生柏葉一斤研末豬油和為丸如彈子大每日用一丸淘米水放開洗之一月後色黑而潤發枯不潤桑根白皮柏葉各一斤宣木瓜半斤泡油搽頭即潤男子煎水洗數次亦黑潤也少年白髮拔去白髮以白蜜塗毛孔中即生黑髮如不見效取梧桐子搗汁塗上必黑如白多難拔用乾柿餅用茅香煮熱枸杞子酒泡焙乾各三兩研末為丸梧子大每服五十丸茅香煎湯送下烏須黑髮黑芝麻九蒸九曬研末棗肉為丸久服自黑或加旱蓮草自然汁和棗肉為丸更妙又方草靈丹見內外備用諸方服之鬚髮可以轉黑神效無比頭腦內癢漸至發落蘆薈苦楝子各一錢為末吹入鼻內數次自愈又方山豆根研末麻油浸搽頭生白屑癢極難忍藜蘆末煎湯洗頭半乾時再用藜蘆末摻上令入皮內用布扎緊數日即愈又方桑枝燒灰淋水洗甚效又方王不留行白芷各三錢研末乾摻一夜梳去即愈治癩子神方俗名髦䐃治好後能長頭髮郁澄齋先生試驗傳出先用米泔水加明礬花椒蔥頭煎湯熏洗又用黃牛明牙數枚醋泡炭火煅煉七次成炭研細末加熟礬少許亦研末柏油調搽幾次即愈十數年來不發治腳痔亦用此方甚效治腦漏神方一名鼻淵白鵓鴿翎毛三錢擦生漆絲棉一塊如無絲棉即用揩漆布亦可二種系向漆匠鋪買將二味放於瓦上焙炮存性共研細末入冰片少許令病人仰臥用筆管吹入鼻中不過三四次即愈此余患此症覓得之仙方也用之除根病愈已三十年矣面部面上生瘡急尋有殼蝸牛一二條查藥物備要便知搗融攤紙上貼之即愈紙上留一小孔出氣初起用之神效又方鹿角燒研豬膽調搽亦效面上似疥非疥似癬非癬若不急治延及遍身不救照上蝸牛方治之或照上鹿角豬膽方更效又方鵪鶉糞鴿子糞胡桃殼即核桃熬湯以絹帕濺湯熱搽即愈忌羊鵝魚蝦等物一月面上粉刺又名酒刺由肺經血熱而生發於面鼻碎黍如粟色赤腫痛破出粉汁用大黃硫黃等分研末以涼水調敷內服清肺熱藥自愈又方輕粉黃芩白芷白附子防風各一錢為末蜜丸每日洗面時多擦數次臨睡時又重洗面而擦之三日消痕滅迹或用下雀斑附子蛤粉方亦效又方紫參丹參黨參苦參沙參各一兩為末胡桃肉又名核桃搗融為丸梧子大每服三十丸茶送下面上雀斑其色或黃或黑碎點無數由火鬱血分風邪外搏而成用時珍玉蓉散豬牙皂角紫背浮萍青梅櫻桃各一兩鷹屎白三錢或鴿糞白亦可共研細末每早晚用少許在手心內水調濃擦面上良久以溫水洗面至七八日後其斑皆去神效或用好玉時時擦之久則自退又方附子蛤粉茯苓白芷陀僧山奈各五錢共為末蜜調擦面上次日洗去甚效並治酒刺又方蒼耳草嫩葉尖和鹽少許搗爛五六月間日擦十餘次甚效又方紫背浮萍漢防己煎水洗或曬乾為末擦之甚效抓破面皮橄欖核磨水搽之即愈並無痕迹或用白糖擦之亦妙又方生薑自然汁調輕粉末擦之亦無痕迹玉蓉粉治雀斑酒刺肺風酒糟鼻面上一切斑點緑豆一升荷花瓣二兩曬乾滑石白芷白附子各五錢上冰片密陀僧各二錢共為細末早晚洗面擦之面生皺紋大母豬蹄四個洗淨煮成膏臥時擦面上次早洗去半月後即不皺矣冬天面唇皺破熟豬油夜夜敷之面上黑氣半夏焙研米醋調敷不可見風自早至晚不計次數三日後用皂角煎湯洗下即白又方天門冬和蜜搗爛為丸日日洗面即白面黑皮厚羊脛骨末雞蛋清調每夜敷早以淘米水洗去十日後面白皮嫩神效又方冬瓜一個竹刀去皮切片酒水各半煮爛瀝渣熬成膏夜夜擦之次早洗去洗面光彩西瓜子仁五兩桃花四兩白楊柳皮二兩為末食後米湯調服一匙一日三服一月面白五十日手足俱白無白楊皮或用橘皮亦可又方輕粉滑石水飛淨杏仁去皮取霜各等分為末蒸過加冰片少許用雞蛋清去黃調勻洗面敷之一月後色如紅玉又方頂上金色密陀僧一兩研極細末用人乳或蜜調如薄漿糊每夜略蒸待熱敷面次早洗去半月後面光如鏡又方冬桑葉煎濃汁收貯冬月早晨用一酒杯攙入水內洗面光滑如鏡面亦不凍腮邊痠痛發腫腮內痠痛名遮腮用洞天鮮草嫩膏敷上次日即愈若病後兩腮發腫不作痠痛者名發頤用天麻白芷防風荊芥各一錢送服醒消丸三錢而愈此林屋山人方也洞天醒消各方均見癰毒諸方門腮頰穿爛腮邊穿一小眼時發時愈名曰漏腮內服荊防敗毒散見內外備用諸方外用夜合花樹皮煎水洗並用夜合樹皮搗融敷再用夜合花根煎濃湯時含口內有人患此十年不愈照此治之收口斷根兩腮赤腫俗名撑耳風又名痄腮用燈火燈心一根點油燒之在大指二指之下手背微窩處燒一下左腮燒右手右腮燒左手半日即消神效或燒少商穴查鼻部鼻血第一方便知更妙又方皂角二兩生南星二錢糯米一合共為末薑汁調敷立效又方輕者用靛花或磨鹿角搽重者用大黃白芨五倍子共為末雞蛋清調搽又方絲瓜又名水瓜燒存性研末調水塗之又方醋調陳石灰敷之小兒腮腫內有硬核見小兒科雜治門眉部眉上生瘡肥皂燒存性枯礬要燒透各等分為末麻油調塗先用白礬泡水洗淨又方分別色之紅白照癰毒陰疽各方治之眉爛毛脫此肝經受風所致用側柏葉去梗九蒸九曬磨末蜜丸梧子大每早晚服一錢開水送下以愈為度外用菟絲子研末麻油調搽或茅屋上舊草燒灰麻油調搽亦可眉毛不生黑芝麻花陰乾為末以黑芝麻油泡之日搽數次自生又方桑葉七片日日洗之一月復生如舊須落亦然又方旋覆花天麻防風各一錢共研末麻油調敷又方雄黃末一兩好醋調搽即生又方生旱蓮草又名墨頭墨斗墨東搗敷數日即生眉毛搖動晝夜不睡喚之不應但能飲食大蒜二兩搗汁兌酒飲自愈目部洗眼仙方此方得自仙傳凡患肝虛目疾雖雙目不見洗至年餘復明平日宜養心息氣切忌怒惱洗眼方多藥與洗期各有不同惟此方與後方治愈數百人神效非常不可輕視青皮五錢乾者色微青黑方是微紅者系陳皮洗之不效煎水每逢洗期誠心齋戒早中晚三時先熏後洗日期列後正月初三二月初四三月初四四月初九五月初六六月初四七月初三八月初九九月初十十月初二十一月初八十二月二十四閏月同期又方此方亦由神授專治腎虧目疾業已治愈多人雖雙目不見亦可復明與前方藥料洗期雖有不同神效則一如照前方洗有一年尚無功效者即是腎虛照此方洗至年餘必有奇效屢試如神皮硝五錢淨水二鍾煎成一鍾每逢洗期早中晚三時誠心齋戒先熏後洗日期列後正月初三二月初一三月初三四月初四五月初五六月初四七月初三八月初五九月十二十月十三十一月十四十二月十二閏月初二十六兩日雙目不明後有增補瞽目神方凡雙目不見青光黑眼瞳仁反背皆治黑豆一百粒黃菊花五朵皮硝六錢水一鍾煎七分帶熱熏洗五日換藥再洗一年後可以復明平日忌茶並戒惱怒又方雞膽一個入蜜半匙以線扎住再入豬膽內吊房簷下通風不見日處二十一日去豬膽留雞膽先以人乳點患處潤之少刻用骨簪蘸雞膽點上遍身透涼流淚出汗二三次即明忌茶百日可將霜降後桑葉煎湯代茶飲並戒惱怒青光瞎眼人望如好眼自覺不見者是白羊子肝一副竹刀切片黃連一兩研末熟地黃二兩同搗為丸梧子大食遠茶服七十丸日三服崔承元病內障喪明有人以此方報德服之遂明又方菟絲子補骨脂巴戟川牛膝枸杞肉蓯蓉各一兩共為末加青鹽二錢用豬腰子一個切開半邊去筋膜入前藥末一錢將線扎緊用陳酒蘸溫燒熟食之初起最效兩目忽然不見取地上三尺下黃土攪水澄清洗之此葛仙肘後方也瞳仁反背若眼珠已有白點便不驗密蒙花蟬蛻白菊郁李仁石膏生草決明石決明甘草穀精草白礬各四錢百部二錢珍珠四分另為末以上共為末分量不可加減和豬瘦肉二兩搗爛煮服即時發冷者其光必轉若光未盡轉再服一劑必愈愈後宜服鎮精丹一二劑鎮精丹石膏蟬蛻梔子槐花白菊花各一錢生地蒙花各二錢草決明錢半甘草五分煎服小兒瞳神不正小兒因跌打損傷頭腦受驚以致瞳神不正觀東則見西觀西則見東用石楠葉一兩甜瓜蒂七個藜蘆三分共研細末吹少許入鼻孔通頂為度日吹三次並請名醫內服牛黃定驚平肝等藥自愈石楠有雌雄兩種若得雌石楠葉更佳兩目夜不見物俗名雞朦眼此肝虛也黃蠟不拘多少溶汁取出入蛤粉相和得宜每用二錢以豬肝羊肝更妙二兩批開摻藥在內麻繩扎定水一碗同入銅器內煮熟取出乘熱熏眼候溫連肝食之日服兩次以愈為度其效如神又方羊肝二兩煮熟點鍋底煙食二三次即愈鍋底煙以燒草者為佳燒煤炭者斷不可用風火眼痛凡兩目腫脹赤甚痛甚作癢多淚畏日畏風容易惹人鼻塞腦酸諸病皆是後列各方治之必愈但洗眼時務在帳內方可避風即帳內脫衣揭被亦有風動俱宜留意若不謹避則不效也吹鼻散鵝不食草五錢曬乾查藥物備要便知真青黛川芎各一兩共為細末將藥少許搐入鼻中或新白布泡水蘸藥入鼻中亦可口含溫水以淚出為度數次必愈兼散目中星翳又方每日望井中周圍三遍能去火氣又方黃丹和白蜜調敷太陽穴立效又方輕白爐甘石以能浮水者更佳用童便泡一日夜越久越好炭火內燒紅再泡一日再燒一次又用川黃連水泡一日夜越久越好炭火內燒紅再泡一日再燒一次用一錢淨硼砂五分大硃砂四分真珠三分煅牙色梅花冰片制乳香查藥物備要便知薄荷末各二分共為極細末研至無聲放舌上無渣方可用用清水以骨簪蘸藥少許點眼治風火腫爛一切神效又方芝麻威靈仙何首烏苦參甘草石菖蒲各三錢共為細末每服三錢黃酒下此係武當山石刻仙方神效無比兼治頭風目疾又方苦參錢半五倍子一錢明礬薄荷荊芥穗各三分煎水臨睡時用綢絹輕輕避風洗之神效之至又方黑棗一枚膽礬即緑礬黃豆大一塊黃柏三分水蒸透溫洗四五次冷則再蒸或加銅緑生薑汁少許立試立驗又方川連防風白菊花歸尾各一錢甘草銅緑各五分膽礬三分杏仁七個去皮尖打碎泡水蒸熱照前法洗之甚效肝熱目痛龍膽草一味用瓦器熬成膏點入眼內瞽目俱能點去雲翳不可以平淡而忽之也又方夏枯草二兩炒香附二兩醋炒生甘草四錢炒共為末每服錢半清茶調下數日即愈屢試如神夜間痛甚者更效此觀音夢授方也腎虛目痛四神丸甘州枸杞上好新紅者一斤用好酒浸一夜分作四起一起以川椒二兩拌微炒一起以小茴香拌炒一起以黑芝麻拌炒以上三起去拌者不用一起以淨青鹽二兩研末拌炒鹽即入藥外加當歸頭生地白菊花白朮白茯苓各四兩共為末每於午飯後開水服三四錢久則目如童子屢試如神百無一失目昏多淚生地熟地川椒去子閉口者不用各等分為末蜜丸梧子大每服五十丸鹽米湯空心下兩月後目如童子此呂仙方也通治目疾諸方珊瑚紫金膏白爐甘石一兩以能浮水者為佳用童便浸七日用炭火銷銀硃鍋內煅紅再入童便內浸十日曬乾研細末黃丹一兩滾水飛過三次曬乾研細末乳香沒藥各二錢俱入砂鍋內加燈心四分微火炒出煙去燈心研細末海螵蛸二錢刮去皮甲微火炙過研細末真白硼砂二錢青鹽麝香各五分頂上牙色梅花冰片三分以上均研成細末合一處乳鉢研極細然後入麝香冰片二味拌勻再研極細放舌上無渣方合用用蜂蜜熬成珠先用絹袋瀝盡蜜渣夏老冬嫩春秋酌看老嫩之間將藥末調入蜜內用瓷罐封固以蠟封口不可泄氣此方治七十二種眼疾屢用如神雖十年不愈者亦效惟瞳仁反背而驚散者不效天賜膏點眼目障翳兗州朱秀才忽不見物朝夕祈禱夢仙人張三丰傳授此方好熖硝一兩銅器熔化入飛黃丹二分頂上梅花冰片三分銅筷攪勻入瓷瓶收之以蠟封口勿令泄氣每點少許甚效如神又方治目疾紅痛日久不愈蕤仁選白淨者去殼細研去淨油不淨不效調白蜜用骨簪點眼內角即能退紅止痛效驗之至又方治目疾時發時愈不見水羊肝四兩忌鐵器搗極融爛開水沖服連服數次可保十年不發屢試甚效又方治目赤腫痛數日不能開者生薑一塊洗淨去皮用古銅錢刮汁點之初點頗痛點後即愈又方治目赤腫痛用自己小便乘熱綢帕輕輕蘸洗即閉目少頃此以真氣而退肝熱之法也小便頭尾不用又方老能夜書每年九月二十三日用桑葉煎水洗目一次至老永不昏暗且夜能看書其妙無窮桑葉須五月五日六月六日立冬日採者為佳同黑芝麻等分蜜丸名為扶桑丸能除風濕烏須明目兩目晝夜不閉一婦因受驚嚇兩目晝夜不合用郁李三錢酒煮飲之盡醉即愈神效非常小兒疳積瞎眼生翳草決明四兩曬乾勿見火研細末生雞肝不落水者將雞肝搗爛和決明末三錢研勻加酒飯上蒸服如腹脹如鼓加蕪荑末一錢目翳腹大加雞內金更妙又方火硝一兩硃砂三錢共為末每用四分不落水生雞肝一個剖開入藥扎定酒蒸熟空心服輕者一料重者二三料翳膜推去半邊而愈又方小兒科疳疾門內有消疳無價散服之最妙雖眼瞎亦可復明珠目蟹眼蛇蛻全者一條馬屁勃一兩皂角子十四枚蟲蛀者切不可用共入瓷缸內鹽泥封固燒紅勿令氣出候冷存性出火氣研末每服三錢滾開水調下神效眼生蘿蔔花大蘿蔔一個剜空入生雞蛋白一個包好種土內待開花結子後取雞蛋白研細加白爐甘石以浮水煮為佳照前制紫金膏製法用一錢真熊膽五分頂上牙色梅花冰片一分五釐共為末調蜜點眼一日一次七日全愈神效眼生星翳白鹽少許燈心蘸點三五次不痛不礙纍用有效或用荸芥槌碎取汁成粉去渣取粉點之甚效如不見效即照風火眼痛內吹鼻散及前後治雲翳各方治之無不愈也目中胬肉紅筋白膜雲翳諸症消障救睛散石蟹生研細連翹各錢半羚羊角草決明防己茺蔚子白蒺藜各一錢龍膽草酒炒木賊草各五分甘菊八分水二鍾煎八分食遠服此方能消胬肉及一切紅筋白膜雲翳等眼症立見功效百無一失並治厥陰風火上衝頭痛此王晉三所選祕方也體虛者勿服又方用老麻雀糞又名瓦雀鉢中研細以甘草水泡一夜去水與渣焙乾和初生男孩乳用燈心點之即消神效男用雄麻雀糞尖而豎立者是女用雌麻雀糞圓而倒者是又方韭菜根洗淨用橘葉外裹男左女右塞鼻中過夜即愈屢試神效又方蕤仁二錢選白淨者去淨油青鹽一錢豬胰子一兩共搗融爛用骨簪點入甚效又方青萍少許研爛入頂上梅花冰片少許貼眼皮上過夜漸散眼中急起胬肉此症不過半日即遮白眼一日即遮黑眼用刀上鐵鏽滴涼水少許用筷子頭磨起鏽水點患處頻點頻開目中生管此即胬肉之類以上各方可治用生白蜜塗目仰臥半日洗去每日一次自愈又方櫻桃三個去骨炒研為末紙卷條燒熏之即消眼生紅子有人白眼珠上生一紅顆頃刻頭面皆腫用真熊膽二粒米大開水調服立刻平復目中流血用四物湯加龍膽草減半煎服即愈又一婦人眼中出血如射或沿鼻流下月經不行乃陰虛相火妄動之症用當歸酒炒生地酒炒酒芍黃連炒黃柏炒知母炒條芩炒木通側柏葉柴胡桃仁去皮尖紅花各一錢水煎食前服次日即愈眼中如有蟲行癢不可忍羌活枯礬硼砂共研細入口無渣方合用口水調如米大時將一丸納入眼中少頃棗湯洗下眼中生蟲紅棗去核用黑礬填滿棗內入炭火內煨過研為細末再用朴硝放砂鍋內熬煉滴水成珠取出候冷不必研末用棗礬末一二錢朴硝五六分一併和勻開水對衝露一夜洗之三五次即愈眼邊生蟲覆盆子葉為末一錢乾薑燒灰生礬各五釐枯礬一分共研細蜜調用綢片做膏藥貼眼上一夜揭起蟲自黏在綢上次晚又將肥豬肉切片貼眼上一夜即愈或照後銅緑方更妙眼邊濕爛紅腫名爛弦風眼用川連四五分銅刀切成米粒大先以茶杯盛蘄艾絨一平杯許上以薄皮紙封杯口先將其紙用針刺多孔將黃連鋪勻紙上用香火將艾燃引上用一杯蓋住約俟艾煙盡時方揭去蓋住之杯取黃連十餘粒滴清水二三茶匙於飯上蒸過用鴨翎掃搽患處三日除根如不見效照後銅緑方治之無不愈也又方鮮色銅緑三錢研末以生蜜濃稠塗粗碗內用艾葉燒煙將碗覆艾煙上熏之須熏至銅緑焦黑為度取起冷定以人乳調勻飯上蒸過搽之諸藥不效者用此如神百無一失並治痘後風眼眼漏流膿龍膽草當歸各一錢為末溫酒下又方將目閉住用熱牛糞敷一日數次數日即愈小兒鬥睛黑眼珠呆而不動者是用真西牛黃五分白附子泡肉桂全蠍炒川芎石膏各一錢白芷藿香各二錢共研末蜜為丸芡實大每服一二丸薄荷湯下眼邊忽然紅腫發癢名偷針眼背上膏肓穴處第三節骨兩旁是有紅點用針挑破即愈如不用針挑用燈芯一燒即愈如不見點用大梳背頻頻刮之紅點自現出也又方臭蟲血每日點數次其效如神又方用蛇蛻皮貼之立愈又方白芨磨水點之亦效眼皮翻出石膏五錢煅梔仁一兩甘草三兩豨蘞草四兩酒蒸曬乾防風二兩酒拌微炒共研細末體壯者每服二錢弱者一錢小兒減半白滾水送下白眼珠忽然盡黑毛髮堅如鐵能飲食而不能言其形如醉此血潰症也用五靈脂二錢研末酒沖服眼胞生珠生菌堅凝不痛黃丹五分鯉魚膽汁和如膏點三五次自消又方藥線見癰毒諸方纏之即落又方取過江蜘蛛絲纏之即落凡蜘蛛牽絲搭過屋者謂之過江又方櫻桃核磨水搽之自消眼胞痰核此症生眼胞皮里肉外大者如棗小者如豆推之移動皮色如常硬腫不痛宜服化堅二陳丸見癰毒諸方外用生南星和醋磨濃汁時時搽之淺者數日即消深者多搽數日微微用指甲擠出白粉即愈眼珠無故湧出垂下大便下血亦有不便血者名曰肝脹羌活煎濃湯乘熱先熏後服即入或用羌活燒煙燻之更妙又方新井水洗眼數次即入又方防風黃芩白芷川芎蒼朮細辛生地甘草生薑棗子蔥白水煎服仰臥片時眼珠自然收上眼珠暴出淫羊藿威靈仙各一錢水煎服眼珠縮入老薑燒熱敷眉心即愈眼珠傷損凡眼珠打出或觸傷腫痛或火炮沖傷用南瓜瓤搗爛厚敷外用布包好勿動漸次腫消痛定干則再換如瞳仁未破仍能視物瓜以愈老愈佳如無南瓜用野三七葉敷或用生地黃浸酒搗敷亦可南瓜北人呼為倭瓜又方用牛口涎日點二次避風即愈忌酒並各熱物又方如火藥沖眼欲瞎者急用熱小便頻洗即愈或用野三七葉搗融敷更妙忌酒並熱物又方如眼珠受傷突出趕急揉進用生豬肉一片當歸赤石脂末少許摻肉上貼之即愈又方眼目打傷青腫以生半夏為末水調塗之即愈眼被傷損不開用前風火眼痛吹鼻散每日吹數次其目自開箭頭入目寒食餳糖即寒食所做米糖無則不論何月所做米糖亦可點入待其發癢一拔即出蟾酥入目紫草取汁點之即消泥沙入目取粗牛膝一段約二寸長本人自行嚼爛如泥吐出搓丸塞於兩眼角其淚流必多少刻泥沙裹藥盡出其目隨愈左眼以牛膝口內右嚼右眼左嚼雖腫痛欲瞎無不立效屢試如神塵芒入目生藕汁滴入自出飛絲入目好墨磨濃用新筆蘸墨點眼角內閉目片時其絲自然成塊用手輕抹即出雜物入目亦可治並可散翳奇效之至又方凡諸藥不效赤腫痛甚者以滾水一杯入食鹽少許明礬三錢將舌尖浸入水中片刻其絲自落水中而愈又方火麻仁一合搗碎井水一碗泡半刻攪勻將舌浸水中涎沫自出神效雜物入目左手指甲以刀刮細末燈草蘸點一二次甚效如不能出即用好墨磨濃點之亦效眼瞪成漏凡眼下空處生癤出膿流水不幹日久成漏諸藥不應者以柿餅去皮取肉搗爛塗之十日全愈拳毛倒睫眼毛顛倒捲縮刺目者是木鱉子一個去殼為末綿裹鼻中左眼塞右右眼塞左一二夜即愈切不可將毛拔去拔後重出毛硬而更拳將為終身之纍又方冬天壁上干蒼蠅研末時向鼻內嗅之立愈又方五倍子為末蜜調敷眼皮上其睫自起眼中常見異樣禽蟲飛走棗仁青葙子花即草決明花元明粉各一兩共研末每用二錢滾水沖服三次自愈增補瞽目神方一婦雙目不見夢觀音大士云念誦能伏災風火普明照世間二語誦之百遍即愈試之雙目復明蓋此婦平日祀大士最虔故神靈默佑而愈後有人雙目不見初誦數千遍不效嗣後虔心齋戒誦至數日雙目亦明耳部兩耳聾閉活鯉魚一尾將腦髓取出飯上蒸出油滴入耳內自然竅開再用固脂一兩先用淘米水泡一夜曬乾再用黃柏二錢煎水泡一夜曬乾再用食鹽二錢加水泡一夜曬乾黑芝麻一斤燒酒二斤童便一斤共煮乾取出曬極干炒香取固脂研末不用芝麻以陳米醋為丸緑豆大每服二錢用杜仲炒去絲知母各一錢煎湯送下甚效或服七制固脂丸見內外備用諸方更妙又方活鼠一隻破喉取膽真紅色者是也用川烏頭一個泡去皮北細辛二錢膽礬一錢半共為末以鼠膽和勻焙乾研細入麝香一分吹入耳中口含茶水日二次十日見效雖久聾亦愈又方用煉成雞油五錢上桂二錢野葛三分以文火煎三沸去渣每用少許滴入耳中如此十日內有耳結自出者雖多年耳聾可愈又方驢前腳脛骨打破向日中瀝出骨髓以瓷盒盛收每用綿點少許入耳內側臥候藥行到其髓不可多用以白色者為上黃色不用輕者一二次重者四五次便愈又方甘草生地研極細末胭脂包三分日間塞耳甘遂草烏研極細末棉花包三分晚間塞耳甚效又方北細辛末一錢將黃蠟溶化為丸如鼠糞大以棉裹塞耳一二次即愈切戒惱怒又方真麝香一二分棉包塞入一日後耳中如雷響即通屢試神效腎虛耳聾聲響如風水鳴如鐘磬聲白毛烏骨雄雞一隻甜酒四斤煮食三五隻神效又方真川椒用巴豆菖蒲同研細以松香黃蠟為丸塞耳一日一換初起者數日即通神效又方黃柏用人乳泡透炒枯研細末以黃酒打麵糊丸桐子大每服七八十丸開水下又方真磁石一豆大穿山甲燒研二分用棉包裹塞耳口含生鐵一塊耳中如風雨聲即通耳內時聞螞蟻戰鬥之聲時開時閉此腎水虧極兼怒氣傷肝所致用柴胡梔子白芥子各三錢熟地白芍萸肉各三兩麥冬一兩水煎服方中純是補腎平肝之聖藥飲之數日其聲漸息服至一月全愈耳閉不通又作痛大田螺一個撥開蓋入麝香五分自化成水滴入又方每日天明以大指次指捏住鼻孔勿令泄氣咬牙努目口唇閉緊使氣俱入耳竅悶極放手時時行之久則自效如神少壯病後耳閉南棗半斤桂圓四兩蔥半斤此味後下煮服三五次自通忌鹽數日風木之郁耳脹欲閉連翹二錢羚羊角薄荷梗苦丁茶夏枯草生香附各一錢黑梔皮一錢半水煎服膽火上郁頭重耳脹目微赤連翹牛子各二錢羚羊角薄荷梗桑皮各一錢丹皮錢半水煎服耳鳴耳癢生烏頭一個乘濕削如棗核大塞耳日換數次過三五日便愈不然久則成聾耳疳震耳纏耳停耳風耳各症俱系耳內悶腫出膿但膿色不一而名各異耳疳則出黑色臭膿震耳則出青膿纏耳則出白膿停耳則出黃膿俱由胃濕與肝火相兼而成惟風耳則出紅膿偏於肝經血熱俱宜用醬茄不宜多自然油滴之俟膿浮出再用核桃仁又名胡桃研細押油去渣每油一分兌冰片二分用少許滴耳內自愈風耳內服四物湯如丹皮石菖蒲餘症內服清肺瀉肝諸藥又方新鮮白鯗魚腦中枕骨燒紅候冷每兩加冰片一錢共研細如灰面細先用棉花絞淨膿吹藥二三次即愈此林屋山人經驗方也又方用番木鱉磨水滴耳內即愈又方大人小兒耳內生疔出毒之後膿水久久不幹或傷水濕在底停耳成膿臭穢之水時流出者用小麥粉以醋煎滾打如漿糊晚上擦於耳之前後留出耳上不搽以紙一張裂縫套耳蓋之免汙枕被次早洗去晚上再搽不過三五次膿干痊愈此法屢試屢驗又方青魚膽和冰片滴之即愈又方蛇蛻燒灰少許吹入極效耳內如有蟲奔走或流血水或干痛難忍用之俱效又方桑螵蛸一個燒存性麝香一分研末摻入神效有膿先絞淨又方鱔魚血滴入神效又方抱過雞蛋殼內白皮炒黃研末香油調灌耳內痛即止又方胭脂枯礬鐵鏽各等分為末吹之立效又方蟲蛀竹灰加麝香少許吹入極效又方用頭髮瓦上燒存性為細末每一錢加冰片七釐研末吹少許入耳甚效又方白礬煅研入麝香少許綿裹塞耳中耳內膿血腫痛有虛有熱其症不一甚至痛不可忍夜難安枕以上各方如不見效用韭菜自然汁灌入百發百中其效如神耳內膿血不幹石榴花片瓦上焙枯研末加冰片少許吹入三四次即愈其痂不必挖動聽其自落為妙或用龍骨研末吹入亦可耳內有蟲膿血不止雞蛋一個香油炒豬肝四五錢香油炒黑芝麻炒研半升同搗融微火烘暖布裹貼耳外俟蟲出盡即愈耳痔耳菌耳挺耳痔形如櫻桃或如羊奶耳菌形類初生磨菰頭大蒂小耳挺形如棗核細條而長努出耳外俱由肝經怒火腎經相火胃經積火凝結而成微腫悶痛色紅皮破觸之痛引頭頂用硇砂一錢輕粉雄黃各三錢冰片五釐細研末水調濃用穀草細梗咬毛蘸點患處並用梔子川芎熟石膏當歸牛子柴胡酒芍丹皮甘草各二錢黃芩黃連各五分水煎食後服自愈耳內生疔耳內生疔痛如錐刺牽引腮腦亦痛破流血水人多作耳痛治之不知乃耳疔也急服蟾酥丸見癰毒諸方取其發汗再用蟾酥丸水調濃汁滴耳內並服黃連消毒飲見同前立愈或照疔瘡各方治之亦可耳內生粒如棉花子大極痛名耳定人指甲瓦上焙枯存性研末加牙色梅花冰片少許吹入極效耳內有核痛不可忍燒酒滴入側臥半時即可箝出如不見效即照前耳疳耳痔各方治之耳內如有蟲走或血水流出或干痛難忍蛇蛻皮燒存性研末吹之立愈此經驗祕方也耳內耳外生瘡蚯蚓糞為末吹入或用麻油調搽又方黃柏五錢馬齒莧一兩為末敷之耳外濕瘡雞腰膏見癰毒諸方敷之其效如神又方黃丹一錢松香八分輕粉一分枯礬一分共為細末香油調擦效又方枯礬輕粉貝母銀硃共研勻麻油調塗甚效耳後鋭毒患發耳後又名耳後瘡宜別陽實陰虛治無一錯患色白者以陽和丸與二陳湯同煎服或以小金丹服消色如紅者醒消丸服消諸書不拘紅白概以玄參牛蒡等藥治之即色紅者尚服不消倘色白者更遭其害矣南濠葉姓耳下並患惡核一被醫穿生管一大如杯以陽和小金輪服未潰者全消此林屋山人祕法也又方南星燒存性為末醋調敷三次即愈不愈即用前方無不效也陽和諸方見癰毒陰疽各門耳下生瘡有人耳下生瘡其大如桃時出膿血數年不愈後用鉛粉摻之三日收功耳被挖傷金頭蜈蚣一條瓦上焙存性研末吹入立效又方青魚膽一個紅花一錢玄參生地各二錢蒸出濃汁灌入耳內即愈又方冰片胭脂燒灰牡蠣煅粉共為末用骨簪點香油蘸藥末入內即愈兩耳脫落並治鼻落用人發入瓦罐以鹽泥封固煅過為末急以所傷耳鼻蘸藥安放舊處再用老薑嚼融四圍厚敷用綢捆定自安耳中有物不出用弓弦或麻繩將一頭搓散用好魚鰾黏著放耳內其物徐徐引出壁虎入耳雞冠血滴入即出蜈蚣入耳生薑汁或韭菜汁灌入即出又方炒肉放耳邊聞香自出烹雞更妙螞蝗入耳取田中泥放耳邊自出蚰蜒入耳生半夏末麻油調塗耳門蟲聞香即出又方香油和雞冠血滴入即出或用水調緑礬灌入即出又方白洋糖又名白沙糖熟水調濃汁滴耳內蚰蜒化為水又方羊乳滴入亦化為水流出蛆蟲入耳用杏仁搗如泥取油滴入耳中非出則死又方皂礬摻之即化為水飛蛾入耳用銅器向耳邊敲打自出螞蟻入耳用手將耳扯動即出或用穿山甲燃灰研末調水灌入即出諸蟲入耳不可驚動用手緊閉耳鼻閉口不言蟲入之耳不閉少頃自出或用好醋麻油韭汁蔥汁薑汁此數種隨便而灌耳中其蟲自出又方白雞冠血滴入耳中立出又方川椒末醋浸良久取汁灌耳中行二十四步蟲自出又方桃葉作枕枕之蟲自鼻出或火尉桃葉卷之取塞耳立出又方如蠅蚊小蟲用麻油數點滴入耳中蟲即死取出即瘥又方如在夜間暗入者切勿驚惶響叫逼蟲內攻宜端坐點燈光向耳竅其蟲見光自出若有人在旁其蟲不出人皆避開方效又方用貓尿滴入耳內蟲化為水取貓尿法以生薑擦貓鼻其尿自出水銀入耳照解救諸毒門水銀毒方治之鼻部鼻血不止用燈火以燈心一莖點清油燒之在少商穴燒一下立止穴在兩手大指內外甲縫之中不上不下即是左流燒左手右流燒右手雙流雙燒有人鼻血三日不止口內亦流百方不效勢甚危急用此立止止後半刻復流仍在原處燒之而止如原處起泡將泡刺破燒之止後照後艾柏飲服之方免復發鼻蛆方多惟此方百發百中誠急救簡便第一方也艾柏飲艾葉柏子仁去淨油山萸肉丹皮各一錢半大生地三錢白蓮肉去心真山藥各二錢澤瀉一錢生荷葉一張乾者不效水煎服無論虛實至重不過二三服永不再發屢試如神萬無一失前方雖妙只可救急不能斷根此方可杜絶源流亦治鼻血湯藥第一方也又方四生丸生地葉無則用生地搗汁亦可生艾葉生荷葉乾者不效生扁柏葉各等分共搗為丸每服三錢有人傷寒病後鼻血三日不止百藥不靈服此立愈屢試如神亦奇方也又方用多年尿壺火上烘熱向鼻熏之立止如神百發百中又方用線扎緊手中指第二骨節彎屈之處即止左流扎右右流扎左雙流雙扎極效又方急將本人頭髮解開放涼水盆中良久即止仍服涼血清血之藥至神至奇發浸水中不可太久心內覺有涼氣即止久則恐生別病又方青苔放囟門上將囟門向壁頂住立止如神或取本人鼻血以紙捻蘸血點眼角血從左鼻流者點右眼從右流者點左眼雙流雙點甚妙又方韭菜搗汁蒸微溫服其效無比又方鳳頭白鴨蒸食數只斷根極效此鴨出廣東順德縣廣西義寧北流兩縣又真高麗參嚼食忌蒸煎食至數兩斷根神效口鼻流血此亦因鼻血過多以致從口而出照前第一方治之若系婦人恐系月經閉塞須查婦人科治之鼻忽縮入明雄淨硃砂各三錢用蒼朮煎水調服並將煎過蒼朮搗爛敷鼻上過夜即愈鼻忽脫落治法見耳部兩耳脫落方鼻孔爛穿此名鼻疳用鹿角銼碎焙焦枯礬各一兩頭髮五錢燈上燒灰共研為末用花椒水洗淨敷藥或用牛牙散見癰毒通治門白油膏見腿部更為神妙又方杏仁去皮尖研細末用紙壓去油以成白粉為度每杏仁二分對真輕粉一錢和勻吹入又方五倍子燒灰存性研末以黃醋與豬油和勻服之鼻內生蟲金剛藤上疙瘩數個雞蛋一枚煮熟將蛋去殼再煮良久先將藥罐向鼻熏之再用蛋向鼻滾擦其蟲自出以盡為度極效又方雞蛋一個炒豬肝四錢炒豆豉七粒搗融新瓦焙乾雞蛋白和勻作餅放鼻孔邊引蟲出盡即愈忌婦人雞犬見又方韭菜子燒煙向鼻熏之引蟲出淨自愈又方明雄研末向鼻中時時嗅之極效鼻中生瘡苡米冬瓜煎湯當茶飲神效無比又方杏仁去皮尖搗爛成膏用人乳調塞鼻內又方黃連膏黃連黃柏薑黃各三錢歸尾五錢生地一兩用香油十兩將各藥熬枯去渣用夏布瀝淨再加黃蠟四兩溶化離火攪勻候冷鼻內乾燥如火者用此搽之立效又方嫩桃葉搗爛塞鼻無葉用枝亦可又方元參研末吹入或以水將元參泡軟塞鼻亦可又方陀僧白芷各二錢共研末蠟燭油調搽甚效鼻中生痔甜瓜蒂四錢甘遂一錢枯礬螺殼灰草烏灰各五分為末麻油調作丸如鼻孔大每日以藥塞入一次其痔化為水肉皆爛下即愈或照上苡米方治之更妙又方輕粉二錢杏仁七粒去油白礬五錢共為末吹入鼻中即化為水又方頂上梅花冰片點之雖痔肉垂下亦入或用生藕節蓮鬚瓦上焙枯研末和頂上冰片水調敷之尤妙鼻中肉塊名曰息肉生藕節連須瓦上焙枯研末吹入其肉漸漸自落屢試如神並治鼻中生瘡又方枯礬生豬油和綿裹塞鼻中數日肉隨藥出鼻流清涕不止生花生四五斤入鍋內令本人親手拌砂炒之數次即愈神效鼻流臭水名曰鼻淵又名腦漏此症從腦頂一股酸氣由鼻孔而下臭不可聞用真松花粉時時嗅入鼻中有人患此數年百藥不效以此方治之半月斷根又方干葫蘆瓦上焙枯研末時時嗅入鼻內並用此藥兌酒飲或調粥服其效如神又方絲瓜藤又名水瓜又名線瓜取近根下者一尺瓦上焙枯研末嗅之並沖酒服極效又方老刀豆焙枯研末酒調服三錢重者不過三服即愈鼻塞出水日久不聞香臭蒺藜一兩搗碎煎水先含滿口並以一合滴入鼻中嚏出一二肉蟲即愈又方鐵鎖須磨石上取末和生豬油塞鼻有肉蟲出即愈鼻塞不通通草細辛附子共為末蜜調綿裹納鼻中各項鼻病凡鼻淵鼻痔鼻中肉塊鼻塞鼻瘡等症用辛夷花苞又名木筆花又名旱蓮蓬去赤肉毛子用芭蕉煎水泡一夜焙乾為末加麝香三釐蔥白蘸入鼻孔數次極效鼻中生毛晝夜可長一二尺漸粗如繩痛不可忍此食豬牛羊血過多所致用硇砂乳香等分為丸服十粒毛自落又方豬毛焙存性研末吹入鼻中即愈如食牛羊血過多者或加牛羊毛亦可鼻垂紅線尺許痛甚欲死真硼砂頂上牙色梅花冰片各一分為末以人乳調之輕輕點在紅線中間頃刻即消鼻大如拳疼痛欲死黃芩生甘草麥冬花粉各三錢桔梗天冬各五錢紫菀二錢百部紫蘇各一錢水煎服四劑即消諸物入鼻脹痛不出牛油如棗核大納鼻中油溶則物潤而隨出矣鼻外生瘡杏仁去皮尖研爛乳汁調搽即愈鼻梁窒痹此肺熱也用知母川貝母水梨肉各二兩水熬膏服又方乾荷葉邊連翹心白芷滑石各二錢蔓荊子苦丁茶各一錢水煎服數劑即愈鼻準紅赤名酒糟鼻食鹽研細每早擦牙噙水漱口吐入手中洗面月餘自愈又方白果嚼融和甜酒糟夜敷日洗甚效又方蕎麥麵燒灰存性研細麻油塗之又方雄黃硫黃各五錢水粉二錢用頭生乳汁調搽不過三五次即愈又方玉蓉粉見面部搽之極效唇部應參看口舌各部人中腫大生蒲黃二錢川連頂上梅花冰片各一錢共為細末麻油調敷人中及唇邊口角生紅白顆粒此即疔瘡有頭痛寒熱痛癢等症亦有麻木不知痛癢者須查疔瘡門趕緊治之嘴唇生瘡瘡內長齒此七情憂鬱火動而生此怪症也用柴胡白芍當歸生地各三錢川連川芎黃芩各一錢天花粉二錢白果十個水煎服外用頂上梅花冰片一分殭蠶末一錢黃柏二錢炒共為末摻之即愈或照下頭生白腫塊治之必效口唇腫黑痛癢不可忍大銅錢四個於石上磨豬油時時搽之照疔瘡治法亦可嘴唇四圍瘡如黃蠟旋覆花放瓦上火煅存性研末用真麻油調搽即愈又方葵花根照前焙研麻油調搽雖經年不愈亦效口角生瘡燕子窩連泥帶糞研末麻油調搽又方砂仁殼放瓦上火焙研敷即愈此蔡醫博祕方也口唇赤腫發癢或破爛流水銅青五錢宮粉三錢明礬一錢半冰片一分黃連二兩共熬膏敷臨用加麝香一釐冰片五釐口角四圍乾燥時以舌餂口水滋潤紅腫難堪松毛煮豆腐約半日久取豆腐貼之日換數次雖多年不愈亦能斷根真神方也口角流涎浸濕紅赤方見口部口唇緊小照後唇菌治之必效此名繭唇又名沈唇初起口緊不能飲食若不急治難救用新白布作卷如酒杯大燒燃放刀口上俟刀口汗出取汁搽之日搽十餘次並以青布燒灰沖酒服極效又方五倍子密陀僧各二錢甘草二分共為末另用黃柏二兩將各藥末水調敷黃柏上火上烘乾再敷再烘藥盡為度然後將黃柏冷透作薄片貼上連換數次過夜即愈又方五倍子訶子肉等分為末香油調敷神效缺唇先用麻藥見癰毒諸方敷上然後用刀割開兩邊薄皮用絲線縫好以生蟹黃敷之靜坐七日勿言勿笑自能收口或用龍骨白蠟等分為丸搽上用花針穿絲線縫好外用竹片夾住坐靜室七日勿言勿笑自愈唇破生瘡瓦松生薑汁搗融入鹽少許敷之唇邊生瘡多年不愈藍靛葉取汁洗之數日即愈冬月唇乾出血桃仁搗爛豬油調敷嘴唇陡然翻突形如豬嘴此名唇菌症乃心脾熱毒所致對時必死無藥可救急燒兩手少商穴查鼻部鼻血第一方便知一面用活地龍又名曲蟺又名蚯蚓十條搗爛吳萸二錢研末加灰面少許熱醋調敷兩腳心用布捆住半日一換以愈為止又用活癩蝦蟆又名老蟾又名癩團一個破出血仍照上口唇緊小第一二方治之或可救也又方查卷十一癰毒門疔瘡內救唇湯服之亦可或用溏雞糞敷之亦妙口部應與舌齒各部參看小兒口內生瘡見小兒科口生肉球有根如線吐出乃能飲食捻之其痛入心此名血餘症用真麝香一錢研末作兩次服自愈或用人發燒灰服亦可口內上齶生癰此亦名懸癰生口上齶形如紫葡萄舌難伸縮口難開合鼻內出血時發寒熱急用食鹽燒紅枯礬各等分研細末以筷頭蘸點日三五次自消上齶生蟲癢不可忍有人上齶癢極凡遇飲食更甚後有一蟲墜下急忙扯出而愈後亦無羌口舌生瘡吳茱萸去梗研末好醋調敷兩足心過夜便愈性能引熱下行故也又方天門冬麥冬並去心元參等分為末煉蜜丸如彈子大每噙一丸雖連年不愈亦可斷根此林屋山人經驗方也又方五倍子末摻之吐出涎水便可飲食極效又方川黃連北細辛各二分生研極細末以小管吹入瘡上神效此方熱因寒用寒因熱用功成而無偏勝大人小兒並治切忌入喉又方輕粉三分硃砂明雄各七釐半冰片四分為細末先用薄荷水或茶漱口將藥吹入應驗如神或用人中白散見齒部治之亦可又方黃柏蜜炒研末搽之神效又方因服輕粉口破者用三四年陳醬化水時時含口漱之又方口瘡無論新舊夜臥時自將兩腎子以手捏緊左右交手揉三五十遍夜夜揉之勝於服藥口臭難聞每夜臨睡時含荔枝肉一二枚次早吐出半月見效又方每早洗面時用白牽牛粉擦牙漱口日久自無此病又方益智仁一兩甘草二錢共為末每用一二錢干吞下心氣不足口臭者最宜或用密陀僧一錢醋調漱口亦可又方茴香煮羹或生食之極效或用鹽梅時時含之夜臥口渴喉干元參二三片含口中即生津液大有功效口角流涎浸濕紅赤此脾冷也用焦朮青皮炮薑各五分法夏木香丁香各一錢共研細末米湯為丸如粟米大小兒一歲者服十丸大人每服三四錢服完自愈如不見效則系脾熱須照後方服之又方治脾熱口角流涎焦朮滑石各五分扁豆茯苓石斛各三分黃連二分葛根一分半甘草一分共為末燈心湯調下小兒每服一錢大人每服三四錢舌部舌脹滿口凡中木瓜毒其舌亦腫脹滿口方見解救諸毒門此症由心經火盛以致卒然舌大腫硬咽喉閉塞即時氣絶名曰翣舌至危之症急用皂礬不拘多少放新瓦上火煅紅色攤冷研細以瓷調羹撬開牙關或用鹽梅搽之或用半夏擦之自開將藥搽舌上立效如神再用鍋底煙三錢以燒草者為佳燒煤炭者忌用沖酒送服若舌腫而喉內有痰者即是喉風須查咽喉各方治之又方醋調鍋底煙子敷舌上下最效多敷更妙又方雄雞冠血搽舌上咽下即愈又方蒲黃研末摻之如因寒而得者須斟酌調治為要又方萆麻子四十粒紙上取油將油紙燒煙燻舌即消若舌上出血熏鼻中自止又方諸藥不效者以針刺舌下兩旁血出即消切勿刺中央刺則血出不止難救若已誤刺醋調百草霜塗之舌忽腫出口外或長數寸此亦心火熱極所致用雄雞冠血一小盞以舌浸之即縮或照舌腫各方治之又方真川連三四錢煎濃汁以舌浸之亦收又方井水一桶令人提起一人引病人前來不可説明將近身即劈面潑去其舌自收此方暑天始宜收後仍以川連二三錢煎水服之傷寒熱病後舌出寸余不收頂上梅花冰片研細摻舌上應手而縮須用五錢方效舌出口角時時搖動此名翠舌風用翠鳥舌舌須取出陰乾備用在兩額上點戳幾下即愈舌忽縮入銀針刺破舌尖出盡惡血以蠟燭油搽之即愈舌上出血舌忽出血如湧泉或紫或黑由心火上炎以致血熱妄行用六味地黃湯見內外備用諸方內加槐花三錢煎服立愈或照以上舌腫諸方治之以鍋底煙子敷之更妙又方茅草根生車前子亂髮各為末吹搽立止此林屋山人經驗方也又方槐花炒研摻之或用頭髮燒灰醋調敷之舌頭潰爛凡舌爛痛極飲食難進宜用吳茱萸三四錢研末好醋調敷兩腳心用布捆好對時一換其效如神或兼用人中白散見齒部治之更妙舌上生菌此惡症也初起如豆漸大如菌疼痛紅爛無皮朝輕暮重由心脾熱毒所致用硇砂人中白各五分瓦上青苔瓦松溏雞糞各一錢用傾銀罐子二個將藥裝入封固外用鹽泥封好以炭火煅紅待三炷香為度俟冷開罐取出入頂上梅花冰片麝香各一分共研細末臨用時先以瓷針刺破血菌用藥少許點之再用蒲黃末蓋之內服二陳湯見內外備用諸方加黃連黃芩薄荷煎服即愈或用上方地龍吳茱萸塗足之法更妙又方取蜘蛛絲搓成線一條打圈套在菌根上其絲自漸收緊收至極痛忍耐片時菌落血出用百草霜敷或蒲黃末敷俱效再用六味地黃湯加槐花三錢煎服並治重舌甚效舌硬生衣犀牛黃硃砂各一分玄精石二兩共研細末將舌尖刺出紫血用此藥搽之即愈此林屋山人經驗方也舌下重生小舌參看小兒雜治門重舌各方照上舌菌第二方治之又方黃連山梔荊芥黃芩連翹木通薄荷牛蒡各一錢甘草五分燈心一小團水煎服小兒減半服舌下細粒如豆此肺癰也查癰毒門肺癰方詳細辨別治之舌下生數尖或遍口生瘡如蓮花又如粟米患此症者飲食減少氣喘生痰手足俱冷用針刺破兩邊尖者中間斷不可刺切記切記舌下腫痛此亦重舌之類用蒲黃五錢煎取汁去渣含口中數次極效舌下痰包用無雜色的白馬糞放新瓦上焙乾研末加頂上梅花冰片為末敷上立愈或照上舌病各方治方小舌落下用鹽橄欖連核燒灰存性研末吹之即上或用吊揚塵灰點之或用食鹽炒熱點之均效總宜先用筷子將大舌根壓住然後吹點方能上也小舌生紅泡子與咽喉症不同蛇床子二兩罐內燒煙吸入喉中自消補斷舌法凡人偶含刀在口割斷舌頭已垂落而未斷用雞蛋內白軟皮套住舌頭另以天花粉三兩赤芍二兩薑黃白芷各一兩為末蜜調塗舌根以白蜜調白蠟稀稠得宜敷在雞蛋皮上日敷數次三日舌自接住去雞蛋皮再用蜜蠟勤敷七日全愈又方如跌打穿斷舌心血出不止以鵝翎蘸米醋頻刷斷處其血自止或用瘦豬肉片貼之更妙仍用蒲黃杏仁硼砂少許為末蜜調成膏噙化而安又方活蟹一個炙乾為末敷上即能生肌藥宜預製以備急用又方活蟹燒灰乳香沒藥各二錢塗之即生肉如咬去唇舌用川烏草烏為末攤紙一條以涼水調合貼之即不覺疼齒部牙齒疼痛牙痛不外風火蟲三項又有虛火實火之分虛火其痛甚緩日輕夜重實火痛不可忍風痛者痛而且腫甚至頭面皆痛呵風亦痛蟲痛者發時必在一處叫號不已亦有虛痛總在一處者治法雖多初服甚效而再發服之不效蓋虛實各有不同故也古方有分別上下左右按經施治之法試之不甚見功入未列入玉帶膏治疳氣去風邪止火痛固牙齒及搖動不能食物者臨臥時用花椒水漱淨每用一片貼牙根上次早取出毒重者其色黑毒輕者其色黃方用生龍骨二兩宮粉一兩五錢頂上梅花冰片麝香真硼砂各二錢五分淨黃蠟二兩除黃蠟外將上五味研細末和勻聽用先將黃蠟融化離火即入前藥末攪勻用棉紙將藥傾上用竹刀刮勻如膏凝難刮又用熱湯熏透使軟再刮勻攤紙上剪作一小指寬一寸長收貯瓷瓶內封固勿令泄氣京市專以此收其利也竹葉膏生竹葉去梗淨一斤生薑四兩淨白鹽六兩先將竹葉熬出濃汁又將薑搗汁同熬瀝渣將鹽同熬干如遇牙痛用搽一二次即愈其效如神蘇州重兌重換不易得也又方老蒜二瓣輕粉一錢同搗融敷經渠穴穴在大指腳下手腕處寸脈後即是用蜆殼蓋上扎住用別物蓋亦可男左女右少頃微覺其辣即便揭去隨起一泡立刻痛止泡須挑破揩盡毒水曩者年中丞弱冠時患此每發一次呼號纍日飲食不進有喇嗎僧實如授此方用之數十年不發真仙方也又方上方如不知穴處即用老蒜搗爛如蠶豆大敷在大指二指手背下微窩處亦極神效又方在肩尖微近後當骨骱陷中以蒜片蓋住上用艾一小團如豆大燒五次左牙痛燒左肩右牙痛燒右肩燒後頸必大痛良久齒痛永不再發百方不效者惟此立驗亦神方也又方骨碎補二兩銅刀切細又名毛薑又名猴薑又名石板薑以石上生者為佳食鹽五錢桑椹子五錢瓦鍋內熬成膏去淨渣早晚擦牙良久吐之不惟可治牙痛且能固齒益髓去骨中毒氣牙痛將落者擦一月後再不復動又方川椒三分細辛二分此味必須稱準多則頭必牽引作痛白芷防風各一錢共用滾開水泡透時時含水入口片刻吐去再含無論風火蟲牙莫不見效不可輕視又方皂角生薑地黃旱蓮槐角子荷葉蒂細辛青鹽各一錢升麻五分共研末擦之此方西嶽蓬花峰斷碑中抄出屢用皆效又方烏梅燒存性研末加頂上牙色冰片少許擦之神效冰片用時方加以免出氣又方石膏二錢胡椒三粒共研細末敷之極效陰虛牙痛緩痛者是枸杞一兩蒸瘦豬肉食一二次神效之至又方牛膝去心鹽水炒五錢豬腰一對要一豬所生者煮粥食立效又方生附子研末口水調敷兩腳心極效又方核桃殼又名胡桃四五斤打至粉碎加川椒食鹽少許熬成濃汁攤冷時時漱齒極效陰虛邪火上蒸牙痛連及頭頂此症陽明有餘少陰不足宜用玉女煎熟地五錢麥冬去心石膏各三錢知母牛膝各一錢五分水煎服風熱上蒸牙脹頭痛連翹滑石銀花西瓜青皮生緑豆皮活水蘆根各三錢水煎服或照後風火牙痛各方治之風火牙痛腮外發腫者是呵風痛者亦是生地搗爛加潮腦少許不可過多捶勻貼患處吐出涎水神效又方陳鹽梅子含口內吐出涎水數次即愈又方五倍子末冷水調敷腮頰甚效又方木患子又名洗手果三四個去核用生鹽塞滿加雄黃少許燒成炭研末冷透火氣加頂上牙色梅花冰片和勻擦牙吐出涎水再擦再吐涎儘自愈極效又方生絲瓜一條又名水瓜又名線瓜擦鹽少許火燒存性研末頻搽涎盡即愈腮腫用水調末敷之極效又方莧菜根燒灰敷之極效又方北細辛北五味各二分共搗為丸寒痛處立效如神蟲牙作痛痛在一處齒縫有膿或無膿皆是明雄末二兩真小磨麻油四兩調勻含口漱片時吐出再漱數次即愈有人蟲牙痛不可忍飲食不進百治不驗用此斷根屢試神驗此治蟲牙第一方也又方雄黃末和棗肉為丸塞牙縫日換數次極驗又方五倍子煎濃汁含漱數次其蟲立死其患永除牙根腐爛名走馬牙疳凡大人熱病之後及小兒痘症之後火毒流於胃經致有此患勢甚危急甚則落牙穿腮透鼻一二日即能致命故有走馬之名言其驟也此症有五不治不食爛舌根不治黑腐如筋者不治白色肉浮者為胃爛不治牙落穿腮鼻臭不堪聞者不治山根上發紅點者不治如是凶險命在須臾急用生大黃三錢丁香十粒緑豆二錢共研末熱醋調敷兩足心最為神效仍照後金鞭散治之庶幾十可救五金鞭散緑礬五兩煅赤透人中白三兩煅明雄二兩真麝香一錢頂上梅花冰片一錢先將銀針挑刮去腐肉紫血然後將藥研末敷之吐出毒血惡涎方能愈也又方赤霜散專治走馬牙疳紅棗一枚去核入紅砒一粒如黃豆大扎好放瓦上炭火炙至棗枯煙盡為度取出用碗蓋住候冷加頂上梅花冰片一分研末將患處洗淨吹入效速如神久爛之孔生肌亦速此方較前方簡便而極效驗乃林屋山人祕傳也又方生南星一個當心剜空入雄黃一塊麵裹燒候雄黃燒溶取出用碗蓋住候冷去面為末入麝香少許擦瘡數日甚效此亦林屋山人方也又方人中白散治男婦大小走馬牙疳並咽喉疼痛腐爛紅赤舌腫齦臭映血牙床潰腐等症極效人中白兒茶真青黛真硼砂各一錢薄荷元明粉馬庇勃各五分頂上梅花冰片二分共研極細如灰面細放舌上無渣為度摻之如病重者加真犀牛黃三分珍珠五分其效更速咽喉病用筆管吹入日三次夜二次甚妙牙疼腿痛名青腿牙疳此症兩腿形如雲片或紅或青大小不一痛而腫硬步履艱難其毒上攻以致牙齦腐爛甚至穿腮破唇雖説話高聲亦痛照前走馬牙疳各方治之腿上腫處用清涼膏見湯火傷門治之神效無比或用瓷鋒刺破出血以牛肉片貼之日換數次甚驗或服六味地黃湯見內外備用諸方十餘劑亦可藥內去山萸肉為要又方一人患此痛苦八年不愈一乞食道人用艾火在耳門邊肉尖上切蒜片隔住連燒五下立時全愈神妙非常左痛燒右右痛燒左或兩耳全燒無不奇效或不用蒜以燈火燒之便妙盤根牙癰牙根破爛甚至牙骨通身脫落須用金素丹見癰毒諸方摻棉紙上捲成紙捻塞牙根邊久塞可保不脫如遇飲食可去藥條日換數次亦無妨礙牙根腫痛紅腫痛甚者名牙癰刺出毒血用珍珠散吹之不吹亦可內服龍膽瀉肝湯見內外備用諸方即愈倘牙骨及腮內疼痛不腫不紅痛連臉骨者名骨槽風治法見後牙腮疼痛初起不紅不腫久則潰爛或有骨出此名骨槽風乃陰疸也初起有誤認牙疼多服涼藥以致成功爛至牙根延爛咽喉不救未潰爛者宜用二陳湯加陽和丸煎服或服陽和湯消之已潰爛者用陽和湯犀黃丸每日早晚輪服如有多骨在內用推車散吹入過夜其骨不痛自出俟骨出盡用生肌散吹入內服保元湯加肉桂當歸川烏生耆生草收功屢試神驗此林屋山人經驗神妙方也各方見癰毒陰疽及內外備用諸方各門推車散見多骨疽門火鬱牙疼結核齦腫夏枯草犀角羚羊角黑梔仁各一錢元參知母各一錢五分連翹銀花各二錢生甘草六分水煎服數劑即愈虛火者忌用牙縫出膿有膿而不潰爛或似膿非膿痛不可忍者此蟲牙也照蟲牙第一方治之牙縫出血此名牙宣症又名牙衄乃陰虛熱極所致發時血出不止若不急治難救用黃豆渣即豆腐店中取過黃豆漿之渣無則用生黃豆嚼融亦可如不見效仍用豆渣為妥並以黃豆為佳黑豆不效店中亦有黑豆者須問明以免誤事敷之立止如神內服六味地黃湯見內外備用諸方門去山萸肉不用有人患此血出兩日不止熱甚垂危照此治之其病若失此治牙衄第一神方也載福建某府志滿口牙齒出血前症系一二牙縫血流不止此係滿牙出血時有時無用枸杞為末煎湯漱口然後吞下立愈如血出不止即用前豆渣方治之又方馬糞燒灰存性擦之立愈又方蘿蔔含口內嚼之熱則再換另嚼極效輕粉毒發齒縫出血臭腫貫衆三錢黃連二錢煎水候溫加頂上梅花冰片二分時時漱之牙根胬肉漸長此名齒壅症用生地黃汁一鍾皂角數片將皂角燒熱淬地黃汁內再燒再淬以汁盡為度曬乾研末敷之即縮或用朴硝末敷之亦消齒長數寸此名髓溢症用真白朮為末人乳拌蒸服之即愈此孫真人千金方也軟牙瘡此症小兒多生用生蜆三四個撬開取肉先將殼燒枯和蜆肉搗爛敷之甚效睡臥咬牙聲響即取所睡席下灰塵一捻納入口中勿令本人知之即愈睡齒作酸因食酸味過多者胡桃肉又名核桃食之即愈取痛牙法牙不宜取取則滿口牙松實在痛極礙於飲食方可取之否則不取為妙用大鯽魚一條約重十兩用白信石一錢入腹內縫口挂有風無日貓鼠不到之處陰乾七日後鱗起白霜取霜收貯約一鱗之霜可取一牙臨用將白霜放膏藥上不論何項膏藥指定痛處貼上令本人咳嗽一聲其牙自落此林屋山人經驗方也又方用大蒜一個搗爛入白龍骨末一二分拌勻貼痛處半時即下牙齒稀疏爐甘石煅研石膏各等分日日擦之不可刷動久則自密牙關緊閉鹽梅擦牙上涎出即開此法最妙或用瓷調羹撬之亦開切不可用銅鐵撬動如不能開用物打斷一牙亦可灌藥牙落復生見後固齒鼠骨散方固齒良法前有骨碎補一方甚效牙痛方藥最多臨時見效甚少即有微效難免復痛余自十歲以後屢患此症每發必數日痛甚不能飲食甚至寒熱交作醫藥不效後得一法平日小便時咬緊牙關則永無此患依法行之一年之內間發數次久則不復再發其妙無窮又飯後漱齒晚間洗齒亦良法也又方凡人中年及將老時牙多脫落或搖動不即脫落更為不便務記初落牙時將落下之牙放瓦上用火焙枯研細敷於滿牙半日下再行吞下可保余牙永不脫落又方大黃五錢甘松香附去淨毛酒製白芷生石膏各五錢真川椒胃寒者用胡椒緑豆各四十九粒細辛三錢共研細末加食鹽八兩火煅過篩抖藥末早晚擦牙不獨固齒兼去口中氣味須部烏須法五倍子一兩銅緑三錢炒紅用醋淬之醋不宜多再炒再淬如此三次研碎青礬二錢炒研生鹽五分炒先將五倍子研碎用銅鍋炒至出油成團放地上攤冷再將各藥研碎用好燒酒調成麵糊樣蒸至鏡面為度不宜久蒸先用皂角水洗須一次又用茶洗一次將藥乘熱濃濃染之俟干用熱水洗去其須光潤如漆可保兩月不白又方熟地三兩生何首烏三兩要白色而長形者萬年青二片桑葉二兩白果三十個黑芝麻一兩炒桔梗三錢為末不可經鐵器為丸每日早飯後服一兩一月後須即烏黑久服可不再白拔白換黑先將白鬚拔去用豬膽塗孔中即生黑鬚或用白蠟點孔中不再白也羊鬚瘡小紅棗燒枯存性研末清油調敷甚效又方雞腰膏見癰毒通治門其效如神又方諸藥不效者以舊棉絮胎燒灰麻油調搽立愈又方用羊須燒灰麻油調搽一二次立愈下頦下頦脫落此症起於腎肺虛損元神不足或談笑高興忘倦一時元氣不能接續所致須平身正坐令人以兩手托住下頦向腦後送上關竅隨用布條兜住務須避風若受風邪則痰涎上壅口眼歪斜則難治矣外用天南星研末薑汁調敷兩腮頰一夜即上次日再用高麗參白朮茯苓製半夏各五錢當歸二錢殭蠶二錢天麻陳皮各一錢川芎八分甘草三分製附子六分燈心十四根生薑三片水煎服又方真烏梅搗融為餅塞滿牙盡頭處張口流涎隨手掇上又方白朮一兩防風五錢水煎服半刻即上其效甚速頸項頸上生瘡大如櫻桃有五色者瘡破則頸皮斷黃牛乳日日飲之久則自愈對口瘡與癰毒諸方參看生後頸正中處偏生者名偏對口夏秋間取茄子蒂懸挂簷間有風處吹乾遇生對口者將大銅盤放杉木好炭燒煙盡將茄蒂不拘多寡於炭火內燒煙令病人仰臥床邊另放一椅將頭擱住露出瘡口以銅盤位置緊對瘡口任聽茄蒂煙氣熏氣良久瘡口自開即有一線紅絲血流下盤中不可移動恐其斷而不續須俟紅絲流盡自斷則瘡毒盡矣用生甘草金銀花煎湯洗瘡口服調補氣血藥收功屢試甚驗又方鮮茄子蒂十四個生紅何首烏二兩煎服二三劑未破即消已破拔膿生肌雖根盤八九寸寬大者亦效又方水仙膏見癰毒諸方無論已破未破屢試如神百無一失又方初起者用嫩桃葉尖七片用鐵斧搗融貼之即愈效驗之至又方用爛溏雞糞雄雞糞更妙敷數次即愈雞糞大涼最能敗毒加荔枝核研末調敷猶為神妙此屢驗方也又方明雄一錢吳茱萸一兩為末香油熬熟調搽對口疼痛百藥不效敷此立止真神方也又方凡對口根盤寬大不紅不痛或微微疼痛色暗不明乃陰疽也斷不可誤用寒涼之藥致成敗症難救須查卷十一陰疽各方治之為要不可輕忽對口之上生瘡此名落頭瘡紅腫者照對口及癰毒通治見卷十各方治之皮色不變平塌而不甚痛者照陰疽見卷十一各方治之頸項直硬不能轉側此肝腎二臟受風故也用宣木瓜二個取蓋去瓤沒藥二兩乳香二錢半同入木瓜內加蓋縛定飯上蒸三四次研爛成膏每用三錢入生地黃汁半盞好熱酒二盞化開溫服又方黑豆一升蒸融布包作枕自效閃頸促腰真硼砂研粉以燈心蘸點眼內四角淚出即松連點三次立愈咽喉咽喉辨治咽喉之患最為險惡忽然頃刻而痛難忍系屬寒症若悠緩而痛乃為熱症內經云驟起非火緩起非寒虛寒實熱是在明睿者知所區別乃所投而無誤耳此林屋山人妙論也又凡喉症須於本門先後各方詳細參看斟酌用之為妙單雙喉蛾又名喉痹生於咽喉關上者輕關下者重此症喉閉片時即不可救若男子從鼻梁中心尋至頭頂婦女則從後腦尋至頂上小兒則看兩手虎口如有水泡紅子即用銀針挑穿喉蛾即破忌見燈火一面用老蒜搗融如蠶豆大敷經渠穴穴在大指下手腕處寸脈後即是男左女右用蜆殼蓋上扎住用別物蓋亦可片時起一水泡銀針挑破將水揩淨以去毒氣立刻安痊再服甘桔湯見內外備用諸方以免後患無藥之處不服亦可此方屢試屢驗其效無比又方皂角蟲蛀者不用研末醋調服一錢重則一錢四五分或用鵝毛蘸藥入喉攪動亦可並敷喉外干則隨換少時吐出痰涎即愈此係急症諸藥性緩惟此功效甚速屢試皆驗喉風第一方也並治九種喉痹愈後仍照以後甘桔湯調理無藥之處不服亦可又方鵝毛一根黏真桐油一分入喉卷攪痰隨油吐服甘草水可解油氣又方手指甲燒灰吹入其蛾立破至便至神或用燈草燒灰吹入亦極驗也又後有喉症各方俱極神效可用風火上郁頸腫咽痛薄荷一錢連翹射干牛蒡馬勃各二錢生緑豆皮三錢水煎服又方西瓜青皮連翹射干各二錢飛滑石三錢桑皮一錢杏仁一錢半去皮尖水煎服虛火痛者忌服喉痹治法喉哦喉閉纏喉風皆曰喉痹痹者不仁也頃刻而起危急之症痰在喉中作響響如打鼾舌白而不腫諸書皆稱肺絶不救蓋緣誤服寒涼之藥以致死耳桂薑湯服後立愈桂薑湯治喉痹頃刻而起毫無別恙者此虛寒陰火之症肉桂炮薑甘草各五分共歸碗內取滾水衝入仍將碗頓於滾水內服藥口許慢慢咽下立愈或以生附子切片塗白蜜火炙透黑收貯臨用取如緑豆大一粒口銜咽津亦立刻全愈此林屋山人祕法雖暑天亦宜用切勿遲疑自誤外纏喉風此症喉內熱結喉外腫大麻而且癢如蛇纏頸身發寒熱頭目腫痛者即是喉內之痰塞滿舌有痰護此痰不出齒作響如鼾喉痹誤服涼藥有此症也如再遲痰塞鼻內氣無出入即死照前喉蛾皂角桐油各方治之仍用薑桂湯見前調理而安內纏喉風此症發時惡寒惡熱內外無形出氣短促胸前紅腫兩足畏寒乃腎經有熱水枯不能上潤故也照前外纏喉風治法自愈心前如有紅絲用針挑斷為要喉關如雷響者難治鎖喉風喉內無蛾痰聲不響喉內氣急不通者即是照前喉蛾皂角桐油各方治之小兒鎖喉風用芙蓉葉槌汁煮雞蛋一貼囟門一貼肚臍即愈腳根喉風此症從腳根發起直至喉間或一年一發或半年一發其病一日行一穴切忌熱物怒氣初起宜用緑礬三分煅真硼砂六分元明粉五分上梅花冰片一分真麝香五釐共研末吹入少許再用羌活獨活桔梗防風黃耆白芷甘草茯苓陳皮前胡柴胡白芍元參牛子煎服如纏惡起泡者難治咽喉腫痛日輕夜重痰如鋸聲乃陰虛也用熟地一兩山茱萸四錢麥冬五味牛膝各三錢茯苓五錢水煎服下喉一聲響亮火熱俱消或照前薑桂湯服之亦可喉腫心痛閉目不語起首脈散牙緊發慌手足麻木此名硃砂症又名心經疔非喉風也急用紅紙捻燒燃照心窩背心兩處見有紅點用針挑破內有紅筋挑出如無紅點少刻再看或服藥後再看必有並用雷擊散見卷十五瘟疫門治之喉間作痛爛不收口此名爛喉痧用土茯苓煎湯時時服之忌茶數日即愈又以四物湯見內外備用諸方加茯苓黃耆二十餘劑而安又方服櫻桃數十粒即愈如無新鮮者即蜜餞者亦可此方系嘉慶年間江蘇人得自仙傳救人無數平時宜向南貨客購買蜜餞櫻桃存貯以備急用又方用紅棗散見後吹入過夜即安或用人中白散見齒部治之極效喉內生瘡鼻孔亦爛若作喉風治立死用白鹽梅一個燒灰存性枯礬一錢穿山甲一錢炙共為末吹喉中神效或用人中白散見齒部治之喉瘡已破疼痛難食豬腦髓蒸熟醋和食之飛絲入喉生瘡凡喉瘡日久不愈恐是露天飲食有飛絲落下食之以致咽喉生瘡急用白礬巴豆燒灰吹入即愈或用後巴豆油熏鼻之法亦妙喉癬體虛多郁者患之喉生苔蘚色暗不紅不閉不腫氣出如常微微疼癢有礙飲食者即是此係虛火淹纏難愈忌刺畏補用頭胎黃牛屎放新瓦上並用瓦蓋周圍用文武火煅至煙盡存性連瓦取下用鉢蓋住候冷研末用筆管徐徐吹入自愈又方冰片牛黃各一分膽礬三分山豆根二錢真硼砂雄精兒茶各八分共研細末另用鹽梅三個去核搗融入藥和勻丸如龍眼大臨臥銜在口內過夜即愈銜至十丸斷根神效無比風火喉癬此症屢愈屢發並無夜熱咳嗽吐血等症惟止喉痛紅赤或似蝦蟆皮色圈結喉中用秋蝴蝶花根二兩即射干也此花梗葉與春蝴蝶花一樣但春間開者花是藕合色以秋間開黃花者為真不可誤取用洗淨搗爛甜酒煎汁含口中漱三五次吐出再換再漱可以除根喉內生肉重重疊疊腫起不痛多日方有臭氣透出臭橘葉煎服數次即愈又方用綿裹筷子頭蘸食鹽點肉上五六次自消再用桔梗黃連各一錢五分枳實炒前胡連翹去心陳皮防風半夏柴胡南星白附子牛蒡子炒研赤芍莪朮元參甘草各一錢煎服體虛者忌服喉中結塊不通水食危急欲死百草霜即鍋煙子以鄉村燒草者為佳燒煤炭者斷不可用和蜂蜜為丸如芡實大新汲井水化一丸灌下甚者不過二丸此名百靈丸又方膽礬銜口內惡涎吐儘自愈喉中忽硬一塊如桂圓大吞吐不出不下厚朴半夏茯苓紫蘇各一錢甘草五分老薑一片煎服即愈喉中生珠丹溪云此非喉症乃是鼻中生一條紅線如發懸一黑泡大如櫻珠垂挂到喉門而止如用刀針即死急取活土牛膝根獨條肥大者向生草藥店買之搗汁以好醋四五滴和勻滴入鼻中二三次線斷珠破吐出瘀血立安或用針刺手腕中紫筋或刺小商穴查後喉症諸方便知去其惡血更為神妙喉中生瘤此症生喉間兩傍或單或雙如桂圓大紅絲相裹如瘤因肺經受熱所致切忌用刀內服益氣疏風湯甘草桔梗川芎當歸生地升麻白芍花粉黃芩麥冬前胡青皮乾葛連翹防風白蒺藜水煎服外用麝香上冰片各三分川連二分研末時時吹入或刺手腕中紫筋或刺少商穴亦妙喉間腫大又非癭瘤忽痛忽止外現五色按之半空此痰結也用海藻半夏白芥子貝母南星各三錢高麗參三錢茯苓五錢昆布桔梗甘草各一錢製附子一錢水煎服喉中結氣如梅核樣時有時無半青半黃梅子每個用鹽一兩鹽少不效淹一日一夜曬乾又淹又曬淹至鹽水盡為止每用青銅錢三個夾鹽梅二個麻線捆住裝瓷壇內封口埋地下百日取出每用鹽梅一個含口中咽汁入喉半刻即消收一年者佳越陳越好其妙無窮又方子龍丸見陰疽門服之最效老癆喉痛生雞蛋一個去黃用白糯稻根鬚五錢洗淨甜白沙參石斛各一錢五分麥冬三錢炒生甘草三分水煎服穢濁上衝咽喉腫痛連翹三錢馬勃黑梔各一錢五分杏仁去皮尖橘紅竹葉心各一錢鬱金八分牛蒡子二錢水煎服喉中作癢此喉管傷寒也不可吃茶酒湯水用薄荷二分麝香五釐研極細末吹入喉中吐出涎水碗許再用陳米二合煎湯飲之自愈若先服茶酒等物則難治也又有咽喉癢痛聲啞方見後喉症各方凡一切咽喉急症或閉或痛切忌刀針以免穿透急將兩手膊以手勒四五十次趕血於大拇指取扎發繩扎住用針在少商穴穴在兩手大指內外甲縫中不上不下即是處刺破出血立愈男左手女右手重者兩手齊刺此百發百中急救第一方也又方先於後頸窩處擦油少許用銅錢一文刮之如刮痧樣要順刮切忌倒刮其痛稍緩以便乘勢用藥輕者不藥亦可此法極妙又方生附子研末或用吳萸亦可熱醋調敷兩腳心無論實火虛火俱極神妙又方獨蒜二枚削去兩頭塞鼻中左患塞右右患塞左喉口中血出乃愈又方治喉咽不通牙關緊閉不省人事用巴豆搗爛綿紙包壓取油作捻點燃吹滅熏鼻中使煙氣熏入喉內即時吐出痰涎惡血便愈神效又方凡喉症先一二日胸膈氣緊出氣短促忽然喉痛手足厥冷氣閉此係危症切忌牛黃入口不救惟用前皂角末服之最效又方家麻皮約韭菜寬剪下七節每節一寸長用旱煙袋燒燃當煙吸食即破未破再食一次無不破矣又方紅棗散紅棗四兩去核燒枯明雄七錢五分勿經火枯礬真犀牛黃牙色梅花冰片銅緑煅真麝各一分共研細末收入瓷瓶勿令出氣遇喉風等症以紅紙卷管吹入喉中仰臥少時吐出濃痰以多為妙若爛喉痧吹入過夜即安屢試神驗又方黃瓜霜嫩黃瓜有刺者不論幾條於端陽午時切開瓜頭挖去瓜瓤用皮硝裝滿仍將瓜頭竹籤蓋好將黃瓜挂簷下勿令見日候瓜外起霜刷下加冰片研末吹患處止痛如神虛火喉痛忌用又方鹽藕節平時取新鮮藕節烘乾用鹽醃好封固遇有喉痛者嚼汁咽之極為神效陰虛喉痛更妙又方豬膽礬臘月八日取雄豬膽一個裝入白礬末陰乾研末次年臘月八日再取豬膽入前豬膽末如此三四次遇患者用一二分吹之凡單乳蛾喉癬喉痛腫痛吞咽不下命在須臾者屢試如神虛火喉症忌用又方蘿蔔纓凡人於三四月間有喉間病皆因冬天寒氣鬱結不開至春始發須於初交冬時多買蘿蔔菜攤在瓦屋上挂在竹篙放露天下更妙任它風霜雨雪吹打不要收下直到立春前一日收下挂在無日處陰乾春二三月收來切碎將醬或鹽放在碗中飯鍋上蒸熟當家常小菜食之一家永無喉患若有人患喉風等症者以此菜煮湯服甚效並治痢疾又方紫袍散治咽喉十八症即緑雲散又名石青散虛症忌服石青真青黛硃砂真白硼砂以上各一錢冰片二錢明礬人中白元胡各五錢山豆根二錢共為細末收貯瓷罐不可泄氣用五六釐吹入喉中立愈六味湯治咽喉各症虛火痛者忌服荊芥穗薄荷各三錢炒薑蠶桔梗生粉草防風各二錢水煎數滾微溫含口中緩緩咽下不可大口一氣吃完如一時煎熬不及以滾開水泡之亦可蘇子湯鎖喉纏喉乳蛾風火閉住皆治此林屋山人極驗方也蘇子前胡赤芍各二錢桔梗甘草各一錢元參連翹浙貝各一錢五分煎服加減甘桔湯實火宜用之立愈此林屋山人經驗方也川連桔梗牛蒡子連翹黃芩花粉射干元參赤芍荊芥各一錢五分甘草防風各一錢水煎服喉內戳傷飲食不下雞蛋一個鑽一小孔去黃留白入生半夏一個微火煨熱將蛋白服之驚嚇失音不語有人因受驚嚇失音不語用陀僧七分茶調服即愈屢試如神忽然口不能言附子研末吹入喉中即愈又方豆豉煮湯加入好酒服之或用人乳汁半合和好酒調服咽喉聲啞真硼砂一兩元明粉一錢訶子肉二錢膽星一錢冰片三分共為末外加大烏梅一兩搗如泥丸如龍眼核大每用一丸噙化數次即愈又方豬油二斤熬去滓入白蜜一斤再煉少頃瀝淨入瓷器內俟成膏不拘時挑服一匙並治肺熱聲啞又方通草水煎服或用橘皮煎濃汁俟冷飲之咽喉癢痛聲啞肉桂一錢杏仁五錢為末蜜丸櫻桃大綿裹含化咽汁陰虛聲啞人之失音由於色欲過度元氣耗喪雖參茸無能為力惟有未破身十六七童男女五更早起未食物之前不必漱口爛嚼海南子檳榔一二個與病者服之換十人嚼至十次其病自愈男病用童女嚼女病用童男嚼又方新好槐花米放新瓦上慢火炒熟放身旁隨行隨坐聞送一二粒置口中咀嚼咽之使喉中常有氣味久之自通又方生白礬煉蜜為丸服之咳嗽聲啞見咳嗽門喉外生癰此症發於頸項結喉俗名喉結之上名結喉癰發於結喉兩旁名夾喉癰重則堵塞咽喉湯水不下若爛穿見喉難治初起未破者內服黃連消毒散外敷二味拔毒散均見癰毒諸方如將欲破即照癰毒各方治之祕傳通治三十六種喉科自預留真青魚膽挂當風處陰乾此方通治唯恐雙單蛾漲塞咽喉牙關緊閉不能入藥男女則吹藥少許入左右鼻俟少頃口開再於喉嚨內吹藥一二次即愈緣喉症有朝患夕斃之險況專業喉科者亦鮮防患此症急忙無處延醫即遇醫又防藥不措手故此藥不可一日不備寧可千日不用此藥靈驗非常以下各藥只牙皂青果烏梅三味可見火余宜曬乾研細末瓷瓶貯存黃臘封固待用切勿泄氣牙皂又名皂莢薄荷五錢桔梗二錢硼砂二錢鵝不食草二錢山豆根三錢青魚膽一錢自備兒茶一錢黃柏一錢僵蟲二錢云連一錢元明粉一錢上好冰片五分真麝子五分牙硝五分血竭五分槐米五分牙皂五分真熊膽五分土茯苓五分川烏梅三個燒脆明雄五分水飛硃砂五分水飛青黛五分青果二個不拘鮮鹼焙枯存性大粉草一分九龍膽一錢即何首烏內之本心是也專治咽喉腫痛月石一錢大生地二兩搗爛和藥為丸桂元核大入口任其自化又方薄荷三分甘草三分梅花冰片一分西瓜霜一分研極細吹之又喉鵝方斷燈草數莖纏指甲就火熏灼俟黃燥將二物研細更用火逼壁蝨即臭蟲十個一併搗入為末以銀管向所患處吹之泡潰吐膿血即愈又喉間方覺脹滿起泡者急以食鹽用搓手掌心鹽干復易新鹽搓之數刻即消甚效治爛喉痧症極效方土牛漆即臭花娘根秋間取之勿論多少水洗去泥打自然汁瓦盆曬熱將汁超入一調羹攪勻曬瓦盆宜多其汁不能過夜一日曬乾刮粉研細末入瓷瓶用時入冰片少許吹喉吐出稠涎即愈
