body:
  text: 卷二肩部擔肩癰癤此為擔夫有之五倍子燒存性為細末加黃丹用水飛過醋調敷之甚效又方照癰毒各方治之肩甲縫中積痛查中風筋骨各方治之手部蛇頭惡毒生各指頭又足趾頭生者亦是此症初起痛甚急用頭髮扎住指根取癩蝦蟆一個目赤腹無八字紋者忌用破去腸雜不可破膽膽汁黏指更痛將瘡頭套住用繩扎好並將蝦蟆心肝焙枯研末沖酒服以免毒氣攻心約一對時破口出膿而愈套住之後瘡頭猶如針刺痛更難忍甚至心中難過遍身發熱或嘔吐噁心不必驚慌急服護心散見癰毒諸方或服麻油一盞菜子油亦可心自安定蝦蟆能拔極重惡毒切不可輕易揭去忍耐片時自然破口出膿而愈倘誤將蝦蟆揭去別藥難醫為害不小去膿後如發昏暈亦不必驚慌用高麗參三四錢以砂罐煮濃汁服之自然無事參不宜蒸一時蒸不出汁其色只如淡茶煎則其色濃厚易見功效無力者用好黨參一二兩煎服亦可愈後若再腫痛此毒氣未盡之故再用蝦蟆套上少頃膿盡即不再發此瘡最為陰惡此方極屬神效不可輕視又方鳳仙花下半截連根用不用水洗和甜酒糟搗融敷有人指頭生瘡腫大如李痛不可忍用此敷之半日腫消痛止較蝦蟆方尤為神速又方用瓷片將瘡刺破查照疔瘡方內蜘蛛拔毒治之見癰毒諸疾疔瘡門止痛消腫最為神效又方蜈蚣焙枯為末豬膽調搽神效又方雞蛋一個穿一小孔入信石一分套指頭上熱則再換立刻止痛如神真仙方也較前各方功效更大又方雄黃枯礬各等分研末用麻油或醋敷亦極效驗又方白蘿蔔挖孔入雄黃三分蒸半熟套指上或用真烏梅仁嚼爛敷之均極效驗又方如色白者照後脫骨疽陽和湯各方治之脫骨疸此症生手足各指或云只生手足第四指者是或生指頭或生指節指縫初生或白色痛極或如粟米起一黃泡其皮或如煮熟紅棗黑色不退久則潰爛節節脫落延至手足背腐爛黑陷痛不可忍古方有截去指頭一法斷不可用宜用頂大甘草研極細末用香麻油調敷要敷極厚一日一換不可間斷忌食發物不出十日必愈真神方也再用金銀花元參各三錢當歸二兩甘草一兩水煎服一連十劑永無後患藥味不可減少減則不效並忌抓擦為要又方大人用陽和湯小兒用小金湯重則用犀黃丸均見癰疽諸方色紅者照上蛇頭惡毒方治之此林屋山人百發百中之方也又方甘草嚼融厚敷干則隨換日夜不斷數日必愈神效甲疽又名嵌甲凡指甲邊生一赤肉突出時常舉發者甲疽也用狼毒一兩黃耆二兩醋浸一宿入豬油五兩微火上煎取二兩絞去渣退火氣敷之日換三次神效此林屋山人方也又方乳香膽礬研細時時敷之此病須剔去甲不藥亦愈若已成瘡久不愈者此方甚效又方皂礬五錢火煅候冷研末先以鹽湯洗瘡拭乾以礬末敷之舊綢裹定一日一換神效或用枯礬亦可惟敷之微覺疼痛又方陳皮濃煎湯浸良久甲肉自相離開輕手剪去肉中爪甲外用蛇蛻燒灰雄黃一錢為末乾摻或香油調敷又方輕粉乳香沒藥各一錢黃丹二錢赤石脂五錢寒水石三錢煨共為末濕則乾摻干則油調最妙又方甘草嚼融厚敷干則隨換數日全愈神效又方見頭部頭角太陽生瘡方灌甲初起用瓷鋒於甲上刨去一層並用枯礬末敷之其效如神油灰指甲每日取鳳仙花又名指甲花連根蒂葉搗敷指甲上用布包好一日一換月餘乃愈此林屋山人方也指頭麻木痛癢取蚰蜒查藥物備要便知和銀硃共搗擦之若遲延不治必生蛇頭蛙節等疔痛苦難受初起多擦幾遍決不生矣指頭畏冷天氣不寒指尖作冷名曰螺瘡用醋和鹽調勻將指頭泡入自愈手足指頭羅紋生瘡生橄欖核有鹽者煮去鹽味用切兩段醋磨雞毛蘸搽二十日後漸消指節生瘡名曰蛀節生黃豆嚼融敷須先漱口再嚼即愈指甲下生瘡名曰蛀甲治與上蛀節同十指節斷壞惟有筋連蟲出長數尺遍身緑毛此名血餘症用赤茯苓白茯苓胡黃連各錢半煎服虎口並各手指縫生瘡或腫或爛痛不可忍若不早治即爛全手大指二指間為虎口又名叉指生蒲公英槌融敷之數日即愈又方生黃豆嚼融敷將口漱淨再嚼甚效又方通草為末用雞蛋清調敷其腫即消又方白芨三錢研末蟾酥一錢共和雞蛋清搽神效又方白芷滑石黃丹各等分研極細末敷之神效手丫枝痛不可忍通草研末雞蛋白調敷即愈手指縫觸著紙角衣角痛癢破爛雖癢極難受斷斷不可抓擦務必忍住並忌沾水數日自好倘一經抓擦則綿纏難愈用白芷黃丹滑石各等分研極細末敷之神效或用玉真散見跌打損傷門敷之亦極效手指斷落方見卷十三跌打損傷門手被咬傷方見卷十三人畜蛇蟲咬傷門手指及掌生黃白膿疱痛癢無時纏綿不已內必有蟲豬肝切片和桃葉捶融敷之神效或用白油膏見腿部貼之更妙手指手掌皮厚如鐵苦參酒煎服外用苦參末酒敷極效如神掌中紅絲斷之血流不止用燈火燒之自能漸收平愈手足心中忽然腫起或痛或不痛或爛或不爛此名穿掌又曰擎疽又曰托盤用生附子切片貼之或用生附子煎水泡之更妙數日後不痛者必然作痛作癢切不可用手抓仍用附子水泡之或附子切片加輕粉一分貼之必愈又方白鹽花椒末等分醋和敷之未破者極效已破者勿用又方溏雞糞敷之或用鮮桑葉搗敷均極效如腫而不紅又不甚痛者照卷十一陰疽各方治之為要鵝掌風生手掌上紫白斑點疊起白皮堅硬幹燥甚則迭迭脫皮血肉外露或癢或痛久則成癬難愈用一大碗以紙緊糊碗口紙上用針刺破多孔上鋪細米粳二三寸厚手鉗燃炭放粳上緩緩燒之燒至離紙三分光景將炭與粳一併棄去不可將紙燒穿取碗中粳油時時擦之數日斷根屢試神效有人患此筋肉現露十餘年不愈照此醫痊永不復發又方真小磨麻油一兩紅砒一錢敲細入油煎至砒枯煙盡為度去砒留油冷透火氣用火烘油擦三五次十日即愈血寒者最宜此林屋山人極驗方也又方鉛彈子二個如核桃大每日在手內搓弄搓熱將鉛彈子握緊晝夜不歇如此十餘日即愈愈後再搓一二月則不復發手腕生物如豆紅紫疼痛治法見卷十一癰毒門葡萄瘡內手臂生瘡腫大如拳以小刀略破其皮或用癰毒門代刀散敷之即破真硼砂上冰片各一分輕粉五釐為末摻之即化為水而愈矣熱毒攻手腫痛欲脫豬油和羊糞塗之或水煮馬糞洗之四肢節脫但有皮連不能舉動名曰筋解漏蘆酒浸一夜焙乾研末每服二錢酒調下頗效手足作痛手足痛人以為脾經之熱不知非脾也乃肝木之鬱結也散其鬱氣則手足之痛自去用逍遙散見內外備用諸方加梔子三錢製半夏白芥子各二錢水煎服二劑其痛若失蓋肝木作祟則脾不敢當其鋒氣散於四肢結而不伸所以作痛今一旦平其肝氣而脾氣自舒脾舒而痛在手足有不盡除者乎手足生瘡久不收口取大路口多人撒尿木板爛成白色者以炭火煅化研細末加冰片少許摻之即愈或照癰毒門瘡不收口諸方治之小兒手軟薏苡仁當歸秦艽酸棗仁防風羌活各五錢共為末蜜丸芡實大荊芥湯化下腋部肩下即是腋下腫硬形如雞蛋色紅者照癰毒各方治之皮色不變者照陰疽各方治之腋下疙瘩如豆如米或麻或痛恐是疔瘡查疔瘡門辨別治之腋下癭瘤治法見癭瘤門腋下狐臭用蒸餅一個劈作兩片放密陀僧細末一二錢急夾在腋下略睡片時候冷棄去如系一腋狐臭只用一片夾之有人患此二十餘年照治斷根屢試不爽又方頂大蜘蛛一個或用小蜘蛛二個亦可黃泥包好火內燒紅取出候冷去泥加輕粉一錢共研末日搽數次輕者二日即愈重則三四日必斷根較前方尤簡便神驗百發百中又方密陀僧潮腦各四兩枯白礬二兩輕粉三錢上為細末頻擦兩腋擦至半月見效不可間斷半年全愈又方麝香一分膽礬二分水粉三分取田螺二個將靨起開以各藥入螺中過一夜螺肉即化為水將水擦腋下其臭從大便出宜埋土內恐人聞則頭眩暈也此方極效不可輕視乳部乳頭破裂胭脂和蛤粉用水調敷又方雞矢白炒研每服一錢酒送下三服即愈乳頭濕瘡男女乳上濕瘡膿血淋漓成片痛癢不休此名火革瘡用蜂殼五錢煅輕粉五分冰片一分共研末用銀花煎湯調搽二三次結痂收功或照癰毒門濕瘡黃水瘡各方治之乳頭生瘡痛不可忍生鹿角三分生甘草一分共研末用雞蛋黃一個入藥攪勻置銅器中炙溫敷之日二次即愈神驗非常乳癰紅腫疼痛者是男女皆有此症炒白芷制乳香制沒藥製法見藥物備要門浙貝歸身各等分研末每服五錢酒送一服全消如已潰爛用醒消丸酒送一服以止其痛外貼洞天膏自愈如色白者照流注治法倘潰爛不堪者以洞天救苦丹按法與服七日後接服大棗丸收功此林屋山人祕法也醒消諸方見癰毒門又方生蒲公英搗爛沖酒服渣敷乳上略睡片時數次即愈此為乳癰聖藥屢著神奇不可輕視又方豆腐店桌上做豆腐淋下之水一桶入鍋熬幹成膏冷透火氣厚厚敷之干即再敷乳上結塊自消五七次必愈屢試神驗有人借貸五百金無力歸還以此方神效奉贈後試之果驗人稱之五百金方此方雖治乳癰既稱乳上結塊自消則乳岩似亦可治又方並治乳吹蔥連根搗爛敷上用瓦罐盛炭火蓋蔥上一時蒸熱出汗即愈穩而神效乳癰多至二三百頭者柳樹根刮去皮搗爛蒸熱布包尉之冷則隨換過一宿即愈此孫真人千金方也乳癰腫及頭面照卷十五瘟疫門大頭瘟蚯蚓方治之其效如神乳癰日久腫痛不愈蝦醬用好醋蒸熱敷之諸藥不效者治之奇效乳癰久不收口用茅屋上陳年舊茅草剪尾一束研末加頂上梅花冰片少許敷患處愈乳岩男女皆有此症此症乳內生一小粒初如豆大漸大如塊如棗如圍棋子不癢不通至一年後或二三年漸漸腫痛臭爛孔深亦有初起色白堅硬一塊作痛此係陰疽最為險惡因哀哭憂愁患難驚恐所致急宜早治遲則難愈初生用犀黃丸每服三錢酒送十服全愈或以陽和湯加土貝五錢煎服數日可消倘誤貼膏藥必漸腫大內作一抽之痛已覺遲治倘皮色變異難以挽回勉以陽和湯日服或以犀黃丸日服或二藥每日早晚輪服服至自破而痛者外用大蟾即癩蝦蟆六隻每日早晚取一隻破腹刺多孔連腸雜去膽貼於患口以拔其毒一日一換連貼數日若爛孔深大須將蟾腹腸雜填孔每日用蔥湯溫洗一次內服千金托裡散三日後接服犀黃丸可救十中三四乳岩最不易治此方極為穩妥古來名方皆不及此若破後不痛而癢極者無一毫挽回大忌開刀開則翻花最慘萬無一活一婦兩乳皆患乳岩兩載如桂圓大從未醫治因子死悲哭形大如杯以五通犀黃丸每日早晚輪服九日全消又一男子亦患乳岩因用鯽魚膏貼上二日發大如拳色紅令其揭下與服陽和湯四劑倘色轉白可救色若仍紅無救矣四日患色仍紅哀懇求治以犀黃丸陽和湯輪服至十六日四處皆消獨瘡頭破爛用蟾拔毒之法半月收功又一婦患乳岩寒熱痛甚余以陽和湯同二陳湯煎服止痛安睡連進三服全愈又一婦患亦相同其弟以夏枯花粉連翹橘葉等藥連服五劑號痛不絶余視白色已變微紅難以全消即用肉桂炮薑麻黃加二陳湯煎服服下痛止瘡亦縮小連服數劑瘡頂不痛而破貼陽和解凝膏收功此林屋山人治驗祕法也犀黃丸諸方見陰疽門又方已潰爛者用洞天救苦丹見癰毒諸方每服三錢陳酒送下隔兩日一服數日膿盡收功神效或用陽和解凝膏貼之或用蝦蟆散見同前或照上蝦蟆拔毒之法俱極神效又方如初起者用夏枯草蒲公英漏蘆橘葉雄鼠糞兩頭尖者是甘菊貝母紫花地丁山慈菰連翹白芷栝蔞仁炙草廣皮茜根乳香沒藥銀花各二錢研末另用夏枯草熬膏和勻為丸如梧子大每服五錢滾水送下至重二服全消屢試神驗此王晉三經驗方也價廉易制貧寒之家最宜男子乳忽壅腫如婦人乳金銀花蒲公英各一兩花粉白芥子各五錢製附子木通各一錢柴胡二錢白芍通草梔子茯苓各三錢水煎服婦人乳忽縮入急用兩手緊緊抓住取公雞一隻約重十兩內外連毛破開去腸雜加填麝香一錢入雞腹內覆肚臍上即愈婦人産後兩乳伸長細小如腸垂過小腹痛不可忍川芎當歸各四兩瓦器煎水時時服之另用川芎當歸各一斤切大塊於爐內慢火燒煙安病人面前桌下務使煙氣不絶令伏桌上將兩鼻及兩乳常吸煙氣如藥盡未痊仍如前法煎服燒熏必安如藥已用過二料兩乳雖縮上而不復舊用冷水磨萆麻子一粒塗頭頂心俟乳縮即時洗去婦人乳吹時時吹氣有聲硃砂筆寫子醜寅卯辰巳午未申酉戌亥等字於本婦所戴簪上本命所屬之字不寫戴之即愈於初起時用之最妙又方照上乳癰蔥蒸法治之婦人乳孔塞痛參看婦人科産後擠乳頭方用核桃肉數顆擂碎滾酒沖服即愈婦人乳汁不通貝母知母牡蠣粉各等分為末用豬蹄湯調服二錢即通此祕方也又方鮮蝦一斤去皮須足用肉不拘多少淨瓷器內搗爛陳酒熱服儘量飲之少時有乳再用豬蹄湯飲之日飲幾次乳如湧泉效驗如神但蝦只服一次豬蹄湯可以長服又方內服前藥外用木梳梳乳周四百餘遍即通乳汁自流不止此虛極也宜服十全大補湯見內外備用諸方或請名醫調理乳多發脹紅花歸尾赤芍牛膝各一錢煎服即愈無子食乳腫痛難消麥芽一兩炒川芎一錢當歸白芍各三錢生地二錢煎服即消又方麥芽一兩炒煎水當茶服即止又方用本夫穿過包腳布敷乳過夜腫消痛止而愈或本婦現穿之鞋包乳上過夜亦消乳起結核乳起結核久之防成乳岩初起並不疼痛最惡之症每日用山慈菰一錢胡桃肉三枚共搗酒送服以散為度否則變患莫測胸部與心脾各部參看胸膈閉結不通按之極痛或通而復結氣喘煩躁狂亂而熱極者取生蚯蚓又名曲蟺四條洗淨研如泥入生薑汁薄荷汁各一茶挑蜂蜜半酒杯井水調服若熱甚者加真梅花冰片一二分服再揉心下片時汗出而愈神效如因寒熱痰痞水食結胸者照卷十四傷寒門蔥薑尉法最妙如因飲食積滯結胸者查卷四飲食積滯門外治法治之若痰氣結胸查後痰疾各方治之胸滿腹脹此脾土衰弱肝木氣旺木來剋土故也甚至身面黃腫亦有不黃腫者用蒼朮二斤淘米水泡一日兩夜燒存性甜酒麴四兩燒存性皂礬一斤醋泡曬乾入瓶內煅存性加平胃散共為末醋為丸如梧子大每服三四十丸酒下米湯亦可日服兩次神效此仙方也胸前生瘡有人胸生一孔咳嗽則與此孔相應隨有膿血流出此肺痿也用黨參生黃耆當歸金銀花各三錢生甘草連翹各錢半官桂一錢煎服數次自愈胸旁生瘡凡大人小兒胸間兩旁各生紅白瘰泡濕爛痛癢每處直長一條連生十餘個不等名曰簾珠倒挂久則難治諸藥不效用端午日人家簷口所挂菖蒲連根葉切碎瓦上焙枯研末香油調搽五六次即愈屢試屢效龜胸龜尿時時擦之久久自平龜尿難得以鏡對龜照之尿自出也肋部肋下生瘡久則有聲如嬰兒啼哭此名淵疽症百藥難效惟用隔蒜灸法見癰毒通治門在兩小腿陽陵泉穴穴在膝下外邊一寸以腿縮攏有一窩即是各燒七下或十四下即愈如不見效色紅者照癰毒方治皮色不變者照明疽方治
