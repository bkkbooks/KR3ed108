body:
  text: 卷三心部與胸及脾胃各部參看心氣疼痛方見後各種氣痛門心痛喉腫閉目不語方見咽喉門心氣怔忡龍眼核一斤即桂元核去黑皮長流水煮極爛加大黑棗一斤去核搗爛如泥為丸每晨淡鹽湯下三錢即愈又方焦白朮時時煎服極效有人心忡百藥不效後一名醫云是脾虛常服白朮自愈試之果驗白朮多食橫中滯氣惟用荷葉包裹久蒸或用蜜炙則可服也又方豶豬心閹割者為豶豬蒸熟切片蘸真硃砂少許飯後食之三五次即愈硃砂不可多服又方白蓮肉去皮心煮食久之自愈心胸煩滿一人心胸煩滿兩年不愈後服雄黃五錢並飲清油半碗吐出一蟲而愈水停心中有聲如雷口眼歪斜不省人事膽礬一分為末溫甜酒送下以吐盡痰為度又一婦人心胸脹悶口流涎沫自言心中有聲如雷亦服此藥吐出一蟲斷之乃一發也又一人患此服膽礬不效後服雄黃五錢清油半碗吐出一蟲而愈心膈飽脹腹中又飢又痛胡椒七粒研末好酒沖服即愈心中嘈雜似辣非辣似餓非餓似痛非痛得食暫止或兼噯氣或兼噁心乃火動其痰也焦術四兩川連五錢炒橘紅一兩共為末神麯煮汁為丸如緑豆大每服五十丸食遠服薑湯下立效又方豬護心油蒸糯米食之即愈一切寒熱痰痞水食結住心胸見傷寒門蔥姜尉法心下堅大如碗邊如旋盤此名氣分乃飲水所結也用白朮四錢枳實二錢煎服心疼忽長肉一條手不可近此腎火也真硼砂真梅花冰片各一分點之立化為水內服六味地黃丸二料全愈並用吳萸研末醋調敷兩足心過一晝夜一換敷至數日為止心口生瘡此名井泉疽又名慢心鋭毒初起若心口內有塊漸大心口發高毒陷即死醫皆縮手諸書亦無藥治之法惟余家祕集載以本人兩手十指以線量其長短共有若干積於一線放喉管正中處雙環至背脊之中看兩線合攏盡頭處為中穴又以本人中指之中一節用竹片量准作一寸放在中穴之左右各遠一寸各以墨記分立三穴如形樣每穴用艾三團一齊火灸灸畢全愈此林屋山人祕方也心窩成漏一人胸口一片如碗大無皮潰爛成漏膿血時流經久不愈用荸薺磨成粉摻之數日即愈神效非常肺部肺癰又名肺疽與咳嗽門參看諸患易識獨肺中患毒難知有人祕傳兩腳骨疼痛者或腳骨不痛而舌下生如細豆一粒者再心口之上內微痛或兩脅微痛及咳嗽口渴喉干此皆肺中生毒之證也即用甘草桔梗各三錢煎服服下如覺稍安肺之患毒無疑矣以犀黃丸見陰疽門服至一料全愈此是預識預治百無一死世人但知腳痛醫腳咳嗽醫嗽舌下一粒便以刀刺且此一粒癰未成膿定然色淡癰愈亦消重則其色紫黑如用刀刺立害諸書皆云口吐臭痰胸中發腥作痛者肺癰也又稱症有三不治時吐臭痰久如黏米飯者不治嘔膿不止者不治白麵變赤者不治惟嘔而膿自出者易治治之之藥惟地黃保生歸脾等湯輪服而已並無預知早治之法直至吐臭痰發腥始知肺癰猶小舟飄入大洋也此等立論安可為後學津梁余每見此症吐膿膿色皆白用犀黃丸治無不效貧寒不能治藥者用陳年醃芥菜滷每早取半杯用豆腐漿沖服服後胸中一塊塞上塞下塞至數次吐出惡膿數日膿儘自愈神效凡患此症者終身戒食鴨蛋白鯗紅蘿蔔石首魚著甲魚食則復發難治此林屋山人祕法也又肺癰腸癰皆吐臭痰用棉花捲竹片上蘸油點火使本人觀之若肺癰看火頭是二個腸癰火頭只一個又方薏苡仁各炒為末糯米湯調服或煮粥或水服當下膿血而安又方竹葉絞汁一盞服之吐出膿血自愈又方元參半斤天冬四兩桔梗二兩炙草一兩水十碗煎至兩碗另加蒲公英金銀花各五錢再煎至一碗食後即服初起即消日久即愈極效無比又方生耆炒白芨銀花桔梗各一錢苡仁五錢貝母一錢六分陳皮甘草節各一錢二分甜葶藶炒八分生薑一片水二鍾煎半食後徐徐服初起者去黃耆加防風一錢久不愈者加槿樹皮一錢未成即消已成即潰已潰即愈其效如神各種氣痛心胃氣痛真沉香木香公丁香乳香沒藥靈脂元胡以上各一錢真麝香一分共研為末收入瓷瓶以蠟封口不可泄氣每服七分開水下此方專治男女心胃各種氣痛有氣痛滴水入口即吐者有痛極難忍抓破衣物者服之即愈神效非常百無一失如不見效即是蟲痛照後蟲積各方治之香郁散此方得自仙傳凡各項心胃氣痛服之止痛如神有人照此方送藥數十年無不應手奏效青皮橘子一百個香附一斤鬱金四兩先將橘子鋪大蒸籠內蒂眼朝上用新布墊底再將香郁二味研末摻入於挨晚時蓋好蒸極透熟每橘蒂眼上放生薑一薄片姜上加艾絨一小團將艾燒燃燒過另換姜艾連燒三次曬過一天次晚再蒸接連蒸曬九次每蒸一次照前法連燒三次無日曬即風吹亦可制好用瓷瓶收貯每服連橘帶藥共一錢用水煎一服可煎兩三次宜於冬天配製以免黴壞銀黃散專治心胃寒痛年久者三次斷根並治寒痧及肚腹寒痛屢試如神百發百中銀硝半斤黃丹飛淨二兩用大銀窩銀店傾銀之窩放炭火上火要大又不可太猛將銀硝放窩內用銅筷不住手順攪不可逆一下再將黃丹分作數次加入銀硝即化為水攪至半個時辰硝丹合為一色傾入冷水內俟冷定取出研細瓷瓶收貯埋地下一月拔去火毒每用五分體弱者用三分滾燒酒沖服如不知氣痛是寒是熱先服胡椒末其痛略緩者是寒然後再服此方必對症也姜附散良薑酒炒香附醋炒共為末米湯為丸每服三四錢食遠服凡心胃一切氣痛立止如神因寒而痛者良薑加倍用因氣而痛者香附加倍用有人心胃疼痛十數年不愈服此除根又方失笑散五靈脂三錢蒲黃二錢各炒研末好醋煮透加水連渣服凡男婦老少心腹胸肋瘀血作痛小腹疝氣腳氣及胎前産後血崩血暈一切氣痛屢用皆效真神方也又方專治肝氣夏枯草一兩煎水體虛者加瘦豬肉四兩同煮當茶飲服過三四兩斷根此藥能舒肝氣養肝血止肝風故能奏效如神屢試屢驗而本草不言其能治肝病何哉又凡肝病最忌食雞終身忌食椿芽為要又方草果元胡索五靈脂沒藥各五錢為末每服三錢酒調下各種氣痛其效如神歌曰草果元胡索五靈脂沒藥酒調服三錢一似手拈卻又方良薑川朴薑汁炒五靈脂各等分研末每服一錢滾醋調下即止神效又方丹參一兩檀香砂仁各一錢水煎服即愈婦人更效又方元胡索末三錢酒下極效有人因食蕎麵滯氣心胸痛不可忍大便不通百藥入口即吐後服此藥而愈又一老人下痢腹痛將死棺木已備亦服此藥而愈凡氣痛諸藥不效者服此方必效又方生地黃搗爛取汁冷服甚效有人心胃疼痛百藥不效後用此方吐出一蟲而愈又一人服此瀉下一蟲斷根又方醋泡過二三年大蒜頭食數個立刻止痛或用生蒜頭煮食亦可又方凡氣痛急切無藥以食鹽一撮放刀口上炭火燒紅淬入水中乘熱飲之即愈愈後戒食腳魚又方照鼻部治鼻血第一方燒少商穴法即愈腎氣上衝心痛方見前陰門走注氣痛忽有一處如打撲之狀痛不可忍走注不定靜時其處冷如霜雪此因暴寒所傷用楊柳白皮酒煮布包乘熱尉之有赤點處刺出血更妙凡諸急痛尉之皆止心胃蟲疾作痛或滴水入口即吐或口渴飲水不止或吐清水者皆是用蔥白汁一杯飲下隨飲真小磨麻油一杯少頃即愈蟲當化水除根雖痛至牙閉欲死者亦效又方真川椒真烏梅生薑煎湯服即愈又方病發時用艾葉十張揉碎在銅器內炒乾不住手用箸撥動將鹽滷要豆腐店內不曾加水者半小酒杯傾入候焙乾倒出研末用熱燒酒一杯送下俟腹內作響或降氣或吐出清水即愈此藥須現制現服隔夜即不效服後戒茶與葷腥三日愈後每逢初一十六日用淡鹽湯吃一服永不再發其效如神又方白鱔又名鰻魚淡煮飽食三五次即愈此魚最能殺蟲故也酒食凝滯攻衝作痛或有形或無形鄉人稱為穿心箭痛方書無所稽考法宜宣通血絡用川楝子去核酒炒錢半元胡索五靈脂桃仁去皮尖研蒲黃各一錢水煎服其效如神此葉天士先生方也咳嗽應與前肺癰及後吐血各門參看胸膈脹滿咳嗽不安並治各項咳嗽外治法用宮粉香油入鐵器內熬數滾離火用頭髮一團蘸粉擦胸膈數次即愈又方蕎麵雞蛋清和成團擦之亦效或用哮吼第一方亦可咳嗽痰喘照後哮吼第一方治之其效如神或照前方亦可又方用真蚌殼粉長者為蚌圓者為蛤須自取蚌殼研粉若用蛤粉則不效新瓦炒紅入真青黛少許用淡醃菜水滴麻油數點調服二錢神效有婦人痰喘咳嗽終夜不寐面浮如盤一服即愈又方用多年陳白蜆殼又名蛤蜊殼燒過存性研極細末米湯服一錢一日三服神效又方皂角三片肥皂更好蟲蛀者忌用去皮子弦一片入麻油炒過巴豆十粒一片入薑汁製過杏仁去皮尖十粒一片入蜜制過小半夏十粒俱用火炙黃色共研末每用五釐安手心臨臥以薑湯送服神效之至又方雪梨四兩生薑一兩共搗汁去渣加蜜四兩共煎數沸入瓷器內封固不拘時服一劑即愈無病亦可服最能滋陰降火忌食蘿蔔又方藕汁梨汁白果汁各二兩銅鍋內熬成膏隨意服之又方元參生甘草麥冬各一兩金銀花八兩當歸二兩水煎服神效或加白芍三錢亦可兼治肺癰咳嗽氣喘生山藥半碗搗爛甘蔗汁半碗和勻燉微熱服立止咳嗽氣喘遇寒即發乾薑泡皂角泡去皮子弦蟲蛀者忌用肉桂紫色者去皮各等分共搗篩白蜜和勻杵三千下為丸如梧子大每服三丸開水下嗽發即服日服數次忌蔥面油膩其效如神諸般咳嗽桔梗炒荊芥炒紫菀飯上蒸一次再炒百部飯上蒸一次再炒白前飯上蒸一次再炒以上各八兩共磨細末每服三錢臨時開水調服如初感風寒者生薑湯調下豫制此藥普送服者多效或問藥極細微而取效甚廣何也豫曰藥不貴險峻惟期中病而已此方系吾苦心揣摩而出之蓋肺屬金畏火者也遇熱則咳金性剛燥惡冷者也遇寒則咳且肺為嬌臟攻擊之劑即不任受而外主皮毛最易受邪不行表散則邪氣留連而不解經云微寒微咳寒之感也若小寇然啓門逐之即愈矣醫者不審妄用清涼酸澀之劑未免閉門留寇矣寇欲出而無門必致穿窬而走則咳而見紅肺有二竅一在鼻一在喉鼻竅貴開而不閉喉竅貴閉而不開今鼻竅不開喉竅將啓能無慮乎此方溫潤和平不寒不熱既無攻擊過當之虞大有啓門驅賊之勢是以客邪易散肺氣安恬宜其投之有效也又方枇杷膏見後勞傷吐血門最為神效又方款冬花川貝母知母各一錢煎數滾用冰糖向燈火上溶化滴入藥內服之屢試神效並治咽喉發乾又方細茶葉加紅沙糖拌炒乾冷透每服三四點神效肺虛咳嗽凡肺虛胸熱咳嗽氣急煩悶咽喉燥渴欲飲冷水體倦肌瘦發熱減食喉嚨音嘶不出用黃蠟溶瀝極淨用酸漿水者過八兩入銅器內化溶作一百二十丸蛤粉四兩為衣養藥每服一丸核桃半個細嚼溫水下靜臥閉口不語日服二丸漸漸平愈忌食雞半年造酸漿水法用清水入飯少許浸四五日即酸或用隔一二日米泔水代之亦可肺痿咳嗽凡感受風寒停留肺中或勞力內傷以致咳嗽聲重胸膈隱痛頸項強硬不能轉側此肺癰也久則鼻流清涕咳吐膿痰黃色腥穢重則胸脅脹滿呼吸不及飲食減少脈洪自汗漸至咳吐痰血寒熱往來形體消瘦聲啞喉癰轉為肺痿此危症也用大栝蔞一個開一孔內有子多少粒用杏仁去皮尖照數配入封好外用黃泥包裹燒紅燒至無煙取出用物蓋住候冷去泥又用川貝母照栝蔞子粒數配入共研細末臨臥時每用二錢白蜜調勻燈心煎水送下咳嗽痰血涎唾中有少血散漫者此腎經相火炎上之血也若血如紅縷從痰中咳出者此脈絡受熱傷之血也若咳出白血淺紅色似肉似肺者必死又咯出痰中有血絲屬腎經咳嗽有血屬肺經嘔吐成盆成碗者屬胃經自兩脅逆上吐出屬肝經溺血屬小腸經下血屬大腸經牙宣出血屬胃腎虛火真青黛栝蔞仁去油海石炒黑山梔炒黑訶子肉各等分蜜為丸噙化嗽甚加杏仁又方款冬花百合蒸焙等分為末蜜丸龍眼大每臥時嚼一丸薑湯下又方大柿餅一個去子入真青黛一錢綿扎緊飯上蒸熟臨睡時食薄荷湯下極效獨聖散治多年咳嗽肺萎咯血紅痰用白芨三兩為末每服二錢臨臥糯米湯下台州獄吏憫一重囚囚感之云吾七犯死罪遭刑拷肺皆傷損得一方用白芨末米飲調服其效如神後日凌遲剖其胸見肺間竅穴數十皆白及填補色猶未變也寒咳核桃連皮搗爛加冰糖少許開水衝入蒸服數次極效或照後蘇兜飲麻黃丸均妙熱咳真柿餅煎水服或用扁柏葉煮豆腐食極效又方叭嗒杏仁一兩雙仁者不用泡去皮尖用新擂鉢新研槌將杏仁搗爛如泥分為三服每服內加冰糖三錢共入蓋碗用滾水衝入蓋片刻俟溫連仁末服下早晚各一次數服而愈秋燥熱咳更妙若用杏仁煎服則不效咳嗽嗆逆落枕即發此受寒也照後麻黃二方服之最妙年久咳嗽扁柏葉陰乾加紅棗七枚煎濃湯代茶時時飲之忌食葷腥煎炒另用百合四兩冰糖四錢早晚蒸服不可間斷輕則十日可愈重則半月自痊有老人咳嗽三十餘年服此月餘脫然除根靈驗無比切勿輕視又方蘇兜飲紫蘇兜七個煎濃汁早晚沖雞蛋服雖數十年咳嗽無不神效又方麻黃一錢熬濃汁一碗去渣加冰糖二兩熬至滴水成珠為丸如蓮子大每服二三丸日服數次服完即愈咳嗽嗆逆不能落枕者更效又方治咳嗽嗆逆淨麻黃紅棗皮南薄荷各五分上邊桂紫蘇葉桑白皮杏仁去皮尖大腹皮各四分炙草六分水煎服放膽用之百發百中又方雄黃一錢研細黃紙三張用雞蛋白將雄黃調勻搽黃紙上曬乾捲成紅管插入筆管或煙筒內燒燃吸之如吃煙樣少頃嘔吐嗽止一日一次忌食諸物七日惟食白粥此孫真人千金方也神效非常不可輕視如嫌氣味難受食白煮豬肉即解又方小豬肺一副不見水去心不用將香油約一茶杯灌入肺管內以線扎管頭入砂罐內加水先夜燉熟早晨空心吃肺不用鹽送先將浮油去淨其湯隨吃幾口余湯泡飯連吃兩肺全愈屢試如神又方陳海蜇皮漂盡鹽冰糖拌蒸食陰虛久嗽者極效又方生地沙參各二兩川貝母去心牡丹皮各一兩五錢元參黃芩桔梗知母百合百部款冬花天門冬去心廣皮枳殼各一兩甘草八分用水煎汁去渣再熬成膏每早空心滾水調服甚效又方大雪梨四個老薑四兩同搗取汁蜂蜜四兩黑豆一升炒研末乘熱和勻七蒸七曬不拘時服又方酸醋和水煮鯉魚不用鹽送飯食又方豬板油蒸南棗去棗皮惟食棗肉早晚吃三五個數日而愈久嗽連至四五十聲者生薑汁半杯白蜜二匙同放茶碗內滾水沖溫服三四次而愈或用前紫蘇沖蛋方最效年老久嗽不能臥豬板油糯米糖蜂蜜各四兩共熬成膏時常挑服一匙口中噙化三五日即止又方核桃肉不去皮生薑各一兩研膏蜜為丸三錢一顆每臥時嚼一丸薑湯下氣促難臥服此立定又方潞黨一錢陳皮桔梗紫蘇各錢半五味子十五粒水煎食遠服咳嗽聲啞訶子皮五倍子五味子黃芩甘草各等分為末蜜丸櫻桃大每一丸噙化咽下又方訶子皮三錢半生半炒甘草二錢半生半炒木通三錢水煎去滓入生地黃汁一小杯臨臥咽下又方杏仁去皮尖並去油搗融兌開水取汁燉熱服切忌煎熬又方白果仁四兩真白厚茯苓取整個切用藥店中切成片者皆米粉假造斷不可用桑白皮各二兩黑豆半升白蜜半斤煮熟曬乾為末以人乳半杯拌濕九蒸九曬為丸如緑豆大每服三五十丸開水下神效又方青蒿一錢童便煮服極效小兒晝夜咳嗽食少發黃此脾虛也用真山藥一味煮熟加糖調服神效之至勞傷吐血癆病火動陽物易舉方見前陰門凡勞傷吐血咳嗽等症忌食春芽食則病發難愈勞症諸方枇杷膏專治勞傷虛損吐血咳嗽發燒身體瘦弱四肢痠軟精血疲倦腰背疼痛飲食不進以及一切不足弱症服之屢效咳嗽尤應驗如神輕者二三料痊愈重者四五料除根貧富可用不必另服別藥免致誤用害事即無病常服可保身強神旺此方得自仙授藥極平易功最神奇見者廣傳功德無量枇杷葉五十六片新鮮者更佳洗淨毛大梨二個深臍者佳皮心切片用白蜜半鍾先熬滴水成珠大便乾燥者多加大便溏泄者不用以白糖代之大棗半斤或黑棗微棗亦可建蓮肉四兩不去皮先將枇杷葉放銅鍋內砂鍋亦可以河水煎出濃湯用綢瀝清汁去葉與渣不用後將梨棗蓮蜜和入煎熬以蓮肉融爛為止用瓷瓶收貯隨意溫熱食之凡虛病服藥多則脾胃受傷飲食減少病更加重虛弱咳嗽者若不早治肺損難治惟此方最益肺臟治咳嗽應效如神如虛弱並不咳嗽者枇杷葉不用只用河水同煮咳嗽多痰者加川貝母一兩研極細末俟煮熟時入內煮一二滾取起若吐血用藕節二十一個搗汁同煮冬月多制久收不壞夏月隨食隨制飴糖飲治男婦五勞七傷身體燒熱精神困倦不思飲食等症咳嗽吐血者忌服好燒酒二斤白糯米糖四兩核桃肉七個裝入瓷瓶內不可太滿滾湯煮一炷香久埋土內七日去火毒隨便每日服一二杯不可過多大有奇效元霜膏治虛勞咳嗽吐血下血燒熱困倦其效如神真烏梅汁梨汁蘿蔔汁柿霜白沙糖白蜜各四兩薑汁一兩赤苓末八分款冬花乳汁浸曬乾紫菀末各二兩共入砂鍋熬成膏為丸每服三錢臥時含口中緩緩咽下加味四物湯治勞熱咳嗽如神當歸熟地各三錢川芎芍藥各二錢柳樹根一兩酒炒水煎服奇效雕胡飲治虛勞咳嗽吐血吐膿雖垂危亦可用也茭菱細根約三四兩搗碎用好陳酒煮服每日一二次半月全安坎離丸治一切虛勞立見神效黑豆炒熟研末紅棗量用煮熟去皮核二味共搗為丸每服三四錢鹽湯送下或酒下外治法治一切虛勞咳嗽吐血燒熱等症但脈息有神無不效應箭頭砂一兩明雄五錢共研細末綿紙包固選未曾行經十二三歲童女身體壯實無病者將藥貼放童女臍內用布捆緊過一周時取下稱藥比前多重一二錢者更妙即刻捆於病人臍上先備人乳十餘碗候病者口乾發燥飲之渴止然後解去臍上之藥其病自去再照枇杷膏調養一月百無一失斷不可服別藥以免誤事人紅丸專治童子虛勞咳嗽吐血燒熱屢試神驗大人亦治切勿輕視人龍即蛔蟲二十一條童便洗淨瓦上焙乾以黃色為度黑色則不效不破皮紅棗三十個飯上蒸熟去皮核蘿蔔子一錢五分炒研末大熟地五錢煮爛作膏自制真藕粉一兩五錢真川連六錢酒拌炒研末以上共搗為丸如梧子大每早以白滾湯送下七粒逐日加增二粒加至二十一粒為止服至一料全愈吐血治法血吐在水內浮者肺血也羊肺煮熟蘸白芨焙研末食沉者肝血也羊肝煮熟蘸白芨食半沉半浮者脾心血也羊心羊脾煮白芨食極效此聖惠摘玄方也脾肺之血系屬氣虛以補氣益脾為主肝血系屬勞傷以滋陰降火為主如概用滋陰之藥則殺人如草菅矣俗謂非勞病而治成勞病即此是也吐血最忌用參無論人參高麗參黨參均不可服此係名醫祕傳人多不信後有時醫試之每治吐血之症用參者多不能愈不用參者全活甚多又方凡勞傷咳嗽吐血用童便之清利者日日飲之勿間或自己戒食蔥蒜等臭濁之物並戒房事則小便自清去其頭尾數滴日飲二三次每服南棗二三個自不噁心一月見效久飲除根身體強壯吐血服小便者百無一死服寒涼者百無一生此屢試屢驗良法也又方足紋銀一塊約重五六錢放碗內早起將自己小便去頭尾撒碗內色黃者不可用乘熱飲下數日即止忌酒與酸辣煎炒等物一年愈後將銀傾化已輕而奇臭蓋臊氣被銀收去也又方蓮藕藕節更妙日日煎湯飲之不可間斷輕則三月重則半年斷根無鮮藕時用藕粉亦可藕粉以自制為真買者多假無益有損又方凡吐血多者用三四兩重大當歸一枝切細取好陳酒一斤慢火煎至一滿碗候將要吐時口中有血務必含住取藥一口連血咽下其血必止隨將酒分作幾次飲完即此一劑而愈後不再發每有醫家阻云吐血尚要戒酒豈可用酒煮藥殊不知神驗非常此方活人甚多從無一誤如一時煎熬不及急用當歸一二寸嚼融帶血吞下即能漸止不致大吐亦可救急此林屋山人經驗方也又方真桂元七枚去核紅棗十四枚去核白蓮子二十粒去心不去皮黑豆四十九粒水煎連果空心食大有奇效又方豬肺一個洗極淨以硃砂三分川椒每歲一粒灌入再將肺挖七孔每孔安桃仁一粒放瓦鉢內蒸出自然汁不用放水連肺食盡其效如神又方薺菜三斤俗名地菜連根帶葉煮雞蛋三四十個七晝夜不斷火隨時取食即愈極效方也又方用上白細黏米於清明前後浸水一二日平時亦可磨細日曬夜露曬極干以銅鍋炒黃色不可太過每用滾水和成如指頭大煮熟連湯食不可加鹽與別物或少加白糖亦可無論時候但覺咳嗽即服一日須服五六次切莫服藥服後忌茶酒腥辣等物一月戒房事半年有人吐血年餘百藥不效遇一道人指授此方十日即愈又方子雞一隻男用雌雞未生蛋者女用雄雞未曾啼者先擇無人走動處挖一地坑用竹刀或瓷片忌銅鐵將雞在坑內宰殺血滴坑內干搏去毛破開腸雜收拾乾淨腸雜毛糞均放坑內不可遺一點在地雞亦不可沾水只將乾布內外擦淨取六月雪草按病人年紀每歲用草嫩頭一個同雞肝雞肫納入雞腹中用新瓦鉢兩個合雞在內以紙密密封口再用鐵鍋二個合瓦鉢在內並將鍋口封緊鍋中鉢中總要拭乾不要滴入用稻草三大把穀殼七八斤緩緩而煨約半時久雞自爛熟取出檢去六月雪草將雞用手摺碎空心食之食雞三隻總無不愈真奇方也愈後須戒殺放生方免復發又方上肉桂五分去皮研末沖服忌火當歸桔梗枳殼各七分大黃酒微煮厚朴薑汁炒川鬱金真紫蘇各八分水煎加童便半鍾薑汁二茶挑先服二劑再用續斷一錢麥冬二錢去心遠志六分去骨真山藥四分赤芍七分益母草三分川貝母一分去心另研末沖服水煎服十劑此二方不論男女遠年近日血症只要現在吐血之日先服前方二劑後服次方十劑立時全愈永不再發慎勿加減藥味亦斷不可服寒涼藥如從前誤食寒涼藥以致寒血凝滯者服此十劑後自然漸次全愈不必再服屢試屢驗功效如神若體弱者服六味地黃丸空咳不止者服健脾丸即愈咳血痰內有血出於肺與上咳嗽門參看款冬花百合百部蒸焙各等分為末蜜丸龍眼大每臥時薑湯下一丸又方大蘿蔔一個切須剜去肉一半入黃米糖令滿原頂蓋之火內煨熟食效喀血痰帶血絲出於腎與上咳嗽門參看天冬一兩茯苓杏仁貝母甘草各五錢共研末煉蜜為丸梧桐子大每服二三十丸又方柳花焙乾研末米湯調服一錢神效驗癆蟲法用乳香燒煙燻病人手背男左女右以綢帕蓋手掌心良久有毛從掌中出白者易治紅者難治黑者不治無毛者即無癆蟲灸癆蟲法用濕紙條貼背脊上紙先乾者即癆蟲處以墨點記用老蒜切片貼上以艾一團放蒜片上燒之多燒為妙無蒜用姜亦可先備火盆鐵鉗如蟲出即用鉗夾火盆內或遠送野外埋入土內恐飛入人口鼻內須謹防之治癆蟲法雄精硃砂硫磺去沙泥各一錢麝香一分各研極細末瓷罐收貯以頂好燒酒和勻用獨大蒜頭去蒂蘸藥從尾間脊骨徐徐逐節擦上如有腫處或極痛之處即系癆蟲所在須於腫痛處多擦數次其蟲自滅不拘新久一切癆病皆能除根如病重者須擇天醫吉日總以午時擦之為妙端午日更佳忌戊日已日除日此藥能開背後三重關竅即虛怯恚憂之人於端午擦之亦能神清氣爽經絡流通大有補益此方傳自海外屢試如神又方八月初一日早收取百草頭上露水點膏肓穴在背上第四節骨左右兩旁各三寸最為神效童子癆並治傳尸癆貓糞取屋上曬白者用黃土包裹火內煨焦取出用碗蓋住候冷去土研末黃糖和為丸每服三四錢效若仙丹屢試屢驗此林屋山人方也哮吼喉內有聲而氣喘者是治哮吼妙法病發先一時用鳳仙花又名指甲花連根帶葉熬出濃汁乘熱蘸汁在背心上用力擦洗冷則隨換以擦至極熱為止無則用生薑擦之再用白芥子三兩輕粉白芷各三錢共研為末蜂蜜調勻作餅火上烘熱貼背心第三節骨上貼過熱痛難受正是拔動病根務必極力忍耐切勿輕易揭去冷則將藥餅取下烘熱再貼一餅可貼二三日無論病愈未愈多備藥餅換貼不可間斷輕則貼一二日重則貼三四日或五六日永不再發有人患哮吼四十餘年貼至數日斷根無論寒熱虛實鹽醬醋酒哮吼皆治神驗第一方也藥味不可加減並治痰氣結胸及痰喘咳嗽又方海螵蛸瓦上焙枯為末大人五錢小人二錢紅砂糖拌勻調服數次斷根
