body:
  text: 卷四脾胃噁心吞酸此脾胃虛冷也吳萸四錢滾水泡去苦味水煎食遠服有人患此多年一服即愈或加乾薑一錢亦可忌夜食並忌生冷食物又方核桃嚼爛薑湯送下胃口虛脹手足厥冷山藥半生半炒研細米湯下二錢日二次忌鐵器涼藥服多嘔吐惡食前三方及後鯽魚橘皮二方均可用冷水服多砂子炒焦再加水煮澄清飲之即消又方食生蒜頭二三枚亦效或服砂仁一二錢亦可胃脘冷痛有人胃中冷滯多年不愈後遇名醫診之曰此尸疰也用死人棺中枕煮水服之而愈脾胃虛冷不思飲食鯽魚和豆豉胡椒老薑陳皮烹煮空心食脾家冷積食後胸滿兼治一切痰氣橘皮一斤柑橙皮勿用甘草食鹽各四兩水五碗慢火煮乾焙為末每服二三錢白滾水沖服有人得此疾百藥不效偶食橘皮散似屬相宜遂連日服之一日忽覺一物墜下大驚自汗如雨須臾腹痛遺下數塊如鐵彈子臭不可聞從此胸次廓然其疾頓愈蓋脾之冷積也胸胃積滯有人食白煮雞蛋過多胸胃積滯數年不愈後用大蒜半斤煮食吐出一團開視已成小雞連服數次吐出十餘團而愈胃寒嘔吐黃水並治痰飲吐水暖胃膏生薑一斤搗取自然汁碗許入牛皮膠乳香末沒藥末各五錢同煎膠化離火將藥作三四大膏藥以一張貼胃脘痛處用綢捆綁三個時辰然後取周歲小孩所穿之鞋一雙銅鑼上烘極熱生膏上輪流尉之尉至膏硬換膏再貼再綁三時再尉至愈為止止後用紫油厚朴三兩用老薑二兩切片同煮一時去薑不用乾薑四兩用甘草二兩同煮一時去甘草不用將二味炒乾為細末黑棗煮湯去皮核為丸每服二錢開水送下久服斷根此方名尉胃丸功能溫中降氣暖胃消爽大有奇效此林屋山人經驗方也痰疾中痰氣絶方見卷十二急救門下痰丸治一切風痰眩暈癲癡久不愈者白礬一兩細茶葉五錢為末煉蜜丸梧子大食遠薑湯下五十丸久服痰自大便出茯苓丸治痰症手臂疼痛並治婦人産後發喘四肢浮腫生半夏二兩茯苓二兩枳殼去瓤麵炒五錢風化硝二錢五分如一時未易成但以朴硝撒在竹盤中少時盛水置當風處即干刮取用亦可共為細末生薑汁煮糊為丸如梧子大每服三十丸薑湯送下有人為痰所苦夜間咳嗽如人抽搐兩手發戰不能舉物服此隨愈痰氣結胸真銀硃淨五錢明礬一兩同研用尉斗盛火瓦器盛藥溶化急刮搓丸每服一錢好茶入薑汁少許服之心上隱隱有聲結胸自散不動臟腑不傷真氣明礬化痰銀硃破積故也又方梨汁一鍾薑汁白蜜各半鍾薄荷三錢研細末和水煮十餘滾服降氣如奔馬又方照哮吼第一方治之極效痰飲吐水凡食冷物過度或氣虛脾弱不能消化飲食入胃皆變成水嘔吐無時名曰痰飲好赤石脂一斤研末每服二錢酒送下至多服三錢服至一斤則終身不吐痰水又不下痢此藥能補五臟令人肥健有人痰飲百藥不效服此而愈又方暖胃膏尉胃丸二方見前脾胃門極效痰疾癲狂狂病有因傷寒而得之者此一時之狂也照仲景張公傷寒門治之用白虎湯以瀉火矣更有終年狂病而不愈者或持刀殺人罵官不認父母妻子見水則喜見食則怒此乃心氣之虛而熱邪乘之痰氣侵之遂成狂矣此等欲瀉火而火在心不可瀉也欲消痰而痰在心之中不易消也惟有補脾胃之氣則心自得養不必去痰痰自化不必瀉火火自無矣方為化狂丹高麗參三錢白朮茯神各一兩甘草菖蒲各一錢半夏菟絲子各三錢附子一分水煎服一劑狂定二劑病痊此方妙在補心脾胃之三經而化其痰不去瀉火蓋瀉火則心氣愈傷而痰涎愈盛狂將何止乎尤妙在附子一分引補心消痰之劑直入心中而氣尤易補而痰尤易消又何用瀉火之多事乎此所以奏功如神也又方青橄欖十斤打破砂鍋內熬十數滾去核入石臼內搗爛再熬熬至無味去渣熬成膏用白礬八錢研末加入攪勻每日早晚取膏三錢開水送下服完自愈凡癡癲羊頭風等症皆痰迷心竅所致服此甚效此林屋山人經驗方也又方藜蘆又名藜高煎水多服必效生者炒食煮食俱妙有婦人風癲每一二年一發或三四年一發久則一日發十餘次昏癡不愈後服此方吐出痰涎二斗汗出如洗更覺昏困三日全愈又方真川鬱金七兩白礬三兩薄荷水為丸硃砂為衣如梧子大每早服一次開水下有婦人瘋癲十餘年服至四五十日心間如有物脫去再服之十日而愈以鬱金入心去惡血白礬化頑痰硃砂安神故也愈後須用天王補心丹加減調治方免後患又方先將病人綁住在離當心下三指之處艾火燒七次或九次再燒兩太陽穴七次用辰砂川貝各三錢酒煎服兩次再用海風藤鳳尾草川貝各錢半石菖蒲三錢煎服五六劑或再服紫金錠一二錢愈後用蘆蒂棗肉為丸每丸三分服至三丸全愈屢試如神又方絲綿一尺燒灰開水下兌酒服更妙癡笑不止食鹽燒紅河水煎飲過片時用手指入喉抵住舌根使用嘔吐嘔出熱痰數次即愈羊癲風菜葉放口中青草亦可立時蘇醒仍照前橄欖膏服之可以斷根痰迷譫語方鮮豬心一具辰砂一錢甘遂二錢二味合研為末藏豬心中外用牛糞煨熱取出藥末和作二丸將豬心煮汁和丸吞下即愈三消渴而飲水不止為上消飲水多而作瀉為下消多食易飢為中消消渴飲水不止三消湯真臺黨白朮當歸茯苓生地各一錢黃柏知母黃連麥冬天花粉黃芩各七分甘草五分水煎服神效三消皆治天池膏天花粉黃連真臺黨知母白朮五味各三兩麥冬六兩生地汁藕汁各二兩人乳牛乳各一碗生薑汁二碗先將天花粉七味切開用淘米水十六碗桑柴火慢熬出汁盡五六碗瀝清入生地等汁慢慢煎熬加白蜜一斤煎去沫熬如膏由入瓷罐用水浸三日去火毒每用二三匙白滾水送下甚效三消通治菟絲丸菟絲子酒浸洗淨焙乾十兩茯苓蓮肉各三兩五味子一兩共為末另研真山藥末六兩酒煮搗數百杵丸如梧子大每服五十丸空心米湯下三消皆治又方緑豆煮汁並作粥食最妙又方好梨日日食之多食必效或多食蘿蔔更妙又方蠶繭殼七個絲綿亦可煎湯當茶飲之神效繅絲水飲一二碗更佳又方黨參一兩蜜炙研末開水泡透蒸熟為丸如梧子大日服五丸酒下或茄根煎湯下日加五丸加至三十丸為止不可多服服五六次後以飲水噁心為度噁心時乾物食之其渴自止奇效又方五倍子煎水飲之或作丸服之久則生津止渴又方牛膝五兩研末生地黃五斤搗融蜜丸梧子大空心酒下三十丸下元虛損宜久服為妙又方苦楝樹根新白皮五錢切片瓦上焙乾入麝香少許水煎空心飲之有人口渴不止遇道人傳此方服之下蟲三四條而愈愈後人必困頓用黨參二兩煎水飲之又方如一日飲水至一石者浮萍搗汁服之又方如飲水多而小便不利者葵花根五兩煎湯清早服之多年消渴飲水百藥不效每日食好梨二三個或食蘿蔔亦可均極神效又方白芍甘草等分為末每用一錢開水送下日三服七日而愈有人渴飲九年時發時止服此斷根飲水不止小便如膏茴香炒苦楝子炒各一錢研末空心酒調服飲水不止小便時流以上各方可以通治雞蛋三個要頭窩生者去殼攪融用燒酒四兩燒開沖服服後即蓋被睡下睡醒禁風一日即愈有人一日飲水數桶上飲下流服此而止神效非常又方有人日飲水數斗小便時流飯量亦加服消渴諸藥年餘其病更甚後用其麝香三分酒為丸用枳子又名棘枸子又名雞距子煎湯服之遂愈問其故乃食果成積及飲酒過度積熱在脾致有此疾麝香能治酒果棘枸亦治酒病故能奏效也久病消渴不止並治泄瀉口渴七味白朮散白朮高麗參真茯苓藿香葉乾葛各一錢炙草五分水煎當茶飲另用木香三分磨汁兌服屢試如神消食易飢以上消渴各方可以通治好梨日日食之多食自愈又方肉蓯蓉山茱萸五味子為末蜜丸梧子大每服二十丸鹽水下腹中易飢食下片刻即吐此蛇積也用醋泡大蒜汁飲數碗吐出一蛇即愈不吐再服數碗自愈又方雄黃五錢調水服數次即愈飲食積滯與痞疾門參看食積外治法凡飲食停滯胸膈脹滿或大便不通或大便泄瀉或年老或體虛難以攻擊內消者用亂髮一團剪斷酒麴一個小者二三個亦可蔥白七個老薑三錢胡椒七粒以雞蛋一個破殼傾入碗中將各藥搗融和入調勻用隔夜燈油煎成一餅貼病人心坎下胃脘處先用燈油於胃脘處順擦七次再貼如嫌太熱用紙隔貼亦可用布帶束住冷則煎熱再貼約一二時似覺鬆動即便取出其病立愈此法極穩而效屢試如神若治小兒藥料可以稍減又方紫蘇尉法見傷寒門亦極神效飲食凝滯攻衝作痛或有形或無形方見各項氣痛門飲食過多脹滿不安用鹽擦牙溫水漱下二三次如湯沃雪也魚肉積滯狗糞燒存性為末酒服二錢日三服其積自大便出又方山楂炭研末為丸每服四錢數次即愈食魚積滯紅曲三合煮爛連渣服積從大便出連服三次即愈生魚積滯取水中石子數十枚燒紅投冷水中七次即熱飲之三五次其積從大便出又方生薑汁和紫蘇汁飲之即消食犬積滯山楂肉杏仁去皮各二十四粒煎濃湯飲自化食牛腹脹干稻草一把煎濃湯熱飲自消食鴨積滯淘糯米水煮熱飲一盞即消鴨蛋積滯治法與上同雞蛋積滯飲好醋即消或飲豆豉水亦消食整煮雞蛋積滯腹中如有雞子鳴者多食大蒜即可吐出食鹽蛋積滯肉豆蔻一個煨去油煎服數個自消食索粉涼粉積滯杏仁五十粒去皮尖蒸熟搗碎滾開水沖服即消食瓜果腹脹作痛肉桂研末飯和為丸緑豆大每服五分以水下又方食鹽湯即愈食西瓜並諸瓜過度瓜皮煎湯解之諸瓜皆同食荔枝腹脹荔枝殼煎水服即消食菱角腹脹即生薑汁飲立消食豆不消生蘿蔔汁飲之即消食麵不消生薑汁沖好酒熱服自化又方生蘿蔔取汁燉熱服神效凡食麵用醋斷不作脹糯米積滯神麯炒為末加木香末開水下數日口中聞酒香其積即散飯食凝滯腹脹飯搓成團加鹽少許燒枯煎水飲即消食茶成癖花椒芝麻等分為末以蒸麵餅為丸如梧桐子大每服十丸茶送下百日遂愈又方青礬四兩入小缸內泥封火煅一夜取出紅棗三斤煮去皮核共搗為丸每服三錢或酒或茶下神效又方新鞋一隻將茶葉盛滿任意食之食完再盛一鞋連食三鞋自不食也男用女鞋女用男鞋奇效又方每日食棐子七個以愈為度食積痞塊木賊草五錢研細末每服五分開水空心調服年近者一料即消年遠者不過兩料全愈屢試如神噎膈此症有氣膈食膈酒膈痰膈蟲膈數種惟氣隔及老人膈食者難治然施治得法亦可愈也噎膈諸方凡患膈食鼓脹愈後必戒殺放生方免復發至要至要牛涎丸專治膈食糯米粉以老牛口涎拌和為小丸煮熟食之神效或用牛涎和水服亦妙取牛涎法以水洗淨老牛口用鹽塗之少頃涎自出愈後終身戒食牛肉又方牛反草煎水服其效如神無論何項噎膈皆治牛食百草之後必將所食之草吐出慢慢嚼食所吐之草即名牛反草此草吐出復食最為難得須令牧牛兒俟吐出時故意搶奪隨搶隨還俟數日搶慣之後乘其不備搶著走開即可得也若一搶即走牛必怒奪恐致傷人又方鹿肚草用活鹿破腹取其腹內所食之草陳倉米五年以外的方可用越陳越好灶心土以家中自取者為真各三錢水煎服五服後飲食如常再將陳倉米熬湯當茶時飲一盞一月後永不再發如鹿肚草有多者照方服十餘劑更妙鹿肚草難以聚得先飲陳倉米湯救急免病加增再覓鹿肚草配藥服之可也無鹿肚草用牛反草亦可又方豬肺管四兩鮮藕四兩如無鮮藕干藕節亦可舊籮底一個面鋪所用羅面之黃絲籮底要黃的黑白者不用以上三味新瓦上焙枯研細用生薑一兩搗爛取汁白砂糖一兩沖服初服必吐吐後再服服至三次即不吐矣服後忌食各色豆一月此方活人甚多神效莫測珍之寶之並忌食豆腐豆芽腐芋一月又方小兒胎髮一個以陰陽瓦焙焦存性研細末陳酒送下極效又方先用雄雞一隻去毛與腸雜洗淨裝入大碗內上用紙數層封固飯上蒸熟取出用鵝管或小竹管將紙上戳破一孔插入以一頭含口中令熱氣衝入喉內其關自開預先取出羊糞一斗浸瓦罐內三日暑熱天只泡一日每日侵晨用竹枝攪一次澄清取清水煎後藥服之如系酒膈用葛花三錢去苓製半夏各二錢陳皮錢半去白甘草一錢氣隔用烏藥雲苓各二錢陳皮去白砂仁各一錢研去膜香附二錢酒炒製半夏錢半甘草八分食隔用神麯二錢炒山楂肉炒雲苓各錢半陳皮八分去白法夏一錢甘草八分服三劑後即思飲食屢試皆驗又方淨牛乳以當面取者為佳少加白糖時時燉熱飲之凡患噎膈大便燥結者服此必效又方驢尿黑驢更佳乘熱飲二三合極效此尿有毒不可過多病重者七日方效又方用平地或牆邊人糞要乾結者稀糞不用以向東者為佳取回用陰瓦上焙枯以煙盡為度研末每服三錢淡酒送下不過三服即思飲食屢試如神有起死回生之妙又方制黃蛆一錢半研末真細松羅茶七分五釐廣木香一分五釐制豆蔻四分五釐共研極細末五更時空心溫燒酒半茶鐘調服不飲者用水酒調服戒麵食葷腥數日雖水米不進者無不應驗制黃蛆法用糞坑中蛆愈大愈好撈出以長流水洗淨放瓦罐內鹽水和泥封固木炭火燒一炷香久以蛆至黃色為度如尚未黃入砂鍋內再炒黃忌銅鐵器又方豬毛連粗皮及蹄尖不拘多少曬極干放淨石上用明火點之燒至如膏藥樣住火冷定研極細末每服三錢滾開水下此方年在五十內者百發百中真仙方也又方荔枝一枚去核將蜒蚰一條查藥物備要便知放荔枝肉內再摻好冰片三釐於蜒蚰上即將荔枝裹好仍放殼內以線扎好病人含口內有冷涎水滲出徐徐咽下一時許蜒蚰化完無水滲出吐出只須一次可以立進飲食又方用雞蛋內白皮四十九個加胡椒一斤入好燒酒蒸四十九日曬四十九次收貯瓷瓶遇有患膈食者每早以開水吞胡椒三錢三次即愈神效又方生薑不拘多少五月五日午時用布袋裝好浸於不見天之糞坑內四十九日取起用長流水洗淨懸空吊曬極干為末病二年者用薑末三分病一年者用薑末二分入麝香一釐滾開水沖服只須一服而愈忌葷腥鹽醬五十日永不再發此方極效無比存心濟世者宜預製以救人功德無量糞炕要無婦女大小便者方好又方陳皮多年者為佳用數十年之陳壁土拌炒去土取陳皮研末對酒服一二錢數服即愈痰膈氣膈均效又方山梔五錢炒焦研末酒沖服一服即愈無論老少神效無比惟胃寒者不宜又方逢日食時自初虧起用白乾面二斤水調揉熟向日和成丸如桂元核大以日色復原為止即將面丸於是日曬乾收好按一歲一丸空心煮食平淡而有奇功面圓外實內虛尤為奇異不可輕忽多制可以濟人價廉功大不見日則不效又方生藕汁生薑汁梨汁甘蔗汁蜂蜜蘿蔔汁白果汁竹瀝各一盞和勻飯上蒸熟隨意飲之又方韭汁梨汁薑汁人乳各一盞飯上蒸熟服之三日後再服極效又方天生泉水時時熬服極效又方白蜜滾水調服每服一兩數服自愈又方黑砂糖一斤生薑一斤共搗如泥入瓷罐封固埋乾燥地下七日取出每日調開水送下痰膈食膈均極效又方做米糖鋪內柞過頭造之糟一斤加生薑四兩共搗爛做成薄餅曬乾磨末瓷缸收貯每早以開水調服二錢其味最美可以代茶又方谷樹子又名楮樹又名構樹煎水服因食甜物而噎膈者服此最效又方一人噎膈飲食不下華他見之云是蛇瘕用醋泡大蒜汁陳者佳飲二三碗並多食大蒜後吐大蛇一條而愈又方油透木梳一把燒枯為末酒調一鍾服下半日即能飲食此方救人無數不可輕視又方有肝旺脾弱食即嘔吐屢治不效者此木剋土也宜用平肝補氣之藥治之必愈不可認為噎膈也又方患此症者有蟲藏於胸膈時長時縮長則飲食難進或食後少頃即吐皆有蟲也用靛青葉搗汁無葉即用藍靛亦可兌淡酒飲之立愈百藥不效者此方最為神效又方此症胸前必有二小骨漸漸交合則不能食而死取生鵝血對口乘熱灌之其骨自化飲食可進永戒食鵝牛二物一僧患膈食病臨死語其徒云胸中有物作梗死後必為剖出其徒剖得一骨後殺鵝血偶滴骨上骨即消化其徒亦患此病因飲鵝血而愈屢試如神傷寒膈食核桃十五枚放砂鍋內水浸核桃高一指深煮四五滾取水飲之膈食初愈飲食宜少凡膈食初愈飲食不可驟進須先以米湯飲一二日再以清清稀粥服一二日再以濃粥服一二日每次只可一小碗俟七日方可食乾飯每食不過一小碗日漸遞加切不可食飽緣胃氣初復驟然飽食反致傷胃則不可救矣即病人要食生氣亦須聽之愈後忌鹽醬五十日仍請名醫調理反胃嘔吐凡患嘔吐以上噎膈各方可以通治生薑一大塊直切薄片勿令斷層層摻鹽以綿扎緊外用粗草紙七層包之水泡濕慢火煨熟取起搗爛和米煎服立止又方生薑汁一杯煎滾聽用蜂蜜四兩煉熟聽用每服用薑汁一匙蜜二匙白湯調服每日五六次效又方胡椒八分酒藥一個為末蔥頭五根捶融有熱用茶炒無熱酒炒貼心窩又方用極大枳殼兩半個去內瓢將真阿魏六七分杏仁十二粒去皮尖共搗爛入枳殼內將兩半殼合口外用綿紙裹好線扎緊入滾水內大火煮半日取起去殼內藥將殼焙乾為末燒酒送下重者不過二次即愈又方真頭道糯米酒釀去糟好醬油各半酒杯和勻溫服即止嘔能進飲食又方年久陳石灰炒研好醋為丸如豆大每服七丸薑湯下三日即愈又方柿餅拌乾飯蒸熟連食八日不飲滴水極重者八日必愈屢試屢驗萬無一失又方藕二枝陰乾三四日去其頭二三段單吃藕稍一段吞汁吞渣一日一段二日服完即愈又方甘蔗搗汁一升入生薑汁二合溫熱作五次服甚效又方甘蔗搗汁數碗加干香櫞煮爛再加白糖四兩搗勻揉碎不拘時服凡積食久而反胃極重者三四次即愈又方每早用滾開水兌冷水各半碗服之久服斷根又方用老薑一大塊挖孔納紅棗一枚紅棗去核內包砂仁一顆外用黃泥包裹煨透去泥與薑棗只取砂仁嚼食每食數顆數次即愈極效或將薑棗砂仁煎湯服之亦效胃寒者最宜又方蚯蚓糞一兩木香三錢大黃七錢為末每服五錢無根水調服忌煎炒酒醋椒薑熱物一二服即愈其效如神因熱而嘔瀉者最宜上吐下瀉此尋常吐瀉也如因暑熱吐瀉不止急照卷十五霍亂門治之樟木煎水服立止屢試如神並治霍亂亦效又方韭菜搗汁隔水燉熱微溫服極效又方陳鹽梅一個瓦上焙枯加生薑一大片同煎服屢試神驗又方一人腹痛上吐下瀉服六和湯藿香正氣散平胃散理中湯皆不效因思傷寒書云胸中有熱而嘔吐胃中有寒而腹痛用黃連吳萸洗炒透黃芩生白芍甘草黨參乾薑法夏陳皮雲苓煎服即愈又方小兒吐瀉不止用舊鐵釘有鏽者煎水飲入口即止一二日一吐氣味變酸有人飲食一二日之後一齊吐出氣味變酸百藥不效用豬板油十兩熬去渣白蜜八兩煉淨二味再入銅鍋內熬數滾入生薑自然汁三兩和勻成膏取起不時挑服含化初服一次尚吐連服三次全愈一二日一吐或三四五日一吐飲食朝食暮吐暮食朝吐此腎虛也用熟地二兩山萸肉三兩水五碗煎至一碗加肉桂一錢研末兌入空心服一日一劑十日必愈愈後服六味地黃丸一二料方可斷根飢餓嘔吐凡人飢餓每有螬蟲上胃食物必吐若誤用翻胃之藥其吐更甚宜用川椒煎湯飲即安乾嘔不出此極惡之症用甘蔗汁加生薑汁和勻溫熱服酒後乾嘔甘蔗汁飲數次極效食物下喉即吐此腎水虧也用熟地二兩山萸肉三兩麥冬三錢煎服連服十劑即愈後服六味地黃丸一二料不致再發見食即吐此胃經嘔也紅棗二個去皮核胡椒二粒打破入棗內紙包煨過煎湯服外用米一杯炒黑煮熟酒藥一個共研勻貼心窩食後少頃即吐此胃脘有蟲也白馬尿飲一二升極效或照卷五蟲疾方治之嘔物不化此大腸經嘔也黃糖酒藥陳壁土共煎湯服外用酒藥二個半生半煨細茶三錢艾葉二錢共搗爛茶炒貼心窩嘔吐清水此膽經嘔也生薑一塊切開中挖一孔甘草研五分入薑內紙裹合住煨熟取薑內甘草入薑一片煎湯服外用蠟樹根去粗皮瓦上霜路旁陳茅草皂角灰共搗碎茶炒貼心窩欲嘔而不嘔此小腸經嘔也楓樹皮甘草煎服外用燕子泥樟樹皮共搗碎有熱用茶炒無熱用酒炒貼心窩又方車前子燈心梽木葉煎湯服又方如嘔後小便不利者楓樹漿作膏用皂角灰摻土貼臍眼用燈火在喉下燒三次口吐白沫欲嘔而不出此膀胱經嘔也緑豆糯米鹽共炒擂碎加黃糖煎服又方蚯蚓胡椒艾葉皂角灰共研碎清油炒貼心窩又方如嘔後氣不散者用艾葉搗碎醋炒貼心窩欲嘔而不嘔面發紅眼流淚此三焦嘔也生藕洗淨搗汁如無以藕節代乳汁乾柿蒂鳳凰殼煎服神效又方桑樹皮茶葉四季蔥共搗爛炒熱貼心窩如二便不通加皂角灰黃糖水調貼肚臍又方黃豆研末童便和勻貼心窩又方上不嘔下不瀉如霍亂者用緑豆糯米鹽胡椒灶心土共為末以刀燒紅將藥放刀上陰陽水沖服外用甜酒糟皂角灰同炒貼心窩如不愈用針刺中指出血即愈聞藥即吐百藥不效取家中灶心土藥店買者不真則不效水為丸塞兩鼻孔即不吐矣極效嘔吐不能服藥必有蛔在胸膈川椒十粒炒煎服或於嘔吐藥中加川椒飲之又方陳鹽梅二個和滑石末交捶作餅紙包火上煨枯開水泡服甚效脾胃虛弱食不消化湯飲不下粟米半升磨成粉水為丸梧子大每用七粒煮熟入鹽少許空心和汁服或加醋吞服又方真橘皮去白研末五更安五分於掌心餂之即睡三日必愈又方大鯽魚一條去腸留鱗入皂礬末令滿泥包煅存性研末每米飲服一錢日二服又方有人因服涼藥過多漸至嘔吐旬日之後進口即吐竟至粒米不下湯水亦吐已七日矣請醫診視脈不散亂尚有神氣雖因寒涼而阻隔但絶食以來大便不通小便短澀即用製大黃枳殼各一錢煎湯服之竟不吐出亦不思食次日復進一劑下咽一時後大小便通利而思食矣誠哉藥之對症其效如此嘔吐痰水見痰疾門厄逆偶然厄逆紙捻通鼻取嚏即止氣熱厄逆柿蒂煎水飲即止陰寒厄逆乳香硫黃陳艾各二錢為細末用好酒一鍾煎數沸乘熱氣使病人用鼻嗅之外用生薑擦胸前最效又方雄黃二錢燒酒一盞煎七分急令病人嗅其熱氣即止又方川椒去子及閉口者炒四兩麵糊為丸如桐子大每服十丸醋湯送下食遠服神效又方荔枝七個連殼核燒枯研末滾水調下食遠服立止又方黃蠟燒煙燻二三次即止又方砂仁炒研生薑連皮等分搗爛熱酒食遠泡服二錢神效又方刀豆子燒灰存性開水調服二錢即止體虛常厄逆二三聲公丁香三十七粒白蓮子去心二十七粒二味同煮爛去滓加煨薑一片糯米半升煮粥食即止厄逆日久不愈一連四五十聲者用生薑搗汁一合加蜜一匙溫熱服
