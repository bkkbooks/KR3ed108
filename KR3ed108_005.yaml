body:
  text: 卷五肚腹腹痛辨證腹痛各症應與傷寒門參看臍眼上痛者食痛也臍眼下痛熱手按之不痛或其痛多急或痛如刀割或吐或瀉或痛甚而覺有冷氣皆寒痛也手按之更痛冷物尉之不痛或自下而痛上或時痛時止滿腹堅結皆熱痛也時發時止痛在一處而不移者或有塊硬起者蟲痛痞痛也又聞煎炒食物香氣則痛痛時口吐清水或口渴者亦蟲痛也陰症腹痛男女交合之後或外受風寒或內食生冷等物以致肚腹疼痛腎囊俗謂卵泡內縮亦有不縮者手足彎曲紫黑重則牙緊氣絶謂之陰症傷寒治法見卷十四傷寒門寒症腹痛參看陰症傷寒各方或炒鹽尉之或炒蔥姜尉之或用熱灰尉之或用滾水一壺隔布尉之均止痛好法也又方或飲胡椒湯加糖沖之不可加鹽或飲薑湯均妙又方龍眼連殼燒存性研末兌酒服屢試屢驗又方白芍三錢甘草肉桂各一錢水煎服此張仲景神方也肚腹畏寒肚腹容易受寒動輒疼痛不已甚至寒中三陰命在須臾遲則難救此下部虛損真陽不足命門火弱故也有人肚腹畏寒上貼附桂膏又加厚綿腰圍數層遇寒仍不濟事一老醫以製附子五錢上肉桂五分研末兌服無上桂不用亦可乾薑一錢水煎連服十餘劑雖天寒肚腹亦不畏冷再加補中補氣等藥調理全愈附子走而不守得乾薑則守而不走如不信單用附子一味熬濃汁滴紙上水必散開加乾薑熬之滴紙上則水不散矣用炮姜則不效此祕傳也又方九制硫黃丸見內外備用諸方服之神效熱症腹痛服六一散最妙或用銅鐵冷物尉之或服痧藥亦可若痛甚者或嘔或瀉者照卷十五霍亂痧症各方治之又上吐下瀉而腹痛者如作霍亂痧症治之不效須照噎膈反胃門內上吐下瀉方治之蟲積腹痛蟲痛如有塊硬起者用手在硬處久久揉擦揉至一日其蟲即死從大便而出或查痞積門各方治之大人小人腹中疳積蟲積作痛及男婦痞塊癥瘕各項肚腹脹痛食滯腹痛方見飲食滯積門身受寒熱心腹疼痛上下關格不通大便閉塞小便短澀渾身繃緊手足腰膝僵硬不省人事照卷十一內外備用諸方門內尉法治之最妙忽然肚脹如鼓此症肚腹猝脹漸大如鼓此寒極也遲則不救急用武營鳥槍藥二錢爆竹藥功緩不效以頂好燒酒煎滾沖服得吐瀉即生非陡然脹大者不可誤用腹中緊脹腹硬如石痛如刀割見後痞疾門白糖煮酒飲數次即愈肚腹麻木此風襲也多煮蔥頭食之並用蔥姜炒熱尉之自愈忽然肚黑凡肚皮忽然青黑色此乃血氣失養風寒得以乘之所變怪形真危惡之敗症也若不速治難救急用大青研細末每服一錢五分以好酒調下黑退即愈否則終危此起死回生之方也大青多生溪溝旁葉似火麻葉藥店多假生草藥店有之又有小青葉細性味相同功力稍緩又方鉛粉和鹽炒焦敷之亦效肚腹脹大亮如水晶柚子皮燒灰沖服神效柚子兩廣最多他省頗少以橘紅代之亦可又方取癩蝦蟆六隻將四足扎住以蝦蟆肚皮在人肚腹光亮之處輕輕摩擦幾次再取一癩蝦蟆照前磨擦用至六隻即愈但蝦蟆眉內有蟾酥須防其迸出射人傷眼宜用綢帕遮住病人兩眼蝦蟆用過之後即放水中使吐毒氣以救其命至要至要臍眼出膿此症先流臭水久則出膿不腫不痛多年不愈用韭菜葉扁柏葉二味共槌取汁一酒杯加童便一茶杯蒸熱服外用爐甘石要能浮水者用好醋泡一晝夜瓦上焙乾研末敷如不見效當請名醫治之不可忽也臍中出水龍骨醋泡焙枯研敷或用赤石脂研末敷均效或照上臍中出膿方治之更妙臍眼出血方見諸血門肚腹堅硬臍眼出蟲方見痞疾門肚腹左右生癰即腸癰也須照腸癰方治之肚臍生癰肚臍腫大如瓜臍眼高突者是紅赤者照癰毒各方治之不紅不熱者照癰毒各方治之小腹疽生臍下一寸五分氣海穴或生二寸關元穴或生三寸丹田穴皆由七情火鬱而生也分別紅白陰陽治之小腸疽生小腹內按之如掌堅硬而熱微痛小便多出汗畏寒皮色如常或現微腫脈緊實而有力者是也服犀黃丸見陰疽門即愈此林屋山人祕法也臍下二三寸關元丹田二穴冷結膀胱小腹有形滿痛手足厥冷此厥陰傷寒重症宜用仲景當歸四逆湯治之桂枝當歸各二錢芍藥三錢細辛三分通草一錢五分甘草八分大棗二枚水煎服神效其人有久寒者加吳萸四分生薑一錢酒一小杯兌服腸胃中癢不可忍此火鬱結不散所致用柴胡梔子炒花粉各三錢白芍一兩甘草二錢煎服即愈治疝古方薏苡仁一兩用東方壁土炒黃色入水煮爛放砂盆內研成膏每用無灰酒調服二錢即消痞積凡腹內瘀血凝結疼痛時發時止謂之痞積又有形者為症無形者為瘕又久瘧不愈亦成痞積方見瘧疾門治痞諸方消痞膏治積年惡痞至重貼至兩張即消屢試神驗密陀僧六兩阿魏五錢羌活水紅花子各一兩穿山甲三錢香油一斤八兩火候照常熬膏法膏成時下麝香一錢用布照痞大小攤貼凡患痞癖處肌膚定無毫毛須看準以筆圈記用膏貼之內用水紅花子研末三錢燒酒二斤泡之時飲一杯痞消乃止水紅花子即紅蓼花子以自取為真藥店多假用之不效又方莧菜不拘紅白均可十斤洗去泥不必去根以河水煎湯兩大鉢用活甲魚一個重十二三兩者不必切碎入莧菜湯連骨煮爛如膏去渣將甲魚膏薄攤曬乾研末用麻油八兩熬至滴水成珠下甲魚膏末四兩如甲魚膏不足以鉛粉添配攪勻成膏收之用青布褚紙一層量塊大小攤貼七日即消重者貼至兩次永不再發屢試屢驗又方臭椿樹皮在上中者佳要一大束去粗皮只用白皮二斤切碎入鍋內水熬瀝去渣用文武火熬成膏薄攤布上先以生薑搓出垢膩後以膏藥在錫茶壺烘熱貼痞塊上其初微痛半日後即不痛俟其自落一張即好永不再發貼膏時微撒麝香少許於膏上然後貼之貼上膏藥周圍破壞出水即驗此方已驗多人即脹滿腹硬過臍者貼一二張即愈真神方也珍之重之孕婦忌用又方雄黃白礬各一兩為末麵糊調膏攤布上貼之俟大便脹滿而極多者即愈此祕方也又方香附皂礬各一兩二味拌勻分三分各用紙包外用黃泥裹成團陰乾若有破裂再以泥補之候乾以大炭火煅之自早至晚過夜冷透取中間不焦者去礬只用香附為細末以棗肉為丸如緑豆大每早開水下一丸不忌口輕不過三五服重不過七服即愈病自大便而下煅時忌一切人見並不可聞雞犬聲犯則傷人恐致火災切記腹中陡然堅如鐵石痛如刀割晝夜呼號牛膝三兩用好燒酒十兩泡之緊緊封好熬至二兩飲之吐出惡物神效腹中堅如鐵石臍內出水變作蟲行之狀繞身作咬痛癢難忍掃撥不盡蒼朮煎濃湯洗之並用蒼朮二錢麝香二釐滾水調服婦人血蠱馬鞭草及劉寄奴草煎湯服或為末服此治血蠱神藥也發症好飲清油者是喉中如有蟲上下亦是白馬尿飲一二碗即化或以雄黃末服之即吐出也又方有人腰痛牽心發則氣絶一明醫視之云是發症以油灌之吐出一蟲掛壁上滴盡血水乃一發也又一婦人胸膈脹悶口流涎沫自言心下有聲如雷後用膽礬一分為末溫酒送下吐出一蟲剪斷視之乃一發也又一人患此服膽礬不效後服雄黃五錢清油半碗吐出一蟲而愈米症好食生米者是雞糞糞要白色者佳白米各三錢同炒焦為末煎水服吐出米汁即愈肉症常喜食肉者是白馬尿飲二三碗當吐肉出不吐難治蝨症人好齧蝨致成蝨症用舊梳舊篦一件各破作二分以一分燒研為末以一分煮水調末服即下出此孫真人千金方也蛇症一人隔噎飲食不下華他見之云是蛇症用醋泡大蒜汁陳者佳飲二三碗並多食大蒜後吐一大蛇而愈又方蜈蚣一條瓦上焙枯研末酒服甚效又方如因食蛇肉不消者但揣心腹有蛇形用大黃芒硝合而服之微泄即愈又方白頸蚯蚓搗汁服之龜鱉症腹中如有龜鱉疼痛堅硬或動或不動者用殭蠶末一錢白馬尿一二碗調服並敷痛處神效又方石灰窯中流結土渣色紅而輕者佳菜子油調敷數日即消又方鉛粉四分用黍米煮湯調服大效又方生硫黃末沖酒服時服之又方白母雞一隻先餓一日用豬油炒飯與食取其糞焙乾為末水調服一錢日服三次數日必愈又方生蝦煮食一日二次數日斷根蛟龍症春秋二時蛟龍虺蛇蜥蜴之類遺精入芹菜中人偶食之得病發則似癇面色青黃肚腹脹滿痛不可忍用糯米糖時時服之服至數斤後吐出小蟲即愈若吐蛔蟲勿服又方明雄朴硝各五錢滾水調服泄瀉即愈又方糯米香梗米杏仁乳餅煮粥食日食三次吐蛟龍有兩頭可驗腹脹面黃有人腹脹面黃百藥不效遇一明醫云是石蛔極難醫治取死人棺中枕煮水與服吐出蛔蟲堅如石者數升而愈蟲積寸白蟲積此症面色黃瘦飲食少進發時腹痛口吐清水用尖檳榔一兩廣木香五錢研極細末大人每服五錢小人每服三錢開水調下其蟲即隨大便而出先用煎炒香味令病人聞之然後服藥無不神驗服藥須在月初乃效病重者二三服即愈又方連須老蔥頭搗汁麻油調服或炒蔥頭食能化蟲為水又方棐子七個日服二次服至七日蟲化為水又方鴨蛋一個破一小孔入使君子肉末一錢檳榔末一錢用紙封口蒸熟食之蟲隨大便而出又方小兒科雜治門內羊尿脬方治疳疾最效並治大人蟲疾蛔蟲上出口鼻川椒閉口者不用研末沖水服即愈並用川椒含口中更妙鼓脹附浮腫鼓脹辨證凡患鼓脹隔食愈後必戒殺放生方免復發至要至要手指按之下陷不起者水鼓也隨手即起者氣鼓也周身老黑色皮內有紫黑斑點者血鼓也身大熱如火者難治身發寒熱如瘧者難治四肢發黑者難治腸脹脈大命絶者難治唇口黑暗脾絶者難治缺盆平心絶者難治手足心平腎絶者難治肚臍翻突肺絶者難治背平肝絶者難治瀉後身有青筋起者難治大便滑泄者難治周身有破皮者難治先起於四肢後散於腹者難治先起於腹後散於四肢者易治治水鼓法手按之下陷不起者是雄豬肚一個去淨內穢老絲瓜筋半條土狗子又名螻蛄十個小黑公牛糞一泡紫背浮萍一兩以上各藥共裝肚內以麻線縫好放新砂鍋內加水須用桑紫火煮爛去淨浮油煮好去藥將肚溫水洗淨竹刀切片仍入原湯中再加赤茯苓皮大腹皮生薑皮廣陳皮生桑白皮各三錢甘遂麵包煨綿大戟麵包煨芫花各三錢醋炒用文武火再熬數滾原汁約有一大菜碗將藥去淨豬肚與汁分作二次或三次服下聽其自利其水由大小便出其鼓立消服此之日務須依法嚴忌鹽醬一百二十天為要每日用真秋石可代鹽此治水鼓第一神方不可輕忽水鼓小便不通小便通者亦可治大田螺四個去殼大蒜五個去皮車前子二錢研末共為餅貼臍中以帶縛定水從小便出漸消終身戒食田螺又方商陸根蔥白搗填臍中小便利腫自消又方甘遂末水調塗肚腹周圍另煎生甘草湯服之其腫自消日滿開鹽法鯽魚二斤食鹽三斤共用黃泥包固白炭火煅一周時去泥將魚同鹽研細用此鹽用完再食生鹽方保周身經絡堅固永不復發治氣鼓法按之隨手即起者是雄豬肚一個去穢內裝大癩蝦蟆一個大砂仁一兩研老絲瓜筋半條破爛敗鼓皮手大一塊紫背浮萍一兩炙焦以麻線縫好入新砂鍋內加水用桑柴火煎爛去淨浮油照前治水鼓煮法煮好去藥將肚洗淨竹刀切片仍入原湯中再加真紫油厚朴臺烏各五錢雞心檳榔大腹皮真沉香枳殼醋炒各三錢芫花醋炒綿大戟麵包煨上梅片研細甘遂麵包煨各二錢用文武火再熬數滾原汁約一大菜碗將藥去淨豬肚與湯分作二三次服沉香梅片二味不宜見火臨服時拌肚內食之服後以大便下白沫為驗其鼓即消嚴禁鹽醬一百二十天日滿開鹽亦照前方服之此治氣鼓第一神方不可輕忽又方雞內金一副沉香砂仁各一錢陳香櫞五錢去核共為末每服一錢五分薑湯下神效又方大癩蝦蟆一個砂仁不拘多少為末將砂仁裝蟆內令滿縫口黃泥封固炭火煅紅取出候冷將蟆研末作三服陳皮湯送下以放屁多為效二三服全愈又方蘿蔔子二兩研末再以生蘿蔔搗爛和子絞取汁將砂仁二兩浸汁內一宿撈起曬乾再浸再曬七次為度每服一錢為末米飯調下神效又方薑汁炒遠志五錢水煎服下氣通即愈治血鼓法周身老黑色皮內有紫黑斑點者是雄豬肚一個去穢膩茜草一兩雄雞矢四兩炒焦紫背浮萍一兩老絲瓜筋半條各藥共裝肚內用麻線縫好照前水鼓煮法煮好去藥將肚切片仍入原湯再加螞蝗燒枯存性乾漆三錢煅令煙盡炒虻蟲查藥物備要便知真花藍石研真血竭各三錢紅花降香各五錢甘遂麵包裹煨綿大戟麵包煨芫花醋炒各二錢照前文武火煮好去藥食肚與湯分作二三次服服後以大便下黑水數次為驗其鼓自消嚴禁鹽醬一百二十天滿日開鹽亦照前方服之此治血鼓第一仙方不可輕忽方內螞蝗必不可少俟病愈後照服螞蝗法解之見解救諸毒門各種鼓脹輕粉二錢巴豆四錢去油生硫磺一錢共研成餅先以新綿一片敷臍上次以藥餅當臍按之外用布捆緊如人行五六里自瀉下候三五度除去藥餅以溫粥食之久患者隔日方去藥餅愈後忌飲涼水此方治水鼓如神其餘鼓脹功力稍緩又方凡水鼓氣鼓多食野水鴨最妙又方取蓋屋稻草煎湯傾入盆內先坐盆上熏之待湯溫方洗其腹小便隨下黃水熏洗數次永不再發又方黃牛糞男用雄糞女用雌糞四五月取淨者陰乾微火焙黃為末每用一兩酒三碗煎一碗瀝去糞渣止飲酒三服全愈又方公雞一隻用大麥連喂四五日取下雞糞一升炒黃色好酒一瓶浸雞糞煮作一碗瀝去渣令病人吃一碗少時腹中氣大轉舒作鳴從大便而出其腫漸消如利未盡再服一二次必然盡消如泄利不止用田螺四個酒淬煮吃即以溫粥食之如腫消盡再用腎氣丸六君子湯和平之藥調理可也雞矢善能逐水而又通土性無微不入將所蓄之水盡歸大腸而泄此奪造化之奇誠萬金不傳之方也此治水鼓極效別種鼓脹其功稍遲又方獨頭蒜一歲一個去皮入頂好甜酒六七成對燒酒二三成以酒蓋過蒜為度蒸熟如夏月露一宿又溫熱用冬月乘熱連酒服完從大便出虛氣即下穢物其腫自消一服除根不忌鹽醬真仙方也又方西瓜一個切去頂若是滿穰挖去穰三成以蒜瓣填滿將原頂蓋上放新砂鍋內再用新砂鍋合上蒸熟瓜蒜與湯作二三次食盡全消不忌鹽醬又方雄豬肚一個入大蒜四兩煮爛淡食五六個忌鹽醬醋百日自消奇效又方烏魚二斤一條者去腸淨入皂礬二兩外用粗紙打濕包好入穀殼火內煨午時起子時止取出去紙灰骨只用淨魚皂礬研末收貯每服三錢老米湯下此藥行而不泄最妙又方蘿蔔一枚周圍鑽七孔入巴豆七粒入土種之待其結子取子又種待蘿蔔成仍鑽七孔入巴豆七粒再種如此三次至第四次將開花時連根拔起陰乾收淨瓷器內遇鼓脹時取一枚捶碎煎湯服之重者二枚立愈有心人宜預種之食物積滯腹脹如鼓方見解毒諸毒門食犬馬肉腹脹方內肚腹脹滿飲食如常乃濕熱生蟲之象照蟲疾各方治之十種水腫一清水先從左右肋腫起根在肝大戟為君二赤水先從舌根腫起根在心葶藶子為君三黃水從腰腹腫起根在脾甘遂炒為君四白水從腳腫起根在肺桑白皮為君五黑水從腎囊腫起根在腎連翹為君六玄水從面腫起根在外腎芫花醋炒為君七風水從四肢腫起根在骨澤瀉為君八石水從腎腫起根在膀胱藁本為君九高水從小腹腫起根在小腸巴豆去油皮為君十氣水或盛或衰起根在腹紅飯豆為君有十般腫病各有根源看十種病根除將君藥加倍用餘九味即以上各藥等分研末蜜丸梧子大用赤茯苓煎湯吞三丸不拘時每日三服愈後再用肉桂乾薑肉豆蔻赤茯苓莪朮醋煮川芎桔梗各等分為末每服三錢空心開水下每日早午晚各一次百發百中功效非常又方七星魚又名柴魚加蔥與冬瓜皮煮食立消又方青頭雄雞煮湯飲之或煮粥飲之厚蓋被睡臥取汗上腫者方宜汗即愈通身浮腫取活癩蝦蟆一隻以巴豆七粒用紙包好納入口中用繩吊在有風無日之處陰乾剖開去紙將頭足分為五起肝腸亦分為五起配勻收入瓷瓶勿使泄氣臨用取出焙枯研末沖酒服從頭吃起病從頭消從前兩足吃起病從兩手消從兩後足吃起病從兩足消或不必分開亦可輕者一二日消盡重者五日全消終身忌食蝦蟆此治浮腫祕傳第一神方也珍之寶之忌鹽醬一百二十日各種鼓脹亦可治又方活鯉魚一條重七八兩去鱗將肚剖開去腸淨入好緑礬五分松羅茶三錢男子用蒜八瓣婦人用蒜七瓣共入魚腹內放瓷器中蒸熟令病人吃魚連茶蒜食更妙從頭吃起病從頭上消從尾上吃起即從腳上消其效無比又方一童子年十一手足臂腿及指頭面遍身浮腫數日後漸至沉重氣喘不眠用黃皮柑子一個同甜酒釀二斤煮至將干去柑內核取柑連酒食之二次全愈此林屋山人經驗方也病後浮腫老鴨加真川厚朴二錢蒸食連食三隻即愈神效體虛者勿服又方蝦蟆又名田雞水雞五隻或用七隻男單婦雙去皮並去頭與腸雜不去肝先入碗內蒸熟再入瓦罐內加水半小碗煮融加陳酒一杯再煮先食湯後食蝦蟆不用鹽醬連食數次必愈永戒食蝦蟆有人病後腿膝皆腫至夜更甚服此而愈脅部兩肋之下為脅愚人多有以肩胛下為脅者不可不知左脅有聲作疼常吐酸水有人寫字作事身常向左夜愛飲酒睡亦向左飲食多墜左邊久則左脅下有聲作痛數日必嘔酸水一次每遇暑天右邊有汗左邊無汗百端醫治二十年不愈後用蒼朮一斤淘米水泡三日去皮研末芝麻五錢用水二錢研汁大棗五十枚去皮核共搗為丸梧子大每日空心溫水送五十丸漸加一二百丸忌食桃李雀肉服至三月全愈初服時如覺熱燥用梔子煎水送下久服自不燥矣左脅鬱氣疼痛加味逍遙散柴胡白朮白芍當歸雲苓各一錢五分丹皮梔仁各一錢薄荷五分水煎服神效怒氣動肝寒熱旬日左脅凝聚作痛難以舒轉此絡脈瘀痹宜通血絡桃仁去皮尖鬱金各八分歸鬚五加皮澤蘭丹皮新絳各一錢旋覆花二錢青蔥管三寸水煎服左脅作痛柴胡疏肝散柴胡枳殼川芎香附各一錢五分陳皮白芍甘草各七分水煎服右脅有形攻心作痛嘔吐清涎周身寒凜痛止則無形跡此寒入絡脈氣寒阻逆宜辛香溫通川楝子酒炒一錢半夏薑汁炒延胡索各一錢吳萸三分泡淡鹽水炒良薑蒲黃各八分雲苓二錢畢茇一錢水煎服右脅脹痛不食推氣散薑黃枳殼各一錢五分肉桂甘草各七分水煎服肝燥脅痛或皮膚起泡脹痛亦是大栝蔞一個連皮搗爛甘草二錢紅花七分水煎服經云損其肝者緩其中栝蔞甘緩而潤於郁不逆此所以奏功如神也兩脅不時作痛肺癰亦兩脅作痛應與肺部參看白芥子五錢炒研末白滾水下無論痛在左右雖年老虛弱百藥不效者三服除根或照哮吼門第一方治之亦妙又方枳殼甘草炙各等分為末每服二錢以鹽白湯調下極效又方小茴香一兩炒枳殼五錢麵炒共為末每服二錢鹽酒調服立效脅痛連腰脊不能轉側六味地黃丸見內外備用諸方加杜仲續斷或煎服或作丸服如不見效用八味地黃丸見同前加小茴自愈脅痛腸出臭穢好醋煮熱洗腸雖腸出數日必入用真臺黨枸杞各五錢濃煎湯淋之皮自合口以羊腰煮粥食之十日即愈脅下生瘡紅腫者照癰毒治色白平塌者照陰疽治脅下漏瘡形如牛眼膿水不止用鹽少許放白牛耳內然後取牛耳中垢以敷瘡上即愈如不用鹽則牛耳不癢其垢難取或分別紅白照癰毒陰疽各方治之兩脅脹滿炒鹽布裹尉之背部發背治法參看癰毒陰疽各門發背乃癰疽中大患緣其患位對心對肺對臍故也偏曰搭手用手可搭而名紅腫痛甚者應稱背癰易治如患色白腫痛者當以流注法治如平塌不痛者當以陰疽法治此皆陰發背也如誤服寒劑誤敷涼藥誤貼涼膏定然毒攻內腑不救此林屋山人祕法也背癰諸方牛皮膠四兩蒸化好酒兌服不飲酒者滾水兌服初起服此毒不內攻不傳惡症又方未成者用活癩蝦蟆一個系放瘡上半日蝦蟆受毒必死取放水中吐出毒氣復活再換一個仍如前法換至三四個後則毒散矣屢試極效若勢重者以活癩蝦蟆一個或二三個破開連肚乘熱合瘡上不久必臭不可聞再換二三次即愈並治一切癰毒屢試如神終身戒食蝦蟆又方芝麻油一斤黃丹八兩飛宮粉一兩槐枝數寸頭髮一團洗淨鏽釘五七個洗淨土銅緑五錢將油燒滾入釘熬數滾去釘入槐枝熬枯去之入發熬焦又去之入丹粉銅緑熬成膏置水中隔夜取出貼之其效如神百無一失又方栝蔞五枚取子去殼真乳香五塊如棗大者共研細末以白蜜一斤同熬成膏每服三錢溫黃酒化服桐廬一人因母患背癰百藥不效後夢呂仙授此方服之而愈背熱如火此虛火也生附子研末口水調敷兩足心腰部腎虛腰痛壯本丹凡腎虛腰痛久則寒冷此藥壯精骨補元陽利大小便養丹田攻效甚大肉蓯蓉酒洗焙乾杜仲酒洗巴戟酒浸去皮青鹽以上各五錢煅核桃又名胡桃破故紙鹽炒小茴香各一錢共為末用豬腰子一對剖開去白膜入藥在內扎住再用麵包緊入火內燒熟去藥與面每服一個酒送下又方羊腰一對去白筋切片以鹽醃去腥水入杜仲三錢蒸服酒下或用荷葉包火中煨食亦可又方豬腰子破開去白筋入小茴香末三錢扎緊麵包煨熟去油與面食之甚效又方豬腰一對洗淨破開去白筋真茯苓二錢切片夾入蒸出自然汁不用放水連腰食盡其效如神又方白扁豆根洗淨不拘多少酒煮服立驗並可斷根腎虛腰痛腳軟板栗要扁的布袋裝好掛有風處陰乾一日翻動數次方免干壞每早取七個細細嚼食再以豬腰子煮粥食之必強健又方杜仲一兩半水半酒煎大盞服之三日能行七日全愈又方七制固脂丸見內外備用諸方門服之神效無比閃跌毆打腰痛三仙散羅裙帶葉葉長二尺余花梗長二三尺不等花如龍爪四圍下垂又名龍爪花與金針花相似而略大顏色或紅或白杉木皮槐樹皮各等分煎水熱洗其渣搗融炒熱布包敷之冷則隨換日夜不斷有人閃跌傷腰筋已結縮成團多年不愈以此敷洗筋即舒散數次平復又方生軍散先以蔥白搗爛炒熱將痛處擦遍隨以生大黃研末薑汁調敷蓋以粗紙一日一換儘量飲以好酒三日即愈年餘不愈者皆極神效並治閃跌內傷肩挑重物受傷初時不覺日久忽然疼痛浮面按之不痛或咳嗽牽扯作痛三五年不愈者用此亦效又方真硼砂研極細用燈心點眼睛四角淚出即松連點三次全愈又方真橙子核一錢五分制香附一錢炒研為末酒服三錢極效又方白蘿蔔幹一兩用好酒煎服至重者兩服全愈脾濕腰痛腰痛人皆以為腎之病也不知非腎乃脾濕之故腰間如系重物法當去腰臍之濕則腰痛自除白朮二兩薏苡仁一兩五錢水三碗煎湯一碗一氣飲之一服病即如失多以二劑為止此方不治腎而正所以治腎也腰腿風濕冷痛當歸熟地白芍牛膝石斛茯苓各一錢川芎木瓜肉桂防風獨活各五分木香炙草各三分姜一片水煎兌酒服雖年久不愈亦效又方吳茱萸一茶杯研末以黃酒一杯拌勻炒熱攤油紙上敷患處用布捆好立時止痛如冷再炒再熬男婦腰痛如刺面腫面黑氣血虛憊發落齒枯涕睡痰涎腰脊痛不能行鹿角四兩銼屑炒黃為末酒下二錢加牛膝為丸更效或用七制固脂丸見內外備用諸方方可斷根各種腰痛當歸紅花牛膝各一錢威靈仙五分生桃仁七粒水一碗煎好加黃醋一碗服下即愈又方絲瓜根又名水瓜又名線瓜燒灰存性每服二錢酒下雖痛不可忍者可以立止又方刀豆殼燒灰沖酒服極效神驗纏腰丹方見癰毒諸症門腰痛牽心氣絶欲死方見痞疾門發症方
