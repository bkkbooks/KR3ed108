body:
  text: 卷六前陰前陰前陰前陰前陰前陰前陰男女交合精脫氣絶男女交感樂極精脫而死切不可驚走下床男脫則女以口哺送其熱氣女脫則男以口哺送其熱氣一連數十口呵之則必悠悠然陽氣重回矣再以人參附子湯灌之送氣之法先須閉口提丹田之氣上來盡力哺於口中送於喉去可救垂絶於俄頃若貧者不能得參急用黃耆四兩當歸二兩附子五錢水煎服亦有生者又方用人抱起坐之以人之口氣呵其口又恐不能入喉急以筆管通其兩頭入病人喉內使女子呵之不必皆妻妾也凡婦人皆可盡力呵之雖死去亦生陽萎陽物軟而不舉者是千口一杯飲此方專治陽萎不舉一杯作二三百口緩緩飲之能生精養血益氣安神其功不可盡述高麗參好黨參亦可熟地枸杞各五錢沙苑蒺藜淫羊藿母丁香各三錢遠志去心沉香各一錢荔枝肉七個上藥浸上好燒酒二斤三日後蒸三炷香久取起浸冷水中拔出火氣過二十一日飲之又方麻雀又名瓦雀肉冬月煮食功能起陽生子其效無窮或用麻雀蛋煮食更為神妙又方新鳳仙花子即指甲花子又名急性子研末三錢鴉片煙二錢蟾酥八分真麝香二分此味俟做丸時加入共為一大丸外用蔥白捶爛包裹再加紙一二層用水泡濕放炭火中煨熱換紙再煨煨至七次去蔥紙將藥改為小丸如緑豆大每於將睡先一二時取二丸用酒化開敷陽頭上半時俟陽物舉起將藥洗去然後行事堅而且久並能種子其效如神屢試屢驗又方大附子一個重一兩五六錢者鴉片煙五分硫黃末二錢穿山甲二片炙黃研末將附子挖空以各藥納入用好酒半斤和附子用文武火煮乾取出搗爛如膏先用麝香三釐放臍眼再將此膏貼上應驗無比文火者微火也武火者烈火也又方母豬腹內子腸新瓦上焙乾為末每服一錢燒酒送下可管一月又方蜂窠新瓦上焙枯為末新汲水調服一二錢終夜不倒極效陽舉易泄有人交合之初陽舉即泄百治不效後用大蚯蚓又名曲蟺要韭菜地內者十一條破開長流水洗淨加韭菜汁搗融滾酒沖服日服一次服至數日即能久戰可望生子陽物挺脹甘草梢二兩小黑豆半斤煎濃湯服陽物堅硬精自流出捏之則脆痛如針刺此名腎漏又名妒精或云生楊梅瘡多有此症用固脂韭菜子各一錢五分黃柏五分煎服若不見效照後強中方治之癆病火動陽物易舉皮硝放手心兩手合住其硝自化陽物即不舉矣以燒酒和泥敷陰毛上陽即復舉總之陽舉則相火妄動其病難愈必致貪色亡身不如不舉安心靜養為妙保生惜命者宜加意焉陽強不倒精自流出此名強中乃陽盛實熱不急治必發大癰難治用生地黃柏知母龍骨大黃枳殼各一錢水煎服若胃虛食少者則用黃柏甘草砂仁各一錢水煎服老人腎硬老人腎臟虛寒內腎結硬雖服補藥不入用羊腰子一對杜仲一片長二寸寬一寸煮熟空心食之腎自柔軟再用補藥調理陽物被捆腫大一小兒被人用頭髮繫住龜頭少時氣閉腫大無法可解後將小兒坐冷水中即刻縮小去發即愈飛絲纏繞陽物腫痛不已威靈仙二兩煎濃汁泡洗即愈陽物縮入方見卷十四傷寒門陰症傷寒內陽物割斷凡陽物割斷傷口不合急用所割陽物焙枯研末用酒沖服立效陰頭生瘡名下疳爐甘石一兩火煅醋淬再煅再淬五次兒茶三錢共研末香油調敷立愈又方婦人月經布燒灰候冷麻油調敷百發百中或加頂上冰片少許更妙又方先用甘草銀花蔥頭煎湯洗淨用生橄欖核一個無則用鹽橄欖核煮淨鹽味亦可燒存性頂上梅花冰片一分共為細末麻油調塗雖臭爛不堪敷之即愈屢試如神又方大訶子燒灰為末入麝香少許先用荊芥黃柏甘草蔥白煎湯洗淨然後敷之然爛至一二寸用此亦妙並查癰毒門楊梅瘡方內服湯藥為妙又方銀青散見癰毒諸方敷之神效又方鱉甲燒灰敷百藥不效者用此如神又方五倍子研末絲瓜搗爛包敷雖腐爛不堪者亦效陰毛生八腳蝨白果嚼融擦之神效或用桃仁嚼融擦之亦可腎氣由臍下上衝心痛小便不通此名心疝用韭菜汁和五苓散見內外備用諸方藥末以小茴香煎湯沖服又方真雲苓小茴香各四兩共研末水為丸梧子大每服三錢開水下服完即愈其效如神小腹有塊直衝心胸叫號疼痛止覺筋硬此名橫梁疝最難醫治婦人患此最多用補骨脂一斤黑芝麻二兩拌炒篩去芝麻只將補骨脂磨末忌鐵器以酒為丸每服三錢開水送下或照後絲瓜方及丹溪方更妙小腸氣痛腎子腫脹偏墜名曰疝氣用老絲瓜又名水瓜又名線瓜瓦上焙枯研末熱酒沖服重者不過三服即愈雖氣痛衝心亦效又方凡疝初起必發寒熱疼痛欲成囊癰者用新鮮地骨皮即枸杞子根生薑各四兩共搗如泥用綢包於囊上其癢異常一夕即消永不再發又方陳皮荔枝核炒焦硫黃火中熔化即投水中去火毒各等分共研末飯為丸如梧子大每服十四五丸空心服酒下其疼立止痛甚者加五六丸不可再多雖氣痛衝心三四服可以斷根此丹溪方也又方槐子一兩炒為末入鹽三分空心熱酒送下腫消痛止又方雄黃五分飛淨為細末薑湯下止痛如神又方將兩腳第二趾對捆一處用豆大艾火從第二腳趾頭上合縫處燒之立愈或在足大趾外邊甲縫內中間不上不下之處燒之亦可男左女右又方左腳里側螺螄骨上排起四指三陰交穴艾火燒七次止痛如神並可除根又方旱蓮草五錢又名墨頭墨斗墨東酒煮服不論老少久近皆效又方栗炭燒紅放碗內加好燒酒半碗以碗蓋住飲之雖痛不可忍亦可立止又方病在左用荔枝核一歲一粒新瓦上焙枯研末空心好酒沖服病在右用小茴香五錢鹽水炒研末空心服一日兩次甚效又方荔枝核四兩鹽水浸炒小茴香一兩鹽水炒同研極細加紅白二糖拌勻為丸如梧子大每服五錢一日三次四劑後即可斷根又方榖樹葉三月三日或五月五日採取線穿陰乾要擇如雲板式者每用四錢煎湯服服後即時小解一二次立愈輕者一服重者兩服全愈神效榖樹又名楮樹又名構樹又名榖皮樹又方苦楮樹葉半斤煮滾放壇內先熏後洗每日數次其效甚速又方生石菖蒲柑子葉小茴香各一兩搗極融爛置酒壺內加開水一碗將壺入鍋內隔水燙滾於患處隔衣頻頻尉之止痛如神又方青礬三錢滾水送下立止三服除根又方葫蘆巴子一兩鐵鍋內炒黑研末每服三錢滾酒送下出微汗即消又方萆麻子七粒和飯搗為丸敷腳心左痛敷左右痛敷右雙痛雙敷又方黨參三錢當歸酒洗炙耆各二錢川芎川楝小茴橘核荔核各一錢附子肉桂去皮作二三次沖服川椒各五分赤芍一錢五分服一二劑左邊偏墜而不痛者效驗之至又方蕎麥麵四兩葫蘆巴四兩酒浸曬乾勿炒小茴香一兩炒共磨為末酒糊為丸如梧子大每服一錢空心鹽湯下一日三次服至一月大便必有濕熱之物如膿者乃可斷根又方凡患偏墜如服荔枝核小茴香等藥不效者此熱症也取芙蓉花根去心用皮搗極融爛加大黃末敷患處二三日必愈神效腎子作痛外現紅色而不升上此名子癰遲則成功潰爛致命其未成膿時用枳橘一個川楝秦艽陳皮赤芍甘草防風澤瀉各一錢五分一服即愈此林屋山人經驗方也㿗疝重墜囊大如斗薏苡仁四兩陳壁土炒水煮為膏數服即消此一道人祕方也疝氣腫脹如斗若破爛腎子落出有方見後沉香紫蘇蘇木南星各五錢老香櫞一個切碎雄豬尿泡一個洗淨將藥入尿泡內好酒四五斤煮爛搗為丸梧子大酒送下四五十丸藥盡全愈又方照上薏苡仁陳壁土方治之最妙腎囊腫大如斗痛不可忍雄黃白礬各二兩甘草一兩煎水時時泡洗即愈陰囊奇癢不止名腎囊風又名繡球風已破者為腎囊癰用閹過公豬肉四兩取豬生腎囊之處更妙胡椒十粒煎湯洗之一日數次數日即愈屢試如神此仙方也又方包鹽蒲包一塊周圍約一二尺寬水洗之洗畢將水存留燉熱再洗一日數次三日即愈有人患此二十餘年洗至三日斷根蒲包取有鹽滷者方效又方新荷葉一張連須蔥頭七個煎湯先熏後洗屢試神驗又方茄子一枚連根葉煎湯熏洗一周時説殼如舊甚驗陰囊陽物肛門瘙癢難忍陳葫蘆燒灰性搽摻患處立愈又方銀青散見癰毒諸方最為神效陰囊腫如水晶腎子腫大潮濕照上疝氣腫大如斗各方治之亦妙灶心土研碎炒熱鋪凳上再以川椒小茴香研末撒在上面將陰囊熏蕩冷則再炒三次即愈又方棉花子煎湯洗之即愈又方橄欖核七個燒枯研末土茯苓少許研末加冰片和勻以紗袋盛之先用土茯苓銀花煎水洗過再用前藥裝入布袋撲之隨撲隨愈陰囊忽然腫大多因坐地所受風濕或蟲蚊吹著所致蟬蛻五錢水煎洗腫處二三次即愈又方真硼砂煎水熏洗數次立愈又方明雄研末頂好燒酒調敷或用老鴨子口中涎水搽數次即愈或用鴨血亦可又方雄黃枯礬茶調敷隨敷隨效陰囊撲損瘀血積滯有時疼痛此名血疝臨睡時自以一手挽其下一手按其上由輕至重磨弄百回一月之間瘀血盡散滯氣皆行雖年深月久不藥亦愈誠妙術也陰囊腫爛腎子落出此名囊脫又名囊癰用紫蘇煎湯日日洗之並用紫蘇葉梗為末日敷用青荷葉包好內用黃連六分歸尾連翹雲苓各一錢五分甘草木通各一錢煎服一人陰囊形大如斗被一人治破爛見腎子如鵝蛋大旁有一筋六七寸長腎子落出臭不可聞用紫蘇湯洗淨筋即爛下問其腎子小便小肚皆不痛痛則難治照上各法治之數日後腎子收上爛孔收小內服地黃湯外敷生肌散而愈此林屋山人經驗方也又方鳳仙花子生甘草各二錢為末麻油調敷即生肌又方有人腎囊破爛露出腎子百藥不效後用老母雞蒸食而愈下部濕瘡馬齒莧四兩研爛入青黛一兩和塗則熱痛皆去仍服八珍散即愈謹戒酒與發物犯之必作腸風內痔則難治也又方銀青散見癰毒諸方敷之最為神效前後陰之間生瘡此名懸癰方見海底部小便參看大便門小便不通小便不爽及小便出血白濁均見後淋症門此症寒熱虛實不同治無一定每用一方俟過一二時不效方可另治不得性急亂投自誤豬尿脬一個用鵝毛管插入尿脬孔內線扎定用口吹氣脹滿以手按住管口將管口插在小便孔上用手捻氣透入孔中小便即出諸藥不通者此法最妙婦人更效又方甘遂末水調敷臍下一寸三分內以甘草節煎湯飲之又方半夏末加麝香少許填臍中上用蔥白田螺二味搗成餅封臍上用布捆定下用皂角燒煙燻入陰中自通婦女用皂角煎湯洗陰戶內又方食鹽炒熱填臍眼上用艾火燒五次即通又方用乾麵做一圈子高寸許放臍眼上以蔥管裝麝香直安臍中圈內以鹽填滿用艾一小團安蔥頂上燒之或三四次或五七次即通此法極妙又方獨頭大蒜一個梔子七個加鹽少許搗爛塗紙上貼臍下一寸三分良久即通如不通再塗陰囊上甚效又方白鳳仙花連根葉熬水乘熱洗腎囊陽物及兩胯內即通又方韭白煎濃汁洗臍下一寸三分即通又方鯽魚一條搗爛用少許擦臍內及臍下一寸三分即解又方烏桕樹葉搗融貼臍下重者用根煎湯服其效如神並下水腫不可多服又方豬膽一個留汁以陽物插入膽中少頃汁入自通如婦人以膽汁滴入陰中又方公鼠糞兩頭尖者是研末酒調敷臍下一寸三分又方田螺一枚鹽半匙生搗敷臍下一寸三分雖腹脹如鼓可通又方蝸牛查藥物備要便知搗貼臍下一寸三分以手摩之加麝香少許更妙又方鳳眼草即臭梧桐子皂角四兩共煎五七沸加麝香少許衝入瓷瓶內將陽物入瓶內熏半炷香久藥氣入竅即通腹脹如鼓百藥不效者此法最妙又方紫蘇煎湯入木盆內坐上熏蒸外用鹽炒敷臍下一寸三分又方皮硝不拘多少炒熱用布托臍上將皮硝放在布上敷之再以熱水滴三五滴即通又方蜣螂散見大便門大小便不通方治之最效又方陳棕瓦上焙存性以水酒服二錢即通屢試屢驗又方如臍腹痛急者生牛蒡葉汁生地黃汁兩合和勻入蜜兩合每用一合入水半盞煎三五滾調滑石末一錢服又方牛膝二錢車前子一錢同研末水煎空心服又方芹菜一把搗融新白布包紐出汁蒸熟溫服即通忌鐵器又方火硝生研為末每服一二錢小麥煎湯調服因寒閉結不通者最效又方凡小便不通百藥不效者用後淋症門內增補石淋沙淋妙方必有奇效又方舊草帽預洗淨煎湯飲之立效蔥頭煎湯飲之亦效又方有人小便不通百藥不驗一夕夢神命以蛄螻又名土狗燒灰酒服即通按此濕熱蘊結以濕熱攻濕熱借其竄利下行之性耳又方桐子方見大便門治之最妙又方有種氣閉小便不通醫家往往以澤瀉木通車前豬苓等藥全無一效惟用白歸身一兩川芎五錢柴胡升麻各二錢五分水二碗煎八分一服即通曾救多人孕婦及老年之人加高麗參一錢此林屋山人祕方也口渴小便不通生地二錢元參一錢五分麥冬木通黃芩葶藶桑白皮天花粉地骨皮以上各一錢煎服甚效小便不通遍身水腫欲死青布十七層貼臍下用滾燒酒一大壺尉之又方公豬後腿淨瘦肉三斤去皮油肥肉切薄片將鍋用灰擦洗極淨燒紅放肉和酒炒乾加酒再炒如此七次候用先將老米炒黃煎湯送肉食之小便即通腫亦隨消神效之至夫婦交合忍精不放及強忍小便以致不通或婦女轉胞小便閉塞用上小便不通一二三四方均效第一方更妙又方如強忍不通及通後有血點滴出者用尖檳榔煎濃汁沖白蜜服神效心熱如火熱便入小腸大小便不快有婦人心熱如火一熱便入小腸急去小便而大便亦隨之而出不甚爽快困苦三年百治不效其脈滑數此相火送入小腸經絡後用川芎當歸白芍生地黃柏炒小茴木香煎服四劑而愈小便不通腎氣上衝心痛此名心疝治法見前陰門小便白如米汁此心脾不調小便在地片刻白如米汁腎氣渾濁故也用真川朴一兩薑製真茯苓一錢水酒各一碗煎服不飲酒者水煎服極效小便短澀渾濁大便多而溏不思飲食此傷食惡食也生益智一錢五分廣皮山楂炒澤瀉各一錢真茯苓白芍炒各一錢水煎數服而愈其效如神小便過多此脬氣不足用益智仁鹽炒烏藥各等分為末酒煮山藥為丸如梧子大每服七十丸空心淡鹽湯下各縮泉丸或用益智仁二十四粒鹽水炒煎服亦效又方夜間尿多懶於起動者臨睡服核桃數個甚效又方萆薢一兩水泡透用鹽五錢炒去鹽將萆薢為末每用二錢滾開水沖服並用蔥湯日洗糞門數次即愈雖小便多莖內痛不可忍者亦極效驗或用萆薢一斤為末酒調為丸如梧子大每服七十丸亦可夜睡遺尿夜間遺尿於床不論大人小兒用白紙一張鋪席下俟遺尿於上取紙曬乾燒灰酒服即愈不愈如法再服一次無不神效此祕方也又方大甘草頭煎湯夜夜飲之自愈或用固脂鹽水泡一夜曬乾研末臨睡服五分開水送下甚效小便出血血出如小便者是若血如點滴者為血淋須照後血淋門治之當歸一兩酒煎服雖尿血頭痛難忍效驗如神此林屋山人經驗方也又方蘿蔔葉搗汁加好墨少許飲之甚效又方真柿餅三個研末米湯調服又方茅草根三錢車前子一錢煎湯調發灰服或用茅草根一味煎水當茶飲亦可又方黑豆一升炒黑研末熱酒淋之去渣空心飲極效又方萵苣菜搗敷臍上小兒小便出血如一歲小兒者用大甘草一兩二錢水六碗煎至二碗一日服盡即愈小便出糞大便出尿此名陰陽易病又曰交腸輕者不治而愈重者肚腹裡急後重或至膝脛及陰中拘急熱氣衝胸頭重眼花等症宜用褲襠近陰處者佳燒灰開水沖服日服二三次陰頭微腫則愈男用女褲女用男褲童女尤佳淋症看小便門淋有五種勞淋氣淋熱淋血淋石淋是也勞淋氣淋屬虛熱淋屬熱血淋有虛有熱石淋或因熱起或因虛起久而成砂石者也勞淋勞傷虛損小便不出小腹急痛尿出白汁一點一滴者是玉鎖丹見後遺精門服之最效又方牛膝一兩乳香一錢酒煮溫服水煮亦可諸藥不效痛不可忍連服數劑其效如神血淋更效如有夢遺失精之症則不可用又方核桃又名胡桃連殼用黃泥包裹用小火將黃泥燒至黑色取淨肉有油者不用研末早晚用鹽開水空心送下三錢三日即愈甚效氣淋小腹急滿小便欲解不出解後常有點滴者是治法與上勞淋同又方甘蔗上青草梢一兩酒煮服三日全愈極效熱淋小便熱而赤短而澀臍下急痛者是滑石六錢甘草末一錢水沖服日服數次三日即愈又前小便不通門內豬腸田螺蝸牛蚯蚓各方均解熱毒皆可服之極有功效血淋小便內有血點或血條者是淡豆豉五錢煎服雖痛不可忍者無不奇效或用勞淋牛膝方亦效又方浮小麥加童便炒研細末以砂糖調服五錢一服即愈又方頭髮燒灰生藕汁調服二錢三日即愈極效或用生藕節搗爛酒沖服亦可又方尖檳榔煎濃汁加白蜂蜜沖服神效又方熱淋石淋各方及小便出血各方均可酌用石淋後有增補諸方又名沙淋小腹急脹莖內痛如刀割苦楚萬狀尿如沙石者是瓦松即瓦上無根草煎濃湯乘熱熏洗小腹約兩時即通又方銀硝入鍋內隔紙炒至紙焦為度研細用溫水沖化每服二錢再加滑石二錢水調服神效無比此藥能化七十二種石塊為治五淋要藥石淋尤效又方核桃肉又名胡桃煮粥多食甚效或服七制固脂丸見備用諸方門更妙又方牛角燒灰酒服二錢日服五次奇效又方生蔥頭同生鹽搗融敷肚臍上其砂自出又方古銅錢煮水服兼治氣淋又方田螺一個連殼搗融熱酒沖服即通又方雞糞取白色者曬乾炒為末開水服二錢日服二次甚效又方童男發燒灰每服一錢井水下又方玉米又名包穀根葉煎水時時飲之亦效此症須忌食鹽方易見效不忌則難愈也五淋通治好銀硝研每服二錢勞淋用葵花子煎湯調化服血淋熱淋冷水調化服氣淋木通煎水調化服石淋服法見前又方本門內甘蔗上青草梢及尖檳榔兩方可以通用牛膝方更為奇妙又方小便不通門外治數方亦可通用又方蘿蔔切片用白蜜泡半刻瓦上焙乾再泡再焙連制三次不可過焦用鹽開水細細嚼服日服數次甚效又方葵花根水煎數滾即服不可久煮其效如神又方家麻根五錢水煎服即通大妙五淋痛不可忍日久不愈生天門冬捶汁半盞服之即愈又方冬瓜加淡豆豉煮食一日三五次七日必愈陽物堅硬精流不止痛如針刺治法見前陰門老人精敗淋痛少年不可用八味丸見內外備用諸方加牛膝車前服之如神小兒淋症一日百餘次大蒜淡豆豉蒸麵餅等分和搗融為丸梧子大每服三四十丸三日必愈增補石淋沙淋妙方一切淋症屬虛者並小便不利皆治白豆蔻連殼砂仁去殼白胡椒真川椒不真不效以上四味各等分共研末每用一二錢入小布袋內以好汾酒頂上燒酒亦可熬極滾熱衝入布袋套上陽頭蓋衣熏之藥冷再衝滾酒再熏一日數次三日必愈熏後陽物及腎囊稍覺辣痛熱水洗淨自安一人因騎馬受熱而得淋症日久變成砂淋痛不可忍九月不愈後用此方治之三日斷根屢試神驗砂淋本系熱症初起似不宜此熱藥久則雖熱亦虛非此不能愈也遺精遺精諸方加減地黃湯熟地六兩山萸肉真山藥各四兩芡實丹皮雲苓各二兩蓮鬚一兩龍骨生研水飛淨三錢魚鰾四兩蛤粉炒成珠共研末蜜為丸如梧子大每日早晚服三四錢一月即止屢試如神功在諸方之上此林屋山人經驗祕法也益腎湯夢遺人以為心氣之虛不知非心也蓋腎水耗竭上不能通於心中不能潤於脾下不能滋於腎故相火上灼有燥脾土以致玉關不閉無夢且遺徒責之夢中冤業誰任其咎法當大劑補腎而少佐以補心益肝益脾之品自然漸漸成功不止而止也熟地一兩萸肉四錢茯苓茯神當歸白芍各二錢白朮土炒薏仁生棗仁各五錢北五味白芥子各一錢肉桂黃連各三錢水煎服一劑即止夢遺十劑全愈此方妙在心肝腎脾肺五臟兼補不但止其遺安其夢尤妙在黃連肉桂同用使心腎兩安自然魂魄安而精竅閉若不補其五臟而惟止澀之則精愈旺而夢益動久則不須夢而自遺矣此方之所以奇妙而入神也保精湯遺久則玉關不閉精盡而亡世人往往用澀精之藥所以不救倘於未曾太甚之時大用補精補氣何至於此芡實真山藥各一兩蓮子五錢茯神二錢炒棗仁三錢臺黨一兩水煎服先將湯藥飲之後加白糖五錢拌勻連渣同服每日如此不須十日即止夢不遺也方中藥味平平淡而不厭收功獨神者蓋芡實山藥固精添髓蓮子清心止夢茯神棗仁安神利水得人參以運用於無為不必止夢而夢自無不必止精而精自斷又何致玉關不閉至於夭亡哉玉鎖丹治腎經虛損心氣不足思慮太多真陽不固溺有餘瀝小便白濁如膏夢中頻遺骨節拘痛面黑飢瘦盜汗虛煩食減乏力此方性溫不熱極有神效五倍子一斤白茯苓四兩龍骨二兩為末水糊丸梧子大每服七十丸食前用鹽湯送下一日三服豬肚丸專治夢遺及肌肉消瘦服之遺止發胖神效莫測白朮八兩飯上蒸熟苦參六兩酒浸酒七次牡蠣八兩煅過水飛用雄豬肚三個洗淨煮爛搗如泥為丸梧子大每日服二次每服三錢疹後遺濁凡人病發疹時觸受穢氣病愈之後遂變遺濁不分晝夜合目則遺諸醫或補或利或澀或用升提等法毫不一效此方服之而愈屢試如神木賊川芎各五錢粉葛一兩蛇蛻二寸半新瓦焙枯挂壁尖五錢取米店內佳共研細末好酒為丸每服三錢開水下以酒送之服一料即止蓋疹發觸穢風毒遏抑不透仍用透解之法故效耳
