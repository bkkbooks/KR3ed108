body:
  text: 卷七後陰截腸怪病大腸頭出寸余痛苦難忍干則自落又出名曰截腸腸盡則不治初截時用盆盛真芝麻油坐入浸之另飲火麻仁汁數升而愈大腸蟲出不斷鶴蝨末五錢調水服自愈肛門生瘡肛門主肺肺熱即肛塞腫縮生瘡好白蜜一斤豬膽一枚取汁和勻微火煎乾作丸三寸長候冷塗油納入肛門臥下少時必裡急後重通泄而愈又方雞內金即雞肫皮燒存性為末干敷其效如神又方枳殼炒槐角各三錢黃芩生地各二錢川連錢半穿山甲蒲黃殭蠶各一錢分作二帖煎服蟲食肛門蟲食糞門肛破腸穿痛癢無時旁生孔竅用蜣螂又名推車蟲蟲名推屎蟲七枚新牛糞五錢肥羊肉一兩燒黃同搗成膏為丸如蓮子大烘熱綿裹納肛門中半日大便中即有蟲出數次即愈又方癩蝦蟆一個雞骨二分燒灰敷之大效終身忌食蝦蟆糞門形如風癬作癢破流黃水浸淫遍體當歸五錢巴豆去殼三錢用香油熬枯瀝盡藥渣入黃蠟三兩化盡離火再入輕粉二錢攪勻搽之神效又方銀青散見癰毒諸方門敷之最妙肛門奇癢難受蛇床子苦楝樹根各三錢防風二錢生甘草一錢皂角五分共為細末煉蜜成條塞糞門聽其自化一二次即止癢而愈真神方也幼時被人戲弄致有此疾者尤為效驗大便小便不通外治各方凡大便閉結無論虛熱皆可通用大便虛閉連須蔥頭三個薑一塊鹽一錢豆豉十餘粒搗作餅烘熱敷臍中捆定良久氣通即愈不通再敷必效又方食鹽炒熱填臍眼艾火燒五次即通又方凡大便不通多因寒熱不清用老薑寸許如指頭大加紙包裹火內煨熱取出蘸麻油塞糞門內快則半日遲則一日必通此方最妙不可輕視又方張仲景傷寒論云陽明病自汗小便反利大便不通者津液內竭也用蜜二合銅器中微火煎之乘熱捻作條大如指長寸半許候冷塗油納糞門中少頃即通或加皂角細辛為末少許和蜜作條其效尤速屢試如神又方松子仁柏子仁芝麻俱去油各等分研如泥白蠟和丸梧子大每服五十丸黃耆煎湯下凡大便先硬後稀者乃脾虛也服此更效又方蘇子芝麻各半合研極細用水再研取汁一碗煮粥食此方最穩其效如神凡老人氣虛或久病或産後不能用藥者用此更妙又方有人大便裡急不通小便短澀而黃以瀉火通利之藥總不見效後服六味地黃湯加附子一錢肉桂五分一服而愈此因虛寒氣不傳送故也凡患此症審明如非實火宜照此服之必能見效愈後宜服金匱腎氣丸無好肉桂以炮薑代之六味金匱各方均見內外備用諸方大便熱閉或口渴或小便短澀黃而臊者是用小竹管插入糞門二寸用豬膽汁加好醋少許由管內灌入神效又前大便虛閉二方亦可用又方牽牛子為末用皂莢熬膏為丸梧子大每服七丸或十丸即通有人體肥腸結每十日大便一次閉塞不通百藥不愈後用此方甚效不可因牽牛性烈而忽之也又方芝麻二兩大黃二錢好茶葉五錢共研末溫水沖服又方桃花瓣一大撮用滾水半碗沖服鮮者更佳或取來陰乾以備急用亦可又方叭噠杏仁松子仁火麻子仁柏子仁各三錢搗爛滾水沖蓋片刻當茶飲或加甘蔗汁半杯更妙老年人或患癰毒大便閉結者服此最效此林屋山人經驗方也大小便閉塞不通大皂角燒存性為末粥飲下三錢或以酒和丸梧子大酒下三十丸或以病人坐桶上燒皂角煙燻自通又方苦楝子茴香穿山甲各八分牽牛子鹽水炒錢半煎服有人大小便不通不能坐臥泣哭呻吟七晝夜百藥不效服此三劑全愈此方妙在多用牽牛以其能達右腎命門走經隧故奏效如神人多以為性烈棄而不用不知施之得當自然有益無害也又方皮硝三錢水化開香油一小盞皂角研末五分共入豬尿胞內用竹管一頭入胞口內用線扎緊一頭安穀道內用力一擠其藥入臟即通又方六七月尋牛糞中大蜣螂十餘枚又名推車蟲又名推糞蟲線穿陰乾收之臨時取一個全者放淨磚上四面以炭火烘乾當腰切斷如大便不通用上截小便不通用下截二便不通全用各為細末井華水調服又方用桐油子一個此打油之桐子非梧桐子也先將蒂頭磨或水或酒暖熱飲之即通不止者即將桐油子嘴頭磨或水或酒暖熱飲之即止立效如神又方雄鼠糞兩頭尖者是研末納臍中又方蜂窩燒末酒服二三錢日二服不拘大人小兒皆治大小便不通尾脊骨上下左右疼痛方見筋骨門大小便熱結不通大田螺三個搗爛加青鹽三分貼臍下一寸三分即通大便下血名曰腸紅又名腸風用豬尾腸八寸洗極潔淨以白蓮肉二兩去心不去皮灌入用線扎住兩頭煮極爛取蓮肉少加白鹽日食二三次兩日內血即止而食亦漸加矣豬腸食與不食均可照食七日另用歸脾湯為丸見內外備用諸方日日服之即可斷根不服歸脾丸照前煮蓮肉日日食之亦斷根有人下血多年時發時愈百藥不效後服此方永不復發真神方也又方豆腐未曾入袋取漿者炒老黃色攤冷每空心服三錢日服三次血紫者白洋糖調服血紅者紅砂糖黃糖亦可調服雖患多年面色黃瘦垂危者亦極神效平日多服地黃而下血者百藥難治用此最效又方有人大便下血百藥不效勢甚可危後食辣椒又名青椒五六兩一頓食完食少不效不辣亦不效食後下血更多因此斷根人多以辣椒性熱豈知此物能去大腸之熱故奏效如神也又方蠶豆葉一大把搗融熱酒衝入去渣服一碗二三次即愈有人便血垂危百藥不效服此遂愈又方黑豆微炒搗碎泡水酒飲立效又方絲瓜藤又名水瓜又名線瓜燒枯研末淡酒沖服神效又方淋症門蜜炙蘿蔔方亦效又方真桂元肉二十一個南棗十四個白木耳一兩好白蜜四兩煎服三次即愈因虛便血者神效又方通大海七個開水泡發去子加冰糖調服甚效因熱便血者甚效又方酒煮鯽魚常食最妙又方用寒藥熱藥及補脾藥俱不效用山楂肉為末艾葉湯調下應手而愈或荸薺搗汁兩酒杯兌好酒服數日即愈又方凡下血好而復發不能永除者用久蒸黑芝麻細細嚼食二兩日食數次服至數月不但下血斷根且能補腎益精久服百病不生功效難以盡述大便下血百藥不效日久不愈恐是休息痢照痢症治自愈大便下五色膿血此腸癰也照腸癰方治大腸蟲出不斷方見上後陰門泄瀉寒泄胡椒末和飯作餅敷貼臍上或熱柴炭布包敷或炒鹽敷或糯米酒糖和鹽炒敷或酒炒艾絨作餅敷或胡椒大蒜作餅敷或艾葉灶心土門斗灰吳茱萸共為末醋炒敷均效熱泄六一散服之最妙或用緑豆湯溫服亦可久泄不止燒天樞二穴離臍邊左右各二寸是氣海穴離臍下寸半是雖泄久垂危不止亦效燒法大蒜瓣切片安穴上用艾葉一小團如豆大在蒜上燒之或用燈草一根蘸油點燃燒之亦可不如艾火之妙艾火每穴可燒三次燈火只燒一次又方大蒜搗貼足心或貼臍中此千金方也又方大蒜須加銀硃搗融敷臍眼內立止如神又方木鱉丸並治痢疾土木鱉半個母丁香四粒麝香一分共為細末口水調為丸如黃豆大納臍中外用不拘小膏藥貼之立止又方新開桃花用針刺取數十朵不可經手面和作餅煨熟食米湯送下服後其瀉更甚昏困異常瀉一二日後再飲涼水立止一人因傷酒有積滑泄數年百治不效用此而愈又方車前子鹽水炒七次真山藥炒真雲苓各二兩炙草六錢共為末每服二三錢炒糊米煎水調服烏梅湯更妙此神效也又方黃丹飛過枯礬黃蠟各一兩將蠟溶化小銅器內以丹礬二味細末調入乘熱為丸如豆大每服二丸空心白滾水下一切久瀉諸藥不效服此一劑自愈又方芡實淮藥各二兩交豬肚蒸服即愈又方白朮一兩車前子五錢煎服立止此分水神方也或車前子一味煎服亦可脾胃虛寒者忌服又方燒棗丸治小兒泄瀉不止雖至面黑氣息奄奄者亦立效回生並治泄出食物不化沉香木香公丁香花椒官桂乾薑紅飯豆扁而微紅者是砂仁各四分研為末煮紅棗肉為丸仍以紅棗肉包之再以麵裹煨熟須看火色俟黑煙轉為藍煙即取出米湯送下五更溏瀉每至五更即溏瀉一二次經年不止者名為腎瀉此陰盛也用五味子去梗二兩吳茱萸湯泡七次五錢同炒香為末每早陳米湯服二錢或為丸服亦可服完一料即愈不愈即系陰虛用後五神丸治之五神丸專治五更腎瀉久不愈者以此丸補命門相火即以補脾也破故紙炒酒浸蒸用四兩核桃肉去皮四兩五味子炒三兩吳茱萸鹽水炒一兩生薑煮棗為丸胡椒大每服三錢臨臥鹽湯下老人五更泄瀉蓮米散黃老米炒三合蓮肉三兩去心豬苓澤瀉炒白朮炒各五錢木香錢半白沙糖一兩乾薑二錢用濕紙包煨熟共為細末每服三錢空心白湯下其效如神此方簡便不大費錢有老親者切宜留心老人虛瀉肉豆蔻三錢麵裹煨熟去面研末乳香一兩為末陳米粉煮糊為丸梧子大每服五七丸米湯下甚效脾虛泄瀉白朮土炒白芍炒各一兩冬月加煨肉豆蔻五錢共為末飯丸梧子大每服五十丸米飲下日二服甚效腎虛久泄破故紙焙乾為末一錢用豬腰子一個去白筋油膜破開將故紙末裝入裹緊蒸熟不用著水食二三次自愈極效脾瀉不止瀉出食物完穀不化小兒科痘症門治驗篇末有妙方應參看凡大人小兒泄瀉食物不化胃無火也是胃陽虛生白朮真雲苓各二錢川厚朴薑汁炒砂仁陳皮各一錢生益智二錢水煎數服即愈屢用皆效又方參朮散七味豆蔻散均見痘症泄瀉方俱極神效又方柿餅燒紅放地上用碗蓋住不蓋則成灰無性俟冷研末米湯調服二錢即愈有一小兒由六歲至十二歲泄瀉食物不化百藥不效服此三次全愈腹脹泄瀉不止疴物不化此胃寒也用益智仁二兩麵裹燒之煎服立愈泄瀉不止腹有硬塊不消此症有氣滯血滯之分一人患此照氣滯治之不效後用桃仁大黃芒硝甘草桂枝白芷服數劑而愈小兒水瀉不能服藥痢疾亦治巴豆三粒黃蠟三錢共搗爛成膏貼臍上用絹帕縛住半日即愈如噤口不食者加麝香三釐用前藥同貼又方香白芷乾薑各一錢共研細末以蜜為膏先用酒洗臍溫微熱後貼膏用鞋底烘熱尉膏上氣通即愈泄瀉口渴七味白朮散見三消門屢試如神痢疾痢疾最忌黃連服則倒胃難治然倪涵初先生痢疾三方均有此味似不相宜胃弱者宜斟酌用之痢疾三方痢為險惡之症生死所關不惟時醫治之失宜而古今治法千家多不得其道是以不能速收全效今立方何以為奇不泥成法故奇也立論何以為妙不膠成説故妙也然其藥品又不外乎常用而已有識者切不可更張勿為庸醫所誤遵而用之百試百效者也初起煎方川黃連去蘆條黃芩生白芍山楂肉各一錢二分陳枳殼去穰紫厚朴去皮薑汁拌炒堅檳榔青皮去穰各八分當歸甘草地榆各五分紅花三分桃仁去皮尖研細粉一錢南木香三分磨兌水二碗煎一碗空心服渣再煎服此方或紅或白裡急後重身熱腹痛者俱可服如單白者去地榆桃仁加橘紅四分木香三分如滯澀甚者或加大黃二錢用酒拌勻炒服一二服仍除之若一劑滯澀已去不必再服矣右方用之三五日神效用之於旬日亦效惟十日半月外則當加減矣另詳於左加減煎方川蓮黃芩白芍酒炒各六分山楂肉一錢橘紅青皮檳榔地榆各四分甘草炙三分當歸五分桃仁粉六分紅花三分木香磨兌二分水三碗煎一碗空心服渣再煎服如延至月餘覺脾胃弱而虛滑者法當補脾具方如下補理煎方川蓮條芩各酒炒六分芍藥酒炒四分橘紅六分全當歸人參無則高麗參好黨參亦可白朮土炒炙草各五分水煎空心服渣再煎服以上三方隨用輒效其有不效者必初時投參術等補劑太早補塞邪氣在內久而正氣已虛邪氣益盛纏綿不已欲補而澀之則助邪欲清而疏之則愈滑遂至於不可救藥雖有奇方無如之何則初投溫補殺之也如婦人有胎者去桃仁紅花檳榔等味微理妙論古今治痢皆曰熱則清之寒則溫之初起熱盛則下之有表證則汗之小便赤澀則分利之此五者舉世信用如規矩準繩之不可易豫謂五者惟清熱一法無忌余則犯四大忌不可用也今詳於後一曰忌溫補痢之為病由於濕熱蘊積膠積於腸胃中而發宜清邪熱導滯氣行瘀血其病即去若用參術等溫補之藥則熱愈盛氣愈滯而血亦凝久之正氣虛邪氣盛不可療矣此投溫補之禍為最烈也一曰忌大下痢因邪熱膠滯腸胃而成與溝渠壅塞相似惟用磨刮疏通則愈若用承氣湯大下之譬如欲清壅塞之渠而注狂瀾之水壅塞必不可去無不岸崩堤塌矣治痢而大下之膠滯必不可去徒傷胃氣損元氣而已正氣傷損邪氣不可除壯者猶可弱者危矣一曰忌發汗痢有頭痛目眩身發寒熱者此非外感乃內毒熏蒸自內達外雖有表證實非表邪也若發汗則正氣既耗即邪氣益肆且風劑燥熱愈助熱邪表虛於外邪熾於內鮮不斃矣一曰忌分利利小便者治水瀉之良法也以之治痢則大乖矣痢因邪熱膠滯津液枯澀而成如用五苓等藥分利其水則津液愈枯而滯澀愈甚遂至纏綿不已則分利之為害也若清熱導滯則痢自愈而小便自清又安用分利為哉豫於此一症素畏其險惡用心調治經今二十餘年百試百驗既而身自患之試驗益精然後能破諸家之迷障而為奇妙之方論用是述其顛末以拯斯人之疾苦而悉登諸壽域也以上系倪涵初集中摘録又方痢疾每起於暑天之鬱熱而又感以水濕雨露之氣紅白相間如血如膿甚者如屋漏水如魚凍水裡急後重崩逐瘀痛欲下而不能欲不下而不得一日夜數十次甚至百餘次氣息奄奄坐而待斃此痢之概也若驟止其邪則死生頃刻不止其邪則危絶如絲欲補氣而邪氣轉加欲清火則下行更甚此時惟有因勢利導之方可行或疑人已氣血虛敗更加利導恐其難堪不知邪氣一刻不去則正氣一刻不安古人治痢無止法信不誣也方用白芍當歸各三兩蘿蔔子一兩枳殼麵炒檳榔車前子甘草各三錢水煎服一劑即止二劑全安可用飲食矣此方之奇妙全在重用歸芍蓋水瀉忌當歸之滑而痢疾則正喜其滑也芍藥味酸以平肝木使木不敢再侵脾土又有枳殼檳榔消逐其濕熱之邪又加車前子分利其水濕而又不耗其真陰之水所以功勝於茯苓也尤奇其用蘿蔔子一味蓋蘿蔔子味辣而能逐邪去濕且又有通達上下消食利氣使氣行於血分之中助歸芍以生新血而祛蕩其敗汙也少加甘草以和中則無逼烈之患此奏功之神奇實有妙理耳又方水瀉痢疾均治百發百中不可輕視杏仁七十一粒去皮尖去油研蒼朮六兩淘米水浸炒研羌活四兩炒研大黃一兩炒研草烏一兩麵裹煨熟炒研共為細末空心服忌生冷麵食葷腥煎炒發物裝入瓷瓶勿令泄氣一二三四歲服一分八九歲服一分五釐十五六歲服二分二三十歲服三分四五十歲服二分五釐老年人服一分半孕婦忌服水瀉濃薑湯下赤痢燈心淡薑湯下白痢濃薑湯下赤白痢淡薑湯下又方不拘紅白久近皆治有患痢日夜不止越二十八夜不能睡藥窮待斃矣用此一服即安三服全愈蘿蔔槌取自然汁兩杯生老薑自然汁半酒杯生蜂蜜一酒杯細茶陳者佳濃茶一杯和勻服若無蘿蔔多用蘿蔔子冷水浸過搗取汁亦可又方胡椒一歲一粒打碎大鯽魚一個去頭尾骨腸入椒末搗濃敷臍上甚效又方巴豆一粒緑豆胡椒各三粒布包槌碎用紅棗二枚搗為丸敷臍上其痢即止後即去藥又方見泄瀉門木鱉丸又方點眼法初胎小兒糞瓦上焙乾一錢雄黃四分梅花冰片五釐為極細末水調點兩眼內角無論赤白痢及噤口痢危篤者皆神效又方粗草紙卷緊成筒燒燃取下黑灰俟冷加紅糖在石板上錘融為丸如圍棋子大大人每服二三十丸分作三五次一日服完小兒服十餘丸三日全愈痢有寒熱之分且黏滯腸胃急難推動若克伐太甚必傷元氣此方功能推刮積瘀而不傷損無論寒熱虛實至穩至靈百發百中又方元胡索末三錢酒調服有人年五十餘下痢腹痛欲死棺木已備服此而愈又方真川厚朴一錢煎服一日三次兩日即愈神效又方生藕節搗爛滾酒沖服極效又方金銀花五錢炒枯研末不論紅白用開水調白糖空心服服後其痢更甚兩日全愈奇效無比小兒一歲服一分又方山楂炭研末紅痢加白蜜為丸白痢加紅糖為丸紅白痢加蜜與紅糖為丸空心白開水湯下大人每服八錢小兒每服三錢一日服三次三日全愈山楂能去積補脾無論虛實久近屢試屢效不可輕視又方陳細茶葉山楂炭紅砂糖白砂糖各三錢老薑一錢煎服一日服盡即愈甚效又方木耳一兩紅痢用紅糖炒白痢用白糖炒紅白相併者用紅白糖炒服之極效裡急後重欲下利而不出者是川厚朴一錢煎水調檳榔末八分服奇效或單服檳榔亦可又方穿山甲焙枯研末米湯調下三五服即愈疾痢先紅後白名曰腸盅用淮牛膝二兩搗碎以酒一斤泡之每飲一二杯日服三次極效紅痢不止鹽梅一個胡黃連一錢灶下土一錢共為末茶調服或單用鹽梅好醋調服亦妙有人血痢百餘日用此而愈屢試神驗又方馬齒莧又名瓜子菜搗汁半茶杯兌蜂蜜半酒杯空心溫熱食之煮食亦可有人患紅痢數年服之即愈又方乾薑燒黑存性候冷為末每服一錢米湯飲神效又方谷樹皮又名構樹荊芥等分為末冷醋調服一錢極效孕婦痢疾雞蛋二個破一孔如指頭大入黃丹五分用銀簪攪勻以紙封口入飯甑內蒸熟食神效噤口痢疾生大附子一個切片貼無根火上俟熱貼病人臍上冷則再換立愈取無根火法用新石灰一團冷水淋下自有熱氣出又方雄黃巴豆硃砂萆麻子麝香各等分搗為細末和蜜為丸如芡實大收好不可泄氣放眉心以膏藥蓋之一炷香久腹內自響即思飲食去藥而愈此人世傳妙方百發百中活人無數又方活癩蝦蟆一隻加上好麝香三分擂勻貼臍上用布束半日即思飲食兩日全愈又方細辛肥皂各一錢蔥三根酒藥子半斤大田螺一個共搗成泥敷臍上候乾揭去自能飲食又方田螺麝香一分連殼搗爛敷臍上又方黃瓜藤燒灰存性香油調敷臍上極效經霜之藤更妙又方吳萸研末醋調敷兩足心極效此引熱下行法也又方鐵稱錘或磚石亦可燒紅放瓦缸內好醋粹入令病人聞之一日數次極效又方真烏梅一斤打碎熬水十餘碗入一桶內令病人坐桶上周圍堵塞不令出氣使熱氣衝上糞門如溫即洗其人即睡去隨扶令就枕待醒即思飲食先以粥湯半盞食之少頃再食半碗不宜飽食漸漸加食甚妙小兒烏梅減半用之此神方也又方點眼法見前最妙又方緑豆粉白沙糖冷水調服其效如神又方白蓮肉煮湯時時服之即能思食石蓮更佳又方干蘿蔔葉煎水加紅白糖服最妙或用新鮮蘿蔔煎湯服亦可又方陳久火腿骨煎濃湯緩緩服其效如神又方子鴨一隻去毛不開破只將肚皮劃開肚中諸物均不動仰放大碗上蒸透只服碗內流出自然湯不食鴨肉服後即能服藥吃粥此祕方也神效之至又方水鴨去毛與腸雜挂在廚內近煮飯處臘干愈久更妙每服一大塊煎湯飲之甚效又方用金絲鯉魚一尾重一二斤者洗淨照常用鹽醬蔥安排畢入胡椒末三錢煮熟置病人床前令聞香氣欲盡與之連湯吃飽病即除根屢治有效又方神麯炒山楂白砂糖各二兩川連一錢另蒸真烏梅三個甘草五分荔枝肉七個用水三大碗煎溫服且吐且飲自然思食止痢此方屢試神奇活人無數不可輕視又方川烏草烏各等分放淘米水中泡四十九日取出烘乾於石臼內搗爛成末最忌鐵器每服七八分小兒每服三四分紅痢加白糖白痢加紅糖紅白相兼者加紅白糖腹痛者加吳萸末少許此藥性雖猛烈但漂過四十餘日其毒已去分量亦輕且此症系由胃毒內蘊所致非此藥不能見功神效非常百無一失久痢不止麻油煎鹹魚食數次甚效此方奇驗莫測其理多年痢疾名休息痢凡痢症腹不作痛惟下膿血兼流黃漿日久不愈此係平素愛食冷茶水酒所致取活鱔魚去腸雜切斷放瓦上焙枯成炭研粉每服三錢黃糖拌熱陳酒送下數服全愈不拘老幼無不神效忌食生冷水酒海參海蜇等物此林屋山人經驗方也又方真烏梅煎水紅白糖調服大有功效或用烏梅熏洗之法見前噤口痢方亦妙又方凡痢疾多年不愈其積日久下墜竟至大腸下口直腸上口交界之處有小曲折隱匿於此為腸臟最深之處藥所不到之地症則乍輕乍重或愈或發便則乍紅乍白或硬或溏任是神丹分毫無濟往往有三五年或十餘年不愈者由此故也宜用鴉膽子去殼以桂圓肉包之大人每包七粒多則七包少則五包小兒每包三粒多則五包少則三包空心滾水吞下隨服乾飯一二碗俟大便行時有白痢如魚腦者即冷痢之根如無白痢一二日後再服一次或加數粒亦可此後不必服矣戒食生冷諸物及甲魚海參海蜇皮蛋鴨肉三月戒葷酒五日永不再發雖十餘年不愈者無不神效服至一二日後如腹中作痛用白芍一根甘草一根俱重三錢紙包用水浸濕火內燒熟取出捶爛煎水服立愈又方豆腐醋煎常常服之甚效又方數十年古松樹上皮研細末稀粥和服一碗日服三次三日必愈脫肛大腸頭自糞門出者是大腸脫肛不收蝸牛身有螺螄殼頭有雙須者是瓦上焙枯研末一兩豬油調敷立效桑樹蝸牛更好又方腳魚頭焙枯研末麻油調敷或以紙托患處神效又方大螺師一個頂上梅花冰片一分即時水出敷之甚效又方蟬蛻研末香油調搽奇效無比又方大蜘蛛一個去頭足瓦上焙枯研末燈油調敷半刻即收神效又方生鐵二斤水煮濃汁日洗數次雖脫肛多年亦效又方萆麻子七粒去殼搗爛敷囟門上少刻即收收後務即將藥洗去有人脫肛三月一敷即愈又方梁上灰塵或倒吊塵亦可同鼠糞燒煙於桶內坐上熏之數次即上又方後小兒脫肛辣椒方百藥不效服之即愈小兒脫肛凡小兒脫肛不收久則堅硬難入用連須蔥斤許煎湯入桶內坐上乘熱熏之隨後慢慢洗軟再照以上各方用藥敷之即上又方五倍子為末鋪紙上捲成筒燒燃放便桶內令其坐上使煙氣熏入肛門自上或用五倍子煎湯熏洗亦可後將白礬末搽肛門上可不再脫又方辣椒又名青椒又名辣子多食極效有一小兒脫肛數月百藥不效後食辣椒數次肛即縮上並不再脫屢試如神此物味最辣食宜多食少而不辣者不效並治大人脫肛及痔瘡腸風下血俱極神驗食後下血更多即易愈也痔瘡凡人九竅中有小肉突起為痔故有耳鼻牙痔等名不獨肛門一處也肛門痔有數種狀亦不一未破曰痔已破曰漏肛門邊生數瘡腫而突出膿破即散者牝痔肛門邊露肉如珠如鼠如奶時流膿血者牡痔腸口顆顆發癗且痛且癢血出淋漓者脈痔肛門內結核有血或發寒熱每遇大便脫肛者腸痔酒醉即腫痛流血者酒痔色痔相同每遇大便流血不止者血痔肛門腫痛遇怒即發怒息即安者氣痔痔癢難忍蠍子不拘多少燒煙燻之極效痔痛難忍木鱉子水磨濃搽陳醋磨之更好初覺痛甚少頃即止痛消腫神效之至或用紙浸汁貼之亦可又方蝦蟆頭陰乾燒煙燻之奇效又方鼻涕蟲形似蝸牛而無殼者即是搗爛和陳墨敷之極效內痔不出草烏為末口水調點肛門痔即反出乃可用藥敷治內痔腫痛豬大腸六兩蚯蚓又名曲蟺十餘條煮融去蚓食腸極效內痔治法內痔有大如茶杯形如一菌糞從菌心而出痛極上面如盆四邊高中心陷下如糞根糞後用溫水洗淨以洞天膏見癰毒諸方門攤如菜碗大中剪一孔以一邊剪開熱錫茶壺上燙溶套菌根下貼糞門四邊圍護好肉免沾藥汁用枯痔散見後一二分口水調用筆敷菌之外面四旁日夜二次菌之中心通糞門眼不可敷藥敷則大痛難忍一二日毒水流出菌亦漸縮而軟再敷一二日漸硬而黑菌邊亦漸脫落然後每藥一錢再加硃砂一分照前調敷敷至菌根落盡全愈屢試如神此林屋山人極驗方也痔瘡諸方枯痔散紅砒放舊瓦上火煅白煙將盡取起淨末一錢枯礬二錢真烏梅肉燒存性二錢硃砂飛淨三分共研極細末用時以口津濕手指蘸藥於痔頭痔身上搓捻一日二次初敷不腫五六日出臭水出盡其痔乾枯不用上藥輕者七八日全愈重者半月收功諸痔皆效自有此藥世上斷無不愈之痔人多以砒霜毒藥不肯敷用不知此藥有斷根之功且只用一錢有益無損切不可疑而自誤也消管丸苦參四兩川連二兩酒炒當歸槐花畢澄茄各一兩五倍子五錢各為細末用小鱉二個約重八九兩真柿餅四兩二味共煮融去鱉骨搗爛入前藥末搗為丸每空心服四錢滾水送下其管自出此林屋山人經驗方也胎元七味丸專治痔漏不拘遠年近日膿血通腸者服之化管除根此方傳自異人屢試神驗真奇方也男孩臍帶三個瓦上焙乾存性犀牛黃三分槐角子五錢肥大者瓦上焙乾存性刺蝟皮三錢酥炙象皮四錢酥炙地榆三錢曬乾共研細末酥油為丸如麻子大若不成丸加糯米粥少許即成每服七分空心白滾水送下三日化管止痛七日平滿血清膿止十日除根除痔丸當歸川連真象牙末槐花各五錢川芎滴乳香各二錢露蜂窠一個槐樹者佳榆樹上次之炒共為末黃蠟二兩溶化入藥末為丸每空心服三錢漏蘆煎湯送下至五日漏孔內退出肉管待二三指長剪去再出再剪管盡肌生而愈神效之至完善丸專治痔漏去管生肌夏枯草八兩甘草節四兩連翹四兩去子為末一金銀花一斤煎濃湯為丸每晨鹽湯送下三錢初起者一料全愈久者兩料除根又方白煮整雞蛋蘸真象牙末假象牙不效空心服之每日二次有人患痔二十餘年服至半月斷根又方榕樹上吊生之須五兩此樹惟福建兩廣有之皮硝五錢煎水放瓦罐內乘熱坐上先熏後洗數日即愈可以斷根效驗之至須系寄生長數尺或丈餘不等又方小茴香二錢研末泡水服輕者數次即愈極效又方脫肛門內辣椒方最為神效
