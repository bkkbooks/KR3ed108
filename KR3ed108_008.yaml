body:
  text: 卷八兩股坐板瘡此症又名風疳生股上延及兩腿纏綿不已形如黍豆色紅作癢甚則焮赤腫痛初起用芫花川椒黃柏煎水洗即消已破者無論乾溼照疥瘡各方治之濕甚者照黃水瘡均見癰諸方治之久不愈者馬莧膏用癰毒諸方最效或用白油膏見腿部治之更妙股上生瘡生股上者名臀尖亦有生兩旁者色紅腫照癰毒各方治之色白者照陰疽各方治之海底在肛門前陰根後兩相交界之處懸癰又名騎馬癰生在海底初起細粒漸大如桃李俗呼偷糞老鼠潰爛之後一經房事走漏即成漏生管體弱者患之更危諸漏宜醫獨此難治治則漏管愈大難救未成膿時用生甘草熟大黃各三錢酒煎空心服一劑即愈如已成膿服醒消丸即愈倘患色白者服小金丹即愈此林屋山人祕方也又方用橫紋生甘草一兩截數斷用水泡透文火烘乾再泡再烘以中心水潤為止切細加當歸一兩用酒煎服日服一次半月後方能消盡又方潰爛久不收口未生管者用水仙膏見癰毒通治門敷之百發百中已生管者照癰毒門諸瘡生管各方治之腿部腳氣腫痛此症始於受濕以及酒色勞傷外感風寒冒熱忽然手足發冷發熱其氣從腳下而起上衝心腹作痛或頭痛身痛或脹悶或嘔吐或昏迷或大便閉塞或兩足脛紅腫寒熱如傷寒狀從此或一月一發半月數月一發漸漸四肢攣縮轉筋腳膝腫大此為腳氣非中風寒也倘不知而誤以傷寒中風治之則為害不淺矣外治法白礬二兩地漿水十八碗新杉木三四片煎六七滾用杉木桶新者更佳盛一半浸腳留一半徐徐添入上用衣被圍身使略有微汗洗完隨飲薄粥如一次未愈再洗二次照前方加硫黃三錢無不愈矣取地漿水法於淨土地上掘二三尺深用新汲水傾入攪濁少俟澄定取半清半濁者吹去浮沫用之又方鹽三斤炒熱包裹痛處並用一包以腳踏之冷則隨換夜夜用之以腳心熱透為度加槐白皮同炒更妙又方用鹽搽痛處少時用熱水洗之有人患腳氣百藥不效後得此方除根又方舊磚燒紅以陳舊淘米水淬入乘熱布包三塊用膝夾住棉被蓋緊冷則隨換三五次即愈又方茅山蒼朮煎酒服即可行動又方見後腰臀腿膝疼痛蒼朮散方腳氣衝心木瓜檳榔各二錢半吳茱萸錢半水煎服或用黑豆一茶杯甘草三錢煎濃汁服更妙又方黃耆五錢水煎一二服斷根腳氣腿脛紅痛鳳仙花葉枸杞葉共煎濃湯熏洗並生搗融敷之又方大田螺搗爛敷之酒風腳此症發時腿足腫痛難忍因飲酒過多所致百治不效惟用紹興老酒糟四兩無則用本地陳老酒糟亦可松針一兩即松毛共搗爛加頂好燒酒拌入炒熱敷之用布包緊冷則炒熱再敷日夜不斷敷至痛止乃已一料只能敷三次輕者三五料即愈重者十餘料斷根永不復發屢試如神又方蒼朮煎酒服即時能行腿足腫痛拘攣威靈仙牛膝二味各等分為丸空心開水服數十丸或加酒服更好忌服茶久服其病若失威靈仙疏真氣另服補劑以固本元再威靈仙真者甚少均系藁本之細者假充以味極苦而色紫黑如黃連狀脆而不軟折之有細塵起明視之斷處有黑白暈俗謂之鴝鵒眼此數者備然後為真服之有奇驗兩膝疼痛名鶴膝風風勝則走注作痛寒勝則如錐刺痛濕勝則腫屈無力病在筋則伸不能屈在骨則移動維艱久則日腫日粗大腿日細痛而無濃顏色不變成敗症矣宜早治之用新鮮白芷酒煮成膏收貯瓷瓶每日取膏二錢陳酒送服再取二三錢塗患處至消乃止或內服陽和湯見癰疽諸方外用大戟甘遂二味研末白蜜調敷或用白芥子末酒調敷亦可數日即消此林屋山人祕法也又方首烏酒大何首烏煎酒服以醉為度更搗渣敷膝頭數次可愈永遠戒食鰍魚黑魚二物又方四神煎生黃耆半斤遠志肉牛膝各三兩石斛四兩用水十碗煎二碗再入金銀花一兩煎一碗一氣服之服後覺兩腿如火之熱即蓋暖睡汗出如雨待汗散後緩緩去被忌風一服病去大半再服除根不論久近皆效又方五聖散乳香沒藥各一兩五錢地骨皮無名異各五錢麝香一分為末車前草搗汁入煮酒調敷患處有人患此五年敷至三日全愈膝上生癰名牛頭癰腫而紅者是連須蔥頭切碎用糯米飯乘熱拌敷重者五六次必消或照癰毒各方治之腿膝疼痛不能舉步山楂肉白蒺藜各等分蒸曬為末蜜丸梧子大每服三錢白湯下服一二斤無不愈者人面瘡此瘡生在兩膝亦有生在兩手彎者眼口能動能拿此係冤孽所致急宜改過誠心懺悔再用雷丸三錢輕粉真茯苓各一錢各為細末敷上即愈此岐伯天師方也又方貝母末敷之亦效並參看陰疽孽報見陰疽門末腳上轉筋暑天腹痛轉筋名霍亂症見霍亂門黃蠟半斤融化攤舊綢上隨患大小乘熱纏腳須當腳心便著襪裹之冷則隨換並貼兩手心腿痛轉筋氣衝入腹此寒極也若不急治痛衝入心難救急用木瓜茱萸各二錢食鹽五分水煎服即愈又方鍋底煙子以燒草者為佳一錢和酒服又方用河邊大水後所挂樹上浮蘋煎洗二三次即愈腿面臁瘡生小腿面此瘡多因濕熱而起又被手甲風毒抓傷破爛淋漓纏綿不已欲求速愈切忌手抓自易痊也初起者用濃茶洗淨再用好乾茶葉嚼融將口漱淨再嚼敷之又方龍眼核桂圓核亦可去核外之皮研細用油調敷又方木耳瓦上焙枯研末敷以上三方如不見效即照後方治之白油膏治臁瘡數十年不愈者數日即可收功捷如影響並治禿頭瘡坐板瘡及一切年久濕熱諸瘡膿血不止久不收口等症此方百發百中神妙非常乃臁瘡第一方也真桐油三兩防風白芷各錢半放油內泡一夜入鐵器內慢火敷枯去藥瀝淨渣將油再熬俟欲開時用雞蛋一個去殼放油內炸至深黃色去蛋不用再將油慢熬俟油色極明能照見人鬚眉入白蠟六分黃蠟四分溶化趕緊用竹紙十餘紙乘熱浸入油內一張一放一起冷透火氣須張張隔開風前吹透若放在一處雖數日火氣難退貼上毒氣內逼難以收功視瘡大小裁紙貼上頃刻膿黏滿紙棄去再換一日換十餘次數日膿盡肉滿生肌膿盡後不貼亦可生肌膿多者黃蠟六分白蠟五分不生肌者白蠟六分黃蠟五分不得稍有增減黃香膏治臁瘡屢試如神並治一切癰毒大瘡日久不愈亦效松香白水煮透取出放冷水內搓洗數十下再煮再洗如此九次倒地待冷取起每一兩加輕粉三錢銀硃一錢白蜜少許煉老成珠加菜油少許燉熱攪勻看瘡之大小作餅置瘡上將綢條扎住一周時取下用滾水搓洗極淨翻轉再貼周時取下再洗再貼只要一個藥餅直貼到好不須另換待瘡好將此藥餅洗淨收好如遇此瘡再與別人貼仍前一周時一洗一貼此餅若醫過三人之後貼上即好若醫過十人貼上更能速愈奇絶妙絶夾紙膏專治臁瘡樟腦三錢銅緑一錢用豬板油和藥搗爛以油紙夾之貼患處一二日翻轉貼三四日膿盡而愈如四日後膿尚未盡再換一紙無不愈矣腿腳浮腫破爛似臁瘡而非臁瘡有人腿腳浮腫破爛十餘年不愈後再生黃豆將口漱淨自行嚼爛敷之數日全愈腿上生瘡破爛多孔照臁瘡方治之如不見效用鳳仙花連根葉熬水洗數日必愈腿足忽然紅腫熱痛或時上時下或爛或不爛此遊風丹毒也用清涼膏見湯火傷門敷之忌食鮮肉半月其效如神此林屋山人經驗方也腿面不紅不腫痛極難忍此症他人按之極冷病人只叫腿熱此濕熱伏於經絡也用馬蘭膏見遊風丹毒門敷之神效或照遊風丹毒各方治之如病人不叫腿熱恐是附骨疽症須辨別施治為妥大腿內外生疽查陰疽門附骨疽方治之小腿腿肚生癰名魚肚癰此乃肉緊筋橫在一身用力之處最痛難忍外以扎藥扎上內以五通丸醒消丸每日早晚輪服初起立消最忌開刀以藥敷穿庶不傷筋而無縮腳之損色白者應照陰疽治忌用扎藥孕婦忌扎扎則胎墜此林屋山人經驗方也扎藥五通諸方均見癰毒諸方腿癢難忍名寒毛瘡用做過豆腐之渣炒熱敷以布包緊冷則隨換包過一夜即愈神效腰臀腿膝疼痛不已蒼朮散真茅山蒼朮淘米水浸一日夜曬乾鹽水炒五錢黃柏去粗皮酒浸一日夜炙焦五錢水煎空心服日服二三次其效如神並治一切腳氣極效腿足不能起立能食易飢凡人腿足無力不能起立而口又健飯如少忍飢餓即時頭面皆熱有咳嗽不已者此痿症也乃陽明胃火上衝於肺金而肺為火所逼不能傳清肅之氣於下焦而腎水爍干骨中髓少故不能起立而胃火又焚燒故能食善飢久則水盡髓干而難治矣可不急瀉其胃中之火哉然而瀉火不補水則胃火無以制未易熄也方用起痿至神湯熟地山藥元參甘菊花各一兩白芥子三錢當歸白芍臺黨各五錢神麯二錢水煎服一劑火減二劑火退十劑而痿有起色三十劑可全愈也此方奇也菊花為君瀉陽明之火而又不損胃氣其餘不過補腎水生肝血健脾氣消痰涎而已蓋治痿以陽明為主瀉陽明而佐諸藥自易成功耳兩腿不能動作臥床不起此亦痿症如不起床席已成廢人者內火熾盛以熬干腎水也苟不補腎惟圖降火亦無生機雖治痿獨取陽明是胃火不可不降而腎水尤不可不補也今傳一奇方補水於火中降火於水內合胃與腎而兩治之自然骨髓增添燔熱盡散不治痿而痿自愈方名降補丹熟地玄參麥冬各一兩甘菊花生地沙參地骨皮各五錢車前子二錢臺黨一錢水煎服此方降中有補補中有降所以為妙胃火不生自不耗腎中之陰腎水既足自能制胃中之熱兩相濟而兩相成起痿之功孰有過於此者乎又方羊腎酒見婦人科種子門最為神妙又方用栗子二個又名板栗要二個俱扁者若一面圓一面扁者食之不效於四更將盡初交五更時睡在枕上不必坐起先取一粒緩緩細嚼不可吞咽口宜緊閉不飲茶水不可言語嚼至融化如漿緩緩運氣吞下送至丹田在肚臍下再取一粒照前細嚼融化運氣送下食完聽其睡熟食至半月後不必服藥自能漸漸行動百日內外平復如常本年有浙江錢君福建吳君均患此症先經醫治日久不效後各服栗三十餘枚至百日外全愈每夜只服兩個不可服多此神方也不可輕忽足軟難行足軟不能步履人以為腎水之虧不知非腎也蓋氣虛不能運用耳用補中益氣湯見內外備用諸方加牛膝三錢蜜制黃耆一兩臺黨三錢水煎服四劑即能行走此方內有石斛一味經名醫刪去更見功效又方杜仲一兩半酒半水煎連服數劑三日能行五日全愈腎虛足軟痛極者服此最效足部腳氣腫痛腿足軟弱酒風腳均見腿部傷寒足痛樟木一段打碎為末煎湯遠年尿桶砂一兩為末和陳小粉調敷在大熱痛處有奪命之功兩足痛如刀割先用生薑切片蘸香油擦痛處隨用生薑火燒熟搗爛敷患處其痛立止足生疙瘩腫脹骨疼獨頭蒜切片鋪痛處每蒜一片用艾炙二壯去蒜再換再炙痛自愈腳上冷疔初起紫白泡疼痛徹骨漸至腐爛深孔紫黑色水腥臭日久不愈黑鉛四兩鐵器內化開傾入水內再起再化如此百遍以鉛盡為度去水取澄者三錢再入松香一錢黃丹水飛輕粉各五分麝香一分共為細末先用蔥湯洗淨方用麻油調藥攪勻塗瘡口油紙蓋之或用腿部白油膏更妙內外腳踝生瘡此名驢眼瘡又名螺眼瘡俗呼夾棍疽未潰色白以疽治紅腫以癰治如潰爛日久形如驢眼者當問初起紅白分別癰疽治之腳甲腫爛疼痛或因剔甲傷肉或因甲長入肉腫爛不已甚至五趾俱爛延至腳背膿泡四起痛不可忍先用陳皮煎水洗淨膿血久洗甲自離肉輕輕剪去再用緑礬燒至汁盡研末冷透火氣厚敷爛處用綢包好每日一換換二三次後不用再換如有膿泡之處擦破敷之敷時務必忍痛十日即愈屢試如神或照手部脫骨疽甘草方敷更妙用腿部白油膏尤為神妙又方蜈蚣焙枯研末敷外用南星末醋調敷四周甚效脫骨疽此症生兩足各趾頭又云只生手足第四指者是或生指節或生指縫初生或白色痛極或如粟米起一黃泡其皮或如煮熟紅棗黑色不退久則潰爛節節脫落延至足背腿膝腐爛黑陷痛不可忍治法見手部脫骨疽方腳丫奇癢難受此有蟲而作癢也用火爐放瓦一塊撒韭菜子於瓦上加上麻油兩足向上熏之用布圍住勿令透風少刻癢止有蟲落瓦上即愈又方癢則用硫黃擦之擦後再用硫黃厚敷布包穿襪一日一換數日斷根切不可用手抓擦腳丫爛瘡此濕熱而有蟲也輕者用硫黃擦敷不必抓動三日自愈抓則不效重者先用苦參甘草銀花蒼朮生地各三錢蔥頭七個煎水日洗一次另用黃丹明雄滑石各一錢研細如香灰樣不細摻之則痛敷上如能勤洗不敷亦可再用苡米二兩茯苓一兩煎服三劑不可多服患破爛見骨亦效如日久不愈用腿部白油膏必效兩腳總宜平擱雖大小便亦不可下地如下地則必潰爛最宜忍癢謹戒抓動抓動一次必爛數日不若聽其生水作膿結痂七八日後無不愈也屢試屢驗如已結痂切不可洗又枯礬敷之作痛切不可用又方用陳火腿骨米泔水漂盡鹽味燒枯研末敷立效又方牛牙散見癰毒諸方敷之極為神效又方平時洗足將水拭乾遲遲穿襪即無此患腳趾縫中生毛拂著痛不可忍真桐油煎熱滴一滴於毛上毛即脫落忍痛片時即愈腳跟作痛柳葉一把杏仁三粒枯礬二錢共搗爛敷極效又方一人腳根腫痛諸醫莫識徐之才曰蛤精疾也由乘船入海垂腳水中而得為剖出二蛤而愈足生瘤如斗大用針輕刺一小孔以硼砂冰片各一分輕粉半分為末敷之以毒水流盡為止一面用黃耆白芥子各三兩生甘草薏仁各五兩水煎服二劑即愈腳底瘡有細孔日久不愈此名蟻瘻又名鼠瘻用穿山甲十四片燒枯研末豬油調敷神效如若不愈照卷十一瘰癧門鼠瘻各方治之腳底生瘡有人腳底生瘡其大如豆痛不可忍用真紅牙大戟去心嚼融敷之將口漱淨再嚼即愈數日復發痛甚於前再用前藥治之收功神效之至腳底生瘡穿爛頂上爐甘石煅紅用黃連黃柏荊芥煎水淬入再煅再淬如此七次焙乾乳香沒藥去油頂上梅花冰片各二錢龍骨竹葉包水泡濕火煨黃丹各三錢白蠟五錢另研共研末連白蠟和勻撒患處外用生雞蛋白麻油煎成薄薄蛋皮剪貼藥上用布扎住次日解開用蔥頭煎湯洗或用銀花湯洗亦可另撒藥末加貼蛋皮數日全愈神效或用腿部白油膏最為神妙腳底皮肉生泡痛難行走此名牛程蹇宜略去老皮用生草烏酒磨敷上立愈此林屋山人方也腳心腫起堅硬如鐵不能履地膝上毛孔時時流水身發寒戰惟能酒食此是肝腎之氣冷熱相吞用草烏頭炒研末敷並用韭菜子炒三錢煎服即愈手足心俱腫方見手部腳心生瘡腳心名湧泉穴最為要害之處如有瘡癤初起色白不甚疼痛無論已破未破須查陰疽各方加意治之腳板色紅如火不可落地熟地二兩山萸肉菊花茯苓五味子丹皮牛膝澤瀉車前子各三錢麥冬元參沙參石斛各一兩蓽茇二錢水煎服二十劑忌房事三月腳底木硬牛皮膠以生薑汁化開調南星末塗上烘物尉之腳底開裂蛇蛻亂頭髮豬板油各二兩清水十二碗用鐵鍋安露天下熬煎以棍頻攪至水氣全去蛇蛻與發無形再入黃蠟四兩俟蠟化傾入瓷鉢待其自凝先以溫湯洗足睡時敷滿裂縫立能定痛潤燥又方白芨刮取細末用口水調敷有挑夫腳底破一寬縫寸步難移此藥敷之立刻止痛能行神妙無比腳上生繭切忌用刀荸薺半個貼患處過夜次晚再貼五六次其繭連根脫出又方蔥頭荸薺共搗汁一碗煎再用松香四兩麻油半斤熬至滴水成珠方入前汁攤膏藥貼上即落又方用蜈蚣一條硼砂等分放鍾內拌勻埋地七日取出銀簪點上即脫腳生雞眼真烏梅肉搗爛入醋少許加鹽水調勻貼之自消又方荸薺一個蕎麵一錢共搗融貼上一晝夜自落又方取活蜈蚣用香麻油泡一二日取出搗爛敷之過夜根即拔出不致再發並治蛀髮癬又方乳香一錢輕粉五分黃丹水飛淨三分生橄欖核三個燒枯存性共研細末香油調敷甚效又方滿天星又名遍地金錢又名破銅錢生階砌及花盆上搗融厚敷一日一夜根自拔出極效又方地骨皮紅花二味研細敷之立愈又方京城滷砂膏藥貼之亦能除根又方生白蘿蔔口嚼如泥敷之止痛如神又方鯽魚膏貼之極效行路腳底起泡生灰面水調敷一夜即平遠行健步細辛防風白芷草烏各等分共為細末凡人將行路遠者先將鞋底內用水微噴濕將此藥摻勻於內雖日行數百里腳不腫痛又方蘿蔔子炒研末白礬研末共鋪鞋底內遠行腳不作痛極效腳臭腳汗蘿蔔煎水洗數次即愈腳冷如冰生附子二錢好酒麴三錢共為末調敷足心甚妙
