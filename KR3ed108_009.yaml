body:
  text: 卷九婦人科調經門凡服調經之藥宜於行經時多服數劑下次經期即准矣若丸藥則宜常久服之乃效不及期而經先行如德性溫和素無他疾者責其血盛且有熱也用歸身川芎各七分赤芍生地知母麥冬地骨皮各一錢甘草五分水煎空心服如性急躁多怒多妒者責其氣血俱熱且有郁也用制香附炒研歸身川芎白芍條芩炒黃連各一錢生草五分生地七分水煎服如形瘦素無他疾者責其血熱也用歸身生地川芎赤芍黃芩炒黃連炒各一錢生草五分水煎食前服兼服三補丸和之三補丸專治血熱黃芩黃柏黃連俱炒各等分蜜丸開水下如形瘦素多疾且熱者責其衝任內傷也用四物人參知母湯歸身白芍臺黨熟地知母麥冬各一錢川芎七分炙草五分薑棗引水煎食前服更宜常服地黃丸地黃丸治女子衝任損傷及腎虛血枯血少血閉之症用熟地八兩山藥四兩山萸肉四兩白茯苓丹皮去骨澤瀉去毛各三兩蜜為丸空心開水下如曾誤服辛熱暖宮之藥者責其衝任伏火也用四物加黃柏知母湯歸身赤芍生地黃柏炒知母木通各一錢川芎七分生草五分水煎食前服更服三補丸見前和之如形肥多痰多郁者責其血虛氣熱也用歸身川芎生地各七分陳皮去白法半夏雲苓生草各五分條芩炒香附童便炒黃連各一錢姜引水煎服經過期後行如德性溫和素無疾者責其氣血虛少也用八物湯川芎白芍茯苓臺黨歸身生草生地白朮各等分薑棗引水煎食後服如性急躁多怒多妒者責其氣逆血少也照上八物湯加香附炒青皮各等分水煎服兼常服蒼沙丸以調之蒼沙丸和中開鬱蒼朮米泔水浸香附童便浸一日夜各三兩條芩酒炒一兩共為末湯浸蒸餅為丸開水下如形瘦素無他疾者責其氣血俱不足也用十全大補湯臺黨白朮土炒茯苓炙草當歸川芎白芍俱酒炒熟地炙耆各一錢肉桂五分薑棗引水煎服如形瘦食少責其脾胃衰弱氣血虛少也用異功散加當歸川芎湯臺黨白朮茯苓炙草陳皮歸身川芎各一錢薑棗引兼服地黃丸見前如肥人及飲食過多之人責其濕痰壅滯軀肢迫塞也用六君子加歸芎湯臺黨白朮茯苓炙草陳皮半夏制歸身川芎香附各一錢姜引兼服蒼沙丸見前如素多痰者責其脾胃虛損氣血失養也用參朮大補丸臺黨川芎砂仁石菖蒲各五錢白朮茯苓陳皮蓮肉歸身各五分炙草三錢真山藥一兩共為末薄荷包米煮飯為丸米湯下經來不止形如牛膜昏迷倒地硃砂一錢白茯苓一兩水和為丸薑湯送下五十粒立效經來不止或下血胞大如雞蛋割開內如石榴子其婦昏迷不知人事此虛證也宜用十全大補湯見前薑棗引水煎空心服三五貼立效內有甘草肉桂末二味米炒令老肉桂味辛恐動血宜加減用之為要經來有白蟲如雞腸滿腹疼痛宜殺蟲由大便出先用追蟲丸後用建中湯補之追蟲丸續隨子檳榔牽牛大戟各五分麝香三分甘遂芫花各一錢米糊丸如梧子大每服十丸酒送下建中湯白芍一兩黃耆肉桂甘草各五錢共研末米湯送下經來成塊如蔥白色又如死豬血黑色頭昏目暗唇麻此虛症也用補內當歸丸見後甚效經來結成一塊如皂角一條痛不可忍不思飲食此血滯也用元胡四錢發灰三錢共為末酒調送下服至半月其塊自消腹大如鼓經來如蝦蟆子此症二三月經水不來以致七八月腹大如鼓人以為孕一日崩下血來其胞血中有物如蝦蟆子昏迷不知人事宜服十全大補湯見前經來如禽獸形月經如禽獸形欲來傷人先將綿塞陰戶用沒藥一兩研末滾開水調下即愈月經過期形如屋漏水頭昏目暗小腹作痛更兼白帶喉中臭如魚腥噁心吐逆先用理經四物湯後用補內當歸丸自愈理經四物湯當歸二錢川芎八分生地三錢柴胡七分香附醋炒元胡醋炒白芍酒炒焦白朮各二錢五分黃芩酒炒一錢補內當歸丸當歸續斷白芷阿膠厚朴茯苓肉蓯蓉漂淨焙乾蒲黃炒黑萸肉各一兩川芎八錢熟地一兩五錢甘草乾薑各五錢附子二錢蜜為丸空心溫酒下七八十丸經來紫色色紫者熱也用四物加香附黃連湯歸尾川芎赤芍香附制生地黃連甘草丹皮各一錢水煎服經來淡色色淡者虛也臺黨白朮茯苓歸身川芎白芍熟地炙耆香附制各一錢炙草五分薑棗引水煎服並常服地黃丸見前經如緑水此症全無血色乃大虛大寒不可用涼藥宜用附子烏雞丸服之半月非但病愈又能懷孕附子烏雞丸附子三錢鹿茸無則用鹿膠一兩真山藥蓯蓉肉桂蒲黃炒黑當歸萸肉各五錢白芍一兩熟地一兩五錢淨烏雞肉去皮油酒蒸三兩米糊為丸空心酒送下一百丸經如黃水此係虛症不可用涼藥須暖其經以和其血次月血勝而愈宜用加味四物湯當歸烏藥川芎元胡小茴白芍各八分熟地一錢薑棗引水煎空心服經來脅內一塊作痛其色深黃宜治塊為先用四物元胡湯當歸川芎白芍各八分元胡一錢熟地一錢五分姜三片酒煎加沉香三分磨兌食後服經來全白色五心煩熱小便作痛此氣血虛也宜用前附子烏雞丸經來疼痛小便如刀割此血門不開宜用牛膝三兩乳香一錢麝香二分水一碗半煎牛膝至一碗臨服磨乳香麝香入內空心服一劑即愈如系火症用辰砂益元散見備用諸方經來狂言如見鬼神此症經來或因家事觸怒逆血攻心不知人事狂言鬼神先用麝香二分辰砂遠志去心甘草各一錢柴胡桔梗茯神各二錢木香五分臺黨八分水煎不拘時服後用茯苓丸即愈茯苓丸茯苓茯神各八錢遠志去骨六錢硃砂三錢豬心一個稀粥為丸如桐子大用金銀花湯送五十丸即愈經來常嘔吐不思飲食丁香乾薑各五分白朮一錢為末每清晨米湯下經來食物即吐此症乃痰在胸膈飲食不能下胃先用烏梅丸化去痰涎後用九仙奪命丹烏梅丸木香雄黃各五錢草果一個乳香沒藥各一錢烏梅為丸如彈子大每早口含化一丸九仙奪命丹草果一個厚朴茯苓各一錢枳殼木香山楂陳皮蒼朮各一錢共為末薑湯下經來咳嗽此症喉中出血乃肺金枯燥急用茯苓湯退其嗽再用烏蘇丸除其根茯苓湯茯苓川芎蘇葉前胡半夏制桔梗枳殼乾薑陳皮各八分當歸生地白芍各一錢臺黨五分桑白皮六分甘草三分姜三片水煎空心服烏蘇丸萊蔔子九錢貝母四兩共為末蜜丸桐子大空心滾開水送下五十丸經來大小便俱出此名蹉經因吃熱物過多積久而成宜用分利五苓散去其熱毒調其陰陽即安分利五苓散豬苓澤瀉白朮赤苓各一錢阿膠炒當歸川芎各八分水煎空心服即愈行經腹痛凡經水將行腰腹脹痛者此氣滯血實也用桃仁四物湯歸尾川芎赤芍丹皮香附制元胡索各一錢生地紅花各五分桃仁二十五粒水煎服如瘦人責其有火加黃連炒黃芩炒各一錢肥人責其有痰加枳殼蒼朮各一錢經後腹痛凡經水過後腹中痛者此虛中有滯也用加減八物湯臺黨白朮香附醋炒茯苓歸身川芎白芍生地各一錢炙草木香各五分青皮七分薑棗引水煎服經來二三日遍身疼痛及寒邪入骨或熱或不熱宜解表發汗用烏藥順氣散烏藥殭蠶白芷陳皮枳殼各八分乾薑甘草各五分麻黃三分去節此味宜稱准不可多用如系春天只服一二分足矣姜三片蔥一根水煎服即愈經來潮熱不思飲食此症經來胃氣不開不思飲食須開胃不宜別樣只取雄鴨頭頂上血調酒飲立效經少腹大如漏胎狀此名腸菌因經行之時寒氣自肛門而入客於大腸以致經血凝澀月信雖行而血卻少其腹漸大如孕子狀為胎漏狀壯盛婦人半年以後氣盛而除虛怯者必成脹病用桂枝桃仁湯桂枝檳榔各一錢五分白芍生地枳殼各一錢桃仁二十五粒炙草五分薑棗引水煎服更宜常服四制香附丸見後此症載靈樞內人鮮知者特表而出之經閉不通婦人女子經閉不行其候有三乃脾胃傷損飲食減少氣耗血枯而不行者法當補其脾胃養其氣血以待氣充血生經自行矣不可妄用通經之劑則中氣益損陰血益干致成癆瘵之疾而不可救所謂索千金於乞丐棰楚日加徒斃其生而已一則憂愁思慮惱怒怨恨氣鬱血滯而經不行者法當開鬱氣行滯血而經自行苟用補劑則氣得補而益結血益凝聚致成癥瘕腹滿之疾所謂養虎自遺患也一則軀肢迫塞痰涎壅滯而經不行者法當行氣導痰使經得行斯之謂良工矣通治經閉蠶砂飲蠶砂四兩炒半黃色用黃酒一斤半甜酒亦可用瓦罐煎滾湯去蠶砂將酒入瓶封好溫飲一二杯即通甚效如因脾胃損傷血杜不行者用加減補中益氣湯臺黨白朮各二錢炙耆柴胡各七分歸身白芍川芎陳皮各一錢神麯炒麥芽炒炙草各五分薑棗引水煎服更宜服參朮大補丸烏雞丸以經行為度如因氣鬱血閉不行者用開鬱二陳湯陳皮茯苓蒼朮香附制川芎各一錢半夏制青皮莪朮檳榔各七分甘草木香各五分姜引水煎服更宜服四制香附丸以經行為度四制香附丸此婦人常用之要藥也淨香附一斤用酒醋鹽水童便各浸三日焙研烏藥八兩共為末醋糊為丸開水下如因痰多者用前蒼莎導痰丸更服上開鬱二陳湯去莪朮加枳殼一錢服之有愆期未嫁之女偏房失寵之妾寡居之婦庵院之尼欲動而不能得遂憾憤而不得伸多有閉經之疾含羞強忍不欲人知致成癆瘵之病終不可救者宜用四制香附丸參朮大補丸攻補兼行庶幾可瘳此七情之變無以法治者也有經閉不行骨蒸潮熱脈虛者用增減八物柴胡湯臺黨茯苓各一錢炙草五分歸身白芍生地麥冬知母柴胡有汗加地骨皮無汗加牡丹皮各二錢淡竹葉十五皮水煎服凡婦人血虛有熱者皆可服之如熱太甚服此不平者加黑乾薑一錢神效有經閉發熱喉燥唇乾脈實者用四物涼膈散歸身川芎赤芍生地黃芩酒炒黃連酒炒山梔炒黑連翹桔梗各一錢生甘草薄荷葉各五分淡竹葉十皮水煎服凡血實形盛脈有力者皆可服之經閉腹大如孕此名石瘕因行經之時寒氣自陰戶而入客於胞門以致經血凝聚月信不行其腹漸大如孕子狀婦人壯盛者半年之後小水長而消矣若虛怯者必成腫病用溫經湯歸身川芎赤芍莪朮臺黨炙草各五分川牛膝故紙小茴炒各一錢薑棗引水煎服更宜常服四制香附丸見前此靈樞經祕方也室女經閉遍身浮腫室女月水初行不識保養誤用冷水洗手血見冷水則凝不出面色青黃遍身浮腫人作水腫治之不效宜用通經丸通血消腫即愈通經丸三稜莪朮赤芍川芎當歸紫菀劉寄奴各八分穿山甲一片共為末米糊為丸酒送下婦女因開甑時為熱氣所沖面目腫大經水不通舊蒸飯布越舊越好燒灰用鍋蓋上氣水甑蓋上氣水亦可調敷隨敷隨消經水亦通無蒸飯布用甑底燒灰亦可婦女疳疾經水不調面色黃瘦咳嗽燒熱或吐血或不吐血不思飲食精神疲倦熟地乾薑當歸蒲黃赤芍甘草各三錢小黑豆五錢共研細末另用肉桂三錢去皮研末入藥拌勻每用三錢外加男子指甲七個瓦上焙黃研細入藥內臨睡時用熱淡黃酒沖服出汗不要受風每日服一劑共服四劑其效如神此四日只用開水紅糖拌飯食或食稀粥千萬不可另吃別物並忌受驚氣惱是所至要經逆上行從口鼻出此因食椒姜熱毒之物其血亂行急用犀角地黃湯犀角白芍丹皮枳實各一錢黃芩橘紅百草霜即鍋底煙子以燒草者為佳燒煤炭者斷不可用桔梗各八分生地二錢甘草三分水煎空心服數劑即愈又方韭菜搗汁一盞入童便半盞蒸熱服極效若無童便其功稍緩又方先以好陳墨磨水一盞服其血立止次用歸尾紅花各一錢水一盅半煎八分服經水從口鼻出咳嗽氣緊宜推血下行當用紅花散七貼次用冬花散止咳下氣不須五七貼熱去全安紅花散紅花黃芩蘇木各八分花粉六分水煎空心服冬花散冬花蕊粟殼蜜炒桔梗枳殼蘇子紫菀知母各八分桑皮炒石膏杏仁各一錢水煎服經水房事相撞俗名撞紅用明雄水飛淨三錢好酒沖服一次即愈血崩不止參看後老婦血崩方燈心一根蘸香油點燃燒大敦穴一下即止穴在兩足大趾外側甲縫內中間不上不下即是如止而又崩即在原處燒之若原處起泡挑破燒之無不止矣此治崩症神效第一方也止後再請名醫用藥調理以免復發又方凡婦女有血崩血枯之症其頭頂心必有紅髮數根拔之燒灰酒調空心服甚效又方陳蓮蓬殼燒灰存性五錢棉花子燒灰存性三錢共研末米酒沖服奇效非常此仙人尹蓬頭方也又方膠血飲見後老婦血崩方最為神效又方木耳炭火焙存性研末一錢崩輕用熱酒調服崩重以鐵稱碗燒紅投入酒內俟酒熱調服立效又方肥羊肉三斤用水三十六碗煮至十五碗加入真大生地黃一斤乾薑當歸各三兩煮至三大碗分作數次服之甚效此孫真人方也又方制貫衆末二錢製法見後赤白帶下第一方酒沖服因濕熱而崩者極效又方鍋底煙子以燒草者為佳燒煤炭者斷不可用熱酒沖服二三錢立止又方真大生地二兩切片用好紹酒浸透搗爛如膏取汁再用當歸川芎各五錢煎好和生地汁搗勻服之遇危險者如心口熱可救又方旱蓮草查藥物備要便知煮雞湯食之立效又方好肉桂去皮瓦上煅存性研末空心米湯調服三錢虛寒血崩極為神效又方小公雞一隻重半斤上下去毛並肚雜入好田州三七三錢砂鍋內蒸極融爛空心服食即愈又方陳棕燒存性空心淡酒沖服三錢又方榖樹皮又名楮樹又名構樹荊芥各二錢煎服神效無比又方蓋牆頭之破缸槌碎如豆大砂鍋內炒熱加醋淬入取醋飲之立效又方蠶砂砂鍋內炒黃為末酒調服三四錢效又方核桃肉五十個燈火上燒存性搗融燈用麻油別油忌用作一次空心嚼食神效又方黃耆真山藥炒苡仁米各七錢當歸炭四錢阿膠蛤粉炒珠五錢蓮蓬炭老棕炭各三錢炒白芍二錢荊芥炭一錢五分煎服日久不愈者服之甚效又方甜杏仁苦者即桃仁斷不可用去皮尖燒存性為末每服三錢空心熱酒服諸藥不效者服此立止老婦血崩凡婦人老年驟然血海大崩不止名曰倒經速投此方一劑其崩立止如仍發熱以六安州茶葉三錢如無即用別項茶葉亦可煎服一次身熱即退再用六君子湯加當歸白芍調理而安陳阿膠一兩米粉拌炒成珠無則以陳黃明膠代之總不如阿膠之妙全當歸一兩西紅花八錢冬瓜子五錢用天泉水煎服其渣再煎服之方名膠紅飲此方傳自異人每治老婦血崩屢試如神後見少婦大崩不止屢服大料補劑血流反多飲食不下昏暈幾次勢甚危篤照此方減去紅花一半服之仍用六君子湯加當歸白芍調理全愈葉天士云初崩宜塞久崩宜通即此義也紅花能去瘀生新不與桃仁同用並不害事切勿疑誤崩中漏下五色蜂窠焙枯研末五分溫酒下神效此張文仲方也崩久成漏連年不休此中氣下陷元氣不固也宜用前加味補中益氣湯兼服鹿角霜丸鹿角霜柏子仁去殼炒歸身茯神龍骨煅阿膠蛤粉炒成珠各一兩川芎七錢香附醋製二兩炙草五錢川續斷一兩五錢共為末山藥五兩研末煮糊為丸每服五十丸空心溫酒下白帶白濁白淫婦人常有白帶白濁白淫諸疾症固不同治亦有別白帶者時常流出清冷稠黏此下元虛損症也白濁者濁隨小便而來渾濁如米泔水此胃中濁氣滲入膀胱也白淫者常在小便之後來亦不多此男精不攝滑而自出不治亦愈也治白濁方陳皮半夏制白茯苓白朮益智仁鹽水炒研蒼朮各一錢炙草五分升麻柴胡各七分姜引水煎服赤白帶下帶久不止者專以補虛為主宜服十全大補湯去地黃加陳皮半夏乾薑更服參朮大補丸俱見前以補脾胃之虛及服補宮丸以補下元之耗補宮丸鹿角霜茯苓白朮白芍白芷牡蠣煅童便炒真山藥龍骨煅赤石脂各五錢乾薑炒二錢五分醋煮為丸空心米湯下又方白朮五錢真雲苓二錢車前子一錢雞冠花三錢水煎服無論久近其效如神百發百中赤帶用白雞冠花白帶用赤雞冠花反之為炒又方赤白帶下諸藥不效年久不愈此乃濕熱也貫衆一個去皮毛以好陳醋泡透慢火燒熟為末空心米湯下每服二錢亦百發百中之方也赤白帶下臍腹疼痛白芍二兩炒乾薑五錢共為細末每服三錢空心溫米湯調下效驗如神五色帶下年久古磚一塊燒極紅赤以油煎麵餅七個安放磚上再用黃瓜根研末鋪面餅上加布兩層令病人坐上使藥氣熏入腹中當有蟲出治三五次蟲盡即愈婦人科種子門種子芻言方書每載種子一門誠屬綿延宗祀之苦衷竊謂子孫蕃衍皆由祖宗積德己身修善上天賜以嗣息使獲多男之慶得遂燕翼之謀所關非淺豈可強求每見富貴之家年未四十託名無子借號體虛廣蓄姬妾遍覓奇方金石雜投辛溫並進以為育麟有望誰知腎火熾而情欲肆情欲肆而津液漓神衰形喪終嘆無兒兼之年壽不永中道崩殂而與寡欲多男之說不大謬哉上天好生挽回甚速奉勸艱嗣君子深體天心廣行陰騭出言醞天地之和居心存忠厚之意興房幃而勿求美色淡嗜欲而毋斫乃躬或敦宗睦本或濟急扶危或流傳善書或創修寺院或興義學或恤孤婺或施艌助葬或饋藥送衣或有力而獨為或無資而勸募一切善事次第力行自然螽斯載吟麟趾呈祥也況夫人而求子原為家業無人可付宗祧無人可守耳如有家業而乏子嗣財已無主不思修為專圖瘑刻繼嗣覬奪構訟多端身未寒而家已破仍飽他人之腹徒增一己之愆愚孰甚焉何如以無主之財而作有用之事乎伏願求子者勿恃藥餌堅守仁心身其康強子孫其逢吉矣即或不然早立應嗣飲之食之教之誨之雖毛里不屬而怙恃有思如同己出亦可守祧也有心求嗣者當不河漢斯言保命延生種子戒期娶婦必期偕老生子必望長成乃人有伉儷極篤而中道死亡産育艱難而半途夭折者只因肆情縱欲暗犯禁忌而不自知也道經云男女交媾最有避忌若犯所忌天奪其算神降之殃生子醜貌怪相性行不良殘疾夭扎實有明驗故君子不獨外色鋤之務盡即房幃之內琴瑟之歡俱有克治之道焉茲將正色戒期録出以為卻病保生之一助也正月初一名天臘玉帝下界校世人祿命犯者削祿奪紀初三萬神都會犯者奪紀初五五虛初六六耗初七上會初九玉帝誕犯者奪紀十四三元下降犯者減壽十五天宮誕十六三元下降二十五每月二十五日為月晦日犯者減壽二十七每月二十七北斗下降犯者奪紀二十八每月二十八人神在陰犯者得惡疾三十每月三十日司命奏事犯者減壽月小即戒二十九日二月初一犯者奪紀每朔如此初三文昌帝君聖誕犯者削祿奪紀十五老君誕犯者奪紀每月如此十八先師孔子誕辰犯者削祿十九觀童聖誕犯者奪紀二十五二十七二十八三十俱同前三月初一同前初三玄天上帝誕犯者奪紀初九牛鬼神出世犯者産惡胎十五同前十六准提菩薩誕犯者奪紀十八中嶽帝誕犯者奪紀二十五二十七俱同前二十八東嶽帝誕犯者奪紀三十同前四月初一初三俱同前初四萬神善化犯者失音初八釋迦佛誕又善惡童子降犯者血死十四呂純陽祖師誕犯者削祿奪紀十五鍾正陽仙師誕犯者奪紀二十五二十七二十八三十俱同前五月初一南極長生大帝誕犯者減年初三同前初五名地臘五帝考校生人官爵犯者削祿奪紀初五初六初七十五十六十七二十五二十六二十七以上九日名九毒日犯者得病損壽若十五日子時犯者主三年內夫婦皆死經驗多人十六為天地造化萬物之辰尤忌犯者大凶十三關聖帝君降神犯者奪紀二十七二十八三十俱同前六月初一初三十五俱同前十九觀音得道二十三火神誕二十四關聖誕雷祖誕犯者奪紀二十五二十七二十八三十俱同前七月初一初三俱同前初七道德臘五帝校人善惡犯者奪紀初十陰毒日十五中元地官校籍犯者奪紀二十五二十七二十八俱同前三十地藏菩薩誕犯者奪紀八月初一同前初三司命灶君誕又北斗星君誕犯者重病奪紀初十北嶽帝誕犯者奪紀十五太陰朝元之辰官焚香守夜犯者太凶二十五同前二十七至聖先師孔子誕犯者削祿奪紀或云二十一非二十七日未知孰是二十八三十同前九月初一南鬥降神犯者奪紀初一至初九此九日為北斗下降日宜齊戒又初九斗母誕犯者男女俱陷黑簿亥時犯者夫婦雙亡十五同前十七金龍四大主誕十九觀音出家犯者困苦二十五同前二十七二十八俱同前三十藥師佛誕十月初一民歲臘犯者奪紀初三同前初五諸神下會犯者大凶初六天曹考察犯者大禍初十西天王降犯者暴亡十五下元水官校籍犯者奪紀二十五同前二十七北極紫微大帝誕犯者奪紀二十八三十俱同前十一月初一初三俱同前初六西嶽帝誕十一太乙救苦天尊誕十五同前十七阿彌陀佛誕犯者奪紀十九太陽誕犯者奪紀二十五掠刷大夫降犯者大凶二十七二十八三十俱同前十二月初一初三俱同前初七犯者惡疾初八王候臘初旬戊日亦是犯者得病十五同前十六南嶽帝誕二十天地交泰犯者奪紀二十四司命上奏人間善惡二十五玉帝三清巡視諸天定來年禍福犯者得病損奪二十七二十八同前除夕諸神考察犯者得病損壽每歲四立二分二至社日三伏日庚申甲子日祭祀前齊戒日父母誕日諱日夫婦誕日本命日疾風暴雨雷電晦暝日月薄蝕犯者大凶受禍得病酷暑嚴寒病餘産後過醉空腹遠行鬱怒犯者得病損身停燈行房最干神怒以上各期先夜即須謹戒蓋半夜交子晝長夜短者二更後將即交子時不可不慎謹按禮記月令日夜分雷乃發聲先雷三日奮木鐸以令兆民曰雷將發聲有不戒其容止者生子不備必有凶災可知禁忌自古有之日長至則曰止聲色毋或進日短至則曰去聲色禁嗜欲蓋冬夏二至陰陽相爭之時最難保護前後數日皆宜絶欲至於高山大川之上日月星辰之下神廟寺觀之內井灶尸柩之旁及一切非其地非其時俱宜嚴戒茲刻始於拙庵秦太史流傳已遍此本校定最准刪繁就簡止擇最重者録之蓋禁忌太繁奉行恐怠也若能避忌必臻上壽若反是無不受禍語云樂極生悲縱欲成患謹勸世人須為長久之歡弗逞暫時之樂蓋欲濃則暫欲淡則長其理不爽其事不誣也篤信者另以小紙將日期録出貼出壁上每逢禁忌必謹遵之求嗣得孕法昔褚澄言男精泄於先而女精後至則陰裹陽主男孕女精泄於先而男精後至則陽裹陰主女孕又云月信初盡其濁氣未淨而交媾即女務待經止兩三日則女體虛而濁氣盡再男子保養月餘陽勝於陰定成男孕又論子宮左右如男精泄於婦人之左生男右則生女男清女濁男左女右陽壯陰衰之至論也夫疾風暴雨或醉飽或服春藥而受胎者多夭必俟天氣晴明日暖風和明星亮月而受胎者多聰明富貴倘時令不正或迷霧氣怒而受胎者多愚蠢貧賤或雷電之候而受胎者定生怪狀之物誠不可不慎也種子諸方調經種子湯歸身川芎吳萸各一錢熟地制香附各一錢五分酒芍茯苓丹皮各八分延胡索廣皮各七分生薑三片若經水先期者色必紫加條芩八分過期者色必淡加官桂乾薑熟艾各五分水一碗半煎八分經水至日空心服渣再煎臨臥服一日一劑服至經止兩三日交媾即孕經期准而不受孕者用續斷沙參杜仲當歸益母草制香附各二錢川芎橘紅砂仁炒研各五分紅花三分經來時煎服四劑下期再服必孕又經通不受胎者凡參曬乾磨粉每日用二錢陳酒送下兩月內即孕無有不靈丁公仙枕方丁公諱其泰康熙時人曾任山西總兵年逾七十無嗣遇異人授此方不二年精力強壯至八十一歲已生二十一子矣其方用槐木薄板做枕一個高三寸三分寬四寸五分長一尺二寸如天蓋地式面上鑽孔一百二十八個如桐子大用後藥裝入枕中百日後諸病消除精神倍長壽高子多真仙方也如夫婦皆以此作枕更見奇效其藥料三五個月一換真川椒桔梗荊實子柏子仁薑黃吳茱萸白朮薄荷肉桂川芎智仁枳實全當歸川烏千年健五加皮蒺藜羌活防風辛夷白芷附子白芍藁本北細辛豬牙皂蕪荑甘草荊芥菊花杜仲烏藥半夏蓯蓉共三十四味每味一兩務要頂好鮮明咀片研為細末絹袋盛之裝入枕中赤腳大仙魚膘種子丸此方系雲南大理府周姓年老無子遇異人傳授此方服至月餘自覺目明身健發黑髯烏連生七子壽至九十有七此方專治身體虛弱老少酒色過度頭眩耳鳴目花腰膝痠疼四肢無力自汗盜汗下元虛損夢遺精滑陽萎或男子精寒腎虛陽物不舉不能久堅元陽衰敗或女人血寒氣弱子宮久冷赤白崩帶經水不調久不受孕服此方立效有子者服之亦可卻病保元肥當歸酒洗曬乾淫羊藿去枝梗荊刺羊油酥更妙白蓮蕊揀淨去灰土肉蓯蓉酒洗曬乾川杜仲去皮青鹽水炒斷絲菟絲子淘淨灰土用甜酒浸一宿又以水煮再用酒煮成餅曬乾沙苑蒺藜皮貨店帶者為真碧緑豬腰形者佳去灰土分四股青鹽人乳老酒童便各伴二兩微炒各八兩真雲苓去皮切片人乳拌蒸曬乾甘枸杞紅色肉厚者揀淨去蒂各四兩牛膝肥長者佳去蘆切片酒洗曬乾固脂揀淨青鹽水炒各六兩上白魚膘一斤蠣粉炒成珠磨細上好肉桂二兩去粗皮切片不可見火大附子二個每個重一兩四錢去臍切四塊以甘草水浸七日每日一換至期用面半斤裹好放炭火中煨熟切片焙乾此附桂二味年老並虛弱者可用壯實者少用以上諸藥各依泡製共為細末煉蜜為丸如梧子大每早服百丸鹽開水下晚服百丸陳黃酒下甜酒亦可四奇種子丸粉龍骨五色者佳瓦上煅鎖陽醋洗北細辛水泡一夜曬乾陽起石見太陽跳動者佳各三錢早黃桂花人乳拌曬旱地浮萍要肥大者吳茱萸醋泡過一夜炒上肉桂去皮各二錢紫梢花色潤紫者佳石榴皮瓦上焙乾砂仁去殼燒酒洗焙乾肉蓯蓉紅色者佳焙乾川椒要開口者枸杞去核炒麝香用當門子白芷銅器內炒黃鬧楊花焙象皮末真鴉片各一錢高麗參蘆五錢萆麻子四十九粒去殼去油淨共為末煉蜜為丸如小龍眼肉大丁香油為衣每於經淨七日之內先放一丸入陰戶內待一頓飯時藥化然後行事緊暖如御處女十産九男神應無比不可輕視然種子務宜節欲若藉此淫佚無度不惟無子且恐傷生不可不慎種玉酒治婦女經水不調血氣不和不能受孕或生過一胎之後停隔多年服此藥酒百日即能受孕如氣血不足經滯痰凝者服至半年自然見效若受胎之後須服保胎磐石散見胎前門可保無病神應非常全當歸五兩切片此能滋養血氣遠志肉五兩用甘草湯洗一次此能散血中之滯行氣消痰二味用稀夏布袋盛之以好甜酒十斤安藥浸之蓋好浸過七日後晚上溫服隨量飲之慎勿間斷服完照方再製再月經來時乾淨之後每日用青殼鴨蛋一個以針刺孔七個用蘄艾五分水一碗將蛋安於艾水碗內飯鍋上蒸熟食之每月多則吃五六個少則二三個亦可羊腎酒湧泉膏種子兜肚方均見備用諸方門子宮寒冷不能受孕吳萸川椒各八兩為末煉蜜為丸彈子大棉裹入陰戶中日夜一換一月後子宮溫暖即可成孕又方硫黃煎水常洗效婦人科胎前門保産諸方保産無憂方專治一切産症有胎即能安胎臨産即能催生不拘月分凡胎動不安腰痠腹痛一服即安再服全愈臨盆艱危者一服即生橫生逆産六七日不下及兒死在腹中命在須臾者亦一服即下懷孕者七個月即宜預服七個月服一劑八個月服二劑九個月服三劑十個月亦服三劑臨産服一劑斷無難産之患百發百中功效如神紫厚朴薑汁炒蘄艾醋炒各七分當歸酒炒川芎各一錢五分生耆荊芥穗各八分川貝母去心淨為末不入煎以藥沖服菟絲子揀淨酒泡各一錢川羌活生甘草各五分枳殼麵炒六分白芍酒炒二錢冬月只用一錢藥須照方揀選炮製後用戥稱准不可加減分毫引用老生薑三片水二大鐘煎至八分服預服者空心溫服臨産及胎動不安並勢欲小産者皆臨時熱服如人虛極再加人參三五分更妙已産後此藥一滴不可入口切勿誤服此方藥劑分量雖輕功效甚大不論強弱老少皆宜佛手散治胎氣受傷或子死腹中疼痛不已口噤昏悶或心腹脹滿血上衝心服之生胎即安死胎即下又治橫生倒産須先安臥將此藥煎服再行安臥自然順生若兒手足在外未能收入切不可亂動惟少以食鹽塗兒掌用指甲輕搔之又以鹽摩母腹安臥一時自然收入藥宜早備以資急用當歸一兩川芎六錢水七分酒三分同煎至七分服若治橫生倒産及死胎則加黑馬料豆一合炒焦乘熱淬入水中加童便一半煎藥服少頃再服一劑神效此方又治産後腹痛發熱頭痛能逐敗血生新血除諸疾加減芎歸湯專治難産及陰氣虛弱交骨不開催生如神藥宜早備以資急用當歸一兩川芎七錢生龜板手大一塊醋炙研末藥店多以熬過龜膠之板混用必自行看過實系生龜板方能見效婦人亂髮蛋大一團瓦焙存性用水二碗煎一碗如人行五里之久即生若死胎亦即下也有人産門不開兩日未生服此一劑即産真聖藥也安胎飲專治婦人慣於墮胎屢試神驗平時無小産之患者服此亦妙一婦人小産六次百藥無效後服此方連生數子無恙屢試如神百發百中真保胎第一方也蓮肉去心不去皮家用青萱麻洗淨膠白糯米各三錢水煎去麻每早連湯服一次或服湯不服蓮肉糯米亦可小産由於房勞傷損足三陰腎傷則精氣不固肝傷則血熱妄行脾傷則胎元自墮蓮肉清君相之火而能澀真氣萱麻利小便而通子戶清淫欲之瘀熱糯米補益脾陰能實陽明空竅使胎不妄動而胎氣自安以五穀果實為方誠王道之劑也泰山磐石散治婦人血氣兩虛或肥而不實或瘦而血熱或肝脾素虧倦怠少食屢有墮胎之患此方和平兼養脾胃氣血覺有熱者倍加黃芩少用砂仁覺有胃弱者多用砂仁少加黃芩更宜戒惱怒欲事並酒醋辛熱之物可保無墮臺黨炙耆川芎黃芩川續斷各一錢白芍酒炒熟地各八分白朮二錢土炒炙草砂仁各五分糯米三錢用泉水煎服但覺有孕隔三五日常用一服過四個月方保無虞其藥渣可傾入河池內與魚食之以有糯米故也徐東皋曰婦人凡懷胎兩三個月慣要墮落名曰小産此由體弱氣血兩虛臟腑火多血分受熱所致醫家安胎多用艾附砂仁熱補之劑是速其墮矣殊不知血氣清和無火煎爍則胎自安大抵氣虛則提攝不住血熱則濫溢妄行欲其不墮得乎香附雖云快氣開鬱多用損正氣砂仁快脾多用亦耗真氣況香燥之性血氣兩傷求以安胎適所以損胎也惟泰山磐石散千金保孕丸二方能奪造化之妙百發百中神效非常千金保孕丸治妊婦腰背痛慣於小産服此方可免墮胎之患厚杜仲四兩切片用白糯米炒斷絲川續斷酒拌炒二兩共為末以山藥六兩煮糊為丸如桐子大每服八九十丸用米湯空心送下戒惱怒忌食酒醋豬肝發火等物小産保胎方杜仲一斤切片用鹽水浸七日其水每日一換銅鍋緩火炒斷絲研細末另用黑棗一斤以陳黃酒二斤甜酒亦可煮極化去皮核和杜仲末杵為丸如桐子大每日早起用淡鹽湯送下三錢此方百試百效切勿妄行增減如向在三月內小産者服至六七月可止如在五七月小産者服至八九月可止孕婦惡食嘔吐其症顏色如故脈息平和但覺肢體沉重頭目昏眩擇食惡聞食氣好食酸鹹甚者或作寒熱心中憒悶嘔吐痰水胸膈煩滿恍惚不能支持輕者不服藥無妨乃常病也如重而不能飲食者用臺黨砂仁炒研甘草各一錢白朮香附童便炒真烏梅陳皮各錢半姜引水煎食遠服又方食鹽三分煨姜六分竹茹三分老米一撮炒砂糖三錢煎水徐徐服之如有蛔蟲吐出加花椒二分烏梅三個煎服立效孕婦吞酸孕婦傷食腹滿吞酸噁心不喜食者用加味六君子湯臺黨白朮半夏陳皮茯苓炙草枳實炒神麯炒砂仁炒各五分姜引水煎食後服孕婦頭痛因外感頭痛者此虛也加味芎歸湯川芎當歸各錢半黃芩酒炒白朮各一錢五分細茶葉二錢水煎食後服孕婦目鼻咽喉唇口諸病孕婦專以清熱為主目鼻咽喉唇口諸病多屬熱也用吳茱萸五錢研末好溫醋調敷兩足心用布包好過一日夜足心如覺發熱即愈如尚未愈連換數次再敷一日夜無不愈矣屢試如神或用涼膈散各隨其症加減用之涼膈散條芩川連梔子各酒炒各八分連翹甘草桔梗各一錢薄荷五分水煎服目赤痛者前方加當歸川芎羌活防風菊花各一錢竹葉引鼻血不止者前方加當歸生地各一錢茅花一大團姜引或照卷一鼻部第一方治之萬無一失咽喉痛者前方加牛蒡子炒杵碎一錢口舌生瘡者只依本方姜引孕婦口渴此血少三焦火熾所致用歸身白芍川芎生地熟地川柏各一錢水煎服孕婦咳嗽如初得之惡風寒發熱鼻塞或流清涕者宜發散用加減參蘇飲臺黨紫蘇陳皮茯苓甘草枳殼桔梗黃芩前胡各一錢姜引薄荷葉少許水煎食後服得微汗即愈如久嗽不已謂之子嗽引動其氣恐其墮胎用臺黨白朮茯苓炙草蘇葉阿膠桔梗各等分水煎食後服又方川貝母去心麵炒黃去面研末砂糖為丸如芡實子大口中含化一丸極妙又卷三咳嗽門內杏仁百合各方亦可用孕婦心痛不可忍此胎氣不順宜用順胎散草果一個元胡八分五靈脂一錢滑石八分酒煎半飢服孕婦心忡豬心一個不下水用水一碗煎湯硃砂飛淨三分調服或用加味參麥散見産後門産後不語方更妙胎上衝心葡萄一兩煎湯服即下或用前吳萸敷腳心方更妙胎安即洗去為要孕婦乳腫或兩乳或一乳腫痛作冷作熱名曰內吃用皂角一條燒枯存性酒送下立消不復發矣其乳癰乳岩各症均見卷二乳部內孕婦腹癢取鐵箭頭舊用針線袋亦可安臥席下勿令婦知及他人知又肚腹部有腸癢方亦可用也孕婦腰痛豬腰一對要一豬所生者去白膜青鹽四錢入豬腰內火內燒枯研末蜜為丸空心酒送下即愈或用前千金保孕丸更妙孕婦小便不通此胎壓尿胞不得小便心煩不臥名曰轉胞用保生無憂方見前服一劑胎即升上自能小便百發百中神效非常又方貝母苦參當歸等分為末煉蜜為丸黃豆大每服三丸多至十丸即愈又方豬尿脬吹脹以翎管安上插入陰戶小便孔內捻脬氣吹入即通極效如小便少而澀痛查後子淋方治之孕婦大便虛急不出此症脾土燥大腸澀不可用硝黃等藥宜用枳實二錢水二碗煎七分不拘時服體弱者少服孕婦泄瀉以補中安胎為主白芍二錢生地川芎當歸各一錢水煎服如發熱而渴者為熱本方加條芩一錢不渴者為寒本方加乾薑五分烏梅一個為引如渴泄久不止者臺黨二錢白朮三錢甘草八分白芍酒炒茯苓各錢半訶子肉乾薑一錢炒烏梅一個水煎食前服如久泄大渴者茯苓炙草各一錢藿香五分木香乾薑各二錢半水煎時時服之孕婦痢疾以清熱和胎行氣養血為主虛坐努力者防其損胎用當歸黃芩芍藥湯當歸黃芩黃連白芍焦朮枳殼茯苓生地陳皮生草各一錢木香五分烏梅一個水煎空心服如久痢不止用黃連阿膠湯黃連炒阿膠炒臺黨白朮茯苓各一錢乾薑炒炙草各五分木香七分烏梅三個薑棗引水煎食前服又方用雞蛋一個破孔如指頭大以銀簪攪勻加入黃丹五分用紙封口在飯上蒸熟食之即愈神效非常又方荷葉蒂七個燒枯存性研末酒下極效孕婦瘧疾凡孕婦病瘧不可輕用截藥恐致損胎用柴胡知母湯柴胡錢半臺黨黃芩歸身知母白朮各一錢甘草五分薑棗引水煎多服以平為期如瘧久不退轉甚者用七聖散柴胡黃芩炙草知母常山酒炒草果仁各錢半真烏梅三個去核水酒各半煎臨發五更服之宜露一夜蕩溫服忌生冷雞魚或用卷十五瘧疾門外治各方最穩而效孕婦霍亂其症心腹絞痛上吐下泄用紫蘇條芩白朮各錢半藿香葉陳皮甘草各一錢砂仁炒五分薑棗引水煎服孕婦中暑凡盛暑時中其暑熱之毒者其症發熱而渴自汗精神昏憒四體倦怠少氣用清神和胎飲臺黨白朮炙草炙耆黃芩黃連知母麥冬各一錢五味十五粒水煎服孕婦中濕凡孕婦或早行感霧露之氣或冒雨或久居潮濕之地或汗出取冷水浴之其症發熱骨節煩疼體重頭痛鼻塞用黃芩白朮湯條芩白朮各五錢蘇葉二錢五分生薑五片煎水服孕婦中風凡孕婦中風或手足拘攣強直或卒倒昏悶口眼喎斜手足瘛瘲口噤不語不可用常治中風之法只以補虛安胎為本兼用搜風之劑臺黨川芎白芍茯苓生地白朮歸身炙草黃芩黃耆防風羌活秦艽各二錢薑棗引水煎多服以平為度如牙關緊閉痰氣壅塞不知人事先用黃蠟枯礬麻黃各四分為末共溶化搽上牙關再用上方服之孕婦癱瘓此症手足不能動乃胃中有痰凝聚血氣所致宜用烏藥順氣散見調經門或照卷十四癱瘓門外治各方治之孕婦遍身搔癢此症有風不可服藥用樟腦調酒擦即愈或照卷十六遍身搔癢外治各方治之子懸前五篇有吳萸敷足心方用之神效胎安即洗去為要孕婦五六月以後胎氣不和上湊心腹脹滿疼痛者謂之子懸用紫蘇飲紫蘇陳皮大腹皮川芎白芍歸身各一錢潞黨炙草各五分姜五片蔥白七寸水煎空心服子煩孕婦心驚膽怯終日煩悶不安者謂之子煩用人參麥冬散黨參茯苓麥冬黃芩知母生地炙草各一錢竹茹一大團水煎空心服子癇孕婦忽然眩暈卒倒口噤不能言狀如中風須臾即醒醒而復發謂之子癇乃氣虛挾痰火之症也用清神湯黨參白朮茯苓炙耆炙草麥冬歸身各一錢薑棗引水煎食後服兼服琥珀壽星丸琥珀壽星丸安神定志去風化痰天南星一斤掘地作坑深二尺用炭火二十斤於坑內燒紅去炭掃淨用好酒五升澆之將南星趁熱放坑內用瓦盆急蓋定以黃泥封固經一宿取出焙乾為末入琥珀末一兩硃砂末五錢和勻以生薑自然汁煮如麵糊熟再入獖豬心血三個閹割者為獖豬攪勻和為丸如梧子大硃砂為衣每服五十丸黨參煎湯下日服三次神效子腫孕婦面目身體四肢浮腫者此胎泛濫謂之子腫用加味五皮湯大腹皮生薑皮桑白皮白茯苓皮白朮紫蘇各味等分棗引去核水煎另用木香磨濃汁三匙入內又孕婦腹大有水氣者亦名子腫用鯉魚湯白朮二錢茯苓錢半歸身白芍各一錢生薑陳皮各五分活鯉魚一個約重八九兩煮汁一盞半去魚以魚湯煎藥服甚效孕婦自六七個月以來兩足腫大行步艱難腳指間有黃水出此名子氣亦多有之未備醫治生子之後其腫自消重者用茯苓湯雲苓白朮陳皮香附烏藥各一錢炙草五分紫蘇五分木瓜三片姜引水煎空心服子滿孕婦至七八個月胎已長成腹大腹滿逼迫子戶坐臥不安謂之子滿用束胎飲白朮黃芩蘇葉枳殼大腹皮各錢半砂仁五分連殼略研炙草三分姜引水煎空心服子淋孕婦小便少又澀痛者謂之子淋用加味木通湯木通生地條芩甘草梢麥冬赤芍黨參各一錢淡竹葉十五片燈心一撮水煎空心服子鳴氣足時子在腹中鳴者謂之子鳴此由孕婦或缺身向高處取物子在腹中失脫口中所含疙瘩故啼治法或令孕婦作男子拜狀或以豆撒地令孕婦檢之子復含著則止矣孕婦無故心虛驚恐悲泣狀若遇邪此臟躁症也用甘草三兩小麥一升大棗十枚用水六升煎三升去渣分三服溫服即效再服竹茹湯數服以和之竹茹湯臺黨麥冬茯苓炙草各一錢小麥一合青竹茹雞子大一團姜三片棗五枚水煎食後服孕婦至七八九個月內忽然聲啞不語此少陰血脈下養於胎不能上榮於舌生子之後自能言語非病也不可服藥莫信庸醫圖利只以飲食補之孕婦忽然倒地此乃血養兒胎母缺精神承胎不住眼目昏花一時倒地不須服藥只以飲食補之可也胎動不安用前八篇吳萸敷足心方最妙胎安即洗去為要絲瓜二個又名水瓜又名線瓜煎水服即愈如無絲瓜或藤亦可或用保生無憂方最妙胎動下血不止保生無憂方服之即止又方取白蠟一團如雞蛋大煎三五滾對好酒服立愈十日內忌食雞又方五倍子末酒調服二錢神效撲跌胎動腹痛下血砂仁不拘多少放尉斗內慢火炒熱透去筋膜為末每服二錢熱酒下即安功最神效孕婦漏胎漏胎者謂既有孕而復下血也女子之血在上為乳汁在下為經水一朝有孕而乳汁經水俱不行者聚之子宮以養胎也今胎漏下則是氣虛血虛胞中有熱下元不固也宜用臺黨白朮歸身赤芍熟地黃柏知母阿膠艾葉條芩炙草各等分薑棗引水煎食遠服兼用杜仲丸杜仲丸杜仲薑汁炒川續斷酒炒各二兩共為末棗肉搗和為丸如梧子大每服三十丸宜與後胡連丸間服胡連丸安胎聖藥也條芩四兩以沉水為佳白朮無油者四兩蓮肉去心二兩砂仁微炒炙草各一兩共為末用山藥多煮糊為丸米湯下小便多而動紅勢欲小産蔥頭一大把約二三十根煎水服立止如神止後仍用煎保生無憂方服之誤服藥胎欲墜生白扁豆去皮來末米湯調服即安或煎濃汁服亦可此症胎氣已動未墮口噤自汗手強頭低似乎中風人多不識若作風治必死慎之慎之或用保生無憂方見前服之極為妥效臨産須知凡孕婦未産數日前胎必墮下小水頻數此欲産也慎重之家於合用藥物慣熟穩婆預宜備之以防不虞又幹漆渣及破漆器産時燒之使産母聞得其氣無血暈之疾又燒紅石放盆內以好醋澆之房中轉游數次産母常聞醋氣亦無血暈又用生韭菜一握放在小咀瓦瓶中以熱醋澆浸塞其大口以嘴向産母鼻嗅之亦止血暈又取無病童男小便五六碗淨器收貯臨産之時即溫一二杯飲之自無血暈産母房中只令穩婆一二人緊閉門戶忽使雜人往來更禁人無事詢問大驚小怪直待胞漿已動兒身已轉逼近子門不須用力當此之時産母呼痛其身傾側護生者不可抱束其腰恐致損兒但扶其肩膊勿令困倒臨産時如白蜜滾開水薄粥美膳常要齊備如渴則取白蜜半盞開水化開飲之可以潤燥滑胎令其易産如飢即以薄粥美膳與食之令其中氣不乏自然易生如夏月盛暑之時必用冷水灑掃房間解其鬱蒸之氣四面窗牖大開以薄紙帳遮之使産婦溫良得宜庶新血不致妄行可免血暈如冬月嚴寒之時必於房中四處燃火常使和暖之氣如春更要閉其戶牖塞其穴隙使邪氣不入庶免風寒之疾臨産之時凡合用水火柴炭鍋錐剪刀麻繩線布無一不備可也催生諸方凡催生須當正産之矣如臨月忽然腹痛或作或止或一二日或三五日胎水已來腹痛不止者名曰弄胎又曰試痛非當産也有一月前忽然腹痛如欲即産卻又不産此名試月亦非當産也不問胎水來與不來俱不妨事俱當寬心待時至時瓜熟蒂落即臨盆之際腹中氣痛轉胎氣壯者轉身易氣虛者轉身難延緩時刻腹痛不已俱非正産之時切不可預先驚動混服催藥直至腰腹一陳痛加一陳痛極難忍糞門挺急如欲大便眼中時見金光漿破血來方是正産之候若未至産時誤用催藥轉動非時以致倒産橫生為害不小催生之方最多世傳兔腦鼠腎等丸雖屬靈驗果當正産服之自然有效若非正産如瓜果之未熟而摘必致傷生害命斷不可用惟保生無憂方見前服之當生即生不生亦能安胎即橫生倒産胎死腹中亦能順生毫無苦楚百發百中萬應萬靈其藥甚平其功最大誠千古不磨之方切不可再好奇而輕忽也朱丹溪先生云佛手散見前為催生聖藥又穩當又效捷與保生無憂散功力相同凡老婦並矮小女子及體弱交骨不開者服加味歸芎湯見前尤極相宜催生之藥惟此三方最穩最靈萬無一失切勿亂用別藥又牛膝一物催生斷不可用服之血氣下墜必致兩腿疼痛叫號不已慘不可聞無藥可治死而後已此名醫祕傳也又方陳麥草須取露天者更妙無則用舊草帽之草亦可每用一兩洗去塵灰剪寸段煎湯服難産極效此方須傳窮鄉僻壤醫藥不便及無力醫藥者全活一命陰功莫大又方用新硃筆在黃紙上無新硃筆用新墨筆亦可寫語忘敬遺四字貼床柱及門窗上凡有門窗之處各貼一張臨産令産婦默念此四字即産可免邪崇又方用本年皇曆面上欽天監印花燒灰白開水送下勿令人知屢試屢驗又方用新筆墨紙淨硯寫日月如箭急共五字貼産婦房口並房內如仍未生下即用火焚此五字於淨水中與服即下矣寫此五字不宜挑勾又方急採樹葉一片或花或草葉皆好要新鮮青的以淨水貼在床背勿令人知臨産胡言亂語用四焰燈火加硃砂入盞內點之即安四焰者一盞內用四燈頭是也臨産暈絶不省人事用生半夏如豆大研末吹鼻中得嚏即活臨産艱難及氣弱或矮小婦女交骨不開一時難覓醫藥用白蜜麻油各半盞煎至一半服之立效終不若加味芎歸湯見前之妙難産難産者多因産母倉惶坐草太早或胞漿雖破兒身未轉或轉未順被母用力努責以致足先來者謂之逆産手先來者謂之橫生或漏其肩與耳與額者謂之側産或被臍帶纏絆不得下者謂之礙産倉卒之間二命所繫不可無端嚷鬧大驚小怪更不許穩婆混行動手總以鎮靜為主無論逆産橫産礙産將兒輕輕送入用前佛手散服之最穩最靈並照以後各法救之救逆産令産母正身仰臥務要定心定神不可驚怖卻求慣熟穩婆剪去手甲以香油潤手將兒足輕輕送入又再推上兒身必轉直待身轉頭正然後服前催生之藥渴則飲以蜜水飢則食以薄粥然後扶掖起身用力一送兒即生矣此在穩婆之良若粗率蠢人斷不可用更不可使針刺足心兒痛上緊母命難保救橫産一切照上仍將兒手輕輕送入再推上摸定兒肩漸漸扶正即下矣忌用針刺救側産亦令産母仰臥俱如前法穩婆用燈審視或肩或額或左或右務得其真以手法輕輕扶撥令正仍服藥食如前法起身用力兒即下矣救礙産産母仰臥穩婆用燈審視看臍帶絆著兒之何處仔細以手法輕輕脫取服藥食如前法扶起用力一送即下矣一切橫生逆産佛手散見前最穩最效又方灶心中土兩旁取者不效研細酒調服一錢仍搽産母臍中極效又方用手中指點鍋底煙子於小兒足心畫一即刻順生又方蜂蜜真麻油各半鍾煎至一半服立下盤腸生當産之時子腸先出盤露於外子隨後生産後而腸不收此謂盤腸生也蓋由平日氣虛不能斂束血熱易於流動下元不固關鍵不牢以致如此救治之法於子下衣來之後卻命産母仰臥穩婆先將子腸溫水洗淨然後托起輕輕送入推而上之卻令産母兩足夾緊穀道其腸自收上也或取萆麻子四十九粒去殼搗爛貼在頂心候腸收盡而急去之次者或用冷水和醋令人噴産婦面一噴一收以漸收之此法最妙或照後腸出各方治之欲免其苦者宜於此後無孕時多服地黃丸加五味子一兩肉桂一兩以固下元之關鍵及有孕時多服胡連丸加臺黨一兩以補氣又服三補丸以涼血凡滑胎瘦胎之藥不可輕服如八月之時再服八物湯加柯子麥冬粟殼服十餘劑庶可免矣各方俱見前如腸幹不上諸藥不效者以刀磨水少許灑潤腸上另用真磁石煎一杯兌酒服自然收上此扁鵲神方也臨産兒尚未生有物先出形如胞衣乃子宮也此時兒尚未生切勿用萆麻子塗在頂心以致誤事速將子宮納入服以補藥用前保生無憂散最妙靜候兒生母子無恙胞衣不下此因産母力乏氣不轉運或因血少乾澀或因子宮空虛而不下者急用芡實葉又名雞頭蓮葉一張扯作二三塊煎水服胎衣即破作二三塊而下又蓮蓬殼一個扯作二三塊煎水服或用荷葉扯碎功亦相同神效無比此數物須平時收存以備急用又方明礬三分研末開水沖服立下又方用竹杆於堂中正梁上戳三下即下又方用雄雞一隻連毛破開去腸雜蓋孕婦臍上雞頭向上以布扎縛即下神效又方生雞蛋兩個去黃用白好陳醋燒開沖服即下又方萆麻子十四粒去殼搗爛貼兩足心胎衣即下衣下後趕急將藥洗去久則恐腸出也如腸已出仍用此藥敷囪門上腸自收入藥隨洗去勿遲子死腹中産母唇舌俱紅者母子無事唇青舌紅者母死子活唇紅舌青者母活子死唇舌俱青者母子俱死用平胃散最為神效平胃散專治胎死腹中蒼朮淘米水泡炒紫川厚朴薑汁炒陳皮各二錢炙草五分酒水各一種煎至一半加朴硝末五錢再煎三五滾去渣溫服其始即化為水而出矣若倉卒製藥不及只用朴硝五錢以溫童便調下亦效如胎未死産婦舌不青黑不可亂用凡貓犬生子不下而叫號者亦以此藥灌之又方用醋炒黃牛糞敷肚臍上用布捆好即下神效婦人科産後門胎衣不下見胎前門生子氣絶不啼胎衣來時切勿斷臍即取小鍋燒水以胎衣放熱水中並以水澆臍帶俟暖氣入腹兒氣即回啼聲發出矣若先斷臍帶不可救矣並參看小兒科保嬰各法産後宜擠兩乳凡婦人初産即將兩乳放溫熱淘米水內揉洗將乳擠出乳孔內有白絲數條用手扯去方與兒食則小兒易於吸食可免吹乳乳癰等病此祕法也産後乳汁不通或初産之婦則乳方長乳脈未行或産多之婦則氣血虛弱乳汁短少並用加味四物湯歸身黨參川芎赤芍生地桔梗甘草麥冬白芷各一錢水煎服如因乳不行身發壯熱胸膈脹悶頭目昏眩者加木通滑石末水煎食後服更煮豬蹄湯食之則乳汁自通豬蹄一對洗淨煮爛入蔥調和並汁食之又云要入香油炒過穿山甲共煮去甲食之神效或查卷二乳部內通乳各方治之産後陰戶垂出肉線長三四尺觸之痛引心腹老薑三片連皮搗爛入真麻油二斤炒乾先用舊綢五尺摺疊輕輕乘起肉線使之屈作二三團納入陰戶再用綢袋盛姜使姜氣就近熏之冷則隨換熏一日夜收入大半二日收盡神效非常肉線切不可斷斷則不治並宜禁風産後子腸掉出一截凡婦人産後胞衣已下有腸出一截俗名外衣或腸上胞衣脫落未盡不必驚慌不必服藥用枳殼煎湯洗之切宜避風若怕風寒不洗亦可三五日後自然爛落近日有人經驗甚多並不礙事亦無後患若腸出多者則照後方治之産後腸出不收真麻油三斤煉熟入盆內候溫令産婦坐盆中另用皂角尖燒枯去皮研細末吹鼻中作嚏即收又方枳殼二兩煎湯溫浸良久自入冷則隨換或照肉線方見前治之或照後子宮墜出方亦可又方新鮮鯽魚頭焙枯研細末一半搽腸一半酒服即時收上産後子宮脫出産後下一物如合鉢狀有兩塊者子宮也名陰㿗又名㿗葫蘆用補中益氣湯見卷十一內外備用諸方去柴胡連服二三大劑一響而收並用荊芥穗藿香葉臭椿樹白皮炙各六七錢煎湯時時洗之再用熟地歸身各二錢川芎白芍各錢半臺黨三錢水煎服數劑可免後患或照上腸出不收鯽魚方最效産後尿脬脫出棕樹根和豬瘦肉久煮去根食肉與湯三五次自然收入其效如神産後胎膜墜出産後出一物如手帕因臨産用力大過或肝痿所致有黏席不得上者乃胎膜也照上子宮脫出方治之即入産後尿脬破損小便直流黃絲絹天生黃者三尺用炭灰淋汁煮爛以清水漂極淨剪極細碎黃蠟五錢白蜜一錢白茅根馬庇勃各二錢水二盞煮至一盞空心服服時須斂氣不得開口作聲如作聲則不效又方生成黃色絲絹一尺照前製法白牡丹根木一錢研末白芨一錢研末水二鍾煮至絹爛加糖食之不宜作聲此名補脬散觀其補法有不可思議之妙生絲造者曰絹色黃者入血丹皮連木者入里色白者走氣二者皆能瀉膀胱之火引清氣以達外竅白芨性黏功專收澀能補五臟之破損服之不作聲乃有效者蓋聲出於五臟有聲則五臟之氣動而來迎無聲則五臟之氣靜而安謐所服之藥不由五臟分布入肺竟從胃口闌門分別清濁之路由脂膜之絡滲入膀胱之外膜使白芨得以護外而為固也本草載台州大辟剖出肺傷之處皆白芨所補信有是夫又方雲苓陳皮桃仁各一錢臺黨二錢半炙耆錢半炙草五分用豬尿脬羊尿脬亦可洗淨煮湯去脬入藥煎好空心服亦不作聲多服乃效血虛者加川芎當歸又方大鯉魚一條取魚鱗用油煎極酥脆加鹽醋薑汁拌鱗蒸食立效産後症疽突出先用連翹散後用黃蠟膏立效連翹散炙耆連翹花粉防風梔子各一錢甘草三分水煎服黃蠟膏黃蠟枯礬麻黃以上各四分為末用開水沖服或用前子宮脫出諸方亦妙産後陰戶生蟲一對此蟲約長寸余埋入土中數日開視暴大如拳名子母蟲以後再生一對苦參一兩淘米水浸一夜蒸熟曬開使君子五錢共研末煉蜜為丸每空心服三錢服完再生一對再服一料即可斷根産後陰戶翻出疼痛名曰翻花用澤蘭葉四兩煎湯熏洗二三次再加枯礬煎洗即安又方見後雜治門産後陰戶不閉或脫出石灰一斗炒黃色以水二斗加入攪勻澄清乘熱熏之又方溫水洗軟用雄鼠屎兩頭尖者是燒煙燻之即愈如陰戶破爛久不收口用白芨白龍骨訶子爛蜂窠黃柏炒各一錢研末先用野紫蘇煎水洗拭乾再用此藥敷之或銀青散見癰毒諸方門敷之均效産後陰戶腫痛或手足彎屈不能伸舒此下體受風故也用蔥白加乳香同搗成餅敷之一二日即愈又方羌活防風各一兩煎湯熏洗亦效産後惡露不止産後衝任損傷氣血虛憊舊血未盡新血不斂相併而下日久不止漸成虛勞者大補氣血使舊血得行新血得生不可輕用固澀之劑使敗血凝聚變為癥瘕及為終身之害用十全大補湯見前調經門如小腹刺痛者四物湯加元胡索蒲黃炒乾薑炒各等分煎服産後惡露不下此有二症治之不同或因子宮素冷停滯不行者宜用黑神散見後血暈方此必小腹脹滿刺痛無時也或因脾胃素弱中氣本虛敗血亦少氣乏血阻不能盡下其症乍痛乍止痛亦不甚用加減八珍湯臺黨白朮雲苓炙草歸身川芎赤芍熟地元胡香附薑棗引水煎食前服産後血崩産後衝任已傷氣血未復或姿情欲勞動胞脈或食辛熱鼓動相火或因惡露未盡固澀太速以致停留一旦復行須要詳審先用四物湯倍加芎歸再加黨參作大劑服之扶其正氣然後隨其所傷加減調治因於房勞者本方加黃耆炙草阿膠炒艾葉同服因於心熱者本方加白朮茯苓甘草黃連炒因於固澀者本方加香附桃仁如崩久不止只用本方調石灰散服之或用前調經門血崩各方仍用前四物湯大劑扶其正氣蓋崩本非輕病産婦得之是謂重虛尤不可忽也又方荊芥穗五錢炒黑煎服立止産後一月惡露重來血水不止倒地不省人事此乃夫婦交媾搖動骨節血崩不止急照上産後血崩因於房勞方治之或照前調經門血崩各方施治亦可産後瘕塊此惡露不盡之害也蓋由産婦惡露不來或來不盡或産婦畏藥雖有病苦強忍不言或主人與醫堅執産後虛補之說不可輕用去血之藥以致敗血停留久而不散結成塊依附子宮防礙月水阻絶嗣息夭其天年照痞疾門各方治之最效産後發狂家萱麻蔸洗淨切片煎濃汁服熱退狂止或用卷十四傷寒發狂外治方更妙産後乍見鬼神心主血血去太多心神恍惚睡臥不安言語失度如見鬼神俗病不知呼為邪崇誤人多矣宜用茯神散茯神柏子仁遠志黨參當歸生地炙草各一錢肉桂五分獖豬心一個閹割者為獖豬水酒各一盞煎至一半入童便一鍾調辰砂一錢食後服如心下脹悶煩躁昏亂狂言妄語如見鬼神者此敗血停積上攻於心心不受濁便成此症用芎歸瀉心湯歸尾川芎元胡索蒲黃丹皮各一錢肉桂七分水煎調五靈脂末一錢食後服産後眼見黑花昏眩昏眩出汗見後此敗血流入肝經故眼見黑花諸風振掉皆屬肝木始為昏眩用後清魂散加丹皮二錢水酒各一盞煎至一半入童便一鍾同服産後血暈産後昏眩卒倒不省人事口噤氣冷謂之血暈此惡症也不可救者多若誤作中風症醫直殺之耳蓋由坐草之時不知用前防血暈等方所以有此其症有二當分治之如血來太多卒然昏僕者此氣血兩虛也急用韭醋嗅法見前臨産須知以待其醒用澤蘭葉黨參各一錢芥穗川芎各二錢炙草八分水酒各一盞煎一盞入童便一鍾同服如血去少惡露未盡腹中有痛而昏眩者用上法令醒再用黑神散黑豆一合炒熟地當歸肉桂去皮乾薑炒炙草白芍酒炒蒲黃各二錢如上法煎服又方提起頭髮坐定不可倒眠急以燒紅栗炭或磚石稱錘等物投入陳醋內對鼻孔熏之自醒另用當歸六錢川芎三錢芥穗三錢炒黑水煎臨服入好酒童便和服神效之至又方五靈脂半生半炒為末每服一錢白滾水調下如口噤者用瓷調羹撬開灌之入喉即愈或用失笑散見卷三各種氣痛門更妙又方白紙三十張燒灰熱酒沖服雖已死一日打去一牙灌之亦活又方乾漆渣破漆器燒煙燻之即醒或乾荷葉燒灰溫酒調服又方照後華他愈風散治之最為神妙産後中風産後正氣暴虛百節開張風邪易入調理失宜風即中之不省人事口目蠕動手足彎曲身如角弓此風外中者也用愈風湯羌活防風當歸酒洗川芎白芍酒炒肉桂黃耆天麻秦艽各二錢薑棗引水煎熱服又方荊芥穗除根不用炒黑研末每服三錢童便調服口噤則打開一牙灌入或用荊芥五錢不必研末以童便煎好待微溫灌入鼻中其效如神或心頭倒築吐瀉欲死亦效此華他愈風散也又方黑豆一茶鍾炒至煙起再入連根蔥頭五個同炒隨入好紹酒一鍾或甜酒亦可水鍾半煎至一鍾溫服出汗即愈無論如何危急莫不神效此孫真人大豆紫湯也又方一婦産後角弓反張服大豆紫湯及獨活湯而愈後又於産後忽作此症頭足相反相去凡二尺數人強拗之不直急用獨活湯連用三劑而愈獨活湯獨活羌活半夏臺黨茯神遠志防風肉桂白薇當歸川芎菖蒲各一錢細辛七分炙草五分姜三片棗三枚水煎服又方此症曾見俞魯堂先生醫治兩産母一在嚴寒一在盛暑其症均在危篤遍身發腫惡露不行牙關緊閉諸醫均用補劑罔效俞見此症毋庸診脈即令先覓糞坑陳年磚一塊用活水洗淨真陳紹酒五斤陳甜酒亦可放在鉢內用栗炭火將磚燒透浸在酒內提出復燒如此三遍其酒不過二斤候酒溫即令産母服一二杯過半日其腫漸消惡露頻頻即通余酒陸續飲完腫已全消病已全愈據俞醫云産後驚風皆系誤投補劑及三朝後多食油膩以致發熱惡露不行今糞磚得溫氣能通經絡以酒行之經絡一舒惡露亦通腫消病去矣再如産母素不飲酒即用天泉水亦可此係得諸異人傳授屢試屢驗真仙方也慎勿輕視再陳年糞坑磚又治麻痘不起或忽然沉陷醫不能治即用此磚如前法或用天泉水制之亦神效也産後中風聲啞不語心口發紅如鏡此症若紫色即重黑色則難救矣宜用訶子三四個搗爛先炒過後煎濃水灌之少刻其婦人即大吐痰涎重則再進一服即愈如不見效照前糞磚方並各方治之又方用家中二三年陳米醋渣要黏米的一握拌鹽炒焦沖水一碗服下其人少刻吐出痰涎一二尺長者即愈又方魚鰾燒灰每服三錢淡酒送下連服二日即止産後肝虛風從內生諸風振掉皆屬肝木肝為血海胞中之主也産後去血過多肝氣暴虛內則不能養神外則不能養筋以致神昏氣少汗出身冷眩暈卒倒手足扯動此肝虛風自內生者此用當歸建中湯見産後腹痛加炙耆臺黨各一錢製附子五錢薑棗引水煎服不可飲熱茶熱水如痰迷心竅神氣不清恍惚昏眩者用琥珀壽星丸見胎前門子癇方臺黨煎湯送下産後不語人心有七孔三毛産後虛弱敗血停積閉於心竅神志不能明瞭故多昏瞶又心氣通於舌心氣閉則舌強不語也用七珍散臺黨菖蒲生地川芎各一錢細辛三分防風辰砂各五分研水煎調辰砂食後服又有言語不清含糊謇澀者蓋心主血血去太多心血虛弱舌乃心之苗其血不能上榮於舌故語之不出也用加味參麥散臺黨麥冬歸身生地炙草石菖蒲各一錢五味子十三粒先用豬心一個破開用水二盞煎至一半去心入前藥七分食後服並治怔忡有效産後風癱名曰産痿蓋由衝任血虛心脾失養故宗筋放馳不能束骨而利機關令人手足痿弱痰仲目眩俗名産癱若以降火滋陰破氣破血為治榮衛愈傷終身廢棄再莫能挽初起之時宜加味四君子湯臺黨當歸各三錢黃耆白朮各一錢茯苓一錢半夏八分陳皮炙草各五分水煎空心服又方大紅野薔薇花子一兩酒煎服初起者一服即愈如日久兩手不能提舉以薔薇花四兩當歸二兩紅花一兩浸酒五斤不論何酒每日酒隨量飲最凶者兩料全愈如癱瘓在兩月外者其功稍緩産後鼻血不止荊芥穗炒黑研末用童便調服三錢即愈或照卷一鼻部各方治之更妙産後口渴産後去血甚多津液內耗胃氣暴虛頓生內熱故口燥喉干而渴也用人參麥冬湯臺黨麥冬生地栝蔞根炙草各二錢先取淡竹葉十皮粳米一合煎湯一碗去米葉加生薑三片棗三枚煎七分溫服或用熟蜜調開水服最妙産後口渴痞悶此由氣血太虛中氣未足食麵太早脾胃不能消化面毒聚於胃上熏胸中是以有此症也慎勿下之宜用睍睆丸見後若其臟氣本虛宿夾積冷胸腹脹痛嘔吐噁心飲食減少亦因新産血氣暴虛風冷乘之以致寒邪內勝宿疾益加用吳茱萸湯吳茱萸炒錢半桔梗乾薑炒炙草半夏各一錢細辛六分當歸茯苓肉桂陳皮各八分姜引水煎熱服産後舌出一婦産後舌出不收百治不效後用硃砂點其舌令作産兒之狀用人扶住一人悄悄在窗外將大瓦器擲地打碎婦聞響聲而驚舌即收入産後腹脹滿悶嘔吐噁心敗血散於脾胃脾受不能運化精液而成腹脹胃受則不能受水穀而生嘔逆若以平常治脹治嘔之劑則藥不對症反增其病用赤芍半夏制澤蘭葉陳皮去白黨參各二錢炙草一錢生薑焙五分水煎服亦有傷食而腹脹嘔逆者以脈辨之因於血則脈弦澀不惡食而嘔多血腥因於食則脈弦滑而嘔多食臭宜加味平胃散蒼朮米泔水浸焙厚朴姜炒陳皮神麯香附炒黨參各一錢炙草生薑焙各五分水煎熱服或用睍睆丸亦佳睍睆丸良薑炒薑黃炒蓽澄茄陳皮去白莪朮煨三稜煨黨參各等分共為末用蘿蔔慢火煮熟搗融和藥將余汁打麵糊為丸蘿蔔湯下加味六君子湯治産後傷食嘔吐腹脹茯苓黨參炙草陳皮白朮製半夏各一錢枳實麵炒山楂各五分薑黃三分生薑三片水煎食遠服産後嘔水産後因怒哭傷肝嘔吐清水用韭菜搗取汁加薑汁少許和飲即愈産後厄逆此氣從胃中出上衝賁門厄逆而作聲也有胃氣虛者有中氣不足衝任之火直犯清道而上者有飲水過多水停而逆者有大小便閉下焦不通其氣上逆者有胃絶者大約産後厄逆乃胃虛氣寒症也用加味理中湯臺黨白朮炙草炮薑陳皮各一錢丁香三錢乾柿蒂二錢有熱去丁香加竹茹二錢如虛弱太甚飲食減少咳逆者胃絶也難治又方白豆蔻去殼丁香各五分為末桃仁煎湯沖服數次必愈有熱者忌服産後咳嗽産後多因惡露上攻流入肺經乃成咳嗽其症胸膈脹悶宜服二母湯知母貝母雲苓黨參杏仁桃仁各一錢水煎食後溫服又肺主氣上為衛所以充皮毛密腠理也産後氣虛衛弱皮毛不充腠理不密風寒襲之先入於肺亦或咳嗽其症發熱惡寒鼻塞聲重或多噴嚏鼻流清涕用旋覆花湯旋覆花赤芍前胡半夏芥穗甘草杏仁茯苓各一錢麻黃去根節五味各五分薑棗引水煎食後溫服有汗者去麻黃加桂如咳久不止唾稠黏用加味甘桔湯甘草桔梗款冬貝母前胡枳殼雲苓五味麥冬各等分淡竹葉十五皮煎服如前或用卷三咳嗽各方治之更妙如産後吃鹽太早者難治産後氣喘産後血下過多榮血暴竭衛氣無主獨聚肺中故令喘也此名孤陽絶陰最為難治急取鞋底燒熱於小腹上下尉之次用奪命丹熟附子五錢丹皮乾漆渣炒煙盡各一兩共為末用醋一升大黃末一兩同熬成膏和末為丸梧子大每服五十丸溫酒下産後面赤發喘欲死此血入於肺也用蘇木二兩水二盞煎一盞去蘇木加臺黨一兩研入隨時加減調服效難盡述産後心痛心者血之主其人宿寒內伏因産後虛寒血凝不行上衝心之絡脈故心痛也但以大岩蜜湯治之寒去則血脈行而經絡通心痛自止若誤以為敗血攻之則虛極寒益甚漸傳心之正經變為真心痛而死矣大岩蜜湯生地歸身獨活吳茱萸炒白芍酒炒乾薑炒炙草肉桂小薊各一錢細辛五分水煎熱服如不見效即系瘀血用黑神散見前或失笑散見卷三各種氣痛門少少服之效則再服必愈産後腹痛産婦中氣多虛不能行血血斯凝滯或閉而不來或來而不盡敗血入腹故為腹痛乍作乍止其痛如刺手不可近宜用黑神散見前或用失笑散見卷三各種氣痛門或後羊肉湯俱妙或産後血虛外受風冷之氣內傷寒冷之物以致腹痛者得人按摩則止或熱物尉之即止者是也用當歸建中湯歸身白芍肉桂炙草各二錢生薑五片大棗三枚水煎米湯三匙攪勻熱服或小腹痛者臍下胞胎所繫之處血之所聚也産後血去不盡即成痛症其症無時刺痛痛則有形須臾痛止又不見形宜用黑神散或失笑散及後羊肉湯更佳又有因産時寒氣客於子門入於小腹或坐臥不謹使風寒之氣乘虛而入此寒症也但不作脹且無形影用金鈴子散川楝子去核小茴補骨脂肉桂各一錢木香四分磨兌姜引水煎食前熱服或後羊肉湯更妙産後腹中有塊上下時動痛不可忍此由産前聚血産後氣虛惡露未盡新血與舊血相搏俗謂之兒枕痛即血瘕之類也用當歸元胡索湯歸尾元胡索各錢半五靈脂蒲黃各一錢白芍肉桂紅花各五分水酒各一盞煎一盞入童便一盞同服或用山楂肉一兩水煎一鍾加紅砂糖五六錢好酒一二小杯空心熱服催下敗血即安或用失笑散見各種氣痛門亦妙羊肉湯通治上腹痛小腹痛兒枕痛之神方也精羊肉半斤當歸川芎各五錢生薑一兩水十盞煎三盞服或用羊肉燉老薑食或燉製附子均妙産後血氣痛不可忍用各種氣痛門失笑散最妙有婦人産後血氣痛極百藥不效後用紅薯又名黃薯於柴炭火中燒熟食之而愈薯為氣滯之物食之反效殊不可解産後脅痛此亦敗血流入肝經厥陰之脈循行脅肋故為脅痛症有虛實宜分治之不可誤也如脅下脹手不可按是瘀血宜去血用芎歸瀉肝湯歸尾川芎青皮枳殼香附童便炒紅花桃仁各二錢水煎入童便一鍾酒一鍾服如脅下痛喜人按其氣閃動筋骨狀若奔豚者此去血太多肝臟虛也用當歸地黃湯歸身白芍熟地俱酒洗黨參甘草陳皮肉桂各一錢薑棗引水煎服産後頭痛産後去血過多陰血已虧陽氣失守頭者諸陽之會上湊於頭故為頭痛但補陰血則陽氣得行而頭痛自止宜用芎歸湯川芎當歸各五錢俱洗炒連須蔥頭五個生薑五片焙乾水煎食後服又有敗血停留子宮厥陰之位其脈上貫頭頂作痛宜用黑神散見前産後汗出不止兼變症産後去血過多榮血不足衛氣失守不能斂皮毛固腠理故汗泄而易出也宜急止之恐風寒乘虛而入必變生他疾宜用麻黃根湯歸身酒洗蜜耆麻黃根臺黨炙草各錢半水二盞以浮小麥一合煮至一盞去麥入藥再煎至七分調牡蠣粉二錢服之又十全大補湯見前調經門加防風煎服亦效如眩暈汗出者此名胃汗虛極也急用炙耆臺黨人參更妙炙草各二錢熟附子一錢水煎撬開口灌之大抵此危症多不可救如汗不止風邪乘之忽然悶倒口眼喎邪手足彎曲如角弓反張者此危症也急用桂枝葛根白芍甘草炙耆歸身各二錢熟附子五分撬開口灌之此亦危症不治者多産後發熱産後血虛則陰虛陰虛生內熱其症心胸煩滿呼吸氣短頭痛悶亂將晚轉甚與大病後虛煩相似用臺黨歸身熟地肉桂酒芍各錢半麥冬一錢水二盞先以粳米一合淡竹葉十皮煎至一盞去米葉入藥並棗三枚煎七分溫服熱甚加炒乾姜一錢産後大熱必用乾薑何也此非有餘之熱乃陰虛生內熱也故以補陰藥大劑服之且乾薑能入肺和肺氣入肝引血藥生血然不可獨用必與補陰藥同用此造化自然之妙惟天下至神可以語此産後乍寒乍似瘧敗血未盡陰陽不和皆能發寒熱也何以別之曰敗血為病則小腹刺痛此為異耳故敗血未盡者以去滯為主陰陽不和者以補虛為主若作瘧治誤矣敗血未盡乍寒乍熱者何也敗血留滯則經脈皆閉榮衛不通閉於榮則血甚而寒閉於衛則陽甚而熱榮衛俱閉則寒熱交作榮衛氣行則即解矣惟黑神散見前卷荷散為去滯氣血之要藥也卷荷散初出卷荷葉焙乾紅花歸尾蒲黃丹皮生地各一錢生薑三片童便一碗水煎熱服陰陽不和乍寒乍熱者何也産後氣血虧損陰陽俱虛陰虛則陽勝而熱陽虛則陰勝而寒陰陽俱虛則乍寒乍熱用增損八物湯歸身白芍各酒洗乾薑炒焦黑川芎臺黨各一錢炙草五分姜三片棗三枚水煎服寒多熱少者加肉桂一錢熱多寒少者加柴胡一錢乾薑減半煩渴者加知母麥冬各一錢食少者加陳皮白朮各一錢虛倦甚者加炙耆一錢似瘧真瘧何以別也似瘧寒不凜凜熱不蒸蒸發作無時亦不甚苦此正氣虛而無邪氣也真瘧者寒則湯火不能御熱則冰水不能解發作有時煩苦困頓此正氣虛而邪氣相搏者也産後瘧疾氣血俱虛榮衛不固脾胃未復或外感風寒內傷飲食皆能成瘧又有胎前病瘧産後未愈者産後之瘧最難調理只以補虛扶正為主正氣勝則邪氣日衰不可輕用截藥重虛正氣為害甚大用增損柴胡四物湯臺黨北柴胡半夏炙草歸身酒洗川芎乾薑三片棗三枚不拘時服久瘧加鱉甲醋炙炙耆各一錢産後傷寒氣血俱虛榮衛不守起居失節調養不宜傷於風則衛受之傷於寒則榮受之而成傷寒也只以補虛為主餘症以末治之用五物湯臺黨川芎歸身白芍酒炒炙草等分姜三片蔥白三個水煎服有汗曰傷風本方加桂枝防風無汗曰傷寒本方加麻黃蘇葉寒熱往來本方加柴胡頭痛本方加藁木細辛遍身痛本方加羌活蒼朮但熱不惡寒加柴胡葛根發熱而渴加知母麥冬淡竹葉産後腰痛女人之腎胞脈所繫産後下血過多則胞脈虛脈虛則腎氣虛腎主腰故令腰痛其症隱隱作痛用補腎地黃湯熟地歸身杜仲青鹽水炒去絲獨活肉桂續斷各一錢生薑三片棗二枚水煎空心服或照腰部腎虛腰痛各方治之又敗血流入腎經帶脈阻塞有腰痛者其症脹痛如刺時作時止手不可近用加味復元通氣散歸身川芎小茴炒胡脂炒捶碎元胡牛膝肉桂丹皮各一錢水煎另用木香末乳香末沒藥末各五分調勻空心服有因産時起伏挫閃腎氣及帶脈者亦或腰痛用上加味復元通氣散方服之産後遍身疼痛産時骨節開張血脈流散正氣衰弱則經絡肉分之間血多凝滯骨節不利筋脈不和故腰背不能轉側手足不能屈伸而痛也勿用風寒發汗之劑宜用趁痛散當歸肉桂白朮牛膝黃耆獨活生薑各一錢炙草薤白各五分水煎熱服又有因新産氣虛久坐多語運動用力遂至頭目昏眩四肢疼痛寒熱如瘧自汗名曰蓐勞勿作傷寒誤投汗劑用白茯苓散雲苓歸身川芎肉桂白芍酒炒炙耆黨參熟地各一錢獖豬腰子一對閹割者為獖豬去油膜切片煎湯一盞去腰加姜三片棗二枚同藥煎服按蓐勞之症或因臨産之時生理不順憂恐思虛內傷其神展轉閃挫外傷其形內外俱傷形神皆瘁或因新産之後氣血未復飲食未充起居無度語言不止調攝失宜情欲失禁外感風寒內傷飲食漸成羸疲百病並作苟非良工妙劑未有不成勞瘵而斃者必宜服十全大補湯又早用地黃丸加歸身牛膝肉蓯蓉酒炒焙乾五味柏子仁各二兩日服人參白朮散作丸服之常煮腰子粥以助之大效煮粥法取獖豬腰子一對去脂膜薄切如柳葉大用鹽酒拌合一時水三盞粳米三合瓦罐煮粥入蔥花椒末調和得宜食之産後身有冷處數塊日久不愈此食黍粥過多所致用八珍湯去地黃加橘絡橘皮內白筋即是入薑汁竹瀝各一鍾煎服十劑即愈産後浮腫新産之後敗血未盡乘虛流入經絡與氣相雜凝滯不行腐化為水故令四肢浮腫乍寒乍熱勿作水氣治之輕用滲利之劑但服調經湯使氣血流行其腫自消調經湯歸身酒洗丹皮肉桂赤苓甘草陳皮各二錢細辛乾薑炒各五分姜三片水煎服又有産後虛弱腠理不密調理失宜外受風濕面目虛浮四肢腫者用加味五皮湯桑白皮陳皮茯苓皮大腹皮漢防己枳殼炒豬苓炙草各一錢姜三片水煎服若四肢浮腫而氣喘者用茯苓丸風痰疾門最效産後霍亂吐瀉産後血去氣損脾胃亦虛風冷易乘飲食易傷少失調理即有霍亂心腹絞痛手足逆冷吐瀉並作用加味理中湯黨參白朮炙草乾薑煨陳皮藿香厚朴姜三片水煎時時溫服産後泄瀉産後中風虛損寒邪易侵若失調理外傷風寒內傷生冷以致脾胃疼痛泄瀉不止用上理中湯如瀉不止者再加肉桂豆蔻麵包煨共為末蜜丸米湯下産後痢疾濕多成泄暴注下迫皆屬於熱赤白痢者乃濕熱所為也故赤者屬熱自小腸而來白者屬濕從大腸而來俗云赤為熱白為寒非也無積不成痢蓋由産母平日不肯忌口傷於飲食停滯於中以致中風虛損不能調理宿積發動而為痢也亦有因子下之時多食雞蛋與雞致傷脾胃難以克化停滯而成痢也務宜詳審斟酌以施治法庶不誤人如果新産之時飲食過傷者其症腹中脹痛裡急窘迫身熱口渴六脈數實宜下之用加味小承氣湯枳實麥麵炒厚朴姜炒各二錢大黃酒炒二錢五分炙草一錢檳榔錢半生薑三片水煎服以快便為度痢愈即止後用四君子湯加陳皮服之如新産後未有所傷其脈其症與上卻同者此宿食為病也宜消而去之用枳實湯枳實麥麵炒木香炙草各一錢厚朴姜炒二錢檳榔錢半生薑三片水煎服快利為度後以四君子湯加陳皮服之如無新舊食積下痢赤白腹痛窘迫脈沉數者此虛痢也宜行氣和血為主用當歸芍花湯歸身黨參陳皮白芍酒炒茯苓各一錢炙草炮薑木香各五分枳殼炒七分烏梅一個水煎食桑服如久痢不止者此氣虛血少腸滑不禁也用四君子湯加白芍烏梅瞿麥粟殼又有産後惡露不下以致敗血滲入大腸而利鮮血者腹中刺痛里不急後不重是也枳殼麵炒錢半芥穗略炒二錢半水煎服神效以上痢症如恐用藥錯誤用山楂三錢以陳灶心土拌炒成炭去土將山楂研末加紅糖米湯調服其效如神或照卷七痢疾門各方斟酌治之産後上吐下痢田螺一個搗碎入麝香一釐茱萸一分分末掩在臍上即不嘔吐若嘔既止速以當歸一兩白芍三錢甘草一錢枳殼檳榔各三分煎服二劑再以四君子湯調理而安如不見效即照痢疾門內噤口痢外治各方治之産後大便不通産後氣虛而不運血虛而不潤以致大便不通乃虛祕也不可誤用下劑又加閉寒宜用潤燥湯臺黨甘草各五分歸尾生地火麻子去殼捶碎枳殼各一錢桃泥即桃仁搗泥二錢檳榔五分磨汁先將上六味煎好後入桃泥並檳榔汁服又方真蘇子一合火麻子三合共擂爛以水一盞沖又擂取汁用汁和米煮粥食之甚效老人虛祕尤宜常用又方大麥芽炒研每服三錢滾開水調服或自調粥服自通産後小便多及夜睡遺尿在床産後氣血虛脫小便故多而遺也宜也升陽調元湯合桑螵蛸散炙耆炙草益智子去殼炒各錢半升麻一錢薑棗引水煎調桑螵散服桑螵蛸散真桑螵蛸白龍骨煨牡蠣左顧者各等分細研末每用三錢入湯調服産後小便不通或短少産後氣虛不能運化流通津液故使小便不通雖通而亦短少也勿作淋祕輕用滲利之藥其氣益虛病亦甚宜加味四君子湯黨參白朮雲苓炙草麥冬車前子各一錢肉桂五分姜三片水煎食後服又有惡露不來敗血停滯小便不通其症小腹脹滿刺痛乍寒乍熱煩悶不安用加味五苓散豬苓白朮澤瀉茯苓肉桂各一錢桃仁去皮尖紅花各二錢水煎空心服産後熱淋澀痛此亦血去陰虛生內熱症也蓋腎為至陰主行水道去血過多真陰虧損一水不足二火更甚故生內熱小便成淋而澀痛也用加味導赤散生地赤芍木通去皮甘草梢麥冬黃柏知母肉桂各一錢燈心四十七寸水煎調益元散見內外備用諸方二錢服産後尿血尿血而小腹痛乃敗血流入膀胱小腹不痛但尿時虛痛者乃內熱也並用小薊湯小薊根生地赤芍木通蒲黃甘草梢竹葉各一錢滑石二錢燈心四十九寸水煎服敗血加歸尾紅花各一錢兼內熱加黃芩麥冬各一錢産後癰疽産後氣血經絡俱虛若生陰疽最為險症宜大補扶助根本兼以活瘀生新為要其餘以末治之藥宜純善和平最忌汗下峻劑重者惟降癰活命飲見癰毒諸方最為神效輕者照癰毒門外治各方治之回生丹論何集庵曰回生丹保産之仙方也數年前有修合施人諸臨産服一丸坦然快便不覺其功但聞製藥時必先齊戒虔心發願普濟然後擇一淨室如法遵行同學馬禹䘌又在吳門制五百餘丸蒙以十丸見贈余歸即隨手與人癸丑冬月有一難産者子死腹中余聞而急簡笥中尚有一丸送與服之死胎立下母命保全人咸驚歎余即發心即日修制廣施迄今丙辰業已四載其間産中艱難諸症無不立效但此方不知始自何人編簡方書惟萬病回春有之記云長葛孫奎臺經驗較余所傳之方尚有所缺治法湯引亦未講明余特為詳述之列方於下回生丹專治産後百病其效如神錦紋大黃一斤為末蘇木三兩銼研用河水五碗煎汁三碗聽用大黑豆三升水浸取殼用絹袋盛殼同豆煮熟去豆不用將殼曬乾其汁留用紅花三兩炒黃色入好酒四碗煎三五滾去渣存汁聽用陳米醋九斤先將大黃末一斤入淨鍋下米醋三斤文火熬之以長木筷不住手攪之成膏再加醋三斤熬之又加醋三斤次第加完然後下黑豆汁三碗再熬次下蘇木汁再熬又次下紅花汁熬成大黃膏取入瓦盆盛之鍋底焦枯大黃亦刮下入後藥同磨又用熟地臺黨各二兩當歸酒洗川芎酒洗香附醋炒元胡索醋炒蒼朮淘米水浸炒蒲黃隔紙炒桃仁去皮尖油茯苓各一兩地榆酒洗羌活橘紅白芍山萸肉酒浸蒸曬乾五靈脂醋煮烘乾三稜醋浸透裹紙火內煨川牛膝酒洗馬鞭草炙草各五錢良薑木香各四錢秋葵子青皮去白炒白朮淘米水泡炒木瓜各三錢乳香沒藥各二錢益母草二兩臺烏藥去皮二兩五錢以上各藥並前黑豆殼共曬乾為末入石臼內下大黃膏拌勻再下煉熟蜜一斤共搗千杵為丸每丸重二錢七八分淨室陰乾須二十餘日不可日曬不可火烘干後只重二錢有零用蠟包好所謂蠟丸也用時去蠟殼調服其湯又各有所宜開列於後一子死腹中因産母染熱病所致用車前子一錢煎湯調服一丸或二丸若服至三丸無不下者若因血下太早以致子死用臺黨三錢或用人參一錢更好車前子一錢煎湯服或用陳酒少許和車前煎湯亦可一胎衣不下用炒鹽少許泡湯調服一丸或二三丸立下一産畢血暈用薄荷湯調服一丸即醒以上乃臨産緊要關頭一時即有名醫措手不及起死回生此丹必須預備按此丹原本有臨産服之易生一條據名醫云胎前斷不可用臨産更忌服此故刪之一産後三日血氣未定還走五臟奔充於肝血暈起止不得眼見黑花以滾水服此丹即愈一産後七日氣血未定因食物與血結聚胸中口乾心悶煩渴以滾水服此丹即愈一産後虛弱血入於心肺熱入於脾胃寒熱似瘧實非瘧也以滾水服此丹愈一産後敗血走注五臟轉滿四肢停留化為浮腫渴而四肢覺寒乃血腫非虛腫也服此丹愈一産後敗血熱極中心煩燥言語癲狂如見鬼神非風邪也以滾水服此丹即愈一産後敗血流入心孔閉塞失音不語用甘菊花三分桔梗三分煎湯調服一産後未滿月誤食酸寒堅硬之物與物相搏流入大腸不得克化瀉痢膿血用山楂煎湯調服一生産時百節開張血入經絡停留日久虛脹痠痛非濕症也用蘇梗三分煎湯調服此丹即愈一産後月中飲食不得應時兼致怒氣余血流入小腸閉塞水道小便澀結溺血如雞肝者用木通四分煎湯調服此丹又或流入大腸閉卻肛門大便澀結有瘀成塊如雞肝者用廣皮三分煎湯調服此丹一産後惡露未盡飲食寒熱不得調和以致崩漏形如肝色潮熱往來臂膊拘急用白朮三分廣皮二分煎湯調服此丹一産後敗血入五臟六腑並走肌膚四肢面黃口乾鼻中流血遍身斑點危症也陳酒化服此丹可愈一産後小便澀大便閉乍寒乍熱如醉如癡滾水調服此丹以上各條皆産後敗血為害也此丹最有奇功至産後一切異症醫所不論人所未經但服此丹無不立安一丸未應二丸三丸必效無疑凡經水不通行經腹痛及室女經閉等症俱效婦人科雜治此內立方無多仍應參看各門治法乃備血風頭痛方見頭部烏髮長髮方見頭部乳痛乳岩方見乳部婦人性妒取本婦月經布包蝦蟆一隻離茅廁前一尺遠埋之即不妒也陰外生瘡黃柏炒兒茶白薇炒蚯蚓糞炒鉛粉炒乳香炒去油朝腦以上各三錢冰片二分麝香一分輕粉五分調勻以藥末摻上雖日久不愈者五日全愈神效之至或照以後各方治之銀青散見癰毒諸方更妙陰戶生瘡或癢或痛或腫地骨皮蛇床子煎水常洗甚效又方當歸五錢梔子一錢半白芍茯苓各二錢五分柴胡六分楝樹根三分水煎服極效此方之妙皆是平肝去濕之品無論有火無火有風有濕俱奏奇效正不必問其若何癢若何痛若何腫若何爛此暗治之必宜知者也有痰加白芥子一錢有火加黃芩一錢有寒加肉桂六分又方防風蒼朮膽草柴胡各二錢木通酒黃柏知母連翹赤苓各錢半芥穗獨活赤芍各一錢黃連八分甘草三分水煎服其效如神又方蘆薈黃柏苦參蛇床子荊芥防風花椒明礬各三錢煎水熏洗數次神效又方吳茱萸苦參蛇床子各一兩用水濃煎熏洗一日數次再用生豬肝一片用針刺多孔或雞肝亦可納入陰中引蟲出盡即愈陰戶生瘡生蟲身發寒熱狀似傷寒又似癆病此蟲食臟腑也宜用逍遙散煎湯見內外備用諸方吞服蘆薈丸外用白果搗融塞陰戶殺蟲止癢又方蝦蟆散見癰毒諸方兔糞各等分為末敷之陰中生蟲內爛盡者皆效此葛仙翁方也如仍不愈查射工溪毒湯見人畜蛇蟲咬傷門各方治之陰戶突出一物如蛇如菌或如雞冠後陰茄方亦可治此名陰挺蛇床子五錢真烏梅九個煎水熏洗又以豬油調藜蘆末敷之內服逍遙散自消以下陰茄各方亦可治又方白果嚼融敷之極效又方水仙花蔸交紅糖搗極融爛敷之神效無比又方芝麻嚼爛敷之大效又方大蒜煎湯洗之以愈為度又方鯽魚生煎煉油搽之極效或用鯽魚膽搽之亦效又方真五加皮泡酒服不飲酒者煎汁日服數次仍用汁日洗數次極效又方槐白皮炒煎水日洗數次極效又方白鱔一名鰻魚淡煮飽食並用白鱔肉納入陰戶日換數次極效又方硫磺研末麻油調搽陰戶生瘡最效陰戶生物如茄此名陰茄亦陰挺也茄樹根燒灰為末香油搽內服逍遙散見內外備用諸方即愈又方烏頭燒枯研末加醋煎熱熏洗又方鰂魚一條火燒存性用油搽茄數次重則灸百會一壯輕則不灸後服補中益氣湯見內外備用諸方二三劑愈陰中生核腫大不消此亦陰挺類也用蚌蛤肉塞陰中日換數次早服補中益氣湯見內外備用諸方晚服龍膽瀉肝湯見同上連服數日自消消後再用四物湯見前上加柴胡山梔龍膽草調理而安吊陰痛不可忍此症兩條筋從陰吊起至乳上疼痛身上發疼宜用川楝湯川楝子豬苓檳榔澤瀉各八分麻黃六分春天只用三分木香三分小茴白朮烏藥乳香元胡大茴各一錢姜三片蔥一根水煎對火服發汗二劑即愈陰戶翻出仰臥不能轉動此真陰不足或欲事過多所致名曰翻花疼痛異常用大鱉一個重二斤者破去腸雜連頭整個水煮極爛將汁碗盛用舊綢蘸汁滴患處使其滲入其骨連頭頸煅灰研末夜間拭淨摻之其肉作羹令病者食之三日即愈老年脫肛諸藥不能治者用此方亦神效陰戶吹響名曰陰吹乃陰戶放空如撒尿之聲也金匱云乃胃氣下泄陰吹而正喧此穀氣之實也豬板油八兩亂髮雞子大三個以肥皂水洗淨同熬發熔分兩次服病從小便出此治陽明少陰之方也並治男子女癆黃疸陰戶寒冷方見種子門陰戶疼痛此受寒也食鹽炒熱青布包裹尉之效又方蔥頭加乳香搗融敷之極效陰毛生八腳蝨白果搗融搽之極效裹小腳法皮硝鳳仙花子即指甲花子又名急性子以家中取者為真石榴皮各五錢茵陳四錢煎水洗不可用手洗腳自柔軟易裹又方鳳仙花連根一併捶爛煎湯常常洗之腳亦柔軟不受痛苦屢試甚效有用猴骨煎水洗者則腳軟終身不能行走萬不可用又方杏仁一錢桑白皮四錢水五碗新砂罐煎至三碗加入皮硝五錢乳香一錢用紙封口煎化將腳先熏後洗三日一次十餘次後軟而易裹腳生雞眼方見足部
