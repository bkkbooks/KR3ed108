body:
  text: 卷十小兒科雜治初生去毒開口法小兒初離母體口有液毒形如血塊啼聲一出隨即咽下而毒伏於命門他日發為驚熱瘡疾惡痘等症須於未啼時急用絲綿裹指挖去口內穢濁以清臟腑又方新産小兒飲食未開胃氣未動是混一清虛之府以甘草細切少許將潔淨細絹包裹用滾開水泡浸盞內不宜太甜乃用軟帛裹指醮汁遍拭口中去其穢濁隨用胡桃肉又名核桃去皮研極爛以稀絹或薄紗包如小棗納兒口中任其吮汁吮盡方可食乳非獨和中且能養臟最佳法也又方熟軍枳殼歸尾生甘草各五分紅花三分桃仁三分此藥須早預備兒初生時即以水一茶鍾煎至半鍾以新棉花一塊放藥水內泡透取出裹指上納兒口中吮之再泡再吮不吮則已過片時小兒解下黑糞再與吮之以糞色不黑為止此藥必於下地六個時辰內服之服後方可食乳此方最能去毒免疾有益無損又方凡小兒落地時燒橄欖核一枚存性研末硃砂五分和勻嚼生芝麻一口津吐和藥絹包如棗核大安兒口中待咂一時頃方可與乳此藥取下腸胃穢毒令兒少疾出痘亦稀少也又方淡豆豉甘草各三錢濃煎汁屢屢與食以一酒杯為度其毒自下又能助養脾氣且免驚風又方若母體氣素寒小兒清弱者及産時收生遲慢致受風寒者兒必面色㿠白唇色淡紅只以淡薑湯服之最能去胃寒通神明並可免吐瀉之患此法最妙人所未知服後仍照各前方治之保嬰各法凡天寒孩兒生下不哭或已哭不響宜急用衣物包裹再用香油紙捻將臍帶艾火炙斷使暖氣入腹漸漸作聲而活倘或選剪斷臍帶氣絶死矣有悶臍生者兒糞門有一膜閉住其氣故不能出聲當以手微拍之則膜破而能哭如拍之不破須用女人之輕巧者以銀簪輕輕挑破或不能挑者急用暖衣緊抱勿令散放用藥水浸其胞衣天寒則加火熱之久則熱氣內鼓其膜自破出聲而蘇兒生三日有於髮際中間灸者乃灸其風路也然此法因西北地土多寒故宜若東南地土多濕斷不宜灸兒生次日即看口中上齶有白泡點子即以銀針輕輕刮破將泡內白米取出勿令落入喉中仍以陳墨擦之如次日不取則泡堅難破誤事又有馬牙在牙齦上白點如碎米亦須急急挑出以墨擦之間日再看再生再挑兒生三日相傳洗三若受風寒臍風由此而起雖夏日亦宜避風冬日尤慎之又慎況初生亦宜戒浴欲其勿受外邪也兒生下時欲斷臍帶必以蘄艾一小丸用香油浸濕熏燒至焦方斷其束臍須用軟綿帕裹束勿令兒尿濕臍此預防臍風第一要法小兒臍帶落下即用淨板刷洗將臍帶取置新瓦上用炭火四圍燒至煙將盡取出安置新瓦上用碗蓋之存性研為細末將透明硃砂研末水飛過加臍帶灰四分用硃砂二分和勻蜜糖拌塗乳婦乳頭上令兒吮食使穢氣胎毒即從大便遺下個個保全此延生妙法臍帶內有蟲當去之小兒初生兩乳必有核子以散為度否則腫硬成毒啼哭不已如初生洗浴時即將兩乳揉去乳汁其核自消小兒初生每日用茶加鹽少許蘸拭其口二三次此法至穩至妙世多忽之不知兒之胎毒從黏涎中抹去可免痄腮馬牙鵝口重舌木舌等症至簡至易之良方也倘兒面唇色淡以淡薑湯代茶鹽湯可也月內小兒不可聞啼即抱一啼便乳須常令啼哭則胎中所受熱毒從此而散胎中驚氣從此而解期月之間無重舌木舌口噤胎風胎熱之病小兒同母睡時切忌鼻風口氣吹兒囟門恐成風疾初生小兒形骸雖具筋骨甚柔氣質未實猶之木之柔條軟梗可使或曲或直或俯或仰也故百日之內不可豎抱豎抱則易於悲驚且必頭傾項軟有天柱倒側之虞半歲前不可獨坐獨坐則風邪入背脊骨受傷有龜背傴僂之疾慎之兒生兩月後若遇晴和天氣令乳母抱兒時見風日則血氣剛強肌肉緻密可耐風露若厚衣暖被藏於重幃密室則筋骨軟脆不任風寒多易致病所以貧兒堅徑無疾富兒柔脆多災譬諸草木方生以物蓋緊密不令見風日雨露則萎黃柔弱矣小兒衣裳須七八十歲老人舊衣改作令小兒多壽雖富貴之家切不可新制綾羅縫裳凡受客宴賀尤戒殺生小兒四五個月內只與吃乳六個月後方可哺稀粥周歲以前切不可吃葷腥油膩生冷兩三歲後才與葷腥切忌食肉太早食後不可與乳乳後不可與食凡哭笑之後莫即與乳洗浴當護兒背風寒皆自背心入防成癇風故兒忌多浴洗浴又須掩好肚臍勿令潮濕恐生撮口臍風倘臍中有濕將大紅呢燒灰摻上扎好小兒無病切忌服藥免致舛錯誤事小兒衣服自初生至十歲不可夜露易惹邪祟又有鳥名天帝女一名隱飛鳥最喜陰雨夜過落羽人家庭檐置兒衣中令兒成癇病如衣經夜露可即用醋熏之剃頭須就暖處剃後用薄荷三分杏仁去皮尖三枚搗爛入生麻油三四滴和勻於頭上擦之可免風邪剃頭宜醜寅日吉丁未日凶小兒四五歲只會叫人不能言語以真赤小豆查藥物備要研末酒調塗於舌下二三次即能說話岐真人兒科祕法山根之上有青筋直現者乃肝熱也柴胡半夏各三分白芍茯苓各一錢當歸白朮各五分山楂肉二粒甘草一分水煎服山根之上有青筋橫現者亦肝熱也但直者風上行橫者風下行亦用前方多加柴胡二分加麥芽一錢乾薑一分有紅筋直現者乃心熱也亦用前方加黃連一分麥冬五分桑白皮三分天花粉二分去半夏不用有紅筋斜現者亦心熱也亦用前方加黃連二分去半夏不用蓋熱極於胞中也或加桑白皮天花粉黃筋現於山根或皮色黃者不論橫直總皆脾胃之症或水瀉或上吐或下瀉或腹痛或不思飲食今定一方皆可服之無不神效白朮茯苓各五分陳皮黨參麥芽各二分神麯甘草各一分水一鍾煎半酒盞分二次服有痰加半夏一分或白芥子三分或花粉三分有熱若口渴者加麥冬三分黃芩一分有寒者加乾薑一分吐者加白豆蔻一粒瀉者加豬苓五分腹痛如小兒自家捧腹是須用手按之大叫呼痛者乃食積也加大黃三分枳實一分如按之不痛不呼號者乃寒也再加乾薑三分如身發熱者此方不可用夏禹鑄審小兒顏色苗竅法內有五臟心肝脾肺腎也五臟不可望惟望五臟之苗與竅舌乃心之苗紅紫心熱也腫黑心火極也淡白虛也鼻準與牙床乃脾之竅鼻紅燥脾熱也慘黃脾敗也牙床紅腫熱也破爛胃火也唇乃脾之竅紅紫熱也淡白虛也黑者脾將絶也口右扯肝風也左扯脾之痰也鼻孔肺之竅乾燥熱也流清涕寒也耳與齒乃腎之竅耳鳴氣不和也耳流膿腎熱也齒如黃豆腎氣絶也目乃肝之竅勇視而睛轉者風了直視而睛不轉者肝氣將絶也以目分言之又屬五臟之竅黑珠屬肝純見黃色凶證也白珠屬肺色青肝風傷肺也淡黃色脾有積滯也老黃色乃肺受濕也瞳仁屬腎無光彩又兼發黃腎氣虛也目外角屬大腸破爛肺有風也目內角屬小腸破爛心有熱也上胞屬脾腫則脾傷也下胞屬胃青色胃有風也睡而露睛者脾胃虛極也小便短黃澀痛心熱也清長而利心虛也唇紅而吐胃熱也唇慘白而吐胃虛也唇色平常而吐作傷胃論大腸閉結肺有火也肺無熱而便祕血枯也不可攻下脫肛肺虛也口苦膽火也聞聲作驚肝虛也又面有五色面紅病在心有熱面青病在肝多腹痛面黃病在脾傷面白病在肺中寒面黑病在腎黑而無潤色腎氣敗也望其色若異於平日而苗竅之色與面色相符則臟腑虛實無有不驗者矣兒科外治法疏表法小兒發熱不拘風寒飲食時行痘疹以蔥一握搗爛取汁少加麻油在內和勻指蘸蔥油摩運兒之心口頭頂背脊諸處每處摩擦十數下運完以厚衣裹之蒙其頭略疏微汗但不可令其大汗此法最能疏通腠理宣行經絡使邪氣外出不致久羈營衛而又不傷正氣誠良法也清裡法小兒發熱二三日邪已入里或乳食停滯內成鬱熱其候五心煩熱睡臥不安口喝多啼胸滿氣急面赤唇焦大小便祕此為內熱以雞蛋一枚去黃取清以碗盛之入麻油約與蛋清等再加雄黃細末一錢攪勻復以婦女頭髮一團蘸染蛋清於小兒胃口拍之寒天以火烘暖不可冷用自胸中拍至臍口只須拍半時之久仍以頭髮敷於胃口以布扎之一炷香久取下一切諸熱皆能退去蓋蛋清能滋陰退熱麻油雄黃又能拔毒涼肌故也此身有熱者用之倘身無熱惟啼哭焦煩神志不安者不用蛋清專以麻油雄黃亂髮拍之仍敷胃口即時安臥屢試屢驗解煩法凡小兒實熱之症及麻症毒甚熱甚者其候面赤口渴五心煩熱啼哭焦擾身熱如火上氣喘急揚手擲足一時藥不能及用水粉一兩以雞蛋清調勻略稀塗兒胃口及兩手心復以釀酒小曲十數枚研爛熱酒和作二餅貼兩足心用布扎之少頃其熱散於四肢心內清涼不復啼擾或用雞蛋清調緑豆粉貼足心亦佳開閉法凡小兒風痰閉塞昏沉不醒藥不能入甚至用艾火灸之亦不知痛者蓋因痰塞其脾之大絡截其陰陽升散之隧道也原非死症用生菖蒲生艾葉生薑蔥各一握共搗如泥以麻油好醋同煎四味炒熱布包之從頭頂背胸四肢乘熱往下尉之其痰亦豁然而醒此方不特治小兒凡閉症皆效引痰法凡小兒痰嗽上氣喘急有升無降喉中牽鋸之聲須引而下行用生礬一兩研末少入麵粉米粉亦可蓋生礬見醋即化成水入麵粉取其膠黏故也好醋和作二小餅貼兩足心布包之一宿其痰自下通脈法凡小兒忽爾手足厥冷此由表邪閉其經絡或風痰阻其營衛又或大病後陽不布和散於四肢速用生薑煨熱搗汁半小杯略入麻油調勻以指醮姜油塗兒手足往下搓挪以通其經絡俟熱回以指拭去暖痰法凡小兒胸有寒痰不時昏絶醒則吐出如緑豆粉濃厚而帶青色此寒極之痰前法皆不能化惟以生附子一枚生薑一兩同搗極爛炒熱一包尉背心及胸前尉完將姜附捻成一餅貼於胃口良久其痰自下納氣法凡小兒虛脫大症上氣喘急真氣浮散不得歸元諸藥無效用吳茱萸五分酒和作餅封肚臍以帶扎之其氣自順定痛法凡小兒胸中飽悶臍腹疼痛一時不得用藥將食鹽一碗鍋內炒極熱布包之向胸腹從上尉下蓋鹽走血分最能軟堅取以止痛冷由又炒又尉痛定乃止此方男女氣痛皆可治指紋切要小兒自彌月而至於三歲猶未可以診切非無脈可診蓋診之難而虛實不易定也小兒每怯生人初見無不啼叫呼吸先亂神志倉忙而遲數大小已失本來之象矣診之何益不若以指紋之可見者與面色病候相印證此亦醫中望切兩兼之意也令人抱兒對立於向光之處以左手握兒食指以我右手拇指推兒三關察其形色細心體認亦惟辨其表裡寒熱虛實足之矣世人好異不從實地用功以此為淺近之談不屑留意不知臨證能辨此六者便為至高之手蓋表裡清則知病之在經在府而汗下無誤寒熱明則知用寒近熱用熱近寒或寒因寒用熱因熱用因事制宜用無不當虛實辨則知大虛有盛候大實有羸狀不為假證眩惑凡真虛直實易知假虛假實難辨真假既明則無虛虛實實之患於此切要關頭不知體會但以不經之言欺世誑俗謂何者為人驚何者為畜驚不特欺人而且自斯不特無益治療而且誤人生命是誰之咎哉三關部位歌部位未可以定輕重安危由古有三關之說姑存之耳初起風關證未央氣關紋現急須防乍臨命位誠危急射甲通關病勢彰紋現風關為病邪初入之象證尚輕微體亦未困治之誠易紋現氣關邪氣正盛病已沉重治之宜速倘三關通度紋出命關則邪氣瀰漫充塞經絡為至重之候設透關射甲則邪氣無所容高而不能降為亢龍有悔之象治之者切宜留心慎勿輕視浮沉分表裡歌指紋何故乍然浮邪在皮膚未足愁腠理不通名表證急行疏解汗之投此紋與太淵脈相通凡有外邪太淵脈浮此紋亦浮蓋邪在皮毛腠理之間故指紋亦顯露於外謂之表證速宜疏散啓其皮毛開其腠理使邪隨微汗而解一劑成功何嫌而不投哉忽爾關紋漸漸沉已知入里病方深莫將風藥輕相試須向陽明裡證尋指紋見沉知邪入里但有淺深之別若往來寒熱指紋半沉尚在陽明胃經治宜解肌若外證壯熱不已指紋極沉已入於陽明胃府速宜攻下庸妄見其身熱猶以風藥治之蓋病在內治其外非其治也不特病邪不解適足以燥其陰血愈增其困耳紅紫辨寒熱歌身安定見紅黃色紅豔多從寒里得淡紅隱隱本虛寒莫待深紅化為熱神氣太然營衛靜謐定見太平景象蓋黃為中和之氣紅乃文明之色紅黃隱隱景物熙熙焉有不安之理寒邪初入皮毛經絡乍滯所以紋見紅鮮由血滯也無論內寒外寒初病久病一見此紋總皆寒證凡人中氣怯則榮衛不充紋必淡瑩淡而兼紅虛寒之應至謂深紅化熱其理安在紅本寒因豈能熱由其寒閉皮毛腠理不通蓋人身內臟之氣時與皮毛之氣相通實無一息之暫停今寒閉汗孔內出之氣無所泄鬱於皮毛之間漸積漸厚而化為熱矣此內出之氣為熱非外受之寒能變熱也關紋見紫熱之徵青色為風古所稱傷食紫青痰氣逆三關青黑禍難勝營行脈中衛行脈外熱壅經絡阻其陰榮之道所以紋紫紫為熱熾千古定評也少陽甲木其色本青肝膽受邪紋見青色此傷風候也夫青者木之色內經有在天為風在地為木之言所以風木同氣肝受風邪紋必現紫色而兼青食傷之候蓋食飲有形之物阻抑中焦壅遏脾氣不能宣布故風木乘其困而侮之所以痰氣上逆也疏通壅滯令其疏得可也倘抑鬱既久脾氣愈不運營衛愈見澀則風痰食熱固結中焦所以青而兼黑此抑鬱之至也急宜攻下庶有生機誤認驚風百無一救淡滯定虛實歌指紋淡淡亦堪驚總為先天賦稟輕脾胃本虛中氣弱切防攻伐損胎嬰小兒稟受陽虛肌膚晃白唇舌淡瑩者指紋四時皆淡雖有病亦只淡紅淡青淡紫而已蓋淡紅虛寒淡青虛風淡紫虛熱此等之兒根本不堅中氣怯弱無論新病久病總歸於虛一毫攻化不敢輕用倘誤投克削覆水難收悔之晚矣關紋澀滯基因由邪遏陰營衛氣留食鬱中焦風熱熾不行推蕩更何求病邪阻郁營衛運行遲滯升降稽留所以指紋推之轉澀全無活潑流利之象由食飲風熱相搏是為實證急宜推蕩去其菀莝其愈亦易若三關純黑推之不動死證也不治紋形主病歌腹疼紋入掌中心彎內風寒次第侵紋向外彎痰食熱水形脾肺兩傷陰掌心包絡所主紋入掌中邪侵內臟由中氣寒也故為腹痛紋若彎弓內外有別其紋之兩頭彎向中指為內為順症為外感風寒治之猶易其紋彎向大指為外為逆症為內傷飲食治之稍難形如水字脾肺不足食塞太陰中氣怯弱脾不運化故也或問指紋惟止一線安能有水字之形曰不觀太淵之脈亦止一線何以陽維陰維陽蹺陰蹺皆左右彈石豈非水字之形乎脈有左右安知紋無左右但能觸類旁通無往非理豈特指紋為然哉凡看指紋以我之大拇指側面推兒食指三關切不可覆指而推蓋螺紋有火剋制肺金紋必變色又只可從命關推上風關切不可從風關推出命關此紋愈推愈出其紋在先原未透關今誤推而出之大損肺氣慎之戒之以上表裡寒熱虛實鑿鑿有據但能於臨症時認得比六字分明胸中自有主宰雖不中不遠矣稀痘並免驚風小兒初生三日內用雞蛋一個打放盤中務於無風之處以手指蘸蛋清自腦後風門骨頸窩後高拱骨即風門骨至尾閭骨脊骨盡處即尾閭男左旋女右旋按背脊骨逐節輕揉周而復始不可由下揉上有黑毛出如發愈揉愈出務令揉盡終生可免出痘即出亦少且免驚風六日九日再揉並揉前心手足心兩肩井穴手平抬見肩上有窩處即是又稀痘法孕婦懷胎時用生白芝麻不拘多少置來往處隨便撮食之及十月滿足生下子女不受胎毒出痘甚稀又方銀花金者不用陰乾飯鍋粑每一升入銀花一兩共研末用洋糖或做糕餅或用開水調和每日令小兒食之又方用橄欖一味不拘新陳愈陳愈妙按一年二十四節將橄欖於火上焙乾研末以清滾水送下每節橄欖一個不可間斷服之一年小兒永不出痘如逢節偶忘須於下年照所忘之節補食一個又方冬至時辰在於屋內出入行走之地掘一坑約深尺許將新生雞蛋十五個埋於坑中兩頭各用磚一塊以厚竹片排鋪擱於磚上用席片蓋之仍將泥填好以便行走至立春時刻取起每日以緑豆一撮煮雞蛋一個令兒食之不可間斷若依法服三次則終身不出痘稀痘方多惟此有應小兒初生面紅啼哭不止此熱極也宜急治之如過三日難治用枳殼梔子炒扁柏葉炒川連各三分黃柏二分生甘草四分薄荷四分水煎去渣入蜜糖四茶挑和勻以鴨毛點舌上兩旁數次面色變淡紅者可止或用吳茱萸四錢好醋調敷兩足心日換數次過一夜即愈此法最妙晝啼不止臺烏藥一錢煎水服甚效夜啼不止多因穿蓋過暖加以父母同床熱極所致諺云若要小兒安常帶三分飢與寒取雞糞塗兒臍中男用雄雞糞女用雌雞糞極妙又方硃砂磨新汲水塗心窩及兩手足心五處最驗又方蟬蛻七個去足頭取下半截炒研末以薄荷二三分煎水調服立止如神如若不信將上半截為末與服復啼如初矣又方雞窩中草安席下勿令母知或用干牛糞亦可若諸方不效仍復夜啼看面色青白手冷者用川芎當歸茯苓茯神白芍甘草木香勾藤紅棗引煎服面赤唇紅身熱者生地黃芩生甘草木通燈心竹葉引煎服或用前吳萸敷足法最妙面赤唇口紅者方可用又方面赤心熱者用青黛二分燈心十莖煎服又方燈花五朵研末塗娘乳上令小兒吃乳又方五倍子研末口水和作餅納肚臍內以帶扎之效又方灶心土三錢硃砂一分麝香一釐蜜水調每服五分又方硃砂寫子午二字貼臍上即止又方畫驢子一個倒貼在小兒床頭壁上自愈又方用本兒初穿汁衣放瓶內自不哭也又方用其父母指甲二釐燒灰緑蔥頭一錢煎水飲效又方用本家撥火棍或燒殘柴火頭一個削平焦處如無即取柴棍撥火數日用之亦可用硃砂向上寫云撥火杖撥火杖天上五雷公差來作神將捉住夜啼鬼打殺不要放急急如律令敕寫畢勿令人知安立床前腳下男左女右此黃淡翁所傳也又方烏藥五分煎服亦效又方明鏡掛床腳下自止曲腰啼哭此受寒腹痛也淡豆豉生薑蔥白細切鹽共炒熱以手巾包尉肚上立止遍身奇癢叫啼不止生薑搗爛稀布包擦甚效初生遍身發黃此胎中濕熱也名胎黃用生地花粉茵陳各一錢煎服或用鄭十五黃疸門黃蠟紙筒方治之穩而且妙初生遍身紅赤此胎中熱毒也名胎赤用生地花粉甘草連翹各一錢水煎服外用浮萍水苔搗爛絞汁調朴硝赭石敷之初生無皮小兒初生周身赤肉無皮如懷胎在樓上居住未受地氣者將兒安於泥地上臥一宿即長皮矣又方早稻米磨粉干撲之候生皮乃止周身脫皮此症因生時觸風滿身皮屑落下一層又一層名曰脫殼若作丹毒火疹治之則誤矣宜用木通藿香黃芩各六分麥冬半錢加燈草煎服兩腿生瘡脫皮兩大腿近小腹處生瘡皮脫開漸延小腹則不救此名胎剝用黃柏炙焦研末和豬膽汁敷或用伏龍肝即灶心土開水調敷亦可身如蛇皮鱗甲名胎垢又名蛇胎用白殭蠶去嘴為末煎湯洗之或加蛇蛻研末和入亦可初生身如魚泡如水晶此症破則水流用密陀僧為末摻之瘡似楊梅破爛有孔凡小兒或頭面遍身形似楊梅瘡破爛有孔用飯甑上滴下氣水以盤盛取搽之百藥不效者用此如神紅絲瘤一人生子一歲生紅絲瘤而死連生四子皆然一醫云此胃中有伏火胎毒故也遂令男服滋胃丸見內外備用諸方女服六味地黃丸見同上後生子皆無此患囟門腫大黃柏末水調貼兩足心即愈頭縫不合名曰解顱此腎氣不足也用乾薑七錢細辛三錢肉桂五錢共為末薑汁和敷顱上小兒面赤即愈又方南星微泡為末醋調攤細綢上貼囟門用熱手時時尉之干則用熱醋潤濕又方柏子仁防風南星各四兩為末每用一錢醋調攤紅綢上看顱門大小剪貼一日一換干則以熱醋潤之又方茵陳車前子百合各五錢為末烏牛乳汁調塗足心及頭縫開處用綢包裹二日一換初生眼目紅赤腫爛此胎中受熱也以蚯蚓泥又名曲蟺搗敷囟門干則再換不過三次即愈或以生南星生大黃等分為末用醋調塗兩足心亦愈又方甘草豬膽汁泡過焙乾研末每用一二分乳汁調服又方熊膽少許蒸水洗眼上一日七次如三日不開宜服乾地黃赤芍川芎炙草歸身花粉各一錢為末燈心湯調灌之又方雄雞膽燈心蘸點極效或用人乳蒸川連點之亦效又方胡黃連一錢研末人乳調敷足心男左女右神效又方黃連黃柏當歸赤芍各二錢杏仁去皮尖五分打碎以乳汁泡一夜蒸熟取濃汁點眼內小兒鬥眼黑眼珠呆而不動者是方見目部小兒變蒸自生下之日起三十二日為一變六十四日為一蒸再過三十二日為一變再過六十四日為一蒸至五百七十六日而止每當蒸變之日身發微熱不必服藥兩腮腫硬新産月內小兒有噤口不乳啼聲難出兩腮腫硬有核名螳螂子又曰痄腮熟諳穩婆將利刃於口內兩腮剖開挖出堅光惡肉形象頗肖桑螵蛸傷處搽藥自愈若割治少遲時刻則腫延喉鼻不可救矣多有割傷致命者終非良法今得一方用麝香一錢硃砂五分螺螄七個同搗如泥敷囟門上俟干時自落切勿剝去若重者將針微刺患處出血以好陳墨搽之自愈或溏雞糞塗之更妙切勿妄用刀割致傷兒命後有芙蓉花諸方最為神妙又方蜒蚰一條查藥物備要便知銀硃錢半同研爛搽腫硬處勿令擦去即消又方桑柴炭少許入雄雞冠血二三滴再加鹽滷一匙和勻時時搽之亦效又方青橄欖核又名青欖如無以鹽橄欖核泡去鹽味用亦可好醋磨汁搽之又方紅飯豆扁小微紅者七粒研末好醋調敷效口角生瘡亂髮燒灰豬油調搽口角流水方見口部口腫並生馬牙小兒口中腫起如菌名乳菌牙齦生白泡子名馬牙疳致小兒不能吃乳以指摘去其頭倘有血出以綿拭去輕者京墨搽之即愈重者急以殭蠶三條去絲嘴人中白四分冰片一分共研細搽患處略停片刻用絹蘸茶洗淨再擦一日三四次自愈如未愈方中加硼砂血竭青黛各三分兒茶分半藥珠一分各為細末和入前藥每日洗擦三四次無不愈者或用馬齒莧根瓦上焙乾少加雄黃研末吹之並用後芙蓉花諸方更妙口生白點初生百日中口中白點不計其數拭之則去少刻復有滿口纏遍內竄入喉日夜啼哭不乳俗名雪口又名鵝口疳用甘草黃連等分煎湯以綢裹指拭去取桑皮中白汁塗之立愈或用陳墨點之亦可再以辰砂益元散見備用諸方燈心湯調下則不再發又方檳榔燒枯研末點之立見功效並用後芙蓉花諸方更妙初生小兒或兩腮腫硬或口舌生瘡或生馬牙或重舌木舌蛇舌吐舌及口不開不食乳等症芙蓉花或葉或皮或根均可用捶極融爛用雞蛋二個和勻煮熟候冷敷心口並肚臍用布扎緊屢試如神又方生香附生半夏各二錢研末生雞蛋白調作餅貼兩足心一周時即愈此林屋山人引熱下行經驗方也或用吳茱萸四錢好醋調敷兩足心亦效如口舌破爛者用活鯽魚以尾入口中頻頻搖擺隨擺隨換此方能去口中熱毒初生時兒尚啼哭用一二次後口中生涼兒自不啼尾雖有刺甚軟並不傷人治後即能食乳不過三日全愈屢試甚驗真奇方也要用活魚方效仍用前方敷足為要重舌舌根肉壅腫疊出短小如舌者是用黃柏和竹瀝泡一夜取汁點之又方巴豆半粒飯四五粒共搗爛為餅如黃豆大貼在印堂中待四圍起泡去之即愈各項舌病皆效並用前芙蓉花諸方更妙木舌舌尖腫大塞滿口中直硬如木不能轉動者是用萆麻子肉搗爛以紙取油將紙搓條點火吹滅以煙向舌熏之即消若舌下腫起用銀針挑破出血以鍋墨煙以燒草者更佳和鹽醋厚調敷之脫去再敷或用水調敷亦可又方蒲黃研末時敷舌上其腫自消又方殭蠶為末吹入吐痰甚效並用前芙蓉花諸方更妙舌忽脹大腫硬即時氣絶名曰𣮷舌用皂礬不拘多少新瓦上火煅紅色為度放地上候冷研細擦舌上立效兼治重舌木舌又方頂上梅花冰片研爛敷或以食鹽百草霜共為末井水調敷即效又方百草霜酒調塗舌上即消又方乾薑蒲黃各等分為末乾擦患處並用前芙蓉花諸方更妙蛇舌用前芙蓉花諸方更妙其舌常卷兩邊口角者是用明雄研末點舌數次即安或用燈心泡水服重則用川連一分蒸水服即愈吐舌人中白冰片和勻鵝毛刷上再用好川連一二分煎服舌自收入冰片雄黃硼砂共為末乳調塗舌上亦效頸軟乃肝腎虛風襲入用生附子去皮臍生南星各二錢為末薑汁調攤貼天柱骨上痰喘有聲胡桃又名核桃連皮搗爛麥芽煎水加冰糖沖服喘止痰消此觀音夢授方也或照前引痰法治之更妙又方巴豆一粒搗爛綿裹塞鼻男左女右痰即自下立愈喉嘶聲啞甘草薄荷各五分桔梗麥冬各一錢水煎服立愈又方蝦蟆膽取汁點舌上立愈小兒病後口不能言大生南星一個泡去皮臍為末每用二三分或四五分量兒大小用之取豬膽汁調再用熱淡薑湯沖服即能言矣兒不食乳乃心熱也用大蔥頭一個切四片用乳汁半盞同蒸分作四服即能食乳並用前芙蓉花諸方治之更妙又方黃連二分煎湯灌小兒數匙即食乳矣神效若臍旁青色及口撮緊者此臍風症也即照後臍風諸方趕緊治之遲則難救吐乳米七粒燒黑水半酒杯乳半酒杯煎至五分服極效缺乳凡小兒無乳百物不食無法可施用離核棗於飯上蒸熟與兒食之食至斤余即思飲食雖無乳亦可活矣離核棗即真南棗持三五枚向耳旁搖之響者即是無則用大黑棗亦可斷乳山梔一個燒存性雄黃硃砂各二分輕粉一分麝香一分共為極細末擇伏斷日見後候兒睡覺用麻油將油調勻搽兩眉毛上醒來便不食乳如不效再加黃丹五分再搽必效神驗非常惟肝氣盛者難驗聽其自落勿令小兒知忌見生人夏天不宜並忌逢五逢七日方名畫眉丹伏斷日子日虛星丑日鬥星寅日室星卯日女星辰日箕星已日房星午日角星未日張星申日鬼星酉日嘴星戍日胃星亥日壁星龜胸大黃酒拌九蒸九曬桑白皮甜葶藶熟石膏各八分天冬杏仁去皮尖木通各一錢二分水煎臥時服或用蜜為丸服更妙龜背並治龜胸用龜尿摩其胸背久久自愈取龜尿法以鏡對龜照之即有尿出又方龜尿調首烏末敷背上日久自愈腹痛小兒驟然腹痛其症不同有挾熱而痛者其痛多緩或一日只痛數次甚者或自下而痛上痛過一陳則有時不痛良久又痛宜用涼藥加疏利藥治之有感寒挾濕而痛者其痛多急連綿少有停止甚者或如刀割欲吐不吐欲瀉不瀉手足冷面色青宜用升發藥加消導藥治之外有蟲痛者聞煎炙食物香氣則痛宜用苦楝皮使君肉等藥以殺其蟲則痛自止查蟲疾門斟酌治之枳實導滯湯治熱痛陳枳殼去穰炒黃連山梔仁炒黑色各六分赤芍前胡連翹去心蒂各四分三稜莪朮俱醋炒檳榔甘草各三分水煎飢服覺熱甚大便祕者加酒炒大黃一錢二分微利之三稜莪朮不用亦可升消平胃散治感寒挾食痛小川芎炒香附蒼朮紫蘇薑汁炒過厚朴各五分藿香砂仁研碎白芷陳皮去白各三分炙草二分炒麥芽六分山楂肉一錢加羌活防風各三分生薑三片水煎熱服肚腹脹大亮如水晶方見肚腹部肚皮忽然青黑方與上同腹中鳴如蛙聲淡豆豉生薑各二錢切碎蔥五莖食鹽一兩同炒熱置臍上尉之效又方蔥姜煎濃湯洗肚腹另用蔥姜搗爛炒熱作餅貼臍上良久即愈又方枳殼一錢檳榔一個沉香廣香各一小點煎水服又方乳香沒藥各等分共為細末木香磨水用滾水調服肚臍腫出小兒月內臍突光腫如吹捻動微響赤腫可畏由斷臍在前洗浴在後或束縛不緊風濕入內所致用牡蠣煅大黃各五錢朴硝一錢為末多用田螺浸水調一二錢敷臍上其水從小便而消如啼哭不止用臺烏藥煎水服即止又方茯苓車前子各一錢甘草二分陳皮三分通草三分共煎湯灌之一劑即安又方紅飯豆淡豆豉南星去皮臍白蘞各一錢共為末用巴蕉自然汁調敷臍四旁即愈臍內膿血不幹龍骨一錢煅輕粉五分黃連一錢枯礬五分麝香五釐為末乾摻臍中又方大紅呢燒灰為末敷之效又方馬齒莧焙枯為末敷之又方草屋上舊茅草研末敷極效又方枯礬水龍骨即舊船底縫中石灰共為末敷甚效又方車前子炒焦為末敷之即愈預防臍風凡將斷臍必須先用熱湯浴過不使水氣入內一手握帶一手向臍推臍三三次使胞血貫滿臍穴離胞寸許用線扎緊以瓷鋒割斷勿使臍血外流則兒血旺易育若弗用割隔單衣咬斷又將暖氣呵七口以免膠風之疾不用刀者蓋鐵器寒冷恐傷生氣也或用前燒斷之法亦妙又方枯礬硼砂各二錢半硃砂二分冰片麝香各五釐共為末凡小兒下地洗過後用此末摻臍上每日換尿布時仍摻此末摻完一料永無臍風等症臍風小兒生七日內面赤喘啞是為臍風臍上定起有青筋一條自臍而上衝心口若此筋已至心十難救一二矣看此筋未至心口時用艾絨在此青筋頭上燒之此筋即縮下寸許再從縮下之筋上燒之此筋即消而病痊矣屢試屢驗艾團不過如小黑豆大或如麥子大或用燈火燒之亦可又牙根有小泡用綿裹指擦破即活又方雞蛋白用手指蘸搽背心良久有毛出刺手長分許即止若長至寸許用綢包緊俟有轉機再搽兩太陽及口角則口自開矣神效又方小兒初生惟臍風最為惡候或因剪臍太短或結束不緊緻外風侵入臍中或水濕寒冷所乘昔人有預防臍風之訣謂三朝一七看兒兩眼角黃必有臍風此法尚恐未確惟摸兒兩乳乳內有一小核是其候也然乳內有核發臍風者固多亦竟有不發者此法亦有三四分不確自應輕輕將乳核擠出白漿自愈惟看小兒不時噴嚏更多啼哭吮乳口松是真候也急用夏禹鑄先生臍風燈火救之其訣曰臍風初發吮乳必口松兩眼角挨眉處忽有黃色宜急治之黃色到鼻治之仍易到人中承漿治之稍難口不撮微有吹噓猶可治之至唇口收束鎖緊舌強頭直不必治矣一見眉心鼻準有黃色吮乳口松神情與常有異即用燈草蘸香油乾溼得中點燃於囟門燒一焦人中承漿兩手大拇指端少商各燒一焦臍輪繞臍燒六焦臍帶未落於帶口燒一焦既落於落處燒一焦共一十三焦風便止而黃即退矣神效非常先宜以墨點定穴道然後用火囟門穴在頭頂虛吸處人中穴在鼻下上唇正中承漿穴在下唇垂下正中少商穴在兩大指外側內側亦是甲縫中不上不下即是臍輪穴即臍之四圍緊近臍帶之所臍風燈火囟門眉心人中承漿兩手大指甲上名少商臍輪及臍心共十三焦有起死回生之功小兒中惡以及痰閉火閉氣閉乍然卒死一時無藥即以大指掐其人中穴病輕者一掐即啼哭而醒倘不應再掐合谷穴在大指二指合縫處又不應掐中衝穴穴在兩中指端離甲外若再不應其病至重則以艾丸如蘿蔔子大安於中衝穴灸之火到即活小兒初發瘧疾名曰胎瘧每日冰糖五錢煎湯飲之雖隔兩日發瘧一次十日必愈或以蟬蛻二兩包好作枕與兒睡之其瘧亦止神效之至氣喘人家動土衝犯土神以致小兒氣喘人多不和宜請人查明九宮看太陽宮在何處取此處之土煎水服仍須安謝土神即愈若不見效則非衝犯須請名醫治之吐瀉與脾胃及泄瀉各門參看小兒吐瀉其症不一最宜詳審有因傷食吐瀉者有因感寒停食而吐瀉者夏月則有因伏暑吐瀉者傷食吐瀉者其吐有酸氣其瀉糞狀如糟粕亦有酸臭氣者宜消導之感寒停食而吐瀉者或食後感冒風寒則其食停滯不化或脾胃先受風寒而後飲食則其食亦停滯不化或飲食後誤食寒冷之物則其食亦停滯不化雖致病不同其為感寒停食則一也此宜發散而兼消導然此吐瀉或多胸腹刺痛即霍亂吐瀉是也治法亦同伏暑吐瀉者小水必不利必兼煩渴當以暑治之吐甚者煎香薷散調益元散瀉甚者煎四苓散調益元散須斟酌用之然而吐瀉交作最是小兒危證若其屢作不止則不論何因皆當用參朮等急救胃氣不惟傷食停食者當急救之即伏暑者亦當急救之蓋其初雖有暑氣而多吐多瀉之後則熱氣已散而胃氣驟虛若不用溫補急救恐中氣頓絶則虛痰上湧須臾告變矣且多吐之後胃氣大虛氣不歸元而陽浮於外反有面赤頭熱身熱作渴而似熱症者俗醫不知其理誤認為熱而投以涼藥殺人如反掌甚可畏也故治吐瀉而藥不中病者與其失之寒涼不若失之溫補猶可救療失之寒涼其禍甚速多不及救也加味平胃散治傷食吐瀉蒼朮淘米水浸洗厚朴去皮姜法炒山楂肉各六分陳皮去白青皮麥芽香附米炒砂仁研小川芎各四分甘草炙二分生薑三片水鍾半煎七分分二三次緩緩服藿香和中湯治感寒停食吐瀉藿香紫蘇炒香附製蒼朮製厚朴山楂肉小川芎各六分羌活砂仁麥芽炒白芷陳皮去白各四分炙甘草二分生薑三片煎法服法俱同前香薷散以下三方伏暑吐瀉用大花香薷二錢白扁豆炒去殼打碎製厚朴各一錢水煎候微溫調益元散二匙服四苓散赤苓去皮豬苓澤瀉各一錢二分白朮八分木通車前微炒各五分水煎候溫調益元散二三匙辰砂益元散滑石飛過六兩甘草末一兩辰砂飛過三錢共和勻每服小兒一錢大人二錢燈心湯下錢氏白朮散治吐瀉已久虛火作渴者黨參白朮茯苓炙草乾葛各五分南木香二分姜三片水煎溫服參砂和胃散治虛寒嘔吐不止黨參砂仁研細製半夏各四分白朮土炒茯苓各五分藿香陳皮各三分炙草二分煨姜去皮三片水煎熱服姜米湯吐多而胃氣欲絶者用此安胃老生薑一塊重一兩多煨熟去皮研爛用水一碗陳米二撮同入瓦罐煎好候溫緩緩與服其嘔即止凡嘔吐交作者止吐為急吐而不瀉者均用生薑米湯最效燒針丸治吐瀉如神黃丹水飛硃砂水飛枯礬各等分為末紅棗為丸黃豆大每服三四丸戳針尖上燈火上燒存性研爛淘米水調服瀉者食前服吐者不拘時服外用緑豆磨成粉調雞蛋白吐者敷兩足心瀉者敷囟門神效或照卷四脾胃門各方治之暑月水瀉凡小兒暑月水瀉小便赤澀或小便不通用豬苓一錢赤苓澤瀉各一錢木瓜五分白朮六分木通八分車前子四分略炒燈心一團水煎加鹽少許飢時服小便自通其瀉亦止又方見卷七泄瀉門小兒痢疾方見卷七痢疾門初生陰囊過大凡新生小兒陰囊甚大名曰胎疝日後長成恐變木疝如過滿月外或一歲以內俟端午日午時以腳盆盛熱水安於中堂隨抱小兒將陰囊放水內一浸再將小兒在於中門檻上中間一擱其陰囊上之水印痕於檻將艾火在檻上濕印處燒三次其囊逐漸收小如故其效如神真奇方也又方石蟹用好醋磨汁搽之亦效忽然陰腫此係被蚯蚓吹腫令婦人以吹火筒吹之即消又方真硼砂研末水調敷甚效或用二味拔毒散見癰毒諸方門亦效陰囊赤腫用老杉木燒灰存性加宮粉和清油調敷陰囊腫墜光亮啼哭疼痛蟬蛻一兩煎湯洗再用生紫蘇葉搗成泥包之而愈或用乾紫蘇研末濕則干敷干則香油調敷雖皮破子出悉有神效陰縮入腹初生六七日後陰囊收縮入腹啼哭不止者此受寒所致用硫黃吳茱萸各五錢為細末研大蒜調塗臍下仍以蛇床子微炒布包尉臍即下陽物腫痛小兒陽物眼上忽腫小便時腫痛甚者用燈心草煎湯不拘時服腫消痛止初生小便不通用豬毛於陽物眼上刺去薄皮即通屢試屢驗如陽物眼上並無薄皮即系胎熱用大蔥頭一個切四片用乳汁半盞同蒸分作四服即通小便數日不通遍身腫滿蘇葉一斤煎濃湯一盆抱小兒向盆中熏之冷則再換熱湯外用炒尉臍上及遍身腫處即愈又方連須蔥白一斤搗融炒熱分作二包輪流熱尉臍下又方皂角末吹些須入鼻令其噴嚏百藥不效者用此即通大小便不通初生大小便不通腹脹欲絶者急令人溫湯漱淨口吸咂兒之前後心臍下兩手足心共七處吸咂五七口取紅赤色氣透為度氣透則便自通又方連須蔥頭七個生薑一大塊豆豉食鹽各三錢同搗作一餅焙熱掩肚臍上帶扎良久自通初生大小便出血此由胎氣熱盛所致或母食酒面煎炒熱毒等物流入心肺兒在胎內受之熱毒亦傳於心肺女子熱入於心故小便出血男子熱入於肺故大便血血用生地黃取自然汁入蜜少許和勻溫服男女皆效夜睡遺尿在床方見卷六小便門初生糞門閉塞以金銀簪挑開一孔不可過深用油紙捻套住免其再合足趾向後兒初生兩足趾俱向後曲因母懷子時日日盤坐兒在母腹一氣相通形隨氣化故亦如是用軟綿卷如棍子安兒膝後彎內用木瓜煎湯常洗尉之日久筋長舒展則自能伸由此觀之則知胎前調養不可不慎古人所以重胎教也疳積凡小兒乳汁不足食物雜亂或口渴飲水或貪食不飽或喜食泥土雜物或沉睡不醒或眼帶藍色或眼珠不明或頭往下垂或面色黃瘦或青筋暴露或肚腹脹大或泄瀉不止種種不一此因傷食腹內生蟲名曰疳積必服殺蟲之藥方有驗效然藥多克伐惡傷脾胃卒多不救今得祕傳外治二方即可斷根又不傷損萬無一失並治大人蟲積腹痛珍之寶之羊尿脬吹起陰乾入頂好汾酒一二兩無汾酒用頂好燒酒亦可用線扎緊掛小兒心口胃脘之間疳疾重者不過數時其酒氣自然消減必須稱過方知減否酒減再換換至數次酒不消減病即愈矣偏僻之處羊尿脬最為難得須於春秋祭祀時預為買出備用少則三四個多則七八個無羊之處用豬尿脬亦可然未經試過恐難見功總不如羊尿脬之效驗神速也又方蔥白每個約一寸多長苦杏仁生黃梔子紅棗各七個皮硝三錢真頭道酒糟一兩白灰面三錢以上七味用石槽搗爛成泥五寸寬白布兩塊攤膏藥兩張前貼肚臍後貼背上要對正肚臍之處用布捆好貼三日肉見青色即好如未見青再換一次無不愈矣消疳無價散石決明一兩五錢煅爐甘石五錢童便泡一日夜燒透以能浮水者為佳滑石五錢雄黃二錢硃砂一錢冰片五分海螵蛸五錢煅去殼共為細末量兒大小或三四分或五六分用不落水雄雞肝一副竹刀切破上開下連摻藥在內用線扎好加淘米水入砂罐煮熟連湯食盡雖疳疾眼瞎可以復明神效之至消疳丸蒼朮米泔水浸去皮炒白朮土炒當歸酒洗白芍酒炒麥冬去心薏仁山楂肉去核石斛去蘆根神麯炒麥芽炒半夏曲枳殼蘿蔔子炒陳皮厚朴使君子肉茯苓檳榔炙耆各一錢青皮莪朮木香砂仁各五錢炒乾為末蜜丸彈子大米湯送下一丸專治小兒泄瀉無度嗜食無厭肚大青筋四肢羸瘦或發夜熱或腫面目或腫手足瘦弱垂死者但能進食瀉止食調肌肉自生小兒周歲後乳食夾雜則易成疳預服此丸脾胃充實保無疳症或缺乳成疳者一應服之此藥大和脾胃生氣血多服有益無病真妙方也胎毒參看頭部及癰毒諸方初生數月或一二歲內頭面忽生熱瘡甚至延及遍身此胎毒也用雞蛋二三枚整煮去白留黃加亂髮一團如雞蛋大於鐵器中炭火干煎初甚乾枯少時發焦蛋有油出俟冷取油和苦參末搽之數日即愈如蛋油難取俟煎枯後用滾開水少許衝入油浮水面可取又方紫甘蔗皮一兩粉口兒茶五錢血竭二錢頂上梅花片四分共為末豬膽汁調搽神效又方陳石灰以十數年者為佳越陳越好黃柏研末滑石各五錢桐油調搽神效又方雞腰膏見癰毒諸方初起者甚效又頭部尚有數方亦效小兒胎毒搽藥方其症有小兒生下數月即患者有幾歲才患者早遲不一宜內外合治則無後患若僅外搽藥內不服藥一吃發物即又發出則難治之倘才生數月小兒即患此症不能服藥須令其母服乳過極妥初服荊防敗毒散一二劑後多服除風涼血敗毒清解之藥服至瘡愈止服永無後患先用陳茶艾葉煎洗患處隨以舊棉花軟綿紙揩乾即以真麻油調後藥鴨毛掃患處每日早晚洗搽二次數日即愈兒茶三錢黃柏二錢雄黃一錢云連一錢薄荷一錢上四六冰片二分共研細末小兒科驚風驚風論驚風有急慢兩症急驚屬實熱宜用清涼慢驚屬虛寒宜用溫補二病若霄壤之相隔治法若冰炭之相反諸書多用一藥兼治急慢兩症謬妄太甚貽害無窮不可不審辨也慢驚莊在田曰慢驚之症緣小兒吐瀉得之為最多或久瘧久痢或痘後或疹後或因風寒飲食積滯過用攻伐傷脾或秉賦本虛或誤服涼藥或因急驚而用藥攻降太甚或失於調理皆可致此症也其症神昏氣喘或大熱不退眼開驚搐或乍寒乍熱或三陽晦暗或面色淡白青黃或大小便清白或口唇雖開裂出血而口中氣冷或瀉利冷汗或完穀不化或四肢冰冷並至腹中氣響喉內痰鳴角弓反張目光昏暗此虛症也亦危症也俗名天吊風虛風慢驚風慢脾風皆此症也若再用寒涼再行消導或用膽星抱龍以除痰或用天麻全蠍以驅風或用知柏芩連以清火或用巴豆大黃以去積殺人如反掌實可畏也若治風而風無可治治驚而驚亦無可治此實因脾腎虛寒孤陽外越元氣無根陰寒至極風之所由動也治宜先用辛熱再加溫補蓋補土所以敵木治本即所以治標凡小兒一經吐瀉交作即是最危之症若其屢作不止無論痘後疹後病後不拘何因皆當急用參術以救胃氣薑桂杞熟等藥以救腎氣不惟傷食當急救之即傷寒傷暑亦當急救之蓋其先雖有寒暑實邪一經吐瀉業已全除脾胃空虛倉廩空乏若不急救恐虛痰上湧命在頃刻也庸醫見之皆誤指為熱為食投以清火去積涼藥立時生變為之奈何與其失之寒涼斷難生活不若失之溫補猶可救療此語發明吐瀉驚風之理最為明透後之君子願無忽諸今將慢驚辨證臚列於後一慢驚吐瀉脾胃虛寒也一慢驚身冷陽氣抑遏不出也服涼藥之後往往致此一慢驚鼻孔煽動真陰失守虛火爍肺也一慢驚面色青黃及白氣血兩虛也一慢驚口鼻中氣冷中寒也一慢驚大小便清白腎與大腸全無火也一慢驚昏睡露睛神氣不足也一慢驚手足抽搐血不行於四肢也一慢驚角弓反張血虛筋急也一慢驚乍熱乍涼陰血虛少陰陽錯亂也一慢驚出汗如洗陽虛而表不固也一慢驚手足瘛瘲血不足以養筋也一慢驚囟門下陷虛至極也一慢驚身雖發熱口唇焦裂出血卻不喜飲冷茶水進以寒涼愈增危篤以及所吐之乳所瀉之物皆不甚消化脾胃無火可知唇之焦墨乃真陰之不足也明矣大凡因發熱不退及吐瀉而成者總屬陰虛陽越必成慢驚並非感冒風寒發熱可比故不宜發散治宜培元救本加薑桂以引火歸元必先用辛熱衝開寒痰再進溫補方為得法經驗二方列後逐寒蕩驚湯此方藥性溫暖專治小兒氣體本虛或久病不愈或産後疹後或誤服寒涼泄瀉嘔吐轉為慢驚清熱散風愈治愈危速宜服此能開寒痰寬胸膈止嘔吐蕩驚邪所謂回元氣於無何有之鄉一二劑後嘔吐漸止即其驗也認明但系虛寒即宜服之不必疑畏也胡椒炮薑肉桂各一錢丁香十粒上四味研為細末以灶心土三兩煮水澄極清煎藥大半茶杯頻頻灌之接服後方定獲奇效加味理中地黃湯此方助氣補血卻病回陽專治小兒精神已虧氣血大壞形狀狼狽瘦弱至極皆可挽回如法濃煎頻頻與服參天救本之功有難以盡述者熟地五錢焦術三錢黨參當歸炙耆故紙棗仁炒研枸杞各二錢炮薑萸肉炙草肉桂各一錢加生薑三片紅棗三枚胡桃二個打碎為引仍用灶心土二兩煮水煎藥取藥汁一茶杯加附子五分煎水攙入量兒大小分數次灌之如咳嗽不止者加粟殼一錢金櫻子一錢如大熱不退加白芍一錢泄瀉不止加丁香六分只服一劑即去附子止用丁香七粒隔二三日只服附子二三分蓋因附子太熱中病即宜去之也如用附子太多則小便閉塞不出如不用附子則沉寒臟腑固結不開如不用丁香則泄瀉不止若小兒虛寒至極附子又不妨用至二三錢此所謂神而明之存乎其人用者審之此方乃救陰固本之要藥治小兒慢驚稱為神劑若小兒吐瀉不至日甚或微見驚搐胃中尚可受藥吃乳便利者並不必服逐寒蕩驚湯只服此藥一劑而風定神清矣如小兒尚未成驚不過昏睡發熱不退或時熱時止或日間安靜夜間發熱以及午後發熱等症總屬陰虛均宜服之若新病壯實之小兒眼紅口渴者乃實火之症方可暫行清解但果系實火必大便閉結氣壯聲洪且喜多飲冷茶水若吐瀉交作則非實火可知矣此方補造化陰陽所不足實回生起死有神功倘大虛之後服一劑無效必須大劑多服為妙近來所賣之抱龍牛黃等丸皆清熱化痰之藥急驚最為對症若慢驚之甚者下喉即死如鄉村製藥不及急取雞鴨窩要養雞鴨數十年者糞泥下淨土一撮去糞數寸者不要有糞煎水服立愈屢試如神慢驚治驗一北平黃教廉女甫周歲病久不愈余視之瘦弱已極熱仍不退頃之群醫畢集俱商用山楂神麯荊芥防風等味皆消導藥也余竊謂不然因憶內經有云實者瀉之虛者補之此女瘦弱已極豈實症乎然衆論譁然未可與辨越三日余又往看視黃曰我女昨大瀉下黃沫且角弓反張不知其故余曰此涼藥毒也黃曰然前服山楂等藥不效復加黃連二分遂劇前醫在側甚慚強余立方余辭之歸次日黃以衆方請正余閲之乃五苓散仍加消導發散之味彼時本欲另立一方又恐醫家撓阻黃亦未必深信因就原方加注剖明某藥可用某藥難投總本張景嶽直救真陰之說黃亦心折因謂衆醫曰我女病久必須滋陰為上乃大加熟地二錢連進二劑其熱陡退病亦漸愈緣前此刻削太甚復元較遲一鄰友方元興有子歲余常見其持單買藥詢之方曰兒病已久更數醫矣今又延某醫包治此其藥單也逾數日泣謂余曰某醫悔口子不生矣君其有術乎細叩其故方曰我子體熱已久近日氣弱神昏腹中膨脹吐瀉發喘兩目上視命在須臾邀余往視見其子囟門下陷面色青黃取向日醫方閲之悉是去積發散涼血之藥與症相反余曰得之矣用理中地黃湯去附子澤瀉加枸杞故紙一劑而安十餘劑而健壯矣一余胞侄乳名文豹素甚壯實周歲疹後發熱兼旬不退咳嗽時以手捫口喉痛可知後數日晝夜昏睡不醒因延本地時醫投以清熱解表涼藥一劑而熱立止逾時體冷徹骨熱復大作再投前劑則無效矣又延他醫投以芩連石斛等藥非惟熱不能解且面色青黃三陽黑暗大喘大瀉愈增危篤醫亦束手余查痘疹諸書皆云疹系熱症宜用寒涼其說亦與症不符姑用救陰固本平補之藥一劑灌之悉皆吐出余顧兒謂余曰腹中作響風已動矣喉如雞聲痰已塞矣且吃乳即吐頭搖睛泛氣促神昏兩目無光面無人色敗症現矣急請前醫皆裹足不至遍查各書俱載疹後發熱不退而頭搖睛泛吐瀉神昏乃慢脾風不治之症然亦不忍坐視不救細思喉中作響必系寒痰蓋緣真陽外越寒生於中如系實火則前此芩連之藥何至反劇外雖極熱內實真寒非用大辛大熱之品不能衝開寒痰故前諸藥皆吐而不受因取附子薑桂煎湯欲灌余母曰此兒現在發熱且唇已開裂出血何可再用附子余思內經云假者反之此症非辛熱之品終不能引火歸源以消寒滯也雖易去附子仍改用胡椒一錢肉桂一錢炮姜四片似覺平淡以期老母不疑煎湯灌下痰聲立止又取伏龍肝沖水灌之吐亦漸止少頃兒忽眼動呵缺咳嗽時即不以手捫口又頃連溺小便稠濁紫黑疹後邪毒節次盡下似有起色因用附子理中湯合用六味地黃湯去澤瀉丹皮加故紙枸杞一劑而敗症全除惟大熱未退乃於前湯內復加棗仁五味白芍等斂陰之藥一劑而安此正內經所云治風先治血及甘溫退大熱之義也其後細審此症咳嗽喉痛心火爍肺金也嘔吐泄瀉脾胃虛寒也用胡椒薑桂所以開湧喉之寒痰也用灶心土者補土所以敵木也木平則風息土旺則金生金既得生火不能克則嚮者克肺之邪火仍反歸於心心為君主之官邪不能犯心與小腸相表裡致疹毒傳入膀胱下溺為紫黑色也余弟云此兒疹後發熱誤服涼藥命已不測得吾兄方藥真不啻起白骨而肉之實如再生爰更其名藥生將來即取字曰佩伯志不忘也一余胞侄鈞守南陽時生一女偶爾傷食中州醫者必以酒製大黃推蕩之每月一二次屢經克伐至二歲此女脾胃大傷瘦弱至極陰虛夜熱昏睡露睛忽成慢驚庸醫尚不知其為不足症乃以五苓散加黃連四分下咽即結胸不語次日斃命中虛生寒再進黃連未有不斃者一余姻親家人之子甫二歲其母已逝乳母哺之飲食不調發黃氣短發熱腹脹虛弱之形已現奈醫者堅稱內熱進以寒涼吐瀉不止遂成慢驚有鄰人授以福幼編一本其父與醫商醫曰小兒純陽之體何可用此熱藥乃向藥包中取出抱龍丸一粒研而灌之尚未灌完而已斃矣一餘外甥閻霖家使女十歲出疹稠密成片隱隱不出三日後絶口不食臥於西廊面無人色將成慢驚餘二女往彼問及霖曰使女患疹湯水不入置之此間已經二日只待氣絶送出埋之二女曰何不於遂生編內求方治之因照大補元煎本方用附子一錢肉桂二錢濃煎節次灌之一劑能食粥一酒杯二劑脾胃漸健於是弟減附子數劑全愈倘以疹為熱症進以寒涼豈能生乎一六安廣文程公之子九歲久病不愈泄瀉抽搐奄奄一息醫曰已成慢驚雖神醫來此亦難為力廣文呼號求救幾不欲生同學宋孝廉以余向贈之福幼編授程程閲而疑之宋曰此子已無生理舍此更無他術服此溫補之劑或可挽回倉卒間無肉桂遂以桂子四錢研碎加味理中地黃湯內如法濃煎頻頻與服二劑驚止又三劑全愈乾隆壬子年余回六安宋孝廉親口言之也一裕州刺史徐公獨子十歲氣體本虛病後大熱不退屢服涼藥泄瀉嘔吐角弓反張諸症作矣群醫畢至仍系清熱解表病熱更加萬無生理少府史某者詣署求見司閽曰本官有少爺染患慢驚命懸旦夕不暇會晤史曰我之來因慢驚非公事也即延之入徐曰小兒慢驚壞症醫技已窮君能救之乎史袖出福幼編曰此前莊本府之胞叔所著專治慢驚但其方與古書不同應否與服堂翁其自主之徐曰著書人斷無孟浪之理即遵照編內之方不減分毫用逐寒蕩驚湯一劑喉間寒痰已開接服理中地黃湯四劑驚止熱退全愈余胞弟一鵬彼時在南陽已知大略後史尉至湖北親口言之又詳自丁酉至今二十餘年此編愈人愈多聊記數條以祛衆惑閲者益可堅信無致貽誤也以上見福幼編急驚聶久吾曰急驚之候身熱面赤搐搦上視牙關緊硬口鼻中氣熱痰涎潮湧忽然而發發過面色如故有偶因驚嚇而發者有不因驚嚇而發者然多是身先有熱而後發驚搐未有身涼而發者也此陽症也蓋熱生於痰痰盛生驚生風宜用涼劑以除熱而化其痰則驚風自除矣切不可用辛燥驅風之藥反助心火而為害也當其搐搦大作時但可扶持不可把捉恐風痰流入經強或至手足拘攣也又不可驚惶失措輒用艾火灸之燈火燒之此陽症大不宜於火攻曾見有火攻而壞事者矣戒之戒之此症雖急若從容服清涼之劑調理自可平安不可聽信時醫峻用攻擊如巴豆輕粉之類以取速效傷害不小古諺云急驚風慢慢醫此邇言之切當而可用者也幼兒將要出痘有發熱二三日全無痘點形影而忽然驚搐狀與急驚風一樣醫者不知而誤作急驚風施治若以寒涼之劑或以驅痰峻藥下之必致難救遇有此症宜留心辨別以免誤事清熱鎮驚湯連翹去心研柴胡地骨皮龍膽草勾藤黃連梔仁炒黑酒芩麥冬去心木通赤苓去皮車前子枳實炒各四分甘草薄荷各二分滑石末八分燈心一團淡竹葉三片水煎分數次服凡急驚初起宜服此劑如服後痰熱未除者以後兩方隨用一方泄一二次即愈若此方已效後方即不必服加減涼膈散連翹酒芩梔仁炒黑枳實炒前胡各五分大黃酒炒一錢薄荷甘草各二分水煎分數次服泄一二次痰熱自退已泄則不必服宣風散陳皮去白為末檳榔末各五錢甘草梢三錢五分黑牽牛四兩半生半炒取頭末一兩二錢五分共和勻一歲以下服三分三歲以上服五分五歲以上服七分俱用蜜水調服微泄一二次為妙已泄則不必服又益元散抱龍丸牛黃丸均極神效以上見活幼心法天保采薇湯專治急驚神效羌活獨活蒼朮前胡升麻葛根陳皮厚朴甘草黃芩川芎柴胡桔梗半夏枳殼藿香芍藥各五分薑棗引水煎服又方龍眼殼十二個又名泡園以帶栗色為佳深黃者忌用細茶三錢陳皮三錢姜皮三分白鹽三分用水一碗煎至五六分灌入口內忽然發戰其兒必生此方平常其功甚速雖已死可活方名開棺斧又方生車前草並子搗爛瀝汁對白蜜滾水令服其風即止屢試神效如無生車前草即用車前子煎湯調蜜服亦可又方生石膏一兩辰砂一錢各研末和勻大人每服一錢小兒一歲至三歲服五分以次遞加生蜜調下又方明雄黃五錢砂仁六分梔子五枚炒冰片五釐共為細末以雞蛋清調敷肚之四圍如碗口大安臍眼入麝香五釐上用綿紙蓋好再以軟絹扎之一晝夜後溫水洗水神效又方甜杏仁六粒桃仁六粒黃梔子七個上藥研爛加燒酒雞蛋清白乾麵量孩兒年歲作丸如元宵樣之大小置於手足二心布條扎緊一周時手足心均青藍色則病已除但須切記男左女右不可錯置是所至要萬應萬驗真有起死回生之功又方取芙蓉嫩葉男單女雙搗爛用雞蛋和入煎熟作餅貼兒臍上冷則隨換立愈又方慢驚風亦可治用白絲毛雞烏骨緑耳又名絨毛雞又名白鳳凰多出江西太和縣以雞尾糞門向小兒肚臍上無風雞則遠去有風雞必貼緊吸拔風毒少時即愈神效之至愈後須用麻油灌入雞口以解其毒又方慢驚亦可治用燈心在手心足心男左女右各燒三焦即愈又方有數歲小兒偶患驚風頭足往後扯成彎曲謂之角弓反張叫喚難聞百藥無效服活絡丸一顆即刻安睡再服數顆脫然全愈神效無比此丸以廣東省城大新街己未牌坊老陳李濟店為真別店多假用之不效又方速用艾二小丸於左右手背上接腕穴上燒三次頭足即不反矣又方見卷十四中風門小兒科痘症痘症治法莊在田曰痘科一症順者不必治逆者不能治可治者惟險症耳險症治之得法則生不得法則不生是治法之不可不精也內經未嘗言及今行世諸書皆本之於諸瘡痛癢皆屬於熱八字所以立意先言解毒開方定用寒涼在其父母聞之解毒最為入耳寒涼似亦應然殊不知痘瘡全以發透為吉起發必賴氣血滋培方能自內達外齊苗灌漿結痂無非陽氣為之主也寒涼則血滯克削剛氣破血滯氣破毒氣乘虛深入此痘症陷塌之所由來也譬之豬脬即尿脬若欲其脹滿必須以氣充之散其氣立即陷矣此理相同顯而易見痘之始終全憑氣血但得氣血充足則易出易結血氣不足則變症百出痘之欲出陽氣蒸騰小兒發熱正是痘欲見苗斯時氣虛者宜服補中益氣湯血虛者宜服荊防地黃湯兼寒者宜服大溫中飲或大補元煎察其體氣之虛實酌而用之所謂培補氣血疏通經絡無不立奏全功時師不明此理定言用補太早則補住毒氣乃愚陋之見也不知補中即所以托毒灌根即所以發苗萬無補住之理且有散藥在內此實先哲治痘之心傳高明者必以為然淺學者何能窺其萬一要之治痘之法總不外乎虛寒實熱四字何者為虛寒凡小兒向日氣體薄弱面色青黃唇淡畏寒大便溏而不結小便清白飲食減少或不甚消化等症知腹中火少出痘時必難灌漿亦難結痂氣血不足之故是名虛寒速宜培補元陽以防變症也何者為實熱或小兒氣體壯實飲食易消出痘時大便結而燥小便赤而臊口鼻中出氣如火惡熱喜涼等症是名實熱察明果是內熱方可暫行清解荊防地黃湯用生地加大黃一二劑而火退矣然不可以虛火誤認為實火察虛火實火之法全憑大小便為主小便清白大便不燥身雖大熱乃是中宮有寒火無所依浮而在外誤服寒涼亦有此症不得以身熱便認為實火虛火者十中八九實火者十中之一二耳痘有四宜一宜補氣真陽充足方能送毒出外以成痘倘痘頂不起等症皆元氣不足之故宜服黨參白朮黃耆甘草之類以補之二宜補血真陰充盛方能隨氣到苗以盛漿空殼無膿等症皆陰血不足之故宜於補氣藥中加熟地當歸丹參川芎之類以補之三宜補脾腎一脾土壯健氣血自充飲食減少口淡無味等症皆脾土虛弱之故須脾腎雙補即於前氣血藥中加枸杞故紙附子肉桂等藥痘瘡自無陷塌泄瀉之患經云虛則補其母此之謂也四宜察虛實小兒飲食有味二便如常不服藥最為穩當設或灌漿水滿燒漿不幹等症必察其氣分血分何處虧虛照症調補不可妄用涼藥必口鼻臭尿臊便結有實火可據者方可暫行清解痘有四忌一忌清熱敗毒凡胎中陰毒必賴陽氣托送方能發出陽氣被清陰毒內歸痘之塌陷實由於此是連翹生地黃芩澤瀉等藥非有實火者萬不可用二忌克伐氣血氣血充暢痘易成功克削下咽中氣虧而毒乘虛深入泄瀉塌陷諸症作矣是大黃芒硝山甲山楂等藥在所必禁者也三忌妄投醫藥小兒出痘延醫診治求其有益也豈知近代醫師不分虛實總是良藥毒輕者幾死毒重者不生是以不如不服藥之為妙客問曰痘之順症可以不藥我知之矣痘之險症可以不用藥乎余曰若純用涼藥以治險症但見治斃未見治愈也客猛然省悟而去四忌吞服醫家小丸近代痘師所帶小丸總是巴豆丸彼以為痘是胎毒巴豆下行自必可以瀉去之豈知中虛下陷性命休矣小丸數粒斷非溫補氣血之藥即抱龍牛黃等丸亦與痘症大有妨礙是以最不可誤服親友處受此害者甚多目擊心傷故特表而出之耳至於前人所制人牙散獨聖散雞冠血桑蟲之類逼毒外出旋即收陷皆非正理何曾見其治愈一人斷不可用發熱痘者胎中之陰毒也必賴陽氣以成之小兒出痘大約發熱三日肌肉鬆透然後能見點苗齊熱退乃真陽內伏交會於陰復發熱三日是運水到苗以成清漿漿足熱退及至養漿真陽外出發熱三日化毒以成膿膿成熱退而陽伏毒既化膿又必發熱蒸乾方能結痂痂落後真陽外出蒸化斑點謂之燒斑倘有黑斑乃是火衰並非因吃鹽醬之故所謂痘稟於陰而成於陽也如此治痘之法始終當以補氣血扶陽氣為第一義用藥以溫補少加發散為首務否則氣不足則痘頂不起火不足則漿不稠且恐厥逆腹痛陰寒起而壞症作矣或問曰痘宜溫補此理甚明若兼發散豈不傷氣不知純用散藥汗多則傷氣少加發散藥於溫補藥中則血脈疏通痘瘡易出無壅滯之患受解散之功所以古方補中益氣湯內有升麻柴胡大溫中飲內有麻黃溫中補氣尚用散藥可見古人用心之妙痘之初出是斷不可減去散藥者也或又問曰痘宜溫補兼散此理已明後開大補元煎六味回陽飲此二方重用附桂並無散藥兼用龍骨粟殼收澀之藥其義何取不知溫補兼散乃治尋常痘瘡之法更有一種小兒發熱一二日即遍身出痘古書無方時師袖手此乃陰毒太重陽氣太虛陰毒一發陽氣已清故瀉痢不止瀉出之物多作青黑色肝氣所化胃氣將竭之兆速宜大補元煎六味回陽飲二方大劑連進可以扶元陽可以清陰毒操起死回生之功有鬼神莫測之妙二方合煎名返魂丹治痘收效指不勝屈余治外甥汪陵醫案所當細閲至於清火解毒涼藥必察明果有實火者方可暫用若誤用於齊苗時則水不能升而頂陷若誤用於養漿時則漿不能稠而癢塌癢塌者真火衰也明矣當前速宜參熟並用附桂同煎脾腎雙補大劑疊進尚可挽回否則寒戰咬牙吐瀉交作不可為矣至於身涼而膿不幹痂落而斑不化及痘後發毒皆因誤服生地銀花澤泄連翹等涼藥之故不可不知熱有邪正必當體察正熱者陽氣蒸騰自內達外苗露頭而不惡寒時熱時止兼有小汗手足溫和飲食有味二便如常所謂內外無邪不必服藥邪熱者偶受風寒頭痛惡寒四肢冷而無汗荊防地黃湯內加肉桂一錢一二劑儘可解散表邪而愈古人云熱不可盡除真格言也形色痘以飽滿為形紅活為色頂陷不起是氣虛色不鮮明是血虛宜培補氣血為主真陽虛者乃無紅暈甚至通身皆白身涼不溫宜大補元煎陽回身溫轉白為紅矣又有一種遍身血泡者此非血多乃氣少不能統血故血妄行急當大補元煎陽氣充滿血泡變白而成功矣庸醫不明此理謬言血熱誤用寒涼變症日增形與色外象也必要飲食有味二便如常知其無內病可以不服藥若二便不調飲食不下煩躁悶亂夜中不寧形色雖好亦甚可憂必當察其病情何如小心用藥挽回方妙形色不佳多半是氣體虛寒手足厥冷頭重神疲便清泄瀉等症必當大補元煎兼用附桂若泄瀉不止並當添入龍骨粟殼等藥以收澀之方可回生痘以紅為貴有圈紅巽紅鋪紅之別圈紅者一線紅圈緊附痘根最為佳兆巽紅者痘根血色隱隱散漫亦氣不收之故速宜大補氣血鋪紅者一片平鋪無痘之處亦紅所謂地界不分若兼不惡寒口渴而渴小便臊而短大便燥而結內熱有據宜白虎地黃湯以利之熱退身涼即宜平補不可多劑又有一種錫光痘身涼不溫色白不紅此乃陽虛陰象也宜大補氣血附桂同施氣足陽回痘根紅而漿稠痂結矣又有一種根無紅盤頂含黑水者乃陽氣大虛陰氣凝結亦宜大補元煎兼用附桂黑水化而為膿矣痘有五泡曰水泡膿泡灰泡血泡紫泡痘有五陷曰白陷灰陷血陷紫陷黑陷水泡者皮薄而明經言氣熱生水要知清漿皆水何以不成膿火少故也必當薑桂附子等藥大劑陡進水必成膿若誤用涼藥作瀉後轉為白陷膿泡失治則破流膿水灰泡失治轉為灰陷二症亦宜參熟附桂大劑多進若有小顆粒發出謂之子救母生意在焉血泡者乃氣虛非血熱亦宜大補元陽否則變為白陷紫泡者其症有二紫中帶青者亦因氣虛不能攝血陰血凝結而成其人必身倦惡寒舌苔白飲食不多大小便清白速宜大補元陽否則變為紫陷又有一種紫黑焦枯者乃純陽無陰之症其人必口乾惡熱小便短大便結此實火也宜清涼解毒白虎地黃湯酌加大黃以行之但得灌漿尚可望生失治轉為黑陷又有一種小兒因服涼藥腹中作痛嘔吐瀉利將成慢驚頭面大熱唇焦舌黑亦似實火此乃火不歸元之故實火者二便臊閉虛火者瀉利不止全在細心體察方得其真經云有者求之無者求之實者責之虛者責之蓋言萬病皆當體察寒熱虛實醫治痘症可概雲實火肆用苦寒克削以斃人性命耶起脹痘至開盤頭面腮頰亦腫謂之起脹至膿成漿足痘回而脹消謂之收脹蓋緣毒氣由內達外此時尚在肌膚之間故腮頰亦隨之而腫逮至膿成漿足毒氣盡化為膿而脹自消亦必脾胃強健方能如此若當起脹而不起脹乃由元氣內虛不能送毒外出之故宜用大補氣血之藥少加發散大補元煎大溫中飲相間服之盤自開而脹自起若痘未開盤而頭面先腫乃元氣大虛此乃虛腫非起脹也其痘必不能起脹亦宜大補元氣腫自消而脹自起又有痘已回而腫不消乃元氣大虛不能攝毒餘毒留於肌肉之間不能盡化為膿所致亦宜大補元煎大溫中飲相間服之餘毒盡化而膿消矣痘書云痘出稠密封眼者有救不封眼者無救此言不確起脹者有救不起脹者無救此言甚確封眼者眼弦多痘胭脂水塗之仍可以不封眼不起眼者乃元氣大虛何以送毒外出必當大補元煎附子肉桂大劑多進脹起而毒化一定之理也養漿痘之緊要全在養漿漿成則毒化漿不成痘斯壞矣自發熱見點齊苗灌漿無非為養漿而設若顆粒稀蔬根盤紅潤精神爽健二便如常乃上等痘也可以不藥倘形色平常全憑用藥助其氣血以養其漿最怕者無熱全仗真陽充足出而用事方能化毒成膿設陽氣不足何以蒸化其毒宜在補陽氣實為上策緊防泄瀉瀉則中虛陽氣一虧毒必內陷定當預為提防補其陽氣助其脾胃漿干痂結而成功矣煎藥方無非補中益氣湯大補元煎之類相兼服之萬不失一而世之面麻者皆因不明是理養漿時被庸醫誤用消伐之藥中氣下虧所致若於養漿時大劑溫補氣血充足落痂後斷無面麻之患又有一種小兒痘後滿頭潰爛名曰虛陽貫頂又曰發疽經所不愈此乃出痘時誤服涼藥胃中受寒陽無所依上衝頭頂譬之火爐中以水潑之則熱氣必上衝此理無二速用大補元煎大溫中飲相間服之引火歸元旬日可愈收結收者漿回而脹收也結者膿干而痂結也收結如法其功成矣倘漿回而腫不消膿成而痂不結亦是真陽不足身無熱不能幹漿化毒之故膿漿充足必賴陽氣熏蒸方能結痂陽氣二字豈非痘症始終必需之至寶設此時氣體虛弱不能結痂必相其虛實無非培補氣血無不立見奇功又有一種漿不能幹而生蛆謂之蛆痘總由陽氣不足之故俱宜大補元煎大溫中飲相間服之膿自干而蛆自化痂結而愈痘毒痘本胎毒自內達外若出痘時盡化為膿痘後無餘毒矣當其初總宜培補元陽兼用散藥毒氣方能盡出化而為膿時師用黃芩連翹澤瀉等藥在彼以為涼藥可以解毒豈知痘乃胎中陰毒得陽氣則行得涼藥則滯毒氣因涼藥留滯於肌肉之內痘後所以發為大疽名之曰痘毒皮色不變者居多宜大溫中飲數劑全愈其色紅白相兼者半陽半陰症也荊防地黃湯與大溫中飲相間服之數日亦愈倘已潰爛亦以荊防地黃湯與大溫中飲相兼服之計日可愈荊防解其凝結薑桂散其寒涼所以可愈倘時醫見之不分陰陽統言火毒仍用生地連翹銀花等藥以致堅腫不消潰爛不斂清濃淋漓久而不愈漸致泄瀉不食脾胃一敗不斃鮮矣若紅而帶紫者乃陽症也方可以荊防地黃湯愈之大便結者下之然陰症多陽症少痘後並未見有陽症之毒也又後有痘毒色白方最效痘症諸方補中益氣湯此方補氣散毒氣虛者初出痘時服三四劑痘易起發痘頂陷者亦宜服之黨參三錢黃耆二錢白朮錢半炙草一錢當歸二錢陳皮五分升麻三分柴胡三分加姜煎可與荊防地黃湯相間服之荊防地黃湯此方補血散毒血虛者初出痘時服三四劑痘易灌漿與前後各方相間服無所不可荊芥一錢熟地四錢山藥二錢丹皮防風雲苓山萸生草各一錢加生薑二大片為引加黃酒並沖服大溫中飲此方補氣血散寒邪提痘漿散痘毒凡痘頂不起空殼無膿嘔吐泄瀉脾胃不開痘色不紅將欲塌陷速宜煎服並與大補元煎相間大劑連進溫中散寒立時起發功難盡述熟地五錢白朮三錢山藥二錢黨參三錢黃耆二錢炙草二錢柴胡二錢麻黃一錢肉桂一錢泡姜一錢加生薑三片灶心土水煎濃用夏布擰出藥汁少加黃酒多次灌之不可減去麻黃汗多者減之大補元煎此方大補氣血而專治痘症誤服涼藥嘔吐泄瀉痘不起發危在旦夕速宜大劑連進不可減去附子與六味回陽飲相間服之立見奇功有鬼神莫測之妙倘二三劑後泄瀉不止酌加附子更加龍骨粟殼各一錢倘泄瀉全止減去附子若附子太多則小便閉塞熟地五錢黨參三錢山藥二錢杜仲二錢棗仁二錢枸杞二錢萸肉一錢炙草二錢故紙二錢白朮三錢肉桂二錢附子一錢加生薑三片好核桃仁三個打碎為引痘後減去附子只用肉桂數分調理數劑計日可復元六味回陽飲此方大補元陽專治小兒氣血本虛痘瘡白塌或誤服涼藥嘔吐泄瀉將成慢驚危在頃刻速宜服此方倘有轉頭即加入大補元煎之內同煎疊進名返魂丹真仙方也附子二錢炬姜一錢當歸三錢肉桂二錢黨參三錢炙草一錢加胡椒細末三分灶心土水澄清煎藥或減去附子亦名六味回陽飲以多進為好白虎地黃湯此方去實火解邪熱專治小兒出痘發熱不退口渴喜冷痘瘡黑陷小便赤臊大便閉結口鼻氣熱等症酌加大黃以行為度若二便清白不喜飲冷身雖大熱乃是虛火仍宜溫補所謂甘溫退大熱不可妄投此藥此乃備而不可輕用之方也石膏一錢生地一錢當歸三錢枳殼一錢大黃錢半木通二錢生草一錢澤瀉一錢加燈心為引熱退身涼即宜以荊防地黃湯調理之治驗一餘外甥孫汪宣六歲向日體氣虛弱偶爾感寒或食涼物即喘瀉發熱素知其中虛生寒宜用溫補不宜寒涼乾隆甲寅年出痘醫師開方皆是生地銀花等藥余曰藥性與氣體相違何能對症因改用補中益氣湯加薑桂四劑痘瘡結痂而愈一江姓子二歲發熱三日痘已出齊亦不甚多痘科欲以大黃連翹等藥灌之余曰此藥灌下作瀉一二次痘即收矣彼不信作瀉後痘果收痘科用雛鴿子煮水灌之次日忽有小痘暴出余曰宜用補也明矣奈痘師仍用小藥數粒瀉利不止而斃一使女喜連五歲發熱一日紅點遍身成片痘師曰此名火燎苗十二日症也萬不一活堅云不必服藥余徉應之乃以大補元煎二劑脾胃較健四劑而苗齊漿足惟形色晦暗且不結痂七劑而痂結十劑而全愈矣醫曰此痘能生萬不可解一余胞侄文豹周歲出疹失於表散疊用寒涼泄瀉嘔吐唇焦舌黑已成慢驚危在呼吸余往視之謂醫曰此涼藥逼火上衝之故外雖極熱內實真寒醫曰唇焦舌黑豈非實火余曰泄瀉便清豈非虛寒天下豈有大便瀉小便清之實火乎醫不能答用大補元煎加胡椒細末同煎一劑涼止十劑全愈乾隆丁酉年余著福幼編內附載醫案甚詳一魏明府之子三歲出痘甚稀痘科用涼藥數劑幸此兒體旺雖未大瀉而黑斑不退知其真火被清也痘後月餘頂間忽發一毒皮色不變大如酒杯此涼藥凝滯故也余用大溫中飲數劑而消一舒友子十歲滿頭潰爛清膿血水幾數十處其父云此痘毒也半年不愈取出向日藥方都是連翹生地等涼藥乃知是寒涼入胃火無所依上衝頭頂此即所謂虛陽貫頂也宜引火歸源之法用大補元煎兼加散藥每日一劑十日全愈一余胞侄七歲在常州出痘甚稀醫師以涼藥敗毒當時雖未塌陷而形狀已狼狽不堪一月後右腿發一大疽皮色不變醫師堅稱火毒仍以生地銀花黃芩山楂山梔等藥治之一劑而脾胃更減神氣昏沉二劑而嘔吐泄瀉三劑而隨服隨吐庸醫不知藥不對症故胃中不受而曰吐藥不吐味以致瘡色晦暗又數日不潰而殂一六安僧人某者風雅能詩二旬外發熱出痘豫往視見其顆粒稀疏根盤紅活問其飲食有味二便如常彼求方藥豫曰如此好痘可以不藥次日有痘師往彼為之瀉火各種涼藥每劑加大黃三錢連服三劑瀉利不止痘瘡塌陷絶口不食數日而逝虛弱人出痘誤服大黃真是毒藥試驗甚確未敢隱諱治痘者切宜猛省一豫外孫汪陵丙辰五月尚未一周向日便溏腰軟氣血不足可知忽發熱一日周身出痘稠密成片痘頂各有小孔破流黃水目瞪不能暫瞑晝夜下利十餘次乳汁入口即從下竅流出肛門無沿空洞一穴痘書云肛門如竹筒者不治群醫袖手余曰此即前發熱論中所謂陰毒太重陽氣大虛症也非大加溫補萬不能生即將大補元煎每劑用附子二錢肉桂三錢炮姜一錢五分丁香末五分胡椒末三分濃煎濾汁晝夜頻頻灌之藥汁入口已從下竅流出一連九次灌完一劑見者曰不必再灌待時而已幸其母細心體貼曰藥雖流出似覺較少且灌藥一次目瞑片刻定是效驗於是照原方不改分毫如前法每日一劑又三劑此兒竟能假寐片時瀉下之物青黑中帶有黃色知其胃氣生動也照原方又進三劑肛門有沿瀉利稍止痘頂小孔長滿且已起發全灌清漿照原方加龍骨末粟殼各一錢又進四劑痘已全然結痂至第十三日痘痂落盡斑點全無肚腹亦好聞者莫不稱奇余識得此兒是虛寒之症用藥得宜故有效耳尋常泄瀉者亦可治以上見遂牛編辨痘法小兒發熱五指梢及中指冷是痘疹中指熱是風寒看耳法耳後紅筋痘必輕紫筋起處重沉沉兼青帶黑尤難治用藥精詳也得生闢穢氣法凡犯房事經水生産穢氣以大棗燒煙解之若防發癢者以樺皮和大棗燒煙解之被酒氣犯者以葛根茵陳蒿燒煙解之犯五辛氣者以生薑燒煙解之被死尸氣及癘氣所犯者以大黃蒼朮燒煙解之被狐臭犬羊氣犯者則燒楓樹葉解之若遇風雨時者則燒蒼朮楓樹葉解之若血少而漿難之痘則忌燒蒼朮蓋恐愈燥而漿愈難耳若遇諸惡氣則以乳香燒煙燻之以胡荽酒噴之俗有煮醋熏痘者以醋能活血殊不知醋收斂大非所宜也暑月出痘房中多置涼水以收熱氣心自清涼冬月出痘房中多置炭火以除寒使血氣和暢為妙出痘兒睡不可驚動此最要緊一經驚動則易成痘前痘後驚內抑且停漿不發二十四項方一腎經發痘初熱腰痛身如打傷背不能伸或連尾脊骨痛雄雞一隻剖開雞腹取出肝腸立將燒酒一杯噴雞腹內安放腰上用帶緊縛限一炷香久為度其雞即青臭不可聞連用二三隻其痛自止痘亦出凡用此方必戒殺放生以為小兒種福二心經發痘忽然抽掣此症與急驚相同用桃樹皮蔥子燈心共搗爛敷囟門肚臍及手心足心限一炷香為度則驚自醒而痘自出又於手足合骨處用燈火各燒一下以散風痰三小兒體性怯弱或因吐瀉之後元氣愈虧不能勝毒汗出如珠四肢厥冷似睡非睡眼中露白此症與慢驚相似乃危症也急用大附子四錢乾薑四錢丁香三錢陳淡豆豉三錢小雄雞一隻共搗爛再用燒酒略炒溫敷臍上及兩足心急換一二次其痘自出若有泄瀉加灶心土三錢四後生輩或失陽之症方發痘欲出不出狂言亂語此痘毒不出鬱火攻心既不敢用清涼之藥以解毒又恐驟用補劑以助火此最難措手之症急用雄雞一隻生剖開腹去腸雜以燒酒噴之敷於臍上其痘自出其語亦止凡欲補而不敢補其痘不能出者俱用此方此從外托內神妙無比切勿視為尋常或遍身疼痛乃毒出腎經用黑豆一升煮熟擂敷腰上即止蓋黑豆能解腎經痘毒也五少年出痘或當色後誤為發散傳為陰症新生雞蛋三個取蛋白調乳服再用艾火灸肚臍四圍及臍下寸余又扯起陽物離糞門各一半灸七焦其陽自回六女人天癸已至當出痘之際經水忽行一則懼其穢氣相沖二則懼其血衰不能化毒此最危險之症急取桃樹上寄生擂爛敷足心三炷香久為度經水自回痘亦萬全又方月月紅花又名月季花取花與枝葉煎酒服並煎濃湯周身洗浴神效又方老杉樹皮舊棕胎髮共燒灰調酒服立止七孕婦出痘激動其胎又不得下或胎死腹中而不能出此至危之候宜取路上推車蟲又名推屎蟲即蜣螂也及所推泥丸一併焙乾研為細末加威靈仙同研用酒調為丸納臍中將膏藥貼住不論何項膏藥三炷香久為度其胎即下如經不能亦可以通八孕婦出痘腹中作痛乃胎動也若不頂住一經臨産則氣血兩敗痘必不全急宜內服安胎散照婦科內安胎方服之外用蓮蓬殼益母草各三錢燒存性艾葉三錢共為末醋調敷臍中連換三次其胎自安九少年出痘吐血或鼻血不止此虛火上炎血不歸經宜取白果擂水服後將柏樹上寄生二兩山梔根去梗二兩共擂爛敷臍中連換三次其血即止未止即照卷一鼻部鼻血各方治之自愈十痘當起脹之時忽然便血血即下漏安能起脹最危急也用地榆生大黃紅花根共為末燒酒調勻敷尾脊骨三炷香久為度連換三次其血自止如痘內夾有斑症或夾丹症形如斑點者是用土朱紫草為末敷之即退十一肝經出痘大便下血眼紅氣粗丹痧滿面紫黑不起白頸蚯蚓七條焙乾栝蔞仁三十粒去油杏仁十五粒去皮尖共研末陳茶調勻作餅貼臍一炷香久為度連換數次各症俱退十二肺經出痘滑精夢遺咳嗽失音不省人事取新生雞蛋一個略開一孔去黃白只用蛋殼將元參一兩取汁灌於蛋殼之中用紙封固再將熟黑豆搗爛包裹蛋殼置火中煨一炷香久為度取出冷透火氣將元參汁與服其音自清而嗽亦止十三小腸經出痘遍身發斑片紅片紫如雲如霞無痘出現不省人事急將雪梨與食又將芙蓉花川椒胡椒共為末紙卷為條蘸麻油用燈盞盛之照於被內覆蓋一時其斑自退而痘自出矣十四胃經出痘咽喉閉塞或致失聲不思飲食上吐蛔蟲下瀉惡血急將緑豆為末以雞蛋白調之喉閉則敷於頸吐蛔則敷於臍上瀉血則敷臍下十五命門出痘鎖眉刺心煩悶不安大熱不退生艾葉一兩黑豆一撮白芥子三錢醋煮一滾為度共擂爛作餅敷心前連換數次熱退心安十六腎經出痘尾脊骨疼痛日夜不安芙蓉根馬鞭草共擂爛炒溫敷尾脊骨上其痛立止十七時值瘧疾而復出痘口吐白涎咳嗽失聲生薑切片包大附子煨再取薑汁和當歸生地白芍共搗爛敷臍中二炷香久為度白涎自止十八痘見脾經甚為美也然防禁不周穢汙相沖痘不起發狂言亂語遍身癢塌抓破出血聲啞氣急急用石膏寒水石麝香鬱金甘草共煮透去甘草滓又煮乾為末用蜜調敷胸前譫語自止而痘亦起發矣十九痘出太陽舌心黑口氣臭大小便不利痘色紅紫青黛防風全蠍石膏熟大黃合勻為末作餅敷臍中痘色自活諸症自退二十痘出太陽夾斑夾疹胡言亂語或失聲不語雪梨水磨真象牙與服則安靜聲清斑疹亦退其痘自出矣又夾斑而出者有紅赤點隨出隨收又夾丹而出者紅赤成片俱用玄參升麻各二分甘草八分防風荊芥牛蒡子各六分煎服如夾麻疹而出者照上方加桔梗黃芩酒炒各六分煎服均極效驗後尚有外治一方二十一痘出胸腰疼痛叫喚不安豆豉三兩胡椒一錢共擂爛又將生薑四兩搗汁調勻炒溫敷於胸腰二處其痛立止二十二痘出腎經腰腹絞痛吐瀉交作手足冰冷大汗如注此陰盛陽衰此最危險急用乳香沒藥人參各一錢為末作丸納臍中又將艾葉炒熱敷於丸上其症自平二十三痘出不快煩渴悶亂臥睡不安咳嗽失聲艾葉一碗胡椒三十粒擂爛調水取汁熬膏作餅敷臍中諸症自退二十四痘如麻子一片成氈癢甚此為風毒非真痘也因風寒閉塞皮膚以致真痘不出菱雲子煮水洗浴再用貓爪荔枝燒煙燻之則真痘出而癢自止矣推拿法初發熱或為風寒所閉一時無表散之藥須用推拿法以松肌表其毒自出又或其兒素性怯弱為風寒所束固不得不發又恐表虛用藥發表有傷元氣亦用推拿之法又或其兒即服表藥依然身無微汗寒邪閉錮其症不退欲復用表散之劑又恐過表以損元神亦須用推拿之法蓋發散之藥多能耗氣推拿之法不過鬆肌發竅運動筋骸而已竅開則氣通筋運則血行氣血通暢而邪自出勿謂推拿之無益也余常用之其效甚捷故用其法取溫水一碗先用大指蘸水於小兒兩鼻孔洗擦而上推者二十四下謂之洗井灶再於印堂用兩手指分開擦二十四下謂之開天門又於小兒兩手食指擦下三十六下以瀉三關之火又於中指擦下三十六下以瀉心經與肝之邪又將小指數擺謂之烏龍擺尾再於脈門擦下三十六下復擦上十二下又於掌上順運八封周旋擦一百二十下然後於虎口及手足凡接骨之處其穴有窩於各穴窩間用力俱捏一下臍下丹田各捏一下背上兩飯匙骨下及背脊每骨節間各捏一下任其啼叫令汗出而肌松痘毒亦從而出矣但推拿後宜令兒睡發汗不可見風腠理既開恐風邪之復入也或用前頂方將桃樹皮與薑蔥擂爛炒溫敷於臍上一炷香久為度亦取其發表之義也痘疔痘中有紫黑乾硬暴脹獨大腳無紅暈或疼或不疼者即痘疔也痘疔能閉諸毒未齊有疔則諸痘不能出現既齊有疔則諸痘不能起脹行漿時有疔則諸痘必致倒陷故初出時見有紫黑獨大之點恐其成疔即宜以銀針刺破吸盡黑血然後以拔疔散敷之次日復看若再硬脹仍然刺破以前藥敷之必轉紅活方可已也若針挑不動手捻有核則成疔矣須用針從四旁刳開以小鉗鉗出其形如釘有半寸許長拔去其疔仍以前藥敷滿瘡口乃可無虞又手足四肢有痘慘暗堅硬而甚痛或外無痘而內有核作痛者亦痘疔也宜以艾火燒之即愈或以燈火烙之亦效若不急治則其痘深陷穿筋透髓而爛見骨甚可畏也又天庭有黑點心窩舌上必有疔地角有黑點陰囊必有疔兩顴有黑點兩腋必有疔準頭有黑點四肢必有疔此觀顯可知其穩又不可不詳也一婦人出痘稀疏朗潤似為順症但熱不退已而明潤者漸覺慘暗其人亦煩悶不安詳觀面部見地角一痘紫黑將焦察其陰中有痘疔形如黑豆一顆此乃疔也用銀針剔破鉗出痘疔以拔疔散敷之其熱遂退諸症悉皆潤澤起脹而愈拔疔散明雄二錢胭脂末五錢無則胭脂膏亦可共為細末凡遇痘疔賊痘刺出黑血敷之又方京城油胭脂敷之立能止湧其效如神又方明雄一錢紫草三錢共為細末多用頂上胭脂汁調勻用銀針挑破擦之神效與油胭脂同又方將疔挑破出紫血蒲公英熬膏放水中一日一夜冷透火氣敷之又方馬齒莧交豬骨髓少許搗融敷於四圍頃刻止痛不數日能拔疔根屢試屢驗又方大蒜頭切三分厚安痘疔上用艾一團如豆大在蒜上灸之每五次換蒜再灸若紫血出後腫痛不止尤當用灸痛者灸至不痛不痛者灸至痛其毒隨火而散舌上痘疔銅緑雄黃硃砂銀硃人中白共研勻摻之赤斑核小兒出痘有名赤斑核者形如瘰癧發無定處多在活肉筋骨間則周身之痘皆不發起盡歸於瘰癧一處危症也治法將瘰癧用手撮起以紅繩緊緊扎住然後用獨蒜瓣貼於患處艾灸七次務將瘰癧灸至不如痛癢除其艾蒜庶痘可發生通身紅活矣此即痘疔之類照痘疔各方治之亦可痘出一半忽然不語昏迷不省人事手足冰冷目開面青唇白氣息俱涼此厥陰症也用雄雞一隻生剖開去腸雜以燒酒噴雞肚內敷臍上用布扎緊約一炷香久取出連換數雞其痘乃齊其人自愈其效如神熱症方形虛症又現元氣本來虛弱而毒氣猛烈以致痘出不快此症解毒既恐傷元扶元又恐助熱頗難用藥照上方用敷臍上屢用如神萬無一失上身痘已起脹下身痘尚未出或出而陷下不起頂好熱燒酒用綢蘸酒乘熱尉之其痘自出屢試皆驗如不見效即照前方用雞敷臍之法無不效也痘不起漿凡痘不起漿或漿起復收急取癩蝦蟆一個用手捉住將蝦蟆頭對住小兒之口用綢將小兒眼遮住以免蝦蟆吐漿入內離二三寸遠約一頓飯久放去加換一個仍向兒口對之連換三次其毒已被蝦蟆吸盡即灌漿收功此法起死回生神效之至又方頂好熱燒酒用綢帕蘸透時時尉之輕者此法最妙痘症黑陷不起凡心煩心喘妄語見鬼以不落水豬心血和冰片丸如芡實大每服一丸以紫草煎酒下少刻下瘀備神清痘即紅活透出此醫所不能治者百發百中神應非常又方升麻一味先煎濃湯去渣用胭脂十餘張於湯內揉出紅汁加明雄黃末錢余即以胭脂綿蘸湯於瘡上試之胭脂紅花膏所染故能活血散毒也如瘡不起發試之亦可神效非常兩頭痘自胸以上自臍以下俱有中間一截全無者名兩頭痘此血氣不能貫通於上下而腰臍之間恐為寒毒凝滯也若不急治七日之後必變灰白之症矣見點時急用生耆當歸赤芍桔梗防風厚朴續斷白芷山楂木通入黃豆三十粒煎服之後中間有痘乃可無虞蛇皮痘頭面遍身俱無空地狀若蛇皮故以是名必乾枯不能作漿至十二三日而死昔豫孫女出痘如此發熱之時寒戰咬牙口氣臭甚常如食物余曰此惡候也急與解毒用解毒湯日進三四服及痘出密如蠶種顆粒不明乃用前胡川芎丹皮梔子炒黑紫草茸人中黃連翹牛蒡黃芩紅花連進數服乃分顆粒其後加生耆白芷去人中黃紫草黃芩紅花等藥其水漸升乃用參歸鹿茸湯加丁桂白芷白芍次加白朮其漿乃足漿起之候竟似蛇皮落痂之際或片連皮而去遍身如蛇蛻殼手足指甲無一未落毛髮悉皆脫換其症果蛇皮也善以治之亦竟安全可見不治之症亦勿棄而不治也但症遇惡烈藥必猛攻而遷延觀望豈能救乎空倉痘痘雖肥滿內是乾枯全無血水乃空倉也其痘硬者名鐵殼空倉症至如是其必死矣此等之症其氣雖盛其血必虧或又以前失於解毒致毒火內熾其血愈涸漿汁乃血之所化血枯故是空倉一兒出痘甚多體性又弱醫人不明氣血之理只謂保元湯乃治痘至穩之劑人參用至數錢其痘竟無漿汗請余往視余曰此空倉也汝試以針刺之剔破之痘俱無血水其家人大驚余曰無妨此氣有餘而血不足也人參可以不用乃用川芎炙耆白芷牛蒡肉桂各八分歸身鹿茸各二錢大生地三錢白芍一錢穿山甲四分連進二服漿腳來矣乃去牛蒡而又以補血為君補氣為臣其漿乃足而愈茱萸痘其痘不甚起脹四弦起而中略陷痘有亂紋於頂上形若茱萸名茱萸痘其後必空漿倒陷而死此毒盛而中氣又虛故痘頂有紋而不尖圓也一兒出痘如此諸醫皆云難治請余視之見痘中間多有黑眼余曰以毒凝而氣不能升其毒將入臟腑急為解毒行氣猶為可救蓋此時只六日也乃用生耆牛蒡連翹各一錢赤芍八分升麻白芷各六分黃芩五分黃連二分甘草二分川芎一分蟬蛻二個外以楊柳煎水洗之連服數劑其痘漸圓淨紋與黑眼俱無其後以補氣為君補血為臣治之竟愈余治此症甚多其先必須解毒行氣茱萸紋乃可除也血泡痘滿泡通紅其內是血故名血泡此血熱毒熾不能運化以成漿故有此症急宜涼血解毒為主用生地赤芍紅花紫草丹皮牛蒡黃芩白芷弱者忌服查前看形色法斟酌用之為要白漿痘初起發時瘡痘即有白漿其後必成灰白癢塌而死蓋漿必由腳而起乃為順症此毒參陽分而陰血不能運化故不久而即陷伏也但初起之際間有數點即刺去其漿隨刺隨長有漿則又刺去時時看視不可怠玩內服千金內托散大補氣血乃可無虞若遍身如此則難治矣慎之慎之或照前看形色法大補元煎治之更妙千金內托散人參當歸炙耆各錢半白芍肉桂各六分川芎炙草各四分白芷七分山楂八分木香防風厚朴各三分漏痘參看各前篇痘未成漿頂上有孔漏出汁水堆聚而結形若癩頭俗呼漏痘此因表虛不能養漿故不傷而自潰也急宜補氣健脾固其肌肉乃可救也若遍身俱潰則必死矣須用人參炙耆當歸官桂川芎白朮白芷炙草丁香淮山加龍眼蓮子同煎蛀痘痘有小孔如針嘴大似蟲蛀之眼故曰蛀痘此腠理不密乃有此痘若不急治大泄元氣必成灰陷而死須用人參炙耆當歸炙草肉桂丁香加荔枝為引必孔祕而痘乃起脹行漿也仍參看各前篇為要琉璃痘痘雖光亮全無血色明若琉璃略擦即破內俱清水而或出血總無膿漿此血氣不能運化毒氣而然也後必音啞而死痘若起脹見有此等急取其尤者而刺去其水再用實漿散人參黃耆當歸鹿茸白朮淮山山楂扁豆白芷炙草加黃豆四十九粒或用大補元煎各方更妙草尾珠痘遍身俱陷惟尾脊骨一圈飽滿潤澤其明如珠猶之草尾露珠也蓋尾脊為腎部此必腎強精髓充足急用內托之劑則遍身之痘旋覆起矣黑痘與各前篇參看施治為要痘毒隨血而出毒盛血熱亦盛故其痘乃黑也此必死之痘古方雖有數條總以涼血解毒為主姑載於後以備參用初見黑點在皮膚之間者用硃砂冰片牛黃或用豬尾血調入牙散好酒同服初出點便黑者用紫草茸二三錢好酒調服又皮膚髮青紫紋者川紫草一錢紅花荊芥防風牛蒡生耆各八分木香甘草各三分升麻五分又黑痕並黑靨者用蟬蛻五個紫草茸一錢又黑如煤炭血不紅活者用紫草紅花生地牛蒡赤芍又黑而軟者氣弱而血熱也用保元湯加紅花紫草生地又焦黑潮熱煩躁者用小無比散三錢加紫草生地紅花磨犀角調服人牙散人牙自落者火煅存性入韭菜汁淬之研為末加麝香五釐穿山甲二分用雞冠血蔥白煎酒調服保元湯人參黃耆當歸川芎紫草紅花肉桂防風小無比散滑石六兩石膏一兩煅寒水石煅鬱金甘草水煎透焙乾甘草各五錢共為細末頭面頸項諸痘與各前篇參看諸痘未出獨於印堂先現一顆者名曉星報點此痘能閉諸毒急宜以燈火燒之但小兒畏燈火必然躲閃須用銅錢一個印於痘上令痘從錢眼暴出然後燒之乃不差誤一兒出痘稀疏潮熱亦退余見天庭有痘二顆其大異常余曰此宜去之其家不信余言至次晚復來請余謂其兒潮熱復作煩躁驚譫痘皆變色余往剔去其痘以藥敷之熱退人安痘遂起脹勿謂此為無害也痘出點稠密其天庭地角雖然明朗而兩顴甚祕一片丹紅不分界地此毒在肝肺若不急治一經咳嗽失聲則難救用前胡赤芍紫草茸生地丹皮牛蒡連翹川芎黃芩黃連木通甘草煎服外用水柳草煎水時時洗面其痘立即轉色又或以胭脂米擂水擦痘上亦能解毒活血但更難於辨色耳嘴角有黑痘一粒而獨大者名單鎖口兩嘴角俱有黑痘者名雙鎖口皆惡候也此毒凝於胃主不食而死見此須宜剔破用口吸去惡血以拔疔散見前痘疔方內敷之或可救也鼻孔邊有痘名攔門痘鼻孔內有痘見後此為凶痘承漿即入出處廣額先有數點者亦凶喉窩之痘主煩悶耳後窩頸項窩有痘皆不吉又或不拘何處有痘獨大異常者非賊痘即痘疔能閉通身痘毒俱宜速以燈火燒之或挑破用口吸盡惡血以拔疔散見前敷之痘出而喉窩及頸窩甚多者名豬頸又名鎖項竟至於頤者又名托頤主飲食不進或喉爛或聲啞而死急用山豆根元參桔梗甘草生地川芎歸尾木通牛蒡煎服緩則毒結於喉必難治也眼中生痘真新象牙磨水點眼其痘自退可免瞎眼又方頂上胭脂取汁點之最妙又方蜒蚰蟲又名鼻涕蟲放眼皮上周圍走動吐出涎水其痘自散屢試如神又方照後痘後風眼起翳紅赤鱔尾血方最妙又方鯉魚膽點之鰱魚膽亦可又方細茶口咀敷眼外又方益母草熬水點之免痘入眼牛蒡子搗爛敷囟門痘不入眼出痘眼目紅腫細茶葉緑豆淨銀花口嚼敷之或以有膏黃紙塗雞蛋白貼之自退最忌食雞又方人乳汁蒸熟點之又方金銀花胭脂人乳汁取燈芯蘸點之出痘症眼有膿血兔子糞清油調搽出痘眼痛翳子草搗爛左眼痛塞右鼻右眼痛塞左鼻舌與鼻孔有痘黃丹老土磚共為細末吹之又方青扣布燒灰吹之又方硼砂檀香燒枯共為末吹入又方先用皂角末吹入再用黃蠟塞鼻又方柏葉煎水服出痘縮舌蟬蛻雄黃水煎木香磨茶調服舌上有痘舌上痘疔見前人中白焙硼砂兒茶共為末搽舌上又方先用茶洗淨將金墨磨水粉調塗之又方先用鹽茶洗淨用黃柏黃連元參苦參共為末蜜調塗之又方鴨糞燒研鴨毛蘸摻之舌上爛痘用油胭脂敷最妙黃柏黃連元參共研末蜜糖調擦舌上又方人中白焙枯為末搽之又方硼砂水飛冰片點之出痘口噤不語吳茱萸煎水服出痘腎腫桑樹皮細茶生薑槐樹皮共搗清油拌炒包之又方若腎紅腫取藍澱腳汁擦之又方如風腫者用鹽炒熱尉之或用槐花葉炒熱敷之腎嘴有痘公鴨嗄氣數次即消陰戶有痘雄黃研末清油攪勻以鴨毛蘸擦之痘症夾斑夾丹夾疹而出如恐內服涼藥有礙正痘即以細密有膏的青扣布塗雄黃麻油貼於紅處如難遍貼即於太陽太陰胸背貼之痘出不透腹痛甚或黑陷急用前雞敷肚臍方最為神妙或照各前方施治必有效也出痘中風其症眼目直視牙關緊閉勿用驅風峻藥宜急用附子乾薑濃煎灌下令出微汗而愈若手足扯動急查前急驚門各條細看為要雜痘一齊湧出楊柳葉柑子葉老艾葉臘樹葉共煎水遍身洗之即退又方鮮紅花嫩紫草金銀花煎水遍身一洗又方水楊柳桃枝槐枝各三條紫背浮萍煮水遍身一洗將燈火遍身一燒即出痘毒而正痘出現又方清油一杯白蠟生薑汁硃砂雄黃共熬熱從頭至尾遍身一揩雜痘盡退正痘即現驗痘出齊法五六日後痘當出齊凡看痘齊與否必以腳心為驗腳心有痘則出齊矣然痘稀少者亦不拘此總以熱退而痘為出齊也若熱未退雖四肢有痘恐終未齊不可謂毒輕痘少漫不加意也痘症作癢抓成瘡疱欲落不落用好白蜜調開水時時以鵝翎掃之其瘡易落且無疤痕又方川椒艾葉紅棗去核芫荽茵陳乳香白芷梢陳香圓安息香各二錢共為細末作紙捻熏照雖癢塌之痘火到癢除無安息香亦可此神燈照法也又方荊芥穗為末撒紙上捲成筒糊黏紙頭燈上燒燃在癢處略燒一下甚妙或熏照亦可痘中生疽癢不可忍用針挑去蛆蟲自愈或用嫩柳葉鋪床上睡臥其蛆自出又方鹽醋湯服之或用癰毒門瘡中生蛆方治之最妙又方醋湯遍身噴之服鹽醋湯不可輕用痘症發熱胡言亂語千腳泥搗碎雞蛋白調敷臍上又方藍澱腳汁一杯燕子泥調敷臍上燒五寸香久取去又方小雄雞一隻生剖開用雄黃麻油塗之雞肚內將雞敷臍上最穩最妙並用前芙蓉敷足各方更為神效又方生蘿蔔搗爛和鉛粉作餅敷腳心亦妙又方燕子窩泥雞蛋白調餅敷臍上又方熱甚恐起驚風用小針刺男左女右中指取血為妙痘齊熱退愛睡地上日夜不安此火伏中焦也用前頂方剖雞敷臍上自安狂熱痘毒麻木致死此症有由腳麻至小腹而死或由頭麻致心口而死一日死蘇幾次藥宜早制以應急用冬月取小男孩糞要乾結者為佳稀者不用陰乾用泥裹好燒成炭去泥取糞研末每用三錢豆腐調服神效並用吳茱萸末熱醋調敷足心亦神方也皮肉紅腫而痘不腫三豆散黑豆緑豆紅飯豆查藥物備要便知共研細末再將醋研為濃汁以鵝毛掃之神效痘症潰爛膿水淋漓多年蓋屋茅草洗淨焙乾為末搽之神效又方松花粉搽之亦效又方黃牛糞焙乾研末清油調服無論如何潰爛皆能收功又方紫草麻油熬成膏加白蠟再熬數滾取起敷之神效又方京城油胭脂敷之亦神驗也痘症泄瀉參看前痘症治驗末篇為要男左女右在肚角上有一窩即止瀉之火穴也其法用本人之手下垂肚角然後將手曲轉令手莫動以曲骨下為下此處必有一窩即於窩中用燈火連燒三次其泄自止但痘前吐瀉總勿亂治恐滯毒也若痘出而泄瀉不止則宜施治慮中氣虛則難起脹也泄有二端泄而糞黃臭穢小便赤澀者此毒氣奔越熱泄也痘色必紅紫加味四苓散主之泄而糞清白滑利者虛寒也痘色必淡白參朮散主之如虛泄不止兼用七味豆蔻丸無不止矣此聶久吾先生痘症經驗方也加味四苓散治痘症熱泄如神虛泄者斷不可服豬苓木通各八分澤瀉赤茯苓各七分川連炒黃芩炒牛蒡揀淨炒香研碎車前子各五分燈心一團水煎空心服參朮散治痘症虛瀉並尋常脾虛泄瀉屢試如神白朮土炒一兩軟黨參高麗參更妙真白茯苓砂仁炙甘草薏仁炒白蓮肉去心炒真神麯楂肉各五錢肉豆蔻麵裹煨去面切細紙包打去油訶子火內煨去核廣陳皮去筋各四錢南木香三錢共為細末每用二錢米湯調空心服小兒如不肯服或調稀粥服亦可七味豆蔻丸治與參朮散相同肉豆蔻訶子俱照前制砂仁白龍骨煨南木香各五錢赤石脂煅枯礬各七錢共為末稀粥為丸如緑豆大量小兒大小每服二十丸或三十丸米湯送下如不能吞丸或不肯服者研碎和稀飯服若服丸後仍從大便成顆瀉出而不化者亦研碎和粥服之其瀉立止屢試如神痘症小便不通細茶嚼融紙包敷臍上又方樟樹皮薑蔥老艾共搗爛炒熱敷小肚上女人放陰門上即通痘症大便不通蔥一把作餅敷臍上用錫壺盛滾水尉蔥上即通痘症耳目口鼻出膿行漿之際有眼耳出膿鼻竅流膿口吐臭膿者皆其內中有痘不能結痂潰而出膿不必施治內痘成膿則毒已化自可無虞痘風餘毒入目致生翳障筋膜或成珠目蟹眼蛇蛻全者一條馬屁勃一兩皂角子十四粒蟲蛀者切不可用共入瓦罐用泥封固泥內加鹽少許以免出氣連罐燒紅存性候冷透火氣取出研末每服三錢滾開水送下神效痘後風眼或起翳或紅赤經霜大桑葉七片或冬至收或立冬收蒸水半鍾加入食鹽少許早晚洗又方頂上胭脂泡水鋪紙上以新筆在紙上蘸水一日點三次三日即愈極效又方仰臥床上取黃鱔尾上血滴入閉目少頃拭去一日三五次即愈重者數日全愈但必須鱔尾血每次換一鱔用過即可放去諸藥不效者用此極驗痘風眼邊紅爛作癢照卷一目部眼邊濕爛紅腫第二方治之最為神效痘後兩目難開兔糞二錢密蒙花蟬蛻去足穀精草各一錢共為末用豬肝竹刀切開每肝一兩入末一錢包肝內蒸熟去藥飲汁食肝神效又方燈心蘸清油潤眼上又方黃柏末入水久浸將紙染濕鋪眼胞又方黃連黃柏黃芩元參乳汁調勻飯上蒸擦之又方黃豆口嚼成餅敷之又方自己熱小便黃紙浸溫貼之痘後耳內腫痛時流膿血先用棉花攪淨膿血然後用黑砂糖調水少許滴入耳中其痛立止其汁自干戒勿抓挖而自愈矣或照卷一耳部各方治之痘後鼻常流涕臭不可聞此名鼻淵乃熱毒乘於肺經而熱蒸肺竅也絲瓜近蒂五寸黃芩梔子仁牛子甘草同煎服外用絲瓜藤燒灰為末吹入鼻中並以絲瓜燒灰調酒服亦可又方照卷一鼻部松花粉治之甚效痘後唇不蓋齒此氣血兩虛急宜大加培補斷不可服涼藥否則必成慢驚之症則更費手須請名醫加意調理不可忽略若頂門下陷尤宜急治痘後唇口生瘡上唇有瘡蟲食其臟其名曰狐下唇有瘡蟲食其肛其名曰惑皆由裡熱生蟲內食臟腑乃有此瘡形也必其人昏昏好睡不思飲食其聲嘶啞而音不亮即狐惑也此最惡之候必致鼻崩齒落失聲而死宜用除慝丸治之黃連二錢蘆薈一錢三分使君子肉三錢白蕪荑一錢五分蟬蛻三分燒灰川楝子肉一錢共為末用烏梅洗淨去核搗爛和末為丸米湯下痘後齒癢或出血此餘毒流於胃經將成走馬牙疳也若不急治其後牙齦腐爛日落一齒滿口落盡而死當發癢之時急宜用連翹牛蒡慈菰石膏生地銀花紅花甘草煎水時含口內痘後牙齦口舌破爛出血或成走馬牙疳人中白一錢銅緑一分半麝香一分共研末先將濃茶洗淨口牙後用指頭蘸藥敷立愈或照卷一齒部各方治之又方生香附生半夏各等分為末生雞蛋白調作餅敷足心一周時洗去重者連敷數日其效如神痘後口角流涎細茶葉末白沙糖調服又方鹽薑細茶葉同嚼食又方照口部口角流涎方治之痘後咽喉腫痛甘草桔梗各五分防風元參鼠黏子即牛子升麻射干各三分水煎服痘後昏迷不語當毒氣已散元氣未復精神疲倦故昏昏喜睡即呼之不醒亦自無妨若連日不醒口中喃喃自言自語形如醉人每多妄語者此邪熱乘於心包也宜以導赤解毒湯或以安神丸主之導赤解毒湯木通車前生地麥冬甘草茯神石菖蒲梔子人參燈心湯下安神丸牛黃五分黃連五錢當歸炒梔各二錢半共為末入豬心血和勻為丸硃砂為衣燈心湯下若無真牛黃則加川貝膽星琥珀痘後聲啞杉樹節訶子生薑地坊下土若寒加胡椒煎湯竹油調服又方蔥薑清油合炒熱遍身揩之再用燈火喉下一灸胸膛三灸兩乳下一灸痘後心痛不可忍此餘毒歸心也用乳香二錢水煎服並用白砂糖四兩酒沖服水沖亦可或服護心散見癰毒諸方亦妙痘後肚腹腫脹黃柏苦參共為末清油調勻熬過作膏貼之又方桐子葉滾水泡軟用清油雄黃塗葉上貼三五次數又方燈花數十雜入鹽炒過加鉛粉調成餅貼臍上痘後浮腫照臌脹門病後浮腫方治之最為簡便穩妥如不見效照後各症治之痘後膿血去盡脾土已虧氣血俱衰邪易入而食易傷故或感風濕或傷飲食或滯餘毒皆發為浮腫然感冒風寒者多自面孔先腫而身熱口渴宜用升麻柴胡茯苓木通車前防風大腹皮甘草薑蔥汁引煎服微汗而腫自退矣有感濕氣而腫者多在足下先腫其形光亮以手按之而即有窩其起亦緩且其人好飲而小便赤澀以水洗之而更腫者此水腫也治當健脾利水為主宜用蒼朮厚朴木通車前滑石瞿麥澤瀉豬苓茯苓皮大腹皮使小便清利其腫自消外用蒼朮檀香燒煙燻之以被蒙蓋令出濕水其腫自退又有食積而兼滯毒者多自腹先腫起必腹中隱隱作痛不思飲食且腹有微熱大便黃臭小便赤澀者滯積而腫也治當消導解毒為主宜用蒼朮厚朴陳皮大腹皮香附川芎山楂神麯牛蒡連翹木通車前茯苓半夏甘草又有脾氣不行而浮腫者其皮如臌按之難下乃氣腫也治當理氣為主宜用人參五皮散治之人參白朮官桂麥冬大腹皮陳皮桑皮姜皮茯苓皮木香澤瀉車前木通又有血不行而腫者其皮膚之內隱隱若有血路是血腫也治當以活血為主用四物湯加人參陳皮香附木通茯苓治之使血行而腫自退矣又有面目四肢腫者屬脾因表虛為風寒所侵而腫宜發汗而腫自消用加味五皮散主之羌活防風桂枝防己蒼朮木通五加皮桑皮大腹皮茯苓皮姜皮豬苓甘草又有腹脹如臌眼胞微腫者屬脾因脾胃素虛土弱不能制水以行水蓄而不行故浮腫也又或傷食滯積脾不能消以致濕熱內蓄而腫者俱以厚朴湯治之蒼朮厚朴陳皮大腹皮茯苓皮豬苓木香水腫者其陰囊亦腫加澤瀉滑石車前木通葶藶積滯者加山楂神麯三稜莪朮萊蔔丸通治一切浮腫萊蔔子炒胡椒厚朴各五錢白朮一兩共為末作丸以陳皮煎湯送下又虛弱而氣不行者用肉桂磨酒服外用燒酒搽之即愈痘後癰毒初起紅腫照前三豆散治之其效如神痘毒色白此因小兒出痘多服涼藥血寒氣滯以致毒髮色白若再以涼藥服之其毒流走患生不一久則生管成漏漏久必生多骨害人不淺凡遇此症須用小金丹見陰疽門服之神效秦姓子生痘毒色白醫用清火解毒之藥其毒日增後生毒二十處至第二年孔皆生管日流臭水右足縮不能行坐臥三載始來就治余以陽和丸小金丹犀黃丸等藥與服內用化管藥半月已愈一半一月管化孔內有多骨者亦已出盡後秦姓帶子回家與以生肌散及調和氣血之丸帶回不料任子率性不服不洗不敷並以酸極石榴等果食之以致臭不可聞其管復舊仍照前治之而愈此林屋山人祕法也又方蝦蟆灰散見癰毒諸方敷之亦極神效痘後遍身無皮膿水不絶茶葉去梗熱水泡透鋪床上睡上一夜膿水自干痘後蟲蝕疳瘡膿水絶出峨蠶繭不拘多少將生明礬末入內填滿燒令汁盡成灰為末摻之即愈痘風瘡逢春即發黃丹黃芩黃柏大黃輕粉共為末豬油調敷孕婦痘症參看前二十四頂方妊婦出痘痘家最忌蓋痘毒出於五臟痘毒發越則風火相搏必致動胎胎動則氣血耗散熱必不能送毒行漿況痘家用藥多主溫補如半夏肉桂之類皆妊婦所忌而黃芩烏藥又非痘家所宜此孕婦出痘所以最難調治也遇此總以清熱安胎為主發熱有孕之婦遇出痘時急宜遠出回避若至出痘當發熱時即以保胎為本以托痘為標仍用升麻葛根湯加酒炒黃芩土妙白朮以保護其胎元夫黃芩寒涼易至冰毒若無孕不敢早用然有孕而毒火熏蒸不用黃芩以清內熱胎必不能保矣至於出齊熱或未清黃芩亦不妨再用見點孕婦出痘始終以安胎為主故見點後多服安胎飲為佳若口渴者則用人參白朮散加減滯者則用黃芩湯合四君子湯加訶子血動者用芩連四物湯腰疼者保胎散宜早服總之不拘輕重悉以清熱安胎為主安胎飲臺白黨白朮條芩當歸白芍川芎砂仁蘇葉陳皮熟地甘草生薑三片紅棗三枚水煎溫服黃芩湯合四君子湯黃芩白芍人參茯苓白朮訶子甘草芩連四物湯當歸白芍地黃川芎黃芩黃連保胎散玉竹四錢酒蒸當歸三錢酒洗續斷酒炒杜仲鹽水炒各錢半茯苓黃芩酒炒白朮土炒各一錢川芎甘草各八分水煎服灌漿長漿之際痘暈紅紫此血分有熱必用消毒活血湯內有黃芩外加白朮五六分以固胎元胎必不動若痘暈淡紅以及淡白必用千金內托散見前倍加參耆去肉桂外加白朮一錢以固胎元胎必不動此母子兼治之法也墜胎孕婦出痘以安胎為主若從前不能按法調治至熱氣內蒸而墜胎者多矣遇此等症令老成穩婆撐扶産母以熱水淨沐下身扶其上床不要倒睡必須強坐一二刻用滾水兌白酒一種入童便半盞和服行其瘀血若痘稠密用加味保元湯氣血虛甚用十全大補湯若小腹急痛瘀血未盡也宜黑神散以滌除之寒涼切不可用加味保元湯臺黨黃耆當歸川芎白芷桔梗上厚朴紫草防風牛子白芍肉桂黑神散熟地當歸川芎甘草肉桂炮薑蒲黃炒黑豆香附醋炙童便酒煎服産後出痘婦人産後出痘只以大補氣血為主十全大補湯是此時要方方中白芍亦用好酒炒熟不可妄用寒涼以傷生髮之意也小兒科麻症麻症論麻症初起多有咳嗽噴嚏鼻流清涕眼淚汪汪兩胞浮腫身體漸熱二三日或四五日始見點於皮膚之上形如麻粒色若櫸花間有類於痘大者惟見形之後形尖稀疏漸次稠密有顆粒而無根暈微起泛而不生漿大異於痘也雖云較痘稍輕而變化則速始終調治俱宜留神總之初起宜先表法透徹最忌寒涼已出時當用清利收散後貴於養血兼雜症者則隨症參治之溫疹症見傷寒若發於未痘之先為瘙疹月內為爛衣瘡百日內為百日瘡發則遍身紅點如粟米之狀乃兒在母腹受熱所致調攝謹慎自能速愈痘方愈而疹隨出為蓋痘疹遍身發出疹色赤作癢始如粟米漸成云片因痘後餘毒未盡更兼恣意飲食外受風寒之所致宜疏風清熱為主至疹出多癢色紅赤隱於皮膚中為癮疹乃心火灼於肺經更兼外受風濕而成治宜先散風濕後清熱毒斯得其法皆非麻疹稟諸胎元毒也麻症與傷寒辨發熱之初寒熱往來咳嗽噴嚏鼻塞聲重且流清涕其症與傷寒無異但麻症則眼胞略腫目淚汪洋面浮腮赤噁心乾嘔此為異耳若見此症必是麻疹須宜謹風寒節飲食避厭穢戒葷酒忌辛熱用藥表散使肌膚通暢腠理開張或身有微汗則邪從汗解而毒則易出耳熱至三日麻當出矣一日出三遍三日出九遍至六日間當出盡矣及出至足頭面將收收靨之處其熱即退疹子漸次收下熱亦漸次而退至八九日麻始收齊而熱乃退盡矣若發不出者固危出不盡者亦險出而旋收者更險治之其可緩乎論麻症輕重或熱或退而無他症者輕頭面不出者輕出透三日而後漸收者輕紅活潤澤頭面勻淨而多者輕紅紫慘暗乾焦不潤者重移熱大腸變痢者重黑暗乾枯一出即沒者難治鼻青糞黑者難治鼻扇口張目無神光者難治胸高氣喘心前扇動者難治一眼白赤色聲啞唇腫心煩口渴腰腹疼痛口鼻出血人事不清大小便祕狂亂不寧舌苔黃黑口氣腥臭此名閉症毒滯於中而不得出將作內攻最危候也急以清毒解表湯主之若疹能出可救疹不能出難救方用升麻防風荊芥麻黃連翹牛蒡桔梗石膏知母黃芩黃連蟬蛻麥冬甘草水煎服一麻症鼻出血者毒重口出血者毒尤重口鼻血出不必止住血出則熱毒解散矣初起手足心如火熱者毒亦重初起失於清解則熱蘊於胃口鼻腥臭必生牙疳毒入大腸則成痼痢發表太過元氣損傷則成疳積若或失治於前則必貽患於後雖明初發之輕重宜顧後來之生死雖謂麻也只詳於前而可不思其後乎一感風熱而出麻者俗謂飄麻此皮膚小恙不致傷人只散風清熱而即愈矣一小兒初生彌月之內而出麻者俗謂胎麻可不藥而愈麻症四忌一忌葷腥生冷風寒夫穀氣通肉氣滯凡是葷腥俱能滯毒所以忌也果生則難克化物冷則能冰伏冰伏不化毒乃滯留又當忌也若風寒閉塞毛竅不開則毒氣何由出乎此數端者俱不可犯也一忌驟用寒涼麻雖熱症固不宜用辛熱之劑然初熱之際虛實之症未形輕重之勢未見遂驟以苦寒之藥而峻攻之幾何不冰伏其毒而不得出其反至於內攻乎故善治者惟達毒而不郁毒只解毒而不冰毒也一忌誤用辛熱麻本熱症若復投辛熱之藥是猶火上覆加薪也以火助火其毒不愈橫乎然麻症初起之時亦有四肢厥冷者然熱極似寒之故切不可妄認虛寒而妄投以熱藥也即遇天時大寒亦宜置暖室切不可因嚴寒而遂投以辛熱之物以濟腹中之火也一忌誤用補澀毒火之發最要疏通尤嫌補澀蓋疏通則毒外泄而解補澀則毒滯內留為殃但初發之時症多吐瀉愚夫愚婦急欲止之若誤用參朮砂仁補澀之藥則關閉塞毒滯於中必作內攻之禍矣麻症治法夫痘為陰毒其勢更緩或死或生尚判之於成漿之日麻為陽毒其熱甚烈若存若沒早定之於方出之時故發熱三日麻當現於皮膚若腠理緊祕風寒嚴束氣滯於中毒凝於內不能出現則毒作內攻須臾告變故痘則慮難成漿麻則懼其不出麻前痘後最為緊要此古今之通議也當發熱三日之間急宜觀形察色審聲辨症以為調治之方如聲重鼻塞肌粟惡寒是為風寒所束宜用加味升麻湯升麻乾葛防風荊芥牛蒡連翹桔梗木通赤芍甘草柴胡黃芩陳皮蟬蛻元參加蔥白水煎熱服令取微汗一二服間其麻即出如大熱熏蒸肌膚乾燥目赤唇紫毛髮焦豎煩渴不安驚狂顛譫二便祕結而出不快者乃熱毒盛壅故也宜用梔仁解毒湯梔子黃芩黃連石膏知母牛蒡連翹升麻柴胡防風赤芍甘草大便祕加酒大黃煩躁加麥冬嗽甚者加杏仁桔梗花粉驚譫用抱龍丸或牛黃丸無汗腠理祕加大黃再用紫蘇煎水令熱氣熏之或用酒遍身擦之然後以被蓋片時其麻即出治風寒閉者亦如是若為穢氣所觸而出不快則用沉香檀香荊芥燒煙燻之又有毒氣本盛元氣又虧而出不快者宜用人參白虎湯臺黨二錢石膏四錢知母一錢五分加升麻防風牛蒡炒芩水煎服孟氏治麻方石膏二兩煅荊芥地骨皮桔梗各八錢赤芍牛蒡薄荷陳皮枳殼各六錢川貝甘草各四錢紅花三錢乾葛歸尾桑白皮各一錢共為末每服三錢開水下此方能發表透肌清毒活血理肺消痰清胃解結不拘四時皆可服誠治麻之良方也麻發不起凡麻發不透氣喘欲死即用脂麻五合以滾水泡之乘熱熏頭面即發起死回生之妙法也又方小米即粟米要紅殼煎水不拘時服看似平淡功效異常又方櫻桃四五斤入瓷瓶內密封埋土中過兩三月俱化為水遇此症危急者取此汁一杯略溫灌下垂死回生之驗無比不可忽視有志仁人多預製以濟人功德不小又方沉香木香檀香不拘多少於火盆內焚之抱小兒於煙上熏之即起麻症作癢好白蜜調水以鵝翎時時蘸掃
