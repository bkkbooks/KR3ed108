斤豬腰子十二個羊腰子十二個各藥磨成細末將腰子切開以藥塞滿麻線縛定放蒸籠內蒸熟曬乾連腰子搗成細末用白蜜六七斤煉熟和藥為丸如梧桐子大每早晚用二三錢淡鹽湯送下腰子內藥末以塞滿為度不必盡入其中也彭祖接命丹此丹最能添精補髓固精不泄善助元陽滋潤皮膚壯筋骨理腰膝下元虛冷五癆七傷半身不遂或下部虛冷膀胱氣痛腳膝痠麻陽事不舉男子服之行走康健氣力倍增奔走如飛女人服之能除赤白帶下血崩兼通二十四道血脈功效無窮難以盡述何首烏白茯神赤茯苓菟絲子去灰淨牛膝當歸破故紙覆盆子以上每味十兩不犯鐵器用石臼杵為細末煉蜜調黃酒為丸如梧桐子大每服二錢空心黃酒送下早午晚進三服七日後每服三錢忌服蕓薹即油菜菜子油蘿蔔無價保真丸治一切勞損諸疾服至一月面目光潤半年後返老還童飲食房事無異少年百病不生冬月手足不冷夏月身體不熱男子鬚髮不白婦人能多生育益精補髓功效無窮九制熟地忌鐵四兩全當歸酒浸二兩五錢川芎酒炒一兩五錢杜仲薑汁炒去絲一兩半白茯苓人乳拌蒸一兩半甘草一兩金櫻子酒浸去毛子一兩金石斛三兩淫羊藿去邊梗酥炙或羊油炒一兩以上各藥均用好燒酒製惟服藥不拘何酒杜仲另研為末同各藥末加入生白蜜共搗一千杵丸如桐子大每服三錢空心服酒下昔四川一刺史年方壯患五癆七傷四肢無力沉困瘦軟面目無光交合之時陽痿不舉下元虛冷夜夢遺精得此方合藥未及服而病卒有院工戈禹年七十六亦患此症即以此藥與之服至十日舊症若失每夜房事不絶後戈禹以淫行被主處死折骨視之果然骨髓充滿方信此藥效驗延壽丹此方久服添精補髓健脾養胃烏須延壽體健身輕返老還童中陽復興少陽復起痔瘻瘡毒服之即愈能調婦人經水暖下安胎專治赤白帶下妙不可言製藥時忌婦人僧道雞犬見並忌食牛馬肉此方內可加熟地棗皮當歸更妙白朮土炒青皮生地厚朴薑汁炒杜仲薑汁炒故紙微炒廣皮去淨白川椒青鹽黑豆二升巴戟肉去心白茯苓小茴香肉蓯蓉竹刀刮淨鱗黃酒洗曬乾以上各一兩制好入銅鍋或砂鍋亦可用小二十小碗桑柴文武文煎至十碗將水盛出復煎藥渣用水十小碗煎至五小碗去渣不用惟用二次藥水十五碗將黑豆放鍋內用火緩緩煎至水乾盛起候冷入瓷罐裝貯每早空心服三錢開水送下不可間斷婦人受胎之後不可再服恐受雙胎蒸臍補氣散此藥治氣虛體倦肚腹畏寒下元虛冷等症極效五靈脂夜明砂枯礬各一兩共為細末分四包存貯聽用每逢春分秋分夏至冬至先一日用溫水避風先將臍眼洗淨納麝香五釐於臍內將蕎麵為圈烘微溫安臍上用藥一包鋪圈內以蘄艾絨作團每團重一分或六七釐放藥末上用香火燒燃若干歲即燒若干團燒完用蕎麵作餅蓋圈上俟藥冷緩緩取下忌茶七日面圈深寸許橫輕一寸六七分麵餅如圈大如無蕎麵即麥面亦可久久行之不可間斷受益無窮切忌婦女經手陰虛無上妙方天一生水命曰真陰真陰不能制火以致心火上炎而克肺金咳嗽者火刑金吐痰者腎水虛泛而為痰如鍋中之水熱甚則騰濕也豈區區草木之功所能濟哉必須取華池之水頻頻吞咽以靜治於無形然後以湯丸佐之庶幾水升火降而成地天交太之象耳主方在吞津液華池之水人身之金液也敷布五臟灑陳六腑然後注之於腎而為精腎中陰虧則真水上泛而為痰將並華池之水一擁而出痰愈多而肌愈瘦病誠可畏今處一法二六時中常以舌舐上齶令華池之水充滿口中乃正體舒氣以意用力送至丹田口復一口數十乃止此所謂以真水補真陰同氣相求必然之理也每見今之治陰虛專主六味地黃等味以為滋陰壯水之法未為不善而獨不知於本源之水取之點滴以自相灌溉是舍真求假不得為保生十全之計此余諄諄為是言也衛生君子尚明聽之人乳膏血虛火旺消補兩難者服此神效人乳男用女胎乳女用男胎乳藕汁白蜜甜酒原汁各等分同煎加童便熬至滴水成珠每日空心服半盞病深者多服全愈若服寒涼藥則不效來復丹治上盛下虛裡寒外熱伏暑泄瀉如水霍亂嘔吐不止六脈隱伏如無遍體冷如冰鐵飲湯難受薑附熱藥難投急服以此丹立效如神太陰元精石取龜背形者佳研細水飛淨一兩五靈脂水澄去沙曬乾二兩洋硫黃土黃不效硝石各一兩與硫黃同研為末放瓷碟內用微火炒用柳枝攪勻火勿太過再研細末陳皮去白青皮各二兩先將陳皮青皮研細末再入硫黃硝石元精石各末再研千餘下好醋煎滾為丸如梧桐子大每服三十丸開水送下斑龍散治精血耗涸耳聾口渴腰痛白濁上熱下寒不受峻補者鹿茸一兩酒泡透酥炙研末此味要整架者茸片多假查藥物備要使知真烏梅肉煮成膏和搗為丸如梧子大每服五十丸米湯調下草靈丹此藥益壽延年添精補髓烏鬚髮固齒牙強筋骨壯氣血服之一月乃見其效如要試驗拌飯與白犬食之一月變成黑犬此其驗也老人服至十日便不夜起服藥者不可因此多行房事反致耗精損神忌食黑羊肉鶉鴿桃李真川椒去子炒出汗茅山蒼朮各四兩酒浸焙乾茴香鹽水炒白茯苓各二兩去皮炒川烏去皮臍炙甘草各一兩熟地酒浸真山藥各三兩共為細末煉蜜為丸如梧桐子大每服三十丸至四五十丸空心溫酒送下服後以干食物壓之五香丸此方仙傳祕於道藏善能消食消積消痞消痰消氣消滯消腫消血消痢消蠱消隔消脹消悶藥料尋常功效甚大並治痰迷心竅每服七八分或一錢薑湯送下臨睡先一服次早一服其效如神五靈脂一斤香附子去淨毛一斤水浸一日黑醜二兩白醜二兩共研細末以一半微火炒熟以一半生用和勻醋糊為丸如蘿蔔子大此藥費小功大原同志者修合濟人功德無量再黑醜白醜性雖猛烈服之不多並不礙事三黃寶蠟丸治跌打損傷刀傷箭傷槍傷一切刑傷破皮瘀血奔心及癲狗咬傷蛇蟲毒物咬傷墜馬跌傷瘀血凝滯及婦人産膈惡露不盡痰迷心竅致生怪症危在頃刻其效如神真濟世良方也藤黃四兩天竺黃明雄黃紅芽大戟水粉即官粉劉寄奴真血竭乳香兒茶各三兩歸尾朴硝各一兩二錢血珀水銀麝香各三錢共為末加頂淨黃蠟二十四兩將銅鍋裝蠟下滾水面浮其銅鍋待蠟溶化隨下前藥末攪勻半冷能作丸輕者一丸若遇久有瘀血凝滯可服數丸多飲酒幾杯蓋被取汗即愈外敷者用香油隔滾水開化敷之如久病勢重者服數丸甚能舒筋活絡去瘀生新有起死回生之功忌食生冷及生果發物三日扁鵲玉壺丸玉壺指人身而言道書曰金精滿鼎氣歸根玉液盈壺神入室元壽先生曰硫是礬之液礬是鐵之精生於溫泉産于山旁有水火既濟之妙本草只言治陰寒惡疾不言治鼓今人用治火衰陽氣暴絶寒水鼓脹卻有神功獨是難於制配余得異授並諸製法以廣仁術硫黃八兩真香麻油八兩以硫打碎入冷油內放爐上炭火宜微以桑枝緩緩攪動候硫溶盡即傾入水缸內急攙去面上浮油取缸底淨硫稱過若干兩再配真麻油若干兩照前火候再溶再傾連前共制三次第四次用真棉花子油自取棉花子向油榨坊制油為真配硫若干兩照前火候再溶再傾入水缸內急攙去面上浮油第五次用肥皂四兩水中同煮六時第六次用皂莢四兩放水中同煮六時拔盡油氣第七次用爐中炭火淋鹼水制六時第八次用水豆腐同煮六時拔盡皂鹼之性第九次用田字草田字草出水荒稻田中葉如田字秋天採搗汁和水煮六時曬乾研細如香灰凡淨硫一兩配炒糯米粉二兩煮汁為丸每服八分漸加至三錢開水送下硫黃以外洋者為佳土硫黃斷不可用九制硫黃丸凡人一身以命門先天真火為主火旺則脾土及五臟強壯如人一家之主人富強則百事俱強也此火一虛則脾胃虛弱飲食少進無精液以養臟則五臟自弱以致百病易生且老尤甚年老之人火必衰久服附桂至無效故有耳聾眼花齒落發白等症是非此丸難除此症此丸專補先天本元能健脾胃壯筋骨治虛弱齒落陽痿卻百病久服面如童顏老當益壯惟藥性云硫黃為純陽之物與鹿茸並功但其性太熱有毒又云硫磺性雖熱而疏利大腸與燥澀者不同又云熱藥多祕惟磺暖而能通寒藥多泄惟黃連肥腸而止瀉人多謂服之久必發毒皆因藥店制之不精如自制得法自然無礙磺用外洋者良若土磺斷不可用一制用老白豆腐將磺研末用淨砂鍋以竹籬夾鍋底籬上蓋豆腐一層鋪磺一層疊疊鋪好入水煮至豆腐黃黑色為度用清水漂淨腐渣再煮三次每磺一斤豆腐一斤或黑豆拌煮亦可二制用大個蘿蔔挖空將磺末入內蓋緊縛好慢火煮至蘿蔔黃黑爛為度清水漂淨復煮二次或蘿蔔切片拌亦可一磺二卜三制將紫背鮮浮萍洗淨拌磺末煮至萍腐爛為度但萍根鬚最多清水漂淨或打爛取汁拌煮亦可一磺三萍四制用新緑豆揀淘洗淨以磺末拌煮至豆爛為度清水漂淨一磺二豆五制用石菖蒲或菖蒲洗淨切小段拌磺末入水煮至爛為度取汁拌煮更妙六制松柏葉各半洗淨去枝用葉剪碎拌磺煮至葉爛為度清水漂淨七制或藕或梨或藕梨各半切片同磺煎至藕梨爛為度八制肥壯豬大腸洗淨氣味將磺末研細漂淨裝入大腸兩頭扎緊勿令走漏煮至大腸熟爛為度用清水泡過夜澄出陰乾九制地黃二兩全歸天冬麥冬各一兩川芎陳皮枸杞杜仲茯苓炙草前胡防風澤瀉蛇床子五加皮各五錢每磺一斤用藥一料照磺遞加用清水煎濃將磺末投入煎至藥汁干起出陰乾用糯米煮粥拌為丸如緑豆大陰乾用瓷瓶裝收每早用鹽湯送服一月用三分第二月四分三月六分四月八分五月一錢每月遞加至二錢為度如恐服久發毒病愈則止自無妨礙忌一切牲畜血及細辛七制固脂丸治命門火虧下元虛損耳聾眼花腰痛腿軟背冷精流陽痿不舉小便過多筋骨疼痛肚腹畏寒脾胃虛弱飲食難消夜多盜汗精神疲倦時受躺臥等症功能補火壯陽固精種子保真元壯筋骨健脾胃長精神除疾病功效不能盡述無論男婦皆治每早空心服一錢淡鹽水送下每服至一月後加三分加至二錢為止忌食羊血油菜又名蕓薹廣西呼為菜花菜油若陰虛水虧者早服此藥晚服六味地黃丸則水火兼補不致偏枯服至半年後方效固脂十斤一制淘米水泡一夜曬七日二制黃柏二斤熬濃汁泡一夜曬七日三制杜仲二斤照前四制生鹽二斤照前五制魚鰾三斤照前六制核桃肉六斤照前七制黑棗三斤糯米三斤共煮粥將固脂磨細末忌鐵器和勻搗融為丸如梧桐子大七制香附丸專治心血虧虛火不下降水不上升以致心腎不交夜夢遺精百藥不效者服此大有奇功香附一斤一制淘米水泡一夜石上擦去毛曬乾二制陳酒泡一夜曬乾三制童便照前四制鹽水照前五制牛乳照前六制小扁黑豆煮水照前七制真茯神六兩去皮去木心二味共為末煉蜜為丸如彈子大每早空心服一丸九制黃耆此藥制後可與人參同功氣虛者服之最佳婦人體虛血崩及産婦虛症服之更妙頂上綿箭耆一斤洗淨切片烘乾第一次用木通二兩煎水泡一夜曬乾二次升麻一兩照前三次丹皮二兩四錢照前四次沙參三兩五錢照前五次玉竹四兩六錢照前六次附子一兩制照前七次五味二兩照前八次防風二兩照前九次蜜糖三兩拌炒制完蒸過七日可服每用二錢水一杯飯上蒸好臨食對酒少許服渣再煎服代參膏此膏大補氣血可代參用嫩黃耆壯嫩而箭樣者用銼片白歸身切去頭尾酒洗各五錢肥玉竹一兩化州橘紅三錢如無真者用新會陳皮去淨白亦可共入砂鍋內用天泉水熬成膏每早開水調服湧泉膏又名海龍膏專治男婦下元虛損五勞七傷咳嗽痰喘氣急左癱右瘓手足麻木遍身筋骨疼痛腰腳軟弱肚腹受寒男子遺精白濁婦人赤白帶下等症貼至半年步履如飛下身不甚畏冷貼至一年氣貫泥宮雖老年亦能種子可免雜症併除風濕真神方也大海龍一對雄黑雌黃長尺余者佳無則用海馬亦可終不如海龍之妙大生附子一個重一兩五錢切去蘆頭童便甘草水各浸一日洗淨零陵香大穿山甲三錢要大片鎖陽三錢各藥切碎用真香麻油一斤四兩將藥浸入春五日夏三日秋七日冬十日然後木炭火熬至藥枯去淨渣將油再熬至將要滴水成珠時稱准分量每油一斤加飛淨黃丹六兩五錢用火熬至滴水成珠火不要大膏不要太稠切記切記用槐枝不住手攪動再下真陽起石末真麝香末各五錢冬蟲夏草末好野高麗參末真川椒末母丁香末各三錢攪極勻埋入土內七日去火毒每用膏三分攤如錢大貼兩足心十日一換不可間斷此膏五十歲內外貼之方見功效若少年無病者貼之足心作癢起泡反無益也附桂膏治感受風濕手足麻木筋骨疼痛等症貼之神效肚腹畏寒者更妙真香麻油三斤柏枝尖松毛心各五斤生大附子切片肉桂研極細末各半斤黃丹鉛粉各十兩先將麻油入鍋燒滾下柏枝松毛附子次第入油鍋熬枯去渣下肉桂末再熬下黃丹鉛粉不住手攪至滴水成珠入瓦器內浸水中拔去火毒用布攤貼肚腹畏寒者貼肚臍用大張連臍眼貼並貼背後腎俞穴其餘筋骨麻木痠痛俱貼患處法制陳皮善能消痰化氣止渴生津陳皮一斤清水泡一日去淨白臺黨甘草各六兩同煮一日去參草留陳皮加川貝母兩半研細青鹽三兩拌勻再用慢火煮一日夜以干為度黃瓜霜治急心痛最為神效並治實火牙痛喉痛皆效因寒心痛及牙喉虛火忌用黃瓜一條破兩邊去肉去子入生礬末填滿合住線捆懸掛有風無日之處陰乾候皮外起白霜取下研細收瓷瓶內用蠟封口如急心痛欲死者口有微氣用此霜點眼四角立愈喉痛者吹入牙痛者用霜擦之神仙粥此方專治感冒風寒頭痛骨疼並四時疫氣流行等症初得病二三日服此即愈糯米三合生薑五大片河水兩碗於砂鍋內煮兩滾次入帶須蔥白五七根或煮至米熟再加米醋小半盞入內和勻乘熱吃粥或只吃粥湯蓋被睡臥謹避風寒以出汗為度屢驗非尋常表藥可比甘露茶此茶疏風清熱去滯逐邪治一切感冒時氣頭痛腹脹不服水土等症陳皮四錢鹽水洗穀芽一兩炒神麯一兩五錢山楂五十粒炒烏藥厚朴枳殼各八錢陳茶葉三兩共為粗末每服二三錢生薑湯煎服羊肉湯治寒勞虛羸及産後受寒心腹疝痛諸症甚效肥羊肉一斤水煮入當歸五兩黃耆八兩生薑六兩再煮分四服此張仲景方也羊腎酒此酒能種子延齡烏須黑髮強筋骨壯氣血添精補髓返老還童有七十老翁腿骨無力寸步難移將此甫服四日即能行走如常後至九旬筋力不衰其方祕而不傳董文敏公重價得之凡艱於嗣續者服之即能生子屢試如神百無一失生羊腰一對沙苑蒺藜四兩隔紙微炒真桂圓肉四兩淫羊藿四兩用銅刀去邊毛羊油拌炒仙茅四兩要真者用淨糯米汁泡去赤汁薏仁四兩用滴花燒酒浸三七日隨量時時飲之烏雞湯治男婦虛弱或病後或産後或瘡毒久不收口脾胃不健一切諸損白毛烏骨雞又名太和雞不論雌雄去毛破腹去腸雜洗淨大生地酒洗四兩飴糖即麥芽米糖四兩俱納腹內瓦缸裝好放銅鍋忌鐵器內隔水蒸爛食之一月兩次為妙七味鴨治陰虛勞傷咳嗽痰喘神效生地熟地歸身茯神白芷各三錢土炒川貝母二錢地骨皮四錢用老鴨一隻去毛原湯洗淨去肚雜不可再見水將前藥加陳甜酒一碗生曬醬油三酒杯同入鴨肚內縫緊用瓦蓋盆盛貯盆內不可放水蓋好以棉紙將盆蓋縫封固放在鍋內亦不可放水鍋蓋蓋好稻草三斤打成小草結對鍋臍慢慢燒之如鍋太熱少停再燒草完鴨爛可吃能飲再加老酒送服雍正二年客自江西回廣有兄弟二人弟患虛損垂危即到城鎮不能停泊延醫又無方藥可服惟有待斃而已客憫之出此方令其兄照法制與服之竟得平愈神仙鴨治勞傷虛損無病者食之亦能健脾益精功效甚大甚大烏骨鴨一隻去淨毛破開去腸雜不可用水或用白毛老鴨亦可白棗即南棗四十九粒去核白果四十九粒去殼建蓮四十九粒去心人參一錢陳甜酒三大酒杯好醬油二酒杯各放鴨肚內不用放水瓦缸裝好封緊蒸爛陳酒送服無人參用玉竹四錢九分加薑汁少許亦可故紙鴨治腎虛吐血及腎虛咳嗽氣喘並一切虛有受補者效驗如神有人腎虛吐血三年百藥不效連食此鴨三隻斷根老鴨一隻去毛去腸雜洗淨用故紙三錢先用黃柏六分煎水泡固脂一夜曬乾烘乾亦可用鹽水炒核桃肉三錢陳甜酒一茶碗陳紹興酒亦可好醬油三酒杯共入鴨肚內以線縫好放瓦缸內不用放水蓋好加紙封口放鍋內蒸極融爛去藥連湯食如不見效即用七制故紙丸見前蒸鴨食必有奇驗種子兜肚方此方能調經種子並治赤白帶下腰腿痠痛子宮寒冷男女肚腹畏寒遺精白濁偏墜疝氣一切下部虛冷等症附子一個重二兩切片燒酒煮過曬乾聽用大茴炒小茴炒丁香五味子各一兩升麻木香甘草甘遂各四錢沉香一錢共為末用新蘄艾四兩搓融曬乾將前藥放在艾中間用線密縫兜肚置丹田上外用手帕包固晝夜縛定不可換動一二月後則去之或加麝香二三分更妙開關散治硃砂症並治感冒風寒及各項痧症凡脈散牙緊發燒手足麻木閉目不語喉腫心痛醫多不識此症誤認為喉風此名為硃砂症又名心經疔用此藥三分先吹入鼻孔內再將藥稱足一錢薑湯沖服服後用紙捻照心窩背心二處見有紅點發現用針挑破內有紅筋挑出方保無事此方神效不可忽視牙皂細辛各三錢半明雄二錢半法夏廣木香各三錢陳皮藿香桔梗薄荷貫衆白芷防風甘草各二錢枯礬五分各藥共研細末瓷瓶收貯用蠟封口不可泄氣土尉法治身受寒熱心腹疼痛醫家辨證不清寒熱混投或鄉僻之地無藥調理漸至飲食不進大便閉塞小便短澀上下關格不通渾身繃緊或六脈沉伏或緊數之極甚至手足腰膝僵硬不省人事此危篤之症急用陳乾土磚搗成粗末約二升許以鍋炒溫熱用青布包好以半揉尉胸腹腰背等處冷則另換一半周流揉尉約半小時久自覺胸腹氣流通而愈或再用皂角末少許吹入鼻中得噴嚏則氣隨通暢天然透邪丹治感受風寒暑濕及四時不正之氣以致頭痛脹悶鼻塞不通胸膈不舒等症鵝不食草查藥物備要便知曬乾研細末瓷瓶收貯以蠟封口每用少許吹鼻中即刻打噴嚏氣通而愈功同痧藥冬月用之尤妙仙拈散治男女遠年風濕血風皮蛀寒濕浸淫流水發癢搔之疼痛兩腿黑腫似爛非爛或時熱烘麻木等症寒水石另研飛滑石另研白芷百部蒸炒乾白蘚皮各三兩蛇床子地膚子東白薇各四兩炙鱉甲大黃酒炒各五兩樟腦臨用時加少許同研共研細末如香灰細麻油調敷一日一換不可洗浴一月即愈至遲三月斷根神效無比十全大補湯治氣血俱虛並老人癰疽等症臺黨炙耆熟地各四錢白芍酒炒焦朮茯苓上桂研末沖服當歸各二錢川芎錢半炙草一錢水煎服補中益氣湯治陽虛自汗或瘧痢脾虛久不能愈並一切清陽下陷中氣不足之症炙耆錢半高麗參二錢炙草一錢焦術錢半陳皮一錢當歸五分升麻柴胡各三分姜三片棗三枚水煎服逍遙散治血虛肝燥骨蒸勞熱咳嗽寒熱口乾便澀月經不調等症柴胡當歸白芍酒炒焦朮雲苓各一錢炙草五分煨姜三片薄荷三分水煎服金匱腎氣丸治腰痛腳腫小便不利嘔吐脹痛四肢虛浮痰重喘急脾腎虛弱水泛為痰非此不救此仲景神方也風濕重者須先去風濕然後服此藥以免關門殺賊之患熟地四兩茯苓三兩牛膝肉桂澤瀉車前山茱萸山藥丹皮各一兩附子五錢共為末煉蜜為丸如梧桐子大每服八九十丸空心米湯飲下急病分作數劑煎服亦可臨臥服補中益氣湯可收全功左歸丸治煩勞內傷身熱心煩頭痛惡寒懶言惡食或喘或渴或陽虛自汗或氣虛不能攝血或瘧痢脾虛久不能食一切清陽下陷中氣不足等症蜜耆錢半臺黨一錢炙草一錢白朮土炒陳皮當歸各五分升麻柴胡各三分姜三片棗二枚引小兒照服大人分兩加倍右歸丸治元陽不足陽衰陰盛益火之劑熟地八錢山藥炒四錢棗皮三錢枸杞鹽水炒四錢鹿膠酒兌服四錢菟絲四錢杜仲四錢鹽水炒當歸酒炒三錢肉桂去此研末兌服二錢六味地黃湯治肝腎不足真陰虧損精血枯竭腰痛足酸自汗盜汗遺精便血消渴淋瀝舌燥喉痛虛火牙痛下部癰疽等症九制熟地山茱萸真山藥真雲苓丹皮澤瀉水煎服八味地黃湯治命門火虧虛弱少氣尺脈弱者宜服之照上六味地黃湯加附子肉桂水煎服元麥地黃湯治陰虛心火狂躁腎水不足此即六味地黃湯之變方也加麥冬元參降火益水熟地八錢雲苓三錢丹皮三錢建瀉三錢淮藥四錢元參二錢麥冬去心二錢山茱肉四錢涼血地黃湯治胃火熱盛吐血衄血咳血便血畜血如狂漱水不欲咽及陽毒發斑等症生地四錢白芍二錢丹皮一錢犀角一錢要尖子佳黃芩二錢甘草五分梔子炒二錢黃連一錢川柏二錢藿香正氣散治上吐下瀉霍亂急症及各項痧症並四時不正之氣以及不服水土脾胃不和飲食停滯噁心胸滿等症藿香二錢白芷桔梗法夏紫蘇焦朮大腹皮川朴薑汁炒陳皮茯苓各一錢炙草五分姜三片棗二枚煎服六一散治中暑煩躁口渴小便不通瀉痢熱瘧霍亂吐瀉等症滑石水飛淨六兩甘草一兩為末每服三四錢涼水調下益元散治與上同照上六一散加辰砂少許甘桔湯治喉痛喉痹肺癰吐膿乾咳無痰火鬱在肝等症金銀花二錢甘草一錢桔梗八分牛子錢半水煎服荊防敗毒散治腫腮漏腮荊芥防風羌活獨活柴胡前胡川芎枳殼桔梗茯苓各一錢甘草五分薄荷三分水煎服黃連解毒湯治一切火熱表裡俱盛狂躁煩心口燥喉干大熱乾嘔吐血衄血熱甚發斑等症如非實火不可輕服黃連黃芩黃柏梔子各等分水煎服龍膽瀉肝湯治肝膽經實火實熱脅痛耳聾等症龍膽草酒炒歸尾各錢半黃芩酒炒澤瀉木通車前子生地酒炒生甘草各一錢水煎服五苓散治腹滿水飲水腫小便不通等症豬苓茯苓白朮各一錢澤瀉錢半肉桂五分研末兌入不見火水煎服歸脾湯蜜耆焦朮臺黨棗仁炒志肉去心甘草水泡當歸雲苓龍眼肉廣陳皮炙草生薑紅棗煎服
