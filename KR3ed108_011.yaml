body:
  text: 卷十一癰毒癰疽論王洪緒曰癰疽二毒由於心生蓋心主血而行氣氣血凝滯而發毒毒借部位而名藥宗經治而誤患盤而逾徑寸者紅腫稱癰癰發六腑若其形止數分乃言小癤按之陷而不即高頂雖溫而不甚熱者膿尚未成按之隨指而起頂已軟而熱甚者膿已滿足無膿宜消散有膿勿久留醒消一品立能消腫止痛為療癰之聖藥白陷稱疽疽發五臟故疽根深而癰毒淺根紅散漫者氣虛不能拘血緊附也紅活光潤者氣血拘毒出外也外紅里黑者毒滯於內也紫暗不明者氣血不充不能化毒成膿也膿色濃厚者氣血旺也膿色清淡者氣血衰也未出膿前癰有腠理火毒之滯疽有腠理寒痰之凝既出膿後癰有熱毒未盡宜托疽有寒凝未解宜溫既患寒疽酷暑仍宜溫暖如生熱毒嚴冬尤喜寒涼然陰虛陽實之治迥別閲古書總未詳因立其旨備覽焉諸疽白陷者乃氣血虛寒凝滯所致其初起毒陷陰分非陽和通腠何能解其寒凝已潰而陰血乾枯非滋陰溫陽何能厚其膿漿蓋氣以成形血以華色故諸疽平塌不能逐毒者陽和一轉則陰分凝結之毒自能化解血虛不能化毒者尤宜溫補排膿故當潰膿毒氣未盡之時通其腠理之藥仍不可緩一容一縱毒即逗留一解一通毒即消散開腠理而不兼溫補氣血虛寒何以化膿猶無米之炊也滋補而不兼開腠僅可補其虛弱則寒凝之毒何能覓路行消且毒甚者則反受其助猶濆粟以助盜糧矣滋補不兼溫暖則血凝氣滯孰作釀膿之具猶之造酒不暖何能成漿造飯無火何以得熟世人但知一概清火以解毒殊不知毒即是寒解寒而毒自化清火而毒愈凝然毒之化必由膿膿之來必由氣血氣血之化必由溫也豈可涼乎況清涼之劑僅可施於紅腫癰癤若遇陰寒險穴之疽溫補尚虞不暇安可妄行清解反傷胃氣甚至陽和不振難潰難消毒攻內腑可不畏歟蓋脾胃有關生死故首貴止痛次宜健脾痛止則惡氣自化脾健則肌肉自生陽和轉盛紅潤肌生調和補氣養血之劑仍以犀角羚羊連翹等性寒之藥始終咸當禁服癰之與疽截然兩途陽症為癰陰症為疽治法迥別世人以癰疽連呼並治貽害無窮古今方書雖有陰陽虛實之分治法難期盡善惟王洪緒先生別號林屋山人所著外科全生集一書乃其世傳祕本剖析陰陽虛實之理至精且備不施升降不用刀什經歷四十餘年用藥從無一誤開卷了於指掌可以不學而能書只前後兩集其價甚廉板存江南省城湖南湖北坊間間亦有賣各宜購置一部不惟自便亦可濟人留心瘍醫者尚毋忽諸癰毒治法凡患色紅腫痛根盤寸余者是癰毒發三四日尚未作膿以洞天嫩膏貼之內服醒消丸熱陳酒送下三錢即止其痛夜間得睡次日皮即起皺再服全消如過四五日將要作膿亦服醒消丸腫消痛止如作膿腫脹未破者用代刀散酒服即穿外貼洞天膏數日收功如根盤數寸者在背心腦後腰腹肚腋陰囊等處險要之地用五通丸醒消丸早晚輪服一次用敗毒湯送下皮皺痛息若已穿破用托毒散醒消丸早晚輪服自有奇效如根盤不滿一寸亦紅腫者名癤用蟾酥丸梅花點舌丹即愈此林屋山人經驗方也癰毒諸症肺癰方見肺部腸癰腸癰有生於腸內者腹內脹急大小便牽痛如淋轉側搖之如水聲潰後則膿從大便出有生腸外者肚臍腫痛作脹或一足彎曲口有臭氣或膿自臍出甚則腸穿有蟲自臍中出勢難為計初起宜用牡丹皮散以消之潰爛則用參耆內托之劑牡丹皮散丹皮五錢苡仁一兩栝蔞仁去油二錢桃仁去皮尖二十粒水煎服此孫真人千金方也又方多服六一散見內外備用諸方膿血從大便出膿盡即愈至神至穩之方也又方皂角刺一兩至少八錢酒煎至七分溫服膿血從大小便出而愈不飲酒者水煎亦可又方大黃炒朴硝各一錢丹皮白芥子桃仁各二錢空心煎服小腹堅硬而熱按之則痛肉色不變或紅赤微腫出汗畏寒小便亦多脈緊實而有力服此神效肚癰肚腹生癰即腸癰也照上腸癰各方治之臍癰方見肚腹部懸癰方見海底部對口方見頸頂部發背搭手均見背部魚口便毒方見癰疽門橫痃症遍身肢節生瘡此名疳蝕因風寒所搏氣血凝滯故也用蠶繭每繭一個入白礬五分火煅過之後每礬一兩另加陀僧五錢白芷一錢研末用蜜調敷筋骨疼痛潰爛生瘡此因誤服輕粉及丹石諸藥以致毒凝筋骨日久不愈查解救諸毒門輕粉毒方治之身上忽然紅腫遊走不定或痛或癢此丹毒也照後遊風丹毒各方治之身上疙瘩如塊如核此流注也與上游風丹毒忽然發者不同照陽疽門流注方治之疔瘡凡疔瘡好而復發此疔根未出故也若不急治再發則根深難治有拔疔根法見後疔瘡發之最速有朝發夕死隨發隨死有三日五日而不死至一月半月而終死者其毒最烈或發寒熱或發麻林或嘔吐或煩躁或頭暈眼花或舌硬口乾或手足青黑或心腹脹悶或精神沉困或言語顛倒此皆生疔之症其形或大或小或長或圓其色或白或黃或紅或紫或有紅絲名色甚多治法則一倘辨別不清以生黃豆令本人嚼之如無豆腥之味即是疔瘡疔瘡多生暗處或痛或不痛或癢或不癢發時人多不覺若不早治最易誤事有發寒熱數日而後生者有當時生者初起如粟米大或大小不一如發寒熱及麻癢嘔吐等症即於遍身留心尋認凡須發眼耳口鼻肩下兩腋手足甲縫糞門陰戶等處更宜細看一日須看數次有則照方醫治若前心坎後背心有紅點者即照後羊毛疔方治之如尋覓不見取甑中氣垢少許納口中必有一處痛甚即知疔瘡所在須急宜刺出惡血以見好血而止諸瘡及刀鐮疔忌用刀針余疔不忌如毒重者急服護心散見癰毒諸方或菜子油一碗真麻油亦可以免毒氣攻心若服菊花飲亦可蜘蛛拔毒法先將疔頭用瓷片刺破尋活蜘蛛一個越大越好放疔瘡上蜘蛛一見自能奔往吸拔其毒少時蜘蛛不動即取放冷水中自活如疔未愈可用蜘蛛再行吸拔或另取蜘蛛用之以毒盡為止無論疔在何處雖毒重痛極不省人事命在垂危立可回生此急救第一良法凡手指生蛇頭瘡及毒蛇毒蟲咬傷皆可照此拔毒菊花飲白菊花葉連根用捶取自然汁一茶盅滾酒兌服用酒煮服亦可不如生汁為妙毒重者宜多服渣敷患處留頭不敷蓋被睡臥出汗其毒自散無論生在何處足欲氣絶亦可起死回生至穩至便至靈諸方皆不及此不可遲疑自誤無葉用根如無即用藥店中乾白菊花四兩少則不效甘草四錢酒煮溫服亦可大戟膏見癰毒諸方敷之即愈再發再敷無不神效地丁飲紫茶地丁一兩白礬甘草各三錢銀花三兩煎服各疔俱效有人生紅絲疔已走至乳旁服之立愈真神方也蔥礬散明礬研細三錢蔥白七個二味共研爛分作七塊每塊以熱酒一鍾送下服完即睡蓋被取汗如無汗再服蔥頭湯一鍾少頃汗出如淋其病若失此方不但治疔一切惡症皆治初起未成膿者更妙煙油膏用煙桿中煙油厚敷四圍留頭不敷少刻疔破出水而愈奇效如有紅絲者用煙油離絲三分處敷之絲即不走又方黃色溏雞糞厚敷四圍將疔頭挑破不敷極效又方生黃豆嚼爛敷之極效頭面諸疔救唇湯紫花地丁金銀花各一兩白果二十個生甘草知母各三錢水煎服至重三劑必愈此方治頭面口角疔毒俱效唇疔更妙又方一人唇口生疔七個頭面如斗心悶神昏百藥不效後有人云此名七星趕月用蛔蟲搗爛敷之頃刻瘡口流出黃水腫消神清次日全愈如無蛔蟲以五穀蟲一錢瓦上焙研末白礬三分蟾酥三分以燒酒溶化共調勻敷疔上少刻疔亦破流毒水而愈又方凡口唇生疔看大腿彎中如有紫筋用銀針刺出血即愈有人不知疔在何處但唇內癢極須臾半面腫硬痛甚見腿後起有紫筋刺之立效又方雄雞冠血點上其效如神又方大蝦蟆一個取肝貼之立消兼治面上生疔對口疔等證又方生蜆去殼搗融敷即消又方烏色草魚去鱗取皮切片貼之隨貼隨干干則另換換至數十次即破口而愈矣紅絲疔此疔流走最快生於足者其紅絲漸長至臍生於手者紅絲漸長至心生於唇面者紅絲漸長至喉至則不可救矣手足兩處可用頭髮離絲一二寸遠緊緊捆住並將絲頭刺破或用燈火或用艾火在絲頭燒之絲即退散而愈不散再燒以散為度其效如神或照各前方治之刀鐮疔疔形如韭葉寬長一二寸肉色紫黑者是忌用針刺用前蔥礬散服之並溏雞糞敷上即愈遲則毒歸心臟致命羊毛疔初起頭痛身發寒熱前心坎後背心有紅點如疹子形先用針挑破取出羊毛再用明雄黃末二錢青布包扎蘸熱燒酒於前心坎瘡上一二寸外四圍團團擦之漸漸擦入瘡眼其毛即奔至後背心再於背心照前擦之其羊毛俱拔於布上即埋入土中內服菊花飲地丁飲俱見前護心散見癰毒諸方俱可羊毛疔瘤此症忽起一泡其形如瘤內有羊毛亦名羊疔初起或頭痛或發寒熱即是用黑豆蕎麥各等分研末挑破敷之毛落即愈內服菊花飲亦可疔瘡出血不止飲真麻油一大碗即止或飲菜子油更妙疔瘡走黃凡疔毒腫痛神昏甚至不省人事謂之走黃急用芭蕉根捶汁服之立可回生或照前菊花飲地丁飲服之均妙拔疔根法疔毒重者好而復發此疔根未出故也若不急治再發則根愈深而難治矣萆麻子去油一粒乳香一分去油共搗爛用飯和為餅貼之少時疔根自出又方蔥白煉蜜捶融將疔刺破敷之如人行五里其根自出又癰毒諸方門紅膏藥方拔疔最效楊梅瘡此瘡最毒治不得法多致纏綿不救且最忌服輕粉服則毒留筋骨難以斷根抑且不能生子如已服者可用解輕粉方見解救諸毒門治之紅棗丸紅棗三斤以杉木作柴煮之煮熟剝皮去核多取燒過杉柴枯炭磨細末和棗肉搗勻為丸如彈子大每日任意食之不可間斷雖瘡毒滿周身或服過輕粉及一切丹石隱藥致成結毒穿頂穿鼻潰爛不已多年不愈者服之大有奇效至穩到靈此治楊梅結毒第一方也愈後再服一二月斷根紅棗能解丹石之毒杉木專祛濕熱之侵是以奏功如反掌也忌醋與辣椒又名青椒及一切發物半年外用蝦蟆散又方土茯苓一兩木通白蘚皮防風各一錢宣木瓜薏苡仁金銀花各二錢皂角子四分水煎服每日服一劑以愈為度外用蝦蟆散見癰毒諸方敷之無論久遠輕重潰爛穿頂屢試如神百發百中最忌食茶不服藥則不忌並忌醋與辣椒及一切發物半年終身戒食蝦蟆如不服藥即服前紅棗丸外用蝦蟆散敷之亦可又方大黃一兩穿山甲炒川厚朴白芷大楓子仁花椒甘草各三錢水煎兌酒服毒氣從大便出七日全愈忌食一切與上同惟不忌茶與蝦蟆無論輕重屢試神效不可輕視又洗藥方生甘草金銀花蒼朮白芷藿香槐花各二錢共煎水洗輕者內服前方外用此藥洗之即愈避楊梅瘡方凡生楊梅瘡在傍伺候親近之人難免傳染用雄黃川椒去子各五分杏仁蒸熟去皮尖炒百粒研末燒酒打麵糊為丸梧桐子大每服十五丸開水下於病人初發時服即可免也瞎眼瘡上高下深顆顆纍垂如瞎眼其中帶青頭上各露一舌者是也用回陽玉龍膏真君妙貼散見阻疽諸方敷之必效如仍不愈用蝦蟆散見癰毒諸方門治之或後陰疽方更妙貓眼瘡瘡似貓兒眼有光彩無膿血痛癢不常飲食減少名曰寒瘡照上瞎眼瘡治之天蛇毒有人遍身潰爛似癩非癩呼號不已一僧視之曰此天蛇毒非癩也用秦皮又名梣皮又名樳皮又名石檀又名苦樹又名苦瀝煮汁一斗日服十餘碗三日全愈又草花間蜘蛛螫人為露水所濡乃生此瘡者亦名天蛇毒瘡可以此方治之天蛇大如箸而扁長三四尺色黃赤人遭其螫不治必死蛇形瘡人生瘡如蛇長數寸外用雄黃麻油調敷內用雄黃沖酒飲即愈纏蛇瘡又名纏腰龍此丹毒也生腰下長一二寸或碎如粟或紅腫堅硬有燈火向兩頭燒五次並用雄黃外敷內服極效又方陳石灰麻油調敷即愈又方舊糞桶箍篾燒灰麻油調敷其效尤速或照遊風丹毒各方治之魚脊瘡多生筋骨之間堅凝作痛初起白疱漸長狀如魚脊破流黃水此阻症也初起時無論已潰未潰宜用隔蒜灸法見癰毒通治門以通陽氣外用回陽玉龍散真君妙貼散見癰疽門敷之或用後阻疽諸方更妙魚臍瘡窄而長腫而黑者是此因風毒蘊結或氣血凝滯或誤食人汗所致用臘豬頭骨燒枯研末生雞蛋白調搽數日即愈蜂窠瘡不拘何處形如蜂子窠者是用罐鑿一小孔納碎布數團火燒取煙從小孔出向患處熏之二三次即愈又方愈而復發者用鉛粉硃砂和蜜調敷神效蜘蛛瘡形如蛛網癢不可忍用豆腐衣又名豆腐皮燒枯存性香油調搽蚯蚓毒此症鬚眉皆落形似麻風或夜間身上有蚯蚓聲用食鹽數斤熬湯洗身數次內服淡鹽水一二碗極效不可誤為麻風如真是麻風令病人站立打銅鐵之風爐火旁望其臉紅者是麻風臉緑者非也兩手大二指合攏處肉平塌者亦是螞蟻毒形如珠顆成片成串或紅或白破則流水好而復發用穿山甲瓦上焙枯研末香油調敷雖多年不愈者無不神效曜螋瘡曜螋又名搔甲子俗名偷油婆又名蟑螂其瘡初如粟米漸大如豆更如火烙漿泡疼痛至甚以春茶葉研末麻油調搽效又方燕子窩泥和豬膽加酒調搽或照後瘭疽毒各方治之葡萄毒一小兒年五六歲額上忽起一顆紫色光亮形如葡萄頃刻周身皆有一老翁見之云此乃葡萄疔毒一見鼻血即死因小兒飲食言笑如故病家不信至夜半忽鼻中血如湧泉而死又一男子手腕上忽起一粒如紫葡萄半日亦見鼻血而死俱無藥救附録於此以候博識者立方施治又一女子年十四手腕軟處生物如豆半在肉中紅紫色痛甚百方不效後用水銀四兩白紙二張將水銀揉擦之三日自落合而觀之前症似可照此施治再前症既名疔毒又見鼻血其為熱毒內蘊無疑水銀擦之如不見效應急照前癰毒諸方門內菊花飲菜油飲二方治之或可救也並用吳茱末熱醋調敷兩腳心一日一換此引熱下行至妙法也瓜藤瘡一身十餘個即是尖尾芋茄子葉五月艾蔥姜共搗爛醋煮擦敷瘭疽瘡手足肩背纍纍如豆如米大者如梅如李或赤或黑或白或青初生有痂一層痂內有核核有深根能爛筋骨毒入臟腑即死此熱毒也先將痂挑破用醋和微溫淘米水洗淨以芙蓉散見癰毒諸方門治之自流毒水內服真菜子油麻油亦可極效又方燕子窩連泥帶糞和初生百日內男孩糞調搽或真菜子油或麻油亦可極效此孫真人千金方也又方豬膽汁敷之流出毒水極效又方鯽魚長三四寸者一條亂髮一團如雞蛋大豬油半斤同煎膏用罐裝好放水中拔其火氣三日後敷之極效又方男子尿桶中白霜敷之立刻清涼止痛干則再敷又方鍋黑煙以燒草者佳燒煤炭者不可用桐油麻油菜油亦可調搽即愈又方照遊風丹毒門防風升麻湯菜子油六安州茶葉各方治之至穩至效天疱瘡形如水泡者是用蓮蓬即蓮房燒枯研末井泥調敷神效或用荷花瓣貼之或照後黃水瘡各方及癰毒諸方門松香散雞腰膏治之更妙又遍身生燎泡如甘棠梨破則水流復生內有小石一片方見卷十六奇病門黃水瘡初如粟米癢而兼痛破流黃水浸淫成片流處即生由脾胃濕熱外受風邪相搏而成發於心下者若不早治難救宜用青蛤散蛤粉煅一兩真青黛三錢熟石膏二兩輕粉黃柏各五錢共研細末先用香油調成塊次用涼水調稀塗之神效並治鼻中生蟲又方蠶豆殼瓦上焙枯研末加黃丹少許以真菜油調敷麻油亦可干則再敷三日即愈屢試如神又方紅棗燒炭八錢飛黃丹松香枯礬各四錢上共為末麻油調搽立效又方輕粉樟腦各二錢大楓子去殼川椒各四十九粒杏仁一錢共為細末和桕油燭搗勻敷之功效如神桕油又名卷油即烏桕子油也或用癰毒門松臘散蘆薈散燕泥散雞腰膏均極神效熱瘡其色紅而作痛者是用男子尿桶中白霜敷上立刻消涼止痛干則再敷或照上瘭疽各方治之亦可漆瘡杉木屑煎水洗用活螃蟹黃滑石和蜜調敷甚效此林屋山人方也有漆之處先嚼川椒敷鼻孔可免漆瘡又方貫衆焙枯研末香油調敷或用韭菜搗汁敷或用白羊乳搽之均效又方白果樹葉煎水洗立刻消三次全愈或用新荷葉煎水洗亦極神效又方活螃蟹捶汁摘入使毒水流出自愈如已腫爛取生蟹黃塗之其爛更甚數日即愈若再不效用生大黃三錢枳殼二錢水煎服二劑腹瀉而愈不瀉加芒硝二錢以瀉為度緣漆瘡火盛則重非瀉不能愈也癬瘡凡癬內有蟲治好復發非藥不靈蟲未盡也發後再治無不愈矣頭面生癬如入眼內即成大麻風矣宜急治之新鮮皂角刺一二斤搗爛熬至將成膏時加好醋熬稠將癬剃破敷之日剃日敷自有毒水流出流盡再敷十日雖數十年陰頑惡癬無不斷根此林屋山人屢試神方又方斑蝥五分生半夏末一錢雞蛋油調搽數次則痛必愈再發再搽雖多年惡癬無不斷根取雞蛋油法見癰毒諸方又方青礬炒成塊研細末加豬膽汁和融再炒再研用老薑一塊切開蘸藥擦之大痛即愈再發再擦雖多年頑癬亦可除根又方大蜂窠一個以白礬末填孔內火煅以礬融化為度研勻將癬抓破以牙硝水調搽一二次痛則必愈再發再搽必能除根又方荔枝核磨醋將癬抓破擦之雖痛不防數日即愈再發再擦斷根又方用新棉花扯成如紙薄一層量癬寬大將棉花鋪貼用火向花上一點頃刻燃盡當即止癢而且並不焦湧不須用藥極簡易極效驗只需一次全愈次年再發照治一回斷根又方珠蘭花葉時時擦之半月斷根小兒乳癬小兒初生症類疥癬先起手足次遍腹背纏綿不已先用姜蠶不拘多少去嘴研末煎湯浴之或一日一次或一日二次毒出再用真青黛黃柏枯礬雄黃百藥煎硫黃各等分研末濕則干搽干則香油調搽以愈為度名換形散皮疰杏仁去皮尖炒黑研如醬搽上即愈或照癬瘡各方治之疥瘡疥有五種乾疥蟲疥濕疥砂疥膿疥俗名膿泡瘡又名黃膿泡是也由各經蘊毒日久生火兼受風濕而成數日延及遍身最易傳染或癢或痛癢者內必有蟲不獨蟲疥然也治法雖多有效有不效有此用之而效彼用之而不效者後列各方五種疥瘡皆治古方有熏藥一法瘡雖易愈然毒盡歸腹定成鼓脹危症切宜戒之如已成鼓脹查癰毒雜治門本方治之黃香散硫黃川椒各五錢共研末加薑蔥頭各五錢和生豬板油搗融用布包好烘熱時時擦之其效甚速又方整塊川厚朴以真香油磨濃如醬加枯礬少許搽之數日退盡此膿窠疥瘡神方也合掌散硫黃一兩鐵鏽一錢紅砒六分共研極細如灰面狀蔥汁調敷大碗內周圍敷勻勿厚勿薄以碗復瓦上取艾放碗下燒熏熏至藥干敲之如空碗聲為度取藥再研細每藥一錢可敷數次臨用時以右手中指黏滿香油再黏藥搽入左手心合掌摩擦止有藥氣不見藥形然後以兩手擦瘡每日早晚兩次三日掃光再擦三四日即不發矣屢試如神並治陰囊濕癢二美散吳茱萸硫黃各等分研細如麵粉照上合掌散法摩擦每日二次愈後再擦三四日專治膿疥神效此方與上合掌散均林屋山人經驗方也又方油胡桃又名核桃紅棗肉各一兩水銀五分冰片不拘多少真小磨麻油豬油各三四錢共搗融用綢包裹擦之擦過即能止癢止痛時向鼻中聞之數日即愈屢試神驗又方田螺煮熟酒炒食可除一身疥瘡又方松香三錢枯礬五倍子各一錢以上共研末加頭髮三錢生豬板油五錢用青布包好向燈火上燒之有油用碗接住候冷用針挑破疥瘡將膿擠出用茶洗淨勿沾生水候乾取油搽抹不過三日全愈永不再發又方硫黃整塊放銅器內燒燃存性倒在地上候冷捶碎忌鐵器加水銀麻油拌勻用布包好烘熱時時搽之二三日即愈簡便而極效驗又方核桃仁連皮用一兩大楓子仁五錢水銀三錢共捶極融爛先用此藥一二錢不可過多放在手心中擦勻將左手心在肚臍眼上順著摩擦不可倒擦擦至手心發熱即止再用此藥一二錢放右手心中擦勻在肚臍眼上照前摩擦擦至肚腹滾熱即止每日一次瘡上不擦輕者二日即愈至重三日斷根有人遍身膿疥時發時愈纏延三載百藥不效用此三日而愈從此斷根此治五種疥瘡第一神方一切濕熱瘡疾皆治珍之寶之愈後宜食愈瘡棗見後癰毒諸方以補脾土或另服健脾之藥亦可如恐水銀入腹為害病愈體壯之後每早用真川椒要開目的七粒滾水空心吞服連服三日其水銀自入椒內由大便而出或用真川椒研末鋪床上被蓋睡臥水銀即由毛孔而入椒內矣此法最妙凍瘡橄欖核燒灰存性研末加輕粉少許香油調搽神效又方以蚶子殼煅研極細以麻油調搽濕則乾摻數日全愈此祕傳也又方陽和解凝膏見阻疽門貼一夜即愈潰爛者貼三張收功此林屋山人方也又方白芨磨敷即愈又方馬糞煮水泡之半日即愈又方蘿蔔菜橘皮煎湯先洗用蟹殼燒灰研麻油調敷又方暑伏時搗大蒜為泥敷在上年生過凍瘡之處過一日一夜洗去遲三四日再敷一次若連日敷之則肉上起泡破皮矣本年冬雖極寒亦不生凍瘡凡小兒手足各處雖未凍過亦敷兩次可以耐寒此法可傳船伕腳伕亦一德也大麻瘋此證各方凡殺蛇治愈者務戒殺放生方能全愈麻瘋者身上必有麻木之處針之不痛然後發現於外若不麻木則非麻瘋遍身雖麻木數月即發現於外雖重易治若年久病深壞形變貌鼻塌肉崩手指脫落足底穿爛則難治矣江西肖曉亭著有麻門全書二本專治麻瘋所論病源最為透徹其治法亦極神妙板存廣東省城雙門底刻字店麻瘋諺云正報似非妄談若自信罪愆難逃果能矢念為善人力可以回天即自信並無過惡亦當力行善事所謂善事者守禮守法常存善念見善必為尤宜謹戒殺生並須放生果能如此不但病易愈且為後嗣種福所益多矣曾克廣五服方昔在萬安縣百嘉地方遇一良醫善治瘋癩惡疾活人甚衆余甚奇之具金百餘求得此方歸家後適鄉鄰有患此症者依方用之數月而愈頻年以來遠近用此方者十愈八九屢試屢驗真神妙方也初服方羌活蒼朮荊芥防風銀柴胡玄參赤芍黃芩白蘚皮枳殼銀花甘草水煎服四劑次服方羌活細辛白芷生地防風知母黃芩川芎甘草水煎服二劑三服方大黃朴硝銀花桃仁枳殼黃連黃柏黃芩玄參水煎三劑四服方荊芥防風川烏童便浸後米汁煮白附子薑汁炒天麻殭蠶薑汁蒸蒺藜水洗淨炒去刺獨活玄參大麻仁洗去土炒苦參赤芍黃柏銀花甘草枳殼大楓子水煎服十劑以上依次空心服俱不加引五服方玄參枳殼白芷各二兩赤芍銀花各一兩火麻仁蒺藜大楓子各一斤獨活二錢制川烏一個北防風十兩以上共研細末蘄蛇十二兩去頭尾用熱酒浸二三日秋冬浸五六日浸松後去骨蒸熟焙乾研末和前藥蜜為丸每日早午晚三次各服四錢茶送下皂刺散一人有麻瘋惡疾雙目風盲眉發俱落鼻梁倒塌遇一異人傳方用皂角刺三斤燒枯蒸一時久曬乾為末每日飯後服二錢大黃煎濃湯調下半月後眉發再生目明肌潤白花蛇丸丹陽上舍得麻瘋疾一僧療之而愈以數百金求方不肯傳館賓袁生窺藏納衣領中因醉而竊録焉用者多效白花蛇一條烏梢蛇一條並去頭尾生用防風蟬蛻去泥土生地川芎苦參枸杞槐花銀花以上各二兩白蒺藜全蠍醋浸一日去鹽味北細辛蔓荊子威靈仙何首烏胡麻仁炒香金毛狗脊川牛膝烏藥天花粉川連黃芩梔子黃柏連翹牛蒡子炒以上各一兩漏蘆半斤去苗洗淨四兩芥穗一兩五錢上頭面者加白芷一兩肌膚潰爛者加大皂角一兩共研末米糊為丸桐子大每服五六十丸茶送下午後臨臥各一服白鹿洞方治大麻瘋眉毛脫落手足拳攣皮骨潰爛唇翻眼綻口歪身麻肉不痛癢面生紫斑並治如神真蘄蛇去皮骨酒浸焙乾八兩獨活蘇薄荷全蠍洗去鹽蟬蛻去足殭蠶炙去足赤芍以上各六兩楓子肉去淨油天麻酒浸防風白芷酒浸金毛狗脊去毛酒浸白菊花漢防己何首烏忌鐵當歸酒浸苦參以上各四兩金頭蜈蚣炙去頭足穿山甲燒大川芎梔仁炒連翹白薊以上各二兩共為末酒糊為丸梧子大每服七八十丸空心用好酒送下臨臥再一服忌氣怒房事油膩煎炒雞魚蝦蟹芋頭山藥糟魚肉鵝生冷酸食冬月亦不可烘火宜棉暖淨室坐定保守性命節飲食斷妄想服藥時宜仰臥令藥力遍行有功如不守禁忌徒勞心力亦無效也服此藥只宜食鴨鯽魚牛肉俱宜淡食祕傳漆黃蟾酥丹鮮螃蟹四個真生漆一斤真蟾酥明雄黃各二兩先將瓷壇裝蟹次入漆封口埋在土中十四日足方取開看二物俱化成水去渣淨將水入鍋慢慢火煮焙乾為細末方入雄黃蟾酥二味末攪勻瓷罐收之每日空心臨臥各一服好酒送下二錢不過一月其瘡全好除根妙不可言治大麻瘋如手取之妙況所費不多莫輕忽修合亦勿妄傳匪人祕之癘風方鎮江丁參領得此祕傳治之全愈又以醫治多人無不取效如神但患此症者眉毛若盡脫落其症難治若眉毛未脫雖手足節骨有塌損者皆可取效若初起未深之症百試百效也先用湯藥四劑每日一劑服完再服丸藥每丸一錢加楓子膏春秋八釐夏六釐冬一分湯藥方陳皮白芷苦參天麻秦艽川續斷防風荊芥羌活海風藤苡米牛膝當歸海桐皮蒼朮木香桂枝連翹甘草各三錢黑棗二枚生薑一片水二碗煎至一碗服渣再煎二次服丸藥方大胡麻小胡麻白蒺藜各一斤四兩苦參一斤防風荊芥各八兩當歸蒼朮各六兩苡米續斷牛膝各四兩共研細末水疊為丸每日早午晚三服每服三錢或二錢照數加楓子捻丸攪和以細茶送服楓子膏大楓子去殼取仁銅鍋內炒至三分紅色七分黑色為恰好太過無力不及傷眼炒後研成細膏如紅砂糖一樣用銅鍋器盛向火上熬四五滾倒在紙上放地上面以物蓋之聽用如上面黴變拭去仍照常用一年內切忌房事切忌食鹽犯之不愈並忌醬醋酒及一切雞魚發氣動風等物又方活蛇一條要粗如酒杯大竹刀破去腸雜切寸段豎起放瓦上以火炙之蛇段跌倒者無毒取炙存性不倒者勿用磨成粉拌入飯內與一遍身白毛鴨食之次日鴨毛盡脫以鴨殺之砂鍋內煮爛分作四五日食初食其腫更甚食至二三日後漸漸平愈雖潰爛不堪食之亦效此林屋山人經驗方也又方明淨松香數斤取甘淡泉水用淨鍋煮化不住扯拔即傾冷水內用手分扯候凝冷另換清水再煮再扯幾十次只以松香潔白水色極清不苦方可陰乾研極細用每料二斤日以白米作粥候溫入藥末和勻服飢則再食不可更吃硬飯忌一切油鹽葷酒果菜糖面第一渴勿吃茶以滾水候半冷調藥飲每日數錢半月後作嘔胸中嘈逆難過大便下毒必須多服不可中止遠年者一料即愈初起只需一斤生鬚眉舒筋骨矣一生忌食發物神效非常較前方尤簡便奇驗也又方桑皮大黃芒硝各一撮水煎於無風處日洗二三次如有蟲加鴿糞同煎如爛用琥珀末搽患處此神方也遊風丹毒名天火又名流火俗名風瘧風疙瘩是也此症身上忽然紅腫或大或小或痛或癢甚至遍身皆有遊走無定有初起白斑漸透黃色光亮皮中恍如有水脹墜破流黃水濕爛多痛為水丹又名風丹多生腿膝屬脾肺有熱而夾濕也又色赤而干發熱作癢形如雲片為赤遊丹屬血分有火而受風也又遍起小白泡無熱無痛遊走不定為冷瘼即冷丹由火毒未發肌膚外受寒鬱而致也又有腰間紅腫一道名纏腰丹又名纏蛇瘡方見癰毒諸方門又有雞冠丹茱萸丹兩種丹名雖多總屬心火三焦風邪而成其發甚速自胸腹起於四肢者順而易治從四肢起於胸腹者宜急治之遲則難治防風升麻湯防風升麻梔仁麥冬荊芥木通乾葛薄荷玄參牛蒡子甘草各一錢燈芯十莖水煎服大便祕者加大黃枳殼各一錢水煎服忌食魚腥雞鵝動風暖血之物犯則難治丹毒重者攻入心胃難救先服此藥以解內毒次用瓷針刺去惡血則毒隨血散至神至捷百發百中瓷什刺法取瓷器輕輕敲破取鋒利者一小塊用竹筷將筷頭破開橫夾瓷片露鋒於外將線扎緊以瓷鋒正對丹毒之處另用筷於瓷鋒筷上輕輕敲之其血自出不可刺深傷肉未愈不妨再刺以紅消腫散為度毒輕者不必刺又方如服上防風升麻湯不效即用四物消風飲生地三錢當歸二錢荊芥防風各錢半赤芍川芎白蘚皮蟬蛻薄荷各一錢獨活柴胡各七分紅棗二枚水煎服必能見功此消風毒要藥也又方清涼膏見湯火傷門敷之神效又方馬蘭膏治新生小兒紅赤遊風丹毒百不失一並治大人丹毒或兩腿濕熱伏於經絡皮面上不紅不腫其痛異常病者只叫腿熱他人按之極冷者此膏搽之立愈屢試皆驗馬蘭頭浙人謂之馬蘭頭他省不知呼為何名不拘多少冬季無葉取根亦可用水洗去泥搗爛絞汁以雞毛蘸汁搽之干則再換或調飛淨六一散搽之亦可又方蚯蚓又名曲蟺數條放碗中加白糖用碗蓋住半日後至遲一日即化為水搽之極效無蚯蚓用蜓蚰俗名鼻涕蟲亦可血風瘡疹子痱子均見遍身搔癢門斑症人有一時身熱即便身冷而滿體生斑如疹者乃火從外泄而不得盡泄於皮膚故鬱而生斑人盡以為熱也用寒涼泄火之藥不效有斑不得消而死者亦可傷也用玄參麥冬各一兩白芥子沙參各三錢升麻二錢白芷一錢丹皮五錢水煎服一劑斑勢減二劑斑紋散三劑斑影盡消矣此方妙在用玄參麥冬以消斑尤妙在升麻多用服二三劑升麻宜減半引元參麥冬以入於皮膚使群藥奏功而斑無不消也又傷寒門蝦蟆燕泥二方亦極效驗又周身發斑眼赤鼻脹氣喘毛髮硬如銅鐵方見卷十六奇病門白癜風又名白駁風多生頭面白如雲片者是用白鱔油搽之無則取白鱔曬乾煎枯取油搽之即愈又方土蒺藜子六兩生磨為末忌鐵器每服二錢一日二次開水送下外用小麥攤石上燒用鐵物壓出油搽之半月後白處現有紅點一月後斷根又方豬肝一副白煮不用鹽一頓食盡忌房事一月漸漸自愈並治紫癜風春季豬肝有毒勿用紫癜風即汗斑癭瘤漸長漸大軟而不硬方書云其種有五肉色不變為肉癭筋脈現露為筋癭筋脈交絡色紫赤者為血癭隨憂惱消長為氣癭堅硬不消為石癭有大如碗者有長而下垂者又有粉瘤漏瘤蝨瘤各種又有羊毛疔形亦如瘤者治法見前疔瘡門消癭五海飲海帶海藻昆布海蛤海螵蛸各五錢煎湯當茶飲甚效又方櫻桃核好醋磨敷即消初起者甚效又方石榴樹上寄生醋磨擦之極效生頸上者更效又方川黃柏海藻各一兩共為細末收貯每用五分放手心上以舌餂之一日三五次即消生頸上者更效又方黃藥子十兩好燒酒三斤共入瓶中封口用糠火煨一周時或鍋內蒸半日亦可將瓶放冷水中過七日後每日隨時少少飲之務使酒氣不斷無論生在何處皆效如神飲後時時照鏡消即勿飲飲多恐頸項細小也黃藥子又名黃藥以江西萬州産者為佳廣西慶遠府亦有肉瘤每夜將睡時用新熟熱飯敷上冷則另換每晚連敷三次久而自愈凡新起肉瘤如小彈子者治之屢見功效不可輕視血瘤甘草熬膏用筆蘸圈瘤四周又用芫花大戟甘遂等分為末醋調另用新筆蘸塗於甘草圈內務須離甘草一圈不可太近蓋藥性相反切勿誤用攙和塗後次日瘤當縮小再如前法塗三四次即愈愈後須請名醫服藥消散以免復發粉瘤用蜘蛛網纏住瘤根次日又換新蛛絲再纏約換四五次則瘤俱消內有結實小白粉用手取去不腫不痛又方天花粉一兩陳壁土五錢穿山甲川貝母去心各三錢共為末和勻摻膏藥不論何膏上貼之即穿出粉渣而愈漏瘤時出黃水好而復發癢不可忍查腿部臁瘡白油膏方治之蝨瘤此瘤其癢徹骨破開有蝨無數內有極大一蝨用針挑盡外貼玉紅膏見癰毒諸方自愈腋下癭瘤長靶壺蘆燒枯研末油調敷以消為度一人腋下生瘤如長壺蘆樣久而破爛用此敷之出水消盡而愈肉核真烏梅去核燒存性研末搽數日即消又方生蘿蔔皮貼之連貼數次即愈如再不愈照癰疽門惡核方治之又遍身肉出如錐痛而且癢方見卷十六奇病門疣瘊又名瘊子拔之則絲長三四寸薑汁和好醋時時搽之有人生疣瘊屢治屢發照此治之三日斷根又方地膚子白礬煎湯洗數次即消立效又方松香柏樹枝上油和勻敷之過夜即落又方苦菜折之有白汁出點之自落又方牛口涎時時塗之即落肉痣小黑子是用針挑破以鹼水泡石灰點之即消血痣初起如痣色紅漸大如豆觸破時流鮮血用黃鱔血同蒜汁好墨汁塗之血出甚者內服涼血地黃湯癰毒雜治癰毒宜戒一戒走泄凡患癰毒紅腫潰爛或已生管無論久近大小最忌走泄真元如有遺精及房事不謹醫治最難見功必先將遺精病症醫治全愈仍令夫婦分臥謹戒房事然後按方施治自易收功一戒汙穢凡大癰惡毒一經汙穢腫痛更甚難以收功婦女産後及行經時切戒近前以免汙穢若婦女自患癰疽瘡癤遇行經時醫治鮮效必俟行經後始能見功一戒熏罨諸瘡有熏罨一法瘡雖易愈然毒盡歸腹定成鼓脹難治惟神燈照法不忌一戒沐浴凡濕熱諸瘡膿血淋漓或癢或痛莫不以沐浴為快然浴則濕氣更重難以速痊惟有溫泉之處不忌毒氣攻心凡患瘡毒心中難過或欲嘔吐或神昏不語此毒氣攻心也急用護心散見癰毒諸方時時服之服至大半嘔止神清再服醒消丸見同前以平其勢護心散如制不及急服白砂糖三四兩亦可又方癩蝦蟆破開蓋心口上亦妙無癩蝦蟆以雞亦可終不如蝦蟆之妙瘡痛不寐有人遍身生瘡疼痛手足尤甚並黏著衣被不能安睡用菖蒲二三斤曬乾為末摻臥席上仍以被蓋臥且不黏衣又能得睡五六日即愈又方大蒜膏糞坑土見癰詛諸方均效瘡癢難忍金銀散專治惡瘡癢極硫黃一兩入銅器內在燈火上熔化切忌放灶火及火爐上加頂上銀硃五錢搗勻離火倒油紙上候冷研極細如香灰細不細敷之作痛好醋調敷其癢立目如破爛孔內癢極者用白蜜調此藥敷之神效白花膏專治惡瘡癢極見骨者香油一斤青槐枝一百段陸續入油熬極枯黑去槐枝瀝盡渣加黃醋一兩鬥鉛粉一兩半離火微溫再下制乳香制沒藥製法見藥物備要門白花蛇無則用烏稍蛇亦可兒茶各三錢潮腦一兩真麝香一錢少用亦可共研極細末加入攪關成膏浸水中三日拔出火氣再聽用以上二方乃林屋山人祕法如一時製藥有及切忌手抓用鹽連瘡頭薄薄敷之已破者用鹽敷於四圍又方皂角要整片的火上烘熱尉之即止已破者艾葉煎湯洗之甚效瘡自走動硃砂一塊研末取倒回蟲數條共放手心研如泥敷瘡上即時收回原處倒回蟲多生舊牆基鹹土中穴如螻蟻穴其蟲倒行名為倒回蟲撒土尋之自見此方傳之西域老僧屢試屢驗趕移瘡毒移山過海散治毒生於致命處用此移於無害部位甚效雄黃小麥面新鮮蚯蚓烘共為末用好醋調勻漸漸敷於致命處半邊自能移過不致命處移毒散凡毒發於骨節間用此藥移之或上或下使無殘疾之患屢試屢驗白芨一兩六錢紫花地丁八錢烏骨雞煅硃砂雄黃輕粉各一錢五倍子二錢焙黃大黃二錢豬牙皂角八分共為末用好醋調敷毒之上截即移至下半截仍照人虛實內服藥餌趕毒散又名沖和散凡大腿內外及兩膝貼骨等處漫腫無頭皮色不變微覺痠痛攣曲乃感受風濕所致若不急治變生貼骨等疽難以收功須用此藥祛寒逐濕透出外絡提移他處出毒即有成管成漏亦能逐漸收功此方與移毒散相等屢用皆效紫荊皮五兩炒赤艾二兩炒香白芷一兩曬乾切忌火炒獨活一兩五錢炒石菖蒲一兩五錢曬乾切忌火炒以上共磨為末篩細以好酒和蔥頭五個煎滾調搽不必留頂一日一換以消腫不痛為度瘡毒腫痛不破隔皮取膿法凡患瘡毒腫脹不穿疼痛難受而患處難以用刀或畏懼開刀者俟膿熟時用驢蹄皮一兩要腳底剔下者用砂炒蕎麥麵一兩草烏四錢去皮研共為末和勻加食鹽五錢水糊作薄餅瓦上灸微黃色再研細以醋調攤紙上貼之其膿水從毛孔而出或瘡旁好肉之處自會穿破出膿最為奇驗又方公老鼠糞兩頭尖者是和紅糖搗融敷即破口出膿而愈極效又方蠶蛾繭即出過子蛾之繭一個燒灰存性用酒調服瘡頭自破切不可多用如用二三個即生二三口矣又紅膏藥代刀散咬頭膏均見癰毒諸方俱效瘡口出血蜣螂查藥物備要便知燒枯研末用油調搽極效此孫真人千金方也又方飲真麻油一大鐘甚妙真菜子油更佳或用黃芩酒炒一二錢煎服亦可瘡肉飛落此因艾火灸瘡痂落瘡內肉片如蝶飛出痛不可言是血肉俱熱怪症也朴硝大黃各五錢為末水調服一泄即愈體虛弱忌服飲真麻油一碗並用吳茱萸末醋調敷腳心瘡生胬肉如飯如菌黑龍丹治一切惡瘡怪毒因擠膿用力太過以致胬肉突出小或如飯粒大或如梅如菌翻花紅赤久不縮入此名毒根乃損傷氣脈使然人多用降藥爛去其痛異常體弱難受且爛去復生經年纍月終不痊愈用大熟地切片烘乾炒枯一兩真烏梅肉炒成炭三錢烏梅多有以李假充用之不效必以自制為佳共研勻碾極細摻膏藥上不論何項膏藥貼之不過三五日胬肉自收用收口生肌藥完功屢試神效凡陰虛脫肛諸藥不效者用此丹以防風升麻各一錢煎湯調搽立即收上再服補腎之藥後不再發亦奇驗也永戒食鵝又方先用平安餅貼上再以陽和解凝膏見癰疽諸方加上貼之無此膏不貼亦可一日一換輕者二三日重者六七日不癢不痛毒根自落較前方更佳貼餅時內服千金托毒散俟毒根落後服保元四物二湯收功平安餅真烏梅肉一錢輕粉五分和勻研不見粉亮為度如硬加白蜜少許不可用水研製成膏為餅輕者只用此餅貼之不加陽和解凝膏亦可或只用烏梅肉燒存性研末候冷敷之過夜即愈更為捷速又方馬齒莧燒枯研末以豬油調敷輕者甚效永戒食鵝瘡中生管退管丸廟宇內陳年舊琉璃底三錢麩皮拌炒透辰砂水飛另研人指甲麩皮拌炒真象牙末各一錢蟬蛻一錢五分炒制乳香制沒藥製法見藥物備要枯礬各八分各研細末共和勻用黃蠟三錢熔化入藥攪勻乘熱作速作丸如緑豆大初服十粒逐日漸加一粒加到十六粒以後不必再加酒送下患上身者加川芎六分患下身者加牛膝六分遠年者服一料全愈近年者半料收功雖患至二十年者亦效屢試如神忌食蔥與有管之物百日並戒走泄查前癰毒宜戒便知又方鱉甲炒為末麻油調敷其管即出甚效管生年久者其功稍遲又方京城磠砂膏貼之淺者七八日即出深者半月即出無論久近皆效瘡中生蛆一方先用濃茶洗淨再用麻油腳汁敷上甚效諸瘡因蒼蠅飛聚而生蛆者用寒水石細末摻之如香灰細不細摻之作痛如無蒼蠅而生蛆者系陰濕所化也用海參燒枯研極細末摻之或用皂礬飛過為末摻之其蛆即化為水諸物入瘡驢馬汗入瘡或毛或尾入瘡或聞驢馬汗氣而發者同治急宜刺出紫血以真烏梅嚼爛塗之若腫悶發熱則宜防毒入腹以致不救急用真菜子油或真麻油飲之或用醇酒煎馬齒莧飲之盡醉為效但莧性寬滑凡瘡潰未合氣血未復而又受以汗毒必量人壯弱用一兩或五錢切勿太過或用護心散金蟾散見癰毒諸方治之又方粟米梗燒灰淋汁洗之出盡白沫即愈極效又方冬瓜皮曬乾研末敷並熬湯洗之驢馬糞入瘡照驢馬汗入瘡各方施治或用蝦蟆散紅膏藥見同上各方更妙竹木刺及雜物入瘡用蜣螂散見銅鐵竹木刺入肉門內或紅膏藥均效瘡口堅硬疼痛凡瘡毒久不收功瘡口堅硬疼痛名曰翻花起肛取癩蝦蟆口紅腹無八字文者勿用破腹刺數孔連腸雜用蓋瘡口輕者日換一次重者日換二次內服醒消丸癰毒諸方止其疼痛每服三錢陳酒送下倘口硬孔深取生牛蒡子草連根無則取紫花地丁嫩草亦可搗爛敷之其效如神宜興馮悠也右足背連小腿彎處初起不過瘡毒而成爛腿三十餘年瘡口四圍堅硬小腿與足腫如斗爛孔可容大拳有時出血所流臭漿滿室難聞自以布包如磚一塊以填孔內否則空痛時年七十有四雍正六年延余治余以老蟾即癩蝦蟆破腹蟾身刺數孔以腸雜填入孔內蟾身覆蓋孔外每日煎蔥椒湯俟溫早晚各洗一次換蟾再貼內用醒消丸早晚二服三日後取生牛蒡子草又名大力子草及生紫花地丁草搗爛填孔外仍以醒消丸早晚與服瘡口皮中有清水出以洞天嫩膏加五美散敷內有發癢者以白花膏貼之內有塊硬如石者以生商陸搗爛敷之因孔內常有血出先以三七末撒入次用紫花地丁生牛蒡各葉根搗爛填入如此二十餘日腫消癢止而硬口及硬塊皆平皮色退黑內肉鮮紅瘡口亦收小平淺以五寶散撒上因老翁精神不衰飲食不衰飲食補收功此林屋山人經驗祕法也瘡毒潰爛不堪凡諸瘡潰爛不堪難以收功者用洞天救苦丹見痛毒諸方每服三錢陳酒送下蓋被取汗隔兩日再服一次再隔兩日再服一次所空隔之日以醒消丸見同前每日一服服後毒水流盡七日後再服醒消丸兩次接服大棗丸見同前每日各進五錢最危險者可奏奇效此林屋山人經驗方也又方拔毒法見痛疽諸方連敷數日漸漸平愈或用蝦蟆散見後敷滿瘡口亦可或用玉紅膏見後亦效又前瘡口堅硬疼痛各方應參看瘡不收口與後瘡愈後復發各方參看一切瘡毒久不收口內必有蟲照後各方治之必愈如再不愈瘡內必有細骨照多骨疽各方治之若百藥不效者恐是中邪用干狗糞白色者燒煙燻之或流毒水或出別物自愈石灰水整塊石灰一斤放盆內以清水八斤燒滾傾入盆內待石灰化開用棍攪勻俟水澄清將水輕輕傾出別器不用石灰再用細布瀝清收貯瓶內聽用凡瘡毒日久不能收口或不能生肌量瘡大小剪新白布一塊浸入水內一刻即起貼患處俟一二時辰再換一塊一日換二三次數日收功神效莫測此西洋祕方也地龍水白頸蚯蚓又名地龍又名曲蟺不拘多少放瓷碗內加白沙糖一把蓋好一二日化成清水挑少許入瘡內數日收口又方蜈蚣一條焙乾為末麻油調敷數日收口止痛如神又方鱉甲瓦上焙枯存性研細末摻之即收口生肌神效之至又方鯽魚破去腸雜用羯羊糞焙枯填滿魚肚瓦上焙枯為末乾摻上瘡口自收有人生髮背瘡口深大不能收口照此治愈又方龍眼肉桂圓肉更好男用女人口嚼女人用男人口嚼先須將口漱淨務使融爛成膏貼上無論久近皆效又方當歸一支以香油熬枯研為細末用真生香油調勻填入瘡口漸長漸愈而且止痛神效又方五倍子焙枯研末好醋調勻攤布上貼之用細布糊紙一層以免出氣神效又方鉛粉摻上即愈有人耳上生瘡膿血淋漓數年不愈後用此方三日收口又癰毒諸方內凡生肌收口諸法均極效驗內水仙膏蝦蟆散蜈蚣膏更有奇功又腿部白油膏亦神效也又瘡口堅硬疼痛見前及瘡愈復發見後各方均應參看瘡愈復發有人頭上生瘡好而復發名千層瘡不能斷根後用鮮橄欖核燒灰和雞蛋油制雞蛋油法見癰毒諸方搽之永不復發各項瘡毒時愈時發者或亦可治又有人兩足生瘡冬月則愈夏月則發臭爛疼痛久不斷根一道人云是蛇毒用活蝦蟆搗爛敷之日換三次後見一小蛇在瘡中取出而愈又生瘡出水好而復發不能收口恐是蟻毒照癰毒諸症門螞蟻毒方治之又瘡形如蜂窩者亦時愈時發照癰毒諸症門蜂窩瘡治之瘡毒腹脹如鼓此名瘡鼓由患瘡疥熏罨之後其毒歸腹而成宜戒沐浴用白殭蠶紅棗各四五錢先用水煮棗一二滾取棗湯將殭蠶洗淨將棗去皮核搗爛取淨肉二兩以殭蠶曬乾為末二兩共搗為丸仍用紅棗湯送服服完全愈倘鼓脹危急不及待藥與服用大活蟹四五隻約重斤余蒸食飲酒蓋暖睡下半日後身上發瘡更甚而鼓全消然後將瘡治愈夫瘡鼓死症也瘡可易愈也又方鼓脹如不能愈照卷五鼓脹門內蝦蟆巴豆方及病後浮腫蝦蟆方治之必效增補治諸瘡毒久爛收口驗方先用豆腐渣絞乾水敷患處拔淨膿水後再用此藥貼之甘石六兩煅赤石脂三兩煅白蠟二兩黃蠟二兩黃丹二兩五分掃盆二錢五分枯礬一錢五分上四六冰片五分共研細末瓷瓶貯存黃蠟封固凡有瘡毒潰爛日久不收口者或常出膿流水量瘡口之大小酌用公豬生板油些微捶藥用油紙攤貼患處先煎陳茶銀花薄荷艾葉甘草各等分水洗淨瘡口後隨貼之每日早晚各揭開看一次即用藥水洗淨瘡口若揭下藥上見有膿輕輕刮去將原藥刮攏如瘡口大照原貼上此藥初貼一二日換一次後則三四日方換藥一次倘上此藥半月二十日仍不收口宜加珍珠五分放豆腐上煮三香久螃蟹黃三錢和入藥內擂和勻照原用公豬生板油捶貼即愈預先煎就桃紅紅花歸尾薄荷荊芥防風蟲蛻銀花大黃黃柏黃芩黃梔子連翹赤芍甘草各等分水俟煅甘石龍骨赤石脂三味七次將上藥水淬七次癰毒諸方隔蒜灸法一切癰疽腫毒惡瘡初起即用此法使毒氣解散用藥施治亦易見功輕者灸過即愈大蒜頭又名老蒜去皮切片如三文錢厚無蒜用煮熟雞蛋白或生薑亦可究竟不如蒜好安瘡頭上用艾一團大則約用一分小則如豆子大於蒜上燒之蒜壞另換若難辨瘡頭先以濕紙瘡上先干處即是瘡頭或有十數頭生一處將蒜搗爛攤瘡頭上鋪艾燒之艾火不論次數或十數次數十次或百餘次總以痛者燒至不痛不痛者燒至痛惟頭不宜灸宜向足三里穴穴在膝下三寸䯒骨外兩筋內灸之灸多者宜先服護心散見後以防火毒入內一陰瘡色白不痛又不作膿或頑瘡久不收口灸之最妙倘灸後血出不止手冷欲絶者照癰毒雜治門瘡口出血各方治之一痘疔毒氣使諸痘不能起發或麻木疼痛安蒜片於痘疔上灸之毒隨火散若紫血出後腫痛不止者尤當用灸一跌打損傷破口傷風牙關緊閉腰背反張命在頃刻攤蒜於傷處多灸更灸百會等穴立蘇一凡蛇蠍蜈蚣以及瘋犬咬傷各毒攤蒜於傷處鋪艾多燒之至不痛為度拔出其毒以免內攻本草綱目載史源記蒜灸之功去母氏背胛作癢有赤暈半寸白粒如黍用蒜片艾火灸二七壯其赤隨消次日有赤暈流下長二寸舉家歸咎於灸後用艾火灸四旁赤處每一壯燼則赤隨縮入數十餘壯赤暈收退至夜則大焮滿背比曉色黑腫高三四寸上有百數小孔調理而安蓋腫者毒外出也小孔多毒不聚也色黑皮肉壞也非艾火出其毒於壞肉之裡則內逼五臟而危矣隔蠟灸法治一切癰疽腫毒發背對口等瘡甚效先看毒聚處水調面作圈依腫處大小圍圈高寸余實貼皮上勿令滲泄本人安身勿動圈內鋪極好黃蠟片屑上以炭火灸至黃蠟溶化毒淺者皮上覺熱痛不受灸便止毒深者全不覺熱痛再下黃蠟隨化隨添至圈滿仍前熱火灸至蠟沸初覺癢後覺痛久之不可忍乃去火以少水微澆滾蠟上俟冷揭去蠟近皮者俱帶青黑色此毒隨蠟拔去淺者一二灸便內消深者三四灸亦立解或瘡口雖破而皮尚堅硬膿未出者不必用萬針惟灸之膿出腫消或膿出而瘡口潰爛者即於瘡口下圈再灸蠟氣從口而入愈深愈炒桑木灸法治一切癰疽疔癤並治瘰癧流注頑瘡久不愈者俱有神效干桑木劈碎扎作小把燒燃一頭吹熄持近患者灸之每灸片時日三五次以瘀內腐動為度大抵未潰則解熱毒止疼痛消瘀腫已潰則補陽氣散餘毒生肌肉若陽症腫痛或重負如山用此法出毒水即內消日久者用之雖潰亦淺且無苦楚陰疽不起者一灸即起豆豉灸法治一切癰疽既潰不斂瘡色黑暗淡香豆豉一升入熟水搗成泥照瘡大小作餅厚三分安瘡上鋪艾灸之但使溫溫覺熱痛急去之患當減快一日灸二次如瘡有孔留孔勿復列艾其旁灸之聽其出汁為妙蔥尉法治虛怯人肢體患腫塊或作痛或不痛或風襲經絡肢體疼痛或四肢筋攣骨痛又治流注及婦人乳吹乳癰及便毒初起蔥白搗爛炒熱布包尉患處冷則易之再尉再易之數次腫痛即止而愈永戒食龜肉蔥蜜膏治無名腫毒初起腫痛尚未成膿者極效蔥頭灰面白蜜各等分搗融烘熱敷之糯米膏凡腋肋臂膊腰腿等處忽如火熱腫硬如石痛不可忍百藥不效者一二次即愈神效熱糯米飯少加蔥與鹽共搗融敷過夜即松或用熱糯米酒糟亦可其渣務傾魚池或入河內神燈照法治發背對口乳癰乳岩魚口便毒及一切無名瘡毒不論已成未成已破未破者尤妙明雄硃砂真血竭沒藥各一錢麝香二分共為細末用棉紙裹藥捲成捻約一尺長每捻入藥三分以真麻油潤透燒燃離瘡半寸許自外而內周圍緩緩照之瘡毒隨藥氣解散不致內攻初用三條漸加至五七條瘡勢漸平又漸減之每日照一次重者不過六七次大略腐盡新生即不必再照外貼膏藥內服托裡之劑收功凡陰瘡不能起發又頭面等處難用艾灸者用此照之有起死回生之力真神方也麻油飲治癰疽疔癤一切大毒真麻油一斤砂鍋內煎數十滾傾出兌酒二碗隨口熱飲一二碗少頃再飲急則一日飲盡緩則分二日飲無有不愈打獵者凡中毒藥急次麻油藥毒即消其效如此菜油飲治發背對口乳癰疔瘡及一切無名腫毒重症陳久菜子油三大杯一時飲盡並以菜油煎蔥白至黑色趁熱圍塗患處止痛而愈護心散凡患疔瘡及一切大癰大毒神昏嘔吐此毒氣攻心急用此藥服之神效緑豆研成粉一兩乳香五錢用燈芯一全二分同炒枯去燈芯不用燈芯炭用活竹一段留兩頭切中開一眼以燈芯填滿竹內眼用竹筷塞緊加泥封好放穀殼火內燒至竹成一炭取竹內燈芯用三錢共研末用甘草一兩煎水送下分數次服輕者即愈重者再服醒消丸見後以平其熱或用蝦蟆拔毒法見後更妙又方飲真麻油一大杯真菜子油亦可或用白糖三四兩開水調服亦可瓜蒂散治癰疽大毒及一切無名惡證並治乳岩陳年老南瓜蒂燒成炭酒沖服再用麻油調此炭敷之立愈如治乳岩每服瓜蒂炭一個重者四五次立愈幸勿泛視菊花飲此乃治疔毒聖藥有起死回生之功凡對口發背一切無名紅腫熱毒亦極神效陰疽色白平塌者勿用白菊花連根用搗取自然汁一茶鍾滾酒沖服用酒煮服亦可不如生汁為妙重者多服蓋被睡臥出汗其毒自散並用渣敷患處留頭不敷無葉用根無根用藥店中乾白菊花四兩甘草四錢酒煮溫服亦可水仙膏治對口發背乳癰魚口便毒及一切惡毒無論已破未破均極神效凡懸癰及諸瘡久不收口者立能止痛生肌百發百中水仙花兜用黃糖紅沙糖亦可和搗如泥敷之此物鮮者平時難得干則力緩須存放陰濕之處不可入土以備急用鳳仙膏治對口發背魚口便毒及一切無名腫毒並瘰癧初起其效如神鳳仙花俗名指甲花連根洗淨風乾捶取自然汁入銅鍋內忌勿器不用加水盡原汁熬稠敷患處一日一換諸毒初起雖腫大如碗二三次即消已破者勿用芙蓉散一切癰瘡疔癤熱毒皆治瘡色白者勿用秋芙蓉葉或生研或乾研加蜂蜜調敷周圍留瘡頭不敷干則隨換或取汁和酒飲之更妙初起者即消已成者易穿已穿者易斂或用花或用根皮俱奇效再加真赤小豆末查藥物備要便知一錢其效更速但無蜜則黏緊難揭馬莧膏治瘡毒日久膿水不止腫痛不已大有神效初起未久敷之反不見功馬齒莧又名瓜子菜搗爛厚敷數日即愈大蒜膏治惡瘡腫痛叫號不眠獨頭蒜數顆搗爛麻油拌和厚敷瘡上干又換敷毒消痛止無不神效肥皂膏治一切無名惡毒生肥皂去子弦與筋搗爛好醋和敷立愈不愈再敷奇驗無比赤豆散治一切瘡毒未成即消已成即愈真赤小豆查藥物備要便知四十九粒為末加野苧麻根末和雞蛋白調敷一日一換大戟膏治一切惡瘡及訶毒痛不可忍者其效如神不痛者敷之亦愈陰疽尤屬相宜真紅芽大戟查藥物備要便知用整枝的溫茶洗淨去心嚼融敷之立刻止痛而愈再發再敷收功嚼時藥汁不可吞下遠志膏治一切癰毒初起屢試神驗遠志肉二兩去心酒煮搗爛如泥敷之用油紙隔布扎定過夜即消銀花飲治對口發背魚口便毒及一切無名腫毒大有奇功忍冬藤即金銀花藤生採五兩忌鐵器搗爛加甘草一兩同入砂鍋內水二碗慢火煎至一碗入無灰酒一碗再煎十數沸去渣分為三服一日夜服盡重者一日二劑以大小便通利為效再將藤上花葉摘取一把搗爛少入白酒調塗四圍中留一孔泄氣糞坑土治發背及諸惡毒瘡疼痛糞坑底泥土陰乾新水調敷其痛立止石赤散治一切瘡毒無論已破未破並治跌打損傷無不奇效石赤要陳一年者愈陳愈妙韭菜各等分於端午日午時或六月六日同搗極爛為餅陰乾凡遇一切瘡毒或干敷或油調均可松香散治小兒胎毒並蠟梨頭瘡及男婦一切濕瘡有人施送四十餘年神效無比老松香二兩炒黃丹一兩微炒鉛粉五錢炒淨勿留鉛氣真青黛一兩白礬二兩入頭髮少許同炒以枯為度共研細末濕則干敷干則用麻油調搽牛牙散治一切癰毒大瘡初起並治蠟梨頭瘡及腳丫破爛神效取已死黃牛門牙數枚以三錢為度將牙燒紅浸醋內燒三次浸三次研末候冷如病人有一斤酒量者用酒二斤將牙灰衝入飲之蓋被睡一夜即出大汗次日全消或腹瀉再用敗毒散服之立愈初起三日內俱可治活人無算若治蠟梨禿頭瘡並腳丫爛多年者用麻油或雞蛋油見後調敷牛糞散治濕熱諸瘡毒水淋漓久不收口並小兒痘瘡破爛百藥不效者用此如神黃牛糞炒熱敷冷則隨換數次即愈且無疤痕雞腰膏治小兒胎毒及頭面耳前耳後一切濕瘡並羊鬚瘡屢試如神大雞腰子一對蒸熟去皮枯礬三分共搗融加頂上冰片一二分敷之雞蛋飲凡腸癰發背臟毒魚口等症初起三天之內照服一方即行消散如毒勢旺者接連三服無不盡消真神方也皮色不變者勿服雞蛋一個傾入碗內攪勻入芒硝二錢蒸服用好酒送下雞蛋油此油最能殺蟲諸瘡破爛癢不可忍或不收口者搽之大有神效雞蛋數個整個煮熟去白用黃干煎枯焦以滾開水半茶鍾衝入油浮水面取出冷透火氣聽用燕泥散治一切熱瘡惡毒腫痛及小兒胎毒甚效皮色不變及先白後紅者勿用燕子窩連泥帶糞研細麻油調敷瘡色赤色者加黃柏末調敷小兒胎毒先用米湯油即米鍋內浮面油洗淨再敷鯽魚膏治諸瘡腫毒潰破流膿並治腳生雞眼俱極神效乳岩及一切色白陰疽忌用淨巴豆肉六兩萆麻子六兩去殼香油斤半蝦蟆二個每個銜人發一團活大鯽魚五條先將巴豆肉萆麻子入油內浸三日再將蝦蟆浸一宿臨熬時入活鯽魚共熬枯去渣淨慢火熬油湍水成珠離火傾於淨鍋內再加鉛粉二斤半乳香末五錢不時攪動冷定為度用時重湯燉化薄紙攤貼永戒食蝦蟆蝦蟆散治一切無名腫毒惡瘡久不收口凡陰疽鼠癧楊梅結毒等症百藥不效者惟此最宜硫黃三錢胡椒二錢共研細末調勻取癩蝦蟆一個眼紅腹無八字紋者勿用將藥納入口內用線將口捆緊外用黃泥包裹入炭火中燒之俟泥團紅透取出用碗蓋住候冷去泥取蝦蟆磨為細末忌鐵器調真小磨麻油用淨鴨翎舊筆亦可蘸敷候瘡出毒水數日毒盡而愈百發百中寶之重之永戒食蝦蟆蝦蟆膏治一切無名腫毒大小瘡癤或腿腫濕氣俱貼患處並治大人小兒食積痞塊疳疾身瘦壯大俱貼肚臍上痞塊貼患處百發百中其效如神瘡毒無論已成未成俱效真小磨麻油十兩槐樹枝青而肥嫩者三尺三寸鉛粉四兩臨用須曬極幹過篩大癩蝦蟆一個癩多者佳小則二個要數月前預取陰乾眼紅腹無八字紋者勿用五月五日午時配合平時亦可先將麻油熬滾即用蝦蟆熬枯將渣撈起必須撈淨不然則貼之作痛次下槐枝煎枯亦須撈淨然後下鉛粉用大槐枝二根順攪微火慢熬俟滴水成珠為度取起用瓷器收貯臨用攤貼若瘡毒痛甚不及熬膏即剝取癩蝦蟆皮不用枯皮貼上皮自黏緊即能拔膿生肌止痛聽其自落不必揭動此簡便法也終不如熬膏之妙永戒食蝦蟆又背部背癰方內及陰疽門內各有蝦蟆拔毒之法亦極效驗是蟆拔毒法治一切心腹脹悶或痧症氣閉或傷寒煩躁或發斑發疹或生癰毒氣內攻嘔吐等症俱極神效應看背部及陰疽門蝦蟆拔毒法取活癩蝦蟆一隻眼紅腹無八字紋者勿用破開去腸雜貼心坎上腹脹者並貼肚臍或取蝦蟆肝煎水服之更妙輕者不服亦可永戒食蝦蟆蜈蚣膏治一切已破無名腫毒無論久近輕重貼之數日即能拔毒生肌有起死回生之妙交治毒蛇瘋犬及百蟲咬傷俱極神效大蜈蚣長四五寸者八條小者用二十條土木鱉子二十四個真小磨麻油一斤將蜈蚣木鱉放麻油內泡三日用文武火熬起青煙將渣撈淨不淨貼之作痛加入黃丹四兩用柳枝不住手攪動熬至滴水成珠用罐收貯浸冷水中數日拔去火毒用時以布攤貼紅膏藥專治疔瘡瘍子即瘰癧及一切無名腫毒並銅鐵竹木瓦石入瘡入肉屢試如神銀硃水飛曬乾一錢萆麻仁三錢嫩松香五錢黃丹水飛哂干一錢輕粉五分共搗如泥如治疔瘡以銀針將疔頭挑破用此藥作一小丸如黃豆大安別膏藥上不論何項膏藥當中貼之疔即拔出或畏疼者不必挑破即以此膏攤開如錢大貼之亦可凡無名腫毒已破未破不必挑動均照拔疔之法用之自能拔毒收功銅鐵等物入瘡入肉亦用此紅藥一小丸如別膏藥貼之自出瘍子未破者用此藥一小丸加別膏藥貼在最大之瘍子上或貼初起之瘍子上亦可貼後癢而微疼至第三日啓去另換此藥丸與膏藥貼上換至數次後皮自微破用瘦豬肉煮湯洗之不用鹽或用金銀花煎水洗亦可再換此藥丸與膏藥貼之每二日一洗一換貼至數日瘍子之根即黏在膏藥上矣根淺者易出根深者功緩出後仍用肉湯洗之其餘鄰近未破之瘍子仍用此藥丸與別膏藥貼在已破出之瘍子原口照前治之可以一一從此而出如未破瘍子相隔尚遠或有筋膜隔住即在未破之處貼之俟各瘍子拔盡另用生肌膏藥貼緊數日收口而愈此藥初貼稍覺作痛煩躁亦屬無妨宜忌發物勿受風熱為要白膏藥治一切無名腫毒並小兒胎毒黃水濕瘡功能拔毒生肌屢試神驗凡濕瘡無皮紅肉現露日久不愈者更效頂上爐甘石以輕能浮水面者佳炭火內燒三五炷香久研末攤地上一日冷透火氣用生豬板油和勻搗融攤貼緑膏藥又名紫霞膏治諸色頑瘡濕痰濕氣並新久杖傷及一切無名腫毒未成即消已成即破已破即愈又瘍子即瘰癧祿起未成者貼之自消已成未破者貼之自破已破其根核尚存者貼之核自拔出其效如神松香一斤入蔥管內煮兩日夜取放冷水中扯拔數百下再煮一個時辰不用放蔥取放冷水中再扯拔百餘下再煮再拔七次為度真小磨麻油銅緑各四兩先將麻油熬起青煙加入松香熬至將要成膏再加銅緑熬至滴水成珠用罐收貯浸水中拔去火毒用時薄攤紙上加頂上牙色梅片冰片二三釐研極細摻膏上貼之不細貼之作痛緑雲膏治𤺪疒貢頭時發時愈者並治疔瘡已破膿尚未盡及一切無名腫毒貼之立能拔膿散毒消腫止痛屢試如神真麻油三兩以萆麻子四十九粒入麻油內熬枯去萆麻子不用要歷盡渣不淨貼之作痛制松香八兩照上緑雲膏藥製法大豬膽汁三個銅緑二兩研細先將松香放銅鍋內火上溶化再下各藥熬勻搗千餘下烘融放水中用手扯拔百餘遍愈拔其色愈緑收瓦鉢內用時以油紙攤貼若治𤺪疒貢頭毒用細布攤貼一次全愈不必再換此毒多屬陰症膏內所用豬膽大不相宜而用之屢著神效或不盡為陰症也緑蠟膏治已破一切無名腫毒日久不愈者敷之數日即能生肌收功百發百中黃蠟六錢白蠟四錢銅緑五錢真小磨麻油二兩先將麻油熬至滴水成珠再將各藥加入攪勻熬一二滾用罐收貯浸水中拔去火毒用紙攤貼少刻膿黏滿紙起去再換日換數次自愈黃明膏治對口發背魚口便毒及一切癰疽腫毒未成即消已成即拔膿生肌最為神效此人世傳祕方也牛皮膠一兩入銅器內好醋和煮用筷子時時攪動煮好加鉛粉黃丹各二錢攪勻收入罐內放水中拔出火毒用布攤貼紫蘆散治小兒胎毒肉赤無此或膿血淋漓及胎中受父母楊梅瘡毒者並治婦女為丈夫梅瘡所過結毒之氣漸至陰戶肛門腫硬破爛膿血不幹疼痛不止此藥搽之最妙如小便將藥衝出須要勤搽漸漸自愈極驗如神若毒勢重者務加配珍珠七分西牛黃三分其效更速輕白爐甘石一兩煅淬入黃連汁內再煅再淬共三次又煅淬入童便內再煅再淬共四次厚川黃柏七錢以豬膽汁塗炙七次紫甘蔗皮五錢燒存性取淨末粉口兒茶五錢緑豆研末七錢赤石脂五錢煅頂上梅花冰片五分共研細末另用真麻油二兩入雞蛋黃一個煎黑去黃候油冷透一日調此藥敷上自能止痛而愈油不冷透搽之反作痛也銀青散治男子陰頭生瘡腐爛痛癢女子陰戶兩旁生瘡濕爛腫痛發癢並治小兒痘疤腫爛並痘後餘毒不清滿頭黃泡等瘡用此皆效白螺殼取牆頭上白色者佳去淨泥火煅存性取淨末一兩橄欖核火煅存性研取淨末二錢寒水石另研極細取淨末二錢頂上牙色梅花冰片臨用時每藥二錢配冰片一分共研勻以瓷瓶盛貯勿使出氣臨用時以麻油調搽濕處干搽神效無比玉紅膏治一切癰疽發背對口大毒腐去孔深洞見膜膈者用此填塞瘡口自能生肌長肉收口誠外科聖藥也當歸二兩白芷五錢紫草二錢甘草一兩二錢用真麻油一斤將前藥浸五日煎至藥枯瀝盡渣將油再熬至滴水成珠下血竭細末四錢攪勻再下白醋二兩溶化離火微冷再下輕粉四錢待成膏蓋好放水中三日拔去氣聽用愈陳愈佳凡瘡口深陷以新棉花蘸塗此膏塞之金素丹又名黃靈丹治一切癰疽大毒發背對口腰疽臂癰腐肉黑蟬死肌堅硬臭穢難聞用此摻之膏藥蓋上過夜即周圍裂縫與好肉分界膿流肌活黑色轉紅疼痛稍緩其腐肉自化自脫不用刀鉗煎割並無穢氣神效無比凡牙痛潰爛齒欲脫落用此亦效生白礬六錢枯白礬三錢明雄黃一錢共研極細篩過再碾千餘下愈研其色愈美裝瓷瓶內臨用取出勿使染塵凡去腐肉儘可用之若新長肉上摻之要痛片刻一見膿水濕氣即不痛矣如良腐間混先將金花散摻好肉上再用金素丹摻腐肉上自不痛也否則其痛難受金花散治爛腿臁瘡連年不愈臭爛不堪並治一切癰癤瘡毒功能去腐生肌熟石膏一斤研極細飛淨黃丹一兩和勻再篩再研用真香油調搽上蓋油紙一日一換不可用茶水洗如有膿水流開隨用藥敷水流之處以免爛開若婦女一見月信雖愈復發發後再搽自有功效洞天膏治一切紅腫熱毒癰癤其效如神此林屋山人經驗方也以下十七方皆同先用壯年頭髮一斤菜子油三斤入鍋熬至發枯去渣聽用再用活牛蒡草又名大力草生菊花連根活蒼耳草連根生金銀藤生馬鞭草又名龍芽齒生仙人對坐草各一斤各草如難尋覓少一二樣亦可入菜子油十兩熬至草枯瀝盡渣再加白芷甘草五靈脂當歸各半斤入鍋熬至藥枯瀝盡渣俟油冷將前熬頭髮之油合共稱過斤兩每油一斤用炒透黃丹七兩入油內攪勻再熬熬至滴水成珠以不黏指為度離火冷透收貯聽用洞天嫩膏治遮腮及小兒遊風丹毒並治紅腫癰癤初起尚未作膿者均極效驗照前製法每斤油內入炒透黃丹四兩熬黑收起聽用不必熬至滴水成珠以嫩為度太稠則不嫩也洞天救苦丹治乳癰乳岩及瘰癧破爛神效露天有子蜂窩無子不效雄鼠糞兩頭尖者是青皮苦楝子立冬後者佳各放新瓦上焙存性各等分研末和勻每服三錢陳酒送服隔兩日再服不可日日連服也醒消丸治疔瘡及一切大熱癰毒腫痛不已立能消腫止痛乃療癰之聖藥也孕婦忌服制乳香制沒藥各一兩製法見藥物備要麝香三分不宜多雄精五錢共研細用黃米飯一兩和搗為丸如粟米大曬乾忌火烘每服三錢熱陳酒送服蓋被取汗為妙三黃丸治懸癰紅腫並熱毒大癰楊梅結毒火毒疼痛等症孕婦忌服熟大黃三兩酒磨汁制沒藥制乳香各一兩麝香犀牛黃各三錢共為末和大黃汁捶融為丸如梧子大每服五錢五通丸治大癰生於緊要穴道將欲大發之時服此甚效如與三黃丸間服更妙廣木香五靈脂麻黃制乳香制沒藥共為末各等分用飯搗和為丸如梧子大每服五錢另用川芎當歸赤芍連翹甘草各錢半煎湯送下五寶散此生肌藥屢用有效人指甲五錢用紅棗去核包甲以長髮五錢將棗捆扎同象皮薄片五錢放瓦上炭火內炙溶成團存性加麝香七分上冰片三分共研細如香灰收貯聽用珍珠散治口瘡牙根紅腫實火喉痛各症每用一二分吹入神效真硼砂雄精川連兒茶人中白頂上牙色梅花冰片薄荷黃柏各一錢大破珍珠五分各研極細末如香灰細不細搽之作痛和勻收入瓷瓶不可泄氣神仙棗凡生瘡毒日久體虛瘡極重者內服外敷大在奇效紅棗二斤銀花歸身各一兩甘草三錢殭蠶白芷乳香末五倍子黃耆各五錢水六碗煎半倒出再如前煎半共煎湯六碗去藥留棗再煎分作四五日連棗與湯吃完全愈愈瘡棗治與神仙棗功同紅棗三斤豬板油一斤陳酒三斤共入砂鍋內煮乾加水三斤煮至半乾時時取食食完瘡愈若暑天分作數日煮食大棗丸專治諸瘡潰爛久不收口大有神效山羊糞曬乾炒成炭存性磨成細粉用大棗去皮核搗如泥再入前粉捶成丸每用四錢黑棗煎湯送服山蓮散治瘡毒潰爛不堪內腑止隔一膜者撒上立見奇功大活鯽魚一條破腹去腸雜以山羊糞塞滿魚腹放瓦上慢火焙乾存性加麝香一錢研極細如灰面細收貯聽用代刀散治瘡毒腫脹疼痛服此即破皂角刺生黃耆炒各一兩生甘草乳香各五錢共為末每用三錢酒服咬頭膏專治瘡毒腫脹不破甚效銅緑松香制乳香制沒藥製法見藥物備要杏仁生木鱉研末萆麻子去殼各一錢巴豆二錢不去油白砒一分共搗成膏為丸如緑豆大每用一粒放瘡頭上另用不拘何項膏藥蓋上破即用茶洗淨分別症候另用藥治孕婦胎前産後忌用扎藥專治瘡毒紅腫作痛極效萆麻子去殼搗如泥鋪舊綢上照瘡毒大小鋪之又取一綢蓋上然後扎瘡毒上拔毒止痛惟紅腫非常者用之痛止即去凡皮色不變陰疽並孕婦胎前産後忌用以上共十五方均林屋山人屢試屢驗方也麻藥凡割毒瘡或取箭頭槍子敷之麻木不痛川烏尖草烏尖生半夏生南星蓽茇各二錢半蟾酥二錢胡椒細辛各五錢共為細末酒調搽又方公麻雀糞尖而堅者是胡椒各七粒研末燒酒調敷藥線治齒上生鋸並瘡痔癭瘤頂大蒂小之症及尾脊之處生尾突出神效芫花二錢半壁錢一錢要有子者即壁上喜蛛窠白如錢大者是也白絲細線錢半用水一碗慢火熬至水乾為度取線陰乾小者用線一根大者用線二根系蒂根上雙扣捆扎留出線頭每日漸漸收緊仙方活命飲專治一切癰疽初起一服即消已成易潰此外科之良方也穿山甲三大片炒皂刺五分防風七分貝母生甘草乳香沒藥去油焙花粉白芷各一錢陳皮去白歸尾各錢半銀花三錢各藥用淡陳酒三茶鍾煎好溫服瘡生上身飯後服瘡生下部空心服降癰活命飲治一切無名腫毒無論陰症陽症初起能益氣和血解毒托裡破後能排膿去腐生肌長肉瘡科始終之聖藥功在仙方活命飲之上産後生癰毒者更妙大當歸八錢生黃耆金銀花各五錢甘草三錢酒煎濃汁服服後睡臥出汗即愈毒在上者加川芎二錢在中加桔梗二錢在下加牛膝二錢泄瀉加蒼朮白朮各二錢嘔吐噁心加陳皮半夏各一錢不思飲食加白朮三錢陳皮一錢氣虛加黨參生耆各五錢陰疽肉白色淡無論冬夏加陳皮麻黃各六分肉桂炮姜各錢半斷不可妄行加減排膿加白芷三錢欲破加皂刺錢半黃耆湯治搭手發背對口癰疽及一切大小無名腫毒未成者散已成者潰已潰者易收口輕者一服重者兩服全愈此方得自仙授大有功效小兒減半孕婦忌服生黃耆歸身甘草白芍穿山甲各五錢上部加川芎五錢中部加杜仲五錢下部加牛膝五錢各藥用淡陳酒一茶碗水一碗煎至一碗熱服避風蓋被暖睡汗出即愈未出汗時忌一切冷熱湯水汗出一時後不忌托裡解毒湯治一切紅腫癰毒金銀花三錢當歸五錢生耆二錢花粉連翹黃芩赤芍各錢半大黃牡蠣生甘草各一錢枳殼八分皂刺五分已破者不用水煎服千金內托散治同上臺黨生耆各四錢防風厚朴川芎各錢半白芷桔梗當歸各二錢肉桂生甘草各一錢水煎服四物保元湯白芍酒炒川芎各錢半生地臺黨生耆各五錢當歸二錢炙草一錢水煎服保元湯肉桂二錢生耆四錢生甘草一錢水煎服四物湯治同上白芍酒炒川芎各錢半生地生耆各五錢當歸白芷各二錢雲苓臺黨各三錢五味八分肉桂六分水煎服二陳湯治同上橘紅五錢半夏白芥子研各二錢雲苓錢半甘草一錢水煎服黃連消毒飲治喉外生癰並治耳疔俱效黃芩黃柏防己藁本桔梗各五分防風知母獨活連翹生地歸尾各四分黨參甘草各三分蘇木陳皮澤瀉各二分羌活一分黃連一錢生黃耆二錢水煎食遠溫服化堅二陳丸治眼胞痰核甚效陳皮製半夏各一兩生甘草川連各三錢白殭蠶二兩白茯苓兩半共研細末荷葉熬濃汁為丸如梧子大每服二錢白滾水下外用生南星和醋磨濃汁搽之橘皮竹茹湯治一切瘡毒已破胃火上逆氣衝時時厄逆身熱口渴唇焦此熱厄也服之最效橘紅竹茹各二錢生薑黨參各一錢黃連八分柿蒂七個水煎空心服摩風膏治面上或身上風熱浮腫癢如蟲行肌膚乾燥時起白屑次後極癢抓破時流黃水或破爛見血痛楚難堪此膏抹搽十日必愈屢試如神此風熱作癢第一方也麻黃五鈣羌活一兩升麻二錢白檀香白芨防風歸身各一錢用香油五兩將上藥浸泡五日慢火熬枯去藥用綢瀝盡渣加黃蠟五錢再熬數滾啓起冷透火毒聽用二味拔毒散治一切毒蟲咬傷無論腫痛瘙癢敷之立止其效神速雄黃枯礬各等分為末先用薑汁洗淨用茶調敷貝葉膏治對口發背魚口一切潰爛癰毒與腿部白油膏功同屢試神效淨麻油一斤亂髮雞子大一個將發入油中以文火熬化去渣再入白蠟二兩熔化用紙浸油內取起再浸再起以油盡為度紙要張張隔開放在風前冷透一日用貼患處少刻膿黏滿紙日換十餘次數日膿盡生肌蘆薈散治諸瘡毒水淋漓不幹並治坐板瘡甚效蘆薈一兩甘草五錢共研細末先用店中做豆腐之水洗淨將藥敷上數日即愈此西域老僧方也生軍散治一切未破大小火熱瘡癤紅腫焮痛神效此葛仙方也生大黃好醋磨汁敷干則隨換皮色不變者忌用礬蠟丸此托裡消毒固臟腑止疼痛妙藥凡一切癰毒潰爛之後最宜服此若腸肺生癰及遍身生瘡狀類蛇頭者更有排膿托裡之效白礬三兩研細末黃蠟二兩先將蠟熔化離火加入礬末攪勻用多人趕急捻作丸如桐子大遲則堅凝難捻每日服一百丸分三次空心酒送下忌食雞三月皮金膏治撲跌擦損或鞋底墊傷腳板或刀傷破爛紅腫光皮潮濕或癤將愈新肉易破或疼痛腫爛皆效廣東羊皮金紙以金面貼傷處三日必愈聽其自落為妙或用包銀硃烏金紙亦可其功稍緩梅花點舌丹治疔瘡及紅腫癰癤一切無名熱毒初起並實火牙痛喉痛喉蛾喉風口舌諸瘡又治小兒急驚風俱極效驗若慢驚風及陰疽陰虛口舌牙喉等症萬不可用孕婦尤忌服制乳香制沒藥製法見藥物備要真硼砂明雄真熊膽真血竭葶藶真沉香頂上梅花冰片各一錢麝香要當門子硃砂犀牛黃各二錢破大珍珠三錢以上共為細末另用真蟾酥二錢以人乳化開和勻搗融作五百丸如大緑豆大金箔為衣蠟殼收好每用一丸入蔥白內打碎酒送服睡臥蓋被暖取汗三個時辰毒消而愈或敷亦可蟾酥丸功與梅花點舌丹同孕婦忌服真蟾酥二錢酒化輕粉銅緑膽礬枯礬寒水石煅制乳香制沒藥製法見藥物備要雄黃各一錢麝香七分硃砂三錢蝸牛二十一個有殼如螺螄者是各藥於端午日午時若要急用隨時可制在淨室先將蝸牛研爛同蟾酥和研稠黏再入各藥搗勻為丸如緑豆大每服三丸用蔥白五寸病者自己嚼爛吐入手心男用左手女用右手將藥丸裹入蔥內用陳熱酒一茶鍾送下蓋被睡臥約人行五六里路病者出汗為度重者再服一服必效如若外用將丸作餅隨症用之修合時忌婦人雞犬見萬應紫金膏此膏能治百病凡男婦大小瘰癧痰癧對口發背乳癰魚口便毒臁瘡熱癤手足腰背疼痛閃挫傷損及一切無名腫毒俱貼患處哮吼喘嗽貼心窩瀉痢貼臍眼百發百中功效無窮赤芍當歸紅花黃芩防風荊芥連翹黃柏殭蠶蟬蛻白芷甘草胎髮大黃銀花蜈蚣川烏草烏羌活蒼朮細辛川椒秦艽乳香沒藥骨碎補首烏蛇床子木鱉子大風子生南星生半夏以上各五錢用豬油麻油桐油各半斤將前藥浸入油內如春夏天浸三日秋冬浸七日傾銅器內文武火熬至藥色焦黑取起濾渣再熬加炒黃丹十兩用槐枝不住手攪坳熬至沿水成珠再加白蠟五錢隨即取起用槐枝攪勻收入瓦罐浸水中拔去火毒用時以布攤貼陰疽陰疽論名與癰毒門癰疽論參看王洪緒曰陰毒之症皆皮色不變然有腫與不腫者有痛與不痛者有堅硬難移有柔軟如綿者不可不為之辨夫腫而不堅痛而難忍者流柱也腫而堅硬微痛者貼骨鶴膝橫痃骨槽等類也不腫而痛骨骱麻木手足不仁者風濕也堅硬如核初起不痛者乳岩瘰癧也不痛而堅形大如拳者惡核失榮也不痛不堅軟而漸大者癭瘤也不痛而堅堅如金石形大如升斗者石疽也此等症候盡屬陰虛無論平塌大小毒發五臟皆曰陰疽如其疼痛者易消重按不痛而堅者毒根深固消之不易則治之尤不容緩也陰疽治法王洪緒曰初起之形寬大平塌根盤散漫不腫不痛色不明亮此陰疽最險之症倘誤服寒涼其色變如隔夜豬肝毒攻內腑神昏即死夫色之不明而散漫者乃氣血兩虛也患之不痛而平塌者毒痰凝結也治之之法非麻黃不能開其腠理非肉桂炮姜不能解其凝結此三味雖酷暑不能缺其一也腠理一開凝結一解氣血能行行則凝結之毒隨消乃一定而不可移之法後列陽和湯陽和膏犀黃丸小金丹諸方均為陰疽要藥照方治之萬無一失如若增減定無功效又曰小孩如患各種陰疽不能服藥初起以小金丹化服至消乃止如已成膿亦須日日服之可使不痛而穿俟毒去盡用保元湯見癰毒門加肉桂五分水煎日服收功又曰凡患一應色白大小等疽忌用洞天膏又膏藥熬太嫩者貼則寒凝愈結又膏藥有巴豆萆麻萬不可貼貼則被其提拔成功每見橫痃乳岩貼至致命孕婦貼則墮胎凡諸陰疽潰後宜貼陽和解凝膏為妙陰疽諸症石疽初起一核漸大如拳堅硬如石急以陽和湯犀黃丸每日早晚輪服可消如遲至大如升斗者仍如石硬不痛日久現出紅筋則不能治若生斑片潰爛在即潰後即放血三日而死若現青筋可治內服陽和湯外用活商陸根搗爛加食鹽些少敷之數日作癢半月皺皮日敷日軟有膿袋下垂以銀針穿破用千金托裡散加熟地生耆各一兩煎服十劑後用陽和解凝膏貼上空出針穿之眼膏外用布捆緊務使皮膜相連內服十全大補湯或保元湯參耆俱生用服至收功為止各方見後如毒氣未盡忌服補劑此林屋山人祕法也又方蛇皮貼之亦效惡核大者稱惡核小者痰核與石疽初起相同然其寒疑甚結毒根最深卻不易潰未潰之前忌貼涼膏忌服涼藥內服陽和犀黃丸可消亦有以大田螺搗爛敷塗消之者大忌開刀如已開刀瘡口堅硬即照癰毒雜治門瘡口堅硬疼痛各方治之仍內服溫補托毒消痰之劑犀黃丸儘可收功屢試神效丸內有麝香孕婦忌用各方見後此林屋山人祕法也失榮此患多生肩胛以上初起微腫皮色不變日久漸大堅硬如石推之不移按之不動其症與石疽相同急服石疽各方治之瘰癧即瘍子也小者稱瘰大者稱癧名色甚多項前為痰瘰項後為濕瘰左右兩側形軟遇怒即腫為氣癧堅硬筋縮為筋癧若連如貫珠者為瘰癧又有馬刀長形者是子母重臺蛇盤鎖項蜂窩惠袋燕窩瓜藤𤷍瘍流注單窠蓮子門閂及風石鼠癧鼠癧即俗云鼠瘡形名各異受病固不外痰濕風熱氣毒而成然必兼恚怒忿鬱憂滯謀慮不遂而致者也初起者用煙桿中黑煙油或風仙膏見癰毒諸方敷之三日即消屢試神效凡瘰癧未破者用子龍丸見後每服三分淡薑湯送下每日三次至消乃止倘小孩不善服丸每日用小金丹見後一丸布包放石上隔布搗細入杯冷陳酒化開用銀器研臨睡以熱陳酒沖服蓋被取汗以消為度數年內忌食香椽橙橘食則復發凡瘰癧內有潰爛間有成膿未潰者亦有未成膿者宜服犀黃丸見後止其已潰之痛松其成膿未潰之脹消其未成膿之核已成膿者用咬頭膏見癰毒諸方貼之即穿內服溫補祛痰通腠活血壯氣之藥外貼陽和解凝膏見後而愈凡瘰癧延爛至肩胸脅下不堪之極者用洞天救苦丹見癰毒諸方三服犀黃丸六服此丸須隔兩日一服服完丸藥後皮色變白孔內紅活接服大棗丸見癰毒諸方肌肉漸長用生肌散收功凡瘰癧爛至咽喉如飲熱湯外覺熱痛者乃危險至極稍遲則爛穿咽喉不救急取柴心一根量本人中指量其三指共積一柴心上隨其長短男左女右就手之左右即在手下之腳骨正中骨頂之處定準一直量上盡頭以墨點記用艾團如豆大燒三次隔蒜燒或隔蛋亦可以膏藥蓋住不論何頂膏藥可保咽喉不穿內仍照前服洞天犀黃大棗各丹丸外用荊芥煎湯洗之並用樟腦雄黃研細調敷未成膿者燒之即消已潰爛者即易收口以上各法乃林屋山人祕法屢試如神萬無一失銀黝膏治瘰癧及一切無名腫毒無論已破未破並治腰痛俱極神效先用真麻油一斤慢火熬開再下銀黝四兩用桑枝不住攪動俟青煙起時再下黃丹五兩熬至滴水成珠放水中一二月拔去火氣隨症用布攤貼又方用銅錢一枚和蜓蝣蟲即無殼蝸牛俗名鼻涕蟲搗融以銅化為止敷之即愈其效無比又方黑鉛三兩炒成炭醋和勻攤舊布上貼之一日一換半月之後不痛不破內消而愈又方頂好陳醋熬至滴水成珠加生半夏末一錢調勻敷之過夜再換兩日即消神效又方夏枯草金銀花蒲公英各五錢酒水煎時時當茶服之名三妙散治結核瘰癧遍布脖項服之十日即消如若再發即於肩髃穴在肩端兩骨間曲池穴在肘外輔骨屈肘曲骨之中以手拱胸取之二穴用艾火各燒七次在左燒左在右燒右左右俱病俱燒斷根神效又方元參蒸牡蠣煅醋炒貝母去心熏各四兩共為末煉蜜為丸每服三錢開水下每日二服服之即消屢試奇效又方凡瘰癧已破者將先破處麵糊作餅貼上用小砂壺二個澆酒煎滾去酒以熱壺口覆於麵餅上熏瘡如拔火壺一樣壺冷再換一壺如此數次將毒氣拔盡即愈熏後用豬膽熬成膏貼瘡口奇效又方集成白玉丹專治瘰癧破爛連及胸腋臭穢難聞十數載不愈者藥到病起其效如神新出窯石灰一塊滴水化開成粉用真生桐油調勻乾溼得中先以花椒蔥煎湯洗淨以此敷之又方荊芥要近根下一段須向藥店買回自取為真剪碎煎湯溫洗良久看爛破處紫黑針刺去血再洗三四次用樟腦雄黃等分為末麻油調掃上出水次日再洗再掃以愈為度凡瘰癧延至胸前腋下及兩肩頸項不能轉動四五年不愈者皆治其效如神又方冰螄散大田螺五個去殼線穿曬乾白砒一錢二分麵裹煨熟頂上牙色梅花冰片一分真磠砂二分各為細末和勻再研瓷瓶收貯以蠟封口不可泄氣先將瘰癧用隔艾灸法見痛毒諸方灸七次候灸處起泡用小針挑破將此藥一二里口水調成餅貼上上用膏藥不論何項膏藥灸蓋之一日一換七日後四邊裂縫再貼七日其核自黏豪藥而出矣瘰形長者及根大頭小者忌用並治癭瘤頭大根小者亦效又方紅膏藥緑膏藥見癰毒諸方未破能消已破能拔出根核均極神效又方瘰癧破爛見有黑筋如鐵線者名鐵線瘍最難醫治用物鉗出筋頭緩緩扯出長一二尺或數尺不等總要筋根拔盡方可斷根鼠癧此症瘡口已合旁邊有眼出膿不止即是又有頸項生之不已復從腳底而生俗謂鼠子打洞其症尤惡用老鼠一個去毛搗爛亂髮一團用火腿肥肉煎出油入鼠發二物熬至消盡為度以一半敷瘡眼一半酒沖服神效之至永戒食鼠鵝兔肉再無後患又方蝦蟆散見癰毒諸方敷之極效又方用老貓頭骨火煅為末麻油調搽效或用蚺蛇油搽之亦效又方白蘚皮煮汁服一二碗當吐惡物如鼠子足已破出膿亦效此葛仙翁方也九子瘍生頸上一連九個者是用雞蛋一個淨水煮熟破為兩邊去黃以真麝香一分冰片五分摻在瘍子上從初生第一瘍子起將雞蛋一邊蓋上外以干艾一大團燒蛋外總以瘍子大痛為度如痛不可忍則將艾暫除痛止又燒蛋干又換每日夜約燒五六次次日又換新冰麝仍用新蛋照前法燒之再用蒲公英夏枯草金銀花各二錢甘草節錢半水煎服數劑效驗非常落頭疽方見頭部遮腮方見面部骨槽風方見齒部乳岩方見乳部井泉疽方見胸部甲疽脫骨疽方見手足各部背疽方見背部少腹疽小腸疽方均見腹部多骨疽一人疽內生一大骨用舊爛棺木底板研末紙卷燒煙燻之而愈或用干狗糞燒熏亦妙諸瘡出膿後久不收口內必有多骨也用推車散蜣螂俗名推車蟲又名推屎蟲炙研極細末每一錢入乾薑細末五分要細如灰面入瘡孔內次日自有骨出骨儘自愈或用蜣螂腦和灰面敷亦效此林屋山人經驗方也又方烏母雞一隻去肉取生骨燒成炭再取鄰右三家所用甑底及砧案刮下垢屑一兩俱燒枯共研為細末納入瘡口其碎骨即盡出而愈又方密陀僧研末桐油調稠攤布貼之甚效又方大癩蝦蟆一個亂髮如雞蛋大二團豬油半斤熬枯去渣再熬成膏先以桑根皮烏頭煎湯洗淨用龍骨末撒瘡口四邊再以此膏藥貼之一日一換俟骨出盡即愈附骨疽生大腿外側又名貼骨疽又名縮腳疽初起不熱不紅甚則錐痛難以屈伸轉動不便久則寒鬱為熱熱甚作膿而無頭皮色不變漸透紅亮一點則為內膿已成潰則收功甚難用白芥子研末燒酒調敷或以大戟甘遂研末白蜜調敷內服陽和湯每日一劑四五服可消消後再服子龍丸或小金丹以杜患根大忌開刀開則定成縮腳損疾此林屋山人祕方也各方見後咬骨疽生大腿里側治法與附骨疽同剩骨疽此症一名朽骨疽多生腮齶牙床眼胞頦下手足腿膊等處其症與附骨疽大約相同亦陰症也又初生小兒身內即有如脆骨者其人長大後是處突腫生疽潰後骨脫其口方收生附子為末調作餅如三個錢厚貼瘡上以艾絨一團四五分燒之但令微熱勿令疼痛如餅乾則再換藥餅燒之務以瘡口紅活為度余照附骨疽及陰疽各方治之鶴膝風方見腿部橫痃與前癰毒門楊梅瘡方參看又名魚口便毒又名外疝生小腹兩旁大腿縫中形如腰子皮色不變按之堅硬而微痛者是也每日用皂角刺六錢研末布袋裝好同糯米二合煮粥時時服之三四日全消或用子龍丸見後每服三分日服三次全愈方止大忌開刀開則惟出白漿三百日而死此林屋山人祕法也紅腫者查癰毒諸方治之內鳳仙膏黃明膏尤為神妙又方五倍子新瓦上焙乾研末好陳酒調勻攤布貼之布上加紙一層過夜即消潰爛久不收口貼之亦效屢試如神流注流注發無定處如塊如核漫腫無頭皮色不變或痛或不痛久則破而流走是也若忽然身生疙瘩紅腫遊走名遊風丹毒與此不同不可誤認此症毒發陰分因痰塞清道氣血虛寒凝結一曰寒痰一曰氣毒初起用二陳湯加陽和丸同煎數服全消消後接服小金丹七丸以免復發如皮色稍變極痛難忍者須服陽和湯以止其痛使已成膿者不痛而破此乃以大疽變小之法如患處稍軟可用針刺破膿多白色以陽和膏貼之但此症破後毒痰流走患生不一故初破之後五日內仍服小金丹十丸以免後患接用犀黃丸陽和湯每日早晚輪服使毒痰消盡不補可必收功屢試屢驗倘小孩不能服煎劑者初起以小金丹化服至消乃止如已成膿者亦須日日服消可使不痛而穿俟其毒氣去盡用保元湯見癰毒門加肉桂五分日服收功神效莫測如系孕婦患之當問胎懷月數倘未滿六個月犀黃丸有麝香不可服服防墮胎當以陽和湯愈之愈後再服三四劑以代小金丹免致流走至穩至靈均林屋山人祕法也陰疽諸方後有增補仙方參看陽和湯治乳岩失榮石疽惡核痰核瘰癧流柱橫痃並治一切色白平塌陰疽等症此為陰疽聖藥萬應萬靈從無一失珍之寶之熟地一兩真鹿角膠三錢上肉桂甘草各一錢炮薑麻黃各五分水煎服服後再飲好酒數杯謹戒房事服至病愈為止無論冬夏皆宜不可妄行增減體虛極者肉桂炮姜可加一二倍用或加附子更妙又癰毒諸方內降癰活命飲亦治陰疽方用肉桂炮姜各用至錢半之多誠以陰寒凝結非此不為功也宜參看酌用陽和解凝膏治一切已破陰疽惡毒效若仙丹萬金難得不可輕視並治瘧疾凍瘡皆效新鮮大力子根葉梗又名牛蒡子三斤活白鳳仙花梗又名指甲花四兩用麻油十斤將二味熬枯去渣次日以附子桂枝大黃當歸肉桂官桂草烏川烏地龍又名蚯蚓殭蠶赤芍白芷白蘞白芨各二兩川芎四兩續斷防風荊芥五靈脂木香香櫞陳皮各一兩共入油熬枯瀝渣過夜油冷稱過斤兩每油一斤加炒透黃丹七兩攪勻文火慢熬熬至滴水成珠越老越好以油鍋移放冷處取制過乳香沒藥各二錢蘇合油四兩麝香一兩研細入膏攪和半月後攤貼一應潰爛陰疽神效凍瘡貼一夜全消潰者三張全愈瘧疾貼背心此方惟麝香最貴如無力制配熬膏時不用俟用膏時每張加麝香數釐貼之亦可犀黃丸治石疽惡核失榮瘰癧乳岩流注橫痃肺癰小腸癰一切腐爛陰疽屢試神驗百發百中之仙方也制乳香制沒藥各一兩麝香犀牛黃各三分共為細末取黃米飯一兩搗爛與各藥末和勻為丸如粟米子大曬乾忌火烘每服三錢熱陳酒送下患生上部臨睡時服下部空心服小金丹治流注惡核痰核瘰癧乳岩橫痃及一切無名陰疽初起屢試如神萬無一失真仙方也內有五靈脂不可與人參高麗參黨參同日而服白膠香即楓樹油香草烏五靈脂地龍即蚯蚓制木鱉各一兩五錢制沒藥制乳香歸身各七錢五分麝香一錢陳墨一錢二分用糯米粉一兩二錢煮稠和入各藥末搗干捶為丸如芡實大一料約為二百五十丸曬乾忌火烘瓷瓶收貯以蠟封口勿令失氣臨用取一丸布包放平石上隔布敲碎入杯內以好酒浸入用小杯蓋住一二時以熱陳酒送服盡醉蓋被取汗即愈患生下部空心服上部臨睡服一切陰疽初起服至消散為止如流注等症成功將欲潰爛及潰爛日久者以十丸分作五日早晚服之以免流走若小孩不能服煎劑及丸藥者服此最妙子龍丸即陳無擇三因方中之控涎丹也治頸項胸脅背腰筋骨牽引鉤痛流走不定手足冷木氣脈不能此乃痰涎在胸膈上下不可誤認為風癱也並治喉中結氣似苦梅核時有時無沖喉悶絶又遍身或起筋塊如榴如栗皮色不變不疼不痛但覺痠麻或自潰串爛流水如涎經年不愈有苦管漏此乃痰滯經絡所致又治瘰癧魚口便毒貼骨一切陰疽屢試神效制甘遂製法見藥物備要大戟煮透去骨曬乾忌火炒白芥子炒各等分為末煉蜜為丸梧子大每服三分淡薑湯下忌與甘草之藥同日而服此乃治痰之本痰之本水也濕也得氣與火則結束為痰大戟能泄臟腑水濕甘遂能行經隧水濕直達水氣所結之處以攻決為用白芥子能散皮裡膜外痰氣惟善用能收奇效也拔毒法治癰疽惡毒瘡口潰爛久不愈者神效活癩蝦蟆眼紅腹無八字紋者勿用破腹刺數孔連腸雜用貼蓋瘡口輕者日換一次重者日換二次數日平愈以上各方乃林屋山人歷代家用陰疽良法為千古獨得之祕藥到病除應手奏效真有起死回生之功古今諸家所立陰疽各方皆不及此存心濟世者加意寶之不可忽視回陽玉龍膏治一切陰疽惡毒敷之痛者能止不痛者即痛而速愈已破亦能收功凡遇各項陰疽如前陽和等膏制之不及或貧寒力不能制者此膏與後真君妙貼散皆有奇效如乳岩及各陰疽險惡不症不能收功者仍用陽和等膏為妥生草烏三兩生薑二兩煨白芷炒生南星各一兩肉桂五錢共為末用頂好燒酒調敷真君妙貼散與上玉龍膏功同好硫黃三兩蕎麥二兩灰面一兩共為細末水和捏作小餅曬乾收之用時研細新汲水調敷破者麻油調敷鐵尉法治乳岩流注失榮瘰癧惡核痰核一切陰疽初起未成者用敲火所用的鐵鐮二三塊在石上敲令極熱在患處時時輪流尉之宜順尉不宜倒尉初尉微痛久則痛止毒消無論何項陰疽無不神效風濕灸法治一切陰疽初起神效方見筋骨門趕毒散治腿膝貼骨等處初起漫腫無頭皮色不變微覺痠痛或日久成管成漏等症方見癰毒阿治門趕移瘡毒內陰疽治驗王姓媳頸上瘰癧數個兩腋生惡核三個大腿患一毒不作痛癢百餘日後日漸發大形大如斗按之如石皮現青筋常作抽痛經治數人皆稱曰瘤余曰瘤乃軟者世無石硬之瘤耳此是石疽陰症也問可治否簽曰初起時皆可消日久發大上現筋紋雖按之如石然其根下已成膿矣如偶作一抽之痛乃是膿膿之證也上現青筋者其內已作黃漿可治如上現小塊高低如石岩者不治三百日後主發大痛不潰而死如現紅筋者其內已通血海不治倘生斑點即自潰之證潰即放血三日內斃今患所現青筋醫其至軟為半功潰後膿變濃厚可冀收功也外以活商陸搗塗內服陽和湯十日則止一抽之痛十三劑裡外作癢十六劑頂軟十八劑通患軟其頸項之癧塊兩腋之惡核盡行消散一無形跡止剩石疽立起內膿袋下令服參一錢因在筋絡之處先以銀針刺穿後以刀闊其口以紙釘塞入孔內次日兩次流水斗許大劑滋補托時刪去人參倍增黃耆連進十劑相安已極適有伊戚亦行外科道者令其耆草換炙服不三日四圍發腫內作疼痛復延余治余令以照前方服又服二十餘劑外以陽和膏隨其根盤貼滿獨留患孔加以布捆綁人問因何用膏貼又加捆綁簽曰凡屬陰疽外皮活內膜生故開刀傷膜膜爛則死所出之膿在皮裡膜外僅似弄又不能生肌藥放入故內服溫補滋陰活血之劑外貼活血溫暖膏藥加之以捆使其皮膜相連易於膿盡且又易於連接生肌果綁後數日內膿濃厚加參服兩月收功閶門龔姓腰生一疽根盤寬二尺余前接腹後接背不紅不腫不痛不軟按之如木初延余治以肉桂炮姜書於方首後另延三四名家衆視余方皆曰酷暑安可用此熱藥大以為非議用攻托清涼之劑連治五六日病者神昏胃敗復延余治患仍不痛色如隔夜豬肝言語不清飲食不進余曰能過今晚再議是夜即死不久伊戚亦患此症延余治以陽和湯服下次日覺鬆再服疽消小半才以犀黃丸與陽和湯逐日早晚輪服服至第五日全愈後有背疽相同者亦照治而愈木瀆鎮談姓婦背生一疽如碗初起色白後轉紅痛甚時正三伏余以陽和湯服旁人云此暑天何用麻黃髮表及薑桂熱藥余曰此陰症也彼云色既轉紅陰已變陽余曰無防服後淡一時痛止接服四劑不痛而破五日收功宜興徐姓子年歲半太陽一毒背上心臍對處二毒頸後對口一毒腰腹二毒兩腿五毒皆皮色不變其大腿二毒已經別醫開刀割破延余往治因孩小不能服藥用小金丹日服二次第五日消去九毒又以小金丹日服一次並添一乳母十日後所破二孔皆紅潤以保元湯加肉桂三分煎一杯另水煎參六分兌服服至半月後將耆草炙過用之一月收功興邑路姓子年七歲頂門上寸許大連生三疽潰爛久不收口孔如棋子大淺而無膿干而色灰人倦無神飲食少進因服涼藥過多所致延余往治余曰色似香灰氣血兩盡乾枯無膿精神已絶何能治之次日而夭山塘姚姓婦年二十九小産月餘左肩搭手處先發一毒周圍尺五半月後背脊添生一毒自上至下長一尺三寸皆色白低陷十日後始請余治勢甚危險連服陽和湯三劑人能起坐五劑自能大小便十二劑以後發者全消先發之搭手四圍皆消止其頂膿足不痛而穿四日收功復言背上如負一板舒轉不快以小金丹十丸日服二丸全愈一人身患楊梅瘡又患魚口余思魚口乃陽虛之證藥宜溫補楊梅系火毒之證藥宜涼解二症相反必兩相宜之藥非犀黃丸不可令其每日空心時酒送三錢十服二症全愈後一人患亦相同因毒重二十服收功程姓母年七十膝下患一流注陰疽潰爛數月患下及旁接連又起硬種二塊延一醫以新發之毒認為舊患旁腫不識流注竟以消毒之劑與服以致新發者被托發痛始延余治余以陽和湯服三劑新發二毒皆消接服小金丹十丸後進滋陰溫補以杏仁散敷半月膿厚服保元湯加肉桂十餘劑而愈一婦頸生痰核三處年久生管余以拔管藥插入日換一次半月已愈兩處有一處管已醫淺不意伊夫遠歸兩日管深如舊余曰此刻治定無功效俟伊夫出外半月方可收功數日後婦回母家延余往治而愈洞庭秦卜年頸上及兩腋生惡核十二處破爛三載不愈余以陽和湯犀黃丸輪服半月十已愈八喜甚帶藥而回路遇涼粉買食歸家又食冷水過面次日大小便閉第五日死此其自不惜命故記以為病者之戒楓鎮閔性年十七患瘰癧爛成一片延爛耳腋及腰如手掌大者數處瘦弱異常初以洞天救苦丹服之毒水大流十日後以陽和湯醒消丸每日早晚各服一次十日頸項即能舒轉飲食日增外貼陽和膏內服大棗丸始終用荊芥湯洗以山蓮散敷九十日收功因未服子龍小金二丸毒根未除後腋復生惡核仍以子龍丸消之陰疽孽報凡落頭對口發背腰花人面等疽及一切陰疽惡毒如果醫治無效恐系冤孽所侵偶憶王漁洋池北偶談內載歙人胡半庵順治丙午兩膝患人面瘡延醫一百三十多人瀕死者數矣瘡忽人言曰汝前生將我害死今日報汝醫何能為詣佛懺悔可耳胡即書誦經卷而愈他書所載似此甚夥可見虔心懺悔自能立起沉疴報應分明捷如影響急宜恐俱修省或可延年卻病也陰疸無價活命仙丹增補陰疽單方有人於尻骨間脊骨最下處生雙疽晝夜徹痛者十餘日百藥罔效後用白豆椿木少加水揉作團蒸透趁極熱罨疽上痛即止略冷取去復痛因多做數團冷即更換日夜輪流蒸罨經數日獲痊此經驗單方也膏藥方系異人傳授治背發見奇功第一良方也治諸瘡毒俱皆效驗一大生地六兩切片二黃芩二兩切片三大粉草一兩五錢切片四鬱金二兩切片五黃蠟二兩六白蠟一兩七藤黃五錢上四六冰片三錢擂末要牙色香味清幽碎小者為佳白色大片香味濁者系樟腦煉成切不可用買公豬板油二斤微火煉熟去渣後按上各藥次序逐一炸枯去渣至藤黃止俟冷定將凝凍時再下冰片末調勻將藥缸放涼水鉢內侵之面上蓋好夜晚放外露之次早抬回放陰涼處浸露三夜之後則退盡火氣矣先熬陳茶艾葉甘草銀花四味洗淨瘡隨用舊棉絮或厚軟棉紙開膏貼患處每早一換生肌一線久則自愈不可急躁真仙方也內外備用諸方觀音救苦膏此膏能治百病或貼或服應驗如神外治者用布攤貼內服者作丸如緑豆大每服七粒切不可多孕婦忌用大黃甘遂研木鱉研萆麻子研各二兩生地川烏草烏三稜莪朮各一錢巴豆研羌活黃柏麻黃皂角肉桂枳實真紅芽大戟白芷各八錢香附芫花厚朴杏仁研穿山甲防風天花粉獨活全蠍檳榔桃仁研細辛研五倍子元參各七錢蛇蛻黃連各五錢當歸一兩五錢蜈蚣十條上藥合三十六天罡之數預先齊戒將麻油五六斤浸五日後用火熬熬藥時忌婦人雞犬並忌汙穢齊戒沐浴於淨室內供觀音大士神位默誦大慈大悲救苦救難廣大靈感觀世音菩薩寶號一千遍用柳枝攪勻熬至滴水成珠再加水飛黃丹二斤四兩密陀僧四兩不老不嫩收入瓷罐放水中拔盡火氣聽用一偏正頭風左患貼左右患貼右正患貼印堂兼卷條塞鼻孔中口含甘草湯咽之一眼科七十二症腫病將耳上角針刺血出貼之星障翳膜拳毛倒睫迎風流淚等症卷條左患塞左右患塞右鼻孔中常飲甘草湯一牙痛貼牙上一喉嚨三十六症單蛾雙蛾喉閉喉風俱貼喉上口含甘草水如要速效開水送服七丸不可飲甘草水一咳嗽哮喘吐痰貼前後胸勿吞服一噎隔貼胃口並服七丸一吐血鼻血貼兩腳心並服甘草湯一中風用瓷調羹撬開口滾水灌下七丸一豉脹貼臍下丹田並服七丸一癆病有蟲貼背脊尾閭肚腹飲甘草湯七日癆蟲盡死一瘧疾一二三等日俱貼肚臍飲甘草湯如發過四五次者早晨時服下七丸飲熱酒數杯即日便止一傷寒蔥白湯服七丸一汗而愈一大小便閉俱貼肚臍飲甘草水自通如數日不通危在旦夕開水送服七丸小腹用蔥汁甘草汁調敷立下勿服甘草水一各種痢疾俱貼胃口肚臍四五日不愈者紅痢用龍眼殼七個打碎煎湯送下七丸如白痢用荔枝殼核七枚打碎煎湯送七丸赤白兼者用龍眼荔枝殼核各七枚打碎煎湯送七丸一便血腸風夢遺白濁俱貼肚臍一痔漏內則卷條插入外則貼之一婦人難産逆生胞衣不下作丸熱酒送下七丸立刻便産産門小腹煎甘草水瀕洗不可服一婦人赤白帶下貼肚臍下及丹田常服甘草湯一血塊痞疾貼患處體壯者服七丸即瀉出矣一小兒驚風作條塞鼻並服七丸一小兒諸般疳症貼肚臍口疳貼牙床回生再造丸治男婦中痰中風口眼歪斜手足拘攣言語不清左癱右瘓筋骨疼痛半身不遂步履艱難初起氣絶者服之即可回生久病者平復如常功同再造故名孕婦忌服真水安息四兩人參二兩真蘄蛇小者為佳去骨並頭尾三寸酒浸炙取淨末四兩當歸川芎川連羌活防風元參以上酒炒藿香白芷茯苓麻黃天麻川萆薢片子薑黃以上炒甘草炙肉桂研首烏料豆水蒸九次白蔻仁研西琥珀研黃耆蜜炙大黃酒蒸草蔻仁研雄鼠糞兩頭尖者是熟地以上十三味各二兩穿山甲前後四足各用五錢麻油浸炙共二兩全蠍去頭尾足靈仙酒炒葛根桑寄生各二兩五錢北細辛赤芍烏藥酒炒青皮酒炒於朮土炒殭蠶洗炒乳香去油沒藥辰砂骨碎補酒炒香附去皮毛酒炒天竺黃制附片生龜板火炙熬過省不用沉香母丁香膽星以上十七味各一兩紅花酒浸烘乾犀角尖各八錢厚朴地龍炙乾松香煮九次各五錢廣木香四錢不見火梅花冰片犀牛黃各二錢五分血竭八分虎脛骨一對炙酥共為末煉蜜和勻搗數千捶為丸每丸重一錢金箔為衣蠟殼封固每服一丸生薑湯下太乙紫金錠此藥能治百病效驗如神凡居家遠出不可無此山慈菰去皮洗極淨焙二兩五倍子洗刮焙二兩千金子仁白者研紙壓去油一兩紅芽大戟去蘆洗焙一兩半麝香三錢以端午七夕重陽天德月德黃道上吉日預先齊戒虔心製藥為末陳設拜禱過重羅令勻用糯米濃湯和勻入木臼內杵千下作一錢一錠病重者連服數錠瀉一二次隨食溫粥即止矣治一切飲食藥毒蠱毒瘴氣河豚土菌死牛馬等毒並用涼水磨服一錠或吐或痢即愈一癰疽發背疔腫楊梅等一切惡證風疹赤遊痔瘡並用溫水或酒磨日塗數次立消一男婦陰症傷寒狂亂瘟疫喉痹喉風並用冷水入薄荷汁數匙化下一心胃及一切氣痛用淡酒化下一泄瀉痢疾霍亂紋腸痧用薄荷湯下一中風中氣口緊眼歪五癲五癇五邪鬼胎筋攣骨節痛並暖酒下一自縊溺水心頭溫者冷水磨