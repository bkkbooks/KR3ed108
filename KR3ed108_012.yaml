body:
  text: 卷十二急救凡自刎縊死溺死及一切自盡等症人多畏懼不救亦有以為已死不能復活者不知救治得法亦可回生救得一人可全兩家性命後列各方果能如法施治必有奇效即使萬無生理亦當盡人事以聽天命不可見死而不救也五絶凡五絶卒死急取韭菜搗汁灌鼻中或加皂角末麝香同灌更為快捷吊死回生丹見後跌打損傷門灌之立活真仙丹也又方不可割斷繩索急以衣裹手緊抵糞門若系婦女則連陰戶抵住緩緩抱住解下安被放倒即將所吊繩索用碗裝好用火蒸之其活更快一人踏其兩肩以手緊提其發不可使頭垂下一人微微捻整喉嚨一人擦按心胸又輕輕摩其肚腹一人摩擦手足緩緩彎動若已硬直但漸漸強彎屈之又用腳裹衣緊抵糞門陰戶不使泄氣以兩人用竹管吹其兩耳不可住口或用雞冠血滴鼻中男左女右男用雄雞女用雌雞如此一飯之久即有氣從口出不可鬆手少刻以淡薑湯或清粥與食令潤咽喉漸漸能動乃止凡吊死從早至晚雖已冷可活自夜至早稍覺難救總之身體稍軟心下微溫者雖一日以上若依此救法多吹多摸無不活者勿謂已冷略忽不救又方照前法救治再將其兩手大拇指並排平正以小帶縛定於兩指縫中離指甲角一分半之處名鬼哭穴用艾火燒三七次並燒兩腳心三次即活凡無故中邪而自縊者以多燒鬼哭穴為要又方炒熱生鹽兩大包從頸喉尉至臍下冷則隨換不可住手其痰盡下並用人對口以氣灌之其活更快又方陳皮八分厚朴製半夏各一錢肉桂乾薑各五分甘草三分水煎服又方蔥心刺耳鼻中有血出即活又方用手緊掩其口勿令通氣兩時許氣急即活又方用皂角細辛等分為末如豆大許吹兩鼻孔又方用真野山羊血二三分研極細以好酒灌下立活溺水死撈取時急急將口撬開橫銜筷子一根使可出水以竹管吹其兩耳碾生半夏末如豆大吹其鼻孔又用皂角末置管中吹其穀道如系夏月將溺人肚腹橫覆牛背之上兩邊使人扶住牽牛緩緩而行腹中之水自然從口中並大小便流出再用生薑湯調蘇合丸灌之或生薑湯灌之並用生薑擦牙若無牛用一人覆臥躬腰令溺人如前將肚腹橫覆於活人身上令活人微微搖動水即可出或用大鍋一口覆寬凳上將溺人覆於鍋上亦可要將溺人臍對鍋臍俯臥手托其頭如系冬月急將濕衣更換一面炒鹽用布包尉臍一面厚鋪被褥取灶內草灰多多鋪於被褥之上灰上再加被褥不可使灰迷於眼內其撬口銜筷灌蘇合丸生薑湯吹耳鼻穀道等事俱照夏天法冬天蘇醒後宜少飲湯酒夏天宜少飲粥湯按灰性暖而能拔水凡蒼蠅溺水死者以灰埋之少頃即活此明驗也溺人倘或微笑必急掩其口鼻如不掩住則笑不可止不能救矣又不可急於見火一見必大笑而死又以酒罈一個紙片一把燒放壇內急以壇口覆臍上冷即燒紙片放壇內覆臍去水即活又初救起時尚有微氣或胸前尚暖速令生人脫貼身熱衣為之更換抱擔身上將尸微微倒側之令其腹內水流出若水往外流即有生機一面用粗紙燒燃取煙燻其鼻竅稍熏片時即用皂角研細末吹入鼻竅但得微有嚏噴即可得生又灌酒湯不可太熱恐傷齒盡落又方先打壁泥一堵置地上以溺人仰臥其上更以壁土覆之只露口眼自然水氣吸入泥間其人遂蘇雖身僵氣絶用此法亦可救又醋灌鼻中綿裹石灰納糞門及陰戶水即出又方鴨血灌之即活終身戒食鵝鴨割喉腹破腸出均見卷十三跌打損傷門服毒方見後解救諸毒門凍死冬月凍極之人雖人事不知但胸前有微溫皆可救倘或微笑必為急掩其口鼻如不掩則笑而不止不可救矣切不可驟令近火但一見火則必大笑而死凍死四肢直口噤有微氣者用生半夏末如豆大少許入耳鼻內又用大鍋炒灰布包尉心腹上冷則換之候目開以溫酒及清粥少少與之不可太熱恐傷齒盡落如已救活用生薑搗碎陳皮捶碎各等分用水三碗煎一碗溫服又方用氈或草荐卷之繩索系定放在平穩處令二人相對踏令滾轉往來如卷氈法候四肢溫即活又方用雄黃焰硝等分為末點兩眼內角壓死跌死人扶起盤腳坐地以手提其發將生半夏末約豆大吹兩鼻中以生薑汁灌之只要心頭微溫雖至一日亦活再用白糖調水與服散其瘀血或加童便灌之又方回生丹見後跌打損傷門灌之立活真仙丹也雷擊死蚯蚓又名地龍又名曲蟺搗融敷臍上半日即活仍禱謝雷神虔心懺悔或用回生丹見後跌打損傷門灌之亦可活也須戒殺生睡魔死與後中邪死鬼打死各方參看原有燈須存燈無燈切不可用燈照急用生半夏末約一豆大吹入兩鼻取母雞冠血搽面上干則再搽即醒又方樟木燒煙燻之即醒又方不得用燈火照並不得近前急喚但痛咬其足跟及足大拇趾頻頻呼其名以口水唾其面再灌薑湯必活又方移動些小臥處徐徐喚之即醒又方用管吹其兩耳以皂角末如豆大許吹兩鼻得噴嚏則氣通三四日者尚可救又方酒調蘇合丸灌之又方用艾燒兩足大拇趾向上生毛處三七次或燒鬼哭穴亦可鬼哭穴見前吊死方內治夢魔大塊明雄硃砂更妙戴頭上並系左腋下可免鬼魅並解惡夢又方臥時以鞋一仰一覆或以紅氈紅巾之類枕頭即安中邪死用韭菜心於男左女右鼻內刺入六七寸令目開血出即活或搗韭汁灌鼻更視上唇內有如粟米粒者以針挑破取出或皂角末或生半夏末如豆大各吹兩鼻中燒炭一爐以陳醋潑炭上使患者聞得醋氣即活須捉其兩手勿令驚或灌醋於鼻中或用樟木燒煙燻之亦可鬼打死睡魔死中邪死俱可用此方白毛烏骨雞血搽胸前並將雞煮湯灌之極效或用雞冠血滴口中仍破此雞拓心下冷即將雞埋之甚效驚嚇死回生丹見跌打損傷門灌之立活真仙丹也又方醇酒一二杯溫熱灌之自活或用生半夏末一豆大吹兩鼻中亦可痰厥死巴豆搗爛綿紙包壓取油作捻燒煙燻鼻中片刻吐出痰血即愈或用生半夏末如豆大吹兩鼻中氣厥死照上痰厥方治之中風死方見卷十四中風門或照上痰厥方治之尸厥死由入廟弔喪問病而得者附子七錢重者泡熱去皮臍為末分二服每服酒三盞煎一盞如無附子生薑汁半盞和酒同煎百滾連灌兩服即醒或照上痰厥方亦可尸厥死腹響如雷硫黃一兩焰硝五錢研細分作三服好酒煎至煙起為止溫灌下片時再服即安忽然胡言亂語昏迷跌倒此症不省人事切勿挪動動則難言急用大爆竹放頭腳兩處頭頂邊一個腳底一個一齊點放其人自醒無恙大小皆治屢試如神暴厥死凡人卒然倒僕急扶入暖室扶住正坐用火炭沃醋使醋氣衝入鼻中良久自醒或搗韭菜汁灌鼻或用皂角末吹鼻得嚏即醒如倉卒無藥急於人中穴及兩足大拇趾離甲一韭菜許各用艾火炙三五次即活發花風死此症多死於床上見腎俞穴背脊下腰眼處即是有一紅點者可治若黑者不治急用麝香填於臍眼加姜一片蓋麝上艾火灸而生解救諸毒凡解毒藥俱宜冷服大忌飲熱湯水飲熱則不可救矣若見酒必死解救百毒乾淨地上黃土地更好挖三尺深入水一桶用棍攪動名曰地漿能解百毒凡食隔夜果餅菜蔬茶水酒漿等物或飲田塘溪澗井溝之水誤中無名百毒者取飲數碗極為神效愈後戒食鱔魚又方巴牆草搗爛煎湯冷服能解百毒屢試屢驗神方巴牆草即土築牆上蔓生細葉如瓜子樣草中毒七孔流血刺猥皮煅存性為末每服三錢酒調下立止解鴉片煙毒急用活鴨血多多灌之凡服鴉片煙者最為神效若身冷氣絶似乎已死如身體柔軟則臟腑經絡之氣尚在流通實未死也乃鴉片烈性醉迷之故耳將其人放在潮濕陰地用筷子撬開牙齒或用瓷調羹撬開或用烏梅擦之亦開若用銅鐵等物反不能開矣以筷子橫放口內使口常開以冷水時時灌之或白砂糖調冷水灌之更妙外用手帕三條以冷水泡透放胸前輪流更換或用整塊豆腐亦可又用冷水一盆將頭髮散放盆內時時換水切不可見太陽一見日照即不可救三四日後鴉片之氣散盡即活如身不硬雖七日內亦可回生切不可以為無救遽行棺殮此法曾救多人無論服毒輕重雖手雖青黑照此救法無不活也切忌灌服醬油恐受鹽滷之毒反致誤事若服藥雜亂亦不可救慎之慎之活後多服白砂糖水及生緑豆末沖水服最效有老仵作云檢服鴉片煙尸骨伏者居多側者亦常有之平仰者甚少蓋因其人埋在土中鴉片毒氣退盡仍復生活輾轉棺中不能復出久則真死矣故其骨殖不伏即側實為服鴉片煙可救之確證也道光七八年間廣東省有吳姓者寄居客店窮極無聊吞鴉片煙而死店主人不敢收殮知此人有親屬在三水縣地方遣人往告其親屬四日後始至而此人已於前一日活矣又有人吞服鴉片煙百藥不效死後降乩云當日因用藥雜亂是以不效惟用真南硼砂黃色如膠者為真冷水調服可以立解試之屢有奇驗又方用清油灌之立解緣鴉片煙黏滯腸胃見油即散也又方巴牆草搗爛煎湯冷服屢試如神解砒霜毒即信石也此症如用鴨血治活終身戒食鴨防風一兩研末冷水調服或用四兩冷水擂汁灌服亦可屢試如神萬無一失又方殺白鴨取血對口急急灌之即活遲則血冷如已服防風必能回生可以不必服此以免雜亂反致不救解野菌毒照前取地漿水三四碗入喉即活至神至妙切勿輕視亦不必用別藥以鹽擦牛舌上以碗盛牛涎灌之奇效解斷腸草毒此症治好須戒殺生此草有尖圓兩種如服尖葉者不過一二日內即消化急用活羊血灌一二碗即活最有神妙有人以此草放豬尿胞內草自走動脬自澆薄後以羊血灌入即不動矣或服羊油二三兩亦妙此草惟羊食之最肥故飲羊油羊血即解又方蕻菜捶汁灌之其效如神如不見信以菜汁灑生斷腸草上草即萎黃而死又方韭菜搗汁灌入亦效又方用抱過雞蛋兩三個破開和清油灌入或未抱過雞蛋亦可又方照後解野葛毒方治之神效此方能解水莽草毒解黃藤草毒即水莽草或云即斷腸草黑豆一升煮膿汁候冷透飲之立解或照前解斷腸草毒及後野葛毒方治之均極神效解野葛毒殺鴨白鴨更好取自然熱血對口急急灌入即活屢試如神不可灌遲遲則血冷恐難見功終身戒食鴨解野草毒照上解斷腸草及解野葛毒方治之或飲甘草水或飲地漿見前均效水莨菪毒菜中有水莨菪葉圓而光誤食發狂狀如中風或作嘔吐用甘草煮汁冷服即解或飲地漿亦可解鹽滷毒生豆腐漿冷服二三碗至神至妙如一時難得以黃豆擂碎沖冷水去渣服之或用活鵝鴨血多多灌之即解戒食鵝鴨又方白砂糖五六兩用冷水調服亦極效驗又方淘米水冷服三四碗亦可解鹼水毒照上解鹽滷毒各方治之解煤火毒中煤炭毒土坑漏火氣而臭穢者人受熏蒸不覺自斃其尸極軟與夜臥夢魔不能復覺者相似房中置水一盆並使窗戶有透氣處則煤炭雖臭不能為害飲冷水可解或蘿蔔搗汁灌之鼻移向風吹便醒解迷悶藥飲涼水即解重則飲藍靛汁立愈如牙關緊閉由鼻灌入亦可又方白沙糖調冷水服更妙解百藥毒凡服藥過多致生瘡毒頭腫如斗唇破流血或心口脹悶或肚腹撮痛者用小黑豆緑豆各一升煮濃汁冷服即解又方甘草熬膏日服數次解毒如神雖然泄瀉亦無害也又方糯米糖食之即解此孫真人方也或食白沙糖亦可又方如已氣絶只要心間溫暖者乃是熱物犯之只用防風二錢煎水冷服即活又方照前解百毒方治之極效解巴豆毒口渴面赤五心煩躁泄痢不止者是用黑豆一升煮之冷飲即解又方川黃連煎水冷服亦效解附子烏頭天雄毒防風二錢煎水飲或照前解百毒方治之解芫花毒治法與上附子毒同解狼毒毒狼毒藥名飲鹽水可解或照前解百毒方治之解木鱉毒身發抖戰者是急用好肉桂二錢煎服立愈或用香油一盞和白砂糖兩灌之亦可或照前解百毒方治之解硃砂毒藍靛葉汁飲之即解解冰片毒服冰片過多口渴心煩飲地漿及冷水即解解水銀毒服水銀欲死者用真川椒數斤炒熱鋪席下令患者脫衣蓋被睡之過一夜水銀從毛孔中鑽入花椒內矣真奇方也解鉛粉毒婦人因打胎而服鉛粉生子癡呆身體多發瘡毒用活鴨血乘熱服之極為神效又方白沙糖三四兩冷水調服或用蘿蔔捶汁飲之均極效驗解輕粉毒輕粉性極燥烈楊梅等瘡服此雖易收功其毒竄入經絡或口齒腫爛或筋骨疼痛攣縮久而潰爛經年纍月甚至終身不愈致成殘廢用土茯苓一兩苡米銀花防風木通白蘚皮各一錢木瓜錢半皂莢子四分氣虛加頂上黨參一錢血虛加當歸七分煎服日服三次忌飲茶並牛羊雞魚肉澆酒麵食辣椒及一切發物並謹戒房事半年服至十日漸至全愈功效異常又方紅棗丸見癰毒諸症楊梅瘡內服之最為神效又方用黑鉛打成酒壺一把約五六斤重內盛好燒酒十五斤土茯苓半斤乳香三錢封固隔水煮一日一夜埋土中七日出火毒早晚隨量飲用瓦盆接小便看有粉出為驗服至筋骨不痛乃止屢試如神解斑蟊毒黑豆一升煮濃汁冷飲即解又方涼水調六一散七錢服二三次必痛止而愈又方玉簪花根煎水冷服即解又方照前解百毒方治之解硫磺毒方內生羊血為解硫磺神藥愈後須戒殺生並戒食羊為要用真烏梅肉一兩焙乾烏梅有李桃假充者以家制為真白沙糖五錢煎服又方白羊生熱血飲一碗神效又方黑鉛二兩煎湯服即解又方防己二錢煎水冷服即解解花椒毒口吐白沫身冷氣欲絶者是照前解百毒方治之即解解食桐油毒急飲熱酒即解又方真乾柿餅食之即解又方蓮蓬煎水服甚效又方糯米蒸熟曬乾炒炮食之解食蛇毒煙油又名煙屎即煙桿中煙氣結成如醬者是煙桿以用過多年者為佳用冷水洗出二三碗飲之凡受蛇毒飲之其味必甜並不難飲屢試如神或蛇遺毒在食物內亦效又方雄黃調水冷服效又方照前野葛方治之又方蜈蚣一條焙枯研末冷水調服一服即解如恐蜈蚣有毒或一二日後照後解蜈蚣毒各方治之決無後患解蜈蚣毒凡誤食蜈蚣毒者用樟樹葉煎水冷服極效又方手指甲磨冷水多飲之其效無比又方照前地漿及野葛方治之均效蜈蚣入腹生雞血灌之甚效又方食生雞蛋二三個略過半刻再飲生油一杯即吐出絶妙方也解各蟲毒照前野葛治之極效解沙蟲水毒萵苣菜即萵筍葉搗汁飲之即解又方照前解百毒方治之極效解螞蝗毒又名水蛭此物入腹久必生子食人肝血腹痛不可忍面目黃瘦不治必死用桂圓肉荔枝肉亦可包煙油煙油查上解蛇毒方便知吞之即死隨於大便而出屢試如神此經驗第一方也又方用白蜜頻頻食之至一二斤方愈螞蝗火燒為末見水即活惟以蜜浸之即化為水故服蜜最佳以多為妙少則不效如食蜜不愈即食羊肉可化如不信將螞蝗入羊肉內亦化為水白蜜體虛不可多服不如第一方之妙又方田中泥一兩雄黃二錢為丸分作四服開水下其蟲入泥隨大便而出有時螞蝗行至鼻孔血流不止只用田泥泡水一碗放鼻孔前必然乘泥而下又方活小魚數條豬板油二兩加黃泥共搗為丸涼水下螞蝗即和泥而出又方青靛調水飲即瀉出又方蘆藜即藜蒿炒為末調服一錢必吐出解河豚魚毒槐花微炒與干胭脂等分同搗成粉冷水調服極效又方多食橄欖並用橄欖核磨水服極效又方飲真麻油一二杯亦效又方照前解百毒方治之如口渴不止者服小便坑中水一小盞數次即止解各色魚毒魚頭有白色連珠至脊無腮無膽有毒紫蘇煎濃汁冷服極效以多為妙又方多食橄欖又名青果並用橄欖核磨水服最效又方冬瓜生搗汁飲之又方魚鱗燒灰冷水調服二錢又方食魚過多腹脹面黃者用紅曲三合煮爛連渣服即從大便出臭不可聞連服三次愈解食鱉毒又名甲魚水魚腳魚團魚飲藍靛汁即解又方冷水調鹽飲之亦可又方淡豆豉一合捶爛再用冷水衝入取汁服即愈又方白馬尿飲之即解鱉與莧菜同食者此方尤妙解蝦蟆毒又名青蛙又名田雞又名水雞照上鱉毒各方治之解黃白鱔毒照上鱉毒各方治之又方生螃蟹搗融沖冷水飲之極驗解螃蟹毒紫蘇煎濃汁冷服一二碗即解生藕汁生大蒜生冬瓜汁生黑豆汁俱可解又食蟹牙根肉腫出者用牙皂角數條火上燒焦泡生地黃汁內半日取出再燒再泡三次後焙乾研末冷透敷之解鷓鴣毒有人好食鷓鴣後喉間生癰潰爛膿血不止百藥不效一名醫令先食老薑一斤陸續煎水服完然後下藥治之遂愈蓋此鳥好食半夏系因半夏毒發故以姜治之也解犬馬肉毒凡食犬馬肉腹脹口渴發熱亂言者用淡豆豉二兩杏仁三兩同蒸搗爛服之日服二三次或煮蘆茅根飲之俱效又方杏仁二兩去皮蒸熟研爛用滾水和勻取汁服服後必然吐瀉俟瀉三次後再服冷醋一茶鍾或冷粥一碗即愈又方荸薺皮焙枯研末七分紫背浮萍焙枯研末三分共和勻開水調服有人食犬停滯久而肚腹腫脹數月不愈後服此方腹響如雷大吐大瀉而愈各種食積腹脹如臌者服之皆效解馬肉毒人乳飲之即解或照前解百毒方治之解食牛肉毒苦瓜皮搗爛沖水服神效又方牛腸中未化草色如青苔即是煎汁調姜鹽醋服之即解又方烏桕樹根皮酒煎服或菊花連根搗汁酒服均效又方人乳飲之即解又方蘆茅根煮汁溫服甚妙又方照前解百毒方治之解鵝鴨毒糯米半斤淘水去米溫服一碗即愈解雞肉毒地漿飲之可解解野雞毒此症吐瀉不止用生犀角末三分冷水調服即解解鬱肉漏脯毒凡各肉密器緊蓋過夜者為郁肉屋漏沾著者為漏脯皆有毒韭菜搗汁飲之即解解諸肝毒照前解百毒方地漿飲之極效又方熟豬油一斤拌飯或炒飯亦可分作一二日食盡此一二日內勿食別物為要解自死各物毒黃柏研末冷水調服一二錢即解或飲人乳一碗極效解藥箭射傷鳥獸肉毒先以鹽水服之次以黑豆煮濃汁飲之即解又方蘆茅根煮熟連湯食極效又方照前解百毒方治更妙解杏仁毒杏仁生熟服之都不為害若火炒不透半生半熟者服十數粒即死其尸眼閉舌唇耳竅手足十指俱青色肚腹有青色塊每有食以詐人者人不易防最難藥化惟急取吐吐出可解用杏樹皮煎湯飲之雖迷亂將死者皆可救或用麝香一分沖水服亦可解百果毒麝香一分煎湯服即解又方白鯗頭煎湯服一二次即愈解木瓜毒舌大滿口者是用好醋調黃糖紅糖亦可含口中吐出涎水數次即愈解豆腐毒蘿蔔煎湯飲之即解解中山洞生金生銀及銅鐵鉛錫等毒照前解野葛方鴨血灌之即活解飲田澗山溪水毒凡田澗山溪往往有蛇遺毒在內誤飲其水用水調雄黃多服數次自愈解隔夜茶水毒服雄黃或地漿均可解諸毒須知飯落水缸毒飯落水缸日久生毛食之生疔難治最宜留心檢點久閉空房毒凡屋宇久閉陰濕閉結不散或邪魅藉以潛蹤蛇虺惡獸從而盤踞宜大張聲勢或先以火驚散山洞園林毒凡偏僻山洞及年久園亭藤蘿花樹之下不可飲食恐有蛇虺毒蟲遊行其上遺毒於食物中為害不小衣有暑毒夏日汗透之衣向日中曬晾忽暴雨將至急為收檢則烈日之毒即蘊於內如遇酷暑汗出時偶一衣之則暑以引暑立中其毒又夏秋曬晾冬衣必須冷透收檢若未攤冷而收入箱篋將來穿著必受暑毒宜於臨穿先一時當風吹透再穿方免其害草藥毒山有毒草入山採藥須細心揀淨瓶花水毒凡瓶內插過茶枝其毒最甚不可誤飲隔夜茶水食物毒凡夜間茶水食物未經蓋好必有蟲鼠遺毒不可誤飲雞毒雞食蜈蚣百蟲久則食之傷人故養生家雞老不食又夏不食雞又黃蠟白蠟炒雞食之脹悶所塞三日而死無可救也凡服藥有蠟者前後十日忌食鱔魚毒白鱔黃鱔昂頭出水者食之必死魚荊並食毒昔一婦以魚湯米飯餉夫路過荊林荊花落入湯中食之遂死凡服藥有荊芥者前後數日忌食魚蝦等物蜜鮓並食毒韶州有僧飽食新蜜還至半道遇賣鮓者買食半斤至家而死河豚藥並食毒凡服藥前後數日俱不可食河豚食之有毒鱉莧毒鱉與莧菜同食腹生小鱉即死飲白馬尿即化遊波蟲毒凡食海蛤慎防遊波蟲其殼骨相似惟以面上無光可辨若誤食之令人狂走欲投水似有祟狀惟醋解之立愈屋漏水毒屋漏滴食物上食之有毒獸雙尾及蟹獨鰲羊一角雞四足白鳥烏首烏雞白首白馬青蹄黑蹄肉落地不沾塵經宿尚暖曝炙不燥入水自動又皮肉無異腸臟變改者如肝色青黯腎氣紫黑魚無腸膽牛肝孤葉鮠魚同鹿肉羊肉同鱠酪羊肉同生椒多食豬肉得胡荽俱殺人生魚同酥乳變諸蟲牛豬肉同食成寸白蟲豬羊肉以桑楮柴煮炙食之亦成寸白蟲柿子同蟹食羊肉食必致患痢腹痛或至不救諸果有異樣者根下必有毒蛇果未成核者食之發癰瘡併發寒熱果落地有蟲緣過者食之生痔漏有雙蒂者有雙子者有沉水者均有毒不可食豬肉忌蕎麥葵菜胡荽梅子炒豆龜鱉鵪鶉驢馬肉羊肉忌梅子豆蕎麥魚膾柿餅牛肉忌栗子韭菜癗子犬肉黍米犬肉忌菱角牛肉雞肉鯉魚鱔魚鰍魚蔥蒜驢肉忌荊芥食之有大毒兔肉忌生薑橘皮芥末雞鹿獺雞忌黃蠟食之必死蒜芥菜李子獺兔犬鱉野雞鴨忌李鱉鵪鶉忌菌子木耳豬肉雀忌李醬生肝鱉諸色魚忌荊芥食之死見前又忌棗鯽魚忌豬肝芥末蒜糖鱉忌莧菜食之死見前雞雞蛋鴨兔雀桃李薄荷芥末鱔鰍忌桑柴火煮螃蟹忌荊芥柿橘棗諸瓜忌油餅蕎麥忌豬羊鰉魚緑豆忌棐子食之死鯉魚酢核桃忌酒野雞筍忌糖鰉魚羊心肝蔥忌蜜食之斷腸雞犬棗楊梅李子入水不沉者不可食柿子和烘青巨不可同食燒酒與生薑同食壞肺燒酒錫器盛燉過宿飲之殺人屋漏水滴肉上必洗盡方可食豬肉落水浮者勿食豬油與梅子同食相反山雞同鳥獸共食殺人犬肉同菱食生癩諸禽鳥肉肝青色者食之有毒暑天水缸須用蓋恐蛇入水中洗浴又蠍虎愛水中交媾娛飲其毒必死婦人誤飲必孕蛇胎誤吞諸物誤吞鐵器炭皮研末調粥二三碗食之炭末即裹鐵器由大便而出神效第一方也誤吞鐵針鐵針卡喉見後蠶豆煮韭菜同食針與菜從大便而出無蠶豆用鹽蛋亦可又方生癩蝦蟆眼珠一對冷水整吞下其針兩頭穿珠立刻吐出或從大便而出神效永戒食蝦蟆又方照前木炭皮研末和粥食之亦出誤吞金銀銅鐵錫鉛羊脛骨即羊前腿膝蓋骨也燒枯為末米湯調服二三錢一日必出有人吞金環三日不下服此即出屢試神驗真百發百中之方也又方橄欖核燒枯研末開水調服自出神效又方糯米糖食半斤亦效又方韭菜一把滾水煮軟不切斷淡食之少頃即吐出或從大便而出誤吞金箔此物吞下或閉喉管或閉肺管遲則難救急取羊血灌之最為神效誤吞銅錢多食荸薺自然消化其效無比又方砂仁二兩煎湯服之亦可化也或照上誤吞金銀等方治之亦可諸骨卡喉此症宜急治之若飲食難進餓倒胃氣亦屬難救凡系獸骨及雞鴨等骨卡者用狗一隻倒吊取涎緩緩咽下其骨即化屢試如神以狗善食諸骨故也又方虎骨研末水調服亦佳又方魚骨卡者用鸕鷀或鴨子倒掛垂取涎令患人仰臥時時灌下其骨盡化又方有人被魚骨橫梗胸中半月不下疼痛叫喚用橄欖核磨濃汁滾水調服愈真仙方也又方灰面四兩用冷水調稠敷兩膝頭上一時之久不知其骨化於何處真奇方也一切禽魚獸骨皆治又方有人因一骨梗喉百藥不下夢人告之服真南硼砂黃色如膠者真最妙遂取一塊含之即愈硼砂多有假充如非真者亦不見效如咽喉腫爛用真南硼砂加頂上梅花冰片和勻吹入藥店冰硼散斷不可用亦恐其假而無功也又方食山楂膏甚效或以山楂煎濃汁服之亦可緣雞骨入山楂膏即化故能治一切骨梗也又方貫衆焙枯研末每服一二錢神效或煎濃湯含口中緩緩咽下亦可又方人指甲瓦上焙枯研末吹入極效又方大蒜塞鼻不令透氣其骨自下又方白糖含口中令其自消則骨與之俱化矣又方魚骨卡者以本魚骨插耳尖縫內左卡插左右卡插右或藏發中亦可神效又方家用苧麻根搗融為丸如桂圓大魚骨用魚湯下雞骨用雞湯下或用苧麻汁飲之亦可又方栗子內薄皮瓦上焙枯存性研末吹入喉中即下栗子又名板栗又方砂仁草果威靈仙各三錢加白糖一兩水煎連服三四碗無論何骨俱化神效此林屋山人極驗仙方也又方制燈芯炭製法見藥物備要研極細吹入三四次神效此林屋山人極驗方也又方藠子又名藠頭又名藠白食之即下又方魚膽飲冬天取鱖魚膽懸掛陰乾遇有各骨卡喉即取一個大者半個亦可水煎溫酒服下少時嘔吐骨即隨出如尚未吐再服溫酒以吐為度酒隨量飲若再未出再煎魚膽服之無不出者如各骨在腹內日久刺疼黃瘦者服之皆出草魚鯽魚膽俱可竹木卡喉者服之亦極效驗存心濟人者宜收藏以救急也又方吳茱萸煎濃汁飲一碗骨至腹中者亦軟而易下又方五月五日午時在韭菜地內面東勿語取蚯蚓泥收之每用少許擦喉外其骨自消又方鯉魚背脊鱗瓦上焙枯研末涼水服之其刺自跳出雖三四日不出者亦神效諸色魚鱗皆可用又方凡卡某魚之骨即用某魚生眼珠以豆皮又名豆腐衣包好拼命吞之無不神效又方輕者用糯米糖為丸吞之即下田螺卡喉鴨一隻以水灌口少頃將鴨倒吊取涎與服即化稻穀卡喉急取鵝口中涎灌之即下蓋鵝涎能化谷也鴨涎亦可又方紫花地丁細嚼吞下神效又方食糯米糖亦下或照前魚膽飲燈芯炭各方亦可竹葉卡喉此物易閉喉管遲則難救急取牛口涎以滾水兌服即化此外夷祕傳也竹木卡喉老絲瓜又名水瓜線瓜燒灰每服三錢兌酒下又方照前各骨卡喉魚膽飲方服之極效又方木卡喉者鐵斧磨水灌下即愈或用鐵鋸放炭火內燒紅淬入黃酒甜酒亦可服之亦可勿令人見又方竹木卡喉者制燈草炭製法見前諸骨卡喉方內開水送下即愈外用燈草炭放膏藥上貼喉痛處一夜即消又方舊籬笆竹燒炭沖水服亦可桃杏卡喉狗頭煮湯服並搽頭頂即愈諸豆卡喉土狗蟲數個又名蛄螻搗爛敷喉外腫處其豆自下鐵針卡喉用癩蝦蟆數個將頭剁去倒垂流血以碗接之得一杯許灌入喉中移時連針吐出針自飲曲永戒食蝦蟆鐵勾卡喉照上鐵針卡喉方治之又方有童子誤吞釣鉤將鉤線一扯鉤已穿入喉管片時頸如斗大後用佛珠大香珠亦可穿入鉤線漸漸將珠挨進直至喉管輕輕將珠向內一推其鉤已脫出在珠上緊緊執著珠繩抽出即安頭髮卡喉舊木梳燒枯為末酒沖服又方亂髮燒灰水調一錢服發灰須令燒盡如有生髮未經燒者食之害人蜈蚣卡喉急取生豬血飲之少頃以清油灌口中蜈蚣滾在血中即吐出出後以雄黃末水調服以解其毒烟酒醉傷水旱烟醉傷胡黃連一錢煎水兌茶服即解洋烟醉傷飲鹽水即解或飲醬油或飲糖水均效酒醉傷凡酒醉死者急解醉人頭髮放新汲井水盆內將衣解開用豆腐遍身貼之無豆腐用布泡井水貼之少刻再換換至數次必醒惟寒天不宜又方樟樹子四錢酒三杯煎滾候溫灌之即醒或用樟木二兩煎水服亦可此仙方也屢試如神如牙關緊閉用烏梅搽牙以瓷調羹撬開灌下或打開一牙灌入切不可以身冷脈絶而不救也又方麝香半分放口中即醒又方黑豆一升煮汁乘溫灌下三盞即醒又方白蘿蔔汁或熱尿灌之俱效又方急用生蚌瀝水灌之又方用鍋蓋上熱氣衝上之水半盞灌下半時即醒酒醉心痛白砂糖三四兩淡酒沖服止痛如神酒醉小便不通葛花三錢燈芯七根酒煮服即通酒病大小便不通生薑汁一茶鍾黃蠟一錢白礬五分共煎滾加燒酒一碗衝入飲之立能止痛再用藤菜煎水熏前後陰大小便即通百藥不效者此方用之如神忌食雞肉十天酒病好酒之人酒毒發作頭痛目眩或咽喉悶閉或下利清水日數十次形神痿頓若誤作陰寒自利妄用溫熱之劑者非矣宜用陳皮五錢甘草一錢川連三錢以上三味俱微炒為末再配松花粉一兩和勻每服二錢早晚以開水送下一服兩日即愈又方麥粉五錢炒黃研末白湯調服不過一二次即目其效如神酒龜用麻雀又名瓦雀一對連毛搗爛煮酒服少時酒龜自出從此滴酒不飲亦無恙也又方一人好飲酒每次二三杯必奔走三五十次有時心痛口吐黃水後用藥吐出一物如蛇乃酒症也又一人好飲酒終日沉醉無酒則叫號不絶日就瘦弱家中令人用繩縛住手足取好酒一罈於口邊使酒氣衝入口中須臾吐出一物如豬肝樣有多孔其人從此不飲亦無他恙醉後嘔吐視物顛倒不正甜瓜蒂藜蘆即藜蒿煎水服使再嘔吐而愈蓋醉傷嘔吐倒膽視物倒顛藥後再吐以正其膽自安戒洋烟癮四物飲赤沙糖一斤生甘草一斤川貝母一兩去心研細老薑四兩先用鴉片灰五錢熬膏再入前藥同煎去渣如一錢癮者食藥五錢逐日減少並以赤沙糖沖水代茶即斷如癮極重者取已煎之汁重煎之十杯煎成一杯再服必效有人二十餘年老癮照此戒斷不可輕視又方南瓜藤取汁調紅糖黃糖亦可飲之神效又已戒烟之人平時多食南瓜免生別病否則煙雖戒斷一二年外仍有後患此西洋祕傳也南瓜北人呼為倭瓜又方粟殼斤半蜜炙透臺黨參一斤川杜仲六兩鹽砂仁二兩研末炮姜五兩廣陳皮二兩堅雲苓四兩焦查肉六兩用水一大鍋煮半日許將渣瀝淨再用微火熬成膏將砂仁末攪入瓷罐收貯癮發時隨癮之大小白開水化服無論癮之新久無不斷也癮來時腹痛加肉桂一兩炙草二兩咳嗽加苦杏仁一兩研成泥麥冬一兩蜂蜜四兩陳皮二兩渾身發攤黨參加倍用瀉者加茯苓炮姜加倍用腰痛者加杜仲三兩不欲食者加砂仁一兩氣下墜者黨參加倍用大便滯者加蜂蜜三兩肝氣發者加當歸四兩姜香附二兩又方真淮山藥茯苓法夏杜仲鶴蝨旋覆花款冬花各三錢加大煙灰三錢河水熬成一面碗去渣分十餘次兌酒服早癮早服晚癮晚服無論新久無不斷者已驗多人甚效又方罌粟殼八錢陳皮八分查炭一錢焦術五分炮姜八分杜仲一錢甘草二錢炙耆三錢香附七分真臺黨一兩上藥每日一服服至月餘其癮必斷已驗多人並無後患又方每日用鱔魚一二條滴血沖酒輕者吃四五十條重者百餘條飲此酒大補氣血魚又可以膾食依此飲之不斷自斷購煙遠避又方用甘草一味熬膏調入煙中吸食二三日即漸不欲吸此方最易既不費錢又不傷人斷後並無煙痢之疾癮深者照法治之一月即斷又方頂上臺黨二兩金銀花旋覆花大生地各五錢麥冬天冬炒白芍真雲苓木瓜各三錢吳萸柴胡各一錢沙苑此味以皮貨店為真各藥店均系假充杜仲各四錢加烟灰二錢同熬與熬煙膏一樣或加紅糖五錢亦可以後每一料加烟灰五分至第五料則不用烟灰癮重者四五料即斷輕者三料除根有入食煙二十餘年百藥不效照此服之五料即安然戒斷並無難過之處無論早中晚癮總於飯前熱水沖服如一錢癮者每服二錢戒烟方多且多用鹿茸人參及各補藥方能見效者此方藥極平淡不拘體氣壯弱服之有效無害屢著奇功不可輕視
