body:
  text: 卷十三人畜蛇蟲咬傷凡各物咬傷日久不愈者人咬傷第二方甘草治之極效人咬傷凡被人咬傷其牙最毒若有牙黃入肉則痛不可忍咬手指者指與手掌俱漸漸爛落年久難愈重者喪命無論日久初起雖至腫爛總宜用童便用淘米水洗亦可洗淨汙血洗時雖痛至不省人事亦須忍住若護痛洗之不淨終難愈也用人糞敷之或用人中黃煎湯時洗較諸治法尤覺神效不可嫌汙穢而自誤也又方照前洗淨之後用甘草自己嚼融厚敷干則隨換日夜不斷三日必愈屢試奇驗並治各物咬傷亦效有人被鼠咬指數年不愈照此洗淨敷治三日收功真神方也又方鱉甲燒灰敷之奇效又方先用童便洗淨用荔枝核焙研篩細摻之外用荔肉蓋貼雖入水不爛神效之極又方好柿餅一個令人漱口潔淨將餅嚼爛盛碗內飯鍋上再蒸極爛敷之三日全愈治過多人皆效仍先用童便洗淨汙血方能見效虎傷凡被虎咬傷血必大出傷口立時潰爛疼不可當急用豬肉貼之隨貼隨化隨化隨換速用地榆一斤為細末加入三七末三兩苦參末四兩和勻摻之隨濕隨摻血即止而疼即定蓋地榆涼血苦參止痛三七末止血合三者之長故奏效如神又方樟樹嫩葉嚼食並令人將此葉嚼融敷之絕無後患又方但飲酒常令大醉當吐毛出而愈或用白沙糖調水多食極效又方嫩松毛捶融如泥將傷口內塞滿極效又方韭菜白搗汁飲之渣敷傷處又方內服生薑汁外以薑汁洗過用白礬末敷之狼傷乾薑末敷或胡椒末敷初覺腫痛少刻即腫消痛止三日而安癲犬咬傷此症最怕七日一發發時天本無風病者但覺風大入帳矇頭躲避此非吉兆過三七之日無此畏風方為可治被咬時先看頭頂如有紅髮二三根趕急拔去最為緊要隨於無風處以冷茶洗淨汙血用杏仁搗融敷之內服韭菜汁一碗隔七日再服一碗四十九日共服七碗傷口上再煮熟雞蛋白蓋上用艾絨在上燒數十次百日內忌鹽醋一年內忌豬肉魚腥酒色終身忌食狗肉蠶繭紅飯豆方得保生否則十有九死此係葛仙妙方有癲犬一日咬三人止一人用此方得活親見有效切不可誤吃斑蟊毒藥以致小便疼痛難忍欲解斑蟊之毒查解救諸毒門本方治之又方花盆內栽種之萬年青連根搗融絞汁灌之腹內如有小犬變成血塊由大便而出不論久近皆治一切不忌真仙方也萬年青其葉寬一二寸高約八九寸老而且厚者是又方從來瘋犬咬人不治必死投以打藥則小便痛不可忍百日內忌聞鑼炮聲又藥有斑蟊者終身忌近苧麻處否則即發今得一方服之能陰消又不忌鑼炮苧麻但半年內忌酒色並忌豬肉魚腥鹽醋蔥蒜及一切發物方用點銅鍚三錢銼碎明雄三錢打碎馬前子半個甘草三錢長燈芯一根長流水煎服屢試如神切不可疑而自誤也又方初被咬時即用砂酒壺兩個壺內盛好燒酒蕩滾去酒以壺按在傷口拔出汙黑血水滿則自落再以一壺去酒仍按傷口輪流提拔以盡為度奇效無比或用癩蝦蟆即蟾蜍目紅腹無八字紋者不可用破開連腸雜敷傷口一日一換換過即埋土內並另取癩蝦蟆煮食最為神妙仍照前忌食一切終身忌食蝦蟆又方被咬時即用豆豉研末香油調稠為丸如彈子大常在傷處時時滾搽丸內如有茸茸狗毛此係毒氣已出換丸再擦至無毛為止神效仍照前禁忌一切常食杏仁以防其毒或用蚯蚓糞又名曲蟮香油調為丸搽之亦可又方核桃殼半邊將人糞填滿取槐樹皮蓋傷口再將核桃殼覆上用艾火在覈桃殼上燒之燒至遍身汗出其人大困而愈簡便而極神效或用人糞厚敷傷口以煮熟雞蛋白蓋之用艾火燒數十次更佳又方龍牙齒又名馬鞭草和荸薺煎水飲之神效之極又方照後毒蛇咬傷服煙油之法治之煙油味辣服之味不辣者可治緣犬因嗅蛇毒而瘋故可與蛇咬同治又方地骨皮即枸杞根搗爛熬酒服一二日當茶飲永無後患家犬咬傷胡椒研細末敷之雖傷重亦為過數日收功惟初敷必痛而且腫少刻痛止腫消有人被犬咬傷血流不止用此藥隨敷隨流敷至第三次後血止數日而愈其效如神又方用木一截向傷處指定在木尾燒之問其痛否不痛乃愈犬本屬土此木能剋土之意也又方甘草煎水洗淨毒氣以熱牛糞敷之即時痛止又方番木鱉切片瓦上炙焦存性研末摻上二三次收功破爛日久者半月必愈又方刮肉店墩板上油膩拌白糖敷之效又方甜杏仁去皮尖嚼爛敷之馬咬傷白煮豬肉一大片同飯本人自嚼貼患處立時止痛即愈又方先以艾火炙患處復用馬糞及人糞燒存性豬油調搽即愈又方馬齒莧一握煎湯日日服之以愈為度外栗子嚼爛敷之又方打馬鞭子或籠頭索燒灰摻之即愈其毒入心者此二方亦效又方益母草搗爛調醋烘熱敷之又方雞冠血塗之牝母用雌雞牡馬用雄雞效豬咬傷生龜板炙研細麻油調搽即愈藥店多以熬過龜板假充必不見效須用生的自炙為要又方熟松香貼患處數日愈猿猴抓傷金毛狗脊藥名焙研末摻之或麻油調搽立愈貓咬傷用薄荷煎水洗之或用川椒煎水洗之又方陳蕞藠頭嚼爛敷之次日結痂神效鼠咬傷荔枝嚼融敷即愈或用斑蟊燒灰加麝香少許口津調敷或用貓兒口水搽之蛇咬傷煙精膏凡遇毒蛇咬傷惡毒攻心半日必死急取竹木杆煙筒內煙油又名煙屎其色如醬用冷水洗出飲一二碗受毒重者其味必甜而不辣以多飲為佳傷口痛甚者內有蛇牙多用煙油揉擦必出此為蛇咬第一仙方切不可疑而自誤道光八九年間粵西崇善縣地方有農人被毒蛇咬住繞纏不放急服煙油水數碗並以煙油滴蛇口內蛇即鬆口落地而死其人無恙又方有人被蛇咬傷即刻昏死臂脹如臌少頃遍身皮脹黃黑色一道人以新汲水調香白芷末一斤灌之覺臍中聲響黃同水從傷口流出良久便愈又一人蛇傷一足百藥不效後用新汲水洗淨腐肉以白芷末加膽礬麝香少許摻之惡水流出一月平復又方川貝母末酒調儘量飲之少刻酒自傷口流出候流盡以渣敷上垂死亦效又方用兩刀在水內相磨取水飲之雖痛苦欲死可救此蛇醫化人所傳方也又方用雞蛋破一孔對傷口按住少刻蛋內色即變黑黑則又換以蛋色不變為止要雞蛋不要鴨蛋有人被蛇咬傷即刻腫大異常當將腫處用頭髮捆緊毒氣不致散開照此方治之立愈至穩至便百發百中之方也或內服煙油外用此法更妙又方用蝦蟆拔毒法見卷十一癰毒諸方門治之或用蜘蛛拔毒法見卷二手部門治之均極神效又方五靈脂一兩雄黃五錢共為細末每服二錢酒調服不飲酒者開水調服並敷傷處雖至垂危亦可救也又方嫩黃荊葉生於野地生藥店有買採取生者以七葉為佳搗汁敷之極效毒蛇纏身不脫蛇纏人身愈纏愈緊最難解脫急令其人在地遍身轉滾蛇自骨軟而解放也神效又方用草刺蛇尾上小眼亦極神驗蛇入七竅割母豬尾血滴入即出又方以胡椒末入蛇尾小眼內蛇自退出或用草刺蛇尾小眼亦妙蜈蚣咬傷手指甲磨水敷立效如神萬無一失有人被蜈蚣咬傷其色碧綠腫大如碗痛不可忍百藥隨敷隨干其毒不散後用此方治之應手而愈此法最為簡便毋庸第二方也各項毒物咬傷雖未試過想亦可治蠍螫傷雄者傷人痛在一處雌者傷人痛牽遍體用井底泥敷之干則再換或用新汲水以青皮隨痛處搭之干則再換亦效又方用二味拔毒散見癰毒諸方更妙又方痛牽遍身者用屋上瓦溝底泥調水敷之又方畫地作十字取土煎水服少許亦可又方用木碗蓋於痛處過半日即愈神驗之至又方蝸牛一條搗融敷之其痛立止或照上蜈蚣咬傷方治之壁虎咬傷一名守宮又名蛇醫又名四腳蛇桑葉煎濃汁調白礬末敷之或照前蜈蚣咬傷方治之黃蜂傷蚯蚓糞井水調敷其痛立止又方芋頭梗搗融敷極效又方如傷處麻木難過用臭蟲血塗之立愈又方用二味拔毒散見癰毒諸方敷之最效或照前蜈蚣咬傷方治之射工溪毒傷此水中射工又有樹上毛蟲亦名射工者見後毛蟲傷方射工一名溪鬼蟲又名射影又名水弩出南方有溪毒處長二三寸寬寸許形扁前寬後窄腹軟背硬如蟬又如鱉六七月甲下有翅能飛作鉍鉍聲寬頭尖嘴嘴頭有角如爪長一二分有六足如蟹足兩足在咀下大而一爪四足在腹下小而雙爪口有弩形以氣射人影去人三四步即中令人發瘡不治即死病有四種初得皆如傷寒或似中惡一種遍身有黶子四邊微紅犯之如刺一種作瘡久則穿陷一種突起如石一種如火燒狀又有溪毒中人一名中水一名中溪一名水病似射工而不見形春月多有此病症頭痛惡寒狀如傷寒二三日則腹中生蟲食人下部漸食五臟注下不禁雖良醫難治初得則下部有瘡紅赤形如截肉為陽毒最急若瘡如蟲齧為陰毒其勢稍緩皆能殺人過二十日不治方家用藥與傷寒瘟病相似須用蒼耳草絞汁服一二升並用棉蘸汁濃敷下部或以小蒜煮微熱湯不可大熱大熱則無力洗之若身發赤斑其毒已出也又方取豉母蟲一枚含入口中立愈雖死亦活或用鹽梅裹含之亦可此葛仙肘後方也豉母蟲一名豉蟲光黑大如豆浮游水上者即是又方豬血飲之即解又方知母連根葉研末服或投水絞汁飲一二升煮湯洗浴亦佳夏月出行多帶知母連根搗碎投水上流可避此毒又方雞糞要白色者與糯米糖調敷效又方蒼耳草嫩苗生草藥店有買取汁和酒溫灌之其渣厚敷傷處甚效又方芥菜子末和酒厚敷半日止痛又方馬齒莧搗汁一升服以渣敷之日四五次又方皂角長尺余者好醋煮濃汁如膏敷之又方白鵝血飲之並敷其身極效又方夜睡時以手摩身體有辣痛熟視當有赤點如針頭急捻之以芋頭葉入內刮出細沙以蒜敷之即愈又痛處有刺如蝦鬚用芋頭及甘蔗葉屈角入內勾出其根則愈遲則其根入骨難治毛蟲傷毛蟲俗名楊辣子又名射工能放毛螫人初癢次痛勢如火燒久則外癢內痛骨肉皆爛諸藥罔效用豆豉搗融清油調敷少時則有毛出去豆豉用白芷煎湯洗之如肉已爛用海螵蛸末摻之即愈又方先以水洗之隨用馬齒莧搗爛敷之一二次即愈或以熟蜜搽之亦效狗毛沾身因瘙癢而破爛者用青果即橄欖絞汁搽數次即愈或照上毛蟲傷人各方治之更妙蜘蛛傷有人蜘蛛咬傷腹大如臌遍身生絲飲白羊乳數日而愈又方藍靛汁一碗入雄黃麝香少許點患處並服其汁神異之至一人被傷頭面腫痛幾致不救服此而愈蜘蛛投入藍靛即化為水故有奇效也又方用羊肝遍體擦之極效又方飲好酒至醉則肉中自出小蟲而愈又方熱甜酒洗之即消或照前蜈蚣咬傷方治之蟢蛛傷此物形以蜘蛛而大一名壁錢一名壁鏡又名壁鏡又名喜子時作白窠如錢大貼壁上咬人最毒不治必死用桑樹枝燒枯煎濃汁調白礬末敷之極效又方用花盆內鋪地錦敷或用陳醋搗敷即愈又方以刀燒紅置白礬於上汁出乘熱滴之立愈神驗之至或照前蜈蚣咬傷方治之多足蟲傷一名曜螋又云即是搔甲子藏於壁間以尿射人若誤中其毒令人皮膚起燎漿泡痛如火烙初如飯粒次如豆大若不早治傷處周圍交合則難救急用棉蘸熱鹽水敷數次即消甚者則毒延及遍身瘙癢不止宜用二味拔毒散見癰毒諸方敷之神效或用大黃末敷亦效或照前蜈蚣咬傷方治之蚯蚓毒一名曲蟮又名地龍凡受蚯蚓毒形如麻瘋發眉脫落或夜間身體作鳴急以鹽湯或石灰煎湯時時洗之其毒自去或以白鴨血搽之或用白鴨糞和雞蛋清調搽更妙或照前蜈蚣咬傷方治之蠶咬傷凡蠶齧人毒入肉中令人發寒熱以家用苧麻葉搗汁塗之神效又方蜜調麝香敷之亦效或照前蜈蚣咬傷方治之烏龍刺傷烏龍刺又名火把焦刺入泥中人若足上籤踏比蛇咬更毒從腳腫至大腿猶然可救若至肚腹則無救矣急用蛔蟲無則用糞坑蛆蟲亦可數條搗爛敷患處消腫刺出而愈仙鶴毒仙鶴其毒在頂養鶴之家其鶴或傍樹枝或臥叢草將頭搔癢遺有頂毒黏在樹間人或不知誤以手摸腳踏登時赤腫疼痛異常急以青松毛和糯米飯同搗敷之立愈狐尿刺毒一名狐貍刺由螳螂盛暑交媾精汁染於諸物干久有毒人之手足誤觸之則成此患初起紅紫斑點肌膚乾燥悶腫焮痛不眠若時至十日後腐開則瘡口日寬初起未潰者以蒲公英連根煎濃溫洗若得鮮者搗汁塗之更妙內服黃連解毒湯即愈若已潰爛照前人咬傷甘草諸方治之或照癰毒諸方治之又方腫痛欲死者用雄雞破開敷之或照前蜈蚣咬傷方治之各項毒蟲咬傷用二味拔毒散見癰毒諸方敷之其效甚速又方照前人咬傷甘草方敷之神效又方如毒重者急照疔瘡方內蜘蛛拔毒法治之見卷二手部最為神效或照前蜈蚣咬傷方治之湯火傷湯泡火傷凡湯泡火傷無論輕重急用童便灌之以免火毒攻心或用白沙糖熱水調服或用蜂蜜調熱水灌之均可第一不可用冷水及井泥溝泥等物即使痛極難受亦必忍住倘誤用冷水淋之則熱氣內逼輕則爛入筋骨手足彎縮纏綿難愈重則直攻入心則難救矣先用真麻油敷之再用糯米淘水去米取汁加真麻油一茶鍾多加更妙用筷子順攪一二千下切莫倒攪可以挑起成絲用舊筆蘸油搽上立刻止痛愈後並無痛痕神效無比又方尿桶中陳尿新尿亦可或泡或淋一時之久再用蜂蜜和真麻油加上敷之又方先用真桐油真麻油亦可敷之敷後上加食鹽少許再用生大黃研末撒上立刻清涼止痛愈後亦無疤痕至神至驗又方蚯蚓數條加白糖拌入用碗蓋住半日即化為水搽之神效且速無蚯蚓用蜒蝣俗名鼻涕蟲亦可又方鴉片煙敷之立刻清涼止痛有人火藥燒傷百藥不效痛不能止後用此方而愈又方清涼膏新出窖石灰用冷水化開水宜多不宜少次日水面上結一層如薄冰樣者取起以真桐油和入調極濃厚敷之立刻清涼止痛日敷三五次無論初起日久皆效有人被火燒傷起泡臭爛數月不愈用此敷之五日收功屢試神效並治一切遊風丹毒破與不破皆極效驗真仙方也又方先用麻油熬滾次入白蠟熬數滾再入白蜜熬勻放冷水中半日拔去火氣用鴨毛舊筆亦可調敷其痛即止若傷重者並可內服不至攻心又方豬毛一籃入鍋內炒之俟豬毛化成黑汁取起冷定加大黃數錢共研末再加冰片一分香油茶油蠟燭油俱可調搽至神至驗之方也又方用蚶子殼又名瓦楞子煅枯研細末配冰片少許濕則干敷干處麻油調搽數次收功真仙方也又方湯火傷治不得法以致焮赤腫痛毒腐成膿用麻油四兩當歸一兩入麻油內煎焦去渣再入黃蠟一兩攪化隔水拔火氣以布攤貼立能止痛生肌神效之至又方人乳和鹽敷之以上各方簡便神效雖傷及遍身勢在垂危或潰爛已久均有奇效又方蟲蛀竹灰平時收存用時以麻油調搽極效又方茶葉嚼爛將口漱淨再嚼敷之立愈又方南瓜用壇裝貯埋土內數月即化為水愈陳愈佳遇有湯火傷者取水搽之隨手而愈南瓜北人呼為倭瓜或用黃瓜亦可屢試如神又方葵花泡油搽之越陳越佳又方真麻油二斤生大黃切片半斤銅鍋熬至藥色焦黑瓦罐連渣收貯遇有湯火傷者用鴨毛舊筆亦可蘸油搽之止痛如神二日即愈平時製出可備急用火爆傷眼三七葉搗汁點入數次即愈或用三七磨水滴入亦可屢試如神又上二方用南瓜水葵花油點水亦極神效又跌打損傷打傷眼睛南瓜方亦效跌打損傷損傷諸方回生第一仙丹治跌傷壓傷打傷刀傷銃傷割喉吊死驚死溺水死等症雷擊死雖未試過想亦可治雖遍體重傷死已數日只要身體稍軟用此丹灌服少刻即有微氣再服一次即活大便如下紫血更妙惟身體僵硬者難救此係豫章彭竹樓民部家傳秘方道光初年民部宰直隸時有人被毆死已三日矣民部往驗見其肢體尚軟打開一齒以此丹灌服一分五釐少刻其屍微動再灌一分五釐而活其餘甫經毆殺或毆死一二日者全活尤多終歲無一命案惟時磁州地震壓斃甚眾民部制丹遣人馳往救活不下千人大有起死回生之妙誠千石第一仙丹如能施藥傳方救得一人之生可全兩人之命造福真無量也活土鱉蟲又名地鱉又名簸箕蟲形扁不能飛大小不等色黑而亮背有橫楞前窄後寬以大如大指頭為佳小者功緩雄的更好用刀切為兩節放地上以碗蓋住過夜其蟲自接而活方是雄的隨處皆有多生米店有糠之處及碓血下倉底灶腳冬天灶腳更多或生面鋪或油榨坊並空屋乾燥之處總在鬆土內尋覓取活的去足放瓦上小火焙黃研細用淨末五錢死的不效假的更不效藥店有乾的賣一看便知自然銅放瓦上木炭火內燒紅入好醋內淬半刻取出再燒再淬連制九次研末要親身自制藥店制多不透不效用淨末三錢真乳香以形如乳頭黃色如膠者為真不真不效每一兩用燈草二錢五分同炒枯與燈草同研細吹去燈草用淨末二錢真陳血竭飛淨二錢真硃砂飛淨二錢巴豆去殼研用紙包壓數次去淨油用淨末二錢麝香三分要當門子以上各藥揀選明淨眼同研極細末收入小口瓷瓶口大藥易泄氣用蠟封口不可泄氣大人每用一分五釐小兒七釐酒沖服牙關不開者打開一齒灌之必活要藥稱准方效灌時多用水酒使藥下喉為要活後宜避風調養若傷後受凍而死須放暖室中最忌見火仍照卷十一急救門凍死法參酌治之如活轉心腹疼痛此瘀血未盡服白糖飲自愈見後玉真散治跌打損傷已破口者無論傷口大小不省人事或傷口潰爛進風口眼歪斜手足掣動形如彎弓只要心前微溫用此藥敷傷口如膿多者用溫茶避風洗淨再敷無膿不必洗另用熱酒沖服三錢不飲酒者滾水沖服亦能起死回生惟嘔吐者難治藥雖平淡效最神奇功在七釐鐵扇諸方之上藥料易覓無假其價亦廉或傳方或施藥功德亦非淺也明天麻羌活防風生南星薑汁炒白芷各一兩白附子十二兩以上藥料須揀選明淨眼同研極細末收入水口瓷瓶以蠟封口不可泄氣如濕爛不能收口用熟石膏二錢黃丹三分共研極細加入敷之當歸湯治跌打損傷未破口者功能散瘀活血雖已氣絕打去一牙灌之亦活此少林寺教師方也當歸澤瀉各五錢川芎紅花桃仁丹皮各三錢好蘇木二錢酒水各一碗煎六分服頭傷加藁本一錢手傷加桂枝一錢腰傷加杜仲一錢脅傷加白芥子一錢腳傷加牛膝一錢白糖飲凡跌打損傷如已氣絕牙關緊閉先用半夏在腮邊擦之牙關自開急用熱酒沖白砂糖二三兩灌入不飲酒者水服亦可愈多愈妙無論受傷輕重服之可免瘀血攻心至穩至靈不可輕忽又方如氣絕不損人事者急用生半夏研末水調黃豆大塞鼻孔方能甦醒男左女右醒後鼻痛用老薑汁搽過即不痛也又方先用活雞連毛破開去腸雜不用著水敷罨傷處雖至垂危只要胸前微溫即時立醒然後用藥治之仍服白糖為要又方野菊花連根陰乾每用一兩加酒與童便各一碗煎服但有一絲之氣無不活也又方仙桃草連根陰乾研末每服一二錢開水送下雖重傷垂危服之立見功效江南一盜身受多傷躺臥道旁一人路過見而憐之村中乞水與飲盜出此藥調水服下服後半刻遍身傷處作響立即起而行矣詢之此草生麥地中葉小梗紅有子如胡椒大內有一蟲在小暑節內前後十五日採之早則蟲尚未生遲則蟲已飛去無蟲則無功效聞廣西陽朔一帶亦有這種名麥杆草八九月內方有蟲生可採跌壓傷死凡跌壓傷重之人口耳出血昏暈不醒只要身體尚軟皆可救活切忌人多嘈雜只令親人呼而扶之且就坐於地緊為抱定曲其手足如和尚打坐樣隨以熱童便灌之馬尿更妙或用白糖沖熱酒灌之用水調灌亦可尤為神妙但能強灌得一二杯下喉更好然後輕移於懷中抱入室內如前坐法更以足緊抵糞門若系婦女連陰戶一併頂住恐其氣從下泄以致不救並將窗欞遮住以房中黑暗為佳一面查照前後各方取簡便者用之傷重者瘀血必多用前當歸湯白糖飲更妙其餘簡便易得者不妨兼用急切不可令出大便恐其氣脫而死必俟其腹中動而有聲上下往來數遍急不能待方可使解所下盡是紫血毒已解下方可令睡倘瘀血未盡當歸湯白糖飲尤宜多服又一切撲折及從高墜下木石傾壓落馬墜車以致瘀血凝滯氣絕欲死者倉促無藥急以熱小便灌之免惡血攻心或服白糖更佳再取地上三尺下黃土數升搗碎甑蒸熱舊布重包二包輪流熨傷處數次痛止傷消但不可太熱恐傷皮肉破口傷龍眼核剝去光皮不用將核研極細摻瘡口即定痛止血此西秦巴里坤營中急救方也大有功效如口渴者不可飲水但食油膩之物以解其渴更忌食粥食則血必湧出而死或用前玉真散最妙又方魚子蘭葉珠蘭葉更好搗融敷之立刻收口接骨傷口寬大者加白鹽少許第二次敷即不用鹽其效非常功在諸方之上又方月季花又名月月紅取葉搗爛敷之立能止血消腫雖斷筋亦可速愈又方蔥白砂糖等分搗爛研如泥敷傷口其疼立止又無疤痕屢試神驗又方生半夏研末敷上即刻止痛止血且易收口又方生松香熟松香和勻敷之立愈或加生半夏末亦可此軍營急救方也又方老薑嚼融敷之數日平復如常此方屢試屢驗可保不致進風惟敷時痛極忍耐幾時可耳又方胡椒末敷之不惟速愈且免縮筋忍痛必效又方端午後採野麻葉去筋捶融如綿遇破口傷敷之立能止血結痂又後接骨白炭方治破口傷亦效止血法瘦豬肉切厚片貼上無論傷口大小血流不止者立效如神或用豬皮亦可此急救止血第一方也又方穿山甲片炒枯研末候冷敷上此亦止血神藥凡身上毛孔無故血出不止此二方俱有奇效平時製出以備急用最妙不可泄氣又方草紙燒灰候冷敷上亦止又方老薑燒枯存性研末敷亦神效也跌打吐血不止乾荷花焙枯研末酒調服一日二三次數日即愈其效如神乾荷葉亦可或多服白糖飲更妙見前破口傷風凡破傷風寒熱交作口閉咬牙或吐白沫手足扯動或頭足扯如彎弓傷口平塌者最為險症用前玉真散可以起死回生最為神妙如倉卒製藥不及用手指甲腳趾甲各一錢香油炒黃研末熱酒調服汗出即愈終不如玉真散之妙凡破傷風先以自手三指並連直插入病人之口如可插入者易治若只有二指插入者其症必危即婦人產後驚風亦用此法驗之可知生死凡人或以煙筒竹木等物戳傷喉嚨恐呼吸之氣亦有風扇如頸項漫腫口張不大飲食難下亦防破傷風此是內吸風終不息無藥可治醫者遇此先須明告病家庶免歸咎割頸斷喉急宜早救遲則額冷氣絕乘初割時輕輕扶住仰臥將頭墊起合攏刀口將血拭去用大雄雞一隻快手輕去其毛生剝雞皮乘熱貼傷口內服玉真散見前自愈愈後雞皮自落又方照前扶住仰臥合攏刀口用生松香熟松香各半或加生半夏末亦可將傷口厚厚敷緊或用蔥頭和白蜜搗融敷亦可外用膏藥不論何項膏藥周圍連好肉一併黏貼再用布條圍裹針線縫好每日服玉真散三錢方見前覺傷處生肌即不必服未生肌則日日常服無論食嗓氣嗓俱斷一月必愈屢如神若食氣嗓俱未斷照前傷損各方治之亦可如氣嗓已斷氣絕只要身體微軟一面照前敷治一面以回生丹見前服之亦可活也戳傷腸出好醋煮熱洗之不可太熱亦不可太冷隨洗隨入外用活剝雞皮乘熱貼上再服玉真散見前自愈有人腸出三日腐變如法治之而愈愈後雞皮自落耳鼻打落治法見前耳鼻各部手指砍斷將指接上用蘇木細末敷之外用蠶繭包縛牢固數日即愈又方老薑嚼融敷之新棉包裹簡便神效不可以平淡而輕忽也接骨法杉木炭研極細末用白沙糖蒸極融化將炭末和勻攤紙上乘熱貼之無論破骨傷筋斷指折足數日可愈屢試屢驗不可輕視忌食生冷發物無杉木炭用杉木燒枯亦可又方凡骨斷痛極者先用鳳仙花根一寸以肥大者為佳酒磨服之揉動則不知痛然後可用藥治或用麻藥見癰毒諸方敷之亦不痛也又方當歸七錢五分川芎五錢乳香沒藥各二錢五分木香一錢川烏四錢五分黃丹六兩骨碎補五錢古錢照前製法三錢共為細末入香油一兩五錢調成膏貼患處雖骨碎筋斷能續神效又方旱公牛角一個火上炙乾一層刮一層黃米麵不拘多少芥面亦可榆樹內白皮不拘多少川椒六七粒楊樹葉不拘多少如無不用亦可共研細末以陳釅醋熬成稀糊用青布攤貼再用長薄柳木片纏住時刻聞骨內響聲不絕俟定即接如牛馬跌傷及樹木被風吹折者以此藥治之俱效又方古銅錢燒紅淬入好醋內再燒再淬連制七次研末用酒沖服二錢傷大者服三錢其骨自接無古銅錢用新銅錢亦可不如古銅錢之妙有人因雞足折斷如法試之果接續如故乃烹此雞驗其骨折處銅末周圍束住又有人腳骨折斷以銅末沖酒服之即愈後因病故十餘年改葬視其脛骨處亦有銅末束之真神方也又方大紅月月紅又名月季花採花瓣陰乾為末一歲一釐好酒調服蓋被睡臥一個時辰渾身骨響此是接骨不必畏懼又方公雞一隻重十兩上下白毛烏骨者更妙用手扭斷頭竹刀割下不用水干拔去毛竹刀剖開去肚臟不用剝下皮去骨將肉放石臼內加真五加皮二兩骨碎補二錢桂枝一錢生大黃三錢松香一錢共為細末同搗融爛先將傷骨整好將藥敷上將雞皮包在藥外再用杉木皮夾好過一對時取去久則必生多骨又方五加皮四兩小雄雞一隻去毛連骨不去血不沾水同搗極爛敷斷處骨即發響聽至不響即將藥刮去遲則多生骨矣又方活螃蟹一二隻生搗爛滾酒沖服極為神效又方取路旁牆腳來往人小便處日久碎瓦片洗淨燒紅淬入好醋內再燒再淬連制五次刀刮為細末每服三錢好酒下雖骨折筋斷痛不可忍者亦極神驗跌打傷筋用韭菜搗爛敷過一夜即愈或照前月季花及碎瓦片方治之亦可又方生旋覆花根搗汁滴入並敷日換三次敷至半月雖筋斷亦續其效如神傷損縮筋年久不愈楊梅樹皮曬乾研末和頂好酒蒸熟調敷用布紮好每日一換不過三五次即愈屢試如神不可輕視又方見腰部三仙方最為神效跌打損傷愈後行走不便罐盛小便火上燒熱時時熏之熏至數次即愈有人手骨跌斷愈後其手直硬不能活動照此熏之平復如常腳趾割破久不收口行走不便雞腳骨燒枯研末敷即愈甚效跌打青腫整塊生大黃用生薑汁磨融敷之一夜紫者轉黑黑者即白矣一日一換其效如神又方生半夏末水調敷一夜即消跌打青腫內傷凡一切跌打損傷遍身青腫瘀停作痛及墮僕內傷一服即愈用白木耳四兩如無白者黑者亦可用焙乾為細末每服一兩麻油拌勻好酒送服日服二次藥完其患若失百發百中神妙非常打傷眼睛火爆傷眼見湯火傷門凡眼睛打傷或跌傷或碰傷或火爆傷用南瓜瓤搗爛厚封外用布包好勿動漸即腫消痛定干則再換如瞳仁未破仍能視也瓜以愈老愈佳有鮮地黃處用地黃亦可南瓜北人呼為倭瓜又方生豬肉一斤以當歸赤石脂二味研末摻肉上貼之拔出瘀血眼即無恙閃跌手足生薑蔥白搗融和灰麵炒熱敷之或用生大黃和生薑汁磨敷均妙閃跌傷腰方見腰部跌打損傷濕爛不幹並治凍瘡濕爛羊皮金紙以金面貼傷處過夜即愈神效之至又方寒水石二錢煅研細末敷之立見功效損傷碎骨在內作膿田螺捶爛加酒糟和勻敷四圍中留一孔其骨即出跌打損傷內有積血大小便不通歸尾二錢生地川芎桃仁生大黃紅花各一錢酒水各半煎服不飲酒者無酒亦可跌打損傷胸膈脹痛不食白砂糖用酒沖服水沖服亦可以多為妙騎馬傷股破爛鳳凰衣即抱過雞蛋殼新瓦上焙枯研末麻油調搽即愈或照跌打破口各方治之跌打損傷百藥不效恐是中邪照邪怪門鬼擊傷方治之內有狗糞燒熏一法尤妙極也舊傷日久作痛或天陰作痛治法見腰部閃跌毆打腰痛方又方益母草熬膏忌鐵器為丸每服數錢熱酒送下十日全愈其效如神增補止血補傷方刀箭傷馬踏傷跌傷一切物打傷無不驗生白附子十二兩白芷天麻生南星防風羌活各一兩共研極細末就破處敷上傷重者用黃酒浸服數錢青腫者水調敷上一切破爛皆可敷之即愈此方宜平時預製以治鬥傷可活兩命價不昂而藥易得亦莫大之陰功也增補傷科聖藥七釐散上硃砂一錢二分水飛淨真麝香一分二釐梅花冰片一分二釐淨乳香一錢五分紅花一錢五分明沒藥一錢五分瓜兒血竭一兩粉口兒茶二錢四分以上各藥揀選道地於五月五日午時共為極細末瓷瓶收貯黃蠟封口貯久更妙每服七釐不可多服孕婦忌服上藥專治金瘡跌打損傷骨斷筋折血流不止者先以藥七釐燒酒沖服復用藥以燒酒調敷傷處如金刃傷重或食嗓割斷不須雞皮包紮急用此藥乾摻定痛止血立時見效並治一切無名腫毒亦用前法調服得此方者調治毆諸傷無不應手立兒凡受傷之時或倉卒無藥或鄉僻無良醫恐傷輕變重傷重致死多矣地方官如虔合此藥遇有驗傷隨時施用不獨傷輕者立愈即傷重者亦可救不啻救二命實陰德無量也增補被毆傷風方荊芥黃蠟魚鰾炒黃色三味各五錢艾葉三片入無灰酒一碗煮一炷香久熱飲之汗出立愈惟百日內不得食雞肉爾凡被毆後以傷風致死者在保辜限內於律不能不擬抵此一方可活二命須廣布之增補九分散治跌打損傷乳香一兩沒藥一兩麻黃去節一兩馬前子一兩共研細末瓷瓶貯存黃蠟封固遇跌打損傷燒酒沖服九分另用燒酒調敷傷處增補八釐散治跌打損傷香瓜子一錢生半夏一錢明雄一錢水飛西砂仁一錢當歸頭一錢酒洗土鱉二錢新瓦上焙乾巴豆霜一錢乳香二錢真血竭二錢沒藥二錢共研細末瓷瓶貯存黃蠟封固遇患者用好燒酒沖服八釐小兒服三釐能開口即可救活受傷處用燒酒調敷配藥須忌用火炒歌曰此方八仙傳授世上千金難尋不論斷筋折骨一服八釐保安寧須臾便得活命增補紅花散治跌打損傷鮮紅花一兩全當歸一兩乳香五錢兒茶二錢明雄一錢水飛硃砂一錢水飛上桂一錢麝香五分上四六冰片五分沒藥三分白芷三錢血竭三錢西大黃三錢曬乾共研細末瓷瓶貯存黃蠟封固遇患者用醇酒調服一錢五分外用燒酒調一錢五分敷傷處傷輕者只敷一服傷重者加倍調敷即愈增補大保紅藥丹治跌打損傷服各部引藥附此方救人甚多真上肉桂二錢去皮廣木香二錢要枯白者大野三七二錢大活土鱉二錢新瓦焙乾明亮硃砂一兩水飛上四六冰片六分真麝子六分共研細末瓷瓶貯存黃蠟封固遇患者用極薄白紙包三釐捲成捻子淨水煎引藥加好燒酒和吞頭頸加川芎藁本各二錢胸背加澤蘭桔梗蒲黃各二錢腰上加杜仲故紙各二錢兩手加嫩桂枝勾藤勾各二錢腎加橘核二錢肚痛加制珍珠五釐迦藍沉香一分腳腿加牛膝木瓜各二錢五加皮香獨活各二錢左腳腿加車前一錢右腳腿加中黃二錢刑杖傷夾棍傷速用熱童便一盆將足浸入如便冷燒紅磚兩塊淬之即熱直浸至童便面上浮起白沫其傷盡出矣再用跌打損傷各方治之自愈如已骨損亦照跌打損傷門內接骨方治之杖傷血竭一錢輕粉黃丹水飛淨各二錢白礬一錢共為末摻上忍痛一時次日其肉四圍生起兩日即平杖傷久爛不愈中有深眼不能收口用此最效或照跌打損傷各方治之亦可又方杖後即飲童便一碗或用酒沖白糖服之不飲酒者水服亦可以免瘀血攻心再用熱豆腐鋪在杖傷處其氣如蒸其腐即紫換腐數次令紫色散盡轉淡紅色為度若杖後腫痛用明雄二分密陀僧一分水研調敷極妙又受刑極極重者杖後日用白芨末米湯飲下神效銅鐵竹木雜物入肉鐵針入肉針入肉內隨氣遊走若走至心窩甚險急用烏鴉翎數根瓦上焙焦黃色研細末酒調服一錢外用車輪上油垢調真磁石末攤紙上如錢大貼之每日一換自出又方生磁石一兩研末用菜油調敷皮外離針入處寸許漸漸移至針口由受傷原處而出神效又方生癩蝦蟆眼珠放針口半日後自出神效鐵針並銅鐵錫鉛入肉陳醃肉皮陳火腿皮更妙捶融敷之即出極效鐵彈入肉扁魚肚膽俗名邊魚煮融和糯米飯搗爛敷之換兩三次即出此在手足及兩股用之若在身上及肚腹內用土狗又名蛄螻同扁魚肚煮融搗爛敷雖不能取出其彈漸落下部不能為害矣箭簇銅鐵錫子並一切雜物入肉蜣螂三個俗名推車蟲查藥物備要便知巴豆四五粒共搗如泥敷傷處先止痛後作癢少刻其物必出神效之至又方搔蛺子又名搔甲蟲又名偷油婆江蘇人呼為臟螂查藥物備要便知搗融敷之一日即出神效又方南瓜北人呼為倭瓜江蘇等處有呼為北瓜者搗融四圍敷之隔日必出極效又方干莧菜搗爛和紅砂糖敷之自出奇效又方真象牙刮末水調敷干則加水潤之甚驗又方紅膏藥見痛毒諸方敷之無不出也瓷片入肉白果要三角形者去殼與心不拘多少浸菜子油內取出捶融貼之日換一次雖入肉多年爛而不出者三次即愈魚肉各骨入肉以上各方通治山楂研末調敷如在口中牙縫等處山楂煎濃汁含一二時自出竹木入肉以上各方通治鹿角燒枯存性研末以水調敷久不出者不過一夜即出又方松香敷上用布包裹三日必出不痛不癢甚妙又方生蒲公英搗爛敷雖腫爛日久亦效又方鮮牛膝搗爛敷縱傷口已合刺亦自出又方蓖麻子搗爛敷痛止即出神效水銀入肉真川椒研末生雞蛋白調敷用布包緊過夜即出銅鐵竹木等物入肉雖已拔去傷口腫爛不愈蔥頭和白沙糖又名洋糖又名鹽糖搗融敷之極效如再不愈即用玉真散見跌打損傷門治之無不愈也藥箭入肉箭已拔出傷口腫爛不愈明雄末敷之有水流出即愈銅鐵入骨昔邢曹進簡中左目入骨拔之不出痛苦欲死其家廣修佛事後夢一僧告以用寒食餳敷之俟發癢時將本人捆縛床柱用力拔之而愈見龍威秘書集異記寒食餳即寒食日所做米糖也如無即平日所做米糖亦可用
