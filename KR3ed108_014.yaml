body:
  text: 卷十四中風與筋骨門參看中風症凡中風忽然昏倒不省人事須先順氣然後治風用竹瀝薑汁調蘇合丸如口噤撬開灌之如撬不開急用牙皂生半夏細辛為末吹入鼻內有嚏可治無嚏則死最要分別閉與脫二證如牙關緊閉兩手握固即是閉證用蘇合香丸藥店有買或三生飲見後治之若口開心絕也手撒脾絕也眼合肝絕也遺尿腎絕也即是脫證更有吐沫直視肉脫筋骨痛髮直搖頭上竄面赤如血汗出如珠皆脫絕之症宜大劑理中湯灌之及灸臍下亦可十中之一若誤服蘇合香丸牛黃至寶之類即不可救矣惟中臟之症是閉而非脫者宜蘇合香丸牛黃丸至寶丹活命金丹之類若中腑與中血脈之症斷不宜用中風諸方三生飲治中風牙關緊閉兩手握緊若口開手撒則不可服生南星二錢生川烏去皮生附子去皮臍各一錢木香四分氣虛加人參煎服如無人參用高麗參真臺黨亦可稀涎散治中風昏昏如醉口開手撒或口角流涎頃刻不救急用此散灌之得吐即愈新皂角四條去皮筋明礬一兩共為末每用一錢或一錢多溫水緩緩調灌毋使大吐恐過劑傷人屢效不可具述醒後再用藥調理方免後患開關散中風卒急先用此藥開關皂角二錢北細辛三分共研細末吹少許入鼻中即醒如買細辛不及即皂角一味亦可瓷針砭法用鋒利碎瓷片刺少商穴使出血即解少商穴在兩大指頭甲之兩旁與出指甲之處相齊只離指甲兩邊各一韭葉寬是也先從手臂上抹至指間使血行下方刺須破竹筷頭夾住瓷片只露瓷鋒一分在外用線紮緊以兩指捏著筷梢直按穴上再用竹筷一隻橫敲扎線處使瓷鋒刺入則輕重有準此為不善制者說法柏葉飲中風不省人事得病之日即服此免成廢人側柏葉一把蔥白連須一把共搗如泥用無灰酒一大碗煎一二十沸去渣候溫灌服不善飲者分數次服中風脫證忌服又方中風中痰皆治生石膏一兩辰砂五分各研末和勻每服三錢用生蜂蜜調下立效中風脫證忌服又方用生薑口嚼碎不拘多少向面上天庭等處頻擦又以生薑汁滴男左女右眼內角即醒中風口眼歪斜用活鱔魚一條搗爛左斜敷右右斜敷左嘴正即將鱔魚血洗淨免口又扯斜一邊屢試皆驗又方皂角為末陳米醋調塗口上左斜敷右右斜敷左干則頻換數次必愈又方蓖麻子三錢去殼冰片五分共搗融左扯貼右右扯貼左以正為止或照後癱瘓各方治之中風不語用泥捏成圈圍住肚臍令人屙尿在圈內一時甦醒然後用藥又方黃耆防風各數兩煎水一大盆放床前使熱氣熏之時時不斷熏至一日即語其效如神又方見卷一咽喉部中風不語半身不遂草烏一斤綠豆半斤同煮以豆熟為度去豆將草烏刮去皮切片曬乾為末燒酒對服雖老年久病亦愈此人祖傳秘方屢試皆驗中風角弓反張凡中風頭足往後扯動彎曲不伸其形如弓名角弓反張雞屎白三錢酒五杯用竹筷順攪一千遍飲之小兒減半日服二次此葛仙方也又方見卷十小兒科自頭麻至心而死或自足麻至膝而死此症有類中風故列此小兒糞要乾的不要稀的陰乾放瓦上燒枯燒至煙盡為止每服用三錢生豆腐調服或用豆腐漿調服亦可甚效又方吳萸末三錢熱醋調敷兩腳心眼珠上翻手足彎曲狀如中風時發時愈此症名拘麻生木耳滾水發開病末發時取木耳細嚼一二兩飲黃酒三四杯蓋被出微汗服至二三斤除根忽然跌倒口吐白沫不省人事時發時愈此名羊癲風用菜葉不論何菜或青草塞口中即醒屢用極效中風癱瘓手足不舉並治風濕腳氣穿山甲左癱用右甲右癱用左甲大川烏頭紅海蛤如棋子大各二兩為末每用五錢搗蔥白汁和成厚餅徑寸半隨左右貼腳心縛定密室安坐以腳浸滾水盆中待身麻汗出急去藥宜謹避風自然手足可舉半月再行一次除根忌口並女色一年風濕癱瘓手足不能舉動癩蝦蟆一隻打死後方去頭足剝皮剖開去肚腹腸膽須淨洗過略砍碎用擂缽擂極融細以燒酒衝入攪勻用布瀝淨渣其酒燉熱飲之連服十餘個其效無窮因飲酒多而得者更效此仙方也蝦蟆紅目紅皮腹無八字紋者有毒切不可用其膽最宜取淨膽破者不用再蝦蟆口噴毒氣不惟沾著生瘡瘡愈至期仍發須謹防之愈後終身戒食蝦蟆又腿足無力寸步難移者飲羊腎酒見內外備用諸方數日即能行走神妙非常風濕癱瘓半身不遂有人風癱一身四體不能轉動百藥不效後服馮了性藥酒一錢渾身出汗上嘔下瀉半日後行動如常用藥調理霍然全愈神效非常又有一少年風癱先飲此酒五錢不效後漸至一兩始見功效此少年體壯者飲之無礙若體虛及老年人不宜多飲是所切囑此酒廣東佛山鎮並省城及廣西省城有買並有藥單凡患風癱先飲一錢如不見效酌量加飲總以見效為度此酒性烈不可過多體虛者不飲為妙若照單飲之必致誤事慎之慎之再此酒飲後汗出不止此病從毛孔出也切勿止汗聽其自收腰腳風濕作痛不能履地松毛燒灰布包乘熱熨之神效無比此仙方也又方松毛一斤搗如泥用燒酒三斤泡七日隨量飲甚妙又方生川烏頭三個去皮臍為末醋調用布攤貼立能止痛又方黃荊根四五月間生於野地藥店少有須向生藥店採取生者入壇中燒煙燻兩足心及痛處汗出即愈又方威靈仙洗淨焙乾為末入竹筒內以酒潤之九蒸九曬干則加酒制過用白蜜為丸梧子大每服二十丸溫酒下有人手足不遂不能下地者數十年服之數日便能步履久服全愈體虛者少服風濕癱瘓諸方熏藥法治左癱右瘓半身不遂手足腰肢疼痛並酒風腳痛等症真降香真千年健生草烏鬧羊花各一錢生川烏三錢真麝香三分要當門子陳艾六錢鑽地風五分百草霜三錢即鍋底煙子共研細末攤紙上捲成筒用麵糊緊外用烏金紙包好紮緊以火點燃熏患處熏時用棉袱隔住漸熏漸痛痛則風濕易出越痛越好務必忍住熏半時後暫歇用手在患處四圍揉捻如有一處揉捻不甚痛者即於此處再熏風濕即從此而出熏完此藥一料而愈有人風癱年餘照此治愈愈後戒食魚腥生冷等物一月體虛者其功稍緩豨薟丸此藥明目烏須健脾胃壯筋骨能治中風口眼歪斜骨節疼痛腰膝無力手足癱瘓等症屢試神驗五月五日採豨薟草去根花並子淨用莖葉加酒與蜜拌勻蒸三炷香久則出曬一日加酒蜜再拌再蒸以九次為度曬乾磨細末煉蜜為丸如梧子大每服三錢米湯送下或六月六七月七八月八九月九日修合俱可本草𧉅薟草有二種南北不同南方一種名曰花菜豨桐丸治男女感受風濕或嗜酒冒風內濕外邪傳於四肢脈絡壅塞不舒以致兩足軟痠疼痛不能步履或兩手牽絆不能仰舉凡辛勞之人常患此症狀似風癱服此丸立能全愈其藥價廉而效速誠秘方也幸勿輕視地梧桐俗謂臭梧桐不論花葉梗子均可用採取切片曬乾炒磨末子一斤𧉅豨草炒磨末子八兩上二味和勻煉蜜丸如桐子大早晚以白滾湯送下四錢忌食豬肝羊血番芋等物或單用臭梧桐二兩煎湯飲以酒送之連服十劑其痛即愈或煎湯洗手足亦可狗脊飲治氣血俱虧手足麻木感受風濕不能行動無論男女一方分作五服每日一服六日全愈如未全愈用酒十斤將藥泡服此方試驗數百人神效非常不可輕忽金毛狗脊川牛膝海風藤宣木瓜桑樹枝松樹節續斷杜仲秦艽桂枝上身不用要用下身熟地各一錢大歸身二兩虎骨膠一兩此味不用亦可用河水二碗煎六分用紹酒一小杯同飲癱瘓藥酒治一切風濕癱瘓甚效蒼朮白芷羌活獨活黃芩川芎薄荷厚朴荊芥木瓜桑寄生白細辛各二錢杜仲牛膝續斷當歸靈仙鑽地風千年健各錢半防風一錢二分川烏草烏五加皮秦艽桂枝各一錢豬筋四兩用雄雞一隻重一斤者為率輕重俱不合用殺之燖去毛不可見水不要腸臟用瓦鍋同前藥入糟燒酒五斤蒸好取雞先食酒早晚隨便飲忌生冷寒涼滯氣等物宜逸不宜勞宜避風濕節房事病輕者服雞後即愈重者飲酒完即愈極重者再服一料全愈但飲酒時其痛更甚須要忍耐痛止即痊松豆酒治風氣骨節疼痛半身不遂黑料豆一升小扁如腰子樣者佳油樺節銼碎四兩白蜂蜜一斤好紹酒十五斤蒸一炷香久取出泡水中過十四日早晚隨量飲有人癱瘓不能行動飲此半月行走如常其效無比二妙散治一切風濕癱瘓筋骨疼痛無不神效生甘草威靈仙各一斤用水一擔將藥煎五六滾入大缸內用板凳坐其中周圍用布圍住乘熱熏之待水溫渾身洗透務使汗出謹避風寒即愈筋骨皮膚病附後與腿足及中風各門參看周身骨軟一人愛食燒炙炒煎厚味以致周身筋骨疼痛軟弱漸至手足不能舉動經年不愈後食冬瓜一二百斤而愈周身痛不可忍一人遍身作痛或云中風或云中濕或云腳氣百藥不效後一醫云是氣血凝滯用延胡當歸肉桂等分為末溫酒調服四錢而愈或加天麻亦可服過輕粉筋骨疼痛凡生楊梅等瘡服過輕粉之人必致筋骨疼痛攣縮或破爛日久不愈查解救諸毒門治輕粉毒方治之風濕疼痛生紫蘇一把如無鮮者即乾的亦可蔥頭連須一把生老薑一大塊陳皮二錢共搗融爛用菜子油一茶杯放鍋內煎過再加灰面攪勻作成一餅乘熱敷上冷即解下再用菜子油少許放鍋內將舊藥餅溫熱再敷冷則隨換日夜不斷其風濕即散而愈矣有人手疼不能抬起十年不愈敷至數日全安不用菜子油用頂好燒酒亦可又方薑汁一兩蔥汁一兩陳米醋五錢牛皮膠三兩另用陳皮八錢熬濃汁去渣和入慢火煮成膠冷透火氣青布攤貼止痛神效又方糯小米舂極熟小米有黏糯兩種以糯為佳炒熱用布包好於痛處頻頻熨之其痛立止又方老薑一塊切去一面用廣東馮了性藥酒炒透取出另用馮了性藥酒燉熱以姜蘸酒於痛處避風擦之極效又方樟樹皮切細加老薑捶融和糯米酒糟炒熱冷則再換日夜不斷三日全愈又方真淨銀硃三錢枯礬四錢為末鋪紙上作紙捻三條每早以一捻蘸麻油點火向肚臍熏之蓋被取汁即愈風濕灸法凡肩背腰脅手臂腿膝環跳大腿外側為環跳貼骨等處感受風寒濕氣以致漫腫無頭皮色不變惟痠痛麻木筋拘抽痛不能轉側動搖等症即將手按撳其著骨極痛之處用墨點記隨依後法灸之即能消散若耽延日久致生腫毒難以收功沉香研丁香研木香各五分研麝香二分研乳香六分燈草同炒研穿山甲五分炒研末上臨用時共研勻以大核桃殼半個將藥末裝滿復於墨記之處再用乾麵水調做成饅頭面式作一圈子圍住核桃殼不致移卸上用濕荷葉一張蓋護以防火星落下仍挖一孔留出核桃殼將艾絨作龍眼核大放桃殼上以線香點火灸之初灸一二次不覺其熱至五六次方有艾熱之氣鑽透於內能受熱者再灸十四次不能受熱者止灸十一次灸過其毒自消如病甚者加灸二三次決不成毒灸畢隨愈屢治多人應驗之至子龍丸治人忽患胸背手足腰項筋骨牽引勾痛走易不定或手足冷痹氣脈不通此乃痰涎在胸膈上下誤認癱瘓非也又治喉中結氣狀似梅核倏有倏無沖咽悶絕又治腳氣疼痛及遍身或起筋塊如榴如慄皮色不變不疼不痛但覺痠麻或自潰串爛流水如涎經年不愈有或管漏此乃痰滯經絡所致常服此丸自能全愈方見陰疽門每服三分淡薑湯送下痰猛加數丸如腳氣加檳榔木瓜松枝卷柏熱痰加盆硝寒痰加胡椒丁香乾薑肉桂筋骨疼痛不拘風濕氣滯或筋縮不舒疼痛不止當歸一兩白芍苡仁生地玄參各五錢柴胡一錢水煎服神效如腳膝轉筋加木瓜五錢極妙歷節風由下而上逐節疼痛風男婦先自兩踝骨疼起次日流上於膝三日流於兩股上至於肩肩流於肘肘流於後彎每至一骨節或如錘鑽或如蟲竄痛不可忍日輕夜重諸藥不效六脈緊此名歷節風又名白虎風炭灰五升蚯蚓糞一升又名曲蟮又名地龍紅花三錢和醋炒熱布包作兩起輪流熨之甚效又方真紅川椒去子及閉口者以草紙兩層隔住炒出汗放地上用瓦缽蓋住四圍用熱灰遮住約一時久取出研末用酒和米糕為丸梧子大每服四十丸空心鹽水送下服至一斤自愈神效體虛者少服箭風痛俗名鬼箭打或頭項肩背手足腰肢等處筋骨疼痛不安穿山甲一錢左邊痛用右邊甲右邊痛用左邊甲炒黃研澤蘭葉三錢酒煎服此藥專行血絡通瘀散邪屢試如神永不再發又方延胡索肉桂五靈脂當歸白芷防風各一錢水煎服另用木香一錢水磨兌服極效此林屋山經驗方也手足筋骨疼痛熟地四兩搗爛浸入頂好燒酒二斤蒸熱用竹筷攪勻放水中三日取出每日隨量飲至愈為止並取所泡熟地送酒甚效此林屋山人經驗方也肩背筋骨疼痛槐花子胡桃又名核桃脂麻俗作芝麻細茶葉各五錢用水五碗煎至一半熱服神效腋肋手足腰脅等處忽如火熱腫硬如石痛不可忍或彎曲不伸急用熱糯米飯加食鹽蔥頭少許敷之冷則熏熱再敷敷至過夜即松連敷兩日全愈其糯飯洗淨喂鼠餵魚不可暴棄腰腳風痛不能履地四肢筋絡不舒尾脊骨上下左右疼痛大小便不通服八味地黃湯見備用諸方甚效再發再服如不見效加左歸丸右歸丸見同上合服必愈此症水火俱虧初愈即應以八味地黃湯作丸常服方可斷根身中忽有一處作痛浮面不痛按之覺痛或咳嗽牽扯作痛此平時閃跌內傷氣血凝滯或肩挑重物傷損初時不覺日久始發也照腰部閃跌毆打傷腰第二方治之皮膚中痛名症疰用醋調燕窩泥敷之甚效又方杏仁炒黑研如泥敷之即愈皮膚偶觸衣物痛徹連心似乎無皮之狀此名脧痛乃暴寒襲入肌膚故也用胡椒四錢研好燒酒四兩煎滾用布蘸酒乘熱搽之身麻皮厚如鐵苦參二錢酒煎服外用苦參研末酒調敷之久敷自愈極效皮膚枯如魚鱗年骨髓用真蘇合油煎炒空心熱酒服一酒杯半月即愈積受潮濕四肢不仁方歌訣云十大功勞三兩重八稜麻根五錢輕淫羊藿與千年健紅花當歸五加皮陳皮去白六兩足再加無灰酒十斤封壇七月隨量飲一月之後見奇功傷寒傷寒症傷寒傳變症候繁多大抵自霜降後春分前寒邪所感者為正傷寒春夏別感者謂之四時傷寒而兼雜症惟得病之初宜先審辨則調理不差夫傷寒症候大類傷暑但傷寒惡寒而身寒傷暑惡熱而身熱脈緊惡寒謂之傷寒脈緩惡風謂之傷風脈盛壯熱謂之熱病脈虛身熱謂之傷暑傷暑脈浮大而散或弦而遲蓋熱傷氣散而脈虛也外症風頭痛身熱煩渴口乾面垢自汗倦怠少氣或背寒惡寒甚則迷悶不省手足抽動或嘔瀉腹痛下血發黃出斑等症行路得之為中熱靜室得之為傷暑又胸膈脹滿頭痛發熱時有止歇者勞身食積也惟頭痛惡寒發熱身足痠痛晝夜不歇傷寒也依此看過果系傷寒若無良醫幸莫用藥蓋此症死於病者少而死於醫者多惟宜密室避風勿食粥飯米粒謹靜自守只以薑汁熱酒或薑茶等類與飲待七日傳遍經絡雖不服藥亦自然全愈古云傷寒不藥得中醫正此謂也至於過經傳隔經傳兩感傳之症病本至危非良醫不治若用藥一誤是速之死耳可不慎歟傷寒外治諸方點眼法粉甘草六分頂上梅花冰片四分共研細末凡傷寒病起一日至六日用此藥點眼內角男左女右點之出汗而愈如過七日不論男女兩眼並點神效蔥姜熨法治傷寒胸膈不寬作痛一切寒結熱結食結痰結痞結水結等症並中氣虛弱不堪攻擊內消者須以此法熨之則滯行邪散其效如神邊須蔥白一大把老生薑兩大塊生蘿蔔四五個無則以蘿蔔子一合代之三味共搗爛炒熱酒炒更妙用布作兩包輪換久久罨熨心胸脅下痛處自然豁然開散汗出而愈干則加酒炒不宜太熱恐炮烙難受若大便結兼熨臍腹又卷四飲食停滯門有外治一法亦可用蔥熨法寒中三陰口噤失音四肢強直攣急疼痛兩手無脈似乎中風者或厥逆唇青男子腎囊俗名卵泡縮入婦人乳頭縮入或男婦交合後氣絕等症但用蔥白一斤微搗炒熱分兩包輪換熨肚臍下久久俟暖氣透入自愈並以蔥白三寸搗爛酒煎灌之陽氣即回此華佗救急方也或用罐裝熱火或裝滾水放炒熱蔥上熨之更妙病重者更以艾丸如豆大燒氣海穴臍下一寸五分關元穴臍下三寸各七次則脈漸現手足漸溫可得生矣蛋熨法傷寒症不能分陰陽醫生不識不能下藥目定口呆不省人事及身熱大小便不通而無汗者用雞蛋十個煮熟留殼切去一頭留七八分合在病人臍上用銀簪插入雞蛋內取出黑色蛋冷即換俟銀簪不黑病人大汗即愈用神仙粥見備用諸方調養可無後患此秘方也或照後陰症傷寒外治各方亦妙吳萸熨法治法同上用吳茱萸一升搗碎酒拌濕布袋兩個分包甑蒸透多熨兩足心兼熨肚臍下候氣透手足暖為度或加麥面食鹽蔥白等分同炒熱熨亦可冷則隨換紫蘇熨法傷寒內傷積食小腹硬脹大小便不通不能言語神思欲脫兩目直視手足強直證候危篤難以下藥者用紫蘇數兩煎滾熱湯將手巾在湯內泡熱扭干乘熱攤病人肚上及小肚上令人以手在手巾上盤旋摩擦冷則隨換如此數次一切宿糞硬塊積血自下其效如神如肛門閉結不通以蜜糖和豬膽煎成條子徐徐插入此法屢效但積糞下後須用藥調理又方土熨法見卷十一備用諸方亦妙又方野芋頭切片磨擦背上第三節骨如覺痛癢者即非傷寒若不知痛癢即是仍用野芋片周身骨節用力擦勻並用芋片炒熱煎濃汁服二三次即愈忌食葷並飯又方急取巴豆十粒搗爛入面一錢捻作餅安臍內以小艾火灸五次氣達即通傷寒發狂目不識人或見鬼神大蚯蚓半斤去泥用童便煮汁飲或生絞汁兌童便飲亦可此葛仙方也又方用新抱出雞子的蛋殼煎湯服即安奇方也又方灶心土煎水日服三次即愈或用癩蝦蟆貼心上方最妙傷寒發狂兼發斑疹不發斑疹者亦效重者多用癩蝦蟆貼之惟肝不宜多用凡傷寒發狂眼直舌強或發斑疹急用銅錢於脊背兩手彎兩乳旁兩腿彎刮出青紫色隨取癩蝦蟆一隻目紅皮紅腹無八字紋者勿用破開去腸肚各物貼心坎上取蝦蟆肝煎水服之並用煮熟整雞蛋去殼於刮傷處乘熱滾擦隨滾隨換其病頓減有起死回生之功滾過雞蛋埋入土內不可使雞犬誤食此苗人秘方也無癩蝦蟆用雞亦可不必食肝終不如蝦蟆之妙又方先用紋銀放臍上再取燕子窩泥搗融和雞蛋煎成一餅敷上冷則隨換數次即愈傷寒舌出巴豆一粒研細去油以紙卷納鼻中舌即收上又方頂上梅花冰片以牙色為上半分為末搽之即收傷寒隔食方見噎隔門傷寒口渴不止百合一斤水泡一夜煮湯洗身並以百合食之傷寒毒攻手足腫痛欲斷水牛肉貼之腫消痛止或用清涼膏敷最妙見湯火傷門菜子油敷或用六安州茶葉研末別項茶葉亦可惟功效稍緩耳調菜子油敷或用馬齒莧又名瓜子菜搗融敷或入鹽少許搗融敷均效傷寒五六日周身發黃生薑火煨去皮布包扭汁蘸香油點兩目大小眼角效或照卷十五黃疸各方治之最妙傷寒後行住坐臥不定如有鬼神名百合病如已發汗者用整百合七個用泉水泡一夜次日另用泉水煮汁一升再用知母二兩用泉水煮汁一升同百合汁再煮取汁一升半分服已經吐後者用百合七個照前泡煮入雞蛋黃去白一個分服已經下後者用百合七個照前泡煮再用赭石一兩滑石二兩水二升煮汁一升同百合汁再煮取汁一升半分服未經汗吐下者用百合七個照前泡煮加入生地黃汁一升同煮取汁一升半分服此仲景方也陰症傷寒以下各方非因陰症而起者無論男女亦治男婦交合後或外受風寒或內食生冷等物以致肚腹疼痛男子腎囊俗名卵泡內縮婦女乳頭內縮或手足彎曲紫黑甚則牙緊氣絕謂之陰症傷寒又名夾色傷寒急用磚燒紅隔布數層在肚腹上熨之或照前蔥熨法治之輕則用前蛋熨法治之又方男婦交合後陽物縮入絞痛欲死者急取本婦陰毛燒灰水調服並取洗陰戶水飲之此急救良方不可嫌穢自誤以速為妙遲則不能救矣又方紋銀一塊捶扁燒紅如病人未絕氣至燒滾熱放在臍上再用雞一隻連毛破開不去腸包於銀上用布縛住以手按緊即愈若人已死揭雞看視如雞青銀黑另換雞銀再包即愈如無銀只用雞亦可又方胡椒四十九粒連須蔥頭四十九個共搗成泥加鍋底煙又名百草霜取燒草者佳一撮再搗勻分二處布攤一貼臍上一貼龜頭用線捆住少頃即愈又方胡椒四十九粒飛礬一錢黃丹一錢共研細末以好酒和為丸男置左手心女置右手心正對陰眼合之緊緊按定少頃腹內燥熱不可搖動即愈女人尤效又方以布貼臍上取滾水一壺熨之又方急使小兒溺小便於病人床前令人用足男左女右將尿浸濕泥推擦成團為餅敷臍上再用滾水一罐在泥餅上熨之甚效又方用武營鳥槍火藥二錢研碎滾水沖服熱酒沖服更妙如得吐瀉即可回生此症寒中三陰命在頃刻非此猛烈之藥驅寒回陽不能急救此方屢試甚驗不可遲疑誤事此藥必以武營為佳爆竹店火藥功緩無力又方純陽救苦湯生薑一塊約二三兩者切片大黑豆三合炒熟用水三碗同黑豆煮數滾瀝去薑豆不用取汁服之汗出即愈神效又方白朮三兩肉桂三錢丁香吳萸各一錢水煎服一劑而陰消陽回不必再劑此方名盪寒湯妙在獨用白朮之多則腰臍之氣大利又得肉桂以溫熱其命門之火丁香吳萸而止嘔逆而反厥逆則陰寒之邪自然潛消故一劑而即愈也又方人參五錢白朮三兩附子一兩乾薑五錢肉桂六錢水煎急灌之此症最重最急若不用此等猛烈大熱重劑斬關直入何以逐陰寒而追亡魂祛毒氣而奪陽魂故人參少用而桂附不可不多況貧寒之家無力買參故方中又特多用白朮以驅駕桂附以成其祛除掃蕩之功而奏返魄還魂之效無人參以高麗參代之或用頂上黨參一兩亦可又方蛸蛺蟲即鼻涕蟲七隻擂爛滾水沖融去渣溫服有起死回生之功夏月身冷畏寒症候治法均見中暑門感冒風寒此偶為風寒所感其症較輕與前傷寒症不同或照前傷寒外治各方治之亦可風寒頭痛燒熱用蕎麥散見頭部第一方敷之最效或用黃糖紅砂糖亦可加老薑蔥頭煎湯或加豆豉並酒煎服或用豆豉蔥姜煮麵亦可均宜蓋被睡臥取汗為妙或照以後各方治之中寒面色青黑或不能言語食鹽一撮放刀口燒枯用好汾酒或燒酒一鍾煎滾服之立效如神又方核桃連殼打碎連須蔥頭各七個細花葉三錢共入大碗中用滾開水衝入向頭面熏之通口飲盡蓋被睡臥汗出即愈加生薑煎服亦可又方黑豆一合炒焦以酒衝入熱飲微醺蓋被臥之汗出即愈風寒作痛橘子葉老薑蔥頭不拘多少和酒炒熱用布包裹於患處頻頻熨之其病若失身受風寒心腹疼痛飲食少進大便閉塞小便短澀上下關格不通渾身繃緊甚至手足僵硬不省人事涼熱難分用土熨法見內外備用諸方治之最妙又身發寒熱四肢堅硬如石敲之作鐘磬聲方見卷十六奇病門閉住風邪體虛不能發表有人外感風寒誤服補藥致將風邪閉住體極虛弱難以發表後用大藥店中包細辛中泥土一斤多煎水乘熱先熏周身用布圍住取氣熏身後洗發汗而愈洗時避風為要暴風身如冰冷用蠟溶化攤新紙上布亦可隨患大小貼之並裹貼兩手足心冷則隨換甚效或用土熨法見內外備用諸方亦可發寒發熱或麻木或不麻木此症恐是疔瘡其形大小不一隨處皆生急於遍身尋認凡須發眼耳鼻肩下兩腋手足甲縫臍眼前後陰處尤宜一一細看如有形跡雖小如粟米亦是急查卷十一疔瘡各方治之
