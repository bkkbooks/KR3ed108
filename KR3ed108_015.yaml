body:
  text: 卷十五中暑與痧症霍亂各門參看中暑論中暑者靜而得之如避暑深堂大廈為陰寒所遏暑不得越故也外症見身熱頭痛煩躁不安或咳嗽發熱汗出不止然必熱有進退脅下有汗方為傷暑若久熱不止脅下無汗便是夏月傷寒症雖少見不可不詳辨而妄投湯藥也又腹痛嘔瀉為冒暑宜涼解清利四肢困倦不思飲食為熱傷元氣宜補忽然昏僕不省人事為暑風宜清涼而加風經藥不可概從中暑治也中暑諸方蒜頭二顆研爛取路上熱土日曬熱處淨土若汙泥不可用攪新汲井水調勻服一錢甚效又黑芝麻炒井水擂汁灌下即愈又扁豆葉搗汁飲亦效又方六一散蓋元散見內外備用諸方均效夏天道路受熱忽然昏倒名中熱又名中暍切不可誤用冷水噴灌一受寒冷則不可救急用稻草結為長帶曲盤肚臍外用熱土搓碎圍之使人撒尿其中令溫氣入腹久之自愈又方草紙捲成筒點火向口鼻間熏之即活其效如神又方用布蘸滾水更換尉之尉臍與臍下三寸為要醒後仍忌飲冷水飲之復死又方皂角燒存性生甘草各一錢共為末溫水調灌又方白礬末陰陽水調服一錢即醒神效傷暑出丹凡暑月身熱昏沉未明症候恐是出丹用生白扁豆數粒食之如不知腥味則以生白扁豆水泡濕研汁一小杯調水一盞服之即愈夏月身冷畏寒有人夏月身冷畏寒身蓋重被尚發抖戰一醫欲作傷寒治之一醫以為不可云是中暑用清暑益氣湯見內外備用諸方調理而愈痧症與霍亂症參看各項痧症痧症有陰痧陽痧烏痧斑痧絞腸痧等症初起多半腹痛亦有並不痛只覺昏沉脹悶者切忌服薑急用南蛇藤草藥名煎水兌酒服之立可起死回生最為神效若或吐或瀉者名霍亂症用之亦效仍照後霍亂門各方治之痧症諸方刮痧法擇一光滑細口瓷碗另用熱水一鍾入香油一二匙將碗口蘸油水令其暖而且滑兩手復執其碗於病人背心上輕輕向下順刮切忌倒刮以漸加重碗干則再蘸再刮良久覺胸中脹滯下行始能出聲頃之腹中大響大瀉如注其痛遂減睡後通身搔癢或發出疙瘩遍身而愈今有於頸臂刮痧者亦能治病然五臟之系咸附於背向下刮之邪氣隨降故毒深病重者非刮背不可也此為痧症起死回生簡便良方最靈最穩又方刺少商穴委中穴二處其法見霍亂門又方以食鹽一握揉擦兩手腕兩脅兩足心並心窩背心八處擦出許多紫紅點漸覺鬆快而愈一切痧脹及中暑霍亂等症雖垂死亦活此第一簡便良方也又方嫩車前草七根揉軟塞鼻孔內男左女右又方用紅紙捻看身上如有紅斑紅點名斑痧即用燈火在斑點上燒之務將斑點燒盡以免復發或用食鹽二斤炒熱用青布裹作二包在胸腹及背上尉之冷則隨換此法最妙再用蕎麥五錢煎服惟藿香正氣丸斷不可服別項痧症可服以內有陳皮紫蘇甘草半夏等藥為斑痧所忌也又方生白礬為末每服一錢不拘男婦用陰陽水調下各項痧症及受暑昏暈不省人事者服之立可回生此物能升清降濁故奏效如神存心濟人者宜佩帶身傍或路道或深夜可當仙丹又方急取生芋頭又名芋艿食之如非痧則生澀難食若是痧則食之味美連食一個即愈屢試神效尋常腹痛食之亦效又方藿香正氣散見內外備用諸方服之穩而且效惟斑痧症萬不可服霍亂霍亂症上吐下瀉者是無論冬夏皆有又有吐而不瀉瀉而不吐者亦是又有吐瀉不出者名乾霍亂治不得法皆不可救凡遇此症斷不可與飯食即米湯亦不可服並忌食薑一入口即不救俟愈後平定久久方可進食些少亦不宜多霍亂諸方食鹽一撮放刀口上燒紅以陰陽水半滾水半冷水名陰陽水沖服服後腹痛漸止再服藿香正氣散見內外備用諸方全愈又方陳皮藿香各五錢黃土澄水二鍾煎服雖死立生又方炒鹽填臍內用艾放鹽上燒之以燒至止痛病醒為度已死而心頭微溫者亦可活也又方細細看病人背上如有黑點用針一一挑破出血即愈若遲一日則不能救矣又方用鋒利瓷碎片刺少商穴委中穴二處使出血即愈百發百中少商穴在兩大指甲之兩旁與出指甲之處相齊只離指甲兩傍邊各一韭葉寬是也先從手臂膊上揉至指間使血氣下行方刺委中穴在腿彎先用手蘸溫水拍打打出紫紅紋是也從紫紅紋上刺之又方白礬末陰陽水調服一二錢神效此華他方也又方楓樹皮煎濃湯當茶飲其效如神又方樟木舊杉木舊鐵丁掃帚梗車繩如無用亂麻亦可灶心土蘇葉各等分加鹽一撮炒焦沖水一大碗煎濃當茶飲吐瀉立止有起死回生之功方名七星茶或用樟木一味煎濃汁飲之亦止吐瀉而愈更為簡便神效又方藿香蘇梗各三錢煎服吐瀉立止屢試如神又方嘔吐難以進藥者加真川椒末兌入藥內一滴一口緩緩服之自能平愈或飲烏梅水少許然後服藥皆極神效霍亂腹痛兩腿轉筋藿香蒼朮柴胡羌活各二錢澤瀉木通各一錢神麯陳茶葉各三錢老蔥連根兩條水煎服此四川呂祖廟內碑刻神方輕者服一二劑至重四劑全愈活人無算屢試如神又方男子以手挽其陽物向上女子以手牽其乳向兩旁即愈甚效又方芥菜子研細末填臍內立效如神又方熱醋煮青布抹之或用布蘸極滾水抹之冷則隨換又方大蒜頭搗爛敷兩足心立愈又方皂角末吹一豆大入鼻取嚏即安又方令病人面牆直立一人以手蘸溫熱水在腿彎上拍打數十下有青筋現出即將針刺出黑血即止又方以墨書木瓜二字於痛處仍令病人口呼木瓜隨聲而愈屢試甚效或用木瓜煎服亦可又方勉強站起直立少頃即愈屢驗霍亂轉筋入腹吳茱萸二分炒酒二盞煎一盞分二服得下即安霍亂煩渴真烏梅煎水和蜜飲之三香寶暑散專治七十二種痧症霍亂轉筋尤為神妙涼茶吞服忌米飲每服一錢重者二錢立愈小兒減半同治癸亥年上海救活無數皆此方也幸勿輕視方用細辛三錢荊芥四錢鬱金一錢檀香三錢沉香三錢上藥生曬研末滾水調丸如緑豆大或研末用亦可勿令泄氣只可少服瘧疾瘧疾須知凡瘧疾口渴切不可飲冷水冷茶並一切生冷之物犯之其疾更甚惟以薑湯乘熱飲之此良法也凡瘧疾熱未全退不可飲食必俟其熱退盡方可食之不然必成痞積凡服截瘧之藥必俟發瘧過後方可食物若食早瘧必再發下次截瘧無靈矣凡小瘧疾多有穢氣必熏燒檀香蒼朮等藥以避其邪更常熏其衣物穢氣去而邪易除矣瘧疾三方倪涵初曰瘧之為害南人患之北人尤甚弱者患之強者尤甚雖不致遽傷其命然不治則發無已不得其道則惡邪內伏正氣日虛久而久之遂不可藥豫所定三方甚為平易無奇絶不入常山草果等劫劑且不必分陰瘧陽瘧一日二日三日及非時瘧人無老幼病無久近此三方不用加減惟按其次第服之無不應手而愈第一方廣陳皮陳半夏薑汁煮透白茯苓威靈仙各一錢蒼朮米泔水浸一日切炒真紫朴薑汁拌抄柴胡黃芩各八分青皮檳榔各六分灸草三分生薑三片井水河水各一鍾煎九分飢時服渣再煎服如頭痛加白芷一錢此方平胃消痰理氣除濕有疏導開先之功受病輕者二服而愈勿再藥若三服後病熱雖減而不全愈用第二方少則三服多則五服第二方生首烏三錢陳皮柴胡白茯苓黃芩各八分白朮炒當歸威靈仙各一錢知母鱉甲醋灸酥研粉各二錢灸草三分生薑三片井水河水各一鍾煎八分加無灰酒五分再煎一滾空心服渣再煎服此方妙在補瀉互用虛實得宜不用人參黃耆屏去常山草果平平無奇實有神效即極弱之人纏極重之病十服後立奏奇功萬無一失所云加減一二即不靈驗者正此方也第三方人參一錢白朮炒一錢炙耆當歸各一錢二分陳皮柴胡各八分炙草三分升麻四分或加首烏二錢知母炒一錢或加青蒿子八分麥芽一錢生薑一片大棗一枚水二鍾煎八分半飢時服用三五服元氣充實永不發矣方雖有三第二方實為主治良方既不刻削亦不峻補是以功獨歸之其第三方專為有力者而設貧家安得有參宜多服第二方可也又方青蒿四兩真川貝母七錢青皮檳榔厚朴神麯半夏各二兩甘草二錢共為末薑汁為丸緑豆大以硃砂為衣於未發前三個時辰每服三錢薑湯送下勿經婦人手此方屢試屢驗神效非常不可輕忽又方真川貝六兩去心生半夏四兩各為細末端陽午時合和銅鍋微火炒至嫩黃色冷定收貯瓷瓶勿令泄氣每用生薑汁調藥二分蒸熱於病發先一時服之輕者一服重則三服必愈愈後忌食發物及雞鵝南瓜芋艿等物三月此方有人施藥多年屢著神效又方牛皮膠二兩熬化加生薑三兩搗爛如泥攪勻熬成膏聽用於病發先一時用皂角水洗淨背脊拭乾再以生薑一大塊揉擦極熱用寬長細布一大塊將膏攤上貼之從衣領處貼起過一二日病即全愈愈後五日方將膏藥揭去有人患此三年一貼即愈簡便而極效也又方用草從左手中指頂尖處量至中指根處為止將草摘斷即用此草從根量至掌再從掌量至腕為度以墨點記用獨頭大蒜研爛敷於墨點處用核桃殼蓋上以布扎上一個時辰即去之神效又方信石五分巴豆七爛雄黃七分共為末於端午日午時丸如麻子大三陰瘧貼額中余男左女右貼之又方巴豆二十一粒南星一個白麵少許水調捻餅用膏藥貼額上又方酒地金錢草又名遍地金錢又名破銅錢又名滿天星清早塞兩鼻孔中各一丸雖三日一發之瘧可以立愈又方桃頭七個向天者獨頭蒜七個胡椒四十九粒五家粽尖五月五日午時共搗為丸扎肚臍內一周時即愈又方常山草果丁香少許用上好酒半茶杯煎數滾盛鍾內熱熏鼻孔即愈又方當歸川芎防風甘草陳皮蒼朮杜仲檳榔草果半夏常山荊芥知母各一錢真烏梅五錢燒熟打碎將藥共放鍋內炒熱於瘧未發時用稀布包裹捆緊臍上臍內先以藥末三分填滿其發必輕再炒再捆無有不效間日瘧者更效輕者一服重者兩服必愈年老人不肯服藥者用此最效又方龍眼樹葉男用十一片女用十二片加白芝麻三錢煎濃汁於瘧發先半時服服後蓋被臥片時汗出即愈諸藥不效者用此最妙三陰瘧午時以後發者是青皮陳皮當歸知母各三錢真烏梅五個水二碗煎八分露一宿臨發日燉熱服其效如神隔日瘧旱蓮草研碎如黃豆大以紫蘇葉裹之男左女右塞鼻孔內半日即出涕淚輕者立愈重者漸次而愈或照以上各方治之旱蓮草查卷十六藥物備要便知三日瘧首烏五錢蒼朮三錢白朮二錢甘草一錢知母五分水四碗煎碗半雞鳴時服立止如不愈即照以上各方治之久瘧不愈前外治各方可治久瘧鱉甲醋灸研末酒服二錢隔夜一服清早一服臨時一服無不斷者入雄黃少許更佳此葛仙肘後方也又方牛膝一大把水四碗煎二碗未來時一服來過時一服即愈又方或一日二發或一日二三發或二三日一發用五靈脂頭上油膩各一錢陳石灰二錢研末飯為丸如蠶豆大每服一丸五更無根水下即止神效方也又方大肉棗二個去皮核斑蝥二個焙研同入棗肉研勻加熟豬油少許捏成餅子指頭大貼在兩眉中間印堂上一周時即愈又方常山酒煮曬乾知母貝母草果各錢半水煎五更熱服此方有人用之三十餘年奇效不能盡述切勿妄為加減平瘧養脾丸不論遠年近日百發百中誠治瘧之王道也久瘧體虛者非此莫愈人參無則用高麗參焦朮漂蒼朮茯苓人乳蒸陳皮酒炒青皮醋炒製半夏紫川朴薑製北柴胡炙箭耆豬苓炒澤瀉炒桂枝焙常山焙鱉甲醋灸白當歸炙甘草草果仁薑製川芎酒炒各等分共為細末酒煮麵糊為丸如米粒大每服一二錢米湯下有痞者加三稜莪朮二三日瘧年久不愈當歸半夏各五錢常山檳榔各二錢半紅棗半斤去核好酒一斤井水一斤共入砂罐忌鐵器煮爛露一宿次日清晨燉微溫連棗作數次食完即愈屢驗如神忌雞與雞蛋發物三月又方青蒿二兩長流水煎服伏暑在肝發瘧一二年不愈者一服即止久瘧虛極人參五錢生薑五錢水二碗煎一碗露一宿次日五更溫服當日即止無力用參者以白朮一兩生薑一兩如前煎服二服即止或用平瘧養脾丸見前亦效隔年瘧乾薑五錢白朮三錢煎服愈又方雄黃三錢為末生龜板一個去兩旁放火上將雄黃末徐徐鋪在龜板上煅黑碗蓋存性取起研末酒服厚被蓋臥汗出即愈三十年瘧常山黃連各五錢酒一斤泡一夜瓦罐熬至七分發日早飲一半發時再飲一半或嘔或瀉即愈久瘧成痞胸脅高起者是又名瘧母毛腳芹菜大蒜銀硃同搗爛塗患處以油紙蓋上扎住半日皮上疼痛口中有蒜氣出其塊自消又方大蒜一個曬乾研末朴硝三錢研末獨頭蒜共搗融成膏貼上自消又方獨頭蒜一個黃丹一錢番木鱉焙為末五分共研成餅放患處扎好口中有蒜氣出即去之內自消矣小兒久瘧不愈鱉魚煮食多則二次無不立愈又方大鱉甲小者不用用醋炙枯研末每服一錢或錢半隔夜一服清早一服將發時一服無不愈也又方赭石三錢燒紅醋淬硃砂五分砒霜一豆大各藥用紙包七層水浸濕火中煨乾研末加麝香五釐香油調搽鼻尖眉心及手足心神效黃疸五種黃疸此症有陰黃陽黃之分如用黃蠟方不效即系陽黃用滿天星方治之無不愈也黃疸谷疸酒疸女疸勞疸此五種也身黃如金或兼腫脹嘔吐或眼目亦黃急用薄草紙以筆管卷如爆竹樣將一頭以紙封緊用黃蠟用銅器融化將紙筒四圍澆勻不可使蠟入筒內令病人仰臥將蠟筒罩肚臍上以封過一頭向下再用灰面作圈護住筒根勿令倒下勿令泄氣筒頭上點火燒至筒根面圈處取出另換一筒再燒看臍中有黃水如雞蛋黃者取出輕者燒七八筒重得數十筒日燒二次總以取盡黃水為度有人黃疸身如金色遍身腫脹飲食入口即吐百藥不效照此治之三日全愈真仙方也珍之寶之又方蒼耳子薄荷木通綿茵陳各三錢用陳酒入各藥煎汁一碗另用炒砂仁末三錢沖服小便赤如血者加黃連一錢同煎神效此林屋山人方也又方苦丁香為細末嗅鼻內一時鼻出黃水水盡即止三日後再嗅一次全愈又方滿天星葉小而光多生花盆及階砌下連根洗淨約半茶鍾搗融煮豬肉數兩食湯與肉一二次黃退而愈屢試如神又方先用麝香一分放臍眼內再取黃皮癩蝦蟆破開連腸雜復肚臍上用布捆住數日愈孕婦不用麝香又方生茅草根煮豬肉食數次即愈又方水芹取汁服或煮食或生食多食極效發黃欲死不省人事此陽黃也用白毛烏骨雞一隻即絨花雞又名白鳳凰一名絲毛雞干撏去毛破開去腸雜鋪心頭上少頃即活再照前蠟筒方治之再照前滿天星治之無不愈也黃疸吐血此亦陽黃病後身面俱黃吐血成盆諸藥不效用田螺十個水漂去泥搗爛露一宿五更取清汁服二三次血止黃退即愈黃如不退仍照前滿天星方治之最妙胸滿腹脹黃腫方見胸部滿天星又名移星草又名金錢草醫黃疸病聖藥也醫法照前瘟疫瘟疫症此症多發於春分之後夏至之前故曰瘟疫如有鬼癘之氣又曰癘疫以衆人所患相同又曰天行時疫其症與傷寒相似傳經表裡亦無不同惟時令已暖毒氣鬱蒸與傷寒微異發散宜用辛平等劑又有四時瘟疫治法大略相同瘟疫諸方薑糖飲黃沙糖一杯生薑自然汁一杯用白滾水一大杯調勻乘熱急服蓋被出汗即愈四時瘟疫皆治又方白粳米三合連須蔥頭十根煮成稠粥加好醋一酒鍾再煮一二滾食一碗熱服取汗自愈已出汗者不用又方松毛切碎搗每用二錢酒沖服日三服極妥極效又方凡聞病人汗氣入鼻透腦即散布經絡初覺頭痛即用芥菜子研末溫水稠調填肚臍中隔布一二層上以壺盛熱水尉之至汗出而愈又方並治大頭瘟蒼朮良薑枯礬各等分為末每用一錢以蔥白一大個搗勻塗手心男左女右將手掩肚臍手須窩起勿使藥著臍又以一手兜住外腎前陰女子亦如之煎緑豆湯一碗飲之點線香半炷久可得汗如無汗再飲緑豆湯催之汗出即愈又刺少商穴即愈法見霍亂門除疫救苦丹專治一切瘟疫時症並傷寒感冒無論已傳經未傳經大人一丸小兒半丸涼水調服出汗即愈重者連進二服服藥後未汗切忌食熱湯熱物汗後不忌此丹寒熱並用功極神奇百試百效有力者宜修合以濟人麻黃乾薑明天麻緑豆研成粉松蘿茶各一兩二錢生甘草明亮硃砂明雄黃各八錢生大黃二兩共為細末蜜丸彈子大酒尉法治瘟疫傷寒時症或飯後氣惱心口脹悶填塞不舒上好燒酒燉熱將布二塊蘸酒自胸向下搽抹布冷再換熱布輪替搽抹如此數次其氣自通而愈雷擊散專治瘟疫並治忽然腹痛手足厥逆面色青黑並上吐下瀉霍亂硃砂症以及一切痧症此方於乾隆元年間貴州省疫癘甚行忽于丹平山石壁上雷火擊書此方活人無數道光元年江南各省軟腳瘟盛行亦照此方治之神效無比牙皂北細辛各三錢半硃砂明雄各二錢半藿香三錢枯礬白芷各一錢桔梗防風木香貫衆陳皮蘇薄荷法夏甘草各二錢共研極細末貯瓶中忽泄氣隨帶身邊凡遇急症取二三分吹入鼻中再用一二錢薑湯沖服服後安臥片時汗出而愈菩提救苦丸專治春夏感冒風寒時行瘟疫暑濕頭痛口渴身熱目脹盤骨疼痛噁心怯寒脈息洪數等症屢試神驗紫蘇葛根羌活各四兩蒼朮赤芍香附花粉元參各三兩陳皮生地白芷防風川芎黃芩厚朴各二兩甘草細辛各一兩共研為末新荷梗荷葉煎水為丸每丸重二錢半內傷飲食外感風寒者炒神麯煎湯化下余俱用生薑湯或用開水下惟受暑勿用薑大人一丸小兒半丸日久藥味發變更妙闢瘟散此方專治傷寒傷風憎寒壯熱頭痛身痛項痛脊強腰痛目脹鼻塞聲重風痰咳嗽上嘔下瀉口渴便赤內傷飲食及感冒四時不正之氣發痧瘟疫瘴癘鬼瘧瘟瘧赤眼口瘡濕毒流注腳腫腮腫風火喉痹毒痢風熱斑疹並治硃砂症又名心經疔其症初起脈散牙緊手足麻木發軟閉目不語喉腫心痛心慌等症急視前後心有紅點用針刺破出血如內有紅絲即挑出可免無事惟此症傳染甚急頃刻不救藥宜早備製蒼朮五錢桔梗神麯各三錢貫衆滑石熟大黃明雄厚朴薑汁炒生甘草法半夏川芎藿香各二錢羌活白芷柴胡炒防風荊芥細辛前胡枳殼炒薄荷陳皮去白皂角去筋子硃砂石菖蒲公丁香廣木香草果煨用子香薷各一錢共研極細末瓷瓶收貯勿令泄氣每遇患者先用二三分吹入鼻內再用三錢滾薑湯沖服體虛者加臺黨四錢煎湯沖服小兒每服一錢凡病重者三服即愈此方屢經試驗活人甚多不可以藥味多而輕忽視也藥味每料須錢百餘文可治十餘人費錢無多功德甚大瘟疫心腹疼痛與後關毛瘟參看白烏骨雞殺之破開去腸雜撲心上即愈或用血塗心上亦可並用雞肉煮湯食極效或用癩蝦蟆破開撲心上亦可愈後須戒殺放生免再傳染羊毛瘟與卷十一癰毒門羊毛疔方參看凡男婦大小陡然腹痛不過一二時即死醫藥不及用針炙不及施惟有速往十字街心或十字路心於衆人日逐往來之處挖泥土數升以冷水和丸如雞蛋大即在病人臍旁及心窩內外磨擦良久俟泥丸稍熱破開看之如丸中有羊毛是其症無疑矣另換泥丸再擦以不見羊毛為度雖已氣絶身未冷者皆可治若擦之並無羊毛即非此症當另求醫藥施治又方用蕎麵照上法治之更妙大頭瘟此症頭面腫大咽喉閉塞急用延胡索錢半皂角川芎各一錢藜蘆五分躑躅花二分半共為末用紙捻蘸藥推入鼻中取嚏日三五次甚效嚏出膿血者更妙無嚏者難治左右看病之人用此取嚏亦不傳染又方蚯蚓又名曲蟺十餘頭以白糖拌入碗碟蓋好半日即化為水至遲一日必化用鴨毛蘸水敷之即消百發百中之仙方也如無白糖之處用蚯蚓糞井水調敷亦可須戒殺生又方燕子窩連泥帶糞捶融醋調敷立愈又方靛花三錢福建者為佳雞蛋清一個燒酒一杯調服神效又方黑豆二合炒焦炙甘草一錢水二鍾煎八分熱服神效又方吳萸研末醋調敷足心一周時取下即消如未愈再敷一周時必效闢瘟諸方立春後庚子日煮蔓荊汁即諸葛菜不拘多少舉家大小人溫服可免時疫又方六月六日採馬齒莧曬乾收藏於元旦日煮熟鹽醋醃食一年可免時疫又方馬骨一塊裝紅布小袋內佩帶身旁男左女右又方每年臘月二十四日五更取井花水平旦第一汲者盛淨器中計家中人口多少浸乳香至元旦五更煎水從幼者起至老人每人以乳香一小塊飲水三口咽下則不染時症矣又方五更時投黑豆一大握於井中勿使人見凡飲水傢俱無傳染若食河水之處各家於每日清晨投黑豆一撮於水缸內全家無恙又方雷丸大黃各四兩飛金箔三十張硃砂三錢水飛生明礬一兩共研末以水為丸乾隆丙子瘟鬼被雷擊匿於江蘇長洲主簿署中所授此方服之可免瘟疫活人無算屢試如神又方貫衆一個白礬一塊放水缸內亦效又方向東桃枝煎湯日浴二次自然不染又方蒼朮雄黃丹參桔梗白朮川芎白芷藜蘆菖蒲皂角川烏甘草薄荷各五錢細辛蕪荑各三錢以上俱用生料曬乾研末燒熏可避瘟疫屢試神驗又方紅棗二斤茵陳八兩切碎大黃八兩切片共燒煙燻可免瘟氣又方蒼朮末紅棗共搗為丸如彈子大時時燒之可免時疫不染又方凡入病家用香油調雄黃蒼朮末塗鼻既出用紙條刺鼻孔取嚏再飲雄黃酒一杯決無傳染又方雄黃研細末水調多敷鼻孔中與病人同床亦不傳染神方也蠱毒中蠱論脈中蠱之脈多系陽分盛蓋蠱家毒藥皆於端午日製之乘其陽氣極盛之時以製藥故中其毒者脈皆強旺所以利用清涼之藥一切蠱毒皆忌補藥又蠱藥皆屬蛇末故治之皆以殺蛇發表為主知脈者先切其脈用藥隨脈加減肝脈強者多加柴胡槐花白芍青蒿心脈強者多加連翹麥冬脾脈強者多加茨菰菜腎脈強者多加生地玄參肺脈強者多加條參而紫蘇薄荷則凡中蛇中癲中腫中疳治方斷不可少者至蠱毒將愈肺心脈平和則紫蘇少放肝脈平和則薄荷少放不知脈者即照後篇成方治服亦可取效生蛇蠱人初中其毒或肚痛極或作吐作瀉自後凡遇肚痛時行動則皮內或肚內有物堅實夜臥以手按之則肚皮內有物腫起長二三寸微覺跳動心煩涎溢得吃肉則止或移入左脅右脅則飯食減少或跳上心則心脹欲作吐又此物在身時有時無至四五年則成形會咬又有變成肉鱉肉龜以作咬者至蛇老時在皮內肚內行咬有日咬二三十次者命在頃刻此時內蛇翻動作咬則通身發熱額焦頭痛如有發刺蟻咬夜則更甚此乃蠱家之外蛇從風而至也內蛇咬臟腑外蛇入毛孔其蛇無形亦無數用雄黃五錢研末生菖蒲四兩蒜子四兩搗爛三味缺一不可用放浴盆內倒熱水於內令病者自頭至腳處處洗到隔日一洗以御外蛇再用馬兜鈴四兩同水久煨多服服藥後忌食茶水飲食半日若蛇不吐出瀉下仍將蘇荷湯四方見後加減治服過半月復用馬兜鈴半斤煎濃湯服如此三五次其蛇自化不見愈後仍戒雞鴨二年魚蝦螺蚌等戒三年終身戒食蛇蛤有李姓妻者中此毒內蛇長五六寸日咬數十次照方服藥不戒鹽葷兩月而愈又路姓二人中生蛇蠱尚未見咬服馬兜鈴兼服蘇荷湯一月而愈後因食魚復發慎之慎之陰蛇蠱中此毒者不出三十日多死初中時或吐或瀉以後則肚腹膨脹不想飲食口極腥甚則額熱面紅頭面上筋起如蟲行蚓行或耳鼻內如有一二蟲乃藥氣衝上非蟲也或肚內如蛇翻有聲大便結祕若酒醉後在酒中受毒者不獨腸臟青黑即肺肝心脾俱染黑氣服敗毒發毒解毒之藥受毒重則糞黑受毒輕則糞藍若不知解藥則因黑氣而變成黑星黑星有一顆則肚內如針刺有十餘顆便開成蛇口如蛇咬狀咬上心出恭瀉血多不可救又加以癲藥則人多昏憒又加以腫藥則一耳常滿塞一耳少紅厚如有一二蟲行樣服解藥則黑氣隨糞出黑氣一毫不淨須要戒口不然一翻則腸臟內如有數十顆黑星如兩三隻蛇口在肚內咬而外蛇亦從風而至病人夜不得臥者亦用雄黃末蒜子菖蒲搗爛放熱水內洗身以御外蛇若在酒內中毒斷不可用酒罐煨藥犯之必翻愈翻則毒入愈深茶內中毒戒茶病痊後可吃病重時戒吃太飽戒生冷煎炒戒吃一切補藥戒雨淋濕身濕腳戒遠行戒忿怒照後中疳方調治戒葷鹽每餐用筍水一茶杯煮菜吃無力者常煎紫蘇薄荷二味作茶吃即是要藥或兼田內茨菰菜更妙有力者照後蘇荷湯四方加減治服其餘所食之物俱與後中疳篇同但看食物全不變如吃菜屙菜甚至吃飯則屙成顆飯則毒淨矣自此以後過三四日食物仍變出恭轉黃開吃葷鹽生冷酒醋煎炒無妨惟雞鴨宜戒二年羊鵝戒三年魚蝦螺蚌等腥物宜戒三四年蛇蛤終身不可食後中疳篇同此戒口又水內之物惟鱉可食無妨按初中一二日有吃馬肉而愈者又中蠱者不肯戒葷鹽則飲食中鹽宜少放葷少吃但戒雞鴨魚蝦等物可也浸筍水法凡筍皆可浸惟味苦而豔者尤妙筍用淨刀淨砧板切片放瓦壇內用午後水浸之不可犯葷犯嫩粳水將浸過筍不可多後添生筍則添生水又按初中蠱時有吃雄黃蒜子菖蒲同滾水服取吐再用紫蘇薄荷筍水同滾水服取瀉吐則上部毒淨瀉則下部毒淨自愈癲蠱受毒者肚必常叫如在臟外叫服解藥則在臟內叫壯俗埋蛇土中取菌毒人則人心昏頭眩笑罵無常或遇飲酒時藥毒輒發忿怒凶狠不可制者名曰癲蠱照後薄荷湯四方治之不用戒色下條同腫蠱受毒者肚必常叫腫蠱者壯俗謂之放腫腹大肚鳴大便結祕甚則一耳常塞一耳少厚治方見後蘇荷湯四方若病危甚時必戒鹽葷方效外用茨菰菜煎水洗之疳蠱疳蠱者匪人謂之放蛋又謂之放疳又謂之放蜂惟兩粵最多端午日取蜈蚣與各小蛇螞蟻蟬蛆蚓蜒蚰蟲頭髮等研末其人常刻一小五瘟神像在房內或箱內奉之常將毒藥置於神前若將蛇蟲等末放肉菜酒飯內與人吃亦有放在路上踏著即入人身則藥末黏於腸臟之上初吃輕則肚略脹肚微叫如粥滾狀如欲瀉狀而出恭仍結實頭帶黑色若受藥重則肚痛肚常鳴毒氣衝上或鼻內如有一二蟲或耳內如有一蟲臥則肚大鳴如蛇翻狀出恭漸少或一日一次或二日一次帶黑色出亦不多人必瘦黑人或靜坐頭髮內如有蟻咬以手搓之則無或夜臥靜聽面上如有蟲行如發纏如蚤咬或肉忽跳或身上如蟻咬或肛門如有小蟲小蛆三四隻動或身上如蚓行或口旁如有蜒蚰蟲黏上拭之則無迹可尋或忽然一手麻極一腳麻極或半手麻極或半腳麻極此皆藥毒到處使然或初受毒不知至三四日後或因洗身或因靜坐於外如有蜂飛來咬靜聽片刻身上如有數十蟻咬者搓之則氣散不見此必吃著人蠱藥不知者未有不疑為風症也但此蠱藥在內治不得法斷不瀉出其藥化一點染在臟腑之上則藥氣行於周身氣到處即如蟲咬非真蟲也氣降於肛門即如蟲動蛆動氣隨糞出非黑即藍亦非真蟲受蠱至七八月藥未化盡肚鳴不歇其氣衝上如蛇翻狀周身如蟲行蟻咬頂心發涼極如有蟲出入肉內如有蟲行蟻行小蜈蚣行而蠱家平日所毒死之冤鬼與其陰蛇陰蟲隨而陰附之病者如聞有飛集之聲而旁人不聞者一見風則更甚如蟲出入毛孔鼻門如有數十蟲飛來集其則下陰腳底如蟻咬者此皆藥氣行於周身非真蟲也至此時則手腳麻木周身如麻布通風腠理毛孔皆開或手指腳趾扯開或唇掀或身上肉跳又加以腫藥則一耳常滿一耳少焦紅厚又加以癲藥則頭眩心昏肚脹又加以悶香則面起紫泡凡中此蠱者務宜戒色若不知戒色小便一見白濁則穢毒引入膀胱變成五疳則疳蟲先生於下部此時則實有蟲矣往往以楊梅瘡概之不數月必死若止知戒色而不知藥方治服小便雖未見白濁終死於腫此皆得之蠱醫之言屢經驗者治法見後蘇荷湯四方一中疳蠱小便未見白濁勢雖極危果能持戒照方服藥無有不愈或玉莖旁濕爛外用槐花一兩白礬二錢膽草三錢煎水服之可也一中疳蠱小便未見白濁周身雖如蟻蚤行咬乃藥氣行走並無蟲也不必疑懼同室之人任其同臥同餐斷不傳染病者首宜戒色戒鹽葷戒煎炒糖食紅棗甘蔗一切招疳之物與一切飛禽水族鱗蟲腥物一中疳受毒甚者小便未見白濁宜食各物諸中蠱症皆同豆腐莧菜蒜紫蘇薄荷筍馬肉甚妙青菜白菜薑青瓜少吃黃瓜少吃白瓜少吃芋苗芋頭少吃細粉芥藍苦蕒木耳茨菰如味能瀉脾胃之毒亦能殺蛇解毒蠱消腫敗毒每餐同茶煮吃甚妙龍眼龍眼宜成顆剝吃龍眼肉恐有糖荔枝病重甚者果品惟此二味可吃筍水每餐放一茶杯同茶煮妙以上諸品中毒甚者皆可吃蓋毒甚則心肺肝脾皆受傷帶黑氣周身之血皆被毒藥染黑故宜靜養服藥先瀉大腸脾胃之黑氣後瀉肺肝心上之黑氣最後則周身血液瀝入肺肝心脾由肺肝心脾瀝下胃與大腸隨糞而出於是臟腑復生惡血瀉盡新血充滿自愈而薄荷紫蘇尤為要品二味皆殺蛇且表其毒氣出於外筍水亦殺蛇但筍水止及腸胃而蘇荷追其心肺肝脾要之三味皆不可缺一者若每餐菜用茶油煎開水放生紫蘇葉與薄荷葉及筍水一茶杯同各品菜煮吃即是要藥無生葉即取根梗煎水同筍水茶油煮菜吃亦妙若無蘇荷但用筍水煮菜亦驗一中疳蠱受毒未至極危及雖極危既服藥月餘病漸減凡辣椒芹菜少吃蘿蔔可吃菜葉不可吃金針桐蒿萵苣胡椒醋少吃韭菜羊肉等物皆可吃柑桔棠梨石榴蘿蔔葛薯李荸薺西瓜皆可吃一凡中疳受藥輕者或見風則面上如蟻行發癢以手搓之則散見火烘之則止者或隔數日靜聽肛門如有三四小蟲動或時而耳內如有一小蛆跳入時而鼻內如有一小蛆跳入或一手麻極一腳麻極一月一次一月幾次或肚時鳴而出恭結實或因吃發毒之物藥氣表於外面上如蝨行如發纏身上如蚤咬或以上諸病時有時無者俱不宜近色一疳蠱服解毒敗毒發毒之藥則大便祕結者蓋藥毒在身逢解藥則降下大腸毒甚者初出恭黑次出恭青次出恭藍或出恭有惡物如爛木耳者此乃身上之惡血隨腸臟瀝出也亦有服藥二三劑而瀉血兩三日者病愈更速蓋蠱藥在身其毒氣周流通身之血皆黑服藥之後舊血瀉盡新血自生不足畏也亦有服藥月餘毒氣大減時而糞黃時而糞轉黑或藍者蓋惡血不瀉則糞黃惡血一瀉則糞藍惡血一點未淨則出恭尚時帶藍色然受毒雖極重依方持戒服藥至四五個月後糞雖不能盡黃開葷近色無妨但鹽與煎炒尚宜戒之即不戒亦可惟雞鴨宜戒三年魚蝦等腥物宜戒五年然糞不至於純黃則耳內肛門尚有藥氣出如蟲行狀通身或頭面上或發內亦間有藥氣行動如小蟻咬式此斷不可疑懼乃身上之惡血未能淨盡故也但照後方服藥受毒極重者開葷鹽後其藥仍宜常服無力者常將紫蘇薄荷茨菰菜三味煨水當茶吃可也但看出恭食物全不變則不用服藥矣一服藥將愈之時一遇食飯通身發癢此乃飯氣到處新血與舊血戰也食畢氣靜如常一將愈之時凡所食之物出恭半不變或肛門常脹者此乃蠱毒將淨不可服補藥俟至食物全不變則毒盡以後出恭必黃而病愈矣一凡出恭如有蟲三五隻隨恭出視之不見者其糞不黑則藍否則必帶血絲此乃毒藥之氣非真蟲也不必疑懼一凡蠱毒既淨脾胃虛寒宜服補藥然既服補藥之後時而出恭轉藍此乃餘毒未淨即取紫蘇薄荷二味加筍水一茶杯沖水煎服可也不用戒葷鹽煎炒又受毒輕者出恭仍黃服解藥後或略帶灰白色耳一中疳蠱初服藥一二劑通身發紅紫塊者無妨再服藥十餘劑自消一酒醉後在酒中吃著蠱毒肺肝心脾受毒太重照方服藥月餘蠱毒既退酒毒忽發口舌熱爛則筍水與蘇荷等暫停半月宜用連翹生耆甘草生地柴胡槐花黃柏黃連元參石膏等藥用酒與水煎服俟火退後仍照原方調治一凡中疳蠱或因吃魚蝦腥物而毒發於身成癬者或毒發於腳成臁瘡者或毒發於下部濕熱潰爛者或毒發手背虎口手指間如疥瘡出汁經年不愈者或因吃馬肉發毒之品表其毒出於鼻門出汁者或時而腳麻時而肚痛時而腳痠者但果中其毒人多瘦黑身上必有如蚤咬蟲行者治方與前同不用戒色亦不用戒葷鹽一凡中疳或一二人或三五人同在一處受蠱毒或各在一處受蠱毒其一人受毒重者先發作一二月或先發半年諸人漸次方知者人或疑為傳染此決不可信豫蓋得之於蠱醫之言兼歷試之於中蠱之人者至一切方書之論蠱論病者皆不得其詳不足信也一中疳受毒極重者必吃著藥多次照方持戒服藥至兩個月可吃生冷醋煮物件至六個月雖出恭尚帶藍色開葷鹽煎炒近色無妨依舊照方加減服藥但看出恭食物皆不變則毒淨盡以後出恭必黃可以食鴨惟雞宜戒一年魚蝦螺蚌一切水內腥物戒三年蛇蛤終身不可食中毒輕者不用戒葷鹽煎炒但戒雞魚等物可也常將紫蘇薄荷二味沖筍水少許同水煎服久服自愈一凡中疳惟肺經受毒重不宜近色蓋肺金生腎水肺受毒重一近色則濁氣引入腎小便一變白濁即變五疳若肺經不受毒及服藥後肺經毒既淨雖身上肉尚跳尚有如蚤咬蟻咬無妨也按中毒輕者則肚不大鳴雖不吃藥不持戒雞魚亦無妨但時覺身上不快耳一疳蠱當受毒重時夜則身熱頭痛不得眠治方用雄黃末五錢同菖蒲蒜子搗爛放盆內用熱水衝入處處洗到亦能御之一疳蠱服藥後病必大減或時而病忽翻者無妨但照方服藥自然病退變疳論按中疳蠱不知持戒小便變白濁遂變五疳先從下部腐蝕生蟲後至口內腐爛生蟲而蠱毒在身一見風來如有群蟲飛集到此時則五臟受傷一切發毒之藥如紫蘇薄荷川芎薑蒜及馬肉羊肉桐蒿萵苣等菜斷不可食亦斷不可服補藥然亦難挽回矣但此症決不傳染人只恐疳汁滴上旁人手腳用紫蘇薄荷槐花苦參蒜子雄黃煎湯洗之無妨臨終時孝子家人皆近得如有汁滴上人手腳亦用前方洗之此皆得之蠱醫之言者中疳既變疳後藥方凡藥宜溫服不可冷服恐變別病生地槐花元參條參連翹百合白芍青蒿決明子澤瀉貝母茯苓花粉麥冬黃連梔子黃柏天冬膽草知母以上二十味俱可酌用槐連湯連翹條參生地元參貝母黃芩各五錢青蒿槐花各一兩黃連二錢水煎服因病加減不外以上二十味全在人神而明之皮破者用茨菰葉煎水洗按連翹條參治蠱之品槐花元參治疳之品其餘可以類推中疳既變疳後食品豆腐青菜莧菜冬瓜竹筍茨菰葛薯白菜苦蕒蓮藕細粉以上諸菜每餐用筍水一茶杯同菜煮食妙中疳既變疳後藥方一既變疳後五經皆有疳蟲照方持戒服藥每日一劑隨時斟酌加減不出上二十味之藥服至三個月後各經疳毒盡去惟腎經疳毒尚難驟愈再服藥持戒十個月必然全愈開葷鹽無妨或開葷戒鹽更妙仍舊時時服藥但看小便常清並無白濁則疳毒已盡肉內並無發芒時刺身上並無蟻咬則蠱毒亦將淨雖或時有蝨行蚤咬乃蠱毒之餘氣血液未盡淨故也此時可開吃煎炒燒肉近色無妨仍不時服藥俟至出恭食物全不變則蠱毒亦淨盡矣此時一切發毒之物如馬肉羊肉等開吃無妨雞鴨魚蝦螺蚌等戒三年一切飛禽水族鱗蟲仍戒數年終身戒食蛇蛤又按一變疳之後照方服藥病熱漸減即當嚴為戒口若持戒不嚴則病必翻愈翻則毒入愈深再治亦不甚見效矣慎之慎之中害神放害神亦蠱類也人中其藥則額必焦口腥神昏性躁目見邪鬼形耳聞邪鬼聲如犯大罪如見惡役持練鎖至如有刀兵健卒追趕常思自盡不知醫十無一生治方用柴胡湯加減服宜戒鹽葷俟毒淨自愈愈後不用戒魚蝦等物柴胡湯生地四錢白芍知母元參生耆連翹各三錢柴胡一兩百合五錢青蒿六錢天冬一錢水煎服又方夏枯草二兩紫背浮萍二錢水煎服一中害神先用灶心土同涼水攪澄清服取吐或用白礬細茶葉研末涼水攪和飲之取吐在茶酒內中毒者必吐出黑星數十顆在肉內中毒者必吐出肉一二塊此黑星與肉勿令狗吃用火燒之則反著放蠱之人死矣蛇蠱同此治法病人夜不得睡亦用蒜子菖蒲雄黃搗爛放熱水內洗身甚妙泥鰍蠱蠱家用竹葉放水中同蠱藥浸之即變泥鰍魚煮與客吃食畢肚內如有鰍魚三五隻行走時而衝上喉嚨時而走下肛門大便不通不知治必死治方用雄黃蒜子菖蒲同滾水生咬吃得瀉而愈愈後戒魚蝦等一二年石頭蠱聞蠱俗將石頭一塊放於路上結茅標一二個人行過則石跳上人身或入肚內初中肚內硬實至三四個月則會動肚鳴大便結祕人漸瘦弱時而此石飛入兩手時而此石走入兩腳奇怪之至不出三五年其人必死治方用雄黃蒜子菖蒲滾水生咬吃得吐與瀉自愈不用戒葷鹽愈後仍戒魚蝦等一二年蔑片蠱聞蠱俗將竹篾一片約四五寸放於路上人行過則此蔑跳上腳腿痛不可忍久則此蔑入於膝蓋腳漸小如鶴膝不出四五年其人必死治方用雄黃蒜子菖蒲生咬吃滾水送下得吐與瀉自愈後用雄黃末五錢蒜子一斤菖蒲一斤同搗爛放滾水內湯洗腳膝數次自愈不用戒口金蠶蠱此蠱金色其形如蠶能入人腹食人腸胃其糞亦能毒人養蠱之家蓄以害人用金銀等物將蠱送之路旁有人遇之蠱即隨往謂之嫁金蠶此蠱不畏水火刀槍最難滅除惟畏刺蝟中此蠱者食白礬味甜嚼黑豆不腥者即是又初吃藥後周身皮肉如有數百蟲行癢極難忍者亦是用石榴皮根煎湯飲之可以吐出或用刺蝟皮燒枯研末用水調服一二錢亦可刺蝟又名毛刺又名蝟鼠其頭嘴似鼠身有刺毛似壕豬箭又方常山四錢山豆根五錢蜈蚣一條烘乾黃柏五錢蜘蛛五隻烘乾穿山甲五錢白鴿血一隻全血烘乾以上七味同研末分三次泡滾酒服其毒自化毒重者服此方必愈不用戒口按以上五蠱未曾經驗即用蘇荷湯服之想亦可以取效中疳中蛇中腫中癲諸方蘇荷湯紫蘇南薄荷青蒿各一兩條參連翹各八錢槐花元參各七錢柴胡六錢川芎二錢生黃耆五錢按蛇蠱加白芷一兩三七二錢受毒重者用水煎服服藥之後病漸減者即是對症久服自愈大便祕結者加茨菰菜一兩更妙上方條參清肺火消腫脹連翹瀉心火敗毒紫蘇入肺心脾殺蛇發表薄荷入肺殺蠱槐花清肝火解毒生黃耆敗毒發表元參清腎火解毒川芎發表青蒿殺蠱解毒凡中蠱治方大要不外殺蛇解毒發毒敗毒之品按初中毒服藥得吐瀉者皆妙受毒者如不能戒鹽葷但戒雞鴨魚蝦蚌蛤等可也槐耆湯凡口乾火盛者此方主之槐花青蒿各一兩生地紫蘇南薄荷連翹各七錢生黃耆天冬元參花粉各五錢黃柏三錢頭痛加白芷三錢川芎二錢水煎服歸連湯當歸生白芍各三錢生地連翹百合紫蘇蘇薄荷各五錢川芎槐花黃連生甘草各二錢水煎服肚脹除甘草大便結祕加茨菰菜一兩參耆湯條參七錢生黃耆紫蘇南薄荷麥冬去心青蒿各五錢川芎四錢茯苓三錢百合生地各二錢連翹一錢水煎服以上四方皆治蠱要藥治疳蠱更效受毒者隨時加減服藥不外四方內藥品受毒極重者戒鹽葷女色服藥數月後開葷鹽近色無妨仍舊照方服藥一年或二三年至出恭食物全不變則毒淨盡矣體虛者分兩酌量減用蘇荷生地湯紫蘇南薄荷青蒿各一兩生地條參連翹各八錢槐花七錢柴胡六錢川芎二錢生黃耆五錢此中蛇中疳中腫中癲良方也與前四方同功大便結祕者重加槐花黃柏黃芩茨菰菜等味小便赤者加元參梔子茯苓肝火盛者加生白芍頭痛加白芷蛇蠱加白芷一兩三七二錢或帶熱嗽或咳血者紫蘇薄荷減半加百合麥冬生芍各一兩或時而傷風帶寒嗽者去條參連翹槐花青蒿生地加乾薑當歸半夏陳皮白芷或人弱帶痢者去條參連翹槐花柴胡生耆青蒿生地加百合白芍茯苓麥冬砂仁白朮乾薑總之神而明之存乎其人但蠱毒未淨不可服補藥與收斂藥或兼有別病則兼治之而紫蘇薄荷則斷不可去也又口舌熱爛實火炎上則去紫蘇薄荷重加槐花黃柏黃芩茯苓白芍元參澤瀉天冬石膏等味酒水煨服中疳一症有毒氣走在手者時而移上頭者或初服藥通身發紅片者有通身麻木肉大跳者有頭面上血忽開忽合者或腦內有聲者治方同蛇蠱一症有在兩脅皮內痛忽移上兩肩下皮內痛永不出汗怕寒服藥後有有聲走入肚內者有在肚內痛會動會移者有在心上脹口涎出痛而不移大便常下蛔蟲者或遍身如蝨走竄臥則手腳跳起者治方同老人中蛇蠱方百合四錢蘇子南薄荷當歸茯苓白芷白芍各三錢麥冬連翹各二錢水煎服又方南薄荷蘇子麥冬白芷當歸各三錢三七生首烏各二錢連翹四錢廣陳皮木香各五分百合五錢水煎服老人血氣既衰不可全用峻利之品與大寒涼之藥故斟酌平和之劑集成兩方但照方服藥之後內毒不安仍然在內走竄而靜聽其毒漸漸墜下不能升上即是對症服藥不必太急急則內毒跳起病人不安但當戒食雞鴨飛禽魚蝦螺蚌蛇蛤水族穿山甲鱗蟲等物久服藥或吐出肉一二塊或吐出黑星如豆大十餘顆者或瀉下蛔蟲數條者或瀉下黃泥水者瀉淨自愈愈後仍戒食雞鴨魚蝦等物數年終身戒食蛇蛤一服藥時凡一切發毒之物並豬牛馬羊肉及果品煎炒皆可食惟糖棗甘蔗宜戒以上見治蠱新方通治蠱毒梅師士云凡中蠱毒或下血如鵝肝或吐血或心腹切痛如有物咬不即治之食人五臟即死欲知是蠱但令病人吐水沉者是浮者非也用舊鼓皮燒灰酒服一二錢須臾自呼蠱主姓名又方舊鼓皮寬五寸長一尺薔薇根五寸如拇指大水一升酒三升煮二升服之當下又方斑蝥四隻去翅足炙熟桃樹皮五月初五日採取去黑皮陰乾紅芽大戟去骨各為末此二味比斑蝥分兩各加一倍共為丸如棗核大用米湯送下必吐出蠱一服不好十日再服必愈此人祖傳祕方神效無比斑蝥有毒病愈後用解斑蝥毒方見解救諸毒門服之又方毒在上者用升麻煎湯吐之在腹者用鬱金煎湯下之或合二味服之不吐則瀉活人甚捷又方一覺腹中不快即以生黃豆食之入口不聞腥氣者此中蠱也急以升麻濃煎湯飲以手摳吐即愈極效如食豆而腥者即非蠱也又方蚯蚓十四條好醋泡至蚓死取醋汁服如肝爛已死者皆可治此葛仙方也又方馬齒莧又名瓜子菜搗汁一升飲渣敷痛處日飲四五次甚效又方先取炙甘草一寸嚼之咽汁若中蠱毒隨即吐出仍以炙甘草三兩生薑四兩水煎日三服若含甘草而不吐者則非蠱毒此蓋蠱家祕傳也又方凡中蠱毒無論年代遠近但煮一雞蛋插銀器於內含入口中約一時久取出蛋銀俱黑者即中蠱也方用五倍子二兩硫黃末一錢甘草三寸一半微炒一半生用丁香木香麝香各一分輕粉三分糯米二十粒入小砂罐內煎服木香忌火磨水兌服服後用高枕平正仰臥腹中如有物衝心不必驚動預備瓦鉢以便嘔吐吐出如魚鰾之類乃是惡物吐罷飲茶一杯瀉亦無妨少時服食白粥忌生冷油膩酢醬十日後再服解毒丸二三粒即愈闢蠱毒法凡人家房屋潔淨並無灰塵蛛網者即繫有蠱之家勿與往來以免受害又方凡食茶水菜飯等物將要食時用筷子向杯碗上敲動並向主人問云食內果有蠱毒否一經問破則可免害又方將食時自帶生大蒜頭食之有蠱必當場吐出不吐則死主人畏纍則不敢下蠱又方大荸薺不拘多少切片曬乾為末每早空心白滾湯調下二錢入蠱家無害此神方也又方凡不飲酒之人受蠱輕而易治飲酒者受蠱重而難治蠱毒多在煙瘴邊地凡有煙瘴之處又宜飲酒以闢瘴氣是亦不能不飲總之在家多飲出外少飲為妙煙瘴解煙瘴毒用瓷瓦有鋒者或刺額上或刺眉叢或刺兩手膊出血一升即解血紅而多者輕血紫而少者重又方白朮陳皮茯苓半夏梔仁山楂神麯各一錢連翹前胡蒼朮各七分生甘草四分生薑引煎服數劑神效凡客遊不服水土者亦效又方生熟大蒜各七片共食之少頃腹鳴或吐血或大便即愈闢煙瘴法凡云貴兩廣等省地方忽有一股香味撲鼻即是瘴氣斷不可聞以免生病又方凡有瘴氣之處飲食不可過飽每日須飲酒數杯不飲酒者亦強勉飲之可闢瘴氣有三人早行山霧中一死一病一安然無恙後乃知死者過於食飽病者系空腹無恙者飲酒也
