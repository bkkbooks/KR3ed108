  - {type: 'tls:div-start', offset: 496, content: '', id: KR3ed108_jc_016-d22d3, level: 2, head_text: 諸汗}
  - {type: 'tls:head', offset: 496, content: '', id: KR3ed108_jc_016-d22.d3.h1s1}
  - {type: 'tls:div-start', offset: 498, content: '', id: KR3ed108_jc_016-d22.d3d2, level: 3, head_text: 止諸汗法}
  - {type: 'tls:head', offset: 498, content: '', id: KR3ed108_jc_016-d22.d3.d2.h1s1}
  - {type: 'tls:div-end', offset: 550, content: '', id: KR3ed108_jc_016-d22.d3d2}
  - {type: 'tls:div-start', offset: 550, content: '', id: KR3ed108_jc_016-d22.d3d3, level: 3, head_text: 自汗}
  - {type: 'tls:head', offset: 550, content: '', id: KR3ed108_jc_016-d22.d3.d3.h1s1}
  - {type: 'tls:div-end', offset: 634, content: '', id: KR3ed108_jc_016-d22.d3d3}
  - {type: 'tls:div-start', offset: 634, content: '', id: KR3ed108_jc_016-d22.d3d4, level: 3, head_text: 盜汗}
  - {type: 'tls:head', offset: 634, content: '', id: KR3ed108_jc_016-d22.d3.d4.h1s1}
  - {type: 'tls:div-end', offset: 818, content: '', id: KR3ed108_jc_016-d22.d3d4}
  - {type: 'tls:div-start', offset: 818, content: '', id: KR3ed108_jc_016-d22.d3d5, level: 3, head_text: 身出黃汗}
  - {type: 'tls:head', offset: 818, content: '', id: KR3ed108_jc_016-d22.d3.d5.h1s1}
  - {type: 'tls:div-end', offset: 838, content: '', id: KR3ed108_jc_016-d22.d3d5}
  - {type: 'tls:div-end', offset: 838, content: '', id: KR3ed108_jc_016-d22d3}
  - {type: 'tls:div-start', offset: 838, content: '', id: KR3ed108_jc_016-d22d4, level: 2, head_text: 遍身搔癢}
  - {type: 'tls:head', offset: 838, content: '', id: KR3ed108_jc_016-d22.d4.h1s1}
  - {type: 'tls:div-start', offset: 842, content: '', id: KR3ed108_jc_016-d22.d4d2, level: 3, head_text: 身癢難忍}
  - {type: 'tls:head', offset: 842, content: '', id: KR3ed108_jc_016-d22.d4.d2.h1s1}
  - {type: 'tls:div-end', offset: 1541, content: '', id: KR3ed108_jc_016-d22.d4d2}
  - {type: 'tls:div-start', offset: 1541, content: '', id: KR3ed108_jc_016-d22.d4d3, level: 3, head_text: 風濕疹子}
  - {type: 'tls:head', offset: 1541, content: '', id: KR3ed108_jc_016-d22.d4.d3.h1s1}
  - {type: 'tls:div-end', offset: 1726, content: '', id: KR3ed108_jc_016-d22.d4d3}
  - {type: 'tls:div-start', offset: 1726, content: '', id: KR3ed108_jc_016-d22.d4d4, level: 3, head_text: 風熱疹子作癢心下迷悶}
  - {type: 'tls:head', offset: 1726, content: '', id: KR3ed108_jc_016-d22.d4.d4.h1s1}
  - {type: 'tls:div-end', offset: 1752, content: '', id: KR3ed108_jc_016-d22.d4d4}
  - {type: 'tls:div-start', offset: 1752, content: '', id: KR3ed108_jc_016-d22.d4d5, level: 3, head_text: 風熱疹子作癢成瘡}
  - {type: 'tls:head', offset: 1752, content: '', id: KR3ed108_jc_016-d22.d4.d5.h1s1}
  - {type: 'tls:div-end', offset: 1779, content: '', id: KR3ed108_jc_016-d22.d4d5}
  - {type: 'tls:div-start', offset: 1779, content: '', id: KR3ed108_jc_016-d22.d4d6, level: 3, head_text: 遍身瘙癢抓破見血}
  - {type: 'tls:head', offset: 1779, content: '', id: KR3ed108_jc_016-d22.d4.d6.h1s1}
  - {type: 'tls:div-end', offset: 1904, content: '', id: KR3ed108_jc_016-d22.d4d6}
  - {type: 'tls:div-start', offset: 1904, content: '', id: KR3ed108_jc_016-d22.d4d7, level: 3, head_text: 痱子癢痛}
  - {type: 'tls:head', offset: 1904, content: '', id: KR3ed108_jc_016-d22.d4.d7.h1s1}
  - {type: 'tls:div-end', offset: 1927, content: '', id: KR3ed108_jc_016-d22.d4d7}
  - {type: 'tls:div-start', offset: 1927, content: '', id: KR3ed108_jc_016-d22.d4d8, level: 3, head_text: 痱子作癢抓之又痛難於坐臥}
  - {type: 'tls:head', offset: 1927, content: '', id: KR3ed108_jc_016-d22.d4.d8.h1s1}
  - {type: 'tls:div-end', offset: 1987, content: '', id: KR3ed108_jc_016-d22.d4d8}
  - {type: 'tls:div-end', offset: 1987, content: '', id: KR3ed108_jc_016-d22d4}
  - {type: 'tls:div-start', offset: 1987, content: '', id: KR3ed108_jc_016-d22d5, level: 2, head_text: 邪怪}
  - {type: 'tls:head', offset: 1987, content: '', id: KR3ed108_jc_016-d22.d5.h1s1}
  - {type: 'tls:div-start', offset: 1989, content: '', id: KR3ed108_jc_016-d22.d5d2, level: 3, head_text: 男婦病邪與邪物交獨言獨笑悲哭恍惚}
  - {type: 'tls:head', offset: 1989, content: '', id: KR3ed108_jc_016-d22.d5.d2.h1s1}
  - {type: 'tls:div-end', offset: 2109, content: '', id: KR3ed108_jc_016-d22.d5d2}
  - {type: 'tls:div-start', offset: 2109, content: '', id: KR3ed108_jc_016-d22.d5d3, level: 3, head_text: 驅狐怪法}
  - {type: 'tls:head', offset: 2109, content: '', id: KR3ed108_jc_016-d22.d5.d3.h1s1}
  - {type: 'tls:div-end', offset: 2248, content: '', id: KR3ed108_jc_016-d22.d5d3}
  - {type: 'tls:div-start', offset: 2248, content: '', id: KR3ed108_jc_016-d22.d5d4, level: 3, head_text: 灸鬼法}
  - {type: 'tls:head', offset: 2248, content: '', id: KR3ed108_jc_016-d22.d5.d4.h1s1}
  - {type: 'tls:div-end', offset: 2349, content: '', id: KR3ed108_jc_016-d22.d5d4}
  - {type: 'tls:div-start', offset: 2349, content: '', id: KR3ed108_jc_016-d22.d5d5, level: 3, head_text: 制邪鬼法}
  - {type: 'tls:head', offset: 2349, content: '', id: KR3ed108_jc_016-d22.d5.d5.h1s1}
  - {type: 'tls:div-end', offset: 2406, content: '', id: KR3ed108_jc_016-d22.d5d5}
  - {type: 'tls:div-start', offset: 2406, content: '', id: KR3ed108_jc_016-d22.d5d6, level: 3, head_text: 闢鬼火法}
  - {type: 'tls:head', offset: 2406, content: '', id: KR3ed108_jc_016-d22.d5.d6.h1s1}
  - {type: 'tls:div-end', offset: 2437, content: '', id: KR3ed108_jc_016-d22.d5d6}
  - {type: 'tls:div-start', offset: 2437, content: '', id: KR3ed108_jc_016-d22.d5d7, level: 3, head_text: 鬼箭傷}
  - {type: 'tls:head', offset: 2437, content: '', id: KR3ed108_jc_016-d22.d5.d7.h1s1}
  - {type: 'tls:div-end', offset: 2706, content: '', id: KR3ed108_jc_016-d22.d5d7}
  - {type: 'tls:div-start', offset: 2706, content: '', id: KR3ed108_jc_016-d22.d5d8, level: 3, head_text: 增補去邪怪法}
  - {type: 'tls:head', offset: 2706, content: '', id: KR3ed108_jc_016-d22.d5.d8.h1s1}
  - {type: 'tls:div-end', offset: 2884, content: '', id: KR3ed108_jc_016-d22.d5d8}
  - {type: 'tls:div-end', offset: 2884, content: '', id: KR3ed108_jc_016-d22d5}
  - {type: 'tls:div-start', offset: 2884, content: '', id: KR3ed108_jc_016-d22d6, level: 2, head_text: 奇病}
  - {type: 'tls:head', offset: 2884, content: '', id: KR3ed108_jc_016-d22.d6.h1s1}
  - {type: 'tls:div-start', offset: 2886, content: '', id: KR3ed108_jc_016-d22.d6d2, level: 3, head_text: 頭頂生瘡}
  - {type: 'tls:head', offset: 2886, content: '', id: KR3ed108_jc_016-d22.d6.d2.h1s1}
  - {type: 'tls:div-end', offset: 2902, content: '', id: KR3ed108_jc_016-d22.d6d2}
  - {type: 'tls:div-start', offset: 2902, content: '', id: KR3ed108_jc_016-d22.d6d3, level: 3, head_text: 連皮剝脫至足}
  - {type: 'tls:head', offset: 2902, content: '', id: KR3ed108_jc_016-d22.d6.d3.h1s1}
  - {type: 'tls:div-end', offset: 2930, content: '', id: KR3ed108_jc_016-d22.d6d3}
  - {type: 'tls:div-start', offset: 2930, content: '', id: KR3ed108_jc_016-d22.d6d4, level: 3, head_text: 眉毛搖動晝夜不眠呼喚不應飲食如常}
  - {type: 'tls:head', offset: 2930, content: '', id: KR3ed108_jc_016-d22.d6.d4.h1s1}
  - {type: 'tls:div-end', offset: 2957, content: '', id: KR3ed108_jc_016-d22.d6d4}
  - {type: 'tls:div-start', offset: 2957, content: '', id: KR3ed108_jc_016-d22.d6d5, level: 3, head_text: 頭面發熱身有光色}
  - {type: 'tls:head', offset: 2957, content: '', id: KR3ed108_jc_016-d22.d6.d5.h1s1}
  - {type: 'tls:div-end', offset: 2979, content: '', id: KR3ed108_jc_016-d22.d6d5}
  - {type: 'tls:div-start', offset: 2979, content: '', id: KR3ed108_jc_016-d22.d6d6, level: 3, head_text: 面腫如斗眼中見人只三寸長}
  - {type: 'tls:head', offset: 2979, content: '', id: KR3ed108_jc_016-d22.d6.d6.h1s1}
  - {type: 'tls:div-end', offset: 3043, content: '', id: KR3ed108_jc_016-d22.d6d6}
  - {type: 'tls:div-start', offset: 3043, content: '', id: KR3ed108_jc_016-d22.d6d7, level: 3, head_text: 見一物如有兩物}
  - {type: 'tls:head', offset: 3043, content: '', id: KR3ed108_jc_016-d22.d6.d7.h1s1}
  - {type: 'tls:div-end', offset: 3068, content: '', id: KR3ed108_jc_016-d22.d6d7}
  - {type: 'tls:div-start', offset: 3068, content: '', id: KR3ed108_jc_016-d22.d6d8, level: 3, head_text: 見一物如兩物或三四物又見桌椅等物}
  - {type: 'tls:head', offset: 3068, content: '', id: KR3ed108_jc_016-d22.d6.d8.h1s1}
  - {type: 'tls:div-end', offset: 3162, content: '', id: KR3ed108_jc_016-d22.d6d8}
  - {type: 'tls:div-start', offset: 3162, content: '', id: KR3ed108_jc_016-d22.d6d9, level: 3, head_text: 醉後嘔吐視物顛倒}
  - {type: 'tls:head', offset: 3162, content: '', id: KR3ed108_jc_016-d22.d6.d9.h1s1}
  - {type: 'tls:div-end', offset: 3181, content: '', id: KR3ed108_jc_016-d22.d6d9}
  - {type: 'tls:div-start', offset: 3181, content: '', id: KR3ed108_jc_016-d22.d6d10, level: 3, head_text: 眼見諸般飛禽走獸以手摸捉則無}
  - {type: 'tls:head', offset: 3181, content: '', id: KR3ed108_jc_016-d22.d6.d10.h1s1}
  - {type: 'tls:div-end', offset: 3244, content: '', id: KR3ed108_jc_016-d22.d6d10}
  - {type: 'tls:div-start', offset: 3244, content: '', id: KR3ed108_jc_016-d22.d6d11, level: 3, head_text: 眼見五色之物忽又變成美女}
  - {type: 'tls:head', offset: 3244, content: '', id: KR3ed108_jc_016-d22.d6.d11.h1s1}
  - {type: 'tls:div-end', offset: 3273, content: '', id: KR3ed108_jc_016-d22.d6d11}
  - {type: 'tls:div-start', offset: 3273, content: '', id: KR3ed108_jc_016-d22.d6d12, level: 3, head_text: 愛食豬肉或生油生菜}
  - {type: 'tls:head', offset: 3273, content: '', id: KR3ed108_jc_016-d22.d6.d12.h1s1}
  - {type: 'tls:div-end', offset: 3287, content: '', id: KR3ed108_jc_016-d22.d6d12}
  - {type: 'tls:div-start', offset: 3287, content: '', id: KR3ed108_jc_016-d22.d6d13, level: 3, head_text: 口鼻流出臭水以碗盛之內有魚蝦走動}
  - {type: 'tls:head', offset: 3287, content: '', id: KR3ed108_jc_016-d22.d6.d13.h1s1}
  - {type: 'tls:div-end', offset: 3303, content: '', id: KR3ed108_jc_016-d22.d6d13}
  - {type: 'tls:div-start', offset: 3303, content: '', id: KR3ed108_jc_016-d22.d6d14, level: 3, head_text: 口鼻中氣常出不散凝如黑蓋過十日後}
  - {type: 'tls:head', offset: 3303, content: '', id: KR3ed108_jc_016-d22.d6.d14.h1s1}
  - {type: 'tls:div-end', offset: 3346, content: '', id: KR3ed108_jc_016-d22.d6d14}
  - {type: 'tls:div-start', offset: 3346, content: '', id: KR3ed108_jc_016-d22.d6d15, level: 3, head_text: 身發寒熱四肢堅硬如石敲之作鐘磬聲}
  - {type: 'tls:head', offset: 3346, content: '', id: KR3ed108_jc_016-d22.d6.d15.h1s1}
  - {type: 'tls:div-end', offset: 3384, content: '', id: KR3ed108_jc_016-d22.d6d15}
  - {type: 'tls:div-start', offset: 3384, content: '', id: KR3ed108_jc_016-d22.d6d16, level: 3, head_text: 周身皮肉內滾滾如波浪聲癢不可忍}
  - {type: 'tls:head', offset: 3384, content: '', id: KR3ed108_jc_016-d22.d6.d16.h1s1}
  - {type: 'tls:div-end', offset: 3399, content: '', id: KR3ed108_jc_016-d22.d6d16}
  - {type: 'tls:div-start', offset: 3399, content: '', id: KR3ed108_jc_016-d22.d6d17, level: 3, head_text: 面如蟲行不時燒熱}
  - {type: 'tls:head', offset: 3399, content: '', id: KR3ed108_jc_016-d22.d6.d17.h1s1}
  - {type: 'tls:div-end', offset: 3424, content: '', id: KR3ed108_jc_016-d22.d6d17}
  - {type: 'tls:div-start', offset: 3424, content: '', id: KR3ed108_jc_016-d22.d6d18, level: 3, head_text: 身如蟲行癢不可忍}
  - {type: 'tls:head', offset: 3424, content: '', id: KR3ed108_jc_016-d22.d6.d18.h1s1}
  - {type: 'tls:div-end', offset: 3445, content: '', id: KR3ed108_jc_016-d22.d6d18}
  - {type: 'tls:div-start', offset: 3445, content: '', id: KR3ed108_jc_016-d22.d6d19, level: 3, head_text: 身如蛇蟲行走作咬或腹中蛇蟲鳴動}
  - {type: 'tls:head', offset: 3445, content: '', id: KR3ed108_jc_016-d22.d6.d19.h1s1}
  - {type: 'tls:div-end', offset: 3475, content: '', id: KR3ed108_jc_016-d22.d6d19}
  - {type: 'tls:div-start', offset: 3475, content: '', id: KR3ed108_jc_016-d22.d6d20, level: 3, head_text: 皮膚中如有蟹行走有聲如小兒啼哭}
  - {type: 'tls:head', offset: 3475, content: '', id: KR3ed108_jc_016-d22.d6.d20.h1s1}
  - {type: 'tls:div-end', offset: 3538, content: '', id: KR3ed108_jc_016-d22.d6d20}
  - {type: 'tls:div-start', offset: 3538, content: '', id: KR3ed108_jc_016-d22.d6d21, level: 3, head_text: 皮膚手足之間如蚯蚓鳴}
  - {type: 'tls:head', offset: 3538, content: '', id: KR3ed108_jc_016-d22.d6.d21.h1s1}
  - {type: 'tls:div-end', offset: 3642, content: '', id: KR3ed108_jc_016-d22.d6d21}
  - {type: 'tls:div-start', offset: 3642, content: '', id: KR3ed108_jc_016-d22.d6d22, level: 3, head_text: 周身發斑眼赤鼻脹氣喘毛髮硬如銅鐵}
  - {type: 'tls:head', offset: 3642, content: '', id: KR3ed108_jc_016-d22.d6.d22.h1s1}
  - {type: 'tls:div-end', offset: 3711, content: '', id: KR3ed108_jc_016-d22.d6d22}
  - {type: 'tls:div-start', offset: 3711, content: '', id: KR3ed108_jc_016-d22.d6d23, level: 3, head_text: 身上忽現蛇形痛不可忍}
  - {type: 'tls:head', offset: 3711, content: '', id: KR3ed108_jc_016-d22.d6.d23.h1s1}
  - {type: 'tls:div-end', offset: 3791, content: '', id: KR3ed108_jc_016-d22.d6d23}
  - {type: 'tls:div-start', offset: 3791, content: '', id: KR3ed108_jc_016-d22.d6d24, level: 3, head_text: 遍身忽然肉出如錐癢而且痛不能飲食}
  - {type: 'tls:head', offset: 3791, content: '', id: KR3ed108_jc_016-d22.d6.d24.h1s1}
  - {type: 'tls:div-end', offset: 3839, content: '', id: KR3ed108_jc_016-d22.d6d24}
  - {type: 'tls:div-start', offset: 3839, content: '', id: KR3ed108_jc_016-d22.d6d25, level: 3, head_text: 遍身生燎泡如甘棠梨破則水流}
  - {type: 'tls:head', offset: 3839, content: '', id: KR3ed108_jc_016-d22.d6.d25.h1s1}
  - {type: 'tls:div-end', offset: 3888, content: '', id: KR3ed108_jc_016-d22.d6d25}
  - {type: 'tls:div-start', offset: 3888, content: '', id: KR3ed108_jc_016-d22.d6d26, level: 3, head_text: 自頭麻至心窩而死或自足心麻至膝蓋而死}
  - {type: 'tls:head', offset: 3888, content: '', id: KR3ed108_jc_016-d22.d6.d26.h1s1}
  - {type: 'tls:div-end', offset: 3996, content: '', id: KR3ed108_jc_016-d22.d6d26}
  - {type: 'tls:div-start', offset: 3996, content: '', id: KR3ed108_jc_016-d22.d6d27, level: 3, head_text: 臨臥遍身蝨出血肉俱壞漸生漸多}
  - {type: 'tls:head', offset: 3996, content: '', id: KR3ed108_jc_016-d22.d6.d27.h1s1}
  - {type: 'tls:div-end', offset: 4033, content: '', id: KR3ed108_jc_016-d22.d6d27}
  - {type: 'tls:div-start', offset: 4033, content: '', id: KR3ed108_jc_016-d22.d6d28, level: 3, head_text: 忽有人影與己隨行坐臥久則成形與己無異}
  - {type: 'tls:head', offset: 4033, content: '', id: KR3ed108_jc_016-d22.d6.d28.h1s1}
  - {type: 'tls:div-end', offset: 4105, content: '', id: KR3ed108_jc_016-d22.d6d28}
  - {type: 'tls:div-start', offset: 4105, content: '', id: KR3ed108_jc_016-d22.d6d29, level: 3, head_text: 人前不食背地偷食見人則避面色黃瘦}
  - {type: 'tls:head', offset: 4105, content: '', id: KR3ed108_jc_016-d22.d6.d29.h1s1}
  - {type: 'tls:div-end', offset: 4176, content: '', id: KR3ed108_jc_016-d22.d6d29}
  - {type: 'tls:div-start', offset: 4176, content: '', id: KR3ed108_jc_016-d22.d6d30, level: 3, head_text: 臥床四肢不能舉動口說大話並喜說食物}
  - {type: 'tls:head', offset: 4176, content: '', id: KR3ed108_jc_016-d22.d6.d30.h1s1}
  - {type: 'tls:div-end', offset: 4256, content: '', id: KR3ed108_jc_016-d22.d6d30}
  - {type: 'tls:div-start', offset: 4256, content: '', id: KR3ed108_jc_016-d22.d6d31, level: 3, head_text: 瘡癤內有雀鳥出者有亂髮出者}
  - {type: 'tls:head', offset: 4256, content: '', id: KR3ed108_jc_016-d22.d6.d31.h1s1}
  - {type: 'tls:div-end', offset: 4269, content: '', id: KR3ed108_jc_016-d22.d6d31}
  - {type: 'tls:div-start', offset: 4269, content: '', id: KR3ed108_jc_016-d22.d6d32, level: 3, head_text: 人生尾巴}
  - {type: 'tls:head', offset: 4269, content: '', id: KR3ed108_jc_016-d22.d6.d32.h1s1}
