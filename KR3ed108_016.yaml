body:
  text: 卷十六諸血七竅出血凡耳鼻目口一齊出血名曰上虛下竭死在須臾不及用藥先將冷水當面噴幾口或婦女急分開頭髮以水噴之男子無發可分用粗紙數層冷醋浸透搭在囟門其血即止或用鼻部鼻血第一方立止如神隨用補血湯灸黃耆一兩當歸五錢煎濃湯加沉香五分磨汁童便一盞兌服血自歸經再加調理多有全活口鼻出血不止吐血見勞傷吐血門用多年尿壺火上烘熱向鼻熏之立止如神屢試屢驗或照鼻部鼻血第一方治之更為神妙又方韭菜搗自然汁半碗飲之立見功效又方生地麥冬各一兩煎服亦效又方因酒色過多口鼻出血如泉湧者荊芥燒枯研末陳皮煎湯調服二錢即愈耳鼻流血不止照上口鼻出血各方治之臍中出血並治齒上出血俱用六味湯加骨碎補一錢飲之即愈蓋臍齒亦俱是腎經之位而出血俱是腎火之外越也六味湯滋其水則火自息焰矣骨碎補專能止竅補骨中之漏者也故加入相宜或用鼻部鼻血第一方亦效毛孔出血不止瘦豬肉一厚片貼之即止如神豬皮亦可又方煮酒罈上紙扯極細碎如楊花樣攤在出血處按之即止又方草紙燒灰候冷敷之亦止又方穿山甲炒研細末敷之用布扎住即止隨服補血湯見前數劑全安有人手背毛孔出血數日不止又一人腎囊上毛孔流血數日均用此方而愈效若仙丹凡油簍破漏小孔油出不止者用此亦極效驗毛孔節次出血不出則皮脹如鼓諸汗止諸汗法健豬肚一個洗淨以糯米裝滿用線縫口放砂鍋內水煮極爛將肚與湯食盡糯米曬乾為末每用小盞空心米湯調服極效自汗常出者為自汗鬱金研末臥時蜜調塗於兩乳即止又方何首烏末口水調封臍中用布捆定即止又方五倍子枯礬等分為末口水調勻填臍中用布縛定立效又方舊蒲扇燒灰和粉撲之或用酒調服一錢極效盜汗睡中出者為盜汗五倍子研末用人乳調蒸熟丸如龍眼大每用一丸貼臍上外以核桃殼蓋之用布縛定一周時取下再換貼至十日後即止又方帶露桑葉瓦上焙乾為末空心米湯調服二錢數次全愈有人睡後汗出遍身衣被皆透二十年不愈後照此方服至數日斷根真神方也又方雞蛋五個將殼輕輕敲破勿破內之白皮浸童便內一晝夜用冷水漸漸細火煮熟食之數次即愈又方蓮子真浙江黑棗各七個浮小麥馬料豆各一合水煎服數次全愈其效如神身出黃汗此濕熱也將變黃疸照黃疸門各方治之遍身搔癢身癢難忍或癢如蟲行抓破見血或風熱疹子成顆成片後列各方皆治消風散荊芥防風當歸生地苦參蒼朮炒蟬蛻胡麻仁牛子炒研石膏煅知母各一錢甘草木通各五分水煎服癢極者宜服此藥以消風熱即愈極重者外用摩風膏見癰毒諸方搽之極為神效體虛者前藥斷不可服只用摩風膏外敷可也又方白花益母草熬濃湯服並洗浴數次神效血虛者忌服只須洗浴可也又方胡麻仁威靈仙何首烏苦參菖蒲各三錢甘草二錢共研為末每服三錢淡酒送下此武當山碑刻神方也又方荊芥防風各一錢赤芍銀花小生地各八分木通五分甘草三分水煎服極效此葉天士先生方也又方蒼耳子煎水洗極效或用生車前子研末水調搽或蜜調搽俱妙又方好熟白蜜酒調服並用蜜調熱水搽之又方鹽二斗水一石熬至一半候溫洗浴三五次能散一切風氣又方香附草又名莎草園地階墀隨處皆有其草只有兩莖高不過三四寸根名香附子用苗不用根取苗二十斤少則不效切細煎濃湯乘熱熏洗數次汗出癢止常用即可斷根其效如神一切風熱發癢皆治又方赭石研末酒調一錢空心服甚效又用後南瓜方治之亦極效驗一人夜靜面上皮內癢不可忍諸藥不效用滾水燙洗略住後用好醋煮滾加硫黃和入時時擦之而愈又方一人田間收稻忽然遍身癢入骨髓用食鹽九錢以滾開水分作三碗泡之每飲一碗以手抵住舌根使自嘔吐三飲三吐而愈又方一人渾身上下四肢俱生風熱疹子成顆成片耳孔鼻孔俱已生滿心中發熱悶燥頭眼俱腫以滾水燙之自在一時少刻又癢百藥不效後以燈火燒背脊兩旁共六下心口一下乳下二下軟脅眼左右二下肩尖左右二下手彎上左右二下脈門左右二下虎口左右二下小指節縫中左右二下圓膝下外左右二下腿肚之下左右二下大腳趾丫左右二下天庭中太陽共五下隨用糯米擂漿調水服一菜碗精神松爽並用糯米漿以鵝翎蘸掃渾身二三次方愈又一小兒身癢用生薑搗爛布包擦之而愈風濕疹子疹乃熱也不可用人參白朮當理血而不宜散血疹初起必發熱口渴狀如紅雲一片與斑相同但斑無頭粒而疹有頭粒如蟲咬之狀用元參三錢當歸二錢升麻五分甘草五分葛根一錢水煎服心火加黃連三分肝火加梔子六分肺火加黃芩麥冬各一錢又方生地牛子丹參各三錢荊芥防風木通各錢半石斛連翹各二錢紫草絨蟬蛻鬱金犀角各一錢西河柳葉五錢又名觀音柳水煎服此葉天士先生方也屢試如神西河柳能達皮膚非此不效體虛者少服風熱疹子作癢心下迷悶巴豆五十粒去皮煮濃汁以布蘸抹即愈風熱疹子作癢成瘡蠶砂一升水五斗煮取一斗二升去滓洗浴避風遍身瘙癢抓破見血名血風瘡老南瓜北人呼為倭瓜去皮煮爛布包擠去水厚厚敷之三日收功又方內服消風散見前外用黃連膏風鼻部鼻內生癰內或摩風膏見癰毒諸方門敷之極為神效又方楓子肉蛇床子各五錢枯礬點銅錫各一錢共為末加水銀二錢和生豬油捶融搽之並治坐板瘡及癬瘡蟲瘡其效甚速痱子癢痛滑石五錢緑豆四兩研成粉微炒和勻以棉撲之痱子作癢抓之又痛難於坐臥苦參四兩大菖蒲二兩河水五瓢同煎數沸添水二瓢蓋片時臨洗和入雄豬膽汁四五枚洗之避風甚效或照各前方治之邪怪男婦病邪與邪物交獨言獨笑悲哭恍惚明雄黃研細蒼朮研細各一兩松香二兩先將松香溶化以虎爪和各藥末為丸如彈子大夜燒火籠中令病人坐其上以被矇住露頭在外扶住熏之連熏三夜邪物自去愈後必然泄瀉多服平胃散見內外備用諸方自愈內有蒼朮最能避邪此仙方也終身忌食螃蟹驅狐怪法凡狐怪作祟擾人用硃筆寫關聖大帝在此六字貼之如仍不去即誠心向關聖廟拜禱必去或立九天應元雷神普化天尊牌位供奉中堂誠心拜禱或赴雷神廟禱告一切邪怪皆退緣關帝雷神能制邪魔誠求必應又方凡狐迷男女白日用口吸精夜間交媾如人用真桐油搽陰處自去或用珠蘭根搽之則獸自死即將獸肉曬乾為末服之更妙灸鬼法治一切邪祟癲狂胡言亂語躍牆上屋尋死等症以病人兩手大拇指用線齊頭捆攏用艾絨於兩指縫中離指甲角一分半之處名鬼哭穴半在甲上半在肉上四處盡燒一處不燒其疾不愈神效不可量也又方絲綿一尺燒灰兌酒服或開水送下均效制邪鬼法端午日午時用豬頭血和明雄曬乾收之或燒煙燻或帶身旁即能制鬼又方端午日以雄黃搽鉻口鼻用樟木燒煙燻之此狗即能制鬼闢鬼火法夜行時見碧火出沒此鬼火也能奪人精氣用鐵馬鐙敲動作響即滅鬼箭傷鬼打傷死見卷十二急救門身痛有青色用亂髮搽之髮捲成團而硬者即是用金銀花一兩煎水飲之即愈又方山梔炒灰麵炒桃枝尖七個共捶融作餅貼之次日將餅取下分作七丸放炭火中燒之燒時聲響即愈不愈再燒以愈為止又方狗骨燒灰二錢梔子七個灰面椿芽各一兩共為末醋調敷切忌針刺又方有人為鬼氣所中腿上生瘡百藥不愈後用干狗糞枯而白者燒煙向瘡口熏之拔出清水數碗亂髮十餘團而愈又有人折足腫痛不能履地屢治不效亦用狗糞熏之初次不效二次拔出肉釘三個而愈又方鐵渣取細淨者二兩核桃又名胡桃取淨肉一斤桃仁八兩同入瓷瓶內加好酒四斤蒸熟每日不拘時隨量飲酒蓋被取汗服後痛甚無妨越痛越好服完自愈增補去邪怪法取州縣官堂上硃筆在病人心上寫一正字頸上寫一刀字兩手寫兩火字即愈蘇州韓氏家僕遇邪以此法治之寫至左手火字其人張目大呼曰勿燒我我即去也自此怪絶事載子不語集又一婦為堅所迷百計不去後設法將怪推入婦人尿桶中變朽木燒之遂絶又一人忽見黑氣人褲中似覺婦人陰戶一接而精即流出符藥不愈其人平日虔記呂祖忽一道人教麝香可愈初佩麝香假而少不效後用真麝香兩餘佩戴身旁其怪遂絶奇病頭頂生瘡五色形如櫻桃破則自頂分裂連皮剝脫至足此症名肉人常服牛乳自愈或照頭部葡萄瘡治之亦效眉毛搖動晝夜不眠呼喚不應飲食如常大蒜二兩搗汁兌酒飲自愈頭面發熱身有光色大蒜汁五錢酒調服吐物如蛇即愈面腫如斗眼中見人只三寸長此痰症也用瓜蒂炒紅飯豆各一錢水煎服一二劑使痰吐盡腫消而愈再用黨參焦朮茯苓半夏各三錢甘草一錢陳皮五分水煎服見一物如有兩物此好食魚鮮所致食薑醋加紫蘇水數日自愈見一物如兩物或三四物又見桌椅等物平正者視之反歪斜歪斜者視之反平正或用補藥瀉藥寒藥熱藥皆不效又服滾痰丸更不效者此胸膈有伏痰也用常山五錢酒煮黨參蘆三錢甘草一錢生薑五片水二碗煎八分食遠服吐痰而愈醉後嘔吐視物顛倒治法見卷十二烟酒醉傷門眼見諸般飛禽走獸以手摸捉則無此肝膽邪火也用棗仁羌活青葙子花即草決明花元明粉各一兩共為末每服二兩水一碗煎七分和渣飲之一日三服即愈眼見五色之物忽又變成美女此色欲過度虛極所致急請明醫診治必愈愛食豬肉或生油生菜均見痞癖門口鼻流出臭水以碗盛之內有魚蝦走動口鼻中氣常出不散凝如黑蓋過十日後漸漸至肩胸與肉相連堅如鐵石澤瀉煎湯日飲三盞連服五日即安身發寒熱四肢堅硬如石敲之作鐘磬聲吳萸二錢先用熱水泡過煎水木香二錢研末兌服自愈周身皮肉內滾滾如波浪聲癢不可忍面如蟲行不時燒熱此症恐是麻風查卷十一麻風症辨明治之身如蟲行癢不可忍此風熱也照前遍身搔癢方治之身如蛇蟲行走作咬或腹中蛇蟲鳴動此症恐是蠱毒查卷十五蠱毒方治之皮膚中如有蟹行走有聲如小兒啼哭此筋肉之化也用雷丸雄黃各五錢共為末摻豬肉片上火中燒熟食之即愈又脅下生瘡有聲如小兒啼哭治法見肋部內皮膚手足之間如蚯蚓鳴此水濕生蟲也用蚯蚓糞敷於患處一寸厚鳴止再用薏苡仁芡實各一兩白朮五錢生甘草三錢黃芩二錢附子三分防風五分水煎服即愈此治濕則蟲無以養又有生甘草以解毒殺蟲防風去風而逐瘀附子斬關而搗邪所以奏功如神也周身發斑眼赤鼻脹氣喘毛髮硬如銅鐵此胃中熱毒結於下焦用滑石白礬各一兩水三碗煎至一碗冷服即愈外用吳萸末熱醋調敷兩腳心一周時一換以愈為止此法最妙身上忽現蛇形痛不可忍外用雄黃末豬油調搽內用托裡解毒湯見內外備用諸方即愈氣旺者用荊防敗毒散見同上更妙又方取雨滴磉石上苔痕用水融化噙之即消又癰毒門內有蛇形瘡方可參看遍身忽然肉出如錐癢而且痛不能飲食此名血攤症不速治則潰爛膿出急用赤皮蔥燒灰淋洗內服淡豆豉湯數盞自安遍身生燎泡如甘棠梨破則水流其泡復生內有小石一片如指甲大此症抽盡肌肉難治三稜莪朮各一錢為末酒調服極效自頭麻至心窩而死或自足心麻至膝蓋而死小孩糞乾結者佳稀者不用陰乾瓦上燒枯燒至煙盡為止每服三錢豆腐漿調服或用豆腐調服亦可甚效又方川楝子燒灰為末每服一錢黃酒調下不如前方之妙外用吳萸末熱醋調敷兩腳心一周時一換以愈為止此法最妙臨臥遍身蝨出血肉俱壞漸生漸多舌尖出血身齒俱黑唇動鼻開日飲鹽醋湯數碗十日自愈忽有人影與己隨行坐臥久則成形與己無異此名離魂症用黨參五錢有力者用人參一錢或用高麗參三錢亦可辰砂茯苓各三錢煎服數劑俟形影不見再服十全大補湯以免後患人前不食背地偷食見人則避面色黃瘦此名鼠膈病乃食過夜鼠饞之涎所致用十大功勞葉一名鼠怕草葉似蒲扇有五角角有刺焙乾為末每早空心服一錢酒下服至半月即愈臥床四肢不能舉動口說大話並喜說食物此名失說物望病也病人如說食肉便云與爾食豬肉一頓病人聞之即喜以肉放病人前臨要吃卻不與吃此乃失他物望也不必服藥其人睡中口流涎出自愈瘡癤內有雀鳥出者有亂髮出者人生尾巴用藥線見癰毒諸方捆住尾根漸漸捆緊半月自落落後再請名醫診脈多服補陰之劑以免復發藥物備要地黃以懷慶産者為上聞彼處頂上者每斤需銀一兩有奇近來兩湖兩廣每斤不過三五百文至多亦不過七八百文焉能無假總以透心黑者為佳中心微黃者次之有以紅白蘿蔔用地黃汁浸透假充尤宜細辨白朮以於潛産者為上然貴而難得此外總以術內白者方可用不白即系蒼朮用之有損茯苓取整個切片照之微有筋膜為真近來多以米粉和苓末咀片假充又有以米粉包裹松根種成整個者亦宜細辨茯神真者木心或在旁或在中亦不一心切開有筋膜者是也假者木心在中且止一心而無筋膜人參參最易蛀見風尤易蛀惟納新器中封緊經年不壞若炒米包藏須攤過一夜方用否則參亦易壞然炒米亦能生蟲或用新綿包之又參最忌日曬惟火烘不妨煎參鬚用流水用止水功緩參本多假難於辨認無力尤不易得以故集中少用高麗參多以東洋參及別藥假充其法用大紅皺綢包裹蒸之使皺紋顏色透入再用桂元肉汁拌入烘乾色味與真高麗參無異欲試真假以氣虛及昏暈時服之有無功效為準黨參色黃味甜枝軟菊花心為佳有以一種甜黨染色假充者功緩無力鵝不食草又名石胡荽野園荽雞腸草地胡椒地桐毫葉小花黃子如胡椒階砌及平地隨處皆有旱蓮草又名鯉腸草墨斗草墨頭草墨東草其莖微紅折斷處色即變黑紅芽大戟肉色微紅者真色白者名綿大戟瘡毒用之不效谷樹又名楮樹𪃿樹葉有兩檥如雲板樣亦有無檥者以刀扎樹身有漿流出者是甘遂味甘寒每斤用甘草四兩煎湯浸入三日後去湯用河水淘洗後用淨水浸之每日數次三日後去心再淘再浸四五日取一撮入白瓷盆內隔一宿看盆中水色不變乃妥再淘三四次瀝乾以麵裹如團入糠火內煨煨至麵糰四面皆黃內藥熟透取出曬乾入鍋炒透磨粉其苦寒之毒經制則淨不苦而甜不寒而溫專消堅結痰塊核毒木鱉水浸半月入鍋煮數滾再浸熱湯中數日刮去皮心每日辰時入香油鍋中煮至油沫盡再煮百滾透心黑脆以鐵絲篩撈出即拌入炒紅土磚細粉內拌至土粉有油氣入粗篩篩去油土再換炒紅土料拌一時再篩去土連制十日時刻不可錯亂以木鱉同細土鍋內再炒入盆拌罨一夜取鱉去土磨粉用此物能搜筋骨入骱之風濕祛皮裡膜外凝結之毒痰所煎之油可入熬膏用此物最毒倘泡製不透服之必發戰而死是不可不慎也乳香如乳頭明透者良近來多以楓香假充性黏難研每兩用燈芯二錢五分同炒炒至圓脆可粉為度扇去燈芯取香磨細用沒藥色赤如琥珀者良亦用燈芯同炒與制乳香同冰片多以樟腦假充以牙色如梅花片者良杉木炭養之則不損耗血竭味甜咸色赤以染透指甲者為真若味大咸有腥氣者是海母血假充阿魏味極臭取少許沾銅器上過夜沾處色白如銀者真硼砂色黃如膠者真沙苑蒺藜以潼關産者良皮貨店所帶形扁如腰子色緑者真赤小豆又名飯豆扁而紅者是若半紅半黑名鬼眼豆無益有損斷不可用烏梅生青梅蒸熟用稻草灰拌入曬乾即是店中多有以小李假充必須自制用之方效柿餅以大者為佳有以小野柿假充用之有損萆麻子油萆麻子五升搗爛用水一斗煮有白沫即取起待沫盡乃止去水將沫熬至點燈不炸為度燈心炭取活竹一段兩頭留節中開一眼以燈心塞滿外將原刻竹仍填原眼加泥裹好入糠火內煨至竹成一炭取內燈心炭用阿膠味不臭者佳色緑者為上有氣味者必假不如好牛膠代之鹿茸茸有數種佳者頗不易得茸片尤假一人與茸客至交因體虛向客索得血片一斤服之體虛如故毫不見功怪而問之茸客醉後吐實系用牛尾豬血和藥製成其片放手心亦能捲動與真茸無異鹿膠凡膠以自熬為真鹿膠必用真關東鹿角熬服方效若川角魚角色白而長者俱無力龜板龜板生用有力藥店多以熬過龜板混充不可不辨龜膠此膠亦宜自熬板以厚而黑者為佳黃而薄者無力癩蝦蟆又名癩團又名老蟾目紅腹無八字紋者不可用蜣螂又名推車蟲推屎蟲以人糞一團如推車者是搔蛺子本名蛸蛺蟲又名偷油婆江蘇人呼為髒㿉有翅能飛其色紫如油灶邊及有食物之處最多蜒蚰本名蛞蝓又名鼻涕蟲其形似也蝸牛頭有須尾有螺殼者是螻蛄又名蟪蛄即土狗也虻蟲大如蜜蜂腹四褊微黃緑色喜食牛馬血雜治治熱病法外用吳萸末熱醋調敷兩腳心一周時一換以愈為止此法極妙凡熱症有心胸煩悶者有日久沉睡不言者此火伏於內也用緑豆和建橘餅煎湯溫服一面服以清涼之藥一面以此湯飲之自易奏效再以好梨食之更妙困倦喜睡齒暗無色舌白昏昏不知痛癢處或下痢或不下痢此蟲食肛門症也用桃仁十五粒去皮尖好醋一碗鹽三錢煎熱連桃仁服沉悶無聊若有病狀一人沉悶無聊若有病狀遇一名醫云此熱症已極氣血消鑠不急治一二年後必發大癰而死惟每日食好梨一個服至一年不可間斷依法服之而愈梨久易壞照後收藏食物法可以久留夜不能睡生地黃三錢麥冬二錢北五味七粒水煎連服三日必效燈草一兩煎水當茶飲向晚不可飲茶飛絲纏身飛絲纏住耳鼻手足等處腫痛不已用威靈仙煎濃湯洗即愈身上無故生蛆蛇蛻研末麻油調擦蛆出自愈除蝨子一人臨睡周身蝨出數升血肉俱壞每宿漸多癢極難言舌尖出血不止身齒俱黑唇動鼻開用鹽醋湯飲之十日而愈尋常生蝨子者用後銀硃方神效闢臭蟲臭蟲多則迷人耗損氣血須將門窗關閉緊密無縫用宣木瓜煤熏極效居客店者尤宜熏之又方硫磺數錢為末和棉花子燒煙燻之二三次即去又後有銀硃方最效闢蠹魚跳蚤蝨子臭蟲七里香即藝香置書中及席下自去又方頂上銀硃一兩紙卷燒熏一切蟲蟻蜈蚣聞之即死真妙方也闢螞蟻粵西螞蟻最多有入衣箱及被褥者一見大蒜即去或勤加點檢亦去闢白蟻梔子能消白蟻為水或用銀硃方極效闢蛇香白芷栽植園中蛇不敢入又方獨腳蓮草初發生時便似蓮房栽植園中蛇虺不敢過其下又方用雄黃如桐子大燒煙以薰衣服被褥之類則蛇不敢近闢蜈蚣頭髮燒煙燻床下或廚房蜈蚣聞之入土三尺或用前銀硃方尤效闢食尸蟲有種怪蟲愛食死尸揮之不去惟用豹皮將尸掩蓋則散收蚊蟲五月五日取癩蝦蟆一隻剖開不去腸雜埋入十字街心六月六日取出將蝦蟆肉在房中壁上畫一圈其蚊盡入圈內此房永無蚊患又方五月五日五更時使一人在堂中向空扇一人問云扇甚麼答云扇蚊子凡七問七答不可嬉笑一夏永無蚊入此山西九十老翁黃淡翁所傳也耗鼠竊油香油一斤入桐油三兩點燈鼠不敢竊野豬踐食田禾用機軸紡織器具置放田間即去闢盜賊刀兵疾病鬼怪虎狼蛇蟲螢火蟲鬼箭羽蒺藜各一兩雄黃雌黃各二兩羚羊角煅存性一兩五錢枯礬二兩鐵錘上木柄取錘眼中者燒焦一兩五錢共為細末加雄雞冠一具雞蛋數枚黃丹五錢和搗一千下為丸如杏仁大用三角形絳色綢包每盛五丸入病人家帶左臂上從軍繫腰中居家掛門上行船掛船頭可避賊盜刀兵疾病鬼怪及虎狼蛇蟲有人在軍中配帶此藥賊放箭炮離身數尺即落不能傷人此務成子方也見本草綱目螢火小注避難時止小兒啼哭預備綿為小球隨兒大小為之以甘草煎濃汁或熟棗膏浸過有甜味者隨身帶之臨時以口津潤透放兒口中兒不啼哭免賊搜尋賊過則去之前朝靖康年間有神人書於通衢救人甚衆止火法凡遇火起之處用雞蛋三個每個大頭寫溫字小頭寫瓊字向火焰絶高處盡力擲去口念敷施發潤天尊連擲連念其蛋落處火焰自低矣又方火起之處不論遠近各家男婦大小每人持米一盤誠心向天搖簸口念敷旋發潤天奠其火自熄康熙年間山西伍某事母極孝一日母病禱於神夢神人告曰爾母病易愈惟爾村中月內當有火災可速遷避某因事未即遷居後屢夢神人促之某向神禳解法神即以前二法告之數日後村中火起某告村衆如法試之其火頓熄此亦黃淡翁所傳救飢法凡饑年官民設廠施粥多有奸徒攙和石灰串通漁利南北皆然不可不察糯米三升水淘慢火炒熟芝麻三升水淘慢火炒熟先將糯米磨粉後入芝麻同磨為末又用紅棗三斤煮爛去皮核搗和為丸每重五錢日食一丸滾水送下可以不飢如無糯米紅棗即黏米黑棗亦可饑年制送功德無量又方板栗去皮紅棗去皮核胡桃去皮即核桃柿餅去蒂各等分蒸一二時取出放石臼中搗極融爛捻為厚餅以冬月吉日修合曬乾收貯一餅可耐三四日不飢過三四日再服一餅更能耐久此藥補腎健脾潤肺清肝須細嚼為妙又方黑豆七升芝麻三升水淘過即蒸不可泡久蒸過曬乾去殼再蒸以三蒸三曬為度搗為丸如龍眼大每服一丸三日不飢又方紅薯洗淨蒸熟候半乾搗爛加糯米粥和如泥糊竹籬上愈久愈堅不蛀不壞如遇荒年取手大一塊煮清粥一大鍋食之能耐飢或做土塊樣砌成牆壁留下更妙又幾遇凶年施粥饑民急於得食若過於沸熱必傷腸胃往往食後百步間即仆倒而死宜於夜間煮粥盛大甕中次早以木棍攪勻與食最妙又餓極之人不可食乾飯乾物宜以極清稀粥少少與食一日食數十次總不宜多或以稀粥潑桌上令其漸漸吮食食至數日後方可稍食乾飯亦不宜多緣飢久腸細飽食往往脹死乾隆戊戍年間湖南省歲歉施粥饑民貪食死者甚多後用此法活人無算行路不迷帶龜而行雖入深山無人處至三叉路口將龜放下依龜而行自不迷路夜行無恐用右手中指在左手心寫我是鬼三字將手握緊自不畏懼黃淡翁傳客路須知凡水陸舟車孤村野岸之處有一種悶香賊匪稍不防備即被迷悶竊掠一空臨睡時口含冰糖沙糖片糖亦可或含甘草可免如或吞下必須添含其門腳窗縫多撒白沙糖黃沙糖亦可為妙或用清水一盆置房中亦免昏迷並避邪鬼如被迷悶不醒飲冷水或糖水甘草水均可解又睡時用明雄要大塊的戴頭上或系左腋下亦能辟邪又客店人多屋少之處多有人死未及殮埋將尸藏匿榻下尤宜詳細看過暈船暈車坐船頭暈嘔吐者開船時向天後宮或江神水神之處誠心拜禱即安或飲童便最妙飲白沙糖水亦可或用撐船竹篙水滴碗中以滾開水兌服亦效又方下船時將灶心土一塊藏發中勿使人知即安或寫土字於手心坐船即不恐怖取土能掩水之義暈車嘔吐者亦飲童便為妙或白沙糖水亦可渡江膽怯用黃紙以硃砂寫禹字戴身旁自安黃淡翁傳罪囚邪術避刑有口含藥物或帶身旁或賄差役內侍傳遞尤宜加意關防黃紙上用硃砂水印二顆先將印用皂角水洗淨油一貼罪囚背上一貼心口並用緑豆煎水與服可破甚效又方用細竹條出其不意撲之或於夜靜忽然提訊猝不及防亦可破也又有運氣自耳鼻及糞門出者塞其耳鼻糞門自招造屋禳解凡起造房屋先請善觀陰陽者過細查看屋內如有邪怪即將瓦椽拆去用牛將地犁過一次若有古冢必須作文祭禱起遷另葬為要解酸酒法頭二蠶砂乾者二兩量酒多少加減酌用布包放酒中封固三日後開飲味好且能益人又方紅飯豆扁而微紅者是炒香量酒多少用布包入酒中味即轉正又方如酒一斤加鹼水一二滴試過再加不可多亦不可少加後即燉熱飲久則味變酒店多用石灰解之飲之傷人制食物法煮肉用籬上舊竹篾捆之則易融爛煮肉燒肉忌用桑柴火蒸臘肉或火腿取燒紅炭放皮上略燒片刻則皮易爛煮臭肉須切片用短稻草同煮其臭氣盡入草內暑天煮凍肉將肉煮透放灰中過夜即凍又方用洋菜煮融和入亦可夏月肉用醋煮可留數日燉羊肉加青草一把易爛而不膻煮雜色羊肉入松子數粒則不毒投灶邊瓦一片易爛煮老鴨放灶邊瓦一片亦易爛洗豬肚豬臟用鹽或用糖則不臭用面同洗亦可煮魚臨熟入川椒數粒則去腥用枳實數片或鳳仙花子數粒則骨軟下木香亦不腥造魚鮓先用鹽並礬醃洗去涎再用炒鹽紅曲末醃透入壇則經久味佳糟蟹用皂角一寸置壇底則黃不沙亦不散或入白芷黃亦不散醃薑先用蟬蛻泡水洗再用蟬蛻數個入壇底雖姜老亦無筋煮筍入薄荷加鹽則不老而味更鮮醃茄入石緑數顆則切開不黑食蒜與生薑棗子同食則不臭洗象牙器或用豆腐渣浸擦或用人乳浸半日洗之象箸油透插入芭蕉梗內則淨白如新伽南香菰以新荷葉包裹露過夜即髮香如新寫石碑用皂角水調朱寫上不落收藏食物米中放螃蟹殼日久不生蟲梨用蘿蔔隔開小蘿蔔整用大蘿蔔切開用勿使相著用竹簍收藏忌木器經年不壞屢試屢驗香櫞收法與梨同橙橘以緑豆拌收經久不壞用松毛包藏三四月不幹用有蓋新瓦罐每罐放一個密封藏樓上更可經久此法最妙書中藏藝香又去七里香可闢蠹枝葉皆可用筆用硫黃水浸過收藏不蛀或用川椒水貯筆套內硯水當嚴寒時用荔枝殼煎湯或川椒煎湯寫字不凍瓶花水夏日入火燒瓦一片不臭冬月入硫黃不凍皮衣包裹緊密不使透風箱內四角各放浮水之爐甘石一塊可收濕氣永不生蟲試井中毒凡古井及五月井中恐有毒淘井者不可輕入先以雞毛投入試之毛直下者無毒回施者有毒以好醋數斗傾入則可下矣耐點燭法黃蠟松香槐花浮水石各一斤共為細末熔化用燈芯澆成燭一晝夜只點一寸留宿火法胡桃一個又名核桃燒半紅埋熱灰中三五日不燼各物汙衣凡衣被汙壞總以先用滾水泡透再照後開各方加洗墨汙者飯洗或棗洗或燈草洗黃泥汙者薑汁洗血汙者蘿蔔湯洗或小便洗瘡毒膿血汙者牛皮膠洗漆汙者先用油洗水搓再用杏仁嚼洗藍靛汙者杏仁嚼洗膏藥汙者或用油洗或用滾酒或用灶心土檳榔水汙者白醋洗酒醬醋汙者藕汁洗清油汙者蜜洗或蘿蔔水洗豬油汙者栗子洗牛羊油汙者石灰洗桐油汙者豆腐渣洗煙油又名煙屎汙者瓜子嚼洗或用米洗墨汙綢綾皮棉衣服滑石為極細末和水調上干即掃去自除或用赤石脂末更妙墨汙紙絹書畫燈草水洗又方硼砂一錢百草霜二分有明礬五分用雞蛋一個去黃留白將藥為末調和裝入雞蛋內曬乾用時塗字背面待半乾用指輕彈墨自落去墨法用西瓜一個半熟者約重三斤蒂邊開一孔入官硼砂三錢五分硇砂四錢共為細末入瓜孔內將孔蓋塞懸一七白霜自出以翎毛掃下又一七收取用時先將清水濕墨以藥蘸上待乾用翎掃淨紙白如新去朱法黃瓜一條蒂邊開一孔入官硼砂一兩依上去墨法取霜用之書被水浸揭不起者蒸片時可揭去書畫雨漏痕大甑中蒸片時取出曬乾至一二次後用物壓平其痕自退十分之八闢穢氣零陵香草生大黃各四兩蒼朮白芷各三兩沉香藝香出奈辛夷甘松各二兩共為細末燒之大可闢穢闢油漆氣凡房屋器皿新經油漆者其氣難聞將緑豆煮滾取氣熏之其氣漸收或以緑豆汁洗之更妙阿膠著物臭氣不退牆壁舊紅對聯紙燒煙燻之即退禽獸諸疾鶴病蛇床子和大麥煮熟喂之鹿病用鹽拌料豆喂之碗豆亦佳百鳥瘡鳥飲惡水鼻生爛瘡甜瓜蒂為末敷之即愈百鳥翅足折損喂以芝麻仍嚼敷患處自愈雞病真麻油灌之立愈若中蜈蚣毒則研茱萸汁灌之雞瘟巴豆一粒搗極碎香油調灌入口即愈又緑豆磨粉水和成條喂數次愈又生硫磺灌食極效鴨病真香麻油灌之犬病以水調平胃散見內外備用諸方灌之貓犬生癩硫磺拌飯與食極效或用硫磺納豬腸內煮熟喂之或用百部煎水塗之狗蠅多者以香油遍搽立愈貓病烏藥磨水灌之如被人踏傷蘇木煎湯洗小貓啼叫不止陳皮研末塗貓鼻即止豬病割去尾尖出血即愈若瘟疫用蘿蔔菜或同樟樹葉與食之不食則難救豬瘟大黃五錢朴硝五錢共泡湯一罐傾出候溫竹筒灌下瀉出毒即愈又方貫衆三兩豬牙皂一二兩水四五碗煎二三十滾再用朴硝末三兩煮一二滾候溫灌下亦效牛豬病大黃黃芩黃柏梔子連翹柴胡蒼朮各三錢水三大碗煎一碗灌之自愈牛羊豬瘟牙皂細辛川烏草烏雄黃同燒灰研末吹入鼻中五六分即愈加麝香二三釐更妙牛馬疥癩蕎麥杆燒灰淋汁洗又藜蘆為末水調塗甚妙羊生疥癩鍋底煙子及鹽與桐油各二兩調勻塗之馬病用白鳳仙花連根葉搗汁熬膏有病抹其眼四角上即汗出而愈
