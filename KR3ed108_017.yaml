body:
  text: 卷十七眼部同治初年予官粵東偶患目疾郭玉麓廉訪祥瑞授眼科抄本一卷云傳自葉天士先生遂按方治之甚有奇效當付剞劂板存羊城今特重刊用資廣布醫道之失傳久矣臨症多者讀書未必博讀書博者臨症未必多古云醫不三世不服其藥又曰三折肱知為良醫吾願世之業岐黃者多臨症多讀書勿使人謂學醫廢人也獨眼科乎哉光緒四年正月撫浙使者南昌梅啟照小岩氏識葉天士先生秘傳眼科瞳仁屬腎大小眥屬心黑珠屬肝上胞屬脾白珠屬肺下胞屬胃凡眼白珠有紅絲微痛者用清散藥宜左荊防湯荊芥八分蔓荊子八分赤芍八分川芎八分防風八分車前子一錢蟬蛻六分去翅足菊花一錢生地錢半切片青葙子八分甘草四分生薑一薄片為引凡眼大角紅腫者心火也照前方加黃芩八分酒炒木通八分加淡竹葉九片引凡眼白珠盡紅腫痛生眵流淚羞明者火盛也宜用涼血散火湯生地二錢切片丹皮八分赤芍八分黃芩八分防風八分荊芥八分歸尾八分蟬蛻六分柴胡八分車前子一錢如頭痛惡風或發熱加羌活八分如眼痛不可忍口渴加川連八分酒炒或腫不消紅不退加紅花四分凡眼小角淡紅或赤而痛者心之虛火也宜用養血散火湯生地一錢切片丹皮八分歸身一錢草決明八分白芍一錢酒炒防風六分荊芥六分青葙子八分川芎八分菊花一錢茯苓一錢車前子八分若服此藥紅痛俱愈但看物不明去荊芥防風加沙苑蒺藜一錢淡鹽水炒菟絲子一錢熟地二錢凡眼黑珠周圍紅者肝火也或痛極或微痛宜用瀉肝湯柴胡八分防風六分荊芥六分川芎六分歸尾八分赤芍八分菊花八分梔仁八分酒炒青皮八分車前子八分生薑一薄片引痛甚者加黃芩八分服此痛不減口渴加龍膽草凡眼弦作癢及爛者風也內服下方搜風散外點蕤仁膏防風六分荊芥六分蕤仁八分刺蒺藜一錢菊花一錢蟬蛻六分甘草四分穀精草六分赤芍八分車前子一錢加老生薑一薄片引外用洗藥羌活錢半防風錢半膽礬四分冬桑葉七片水煎熏洗或用白礬放熱水浸融常在癢爛處輕輕頻擦亦妙蕤仁膏方蕤仁水浸去皮一兩研爛用水兩碗熬至一酒杯濾去渣燉熱再下研就極細真銅綠膽礬各五分攪勻以鴨毛翎蘸點眼皮之下即愈凡眼睛雲翳遮滿黑珠當瞳仁處稍薄者看物不甚清楚尚可以治用撥雲散加減治之凡眼睛雲翳遮滿珠當瞳人處色綠不見瞳人其翳凸起名曰綠水泛瞳人不治凡眼赤脈一條貫瞳人者心火乘腎也用加味導赤散生地錢半切片木通八分甘草四分歸尾八分柴胡八分防風八分荊芥八分車前子八分黃芩八分酒炒赤芍八分加生薑一薄片引痛甚口渴生眵加川黃連六分酒炒連翹一錢凡眼大角長肉一塊及黑珠名胬肉攀睛宜服加味導赤散外點硝爐散生地錢半切片木通八分紅花四分赤芍八分防風六分荊芥六分蟬蛻八分甘草四分歸尾八分生薑一薄片引痛者加黃芩八分酒炒癢者加蕤仁八分刺蒺藜八分硝爐散浮水甘石不拘多少煅紅童便淬七次焙乾研極細末水飛三次再用羌活防風蔓荊子川芎白芷川連黃芩菊花各等分煎濃汁將甘石末拌透曬乾聽用制過甘石一錢火硝三分頂上四六冰片一分擂勻點睛凡眼睛不紅不腫痛者氣鬱也宜用開鬱湯柴胡六分青皮八分香附八分酒炒青葙子八分防風六分荊芥六分決明八分車前子八分川芎八分梔仁八分生薑一薄片引黑珠夜暮痛者加夏枯草一錢若有紅絲者加歸尾八分生地一錢凡眼睛不紅不腫痛眼胞下墜視物不明者氣虛也宜服加減補中益氣湯黃芩一錢蜜炙柴胡三錢陳皮八分茯苓一錢升麻三分枸杞一錢川芎八分炙草五分白朮一錢歸身一錢不用引凡眼睛不紅不腫不痛眼胞不下墜但視物不明者肝腎虛也宜服加味地黃湯熟地二錢切片山萸一錢丹皮八分川芎八分山藥一錢澤瀉八分歸身一錢加用枸杞一錢菟絲一錢菊花一錢茯苓八分此方為丸亦可每服四錢要空心服若為丸則用熟地八兩山藥四兩山萸四兩歸身四兩枸杞四兩丹皮茯苓澤瀉川芎各三兩菟絲子三兩酒蒸菊花二兩此方凡病後眼睛看不清楚及雲翳退後不明夜見燈上有絲球者皆可服也凡眼睛黑珠有白點及成塊輕者為云厚者為眵宜服加減撥雲散防風六分荊芥六分蟬蛻八分車前子八分木賊八分柴胡六分黃芩八分青葙子八分赤芍一錢決明八分甘草四分加老生薑一薄片引凡眼睛黑珠有云翳眼角紅及有赤絲者宜服加減撥雲散防風六分荊芥六分蟬蛻六分車前子八分木賊八分歸尾八分黃芩八分青葙子一錢赤芍八分菊花八分生地錢半切片生薑一薄片引痛甚流淚生眵眼胞或加川黃連酒炒八分凡眼睛黑珠雲翳圍滿有瞳人者可治內服撥雲散外點硝爐散木賊一兩防風六錢柴胡六錢青葙子八錢蟬蛻一兩黃芩六錢菊花八錢車前子八錢共研極細末早晨空心開水調服二錢晚服一錢或用豬肝一塊割開放藥末二錢填內用濕棉紙包好置灰中煨熟食之亦可煎服之藥用前方撥雲散加減治之凡眼睛白珠有翳或白或桃紅或醬色或凸起宜用撥雲散加減治之不紅不腫無赤絲只用撥雲散如紅腫有赤絲加歸尾生地赤芍之類治迎風下淚方防風五分荊芥八分決明八分蔓荊子五分歸身一錢菊花八分蕤仁八分車前子八分丹皮八分白芍八分甘草四分老生薑一薄片引如有赤絲加酒炒黃芩八分刺蒺藜亦可加治瞳人散大方熟地切片二錢歸身一錢白芍一錢酒炒車前子八分川芎八分菟絲一錢菊花八分青葙子八分北味九粒不用引口乾頭昏加生地一錢麥冬一錢口不幹頭不昏無相火者加枸杞一錢六味地黃丸加歸身白芍北五味菟絲可以常服凡小兒痘後餘毒攻眼生雲翳者宜服加減撥雲散木賊荊芥赤芍蟬蛻生地木通防風連翹甘草車前子不用引如紅腫者加川黃連五分不紅不腫者用菟屎丸菟屢丸方望月砂一兩要割禾後田中者方可用木賊蟬蛻車前子各七分防風黃芩各五分酒炒共研細末用荊芥一兩五錢煎水泛丸每空心開水服三四錢治腎虛眼見黑花及金星方熟地六兩一錢山藥三兩一錢白芍二兩八錢枸杞二兩一錢菟絲子酒煮二兩一錢歸身三兩一錢丹皮二兩八錢茯苓二兩八錢萸肉三兩一錢沙苑蒺藜淡鹽水炒三兩一錢空心開水服四錢若火盛多夢遺者可去菟絲枸杞加生地三兩澤瀉二兩牡蠣二兩煅飛過熟地減去三兩若火太盛頭常疼五心熱口渴能飲食者加黃柏知母各一兩五錢俱鹽水炒洗眼藥方羌活防風各錢半菊花二錢良薑八分膽礬三分肉桂甘草各五分清水一碗半煎至一碗每用半酒杯熏洗即愈除翳膜吹耳內藥驗方又名紫龍丹頂上四六冰片二分五釐真云麝子五分血東丹三錢掃盆二錢即頂好輕粉上藥四味研極細末如左眼睛有翳將藥吹入右耳內如右眼睛有翳將藥吹入左耳內用棉塞緊一周時再吹重者數次必愈治眼圈邊生泡南星用醋磨或紅茶時時擦之數日自愈洗眼七仙丹防風蟬蛻銀花歸尾膽礬紅花薄荷各等分煎洗痘花餘毒入目致目失明經驗良方要常服兩三月雄雞肝不拘多少石決明石燕子各等分煅透將雞肝拌勻用荷葉包固外用繩子捆住再用穀精草切寸斷撒在外面煮一炷香時趁熱食之洗眼方上通政袁密山景雲廣西平樂人常傳一洗眼方云宋元豐年間有太守年七十雙目不明遇仙人傳此方洗一年目力如童子錄之於下每歲立冬日採桑葉一百二十片懸風處令自干每月用十片水一碗於砂罐內煎至八分去渣溫洗每逢洗眼之日須清淨齋戒忌葷酒正月初五日二月初一日三月初五日四月初八日五月初五日六月初七日七月初七日八月初八日九月三十日十月初十日十一月初十日十二月初一日洗眼珠有云翳方凡眼有胬肉亦可洗若初起切勿用此方並忌陰人手砂仁桃仁杏仁各一錢焙乾為末再加銅綠膽礬明礬各一錢以上共和為一處用開水酒杯再用雌雞膽內清水三個和在內調勻再加入花針七根貯於水內以瓷瓶或碗將口封固埋入土內三晝夜取出去渣每日洗眼珠半月後翳退矣洗藥方羌活一錢五分防風一錢五分菊花二錢良薑八分肉桂五分不必上等甘草五分膽礬二分水碗半煎一碗每用半酒杯熏洗眼科方當歸六分炒山梔六分蟬蛻四分木通四分羌活二分草決明六分茯苓六分甘菊六分引加車前子一棵連根搗沖藥服如眼患狠加郁李仁數分治眼起雲翳方用茶葉梗須青葉茶燒灰臨睡時點入眼內次日雲翳即退梅啟照序以下眼科七十二症問答一卷據萬邑文永周刊本謂傳自涿鹿李公方治永周精於醫手錄之注中稱豁然子者永周別號也光緒乙亥夏四月余患目疾甚劇金陵王鎮田先生謂宜用苦寒重劑爰授此書證之遂服三黃湯七劑始愈閱全書詳審簡當洵有異授初刊於道光丁酉亂後已少傳本因重梓之以廣其傳憶十年前在粵東患目疾得葉天士先生秘傳藥方亦已重梓然其用藥至黃連而止觀此又進一層矣甚哉醫道之難也世之讀是書者慎諸光緒二年丙子四月南昌梅啟照識於江寧藩署之瞻園眼科七十二症問答症因丸散第一問目有兩睛猶天之有日月也平空昏者何故答曰皆因酒色過度憂悉思慮悲哭或醉飽臟血不勻肝經抑鬱則為患矣宜點虎液珍珠膏服明目流氣飲明目流氣飲治目中障翳隱澀難開血風冷淚時時暴赤視物不明眼生黑花大黃炮牛蒡子炒川芎甘菊白蒺藜炒去刺細辛防風元參梔子炒荊芥穗蔓荊子炒甘草黃芩木賊去節草決明炒各七分蒼朮米泔浸六分水煎食後服或為末臨臥時酒送二錢一方加木通白朮石決明第二問眼目赤腫者何故答曰五臟熱邪內攻以致心火暴盛皆酒之所致也宜點青龍虎液膏服洗心散羊肝丸方見七十一問洗心散治肝熱傳於心經積熱上攻眼弦澀睛疼熱盛風多赤芍甘草荊芥生地黃木通大黃連薄荷當歸水煎食後服第三問眼有赤而不痛者何故答曰肝實也肝者血臟也肝實則血盛盛則血氣上攻侵貫瞳人故赤而不痛若痛至坐臥不得宜點鳳麟羊腦玉服瀉肝散瀉肝散大黃五錢荊芥一兩甘草一錢共為末每用熱湯送下二錢第四問目有赤而昏暗起黑雲大角紅者何故答曰肝虛也肝屬木木生火子盜母氣則昏暗火發則木衰若心火旺則血有餘貫大角侵於瞳神故既赤而又昏也宜點虎液膏肝實者服瀉肝散方見三問肝虛者服補膽散心火旺者服瀉心散補膽散治黑白內外障翳膽虛者肝膽以瀉為補當歸羌活蒺藜蟬蛻荊芥甘草各二錢共為末每服二錢米湯下瀉心散治目赤疼痛心火實者甘草二錢澤瀉五錢黃連三錢共為末每服二錢燈芯湯送下第五問目有大角赤痛者何故答曰心實也大角屬心南方火位之象也心火旺則大角赤痛宜點青龍膏服洗心散三黃湯洗心散生地薄荷荊芥防風羌活山梔黃連黃芩北柴胡石膏甘草川芎菊花龍膽草淡竹葉各等分為末日進三服三黃湯治熱淚傾出沙澀睛疼怕日羞明胞腫者用黃連黃柏黃芩各等分俱炒水煎服第六問目有小角赤者何故答曰心虛也心屬火火能生土故火乃土之母土實則火虛如子肥知母瘦也宜點虎液珍珠琥珀膏服補心散補心散治疼痛不已當歸一兩五錢川芎一兩生地一兩五錢粉草遠志去心一兩五錢酸棗仁炒二兩柏子仁三兩人參一兩金箔一帖麝香一分琥珀三錢茯苓七錢南星五錢半夏五錢石菖蒲六錢辰砂五錢共為末蒸餅為丸如綠豆大硃砂金箔為衣每服七分拌津含化薑湯下第七問眼有白翳多者何故答曰肺屬金金能生水水若旺滿面風膜故塞肺竅之精華只肺托落因乾硬故氣澀之而為翳金若不旺則不能生水矣水不能生肺自乾燥之故耳宜點珍珠膏服補肺散洗心散補肺散當歸五錢黃芩一兩桔梗四錢赤芍五錢桑皮一兩麻黃四錢枳殼四錢葶藶五錢地骨皮八錢甘菊四錢元參八錢白芷四錢生地四錢甘草四錢金銀花四錢共為細末每服三錢第八問目有翳而淚多不凝結者何故答曰即是肺托落肝虛也宜點珍珠琥珀膏服阿膠散被肺散方見七問阿膠散白茯苓二錢白朮一錢川芎一錢阿膠炒成珠二錢當歸一錢姜三片棗二枚水煎不拘時服第九問眼有怕日羞明何故答曰脾實也脾屬土土受濕氣傳入肺肺受心經邪火而傳於目太陽受濕熱則勝脾土土盛肌肉壅塞難開乃是濕氣相傳故怕日羞明宜點珍珠膏服洗脾飲密蒙丸洗脾飲治胞腫赤痛當歸天花粉赤芍黃芩穿山甲炒金銀花羌活白芷連翹水煎將好加大黃芒硝一二錢即起食後服密蒙丸此方還有在後看加減服密蒙花菊花羌活石決明鹽水浸炒青精石白蒺藜炒去角上各等分為末煉蜜丸梧桐子大每服三十丸食後服日三服第十問目有視物不真者何故答曰脾虛也脾屬土肝屬木木剋土青黃相爭黃不勝青故視物不真宜點珍珠膏服蒼朮湯補腎丸方見十一問蒼朮湯蒼朮米泔浸炒一錢二分藁本一錢白芷一錢羌活一錢川芎一錢甘草一錢薑蔥煎服第十一問目有黑花如飛蟬蠅者何故答曰腎虛也腎屬水水若枯則腎虛宜點虎液青龍膏服豬苓湯補腎丸豬苓湯五味子熟地豬苓肉蓯蓉酒洗枸杞子覆盆子不用引水煎服補腎丸車前子酒浸一兩石斛一兩去根青鹽磁石煅醋淬七次水飛二錢沉香五錢菟絲子酒煮打爛二錢共為細末煉蜜為丸梧桐子大每服七十丸空心鹽湯送下第十二問眼有迎風流淚者何故答曰腎虛也肝木生風腎水枯不能滋木木乃腎之子故見風流淚也宜點鳳麟羊腦玉服地黃丸明目地黃丸生地一斤酒浸熟地一斤酒浸九蒸防風四兩枳殼去穰麩炒四兩川牛膝去蘆四兩杏仁去皮尖二兩共為末煉蜜為丸梧桐子大每服五十丸第十三問眼有赤筋攀睛者何故答曰心火主血肝木主筋血浸於筋肝心同源相傳於目故赤血眼多生攀睛宜服三黃湯不退再服當歸散點珍珠膏三黃湯大黃三錢酒炒黃芩一錢五分黃連一錢五分水煎服當歸散當歸白芷羌活甘草梔子牛蒡炒共為末滾水調服第十四問目有白膜遮睛者何故答曰肺金克肝木風邪在肺其金旺而木衰故白膜遮睛宜點珍珠膏或點推雲散服連翹飲四順清涼散連翹飲連翹甘草黃芩梔子薄荷大黃酒炒朴硝各等分上為末滾水下或蜜丸亦可四順清涼散大黃酒炒川芎山梔赤芍歸身枳殼生地香附醋炒甘草沒藥熨去油各等分上為末米湯下推雲散爐甘石五分珍珠二分瑪瑙三分硃砂四分熊膽一分半黃連一分半乳香六釐沒藥六釐麝香二釐硼砂三釐共為細末點眼請閱豁然子依方經手製法第十五問目有遇風作癢者何故答曰肝經有風邪肝屬木一見風燥動即癢宜點虎液膏服荊芥散荊芥散荊芥甘草蔓荊子甘菊白芍香附蒼朮炒草決明炒各等分為末每服一錢黑豆湯送下第十六問目有早晨昏花者何故答曰此為頭風注於目頭乃諸陽之首早晨昏則陽衰陽氣屬木木旺寅卯辰時故邪勝則生風攻於目也宜點羊腦玉服蒺藜散蒺藜散白蒺藜炒芍藥茯苓甘草防風石決明鹽水炒川芎炒羌活當歸蒼朮米泔浸炒蟬蛻麻黃各等分共為末滾水送下第十七問目有日中時昏暗者何也答曰胃腦損也元氣即真元也流傳於陰道不歸陽道在於午戍之時寒氣漸生故生腦損以致早晚目昏宜點珍珠膏服寬中湯太陽丹瀉肺散灸風府穴寬中湯青皮四兩陳皮四兩丁香四兩甘草四兩朴硝四兩細辛五錢厚朴二兩薑汁炒白豆蔻三兩共為末每服二錢鹽湯送下太陽丹治太陽穴疼痛名雷頭風大川烏炮一兩石膏煅三兩白芷一兩甘菊一兩共為細末蜜和麵糊為丸硃砂羌活一兩甘草二兩細辛五錢為衣每八九十丸淡薑湯下瀉肺散治目中不清視物不見黑豆白醜澤瀉當歸枸杞苦參各等分水煎服忌酒煎炒發物第十八問目有昏花迎風流淚怕日羞明者何故答曰風熱上攻於目也宜點虎液膏服上清丸上清丸羚羊角鎊一兩犀角鎊一兩牛黃五錢琥珀三錢厚朴薑汁炒一兩黃芩酒炒一兩川芎五錢白芷五錢菊花八錢防風八錢羌活八錢草決明一兩生地七錢熟地七錢防己八錢黑牽牛八錢淨蟬蛻七錢滑石一兩地膚子炒一兩共為末蜜丸梧桐子大每服五十丸食後服第十九問目有日夜疼痛者何也答曰陽毒之氣盛也經云靜則血氣衰注於陽道寒邪克之故日夜作疼宜服撥雲散撥雲散白蒺藜炒去刺羌活獨活防風荊芥生地黃當歸蛇蛻蟬蛻甘草赤芍金銀花水煎服第二十問目有日中痛何故答曰陽氣盛也經云陰靜則陽盛陽火盛則旺於日中見陽氣則道德故知陰虛也宜服洗心散方見二問五問第二十一問目有浮眵白膜者何也答曰肺金受熱也血盛則熱氣盛則寒肺氣盛則生膜白乃肺之根也肺受風邪浮散於目故有白膜遮之也宜點虎液膏服四順飲第二十二問目有旋螺突出者何也答曰是積也積乃臟腑之源毒攻於外發於目血結於肝木之積也宜服蟬蛻無比散宜點推雲散方見十四問蟬蛻無比散蟬蛻去頭足蛇蛻微炒各二兩羌活三兩當歸酒洗三兩川芎鹽酒炙三兩石決明鹽水煅二兩防風四兩茯苓四兩炙甘草四兩赤芍二兩蒼朮米泔浸二兩白蒺藜炒去刺八兩共為末食後服三錢米湯調下忌生冷油麵等第二十三問目有瞳仁倒者何也答曰五臟俱損也外因五色內因五味精液妄行以致腎水枯竭而傷肺肝故知五臟損也宜點珍珠虎液膏服菊花丸菊花丸菊花四兩巴戟一兩六錢五味子二兩肉蓯蓉酒洗一兩枸杞二兩共為細末蜜丸梧桐子大每服用鹽湯送下三十丸第二十四問目有青膜遮睛者何也答曰目乃腎水之源精神之腑五臟積熱壅滯氣血沖掌肝木故青膜遮睛也宜點青龍琥珀膏服洗肝散洗肝散薄荷葉川芎當歸大黃梔子防風羌活甘草各等分為末每服三錢食後服第二十五問目有瞳人黃者何也答曰黃風內障也五行應變升降為先若血氣衰澀不能應目故瞳人黃也宜點珍珠散服椒紅丸夜光椒紅丸川芎一兩白蒺藜炒五錢防風五錢蒼朮炒二兩熟地三兩車前子炒三錢元精石五錢羌活一兩當歸一兩川烏一兩陳皮一兩黃連一兩珍珠五錢人參五錢川椒五錢共為細末蜜丸梧桐子大每服四十五丸木香湯送下第二十六問眼有白星散亂頭昏眼花黑暗者何也答曰氣血衰也氣血者周流百脈百脈一衰六陽俱起頭即昏眩血脈不行故生白星昏花黑暗宜服川烏散點推雲散方見十四問川烏散川烏煨細辛川芎防風生地當歸芍藥甘草人參各等分為末每服二錢酒送下石膏二川丹石膏川烏川芎防風荊芥川羌活連翹升麻水煎服第二十七問目有粉青而昏者何也答曰脾家風濕瘀血滯精宜服分昧散點推雲散方見十四問分昧散琥珀一兩防風一兩蔓荊子炒一兩五錢元參一兩五錢細辛一兩牛蒡子炒一兩五錢草決明一兩五錢大黃一兩白蒺藜炒一兩五錢蒼朮米泔浸一兩甘菊一兩甘草一兩水煎服或為末白湯調下老膜散治翳膜極重者珍珠二分熊膽一分五釐辰硃砂一分五釐密陀僧一分五釐蕤仁一分五釐白丁香一分五釐荸薺粉二分磠砂飛過五分共為細末點之請閱豁然子依方經手製法第二十八問目有赤脈下垂而昏痛者何也答曰是肝家邪風所致木生火火乘風邪故血妄行宜服通血散通血散草決明防風荊芥赤芍當歸大黃山梔羌活木賊白蒺藜甘草等分共為細末每服茶湯調服三錢第二十九問目有赤腫瞳人痛者何也答曰腎水枯心火旺水不勝火宜服洗心散方見二問五問補腎丸方見十一問第三十問目有沙澀流淚者何也答曰脾家熱也翻過眼皮將針撥破紅點銅烙熨之平復若熱淚睛痛怕日羞明胞腫宜點推雲散方見十四問服加味洗心散方見二問第三十一問目有白珠多紅者及沙澀難開何也答曰患目之後多受風寒而氣血不通九竅閉塞以致肺氣衰弱心火太旺故心血欺凌肺金宜點珍珠虎液膏服和血補氣飲和血補氣飲防風一錢黃芩一錢蔓荊子一錢白芷一錢柴胡一錢甘草五分當歸一錢二分升麻六分水煎服第三十二問目有眵淚如膿赤腫而昏者何也答曰腎虛心虛名曰龍虎交困宜服坎離丸補腎丸方見十一問宜點推雲散方見十四問坎離丸白朮土炒細辛川芎草決明炒人參羌活當歸五味苦參防風官桂菊花元參白茯苓黃芩地骨皮青葙子車前子炒甘草各等分為末煉蜜為丸每服四十丸米湯送下第三十三問目有迎風冷淚多膜而昏痛者何也答曰此肝木生心火火旺而金衰故不得剋制肝木名曰東西合戰宜點推雲散方見十四問宜服瀉肝散補膽散方見三問四問人參湯人參二錢黃連五錢蔓荊子炒三錢甘草二錢白芍二錢黃柏鹽水炒二錢知母鹽水炒二錢水煎溫服第三十四問左右目互相赤紅何也答曰血邪攻衝也肝臟不足為風熱相爭左右來往脈有偏盛偏衰故目互相赤紅也宜敷赤頭散服蠶紙丸芍藥湯蠶紙丸晚蠶蛾蟬蛻菊花羌活穀精草甘草各等分為細末蜜丸每服三十丸茶下赤頭散南星二兩赤小豆三兩共末淨水調敷眼眶並太陽二穴如干以水潤之取效第三十五問目有暴生眵障頭面腫痛者何也答曰太陽火熱受風邪也宜點珍珠琥液膏服川芎散洗心散方見五問第三十六問目有縱橫赤脈沙澀眵膜多淚怕日羞明者何也答曰飲食不節損傷脾土以致精神短少況水屬太陽其氣生肝木木旺則生風風濕相搏故怕日羞明點珍珠琥液膏服柴胡散退血散柴胡散柴胡菊花元參甘草地骨皮赤芍黃芩羚羊角共為細末白湯下第三十七問目有黑花當睛墮淚難開者何也答曰肝經不足內受風熱上攻於目或血氣時行暴赤腫痛宜點推雲散方見十四問服明目流氣飲第三十八問目有沙澀流淚爛弦赤痛者何也答曰宜用手法將眼皮翻過用針輕輕撥破斑瘡取三四次宜服清毒散宜點推雲散方見十四問清毒散治風濕眼痛大黃荊芥牛蒡子甘草水煎服第三十九問目有年深月久赤脈貫睛目淚出如傾者何也答曰心火未除肺氣相搏故亦宜服瀉肺散瀉肺散桑白皮茯苓黃芩炒俱為細末每服二錢燈心湯下第四十問目有胬肉攀睛紅障壅上者何也答曰用青龍膏一點即用手法取之再點如痛者加茶調散茶調散防風羌活柴胡甘草當歸黃芩生地川芎天花粉各等分為細末砂糖水調茶湯送下第四十一問目有烏睛突出而痛者何也答曰心肝二經受邪以致毒氣上攻宜服洗心散方見五問後服洗肝散洗肝散赤芍細辛防風遠志桔梗甘草人參羚羊角黃芩各等分水煎服第四十二問目有太陽穴如針刺痛服藥不愈者何故答曰心經熱搏上攻於腦宜用清淨膏和雞子清塗數目再用手法取之再點珍珠琥液膏又外敷赤頭散方見三十四問內服洗心散方見二問加川芎羌活清淨膏南星薄荷白芍各等分為末用雞子清調敷眼眶上第四十三問目有兩角爛弦者何也答曰風邪外感熱氣內攻先點推雲散方見十四問後點琥液膏第四十四問目有暴發赤腫沙澀難開者何故答曰體虛脾弱酒色過度宜點珍珠琥液膏宜服人參敗毒散以散熱人參敗毒散人參前胡薄荷羌活桔梗枳殼陳皮川當歸川芎半夏茯苓黃連黃芩梔子生地水煎服第四十五問目有棗花形如鋸齒者何也答曰乃體厚而多熱或飲酒而多濕性多躁急致肝木受傷被風搖動肝經有損故也宜點鳳麟膏服蟬蛻無比散方見二十二問再服黃連敗毒散黃連敗毒散黃連黃柏黃芩獨活羌活防風當歸連翹藁本桔梗人參蘇木甘草黃耆各等分水煎服第四十六問目有臨臥而不見物者何也答曰雀盲含糊模稜非至理也宜先服蒼朮豬肝散蛤粉散蒼朮豬肝散蒼朮米泔浸炒八兩穀精草一兩共為細末用豬肝一具煮爛同前藥為末米飲下食後服或酒送下蛤粉散蛤粉一兩夜明砂一兩黃蠟化開為丸如棗子大用豬肝一具入丸於內麻線扎米泔水煮熟乘熱熏眼至溫吃肝並汁以愈為度第四十七問目有太陽穴疼痛日夜呻吟何也答曰七情之液盛名曰頭風宜點珍珠散服太陽丹方見十七問有翳點推雲散方見十四問第四十八問目有拳毛倒睫上皮搭下皮有翳膜者何故答曰膀胱經熱也宜夾起上皮灸一壯用搐鼻散服地黃丸如不用夾只用粉霜敷上亦好搐鼻散並治內外障麻黃一錢歸身一錢共為粗末炒黑色加乳香麝香少許再研細末吹鼻內地黃丸熟地黃川芎人參當歸白蒺藜共為細末蜜丸食後茶下第四十九問目有青膜遮瞳視物不明者何也答曰腎虛也宜服巴菊枸杞丸肝經虛熱下弦白星水眵障服明目地黃丸方見十二問先點老膜散方見二十七問二三日點推雲散方見十四問將愈點珍珠虎液膏戒酒色巴菊枸杞丸川巴戟去心三兩菊花一兩枸杞六兩肉蓯蓉酒洗四兩共為末蜜丸每服五十丸鹽湯下第五十問目有斑點者何故答曰肝經邪熱也風氣相搏宜服洗肝散方見二十四問清毒散方見三十八問詩曰偶然氣腫不分明斑點如珠日夜疼數粒茱萸無二樣變來真是蟹睛形烏珠攢出針鉤破速備珍珠散更明此是良醫無價寶濟人陰德不為輕金仙作傳記第五十一問目有小兒出痘翳膜遮睛者何也答曰浮翳可治若視之如粉牆白者不治若障厚者點老膜散一二次方見二十七問再點推雲散方見十四問並點蟬蛻無比散方見二十二問第五十二問目有二三歲孩童患之者何也答曰乳毒之故若紅腫流淚者宜服三黃丸三黃丸黃柏黃芩黃連共為末蜜丸米湯下第五十三問目有出痘眼下皮漏膿者何也答曰痘之餘毒用三稜針四周撥破血出為度將金針蘸清淨膏點漏處方見二十四問宜點珍珠虎液膏服白薇散白薇散白薇二兩生地一兩白蒺藜一兩五錢防風一兩五錢羌活一兩石榴皮九錢共為末枸杞湯下第五十四問目中珠上轉如月出東海之狀者何也答曰名為扶桑翳皆因肺被心火所傷不安心火炎炎魄不守舍肝家元氣不安宜點珍珠散洗心粉方見五問又服補腎丸補腎丸菟絲子枸杞白硃砂青鹽熟地破固脂石斛巴戟天酸棗仁丹皮小茴香肉蓯蓉共為末蜜丸梧桐子大硃砂為衣鹽湯下第五十五問目有如轉轆轤漸生內障者何也答曰心腎虛耗水火不交故也宜點珍珠虎液膏服加味羊肝丸返睛丸加味羊肝丸羊肝一具去筋膜瓦焙乾細辛一兩熟地一兩五錢羌活一兩五倍子一兩白菊一兩防風一兩杏仁去皮一兩菟絲子一兩茯苓一兩枸杞一兩草決明炒一兩青葙子一兩地膚子一兩茺蔚子一兩石決明煅一兩共末蜜丸每服五十丸或酒或鹽湯送下日三服返睛丸川芎一兩白蒺藜五錢白朮土炒五錢木賊五錢羌活五錢細辛五錢防風二兩熟地二兩獨活二兩白芷五錢荊芥五錢枸杞五錢石決明五錢甘草三錢天麻二兩菊花五錢蕤仁四錢生地五錢車前子炒一兩青葙子五錢菟絲子五錢草決明五錢共為末蜜丸每空心鹽湯下三五十丸第五十六問目有患雞冠蜆肉者何也答曰五臟之熱血侵貫待白露或用刀割宜點冰片虎液膏服返睛丸即愈返睛丸見五十五問第五十七問目有小兒痘疹患目者何也答曰痘乃胎毒宜服黑豆丸菟兒丸黑豆丸黑豆一升黃芩一兩黃連一兩大黃一兩甘草一兩朴硝一兩密蒙花一兩用水三碗藥豆同煎豆乾為度去藥每服豆三十粒細嚼米湯下菟兒丸穀精草炒五錢黃連五錢人參三錢梔仁炒五錢當歸七錢薄荷炒五錢柴胡四錢升麻四錢菟絲子炒二兩共末空心米湯送下三錢蜜丸也可第五十八問目有被物損壞其瞳者何也答曰瞳神不破宜服退血散又服蕤仁丸蕤仁丸蕤仁去皮油六兩黃連一兩石決明煅一兩元精石煅二兩共為末用黑羊肝一具竹刀刮去筋膜切片瓦上焙乾為末同前藥米糊為丸每服茶送七十丸重者不過一月見效第五十九問目有上下皮腫而硬者服藥不退用手法取之不效者何也答曰要用手法五七次宜服升麻葛根湯升麻葛根湯升麻芍藥甘草葛根水煎服第六十問目有不見黑白一片烏者何故答曰是肝與腎受風邪也宜點珍珠虎液膏服明目地黃丸方見四十八問第六十一問目有紫色胬肉堆滿眼者何也答曰肝之虛熱也肝木生心火使血侵於目將上下眼胞用法取之宜點推雲散方見十四問服瀉肝散方見三問補膽散方見四問第六十二問目有白花如絮者何也答曰肺金不能上應也因於脾胃太弱不能生金又兼心火太甚灼乎肺金氣上升散行於目故也宜服補肺散方見七問點推雲散方見十四問服平胃散洗心散黃耆蜜炙甘草當歸防風升麻荊芥白芷水煎服平胃散黑豆沙澤瀉當歸枸杞白醜黃芩共研細末服第六十三回目有肉痣者何也答曰用手法微破之點珍珠散或在兩角可取去血點推雲散方見十四問宜服地黃丸方見四十八問服返睛丸方見五十五問第六十四問目有睛上浮翳與黑白不相黏者何法治之答曰可用手法將銅鉤鉤起上皮繫於鬢上再點珍珠虎液膏或點水眼藥第六十五問目昏不痛日出暴淚者何也答曰腎陰虛並心陽亦虛也宜點珍珠散服益陰腎氣丸益陰腎氣丸澤瀉茯神生地丹皮山藥當歸柴胡熟地人參山萸肉五味子遠志各各錢石菖蒲四錢蜜丸鹽湯下第六十六問目患花翳白陷者何也答曰肺金被心火剋制金虛不能平制肝木木反侮金腎水又枯不能制火更旺而肺金益虛宜服補腎丸點水眼藥補腎丸人參白蒺藜白朮杏仁蒼朮蛤蚧玉屑白石脂車前子金櫻子旋覆花五味子黃精各等分共為末每服二錢米湯下第六十七問目有卒然淚出如傾陡然翳膜花者何也答曰將錢合在上胞居中用燈芯火灸錢孔中一壯將錢埋在灶前地下即愈第六十八問眼有野外忽然飛絲入目疼痛不已何法治之答曰可以服糖煎散點玉露霜一二次即愈或用京墨汁點如麥稻芒屑入目內用大麥煮汁洗之塵物入目用食鹽沖水洗之又天絲入目用鱔魚血點入以燈心卷出即愈糖煎散防風大黃當歸赤芍荊芥甘草川芎牛蒡子防己各五錢膽草四錢水煎入砂糖調服第六十九問目有順逆生翳淚多羞明者何也答曰胃受寒脾受熱心腎兩虛宜服補心散方見六問補腎丸方見十一問點推雲散方見十四問第七十問目有障如偃月而疼痛者何也答曰肝經不足肺氣太過為金剋木宜服湯泡散又服補腎丸方見六十六問湯泡散當歸赤芍黃連蟬蛻共末滾水泡每服二錢乘熱熏眼溫服第七十一問目有內障一聚一散如雲掩者何也答曰乃是五臟餘毒風熱上攻有進有退故也宜服羊肝丸點推雲散方見十四問並點水眼藥羊肝丸羊肝一具洗去筋膜黃連三兩當歸一兩蕤仁去油一兩先將羊肝入砂鍋內煮爛後入黃連等末搗為丸梧桐子大每服五十丸米湯下第七十二問目有障膜形如垂簾者何也答曰頭風引邪不能四散攻入於目宜服二神散點珍珠虎液膏二神散車前子菟絲子酒煮五味子枳殼熟地當歸共為細末蜜水調下以上七十二症方治俱系異授審視明悉對症用藥手到病除真能令人有重見天日之功眼丹敗毒黃連丸黃連甘草連翹羌活各一兩共末蜜丸梧桐子大每服五十丸白湯下上下眼丹流氣飲芍藥茯苓防風甘草柴胡羌活獨活川芎青皮紫蘇荊芥麥冬連翹石膏水煎飽時服夏月加黃連赤眼神效八寶丹當歸一兩防風一兩川連一兩朴硝二兩杏仁去皮尖二十枚銅青二錢郁李仁去皮四十九粒白礬五錢以上八味俱要秤准分量以生絹包之如梅子大放碗內傾滾水泡一時再隔水燉熱熏洗一日五次眼科經驗各方瞽目重明經驗方雄雞膽七個繡花針七隻每膽用繡花針一隻插入膽管取絨線紮緊管口用天泉水十六兩瓦瓶盛貯將膽針浸於水內蓋好勿泄氣放在有風無日處俟三年後其水及膽汁俱化為膿汁每日蘸汁搽眼上約三個月能使眼障消去瞽目重明此方一料能治兩人如有預為制好以備送人者福壽加增功德誠無量矣洗眼神效方昔彰德太守兩目不明已二十餘年矣無方可治忽有神人傳授此方須於端午日午時取備效驗如神杏葉十片無根水一碗煎至八分澄清洗之此方依期洗至一年目如童子已醫好百餘人凡善士流傳抄寫濟人獲福無量洗目日期開載於後正月初八日二月初十日三月初五日四月初一日五月初五日六月初七日七月初七日八月初九日九月初七日十月初十日十一月初九日十二月二十二日仙傳異授洗眼方此方專洗紅爛眼邊或內有蟲時常發癢或內有風見風流淚或從幼時痘後所得終年累月紅爛眼邊眼毛俱無皆可洗治輕者洗半月重者一月雖久患至數十年亦能除根永不復發其效如神惟不治時熱火眼真正蘇薄荷淨葉每二兩約用老薑八兩搗汁拌浸一二日攤開陰晾乾每次用二錢裝盛夏布口袋內入茶罐內加水一茶杯煎沸每日熱洗三五次眼要微開初洗微痛數日後變癢有效夏月每日更換冬月三日一換如草薄荷則不見效治風爛眼方白礬銅綠花椒各等分外加槐樹條六寸水煎洗又方爐甘石童便煅過研細末三分當歸二分膽礬一分用滾水沖泡時時燉熱洗之極效洗諸般風火時眼經驗方明礬銅綠各三錢研末白果烏梅肉杏仁各三十個先將白果烏梅肉可仁搗爛後入礬綠二味和勻為丸如芡實大用紗袋包裹線扎之投入滾水泡出綠水以青布時時洗眼極效又方當歸黃柏防風杏仁各一錢甘草銅青膽礬各二分水煎先熏後洗洗眼邊發爛方爐甘石黃連銅綠各五分共槌碎用清水泡露一宿燉熱頻頻洗之洗遠年雙目不明經驗方桑樹皮一兩燒灰水一鍾煎八分去渣洗一年雙目復明又方黃連桑葉生薑三味同煎湯洗均經驗洗時熱火眼紅腫疼痛方川黃連三分黃柏白礬銅青各一錢用水煎濃露一宿時抹洗之又方生薑切薄片四圍貼皮上極效又方以童便洗之或以自己小便滴入眼內更簡便尤效石灰入目生山梔煎濃汁不住手連洗一二時痛止腫消奇驗雙目腫大五倍子煎水洗之諸物入目或麥芒入目用大麥煮汁洗之天絲入目遠近患眼翳目攀睛幾欲成瞽均治雞冠花子一錢野菊花五錢蔓荊子一錢三味共煎水先熏後洗洗完又用陳柿蒂三個放陰陽瓦上焙乾研末加冰片少許水調塗搽不旬日即愈痘風眼迎風落淚因痘後起者無論年月遠久可治枯礬皂礬各一錢川椒五分清晨用滾水衝於碗內上用棉紙隔著將銅錢一個壓於紙上待自來清水每日早午晚溫洗三次緊閉目只洗眼皮每服可用三日七十二種眼症統治方羊膽一個入蜂蜜一錢用線紮緊兩手揉勻白水煮一滾即取出用涼水浸半日去生水傾內汁點之治眼皆效多年青盲白太生子目未開時取犬乳時時點之犬子目開眼亦愈目熱赤痛田螺一個入鹽花少許取汁時時點之熱退痛止兩目紅腫赤痛田中潔淨柔泥搓丸撳扁貼兩眼皮一夜兩次立效若睡熟候醒方換紅赤