為末搽之又方生黃柏八分生黃連五分兒茶少許生研細末擦之又方乾薑黃連銼末泡水噙之又方硼砂兒茶薄荷各一錢青黛二錢冰片五分共為細末搽之均效口出臭氣胃熱紅砂糖調水漱口可解或用大茴香煮羹食亦良口臭兒茶四兩桂花硼砂薄荷葉各五錢甘草熬膏作餅含口中噙化名香茶餅口疳及口癰橄欖核燒存性鳳蛻即抱小雞出後蛋殼瓦上燒存性兒茶各三錢共研細末每用一錢臨時再加冰片三分口舌糜爛三焦實熱黃連黃柏黃芩梔子炒黑細辛乾薑各等分為細末先用米泔水漱淨口然後搽藥吐咽不拘又方陳白螺殼燒灰存性加兒茶少許研末吹敷即愈口舌糜腐大紅薔薇花之葉忌火炒研成細末加冰片少許搽擦如冬月無葉用根亦效口疳驗方人中白六分龍骨二分冰片五分硼砂黃柏熊膽各一錢研極細末吹入患處極驗又方人中白八分青黛五分雄黃二分冰片五釐共研末吹患處亦效口吐清水用艾葉煎湯當茶飲之舌上生胎薄荷泡湯含漱並治口臭又諸疾熱胎用布蘸井水抹後再用薑汁時時塗之舌菌生舌上出血不止即不救五倍子炙烏梅去核炙各三錢糠綠三分共研細末糝菌上以小膏藥蓋之方能久留於舌上日日換之愈後止木舌腫硬不痛糖醋時時含漱之又方百草霜海鹽各等分為末井花水調服舌腫塞喉朴硝白礬各等分研細塗摻舌上即愈舌伸出不能入蓖麻油蘸透紙上作捻燒煙燻之即收入舌忽發脹滿口不能出聲蒲黃頻摻舌上如因寒起須加乾薑末等分舌長數寸以冰片研細搽之即收番木鱉刮淨毛切片四兩川連四錢水二碗煎一碗將舌浸下即收統治男婦木舌重舌此症系腸胃中之遺毒生大黃天花粉各二錢紅胭脂系藥名五分以上三藥浸麻油內露一宿將油時時塗搽舌上即消舌上出血如簪孔者香薷一握水煎濃汁飲之治心煩躁熱並效仍以槐花炒研末摻舌之方最為效驗又舌硬出血木賊煎水漱之舌衄出血用生蒲黃研細末擦舌上或用槐花末亦可皆極效又隨用麥冬去心一兩黃連五分連翹三錢燈芯二十根水煎服即愈治重舌經驗方陳醋一碗五靈脂一兩入銅杓內煎三沸為度離火即用竹箸攪勻候冷將醋少許頻含待涎沫滿口即吐勿嚥下吳江黎里鎮某以此方治重舌之症立見其效治重舌方兼治牙關緊閉金錢薄荷焙乾一錢青黛三分冰片一分二釐火硝一分硼砂五分殭蠶一大條焙乾去火氣壁錢即喜子窩陳久者妙火煅一分共為細末吹舌上下立消人咬舌斷方蟹一隻火煅存性沒藥共研細末勻先用木賊草煎湯漱洗後將藥末敷上舌即長好如舊又補舌方生蒲黃真紫降香五倍子好東丹飛淨各等分研細末頻擦患處即能長肉舌腐潰爛如舌破腐爛疼痛異常飲食難進者用地龍十條即曲鱔吳茱萸五分共研和生面少許醋調敷兩足心以絹縛之立效如神搶舌風因飲食而生者舌忽腫脹用韭菜汁以童便和服即愈又搶舌風穿後余血流下全不思食用白礬一兩瓦上焙枯研末陳糯米酒沖服腮嘴部兩腮紅腫百合一斤山芝麻根一錢去皮貝母一錢元明粉一錢銀硃七分加白麵調敷又方赤小豆末敷之均極效兩腮腫痛生大黃末用蔥汁調塗四圍露頂敷數次即愈風熱腮腫用絲瓜燒枯存性研為末水調搽數次即愈痄腮又名撐耳風赤小豆研末水調服即愈凡一切癰疽發背初起皆可以赤小豆敷之屢見奇效又方生大黃一兩木香薑黃檳榔各三錢共研細末醋蜜調敷中留小孔干則再換連敷數次即愈又方用靛青調搽數次即愈抱耳風即撐耳風用慄樹子去肉將殼煎水洗之隨用靛花搽塗干再復搽或用鹿角以醋磨搽之皆極效撐耳風方此方治撐耳風紅腫作熱甚至大便閉結小便黃赤口渴身煩等症酒炒黃芩錢半梔仁錢半花椒二錢連翹牛子防風各二錢酒浸生地三錢紅胡薄荷膽草酒洗澤瀉甘草各錢半升麻五分大便結加熟大黃二錢水煎服二劑外用燒酒調靛腳搽之即愈嘴唇紅腫而癢名羊胡瘡片糖即廣糖白蠟二味相和蒸融塗之立愈大笑脫腮烏梅搗泥為餅塞滿牙盡處張口流涎隨手掇上下頦脫落患者須平身正坐令人以兩手托住下頦向腦後送上關竅隨用絹條兜頦於頂上須避風外用天南星研末薑汁調塗兩頦過一夜即上次日當再服煎劑用下方臺黨參制白朮白茯苓製半夏各五錢當歸殭蠶各二錢天麻陳皮各一錢川芎甘草各八分制附片六分燈芯四十根生薑三片水煎服唇裂生瘡瓦松一枝橄欖二個燒枯存性加生薑汁食鹽少許共搗極爛塗敷甚效治嘴爛極凶者生大黃三錢丁香十粒綠豆二錢研細開水調敷兩足心嘴唇生疔即名翻唇疔昨有程姓婦晚飯後嘴唇忽起疼痛身發大寒大熱次早頭面紅腫牙關緊閉勢甚險惡即內服煎劑外用蛔蟲洗淨加冰片搗爛塗敷嘴唇服藥後肚腹大瀉嘴唇流出毒水漸漸腫消紅退數日全愈惟雞魚羊肉薑椒辛熱發物煎炒厚味概宜禁口元參三錢生軍四錢黃芩二錢牛蒡子二錢角刺尖二錢忍冬花三錢白芷二錢木通三錢麥冬去心三錢酒洗全蠍尾八分當歸二錢麻仁四錢水煎服肚腹瀉後而愈此近日經驗方也凡患嘴唇生疔即查照卷十一頭面諸疔方內在大腿彎中如刮痧樣刮現紫筋即用瓷針刺破擠去惡血最為嘴唇疔瘡救急捷妙之法再以蛔蟲加冰片搗爛敷之即刻瘡口流出毒水腫消痛止神效之至痄腮腫痛用兩手從臂上抹至兩拇指間四五十下以繩扎住以針刺少商穴男左女右出血即愈重者再多刺或刺七指九指出血更見速效再以靛青花敷之或用赤小豆研細末陳醋調敷如干常潤之又方用升麻川芎連翹牛子白芷各錢半黃連八分水煎食後服如腫至太陽加羌活一錢腫連耳後加山楂柴胡各一錢咽喉咽喉部位夫咽喉者左為咽屬胃右為喉屬肺乃一身之總要百節關頭呼吸出納之門戶也咽在喉之後主食通胃即為胃管俗名食喉又名軟喉者是也喉在咽之前主氣通肺即為肺管俗名氣喉又名硬喉者是也咽與喉同在舌下舌是咽喉總系又有會厭居咽喉上以司開闔乃聲音之戶凡吞嚥必舌抵上齶會厭即掩其氣喉使飲食入咽而直下不掩則飲食溢入氣喉必嗆咽喉會厭舌四者交相為用缺一則飲食即廢矣咽與喉二物也雖同在舌下而門路各別喉者肺管呼吸之門戶主出而不納通乎天也咽者胃管水穀之道路主納而不出通乎地氣一出一納實為一身之關要云喉痹者謂喉中呼吸不通言語不出而天氣閉塞也云咽痛及嗌痛者咽之低處名嗌謂咽中不能納唾與食而地氣閉塞也云喉痹及咽嗌痛者謂咽喉俱病天地之氣並閉塞也如此關要之地是以病則命如懸絲治之不急術之不良藥之不精何能救人性命於危急之頃也茲將臨症要訣及寒熱虛實各種病症內外方藥各樣治法逐項詳細註明誠能細心揣摩無患術之不精矣臨症要訣夫人五臟六腑十二經脈除足太陽經其餘十一經皆內循咽喉盡得以病之不獨肺胃也但有陰陽表裡風濕寒熱虛實緩急輕重之不同不得其傳何能辨認臨症看喉之訣最要手輕眼快切莫心粗氣浮無令富貴貧賤老幼男女必令患者朝明處而坐使人將患者靠扶其背手托其頭醫者用壓舌片或竹片或竹筷按其舌根以便看其喉中左右上下內外如何形勢或紅甚或腫甚痛甚或微紅微腫微疼或紅甚痛甚而不腫或不紅不痛而只腫或不紅不腫且色白而疼痛或有形或無形或來勢急發於頃刻或從容柔緩起於數朝或喉里喉外皆紅腫或頭頸腮頤並腫紅或因瘟疫大渴或感風寒發熱惡寒或已灌而不能速潰或潰後余腫不消或破爛或誤針既看其喉再觀其舌有胎無胎或黃或白或潤或干或灰或黑又看兩唇淡紅淡白紅甚而焦或紫且黑視表症之真假審二便之通澀聞口臭之微甚察飲水之冷熱寒熱自分虛實迥別大抵咽喉病症因風熱者十之七因火症者十之三因寒症者百中不過偶有一二也臨症切宜詳細審辨無非望聞問切咽喉性命攸關倘若潦草了事貽誤非淺常見富貴人及婦人輩懶於下床看喉者斷不可曲從恐其床上看不明白看視既已不確下藥有何把握最宜詳慎不可忽略此皆臨症要訣實屬心法真傳如能遵守而行無不神乎其技矣其辨症治療以及修治丹散諸法並內外醫藥各方悉詳於後是在臨症者視病之輕重緩急酌量加減用之活法靈機從心之巧妙也凡喉症初起診右寸脈浮緊肺風也兩關浮數胃火肝風也左寸浮洪心火也右寸遲沉肺伏寒也沉細者肺伏熱也右尺洪大三焦火旺也右寸浮洪而有力者腎虛火也紅腫而脈浮者風火也脈細數而浮者虛火也脈沉實爛而不腫者毒也細緩者虛寒也兩關脈浮者非結毒也脈略如此細診詳參以類推之可也口內上齶屬胃陰下齶屬脾陽舌之中屬心舌四圍屬脾舌根亦屬心小舌又名蒂丁屬胃喉之左右舌根屬肝牙根上屬胃下屬脾舌苔白主寒舌苔黃主熱焦則熱甚黑則熱極凡舌苔不僅論色尤當分別或潤或燥但潤澤者非真熱焦燥者必無寒也另有時疫白喉一種起病惡寒發熱切不可誤認為表及到喉中現出白點白塊尤不可誤認為寒倘妄投麻桂羌獨升散其毒及犯參耆薑附補助其毒雖有仙丹不可救矣凡患喉症一切勞腥油膩及姜椒辛熱發物概當禁絕至要至要專治時疫白喉症論白喉有時疫一症其發有時其傳染甚速或一人患發竟至傳染一家甚至一鄉一村皆發其症至危至險最急最惡之症也若不急治即能殺人而治者不得其訣以致束手無策然非臨症日久莫能知治此症者有十難焉昔陳雨春先生論云此症乃足三陰受病傳之於肺與他經無涉其有兼及他經者亦皆病後之傳變者也何者此症初起舌微硬舌苔黃頏顙微腫喘渴心煩夫十二經中惟太陰之脈上膈兵咽連舌本散舌下少陰之脈循喉嚨挾舌本厥陰之脈循喉嚨之後上入頏顙下絡舌本凡病此者兩關及左尺脈多沉數而躁以此觀之病屬足三陰明矣時未傳及他經不察其源治以他經之藥其難一也大抵此症初起惡寒發熱頭痛背脹精神倦怠遍身骨節疼痛喉內有極痛者有微痛者或尚有不痛者初無形跡可見的似傷風傷寒表症若投以麻桂細辛羌防升柴蘇散之類致毒渙散無可換回其難二也彼其惡寒發熱乃毒氣初作於內至二三日喉內業已現出白點或白塊寒熱自是消除醫者不悟誤以為表藥有功豈知白喉現出即不服表藥而寒熱亦除其風熱喉症尚可稍用表藥或荊防敗毒散之類惟白喉一症表藥最所當忌其難三也按此病熱症多而寒症少有以色白而指定為寒症者不知此症初發於肺肺屬金其色白為五臟六腑之華蓋處至高之位毒氣自下熏蒸而上肺病日深故其白色日著治宜解三經之毒使之下行勿令積蓄於肺若因色白擬為寒症以附桂炮姜熱劑投之一遇火症是謂抱薪救火愈熾愈烈其難四也即有知白喉為火毒不可輕用開提升散之品使之上升愈加壅塞而起初即以芒硝大黃下之亦非所宜不知此症已傳至上焦氣分與中下焦無涉既上焦氣分受傷又以硝黃攻發太過使中下焦有損元氣愈傷其難五也見症已確服藥尤當守方此種惡症有火毒最甚者初起用消風敗毒引熱下行之劑治法良是乃日服一劑而白仍不退藥力太緩連服數日只得數劑而白愈見有加是猶杯水車薪與事無濟治者當詳審病源或舌苔黃黑或喉干唇焦小便短澀微黃大便泄瀉帶黑是為火毒凝結內不能除白何能退遲延日久以至愈發愈多法當守方急急救之似此惡症每日必須三劑方可有效若病急亂投另更別方必致變生不測其難六也察之既精圖治不容稍緩此乃瘟疫之變症殺人最速過七日不救庸醫辨症未明投以平淡之劑不求有功但求免過是謂優容養奸迨延至五六日毒已重矣元氣傷矣善治者不得不以猛劑攻之然病已垂危成則無功一旦不起病家不歸咎優容之過而反云猛劑非宜此非誤於後而實誤於前其難七也有非白喉而轉為白喉者初起喉痛紅腫或惡寒發熱或不惡寒發熱或一邊腫名曰單蛾或兩邊腫名曰雙蛾治之稍緩則氣閉不救宜用土牛膝引熱下行大便閉用大黃否則不必用此與白喉症異治同倘不預防轉為白喉為禍甚烈其難八也又有勞症白喉陰虛火燥痛極而水米難下甚至腐爛形容枯槁面目憔悴必須養陰補劑使元氣充滿而喉痛自愈若以時行疫症白喉誤認陰虛差之毫釐失之千里其難九也更有一種白喉無惡寒發熱等症喉內起白皮隨發隨長時作惡心乾嘔欲吐的是寒症非附桂不愈即誤服消風敗毒之藥亦無大損若以時行白喉疫症認作此症為害不淺其難十也知此十難臨症審治十不失一咽喉系性命關係之處務必細心詳察切不可忽略照此法行之數十年無不效驗當茲時疫流行不敢私秘謹將治法看法方法以及吹喉藥散一一開注於後非敢云濟世之良方亦足為刀圭之一助云耳白喉症看法治法夫白喉一症乃感天地不正之癘氣即時行瘟疫之變症也南方最盛近來北方亦往往有之此症醫家多不曾經見最易誤治治不得法無不斃命其症初起作寒作熱或頭痛背脹或遍身骨節疼痛心胸梗塞喉內或痛極或微痛或不痛或喉內微硬似卡非卡或漸腫而漸漸即現小白點者或先紅紫而後現小白點者有隨發而白隨現者有至二三日而白始現者或由白點白條而長成白塊漸漸滿喉皆白者此極惡之險症也毒甚者白點最易長大是以五六日即斃命者皆由喉中白塊長滿閉塞故也發雖不一治法皆同凡遇惡寒發熱有似感冒之症當問其咽喉疼痛否必先看其喉中紅腫否切不即用表散之劑倘遇白喉險症誤用表藥則輕者必重重者不可救矣務將患者坐嚮明亮處使人扶靠醫者用壓舌片或用竹筷將舌壓平詳細看視果系白膜如輕者即以元珠丹用小竹管向患處不歇時刻連連吹之使其吐出痰涎即將除瘟化毒散神功辟邪散酌量加減煎服一二劑無不應手而愈矣倘遇白喉重症一時半刻白塊愈長愈大若不急急醫治及至喉中白塊長滿加以痰涎壅結腫脹閉塞滴水難下雖有仙丹無能為也是以白喉初起切不可疏忽必得急急醫治吹藥服藥刻不可緩吹藥之時尤必將舌根壓平看明患處務將吹藥對準患處吹之如不曾吹中再又補吹方能見效切不可敷衍了事以人性命為兒戲耳若在黑暗處病者口不甚張開舌又不曾壓平隨便吹之藥並不曾進喉或在口中或在舌上吐痰涎時早已連藥一併吐出矣何能見效白喉重症每日服藥總非三四劑不可倘或服藥之際半吞半吐或每日只服一劑半劑何能見效咽喉之難治往往如此只謂醫藥無靈殊不知實皆疏忽之咎也即或服藥吹藥雖能按照此方而緩緩試之仍是無濟病勢重而藥力輕毒氣內攻以致白塊愈發愈多日甚一日肺管閉塞痰涎壅結喉中時作鋸聲不可救也此乃遲延日久之誤果能急急醫治將元朱丹對準患處刻刻吹之並宜留心看視左邊白有幾點右邊白有幾點或白點漸漸收小或白塊缺去或白中稀疏或白漸微薄或白轉黃色可無虞矣久之必然退淨白喉不治之症白塊自落喉中鋸聲音啞無聲喉干無涎兩目直視痰壅氣喘七日不退面唇俱青藥不能下服藥大便不通未服藥大便泄大便連泄不止白喉症用藥初起用粉葛殭蠶蟬蛻以散風熱以牛子連翹金銀花土茯苓消腫敗毒生地黃芩元參梔仁豆根麥冬石膏清熱木通澤瀉車前子引熱下行重者再加馬勃龍膽草馬勃為喉科必要之藥外用生鮮牛膝兜搗碎煎水當茶湯時時服之或以生鮮萬年青搗汁或服或噙或時常漱口為妙喉症輕者以除瘟化毒散主之重者以神功辟邪散主之再重者以神仙活命湯主之輕則日服一二劑重則非日服三四劑不可將疫毒由上焦引至中焦由中焦引至下焦從大便出大便泄瀉火毒下行此為吉兆大便閉塞少加熟大黃少加元明粉如仍閉塞改用生大黃大便泄即去輕者服十餘劑即愈重者竟有服至二三十劑者總以白點退淨為度其藥味分量之加減劑數之多寡須臨症制宜總不外乎以上各藥不必另更別方連日趕緊服之自然全愈屢試屢驗白點退完當用清涼之品以清心滌肺湯主之日服一劑消盡餘毒無須過服補藥恐餘毒未盡也是在臨症靈機活法行之以上白喉治法凡單蛾雙蛾以及喉癰喉痹纏喉風走馬喉風風熱喉嚨並喉內紅腫等症總不外乎如此湯藥皆可依法治之其吹喉藥末總以元朱丹為第一靈丹也統治各項喉症元朱丹無論老幼男女孕婦小孩單蛾雙蛾喉風喉痹以及纏喉鎖喉喉癰喉癬諸大險惡之症時行瘟疫白喉並陰虛火燥風熱紅腫喉科七十二症皆可吹治百試百驗萬救萬靈誠起死回生之至寶靈丹也精製元明粉五錢依法煉製必要揀選明亮潔淨牙硝漂淨硃砂一錢用水漂淨曬乾聽用真硼砂五錢選通明透亮有微黃者頂上梅花大冰片八分先將硼砂用瓷乳缽乳極細末忌用鐵器再將元明粉加入共乳極細然後將硃砂冰片合入又乳千數下研得極細如同眼藥一樣用緊口瓷瓶收貯加蠟封口勿令泄氣為要倘收存日久必然凝結成塊臨用之際再加冰片再乳極細惟製藥必須精製虔誠諸當避忌勿令不潔淨之婦女經手有心濟世者預為修制與人方便自己方便制煉元明粉法每年冬月俟天氣嚴寒將要凍冰之際用皮硝四五斤以大瓦缽盛之用開水泡入溶化另用大砂鍋一個或大銅鍋亦可蓋上新布一層將溶化硝水由布上瀝過鍋內以便將泥砂格去再用大白蘿蔔數個切作數塊併入鍋內用小火漫漫煮之俟蘿蔔熟而且爛將蘿蔔撈去再用蘿蔔數個再煮總以硝水咸藉蘿蔔煮去為度仍以新布蓋瓦缽上均須洗淨泥砂將鍋內所煮硝水漫漫倒入布上瀝過瓦缽內去布如此泥砂鹹味俱去將缽放在露天當中凍露一宿俟瓦缽內結有明而且亮者為牙硝取下攤紙上風乾裝入瓷瓶內聽用缽底下結有泥砂者不可用天氣稍為晴暖不結必須大凍結冰天氣最妙咽喉急症異功散喉腫喉閉險惡喉症皆可通治斑蝥去翅足糯米炒黃色去米四錢真血竭六分乳香六分沒藥六分全蠍六分元參六分麝香三分冰片三分共為極細末瓷瓶收存封口勿令泄氣如遇喉蛾喉閉等症用尋常膏藥一張將此藥末如黃豆大放膏藥上貼患處外面脖間二三時即起泡速揭膏藥不可稍遲用瓷鋒將泡挑破即愈如險症起泡更速屢試屢驗喉腫敷法凡腮頰偏腫咽喉腫痛痰涎壅塞滴水不能下咽者用馬齒莧二斤不見水搗入白麵八兩陳醋一兩和勻敷腫處口含升降散即能下咽半日腫消如失再酌服升降散以清餘熱升降散此乃治瘟要藥白殭蠶四錢酒炒全蟬蛻二錢廣鬱金六分生大黃八錢共為細末每服二錢用黃酒白蜜調勻冷服丸藥救急方明雄一兩川連八錢薑黃二錢巴豆一錢去淨皮油共研細末水糊為丸如桐子大看病之輕重酌用至多者以十七丸為度少則或十三丸九丸七丸五丸不等如不及為丸即用藥末吹入喉內以津液嚥下亦可必須大下方保無礙預防喉閉方初覺咽喉腫痛即用硼砂含化咽津吞下可保無虞又方用巴豆一粒將棉包好塞鼻孔中男左女右咽喉腫閉欲死者切不可用針恐防咽喉穿透急用牙皂研細末吹鼻取嚏其腫自破或兼用牙皂末醋調厚敷頸外干又再敷其腫即破或仍以李樹近根處皮磨水塗喉外均極效蛾喉腫閉麻雀屎二十一粒砂糖少許和成三丸每用一丸以薄綿裹之吞嚥下甚者吞至三丸即愈一切喉毒燈草燒灰加冰片吹入極效又看頭上生有紅髮即扯拔去之其毒自解又用吳茱萸研末醋調塗足心其毒自下又食鹽燒紅為末溫水調以鴨翅毛蘸掃患處取吐痰涎不可刺破吹喉藥末方珍珠二分置豆腐中久煮易研青黛五分黃柏二分薄荷一分硼砂二分川連一分射干三分山豆根三分白殭蠶一分冰片一分共研極細末日夜頻吹立愈又方珍珠一分半犀黃一分真熊膽一分麝香五釐冰片一分川連五釐琥珀二分瓜霜二分飛雄砂分半雄精二分蒲黃三分硼砂二分孩子兒茶三分共研細末日夜頻吹功效尤速又方真犀牛黃一錢二分真梅花冰片一錢二分制爐甘石三錢二分硼砂三錢二分真熊膽二錢天竺黃三錢二分制沒藥四錢水飛青黛四錢珍珠一錢二分久制人中黃三錢二分制乳香四錢上藥共研極細末瓷瓶收貯不可泄氣又方水飛青黛五分冰片三分薄荷三分硼砂五錢人中白五分滑石一錢天花粉五分元明粉四分上藥共研極細末瓷瓶收貯勿令泄氣豬膽套藥方臘月初一日收豬膽五六枚用黃連青黛薄荷殭蠶白礬風化硝各五錢裝入豬膽內青紙包之將地掘一孔方深一尺用竹橫懸將青紙包膽掛在竿上以物蓋定俟立春日取出待風吹去膽皮青紙取藥共研極細末如有喉痛以此日夜吹之再加冰片少許更妙蛇床子作煙吸凡遇喉腫喉閉急症用之極效蛇床子一味裝入新菸袋管內作煙吸之煙氣到口喉閉即通如喉痛危困急症夜深一時無藥用力提頂心發立通禿者提頂心皮亦可天白蟻方咽喉生瘡鼻孔發爛並非楊梅毒瘡也即名天白蟻白梅一枚燒存性枯礬一錢穿山甲五分雄黃五分共研極細末日夜吹入喉中自愈人中白散凡咽喉疼痛腐爛紅赤舌腫齒齦滲血牙床潰爛並治男婦大小嘴爛走馬牙疳等症真青黛一錢硼砂一錢龍腦薄荷末五分人中白一錢粉口兒茶一錢元明粉一錢馬勃五分梅節冰片五分共研極細末喉痛以竹管日夜吹之口舌潰爛搽之極效如病甚者可加犀黃三分珍珠五分其效更捷獨勝散統治各種險惡喉風及牙關緊閉等症屢試屢驗神效土牛膝即新鮮杜牛膝選粗大肥壯者一大把勿經水勿犯鐵器折斷搗取自然汁加米醋少許用鴨翅毛蘸汁向喉中擾之取其吐去毒涎以通其氣然後用小竹管將元珠丹頻頻吹入自效如痰涎壅結牙關緊閉不省人事即用竹箸將牙關撬開灌之或灌入鼻內得吐亦妙鎖喉風乳蛾喉閉急救方用豬牙皂角和醋搗爛取汁滴入喉內四五匙痰涎大吐後以便將元珠丹吹入再將所餘之醋搗牙皂塗敷痛處頸上外面干即易之其乳蛾即破喉閉即開而愈極效又方牙皂研細末一錢以雞子清調如膠緩緩嚥下取其吐出痰涎又方用蜒蝣俗名鼻涕蟲和陳鹽梅子或烏梅肉搗爛含入口中吊起毒涎吐盡極效又方以萬年青根搗汁灌之皆系取吐出痰涎之妙法凡治鎖喉風喉閉險惡喉症總以取吐出痰涎為主多有得生者又方用生白礬研極細末五分雞蛋一個取清去黃將礬末入雞子清內擾勻灌入喉中極效治咽喉急症神效方橄欖核生研極細末一兩人退即人指甲砂炒三錢壁錢即壁上蟢窩一錢瓦上焙燥風化硝三錢硼砂二錢梅花冰片五分共研極細末瓷瓶收貯用時以小竹管吹入喉內立愈喉閉者吹之即開生橄欖製法臘月中收取爛橄欖不拘多少斤用雙層蒲包盛之粗稻索捆好交冬浸入糞坑內至來年立夏後取出去肉不可著水埋無雨迴廊土內七日或十日取出蘆蓆攤曬坼裂勿經雨露放石臼內打碎再研極細末聽用壁錢製法平日預為收取壁上蟢蛛窩用陰陽瓦鋪生白礬以壁錢安置生白礬上再以白礬鋪蓋上庶免燒成灰止須煅枯存性凡壁蟢窩在竹木上者不可用風化硝製法冬月用大白蘿蔔挖空中實滿皮硝風乾至對年取用夏用黃瓜或西瓜亦如法制倘一時不有或即用前精製元明粉亦可又方香瓜蒂風乾若遇咽喉脹結不及措手急取三四枚或泡湯或嚼汁嚥下即開後急用元珠丹吹之青黃散此散無論喉風喉閉一切喉瘡喉毒等症均能吹治之屢經效驗青魚膽一錢黃瓜霜一錢梅花冰片一分共研極細末用瓷瓶收貯勿令泄氣吹時俟喉中流吐痰涎即愈制青魚膽法冬月取大青魚膽每個入糯米數粒在內勿將膽中苦水傾出掛在背陰處風乾聽用制黃瓜霜法揀老黃瓜用竹刀將瓜蒂切下挖去瓜子瓜瓤用皮硝貯滿瓜內仍將瓜蒂蓋上拴好掛在有風無日處待霜結瓜外掃下聽用倘瓜爛無霜將硝倒出仍可換瓜重製每制必須多備幾條恐防瓜爛又方用上好膽礬冬月取青魚膽汁和勻成塊瓷瓶內陰乾刮下再加冰片少許乳極細瓷瓶收貯吹喉極效如牙關緊閉口不能開用鴨翅毛醮藥掃兩牙縫牙底令其浸入喉內流出痰涎少頃口即開矣其藥末陳過一二年尚可吹用咽喉通閉散治咽喉腫痛滴水不下吹之即能消腫止痛簡便易制而且極效青鹽一錢白礬一錢硼砂一錢元明粉一錢共研極細末吹之吐盡痰涎即愈咽喉回生丹此方治喉痛咽哽舌忽脹大漸至如脬或舌伸出不能縮入此名霎舌最為凶惡之症治之稍緩即時氣絕無救用皂礬放新瓦上煅紅取放地下候冷去火氣研細末撬開牙關以指頭蘸礬末擦其舌上即醒又方元明粉三分硼砂三分青黛二分膽礬二分殭蠶五分冰片二分共研極細末吹之即愈此方治舌大如脬並治風熱牙痛咽喉冰硼散薄荷硼砂各一錢人中白川連各八分青黛元明粉各六分陳膽星五分山豆根八分冰片五分共為極細末吹喉神效能治一切咽喉各症喉風簡便方番木鱉三個水磨濃汁用瓷器盛之曬乾刮下再加冰片一二分研勻吹喉極效預製冰梅方半熟大梅子一百枚五月五日午時用食鹽朴硝各四兩水三碗入壇內將梅子浸之其水約過梅子三指浸過一宿後再用豬牙皂薄荷白礬硼砂山豆根白殭蠶射干根土牛膝各二兩川黃連一兩共研細末拌入再浸七日取出曬乾又浸又曬總以汁盡為度將藥末黏敷梅上瓦壇收存凡用取梅一枚用新棉包裹含入口內有水先咽五六口後有痰涎吐盡以口內無痰涎只有清水方去梅子最為奇效纏喉風熱結於喉腫繞於外且麻且癢者用牽牛鼻繩燒灰研細吹之甚效再以卷一咽喉門外治各方治之無不神效屢試屢驗又方青魚膽汁裝入瓷盤內曬乾刮下再加冰片少許乳勻吹入喉內能治一切喉症屢見奇效預製蜒蝣法若不預製恐一時無處尋覓平日預為收取蜒蝣不拘多少裝入瓶內加多年陳鹽梅子肉壓之或烏梅肉亦可即化為水遇患咽喉急症即取滴入喉內少許極效如無現成收好者急取蜒蝣一條用鹽梅一個去核包蜒蝣在內扎定含口中其水流至喉間嚥下立愈又方枯礬一錢百草霜二分取鍋臍蒂中之柴炭必要鄉間燒茅草者為佳共研細末以小竹管吹之嘔吐膠涎此二方與鄭一咽喉門臘月八日礬末套豬膽方均須預製為喉風急症嘔痰消腫之要藥也走馬喉風即纏喉風也此陽症之最急最惡者突然而起暴發暴腫轉腫轉大滿喉紅絲纏繞疼痛異常頃刻之間聲音不能出湯水不能入痰涎壅塞脹閉勢如繩索絞喉故名纏喉風若不急治即能殺人治之者必飛騎去救不可稍緩故人名走馬喉風此等急症治法即查卷一咽喉門內喉症各方外治之法用瓷針刺少商穴擠去惡血或先於後頸窩處擦油少許用銅錢一文往下順刮如刮痧樣即刻現點用瓷針微微刺破令人以口吮出惡血不惟可以救急而且斷根永保不發命懸頃刻湯藥一時亦來不及即或有藥斯時何能下咽況藥力遲緩非外治不可救也此法急喉皆妙緊喉風啞瘴喉風弄舌喉風此三症亦纏喉風類也大同小異因其腫脹鎖緊咽喉故名緊喉風咽喉既緊不能出聲故名啞瘴喉風喉中發脹舌脹出口不能縮入時時攪動故名弄舌喉風皆險證也悉以治纏喉風外治之法先行治之旋用元珠丹等吹藥並將咽喉統治各煎方斟酌加減服之落井蛾喉蛾子生在喉窩內為落井蛾喉不能窺探急按魚尾穴及經渠穴查卷一單雙蛾喉便知用燈火三灸再刺少商穴擠出惡血用元珠丹吹之以加減甘桔解毒湯煎服鎖喉毒此症初生於耳前形如瘰癧漸攻咽喉紅腫塞痛妨礙飲食治不可緩以神功辟邪散或神仙活命湯重加金銀花浙貝母煎服如大便閉結小便短赤口渴喜冷惡熱須加酒大黃二三錢如再不通利加元明粉五六分煎服吹藥仍用元珠丹為極妙陽症喉痹喉蛾喉風喉閉纏喉鎖喉瘟疫白喉皆白喉痹痹者痛也病也不仁之謂也陽症者乃實火患臟腑積熱熱甚生風風火迅速鼓激痰涎堵塞咽喉隘地呼吸難通以致頃刻之間牙關緊閉不省人事若不急治多不可救勢甚凶猛藥力一時難以見效先以後頸窩處用香油刮之或急刺少商穴擠去惡血諸外治法詳見鄭一咽喉門內次以元珠丹吹之再將後開咽喉統治各方看病之輕重斟酌加減煎服喉疔亦急症也生喉間形如靴釘尖而且長紫黑堅硬初起麻癢旋即大痛即以除瘟化毒散加重金銀花煎服或單用生菊花連梗帶葉三四兩煎湯燉服或野菊花亦可又方用露蜂房蟬蛻各用火煅存性研末一錢酒調服輕者一服立愈重者連進二服少頃腹中大痛痛止即愈喉瘡即名爛喉此症初起咽喉乾燥如茅草常刺喉中痛而且癢日久其色紫暗不鮮漸漸腐爛時吐痰涎疼痛日增飲食有礙病源由腎水久虧相火炎上或因過食煎炙厚味辛熱等物積熱於胃口臭口渴舌燥苔黃牙齦腫痛口舌破爛乃相胃二火熏肺而成斯疾治當補腎水清胃熱宜甘露飲胃熱甚或丹皮石膏銀花牛子連翹粉葛黃連酌量加減用之或知柏地黃湯亦可服吹藥總以元珠丹為最妙患者戒食雞魚羊肉燒酒煎炙厚味辛熱發物清心寡慾淡泊調養方可醫治不然必致腐爛延開旁生小孔若蟲蛀蟻蝕之狀多不可救喉舌破爛此症多因風熱陽症之輕者初起或微紅微腫不甚疼痛飲食亦無相礙不自提防或因過食雞魚煎炙厚味薑椒熱毒發物或又誤服姜附溫補熱藥火上添油熱毒愈熾以致紅腫疼痛漸漸腐爛成孔愈爛愈寬若不早為醫治或再投以姜附熱藥連小舌一併爛去者多不可救治法先以陳茶葉煎濃汁漱淨喉舌用元珠丹頻頻向患處吹之初進神功辟邪散數劑再用甘露飲或知柏地黃湯看病勢之輕重酌量加減服之非一月半月所能收功也食後切忌煎炙厚味雞魚辛辣熱毒發物酒色尤須禁戒調養半年免致復發或以人中黃研末水沖服極效喉瘤此症或單或雙亦生喉旁不紅不痛飲食無礙與蛾子異不可妄作蛾症治有因病後而生有不知不覺而生或一月兩月而愈或數月而愈有數年而不愈者法宜看平日體氣寒熱虛實緩緩治之仍以元珠丹時常吹上瘤處久久自然全愈切不可動用刀針一經潰爛反致不救大頭瘟喉丹此症初起惡寒發熱口渴舌生苔刺頭面赤腫如匏瓜目不能開咽喉疼痛腫脹閉塞語言不出口流涎水此乃時行瘟疫癘氣為病最為凶惡之症也及至牙關緊閉不省人事不可救矣捷法莫如初起時即用外治之法最為急救之良方先以香油搽後頸窩如刮痧樣刮現紅點處即用瓷針刺破令人口含吮去毒血數口隨又勒刺兩手少商穴擠去惡血再用㗜鼻散或熏鼻等法查照卷一咽喉門外治各法急急施治或可有救以神功辟邪散連進數劑取吐痰涎各方皆可施治仍以元珠丹吹之惟此疫症最易傳染凡在側看視之人須用闢瘟五良法防護自己以免傳染為要闢瘟防護保身良法其法有五切莫空腹入瘟病家看病能飲者須飲雄黃燒酒不能飲者食大蒜塗雄黃酒於鼻中或用人馬平安散或用紫金錠水磨塗鼻孔一也每看病畢即浣手開瓶取㗜鼻散㗜之取嚏二也用明雄黃硃砂蒼朮北細辛牙皂紫紅降香檀香鬼箭羽甘松廣木香公丁香丹參排草山柰以上各一錢麝香五釐冰片三分合研極細合時擇上吉日於淨室中勿令婦人雞犬及孝服人見用紅綢縫三角袋盛之佩帶身上並掛門戶上方內或再加入虎頭骨斧頭木尤妙三也至病家行坐莫離客位切不可起貪淫邪念之心四也丹參炒二兩鬼箭羽炒二兩小紅豆子炒熟二兩各研細篩合勻煉蜜丸如梧桐子大飛過硃砂為衣曬乾每日空心用白滾湯服五丸五也闢瘟良法無法於此醫者病家並宜制用使已病者易愈未病者不染不僅患喉症者之受益已也人馬平安散治瘟疫毒氣及臭毒痧脹腹痛等症冰片麝香飛過明雄飛過硃砂各五分牙硝一錢共為細末瓷瓶緊收勿泄氣男左女右以少許點目大眥用此入時疫病家則不沾染此散並治六畜瘟亦點六畜眼大眥單蛾雙蛾此症生咽喉之兩旁狀若蠶蛾一邊生者為單蛾兩邊俱生者為雙蛾亦有形如棗慄如乳頭者故又名乳蛾病甚者初起仍作寒作熱切不可投以表藥若誤用表藥其腫愈甚凡紅腫無形為痹有形是蛾其症紅腫疼痛痰涎壅塞飲食阻礙無非積熱所致但有輕重之分重者即以老蒜敷經渠穴法最為捷效查照卷一外治各法治之多用元珠丹時時吹上再以除瘟化毒散主治各方煎服以紅退腫消痛止為度近時惡俗竟多妄動刀針以致腐爛久不收功即或暫愈久久復發為害非淺咽喉最忌刀針倘若誤傷蒂丁俗名小舌多不可救慎之慎之為要胎前產後喉痛孕婦喉痛用藥大有不同即平常無病服藥亦須當知忌避而胎前產後尤有分別如芒硝大黃穿山甲皂角刺附桂及雄黃解毒丸開關散等藥皆所禁用其清解法中必兼保護安胎為要輕症緩症以除瘟化毒散或連翹散加減服之重症急症或刺少商穴擠去惡血或刮後頸窩令人吮出毒血或用老蒜和輕粉搗爛敷經渠穴如牙關緊閉以巴豆油紙捻熏其口鼻查照卷一咽喉門喉症各方外治之法最為效驗穩妥實為救急之捷法如喉中痰涎壅塞即以前方蜒蝣梅子或制青魚膽或橄欖核或香瓜蒂泡湯取吐痰涎各方皆可用之不惟孕婦不忌抑且極其效驗吐去痰涎開關後仍以元珠丹多多吹喉中痛處依法治之自然全愈至於產後喉痛治法與胎前又不相同產後惡寒發熱身痛咽喉痛因是產後百脈空虛氣虛故惡寒血虛故熱營衛筋骨失養故身痛虛火上浮故咽喉痛切不可認為表症誤用表散發汗以致變症百出有不測之禍不獨表散當禁及一切極苦極寒之劑皆不可犯所謂胎前不宜熱產後不宜涼之意也產後用藥較胎前更難尤宜慎之至要至要如喉痛輕緩可以無須服藥即用元珠丹多多吹入喉中痛處自然全愈稍重者或再以卷一咽喉門及本卷前開簡便經驗各方酌量用之無不神效此為喉症之輕者誠恐產後服藥有誤致生他病是以不如不服藥之為妙也如系咽喉急症或痰涎壅塞牙關緊閉仍以外治之法急速治之或用生礬雞子清取吐痰涎等方次用元珠丹吹藥若少壯婦女體氣強實或產後已有多日未便拘於前說亦不能不將喉症各方酌量加減服之方能有濟倘若兼有別項病症尤須按症醫治如惡露不行小腹脹痛拒按可加益母草四五錢要青色嫩而有花有葉者為佳不要老黃枯梗或加蒲黃篩取淨粉五靈脂醋炒各二三錢總之產後元氣大虛新血未生凡有頭痛發熱咳嗽咽乾喉痛諸症多屬虛中變現之象切忌妄投克伐之劑遇胎前產後用藥大有分別尤不可不慎也幼小喉痛幼小之病稍大者能言若數月嬰孩有病不能告人人何以知其喉痛也當細察其形每吮乳便啼哭或不能吮乳必令抱兒與明亮處仰其頭以箸按其舌根竹箸恐其擢喉或以手指剪去指甲將指頭按舌更妙看喉中有何形色紅腫否並看明舌上兩邊及上齶牙齦諸處或生上齶癰或鎖喉毒兜腮癰木舌重舌重齶重齦馬牙鵝口瘡之類務看明白以便查照各部按法施治不容稍緩嬰兒臟腑嬌嫩最不耐病且以乳為命不能吮乳延至二三日胃中空虛雖服對症之藥若無胃氣運行多難見功胃氣一絕神丹不可為矣如系喉症急以指頭剪去指甲更要剪去尖鋒磨光磨平以免擢傷嬰孩喉舌將元珠丹黏在指頭上用指輕輕搽入嬰孩口內或又搽在乳母乳上使其嚥下頻頻搽之喉症即愈稍重者將煎方令乳母代服之以喉愈為度雞魚薑椒羊肉辛熱發物乳母必須禁口幼小嬰孩口不能言務要刻刻看視不可稍為疏忽用久制人中黃泡水灌之奇效或用綢絹將人中黃包裹如橄欖式泡濕就向嬰兒口邊如吮乳樣亦妙陰虛喉痛其人平日常有咽乾喉燥齒痛舌痛夜熱夜咳之症偶然受熱或食熱物或犯房勞即患咽喉疼痛紅腫或紅甚而不腫夜甚於晝脈洪數或細數此陰虛也皆由腎中真陰虧損人之腎中有水有火水即真陰火即真陽所云相火龍火即此火也水火同宮水不虧足以濟火足以制火火藏水中自不為患水一虧則火無所濟而無所制遂得逞其炎上之性腎之脈絡挾咽循喉嚨系舌本火不藏源熱必循經絡浮越上衝而為咽痛故名陰虛喉痛雖皆由於火而陰陽虛實與陽症喉痛又有分別陽症之火起於六腑陽分是後天有餘之火實火也故用苦寒鹹寒以直折之陰虛之火起於腎經陰分是先天不足之火虛火也不宜苦寒惟大補其水以濟之以制之並引導斂納之測是矣宜用六味地黃湯加麥冬五味或加酒浸大生地元參酒蒸懷牛膝愈後以六味地黃湯人參固本丸酌量加減常久服之並戒酒色新雞子鴨魚蝦一切助火之物能清心寡慾藥始有效否則不免反復難治癆嗽喉痛此症非盡屬咽喉也皆由陰虛火炎肺腎兩傷或咳嗽或吐血或潮熱喉乾舌燥時痛時止治與陰虛喉痛大略相同或以銀花四君子湯合參麥散兼顧脾胃為要然而甚不易也必其人絕酒色戒氣怒禁食新雞子鴨鵝羊魚蝦煎炒厚味薑椒辛辣發物方可有效陰症喉痹咽喉寒症從來稀少百中不過偶有一二也其症咽喉疼痛既不紅又不腫或且微帶白色口不渴喜飲熱湯而不能多飲小便清而且長腹疼腹冷大便泄瀉手足厥冷身重惡寒喉間清涎成流而出時作乾嘔欲吐舌苔潤而且滑其脈沉而微細乃足少陰腎經中寒症也由其人腎中真陽本虛寒邪乘虛直中其經逼其微陽上浮而為咽痛是無陽純陰之症故名陰症喉痹當知陰陽喉痹兩症病源如冰炭之珠故用藥有天壤之隔況咽喉寒症從來本不多有果系前項陰寒之症尤須審視的確分認明白方可用藥無論冬夏當用四逆湯姜附理中等湯自愈切忌表散清降寒下等劑如非寒症誤用姜附則不可救矣咽喉痛失音咽喉聲啞須分暴久暴病得之皆可治之症如喉痛起於四五日間是暴病也將喉痛醫治痊愈聲音自開如咳嗽聲重吐稠痰惡寒發熱頭痛咽喉紅腫其聲嘶啞此熱結於肺寒束於外也也用清涼之劑煎服用元珠丹吹之俟喉稍愈再用蘇葉荊芥防風枳桔二陳湯劑下散之或因大喊大叫聲嘶微痛失音者當用補中益氣湯皆治暴病失音之成法至於久病失音虛勞症也謂之金破不鳴故多不可治啞喉奇方硼砂一兩元明粉三錢膽星二錢百藥煎三個訶子肉二錢冰片三分共研極細末用大烏梅肉一兩搗如泥作丸如龍眼核大每用一丸噙化咽之奇效除瘟化毒散統治各項喉症初起以及瘟疫白喉纏喉鎖喉單雙蛾風熱火喉等症此係數十年經驗良方切勿妄加修改粉葛二錢殭蠶二錢大生地三錢豆根二錢蟬蛻一錢冬桑葉二錢炒梔仁二錢黃芩二錢木通二錢浙貝母三錢生甘草一錢生青果三個引如無生青果或干橄欖亦可水煎服輕者不過三五劑以愈為度如紅腫不退再服後方神功辟邪散粉葛二錢殭蠶炒二錢大生地四錢馬勃二錢絹包煎蟬蛻一錢金銀花二錢麥冬三錢黃芩二錢木通二錢浙貝母三錢牛蒡子二錢研連翹二錢水煎服加久制人中黃細末以藥沖兌或溫水泡服亦可神仙活命湯龍膽草一錢金銀花二錢黃芩三錢生地四錢土茯苓五錢生石膏三錢木通二錢馬勃三錢絹包煎車前子二錢浙貝母三錢蟬蛻一錢殭蠶三錢用生青果三個水煎服如遇急喉險症每日非三四劑不可不則不效以上三方皆系各項喉症歷年經驗白喉重者尤須守方多服自有奇效如或風熱喉痛或紅或腫喉症輕者均可酌量加減服之此誠喉科起死回生之至寶仙方也清心滌肺湯生地三錢浙貝母二錢黃柏二錢麥冬三錢去心知母二錢炒天花粉二錢甘草一錢黃芩二錢炒殭蠶一錢炒天門冬二錢水煎服日服一劑以二三劑為度體氣素弱者加條參或加生玉竹養正湯生玉竹五錢懷山藥四錢茯苓三錢天花粉二錢大生地三錢女貞子三錢酒芍二錢制熟地四錢寸麥冬三錢去心制首烏四錢加減甘露飲陰虛火燥喉痛酌量加減方天冬三錢去心大生地二錢酒浸酒黃芩二錢丹皮二錢麥冬三錢去心制熟地六錢金釵石斛三錢澤瀉一錢甘草一錢金銀花二錢枇杷葉刷淨毛二錢陰虛火燥喉痛雖不甚痛而時發時愈一時難以就痊用此方隨症酌量加減服之極為效驗知柏地黃湯即六味地黃湯加知母黃柏熟地八錢酒蒸山萸肉二錢酒浸丹皮去骨二錢雲苓三錢鹽水炒澤瀉錢半鹽水炒黃柏一錢酒炒知母二錢炒懷山藥三錢銀花四君子湯臺黨參五錢生首烏四錢懷山藥四錢甘草一錢金銀花二錢冬桑葉二錢雲茯苓三錢以上各方無論何項喉症皆可統治大同小異總不外乎如此等藥其餘隨症加減之藥開注於後酌量用之如白喉兼微黃左邊甚者加黃連牛子羚羊角喉腫加馬勃系喉科最要之藥馬勃必用綢絹包煎用線紮好以免煎出如同糊粥令人難吃金銀花蟬蛻紅腫加赤芍豆根口苦加黃芩口渴加生石膏天花粉痰多加浙貝母川貝母茯苓涎甚加殭蠶頭痛加粉葛菊花大便閉結加生大黃如再不大便再加玄明粉三四分加入藥碗內沖服不入火煎喉痛重症初起每多作寒作熱非外感也切忌表散之藥如誤服羌活防風荊芥蘇葉等藥其腫必甚而且喉腫一時難消其餘生地玄參連翹木通知母黃柏天冬麥冬之類皆可收為常用之藥人參固本丸制熟地一兩天門冬六錢臺黨參二兩大生地六錢寸麥冬六錢蜜為丸每服五錢喉風外治方尋取韭菜地內蚯蚓搗爛和麝香冰片塗喉間外面即愈如無冰片麝香只用蚯蚓即曲蟮搗爛敷之亦可又方用巴豆七粒細辛八分共研細末以綿裹之左邊喉痛塞左鼻孔右邊喉痛塞右鼻孔痛止腫消即速去之又方牙皂研細末用雞子清調敷頸上干再換之咽腫喉閉外治方如咽喉腫脹閉塞口不能開藥不能吹水不能下急用生附子一枚故紙五錢研末和勻作為膏藥二餅大如茶鍾貼腳心中央名湧泉穴冬月以火烘之約一時久喉即開即可吹藥服藥矣蘿蔔汁漱喉方用生白蘿蔔搗汁碗許加入研細雄黃末五分玄明粉五分如喉中腐爛者以羊毛筆蘸汁洗掃如不腐者即以汁頻頻漱口吐去毒涎然後吹入元珠丹喉藥極效爛喉疹仙方此方得自仙授屢經效驗藥雖平淡功效甚大幸勿泛視嬰孩減半孕婦不忌紫石英四錢解煤毒六神麯三錢消面積蒲公英四錢解喉毒杏仁泥五錢消痰火水煎三服即愈菸袋杆擢傷喉用人參三七為細末頻搽傷處即愈又方用劉寄奴為細末搽傷處又方用真淨滴乳香去油真淨沒藥去油二味等分去淨油後再用紙放置微小火上緩緩烘烤極燥方研得細過絹篩再加血竭同研極細血竭必輕鬆者方為真堅硬者假也吹傷處即愈如誤針傷出血不止於三方內隨用一方無不立效諸骨鯁喉凡為諸骨所鯁骨大難嚥者以鵝翎入喉探吐之或用筷子重按舌根即吐或用白砂糖一大匙和銅綠末半匙入麻油少許茶湯調服即吐出如不吐用牙皂研細末吹入鼻中取嚏即出骨小者用威靈仙三錢煎濃法時時噙咽其骨自軟如棉而下又穀皮樹搗爛取汁或煎湯噙咽皆可又方用硼砂一塊含化咽汁脫然而失魚骨鯁喉橄欖研爛水沖連渣服如無鮮者即用橄欖核磨濃汁多飲亦效有鯁傷重至數日不出者用鯉魚鱗皮燒灰水調服或用真象牙磨濃汁飲極效愈後戒食鯉魚甲魚骨鯁喉有人因食甲魚其骨鯁喉延至半月諸藥不效飲食難下舉家倉皇有鄉老傳方取甲魚生眼珠以腐皮裹之拼命吞下即愈又傳云凡卡某魚之骨即取某魚生眼珠以豆腐皮包之拼命吞下無不立效雞骨鯁喉用香油煎滾溫服又方用水仙花根搗汁服或用雞毛燒灰水沖服或用苧麻根搗汁飲之豬骨鯁喉仍以象牙磨汁飲之或用人指甲燒灰吹入喉中即下諸般骨鯁符水法諸般魚骨及竹木刺入喉中清水一碗用濃墨筆寫癸水化為龍行在上一氣飲之倘若不下如法再服一次未有不下者又法立西向東右手捏劍訣左手捏三山訣捧水一杯以劍訣書符於水面上令患者吞其符水其骨自化即以此符空書水面上七次吞之神效又符水法用淨水一碗立西向東左手托碗右手捏訣如前口中唸咒語空書符於水面上飲之神效咒曰此水化為東洋大海咽喉化為萬丈龍潭九龍歸洞吾奉太上老君急急如律令敕木屑嗆喉速用鐵斧磨水灌下喉即愈銅錢鯁喉取雞冠血入喉將銅盆盛水置面前將冷水向小兒一噴錢出吐落盆中田螺鯁喉以水灌鴨將鴨倒懸取鴨涎服之即化百靈丸方通治一切咽喉急症豬牙皂一兩真麝香一錢梅花冰片一錢射干片一兩五錢炒牛蒡子一兩五錢大玄參三兩苦桔梗二兩淨滑石八兩淨雄黃二錢生甘草一兩共為末用好醋及冰糖法煉為丸如高梁子大每服一錢小兒七分此方專治一切喉症惟性太烈體氣結實者方可用若虛弱人則忌當用元參救苦膏元參救苦膏大元參五兩甜桔梗三兩淨梅片八分枇杷肉五兩如無此以浙貝母一兩五錢代之生甘草一錢共為末或煎膏或為丸均可大人重者五錢輕者四錢小兒減半頸項部頸上耳後生瘍雞蛋一個開一小孔采綠萼梅花蕊將開者七朵入蛋內封好蒸熟去花吃蛋如此七次痊愈又方用貓公茨根去粗皮煮雞婆蛋至蛋將熟打損殼再煮吃蛋時以所煮之湯嚥下一歲用蛋一個蛋多作三四次服完隔十餘日集蛋又用銅錢草又名滿天星照前法煮食一次隔十餘日又照前法再煮以愈為度此方已驗又方立夏後採九頭獅子草又名五爪金龍治男病用左手扯治女病用右手扯扯時宜以單雙草纏作記洗淨陰乾每用豬精肉三四兩煮九頭獅子草二兩服數次可愈或已潰爛用陳艾葉陳茶葉陳蒜梗以老桐油罐煎水洗之日洗二三次俟膿血已盡之後以生肌散摻之附生肌散生石膏以甘草水飛過七次用一兩明豆砂三錢月石五錢頂上梅花冰片五分共研極細末凡潰爛用此生肌甚效頸項瘰癧此肝火鬱結而成用消瘰丸服之奇效治愈者不可勝記無參飯上蒸曬乾研末牡蠣用醋煅碎貝母去心蒸各四兩共為細末煉蜜為丸每服三錢開水下日服二次蹲鴟丸此丸治男女大小頸項頦下耳之前後結核累塊連珠癧串不疼不痛或破微疼皮赤潰爛久不收口年近者一料收功年遠者服兩料無不全愈真香梗芋艿十斤去皮慎勿烘炒用竹刀切片曬極干磨成粉以開水泛為丸早晚每服三錢甜酒送下如不吃酒者米湯送下或不磨粉為丸即吃燥片酒下亦可屢試屢驗勿以價廉物微而輕忽之也若將此方廣傳窮鄉僻壤貧苦之人功莫大焉並治喉癬亦效頸項生結核方用生蘿蔔皮貼之若不消連貼數次自愈
