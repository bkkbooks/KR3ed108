body:
  text: 卷十八手部手指上一切疔瘡初起未成者用古泥牆上半中間小將軍草紫根者佳搗爛敷之即消如已成者宜用小刀或瓷鋒將瘡頭刺破即用豬膽一個將膽柄剪去膽汁傾去一半加雄黃二分炙蜈蚣研末一分黃靈三仙丹五分共研勻入膽內攪勻套指上扎好數日即愈螃蟹散治手指縫腫痛不可忍或大指次指中間生毒名虎口毒若不早治即爛手手用鮮活螃蟹搗爛敷上即愈如無鮮者以蟹黃蜜調塗之愈後戒食蟹手指生蛇頭疔用小泥鰍一條搗爛敷之立愈手生舌頭毒用蜒蝣研爛和醬搽一日夜即愈指上生疔瘡俗名天蛇頭用雄黃七分白芷三分共研細末入雄豬膽內調勻將指套入豬膽內以線扎之自愈先將豬膽剪去蓋將膽汁傾去一半方好入藥調勻套指如一次不能全消再換一個以愈為度手生天蛇頭方元參五錢甘草三分共研細末用雞蛋白調搽立效天蛇頭生在指尖者用豬膽一個入雄黃三分攪勻套指上縛二三時即愈又方生鴨蛋二個蜈蚣一條焙研末以一半入鴨蛋內攪勻套指上俟蛋熱再用一蛋入蜈蚣末一半再套指上即消又方大蜈蚣一條曬乾為末紙卷為捻點燃吹息以煙燻指三四次即痛止瘡消真奇方也手指紅腫作痛俗名泥鰍肚用酒調石灰敷之干則再換數易即愈手指手掌受寒濕作痛桂枝三錢真五加皮三錢當歸三錢白芷一錢木通二錢麻根二兩用豬前腳煮藥連湯食之即愈右手痛用右前腳左手痛用左前腳手指砍斷真降香研極細末摻之包以絲棉一次即痊惟七日不可落水不可冒風慎之慎之手生叉指大指二指間為虎口又名叉指取石灰內未曾燒化過之石子和生蜜在粗石上捶融敷患處即愈手掌心生毒手掌心忽腫突成疽晝夜疼痛非常名曰擎疽又名拓盤用元參銀花各二兩生地當歸各一兩紫花地丁五錢貝母二錢水煎服未潰者三服即愈已潰者八服收功又方用水藻如松毛者同生蜜搗爛塗之亦效穿掌毒生手心中新桑葉搗爛塗之即愈愈後戒食鵝肉為要手足疼痛及無名腫毒初起用草烏三五個醋磨塗之或生南星磨塗亦妙手臂出血不止有人右臂毛竅如針孔晝夜出血不止面色潔白身倦無氣用穿山甲炒珠研為細粉罩之用帕扎住立止隨服補血湯數服而愈鵝掌風癬手掌脫皮血肉外露用豆腐熱沫洗之洗後拭乾塗以桐油再用松毛燒煙薰之愈後戒食鵝肉又方用密陀僧一兩為末取出籠熱蒸饅頭一個分為兩開將末撒在饅內合住以兩手把握饅頭使熱氣熏蒸良久不過三四次即愈又方用青鹽防風地骨皮槐條各等分煎水多洗極效又方用蒼耳子仁為末將痂起去香油調搽神效並治牛皮癬又方真蘄艾四五兩煎水入大口瓦瓶內瓶口上用粗麻布數層蓋口縛住將手心放瓶口麻布上熏之待溫以手洗浸如冷再熱再熏再洗奇效又方雄黃甲片火燒熏之數次自愈此呂祖乩傳之方又方艾葉側柏葉煎湯熏洗一月即愈又方用豆腐泔水洗手一月即愈又方雄黃甲片五倍子去蟲各五錢研細蘄艾四兩藥和艾葉放瓦瓶內將火燒煙燻之立軟又方治鵝掌風並面癬諸癬天麻葉煮濃汁熱洗多擦之如無葉即用天麻子煮汁亦效又方五倍子研末桐油調搽以炭火烘之指甲潰爛各代指黃臘松香融和作筒籠指頭上久之自愈指頭腫毒痛甚烏梅肉和魚鮓搗爛封之極效手足麻木不知痛癢取霜降後桑葉煎湯頻洗有效手指掣痛醬清和蜜溫熱浸之痛乃止手足腫痛欲斷蒼耳搗汁漬之並以渣敷上立效春用芽冬用子治手足痛風方黃耆當歸秦艽等分浸酒飲之有效風寒洗藥方治感受風寒手足臂腿疼痛麻木並偏墜等症槐條四兩花椒二兩透骨草一兩一枝蒿一兩木瓜一個連須蔥頭二十個蒜瓣子半挂以上七味共熬水燙洗洗過仍將原水留著再熱再洗如水少再添一日可洗兩三次一料可用數日以愈為度治風熱臂痛桑枝一大把切碎水三升煎二升一日服盡許叔微常患臂痛諸藥不效服此方數劑即愈手足裂縫瀝清二兩黃臘一兩熬膏敷之又方牛骨髓不拘多少五倍子炙研末搗和填入縫內即合又方頭髮一大握桐油一碗於瓦器內熬候油沸頭髮溶爛出火以瓦器收貯不令灰入每用百沸泡洗裂處令軟拭乾敷之即愈又方五倍牛鼻繩共研末填裂縫內即合手足凍裂用蘿蔔菜橘皮煎湯先洗再用蟹殼燒灰研末和麻油調敷又方蘿蔔略剜空貯滿桕油火上熬透冷擦又方東瓜皮茄子根煎水洗之又方鴿子屎煎水洗之手足諸病手心足心突腫乃風也用川椒食鹽等分研末醋和敷之治手指甲頭腫用烏梅捶碎去核去肉只取仁研爛米醋調敷雖潰亦愈又治指縫搔癢成瘡有竅出血不止用多年糞桶篾燒灰敷之手足閃拗生薑蔥白搗爛用燒酒和麵炒熱厚敷之手足痠痛微腫芝麻研熬一升酒五升浸一宿隨意飲之又手掌及指層皮剝落血肉外露痛癢不堪即鵝掌風用豆腐沫乘熱多洗數次即效乳部治乳不痛絲瓜連子燒存性研末酒沖服一二錢蓋被取汗即通乳癰初起芙蓉根切碎用酒煎儘量飲之即消專治乳癰乳疽乳中結核內外吹乳腫脹等症真乳症之至寶丹也修合濟人功莫大焉鮮石首魚脊翅炙研淨末五十兩小青皮曬脆磨末一百兩二味細末共和勻用米飲湯泛為丸如梧桐子大瓷瓶收貯每服三錢蔥白頭大一個小三個陳酒送下酒隨量飲醉臥蓋被出汗即愈避風為要初起未成者一服即消已成者服之內消外潰倘未潰一連三服無不潰者如已潰服之內消餘毒腫塊症重者外用丹藥拔毒去腐體虛者內服參耆補托氣血之劑自然膿腐易去新肉漸生積乳成癰良方土牛膝根酒煎服極效又方鮮蒲公英連根搗爛取汁沖酒服以渣敷患處即愈如無鮮者即以干蒲公英用酒煎服並治乳癤亦神效內外乳吹未潰方穿山甲酒炙黃脆一錢五分蟬蛻麻油炒透新瓦上炙燥四分半共為末分作四服酒調下三服必愈治乳癰乳癤活蟹一隻搗爛沖黃酒服即消又方舊木梳上垢膩刮下摻膏上貼之即止痛治乳癰蔥白一斤搗爛取汁以陳黃酒分二次沖服外用麥芽一兩蝦醬少許同煎湯洗並用舊梳時時梳之治産母乳癰神驗方生小米半杯無小米用緑豆紹興酒一杯本地黃酒亦可令患者坐住房門檻上面朝里左手執米杯右手執酒杯以酒送米入口畢半日疼止腫漸消平復如常屢驗又方用全栝蔞一個煅灰研末黃酒沖服即愈治乳癤當歸揀極大者生地金銀花蒲公英各一兩上藥用黃酒一中碗水一中碗砂鍋內煎好食後服被蓋暖令出汗仍以藥渣敷乳上即愈又方白戟魚膠一個於瓦上炙灰存性研細衝入熱老酒內送下重者更服一個此方每試必效又方宣木瓜鉤藤鉤橘核以上三味焙燥研末用黃酒調服自愈又方香附末一兩麝香三分和研蒲公英三兩酒煎服渣敷患處或以栝蔞一個酒煎服亦消治乳癤初起漏蘆木通川貝各五錢甘草二錢以上四味用水酒各一碗煎服之立消又方用巴豆一粒細辛一錢五分以上二味焙研用稀絹包縛扎塞鼻孔一周時即消又方生半夏一粒塞鼻中一宿即消癤生左乳塞右鼻癤生右乳塞左鼻治乳岩此病先因乳中一粒大如豆漸漸大如雞蛋三四年不破或七八年方破破則難治初起宜急服此方生蟹殼砂鍋內焙焦為末每服二錢酒調下日日服之不可間斷又方大栝蔞一個半生半炒酒二鍾煎一鍾食後服治乳岩已破荷葉蒂七個燒灰存性研末酒沖服又方用貝母核桃隔金銀花連翹各三錢酒水各半煎服治乳癰良方兼治各種大毒大當歸八錢二分生黃耆五錢金銀花五錢炙甘草一錢八分桔梗一錢五分黃酒二碗煎半飢半飽服乳少乳少者自虛之故或産母去血過多又或産前有病以及貧賤之家僕婢下人産後失於調養血脈枯稿或年至四十血氣漸衰皆能無乳但服通脈散自有乳若亂用穿山甲王不留行等味往往不效即勉強打通乳汁清薄令兒不壽且損傷氣血産後多病不久便乾反為不美通脈散治血衰無乳或乳少生黃耆一兩當歸五錢白芷五錢用七孔豬蹄一對煮湯吹去浮油代水煎藥一大碗服之覆面臥即有乳或未效再一服無不通矣新産無乳者不用豬蹄用半酒半水煎服體壯者加紅花三五分以消瘀血治乳腫奇方蒲公英澤蘭葉金銀花白芷生甘草木瓜各三錢共為末每服二錢水酒各一鍾煎服出汗即消栝蔞散治吹乳腫痛栝蔞一個乳香二錢用酒煎服外用南星研末溫湯調敷即愈湧泉散治産母乳汁不通王不留行瞿麥麥門冬龍骨各二錢用豬蹄汁一碗酒一杯煎服再以木梳於乳上梳下神效又方王不留行天花粉甘草各三錢當歸二錢穿山甲一錢五分炙黃共為細末每服三錢豬蹄湯下或熱黃酒下其乳如湧泉極效又方王不留行通草歸尾炙穿山甲各等分七星豬前蹄並黃酒煎服下乳簡便方木通通草煮豬前腳蹄連湯一併食完又方紅砂糖煎豆腐不用油鹽以黃酒共食之又方芝麻炒研入鹽少許食之大便結者尤更相宜乳汁不痛鯉魚頭一個燒研末每服一錢酒調下又方黑芝麻炒焦為末每用三錢熱酒沖服又方雄豬胰子切碎不另入油乾炒半熟以黃酒煮滾空心服乳吹香白芷二錢川貝母三錢共為細末以黃滾酒調服出汗頻以手擦患處已成未成俱治又方用鵝毛煅存性研細末酒調服三錢即愈乳吹極驗方白芷二錢貝母二錢青皮一錢防風一錢炒麥芽三錢水二茶鍾煎乘熱服之極效又方用蔥一大把連根搗成餅一指厚攤乳上以灰火一罐覆蔥上須臾出汗痛止腫消立愈屢屢經驗特重刊之吹乳結痛蒲公英五錢金銀花五錢黃酒二碗煎一碗食遠服一劑即愈如不愈再服斷無三劑不愈者倘有膿服此變輕熱服取汗仍以藥渣敷患處睡一夜即消吹乳結乳乳滯蒲公英一兩入無灰酒一斤煎熱服又方蚯蚓糞用陳醋調塗患處又方生鮮山藥不拘多少搗爛敷之即消後即去藥遲則肉腐矣內外乳吹乳內結核腫痛寒熱交作甚者噁心嘔吐胎熱所致為內吹兒食所致為外吹並用此方皆效柴胡陳皮川芎山梔炒黑青皮煅石膏酒炒黃芩連翹各一錢甘草五分橘葉二十片水二碗煎八分食遠服外用蔥白切碎炒熱敷乳上以帛包之冷再換又方用不經鹽蟹殼瓦上焙乾為末熱酒沖服三錢即愈乳頭腫痛鹿角尖燒灰存性研末酒調服二錢外用蔥白搗爛敷之乳結硬痛大鯽魚頭煅灰酒調服二錢汗出即瘥乳中有塊積久不消活鯽魚一個搗爛去鱗骨和老酒糟厚敷患處一宿即消治乳串久潰乳癰串爛年久不愈洞見內腑此方治之神效取搖船櫓捏手之處舊藤箍於陰陽瓦上焙乾研細末以竹管扎棚篩日日摻之如干處以香油調搽半月必愈一醉散治乳癰石膏煅為末每服三錢溫酒下能飲者添酒盡醉而睡一服即愈地丁膏治乳吹並一切毒俱效黃花地丁即蒲公英紫花地丁各半斤以長流水洗淨用水熬汁去渣又熬成膏攤貼乳癖乳岩方蒲公英金銀花夏枯草各五錢土貝母三錢黃酒二碗煎一碗空心熱服愈一方加當歸一兩花粉三錢甘草二錢炙穿山甲一片同上煎服治乳岩乳癰方葫蘆巴三錢搗碎酒煎服渣敷患處未成即散已潰即愈乳癰無名腫毒芙蓉嫩根帶皮洗淨搗爛加鹽少許敷腫處留一頭有膿即出少許而愈無膿即消其效如神乳吹乳岩方大栝蔞二個去皮子多者有力當歸酒炒甘草各五錢乳香去油沒藥去油各錢半共為末用無灰酒三升砂鍋文火煎一升分三次食後良久服如有乳岩服此可斷根如毒氣已成能化膿為水如未成即於大小便中通利如痰甚者再合服以退為度治乳癤奇方用青橘葉百片青皮五錢柴胡一錢水二鍾煎一鍾入好酒半鍾熱服蓋被出汗立愈遠志酒治乳癰奇方兼可托散一切腫毒用遠志不拘多少米泔水浸洗捶去心為末每服三錢用好酒一鐘調勻遲少頃澄清飲之將藥渣敷患處自愈又方鴨腳草又名鳳尾草搗爛入無灰酒煎數沸儘量飲醉破者以渣敷之乳癰白礬雄黃松蘿茶各一錢共研細末飽時服每用一錢以豆腐皮包之吞之飲酒盡醉未成者一服即消已成者兩三服即愈內外乳吹紅腫堅硬乳汁不行生熟豆腐漿一大碗內入通草灰二分燈芯燒灰二分百草霜五分須鄉間燒茅草山柴鍋蒂上取下者為真統入腐漿內調勻一氣食下頃刻通行即愈乳癰及內吹外吹砂仁去殼五分冬葵子八分共研末作一服用蒲公英五錢栝蔞仁三錢煎水將前藥末調勻沖服如初起七日內者不過三服即可內消乳頭破爛敗龜板炙研細末加冰片研勻以麻油調搽即愈又方丁香末敷之極效乳上生疽芝麻炒焦搗爛以燈盞內油腳調敷即散乳岩散經霜上楝子三兩雄鼠糞三兩炙露蜂房三兩共研細末每服三錢陳酒送下吃一服間二日再吃一服神效乳起結核初起並不疼痛最惡之症久之防成乳岩每日用山慈菰一錢胡桃肉三枚共搗爛用酒送下以散為度如不急治遲延日久不免變患莫測外仍用醋磨山慈菰塗之乳頭開花用諸藥不效者以寒水石一錢研細末和冰片五釐用荸薺汁調搽或荸薺粉加冰片以水調搽皆效簾珠倒挂凡大人小兒胸間乳旁各生紅白瘰泡浸淫疼癢每處直長一條連生十餘個不等名曰簾珠倒挂久則殺人諸藥不效者用端午日人家簷口所挂刀茅取下連根葉切碎火煅研末香油調搽五六次即愈此係一過路僧人所傳屢試屢效治乳岩栝蔞一個切碎當歸五錢蒲公英三錢乳香去油沒藥去油各一錢生甘草二錢鮮橘葉每歲一葉上藥以酒煎服立消如初起只用橘葉一味或栝蔞一個煎濃湯沖酒服亦消又方枸橘李切片炙研每日酒調服二錢服半月即愈乳痛良方凡婦人無論實乳虛乳忽然紅腫作痛急將婦人梳篦上髮間垢膩剔淨短髮細發刮下垢膩搓成小丸外用雄黃裹之如桐子大勿令患人知以陳黃酒煮極熱吞下棉被覆蓋一汗而愈倘一服不效再二三服亦可數十年來愈人以千計矣治乳結欲作瘡並退回乳方橘核葫蘆各三錢焙研末黃酒沖服如一劑不能全消回退再服三劑必愈又方麥芽四兩炒研末分作四服以兩日服完開水送下退乳甚效乳頭開裂秋後冷露茄子裂開者陰乾燒灰存性研末用水調服乳癰乳岩乳串神方用蟹殼不拘多少將童便浸七日每日換便一次浸足七日放瓦上焙乾研為細末每服一錢加入乳香去油一分和勻好酒沖服儘量以醉為度一服消硬三服全消服至全愈而止治乳岩及一切吹乳腫爛神效屢驗方用橘一枚連皮帶絡及核俱全者取瓦二片合而炙之至焦乃研末用黃酒吞服每服橘一枚服至數枚即愈即腐爛潰濃已甚者服至十枚無不全愈真神方也惟橘每炙可三四枚而研仍須各枚分研不可以二枚並研切記切記胸膈部治胸中脹悶陳皮一錢半夏錢半甘草六分白朮錢半砂仁六分香附一錢薑三片水煎服如中氣不足加臺黨參一錢亦妙治胸間食膈白鳳仙花子三合炒黃為末每服三錢好酒送下治胸腹諸痛並治小便不通陳海蜇四兩荸薺二個煎湯服之神效胸膈忽然痰閉氣塞白蘿蔔子炒香以白滾湯吞下數錢立通又方新象牙末一錢河水煎湯服之即愈百疾消散無論胸膈飽悶肚腹疼痛傷風發熱俱可治蔥頭七根生薑五大片陳茶葉三錢砂糖半酒杯水二碗共煎熱服加陳酒隨量飲蓋被出汗諸病消散惟暑熱天氣不宜多用生薑天氣寒冷生薑加重心漏方胸前有孔常出血或流膿水名曰心漏人多不識此方治之神效又能兼治腰痛鹿茸去毛酥炙附子炒去皮鹽花各等分為末棗肉為丸每服三十丸空心酒下又方鳳凰衣即哺蟲雞子蛋殼又云出過雞子蛋殼內之白皮為鳳凰衣焙燥乳香去淨油各等分研極細摻之噎膈韭汁飲此方治血隔或因跌僕或因大怒以致血積胸膈而病者服之神效生韭汁一鍾無灰酒一鍾共一處煮熱溫服之噎膈不通野貓頭骨炒研為末酒調服噎食開關白硼砂一錢五分青黛一錢好沉香二錢三味研細末聽用再用白馬尿一斤白蘿蔔一斤取汁生薑半斤取汁共入銅鍋內熬成膏每服用三匙加前藥末一分酒調下一日三服可以開關如系翻胃以黑驢尿一斤易白馬尿五噎膈氣用白鵝毛燒灰酒調服噎食五穀蟲用麻布包好水內洗淨炒黃色加木香沉香共研為末燒酒調服又方生薑汁韭菜汁童便各一鍾放大碗內入鍋中水煮數沸候冷取出露一宿重煎溫服日日如是以愈為止又方白馬尿一斤地骨皮一斤白蜜一斤羊糞四十九粒以上用水七升滾數滾濾去渣再熬至一碗為度每服一鍾忌馬齒莧蒸鍋水噎膈酒荸薺四兩搗末厚朴一兩薑炒陳皮一兩白蔻仁炒一兩白糖四兩橘餅一兩冰糖四兩蜜二兩用白酒漿三斤燒酒三斤入壇浸藥十數日早中晚飲虔制太陰丸專治膈噎瘧疾神驗異常預探月蝕何時當日虔誠齋戒備辦潔白乾面一斤再用老紫蘇半斤煎濃汁取汁拌麵軟硬得中放潔淨瓷盆內臨時向月下恭設香案叩頭跪月下自月蝕初虧時起即將拌麵作丸如梧桐子大至月蝕將復圓時即停止放案上露一宿陰乾瓷瓶收貯按照年歲服若干丸此丸服下無不通者價廉功大靈驗非常尤奇異者面丸外實內空初虧時所作之丸內空一半蝕盛時所作之丸內竟全空不在月下則不效臨時多用幾人向月下多制廣為濟人功德無量又方生薑刮去粗皮切成厚片以竹絲穿成一串五月底入厚糞缸內浸七日至六月六日取出去糞以水沖淨陰乾研末每服一錢火酒送下即愈至重不過數服極效枳殼丸整個枳殼去穰四兩每個入巴豆三粒麻線十字扎定用水五六碗煮透去豆將枳殼切碎曬乾橘紅皮一兩青皮去穰一兩廣木香不見火研三錢共研細末陳老酒陳粳米粉打糊為丸臨臥服五十丸膈食驗方大豆即羅漢豆或炒或煮頻頻食之久則自愈蓋此症諸物不能下咽惟食此無礙以其相畏也噎食轉食黃鱔魚一條用無灰黃酒量魚大小酌酒多少煮乾為度連皮帶骨用淨砂鍋焙存性研為細末病熱重者每服三錢輕者每服二錢五分為止不可多用黃酒調服若在上半月其效尤速若在下半月其效較遲三服見功五服全愈愈後宜蒲淡飲食陸續吃稀粥忌一切思慮籌畫氣惱葷腥發物酒色房勞尤宜慎之轉食用靛花水送下治鼠膈凡在人前不食必於密地背人偷食見人則畏置之肌瘦面黃是食過夜鼠饞之涎名為鼠膈用十大功勞葉一名鼠怕草葉形似薄扇有五角角有刺焙乾為末每服一錢早晚酒送下服至半月自愈治膈氣慕撫軍天顏其母太夫人曾患膈氣異人傳授此方服之而愈大黃酒製九次二兩上沉香末六錢桃仁泡去皮尖研去油六錢烏藥腐水煮炒一兩硼砂二錢以上各藥共研細末每服三分五更時舌上舐津咽下細粳丸治膈氣其症咽喉噎塞飲食不下用打米碓杵上細粳刮下煉蜜為丸如彈子大常含一丸以津咽下久服自愈噎膈祕方羊糞一兩瓦焙為末甘草一錢二味開水泡澄清逐漸飲之俟開關以陰糯米入麻仁真蘇子煮稀粥食之半月後方可食飯若遽食厚味一反難治無論虛實年月遠近噎膈頂細料破碗瓷片燒七次醋淬七次用一錢鐵鏽鉛粉鍚各一錢砂仁二粒母丁香二粒各研極細方可合共又研每日酒送下三五分極效膈食初起烏梅辣椒香豆豉蒸腈肉常吃又方翻毛雞又名倒毛雞蒸糯粟吃二三隻自愈又方用老薑一斤放童便內浸七日埋土內七日洗淨烘燥為末又白朮用土炒各等分共研末飯丸桐子大每晨空心服一錢米飲送下又方用甘蔗汁二碗薑汁一碗和勻每服一碗日三服即愈治翻胃噎膈凡有此症大便燥結切不可用香燥藥取快一時破氣而耗血只好用稠牛乳入白糖少許時時燉熱咽服自然漸漸而愈又方佛手於荸薺蓮子肉紅棗柿餅橄欖桂圓苡仁各一兩浸大麥燒酒五斤每日飲三次即愈又方柿餅三枚連蒂搗爛酒調服甚效切勿以他藥雜入如無柿餅或用乾柿亦可又方石蓮肉為末入肉豆蔻末少許米湯調服之又方甘蔗汁七碗薑汁一碗和勻日日服之又方白豆蔻白檀香鬱金各二錢研細末每服一錢用薑汁熱酒調服治噎膈神方貓胞衣用新瓦放火上焙燥研末入硃砂末少許每服一二分放舌上以溫湯徐徐服下數服即愈取貓胞衣法貓將産以人看守須急急取之稍遲則貓食矣又方用抱出雞子殼瓦上焙燥研末每服二錢熱酒送下又方大橘子一個入膽礬一錢將橘子頂上切去一片以膽礬納入仍以切下之片蓋上外用鹽和黃泥裹一大球以炭火煅之候冷取出去泥將橘肉灰研末每服三分滾水調下又方雞肫外黃皮名雞內金取三個用新瓦焙燥研末用燒酒調服又方皂礬五兩用面饅頭頂上開口挖空將礬填滿以新瓦合住外用鹽和黃泥包裹封固放文武火內燒半日取出去泥棗肉為丸梧子大每服二十丸空心酒湯送下又方取螺螄數斗清水浸之俟螺螄吐出泥砂去螺螄取水底之泥曬乾每服一錢酒調下仍將螺螄送入水中放生立效又方蒲公英一梗兩花高尺許者掘下數尺根大如拳旁有人形拱抱搗法酒服治膈噎其驗如神甘露湯朝食暮吐曰反胃隨食隨吐曰噎食下良久吐出曰膈此方能治反胃噎膈等症用干鍚糖六兩在糖坊中賣頭榨者生老薑四兩二味和勻搗作餅焙乾加炙甘草二兩共研為末每服二錢用滾湯入鹽少許調服甚效常服快利胸膈調養脾胃能進飲食橘餅湯除膈消食順氣化痰橘餅細嚼滾薑湯送下奇效幸勿以輕易而忽之心胃部並附心痛胃痛九種心胃氣痛千年陳石灰一兩生熟白礬各五錢共為末薑汁為丸如桐子大或薑湯或燒酒送下七丸即愈又方用真蘄艾灸大拇指男左女右五次極效急心痛其症牙關緊閉欲死者用老蔥白五莖去皮須搗膏將匙送入喉中灌以麻油四兩能得下咽即醒又方用山羊血一分燒酒化下或用淡豆豉五錢煎湯半鍾服之亦愈又方五靈脂蒲黃等分研末每服一錢醋湯調服即愈此方並治産婦血氣痛尤效大小男女一切心氣疼痛馬兜鈴一個燒存性研末溫酒調服又方制香附一兩白礬二錢共為末麵糊丸豆大空心每服七丸好酒送下服畢即蓋棉被而睡使汗出即除根忌食青菜魚肉生薑發物七日九種心胃氣痛因受寒而痛者尤效方五靈脂二錢公丁香四分不見火研末明雄黃四錢巴豆霜四分去油淨末白胡椒四分廣木香四分不見火研末乾紅花二錢枳殼二錢以上八味各研細末稱準分兩和勻再共研極細瓷瓶收貯幸勿泄氣每服五釐男以左手心女以右手心盛藥末以舌尖舐之津咽下一個時辰不可飲茶無論遠年近日發時服二三服皆可除根極為神效九種胃氣痛神方五靈脂醋炒廣木香切片曬燥不見火枯礬雄黃各二錢共研細末臨痛服一錢熱酒調下立止急心氣痛胡桃一個棗子一枚去核夾桃內紙裹煨熟以生薑湯一鍾細嚼送下卒心痛急燒陳倉米為末和蜜服之不爾則逆又方豬心一枚照每歲入胡椒一粒同鹽酒煮食之卒急心痛棗丸詩云一個烏梅二個棗七個杏仁一處搗男酒女醋送下之不害心痛直到老又方硃砂漂淨木香不見火各三錢黃蠟一兩化開二藥共研末為丸如緑豆大每服七丸燒酒送下又方多年陳醋浸大蒜食數枚其效如神又方延胡索研末三錢溫酒調下即止心痛簡便方用飯粒黏白礬為丸每服三分又方用芝麻一合炒黃米醋一杯煎至三分服之又方用真麻油一鍾煎入