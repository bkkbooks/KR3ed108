草五分用好燒酒浸一宿臨發時去渣溫服量大者加倍服之必須多服數次瘧必止又方棉花子胡椒各七粒為末病前一時燒酒送下蓋被蒙睡取汗即愈間日瘧疾密陀僧六分研極細白洋糖五錢未發時早一刻熱酒調服小兒用三分之一又截瘧丹五月五日取獨頭蒜不拘多少舂爛加入好黃丹再舂作丸如圓眼大曬乾收貯凡瘧疾發過二三次後臨發日雞鳴時以藥一丸略捶碎取井花水面東服之即止又經驗方用陳干香櫞一個破開以雄黃末一錢置其中仍以香櫞合攏放瓦上火煅存性研末空心淡薑湯下七分老弱者減三分又男婦胎瘧及陰陽瘧均治方鱉甲醋炙二錢常山酒炒一錢枯芩一錢桃枝三個煎服即愈三日瘧方甲魚殼用醋炙透青蒿等分共研細末每服三錢或酒或水早一時沖服又三日瘧方每日用冰糖五錢煎湯飲之十服必愈又方雄黃三分密陀僧三分共研細將燒酒一小杯燉熱沖藥臨發向東服勿使四眼人見用被蓋暖取汁即愈又方生薑細茶山楂柴胡各二兩用酒河水井水各一大碗煎露一宿次早溫服又獨蒜一枚黃丹一錢搗和分作三丸於發日早起向東以井花水送下一丸連服三日效又三陰瘧驗方絲瓜絡二個熟面和菊花汁少許填入絲瓜絡內以刀切片不拘多少以豆油煎熟醋浸露一宿隨量飲之其瘧即化三次除根永不再發又三陰瘧方烏梅三個陳皮青皮當歸知母各三錢水煎服五服除根如初起加穿山甲炙三錢同煎服即愈瘧疾外治各方胡椒硫黃各三釐研末摻膏藥上貼背脊之正對肚臍眼處過期即愈又明雄黃製附子真樟腦各等分為細末於瘧未發前一時以棉花少許包裹藥末三分塞鼻孔中男左女右寒藥後勿食湯水睡過此時即愈重者依法塞二三次必效小兒量為減用又蓽茇研細置暖臍膏上貼臍中三日可愈又治間日瘧方明雄黃獨頭大蒜於端午日午時將粽子尖搗爛和丸如桐子大硃砂為衣三發後清晨貼在眉梁間以太乙膏蓋之即愈又用旱蓮草搗爛置左手寸口上以古錢一文壓定將帛條包扎良久起小泡謂之天灸止瘧甚效又小兒瘧以蟬蛻二三兩包好與小兒作枕其瘧即止祝由科治瘧法不論桃杏棗栗或乾果用一枚念咒曰吾從東方來路遇一池水水裡一條龍九頭十八尾問伊吃甚麼只吃瘧疾鬼念一遍吹氣一口在果子上連念七遍吹七次即將果子令病人食之須於五更時雞犬不聞面向東立念之忌食葷腥生冷此方無藥之處濟人甚效又方清晨日未出時脫下病人貼肉衣一件用小壇一個將衣服入壇內令病人吹氣三口入壇即以紙封壇口扎住送去僻靜處行此法時不令人見見則不效又方五月五日取全本時憲書燒灰以雄黃酒調和為丸如桐子大每清晨開水吞下一丸止瘧甚效又瘧發過三次後於未來先一日用川貝母末三錢黃酒沖服儘量而醉外用老薑一塊搗爛敷海眼穴即是後頸齊領圓骨處以筋骨痛膏蓋貼蒙被熟睡取汗而愈愈後須多貼幾日方不復發忌食南瓜芋艿雞鴨蛋等發物百日熱瘧熱多寒少穿山甲一兩紅棗十個同燒存性為末發日五更用井華水調服三錢三服即愈寒瘧寒多熱少生薑四兩連皮搗汁一鍾露一夜空心冷服久瘧不愈白朮土炒為末每服二錢酒調服十劑除根此脾寒瘧又久瘧方蕎麥細面不拘多少以活鱉魚刺血和為丸陰乾未發之先預服三錢白滾湯下又老瘧經年不愈方用龜板以醋炙酥存性研末酒調每服二錢均極效久瘧腹中結塊名曰瘧母醋炙鱉甲土炒白朮蜜炙黃耆酒白芍川芎各一錢炙甘草五分水煎服孕婦胎前發瘧乍寒乍熱夜明砂三錢空心用茶調服瘧痢不止龜殼燒存性研末酒調服少許極效卻瘧痢百病法立秋日五更時取井華水閣家長幼各飲一杯全家可免瘧痢一切病症新久瘧疾驗方土炒白朮芥菜子各三錢乾薑二錢薑半夏一錢水煎三服即愈久瘧成痞凡多年瘧痞遇秋即發服此藥一二兩無不斷根初瘧發過多日後亦可服常山一斤切極薄之片用鹽與釅醋五斤煮乾曬三日再煮二次曬乾後研細末雞心檳榔半斤研細末二味和勻用醋糊米粉為丸如桐子大每服三錢小兒減半霍亂部霍亂症本草從新集注云霍亂有寒熱二症倉卒患此脈候未審慎勿輕投偏熱偏寒之劑曾見有服薑湯而立斃者凡一切霍亂最忌滾湯滾水及米飯粥飲薑椒熱物食之不救凡吐瀉交作名濕霍亂猶易治惟心腹絞痛不吐不瀉者為乾霍亂症最危險稍為遲緩多致不救無論症勢緩急惟有查照卷十五霍亂症內用鋒利碎瓷片刺少商穴委中穴二處使出血即愈誠百發百中真霍亂各症及絞腸腹痛外治第一簡便仙方也屢見奇效用鋒利瓷針略刺破皮只要見血並不傷痛立刻起死回生其靈驗好過服藥尤更效速奉勸老幼男婦小孩切勿疑畏廣為傳人功德無量窮鄉僻壤倉卒夜深一時無處覓藥者受惠實非淺鮮霍亂諸方用滾開水兌生冷水各一半名陰陽水加入生明礬末二錢調勻服之又方食鹽一大撮炒黃入童便一大鐘溫水兌服少頃吐下即愈此二方治乾霍亂症上不得吐下不得利肚腹絞痛冷汗欲絶服之奇效又乾霍亂腹痛方食鹽一兩牙皂一錢水煎服即吐而愈又霍亂欲死不省人事急刺十指頭正面離甲分半處出紫血即蘇又方用千里馬即舊破草鞋煎湯服之以手指探入喉中得吐而愈使胃氣一回霍亂即解又吳茱萸三四兩食鹽數兩炒熱用布包尉臍下極效或即用本人包腳布或舊襪底洗水澄去泥穢飲之神效此均經驗良方也取其簡便而極神效霍亂腹痛肚瀉不止用藿香葉廣陳皮各五錢煎水服之又方真緑豆粉和白砂糖少許服之又胡椒四十九粒緑豆四十九粒研勻以木瓜煎湯調服一錢又千佛手切碎煎湯飲之又韭菜搗汁一杯以重湯煮溫服之又白扁豆葉一把生搗入醋少許絞取汁服之或白扁豆為末和醋服暑霍亂吐瀉不止尤效又飲新汲水一碗再以水一盆浸兩足吐瀉立止忌食熱物又霍亂腹痛甚者用食鹽炒熱用布分作二包以一包尉其心胸肚腹以一包尉其背腿手足此法極妙又用皂角研極細末吹入鼻中或即用聞鼻丹或痧藥均可得嚏即止又選潔淨黃土地處掘三四尺深坑入新汲水一桶用棍亂擾混濁連泥帶水取起澄清飲之名地漿水服之即解並解一切中毒極效霍亂轉筋心腹脹痛手足厥冷以上大蒜搗敷足心炒鹽尉法吳茱萸炒鹽尉臍下各方均極神效又木瓜一兩水煎服仍用木瓜煎濃湯浸青布裹其足腿轉筋上入腹木瓜二錢吳茱萸一錢食鹽五分水煎服又樟腦兩許一大塊布包好入燒酒內浸透濕由背脊往下順擦至尾閭數十次即愈霍亂吐瀉頭眩眼花及轉筋腹痛方百草霜即燒茅草鍋臍煤灶匱煙煤各五分二味共研細滾湯順調千餘下待溫服之立效又用在蒜瓣嚼爛涼水吞下又白馬糞燒灰存性研末五錢入新黃土五分溫水調服又舊小梳一柄燒灰研末溫水調服時疫痧氣霍亂良方即腳麻肚痛症也辣蓼草半斤搗爛宣木瓜四兩切片福珍酒二斤即好黃酒亦可加河水煎湯乘熱抹洗手足及麻木之處極效辣蓼草似水紅花而小其葉狹而光其花若穗其色淡紅其梗微紅有節其味辣者是也此草田間俱有可預為採好以便濟急本草云味辛溫無毒專治天行時疫霍亂轉筋極為神效霍亂乾嘔不止薤子煎汁服之即止肚腹泄瀉部水瀉初起細茶葉二錢核桃仁五個燒焦生老薑三錢紅砂糖三錢水煎空心服又山楂炒焦研末加紅糖調服又暴泄不止小便短少車前子炒為末每服二錢米飲下並根葉搗汁服亦妙脾胃虛寒者不宜服又因瓜果食多水瀉用好橘餅一個切薄片作二次滾水泡服又車前子澤瀉厚朴薑汁炒各一錢共為末水調服又茯苓二錢厚朴一錢半陳皮一錢枳殼炒二錢甘葛一錢川木瓜二錢陳石榴酒炒二錢紅棗煨薑引水煎服脾虛泄瀉凡久瀉每早溏瀉一二次此係脾虛用此補脾養胃而瀉即止土炒白朮二兩白茯苓二兩小茴香炒一兩肉蔻煨一兩鹽水炒破故紙二兩木香五錢共研細末用生薑煮紅棗肉搗如泥和藥為丸梧子大每早空心服三錢白湯下又核桃肉用鹽炒熟不拘多少每日隨意食之久食自愈又川花椒炒研細末每日加入飯菜內食之極效又土炒焦朮炒乾山藥陳米炒老黃色各二錢加黑砂糖少許水煎服又訶子一枚以濕草紙包裹煨熟去核肉果一枚麵裹微火煅黑色共研末每服五分米湯下不論老幼男婦及噤口瀉痢此方服之皆效老年人脾虛五更泄瀉方老陳米半升炒三次成老黃色蓮肉二兩炒焦朮乾薑各二錢木香一錢共研細末加白砂糖一兩每服三錢空心白湯下其效如神可以常服又水瀉不止方炒蒼朮豬苓澤瀉焦朮陳皮茯苓各錢半肉桂甘草各八分水煎服忌生冷又脾虛滑瀉方烏骨母雞一隻洗淨腸雜用肉豆蔻麵裹煨一兩草果仁麵裹煨二枚燒存性研末摻入雞腹內扎定煮熟空心食之又方山藥切片炒黃研末調入粥內食之又脾瀉腸滑方石蓮肉炒為末每服二錢陳倉米調下均極神效膽瀉年久不愈方魚膘炒芡實茯神茯苓各四兩苡仁炒八兩蓮肉去心六兩菟絲餅三兩燒飯鍋巴五十一兩共研細末每早滾水調和少加糖食之如肚瀉甚者再加川椒末五錢腸滑久瀉方石榴劈破燒存性煙將盡急取出放地下以碗覆之免成白灰研為末每服二錢以酸石榴一片水煎服因食滯泄瀉方山楂神麯麥芽蘿蔔子各等分水煎加紅白糖沖服無論何項泄瀉方用米一碗炒候冷再炒連炒三次成老黃色水煎服之老年脾虛腸滑久瀉無不神效痢疾部痢疾各方痢疾初起即用山楂瓦上炒黃色每服五錢水煎濃汁調紅白糖每日四五次服之可免成痢老幼男婦皆可服又五穀蟲瓦上炒黃色研末加紅白糖調滾水沖服又雞內金即雞肫皮瓦上焙枯存性研末或加石蓮子研細末加紅白糖調水沖服又治痢甘露飲烏梅去核三錢山楂去核五錢白砂糖二錢或煎或泡不時代茶飲之又薑茶飲治赤白痢寒熱瘧及嘔吐等症初起陳細茶葉老生薑各三錢赤痢留皮白痢去皮水煎服又干馬齒莧蒸熟紅白痢加紅白糖多食為妙參香丸治紅白痢極效苦參六錢木香四錢不見火甘草五錢共為末飯搗為丸如梧子大每服一錢紅痢甘草湯下白痢薑湯下紅白痢米湯下噤口痢砂仁蓮肉湯下水瀉豬苓澤瀉湯下治痢神方淨楂肉炒四兩車前子三兩砂仁末廣木香不見火各五錢共研末紅痢加白糖白痢加紅糖紅白痢紅白糖並加每服三錢滾湯調下小兒減半孕婦不忌此方初起極為神效並治泄瀉又方三月三日採薺菜花風乾俟秋間治紅白痢疾加紅白糖少許煎服即愈又方油當歸一兩枳殼三錢麩炒黃芩五錢水煎服渣再煎忌勞腥重用當取其滑潤枳殼專利大腸黃芩清暑解熱此方屢見奇效萬應痢疾丸油當歸八錢陳皮一兩二錢廣木香八兩不見火曬乾研末茅山蒼朮鹽水炒川厚朴薑汁炒枳殼麩炒各一兩二錢白豆蔻去衣炒生甘草小木通蓬朮醋炒各八兩山稜醋炒三兩陳米一升用巴豆四十九粒與米同炒至米黃色為度選去巴豆將米磨粉入藥上共為細末荷葉煎湯泛為丸壯年每服三錢老年減半小兒每歲服一分水瀉生薑湯下肚腹痛枳殼湯下紅痢甘草湯下白痢生薑湯下紅白痢甘草生薑湯下停食陳皮湯下如倉卒無引即用開水送下便可傷寒後忌服産後忌服香連丸此丸清邪熱導滯氣行瘀血為治痢之聖藥服之神效川黃連一兩二錢廣木香八錢不要見火山楂肉一兩二錢炒川厚朴去粗皮薑汁炒小青皮醋炒各八錢生甘草五錢紅花三錢酒洗大黃二兩酒炒黃芩大白芍各一兩二錢陳枳殼麩炒尖檳榔各八錢油當歸地榆各五錢桃仁六錢去皮尖橘紅四錢上藥共為細末荷葉包米煨飯為丸每服三錢扁豆花泡湯化下熱痢最為相宜服之神效孕婦忌服以上二方須預為配製以便隨時濟人功能無量又五月五日取完好荸薺洗淨拭乾勿令損破放瓶內入好燒酒浸之黃泥密封收貯遇有患者取一二枚令細嚼空心食之仍用原酒送下極效熱毒血痢金銀花藤煎濃汁服之極效又柿餅煎湯日飲數次久痢不止用茄根燒灰存性石榴皮等分為末砂糖水調服即愈又陰乾陳蘿蔔葉煎湯服立止又生老薑細茶葉韭菜連根搗汁三味溫酒沖服治痢神方油當歸一兩枳殼三分若欲速效紅痢加黃連一錢白痢加乾薑三分服之百發百中神效噤口紅痢加鮮石斛三錢噤口白痢加炒穀芽八錢多服自愈按痢由鬱而成亦由燥而生且總由虛而得所以裡急後重欲下不下與治水瀉大不相同治瀉宜止而治痢則偏宜利然醫家每用大黃以蕩滌其垢穢而不知已剝削其脂膏壯者或暫能見效變症多端怯者必致愈重甚是可畏且大黃即可以治熱痢實痢而不可以治寒痢虛痢因輕致重因重致危因危致亡余見受害者多矣因細揣其致病之由在郁與燥而靜想其治病之法宜散宜潤油當歸為血中氣藥其味多辛辛則能潤品又和平多用無妨本草從新云極善滑腸便瀉者勿用茲則正取其能潤也潤自痢除最為妙法況痢之病本在郁當歸能散其鬱痢之病根在虛當歸能補其虛此方治痢仙藥也不論陰陽虛實放膽用之俱可見效當歸微溫便於寒痢而熱痢亦不助其火邪況加黃連同力相濟萬無可疑當歸能補便於虛痢而實痢亦不泥其外邪且所云實者乃症實非人實也症則有時而實人則斷無不虛扶正可以去邪更妙而又妙矣尤恐力不到腑再以枳殼寬其大腸裡急後重以除百發百中屢試屢驗但枳殼力猛沖牆倒壁不可重用以傷元氣紅痢間有血虛而不由熱者白痢間有氣虛而不由寒者但血痢不加黃連多服自愈氣痢加白朮三錢可愈他若傷寒大便不通用油當歸一兩大麻仁八錢再加滋陰清補自無不下大黃切忌務祈轉相告喻不費錢之功德也按治痢屢試屢驗莫如前卷七痢疾方內所載重用當歸白芍蘿蔔子輕用枳殼檳榔車前甘草一方極為神效噤口痢神方用蘿蔔切片蘸蜂蜜含口中噙之有汁咽下味淡再換又噙之久則自然思食再以稀粥緩緩進之又方砂糖白蜜蘿蔔汁各一杯飯上燉化服一二次又方石蓮子肉一兩去心廣木香三錢共研末每服二錢米湯下又山藥半生半炒用萊蔔煎湯服之又前方五穀蟲焙黃研末用黑砂糖調服治噤口痢屢見奇效又方用肥皂莢一枚以鹽實其內燒存性為末以少許入米粥內食之痢癡外治方茜草一握煎水浸兩足底又梧桐葉三四斤煎水洗足又神效方起病三日後用川椒五分麝香五分共為末用棗一枚去皮核將藥末糝棗肉放入肚臍不拘何等膏藥貼之無不全愈噤口痢外治方丁香五粒巴霜一分杏仁五粒砂仁五粒沒藥三釐紅棗一枚去核同搗如泥分作二丸以一丸貼臍上以一丸服之即能進飲食
