空心溫熱服凡少年思欲不遂相火鬱結兼受濕熱致有此症以大黃三錢裹入無餡饅頭內蒸熟晾燥炒研細末以生白酒調下即愈又方用六一散涼開水調服三錢亦愈並治小兒尿如米泔水者減半服之立效如神房勞忍精致成白濁便短刺痛或大便後急等症用劉寄奴一兩車前子五錢黃柏五分白朮一兩甘草梢三錢水煎服即愈均極效赤白濁祕方木通七錢滑石三錢甘草梢四錢蔓荊子一錢水煎空心服又赤濁方益母草葉子莖並用搗爛絞取汁一鍾湯溫空心服均極效夢遺各方五味子不拘多少為末以陳米粉醋糊為丸梧子大每服三十丸空心鹽湯送下或以雄黃一點塞入馬口奇效又用雄豬肚一個洗淨入杜仲半斤用線縫固煮爛去藥連湯食盡兼能治腰痛又方雄雞肫肝皮數十張陰陽瓦焙乾熱黃酒沖服又方韭菜子一兩研末每晨早滾水調服二錢均極神效前陰部陰毛內生蟲生蝨陰毛生蟲或紅或白奇癢難忍以生白果嚼爛時時擦之其蟲自絶再以檳榔川椒煎湯先熏微溫久洗又生蝨以百部煎濃湯先熏後洗或用煙油調雄黃末擦之或用水銀以唾津研爛擦之即除極為效驗戒食甲魚不致再發玉莖中痛生甘草梢五錢煎水服之奇效又尿管中疼痛方萹蓄車前子木通梔子炒滑石大黃瞿麥甘草梢各等分燈芯引水煎服即愈又玉莖強硬不痿精流不止痛如針刺名曰強中乃腎滯漏疾用絲瓜燒存性研末每服二錢水調下又取人乳三杯入木香末一分麝香少許調勻服之後飲濃茶一杯陽必敗又方肥皂莢一個燒存性研末香油調搽自愈腎囊風癢用初滾飯湯洗之洗過傾入魚池或用蛇床子同白礬煎湯洗之如干癢用核桃油潤擦濕癢用爐甘石蛤粉共研細末撲之又方川鱉甲蛇床子白芷等分研末以棉撲之或用麻油調搽又方蘇葉炒乾枯炭共研末摻上癢即止凡腎囊濕癢抓破已成瘡或婦女陰戶亦有濕癢成瘡者外治之法用黃丹枯礬生牡蠣共研末搽擦即愈又方自死龜板一個瓦上炙存存性研末加冰片少許麻油調敷極效腎囊腎子腫大用棉花子仁一兩煎湯常洗之自消又腎腫如斗用生蔓荊根搗爛封之即愈又腎囊腫痛方用蔥白和乳香搗爛敷之即消腎囊濕爛欲潰裂松香研末紙卷作筒每筒入花椒三粒浸入燈盞油內三宿取點燒接取滴下之油擦之每先用茶湯洗過腎囊生瘡頭髮燒灰蘇葉焙乾杉木皮燒灰共研末瘡濕則乾摻瘡干即用青油調敷如囊爛無皮以蘇葉包之愈腎囊腐爛不堪蒼朮甘草二味煎湯洗淨拭乾然後以五倍子為末敷之數日即愈囊潰偏墜絲瓜葉燒枯存性三錢雞蛋殼燒灰二錢溫酒調服又治偏墜方生薑搗取自然汁入宮粉五分調勻敷之數次即愈忌發物房勞氣怒數日腎囊癰生在大便前小便後初起內消散生甘草節四兩研末皂角末五分分作四劑滾水調服立消愈合以六味地黃湯服之龜頭腫爛兒茶冰片共研極細末乾摻之極效又龜頭生瘡甚至如蠟燭花用藤黃磨麻油搽之久而自愈又方亂頭髮一團用鹽水洗淨油再用清水洗極淨放瓦上炙枯焦棗核七個瓦上煅枯共研細末先用甘草煎水將瘡洗淨拭乾再將藥末頻搽自愈又方生甘草研末調生白蜜搽之極效又下疳瘡方明礬皂礬等分為末裝入一顆大五倍子內瓦上燒灰存性研末再加冰片三分兒茶少許再研勻搽之即愈囊癰又名騎馬癰又名懸癰凡覺玉莖後穀道前腫痛即多用生甘草煎濃汁代茶飲之多服為妙以殺其毒外用野紫蘇葉即面青背紫者是焙乾為末麻油調敷早為消散最妙小便小便不通小腹脹悶用連須蔥白二斤搗爛炒熱分作兩股各以布包輪流熱尉臍下即通能加麝香其效更速又方食鹽二兩火煅和溫水二升服之以手指入喉探吐上竅通則下竅亦利真妙法也又方栝蔞仁不拘多少為末每服三錢溫酒調下不飲酒者米湯調服亦可以通為度又方烏梅肉為末水調服二錢或以麻皮一握切細入甘草少許同煎服又豬膽汁兌熱酒沖服又棕皮毛燒存性為末淡酒調下即通又方灶心土研末冷水調和塗敷臍上即通又小麥秸一握煎湯飲之或用蔥煎湯飲之又小便不通用導赤散生地三錢赤芍木通各二錢生甘草梢三錢水煎服為利小便要藥如服之不效再加升麻五分升清降濁大有奇功又方木通生地滑石車前子生甘草各等分水煎服又婦女小便不通用杏仁七粒去皮尖麵炒黃研細以開水調服立通小便不通出血痛甚生甘草梢三錢食鹽三錢煎湯服之即愈又小便出血痛不可忍木通滑石各一兩黑牽牛五錢共研末每服二錢燈芯蔥白湯空心服下小便出血車前草根半斤洗淨搗爛絞取汁多服極效又方小麥麩炒香醮肥豬肉食之又方側柏葉搗汁調糯米粉亂頭髮燒灰研末共為丸梧子大白湯吞下五十丸又方紫菀一兩水煎服又方生鮮枸杞根煎濃汁每服一鍾少加酒空心服此藥清心腎開鬱結兼以分利小便自清又方苧麻根煎湯服均極效尿後有鮮血柿餅三個燒枯存性研末陳米煎湯調服即愈又車蓮飲治溺血屢驗車前草旦蓮草共搗爛絞取汁一茶鍾空心溫服如無鮮者即用乾者各三錢煎湯服亦可小便撒血荊芥砂仁等分為末旱蓮湯調下溺時其痛如刺甘草梢木通各一兩水煎空心服立愈極效夜多小便糯火蒸糕用火炙熱食之以溫酒送下或白湯下行坐良久待消化即睡雖一夜小便有十餘次者常久食之無不奇效又以糯米磨成粉煮作羹食者取其容易消化又方核桃肉用鹽炒熟臨睡食數枚溫酒送下又方益智二十四個研碎入鹽同煎服又方用燕子窩泥取下燒紅以開水淬之服下即止小兒三次即愈均極奇效房勞小便溺血鹿角膠五錢用鹿角霜炒成珠沒藥血餘瓦煅存性各二錢共研細末每服三錢草根搗汁調下小便淋瀝用葵花一握水煎數沸服之即愈又小便欲解不解解亦不爽快解後又要解總是淋瀝諸藥不效有一過路方士傳方以甘蔗青草梢一兩生酒煎服三日全愈豫因目睹其效故特記之小便不禁遺尿用羊肚洗淨水煮熟空腹食之連食四五個即愈又方白龍骨桑螵蛸共研末每服二錢鹽湯調下即愈大便附腸紅下血大便不通除有病者仍從病症虛實熱燥對症醫治如無故腸閉不痛用蘆薈一錢硃砂五分共研細以飯為丸如桐子大開水送下即通又方以松子仁搗爛調生白蜜開水沖服又方用橄欖核磨汁飲之又大便閉結煩躁不安飲食難進用生蜂蜜一大杯加玄明粉或二錢或三錢看病熱輕重斟酌加之開水沖化服下即通大便不通肚腹作脹人參蜜炙黃耆各三錢白朮陳皮油當歸各二錢銀柴胡甘草各一錢水煎服即通又方烏桕樹根長一寸劈破水煎服之立效又方蘿蔔子一合研碎皂角燒研末冷水調服二三錢又方生芝麻不拘多少研爛加糖少許水調服又多吃豬油可以潤腸年老及虛弱或病後便閉松子仁柏子仁核桃肉棐子肉叭噠杏仁各等分量加白糖霜搗作餅食此方年老虛人風祕血祕大便艱澀以及病後婦人産後便閉皆宜大便下血豬大腸洗淨用木耳不拘多少同煮熟常食自愈又方棉花核炒熟三兩側柏葉炒黑四兩槐米炒一兩共研末以柿餅蒸熟搗爛如泥和為丸每日早晨滾湯送下四五錢又方煨柿餅三個地榆一兩炒黑二味共研勻分作四服槐米煎湯空心調服藥完全愈忌火酒發物又方槐花三兩一半炒一半曬研末柿餅七個去蒂烏梅十四枚去核共搗爛為丸如梧子大每空心開水服又方好墨為細末二錢阿膠化湯調服熱多者尤更相宜腸紅下血方槐角地榆當歸防風赤芍黃芩甘草各一錢黃連五分水煎空心服即愈又方槐角地榆各三錢均炒黑水煎服下即愈又方扁柏葉一斤蜜浸一宿曬乾青州柿餅一斤火煅存性共研為末拌勻每服三錢開水送下屢經效驗大便下血方當歸身山萸肉生地阿膠石膏炒珠各一兩棉花子一斤以上五味俱炒黑色為度研末用柿霜一二兩和勻每日早晚各服三錢白湯調下俟糞色變黑血漸止矣忌食花椒胡椒燒酒諸熱物又方紫草煮豬肉連湯食俱極神效腸紅下血糞前糞後黃連當歸各一錢苦參荊芥各二錢水煎空心服又木耳青菜豬大腸共煮常食最妙又方荸薺紅棗各半煮熟連湯食之又方霜後乾絲瓜燒枯存性研末空心酒服二錢又方生柿子二個竹刀切去蒂核以棉花子塞入柿內仍蓋好瓦上煅存性研末米飲熱調服又方烏梅七個熱豬血半斤同煮好食去梅不用鹽又方粗草紙燒灰砂糖拌勻開水調服又因酒毒下血方大田螺五個燒至殼白肉乾研末作一服熱酒調下又方糞後下血艾葉生薑煎湯服之大腸下血屬風熱柿乾燒灰米飲服二錢又方棉花核槐花米各等分炒黑用烏梅水陳酒為丸每日用烏梅煎湯送下三錢又下血不止勢甚危篤用絲瓜燒存性為末槐花減半為末每空心米飲服二錢極效又下血不止服自己小便名回龍湯極妙又方豬腸一條洗淨以槐花炒研末入腸內扎兩頭加醋入砂鍋煮爛為丸梧子大每服三十丸溫酒送下均極神效小兒科應與前卷十小兒科合併參看小兒初生如草木之始發萌芽生機初達弱質柔脆培植長養之方必須講明有素而後可遂其參天之概也故初生調護之法宜備焉小兒初生不啼生下不能出聲有謂之夢生切不可斷臍以棉衣包兒用大油紙捻燒臍或用紙捻艾火於臍帶下往來熏燒使暖氣入腹漸能作聲此天氣寒冷相宜今有用棉衣包兒外再用熱水溫臍使陽氣一接兒即可以出身百無一失又或因難産寒逼氣閉所致以蔥白輕鞭其背醒神通氣且勿剪斷臍亦須用油紙捻點火於臍帶下燒熏極妙又以菖蒲生搗汁滴數點入口即活又有因生白膜皮包裹舌或遍滿舌根或舌下有膜如石榴子或口中上齶有泡不能出聲者急用手指甲輕輕刮破其膜令血出即用枯礬末少許摻之若不看視恐將來竟成啞病又有小兒因難産産下不哭微有氣者以本父母真氣度之可活拭口法嬰兒在胎口有熱物即胎毒也生下啼聲未出急用棉裹手指將口中胎毒取出以棉拭淨口貴在神速遲則咽下斷臍法産家要訣云産兒出胎洗後方斷臍帶則不傷水生病斷臍須將汁令盡否則寒濕入腹或作臍風又須於近臍四五寸處以線扎緊以棉包裹以口咬斷蓋扎緊兒血不貫入胞衣自然萎縮弗脹而易下即或延緩數日亦無大害口咬則斷臍不犯乎刀剪自無冷氣內浸可免腹中弗痛之虞如或天氣寒冷坐草艱難母子勞傷元氣者先扎緊臍帶以油紙捻點燃火燒斷令暖氣入兒腹中此又為回生起死之妙法近有用蘄艾灸臍此法亦妙所留臍帶不可太長太長則難乾而易傷肌且恐引外風為臍風又不可太短太短則逼內而傷臟或致成腹痛而夜啼只宜以兒之足掌長短為度乃酌中之法千金論云須令至兒足趺上為度造道集云兒始生宜淨洗則燥血不留於折路之間可令皮膚光澤然後剪臍臍乃初生之蒂也剪之宜長一尺有二用粗線縛緊剪不長多生臍風縛不緊陰間虛腫裹臍法千金論云裹臍須用白練柔軟方四寸新棉厚半寸與帛等合之緩急得中急則令兒吐哯不可輕解解時閉戶下帳冬間用火令帳內溫暖仍以溫粉敷之若臍不幹者用絳帛燒灰敷之又方枯礬五錢龍骨一錢黃丹一錢麝香少許共研末敷之又亂髮燒灰敷之亦可或云黃柏末敷亦妙臍風方張煥論云嬰兒斷臍後宜用厚帛裹護若乳母不慎或因沐水入或兒尿袍中未換濕氣所侵或當風解視風寒所冒七日內遂有此疾令兒臍腫多啼不能哺乳即成臍風也臍腫當視輕重重者炙二三十次輕者但汁出多啼用炒當歸末和胡粉敷之常用熱絮尉之又初生七日內面赤喘急啼聲不出名曰嘬口臍風急看齒齦上有小泡如粟米狀即以溫茶蘸青軟帛裹指輕輕擦破兒即口開不須服藥又方白殭蠶直者四枚炒去絲嘴為細末蜜調敷唇內即愈繆仲純云嘬口之症必先大便熱須用生犀角及真羚羊角磨和蜜汁飲之有效急則宜用大黃二錢甘草二錢煎服又嘬口臍風身熱用膽草勾藤勾柴胡黃芩茯苓赤芍甘草桔梗各五分大黃一分煨棗引水煎服又臍風嘬口用艾葉燒灰填臍上以布裹之若臍帶已落用蒜切片貼臍上以艾火灸之又麝香少許研細放臍上將桐油煎雞蛋餅微溫蓋之吸去風毒一周時換去即愈浴方兒北方生兒多不洗浴初生下但以舊棉拭淨直至三四歲出痘後方浴或大小便處略以水揩抹之故北方人較南方人強健壯實不徒風氣然也若畢竟要浴取益母草五兩銼細煎滾溫溫浴之不生瘡疥又可祛寒氣風濕産家要訣云兒初出胎俗洗湯內宜加入食鹽少許洗畢拭乾以研細膩一錢許摩其遍身及兩脅然後包裹既不畏風又散諸氣今南方三朝方洗或三朝又洗將包裹之兒又復解開多半由此感冒驚風甚至延請賓客大衆看視多方稱讚以為熱鬧殊不知小兒業已受害不少此等風俗最壞蓋洗三雖云古禮而防患貴在變通惟有依前法出胎就洗無須三朝復又將兒解開再洗自是穩當保生要方云小兒初生水洗不得且以舊棉絮包裹大人懷中暖之浴後仍當如此雖暑月舊棉絮亦宜漸漸去之乍離母腹未可冒寒氣也預煎沸湯以罐貯之臨時熱洗不犯生水則兒不生瘡開口方太醫院支改齋先生辨之最詳謂痘之所生皆屬心火斯足破千古疑案可見古方用黃連甘草煎湯抹兒口以解胎毒者豈非瀉心火之藥也乎惟今人嫌其黃連大苦大寒多不敢用可即用金銀花甘草指許一節拍碎用水二挑煎一挑以棉蘸裹令兒吮之若吐出惡物為佳服一挑後不吐即不須服不問小兒虛實皆可服之凡兒生下月內每日必須洗口或溫湯或苦茶以青帛裹指頭蘸攪兒口內如齒齦邊有白點洗不去即以指爪或銀針挑破取桑樹汁濾清塗之永無驚風嘬口之患惟必須每日一洗留心看視不可疏忽又開口方生甘草一錢絲瓜子一錢水煎先吃數挑然後開口吃乳可一身無瘡毒小兒口噤方用蔥白一寸破作四片乳汁蒸灌之即愈乳兒法保生要法云小兒初生若多睡勿強與乳自然長而少病顱囟經云夏中盛熱時乳母浴後勿與兒乳免兒成胃毒赤白痢定息良久熟揉乳良久然後乳之可也小兒精要云夜間乳兒須乳母起坐抱兒乳之兒睡忌乳恐母鼻風吹兒囟門致成風疾母有孕乳兒必患胎黃母大醉乳兒必患驚熱母傷飽乳兒必成喘急母大怒乳兒必成癲狂母新吐乳兒必患虛羸養子真訣云乳子須調護看承莫縱弛乳多終損胃食舊即傷脾衾厚非為益衣單正所宜無風頻見日寒暑順天時小兒初生調護世間多有用黃連拭口者不知黃連大苦大寒能損胃氣小兒初脫母胎全賴後天脾胃強健豈可即以苦劣之味相犯他日變嘔變瀉不乳腹痛長病驚勞皆由此起陳文中曰小兒初生便服硃砂輕粉白蜜黃連本欲下胎毒不知此皆傷脾敗陽之藥輕粉損心硃砂損神兒實者服之軟弱弱者服之易傷反致變生諸害不可不察真至言也小兒初生兩乳必有餅子須時常揉撮捏去乳汁以散為度否則腫硬成毒如初生洗浴時即將兩乳頭各捏一把便無此患小兒初生肌膚未實腠理未密宜用舊絮護其背不可太暖致令出汗使表虛易受外邪小兒雙滿月後若遇晴和天氣令乳母抱兒數見天日則血氣剛強肌肉緻密可耐風露若厚衣暖被藏於重幃密室則筋骨軟脆不任風寒多易致病所以貧兒堅徑無疾富兒柔脆多災譬諸草木方生以物覆蓋緊密不令見風日雨露則萎黃柔弱矣小兒衣裳被衲日曬日收不宜在外過夜書云天上有飛星惡鳥不可干犯小兒染著戾氣生無辜疾啼叫不絶須即換下所著衣服醋炭烘之太陽照之小兒腸胃細嫩如蔥乳哺不宜過飽陳氏所謂耐三分寒吃七分飽頻揉肚少洗澡要背暖肚暖頭涼心胸涼皆至論也又須令乳母預慎七情厚味炙爆則乳汁寧淨兒不致疾小兒乳哺須要得法乳者奶也哺者食也乳後不可便與食哺後不可便與乳乳食相連難以克化大者成癖疳小者泄痢腹疼凡乳兒先須挼去宿乳少許然後與兒吮之乳亦不可過飽飽則溢而成嘔吐若乳來多急取出餒後再乳夏月不去熱乳冬月不去寒乳令兒瀉痢不可不慎凡乳母臥寐母當以臂枕之令兒頭與乳相平母欲睡著時即奪其乳恐其不知飽足亦致嘔吐若父母交合之間兒臥於側或驚醒啼起不可即與乳吮蓋氣乳未定恐致殺兒也小兒飲食有任意偏好者無不致病所謂爽口味多終作疾也極宜慎之嘗見王隱君曰余幼時酷嗜甘飴忽一日見飴中有蚯蚓伸頭而出自此不敢食飴至長始知長上為之此可為節戒之妙法小兒始生肌膚未實宜單衣不宜暖衣暖則筋骨軟弱易發瘡瘍宜舊絮不宜新棉新則汗出表虛易受寒邪宜見地氣宜見風日不見地氣風日則肌膚柔軟易得損傷嘗見富貴之家重茵疊被日在懷抱中雖數歲亦未能行而田舍小兒終日暴露或飢或寒絶無他病譬如草木生於深山峻谷及大澤中容易合抱至園圃奇材異卉縱加培擁多有秀而不實者豈貴賤之理有異哉小兒精要云初生小兒不得用油膩手包裹春忌覆頂裹足夏忌飲冷食冰冬忌炙衣被要得小兒安常帶幾分飢與寒真至言也小兒腸胃脆窄若稠黏乾硬酸鹹辛辣之物及一切魚肉水果濕面燒炙煨炒煎爆俱是發熱難化之食皆宜禁絶乳婦無知畏其啼哭無所不與積成痼疾雖悔何及語云惜兒須惜食記之記之養子真訣云吃熱莫吃冷吃軟莫吃硬吃少莫吃多真妙法也延生第一方小兒臍帶脫落放新瓦上四圍著火燒至煙將盡取出放地土上用碗蓋之存性研為末將透明硃砂水飛墳極細末若臍帶有五分重硃砂用一分五釐生地歸身煎濃汁一二蜆殼和前二味抹兒上齶間及乳母乳頭上一日之內服盡次日大便下汙穢濁垢之物終身永無痘疹之患小兒感冒不須服藥初生小兒受風鼻塞不能吮乳不可輕易發散惟用大天南星為末生薑自然汁調成膏貼於囟門即愈或以草烏皂莢為末蔥汁搗膏貼於囟門亦妙小兒偶因寒熱不調柔弱肌腠最易感冒發熱不必用藥但於其熟睡之時夏以單被冬以棉被矇頭松蓋勿壅其鼻但以稍暖為度使其鼻息出入皆此暖氣少頃則微汗津津務令上下稍透則表裡通達而熱自退矣若寒天衣被冷冽汁不易得則輕摟著身赤體相貼而上覆其面則無有不汗出者此至妙之法百發百中者也若寒邪甚者兩三微汗之無有不愈此法行於寅犯之時則汗易出而效尤速初生三急病初生有三病一口噤一臍風一撮口名雖有三病確一類皆急症也口噤尤甚過四月方免此症百日內須防病甚者多不治口噤口噤者又名噤風眼閉口噤不乳啼聲如鴨或舌上聚肉如粟米狀大小便皆通但口噤面赤多啼口不吐白沫與撮口異撮口撮口者唇撮聚而不開而目青黃啼聲不出氣自喘急口吐白沫舌強唇青聚口撮面四肢冷皆不可救也其或肚脹筋青呷腸卵疝內氣引伸皆腸胃不通所致臍風臍風者臍腫腹脹四肢柔直啼不吮乳甚則發搐若臍邊青黑手拳口噤不治矣按以上三症非獨謂斷臍之時為水濕風邪所乘亦多因胎中受熱兼之風邪所激裡氣壅滯嬰兒在胎口有液毒即胎毒也必須於生下未啼時早為預備絲棉裹指挖去口中濁穢以清臟腑然臨産倉卒之際多不暇及及至啼而挖之早已咽下是以貴在神速早為留心預備為要如患三急症多不可救事已至此不可因循畏縮姑息誤事惟有用古方天麻丸定命丹銀硃丸可量與圖生然七日內見者恐亦難也所以愛惜子嗣者於胎前臨産斷臍保護等事當留意焉凡小兒初生七日內或月內若有臍風等症急看小腹必發青筋一道行至肚生兩丫叉及行至心不救即以艾團灸其筋頭上兩丫叉盡頭處一灸青筋即縮下寸許再灸再縮以青筋消盡為度艾團不過如赤豆之大或如麥子大此法極為見效天麻丸治斷臍後為水濕風冷所乘入臍流於心脾遂令肚脹臍腫四肢柔直日夜多啼不能吮乳此方利驚化痰並治釣腸鎖肚等症南星二錢炮白附炮牙硝天麻煨五靈脂全蠍各一錢輕粉五分巴豆去淨油二分半共為細末稀糊丸麻子大每服三丸薄荷生薑湯化下定命丹治急驚天釣撮口通利痰熱全蠍七個天麻煨南星白附子炮各二錢半硃砂青黛各一錢半輕粉麝香各五分冰片二分半共為細末粟米糊為丸緑豆大每服一丸荊芥薄荷湯化下先研半分吹入鼻中朱銀丸治臍風壯熱痰盛翻眼口噤取下胎中蘊受之毒亦治驚積量病用之全蠍一錢白附子炮一錢半南星炮硃砂各二分半牛黃五分蘆薈五分天漿子麝香各五分冰片二分半直殭蠶炒十條水銀一錢蒸棗肉研始泥鉛霜五分和水銀研共為細末粟米糊丸如芥子大每服一丸薄荷湯化下如未利加至二三丸附藏胎衣法凡年遊白虎殺神在太歲後一位如太歲在卯則白虎在寅若産及藏衣犯之子母皆不利擇天德月空之辰於向陽高燥處掘地三尺埋之須堅築勿令有損俾兒壯健不可忽略小兒雜症小兒撮口撮口者口撮如囊也吮乳不得舌強唇青面色黃赤乃心脾之熱受自胎中而然也其症險惡急用紫蘇前胡直殭蠶炒各五分水煎去渣候溫用棉花蘸藥滴口中頻頻潤之以口開為度切勿即令其吮乳又方口含上好燒酒對臍吮之極效又方取父母手指甲三分炙灰研極細以乳調下又方芥菜子搗汁掐唇破塗之又方用牛黃二分調竹瀝灌入口中小兒噤口不乳噤口之症失治多致不救其症舌上生瘡如黍米狀吮乳不得其聲漸小因胎熱所致也急用天南星為末加片腦少許共研勻以指頭蘸薑汁黏藥末擦牙齦上立開又或用牛共以竹瀝調服匙字隨以豬乳滴於口中又方用蟬蛻十四個去嘴腳全蠍十四個炒去毒共研細末乳調服每次一二分又小兒不吮乳方黑豆十九粒茅草根七節每節長寸許赤金器一件紋銀器一件人乳一杯共煎至五分灌之服完後即能食乳小兒臍瘡初生洗浴水氣不可入臍即包裹畢須常留意勿令尿濕浸臍稍不知慎遂成臍瘡用當歸焙乾研細末頻摻臍中久之自愈又臍突臍忽赤腫虛大光浮名曰臍突用黃柏研末釜底煙即百草霜亂髮燒灰各等分共研細末乾摻之或麻油調塗又方草紙燒灰亦妙又臍孔出水方牡蠣粉川貝母粉雲母粉生甘草粉陳壁土粉等分研勻摻臍中立愈小兒口瘡鵝口鵝口者白屑生滿口舌如鵝之口也不急治則殺人先煎生甘草湯用新軟青布蘸擦口內另用薄荷三錢黃柏二錢硼砂五分水飛青黛四分硃砂二分冰片二分枯礬一錢元明粉一錢共研極細末每用少許搽口舌上自愈外用麝香一分吳茱萸二分巴豆一粒去殼萆麻子二粒去殼鮮生地三錢共搗如泥貼兩足底湧泉穴即足心用帛扎一周時即愈無論何項口瘡口病以及重舌外敷之方總可通用均極效驗又小兒口中百病一切熱毒方元明粉硼砂冰片末硃砂明雄黃青黛黃連黃柏各二分共研極細末搽少許口角舌上即愈又口舌生瘡方用吳茱萸研末醋調貼兩足心過夜即愈又方明礬廚房中灰尖吊各等分為末雞蛋清調和成餅敷兩足心布包過夜愈後洗去又口瘡不能吮乳方密陀僧用生米醋調塗兩足心愈即洗去又口瘡並治馬牙疳方人龍即蛔蟲用尿洗淨瓦上焙脆研細末加青黛冰片少許研勻塗之均極效又口白舌硬不能吮乳用巴豆一粒麝香一釐共研成丸貼眉中心俟舌變紅赤色即愈小兒眼不開初生眼不開者因孕婦飲食不節恣情厚味熱毒熏蒸所致用燈芯黃連秦皮木賊各一錢煎湯頻洗之自開又以人中黃用滾水泡或蒸取濃汁頻咽極妙又急以糞清灌之又方生地赤芍甘草菊花各等分水煎服名地黃湯又外用熊膽黃連各五分煎湯洗眼如眼胞爛內仍服地黃湯外用乳蒸黃連點目又月內目閉不開羞明腫痛生甘草豬膽汁炙為末米泔水調少許灌之即愈小兒吐不止初出胞胎有因便祕腹中穢惡不淨令兒腹滿吐不止者用黃連枳殼赤茯苓等分為細末蜜丸梧子大乳汁調化一丸灌入口中又有用木瓜生薑煎湯灌之亦可又初生三日內吐乳方丁香三粒陳皮三分煨薑三分水煎服又初生不乳嘔吐者因臍尿未下腹滿故也用一捻金開水調灌如多啼面色青白即系胎寒腹痛也宜審明寒熱用勻氣散或用白蔻仁砂仁炙草共研極細末常搽入兒口中或抹乳上令兒食之若直出不停留者炒麥芽二錢橘紅一錢丁香三分水煎服立止小兒口生馬牙小兒初生及百日內外齒根上有白點白泡狀若粟米如輕者即用薄荷黃連甘草煎湯蘸青軟布裹指頭將口內白點洗去再將口涎絞淨即微出血亦無不可總以白點淨盡為妙再以薄荷甘草黃連湯磨好陳墨遍塗滿口勿令吮乳待睡片時無不立愈如重者即走馬牙疳因熱毒攻胃所致急用銀簪或指爪將白點盡挑破出惡血勿令咽下急用軟帛拭去竟有挑下白點如半粒米者挑盡拭淨後隨用人中白即女人馬桶中結成尿硝者火煅存性一錢加入緑礬火煅存性五倍子炒黑冰片各二分麝香少許共研極細塗患處勿令吮乳無不立效又用蒲黃蒸濃汁青布蘸汁塗洗亦效又瓦上經霜貓糞煅存性為末每一錢加入青黛五分黃連三分冰片一分共研極細末摻牙根上亦效又大棗一枚去核以坑砂填滿棗子內用泥裹再將濕草紙包好放炭火內煨透去泥草紙單用棗子坑砂研極細末加麝香少許搽牙疳上即愈又走馬牙疳方黃連一兩硼砂膽礬各一錢冰片五釐共研細末搽之又方銅緑水飛雄黃水飛五倍子炒焦枯礬白羯燒存性烏梅肉炙乾細辛去葉蘆炒焦胡黃連炒焦各等分研極細末先用老茶葉蔥根煎湯以青軟帛洗去腐肉見鮮血將藥搽上再內服蘆薈銀柴胡胡黃蓮真川連牛蒡子元參桔梗山梔石膏薄荷羚羊角各五分甘草升麻各三分淡竹葉十片水一鍾煎六分食後服此方雖穿腮破唇皆可醫治又小兒牙根腐爛方黃柏黃連硼砂膽礬青黛各等分共研極細末搽患處立愈小兒夜啼夜啼不安有寒熱驚滯四因須審視明確以便按症用藥寒啼者脾氣寒冷陰盛於夜則腹中作痛故面青手冷腰曲而啼也宜用炙黃耆當歸甘草赤芍木香等分為末每塗乳上令兒吮之熱啼者心火煩盛面赤手暖口中氣熱仰身而啼見燈火愈啼也宜用勾藤勾茯神甘草燈芯辰砂木通各一錢煎湯服之滯啼者乳食停滯作痛啼而不哭直聲來往無淚者是也用生麥芽山楂炭各一錢煎湯服驚啼者心氣不足神不安寧哭而不啼連聲多淚者是也宜從驚治服天王補心丹外治以灶心土蚯蚓泥等分為末水調塗兒頭頂及足心上為妙又小兒內熱心煩夜啼方蟬蛻四十九個去頭足翅淨用後半節加茯神二錢共研細末分作四服用勾藤勾煎湯調服藥完即愈惟合藥時忌婦女小兒見又夜啼不止方用牽牛子研細水調敷臍上即止小兒晝啼不止用牛黃辰砂各五釐飛淨共為末薄荷湯入酒少許調下即止取雞屎塗臍中男雌女雄亦妙又驚啼方燈芯灰五分薄荷湯調服神效小兒小便不通初生不小便者乃胎熱流於下也用導赤散生地木通各三分甘草一分淡竹葉五分熱甚者用八正散煨大黃車前子木通滑石梔仁瞿麥萹蓄甘草各等分燈芯引水煎服又方用木通茄兒蒂煎服立通又搗蔥汁人乳汁各半調勻抹兒口中須臾即通小兒口吐白沫四肢冰冷最為惡症急看牙根上有小泡子如粟米狀照前法挑破輕輕拭淨惡血勿令咽下前各方治之最為奇效小兒重舌木舌重舌木舌乃舌下生舌也切不可刀剪傷之宜用竹瀝調蒲黃生末勻敷舌下神效或用頭髮燒灰五分搽之又胎毒重舌馬牙牙根腫脹不能吮乳桑樹日出時用刀砍桑樹二三下少時桑樹漿流出取漿和蜂蜜少許塗之立愈此方並治臍風鵝口口舌生瘡各症極為神效初生小兒頻頻與看總宜勤拭口稍有故勤搽桑樹汁免致舌硬口緊漸成撮口則難治矣小兒月蝕耳疳瘡用胡粉和東方陳壁土為末敷之耳內流黃水膿汁臭爛水龍骨船底縫中陳油石灰一兩硼砂二錢半共研末和勻每用少許以鵝毛管吹入耳中即愈耳邊鼻下赤爛黃丹煅令赤色緑豆白礬各一錢共研末唾調敷頭骨縫開不合即囟門不合小兒頭縫不合名曰解顱用蛇蛻炒焦為末和豬頰骨中髓調敷頭頂上日搽三次久之自愈又囟開不合鼻塞不通用天南星泡去皮為末淡醋調緋帛上貼囟門烘手熱頻尉之立效又小兒囟陷用半夏末水調敷足心自愈又小兒囟填謂囟門腫起也也黃柏末水調敷足心即消又囟開不合用於薑七錢細辛桂心各五錢共為末薑汁和敷囟門候小兒面赤即愈小兒頭上軟癤枯白礬末清油調敷又方取桃樹上不落下之干桃子燒灰存性研末清油調敷又頭上熱癤方發麵一塊調稀貼癤上中留一孔又鱔魚尾貼上即不疼而愈又癤老不穿方用鐵燈盞盛桐油燒滾加入密陀僧少許候冷搽上癤即穿潰不疼痛又小兒熱癤方芙蓉葉菊花葉共搗爛敷之或煎湯洗亦可小兒頭上生瘡浸淫成片用生芝麻以口嚼爛塗之又貓公刺嫩尖擂取汁搽之又白莧菜梗燒灰存性皂角焙枯存性共研末麻油調搽又小兒頭爛方輕粉樟腦各一錢明雄黃水粉廣黃丹乳香各三錢硼砂二錢熟石膏四錢共為末麻油調搽又核桃肉連皮燈火上燒枯碗蓋去油火毒為末加輕粉少許菜油調搽數次即愈又水浸松木黑油傘衣陳艾葉陳蒜根用老桐油罐盛藥煎水洗之洗後再用皂角叢竹殼均燒灰存性麻油調搽小兒頭上肥瘡或遍身腐爛並治諸般爛瘡羌活大黃炒花粉各三錢黃芩黃柏防風白芷各二錢乳香沒藥雄黃各錢半叢竹殼桐子殼小白栗樹球子共炒黑研細末加皮煙膏末一兩五錢加三仙丹底三錢木油五錢麻油調搽極效皮煙膏即熏牛皮灶木板上之膏小兒眉叢生瘡穿山甲取前膊二甲炙焦為末加輕粉少許清油調敷或用蒜瓣燒灰燈油調搽均極效小兒耳前後生瘡黃柏枯礬海螵蛸滑石龍骨各等分共為末如濕即乾摻如干用豬油調敷神效小兒甜瘡多生於面部兩耳前令其母口中嚼白米成膏子臨臥塗之三五次愈小兒胭脂火眼萆麻子去皮研爛並鏽鐵磨水調勻於紅處周圍圈之候乾再又隨即圈塗之即愈小兒火丹從背上起頭上起者用瓦蔥搗汁敷之又方用針刺紅處出惡血或用寒水石為末油調敷又鮮側柏葉瓦蔥共搗爛加大黃末和勻醋調敷即愈又鬼臉火丹滿面頻出膿血發癢難禁者爐甘石二錢火煅入黃連汁內淬三次輕粉一錢熟石膏二錢鉛粉七分冰片一分天竺黃一錢共研末摻上又馬蟻火丹方大黃穿山甲炒共研末用木鱉子磨汁調塗又㾦子火丹方腹內有塊身發寒熱者薏苡仁根一兩搗爛酒水各一盞煎空心服兩次即愈又抱頭火丹方先砭去火血以炒黑山梔大黃雄黃等分為末水調敷或以雞蛋白調雄黃敷亦效又水蛇火丹方用灶心土水磨塗之少頃水氣干後藥上覆又潮濕乃是泡中之毒水出也拔完即愈如先已挑穿者再加六一散等分敷之即結疤小兒赤遊丹毒小兒一歲以內身發赤遊風者皮上如丹塗之狀故謂之丹一切紫赤丹瘤總由孕母血熱留胎熱毒蘊於腠理或乳母好酒嗜辛喜啖炙爆或烘曬熱衣即與包裹柔嫩肌膚感受熱毒所致發於四肢易治入腹入囊皆難療也發於頭面胸背身如火灼煩躁脹悶者古謂之入心必死治法用朴硝大黃青黛為末新汲水調敷或芭蕉根搗汁塗之干則再塗冬月畏冷稍溫塗極妙無論赤白丹毒如用寒涼藥塗之不效者即取灶心土研極細末以熟雞蛋黃熬取油調塗必效又小兒火毒赤遊方韭菜地內蚯蚓糞煅研以麻油調搽立愈或用蚯蚓煅灰存性加冰片少許雞蛋白調塗亦效又小兒赤遊丹行於遍身至心胸不救用芒硝納湯中取濃汁以拭丹上大效又雞蛋三十個煮熟去白用黃炒出油取油塗之立效取雞蛋油法將蛋黃炒至黑則其油自出又方明雄黃三錢人中白錢半青黛五分冰片三分共研為細末蚯蚓糞粗壯者佳用六錢若濕者用一兩研細和勻用童便調塗數次即愈重者須塗數日愈又方取多年糞坑底磚研末麻油調塗極效又鱔魚血塗之亦效須內服煎藥方天花粉生大黃川通草各五分水煎服又方黃柏大黃各三錢黃連一錢冰片三分共為末用豬苦膽汁調敷患處軟絹扎好並治猴猻疳神效又初生小兒手足紅赤名曰遊風流火如從足起遊至小腹手起遊至胸膛多至不救急用此方救之馬蘭頭不拘多少以水洗去泥搗絞汁搽患處燥則再搽屢用屢效冬月無葉用根亦可又方或大小白菜搗爛敷患處又或用風菱角殼煅炭存性研末麻油調搽均極神效小兒奶癬瘡大楓子肉黃柏各五錢蛇床三錢枯礬雄黃各一錢輕粉一錢二分共為末臘豬油調搽又方川貝母金銀花各二兩為末煉蜜為丸每重一錢開水化服小兒胎毒胎瘡小兒頭上紅赤癢極搔破出血癢後大哭不睡或遍身無皮一片血肉其癢非常用白附子蛇床子黃丹各五錢羌活獨活白蘚皮飛滑石雄黃枯礬各三錢五分胭脂三錢五分燒灰共研極細末瘡干香油調搽瘡濕即乾摻之一切癢瘡皆效小兒胎瘡麻油三兩同鮮槐樹嫩枝熬枯去渣入鉛粉一兩輕粉五錢石膏三錢和勻調搽又人口黃水蒸濃汁頻灌之又金銀花鮮者四兩曬乾不要見火炒研末加白洋糖一兩拌勻瓷瓶收貯隨時服或作糕餅食能解胎毒小兒胎毒肥瘡花椒白芷黃柏炒各三錢鉛粉枯礬各二錢共研末麻油調搽即愈又胎毒肥瘡膿窠疥瘡並黃水等瘡驗方硫黃花椒煙膏炒黃柏黃丹大楓子樟腦銅青枯礬輕粉各一錢共研細末用菜油調搽極效小兒白禿癩瘡取石灰窯內燒紅流結土渣二兩百草霜五錢雄黃五錢膽礬三錢榆樹皮錢半輕粉五分共為末用豬膽汁調勻剃頭後即搽之神效又方用鱔魚一條搗爛敷之又松香研細剪青布尺余長將松香裹成長捻一條以線纏好入香油內浸透以火點燃取其滴下之油以碗接之搽禿瘡極效小兒天泡瘡蓮房殼二枚煅存性研末井泥調敷又白荷花不拘多少曬乾研末香油調搽又天泡瘡肥瘡白蛇串各瘡屢驗方真香油加舊生鐵上鐵鏽刮下不拘多少再加靛青少許共入油內調勻搽瘡上極效小兒頭上黃水瘡並治禿痂瘡松香二兩為末入蔥管內用線扎定水煎溶去蔥候乾加水飛黃丹一兩無名異一錢炒官粉一錢炒輕粉三分炒共為末香油調塗又蟬蛻蛇蛻松香油頭髮等分用粗紙包藥成條浸漏燈桐油內候透取出以火點燃接取滴下之油先洗淨患處將油搽擦小兒盤腸氣痛月內之兒多有此症梔仁五錢附子二錢二味同炒黑選去附子用梔仁加白芷一錢研末以小茴香煎湯調灌三分又小兒生下二三月之間腹痛夜啼吐乳不止用乳香一錢去淨油燈花七枚共研末每用乳汁調下二分小兒嘔吐泄瀉車前子一錢肉豆蔻三分砂仁五分陳皮甘葛各一錢子丁香三分生甘草五分酒芍八分麥芽山藥各一錢共研細末每服五分薑湯調下又方糯米粉三錢用雞蛋清調攤紙上貼囟門瀉止去藥如嘔吐不止亦用此方貼腳心其吐即止神效又吐不止臍尿不下便祕腹脹生後冒寒犯胃曲腰而啼用香蘇飲制香附紫蘇各一錢陳皮甘草各五分薑蔥引水煎服又小兒水瀉不止方用蔥薑搗爛入黃丹末為丸填臍內以膏藥蓋之瀉即止又溏瀉用柿餅燒熟食之又小兒熱吐不止方黃蓮七分薑汁炒厚朴一錢薑汁炒薑棗引水煎服小兒初生髮驚此胎驚也用硃砂雄黃各等分為末取少許豬乳汁調抹口中即效入麝香少許更妙又用豬乳牛乳同硃砂和勻抹口甚效小兒疳疾各方小兒最多疳疾皆因飲食不節所致然疳有各臟不同宜審明症候對症治之自然見效小兒心臟受疳小便不痛口乾舌爛牙臭方用羊肝散穀精草五錢胡黃連二錢銀柴胡二錢地骨皮五錢蘆薈三分甘草三分共研細末每用羊肝一具竹刀剖縫入藥末五分以線縛固砂罐內蒸熟隨時服連服七日見效肺臟受疳龜胸咳嗽發熱夜啼方用二冬膏天冬麥冬苦楝皮桑白皮橘紅生地各三錢河水十碗蒸至一碗濾去渣再用白蜜八兩共熬成膏再用山藥一兩為末攪勻每服一二匙日三次服完即愈脾臟受疳夜出盜汗泄瀉口乾方用白朮湯白朮白茯苓澤瀉各二錢胡黃連陳皮各一錢神麯炒黃山楂各五錢共為末每日清米湯調下一錢極效肝臟受疳積熱眇目名盲矇眼方用雞肝散夜明砂一錢水飛淨明雄黃威靈仙穀精草蛤粉各一錢共為末用雞肝一具入藥末五分砂鍋內煮服連服七次即愈腎臟受疳肌體瘦極遍身瘡疥或作寒熱頭熱腳冷或齒根宣甚則牙根潰脫名為走馬牙疳方分外吹內服人中白二兩粉兒茶一兩黃柏薄荷青黛各淨末一錢冰片五分共研極細末先用溫水漱口然後以藥吹牙根日吹六七次吹藥後涎從外流為吉涎毒內收為凶又內服方蘆薈銀柴胡川黃連胡黃連元參桔梗炒山梔石膏牛蒡子薄荷羚羊角各五分甘草升麻各三分淡竹葉十片水煎食後服此方雖穿腮破唇俱可治又五疳丸統治小兒五種疳疾方羊肝一具竹刀切片瓦上焙熟海螵蛸二兩醋浸炒黃老粳米五錢炒共為細末和羊肝搗為丸如黍米大日服二三錢米湯下又治小兒五疳八積腹大黃瘦骨立頭生瘡發生結方用大蝦蟆一個放瓶中棉紙封口七日後取糞中蛆洗淨不拘多少入瓶中俟蝦蟆食完取蝦蟆去頭爪與肝腸以麻油塗蝦蟆身瓦上焙枯為末米湯調服或用蜜為丸連服五六個一月後形容頓改病除體壯兼治小兒癬瘡口耳瘡久不愈者謂之月蝕俱用此藥末調香油塗瘡極效又疳疾奇效方立秋後取大蝦蟆一個去頭足及腸雜以清油塗之瓦上焙乾食之又疳疾初起方蘆慶子內蟲即野茄每服五六條搗爛和酒釀沖服均極神效又疳疾珍珠散祕方治小兒疳膨食積面黃肌瘦目生翳障等症選取肥厚左牡蠣五斤好香醋七八斤上藥選擇黃道天醫吉日齋戒沐浴在潔淨室內安置八封爐加旺炭火將牡蠣用醋煅以酥為度放乾淨涼地土上去火氣揀起淨肉研極細無聲收貯聽用每歲一分每服用弗落水雞軟肝一個忌鐵器用銀簪挑去筋膜乾布抹去血水竹刀劃開將藥摻上放飯鍋上蒸熟不加鹽淡吃輕者二三服重者亦不過四五服無不立見神效濟世養生集毛氏達可曰此方極祕今刻而公諸世誠不啻蒼頡之造字也幸勿忽視又小兒腹內積聚成疳作痞發熱口渴面黃腹大飲食少進方蕪荑火炒去衣胡黃連黨參焦白朮蘆薈雞肫皮炙焦五穀蟲炒各二錢五分使君子肉夜明砂各一兩淘洗共為細末蒸飯為丸如彈子大如眼內有瘼用豬睛肉煮湯化一丸服之余用米湯化下空心服午後再服其疾其愈又小兒疳疾壞眼方穀精草炒小青皮炒刺蒺藜青黛海粉各一兩共為細末每早用三錢羊肝七片拌藥蒸熟不加鹽淡吃藥完眼愈均極神效又小兒疳瀉方用活蝦蟆一個火煅枯存性研末水調服即愈又疳疾遇仙方治一切肚大黃瘦腹痛蟲積等症神效雄黃三錢膽星二錢全蠍火炒去足殭蠶各錢半麝香五分巴豆五分紙打去油硃砂飛二錢為衣上藥共稱準淨末神麯糊為丸如菜子大每日白湯送下一丸杭州智榮和尚得此方濟人千萬矣又疳膨食積方五穀蟲大麥芽青皮使君子四味均炒山楂炒肉果煨二味均減半共研末每服白滾湯送下三錢小兒疳痢歌仙方孩兒雜病變成疳不問贏強女與男煩熱毛焦鼻口燥皮膚枯稿四肢癱腹中時時便下痢此方更用青黛散孩兒服之百病安單用飛淨青黛一味研細水調服之又疳疾方黨參焦朮茯苓甘草蘆薈各五錢蕪荑使君子肉夜明砂各二兩陳皮四錢蜜丸彈子大每服一丸以絹袋盛之精健豬肉同入砂鍋內煮熟食肉連湯藥下輕者三丸重者七丸又方黨參焦朮茯苓神麯麥芽山楂肉均炒各一兩陳皮黃連胡蓮蘆薈使君子澤瀉肉果麵包煨炙乾蟾甘草各五錢砂仁去殼三錢木香不見火二錢共研末神麯糊為丸彈子大每服一丸空心薑棗湯下小兒脾胃虛弱泄瀉黃瘦不思飲食等症土炒白朮二兩白茯苓陳皮蓮肉去心酒白芍山藥各一兩麥芽八錢山楂肉七錢人參甘草黃連薑製厚朴薑製各五錢木香不見火三錢共為末神麯糊為丸如龍眼大每服一丸薑棗湯下泄瀉加肉豆蔻麵包煨五錢腹痛有蟲加使君子肉一兩小兒吐瀉吐瀉不止不早治即變為慢驚風用小丁香陳皮各等分煎服立愈又方焦白朮一兩陳皮八錢神麯麥芽山楂肉各七錢炙甘草五錢共為末陳老米糊丸龍眼大每服一丸老米湯下夾風寒紫蘇甘葛湯下又受暑吐瀉方採背陰側柏葉入井水搗汁加蜜三茶匙和勻灌之小兒小腸氣痛用蓮蒂絲瓜燒存性研末每服三錢熱酒調下三服即消腹痛蛔結用艾煎水一二盞飲之即愈小兒腹脹韭菜根搗汁和豬脂煎服小兒臍腫先用荊芥煎水洗臍後用蔥葉一斤火上炙過放土地上出火氣以指甲刮薄肉搭放腫入次日即消小兒疝氣腫硬用古銅鏡煮湯服又蚯蚓屎曬乾為末唾津調敷小兒陰囊腫多因坐地上受風濕或蟲蟻吹所致用蟬蛻五錢水一杯煎湯洗腫處二三次又桃仁研末唾津調服又小便腫用韭菜地上蚯蚓糞火煅以碗蓋地上出火氣為末清油調敷小兒寸白蟲取酸石榴東引根二兩糯米三十粒水一碗空心煎服須泄瀉又一切蟲痛方苦楝皮向東者去白使君子肉用一半生一半熟鶴蝨去土蕪荑檳榔胡粉炒雷丸各一兩共為末水疊為丸緑豆大空心開水下小兒愛吃黃土用干黃土研細以黃連煎濃汁作餅服小兒牙齒不生用雄鼠糞二十一粒兩頭尖者即是雄鼠糞每日用一粒揩齒根上揩至二十一粒即生小兒腹痛蟲厥各方用陳鹽梅五六個去核納砂糖於內瓦上焙燥研細末開水泡服或兼嘔吐須服椒梅理中湯又方使君子肉十個炒香檳榔一錢棐子肉十個甘草一錢共研細末米飯為丸如桐子大每服十丸須月初服更效蟲頭向上故也服至二日大便解蟲五日全愈體弱者須再服六君子湯數劑又方用鵝不食草蒸豬精肉淡吃二三次蟲即化為水又下蟲方棐子四十九個去殼以白糖水半碗入砂鍋內煮乾熟食每月初每日空心食七個七日食完蟲化為水凡小兒每逢月初食免患蟲疾又方楝樹根皮二兩使君子肉一兩檳榔三錢花椒開口者去核四十九粒生薑一兩水煎濃汁去渣再加入白蜜一兩熬濃逢月初五更時溫服蟲即下又小兒有蟲微弱不任藥者用陳石灰數斤以瓦盆盛之入水順手攪數百轉澄清一宿面上起有浮皮一層將浮皮取起蒸雞蛋於月初與兒食之又蟲痛口流涎沫方用使君子微炒研末五更時米湯調服又治小兒腹中寸白蟲方飛羅面製半夏生白礬各三錢共研細末水泛為丸分作三服白湯送下蟲即化大人照方加十倍用之又方蔥汁半杯菜油半杯和勻服下蟲化為水瀉出除根又蟲積肚痛方使君子取淨肉黑牽牛三稜莪朮檳榔生大黃臭蕪荑貫衆鶴蝨青皮各等分共研細末米糊為丸每服一錢薑湯調服或再加雷丸又小兒肚脹方無論蟲脹氣脹均效惟脾虛作脹不效使君子肉檳榔黑醜白醜各錢半九孔石決明煅二兩共研細末每用一錢蒸豬精肉二兩服至用藥末二兩為度小兒黃瘦肚大頸干微弱已極焦白朮貢白蓮去心各三兩懷山藥炒四兩芡實肉二兩楂肉兩半真茯苓兩半均用飯蒸幾次神麯酒白芍漂淨五穀蟲各五錢陳皮澤瀉甘草各三錢烘燥共為細末或和入炒米粉內加糖每日作點心食之大有效驗太和丸治小兒內傷乳食嘔吐腹脹外感風寒頭疼發熱蘇葉香附酒製蒼朮米泔水浸羌活川芎神麯山楂炒枳殼炒廣皮麥芽生甘草各一錢共研細末煉蜜為丸如芡實大每服一丸滾湯化下萬全湯治小兒感冒發熱無論早晚皆可服柴胡五分白芍一錢當歸五分土炒白朮三分茯苓二分甘草一分山楂三粒黃芩三分蘇葉二分麥冬一錢神麯三分水煎熱服春加青蒿三分夏加石膏三分秋加桔梗三分冬加麻黃一分有食滯加枳殼三分有痰加白芥子三分瀉加豬苓一錢吐加豆蔻一粒有驚加金銀器各一件同煎照方按時對症服小兒咳嗽紫蘇五分桔梗一錢甘草一錢水煎熱服有痰加白芥子八分又小兒沐浴須用生老薑搗碎入水煎湯以免感冒風寒又小兒肺火夜間咳喘久不止用薏苡仁一合山藥三錢竹葉三十片梨二片水二碗煎作茶吃每日飲數次又小兒百日內咳嗽方用川貝母五錢薑湯飯上蒸過甘草二錢半生半熟共研細末每用少許以砂糖調服小兒霍亂吐瀉不止高粱連殼炒焦煎湯調灶心土細末服之須年久灶心土為細末又過篩中暑吐瀉或卒然昏倒取背陰側柏葉搗汁三匙生蜜三匙井水三小杯調勻灌服即愈小兒失音不語取蝦蟆膽汁點在舌尖上少頃即能開音小兒卒死小兒無故卒然暴死不解何故急以狗糞一枚絞汁灌之可活又方用蔥白納入下部及兩鼻孔中噴嚏氣通即活或牙皂研末或聞鼻丹嗅鼻俱妙小兒痞塊積滯腹痛荸薺二斤去皮飴糖二斤共入砂鍋內添水少許煮極熟不拘時常服之自愈又痞塊肚大肌瘦面黃方白芙蓉花陰乾研末入雞肝內扎合飯上蒸熟食數次愈小兒口舌生瘡乃胎熱心熱及一切熱毒所致也元參五錢白茯苓七錢半桔梗青黛各四錢生地三錢生甘草三錢麝香二分共研細末蜜丸雞豆子大金箔為衣每服一丸小兒丹毒用船底青苔刮下敷之又灶心土為末雞蛋清調塗小兒生瘡如粟成城成路極痛者名龍纏瘡用生鮮珍珠鳳尾草搗爛搽敷其渣又用清油調敷即愈小兒臍氣肚痛驗方初生月內日夜啼多因此症甲魚腸焙乾小茴香鹽水炒三分同研末蒸水灌下即愈小兒痢疾香菌五錢紅糖白糖各二錢半煎湯服立愈又方用雞蛋一個炙極硬去白將黃研碎入薑汁半小鐘和勻服之勿飲茶又外治方土木鱉半個母丁香四粒麝香一分共研爛唾津和丸如芡實大納一丸入臍中以膏藥貼之又方用桐葉煎湯洗足三五次均極神效又治小兒噤口痢方用陳年臘肉煨熟食之或用陳年臘肉骨火上燒煨煎湯飲之胃口即開小兒瘧疾用胡椒三粒研細末入砂糖少許調勻為丸前一日入臍內以膏藥蓋之至瘧日未來前抱其外遊即止又方未發前一刻以蛇蛻塞鼻孔男左女右過時取去極效小兒瘟疫用大黃四兩皂角二兩共研末水泛為丸每服一錢量兒大小服之用無根水送下神效小兒水腫腹脹小便不利大田螺四個大蒜五個車前子三錢共研細末加麝香少許再研勻為餅每用一個貼臍中將膏藥蓋之水從小便出即愈又小兒遍身浮腫方用香苞皮水煎濃湯與兒沐洗即愈小兒疝症金鈴子肉一兩吳茱萸五錢共研細末酒煮麵糊為丸如麻子大每服數丸鹽湯送下又方經霜雪毛乾桃一對煅存性為末無灰酒調下自愈小兒尿血甘草一錢升麻三分煎湯加調六一散一錢溫服即愈小兒脫肛豬油二兩煉去渣入蒲黃末一兩調勻塗之肛即縮入又方用五倍子末敷之頻頻托入或煎湯洗亦可或用坎宮錠子塗搽俱效小兒遺尿烏梅益智仁各三錢真懷山藥五錢均用鹽水炒桑螵蛸二錢真龍骨二錢煅為末或為丸或煎服均可又方用不落水雞䏶胵即雞肫皮一具雞腸一條豬尿脬一個各放瓦上用火炙焦研細末每服一錢黃酒送下男用雌雞女用雄雞小兒神色論凡小兒有病宜先觀形症神色然後察脈如肝有病面青心有病面赤脾有病面黃肺有病面白腎有病面黑先要辨別五臟次看胎元虛實而治庶不誤於醫藥耳至於舌苔尤屬緊要白受寒糙黃受熱光紅色虛黑色受暑如三歲以下受病男左女右須看虎口三關第一節為風關第二節為氣關第三節為命關辨其紋色紫者屬熱紅屬寒青驚風白疳病黑中惡黃脾困若現於風關輕現於氣關重過於命關則難治矣三關紋色主病歌紫熱紅傷寒青驚白是疳黑時因中惡黃積困脾端女右男分左均須仔細看凡看小兒面部必須辨明五色然後治之小兒熱症有七面赤紅大便閉小便黃渴不止上氣促急眼紅赤鼻枯燥此七症皆實熱宜和解清涼不宜用溫補之藥小兒寒症有七面㿠白糞白清肚虛脹眼珠青吐瀉無熱足脛冷睡露睛此七症皆虛寒宜溫補切忌寒涼謹記熟讀庶不誤投貽害小兒驚風急慢驚風兩症總以前卷十內小兒科驚風門分別各方最為妥善屢經效驗業已詳細發明無須重贅茲又補録經驗各方及外治諸法俾可對症施治以備採擇小兒急驚風身熱面紅痰盛忽然手足牽引啼不出聲目睛上視用活蚌一個銀簪腳挑開滴入薑汁將蚌仰天片時即有水流出用瓷杯盛之隔湯燉熱灌下立愈又方石菖蒲洗淨連根搗爛絞取汁二三十匙生老薑搗汁數匙和勻隔湯溫熱灌下即愈又痰涎壅塞咽喉其響如潮名曰涎潮用金星礞石火煅研細末入生薄荷汁內少加白蜜調和隔水燉溫服之能降痰涎其藥自裹痰從大便出屢試極效慢驚忌服又黑神丸治急驚風極效垂死之兒一服即愈膩粉錢半金墨飛面蘆蔡各一錢麝香龍腦牛黃青黛使君子去殼麵裹煨熱各五分共研細末麵糊為丸如桐子大每服半丸薄荷湯研下要利即服一丸又治急慢驚風方取大蝦蟆膽五個刺破入碗中再以飛淨硃砂五錢犀牛黃一分麝香五釐共入碗內研勻陰乾每用二分入乳調服又驚風神效祕方並治痰症生南星製半夏各一兩大皂莢三個江子仁四十九粒以上四味用陰陽水同浸一宿更換新水煎乾選去南星半夏皂莢三味只留江子仁去膜衣及心再用黑棗七枚去皮核真西牛黃一分輕粉八分梅花冰片五釐明雄黃一錢辰砂一錢以上五味研末與江子仁共和為丸如桐子大金箔為衣每服一分小兒只用五六釐淡薑湯送下一云江子仁須用紙數層壓去油又方杏仁桃仁糯米胡椒各七粒梔子七個共搗爛用雞蛋清調羅飛面敷小兒腳底心男左女右過一夜次日腳底甚黑即愈又方黃梔子雞蛋清飛羅面連須蔥白共和搗數百下敷臍下及手足心又方硃砂用新汲水研塗頂心前後心手足心均極神效又小兒急驚痰迷心竅不省人事以聞鼻丹或用行軍散搽少許入鼻中取噴嚏以通其氣即蘇小兒慢驚風人參五錢焦朮炙黃耆陳皮山藥炒白茯苓酒白芍各一兩藿香七錢炙甘草五錢砂仁去膜木香不見火各三錢共研末煉蜜為丸彈子大每服一丸薑棗湯化下又慢驚諸症俱見用綿黃耆三錢人參酒芍各一錢甘草五分薑引三片大棗去核二枚白水煎食遠服吐加陳皮白朮各一錢砂仁去膜五分木香不見火五分瀉加白朮白茯苓各一錢肉豆蔻麵包煨訶子肉各五分木香不見火五分搐不止加酒炒當歸一錢手足冷加木香不見火肉桂乾薑各三分有痰加川貝母五分竹瀝薑汁各一匙潮熱加柴胡黃芩各五分有汗加酸棗仁牡蠣浮小麥各五分又方製半夏當歸酒炒陳皮各三分甘草一分殭蠶每歲一條水煎服均極神效慢驚風外治方凡慢脾風肢體逆冷痰涎壅滯咽喉如牽鋸聲唇黑麵青口鼻氣微昏睡露睛急用胡椒七粒生黃梔子蔥白連須七個丁香七粒飛面一撮先將前三味研末蔥白搗爛如泥再用雞蛋清少許共調勻攤青布上燙微熱貼小兒心窩一日夜次日除去有青黑色即愈矣如未愈再貼一個此方貼愈後仍當急服補脾之藥又方以白頸曲蟺刀劖二段跳急者急驚用跳慢者慢驚用加麝香一分搗爛對臍貼上外用膏藥蓋緊即愈慢驚慢脾聖藥人參五錢或臺黨參亦可焦白朮去油白茯苓去皮懷山藥炒桔梗各一兩甘草膽星辰砂各三錢赤石脂五錢煅乳香二錢去淨油另研礞石三錢爛金色牛黃一錢麝香一錢共為細末五月五日午時取粽子少許研勻即作錠子金箔為衣陰乾每服三五分或磨或泡以薄荷煎湯送下名曰回生錠極效又急慢驚風起死回生方烏梅肉去核硃砂各三分麝香三釐滴乳數點共研如泥再用勾藤勾煎湯沖調灌服急慢驚風痰厥等症皆效保嬰出痘經驗第一良方銀花紅花生地桃仁雙仁不用要去皮尖芥穗赤芍當歸各一錢甘草五分各藥稱準用水二茶杯煎至一酒杯再用小兒自己落下臍帶長二三寸清水漂淨置瓦上用木炭火焙乾切忌用煤火研細末調入藥內盡一日內與小兒服完服後次日即出痘三日收功不灌膿亦不結痂亦不必另服他藥須在小兒初生十八日以內服之最為神效過十八日以外則不驗矣此方乃南路胡司馬少泉得自異人傳授適得孫甫屆十二朝即如法服之明日其痘發出頭面手足皆遍形色紅活與正痘無異逾一日而退旋又發出疹子亦甚透足其時群驚為神遇産小兒輒用此方無不應驗按方中藥味均極和平不過清疏活血之常品其奏效如是之捷者皆由甫生嬰孩氣血渾融腠理通達引以本身臍帶火焙