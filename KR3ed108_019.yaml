body:
  text: 卷十九腰部腎虛腰痛酒炙黃耆五錢鹽水炒杜仲三錢破故紙二錢核桃肉五錢水酒同煎服若因閃挫氣滯腰痛者去黃耆加當歸紅花元胡索各二錢腰痛驗方鹽水炒杜仲三錢木瓜八分破故紙三錢萆薢一錢續斷錢半當歸一錢金毛銘脊去淨毛錢半炙草一錢核桃肉一兩食鹽一匙甜酒一杯將核桃肉鹽酒以一半同藥入罐煎以一半服藥時同藥咽下又方豬腰一副不見水不經鐵器用竹刀剖開腰內去盤膜裝入母丁香一錢用紙將豬腰包好入火內煨熟取出黃酒送下須晚上食之食七服可以除根又杜仲炒去皮橘核炒去殼各等分煎服又腰痛神方山楂核五錢瓦上煅炭存性研末老酒調服不過三次其痛如失腰脊脹痛白芥子研末酒調貼之即愈又腰腳冷痛方草烏去皮臍醋調貼患處濕氣腰痛陰天更甚車前草連根蔥白連須各七顆棗七枚酒煮搗爛瓶盛常服終身不發肝氣不足腰痛補骨脂八錢酒炒三次青木香一錢牛膝二錢青皮五分水煎兌酒服雖不能起坐舉動服之可愈腰腳軟痛腰腳軟用二蠶砂炒熱尉之腰腳疼痛用新胡麻一升炒香為末日日服之服至一斗痊愈酒薑蜜湯皆可下閃挫腰痛不能屈伸牙硝一釐雄黃麝香各半釐共研細末用少許點入眼角內令人扶患者周圍行走數次其痛如失倘未效再點再行必驗又一切顛墜閃挫腰痛不可忍者用冬瓜皮炒燥研末酒調每服二錢空心服又杜仲破故紙各等分酒煎服又用鹽炒熱或用茴香炒熱每用二包令人不住手更換輪流熱尉痛處均極神效或以茴香梗葉搗取汁一碗分作三服其渣即敷痛處立愈纏腰火丹俗名蛇串瘡有干溫不同紅黃之異如纍纍珠形乾者色紅形如雲片上起風粟作癢發熱此心肝二經風火治宜龍膽瀉肝湯外敷如意金黃散見二十四卷濕者色黃白串起小泡大小不等潰流黃水較乾者多疼此脾肺二經濕熱治宜除濕胃苓湯若單生腰脅系肝火妄動宜服柴胡清肝湯其丹上小泡用針穿破外用柏葉散敷之若不急治纏腰已遍毒氣入臍令人膨悶毒氣入心令人嘔噦急服清心散護心丸救解治蛇纏丹用舊破草席人睡過後有汗者燒灰香油調敷又方赤小豆研末調雞蛋白時時塗之或用馬齒莧搗爛塗之均極神效蛇串丹救急方此症起在腰間生小紅點成片發癢甚者身中發熱若不早治漸漸生開兩頭相接毒即攻心不治急用燈火周圍打數焦止其生開內服雲苓甘草柴胡牛蒡子黃柏銀花各錢半羌活枳殼桔梗川芎各一錢薄荷五分水煎服外用側柏葉炒黃五錢蚯蚓糞不拘多少黃柏大黃五錢赤小豆三錢共研細末用豬膽汁調搽即愈又纏腰火丹如帶圍住發紅用龍膽草研末柿漆調敷又纏腰瘡腰生紅瘤兩邊生紅筋圍至臍不救用陳京墨水磨濃和雄黃末塗之腿部洗腿各方不論瘡毒腳氣疼痛腫脹皆用此方煎湯洗之極為奇效荊芥防風透骨草羌活葛根以上各五錢用醋二斤再加水煎湯先熏後洗數次奇效又沙木腿腫並治腳氣痛方以杉木刨花即刨木屑多煎濃湯日日浸洗自能漸愈已效多人又腳肚生瘡黃水浸淫癢痛潰爛繞脛而生名脛瘡方用酸石榴皮煎水冷定日日浸洗久洗自愈小腿粗腫用豆腐渣斤許炒熱和豬板油三四兩同搗爛敷於患處過一宿即愈兩腿陰面濕癬以荸薺醮鐵鏽粉擦之立愈即槍炮中刮下鐵鏽粉赤遊丹腳腿紅腫生鮮芭蕉根搗爛敷之又白菜搗敷均效膝上生無名腫毒膝上生毒若不急治遲則難救急用糯米炒成飯乘熱敷膝上二三次即消不消再敷以愈為度敷後傾入魚池腿上一切寒濕血風等瘡用鴿子屎不拘多少煅存性研細末如干瘡加桐油調勻攤隔紙膏貼之若有黃水出者加飛黃丹少許乾摻之不過數次即愈金花散治男女新久爛腿連年不愈腐臭不堪並治腳發臁瘡等症及一切癰癤瘡毒用之能去腐生肌長肉收功外科不傳之祕方稱此藥末為珍珠散煨石膏一斤研極細末飛淨東丹一兩二味和勻再篩再研如治爛腿臁瘡用真香油調搽上蓋油紙一日一換不可用茶水洗恐見濕氣收功最慢如婦女一遇月信雖愈復發發後再搽自然全愈附骨疽此宜生在大腿無頭無膿者用黃蠟三錢古銅錢銼細末三分胡桃肉六個搗爛和勻腐皮包好空心酒下腿瘡不愈生甘草五錢煮豆腐一塊極老敷瘡上一時許取去另用血餘五錢水龍骨三錢即多年舊船底石灰密陀僧錢半黃白蠟四錢生肌散三錢共為細末用麻油熬成膏多敷即愈此方屢效積年爛腿新鮮蘿蔔陰乾一二日其皮可剝用皮貼上干又再換腳肚轉筋疼痛欲絶用大蒜擦足心令其熱即安仍以冷水食蒜一瓣自愈腿轉筋入腹若不急治痛衝上心則不救以卷八木瓜吳茱萸食鹽此方最效並將大蒜搗敷足心又以四物湯加酒芩紅花煎服因風寒濕而作者再加蒼朮南星煎服立效鶴膝風生黃耆八兩肉桂三錢苡米四兩雲苓二兩焦白朮二兩防風五錢水十大碗煎至二碗分作二服上午一服臨臥一服服後蓋被取汗緩緩去被忌風令其汗自干又方大蝦蟆一個破開肚肚內之物不去全個貼在患處即消此方治鶴膝風極效足部腳趾縫濕氣癢不可忍搔之皮破水流用鵝掌皮燒灰研末搽之即愈又寒濕腳氣方花椒一兩蔥一把薑三大片水數碗煎湯熏洗腫消痛止腳上生瘡亂孔如蜂窩生如意草搗爛敷之或干如意草為末雞子清調敷亦妙腳受濕氣癢痛並下疳方升麻一錢葛根一錢獨活一錢雄黃一錢樟腦一錢硼砂二錢冰片五分以上各藥共為細末瓷瓶收貯酌量搽之如破爛有膿水者用海螵蛸人中白等分為末量加冰片搽之即愈腳趾丫潮濕發爛腳趾縫內紅赤腫癢搔之皮破水流紅腫疼痛多因感受潮濕水氣所致用烏桕樹嫩葉水浸軟抹乾嵌夾腳指丫內立時痛止收水而愈又茶葉嚼爛敷之亦效若婦女腳踝臁上感受濕氣忽起白泡痛腐以此貼之亦能止痛見效又方枯礬五錢煅石膏輕粉黃丹密陀僧各三錢共為細末搽之又方爐甘石一兩火煅童便浸三次研細末樟腦六分冰片三分共研細末和勻用雞翅毛刷上又方白蘚皮硫黃各一兩松香五錢共研為末用紙捲成條點火燒煙熏之即愈陰濕腳瘡久爛銅青膽礬各五分飛黃丹二錢密陀僧輕粉煅石膏各一錢共研細末臥時摻上痛一夜即結痂或有癢處毒水不幹再摻上癢極擦之驢眼瘡生腳脛骨上周圍如臁瘡極痛用田螺去殼搗爛連敷數次即愈又鴨嘴焙枯研末麻油調搽極效風濕腳痛地風酒炒三錢年健酒炒三錢肉桂一錢虎骨酒炙五錢熟附片三錢松節燒存性二錢骨碎補去毛酒炒三錢制白朮二錢甘草八分水煎米酒兌服又腳氣疼痛用冬瓜皮煮水乘熱日洗數次立止並可消腫又寒濕腳氣川椒二三升粗布袋盛之日以踏腳並用花椒一兩蔥一把薑三兩水煎先熏後洗腫消痛止腳氣腫痛樟腦二兩烏頭三兩共研末醋糊為丸如彈子大每置一丸於足心下以微火烘之以被圍蓋汗出如涎立效腳氣上攻衝入心腹欲絶用杉木節四兩大腹皮一兩檳榔七個青橘葉四十九片無葉用皮亦可俱切碎用水煎服又方用童便三升煮取一升分二服立效又方大雞心檳榔一枚為末童便薑汁溫酒共一盞調服即愈腳氣結成腫核外用甘遂研末水調服內用甘草煎濃汁飲之即消又方白礬三兩煎水浸洗良久自愈腳氣成漏有人腳跟爛一孔深半寸許有水流出其痛異常以人中白煅少加冰片共研末摻之即愈乾腳氣痛不可忍者乾木瓜一個明礬一兩煎水熏洗二三次即愈又方用硫磺少許同艾葉研爛以紙包放腳心再用布包住走步見汗腫消痛止已經效驗腳氣痛不可忍以致口眼歪邪手足抽搐不省人事用黃建煙二斤炒熱以坐桶盛入內將腳解光放入煙中出汗少冷又炒熱隔日一熏熏七次即可除根腳突腫大山中白牛糞久經風雨漂白者瓦焙乾研末酒調敷毒水流出愈腳大趾腫痛一人患腳大拇趾忽然赤腫焮痛異常此脾經積熱毒流下注而然用大黃朴硝石膏蔞仁煎水服之大下而愈木瓜酒治腳氣腫痛木瓜不拘多少為末松木屑少許好酒調敷患處消腫止痛又方蔥薑艾葉等分共搗爛布包蘸極熱燒酒頻擦患處以痛止為度腳背潰爛經年不愈先用鹽茶水洗淨再用煅過緑礬研細末厚敷之即日濕止十日脫痂全愈腳面惡瘡用羊屎燒成灰為末以麻油調敷如癢再加入枯礬輕粉少許如不收口以松香枯礬極木燒灰存性各一錢共研末仍用麻油調敷自愈腳疽腳趾先癢後痛趾甲黑次日腳趾黑又次日足面俱黑黑至腳上脛肚即死初起宜急治用生黃耆當歸各一兩牛膝六錢金叉石斛一兩臺黨參一兩銀花三兩水煎三服即愈又腳上生蛆用雞蛋一個煮熟去殼作餅乘熱貼之癢甚二三次蟲除足忽如錐刺痛用生大黃以醋磨濃汁抹痛處數次即愈手痛亦如之中肥足潰凡農家糞燒土上為烈日之氣曬逼人光足行於此地受熱氣之毒必足趾腫痛似潰非潰俗名惹肥又名烏茄疔用鴨毛煎湯加入皂礬末洗之即愈流火瘡兩腳紅腫放亮其熱如火用馬前子以粗碗磨水時時塗之其痛即止又方用鐵鏽水塗之極效腳上紫血瘡山螞蝗根三兩松樹二黃皮二兩牡丹根二兩煎水洗後用藥末搽之藥末方松香西硫磺各三錢兒茶一錢銀硃枯礬五倍子川黃柏黃芩各二錢研細末麻油調搽多年爛腳取多年水浸松枝煎濃汁洗淨拭乾用白砂糖搽之極效又方經過霜雪煙兜到驚蟄日扯起煎水洗數次極效又方龜板一斤煅研末黃蠟三錢蔥頭七個麻油搗餅攤貼一日一換先以濃茶洗淨再攤貼足上毛孔出血如線不止損命急用好米醋三四斤煮滾乘熱以兩足浸之即止隨用真參二兩當歸三兩煎濃湯再用甲珠一粒為末入藥湯泡服即不再發真神方也腳脛無頭遍腫生大黃研細末用桐油調抹之若腐爛漸起用生大黃一斤浸軟扎瘡口上即愈又脛瘡方瘡生腳肚初起如粟搔之漸開黃水浸淫癢痛潰爛繞脛而成痼疾方用酸石榴皮煎水冷定日日浸洗自愈行路足腫或因遠行而腫或行路急促或被石子打破痛腫若不急治恐破日久致成癰毒用舊草鞋一隻浸尿桶內過一夜以新磚一塊燒紅將尿浸草鞋放在紅磚上即以患腳踏之使熱氣入腳內其腫即消腳底板紅腫熱痛名為腳隱大蒜頭量用多少和鹽搗爛敷過一夜次日即愈又方用何首烏研末以醋調敷足底再用尉斗火烙之自愈兩足無故發癢抓至血出始快系風入皮膚之故用鳳仙花連根二三株煎湯洗之可止癢腳底無故開裂黃柏研末和豬髓研如膏敷患處或以牛脊髓搽亦可腳痔腳蛀方水仙花根曬乾研末濕者摻之燥者麻油調敷腳趾脫疽此症發於腳趾漸上至膝色黑內陷痛不可忍逐節脫落亦有發於手者用土蜂房煅研細末以醋調搽應手而愈真神方也須內服石室祕録中之驅濕保脫湯米仁三兩茯苓二兩杜心一錢白朮一兩車前子五錢水煎服一連十劑永無後患甲瘡多生於腳趾甲邊時常出血痛不可忍雄黃五分蛇蛻燒存性一分共為細末先用溫米泔水洗瘡以利刀去甲角拭乾將藥敷上用絹包裹半日許藥濕即換敷數次愈如怕用刀者以橘樹刺刺破亦可用嵌甲瘡方用黑砂糖慢火熬成小球燒存性研末每一錢加輕粉二分麝香少許麻油調敷甲入肉者二三日即愈婦女足瘡經年日久不愈名裙邊風瘡用男子頭垢桐油調作隔紙膏貼之婦女足甲惡瘡惡肉突出者名臭田螺皂礬日曬夜露三日每用一兩煎湯浸洗仍以礬末一兩加雄黃硫磺乳香沒藥各一錢研勻敷之腳縫搔癢或瘡有竅出血不止以多年尿桶燒灰敷之腳上諸瘡臭爛熟雞蛋黃一個黃蠟一錢煎油塗之傷濕腳