藤絲煎湯送下稀痘神效忌葷腥十二日解出黑糞為驗每年服一次連服三年可不出矣附制人中黃法與此相同用生粉甘草研極細末篩去草筋灌入筒內惟每年交冬浸入男糞坑內必等次年交夏始取出陰乾後將筒再刮本年交冬又仍浸入糞坑總非浸過三四年不可愈久愈妙如筒有破裂即照法更換竹筒劈開筒內人中黃業已結成整塊切忌見火仍研末灌入如筒無破裂可以不必年年換筒惟孔處不免溶蠟封過浸過多年甘草末變為黑黃色陰乾研細末紙包懸挂當風處一年半載臭氣毫無凡小兒熱毒火丹一切喉症各種熱毒要藥真至寶靈丹如能預為制以濟人功德非淺梅花稀痘方十二月收取白梅花不拘多少陰乾為末煉蜜為丸如芡實大每一丸好酒化下念太乙救苦天尊一百遍奇效急救門急救透關散一自縊二牆壁壓三溺水四魘魅五凍死並治一切中風中痰中暑中熱及尸厥卒然暴死不省人事等症生半夏牙皂各五分共研細末以黃豆大吹入鼻中男左女右得嚏即蘇自縊者刺雞冠血滴口中男用雄雞女用雌雞溺死者用鴨血灌之凍死者用薑湯或溫酒灌之凍死最忌見火若以火烘之不救湯火傷最忌冷水冷物淋折恐熱毒內攻若以冷水冰之竟有爛入筋骨之患解一切惡毒凡中一切藥毒及一切飲食毒急用久制人中黃溫水調服如無人中黃既灌飲糞清立解倉猝取糞清法取廁中宿糞以布包濾汁澄清飲之極效統解諸惡毒其功效他藥不能及此若症勢危急非此不可切勿嫌其汙穢然人之惡死應甚於惡穢也仁人君子有心濟世者人中黃一藥不可不預為製備制人中黃法已詳注本卷新增小兒科稀痘方內矣解飲食毒飲饌中毒倉卒不知何物以生甘草薺苨等分煎湯飲之又方緑豆生甘草水煎服即解急則多飲麻油亦解凡中毒以白礬芽茶搗為末冷水調服即解救急方凡中風中痰中惡中毒寒厥一切暴死急卒之症以生薑搗自然汁和童便灌之立解又中風中痰不省人事痰涎壅盛者以生明礬為末生薑汁調灌二錢吐出稠痰即醒又風痰寒厥喉痹不醒一切急症取燈盞內油或燈窩內過下油用雞翅毛掃入喉內取吐痰涎即蘇救中熱卒死凡夏月酷暑及行路之人及乾旱鄉農踏車耘田之際每多此症忽然暈倒名為中熱救治之法鄉農男婦每多不知必得預為廣傳功德無量凡遇此症雖值炎天烈日之下切不可移去陰涼之地並不可飲以冷水冷物若以冷水飲之或移臥陰涼之地皆不可救急以路上熱土作圈圍臍令多人撒尿其中令溫氣入腹即活並用薑湯童便乘熱灌之若婦女急用滾開水絞熱布輪流更換尉臍與臍下三寸亦令溫氣入腹此法均極簡便而且神效再用透關散吹入鼻中或用大蒜一二個去皮取路上乾淨熱土一撮同搗極爛滾湯和勻去渣灌之或用生明礬末一二錢溫水調灌之均可救活醒後仍忌生冷治瘋狗咬傷經驗方沈雨蒼先生道光二十六年冬在湘潭經過目擊米船夥卒病心腹絞痛心無依賴亂抓亂咬百藥罔效醫亦不識為何疾萬分危急適同舟醴陵客以葵扇向病人一扇大呼曰殆哉此中癲犬毒發乃死症也能謝六千錢我有祕方立可治愈船主哀告幫夥身工無多允謝四千同幫船咸勸謂救人急難是大善醴客不遂欲袖手不救由是衆怒其忍執醴客縛其手足置病者側醴客畏抓咬及身自悔願治不索謝請解縛衆因其忍得解即食言必傳出真方能包不死方可醴無奈始説出大劑人參敗毒散加生地榆紫竹根濃煎如病人牙關緊閉用烏梅肉擦之自開急灌一劑盡而神識清醒兩劑盡其病若失此目擊經驗者據醴客云凡癲犬來家或遇諸途不及趨避或被咬銜衣感觸毒氣知覺畏風畏鑼聲或在七日進藥一劑於本人頭頂尋覓紅髮盡行撥去至二七日嚼生豆試驗有無留毒如嚼黃豆有生豆氣噁心欲嘔則已毒盡不必再服若無生豆氣如熟豆可口不作惡嘔急再進一劑至三七日仍用豆照前嚼試服至三劑留毒已化為膿血從大便出盡永保無虞設好犬被咬於未發之先亦用此方再加烏藥一兩煎濃拌飯與食斷不致癲均經照方施治應手見效即孕婦亦可服愈不惟可保無虞且無他患屢試神效靈驗異常每有遠途求方輾轉購藥遲延莫及而斃聞甚慘惻茲特縷述得方原委驗試如神刊送共知即隨遇施治更乞廣傳則幸甚矣真紋黨三錢紅柴胡三錢甘草三錢羌活三錢枳殼二錢炒撫芎二錢獨活三錢桔梗二錢生薑三錢前胡三錢茯苓三錢生地榆一兩加紫竹根一大握用水濃煎溫服煎藥時須大罐多水俾能透煎濃汁為妙又方地榆三兩銅鎖一把入新砂鍋內酒水各一大碗半煎至一碗空心溫服其毒內消並無後患再用明雄黃一錢麻油一茶鐘調服三日三服其傷處照原卷十三用核桃殼裝人糞炙後再以生甘草末杏仁搗和沙糖敷之若炙處起泡則以麻油調生大黃末敷之取效又方用路邊荊一大把連根切碎分作兩股以青黛水炒一股以黃泥水炒一股配勻作數劑水煎服其毒暗從小便出即誤服斑蝥發毒作痛喊叫者服此亦解後服辰砂六一散斷根一切不禁此藥六月開白花似雪點者是又方茜草一兩射干五錢紫竹根一兩燈芯一丸為引水煎服夏天受熱忽然昏倒用大蒜搗爛調冷水小半杯取茶匙灌七匙入鼻孔內其人立蘇或韭菜汁亦可並救中惡卒死中惡驚忤用雄雞冠血瀝口內並塗面上又吹入鼻孔即醒癇病神方治男婦抑鬱癲狂及風痰迷悶用鬱金七兩白礬三兩共研末面和丸滾水調下三錢藥完病愈昔一婦人病狂十餘年遇異人授此方初服心間如有物脫去神氣爽然再服全愈瘋癲發狂用苦丁香即香瓜蒂瓦上焙乾存性研細末每用二三錢不等看人強壯虛弱用之服後即吐切不可怕大吐之後自愈孕婦不可服又方川鬱金二兩飛淨辰砂五錢生明雄黃一兩公豬心二個去中間血將鬱金辰砂裝入豬心內用老酒煮爛搗如泥再入明礬研細末共搗為丸如桐子大每服二錢服完永不再發又瘋癲不識人方用灶心土研末一錢滾水調服又暗瘋癇病痰涎昏悶不醒方取芭蕉油飲之得吐即愈取芭蕉油法以竹筒插入芭蕉樹內接取之卒死還魂凡入涎潮於心卒然倒地急扶入暖室正坐用火炭澆醋使醋氣衝入病人鼻內良久自蘇或搗韭菜汁灌入喉中亦妙急以皂角末或生半夏研末吹入鼻中得嚏即醒極效倉卒無藥急於人中穴及兩足大拇離甲二分許用艾丸各灸三五壯或用碎瓷片刺少商穴及委中穴見霍亂門即活此誠救急之良法凡人卒倒身冷無痰此名氣厥亦名中氣若身溫熱有痰者則名中風如系氣厥但扶正坐片刻使氣順即蘇或用皂角末吹鼻令嚏亦佳凡人奄奄死去脈動氣閉名為尸厥用菖蒲末納入鼻中用肉桂末放入下用竹管吹兩耳即醒如系中風查照卷十四中風門治之中風用硼砂白礬各二錢為末以靛花煎湯調服又方南星八錢木香一錢研末生薑十片水煎服又中風不語不可即用薑湯灌先用真麻油一鍾灌之即能哼後再以薑湯灌之即愈陰症腹痛欲死並治陰症傷寒枯礬一錢火硝一錢胡椒一錢黃丹一錢丁香五分共研細末用老醋調成團握在手心男左女右以綿絹扎緊手久之出汗而愈又方用老蔥一把如茶鍾大用快刀切一指厚貼臍上用熱尉斗尉之自愈救脫陽危症凡大吐大瀉之後四肢厥冷小腸痛久腎縮冷汗等症先用蔥白搗爛炒熱尉臍再以蔥白三條搗爛熱酒沖調灌之立蘇陰陽痧絞腸痧霍亂等症用食鹽一握揉擦兩手碗兩脅兩足心並心窩背心八處擦出許多紫紅點漸覺鬆快即愈一切寒痧熱痧中暑霍亂等症第一簡便良方亦急救之妙法也陰症肚痛面青鴿子屎一大撮研細末衝入滾酒服蓋被暖睡一時取汗即愈永禁食鴿子永不再發又陰症手足紫黑急用黑料豆三合炒熟加連須蔥白三大根好酒煎滾乘熱服立效終身忌食黑魚吊腳痧凡兩足麻木不仁畏冷轉筋腰曲不伸名曰吊腳痧轉筋急用布將膝下緊緊扎住即查照卷十五刺委中穴法刺出惡血一面將真緑豆粉用井水調勻將病人頭髮分開不住手在頭頂心上多擦再用緑豆滑石粉二味以井水調服即安或用緑豆滑石煎服亦可此係時疫之症遲緩難救湯火傷凡人手足遍身燒爛者防其火毒攻心急飲人尿數碗或童便更妙再飲生蘿蔔汁一二碗以護其心使火毒不致內攻切忌用冷水澆浸即用生地榆曬乾研為末香油調敷破爛者於摻之極效是以今之冶坊常以地榆浸油缸內以備不虞可見為湯火之聖藥人被火燒皮肉焦爛有蟲出如蛆者用杏仁研末敷即愈凡遭回祿煙燻致死者用蘿蔔搗汁灌之如無蘿蔔時即蘿蔔菜葉亦可搗汁灌之立蘇又用生大黃白蘞等分研末用真桐油或麻油調敷神效又湯泡火燒方用瓦楞子即蚶子殼煅存性研末加冰片少許研勻濕則乾摻干則用麻油調敷又方用線香一兩青黛三錢共為細末腫痛者香油調搽濕爛乾摻之又方平日泡過殘茶葉帶汁入瓶內盛之愈陳愈佳塗敷患處極妙又方用乳香黃柏沒藥大黃共研細末麻油燒酒調搽又方生大黃一味研細末以水調敷又方生雞蛋清和好酒調勻隔湯燙微溫調搽熱油燙傷最效又方蛇蛻皮瓦上炙乾研末麻油調搽又方雞蛋清炒出油搽之又方西瓜皮置壇內聽其自爛成水湯火傷取水搽之神效火毒攻心方黃連花粉元參各二錢陳皮桔梗山梔各一錢半淡竹葉二十片水煎服若遍身潰爛者乃吃童便或蘿蔔汁一二碗如有人中黃溫水調服更妙外用蚌殼煅灰研細末用雞子清調敷又湯火傷救命散黃柏黃芩黃連大黃南薄荷各一兩水飛滑石三兩共研細末香油豬油調搽奇效花爆火藥沖傷眼睛急令其人睡倒地下令人即解熱小便澆之徐用自己小便頻頻洗之眼即明如損目破睛用牛口涎日點數次避風靜養久之自愈又湯火傷方側柏葉搗取汁雞蛋清麻油三味調勻搽患處即愈又方用經霜桑葉研末以香油調塗或以高粱燒酒塗抹均極止痛毒蛇咬傷凡毒蛇咬傷先急飲好醋一二碗或麻油亦可令毒氣不致走散隨將傷處扎住兩頭用熱小便洗淨再用香白芷一味為末用麥冬煎湯調服服後黃水流出水盡腫消皮合即愈又方用雄黃五靈脂貝母香白芷各等分為末每服三錢熱酒調服渣敷患處或白芷一味研敷亦可又方用青木香不拘多少煎服立刻止痛又方用生明礬滾水泡湯洗患處又毒蛇咬傷甚至牙關緊急焮痛難當急吃蒜飲酒再將大蒜切片放咬處以艾丸炙之輕者五七壯重者三五十壯撥出毒氣即愈又方用金鳳花或莖或葉擂酒飲之渣敷患處立效凡諸色惡蟲及毒蛇咬傷毒氣入腹者用蒼耳草嫩葉搗爛取汁灌之並將渣厚敷傷處一切皆效一切惡獸毒蟲傷毒中人腹眼黑口噤手足強直者用生白礬生甘草各研細末二兩和勻每服二錢冷水調下更以此末用香油調敷患處大有神效經驗癲狗咬傷方馬前子一個黑醜白醜各一錢生大黃三錢飛雄黃一錢四味共研細末先用紅銅雍正錢一枚煎湯代水沖末藥連渣服下蓋被睡片刻得汗後其毒由大便瀉出有血絲即愈不忌紅緑響器芝麻苧麻犬聲等件只忌食牛犬生冷麵食四十九日凡咬破傷處用苦杏仁研末口津調敷患處用布包裹其毒自出不致潰爛極效按世傳良方亦復不少或用斑蝥由小便帶出或用補劑待至日久仍然發作貽誤非淺均未得治毒之本旨自得此方行之二十餘年治驗者不下數百人矣惟此服後由大便出輕則一服重則兩服其毒未有不盡出者未服此方之先倘已發作腹內始痛眼瞪微青牙床帶紫者速照此方服之腹瀉亦可挽回幸勿以藥味輕淡無奇而忽之也又方急於無風處擠出惡血鹽水洗淨用蚯蚓泥百草霜敷紫數日內頭頂有紅髮數根日中照之即見急拔去再以韭菜地內紅蚯蚓七八條竹片破去腹內泥鹽水漂淨以好醋一小杯入蚯蚓略煮陳酒送下大便瀉去毒氣即愈重者可兩服若用斑蝥治瘋狗咬傷往往致死戒之惡犬咬傷方蠶豆嚼爛塗之或用棉絮燒灰敷上即愈或用白茅根搗爛敷之均極效人口咬傷急以爛溏雞糞敷之止痛不作膿又生栗子嚼爛敷之蜈蚣咬傷急用鹽水洗淨傷處取雄雞口中涎搽之或取雞冠血搽之或取大蜘蛛一個放傷處吸去其毒蜘蛛醉死毒即去仍將蜘蛛放水草上即活或以燈煤搽之即可止痛又用手搔頭上風皮屑嵌入咬處即好蠍螫傷用膽礬搽之立刻腫消痛止蛇怕雄黃蠍怕膽礬此二味真靈丹也急救誤服生鴉片煙方真阿魏五錢研細末菜油一茶鐘調服即吐如不吐其毒亦從大便出可保無虞
