急服姜連丸治之如腹中疼痛心下急滿宜當歸芍藥湯姜連丸川連白朮砂仁各一兩枳殼炒五錢阿膠炮薑川芎各一兩乳香三錢另研共為末加鹽楊梅三枚醋少許打糯米糊為丸如桐子大每服四十丸白痢淡薑湯下赤痢甘草湯下赤白痢甘草生薑湯下按赤痢可加銀花白痢腹痛可加青皮姜炒川連亦必不可少不必分赤屬熱白屬寒拘泥於薑湯甘草湯送下也當歸芍藥湯當歸白芍枳殼麩炒山楂各一錢厚朴八分陳皮六分木香三分甘草四分黃芩二錢水煎忌生冷熱症凡妊娠病熱嘔吐不食胸中煩躁宜安胎涼膈散如熱甚發赤黑斑小便如血胎漸落將危者亟以梔子石膏湯救之遲則墮矣如火熱壅極心煩口渴者宜清心潤肺湯安胎涼膈散治熱嘔知母麥冬人參蘆根葛根黑梔竹茹蔥白水煎服梔子石膏湯梔子黃芩生地各二錢石膏四錢青黛一錢升麻四分豆豉一錢蔥白三寸水煎服按本方治發斑可加元參連翹各二錢清心潤肺湯黃芩梔子麥冬各二錢知母花粉人參各一錢甘草五分犀角三分薑棗引按方內用人參恐得補而益熾治熱之方去之為得因怒滿悶凡妊娠因多怒氣胸膈滿悶或服順耗氣藥太過以致滿悶益增者宜散氣消悶散治之烏藥香附枳殼砂仁等皆當少用散氣消悶散人參一錢白朮二錢川芎木香磨汁蘇葉條黃芩甘草各三分姜三片水煎服小腹重墜作痛凡妊娠腹痛時作小腹重墜此緣氣虛下降間有兼寒者宜加味安胎飲治之加味安胎飲白朮熟地當歸各二錢陳皮蘇梗川芎甘草各四分砂仁五分兼寒者加吳萸五分乾薑五分水煎服小腹虛脹閉滯凡妊娠小腹虛脹因食硬物傷胎胎既受病傳於脾胃胃氣虛冷下逼小腸若奔豚腰重大便閉澀兩脅虛鳴宜服勝金散溫中下氣胎自安矣勝金散吳萸陳皮軍姜炮即制軍乾薑川芎各二兩五錢厚朴砂仁甘草各三錢共為末每服二錢鹽湯送下胎冷腹痛欲瀉凡妊娠胎冷腹脹兩脅虛鳴臍下疼痛欲瀉小便頻數大便虛滑此因胎已成形而多食瓜果生冷之物或當風取涼受不時之氣致令子身不安皮毛刺痛筋骨拘緊而母有此病急宜安胎和氣飲治之安胎和氣飲訶子麵煨白朮各二兩橘紅白芍木香各五錢良薑炒二錢炙草三錢姜二片陳米一撮每服五錢忌生冷胎驚心悸氣促脹痛不安凡妊娠心神忪悸睡夢多驚脅腹飽脹過時連臍急痛氣促不寧此是胎氣既成五臟安養已久或因氣悶或因喧呼致令胎驚筋骨傷痛四肢不安急以大聖散治之大聖散當歸川芎麥冬茯苓各二錢炙耆人參甘草各五分姜三片水煎頭旋目暈痰壅將危凡妊娠頭旋目昏腮項腫硬此因胎氣有傷熱毒上攻沉痛欲嘔背項拘急致令眼昏生花若加痰壅危在片時急以消風散治之消風散雨茶甘菊羌活石膏當歸川芎羚羊白芷荊芥防風甘草加姜煎食前服兩目不明腮項腫滿凡妊娠將臨月忽然兩目不明燈火不見頭痛項腫不能轉頸此由常居火閣衣襟臥褥伏熱在內或服補藥熱物太過致令胎熱而肝臟壅極風熱上攻入腦故見此症急以天冬飲子治之大忌酒蒜炙爆油膩一切辛熱發物否則眼不復明矣天冬飲子天冬荊芥各一錢五分當歸川芎熟地白芍茯苓知母各二錢人參六分五味十四粒防風茺蔚子各一錢目病退間日一劑初服大約每日一劑耳遍身刺痛喘筋攣凡妊娠遍身刺痛脹滿此由五臟不利血氣虛贏因食生冷或發增寒唇白麵青筋脈拘攣骨節痠疼皮毛乾澀氣急上喘大便不通嘔吐頻頻此危症也急以平安散保之平安散厚朴陳皮熟地甘草川芎木香姜三片煨鹽一撮水煎服因失血類中風症凡妊娠因吐血衄血衄音肉刃傷也或被傷失血驀患口噤項背強直類中風症宜服加減安胎飲加減安胎飲人參白朮麥冬當歸熟地天麻各二錢防風荊芥各一錢陳皮甘草各五分姜三片水煎服心煩腹脹百節痠痛小便閉澀凡妊娠面赤口乾舌苦心煩腹脹或百節痠痛小便不通此由恣意飲酒及水果魚肉一切腥膻熱毒之故以歸涼節命飲治之歸涼節命飲苧根白芍當歸川芎麥冬各一錢白朮生用錢半砂仁五分甘草六分黏米一撮中酒者加葛根一錢積食加山楂麥牙各一錢小便閉加赤苓腹皮各一錢蔥白引半産凡妊娠月未足而半産者由氣血弱臟腑皆虛加以病患感冒情欲相撓以致精血攻衝侵損榮衛而胎無所養與枯枝落果無異如既墮以生化湯加減治之未墮而血行腰痛急以十聖散連進數帖或芎藭補血湯十聖散人參黃耆各二錢當歸白芍川芎熟地白朮各一錢砂仁五分川斷七分甘草七分姜一片棗一個食過服忌惱怒生冷一切辛熱等物芎藭補血湯川芎白朮阿膠白芍杜仲人參黃耆五味木香甘草加姜一片棗二枚腹中兒啼凡妊娠臨月或九個月腹中兒啼者緣兒在母腹口含臍帶隨母呼吸妊母或將手扳高取得提出兒口臍帶故鳴但令其母如男子作揖使臍帶仍入兒口即不鳴矣一方煎黃連濃汁呷之黃連二錢甘草一錢煎水服之又法急令妊婦自己用掃帚掃地以愈為度轉脬凡妊婦將足月脬為胎壓轉在一邊以致臍下急痛小便不能但升舉其胎則脬仍還舊而水道自通宜六君子合四物湯去茯苓半夏陳皮探吐以提之不宜專用滑滲之藥産後亦有此症搗蔥白鋪於臍上灸之立效六君子湯半夏薑製二錢陳皮去白茯苓一錢甘草五分人參白朮四物湯當歸酒洗生地三錢芍藥二錢川芎錢半瘦胎方不可服辨凡妊娠臨産艱難者大率由口饜甘肥身耽安逸既飽即臥遂令胞胎肥厚行動氣急以致臨盆難産宜於胎將足月之時時時動作忽嗜肥鮮勿貪坐臥勤行勤走此即是不藥而滑胎之妙法也乃世醫咸謂安胎之後必須更進滑胎方始為無弊豈知滑胎名目昔人原為湖陽公主而設蓋以貴家居養豐逸身體肥盛誠恐軀脂凝結胞系堅固特藉此以稍疏其肥滯耳若平等婦人一母之氣血分蔭其胎尚虞不敷豈可再用瘦胎乎附增異症腹中兒啼煎黃連汁呷下或青黛亦效腹中作鐘鳴或哭者用多年空房內鼠穴中土為末或酒下或干噙之即止有臟燥悲傷慘戚嘔下者大麥甘草大棗煎服有自哭自笑者紅棗燒存性米飲下妊婦出痘麻疹各方已見卷二十一痘科門體元子借地法凡孕婦臨月擇天月二德吉日令善書者先期齊戒三日至日汲新水研朱於黃紙上焚香書曰東借十步西借十步南借十步北借十步上借十步下借十步壁方之中四十餘步安産借地或有汙穢或有東海神王或有南海神王或有西海神王或有北海神王或有日遊將軍白虎夫人遠去十丈軒轅招搖舉高十丈天符地軸入地十丈令地空閒産婦某氏安居無所防礙無所畏忌諸神擁護百邪速去急急如律令書畢貼孕婦牆壁上則不須避忌矣胞漏並小産論凡妊娠經水壅之以養胎蓄之以為乳其沖任氣虛不能約制故月水時下名曰胞漏血儘子死然亦有妊婦血盛月信常來而胎不動俗呼狗兒胎也若以胎漏治之則胎必墮若不以胎漏治之其胎未必墮亦有脈見滑數而別無風熱病經脈如常但較前略少此因胎小血盛有餘而然俟遲至三四月外兒大能飲經脈自止今常見懷胎七八月而生子者人但以血止為度謂之不足月然其受胎於未止之前至此而足月人實不知也又有壯盛孕婦按月去血點滴若無腰痠胎動不須服藥此血氣強盛至四五月後自然經止如孕婦虛羸腰常痠痛並胎動而按月下血點滴或下血不止此非血有餘乃胎漏也宜服加味補中安胎飲又云胎漏多因於血熱然亦有氣虛血少服涼藥而下血益甚食少體倦者此脾氣虛而不能攝血也宜歸脾等方加減當以脈候察之凡墮胎之病多在三五七月如前次三月曾墮後必如期乘其所虛而亦墮必預服尊生安胎飲或胎元飲加減用之或太山磐石散安胎萬全神應散等方對症擇用以預防之須常服過七月可無患矣更宜戒房欲氣惱勞役爆炙諸食又有受孕一月即墮者人皆不覺止知其為按月經行不知暗墮於中矣凡人經盡初交得孕後最宜將息絶欲若再交接以擾子宮其胎或一月三五月必墮試思驢馬有孕牡者近則踢之名曰護胎所以絶無小産之患人可不慎歟至若勞怒舉重亦墮洗下體則竅開亦墮今之無子者大半一月墮胎非盡不受孕也至於頓撲傷動胎氣宜服膠艾安胎散三四月前胎未成形名曰墮胎至五六月後胎已成形名曰半産俗人均曰小産總屬妊婦氣血虛弱胎元不固蓋氣虛則提攝不固血弱則灌溉不周多致小産況婦人腎以系胞而腰為腎之腐腰痛則墮不可不防凡治胎漏者當預培其根宜用千金保孕丸又有止漏絶神丹治漏胎甚效大凡孕婦暴下水者其胎必墮若徐徐下水可用補氣安胎藥治之有胎漏黃漿或如豆汁胎動腹痛乃肝脾濕熱用升陽除濕湯大全治用黃耆一兩川芎一錢糯米一合煎服要知小産與大産不同大産如果熟自落栗熟自開半産如生摘其瓜生剝其栗豈不較正産為尤重耶人皆疏忽不以為重而輕易視之因而致病者不少因而致死者恆多然此證始因斂血以成胎繼因精血以長養終因精血不足面萎墮故瘀血甚少倘有腹痛成塊有形多屬血虛氣逆惟有先用生化湯去瘀生新為妙後須大加溫補若但知消瘀破滯則逆氣愈攻而愈升多致不救戒之戒之妊婦三月後尺脈或澀或微弱胎必不固惟脈洪盛者胎不墮耳所以脈訣內云胎脈弦牢滑利安沉細而微歸泉路正此之謂也雖半産皆氣血不足然有稟質偏陰偏陽或寒或熱之異自當憑脈調治如陰虛內熱而用艾附白朮砂仁溫暖之劑則陰道愈消如草木之無雨露自然枯萎如陽虛內寒而用芩芍涼血之劑則脾胃虛寒氣血亦弱猶果實春夏易生秋冬少結也總之三月以前宜養脾胃四月以後宜壯腰腎補血順氣佐以清熱此大法也加味補中安胎飲凡妊婦元氣壯盛受胎後尚有經來數點乃血氣盛故耳若不腰痛胎酸不必服藥如虛贏孕婦下血不止或按月下血點滴名曰胎漏多因勞而氣血兩虛或喜食爆炙熱物過多而致宜謹房事並服補藥以保全也人參一錢白朮土炒當歸酒洗各二錢川芎黃芩各八分紫蘇陳皮砂仁碎炙草各四分姜一片水煎服渣再煎歸脾湯附加味歸脾湯濟生歸脾湯治心脾鬱結經閉發熱並治脾虛不能攝血致血妄行又經帶胎漏等證由於勞傷心脾發熱體倦食少不眠怔忡驚悸等證人參白朮土炒茯神棗仁炒龍眼肉各二錢黃耆一錢五分炙歸身遠志肉甘草水制各一錢木香炙草各五分薑棗引水煎服加柴胡梔子名加味歸脾湯柴胡易丹皮名濟生歸脾湯尊生安胎飲治血虛有火曾三月墮胎宜服此方並預防五月七月之墮亦治胎動胎漏歸身酒洗白芍酒炒熟地生地砂仁阿膠炒珠各一錢杜仲鹽水炒去絲白朮土炒各二錢條芩一錢五分續斷肉八分酒製川芎陳皮蘇梗各五分水煎服見血加炒地榆炒蒲黃各一錢腹痛或下墜砂仁白芍熟地倍加分兩服之用棗肉為丸服亦可景嶽胎元飲治婦人衝任失守胎元不安不固隨症加減或間日或二三日服一二劑人參隨宜當歸酒洗杜仲鹽水炒斷絲白芍酒炒各二錢熟地二三錢白朮一錢五分土炒陳皮七分無滯者不必用炙草一錢水一鍾煎七分食遠服如下元不固而多遺濁者加炒山藥炒補骨脂五味之類如氣分虛甚者倍白朮加炙黃耆但氏術氣浮能滯胃口倘胸膈有飽悶不快者須慎用之如虛而兼寒多嘔者加炮姜七八分或一二錢如虛而兼熱者加酒炒黃芩一錢五分或加生地二錢去杜仲如陰虛小腹作痛加枸杞二錢如多怒氣逆者加制香附無防或砂仁亦炒如有所觸而動血者加制續斷肉炒阿膠各一二錢如嘔吐不止加製半夏一二錢生薑三五片泰山磐石散見前卷九治婦人血氣兩虛或肥而不實或瘦而血熱或肝脾素虛倦怠少食屢有墮胎之患此方平和兼養脾胃氣血覺有熱者倍黃芩少用砂仁覺胃弱者多用砂仁少加黃芩更宜戒欲事惱怒遠酒醋辛熱之物可永保無墮經驗易産丸酒炒續斷一兩土炒淮山藥一兩制川芎五錢酒炒全當歸二兩川杜仲一兩用糯米粥拌勻曬乾炒去絲可研細末用桂元肉五十枚煎濃汁和蜜為丸分作三十丸凡懷孕甫交九個月每早用米湯服下一丸服完臨産易産可免腹痛生下小兒亦可強健此方靈驗異常幸勿輕視婦科臨産門臨産婦人生産乃造化自然之理俗所謂瓜熟蒂落原屬平常易事毋庸驚疑但竟有難産者皆因臨期坐草太早只知急急用力催生以致橫生逆生種種難産傷害母子或在頃刻或遲日月可不慎乎胎前固宜保護而臨産尤不可不細心講究也達生篇六字真言云一曰睡二曰忍痛三曰慢臨盆初覺腹痛先自家拿穩主意要曉得此是人生必然之理極容易之事不必驚慌但看一陳不了又痛一連五六七陳漸痛漸緊此是要生方可與人說知以便伺候若痛得慢則是試痛只管安眠穩食謂照常眠食也不可亂動此處極要著意留心乃是第一關頭不可忽略若認作正産胡亂臨盆則錯到底矣此時第一要忍痛為生不問是試痛是正産忍住痛照常吃飯睡覺痛得極熟自然易生且試痛與正生亦要痛久看其緊慢方辨得清千萬不可輕易臨盆坐草揉腰擦肚至囑至囑再站時宜站穩坐時宜坐正不可將身左右擺扭須知此處要自家作主他人替不得與自家性命相關與別人毫無干涉附醫宗金鑑坐草條云凡産婦坐草最要及時不可太早若見兒身未順寧可遲遲寬心以待倘坐草太早非正産之時妄使産母用力往往逼胎不正遂致橫生倒生者有之雖悔無及矣到此時必要養神惜力為主能上床安睡閉目養神最好若不能睡暫時起來或扶人緩行或扶桌站立片時疼若稍緩又上床睡總以睡為第一妙法但宜仰睡使腹中寬舒小兒易於轉動且大人睡下小兒亦是睡下轉身更不費力蓋大人宜惜力小兒亦宜惜力以待臨時用之切記切記附若胎前喜於安睡或嗜厚味或氣鬱氣滯者臨産宜略行動增臨産忌側睡妨兒轉身無論遲早切不可輕易臨盆用力切不可聽穩婆說孩兒頭已在此以致臨盆早了誤盡大事此乃天地自然之理若當其時小兒自會鑽出何須著急因恐小兒力薄其轉身時用力已盡及到産門不能得出或亦有之宜稍用力一陳助之則脫然而下蓋此時瓜熟蒂落氣血兩分渾身骨節一時俱開水到渠成不假勉強及至生下即産母亦不知其所以然矣或曰大便時亦須用力如何生産不用力不知大便呆物必須人力小兒自會轉動必要待其自轉不但不必用力正切忌用力蓋小兒端坐腹中及至生時垂頭轉身向下腹中窄狹他人有力難助要聽其自家慢慢轉身到産門頭向下腳向上倒懸而出若小兒未曾轉身用力一逼則腳先出以為詫異且贈之美名曰腳踏蓮花生或轉身未定時用力一逼則橫臥腹中一手先出又名之曰討鹽生即或轉身向下略不條直用力略早亦或左或右偏頂腿骨而不得出不知此等弊病皆是時候未到妄自用力之故奉勸世人萬萬不可用力然亦非全不用力但當用力只有一盞茶時耳其餘皆不可亂動者也如大便未到其時縱用力亦不能出而況於人乎或問何以知此一盞茶時而用力乎曰此時自是不同若小兒果然逼到産門則渾身骨節疏解胸前陷下腰腹重墜異常大小便一齊俱急目中金花爆濺真其時矣當於此時臨盆用力一陳母子分張何難之有附凡兒之生自有其時時至則兒身轉順頭頂正當産門胞漿大來腰重腹痛穀道挺迸産母中指中節或末節跳動此方為正産之時方可臨盆用力送兒自順生矣或曰小兒會鑽出之說到底未敢盡信不知古人曾言及否曰古人立言不過撮其大要安能事事而悉言之只要後人能體會耳觀瓜熟蒂落四字即知小兒自會鑽出觀揠苗助長四字即知將試痛認作正生之弊矣夫哺雞日足自能啄殼而出豈有催生之神藥穩婆之妙手乎古人謂有遲至三四年而後生者此是不肯鑽出耳既自不肯鑽出誰能強之自要鑽出誰能御之或曰早一時斷乎不可動矣不知遲了一時可不妨否曰不妨若果當其時必無不出之理然或偶有不出者則是小兒力盡不能得出宜令上床安睡使小兒在腹中亦安睡歇力少刻自然生矣或曰倘或兒到産門而大人睡下豈不有礙曰更好蓋小兒向下時而大人坐立則小兒倒懸矣豈能久待今大人睡下兒亦睡下有何妨礙又曰倘或悶壞奈何曰他十個月不悶今乃悶乎附兒未脫胞者不悶若已出胞不免悶壞急宜産下凡兒糞先出産門或穩婆已將手措見兒發兒足者即可知兒之已經脫胞也或問忍疼過久或亦不妙曰最妙從不聞婦人私産而難産者或謂有神護佑非也總因胎起於私怕人知覺只得極力忍痛痛到沒奈何時自脫然而出其理甚明有何疑慮或曰不宜用力已聞教矣不知先誤用力已至橫生倒産有何法治之否曰急令安睡用大劑加味芎歸湯服之將手足緩緩托入再睡一夜自然生矣又曰托之不入奈何曰若肯睡再無托不入之理若到此時仍不許他睡又或動手動腳亂吃方藥吾未如之何矣附薛氏治法橫生兒先露手臂也令母正臥以手徐推兒臂下體令其正直復以中指摸其肩勿令臍帶絆系即生逆生兒先露足也令母正臥以手徐推其足仍推兒轉正即生偏生兒頭偏在一邊也亦照前法徐正其頭即生或兒頭後骨偏在穀道旁徐推近上即生礙産兒頭雖正但不能下蓋因胎轉或臍帶絆肩所致用中指按兒兩肩理脫臍帶即生坐産兒將欲生其母疲倦久坐椅褥抵其生路急用巾帶高懸令母以手攀之輕輕屈足良久兒順即生瀝漿生又名瀝胞生漿流一二日不産或至數日外亦無妨惟安睡俟漿流較少或流盡當自生耳切勿驚恐勿動手法或有漿水流盡氣機仍阻致胎干難産者此不得仍聽其自然急用大料四物湯約二三斤以大鍋在房內煎熬使藥氣滿房口鼻吸受以滋益之服加味芎歸湯倘服一劑未效每停片時可再進一劑連連服之以生為度此言胎干而未脫胞者也若兒已脫胞者可兼令明干穩婆動手取下為妥增疇城醫生王珠云有鄭仙姐者穩婆能手也據云惟橫生必須推正側生切不可推轉但候其兩足齊下用法撥兒兩手向上亦易生收生得法母子俱可無恙又云臍帶絆肩不用指撥於生無礙蓋臍帶有纏於腰身者有纏於頭者且纏頭有二三轉而兒不能啼者去之即啼存之以備一說或問盤腸生是何緣故曰是用力之過蓋因産母平日氣虛及到臨時用力努掙渾身氣血下注以致腸隨兒下一次如此下次路熟又復如此若能等待瓜熟蒂落之時何得有此怪異附盤腸生臨産母腸拖出及兒已産下其腸有仍不收者急以芝麻油抹之以防風襲用萆麻子四十九粒去殼搗爛塗産母頭頂心上內服升補之劑如補中益氣湯或十全大補湯八珍湯等倍加升麻以升補之其腸自收待腸收上急將頭頂萆麻洗去忽緩或為風吹乾不能收者以磨刀水少許溫熱塗潤其腸一面用上好磁石煎湯服之腸即收磁石俗稱吸鐵石須陰陽家用過有驗者乃佳俗以水噴産母面背令其驚而腸收然驚則氣散恐致害戒之盤腸生經過一番則下次懷胎五六個月便須預服補中升提之藥庶幾臨盆可免或曰有一痛便生令人措手不及者此又何也曰此乃正理何足為異蓋胎氣已足母子兩分兒自要出雖欲留之而不可得人人皆是如此皆各有此一時只要忍耐得住等待此一時耳或曰穩婆不必用乎曰既有此輩亦不能不用但要我用他不可他用我全憑自家作主不可聽命於彼耳大約此等人多愚蠢不明道理一進門來不問遲早不問生熟便令坐草用力一定說孩兒頭已在此或令揉腰擦肚或手入産門探摸多致損傷總以見他功勞不肯安靜更有一等狡惡之婦藉此居奇射利禍不忍言矣按吳越之間謂之穩婆江淮間謂之收生婆徽寧間謂之接生婆按收接二字之義因其年老慣熟令之接兒落地收兒上床耳原非要他動手動腳也每見富貴之家預將穩婆留在家中及到臨時稍不快利前門後戶接到無數紛紛攘攘吵成一片所謂天下本無事庸人自擾之附臨産之家必用收生婆須預先擇老成歷續明白經事之人無故切勿令其先使手法如試水探漿等事但囑令寬心靜耐以待生時可也或問臨時有經驗之藥亦可用否曰不用從前奇方莫過鼠腎兔腦丸今時盛行莫過回生丹非謂其不效而不用也總用不著耳既不用力又不動手又有睡法佐之他自會生何消用藥縱有不順睡為上策附睡固上策然亦略須活動或曰服藥有益無損否曰安得無損鼠兔兩丸大耗氣而兼損血回生丹大破血而兼損氣蓋鼠兔例用香竄之藥産時百脈解散氣血虧虛服散氣藥兒已出而香未消其損多矣且令毛竅開張招風入內禍不可言回生丹以大黃紅花為君其餘亦多消導之品血已耗而又大破之多致産後發熱等病遺患無窮都只謂産後失調誰復歸咎於藥按此數方古今稱為神靈奇寶者尚然如此其他可知送藥者本是善念但知其利不知其害耳或問總無可用之藥乎曰有只須加味芎歸湯佛手散兩方用之不盡矣蓋胎時全要血足血一足如舟之得水何患不行惟恐産母血少又或胞漿早破以致乾澀耳今兩方皆大用芎歸使宿血頓去新血驟生藥味易得隨地皆有且使身體壯健産後無病真正有益無損此皆先賢洞明陰陽之理制此神方以利濟天下後世奈世人貴耳賤目以為平常而不用必求奇怪之藥而後用之只要奇怪不論損益豈不可嘆附妊娠力旺胎足本不必催生所謂催生者不過助其氣血而利導之耳故加味芎歸湯佛手散二方誠為上藥若氣虛者臨期之獨參湯尤為第一臨盆時再宜預備陳米飲湯倘藥料不及猝辦急須先將此飲之大能安胃接力或問依此言世間總無難産者耶曰偶亦有之或因母太虛胎養不足血氣不完或因母病傷寒之後熱毒傷胎又或夫婦同房太多以致欲火傷胎平日過食椒姜煎炒熱物火毒傷胎以及跌撲損傷皆致難産多令胎死腹中除此之外無難産者矣又有嚴寒天氣滴水成冰之時貧家房中火氣微薄以致血寒而凍亦令不出然此亦因臨盆太早去衣久坐之故耳若令擁被安臥待時而産豈有此患凡生産艱難或天寒孩兒生下不哭或已死者急用衣服包裹再用香油紙捻香油即點燈菜油紙捻即草紙捻將臍帶慢慢燒斷油紙捻鬚多備接連燒之多者燒紙捻數十枚暖氣入腹漸漸作聲而活倘或先行剪斷臍帶則死矣附或急坐兒在溫湯中一面以油紙捻燒臍帶一面以溫湯揉其肩背胸腹湯冷即添換頻頻接燒以兒活為度此亦一法或問臨産時飲食如何曰此時心內憂疑腹中疼痛甚至精神疲倦口中失味全要好飲食調理但不宜過於肥膩耳第一要勸其放心安靜忍痛歇息切忌在房中大驚小怪交頭接耳咨嗟嘆息皆能令其憂疑擾亂以致誤事房中宜安靜如常不得當面求神許願叫天叫地穩婆只宜一人入房且令在旁靜坐勿得混鬧飲食宜頻頻少與以助精神試痛或問試痛何故曰兒到七八個月手足五官全備已能動彈或母腹中有火或起居不時令兒不安以此大動而痛此等十胎而五不足為奇只宜照常穩食安眠一二日自然安靜或痛之不止用安胎藥一二服自止此後近則數日遠則月餘甚至再過三四個月才産人多不知輕易臨盆終日坐立不令睡倒或抱腰擦肚或用手拖或用藥打生生將兒取出母則九死一生兒則十胎九夭慘不可言世間難産皆此故也蓋胎養不足氣血不全如剖卵出雛裂繭出蛹豈可活乎只說小兒難養誰復根究到此又有受寒及傷食腹痛不可不知或問何以知其試痛曰只看痛法一陳緊一陳者正生也一陳慢一陳或乍緊或乍慢皆試痛也附醫宗金鑑云妊娠月數未足時或腹中痛痛定仍然如常者此名試胎宜養血以安其胎若月數已足腹痛或作或止腰不痛者此名弄胎不宜輕動二者均非正産之時切勿躁擾疑惑惟宜安靜以待其時或問傷食受寒何以辨之曰傷食者當臍而痛手按之更痛或臍旁有一硬塊寒痛多在臍下綿綿而痛不增不減得熱物而稍緩是也或曰試痛亦有或未必多曰甚多曰何以見之曰以今之難産者多也或問將試痛認作正生其害如此倘將正生認作試痛以致過時不亦有害乎曰無害果當其時小兒自會鑽出縱或過時不過落在褲中生在床上而已有何大害而如此諄諄乎驗案前太僕卿霍山張公三君葆華繼夫人年輕體壯孕必八個月而産産必數日百苦而下生女必周而夭再孕再産再夭皆同豫謂後當生宜相聞明年又八個月坐草三日不下忽憶豫言飛輿相召中途逢驅者云迎其父母作永訣計比至已夜分矣診之脈未離經人余殘喘穩婆在旁問之曰兒頭已至産門不得出耳豫急令安臥且戒勿擾與安胎藥明晨主人出笑而不言問之曰好了豫曰昨言兒頭已抵産門今若何曰不見了大笑而別後此百二十日計十二足月生男謂余為父今八歲矣始知前此皆生生取出以體壯年輕幸保母命耳在張宅日邑庠程以學邀至其家有寵人坐草二日而不生亦與安胎藥越十六日生女太學戴時濟與豫比鄰契好先是其弟媳一産三男母子俱殞一猶在腹今又婢孕其腹膨脝頗患之比産先令安臥與加味芎歸湯每隔半日而産積日半三子俱生康熙四十八年安撫葉公具題陳氏妻生九日夜不下一息尚存聞余有兔腦丸踵門求藥余問之亦曰頭逼産門不得出諭令安臥再來取藥強而後去繼與加味芎歸湯明日生下母子兩全按此皆産母用力逼令橫在腹中耳豈有人倒懸十日而尚得生者乎昔一婦産兒手出不得入穩婆礪刃以須豫見而惻然急令安臥與大劑芎歸湯徐徐托之手入明早生下母子皆安右臂紫黑數月而後消增橫生切忌刀割割之多母子俱斃凡産婦畏痛曲腰則妨兒轉身多致難産戒之戒之臨産須知十則孕婦似産未産須知凡胎孕臨月胎忽亂動而腹痛不甚或作或止或一二日或三五日之後方生名曰弄胎不可孟浪坐草須靜以待時或胎水以來腰不痠痛而不生者亦曰弄胎所以有瀝漿生其漿流一二日不産俟流漿漸少方生倘漿來過多恐胞干難産亦非所宜須八珍時服助其血氣可保無慮又有一月前忽然腹痛狀如即産卻不産者名曰試月又有腹雖痛而腰不痠痛脈未離經而不産者又有腹雖痛而未下墜胎雖轉而兒身未正亦非當産時也要知腹中痛陳乃兒破衣轉身也氣壯者轉身自易氣弱者轉身較難衣薄則破速衣厚則破遲所以有腹痛一二日方生凡孕婦須當寬心以待其自然之勢切不可亂用氣力強産以致枉命至於自然當産之時必有緊陳如臍腹痛急腰痠重痛眼中如火肛門迸急等類齊至待兒身已正頭到産門用力一送即下然亦有腹覺微痛或腹竟不痛止覺腰痠下墜而産者蓋腎候於腰胞系於腎故也古人云時至自然分娩譬如登廁未急不能催時急不能止此理雖俗知此免患轉胎調攝須知凡孕婦兒身轉動其腹必痛雖遲日不生切勿驚怕且令人扶持在房中行走或倚物而立直其體腹倘精神稍困則以補褥壅墊脊背仰臥少頃又令行立聽腹中慢慢轉身雖遲無害且宜稍寬裙帶以便兒在腹中轉舒有餘地也若不禁痛苦或傴僂屈曲斜倚側靠胎中不免為之擁擠迷其出路穩婆不解此理但見生遲頻頻試水誤傷胎破或風入産戶而成腫脹或胎未至而胎水先干分娩愈難矣遇此者惟令産婦勉強飲食調其氣息或用活血滑胎之藥佐之活血滑胎藥方俱見催生門候子逼門戶方盡力一努胎隨漿下矣此乃瓜熟蒂落之理切不可預使氣力令精神失倦臨期反致疲困此産家最要緊處曾見一婦臨産畏痛曲身坐臥以致胎元轉身不順兒出胞時尋到産門被母曲身遮閉因不得出少頃再轉母又護痛再閉如此兩三遭則子無力而不能動至於難生人又見子不動則謂死胎其實子無力非死也隨令産母正其體腹不時行動坐立心安氣和勉強飲食俟兒少停氣復再轉至産門果順易生下穩婆宜加選擇須知凡孕婦臨産當選年高有經識穩婆及純謹婦女一二人扶持倘誤用無知孟浪婦女收生不審察是正産與轉胎一見腹痛亂將雙手摸孕婦腹上夾腹兩邊重按欲其直下以免橫生此第一誤人性命者夫腹初痛則胞衣未破而欲破之時也兒將分娩心中亦有靈性矣見腹外揣摩兒不知為何物遽生驚恐則縮不敢動胞衣又何時而得破乎更有穩婆無知害人私用手指掐破水衣者極須防範夫胞漿乃胞內養兒之水兒既折破自隨水而下若過時不得分娩是胞元無力轉頭較遲恐致漿盡血來閉塞道路令子無路可通胎澀不行用保生無憂散以固其血如血已耗八珍湯加益母草濃煎時飲之倘元氣困憊急用上好人參兩許當歸二錢煎飲飲盡再煎服助其氣血最為得力舍此而用催生耗氣諸藥總無一效也或先服八珍補養氣血次煎濃蔥湯令穩婆洗産戶使氣上下通暢更用酥油滑石塗産門次服催生萬全湯亦妙臨産避忌須知凡孕婦臨産之月不可洗頭濯足犯者胎多難産若至臨盆之際凡系門窗箱籠瓶甕之屬俱宜鬆開以及一切外來親戚並孀婦閨女喪孝尼姑與汙穢不潔或月經適至或原有體氣婦女皆足以觸胎致殃俱宜防備避忌俗忌多人知覺蓋多一人入房則多一時遲延此雖俗論卻有至理恐産婦心煩以致難産也臨産宜肅靜須知凡妊婦臨盆房中不得喧鬧即有意外緊事戶外不得叫喊倘令産母恐懼驚心則胎滯氣結不行而難産經云驚則神散憂則氣結恐則氣怯怯則上焦閉閉則氣還還則下焦脹氣乃不行矣此氣結不行以致難産更有産母兩尺脈絶他脈平和此乃下焦脹氣閉不行難産之脈急用紫蘇飲散結行氣而産矣盤腸産子腸先出者世人莫不驚畏然無妨礙令産母安心仰臥急將淨盆盛溫水冬則再加稍熱加入香油養潤待兒並胞衣俱下穩婆香油塗手徐徐送入令産母兩足夾緊穀道腸自收上有用醋和冷水令人噴面一噴一收以漸收之又有神應丹貼法然此噴貼之法腸雖可收豫恐誤事不若皂角末吹鼻嚏作自上又有腸被外風吹乾不收者用磨刀水少許火上溫過以潤其腸後用好磁石煎湯一盞服之其腸自收又有兒並胞衣下後膀胱即尿胞壅出産戶者用前法送入凡此子腸膀胱先出皆平日氣虛因努脫出並用力太早內臟動搖氣虛下元不固關鍵不牢之故若此番經過須防下次預服補中升提之藥於前庶臨盆可免如浪臍産胞衣臍腸先出者凡兒出胸時頭必轉向産門自然正産若無力轉運腳踏胞衣臍腸先出急令穩婆理清推入稍俟氣平乘勢就其腳下推轉不可久延久則臍腸復下便難收拾矣臨産雙生須知凡孕婦臨産一兒已下又見一兒此係雙胞惟穩婆自知之只云取胞待生下方言恐驚母成産患也候胞衣生下須知凡産母生子出戶時人即以兩手抱産母胞前産母亦自以手緊抱肚腹令胎衣下墜如胎衣來遲切勿慌忙用草紙燒煙燻鼻即下如再遲則急斷臍帶洗兒仍用軟帛物系墜臍帶此帶極脆系時猶宜輕巧牢固然後截斷若不斷臍帶恐血反潮入胞中脹而不下攻心則傷如穩婆諳事者能以手指取下甚便取法見後胞衣不下門悶臍生須知凡兒産下即啼此正理也如兒下地氣悶不啼相傳寐生呼父乳名手拍兒股即啼者此理亦未講明蓋兒糞門有一膜悶住兒氣故不能出聲拍之則膜破而能叫哭矣如拍之猶不破須令女人中有輕巧者以銀簪腳輕輕挑破甚便或不能挑急用棉絮暖衣將兒緊包抱於懷內勿令散放未可遽斷臍帶速用熱水浸其胞衣寒天則置炭火中煨之仍作大油紙捻點燈於臍帶上往來燎之蓋帶連兒臍久則熱氣內鼓其膜自破膜破則出聲而蘇方可斷帶洗浴亦有用蘄艾為捻香油浸潤熏臍帶至焦使熱氣內鼓破膜又一法用燈心囪門點爆數下均治悶臍生法也兒生即死須知凡兒生下即死者急看兒口中前上齶上有泡以手指摘破用帛試血令淨若血入喉即死去血即生其泡中白米如針嘴尖亦須刮去不可令其入喉也臨産總論婦人以血為主惟氣順則血和胎安而産亦順又何俟諸般調護乎奈富貴之家嗜欲驕恣使精血凝淤胞胎且耽於安逸全不運動以致胞胎肥厚又或食生冷硬物凝滯氣血又或臨産驚恐恐則情怯氣下而下焦壅閉不行皆致難産有如腹痛或作或止名曰弄胎漿水淋漓來少名曰試水雖臍腹俱痛兒已轉身而腰不痛者切莫倉惶切禁穩婆於腹上揣摩將手入探以致胞破漿干兒身難以運轉直待時候已到痛陳已緊水破腰疼眼中如火兒逼産門方可坐草待兒頭順正方可用力逼送其或本家倉惶穩婆冒昧致令坐草太早用力太過産母困倦而猶遲遲難下者方可用催生之藥又不可輕用峻劑徒滲水道愈令難産如當盛暑氣散血沸則産室宜貯水一大盆以收暑毒並時燒舊漆器以防血暈如遇嚴冬氣血凝滯則産室用火和暖下部衣被加厚方免胎寒血結此調護之法尤宜因時以制宜者也楊子建十二難經一曰正産懷胎十月陰陽氣足忽然作陳疼痛胎至産門漿破胎下兒即正産二曰傷産胎未足月有所傷動以致忽然臍腹疼痛或服催生藥太早或産母用力太過逼兒錯路以致不能正生故分娩須待兒身轉動對産門然後努力一送自然産下三曰催生欲産時兒頭已至産門而生猶遲滯者方用藥催之又或挨延日久産母困倦難支宜服藥以助其氣血令兒速生按助其氣血四字甚妙須細玩之四曰凍生天氣寒冷産母血氣凝滯不能速生務要産室和暖衣被加厚使産母溫和不致血凝胎滯五曰熱生暑天産母熱甚則頭痛面赤昏暈産室人多氣逼亦致此患名曰血暈宜多放水盆以收熱毒庶免崩暈然或涼風陰雨又當謹避六曰橫生此由兒方轉身産母努力逼之以致兒頭不正當令産母安然仰臥推兒身正直撥頭對産門推撥時以中指探兒肩不令臍帶系絆方用藥催之總以努力一送即生矣用芎歸阿膠葵子滑石為末酒蜜調下古人用三退散為末用蜜調下七曰倒生由兒尚未掉頭努力一逼故也亦令安然仰臥令穩婆徐徐將兒足推送入腹候兒身自順切勿驚惶如良久不生令穩婆用手輕輕以推足就令一邊直上撥兒轉身令兒頭一邊漸漸順下正對産門然後服催生藥努力一送即生矣八曰偏生由兒頭未順生路産母努力一逼以致兒頭偏墜一邊雖已露頂實乃頭角也亦當令仰臥輕輕將手撥正小兒頭面直對産門一送即下若見兒頂後骨偏墜穀道而先露頭則令穩婆以棉衣烘暖裹手於穀道外旁輕輕推兒努力送之自生矣九曰礙生兒身已正門路已順兒頭已露因兒轉身時臍帶絆住其肩以致難下亦令仰臥輕手推兒近上以中指托兒肩脫去臍帶仍候兒身順正一送即下十曰坐産言兒欲生時當於高處牢掛手巾一條令産母以手攀輕輕屈足良久兒即順生十一曰盤腸生臨産時小腸先出然後生兒其腸不收名曰盤腸急以熱水浸軟舊布蓋住其腸不可包托外以醋半盞新汲水半盞默噴産母背面一噴令一縮再噴再縮以盡為度不可驚惶可用如聖膏塗頂心收盡即洗去一方以半夏末吹鼻即收又方以麻油紙烟熏鼻又方用磨刀水少許火上溫過以潤其腸後用好磁石煎湯一盞服之自收磁石即吸鐵石蓋用磨刀水之故即以借其吸力如腸久出而為風吹乾不能收者用一淨器盛貯煎黃耆湯浸之十二曰交骨不開陰門不閉二症皆由元氣素弱胎前失於調攝以致血氣不能運達而然交骨不開者陰氣虛用加味芎歸湯陰門不閉者氣血兩虧也用十全大補湯將産昏倒凡將産突然昏倒或坐草之時驀然口噤目翻吐沫者皆因胎前不能忌口恣食肥甘以致五臟氣滯六腑不和且胎氣既肥用力太早遂令胎驚猝倒治以瘦胎金液丸可保無虞金液丸公母羊糞燒存性飛生毛腋下者煅存性血餘無病者煅存性各五錢灶心土一錢砂仁五分黑鉛一錢銚鍋內熔化水銀一錢拌勻取出研碎共為末用粽子角為丸如緑豆大遇前症及橫生倒産急以流水吞下五丸則母子俱保交骨不開各方凡將産真陰枯滯或中年破腹交骨不開以致難産者宜服開骨千金不易湯開骨方當歸六錢川芎三錢敗龜板三錢白髮一大丸加酒一盞煎服救逆湯治産母氣血素虧子無力轉頭手足先出人參一兩當歸三兩川芎二兩紅花三錢水煎速服久之不順再煎再服獨參湯附論催生第一方人參二三錢或四五錢論曰人參固為催生之妙品然用之不得其法往往有失誤之處而人不知覺也若生産之痛陳未來兒先必轉胎腹痛人未明此理以為將生之時即煎參湯與飲助其氣力未免失之過早如産母平素氣血虧虛則有益無害若遇壯實婦人並非因虛難産致提固胎氣上逼心胸悶脹不下反成難産矣如生陳以來腰痠腹痛穀道迸迫目中流火適值兒正出戶方飲參湯且一飲而盡豈不知之過遲而急及産下之後正欲逐瘀之時其參力方鋭瘀血受補凝滯不行勢必上行奔心等患且有用至一二兩者尤宜慎之是以古人治産後非急證不用人參且多有芎歸合用其意深矣預備上好人參四五錢如産婦少壯臨盆安順亦無需參湯以助其力如中年産婦育産過多或平素瘦弱或生産艱難經日不産過錯過生陳或亂用氣力以致氣乏力倦及至正産之時反無力送胎可用人參二錢或三錢煎服自然易産至於尋常生育恐臨期艱難預用人參二三錢煎就用重湯溫著俟漿胞破時令産婦飲兩三口以助氣力少停再飲二三口頻與漫服不過助其氣力以催生耳生下即已不必多參盡飲以招尤也或用上好人參一枝含口內生津助氣亦妙至於橫逆等生須用前論手法施治再服參湯以助之蓋人參能補氣升提使産母不至倦乏亦能令兒升舉轉身為順自易生催生萬全湯附論人參三錢至五錢大補元氣以為君當歸三錢大補營血以為臣去蘆川芎一錢入肝以疏鬱滯少寓升提之性則降下之藥得力桃仁十三粒不去皮尖搗碎取苦可去舊甘能生新滑能潤下乾薑一錢溫能通行血分炒焦黃色焦則令其下降而遏其上升炙草六分令其藥性少緩中宮得受補益不使即為下墜也牛膝梢二錢既能下行復走十二經絡令其經絡無壅則氣血效力以為運行推出之勢紅花三分多則破血少則活血生新耳酒炒肉桂臨煎方去皮切碎六分冬天用八分藉此引經率領諸藥直入血分且溫可通行散瘀則生産自易加膠棗一枚水煎食前服如産婦壯實及無力服人參者去參用之其催生之效尚能倍於佛手散多多矣論曰婦人臨産關係母子性命實存亡頃刻之時是以古人立方甚多然産育乃大傷氣血者也其難産又多由氣血不足産後諸疾固屬氣血大虧然産後諸虛皆因産前所致奈佛手散兔腦丸及葵花益母諸方無非活血順氣滑胎破瘀溫暖通竅以圖運行推出之勢全不管運行推出之源産婦精力壯者藉此開導得以易生倘氣血不足則雖有催生開導之功而無運行藥勢之力抑何補哉至於手握石燕足貼萆麻設遇實證順安心假此證候時如當精神氣血虧極用此敷衍之方神氣內竭勢如隔靴搔癢不調氣血而強用催生何以為運行之具徒存虛名而無實效誤人性命於頃刻豈不痛哉惟達生散立方平正奈只可調理於産前生化湯用意甚深又只可調理於産後並非可濟危急催生之用者今萬全湯乃體二方之意合成一方務取萬全屢用甚驗故以萬全名之先以調補氣血佐以散瘀下降溫中氣血得力自能健用催生此不催之催也故用人參當歸為君培補氣血壯其主也少加桃仁川芎黑薑炙草酒紅花溫中而散其瘀也牛膝梢桂心溫行導下使無上逆衝心之患不惟催生神效産後更無瘀血凝滯百病不生補而兼溫則不滯溫而兼補則不崩升少降多則氣得提而易下降而兼升則瘀自去而新自歸補多瀉少邪去而元氣無傷苦少甘多瘀逐而中和仍在豈非萬全催生者乎催生佛手散全當歸一兩川芎五錢龜板七錢酥炙透水煎服一方去龜板加益母草三五錢三合濟生湯治臨産艱難一二日不下服此自然轉動下生當歸三錢川芎二錢枳殼二錢麩炒紫蘇八分大腹皮一錢五分薑汁洗甘草七分水煎服待腰痛甚服之即産魚膠散治難産魚膠五錢同麵炒成珠去面將膠研細末用熱酒沖服少頃即生催生簡易方催生時藥不便就將本年時憲書前黃紙殼面刊有欽天監奏准云云並有印信在上者扯來不要人見用火燒為灰將灰調酒一杯與産婦吞之即時産下又有請本地方官或府州縣差簽一枝在簽上朱書某縣知縣某人要寫名字在此立候催生將簽字倒豎於産房門檻內即刻産下仍即將簽繳回本縣奇驗奇驗催生如意散臨産腰痛方可服之人參一錢乳香一錢辰砂五分共為末臨産時用雞子清一個調藥以生薑自然汁調開和勻冷服如橫生倒産即時轉正子母全安催生芎歸湯即佛手散但與佛手散煎服之法不同耳故又名催生芎歸湯治因事觸胎子死腹中疼痛口噤用此探之不損則痛止子母俱安損則立下臨産催生並治橫逆難産等症當歸六錢川芎三錢水二鍾半煎欲干時入頭酒一鍾煎沸溫服口噤灌之如人行五里再服不過三服即生有一婦人生産三日不下用此方加入益母草二兩酒水各一碗煎飲服之即生曾有人止用本方治橫生倒産頻服順生屢效蔥白益母湯治難産益母草五錢蔥頭三錢用紋銀一錠要重四兩水二碗煎一碗服之即生神柞飲催生甚速並治橫逆倒産死胎在腹生柞樹刺枝如小指大者一握水洗淨切碎一葉一刺者處處有之甘草五錢一方五寸新汲水一碗半用新瓦缸入水與藥於內以紙三層密封文武火煎八分溫服不煎渣心覺腹疼腰重欲坐草時即將此藥溫服一盞便覺心下開豁如渴又飲一盞覺下重便産更無難産橫逆之患若遇橫生倒逆不過三服即正子死腹中不過三服即下能保母子兩全最為神驗曾有一婦橫産兒手先出至脾腫脹欲截其手不保其生屢服催生藥不效以此藥濃煎一碗與服頃刻蘇醒再與一碗困睡少時忽云我骨節都拆開了快扶我起來血水湧下拔出死胎全不費力此方救人百發百中然據石室祕録云宜慎用論見後加味神柞飲方中祕録加味神柞飲附論治兒頭已到門久而不下此交骨不開之故柞木枝一兩或五錢當歸二兩川芎一兩人參一兩煎湯服之如兒頭到門久而不下服此少頃必然一聲響亮兒即生矣真至奇至神之方也論曰倘兒頭不下萬萬不可用柞木枝蓋此味專開交骨兒未回頭而兒門先開亦死之道故必須兒頭到門而後可用此方也豫謂前方獨用柞木枝治橫逆及難産且云欲坐草時即溫服一盞須防太早有失不若俟兒頭到門久不下時服之為當乳朱丹一名開骨膏治難産並交骨不開乳香不拘多少或遇三月三日五月五日七月七日研細用豬心血為丸梧子大硃砂為衣曬乾收藏值難産者以涼酒化下一丸不産再服或蓮葉蒂七個水二盞煎一盞化服神效伏龍肝治橫逆難産伏龍肝即對灶心之土多年紅者佳速研細末溫酒調下一錢兒頭即帶土而出矣二蛻散治橫逆難産蛇蛻全一條破故紙一張二味新瓦瓶內鹽泥固濟燒存性為末煎乳香湯調下一錢連三服神效綱目煎榆白皮湯調下一錢豫謂此方藥峻宜慎用膠葵散治橫逆難産阿膠一兩蛤粉炒成珠黃葵子一兩每服四錢水煎服催生如神散一名黑神散治橫逆産並治月水不止崩漏症百草霜血得黑則止胞水過多催生可用白芷各等分不見火為末每服二錢以童便醋和如膏加沸湯調連進三服能固血又免血涸一方加滑石每服三錢催生如聖散治胞水乾澀兒在腹中不動或漿血來閉塞路道難産之證黃葵花二錢焙乾為末熱湯調下神效或有漏血胎臟乾澀難産痛劇者並進三服良久腹中氣寬胎滑即時産下如無花以黃蜀葵子為末二錢酒服亦可如胎死不下紅花煎酒調下經驗方用黃蜀葵四十九粒或三十粒歌曰黃金丙子三十粒細研酒調能備急命若懸絲在須臾能令眷屬不悲泣催生起痘神驗方治難産並治痘瘡不長不漿山羊血七八分或一錢此血用酒化開服之頃刻即産且不傷人又無産後瘀阻血暈之患有云此血仍聚兒頂而出又治小兒出痘不起長不灌漿亦用此血量兒大小或幾釐或一二分或三四分加以酒釀化服其痘不起長者即起長不灌漿者即起漿與用雞冠血酒釀之意相同然雞冠血不如山羊血多多矣尊生救生湯治難産並交骨不開全當歸一兩川芎二錢龜板一片酥炙脆打碎頭髮一握燒灰存性酒水煎服虛人或産多力衰者加人參二三錢如人行四五里即下不下急宜再服其他催生藥皆受傷豫謂此方即加味芎歸湯分量雖殊藥味則一尊生用之而驗多在虛人加參之力耳神應丹又名萬全膏萆麻子七粒去殼將萆麻研如泥入麝一分再研成膏塗産母足心胎下即洗去遲則恐子腸出也如子腸出即移塗産婦頂心腸即收上速去之此方催生下胎雖速藥性猛峻用者慎之一方萆麻子四十九粒去殼研爛治盤腸産敷在産婦頂心腸即收盡而急去之臨産滑胎煎臨産煎服數劑以便易生當歸熟地各三錢炒杜仲懷山藥各二錢川芎枳殼各七分水煎服如氣虛加人參白朮若便實多滯加牛膝二錢易産神方全當歸六錢益母草酒洗元胡索醋炒腹皮黑豆湯洗各二錢川芎懷牛膝各錢半炒枳殼七分冬葵子三錢炒研加生薑三片排作乾卦長流水二碗煎七分溫服藥罐上壓小刀一把如難産者加龜板四錢腹痛煎藥痛緊即服初産交骨不開全當歸五錢正川芎四錢油頭髮燒灰二錢敗龜板炙三錢水煎熱服臍下急痛凡轉胞胎逼及胞壓在一邊胞系轉戾臍下急痛皆因氣血虛弱痰壅滯所致用參朮散當歸熟地白芍人參各一錢川芎八分白朮六分製半夏五分陳皮四分甘草二分姜引水煎服臨産水乾不降生用益母散麝香三分白芷滑石各一錢肉桂八分益母三錢水煎服水至胎下臨産血液下多幹澀難産車前子炒三錢研末用雞蛋清調服難産催生方取高牆上蛇脫的皮一條要頭向下者佳瓦上焙乾研末加麝香三分乳調為膏貼臍上生下即速去不可久貼又方用活雄鼠腎一對加麝香三分分作三丸硃砂為衣白湯服下一丸生下男左女右手拿出如胎死頭上頂出如胎衣不下子死腹中取本婦鞋底炙熱尉腹上五七次即下又方用茉莉花七朵入淨瓶中將芝麻一合用銅勺炒黃入井水一茶鍾煎滾連芝麻傾入瓶內少蓋片時將水飲下即生如無鮮花時預為採取茉莉花夾在書本內陰乾亦可經驗神效方凡難産兩三日不下及胞衣不下者用乾荷葉或一個或半個用百沸百滾開水沖泡飲之立時生産胞衣隨下産婦小兒俱保平安此方屢試屢驗真有不可解之靈幸勿以平淡而輕忽之為要胞衣不下凡胞衣不下皆因産婦送兒力竭無力送衣或經停日久外乘冷氣則血道凝滯又或胎前體弱血氣枯涸而衣停三者速煎生化湯大料進之血旺腹和衣自下矣或加鹿角灰二錢或益母丸和生化湯送下胞衣不下時産母必須坐守不可臥倒若斷臍帶必要草鞋一隻系之如寒月扶産母上床倚人扶靠坐定蓋以熱被時換熱衣暖腹血和腹暖胞衣即下但下後須連服生化湯數貼塊痛一止即服加參生化湯又有因惡露流入胞中脹而不能下者蓋兒既生胞帶必下墜故胞在腹中形如荷葉之仰仰則盛聚血水致脹礙難下將兒抱定不可斷臍帶惟令老成有識見穩婆以右手二指跟蹤臍帶而上直至胞口輕輕向下一鉤其血傾覆其衣即下法甚簡明當為下胞衣第一妙法好過用藥多多矣藥力總不如手法之速效是以老成明白有見識之穩婆斷不可少有以用本婦頭髮攪入喉中使之作嘔胞衣可下甚非良法胞衣不下各方用黑豆二三合洗淨炒香熟入醋一大碗煎五六沸去豆取汁分至二次服之其胞即下此仙方也雖系醋煎並無酸惡之味宜先預備應手見功益母丸治婦人赤白帶下惡露時下不止及治胎前産後經中諸般奇痛無所不治故名益母益母草一味一名茺蔚子一名野天麻方梗對節生葉葉類火麻四五月間開紫花者是開白花者非於五月採取曬乾連根莖葉花子磨為細末忌用鐵器煉蜜丸如彈子大每服一丸用童便和熱酒化下或用生化湯化下或不曾預備益母丸即用生益母草搗汁入蜜少許服之其效更大又方用黑牛糞不拘多少略焙帶潤以布裹之束於腹上胞衣即下又方用山奈一二片令産婦含於口內有水咽下其胞衣自落又方無名異三錢即漆匠所用煎油之藥是也以雞蛋調勻再以陳米醋一茶鍾煎滾沖服其胞衣縮小如稱錘而下倘或未下不必驚惶再服一劑無不即下半夏散治産婦體氣肥盛多痰阻逆氣道以致難産及子死胎干或子下而胞衣不出製半夏不拘多少研細末用童便調服方寸匙連進三服並用吹鼻取嚏以激動關竅為妙難産奇驗方生半夏白蘞等分共研細末凡遇婦人難産或一二日不生以及橫生倒生並胎衣不下者急用此藥末一錢無灰酒調服無不立下交骨不開論交骨不開者陰血虛也或年幼受胎陰氣不足陰不足則氣不達所以不開或年大方嫁脈絡長成或元氣虛弱胎前失調皆有此證用參便佛手散補而開之或十全大補湯亦可古法用加味芎歸湯每見服此藥者惡血凝滯反成不救惟大劑人參童便入於芎歸劑中助其氣血開闔之攻立致也證見咬牙昏暈急以熱小便灌之稍遲則無濟矣若元氣不虛者只有佛手散入小便服之人參不必用也又有用開骨膏以參便佛手散煎湯送下豫謂又不如用加味神柞飲開交骨如神也豫曾治彭姓女初次生産經日不下交骨不開神柞飲並諸催生藥服之不效用人參三錢煎服立下參便佛手散治臨産交骨不開其驗如神當歸三錢川芎一錢人參三五錢去血過多加至一兩水煎臨服入童便半盞續續進之質壯氣實者但加童便其參不用可也開骨膏治交骨不開即催生方乳朱丹彼兼治難産此獨開交骨明乳香一兩五月五日研細豬血為丸如雞豆大硃砂為衣涼酒化服一丸加味神柞飲開交骨如神見本卷臨産催生方內子死腹中論凡孕婦胞衣未下急於胎之未生子死腹中急於胞之未下蓋胞衣未下子與母氣尚相呼吸若子死腹中則軀形已冷胞臟氣寒胎血凝沍氣不升降欲下死胎若以至寒之藥用之不惟無益而害母命者多矣所以古人有用附子湯使胞臟溫暖凝血流動以附子能破寒氣墮胎也又有因患傷寒熱病溫瘧之類胎受邪熱毒氣內外交攻因致胎死留於胞臟古人深慮胎受毒氣必然脹大故用朴硝水銀硇砂之藥不惟使胎不脹又能使胎形化爛再副以行血順氣之藥死胎即下此古人立方之意後人遵意仿而行之所以有立候下胎散一方然藥味俱多峻歷且有爛肉之能即遇壯實村婦豫猶未敢輕用又何敢施於富貴弱質之體哉況豫屢見死胎人不慌迫亦能遲遲生下並不傷母其故何也蓋人腹中極熱食物入內俱化其胎雖死若産母不驚恐能安心飲食腹內熱氣熏蒸胎自柔軟腐化亦生而不傷母但所出穢氣令人難聞耳豫每治胎死不下用胎産金丹一粒服下頃刻即生但子死在腹其故多端要不過急去其死胎以安産母如胎氣薄弱不成而殞如産母久病胎萎而死如胎肥氣滯惡露已盡致胎乾子死身冷不能出如臨産孕婦護痛兩足不開夾住兒頭以致子死如𤵜㕮忍耐當值之人不善扶持緊抱其腰傷胎而死如生路不順逆側等證穩婆蠢厲用手莽撞傷子而死如臍帶纏項氣絶而死如兒頭到門交骨不開久而不下以致子死如孕至五七個月胎漏跌僕時證等類傷胎而死用烏金散脫花煎香桂散牛膝琥珀等丸新法下胎神柞飲類擇其宜服者服之死胎自下又有雙軀一死一生者不可不知但雙軀之脈三陽俱盛如少陰督脈微緊血即凝濁經養不周胎即偏夭或因難産一死一生不去其死害母失胎千金神造散主之但恐虛弱人下胎或有貧富不等醫藥一時未便豫故又擇諸書內丸散及簡易單方開載於後以備選用然下胎最宜謹慎必先驗明産母面赤舌青腹中陰冷重墜口穢氣喘的確方可用下若見紫黑血塊血縷尤為確候亦必先固妊婦本元補氣養血而後下之豫故重佛手散香桂散滑胎煎為下死胎之王道藥也倘孕婦遇有不安醫者未能審詳遽用峻厲功伐難免不測之禍慎之慎之立候下胎散治臨産或橫逆或血海乾涸或胎死不下命在頃刻皮硝一錢少壯者一錢五分大附子體弱者加三五分煨去皮壯者不用如寒天亦加附子三五分煨去皮用黃酒半鍾煎一二沸溫服立下烏金散局方名黑神散靈苑名肉桂散治産難或熱病胎死腹中或因顛仆或從高墜下或房室驚搐或臨産驚動太早觸犯禁忌或産時未到經行先下惡露已盡致胎乾子死身冷不能出熟地酒焙乾蒲黃當歸交趾桂芍藥軍姜即炮姜去皮粉草各一兩小黑豆二兩炒百草霜五錢上為末每用兩錢米醋半合許沸湯六七分寢起溫服疑二之際且進佛手散酒水合煎二三服探之若未死子母俱安若胎已死立便逐下如的知其胎已死進此藥後更進香桂散須臾如手推下常用催生更加好滑石末半兩葵子五十粒捶碎黃柞葉七八分蔥白二寸順流水煎湯調下蓋滑石能利小便柞葉行氣逐血蔥白能通陽氣氣盛血行即産矣查局方黑神散無百草霜用童便酒各半調服二錢良方黑神散有炮附子半兩無蒲黃簡易方黑神散止用百草霜一味又有加乳沒血竭之黑神散綱目用熟地一斤生薑半斤同炒乾為末烏梅湯下二錢為治産後塊痛之黑神散俱各有證治録此以別黑神散之方不一脫花煎凡將産者宜先服此藥催生最佳並治難産經日或死胎不下俱妙當歸七八錢或一兩肉桂心一二錢或三錢川芎牛膝各二錢車前子一錢五分紅花一錢催生者不用此味亦可水二鍾煎八分熱服或服後飲酒數杯亦妙若胎死腹中或堅滯不下者加朴硝一二錢即下若氣虛困劇者加人參隨且若陰虛者加熟地三五錢香桂散一名桂香散附救苦散治胎死腹中不下簡便而最效桂心三錢麝香三分一方五分為末蔥湯調服死胎即出溫童便酒調亦可加生川烏三錢為下私胎猛劑一方單用桂末一錢童便調下名救苦散或童便酒亦可牛膝丸下死胎杜牛膝三兩紫金藤即紫木香蜀葵根各七錢肉桂二錢當歸四錢麝香五分上為末米糊為丸如梧子大硃砂為衣每服五十丸乳香湯下琥珀丸治婦人或老少或産前産後百病及療三十六種諸病七疝八瘕心腹刺痛卒中癱瘓半身不遂八瘋十二痹手足瘦疼乳中結核結毒懷胎驚動傷犯不安死胎不下琥珀硃砂各另研沉香阿膠炒珠附子制川芎肉桂五味子石斛各五錢牛膝酒浸當歸肉蓯蓉酒洗去泥曬人參熟地續斷木香沒藥各一兩上煉蜜為丸彈子大每服一丸空心食前午後溫酒化開服一方有牛黃珍珠乳香元胡各一兩共二十一味為丸備服凡服法或薑湯或米湯或酒或燈心湯隨證用引若傷寒中風角弓反張用麻黃湯送下孕婦臨月宜一日一服至産順利不覺疼痛凡婦人服至五服十服之後日倍飲食其功不能盡述服者當自覺也新法下胎方即平骨散之變局比平胃散穩妥治胎死腹中最妙或有用半劑者當歸一兩厚朴三錢陳皮二錢酒水各一鍾煎至一鍾入朴硝或一錢或二錢再煎十餘沸去渣熱溫服死胎自下或化水而出或止用脫花煎更妙脫花煎方見前或用佛手散以酒調服亦妙千金神造散如妊婦雙軀一死一生服此生者安死者出矣蟹爪一升阿膠二兩甘草二錢以流水先煮蟹爪甘草去渣納阿膠煬化服之血凝不下加桂心三錢此方用蟹爪以去其死阿膠以安其生甘草和藥性扶羸小品方虛弱人欲下胎宜用此人參粉草川芎肉桂乾薑桃仁黃芩蟹爪上等分每服一兩水二鍾煎八分空心服未動再服仙傳保命丹一名安禳丸又名奪命丹凡孕婦下血不止或小産下血及子死腹中其人憎寒手指甲黑唇青面色黃黑胎上攻心冷汗自出悶絶欲死或食惡物毒藥傷動胎氣下血不止胎尚未死服之可安胎若已死服之自下此方得之仙傳與黑龍丹媲美皆産科之聖藥也丹皮赤芍桂心桃仁白茯苓各等分上為細末蜜丸彈子大每服一丸細嚼淡醋湯下連進三丸神效官桂散治産婦面赤舌青子死母活者或面青舌赤沫出母死子活者或唇舌俱青黑沫出母子俱死者此方下死胎如神官桂五錢去皮丹皮川芎葵子各一錢五分為末蔥白煎湯調下三錢黑神散凡臨産血多胎為血裹以致難産宜棄子救母橫生逆産子死腹中以及胎衣不下血迷心竅頭暈眼花敗血乘虛流散四肢浮腫口渴舌燥乍寒乍熱煩躁發狂言語錯亂其狀如癲或月內飲冷敗血凝聚大便艱難小便閉澀或血流小腸小便出血或惡露未盡誤食酸物收斂因而崩漏或肺敗鼻中氣黑或敗血衝心喉口氣急或血滯脾胃心腹脹滿嘔吐亦似翻胃服之神效當歸熟地白芍炒肉桂炙草各一兩棕灰蒲黃沒藥血竭各五分乳香三錢赤芍八錢共為細末每服二錢溫酒調下雞尉死胎法烏雞一隻去毛細切水煎二三升候湯適手用衣帛蘸摩腹中胎自出下胎單方牛糞不拘多少炒極熱入醋半盞以青布包裹於母臍上下尉之立下千金榆皮湯治胎死腹中或母有疾欲下胎榆樹皮一握將白皮煮汁服之自下返魂丹治生産諸證並死胎惡血胎衣不下橫生逆産産前清熱養血産後推陳致新野天麻一名益母草四五月採花葉子陰乾半斤赤芍六錢當歸七錢木香五錢為末蜜丸彈子大或童便酒或薄荷湯或米飲或桂枝湯或棗湯或秦艽湯隨證酌湯化下一丸死胎不下凡胎死腹中外證指甲青黑脹悶不食口中極臭用平胃散加朴硝五錢水酒煎服其胎化成血水而下如血乾有寒者芎歸湯下或服桂香丸或服立竿見影方平胃散蒼朮二錢陳皮厚朴甘草各一錢芎歸湯即佛手散桂香丸肉桂麝香立竿見影方黃葵花三錢牡丹花三分真蕪荑三分麝香一分桑牛半個巴豆半粒去油萆麻半粒去油共為末醋糊為丸如彈子大大黃為衣臨用研碎一丸熱酒和香油少許送下按此方用蔥汁打糊作丸更炒此方活水瘦胎軟骨一切橫生逆産死胎立下如雙胎一死一活者用蟹爪一兩甘草二兩東流水十盞煎至三盞去渣入阿膠三兩作三次頓服能令生者安死者出加味脫花煎治胞衣帶斷及胎死腹中奇效全當歸二錢黑炮姜八分淨車前子一錢大川芎三錢川牛膝一錢東京桂去粗皮研末沖六分炙粉草八分加芒硝五錢沖服不可煎熟附片二錢水煎服或用芒硝入粥以附片煎水和飲之亦可緣硝有爛胎及臍帶之功其性涼每硝一兩必用附片四錢配之也既産調護法産畢不可即時臥倒當依人坐定令人以熱手從心下輕輕揉挪至臍腹五六次然後睡下亦不可久坐以致耗乏睡時仍不時揉按庶使惡露不滯其法須將兩足豎起坐不可伸膝其睡須高枕厚褥四壁無風産畢即服生化湯二三帖連進數碗如飢則服一煎後食白粥不可過飽片時即服第二煎如不飢將藥服完然後進食自無塊痛諸病産母腹中時用小衣烘暖溫之即暑天亦不可缺被或以薄棉衣蓋護心腹如春冬天氣嚴寒尤當密閉産室四圍置火常令和暖且下部衣被更宜加厚方免胎寒血凝變生諸證初産不可問是男是女恐因言多泄氣或以愛憎動氣皆能致病不可獨宿恐致虛驚犯時微若秋毫成病重於山嶽可不慎哉集催生諸方佛手散當歸用君兩川芎用臣兩血旺則胎自下凡催生無乎不宜而氣血虧者尤當必服如胞漿已破者恐其乾涸宜加冬葵子二三錢二蛻散蛇蛻白者一條蠶蛻一錢煅存性酒送下綱目云二蛻散須煎榆白皮調下二錢連進三服覺痛便生三蛻六一散蛇蛻蠶蛻蟬蛻各煅滑石一錢甘草一錢共為末酒送三蛻散人蛻男子蛻下頭髮如雞子大一丸蟬蛻十四枚蛇蛻一條俱燒灰為末分三服酒調下治橫逆難産子死腹中桂香散桂心一兩官桂三錢為末和勻作一服須臾如手推下此下死胎之藥宜慎用之滑血飲歸身六錢川芎益母各三錢冬葵子一合阿膠一兩炒滑石三錢水煎服凡胞漿已破而胎猶不下每服六錢連進二三貼一方加酥油一兩經驗催生祕方魚膠一兩用紅棉布一尺卷魚膠以罐盛貯封固火煅存性為末每服一錢用香油蜜酒各半盞調服立下按此方乃祕書中原本胞漿水破瀝乾不下者用此奇妙油蜜煎香油蜂蜜童便各一碗和勻銅鍋漫火煎三沸掠去浮沫調白滑石一兩或益母草亦可攪勻燉服外以油蜜於母臍上下摩之此治難産瀝漿胞胎不下最妙綱目云此方甚妥蓋童便取破血又有濁陰下降之理而摩法更妙催生如聖散黃葵子不拘多少焙乾為末熱酒調下二錢神效如無葵子則花亦可若漏胎血乾難産極痛者並進三服良久腹中氣充胎滑即産須臾正産之後方可服之如打撲死胎紅花酒下一云黃葵子炒七十粒難産時免哭泣華他肘後方巴豆肉三粒萆麻七粒麝香少許共研如泥捻作餅貼於臍上須臾子母分張矣王叔和生死脈訣歌新産之脈緩滑吉實大弦急逆分明寸口滑絶不調死沉細附骨命可生按産後身發寒熱其脈多數切不可因熱而作熱治蓋緣血虛陰虧而然只須重用當歸則熱自退其脈數當自漸除新産禁補南濠陳鰲妻新産四五日患腹痛惡寒發熱醫曰此元氣太虛正合丹溪所論産後大補血氣數語遂以人參大劑入口補極發喘而死殊不知丹溪云産後以大補氣血為主雖有他症以末治之其言治末者即標本之謂也今陳氏之妻瘀血未淨惡寒而發熱所謂急則治其標正合用生化湯以先去其瘀血且方中倍用當歸則血虛身熱者自然漸退乃今驟然大補是失丹溪主末二字之意矣此七日以前不可遽進參耆之明驗也昔揚州一産婦血暈用參一兩附子一錢而愈又一産婦亦用此方遍身紫黑而亡蓋一因血虛而暈補之而痊一因惡露不清誤補而死一症也一藥也而病源不同利害立判是在臨期細心斟酌必須問其惡露有無日期無寡按之痛與不痛向來虛實何如審證的確然後施治斯為無弊總之以生化湯作主虛則多加人參七日以前不可驟加此要訣也以上為一張以上為一張孕婦滿期臨産覺腹痛用無礬黃紙長五六寸闊四五分用硃筆寫符先後火化先化第一張後化第二張不可顛倒共在一杯茶上作一次與孕婦食之第三道只一張則不分先後矣如遇橫生逆産或手足先出可緩緩托回裡面仍服此符不必驚慌催生符第二道共二張以上為一張以上為一張下文尚有符膽字落筆由外入內一筆直下以六字加在字面上逐字依次加在面上每寫一字口念下文咒語一遍連兩小字為一個字隨寫隨念咒語此是符膽照法寫足便是即寫成一片墨亦無防也速生來看破應出筆直下是男曲折是女符破有險此是咒語催生符第三道即死胎符以上為一張服符之法用無礬黃紙朱書用燈一盞置桌上左手持暖茶一小鐘右手將針刺住此符就燈火焚化使其灰全落茶麵連茶服之不可撥爛符灰如撥爛即不效矣吞符之法須要一口吞下如分開兩口吞下則符灰在口內嚼斷亦不效又凡書符者須現寫現用越宿者不效不潔淨人書符不效妻懷孕者不可書符如書符亦不效産婦之夫亦不可書符受財者不效如書符後不用此符即火化之勿得褻瀆先服第一道符二張至一二時之久仍不見小兒轉頭即服第二道符二張至一二時之久仍不見出即食第三道無不出矣服至第二道符見效者居多若非十分難産及確係子死腹中不可服第三道符安胎符一張服符之法如前孕婦胎動不論月分皆效此字一小直從下剔上下文尚有符膽寫在爐字面上每字依次加在上面寫成一片墨亦不妨凡四字每字連兩小字作一字我從賢聖法來未曾殺牛以上十字用硃筆紅紙書之貼在孕婦床對面牆壁或板障上並令産婦默念此十字至㽻字則出聲㽻字即生字婦科産後門産後總論凡病起於血氣之衰脾胃之虛況産婦氣血脾胃之虛弱殆有甚焉是以丹溪論産後必當以大補氣血為主雖有他症以末治之此二語也已括盡醫産後大旨矣若能擴充之則立方用藥治法可無大過夫産後憂驚勞倦諸症乘虛易襲如有氣毋專耗氣有食毋專消食熱不可用芩連寒不可用附桂寒則血塊停滯熱則新血流通至若中虛外感見三陽表證之多似可汗也在産後而用麻黃則重竭其陽見三陰里證之多似宜下也在産後而用承氣則重亡其陰耳聾脅痛乃腎虛惡露之停休用柴胡譫語汗出乃元弱似邪之症勿同胃實其由陽之衰雖分寒熱非大補不能回陽而起弱痙因陰血之涸非滋榮不能舒經而活絡又如乍寒乍熱發作有期症類瘧也若以瘧治淹滯難痊神不守舍言語無倫病似邪也若以邪治危亡可待去血而大便燥結蓯蓉加於生化非潤腸承氣之能通汗多而小便短澀六君倍用參耆必生津助液之可利加參生化頻服救産後之危長生活命屢加蘇絶谷之症肛脫茄拖俱是氣虛下陷補中益氣是良方也口噤拳攣乃因血燥類風加參生化大有益焉産戶入風服以養榮羌獨玉門傷冷洗須床免萸硫怔忡驚悸生化湯加遠志似邪恍惚安神丸助歸脾因氣喘而滿悶虛煩生化湯加木香為佐因過食而噯酸惡食六君子加神麯為良蘇木稜蓬大能破血青皮枳實最消膨脹一應耗氣破血之藥汗吐宣下之方只可施於強壯豈宜用於産大抵新産之後先問惡露如何塊痛如何不可遽加參術腹中痛止補中益氣無疑至若亡陽汗脫氣虛喘促頻灌加參生化是從權也又如亡陰大熱暈厥血崩速煎生化原方乃急救耳王太僕云補下治下制以緩急制緩方以滋道路制急方氣味俱薄力與緩同故治法當遵丹溪而固本服法須效太僕以頻加雖未盡産症之詳已統括治療之要敢曰濟陰之指南其於女科不無小補云脈訣論脈經云産後之脈寸口洪疾不調者死沉微附骨不絶者生又曰沉小緩滑者吉實大堅弦疾者凶牢革結代及澀滯不調者不治丹溪曰胎前脈當洪數既産而脈仍洪數者死又曰胎前脈細小産後脈洪大者多死豫見産後多有洪數而生者要知血虛之脈浮洪而數者居多産後血虛故現此脈若不明以告醫俗醫多誤認為外感虛脫之禍在於頃刻然此洪數之中自有如滑之象非如牢疾而少胃氣之謂故多死也産經曰胎前之病其脈貴實産後之病其脈貴虛胎前則順氣安胎産後則補虛消瘀此其要也大凡孕婦臨産氣血動蕩胞胎迸裂與常經離異必有水先下俗謂之胞漿即養胎之液也水下則胞裂而産即産則氣血兩虛脈宜緩滑緩則舒徐不因氣奪而急促滑則流利不因血去而枯澀均吉兆也若實大弦牢非産後氣血兩虛所宜實則邪實大為邪進弦為陰斂宣布不能牢為堅著近乎無胃皆相逆之脈故凶調攝論凡孕婦産畢血氣未定不宜睡倒不宜側坐須床頭厚鋪裀褥高倚仰靠宜豎膝不宜伸足並遮圍四壁使無孔隙免致賊風為害倘閉目睡倒或怒忿逆氣即令人眩暈也再用醋塗鼻房中或用醋炭更燒以漆器輕輕以手從心按摩至臍則惡露盡下又何血暈血逆之有常見人産畢即飲熱童便一盞又有三日內以童便和酒溫服五七次豫謂酒雖能下惡露行乳汁産後臟氣方虛即素日善飲者亦不可多飲並不可産畢即飲蓋恐因血入四肢或因上行能令血暈至於童便味臊而性涼如胃氣弱者得臊氣而驅惡里無火者得涼性而滯血且能傷胃氣均非所宜不若預煎生化湯産畢即服為妙或用紅糖滾水沖化頻飲以行其瘀時食白米薄粥煮石首魚甘淡食之如此調攝自無事矣有人先於臨月時用有毛淡菜十餘個紙包吊風處二十餘日陰乾勿令人知産下即煎湯一鍾熱服産後再不生病産後禁忌論凡生産既下不必問是男是女恐因言語而泄氣或以愛憎而勞神最忌大喜大怒喜則氣散或生紅汗怒則氣逆或生癥瘕不可獨宿恐致虛驚不可刮舌恐傷心氣不可刷齒恐致血逆勿勤梳頭恐頭皮作痛須氣血平復方可治事犯時微若秋毫成病重如山嶽凡初産其牛羊豬肉雞鵝鴨肉及蛋並豬蹄豬腎緑豆涼粉蕎麥麵食等類一切滯氣堅韌難化之物及生冷膩滑皆不宜食恐新産脾胃氣虛難於運化易致內傷也凡産逢暑月切不可當風睡臥最忌貪涼用扇及洗足澡浴雖盛暑不可用冷水洗手足凡新産驟虛最忌著寒寒則血氣凝滯諸變冗生每致飲食不化腹痛作瀉此時欲去其瘀則正氣並脫欲止其瀉則瘀結不行可不慎歟治法見後泄瀉門凡産逢冬月宜重棉兜護其腹雖夏月亦當復巾裹之以免厥陰受寒凡産後百日內不詈罵少勞碌禁淫欲終身無病而且多子若未滿百日交合則虛羸百疾從此而生必患臍下虛冷手足腰腿痠痛等證名曰蓐勞最難治療凡産後勿用椒薑艾酒雖血塊得熱流通然新血為之不寧耳即砂仁湯亦能動血咸在禁忌産後乳汁乃血氣所成不可食鹹咸能止血令無乳汁且發嗽難治産後南北風土不同江南以新産後即食雞子雖告之以利害相沿成習毫無疑懼且竟多安然無事者豫亦只得隨俗令其豁開淡煮而食之尚有養胃卻痰之功也産後藥誤須知産後勿輕用烏藥香附木香及耗氣順氣等藥用之反增滿悶雖陳皮用不可過五分産後勿輕用青皮厚朴山楂枳殼陳皮消食藥多損胃減食即枳殼香砂等丸亦多損氣血産後勿用青皮枳實蘇子以下氣定喘用之元氣必脫産後乳麥傷胃耗氣五味能阻惡露棗仁油滑致瀉均為禁忌之品産後身熱誤用黃芩黃連黃柏梔子損胃增熱致不進飲食且黃芩苦寒無論惡露淨與不淨皆非所宜産後四日內未服生化湯以消血塊勿先用人參耆術致塊不除産後勿輕用牛膝紅花蘇木枳殼等類以消塊尤忌多用獨用至於三稜莪朮枳實山楂等峻藥更不可用若誤用舊血驟下新血亦隨之而損禍不可測也豫每見俗用山楂一味煎汁以攻血塊致成危證頻服兩三貼必死産後勿輕用生地黃以滯血路産後不可用大黃芒硝以通大便反成膨脹産後不可用五苓以通小便用之愈閉産時不可用濟坤丹以下胞胎不可信婦人良方及産保百問俗醫多有守此二書以治産用芎歸白芍生地誤入實甚余可知矣凡人有疾病多有求卜以問吉凶並卜何方何姓人醫治可愈蓋此人不明醫理不知醫者孰良孰庸亦無可如何之計耳豈知竟有醫卜相通醫求卜薦許以分謝卜者貪利假神道以指引因卜而薦誤人性命比比然也産後之證吉凶在於頃刻不可不知而慎重也或因産過食恐其勞困固令勉強以致停蓄不散此內傷之實證也此上諸證姑舉要者以見其概然既有表邪不得不解既有火邪不得不清既有內傷停滯不得不開通消導也今豫治各證後開生化湯中俱有隨證加減一以重産一以兼治所謂道並行而不相悖可保萬全者矣四物湯不宜産後論凡産後諸病古方多用四物湯加減何也以方中有芎歸之辛溫佐以地芍之寒涼溫寒適中可謂無虞矣不知四物乃女科雜證諸疾妙劑若用於産後大非所宜豫考方書之意以為白芍重復用酒製炒去其酸之性但存生血活血之能或再加黑姜辛熱佐之有何不可又謂芍藥性清微酸而收最宜於陰氣散失之證豈不為産後要藥但觀其再製以酒炒則他寒涼峻削之不宜用概可知矣豫思芍藥初産三五日所當禁用若産日已久以酒製透為他藥之佐猶可惟四物湯中生地更涼直走血分且傷脾胃為害愈甚或云易以熟地補益正陰則稱為至當獨不思熟地性滯更使血滯不快雖有芎歸反行牽制而少行動亦非新産者所宜蓋新産之婦血氣俱虛最忌寒涼大宜溫藥以助資始資生之源也是以丹溪先生謂芍藥伐生髮之氣禁而不用良有深意矣豫嘆世之概以四物治産後者胡不思乎生化湯論附方生化湯論曰産後諸證皆緣氣血驟下元氣大虧用藥不同常法是以有虛極不能姑待者則當峻補之中加入溫行之藥峻補則力大而可宣通溫行則流暢而不凝滯至於逐瘀之劑即實證亦不可用峻厲之藥況産後大虛恐血無主宰一任藥力便為崩而不止虛則易脫勢如覆水難收矣人遇大病之後血氣兩虛尤當調補況産後脾胃血氣之虛衰更有甚焉者乎今之治産後者亦云元氣因産而虧運行失度不免瘀血停留致成諸疾必以去瘀為先瘀消方可行補甚有用回生丹攻血快下胞衣殞人性命者此蓋只知專攻舊瘀而不知新血轉傷之害豈知塊固當消而新血尤當生也蓋專消則新血不生專生則舊血反滯豫考新産諸方莫若生化湯為産後第一妙方其方芎歸桃仁溫中行血善去舊血驟生新血佐以炙黑乾薑炙草引三味入於肺肝行中有補化中有生故名生化蓋因功用而立名也又有加入益母草一錢五分功效亦同此實治産之良方保全産婦之聖藥也故馮氏因此方之妙變化用於臨産加人參桂牛膝紅花又為催生之神劑矣生化湯方凡孕婦臨月即預備生化湯數劑俟臨産之時即為預先煎就産下隨服二三道以逐瘀生新再無産後諸症之患無論正産半産雖少壯産婦俱宜服之故此湯為産後七日內要藥倘産下之時未及煎服凡産後諸症仍以此湯治之全當歸八錢酒洗川芎四錢乾薑四分炙黑存性桃仁十粒去皮尖打碎炙草五分水二鍾煎七分加酒小半鍾如素日不能飲酒者加六七茶匙稍熱服之其藥渣留並後帖藥渣合而再煎兩貼共三煎在産下一二時辰內未進飲食先相繼煎服能速化舊血而驟長新血不特可免目前暈厥汗崩惡露停滯等患且諸病不生精神百倍矣如胎前素虛之人産後又當再製兩帖煎服以防倦困若産下已服過一二帖而塊痛未除仍當再進幾帖則塊痛無不消矣惡露産後惡露有塊名曰兒枕世多先消後補殊不知舊血雖當消化新血亦宜生養若專攻舊則新亦不寧矣世有濟坤丹攻血塊下胞胎者一時雖見速效元氣未免虧損不得已而用之只可一丸不宜多服且須隨進補劑庶免虛弱之害其或勞甚血崩形脫汗喘不止急進加參生化湯數帖加參生化湯人參二錢川芎二錢當歸四錢薑炭四分桃仁十四粒棗三枚加減法産後七日內未服生化湯塊痛未除仍照前方服數帖或加元胡益母亦可自然塊消痛止不可遽加參耆白朮補住瘀血禍不可言産後一二日內塊痛雖未除其産婦氣血虛脫或崩或厥或汗多而厥或形色脫去口氣漸冷或煩渴不止或氣喘短促無論塊痛從權加參耆以扶危急如體倦無力氣虛短促本方多加人參兼汗加黃耆煩躁加竹茹渴加麥冬五味喘加杏仁桔梗産後大便不通或至八九日者由血少腸燥故也宜生化湯加麻仁三錢蓯蓉五錢以潤之日久自通如虛加人參二錢勿用承氣湯産後七日內或傷寒血塊凝結痛甚生化湯加肉桂五分元胡一錢或食冷物連心腹痛者再加吳萸七分産後肥人多痰宜生化湯加花粉竹瀝薑汁或加橘紅四分勿輕用牛黃及寒冷等味胎前素虛弱者産後一二日已服生化湯三四帖塊痛稍減可按揉而定宜生化湯加人參三錢産後雖暑月亦要和暖如失蓋衣被腹不溫和風邪乘虛而入雖服生化湯恐塊痛不能止宜加肉桂四分五靈脂一錢産後勞倦血暈服生化湯一劑頭煎後即再取一帖加人參一二錢汗多亦加如形不脫去只用鹿角灰二錢本湯送下或益母丸亦可外用細搗韭菜納有嘴瓷瓶內將滾醋兩碗衝入封其大口以小口注産婦鼻中斂其精神即醒産後發熱汗出手足厥冷或血崩氣短神昏氣脫乃大虛症急須大補庶可回生宜加參生化湯速進數劑再以生脈散代茶毋信産室百問及婦人良方等書産後日久不食聞藥即吐須用獨參二三錢或姜少許白米一大撮水煎服以安胃氣如聽其胃虛不能受藥則危矣産後不宜汗下利小便論産後陰血驟下陽無所附孤陽外越每多發熱此乃陰虛生熱切勿作外感而表散生化湯善能退熱以其內有薑草所謂甘溫能除大熱也故産後雖有表證一切風藥性升不可用恐載血上行令人發暈且慮重竭其陽必至汗脫而死即佛手散中川芎辛散能發汗走泄亦須臨時因證審酌用之産後陰血既虧津液自少況臨産勞倦氣虛虛則傳化自遲二腸枯臊勢所必然久則自復或用生化湯養血兼生津助液亦可故産後雖二便暫有不甚通利然於下利等藥必須禁用非特硝黃五苓難於輕試即四物湯中生地芍藥純陰而伐生氣且作瀉而凝血五苓利水傷陰愈通之而愈枯結若誤用而重亡其陰難免孤陽無輔而走脫矣故機要有云胎産之病從厥陰無犯胃氣及上下二焦不可汗不可下不可利小便也新産三審論凡治産後三審不可缺也一審少腹痛與不痛以徵惡露之有無二審大便通與不通以徵津液之盛衰三審乳汁行與不行及飲食多少以徵胃氣之充餒審斯三者以脈參證以證合脈脈證相符有疾治之即愈脈證相反縱無危候必多變端即如産後惡露常以彌月為期然間有六七朝即淨者又未可以概論也此雖産母稟質不同而因胎之所稟亦異如胎息壯盛則氣血盡歸其子瘀血自少胎息孱弱則氣血涵養有餘瘀血必多亦有産時去多産後必少産時去少産後必多勢使然也大抵常産之婦開闔有權産後子宮即閉兒枕隨氣攻注碎作小塊續續而下所以綿延日期又有由於艱産過傷子宮關閘廢弛不能收斂或下血塊大小形色與茄無異此名兒枕是也全塊頓出自無淋瀝之患即有餘血盡歸溲便如皂莢汁少腹略無痛苦切勿認為産後瘀尚未行妄用攻下誤人性命産後又有似乎兒枕痛者摸之亦有塊按之亦微拒手人皆指為兒枕宿血此大不然夫胎胞俱去血亦豈能獨留蓋子宮蓄子既久忽爾相離血海陡虛所以作痛胞門受傷必致壅腫所以亦若有塊而實非正塊腫既未消所以亦頗拒按治此者當安養其臟不久自愈若有瘀服藥生化湯為最殿胞煎或四神散亦可若誤用蘇木紅花元胡青皮之屬反損臟氣必增虛病慎之慎之豫曾見孕婦産後少腹旁邊以手按之內有一條形如小黃瓜斜長而硬頗以瘀積然無痛苦産婦先以為瘀滯後以為癥瘕每愁成病豫開導之云無痛苦不拒按是虛非實血足自消不須疑慮遲數月果漸消沒矣殿胞煎治産後兒枕疼痛等證如神當歸五錢川芎一錢茯苓一錢炙草一錢肉桂五分水一鍾煎八分熱服如脈細而寒或嘔者加乾薑炒黃色一錢如血熱多火者去肉桂加酒炒芍藥一錢如脈弱陰虛者加熟地三錢如氣滯者加制香附一錢腰痛加鹽水炒斷絲杜仲一二錢血塊痛論産後血塊是孕成余血之所積也夫婦人血旺氣衰二七而天癸至三旬一見以象月盈則虧行之有常則曰經有孕則經水不行其餘血注於胞中以護胎元一月名胎胚二月名始膏三月始成形而名胎方受母血之蔭庇胎形尚小雖食母血而尚有餘汁並前兩月之血積於胞中日久成塊至産時當隨兒下或因産婦送兒送胞勞倦無力或調護失宜腹缺溫暖致血塊日久不散疼痛拒按並宜生化湯助血行血外用熱衣暖腹可也慎勿輕服峻劑至崩脫不救暈厥論凡産後暈厥二證皆由氣血並竭苟非急補何能挽其將絶之元神無庸疑議者也但暈在臨盆證急猶甚於厥用藥不及急救法救之如其人微虛者則眼花頭眩或心下滿悶神昏口噤不知人事少頃即蘇或因亡血過多以致虛火乘虛泛上而神不清身無所主其陰血暴亡心神失養心與胞絡君相之火得血則安亡血則危火上熾故令人昏冒火乘肺故瞑目不省人事是陰血暴亡不能鎮撫也經云病氣不足宜補不宜瀉瞑目閣眼病悉屬陰暴去有形之血則火上熾均宜頻灌生化湯或從權急救生化湯二三帖無補血分之虧則塊化血旺神清而暈止大虛者其證面白眼閉口開手冷多汗神昏六脈微細之甚是氣隨血脫而欲絶當大劑人參方可回陽恐勢急而補陰不及須以氣藥兼之此陽生陰長之理也從權急救加參生化湯或加參生化湯最效如製藥不及速用獨參湯兩許煎湯急救之但得下咽即可望生若少遲延則無及矣有人謂産後七日方可用參此愚昧訛傳不知始自何人萬不可信但暈發頃刻而急救外治之法又不可緩速宜輕輕扶坐勿令臥倒或燒紅炭沃之以醋或燒舊漆器令煙氣透入口鼻即蘇急捏人中靜以待之元氣漸復不可亂動致令神氣散亂或用韭菜一握切碎入有嘴瓷瓶內將醋煮滾澆入瓶內急蓋口以瓶嘴向婦鼻孔令氣透入鼻中即蘇但凡大病大虛之人皆能作暈産後之暈因血去而名之曰血暈實非因血而致暈也若偏信古方認暈證為惡血搶心而輕用蘇木牛膝紅花等類以及牡丹奪命等方或認為痰水而用調補消痰之方誤之甚矣俗治産婦或因死胎及胎衣惡血上逆搐嘔昏暈用小便乘熱灌之但得一口下咽即止設遇胃氣壯盛之婦不畏臊氣獲效者有之然童便非能止暈回元蓋取其下行舊路降火消瘀考之方書內云敗血流入肝經眼生黑花頭目昏暈不省人事此血熱乘虛逆上湊心故昏迷不省氣閉欲絶也服童便最好此論但照管敗血全不顧産虛且有氣閉欲絶四字豈童便可挽回元氣欲絶乎即有惡血上逆血滯等證亦莫若生化湯溫而行之去瘀止暈之妙也豫見江南産科有用當歸二錢益母草一錢人參二錢紅花六分炮姜八分煎熱沖童便服之以治暈此方兼得之義庶幾近之如婦人有血暈之證者不若於將産數日前預煎擇服八珍十全歸脾等類調補氣血臨産又用人參催生補於未産未虛之前産後無虛可乘無暈可發矣至於厥證在分娩之後因産時用力過多勞倦傷脾孤臟不能注於四旁故手足逆冷而發厥經云陽氣衰於下則為寒厥厥氣上行滿脈去形蓋逆氣上滿於經絡則神氣浮越去身而散也宜大補回陽生化湯連用兩服俟血氣旺而神復厥證自止矣又非偏補血分之可得而愈也若服藥而口渴另用參麥散以代茶助津以救臟燥也又有四肢逆冷泄痢類傷寒陰證不可用四逆湯必生化湯倍參煎服或加熟附子一片則可以止逆回陽而見參歸之功矣若血塊痛止而厥滋榮益氣湯最效凡暈厥乃産後危急二證若新産塊痛未除又未可遽加耆術故急加人參從權以救之俟暈止厥回再去參以除塊痛此要訣也急救暈法凡兒方生下母即昏暈不醒者此時即有藥不能入口遲則不救其法急以極軟舊衣緊閉産戶以知事婦女用膝抵住勿令下面氣泄又令一人一手挽住頭髮一手捫住鼻口勿令上面氣泄俟稍轉略有聲息方用熱水接氣急服生化湯從權急救生化湯治三等血暈兼化瘀生新川芎三錢當歸六錢或八錢酒洗乾薑四分炙黑桃仁十粒去皮尖炙草五分荊芥穗四分炒黑汗多忌用棗二枚水煎服勞倦甚及血崩或汗多氣脫氣暈加人參三錢肉桂四分急服一二帖其效如神決不可疑參為補而緩之痰火乘虛泛上而暈加橘紅四分虛甚亦加用人參八分肥人加竹瀝數匙薑汁少許從權急救加參生化湯治産後形色脫暈人參三錢川芎二錢當歸四錢酒洗乾薑四分炙黑桃仁十粒去皮尖炙草五分荊芥穗四分炒黑汗多忌用棗二枚水煎服血塊痛甚加肉桂七分渴加去心麥冬一錢五味子十粒汗多加麻黃根一錢如無塊痛加蜜炙黃耆一錢以止汗傷麵食加炒神麯八分炒麥芽五分傷肉食加山楂砂仁各六分加參生化湯附大補回陽生化湯人參二錢川芎四錢當歸八錢酒洗乾薑四分炙黑炙草五分桃仁十粒去皮尖棗二枚水煎服此方産後諸危急證通用一日夜須服三四劑方能接將絶之氣如産後三日內塊痛未除俟元氣稍復已有生意當去參仍服生化原方虛脫厥汗多加人參三四錢脈與形俱脫將絶必用此方頻灌厥而兼汗加去心麥冬一錢汗多渴甚加去心麥冬三錢汗多痰喘加竹瀝薑汁去皮尖杏仁十粒汗多喘嗽聲重加桔梗去皮尖杏仁各五分無汗喘嗽氣短加製半夏一錢去皮尖杏仁十粒桔梗五分汗多身熱氣短加人參左尺脈弱亦加人參汗不止三四劑後加蜜炙黃耆一錢一方川芎當歸減半名大補回陽生化湯治新産厥證棗引速煎二服即效若厥證渴佐以生脈五味飲代茶以救津液則渴減厥回參麥五味飲去五味子名參麥飲又名生脈湯又名生脈散人參二錢一方三錢麥冬二錢去心五味子七粒捶碎煎湯作茶時時飲之煎湯用銀器或砂器為妙滋榮益氣湯治血塊痛止而厥人參當歸各三錢川芎白朮土炒黃耆蜜炙各一錢五分或一錢熟地二錢麥冬八分或一錢去心炙草四分五味子十粒川附子五六分或一錢制水煎服汗多加麻黃根炒棗仁各一錢大便難加酒洗肉蓯蓉一錢半産後血暈凡分娩之後眼花頭旋不知人事謂之血暈其因有三一因勞倦甚而氣竭神昏二因去血多而元氣欲絶三因痰火乘虛泛上而昏憒不清患此三者皆因魂不隨神往來而運幾息也急服加味生化湯二三帖以行塊停痛外用醋韭法沖鼻使産母聞醋氣令精神斂而不散此救血暈之急法也大約病弱産母臨盆之際須早煎生化湯預備韭醋瓶以防患此為萬全及兒下地不可喜子慢母母亦不宜顧子忘倦又不可産訖即臥與夫憤怒氣逆皆能致暈也慎之慎之加味生化湯川芎三錢當歸六錢薑炭四分桃仁十粒炙甘草五分荊芥五分水煎加酒熱服如汗多加人參二錢炙耆一錢然必塊不痛者方用痛甚者加肉桂五分渴加麥冬一錢五味十粒有痰加竹瀝半杯薑汁一匙痰火乘虛泛上而暈加橘紅四分兩手脈伏或左手脈絶加人參四錢麥冬一錢五味二錢三等血暈切不用破血耗氣等藥雖山楂性緩亦不宜服其塊痛者生化湯兼送益母丸及鹿角灰倘氣脫將絶牙關緊閉藥不下喉者用鵝羽筒插喉灌之如灌下漸溫暖則不拘數帖灌之又當用熱手單衣外從心揉至腹上又時換熱衣溫暖之自然漸蘇醒如醒後其塊痛仍未除者宜減去參耆單服生化湯待塊消痛止再進參耆産後厥逆凡産母産時用力過甚勞倦傷脾脾氣耗竭不能注於四旁故足冷而厥氣上行經曰陽氣衰於下則為寒厥厥氣上行滿於經絡則神氣浮越去身而飄散矣此惟急方始可舉氣以歸元苟非大補焉能回陽而神復必用加參生化湯倍人參連進二帖使氣血旺而神復厥止如渴另用生脈散代茶助津以滋臟燥雖有四肢厥冷泄漏或類傷寒陰症亦不可用四逆湯必倍參生化佐為黑姜或加熟附一片以回陽止逆則可已足以行參耆之力矣加參生化湯人參二錢川芎二錢當歸四錢薑炭炙草各四分桃仁十粒加元棗二枚水煎如厥回暫去人參待血塊痛除再加此治新産發厥滋榮益氣復神湯産後發厥無塊痛者服此川芎焦朮炙耆麥冬各一錢人參當歸各三錢熟地二錢炙草四分陳皮四分五味十粒水煎服口渴以生脈散代茶汗多加麻黃根棗仁各一錢塊痛不止加肉桂五分便祕加蓯蓉麻仁各二錢痰加竹瀝薑汁橘紅四分酒一杯手足口氣漸冷加附子五分倍用人參産後血崩産後血大來須看血色之紅紫視形氣之虛實如血色多紫乃當去之敗血留之反作痛勿以崩論若紅而鮮乃是驚傷心而不能生血怒傷肝而不能藏血勞傷脾而不能攝血當以崩治先服生化湯幾帖則行中有補血自生旺矣至若形脫氣促或汗出而不止宜服倍參生化以益氣斯陽生則陰長而血乃生旺非棕灰等止血藥可治也如産已滿月外又宜升舉大補湯治之凡年老積弱人患病均宜服此加參生化湯治産後血崩形脫汗多氣促川芎三錢當歸四錢荊芥四分桃仁十粒人參三錢肉桂五分二帖後去之炙甘草五分棗二枚水煎熱服汗多加黃耆人參各三錢渴加麥冬五味瀉加茯苓蓮子兩手脈伏或右手脈絶生脈散倍人參痰則加竹瀝薑汁酒一杯咳嗽加杏仁知母桔梗各一錢驚悸加棗仁柏仁各二錢久不進食聞藥即吐用獨參二三錢水一杯煎鍋焦末服之引開胃口鮮血來多不止加升麻白芷各五錢如無汁脫等症只服生化湯加炒黑荊芥自安世言芎歸活血不可治崩殊誤升舉大補湯治産後日久血崩不止或如雞卵大塊或去血如片宜大補脾胃升提氣血少加鎮墜心火之藥此方並治老少血崩等症人參白朮各三錢川芎一錢當歸一錢五分熟地二錢黃耆一錢白芷四分荊芥四分陳皮黃連黃柏炒瀉者勿用羌活防風各四分升麻甘草各五分渴加麥冬五味瀉加澤瀉蓮子痰加半夏兼白帶者加蒼朮半夏各一錢産後類傷寒三陰症即大便不通産後類傷寒三陽症産後七日內發熱頭痛惡寒勿專論為太陽症發熱頭痛血疼勿專論為少陽症二症皆由氣血兩虛陰陽不和而類外感切不可用麻黃湯以治太陽類症用柴胡湯以治少陽類症蓋脫血之餘又發汗以重亡其陽是使陰陽兩竭而虛虛之禍不可勝言即或症中真感傷寒加味生化湯內芎姜能散寒且榮衛調和諸病自退加味生化湯川芎當歸各二錢炭姜五分炙草五分桃仁十粒陳皮三分棗二枚水煎溫服連進兩帖如明知感冒風邪二帖不退加羌活四分蔥白四寸嘔加藿香三分生薑一片如汗多氣促如微喘俱加人參二三錢渴用生脈散如乍寒乍熱發有常期加柴胡四分有痰加橘紅花粉産後類中風痙症痙音擎風強病産後氣血暴竭少血養榮忽然口噤牙緊手足筋脈拘攣症類中風又或汗多而類症口噤不開背強而直身忽反張氣息如絶雖虛火上泛有痰皆當以末治之勿用治風消痰之藥以重虛産母但服生化湯以生旺新血自能清利關節所謂血旺風自滅或用滋味活絡湯兼服天麻丸若見危症即多用人參以救血脫如有痰有火少佐麥冬橘紅等味竹瀝薑汁亦宜少加芩連柏斷不宜用滋味活絡湯當歸人參各三錢川芎熟地各二錢黃耆茯神天麻麥冬各一錢陳皮炙甘草各五分荊芥防風羌活各四分火盛産久加炒連三分有痰加夏曲七分痰多加竹瀝薑汁大便閉祕加蓯蓉二錢渴加葛根八分汗多加麻黃根一錢驚悸加棗仁二錢氣息如結手足漸冷加桂子一錢附子五分天麻丸天麻防風石菖蒲各五錢人參茯神棗仁遠志柏仁山藥麥冬各一兩川芎羌活各七分當歸二兩南星夏曲各二錢半上為末蜜丸如芡實大辰砂為衣每服四五丸産後類瘧産後寒熱往來應期而發此由氣血並竭陽虛生外寒陰虛生內熱或晝輕夜重或日晡潮熱一日二三度發其症雖似乎瘧而發無常期只須生化湯倍加當歸則身熱自退即或應期而發症與瘧同亦必以調和氣血為主無用芩連等治熱及常果檳查等截瘧如汗多加參耆熱甚倍加當歸川芎若産及一月其人素虛而患瘧用人參養胃湯並服人參白朮膏加減生化湯川芎一錢當歸二錢人參白朮各一錢茯苓八分青皮二分炙草三分藿香八分烏梅二枚渴加麥冬一錢五味三分痰加半夏八分竹瀝薑汁汗加黃耆棗仁各一錢傷米食加神麯一錢麥芽五分傷肉食加山楂砂仁各五分人參養胃湯人參白朮當歸各二錢茯苓半夏各八分草果甘草青皮藿香各四分烏梅二枚人參白朮膏白朮一斤人參一兩水六碗煎去其半如法再煎如此三次去渣取汁共九碗慢火煎至一碗每日服半酒杯白湯下産後汗出産後汗出不止由勞傷脾驚傷心怒傷肝患此三者不宜即加斂汗之劑但令神寧則汗自止且血塊作痛耆術未可遽加凡産畢有汗先服生化湯兩帖以消塊即繼服調衛止汗湯若倦甚而濈濈然汗出形色俱脫乃亡陽脫也此難拘常法從權以參耆調衛救急待産母稍有精神又減參耆以除塊痛若汗多而陰竭陽微以致筋脈拘急項強口噤牙禁發搐類傷寒痙症者慎勿作傷寒治宜加味生化湯隨症加減汗出雖有自汗盜汗之分治當兼理血分藥品並宜加味出化湯余方但非産後盜汗所宜若服參耆大劑汗多不止及頭面汗出不止腰足青色者不治調衛止汗湯炙耆麻黃根當歸各一錢人參隨症加減防風三分桂枝炙甘草各五分棗三枚水煎汗多而渴加麥冬五味汗多亡津而小便不利勿用利水等藥産母多痰勿用半夏生薑只可用橘紅四分從權參耆調衛湯人參三錢炙耆麻黃根各一錢半當歸二錢桂枝五分汗少減之防風三分元棗二枚水煎禁用半夏生薑柴胡黃芩知柏等味加味生化湯川芎三錢當歸六錢人參三錢如虛倍用天麻八分黃耆錢半炙甘草五分荊芥八分棗三枚水煎渴加麥冬五味脈脫加人參三錢附子四分便祕加麻仁三錢痰加竹瀝薑汁忌蔥韭辛熱食物産後氣短髮喘産後氣短髮喘血脫勞傷過甚氣無倚仗呼吸止息各違其常氣出短促而喘言語不相接續是血脫氣虛之至速煎生化湯一二帖即加人參二三錢以救急再備醋韭瓶以防暈無疑參能助喘不用少用以致不救惟一切降氣等藥禁用若虛不受補聞食即吐胃氣將絶不治之症也加味生化湯川芎一錢當歸三錢薑炭五分桃仁十粒人參三錢茯苓一錢汗多勿用炙甘草五分汗多加黃耆渴加麥冬五味胃虛不食聞藥即吐及食寒藥寒物嘔不納穀用獨參三四錢生薑三片秈米一撮補氣養榮湯川芎二錢當歸四錢炙甘草炮姜各五分人參二錢黃耆一錢熟地棗仁山藥各一錢陳皮三分足冷加附子三分汗多加麻黃根一錢浮小麥一撮渴加麥冬五味便祕加蓯蓉麻仁産後咳嗽産後旬日內外感冒風寒咳嗽鼻塞身重惡寒或兼身熱頭痛宜服加參寧肺湯毋用麻黃以發汗或喘而脅痛毋用小柴胡以散邪或患火嗽有聲痰少而赤亦毋用涼藥以清火惟有調理氣血為主若半月干嗽有聲而痰少者可用加味四物湯治之加參寧肺湯川芎一錢當歸三錢人參二錢杏仁十粒桔梗橘紅各四分款冬一錢桑皮七分半夏八分知母一錢如虛入痰盛加竹油一小盞薑汁三匙炙草四分加味四物湯川芎蔞仁知母訶皮各一錢當歸熟地各二錢桔梗兜鈴各四分款冬六分水煎服薛立齊參蘇飲人參三分蘇木一分水煎此治産的瘀血入肺咳嗽喘急産後譫語産後妄言妄見由氣血兩虛而神魂無所依也輕則睡中呢喃重則不睡妄言又或因痰客於上焦以致十二官各失其職視聽言動皆有虛妄毋認鬼邪治法當論産期新久塊痛有無以為緩急如塊痛者宜服寧神生化湯塊痛已除宜服益榮安神湯安神生化湯川芎二錢當歸四錢茯神棗仁柏仁各一錢桃仁十粒炮薑炙甘草各五分紅棗二枚去皮水煎虛加人參益榮安神湯川芎一錢當歸三錢茯神棗仁柏仁各一錢橘紅甘草各五分人參一錢龍眼肉八個竹油一丸大大棗二枚渴加麥冬五味汗多加參耆麻黃根痰加竹瀝薑汁瀉加茯苓白朮便祕另蓯蓉麻仁産後驚悸怔忡産後憂驚勞倦去血過多心中煩動不寧為之怔忡如惕然而驚心中怯懼若人捕之之狀為之驚悸二症當調和脾胃補養心血使氣寧神足氣舒心安以加減養榮湯其病自愈加減養榮湯川芎八分當歸二錢棗仁茯苓人參麥冬遠志白朮一錢黃耆一錢陳皮炙甘草各五分龍眼肉八個姜三片水煎服虛煩加竹茹痰加竹瀝薑汁此方可加丹參柏仁安神丸黃連生地酒乳九蒸九曬當歸各三錢炙甘草八分作餅為丸如豆大硃砂為衣每服四十丸此與前藥並服産後忿怒産後因忿怒氣逆不舒胸膈滿悶血塊大痛宜生化原方臨時磨木香三分沖服則氣舒怒散而塊自行矣若偏用香砂枳實烏藥之類以散氣行塊則反使元氣耗損而滿悶愈增如怒後即食胃虛傷滯當審所傷何物如傷肉加砂仁山楂傷米食加神麯麥芽傷冷物作痛留滯胸腹加肉桂吳萸以逐寒定痛慎勿用檳榔丸疏氣以消食健脾化氣飲人參白朮當歸各二錢川芎一錢薑炭炙甘草各四分水煎如塊痛未除仍用化生湯磨木香三分産後傷食産後形體勞倦脾氣受傷是以新産不能多食厚味食之胃雖少納脾轉運滯食停痞塞噯酸惡食良以此也治當扶元為主溫補氣血健脾助胃養正兼消審所傷何物佐以消導斯脾氣復而運轉如常滯物行而胃始思谷矣若消導過多必致絶谷難治急以長生活命飲救之加味生化湯川芎一錢當歸二錢山藥一錢炮薑炙甘草各五分完穀不化加煨肉果一個塊痛加桃仁痛止加白朮虛加人參所傷何物治法如前身熱禁用寒冷藥痞滿忌用耗氣藥長生活命飲人參二錢水二鍾煎八分入鍋焦末服之如貧不能服參單用鍋焦研末沖糊服之或以白朮煎湯調服亦可望其開胃産後泄瀉産後泄瀉大率虛弱食積與土虛不能濕而然但惡露未除脾胃又弱難於消燥而用補也治法當先服生化一煎後即加茯苓一錢以利小便俟血生化然後議補議消議燥使無滯澀虛滑之失若産畢即瀉者宜加減生化湯若胎前久瀉産後不止者宜參苓生化湯從權以防虛脫若久瀉不止或脾泄者須服參苓蓮子飲百劑甚至形脫眼花者服丹溪急救方加減生化湯川芎一錢當歸一錢半黑薑炙甘草各五分桃仁十粒茯苓一錢半蓮肉訶子各八分姜一片水煎兩帖瀉不止加人參三錢參苓生化湯川芎一錢當歸二錢土炒薑炭炙甘草各五分茯苓一錢陳皮一錢白朮一錢半人參二錢肉果煨訶子各一錢蓮子八分糯米一撮水煎寒痛瀉加砂仁五分熱泄加炒連三分瀉久加升麻三分瀉水加蒼朮一錢瀉出食肉如敗卵及噫氣加神麯砂仁各八分山楂麥芽冬五分或加豆蔻丁香各一錢渴加麥冬一錢五味六分參朮蓮子飲人參焦術各二錢茯苓一錢當歸一錢五分炒芍八分炙草五分陳皮升麻各三分山藥一錢蓮子十粒姜一片如腹痛加炮姜五分丹溪急救方人參五錢白朮三錢茯苓三錢制附一錢水煎服産後痢症産後七日內外患赤白痢疾後重頻數最為難治欲調氣血而推蕩邪穢又慮産後元虛欲滋榮養氣而大補脾腎又恐補住瘀邪惟生化湯減黑姜而代以茯苓木香則善消惡露兼行痢疾並行而不悖也再服加味香連丸以俟一二日後病勢稍減可保無虞若七日外患褐色後重虛痢則當加補無疑其産母稟厚産期已過二十日可於生化湯加芩連芍藥枳殼及加味香連丸之類承氣等藥斷不可用如産母虛弱雖及月餘行積峻劑切不可用若産後陰虛血痢日久愈甚又當用四物湯加人參矣加減生化湯川芎二錢當歸四錢桃仁十粒茯苓五分陳皮五分木香二分紅痢腹痛加砂仁二分煎八分送香連丸三十粒加味香連丸即香連丸加蓮肉粉一半為丸加連生化湯川芎一錢五分當歸三錢白芍一錢炒川連六分薑汁炒枳殼五分茯苓一錢甘草四分木香三分水煎服積重者加山楂一錢申論瀉痢十方産後瀉痢氣血暴虛必用生化湯加減然致病之由雖系濕熱多由飲食傷脾而起故重申余意另立十方於後一産後瀉黃色乃脾土真氣虛也宜補中益氣湯加木香四分煨肉果一枚炮姜四分二産後久瀉不止元氣下陷大便不禁肛門如脫宜服六君子湯加木香四分煨肉果一枚炮姜四分可加升麻五分三産後傷麵食六君子湯加麥芽傷穀食加君子湯加神麯四産後傷肉食六君子湯加山楂砂仁各五分神麯一錢五産後胃氣虛弱瀉痢完穀不化六君子湯加木香三分肉果一枚六産後瀉痢脾虛四肢浮腫補中益氣湯加皮散或六君子湯加五皮散七産後諸症兼嘔者宜加藿香一錢痰多加半夏八分八産後以前諸症兼小便短澀者加茯苓一錢澤瀉五分燈心十二根九産後泄瀉不止加蓮子十粒石榴皮一錢十産後患赤痢久而不止用人參二錢香連丸二錢同服即愈勿多用木香薑汁之類蓋熱則血愈行也方內可加地榆以上十方須問塊痛已除方可服之産後嘔逆人之胃腑為五穀之海水穀之精上輸肝肺分布五臟化為氣血榮潤百骸産後勞傷脾胃正氣虧折則邪氣易乘入於腸胃則氣逆嘔吐而食不下矣若七日內嘔吐不止全不納穀血塊未除治當消塊佐以溫藥宜服安胃行血湯若痛已除而嘔不止不納穀者宜服加減六味湯及後溫胃和中飲若嘔而氣血不足食物不能如常宜服補中和胃湯安胃止血湯芎藭一錢當歸四錢人參一錢桃仁十粒薑炭炙甘草各五分藿香砂仁各四分姜三片有汗勿用加減六物湯川芎一錢當歸二錢山藥一錢五分人參一錢茯苓一錢藿香五分豆仁薑炭各四分扁豆二錢陳皮三分炙甘草五分姜三片嘔止去豆仁溫中和胃湯人參茯苓各一錢當歸扁豆各二錢陳皮炙甘草藿香丁香各三分姜三片嘔止去丁香受寒加吳萸補中和胃湯人參白朮扁豆當歸各二錢茯苓一錢山藥一錢五分炙甘草陳皮炮姜各四分水煎産後霍亂産後勞傷氣血臟腑虛損不能運化食物及風冷相乘以致陰陽升降不順清濁亂於腸胃冷熱不調邪正相搏上吐下瀉名曰霍亂若塊痛未除宜生化六和湯若塊痛已止宜藿香溫胃散生化六和湯川芎二錢當歸四錢黑薑炙甘草陳皮各四分砂仁六分茯苓一錢姜一片水煎藿香溫胃散當歸白朮各三錢薑炭藿香陳皮各四分厚朴八分人參一錢炙甘草三分姜一片水煎若手足逆冷加附子三分産後膨脹胎前素弱臨産又勞中氣多不足心腹多不舒胃雖納穀脾不健運如産畢即服生化三四帖痛止後隨服加參生化湯助脾健胃自無中滿等症其或中滿膨脹者大率因消食而誤進消導因氣鬱而專於消耗又因多食冷物而停滯惡露又因血虛便祕誤下而愈脹殊不知産後血氣兩虧痛減後宜大補氣血以助中氣不宜過於消耗消耗稍峻胃氣益損滿悶益增氣不升降滋熱助積鬱積之久遂成膨脹治當審何物誤用如誤用耗氣藥宜益氣湯誤用消導藥宜健脾湯誤服攻下藥宜養生化滯湯益氣湯人參白朮當歸各三錢川芎白芍各八分茯苓一錢五分陳皮厚朴各四分蘇根炙甘草各五分腹皮六分木香二分磨蘿蔔子三分木通五分健脾湯人參白朮當歸茯苓白芍神麯各一錢川芎七分陳皮四分炙甘草砂仁各五分腹皮五分傷食加麥芽五分傷冷物腹大痛加吳萸一錢差生化滯湯川芎二錢當歸四錢人參一錢半脹甚者減半白芍茯苓各一錢白朮二錢脹甚倍用桃仁十粒腹皮四分蓯蓉酒洗一錢五分如塊痛即將本湯送三消丸一錢方附後病劇者須服至數十帖産後口渴或兼小便不利凡産後口燥咽乾而渴兼小便不利由血枯而多汗且勞倦傷脾不能為胃行其津液則生化之元氣不運滲泄之令不行是以上無津液流通而有咽乾燥渴之症下則胃腎閉滯而有水道不通之候治當助脾益肺升其血氣則血氣流行陽升陰降自然津生而便利矣若認口渴為火而用芩連知柏以降之便澀為水滯而用五苓等味以通之非徒無益而反害之助脾益肺湯黃耆一錢五分人參麥冬各二錢五味十粒當歸二錢茯苓一錢五分乾葛一錢升麻四分炙甘草五分汗多加棗仁二錢麻黃根一錢渴甚生脈散代茶大便不通加蓯蓉二錢如産母壯盛而熱劇小便不利者暫加知母滑石各一錢産後便數淋症凡産後小便數者由腹內宿有冷氣因虛而發宜桑螵蛸散或以益智仁炒研為末米飲下二錢若淋瀝作痛亦由産母虛弱冷氣客於腹中以茅根湯治之桑螵蛸散螵蛸十二枚人參三兩黃耆三兩鹿茸牡蠣赤石脂各二兩共為末米飲湯空心下白茅根湯白茅根瞿麥茯苓車前人參滑石通草麥冬炙甘草加燈芯數根煎服又內府祕方用陳米淘濃泔澄清熱服之小便即通按治血淋可加懷牛膝産後傷脬小便淋數不止産後傷脬此緣穩婆之故以白芨散治之白芨散白芨鳳凰衣桑螵蛸等分入豬脬內煮爛食之産後水腫産後四肢浮腫皮膚光瑩脾虛不能制水腎虛不能行水故也當大補氣血為主佐以蒼朮白朮茯苓等藥虛加人參木通熱加麥冬條芩若因風冷濕氣傷表無汗而腫宜加姜皮半夏蘇葉及五皮散以微表之使水氣從皮毛而出然後以補劑調理利水益氣湯人參白朮各三錢白芍茯苓各一錢陳皮六分木瓜八分蒼朮厚朴蘇葉木通腹皮各一錢五加皮散加皮腹皮苓皮骨皮姜皮産後熱蒸成勞瘵症産後勞瘵症皆由嗜欲無節起居不時以致真陰耗竭虛火上炎或蒸而熱或往來寒熱似瘧非瘧或咳血咯血自汗盜汗或心神恍惚夢與鬼交或經水閉塞日漸羸瘦皆緣陰虛生熱所致熱鬱積久變成虛怯宜清熱止嗽潤肺瀉火滋補真陰以復其元患此者必須寡欲內養方能有效否則不治保真湯川芎一錢當歸生地白朮各二錢麥冬一錢天冬一錢五分川貝茯苓各五分桔梗八分五味十粒骨皮一錢炙甘草四分棗二枚水煎虛加人參一錢黃耆六分胃弱加茯苓山藥各二錢砂仁三粒加味大造丸生地一錢人參當歸山藥杞子各一兩知母一錢五分石斛酒蒸麥冬各八錢銀胡六錢龜板五錢共為末煉蜜為丸如桐子大早晚服以上兩方但舉其概至辨症施治全在臨時取裁如補中益氣湯六味腎氣丸八珍湯十全大補湯還少丹逍遙散加芎歸此數方俱可治勞瘵因症選用可也産後心腹痛産後心痛即胃脘痛以胃脘在心之下因傷寒氣及冷物故作痛用生化湯佐以散寒消食之品無有不安若腹內痛定然血塊未除只服生化湯佐以益母丸鹿角灰治之則瘀消而痛止若風冷乘虛入腹作痛亦宜加味生化湯以內有肉桂茱萸可以溫散之也若真心痛則指甲青黑或手足冷過腕節朝發夕死無藥可治加味生化湯川芎二錢當歸四錢炮薑炙甘草各五分桃仁十粒痛止去之肉桂八分吳萸七分姜三片水煎傷米食加神麯麥芽各一錢傷肉食加砂仁七分山楂肉五枚産後遍身疼痛及腰小腹痛産後遍身痛由産後百節開張血脈凝滯纍日不散則經脈經絡不舒故腰背不能轉側手足不能動履或兼身熱頭痛若誤認太陽表邪而發散出汗則手足逆冷變成險症矣宜祛痛散治之婦人腎位系胞腰為腎府至産勞傷腎氣損動胞絡或産未平復而風寒乘之二者皆致腰痛宜養榮壯腎湯並加味大造丸若小腹作痛未曾服生化湯問惡露如何若可按揉而稍止者屬虛並宜加味生化湯治之祛痛散當歸二錢人參白朮各一錢黃耆川膝獨活各八分肉桂五分韭白一撮生薑三片水煎養榮壯腎湯當歸二錢防風四分獨活桂心川芎杜仲寄生川斷各八分生薑三片水煎加味生化湯川芎一錢當歸三錢桃仁十粒炮薑炙甘草各四分肉桂五分元胡五分後二味痛止減去若臍下無血塊而仍痛不止者加熟地三錢産後乳疽乳癰産後乳生癰疽初發時寒熱往來如瘧不可作瘧治亦不可全用敗毒消疽等味當大補氣血佐以金銀花等味以散邪毒若膿已出虛弱日甚者宜服十全大補湯栝蔞乳香散栝蔞一個連皮子搗碎當歸淨銀花各三錢白芷一錢青皮五分乳香五分沒藥五分甘草四分公英五錢水煎加酒溫服排膿大補湯人參白朮生地銀花各二錢當歸三錢茯苓一錢川連五分黃耆一錢青皮三分烏梅一枚元棗一枚此方可加白芷八分以能排膿內托也加減十全大補湯人參白朮當歸生地黃耆各二錢茯苓川芎各八分甘草五分遠志一錢銀花三錢水煎瀉加蓮子十四粒肉果一枚渴加麥冬五味久不收口加參末膏藥貼之産後流注産後惡露流注於腎腰關節之處或漫腫或結塊作痛久則腫起肢體倦怠急則用蔥尉法以散外腫內服參歸生化湯以散血滯至已潰未潰其法參之乳癰症中蔥尉法用生蔥一握搗作餅貼患處加厚布三四層以火斗尉之立效此方可治癰疽初起參歸生化湯黃耆川芎各錢半當歸三錢人參二錢肉桂八分甘草五分馬蹄香二錢陰門腫痛臨産用力過多以致陰肉兩旁腫痛手足不能舒伸者用四季蔥入乳香末搗成餅貼腫處良久即愈陰門突出臨産用力逼送陰門突出者四物湯加龍骨少許連進兩服外用如聖膏貼頂少收即拭去乳汁不通産後乳汁不通其故有二一由氣血兩虛乳來稀少一由氣閉血滯壅塞不行蓋婦人多憂思忿怒憂思則氣結而血亦結忿怒則氣逆而血亦逆甚至乳硬管塞脅痛煩熱故古方於通乳藥中多用香附木香青皮者以行氣故也用王不留行者通乳而兼行血也若但由氣血虛弱則不必用行氣藥等味須服豬蹄或乳飲豬蹄湯豬蹄一隻通草五錢煎汁服之鍾乳飲鍾乳粉二錢漏蘆三錢煎汁服一方鯽魚木通煮汁食之消乳産母無子飲乳有乳而欲消者用麥芽二兩炒為末四物湯調服即消又方用神麯二錢為末酒吞日服一次産後諸異症下物如茄産後陰中墜下一物如茄蓋兒袋也名曰茄症由産時用力過多元氣下陷之故治須補中益氣湯以升提之自然漸退補中益氣湯方入胎前子滿條內下物如鉢産後陰中下一物如鉢狀有二歧者子宮也用補中益氣湯去柴胡連進二三大劑一響而收後以四物湯加人參調理按四物湯內有芍藥終須少為妙至七日外另斟酌陰挺下脫産後陰中下精肉一塊如菌或如雞冠約長寸許甚至有滿尺者名陰挺下脫即平常婦人亦有之總因元氣下陷而然治法與茄症相似用補中益氣湯如産後則本方去柴胡以有升麻提脾氣而自愈也産後總三方三消丸治婦人死血食積痰結三等塊痛黃連錢半用吳萸四錢煎湯去渣浸以黃連逾時取起炒乾一半同益智炒透去益智加萊蔔兩半炒川芎桃仁去皮尖黑梔麥皮曲三稜莪朮各五錢醋製山楂香附各一兩共製為末蒸糊為丸俟食遠後煎補中益氣湯送下五十丸或用白朮當歸各三錢陳皮五分煮湯送下烏金散治産後十八症一産難二胞衣不下三死胎不下四眼目昏花五口乾心悶六寒熱如瘧七咳嗽寒熱不定八敗血如肝九敗血入四肢浮腫十失音不語十一血邪顛狂譫語十二心腹痛十三骨節痠痛十四舌乾津枯鼻中出血繞項生瘡十五腰疼如角弓十六小便短縮十七喉如蟬聲十八胸膈氣滿喘逆不食烏金子即黑豆紫葳即凌霄花大薊根小薊根當歸肉桂去皮血餘無病者燒存性蒲黃木香青皮赤芍皂莢不蛀者燒存性蠶蛻紙燒存性棕毛煅各五錢紅花一兩川烏一枚生用五錢辰砂少許血竭少許上除燒灰者另研外共為細末入灰燒藥研勻薑湯或酒下甚至一日三劑濟坤丹即回生至寶丹治同烏金散取效甚速但過於峻非方不得已不宜用也川芎當歸牛膝蒲黃酒拌隔紙炒茯苓桃仁熟地各一兩此須九蒸九曬三稜芍藥羌活橘紅萸肉靈脂各五錢木瓜青皮各五錢良薑四錢香附元胡蒼朮益母各一兩乳香沒藥去油各三錢甘草黃藥子各五錢烏藥去皮一兩五錢麝香三錢上除木香乳沒麝另研入余共為細末聽用又以大黃一斤淨為末蘇木三兩河水五碗煎三碗去渣存汁烏豆三升水六碗煎豆汁三碗去豆紅花三兩炒黃入好酒四碗煮四五沸去花存酒先將大黃末好醋七碗煮乾再下醋五碗煮乾又下醋三碗入豆蘇紅花酒汁共煎為糊樣取起其鍋焦亦剷起為末入前藥和勻同糊搗為丸重五錢五分陰乾每服一丸酒下重者二丸以上三方俱治標之藥若可稍緩仍當以大補為本即萬不得已而用之只可兩丸隨進補劑不然取快一時非無速效禍不旋踵悔無及矣蓐勞骨蒸論産後去血勞傷再加之調養失宜致令骨蒸勞熱若富貴之家雖有美食及藥力以調養必有他事不如意而怒動肝火耗傷其方生之血亦能致飲食減少虛羸體倦況新産之婦原屬血虛所生之血無幾一經傷耗則陰血更虛焉得不成內熱骨蒸也即藜藿之人不特無美食藥力滋生氣血更兼自乳其子則方生之血豈能驟足倘本質瘦弱又焉得而不陰虛內熱以成骨蒸也故治産後虛弱用參歸湯作寒熱白茯苓散虛證雜見成蓐勞者鱉甲湯無疾覺虛十全大補湯又當歸羊肉湯有治産後骨蒸先服清骨散後服保正湯又有加味大造丸亦能治骨蒸勞熱醫通云産後蓐勞疲極筋力憂心勞虛或産後將養失宜致令虛羸喘乏寒熱如瘧百節煩痛頭疼自汗肢體倦怠咳嗽痰逆腹中絞刺當扶正為主六君子加當歸若脾肺氣虛咳嗽口乾異功散加麥冬五味氣虛頭暈補中益氣倍用歸耆肝經血虛肢體作痛四物加參苓朮桂肝腎虛弱自汗盜汗往來寒熱六味丸加五味子脾虛血弱腹痛月經不調歸脾湯倍木香血虛有熱增損柴胡湯骨蒸勞熱咳嗽有經者異功散去朮加山藥丹皮五味阿膠童便熱而無痰乾咳逍遙散用蜜煎薑橘蜜蒸白朮産後虛損不時寒熱或經一二載元神不復月事不轉先與千金當歸芍藥湯後與烏骨雞丸調補大抵此證多因脾胃虛弱飲食減少以致疲憊而成當補脾胃進飲食則諸臟有所倚賴病自愈矣參歸湯沼産後虛弱人參當歸酒浸各二錢豬腎一個糯米蔥白水煎服白茯苓散治産後蓐勞頭目肢體疼痛寒熱如瘧人參當歸熟地川芎白芍炒黃耆蜜炙桂心各五分茯苓一錢豬腎一個薑棗引水煎服鱉甲湯治産後虛證雜見成蓐勞黃耆蜜炙鱉甲各一錢牛膝七分酒蒸人參茯苓當歸白芍炒桑寄生麥冬去心熟地桃仁去皮尖桂心炙草各五分續斷三錢酒製取淨肉豬腎煮汁作水加薑棗引煎服當歸羊肉湯治産後無疾覺虛當歸五兩黃耆四兩蜜炙生薑六兩肥羊肉一斤煮取汁煎藥分四服清骨散治骨蒸勞熱男女皆可用柴胡前胡胡黃連烏梅各八分豬骨髓一段韭白十根水煎成入豬膽汁少許服一方將藥為末豬髓一錢豬膽汁一個韭白同搗為丸緑豆大每服三四十丸開水食後送下保正湯人參茯苓白朮土炒如咳嗽用蜜蒸麥冬去心白芍炒枸杞生地熟地知母炒各一錢黃耆蜜炙川芎地骨皮各八分當歸天冬去心各二錢五味子十粒黃柏炒六分炙草四分棗二枚水煎服亦可作丸服一方天冬只用一錢無麥冬增損柴胡湯治少陽血虛寒熱不止人參川芎芍藥炙草各一錢柴胡製半夏各一錢陳皮八分姜五片大棗四枚水煎服千金當歸芍節約湯治産後煩滿不安人參芍藥炒麥冬去心乾地黃各一錢當歸一錢五分桂心四分粳米一撮生薑三片去核大棗三枚水煎服烏骨雞丸治婦人鬱結不舒蒸熱咳嗽月事不調或久閉不行或倒經血溢於上或産後蓐勞或崩淋不止及帶下赤白血淫諸證兼療男子斫喪太早勞嗽吐紅或虛損者烏骨雞一隻取白絲毛者方可用男用雌女用雄揀嫩長者搦倒泡去毛竹刀剖脅出肫肝去穢留內金並去腸垢仍入腹內熟地四兩如血熱加生地二兩北五味一兩碎上二味入雞腹內用陳酒或酒釀童便各二碗水數碗於砂鍋內旋煮旋添糜爛汁盡棉黃耆三兩去皮蜜酒拌炙於朮三兩飯上蒸九次白茯苓去皮淨歸身酒洗白芍酒炒各二兩上五味預為粗末同雞肉搗爛焙乾骨用酥炙共為細末入下項藥人參三兩虛甚加至六兩川芎一兩童便浸切曬牡丹皮二兩酒浸勿炒上三味各為細末和前藥中另用乾山藥六兩打糊衆手成丸或曬乾勿令餿瓷瓶收貯清晨人參湯或沸湯送下三錢臥時醇酒再服二錢大便實者煉白蜜為丸亦可骨蒸加炙九肋鱉甲三兩銀柴胡地骨皮各一兩五錢經閉加肉桂一兩崩漏下血倍熟地加真阿膠二兩倒經血溢加去心麥冬二兩鬱結痞悶加童便制香附二兩沉香五錢赤白帶下加真川萆薢二兩四制香附二兩蘄艾一兩白淫倍用參耆苓術按烏骨雞丸諸藥皆尋常而無奇處治調經最驗蓋雞屬巽補肝猶妙在烏骨益腎變巽歸坎甲癸同源兼滋衝任也大小便血論産後尿血小腹痛者乃敗血流入膀胱小腹不痛但溺時澀痛者乃內熱也並用小薊湯主之尊生用加味腎氣去桂附加生地發灰治之至於大便便血或因飲食起居失宜或因六淫七情過極至元氣虧損陰絡受傷也四君子加生地升麻歸身白芍發灰治之小薊湯小薊根生地赤芍木通蒲黃淡竹葉甘草稍生各一錢滑石二錢燈心四十九寸水煎服敗血加歸尾紅花各一錢兼內熱加黃芩去心麥冬各一錢月水不通論産後月水不通者不必藥也上為乳汁下為月水若産後去血過多常有月水不通若乳子者半歲一歲之內月經不行此猶常候若半歲左右便行是必少壯血盛之人若産後一二年月經不通無他疾苦亦不必服通經之藥蓋因勞傷榮衛衝任脈虛氣血衰少耳但服健脾胃及滋補氣血之藥自然通行若強通之是猶揠苗者也癰疽論新産半月左右忽發癰腫於四肢胸腹者是敗血不盡流滯經絡或氣血虛弱榮氣不從逆於肉理也如敗血瘀滯者則焮腫赤痛而脈弦洪有力當補血行血之中佐以導瘀疏氣為主如血氣虛弱榮澀衛逆者則平塌散漫而脈虛微無力當大補氣血為主如十全八珍之屬以固本元扶胃氣氣壯血和其毒自解若以毒治而用清涼解毒勢必不膿不潰變成壞症矣乳少無乳並乳汁自出論産婦衝任血旺脾胃氣壯則乳足而濃乃生化之源旺也無他證但少乳是氣血滯用行氣下乳湯若脾胃氣弱飲食少進衝任素虧其人面必黃色則乳少而薄所乳之子亦怯弱而多病務服滋養氣血兼通利之劑宜十全大補湯加紅花五分或四物湯加茯苓花粉甘草王不留行麥冬漏蘆穿山甲通草豬蹄汁煎服如既服通利之藥亦無大效仍然乳少系此婦氣血虧甚津液短少藥亦無益産後乳汁不行身體壯熱頭目昏痛或乳下發熱身痛玉露散主之有産婦氣血旺而壅滯不行者法當疏而通之生化湯加木香青皮白芷花粉穿山甲煎服又有用麥冬栝蔞仁天花粉人參葵子豬胰木通漏蘆豬蹄之類煮食而乳行矣至於血氣虛而燥澀阻滯不行者宜十全八珍之類補其虛而自行全書內有豬蹄湯二方治氣血不足乳汁不行如脾虛飲食少無乳宜香砂四君子湯若乳將至而未得通暢者宜豬蹄羹湧泉散若乎乳汁自出者乃陽明胃氣不固亦宜八珍或十全補之若陽明血熱而溢者宜保陰煎或四君子加梔子若肝經怒火上衝乳脹而溢者宜加減一陰煎若乳多脹滿而溢者不必服藥宜溫帛尉而散之若未産而乳自出謂之乳泣生子多不育若産婦勞役乳汁湧下此陽氣虛而厥也獨參湯為主行氣下乳湯治産婦氣血滯無他證但少乳生地當歸川芎各一錢白朮土炒茯苓各六分制香附陳皮紅花各五分穿山甲三片炒木香二分水酒各半煎服玉露散治乳汁不行身體壯熱頭目暈痛屬虛者人參茯苓當歸白芍炒桔梗各一錢川芎柴胡炙草各六分水煎服準繩及全書俱無柴胡有白芷一錢參苓歸草各五分炒白芍七分桔梗川芎各一錢豬蹄湯治産婦氣血不足乳汁不下用八珍湯料加炙黃耆漏蘆陳皮木通先用豬蹄一副煮汁二碗煎藥服之或加天花粉又方川芎一兩通草二兩甘草一錢穿山甲十四片炒用豬蹄一副洗切入水六碗同藥煎至三碗加蔥薑鹽料取汁飲之助其氣血乳汁自下夏月不可失蓋時用蔥湯洗乳為佳忌生冷食物香砂四君子湯治産婦脾虛食少無乳人參白朮土炒茯苓麥冬去心各八分當歸一錢陳皮制香附砂仁紅花炙草各四分水煎服通草豬蹄羹豬蹄一隻通草一兩水煮去一半飲湯兼服湧泉散即通湧泉散王不留行瞿麥麥冬龍骨煅穿山甲炒各等分上為末每服一錢熱酒調下飲豬蹄羹少許以油木梳在兩乳上梳二三十梳日二服俱如前梳法即通一方無穿山甲用豬蹄汁一碗酒一杯煎服以木梳於乳上照前法梳之加減一陰煎治水虧火勝生地白芍炒麥冬去心各二錢熟地三五錢知母炒地骨皮各一錢炙草五七分水煎服獨參湯治産後乳汁湧下人參隨證多少用之水煎濃湯作茶飲妒乳吹乳乳癰論産後妒乳因無子食乳蓄結作脹或婦人血氣方盛乳房作脹以致腫痛憎寒發熱若不以手捏去乳汁及令人吮通之必致成癰四物湯調炒麥芽五錢煎服立消又婦人乳頭生小淺熱瘡搔之黃汁出亦為妒乳以槲樹皮煎洗或天麻草煎洗至於吹乳之證有內吹外吹上逆下順之異總屬膽胃二經熱毒氣血凝滯內吹者胎熱也外吹者因兒食乳為口氣所吹也俱令乳汁不通壅結腫痛不急治之多成癰腫速服栝蔞散外以南星未溫湯調敷更以手揉散之勢甚者惟連翹金貝煎最炒正宗用橘葉散治內外吹乳醫通云吹乳初起作寒熱即服加味逍遙散加栝蔞霜散之尊生治慣吹乳用清肝解鬱湯又立治吹乳三方分別初起身熱結腫施治至於乳癰一證即吹乳不散久積成癰又云輕為妒乳重為乳癰亦膽胃二腑熱毒氣血壅滯而成勢甚有餘者宜先以連翹金貝煎治之甚妙如初起腫痛肉色焮赤或發寒熱或憎寒頭痛煩渴引飲尚未成癰時於人參敗毒散加味逍遙散神效栝蔞散選擇治之腫自消散若至數日膿成潰竅稠膿湧出膿儘自愈豫治吹乳結乳乳癰等證立消毒飲二方外用槐艾洗法通治乳證效過多人又栝蔞貝母飲亦效並附於各方之後若産婦氣血虛弱患此等而誤用敗毒久不收斂膿清脈大則難治醫通云膿清脈大非大劑開鬱理氣溫補氣血不能收功也栝蔞散治吹乳腫痛栝蔞一個打碎乳香二錢用酒煎服外用南星末用湯調塗連翹金貝煎治陽分癰毒或在臟腑肺肝胸乳之間者此方最佳甚者連用數服無有不愈金銀花土貝母去心蒲公英夏枯草各三錢紅藤七八錢連翹一兩或五七錢去心用好酒二碗煎一碗服服後暖臥片時不能飲者酒水各半煎之火盛煩渴乳腫者加天花粉若陽毒內熱或在頭項之間者水煎亦可橘葉散治婦人有孕胎熱為內吹有兒食乳為外吹至乳結成腫毒寒熱交作甚者嘔惡並治之柴胡陳皮川芎山梔炒青皮石膏煅黃芩炒連翹去心甘草各一錢橘皮二十片水二鍾煎八分食遠服渣煎服清肝解鬱湯治慣吹乳熟地茯苓白芍炒貝母去心梔子炒尊生治吹乳初起一方當歸貝母去心白芷梢各一錢花粉八分制香附栝蔞仁甘草節各六分青皮乳香沒藥各五分穿山甲一錢炒川芎四分水酒煎二服尊生治吹乳身熱二方羌活獨活前胡柴胡枳殼炒桔梗貝母去心白芷青皮當歸穿山甲炒各等分水煎服尊生治吹乳已結腫三方陳皮牛蒡子山梔炒忍冬甘草栝蔞黃芩花粉連翹去心各一錢皂角刺柴胡青皮各五分煎服內熱加石膏人參敗毒散治四時傷寒瘟疫憎寒壯熱風濕頭眩項強身體疼痛嶺南煙瘴之地疫癘時行或卑濕腳氣痿弱等證人參茯苓枳殼炒川芎羌活獨活前胡柴胡桔梗甘草各等分姜三片水一鍾半煎服或為細末沸湯點服神效栝蔞散治乳癰及一切癰疽初起腫痛即消膿成即潰膿出即愈治癰之方甚多獨此方神效瘰癧瘡毒尤效凡一切癰疽餘毒皆宜用之栝蔞一個研爛當歸酒洗生粉草各五錢乳香沒藥各一錢尊生乳沒各二錢五分上用酒煎服良久再服如不能飲以酒水各半煎之如數劑不效宜以補氣血之藥兼服之若肝經血虛結核不消佐以四物柴胡升麻白朮茯苓若肝脾氣血虛弱佐以四君芎歸柴胡升麻若憂鬱傷脾氣血虧損佐以歸脾湯消毒飲專治乳房或乳頂黑暈之內腫毒未破發熱惡寒瘡處或痛或不痛或麻木服之即愈蒲公英紫花地丁各一錢二分當歸酒洗白芍醋炒赤芍丹皮地骨皮天花粉各一錢陳皮八分生草三分燈心五十寸水煎食後服仍以槐艾水不時洗之定痛消毒飲治乳頂傍或乳房吹乳成癰並乳結之證發熱惡寒冷汗自出勢欲破而疼痛難忍服之即出膿痛定蒲公英紫花地丁各一錢二分當歸乳房用身乳頂用尾白芍醋炒赤芍花粉浙貝去心研各一錢皂角刺五分柴胡稍八分或一錢乳頂腫結用之若乳房易白芷牡丹皮廣皮各八分明乳香沒藥各五分生草三分紅棗二枚去核燈心五十寸水三鍾煎八分臨服加無灰酒小半酒杯入藥滾數滾服之不時用槐艾水洗槐艾洗法治産婦乳上結核乳癰槐條艾葉不拘多少連須蔥一條將槐艾用水同煎煮入醋少許頻頻洗之若乳頂旁生瘡膿出洗淨與兒吮之隨以松蘿茶葉末摻上栝蔞貝母飲治乳房結核焮腫栝蔞實土貝母去心甘草節各三錢煎服效已潰加忍冬一兩佳乳岩論婦人乳岩一證原非産後之病但乳岩乳癰皆瘡生乳房治此證者混同施治誤世不小不得不分別論明也其乳癰起於吹乳之一時非同乳岩由氣血氣損於數載始因婦女或不得意於翁姑夫壻或諸事憂慮郁遏致肝脾二臟久鬱而成初起小核結於乳內肉色如故如圍棋子大不痛不癢十數年後方成瘡患爛見肺腑不可治矣故初起之時其人內熱夜熱五心煩熱肢體倦瘦月經不調宜早為治療益氣養榮湯加味逍遙散多服漸散氣虛必大劑人參專心久服其核漸消若服攻堅解毒傷其正氣必致潰敗多有數年不潰者最危潰則不治周季芝云乳癖乳岩結硬未潰以活鯽魚同生山藥搗爛入麝香少許塗塊上覺癢極勿搔動隔衣輕輕揉之七日一塗旋塗漸消若荏苒歲月以致潰腐漸大類岩色赤出水深洞臭穢用歸脾湯等藥可延歲月若誤用攻伐危殆迫矣曾見一婦乳房結核如杯數年諸治不效因血崩後日服人參兩許月餘參盡兩斤乳核霍然此證有月經者尚輕如五六十歲無經者不可輕易看也益氣養榮湯治瘰癧結核流注一切鬱熱毒氣人參白朮土炒茯苓各一錢當歸二錢川芎白芍酒炒各八分熟地二三錢黃耆蜜炙一錢五分桔梗一錢或八分貝母去心一錢二分香附七八分橘皮炙草各五分生薑引水煎服乳懸論附方産後瘀血上攻忽兩乳伸長細小如腸直過小腹痛不可忍名曰乳懸乃危證也速用當歸川芎各一斤水煎濃湯不時溫服再用二斤逐漸燒煙安在病人面前桌子下令病人屈身低頭將口鼻及病乳常吸烟氣如未甚縮再用一抖則瘀血消而乳頭自復矣若更不復舊用萆麻子搗爛貼頂上片時收即洗去前陰諸證論産門不閉如無腫痛或腫既消而不閉者此氣血虛不能收攝以十全大補湯服數劑再用補中益氣湯加五味子治之或以補中益氣湯加製半夏茯苓以健脾使元氣復而諸疾自愈或以硫黃湯外洗又斂宮方治子宮不斂甚效産後陰戶脫下乃元氣不足及陰挺突出腫痛清水淋漓者用八珍湯加炙黃耆防風升麻各五分即收或補中益氣加醋炒白芍一錢五味子十粒或易酒炒白芍一錢肉桂五分補而舉之亦可兼以硫黃散外治之又有尉陰洗陰法録後備用産門腫痛因臟中風冷者當歸湯洗之産後陰挺陰菌諸蟲痛癢蓋因婦人七情鬱火傷損肝脾濕熱下注故有陰中舒出如蛇俗呼陰挺有翻突如餅俗呼陰菌亦有如雞冠如鼠乳亦有生諸蟲腫痛濕癢潰爛出水脹悶脫墜者其內證口乾內熱體熱飲食無味晡熱發熱胸膈不利小腹痞脹赤白帶下小水淋瀝其治法如氣虛十全大補加五味子倍參桂補而斂之初産腫脹痛而熱者宜加味逍遙散或逍遙散加荊芥牡丹皮如産久則與雜證同治法用四物湯加柴胡山梔丹皮膽草濕癢者歸脾湯加山梔柴胡丹皮淋瀝者龍膽瀉肝湯加白朮丹皮潰腐者加味逍遙散腫悶脫墜者補中益氣加山梔丹皮以上諸證均可佐以外治之法如硫黃湯尉陰洗陰諸方選而用之産後子腸不收宜用收腸方收之神應丹收腸甚捷産後陰戶中生小瘡形如痱子名曰慝瘡或痛癢如蟲行狀膿汁淋漓用療蝕方椒湯肉汁金銀散殺蟲硫黃散等方選用硫黃散治産後玉門開而不閉及陰戶突出硫黃三錢吳茱萸菟絲子各二錢蛇床子一錢五分上研勻水一碗煎湯頻洗自收斂宮方治子宮不斂荊芥藿香椿根白皮煎湯熏洗神效硫黃散治産後陽氣虛寒玉門不關硫黃烏賊骨各五錢五味子一錢上為末摻患處日三易尉陰洗陰法治陰腫陰痛陰脫用蛇床子不拘多少炒極熱以絹袋盛或布裹尉患處又法用蛇床子五兩烏梅十四個煎水日洗五六次當歸湯治産後臟中風冷陰腫痛當歸獨活白芷地榆礬石敗醬煎水適寒暖洗陰自愈千金不用敗醬龍膽瀉肝湯治肝經濕熱腋脅滿痛小便赤澀柴胡梢澤瀉各一錢五分車前木通當歸梢龍膽草各八分生地二錢生薑三片水煎食遠熱服更以美膳壓之此本導赤散加柴胡膽草之屬入肝以瀉濕熱治子腸不收方枳殼訶子五倍子白礬共煎湯熏洗若不收再灸頂心會穴數壯即上凡遇子腸不收以鐵鏽水潤腸上用堪輿家真磁石一錢研末酒服腸即收矣千金治蝕方治慝瘡川芎當歸芍藥地榆甘草各等分用水五升煮至二升去渣熱熏溫洗日三夜一即愈椒湯治法治陰中小碎瘡如痱子癢不可擋胡椒二十一粒煎湯洗之自愈肉汁治法治陰戶內瘡用豬十斤水煮取肉汁一半浸瘡冷再燉熱浸之不過三兩次即愈金銀散殺陰戶內瘡蟲蒲黃一升水銀一兩二味研勻細末用以搽瘡即愈此方不可輕用殺蟲硫黃散治疳蟲蝕下部五臟硫黃研為細末取東南桃枝枝五七枝輕打頭使散以綿纏黏末令少厚又載一竹筒先納下部中仍以所捻藥桃枝燒著熏之
