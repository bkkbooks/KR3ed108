body:
  text: 卷二十婦科調經門行經前其症血來如膽水五心作熱腰痛並小腹痛面黃色不思飲食乃氣血虛先退其熱然後調經次月血勝而愈先用黃芩散治之黃芩散方黃芩六分川芎八分當歸白芍蒼朮各一錢甘草三分知母五分花粉五分水煎溫服後用調經丸調經丸方山稜莪朮當歸白芍生地熟地各五錢元胡茯苓各一兩川芎小茴香烏藥大茴香各三錢砂仁五錢香附一兩一錢米糊丸緑豆大小不拘時酒服行經後其症經來如漏水頭昏目暗小腹乍痛兼白帶咽中臭如魚腥噁心吐逆先用理經四物湯後用補內當歸丸理經四物湯當歸二錢川芎八分生地三錢柴胡七分白朮炒元胡醋炒香附各一錢五分白芍酒炒一錢二分黃芩酒炒三稜各一錢水煎臨臥服補內當歸丸當歸續斷白芷阿膠厚朴茯苓蓯蓉蒲黃炒黑萸肉各一兩川芎五錢熟地一兩五錢甘草乾薑各五錢附子二錢蜜丸空心溫酒下七八十粒次月即愈經或前或後論其症因脾土不勝不思飲食由此血衰宜補脾則血旺氣勻自然應期宜服紫金丸紫金丸陳皮五錢良薑莪朮各八錢檳榔砂仁紅花各六錢枳殼烏藥各八錢三稜一兩米糊丸米湯送下八十粒經血虛發熱論其症因婦人性急或行經時房事觸傷脅中結一塊如雞子大在左右兩脅月水不行變成五心煩熱頭痛目暗咳嗽生痰若半年一載不醫肉瘦便泄則難治矣宜先止熱用逍遙散逍遙散當歸白朮白芍川芎柴胡花粉各八分黃芩六分薄荷四分地骨皮石蓮肉各一錢膽草五分水煎空心服止嗽用紫菀湯紫菀湯杏仁去皮尖一錢五分阿膠炒研八分煎好入藥白桑皮蜜炙知母炒川貝去心枳實各一錢五味五分桔梗紫菀蘇子各八分款冬花六分水煎臨臥服經閉發熱論其症因行經時及産後食生冷水果血見水則滯故也初起一二月作寒作熱五心煩躁脾土勝自然經水流通若半年不治變成骨蒸子午面熱肌肉消瘦泄瀉不止急宜治之病倘重甚急用鴉片三釐調甘草湯送下有起死回生之妙宜服逍遙散紫菀湯行經氣血作痛論其症經來一半血未曾盡腹中作痛或變發潮熱或有不熱須破其餘血熱止痛安宜用紅花散紅花散枳殼六分紅花一錢炒牛膝當歸蘇木赤芍三稜莪朮各八分川芎五分水煎空心服經來不止經來不止有半月之久乃血妄行問其婦曾吃椒姜食物過度否是熱症宜用金拘散金拘散續斷阿膠炒地榆當歸白芷各一錢黃芩川芎白芍各八分熟地二錢水煎空心服經來吊陰痛不可忍此症兩條筋從陰吊起至乳上疼痛身上發熱宜用川楝湯兩劑而愈川楝湯川楝子豬苓澤瀉各八分麻黃六分木香三分小茴香大茴香白朮烏藥乳香元胡各一錢檳榔八分姜三片蔥一根水煎對火服發汗即愈經來未盡潮熱氣痛此症經來一半覺口渴小腸痛此因傷食生冷血滯不行有餘血在內不可用補宜用莪朮散熱去經盡痛止莪朮散莪朮三稜紅花牛膝蘇子各一錢水煎空心服經盡作痛此症手足麻痹乃腹中虛冷氣血衰乏用人參四物湯治之人參四物湯人參白芍各一錢當歸兩錢川芎八分姜三片棗三個水煎服即愈經來遍身浮腫此因脾土虛弱不能充變而為腫宜用木香調胃散木香調胃散木香甘草乾薑各三分莪朮木通山楂大腹皮各八分砂仁蒼朮各一錢六分陳皮紅花各五分香附車前各一錢萆薢三分水煎空心服經來泄瀉若經動之時五更泄瀉如兒尿此乃肯虛不必治脾用調中湯進三五劑調中湯人參白朮各八分五味子甘草各三分乾薑五分生薑三片水煎服各方八味逍遙散凡婦人血弱陰虛營衛不和痰涎潮熱肢體羸瘦或由怒氣傷肝血少目暗骨蒸勞熱咳嗽血虛勞倦五心煩熱肢體疼痛頭昏心悸頰赤口燥咽乾便澀發熱盜汗減食嗜臥血熱相搏月水不調臍腹脹痛寒熱如瘧等症均效當歸酒芍焦術去蘆白茯苓去皮柴胡炒梔仁炙草丹皮各一錢煨薑薄荷引水煎服柏子仁丸治經行復止血少神衰或憂思傷心心傷則不能生血血少則肝無所養故經閉柏子仁去油牛膝酒炒卷柏各五錢澤蘭續斷各二兩熟地一兩共研末蜜為丸米湯送下芎歸六君子湯治經水後期其來澀少形體肥盛乃因氣虛而痰滯於經絡用此方服之人參川芎焦白朮茯苓陳皮各一錢當歸製半夏各錢半炙草五分姜引水煎服連附四物湯治經水過期紫黑成塊紫血熱也黑熱甚也過期而成塊氣滯也或風冷乘之若淡白者虛也如豆汁如屋漏水混濁者濕痰也此方皆可用之川芎一錢黃連五分當歸白芍制香附熟地各二錢水煎服烏梅丸治經來嘔吐痰膈拄住米穀不能下胃先用烏梅丸次用九仙奪命散木香雄黃各五錢草果一個乳香沒藥各一錢共研末用烏梅肉搗為丸如彈子大每早含化一丸化痰涎後再用九仙奪命散豆蔻厚朴茯苓枳殼木香山楂陳皮蒼朮各一錢草果一個共研末薑湯調服茯苓湯治經來咳嗽咽中出血乃肺金枯燥先用茯苓湯退其嗽茯苓川芎蘇葉前胡製半夏桔梗枳實陳皮乾薑桑皮各六分人參五分甘草三分姜引水煎空心服後再用雞蘇丸除其根蘿蔔子九錢貝母四兩共研末蜜為丸每早空心白湯送下五十丸固經丸治血熱崩漏經行不止及紫黑成塊用之炙龜板四兩酒芍酒炒黃柏酒黃芩各三兩香附子童便對酒製炒樗皮各一兩五錢共研末酒糊為丸酒送下加減補中益氣湯治崩漏身熱自汗氣短倦怠懶食由勞傷所致人參焦術各一錢黃耆二錢當歸酒芍各一錢五分柴胡升麻各七分陳皮黑梔仁各八分炙草五分薑棗引水煎服正氣天香散治氣滯經阻氣上湊心心胸攻築脅肋刺痛月水不調制香附八錢烏藥陳皮蘇葉各一錢乾薑五分共研開水調服抑氣散治氣勝於血變生諸症頭暈膈滿制香附四兩陳皮二兩茯神一兩炙草五錢共研細末每日三錢用水煎服龍骨散治經來臭如夏月之腐乃血弱身衰新舊血不接則臭譬如溝渠枯涸天久無雨則臭龍骨螵蛸牡蠣生地各一兩當歸川芎酒芍白茯苓各八錢黃芩六錢共研末蜜為丸如桐子大每早酒送下一百丸再服湯藥方當歸三稜莪朮赤芍丹皮焦木制香附黃芩陳皮木通各八分姜引水煎服十灰散治血崩初起綿絹各一團阿膠五錢側柏葉白茅根棕櫚艾百草霜苧麻根頭髮各一錢各燒灰存性研細末另用丹皮茜根大薊小薊各一錢同藕煎湯調十灰散沖服若小腹痛用加味四物湯當歸川芎烏藥元胡索各一錢白芍小茴各八分熟地二錢薑棗引水煎空心服若久崩者乃虛也用雞子湯取雞肚內蛋一副抱小雞未出殼的蛋三個蔥三根姜一兩共搗爛用麻油炒焦沖酒去渣取酒服種子門種子丹治男子陽事不舉不能堅久精薄無子並治婦人下元虛弱不能受孕服此丹自能受孕又能安胎生地酒洗擇頂大枝頭熟地擇頂大枝頭者用無灰酒丸蒸九曬天冬去心麥冬去心各三兩黃柏十二兩勻分作四分酒浸一分人乳浸一分童便浸一分鹽水浸一分各浸一宿俱炒褐色鹿茸一對重五六兩者以上藥味俱忌鐵器為末煉蜜丸桐子大空心鹽湯或酒送服八十丸鹿茸須擇形如茄子色如瑪瑙者看紫潤圓滿者為上破之如朽木者良毛瘦枯皺尖長生歧者為下太嫩者血氣未足無力酥塗灼去毛微炙用不塗酥則傷茸但不可炙焦有傷氣血之性亦有用酒炙者炙後去頂骨用茸鹿茸不可嗅嗅之有蟲恐入鼻顙鹿茸麋茸罕能辨別大抵其質粗壯腦骨堅厚毛蒼黧而雜白毛者為麋茸其形差瘦腦骨差薄毛黃澤而無白者為鹿茸鹿茸補腎脈之正陽麋茸補腎脈陰中之陽不可不辨種子奇方此藥艱於子者服至百日後擇婦人單歲雙月雙歲單月及經後陽日子時與婦人交即能受孕兼胎固子壽且久服鬚髮不白顏色如童當歸分作四分以童便乳汁酒醋各浸一分浸一宿各曬乾用魚膠各一斤生地如當歸製法枸杞沙苑蒺藜茯苓各八兩人參四兩上末煉蜜為丸桐子大每服八九十丸空心煮酒吞之坎離丸烏須黑髮壯筋骨大有補益精壯則婦人感而受孕其子必壽黑豆不拘多少用桑椹汁浸透蒸熟再浸再蒸共五遍上為末另用紅棗量足配豆末成丸之數蒸熟去皮核搗如泥和黑豆末為丸或印成餅隨便食延嗣酒大有補益早晚男婦各隨量飲三五杯婦人經不對者自正經正者即受胎矣生地酒洗熟地九蒸九曬天冬去心麥冬去心各四兩仙靈脾八兩飯上蒸當歸二兩酒洗枸杞一兩酒浸俱切碎絹袋盛入大壇酒內重湯煮自卯至酉為度埋土內七日取起用補益大豆方此方祕傳固精補腎健脾降火烏須黑髮延年服之既久與婦人交感有孕其胎自固而子多壽大黑豆三升何首烏四兩選大而赤者茯苓三兩青鹽八錢甘草一兩銼為片先晚以瓷鉢一個盛豆入水八碗用絹包藥置內次日以砂鍋內煮候水乾為度去藥不用取豆略曬用瓷瓶收貯每早晚白滾湯不時服山精壽子丸此丸能延己壽而生子又壽無論有病者宜服即無病者服之猶妙凡壯年之男種玉無成幼歲之婦從不受孕或受胎而中懷墮落或得正産而又生女匪男或生而不育或育而夭殤即苟延性命難免多疾病者此皆由正陽不足之故均宜服此丸山藥二兩五錢用心結實者有蛀者勿用脾虛易泄瀉者可加多用黃精五兩二錢取正者另杵膏待用若九蒸九曬乾杵末用更好黑棗七兩五錢擇肥大者去皮核及腐爛者另杵膏待用懷牛膝一兩五錢去蘆淨酒拌蒸或襯何首烏蒸曬乾用或竟以牛膝易石斛亦可然須加倍用石斛生六安山中形如蚱蜢髀味甘體黏方真如孕婦忌用牛膝竟以石斛三兩代之大何首烏二兩五錢或三兩亦可用黑豆湯浸軟木棒打碎置瓦器中底注黑豆湯務以豆湯拌濕蒸一炷線香時候冷取曬俟水乾又拌蒸如是九次夏月一日三四回蒸曬可也曬極干稱准川杜仲二兩炒研取淨末稱准川續斷二兩酒潤剝淨肉銼曬乾大熟地四兩煮熟者氣味皆失不堪用必須九蒸九曬為妙陰虛之人可用六兩草覆盆子三兩五錢俗名拍盤果又名麥泡果蔓生藤葉有刺葉面青背白有齒尖開紫花結子聚成覆盆樣子端有芒先緑後黃老熟時紅紫味甘酸可生食四五月熟取七八分熟者去蒂以酒抖焙乾研末用陽萎者多用有一種木覆盆乃樹上結者只解酒毒不補陽勿用又有一種蓬縈名稻黃莓其莖粗高結子大八九月熟色紫黑感秋陰所成者亦補陰虛陽虛不可用也又有一種蛇莓系蔓生草藤葉無刺而白毛結子紅三四月熟味淡除解胃熱外余不堪用沙苑蒺藜二兩五錢其形如豬腰子半截米大嗅味似緑豆炒用如肝虛滑精者多用川巴戟天二兩酒浸去骨蒸熟曬乾用相火不足者多加用肉蓯蓉二兩酒洗去泥甲但不可過洗盡滑膩恐傷去肉隔紙烘乾再稱准分兩遠志二兩甘草湯浸去骨仍以甘草湯拌炒乾用取淨肉稱准菟絲子四兩擇色黑而大者去淨以布袋盛之洗至水清以瓦器蒸開肚皮杵爛做餅曬乾稱用白茯苓二兩選結白者出六英山中或云南者佳各處市買切片多有連膜者非為末水漂其膜不能去然過水力已減矣或用雲南整塊茯苓自去膜用不令見水蓋不切為片則膜易去山萸肉二兩去核取淨肉稱准酒蒸杵爛曬乾精滑者多用經行多或淋瀝不斷者多用肝氣抑結者少用遼五味子二兩肝氣抑結肺有熱者少用甘州枸杞五兩去梗蒂淨上藥共十八味除精棗二膏余皆共為細末徐徐上於精棗膏內杵和極勻加煉蜜為丸小豆大每早空心百沸淡鹽湯順下三四錢久服愈好高益謙曰補陽而專事參附耆硫輩聚補其火不惟壯火食氣難免陽長陰消陰不敵陽而能壽能子又難此方藥性不寒不熱類多平和補陽不致陰消久服長年無疾效過多人筆難罄書婦科胎前門胎前保護法一婦人懷胎全賴血以養之氣以護之宜時常行動不可過於安逸使其氣血周流胞胎活動自然無病倘若久坐久臥血凝氣滯致多難産常見田家勞苦之婦其産必易此明證也一宜少食煎炙厚味以及牛羊驢犬蟹鱉諸毒野獸並薑椒辛辣熱毒發物惟紅莧菜馬齒莧最能墮胎切不可食常見糟糠之婦胎前既無胎動不安之虞而臨産從不見有難産之患此明效也一宜禁止淫欲懷孕兩月即宜分床不共夫寢所以保養胎氣不獨臨産快利生子無胎毒不生瘡癤且多聰明壽考而善墮胎者更宜戒之試看牛馬犬豕一受孕後絶不交合從無墮落難産之患人畜不同理則一也一宜戒暴怒口不可出惡言手不可用鞭撻惱怒最傷氣血不能養胎以致易於小産且怒氣入胎生子必多痼疾是以妊娠總宜心性平和可保胎安無病而生子亦多溫厚一宜少服藥餌妊婦無病不必服藥恐不免顧此失彼之弊即或胎動必須按照古方平穩之藥斟酌加減服之切不可誤聽無知婦女妄用方藥若亂投安胎破氣開膈之劑為害不小一忌酒醉無論藥酒燒酒妊娠所當禁戒酒醉心神昏亂以致胎動不安一忌負重登高負重則氣血凝登高則氣搖血動傷胎最易不僅有慮傾跌之患也一忌洗浴凡妊娠將近臨月不可洗頭不可浴身不可濯足最宜嚴戒關係非小可也胎前總論凡孕婦脾胃健旺氣血充足則胎安産順曷嘗用藥調理惟稟不足而氣血衰脾胃弱而勞役過致諸症百出不得不資藥力矣昔丹溪先生定補母安胎之方以補氣血為主以順氣清涼為佐參朮黃芩為安胎之聖藥芎歸熟地為補血之良劑加以蘇陳等味定為常服主方至胎成六月茯苓性降不宜多用黃耆肥胎不可常加香附雖快氣疏肝過則耗氣無補砂仁能止嘔定痛多亦動血行胎此誠先賢之法戒後學之準繩也而猶以為未備因分析胎前諸症擬成數十餘方以便臨期酌用胎前症治惡阻凡妊婦一二月惡阻嘔逆煩悶嗜臥即俗所謂病兒也此由婦人本原虛弱平時喜怒不節寒暑不調中脘宿有停痰積飲受孕經閉飲食相搏氣不宣通以致心下煩悶頭眩眼花四肢倦怠聞食即吐喜酸嗜鮮多臥少起甚至嘔逆不食法當順氣理血豁痰導水而諸症自除以加味參橘飲治之加味參橘飲人參一錢白朮二錢砂仁三分厚朴一錢橘紅四分當歸一錢香附五分甘草三分姜三片竹茹一丸若無力服參去之亦可一方加夏曲八分半夏茯苓湯治妊娠脾胃虛弱飲食不化嘔吐不止半夏薑汁炒黃陳皮砂仁各一錢茯苓二錢炙草五分用薑棗烏梅引水煎服一二劑苦柚單方治妊娠惡阻嘔吐不食頭暈不敢行步苦柚皮不拘多少煎濃湯飲數杯即愈吐甚加兌生薑汁胎動不安各方凡妊娠二三月胎動不安者蓋因子宮久虛氣血兩弱不能攝元養胎致令不安欲墮急服安胎飲以保之若先經墮過者可先服大造丸繼服杜仲丸庶無半産之患也湯氏云半産多在三五七個月如前次在幾個月墮者後必如期復然故當追算前在三個月墮者須於未墮半月前先服清熱養氣固胎遠之藥數貼以補其虛五月七月墮者亦俱於未墮半月前預先服藥方保平安此據孕後夾熱者而言蓋三五七系陽月緣火能銷鑠故也安胎飲人參一錢虛者倍用當歸二錢熟地三錢條芩一錢川芎七分白朮二錢陳皮四分紫蘇四分甘草四分元棗二枚如虛肥人陳皮去白加川連五分脾胃溏瀉加蓮子十粒砂仁五分川連炒五分去熟地黃芩怒而多瀉加木香三分渴加麥冬二錢怔忡驚悸加棗仁二錢益智仁一錢龍眼肉十個大造丸杞子一兩人參一兩五錢當歸二兩麥冬一兩三錢天冬一兩益智仁一兩茯苓二兩五味五錢熟地姜炒二兩川膝五錢山藥八錢菟絲子鹽水炒四兩川柏鹽水炒共為末蜜煉丸如桐子大白湯送下五十丸杜仲丸見前卷九婦科胎前門安胎萬全飲如脾胃氣弱不能管束其胎血弱不能滋養其胎不以日月多少而常墮者此湯主之更兼服杜仲丸胡連丸佳人參白朮土炒當歸身酒洗生地條芩微炒陳皮白芍酒炒各一錢砂仁帶殼捶碎炙草各五分姜三片棗二枚水煎服故連丸安胎聖藥與杜仲丸同日服條芩四兩沉水者白朮土炒蓮肉去心各二兩砂仁微炒炙草各一兩共為末山藥五兩作糊為丸如緑豆大米飲下五十丸黑白安胎散治胎動不安白朮土炒懷熟地黃九蒸九曬各一兩水煎服此方妙在用白朮以利腰臍熟地以固根本藥品少而用專所以取效神也白朮用五錢亦可加味四物湯治因房事過度觸動胎氣不安者歸身酒洗熟地阿膠蛤粉炒珠各一錢砂仁炒炙草各五分竹茹一團水煎調男子褲襠布燒灰一錢服更禁房事四物湯治七情觸動胎氣不安者以四物為主按證加入各藥生地酒浸歸身酒洗白芍藥酒炒各一錢川芎八分此四物湯本方薑棗引水煎食前溫服如因怒傷肝者加炒黃芩一錢五分人參柴胡甘草各一錢因憂悲傷肺者加炒黃芩炒阿膠蘇葉各一錢五味子十五粒炙草五分因恐傷腎者加制續斷炒黃柏炒杜仲各一錢五味子十五粒炙草五分改生地為熟地因思虛積久不解傷脾者加土炒白朮一錢五分人參陳皮制香附各一錢炙草五分因喜樂大過傷心者加條芩黃連土炒白朮去心麥冬各一錢炙草五分因跌僕觸動者安胎飲主之歸身炒白芍各一錢土炒白朮黃芩蘇葉各一錢五分炙草砂仁各五分芩術安胎飲妊娠安胎主方加減法開後白朮米泔水浸一宿去蘆切片曬乾黃土炒香如脾脈虛弱細軟緩大無力外證飲食少進噁心嘔吐泄瀉等證用一錢五分或兩錢若氣體強壯或氣鬱壅滯胸腹臌悶脹滿作痛或素有奔豚積聚上攻者忌用條芩如脈洪盛有力素多內熱用一錢五分或兩錢如氣體虛寒脾肺脈弱嘔噦泄瀉者忌用當歸身酒洗一錢五分或二錢如嗽有痰喘嘔噦泄瀉者忌用如止有泄瀉而無別證以黃土炒用帶殼砂仁微炒五分或七分內熱者三四分生知母一錢素多內熱者或用一錢五分或二錢如氣體虛寒嘔噦泄瀉者忌用炙甘草三分或四分以上各稱准水煎食遠服如脈弱虛細或緩大無力飲食減少口不知味溏薄泄瀉加人參一錢或一錢五分炒白朮一錢或一錢五分或二錢白茯苓一錢廣皮七八分炒條芩一錢去知母如血虛內熱肝腎脈洪數無力腰疼腿膝痠軟無力者加熟地三五錢或七八錢生地二三錢酒洗芍藥一錢或一錢五分炒杜仲酒洗當歸一錢或一錢五分炒續斷一錢如肝腎脈虛細濡弱腰疼腿膝麻木冷痛加熟地三五錢或七八錢川芎八分制續斷肉一錢鹽水炒杜仲一錢五分酒洗歸身一錢五分或兩錢去知母如胸腹脹悶如麩炒枳殼七分制大腹皮八分醋製香附米七分如素多鬱怒加蘇梗八分或一錢醋製香附米八分或一錢小柴胡七八分酒洗撫芎七分如嘔噦加藿香八分或一錢竹茹六七分制透半夏八分陳皮八分帶殼砂仁四五分煨姜三片去知母胃寒嘔噦去條芩知母竹茹加制去黃水吳茱萸三分如虛煩加去心麥冬一錢竹茹七分如咳嗽加麥冬一錢蜜炙桑白皮八分或一錢去皮尖杏仁八分前胡一錢麩炒枳殼八分如小便淋瀝不通加車前子一錢赤芩一錢木通七分甚者加滑石錢半如胎動下血倍加生知母安胎萬全神應散治妊婦三月前後或因惱怒或行走失足跌損傷胎腹痛腰脹一服即安雖然見血一二日未離宮者再服無有不愈倘或先因三四五月內曾經小産過者將及前月份又覺腰骨酸脹急速服下一劑即安真萬全祕方經驗多人當歸酒洗白朮土炒條芩酒炒各一錢熟地八分薑汁再浸酒芍杜仲鹽水炒阿膠蛤粉炒成珠茯苓蜜炙黃耆各七分川芎六分砂仁五分連殼研碎炙草三分酒水各一碗煎湯空心服如胸前作脹加紫蘇陳皮各六分或白帶或紅多加蒲黃炒地榆各一錢艾葉七分如見紅加制續斷一錢糯米一百粒鳳衣散治三五七月小産用頭生雞子抱出小雞之蛋殼陰陽瓦焙黃研細末如前次小産在何月份至時預先用無灰酒沖服可免小産苧根湯治妊婦受胎數月後胎動漏胎及子懸症野苧麻根孕一月者用一寸加金銀器煎湯服之立安膠艾安胎散治妊婦頓撲跌挫胎動下血不止人參條芩阿膠蛤粉炒成珠各一錢土炒白朮錢半當歸酒洗熟地各二錢川芎艾葉各八分陳皮紫蘇炙草各四分薑棗引水煎服止漏絶神丹治胎漏下血安胎更妙土炒白朮五錢熟地一兩三七根末三錢水煎服此方妙在三七根末乃止血神品故用之極效阿膠散治妊婦或因傾撲或因毒藥動胎不安腰腹疼痛或有所下阿膠蛤粉炒成珠艾葉炒歸身酒洗川芎白芍熟地蜜耆炙草薑棗引水煎空心服白扁豆散治孕婦誤服諸般毒藥毒物及用毒藥攻胎藥毒衝心其症牙關緊閉口不能言兩手強直握拳頭低自汗身微熱外症與中風相似但其脈浮而軟十死一生醫多不識若誤作中風治必死無疑用白扁豆三兩去皮生研為細末以新汲水調下即效或米飲調服或煎湯服亦可三物解毒湯治誤服毒藥動胎生甘草黑豆淡竹葉各等分用水煎濃汁服之胎動腹痛各方凡妊娠胎腹動痛者其症不一或因飲食冷熱動風毒物或因交感搖動骨節傷犯胞胎其症多嘔而氣不調或服藥太過血氣相感而急痛宜服順氣補血之藥如加味安胎飲或如聖散加味安胎飲砂仁炒麥冬各一錢人參當歸熟地各二錢條芩一錢陳皮紫蘇各四分甘草三分白朮一錢五分生用大棗二枚姜三片水煎服此即安胎飲去川芎加砂仁麥冬凡妊娠元氣不足精神倦怠以致胎動不安或身微熱者並宜服之必一日兩服方可平安如聖散鯉魚皮阿膠當歸川斷各一錢熟地三錢白芍一錢川芎一錢甘草六分加苧根少許生薑五片水煎空心服胎漏下血凡妊娠胎漏經血妄行此實胎息未實或因勞役過度傷動胞胎或因房室驚觸致令子宮虛滑經血淋漓若不急治日漸胎干子母不保急服寄生散或參歸飲或阿膠濟陰湯寄生散寄生川斷阿膠香附黑人參白朮川芎各等分加姜五片水煎服參歸飲人參當歸寄生生地熟地條芩香附茯苓阿膠各一錢川芎五分甘草五分白芍二分黃耆一錢半黃楊葉三片生薑二片水煎甚者日進一劑阿膠濟陰湯阿膠白朮各一錢地黃白芍當歸川芎各一錢砂仁帶殼五分條芩蘄艾各錢半香附八分炙草五分糯米一撮水二湯碗煎至一碗溫服如下血塊加地榆腰痛加杜仲觸患胞胎加金銀花一日一夜三服以防敗血攻心漏胎凡受孕之後經血不時點滴謂之漏胎大率以勞傷氣血虛弱之故或因惱怒或炙爆熱物所致宜補中安胎飲補中安胎飲條芩白朮人參各三錢熟地三錢當歸錢半白芍一錢甘草五分蘇梗八分跌撲動胎凡妊娠跌撲動胎下血不止急服安胎參蘇飲安胎參蘇飲人參蘄艾川芎各三分當歸一錢條芩白朮生用各二錢陳皮紫蘇生甘草各四分阿膠一錢有外感者加蔥白四寸腹痛減蘄艾加砂仁四分小便帶血凡妊娠小便中帶血此緣形體勞發或過食爆炙之物所致宜清膀胱之火服加味逍遙散加味逍遙散當歸白朮各二錢柴胡白芍各一錢丹皮茯苓梔子各七分生甘草八分加燈芯七莖子淋凡妊娠小便淋漓或小便短澀此由調攝失宜酒色過度傷損榮衛致令子宮虛弱而然又或下焦有熱而閉塞名曰子淋宜安榮散安榮散當歸二錢滑石一錢通草一錢人參三錢麥冬三錢茯苓皮一錢生甘草燈芯各五分水煎服下一方除燈芯用燈芯湯下又方用桑螵蛸為末每服二錢空心米湯下又方用陳米淘濃泔燉服之此方並可治男癃閉按此症由飲食無忌熱積膀胱者居多湯氏用古芎歸湯