body:
  text: 卷二十一痘症慈航李洞書識歲乙丑季秋檢閱所刻驗方新編校正訛字本邑少海陳君齎以痘症慈航一卷余以為新編小兒科論治痘詳矣似不必贅旋為翻閱其書著自明季歐陽公調律先生經郭崑山先生刪潤成集所論辯症用方理悉與新編相合第自發熱以至齊苗灌漿收結現何症候從形色聲氣脈息之間辨其順逆審其寒熱虛實何症宜用何方即以方藥附後一覽朗然雖不知醫者亦可按卷辯症對症用方誠倉卒時救急之慈航也因附錄補遺卷內以為廣渡眾生之一助云同治四年乙丑歲仲冬月資陽李洞書識折諸家之衷治痘之家多矣劉河間悉用寒涼偏害非小至於錢仲陽立方亦以解毒為主而多用寒涼少用溫補張潔古王海藏咸宗之此其意俱本於內經諸瘍瘡皆屬心火之一言故以寒涼瀉心火也厥後陳文中立方力矯其偏專主溫補凡痘已出未出之間悉用十二味異功散其意歸重於太陰之一經蓋以手太陰肺主皮毛足太陰脾主肌肉肺經惡寒脾土惡濕故用丁香官桂以治肺之寒朮附半夏以治脾之濕此方用之得當其效固大然不分寒熱虛實而一概用之則宜於虛寒不宜於實熱其偏害又可知也朱丹溪解之是矣至丹溪立論矯陳氏之偏而取錢氏之長主於解毒和中安表以為的當舉世用之數百年無有議其失者余則以治他症丹溪多妙論至於治痘則孟浪而未盡其妙倘亦千慮一失乎蓋其矯偏於陳氏而不敢輕用木香桂附等藥似乎因噎而廢食其取長於錢氏而必用芩連牛子之類以監製參耆朮附補劑似乎任將而中制因兵而外監也其失亦泥於內經諸瘍屬心火之一言而未透其理也不知痘疹雖屬心火卻與諸瘍不同諸瘡之毒當其初發而未成形可用藥解散而愈及至已形而未成膿又可用藥逐散而愈痘毒發自五臟必借血氣送出於皮膚運化之而成膿收結之而成痂而後收全功也可解散而愈乎可未膿而愈乎故諸瘡以解毒為主能解毒於早則輕不能解毒於早則重痘毒以血氣為主氣血能送毒以灌膿結痂則生氣血不能送毒以灌膿結痂則死解毒之藥多損胃氣不顧血氣之虧損而急於解毒是猶不慮我兵之強弱而急於殺敵也蓋毒有必解者又有不可解者若小兒稟賦壯實胃氣好飲食如常者其血氣自旺自能送毒氣以成功其痘自始至終多順症此不必解毒也若其稟賦素弱脾胃又弱出痘之時飲食又少或渴或瀉或腹脹或手足冷或氣短促或失聲或痘出不快或根窠不紅活或色白而頂陷或當灌膿而不灌膿當結痂而不結痂皆由血氣不能送毒氣此不可解毒者也當速用溫補以扶胃氣而助血氣若用參耆歸術等而力不及即加入木香丁香桂附佐之亦不為過又何可參入牛子芩連等涼品以監製溫補之力而損氣血乎所以丹溪未盡其妙者也丹溪又教人用犀角地黃湯以解痘毒後人沿其說失其初意因習而用之以為奇妙而不知其害蓋心者血為主心之所以能主血者以其屬火也痘屬心火正借心火以運用一身之氣血而成功豈其可瀉而去乎蓋人身之血溫則流行寒則凝滯犀角地黃湯涼心經而瀉心火心經既涼心火既瀉則一身之血俱凝滯不行何以運化毒氣成膿結痂乎故內攻之患作而竟以告斃者瀉心火之藥實殺之而人不知也醫者亦竟不悟也可慨也夫余謂痘已出之後未結痂之前凡一切涼心之藥如犀角地黃之類姑禁絕不用待痘結痂後用之解餘毒可也或曰若然則未收結之前毒俱不可解乎曰奚為不可若其血氣與毒氣俱盛者脈必洪數或初出即帶紫黑或既出而稠密紅紫內則煩悶燥渴小便赤澀大便秘結此則屬實熱宜速用清涼之劑以解毒如大便久秘者量入酒炒大黃微利之可也若其毒氣雖盛而血氣未旺者則以解毒為主而兼活血養氣參耆歸芍之類亦未可離也臨症時須細心審之近世痘方多宗黃西邱其書自始至終俱分順逆險而立說其謂順者不必服藥謂險者宜以保元湯調治猶近理也至謂逆者俱不可治治之徒勞無功是教人袖手待斃也其言不仁之甚此為俗醫圖利計則甚便而於救濟生成之術則甚乖也蓋醫者仁術聖人以之贊助造化之所不及所貴扶危救困起死回生耳若治其易治而棄其難治何以醫為惟俗醫意在圖利又恐壞名見有不順者輒諉棄之彼誠恐利未必得而徒冒不識症之名若是仁人君子當為死裡求生豈忍坐視其死而不治乎故曰西邱之言便於俗醫而非所以救世也且其所指逆症多端稠密者多有之如發熱而驚悸吐瀉報痘而先發於司空印堂天庭等處初出而根窠無暈既出而色白灰陷或發水泡或癢塌或當行漿而不行漿或痂未落而寒戰咬牙皆其所謂逆而不治者也余每治之而得生者多矣奈何悉謂治之無益而戒人勿治乎惟初出而形如蠶種既出而紫黑乾枯者難以灌漿多不可救耳然明知救之而不活不忍坐視而不救也辨寒熱虛實之證凡治病必先辨明寒熱虛實望聞問切無非辨此四者而已四者瞭然胸中則用藥取效其應如響四者不能分辨鮮有不誤者即或中病而愈亦幸而偶中也至於痘症之寒熱虛實尤為緊要辨之不明多致敗事何歷代治痘之家著書立方互相異同至於虛實寒熱多略而不辨或辨而不明致令檢方者漫無下手處竟不知某症屬虛熱某症屬實熱當用某方則雖千百妙方千百妙論無益於用也無怪乎自古及今治痘之家多迷途而慈幼之術疏也且痘之虛實寒熱與諸症之虛實寒熱固自有辨諸症有虛者元氣虛也宜補之痘有表虛有裡虛亦元氣虛也宜補之此其相同者也諸症有實者邪氣實也宜瀉之痘有表實有裡實此則元氣完固毒氣不能為害不可瀉亦不必瀉也此其不同者也諸症有虛之甚者陰有餘而陽不足則寒自虛生宜溫熱之劑補之也痘有虛之甚者亦陰有餘而陽不足而寒自虛生亦宜溫熱之劑補之也此其相同者也諸症有寒自外入者外感也當其在表宜發散之久而入里則鬱而為熱宜清解之痘出而風寒外襲宜溫而散之或外寒入內而為吐瀉諸症則宜溫之而已外不可發汗內不可清解也諸症有虛熱者元氣虛精液竭而火從虛生補之則熱自除不必解熱也痘亦有虛熱者元氣虛而毒氣肆也當以補元氣為主而略兼解毒可也三者皆同有不同也諸症有實熱者血氣未虧而邪氣壅盛單用寒涼之藥瀉之可也痘亦有實熱者稟氣強血氣盛而毒氣亦盛亦單用清涼解之可也此又其相同者也今自發熱之初以至還元之後俱先辨痘之虛實寒熱而各立方於後令人細心審症而後用藥庶不致虛虛而實實乎不致於損不足而補有餘乎不致於以水益寒而以火益熱乎然痘之虛實寒熱較之他症尤顯而易察蓋自見點以致結痂其形其色既昭昭然而可睹又聽其聲音觀其靜躁視其飲食之多少大小便之利澀三歲以上切其脈之遲數洪細辨虛實寒熱當於黑白之分明而後用藥取效易易矣晰氣血盈虛消長之理痘瘡全憑氣血以成功而氣血之盈虛消長其理甚微不可不透也蓋氣體天而親上血體地而親下痘之出也其高處之泡氣之位也上也氣宜尤焉其四暈根腳血之位也下也血宜附焉疱尖而色白潤是氣尊而居其親上之位也四圍有暈而色紅活是血附而安其親下之分也氣居其尊而血安其分氣血和順而載毒出外此最吉之症可勿藥而愈也頂陷而氣反親下此氣虧而不能充也法當補氣四圍根腳無紅暈此血虧而不能附也法當補血此其理尤易明也其有通頂紅色成血疱者血反親上也此症最險必不能成漿至八九日則癢塌而死然此非獨血盈乃由氣虧而失其居尊之常故血得以妄行而僭居其位也急宜大補其氣氣充則能統血血自不得泛溢妄行而疱轉白矣世人不識此理見其疱紅則謬認為血熱而用涼血行血之劑致令氣愈虧而斃愈速也不亦悲乎故氣血盈虧之理微妙而難識也至於調理氣血其氣獨虛者因宜專補其氣而不宜補血蓋陽不能從陰陰愈長則陽愈消也其有血虛者多由胃氣損傷元氣不足所致則補血宜兼補氣蓋陰必從陽陽生則陰長也黃汝言明醫雜著乃謂血虛而用參耆以補氣則陽旺而陰血愈消甚矣其不明於陰陽消長之理而立此言為世大害也余每治婦人產後去血過多而發大熱婦人血虛崩漏而下血不止以及便血之虛滑者俱用參耆薑附而佐以血藥與升提藥皆獲奇效安得謂血虛不可補氣乎若小兒痘瘡以胃氣為主則補血必先補氣故氣血消長之理不可不深明也炮製用藥之法凡用寒涼除陽症傷寒積熱痢症及諸實熱等症外其餘用之降炎上之火清血分之火俱有寒因熱用之義須依酒炒酒製之法最為緊要若痘症中前後所用解毒諸涼藥皆因毒火燥血而用入血分藥以涼血活血者必須依法炮製是以芩連知柏花粉大黃等必用酒拌炒牛子必炒香研末當歸白芍生地紅花紫草牡丹皮地骨皮之類必以酒臨時洗用此要法也而時醫苟簡粗率往往不依法炒制而生用寒涼不惟無益而反以致害者為矣此其失非小而人不知不惟病家莫之知而時醫亦竟不悟也若悟其失豈肯省此微勞而貽此大害哉故表而出之以訓將來有熱者甘草黃耆白芍俱生用虛寒者黃耆甘草俱炙熟白芍酒炒附治痘醫案余第四子生四十日即出痘其初頭上並身上不過三五點身不甚熱食乳如常看者皆謂其痘極少當不滿百耳余以為未必然即令禁風調理再越三日而遍身甚多其頭上胸腹腰背手足俱稠密之甚至於額上面上及陰囊等處俱一片純紅不分顆粒臍內甚多因腫大突出舌上亦多形如白米膿漿布置滿舌看者以為兒小痘多且有不順症此必不可為矣余見其痘色紅活又頗能食乳尚為可治但慮其血氣難支因以參耆炙草煎濃汁時與乳相間服之以助其灌膿起脹至於五六日之後其頭上之痘多有膿漿而間有水泡至於身上及手足則水泡大半而膿僅少半耳余以為小兒則氣血有限其理宜然不足憂也獨慮其面額上一片純紅無一點膿漿以為憂耳蓋必得皮下有膿而後毒氣可散仍時以參耆甘草湯與之至於第七日一更時分額上純紅者忽有一二處轉黑色余見大驚以為此毒盛而變逆症也然察精神與飲食則又未見困憊是夜三更見其陰囊處亦轉黑結痂因悟而喜曰此非惡候乃痘收而結痂也緣兒小而氣血易於周浹是以七日後即收靨不可拘以九日常期也果於第八日寅卯時分自上至下遍身俱落痂至晚遍身復發大熱余曰此痘毒未得盡發因速結速落而餘毒欲發癰也急宜解毒以大連翹飲煎濃汁緩挑服之凡一日一夜服三酒杯而熱退身涼可無癰患矣其鼻上痂落一層又結一層封閉鼻氣不得出以蜜潤其痂用銀挖耳挑開鼻孔以出其氣一片純紅處痂雖落而膿水未乾以黃柏黃連甘草骨皮倍子為末搽之而愈其陰囊流清水數日不愈諸藥不效用棉繭散而愈夫以此極小之兒極危之症而隨症用藥其效如神已彰彰可睹矣而古人之著書與今人之治痘一見小兒痘多與穿臍純紅水泡等症即棄而不治不亦大枉哉生靈天死何可勝計也雖往者無可如何而來者猶可急救有司命之責懷慈幼之仁者宜知之一婦人年二十三歲有娠三月餘夜間為盜賊所驚不數日而小產發熱二日而出痘至四五日而痘出齊稠密可畏又兼嘔吐痘色淡白諸醫見其氣稟弱小產虧損痘出又多皆不敢施治余曰豈有坐而待斃者乎因以參朮陳皮等安和胃氣止其嘔吐而痘色亦略轉紅活余喜曰此可以溫補而調治也因以參耆川芎當歸炙草官桂丁香等大補劑屢投之每服補劑後其痘色輒轉紅活若一日不服藥則轉為淡白余因一日必股以兩大劑至於痘正灌漿時聞其血漏尚未淨余曰此注漏卮也急於前補劑中去官桂木香加黑薑升麻柴胡各一錢五分阿膠艾葉各八分服二劑而血漏立止仍除此五味依前劑頻頻服之其膿漸漸充滿至於二十餘日而後收靨後又眼腫翳頗甚服清毒撥翳湯數十劑而愈當其服補劑時每劑用參耆各二錢丁桂各一錢他藥多寡稱之前後共服二十餘劑夫此極虛之症苟非此峻補之藥豈能得生乎拘常格者可以悟矣一兒年十五歲自痘遍身稠密至八九日當灌膿時其痘粒粒陷入成窩諸醫用異功散治之其伏陷愈甚惟有待斃而已余往視之見其痘色紅紫而體氣頗旺余曰此非虛弱乃毒氣壅蔽血氣是以伏陷不成漿也因以清毒活血湯與之辰投一劑至午而伏陷立起再一劑而膿漿充滿矣乃至靨期又發熱熏蒸投以甘露迴天飲而獲安矣一兒年十三歲出痘身熱三四日痘出隱隱數點忽然驚狂譫語欲走出外醫欲以涼藥解毒予診其脈緩弱而察其痘色淡白余曰此其症雖似陽然因血氣虛弱而送毒不出故發狂譫語也因投以溫中益氣湯一劑而痘出遍身狂語自解精神清爽不必服藥矣一兒十歲出痘極稠密而頸項甚多俗謂之鎖頸痘又有暴脹痘數粒在各處謂之賊痘又初出帶紫黑色諸醫技窮袖手以為斷不可治余往視之其痘已出六日有餘當灌漿時尚無些少膿漿醫者因其兒體質素弱又有賊痘鎖頸痘疑當以解毒藥與之余曰此但得膿充滿則可生矣何必以鎖頸賊痘為疑哉且到此灌膿時又何可解毒也其兒素嬌不肯服藥而喜飲酒可因之以為用遂制參歸鹿茸湯一大劑令其煎汁而以好酒相半和勻與兒頻頻飲之自先日申時至辰時分服完一劑視其各處痘瘡已灌漿大半矣是中午時忽溏瀉二次知其內虛極而脾弱也因制參朮散投稀粥內服二三錢而泄立止後再服參歸鹿茸湯一劑而膿充滿矣收時餘毒頗盛大便秘澀用大連翹飲加酒炒大黃一錢二分一劑而安一兒年四歲出痘其痘症起脹時泄瀉大作投以參朮訶蔻之類竟不能止勢甚危急余以參朮散投之服數次而泄止痘亦遂安一女年六歲出痘其體虛弱先服補藥已多至於痘已結痂而忽泄不止投以異功散加訶蔻亦不止醫將以七味豆蔻丸與之余思此女一向服補藥何以一旦虛滑若是因察其大便多努力且泄之糞又少而色黃因以加味四芩散一服而泄止後因其大便澀滯復加入檳榔青皮枳殼一服而安余用加味四芩散治痘中熱毒泄瀉取效甚神一兒三歲當痘收時泄瀉不止諸藥不效以七味豆蔻丸與之亦不止其丸從大便泄出余知其虛滑甚也仍以豆蔻丸研末和粥少許飲之其泄立止痘收而安余以參朮散並此方治痘中虛寒泄瀉神驗初發熱至痘出齊數日調治法大凡調治痘瘡自發熱之初見點之時即當思及如何起發如何灌漿如何收結一動手用藥便顧首顧尾慎其初以善其後然後次第調治可保萬全也發熱之初若身熱和緩或熱或退神清氣爽則不必用藥發汗但戒葷禁風而已不必服藥蓋痘有順而不治者不輕治即所以治之也其或憎寒壯熱頭痛咳嗽鼻流清涕者多因外感不可不發散也當視其強弱用藥發散見體質壯實者用加味升麻葛根湯微汗之體質怯弱者宜用加味參蘇飲汗之然皆不可出汗太多恐虛其表後難起脹灌漿也然此二方即外感而非痘服之亦無妨或發汗之後身熱不退者且勿峻攻姑少待之其或煩悶燥渴而妄語者用敗毒和中散清之大便秘者加酒炒大黃微利之不秘不加服之後覺煩躁少解即止勿服聽其痘出外而中自安切不可輕用傷寒症柴胡黃芩花粉等清解之此藥若用差一劑則解虛其表至七八日漿必不行雖極力補助莫能救療至焦枯癢塌而死者多矣蓋痘以里為根以表為基一虛其表是猶築室而圮其基也是以治痘與治傷寒異也近世管㾦著書不知此理而首以發表解熱為說豈痘可與傷寒同治乎惑世誤人為害甚大姑舉其一以闢其餘或有腹痛腰痛而煩悶者此其毒氣沉重亦當用敗毒和中散主之大便秘加酒炒大黃微利之聽其毒出外而內痛自止然後視其痘或稠密或紅紫或帶黑方議解毒可也切不可純用寒涼以阻遏其毒出之勢立致內攻告變世人不知此理純用寒涼解毒或用硝黃峻下因而速斃而卒不悟可慨也夫當時令出痘時小兒或有發熱稍緩其熱或作或止或紅點或未見紅點或微見而未明或是出痘或非出痘正在疑似之間當此之時不如且勿服藥以待其定但禁風戒葷而已所謂不輕治正所以深治之也有等富貴之家愛惜太重見其如此屢投以清涼解毒之劑不知若是痘症則其毒氣發於五臟勃勃欲出於外其勢決不可阻遏倘用清涼阻遏其勢即所以迫之內攻而速禍矣故犯此者多有出痘數日煩躁驚搐而死此解毒之藥害之也正如寇在宮牆之中不逐之出外反阻其出路圍而攻之室中之人有不遭其殘害其乎然醫者曰吾用解毒之藥何至於殺人既不自任其咎病家曰彼用解毒之藥何至於殺人亦不歸咎於醫殺人於冥冥之中而己不悟也人不知也噫良可悲也余故表而出之以戒夫世之愛而反害者語曰久臘者毒必厚痘毒稟於胎元伏於五臟其輕者無論其重者深藏久蓄不為不厚矣一旦觸發於倏然之頃其勢猛銳斷不可御是以必借血氣載毒出外成漿結痂然後毒散而功成此病機亦化機也此豈若諸瘡之毒可以驟然而解散者乎故解之於既出之後是順其欲散之勢猶為近理解之於未出之先是遏其猛銳欲出之勢其禍甚速如水勢排山而欲捧土塞之有是理乎自古治痘之家其卑者固不足道其高者亦未深悟其理每於發熱之初欲出未出之際輒以解毒為主且曰服其藥則毒可解而痘必稀不知痘之稀由其初受毒之輕耳豈將出之時所能驟解乎致啟後之庸醫訛以承訛見痘將出之時毒氣盛熾則多用涼藥以解之或妄下以解之彼自以為對症之妙藥而不知反致內攻之奇禍至於殺人而終不悟前覆而後不戒其禍又無窮也余觀近世庸醫多犯此失以致童幼數日而斃者甚多則皆茫然委於症惡難救而舉世莫知其致此之由殊可矜也故不得不發明其理以救將來初發熱辨症用藥諸法有發熱之初偶感風寒飲食停滯而腹痛者用加味升消平胃散一劑其痛立止然停食作腹痛與毒氣作腹痛其症不同停食腹痛者其痛必急疾而叫啼必甚多在臍之上而面必清白唇淡手足冷升消平胃散主之毒氣作腹痛者痛稍延緩而有作有止多在臍下或連腰而痛面紅而唇紫手足不冷敗毒和中散主之一發熱之初有嘔吐有泄瀉有吐瀉交作者全要辨虛實寒熱而用藥或吐瀉交作而胸腹痛甚者此感寒而停食也仍用升消平胃散主之一服立效或胃氣弱而有寒嘔吐不思飲食或食下即吐其吐必順快而無聲面必青白唇必淡精神必倦怠宜用加味參砂和胃散主之或脾氣弱飲食不化而泄瀉其泄必滑利而色帶白宜用術芩調脾散主之或有毒氣作吐瀉者其吐必酸辣而有聲神氣不甚困倦其瀉必黃色而穢臭雖或吐瀉交作胸腹多不痛此則毒氣由吐瀉而發泄所謂吐瀉為順候而不必止者惟此一症耳若虛寒吐瀉與此迥異者多矣張潔古等乃謂痘前一概吐瀉慎勿亂治而多吉並不分虛實寒熱何其孟浪之甚耶身熱至二三日痘欲出不出或煩悶驚搐或狂言妄語切不可驚惶失措須詳審虛實寒熱而治之要之此等症皆由毒氣在內不得宣發於外然毒氣不得宣發症有不同不可不辨有毒氣壅盛於內不得驟發於外而驚搐狂躁其症痘影必紅紫面赤唇紫聲音亮口氣粗手足熱脈洪數此毒氣壅盛也宜用清解散宣之有內毒本盛而外為風寒所束鬱滯不得出而驚搐狂躁者其形色多同前但聲重鼻塞或鼻涕脈浮數此毒氣為風寒所束然此多在寒涼之月或不禁風寒者然後有之宜以蘇解散發之有氣血虛弱送毒不出而驚搐狂躁者其痘影淡淡在皮下不見紅舌唇淡面白或青脈又遲緩雖煩躁驚狂譫語亦是氣血虛而送毒不出也宜用溫中益氣托之以上三者最宜精詳觀形察色審音問症又參之以脈然後可以辨別明白而用藥當一劑之後痘出而驚狂定矣昔人謂痘未出之前驚搐為順皆不必治豈其然乎又兒欲出痘有發熱二三日全無痘點形影而忽然驚搐狂躁狀與急驚風相似者此亦毒氣壅盛不能宣發所致宜用清解散宣之痘出而驚即定矣若醫者不知是痘而誤作急驚風施治或以寒涼藥投之或以驅痰藥下之其兒必死何者阻遏其毒使不得出而內攻也故未出痘之兒若遇此等症即當驚疑恐是出痘又有發熱稍輕三四日而痘常隱隱不出者最要詳審不可概認為毒輕痘少若發熱和緩精神清爽飲食如常出痘少而點數明顆粒尖漸漸長大紅活此謂毒輕痘少無疑矣若身熱加輕至三四日而倦怠嗜臥不思飲食所出之痘形影淡白點粒不明此非毒輕痘少亦是氣血虛弱送毒不出也急用溫中益氣湯以托之甚者必連二三劑痘始出齊其痘必多若因其安靜而袖手玩視不急托痘出外延至五六日後毒氣內攻須臾告變甚可畏也則昔人熱輕痘少之說可盡信乎而六日以前痘未出齊勿用溫補之說可盡拘盡自有方書以來其時不啻二千年其人不啻數百家然皆詳於已出之後略於未出之先深言出速稠密之危不言留中不出之禍不知已出之毒外寇也未出之毒內寇也內寇與外寇勢孰急內攻與外攻禍孰烈故痘已出而死者多在旬日之內外痘未出而死者多在六日之中徒知逐外寇而不知御內寇自古以來諸賢之為計疏也然其失計安在惟在痘未出而急於解毒緩於逐毒也不知未出之毒說已見前但當急急逐之出外而已余深明其理而明鑑其失顧長慮卻思為未出之前諸症設法明辨其虛實寒熱以施治實熱者宣發其壅滯以逐毒出外虛寒者補助其氣血以逐毒出外至於急用寒涼遏毒內攻等弊則諄諄致戒不憚再三一以救前哲之失一以開後人之迷雖岐黃復起不易吾言矣一發熱至三四日報痘形如粟米口鼻腮耳年壽之間先發數點淡紅潤澤者最吉若身熱一二日即出先發於天庭司空印堂等處者或一齊湧出而稠密者或乾枯而紫黑者或成片不分顆粒者皆血氣凝滯而毒氣肆行最為可憂急宜活血養氣而解毒宜用調元化毒湯為主腹痛者去參耆加枳殼八分大便久秘者參耆不用加熟軍一錢五分若血氣與毒氣俱旺而脈洪數者歸芍減三分之一去參耆不用若痘出不快者其症不同最宜分別有痘色紅紫乾枯或密如蠶種或一片不分顆粒身熱大便秘而出不快者此毒氣壅滯血氣不行也宜用調元化毒湯去參耆加小川芎清之或有痘色淡白飲食減少身涼手足冷小便清大便滑而出不快者此氣血怯弱不能載毒出外也宜用溫中益氣湯以托之有鼻塞聲重咳嗽惡寒而出不快者風寒閉之也宜加減參蘇飲以發散之但不可出汗或有因邪穢所觸伏陷而出不快者其痘必癢宜平和湯解之外用蒼朮紅棗沉檀燒之以避其氣痘正出時有忽傳風眼直視牙關緊者此調護不謹而外為風寒所襲也且勿輕用驅風峻藥宜用姜附湯白附子二錢此藥毒重不可輕用以制附片或肉桂代之可也老薑二錢煎濃溫服出微汁自愈痘正出時以身微溫不熱不寒者為佳或輕熱和緩者亦無妨惟大熱者可憂若出齊而發大熱尤可憂其痘必稠密必紅紫必乾枯宜用調元化毒湯去參耆主之看痘出齊與否以足心為驗足心有痘則出齊矣若痘稀者不以此拘肉食不可太早必待痘出齊而身熱盡退方可食豬肉若身熱未退而遽食肉以助火邪必成大害雞肉首尾俱不可食惟起脹時虛弱者可食以助行漿壯盛者仍宜忌之諸魚皆腥牛羊皆膻痘家最忌所宜禁絕初發熱至痘出齊調治方加味升麻葛根湯粉葛根一錢升麻六分甘草三分桔梗三分牛蒡子五分炒赤芍六分蘇葉五分川芎四分炒楂肉八分生薑引熱服微汗此方加荊芥六分防風六分前胡一錢五分小兒初發熱者服一劑則痘必現紅點即非痘症服之亦可退熱麻症初起亦宜服此方虛弱者荊芥防風不加亦可催痘出齊方玉竹力量最薄須用五錢方可生耆亦宜稍加生玉竹一錢前胡一錢川芎八分桔梗八分生綿耆一錢防風一錢歸身一錢甘草五分蟬蛻去頭足五枚炒楂肉五分凡小兒已服前方痘已現點而通身不出齊者急宜服此方即通身已出齊而痘不起發者亦可服服此方後無吐瀉腹痛諸雜症者急以千金內托散連服數劑便可灌漿結痂矣加味參蘇飲無力有人參者真高麗參須用錢半若真臺黨參須用三四錢方有力量以下仿此法半夏三分茯苓五分以上二味不可輕用人參三分蘇葉五分桔梗四分前胡四分牛子炒四分粉葛八分楂肉炒六分川芎四分生薑引此方去法半夏茯苓較妥當此書所錄皆屢效之分內藥有與灌漿不甚相宜而可偶用以救急者必注不可輕用恐人粗豪以誤事也大凡痘症初發熱及正灌漿時蒼朮白朮陳皮法半俱不可輕用收靨時則可用矣發熱時羌活獨活麻黃細辛尤不可輕用灌漿時穿山甲天丁皂刺斷不可用總記於此業是術者尚其慎之勿視人命為兒戲也敗毒和中散連翹去心七分牛子炒七分黃連酒炒七分枳殼炒七分荊芥五分木通五分桔梗四分紫草茸酒炒四分蟬蛻酒洗四分川芎四分甘草四分前胡五分升麻四分大麥冬酒炒去心八分防風五分不用引毒氣盛煩渴腹痛者宜用此方升消平胃散蒼朮米泔水制五分陳皮三分此二味不可輕用恐燥平精液不能灌漿故也後仿此川芎五分香附制五分紫蘇五分厚朴姜炒五分藿香三分砂仁三分白芷三分炙草二分麥芽六分楂肉一錢生薑引參砂和胃散法半夏四分雲苓土炒五分白朮土炒五分陳皮三分以上四味不可輕用人參四分砂仁四分藿香三分炙草二分煨姜五分此方只用後五味亦效術苓調脾散白朮土炒七分雲苓七分上二味不可輕用酒芍五分神麯炒五分炙草五分扁豆薑汁浸去皮八分厚朴薑汁炒三分香附三分砂仁三分煨薑紅棗元肉引加人參四分亦可清解散防風四分荊芥四分蟬蛻酒洗四分桔梗四分川芎四分前胡五分楂肉八分乾葛五分升麻五分黃芩酒炒六分黃連酒炒六分紫草茸酒洗六分木通六分牛子炒七分連翹去心七分甘草三分生薑引蘇解散即清解散去芩連加白芷四分羌活四分此味不可輕用溫中益氣湯參耆二味宜加分量說已見前以上均仿用白朮土炒五分茯苓六分以上二味不可輕用人參五分生耆八分歸身酒洗六分炙草四分川芎四分白芷五分防風四分木香四分官桂三分楂肉炒三分生薑引調元化毒湯生耆八分生芍酒炒六分當歸酒洗六分牛子炒七分連翹去心七分黃芩酒炒八分黃連酒炒八分防風六分荊芥六分桔梗六分前胡六分木通六分紅花酒洗三分生地酒洗三分甘草三分蟬蛻酒洗四分楂肉炒八分紫草茸酒洗六分人參四分生薑引加味參蘇飲羌活三分冬加麻黃四分此上二味不可輕用慎之陳皮四分此一味亦不可輕用白芷三分蘇葉六分人參四分荊芥四分防風四分桔梗三分甘草三分生薑引熱服但不可汗平和湯人參四分當歸酒洗四分桔梗四分白芍酒炒四分黃耆四分防風三分白芷三分甘草三分官桂三分沉香三分乳香三分藿香三分檀香三分用沉香則不用檀香亦可生薑引外用蒼朮紅棗沉檀燒之以闢其氣只用紅棗一味置炭火上燒之更佳房中切不宜熏安息香凡正灌漿時痘癢而動手抓破者此症最險宜用西域真藏香燒至床頭內亟服大劑補藥漿足而手自止痘出齊後起發灌膿數日內調治法報痘二日後痘已出齊身體溫和精神清爽顆粒尖圓潤澤根腳紅活腦背稀疏飲食如常二便不澀此順候也不必服藥但節飲食避風寒防穢氣而已痘出齊三日內其時日十分緊要其形色症候最宜精詳蓋好痘全要膿漿濃滿其次亦要六七分膿漿方可保全無虞痘一出齊形色顯然其膿之成與不成足與不足皆可逆睹其痘順者自然膿足不必服藥其症之不順者後必無膿或膿少而清急於此三日內察形觀色分別虛實寒熱用藥調治以為灌膿汁猶可及也失此不治多有緩不及事而竟不成膿者矣痘之生死判於膿之有無有膿則生無膿則死有膿則毒從外散故生無膿則毒留內攻故死是以膿濃滿而痂厚者上也膿未滿而痂薄者次也其下身遍身俱水泡然水泡七八分而間有二三分薄膿疱猶可生也其最下者密不成顆串為一片而其皮下有膿漿又或疱密而潰膿水濕潰猶可生也惟乾枯無膿漿或薄漿不滿二三分者必癢塌而死無生意也是以出齊而調治灌膿如拯溺救焚不可緩也氣血流暢則毒化而為膿膿之不成其病有二毒氣盛熾則血燥而凝不能運化以成膿故痘色乾枯紅紫或帶焦黑者毒熾而血凝者也急用清毒活血湯煩渴者去參耆加麥冬花粉八分元氣虛弱則血寒而縮亦不能運化而成膿故痘色淡白疱不尖圓根無紅暈者氣虛而血縮也急用參歸鹿茸湯或千金內托散甚者服此一二劑其痘即轉紅活行漿困倦手足冷飲食少者加木香丁香五分官桂五分寒點咬牙者再加官桂三分製附子八分泄瀉者去當歸加神麯白朮酒芍雲苓八分木香丁香三分另用參朮散止瀉托膿之劑莫妙於此方以鹿茸補血力峻與草木諸藥不同然恐鹿茸未必得故又錄千金內托散加減法同上出齊後當治不治則漿不行而五陷之症作矣五陷者白灰紫黑血陷是也痘稠密紅紫而頂陷者紫陷也甚則轉而為黑陷也此熱毒盛熾閉其氣凝其血而陷也仍用清毒活血湯煩渴者去參耆加麥冬花粉八分然此紫陷時不過一二劑而痘即立起其效如神以至黑陷則受毒已深雖用此藥救治而不活者十常八九痘雖稠密其色淡白根無紅暈而頂陷者白陷也甚則轉而為灰陷也此氣血虛弱不能運化毒氣以成漿故陷也宜用參歸鹿茸湯或千金內托散其隨症加減法亦如之又有一種痘瘡顆粒通紅或血疱而不成漿者此氣不能統血而血溢妄居氣位也詳見前論氣血條宜大補其氣用參耆湯主之服此疱即轉白而成漿否則血疱不治則氣愈虛而為血陷然治之亦不外此方血陷與紫陷相類但血陷雖紅然淡而不紫也紫陷屬熱氣粗身熱血陷屬虛氣少身涼不可不辨何西邱論五陷說此朦朧不明管㾦論之尤乖謬可惡業醫者切不可孟浪而不明其理也犯五陷者治已見前其或雖不頂陷而痘不光潤或疱虛而漿不過三四分雖或有漿而清薄或行膿至二三日尚不充滿此皆難以收靨宜用參歸鹿茸湯催足其膿漿或千金內托散亦可若漿不滿雞冠血酒亦可用三四年以上大雄雞先將好酒一杯燉溫次刺雞冠血滴入和勻仍燉溫服之服後雖燥痛一時無妨但其雞不可殺又有一種出痘稠密毒火既盛然元氣虛血氣弱精液枯竭不能制火以致虛火炎蒸或咽喉痛或鼻時出血難任溫補痘不能成膿結痂大凡年長之男女嗜欲久開血氣既耗者多有之最為難治時醫見其多熱症率用清涼如犀角地黃之類不知原因血氣不能勝毒氣而有此種症今又純用寒涼則血氣愈虧損而毒氣愈妄行豈復有可生之理是以此等症治之者十無一生殊可哀憐今特製參麥清補湯須頻頻服之方保無虞痘出五六日後至七八日若膿漿不行亦當用參歸鹿茸湯托之黃耆生用不必加減如膿漿不起則無生意矣若有四五分膿猶可望生灌漿時有葉瀉圪症各不同吐有二症瀉有二症吐而酸苦有聲吐訖反快者毒火上騰也痘色必紅紫用連梔二陳湯緩緩服之吐止勿服但二陳不可輕用用伏龍肝藿香可也吐而有物無聲不酸不苦吐訖困倦不思飲食胃氣損也痘色必淡白用參砂和胃散主之方見前發熱條泄而糞黃臭穢小便赤澀者毒氣奔越也痘色必紅紫用加味四苓散食前服瀉而糞滑利清白者虛寒也痘色必淡白用參朮散食前溫服入稀粥內和服亦可或去白朮加赤石脂骨碎補亦可止瀉如虛滑不止服前藥不效者兼用七味豆蔻丸此等丸散治痘之家必須預製以防虛滑泄瀉若痘起脹收結時驟然泄瀉不止危在旦夕矣然止瀉有用湯藥不效服至異功散而不止者惟此丸散可以止之若熱毒作瀉者加味四苓散一二劑即可止起脹灌膿時或有六七日不大便而煩悶作痛者毒盛而秘也用前清毒和血湯去參耆加淮牛膝二錢入生蜜半杯紫草當歸倍用如又不通加酒炒大黃微利之若仍不通用豬膽汁滴入穀道中即通切不可用硝黃下之恐下後變他症則危矣灌漿時有身涼而汗不止者用歸耆主之有痰用白附子熱水磨服切不可用二陳恐燥陽明孤陽無陰不能化也至收結時用之不妨醫方湯頭清毒活血湯歸身酒洗六分牛子炒六分前胡六分木通六分生地酒洗五分酒芍五分連翹去心五分桔梗五分黃芩酒炒七分黃連酒炒七分甘草四分楂肉八分人參三分生耆八分紫草茸酒洗六分生薑引煩渴者去參耆加麥冬花粉各八分參歸鹿茸湯無鹿草以真鹿膠四錢代之無人參以真高麗參二三錢或真臺黨五六錢代之鹿茸酒洗三錢炙耆二錢歸身酒洗二錢炙草六分人參一錢生薑龍眼好酒一杯引鹿茸多蟲不可用鼻嗅之恐蟲入鼻顙千金內托散人參二錢歸身二錢炙耆三分酒芍六分川芎六分官桂五分炙草五分楂肉五分木香三分防風三分白芷三分厚朴三分薑汁炒方內既用厚朴又用木香未免耗氣用者慎之龍眼好酒生薑引參耆湯人參五錢炙耆五錢炙草一錢官桂五分生薑引歸耆湯歸身五錢炙耆三錢棗仁炒三錢不用引參麥清補湯人參八分揀冬去心酒炒一錢花粉酒炒一錢生耆一錢牛子炒五分炙草五分酒芍五分生芍五分當歸八分生草五分紅花酒洗五分川芎三分生地酒洗三分桔梗三分楂肉三分前胡五分生薑龍眼引連梔二陳湯雲苓五分法半四分陳皮三分上三味不可輕用黃連酒炒五分炒梔五分炙草三分生薑引昔新安汪機號石山治痘症用四群子湯加黃耆紫草多效間有枯萎而死者自咎用藥之不精思之至忘寢食急悟曰白朮燥濕茯苓滲水宜痘漿之不行也乃減去二味加官桂糯米以助其氣因名保元湯觀此則知白朮茯苓二陳等藥自初發熱以及灌漿之時痘一日未收靨一日不可輕用也明矣何世人不察而謂必用白朮始可催足其漿也甚矣其貽害於人不淺也參砂和胃散方見前發熱條加味四苓散豬苓八分木通八分澤瀉七分赤苓七分車前炒五分黃芩酒炒五分黃連酒炒五分牛子炒五分燈芯引參朮散白朮土炒一兩雲苓去皮五錢陳皮四錢苡仁炒五錢砂仁研五錢蓮肉五錢六曲五錢楂肉五錢訶子研四錢木香三錢甘草炙五錢肉豆蔻麵包煨去油四錢上藥共為細末每用二錢清水汁調食前溫服七味豆蔻丸訶子麵包煨去核五錢肉蔻麵包煨去油五錢龍骨醋煅五錢砂仁五錢木香五錢赤石脂煅七錢枯礬七錢上藥麵糊為丸如綠豆大用清米湯吞之或二十粒或三十粒量兒大小與之兒小不能吞丸者研末入粥內服之亦可漿足至回水結痂時數日調治法痘出八九日膿漿充滿顏色蒼蠟者若無他症勿藥可也痘出稠密而膿不甚滿此時飲食多減痰液甚多用養胃開痰湯渴者去法半加麥冬八分北味九粒吐逆者加藿香砂仁三分灌膿時忌用朮苓半夏恐其燥干精液膿漿不行也至將靨時則可用矣此時有欬逆者俗呼呃胃氣上越也取真黃土鼻邊聞之即止此時漿滿或為寒所剝一時痘俱紫黑如紫卜聞色不必驚恐急以上好肉桂磨湯或煎湯服之立效如舊有寒戰咬牙者此真氣外發而內虛寒也宜建中湯一服立止甚者不過二服收靨時後寒戰咬牙者亦同此調治或謂寒戰咬牙有熱有寒如痘色紅紫一齊湧發身熱煩躁作渴大便秘小便澀赤脈來洪數者熱也蓋胃熱則咬牙肺熱則寒戰也如痘色淡白皮薄頂陷身涼惡寒大小便利脈沉遲者寒也蓋胃寒則咬牙肺寒則寒戰也此說當矣然此症屬寒者十之九屬熱者十之一是於七八日之前猶有屬熱者見於七八日之後其屬熱者寡矣是以不為熱者立方九十日間膿足而色蒼者且必發熱熏蒸此回水之候也蓋真陽運化其水自消其有元氣不足則不能及時回水而當靨不靨矣此虛寒症也必身涼而手足冷須大補氣血以助其收結宜用溫表調中湯主之其有發熱熏蒸當靨而不靨者毒氣未解也退其熱則痘自收宜用清表散毒湯或用砂糖半酒杯百沸湯調作一碗溫服謂之甘露迴天飲能令熱退痘收但毒盛者恐未必效痘靨時有外潰而膿水淋漓者謂之水靨用新瓦粉調鴨蛋清敷之立收而落當靨時有忽然腹痛著在中脘此熱毒凝滯瘀血作痛也宜用消毒散血湯若結痂厚實無他症者不必服藥結痂後發熱或煩渴者當辨其寒熱虛實調治發熱壯盛胸腹手足頭面俱熱大便秘澀小便赤澀者餘毒盛也即當解毒若解毒遲則痂落後必發癰毒急用大連翹飲解之大便仍秘加熟軍五分若其發熱稍緩頭熱面不熱其手足心熱手腳背不熱精神困倦大小便利者虛熱也宜補中益氣湯渴者加麥冬一錢五味子九粒痂落還元或痂落一半後忽然遍身大熱餘毒欲發癰也或手足四肢頭頂胸背一二處更甚者即癰之所在也此在膿漿不滿而痂浮薄速收速落者多有之急用大連翹飲以退其熱大便秘者加酒炒大黃微利之如熱不退須連服數劑熱退身涼方可內消此時又有忽然頭頂大痛者餘毒上攻也或因多服熱藥所致若不急治其毒必注於眼目而目病大作矣宜用大連翹飲去木通車前滑石加升麻桔梗六分川芎薄荷四分服數劑以解散上攻之毒則目患可免也痂落後有精神困倦飲食減少胸腹頭項手足心發熱而煩渴者內虛也仍用補中益氣湯主之或有雖不發熱而倦怠嗜臥不思飲食或手足冷或津液少而渴或瘢白不紅皆內虛之症也亦宜用補中益氣湯主之不然恐生他變須知出痘多者收結之時還無之後五臟真氣發泄已多一身血氣耗散已甚雖或毒氣未淨而其真氣極虛是以用涼藥解毒必須用酒炒制其體質弱者或時加參耆歸芍之類以救血氣切不可因其有熱症而遂投以生三黃生梔子大黃石膏之類此時正氣微弱用寒涼峻攻多有一投而輒斃者矣必須戒之治痘之家既謹其始又須慎其終蓋痘之危險者有二一曰毒盛一曰體虛當其未出之時或三五日而速斃者皆毒盛也及結痂還元之後或誤投一藥誤進一飲食而輒斃者皆因體虛也毒盛欲出不出者能順其勢而導之使出不妄施解毒以阻遏拂逆之則未必致斃故前論再三告戒深為謹始者慮也其體虛者能察其虛而補養之又防其虛而不峻攻之則可保無虞惟玩其收結還元而忽意不加謹者多致誤事故又深為慎終者警也醫方湯頭養胃開痰湯人參三分白朮土炒三分炙草三分雲苓三分桔梗三分楂肉炒五分懷藥炒五分宜用二錢陳皮三分生薑引建中湯人參二錢炙耆三錢白朮土炒一錢五分歸身酒炒一錢五分川芎八分製附子一錢黑姜一錢肉桂八分炙草八分丁香三分溫表調中湯炙耆二錢人參一錢白朮土炒一錢雲苓一錢官桂一錢乾薑一錢川芎一錢當歸酒洗一錢炙草一錢白芷五分丁香五分防風五分附片五分生薑引清表散毒湯骨皮制八分麥冬酒洗八分花粉酒炒八分牛子炒五分連翹去心五分歸身酒洗五分豬苓四分澤瀉四分黃芩酒炒四分木通四分甘草四分不用引大連翹飲連翹去心一錢牛子炒八分柴胡八分歸身酒洗八分赤芍八分防風八分木通五分車前五分荊芥五分酒芍五分楂肉炒五分滑石水飛五分甘草五分蟬蛻五分生薑引消毒散血湯牛子炒一錢酒芍一錢桃仁去皮尖油一錢熟大黃一錢紅花五分沒藥乳香俱用燈芯同研碎煎熱投入藥中各五分不用引補中益氣湯參耆照前加用人參八分炙耆八分白朮土炒八分歸身酒洗八分柴胡四分升麻四分川芎四分炙草五分陳皮四分生薑引痘症慈航補遺痘有夾斑而出者有紅赤點而無顆粒多隨出而隨沒又有夾丹而出者紅赤成片如雲頭而尖起此皆毒火浮游散漫於皮膚之間遇此症者不必驚惶但散其遊火其斑丹自退宜用元參升麻湯有夾麻瘡而出者仍用玄參升麻湯加桔梗黃芩六分令其麻瘡先退痘瘡自然起發痘初見一二日細小四五日漸大頂平至六七日腳漸闊頂愈平陷其色全白形如豆殼者名為倒靨此氣血大虛而漿不行也宜參歸鹿茸湯加官桂白芍川芎六分南木香四分若泄瀉者兼用參消散痘癢者表虛也此為危症急用參耆實表湯補之癢痘畢竟屬虛管㾦乃謂有氣盛血熱而癢者此無稽謬說也又有謂因血上行氣分血味本咸醃螫皮肉作癢似為近理然灰白之痘不但屬氣虛而血虛亦甚矣豈能上行皮肉醃而作癢乎則此說亦未必然有穢氣觸犯而癢者急燒蒼朮紅棗或黃茶葉以避之甚者內服和平湯方見發熱條痘痛者為實此為吉兆用生白芍二錢為末酒調服立止甚者不過二服痘出齊後有面目腫脹而痘不腫者此血氣虛弱不能收攝毒氣以成膿故其毒散漫妄行肉分也此為危候急宜大補氣血以收攝其毒用參歸大補湯則痘灌膿而肉脹自消矣痘出齊數日後其間有紫脹硬痘獨大而無根暈者此痘疔也用四聖膏填入或拔毒散點之先將銀針撥開疔口將藥填入即轉紅活痘毒發於肌膚而血氣不能運化以成膿結痂則有鬱熱不散赤腫而成癰者其發於未收以前者少而發於既收以後者多未收以前必膿少而淡者有之既收以後必痂浮薄而速結速落者有之若膿漿飽滿結痂厚實緩結緩落者並無有也此毒氣發泄盡與不盡之明驗也又有不虛而服補劑不寒而服熱劑以致發癰者醫之誤也俱用大連翹飲主之但當其初發腫時內外夾攻消散之為上至於成膿則幼小之兒多難堪而在頭頂胸背腰腹者皆險也外治以三豆漿塗之痘瘡原多潰爛收結後或手足等處仍作熱臭爛出水不止用生肌散搽之熱退結痂而愈其有仍作熱作膿而不即愈者用大連翹飲解之即愈又有餘毒流注各處出清水者綿繭散搽之痘有鼻中衄血者毒氣上衝於肺也此其毒氣外泄亦非惡候不必驚惶只用發灰散或清肺湯治之切不可峻用寒涼如犀角生地梔子三黃之類冰伏其氣血必為大害世人不知此理一遇痘瘡有衄血咽喉口舌等症即認為實熱遽投以寒涼冰伏其血脈以致痘不得成漿而變為壞症者多矣是治末而妨其本昧之甚者也痘有水疱而無膿者血少不能化膿也急用參歸鹿茸湯峻補其血若膿疱與水疱相半者無妨如十分中有三四分膿疱猶有生意惟遍身水疱則危矣然胃氣好而飲食如常者亦可望生但其毒氣未散須防發癰耳其或小兒痘多則血氣有限不能盡成膿而水疱與膿疱相間此常理也若無他症不必施治痘有口舌生瘡或是熱毒或是虛火當以痘色辨之切不可概認實熱而純用寒涼解毒之藥如痘色紅紫湧盛者熱毒也用上清飲散主之如痘色淡白者虛火也用前參麥清補湯主之外用赴筵散搽之即愈或口舌有痘而腫痛者痘收自愈不必治治亦不效痘有咽喉腫硬者首尾俱用利咽解毒湯外用玉鎖匙吹之痘有咽啞者當辨痘色以分順逆若痘色紅紫當行漿而音啞者此氣喉有痘也是以外痘行漿時內痘亦行漿窒礙氣道而音不亮也待外痘收則內痘亦消而音自亮矣此不必別加調治也若痘色灰白而音啞者乃血氣虛弱送毒不出毒留於肺肺氣受傷以致失音此則危矣宜參麥清補湯兼千金內托散又痘有咽喉嗆水者順逆不同須為分辨若痘灌膿時嗆水者喉中有痘也外痘成膿則內痘亦成膿壅於食門而嗆也蓋是門乃飲食所進之門既有所壅則飲食必溢於氣喉而發嗆若食物無渣自能嚥下不犯氣道故不嗆也待外痘收則內痘自收可不藥而愈矣然此雖嗆水其喉不甚痛也若痘未行漿而喉先嗆水此則毒氣壅塞其喉必痛宜用前治咽喉方治之痘有小便赤色者用導赤散主之有血淋者用當歸一兩懷牛膝三錢亦效痘毒入眼有赤腫而痛不能開者有翳膜遮蔽而不能視者自古方書所載皆以為痘瘡入眼而不知此非有形之痘乃無形之痘也其遮睛之翳有似痘瘡而實非也蓋有形之痘發於咽喉口舌者有之然皆外痘脹時內痘亦盛外收靨時而內亦消惟入眼之毒必作之收靨之時還元之後與咽喉口舌之痘迥異此以知其非有形之痘也蓋眼者五臟血氣之精華也痘毒之鬱滯於肌膚者為痛為癤而其留於精華則發為眼患矣其受病也深治之者切不可魯莽躁率責效於數劑之間當從容調治收功於數十劑之後又不可驟用寒涼峻攻其里而疏利其下何則痘後之人元氣虛弱而其毒發露在表又在至高之分若峻用寒涼則既傷其元氣又拂逆其病勢未有不至喪明者且生他病而為患不小又忌用寒涼藥點洗止可用清毒撥翳湯緩緩調之痘後疱白口作渴者脾火也用黃土滾水泡澄清溫服即愈痘後發毒者用三黃為末有水乾灩無水麻油調搽醫方湯頭玄參升麻湯元參酒炒二錢升麻二錢甘草八分牛子炒六分防風六分荊芥六分不用引參歸鹿茸湯方見前灌膿條參耆實表湯炙耆一錢五分人參一錢官桂八分防風八分白芷八分當歸酒洗六分川芎六分厚朴六分桔梗六分木香三分生薑引和平湯方見前發熱條參歸大補湯參耆宜酌量加用人參一錢五分歸身酒洗一錢五分炙耆一錢五分川芎八分桔梗八分楂肉炒八分甘草炙八分紫草茸酒洗六分川樸姜炒六分防風六分白芷六分木香三分生薑引四聖膏真珠法制三分豌豆炙三分發灰三分冰片五釐上藥用油胭脂調成膏拔毒散雄黃二錢胭脂浸水調點疔頭上大連翹飲方見前結痂條綿繭散用生礬末填入出蛾蠶繭內燒令汁盡成灰為末搽之發灰散用少壯無病人亂髮肥皂洗淨焙乾用新瓦罐將發填入罐內瓦片蓋口鹽泥封固用炭火圍罐煅一柱香取出研令極細每用二錢童便七分酒三分調服立止輕者用發灰吹鼻亦止此法不惟痘衄可用凡血症者皆佳清肺湯花粉酒炒五分麥冬去心酒洗五分桔梗五分天冬去心酒洗五分當歸酒洗五分甘草五分酒芩四分酒芍四分知母蜜炙四分丹皮四分上清飲薄荷四分防風四分牛子炒六分甘草四分連翹去心六分桔梗六分酒芩六分黃連酒炒六分花粉酒炒六分麥冬去心酒炒六分粉葛六分生薑引赴筵散薄荷黃柏為細末入青黛少許和勻搽之利咽解毒湯山豆根一錢麥冬去心一錢元參酒炒一錢桔梗一錢牛子炒一錢防風五分甘草五分生薑引玉鎖匙硼砂一錢朴硝五分殭蠶一個冰片五釐上藥為細末以竹管吹之參麥清補湯千金內托散二方俱見前灌膿條導赤散赤苓八分麥冬去心八分車前子四分生地酒洗四分甘草三分人參三分燈心引清毒撥翳湯黃連酒炒五分當歸酒洗五分花粉酒炒五分牛子炒五分草決明五分桔梗五分甘草五分白蒺藜炒去刺五分甘白菊四分密蒙花四分穀精草四分川木賊四分粉葛四分川芎三分羌活三分柴胡三分防風三分薄荷三分生地酒洗三分炒梔三分大便久秘者加熟軍一錢生薑引一劑後大便行動仍去大黃生肌散地骨皮黃連黃柏甘草五倍子共為末干搽之孕婦出痘論凡孕婦出痘熱能動胎胎落則氣血衰敗而不能起發灌漿矣故始終以安胎為主外用細軟之帛緊兜吐上切不可用丁桂燥熱之品及食牛蝨毒物之類以致觸犯其條芩白朮艾葉砂仁之類與痘相宜者採而用之其初發熱則以參蘇飲發之痘既出後則多服安胎飲保之渴者則用人參白朮散加減瀉者則用黃芩湯加四君子湯內加訶子血虛者則以四物湯加托藥色灰白而起發較遲者則用十全大補湯去桂服之總之不問輕重悉以清熱安胎為主更有孕婦出痘正當盛時忽臨正產者勢必氣血俱虛亦只以十全大補湯大補氣血為主虛寒者少加熟附若腹中微痛者此惡露未盡也宜四物湯加乾薑桂心木香黑豆用熟地黃而去芍藥蓋恐寒涼有傷生氣然有當用者酒炒用之若寒戰咬牙腹脹不渴而足冷身熱者此乃脾胃內虛外作假熱也宜參耆桂附木香之類一二劑而愈者吉不愈者凶若孕婦肥胖者則氣居於表而慊於內也人參可多黃耆宜少多加帶殼縮砂切忌脫蒂果子之類至有痘漿收靨忽作泄瀉口渴飲水小便短少其痘胖壯紅潤者此內熱也宜用五苓散內加黃芩芍藥之類若至滑瀉不止食少腹脹而足冷痘色灰白脈細無力者此犯五虛必死之證也凡婦人方產之後或半月左右逢出痘者此無胎孕繫累惟氣血尚虛治宜大補榮衛為主若痘出多者則加連翹黏子之類大便自利者則用肉果炮姜之類余即照常一例而治不必多疑反生他誤至於孕婦出痘在於初出之時胎落者則血氣雖為大虛然熱毒亦因走泄兼之未經起脹灌漿則血氣未曾外耗倘痘非險逆加以大補托裡每多得生至於收靨之時胎落者則毒已出表消散亦多無事但重虛而元氣易脫倍宜補益耳若正當起脹灌漿而胎落者則氣血衰敗內外兩虛既不能逐毒以外出則毒必乘虛而內攻其為不救者多矣黃芩湯治熱痢黃芩炙草芍藥各等分大棗五七枚水煎服妊娠麻疹論妊娠出疹當以四物加減而加條芩艾葉以安胎清熱為主則胎不動而麻疹自出矣然熱毒蒸胎胎多受傷但胎雖傷而母實無恙也蓋疹與痘不同痘宜內實以痘當從外解故胎落熱毒氣乘虛而內攻其母亡疹宜內虛以疹當從內解故胎落熱毒隨胎而下其母存雖然與其胎去而母存孰若子母兩全之為愈也且古人徒知清熱以安胎不思疹未出而即以清熱為事則疹難出而內熱愈深是欲保胎反足以傷胎也宜輕揚表托則疹出而熱自清繼以滋陰清解則於疹於胎兩不相礙不安胎而胎自安矣如疹出不快宜白虎湯合用升麻葛根湯倍加元參牛蒡治之胎氣上衝急用苧根艾葉煎湯磨檳榔服之再以四物湯進之熱甚胎不安服固胎飲數劑如又不愈腹疼腰痠即知胎有必墮之機如胎墮即以產法論治矣升麻葛根湯葛根升麻白芍甘草各等分水一盞煎七分溫服此解表發散之方也表熱壯盛邪之間於表經曰輕可去實故用升麻葛根以疏表所以然者升麻能解疫毒升陽於至陰之下以助發生之氣葛根能解熱毒兼疏榮衛以導起發之機二味之外又加甘草佐之以和在表之氣芍藥佐之以和在裡之榮去其實邪和其榮衛風寒自解麻疹自出固胎飲止痛安胎地黃川芎各五分歸身人參白芍陳皮各一錢白朮土炒黃芩各一錢五分甘草三分黃連黃柏各一分桑上羊兒藤七葉圓者上細切每服二三錢入糯米二十粒水一鍾煎至七分溫服痛加砂仁血虛加阿膠點牛痘法光緒三年丁丑新增西洋種痘論痘瘡之起由來遠矣或云自周或云自漢然總不越乎氤氳化醇當構精結胎時先天之邪火伏於臟腑偶感天時遂行發泄故曰天行天行之來父母之心惕然矣何也以其夭折之多也前人出大智慧創為種痘之法預貯痘痂之純潔堅厚者研而為面於天行未起和風甘雨之時擇嬰兒之無疾病瘡疥疳積等症者以紙筒裝痂末吹其鼻內或用銀簪剔取鮮漿藏於鼻中令其氣息透入於肺同類相招因而泄發天時既正身體又健而且未渴掘井治之於未然慎之於將發刻刻提防事事周匝故十存其九法至善也然不能保其萬全者因肺開竅於鼻肺為華蓋朝百脈而覆臟腑氣一感之則五臟六腑之火一齊併發毒有淺深痘有疏密偶一失調故間有不救非種之之過也夫人不生於空桑自不免乎出痘然天地之大德曰生保合太和默默中常欲胥天下而盡登仁壽彼嬰兒何罪天豈忍故生斯疾以夭折之耶何以天花流行殤者多而壽者寡此非天之特降其災也同一時行耳其中或賦質本虛而適逢癘氣或身當疾病而又遇眚災故痘未出而已伏危機痘一出而即遭夭斃本實先撥傾者覆之固亦事理之常無足怪者然此亦不過十中之一二耳天心仁愛斷不多也其不須治而勿藥有喜者則恆四五略治而即愈者二三因治而後壞者乃竟四五焉而嬰孩遭劫矣此非持論之過刻也試與之平心而論曠觀乎天花盛行之時其闇昧無識貪財射利裝模作樣草菅人命而不知罪孽者無論矣即或淺嘗輒效僥倖成功世所稱嶄然見頭角者亦不過牛羊過眼恪守師傳既不能因人變化而蠖屈之蟲專泥成書又不能隨地遷移求其胸羅萬卷鏡掛秦臺用法而不羈於法治人而不困於人變通盡利神而明之者雖或不乏人然戛戛乎其難之矣此所以全豹未窺垣方難洞過於寒則遏其勃發之機而毒攻於內偏於補則犯乎實實之戒而錮蘊於中甚至以毒攻毒不善其用而潰爛肌膚無賊引賊胡亂而投而本根克伐推其廣絡原野坐失機宜其流弊之禍不至於不斃而斃當生不生爛額焦頭沿街遍巷而不止也嗚呼劫哉賈生所謂可為流涕痛哭者此也然操治者一誤再誤猶復自以為是而諉之於天歸之於命夫天豈任咎耶命豈任咎耶蒼蒼者天蚩蚩者氓亦安能禁此無學無識之徒而不為之戕賊也嗚呼誰生厲階水火刀兵莫甚於此有心者所以俯仰悲懷憫童稚之無辜而籌思乎種痘者又何為得乎萬全之法也而西洋之種痘則萬全矣嘉慶十年西洋𨴜咭唎船載痘種並其國醫咭拿自呂宋航海至粵為人種痘據伊書所載國醫咭拿憫出痘之多災見養牲之家獨不出痘審視其牛身起藍泡疑其為痘挑取其漿用小刀剔起小兒兩臂中央之皮以牛痘之漿裝入於內旋出一顆又將其漿輪流遞種百發百中永不再出云云但查伊書只圖繪種法而未確指出其源故於初種之時人見其與吹鼻異多疑以為怪而不知殊非怪也彼鬼子特未發明其所以然耳夫西洋之法亦猶吹鼻之法也而巧則過之何也吹鼻之法由肺引入挑臂之法亦由肺引入但吹鼻則觸動五臟六腑之火故出痘或多挑臂則於兩臂之中獨取三焦微微動處之穴剔起裝漿經絡皮毛俱屬於肺而傳漿和血又兼入於心內經云諸痛瘡瘍俱屬於心痘為先天邪火伏之於心彼巧莫巧於單刀直入獨提出先天一點心火而余經不動此種以獨出一顆而奏萬全之效也其用牛痘為種者何因牛性屬土毒逢土則解借牛之土性以解痘之火毒耳茲有力之家各捐果金以留其種洵菩提甘露遍滴人間也能留其種固佳倘萬一失傳千萬里遠隔重洋又何能一時飛渡耶顧思醫者意也牛之種可以種人人之種亦可以種牛當天行之時擇痘痂之純淨堅厚者研而為面如人吹鼻種痘之法以種無病少壯之牛得牛之種則可以轉而種人似亦無不可也但當種之之時須按正兩臂中間微微動處即系三焦之穴用筆墨點定然後輕輕用手斜刀挑起纖纖薄皮不可挑破肉上之膜至令血出則是皮毛之下血肉之上中隔一膜內經所謂分肉者此也若不從微微動處點定下針偏左偏右稍遠三焦之穴則不獨不能提出先天心火而痘不出即出後亦復發此非種法之差也特其下手種痘時之謬耳余恐日後轉相傳授差之毫釐謬之千里訛以傳訛必至復出遂譁然謂種法荒謬而置之不議則辜負慈航救世之苦心為大可惜矣因不揣固陋詳為揭焉庶幾芻蕘一得葑菲弗遺於運針之時手如握虎點穴之際部在秋毫則一舉手而仰副上天大生廣生之心一下針而盡遂世間為父為母之願彌天花雨種植無枉折之災遍地慈雲齠齔獲平安之福不傷財不勞民至簡至易萬舉萬全法至善也術至仁也惟願縉紳君子慈淑仁人堅其信焉遠為播焉則廣種福田同登壽域豈不樂哉嘉慶二十年端陽日書於小有清虛精舍南海黃安懷書吳珍儒序濟世之道莫先於醫醫術多途莫險於痘稽種痘之說上古未有自漢代伏波將軍徵武陵蠻從壺中進兵軍中遂染此疾厥後班師毒氣傳入中國諸醫調治皆據內經痛癢瘡瘍屬心火之一言為治痘之要領十損八九及至宋仁宗時丞相王旦初生諸子俱死於痘後老年生一子名素欲為出痘招集天下諸醫有能深明治痘之法及著書立說者重金酬謝諸醫皆言不敢深明於痘川人聞其求醫甚殷乃為延請天姥仙娘現身說法取痘苗絮於鼻孔旬日之外告厥成功嗣是相傳三橋善女痘症日漸通行然或有感天氣而發者或有取苗吹入鼻孔而發者順則易治逆則難醫甚至憑於危亡而勿可救藥俾天下赤子罹此害者不可勝計儒竊憫之壬午冬清邑族君天池延嘉禾邑庠生李翹楚為孫童種痘適儒醫業是邑聞其術不勞而效甚大一日邀遊界溪市寓聚談之次論及此事始云揀選佳苗剔取鮮漿披點人身兩臂消爍夾白清冷淵穴所按日期與吹鼻無異尋其源則來自西洋傳自邱熹效捷功深名公鉅卿多有投贈族戚好善諸公以儒習此宜廣行其術儒懷疑觀望而不敢妄進焉癸未春清邑點種通行因再為之反復詳觀果於所刺之處紅暈鮮活墳起如痘以痘證書果如其言種種吹染全無復出夫乃嘆荷聖天子洪休引外洋之奇方傳留中國躋人生於壽域矣於是謀之族君恭寅同學是術傳點千百小兒俱有真驗第慮版存東粵路途迢遙題詠方書難於傳遍今幸本省大人深仁厚澤愛民如子刊版通行將千載流傳永為萬民攸賴敢不捧稿恭呈而詳為之序衡山吳珍儒驗方新編原刊堅信點牛痘說人誰不愛兒女愛兒女誰不慮其出痘一事要過了這個關頭方算得是自己兒女今有種洋痘一法不避風不禁口行所無事萬無一失豈大不好奈何猶不能盛行只是人不能堅信怕出了洋痘遇著天行痘子又會復染夫廣東行此近三十年予所問廣東人多矣皆從未有復發者廣東三十年來所生之人在外省仕宦商賈者不少未聞有再染天行痘子者就是湘潭雖未盛行前三四年也有數十家出洋痘何曾再梁天行痘子來且今年有幾家出了洋痘信不的確又吹苗試之並不復出此亦實實信得過了或謂種洋痘者過十年當復出果爾則十年一回百年不過十回穩穩當當也不費力況乎必無此理也試想他從兩臂點苗略刺皮膚微見血點到次日已無形跡了若不是直達臟腑如何過了三四日方見紅影又三日長水三日灌漿三日結痂如期不爽與吹苗一般長得晶圓飽滿比吹苗之痘更好看些蓋先天之毒蘊於無形以氣引氣而痘出焉吹苗是以氣引氣點苗也是以氣引氣為何獨信吹苗而不信點苗乎但點痘之家主人必須留心其結痂之後痂是尖頂斜腳則毒氣未出必要再點方能算得即不尖頂斜腳而當長水灌漿時小兒氣血不足或有泄瀉之病不能長到飽滿毒氣須出而未盡出必須重服耆術等藥補脾助氣使他長得十分飽滿方好誠恐本要再點而主人自以為算得過了業痘科者亦照管不到則萬中或有一二復出者蓋此法原有引至兩次三次之說不可顢頇了事也或因本要再點未及再點遇天行痘或又複雜則人皆藉口更無復有信之者矣豈不大可惜哉予考醫書中載嬰兒生數日刺出臂上汙血終身可免出痘一條後穴道刀法皆失傳今之點痘或其遺法也夫以萬全之法失傳已久而今復行者大約前此劫數未滿而今日洋菸入中國害人不可勝計把那劫數抵過了故此法亦從洋來得以保全嬰兒之年壽耳若不堅信而遵行之是違天而自外於生生之理矣予家中今年點牛痘者十餘人目擊其事深察其所以然堅信不疑何忍秘而不宣欲以堅天下人之信廣為流傳俾天下之嬰孩從茲同登仁壽之宇也敢以俚淺之詞為堅信點牛痘說云按牛痘之術道光丁亥行之吾鄉全活嬰孩甚眾吳子獻廷其術尤精所點不下數千人以吾親友所見所聞二十年來從無一復出者誠保赤之妙手也賀熙齡序茶陵茂才譚子服思得種牛痘之法試之應手輒效余聞其名廷至家為兩兒子引痘其法不吹鼻而挑臂出不過五六粒飲食如常風雨無忌不數日而平復若行所無事者而且此後永不再發蓋其術之神而藝之巧如此也夫痘之為患至烈矣自有吹鼻之法以較天行之痘鮮有敗事然猶不能保其萬全今譚子精於此藝且將廣其傳是天之慈愛斯民而使嬰兒盡登仁壽之域也豈不休哉若其法之由來與法之所以微妙之故則溫黃法君言之詳矣故不復贅道光癸已孟春善化賀熙齡引痘略詩肘後占牛掣新方妙入神簡如棼引乙捷似火傳薪省識金環夢全回繡褓春散花天女手邂逅見斯人大中丞吳榮光題唐方煦敘古無點痘法也自南海邱浩川得洋醫之傳而其法始盛行於世往余在京師見引痘新書所載引泄諸說與世所行吹鼻法迥異心竊疑焉隨見士大夫家出痘率用此法因囑業是術者至宅中按其部位種之時都下天行驟發害最烈點痘之家卒無患而余向之疑者始信爰爰是書歸里擬廣其傳未果歲壬午昆陵譚君服思以名諸生走粵東盡得其傳率其徒楊煦生王月川鄧復享至省垣依法引種顏其局曰體仁而事屬創聞信之得鮮因為白諸同人行之而驗者無算竊謂是舉也有三善焉順其自然小兒不以種痘為苦一也種後即不復發得遂為父為母之願二也不計利不假方藥於無力之家尤便三也三者合而保嬰之方濟世之道孰加於此哉今年春諸君重刊邱氏書而問序於余余喜此事之信而有徵且韙其行義之勇為能公善於人也遂書以贈之道光癸已仲春育庵氏唐方煦敘溫汝適題自盧扁不世出善攝生者多持勿藥之說然必慎之於未病斯能百不失一余曩在京師見安徽人來北方種痘詢其苗則來自江南多能獲效心已奇之及歸里晤南海邱君浩川其法更捷云嘉慶初元外洋醫者試於嬰兒臂上依穴法挑破見膜而止用薄刀取牛痘之漿敷之不數日即出數顆如期收效永不再出嗣是以人傳人如火之傳薪無不應手而愈嘉慶十年逾重洋到粵欲傳其術人未之信獨邱君詢得其詳驗之果效遂傳其方活人無算時方伯曾公學使傅公先後延至署中並奏效如神方伯取羲經勿藥有喜四言書匾以贈傅公亦賦詩贈之一時名流題詠幾遍余觀本草綱目見其稀痘方用白牛蝨以此蝨僕緣牛身食飽自墜之能稀痘即取其中有牛血耳牛蝨尚能稀痘則牛痘必稀用其苗以種宜茯十全之效理有固然無足怪者是中國人已發其端而外洋人專心致志觸類引伸亦其一長也用能順其自然不假方藥無小無大無有恐怖豈非補名醫之未備為活嬰之妙術而能百不失一者耶余嘉邱君之志故備書之以告來者嘉慶丁丑仲冬順德溫汝適題邱熹浩序順造物之生成易補天地之缺憾難嬰兒之忠天花十損二三甚者不存五六古之醫者惟持其毒之既發而治之宋以來始有取痘苗絮於鼻孔一法後人效之可謂善於所感事捷而功巨矣然猶失十一二於千百未能操券而十全也我聖朝德化涵儒躋民仁壽薄海內外懾慓偕來嘉慶元年外洋醫人憫其國中嬰兒遽遭此厄盡心講求得牛痘之法於毒之未發先行引之不擇天時不煩禁忌不延醫不有藥以此流傳鄰近諸國如響斯應迨嘉慶十年四月由小呂宋舟載嬰兒遞傳其種以至澳門予時以賈在澳聞其事捷不勞而取效甚大也以身試之其法果驗泊行之家人戚友亦無不驗者於是洋行好善諸君以予悉此囑於會館專司其事歷十數寒暑凡問途接踵而至者累百盈千無有損失夫嬰兒之無不出痘者天也治之有效有不效者人也嘗恭讀御纂醫宗金鑑云正痘感於得病之後而種痘則施於未病之先正痘治於成病之時而種痘則調於無病之日既無諸症夾雜於其中復有善方引導於其外然則牛痘之理原包於種痘諸法之中雖種之法有不同而其為善方引導於外則一也予素不知醫亦未嘗以此取人絲毫之利其所以力行此者則以出痘者人所同患慈幼者人有同情苟可以去險履平避危就安少可有濟於人何敢或懈於已第念足不出國門行不離鄉曲而痘之患處處有之此法予既得之最先行之無誤何妨筆之於書爰取其法之歷驗者條述之並繪為圖以質諸世仁人君子知有此法相與講明而流布之俾嬰兒不罹天花之厄共嬉遊於光天化日中也不亦慈幼者之所同快哉嘉慶丁丑仲冬朔南海邱熹浩川氏識手少陽三焦經圖此圖按銅人圖尺寸孩兒大小不等宜因此類推種牛痘穴分圖種痘刀式此刀鋒宜尖薄利約長寸許外用玳瑁殼藏護取痘漿象牙小簪式此象牙小簪約長寸許兩頭宜尖利執刀式引痘略引痘說痘何以曰牛也痘之種自牛來也外洋向無此疾後由他處傳染患亦滋多惟畜牛取乳之家獨不沾染醫人慾窮其故見牛乳旁有青藍小疱形與痘類因悟牛之患痘必輕以之傳人必然無害於是按古針刺法取牛痘之漿種人兩臂消爍清冷淵二穴旬日果於所刺之處隨出數顆按日灌水按日滿漿按日結痂落靨無一損傷無一復出蓋牛土畜也人之脾屬土以土引土同氣相感同類相生故能取效若此痘種自牛而來故曰痘也其曰引何也曰痘之為毒受於先天感於時氣散於經絡男女交感之會先天胎毒既有淺深感時行之氣復有善惡而散於經絡分配五臟又有輕重正痘有發熱即現點者最險之症腎經之毒也由腎而肝而心而肺而脾傳經最多其症亦遞減故痘之發毒腎最重脾最輕按古痘苗塞鼻孔法亦必五臟傳遍始能發熱緣鼻者肺之外竅也苗塞鼻中其氣先傳於肺肺主皮毛肺傳於心心主血脈心傳於脾脾主肌肉脾傳於肝肝主筋肝傳於腎腎主骨痘毒藏骨髓之內感苗氣而發其毒自骨髓盡達於筋腎臟之毒解矣自筋盡達於肌肉肝臟之毒解矣自肌肉盡達於血脈脾臟之毒解矣自血脈盡達於皮毛心臟之毒解矣自皮毛盡達於顆粒肺臟之毒解矣苗氣必歷五臟層遞而入內毒亦必歷五臟層遞而出此傳送之次序也今種牛痘法擇於兩臂中消爍清冷淵二穴上下交連之處種之似與塞鼻孔法有異殊不知二穴部位乃手少陽三焦經也三焦者人身最關要之腑如天地之三元總領五臟六腑營衛經絡通內外左右上下之氣三焦通則內外左右上下皆通得其關要之處引之直從皮毛血脈肌肉筋絡同時直傳而入使縱有胎毒深藏於腎亦自然同時引其端緒則無棼亂之憂金鑑所謂引其毒於未發之先者即此意張遜玉種痘新書所謂以佳苗而引胎毒斯毒不橫而症自順者亦此意故凡種痘皆用引法而欲引毒從三焦經而出則惟牛痘之法為最良也痘為小兒一大病當天行時人人尚思遠避今無故取嬰孩而與之以病可乎曰非也譬之捕盜乘其羽翼未成就而擒之甚易矣譬之去莠及其滋曼未延芟而除之甚易矣人家小兒出痘如遇險症延醫服藥舉家日夕守視多少酸辛問卜求神多少驚恐其輕者亦須多方調護今牛痘則止種四顆或六顆一兒嬉笑飲食一切如常旬日之外告厥成功無災無害不惟小兒省卻疾苦即育子者亦省卻憂勞法誠善也或問種牛痘有死者否曰斷無致死之理予少時未出天花詳醫為予種時年三十二歲今已十有三年矣經予手所種小兒不下萬千皆根基長養以至娶妻生子不能悉數即如南城賓谷曾大中丞年近六旬艱於得嗣前開藩吾粵時舉一子命予為種痘隨手奏效蒙贈以勿藥有喜四字扁額其他所種萬無一失人所共知若非身試無誤敢以人為戲乎首在留養苗漿牛痘法全在養苗此苗始自外洋嗣後以人傳人貴乎連綿不絕予既於洋行會館設局夏月以八日為一期春秋冬以九日為期周而復始來種者風雨勿改而洋行好善諸公復醵金生息自四月至九月來種者酌以果金與取漿之人其所以設果金者蓋當盛夏溽暑之時即平日深信者亦多拘執而不肯來痘不種則漿無從取漿不取則苗無以繼今既設果金俾來者孩童既獲安全而貧乏者亦不無小補於是種痘者源源而來而佳苗乃綿綿弗絕行之既之人咸知牛痘之法雖盛暑亦無礙矣次在認識瘋疾父母愛子之心人人皆同粵東地勢卑濕不無瘋疾來求種痘者恐一同混雜誤取其漿傳之無疾小兒為害不淺以此告知洋行諸公呈請有司派令養濟院認識瘋疾之人具結存案逢期到局伺候凡來者先令認過然後取苗自無貽誤引泄法其法不論春夏秋冬隨時皆可不揀天氣不擇良辰不避風不禁忌不分男女不拘大小自小兒生百日後但現在無瘡癩無瘰癧無胎毒及皮膚血熱疳積諸疾病便可隨時引種牛痘灌漿滿足總在八九日故種痘之期大都以八九日為率太早則漿無力太遲則苗老無功至期於先一期所種漿水滿足之孩童擇其痘頂不尖腳不斜不皺不黃不暗不破要如紅線圍纏收束緊實色若珍珠寶光者又察此童現在無瘡癩瘰癧胎毒皮膚血熱疳積疾病等症者是謂佳苗若其痘色淡白暗而無寶光頂雖平而腳斜似松中央無一點焦硬者不宜用苗既佳矣取苗時用刀尖向其痘面四圍輕輕剔破將痘面中央一點焦硬小靨微揭其漿清亮者可用若見漿水濁白或黃即使刀尖兩三次點去濁漿俟其流出清漿如圓珠粒粒不流散者為貴好漿一粒可種數人種痘時孩童衣衫兩袖卷貼膊上用小繩橫穿兩袖結束緊緊令其臂露出雖寒天不忌男先左女先右種痘種左手執定孩童之臂勿令伸縮右手將刀尖點取佳苗向兩臂消爍清冷淵穴每臂每穴各種一顆如孩童年至八九歲以上日啗腥膩五味恐或有後天之毒則於兩穴上下相連之處中間更各種一顆不宜出四顆六顆數外其刺法用刀不宜直豎宜輕巧將點苗刀尖輕輕平刺皮膜如一紙之薄刺處約寬一分以微見血為度將刀尖之漿輾轉抆拭同其微血注於所刺穴中使漿與血調和其氣達於三焦之經自然取效斷不宜手重恐深刺入肉出血咯多反將苗漿帶出不能成功如法種畢其兩臂微血勿披衣衫拭去其拭去可將漿苗補種原處俟血點既干徐將衣衫垂下不必用綢包裹束扎反令血氣不行貼身之衣宜用柔軟絲綢若衣服漿洗粗硬者恐致擦損度苗法按期取鮮漿種痘以人傳人固妙但只可施之近處若遠處難取鮮漿可尋佳苗之靨如前式者缸藏密封帶在身旁日夜不離可以留十日半月倘不能即用逢痘期之日將其靨背鋪在鮮漿之上使其氣息沾潤或用刀尖沾鮮漿抹過靨背亦可凡用靨時取備人乳少許將刀尖刮取靨中之肉即痘痂向肉一面膿所結成者放於瓷器面上以人乳滴入令其濕潤然後用刀尖研刮乳漿照法刺於臂上此特為路遠不能取鮮漿而言即痘靨亦可取效又有干苗法將象牙小簪兩枝各就滿漿之孩童痘上兩三次沾取痘漿俟其幹了藏於鵝毛筒內用蠟密封可留三兩日用時取備清水一碗煎滾以象簪在滾水氣上熏潤互相刮浮其漿推聚干簪尖上即用刀如前法刺破孩童皮膜隨將簪插入所破皮膜孔里輾轉略為搖動得其微血洗此漿於肌膚內亦可或將有漿之簪插入滾水內立即提起搖去滾水如法用之但干苗有引出有引不出者不如用痘靨更不如用鮮漿得氣較全自然之理也出痘時宜辨自刺引之後並不發熱起初三日所刺處常如蟻咬然至第三四日始露形影發出痘尖頂脫血跡第五六日起如小疱周圍灌水第六七日水足灌漿微微覺癢第八九日灌漿滿足兩腋底微痛略似結核頭額掌心俱見微熱此周身毒由此出毒發則火動正要其元陽運化也其痘灌漿滿足有如綠豆大又如白豆大者第九日十日腳外紅暈隨散微熱必退漿轉黃蠟色先從痘心焦硬處變蒼而結靨半月之外靨落有疤其靨光澤堅厚卷邊如小香菰樣細看疤內更有幾點小疤居其中此種情形齊備可以告成功矣予身曾親歷故知之更詳天行之痘醫家先論成色牛痘則須分真假凡痘頂平而不尖腳收束緊實色如珍珠寶光中央一點焦硬根腳如有紅線圍纏痘腳外有紅暈如先天毒重始有紅暈毒輕則無如此者乃真痘也無水無漿無紅線腳或有灌水而不上漿或灌漿如黃白膿者其痘頂尖而不平腳斜散而皺不收束色淡白暗而無寶光靨黃而薄又有中央厚而邊薄者此假痘也真痘既出之後天行永不復出即再引之亦無復出者假痘仍要再種恐其遇天行復出務須於此等處辨清而種痘之小兒至灌漿後亦必須請原種痘之人看過方保無誤天行之痘必由五臟一經而發牛痘亦然間有夜睡略驚搐略煩躁者主心經也有略多眼眵者主肝經也有略作渴略作悶嘔及泄瀉者主脾經也有略咳嗽及噴嚏者主肺經也有夜睡齕牙者主腎經也何以既走五經而不用服藥哉蓋引之則症輕所謂毒不橫而症自順也種牛痘宜趁天行未到之先引泄更佳誠恐孩童沾了天行氣息引泄適逢其時則有出天行而不出牛痘者亦有天行與牛痘並出者如播種之日即晚或次日發熱此乃天行在先非牛痘發作否則系夾感冒別症自須延醫診視恐有射利之徒自作聰明竟將天行痘漿與人刺引及遇發時渾身俱出先天毒輕者出痘少尚無妨礙毒重者出痘必多更須醫治若依牛痘之法以所種之痘苗種人則引一顆即出一顆斷無多出之理種此穴即出此穴亦無橫出別外之理種痘家宜致謹焉牛痘固無多出之理亦有四顆六顆不能出全者乎曰有有將奈何曰無傷也假如兩臂各出一顆則泄引已均可無後慮或止一臂種出或獨出一顆其毒已發十數年來亦未見有再出者然或慮引泄未清恐有後患則須俟其元氣既復一年半年之後再補種一次更為細密然彼時毒氣已輕即或種出必不如初次之形象矣又有八九日灌漿如藍紫色此係胎毒極深亦必須次年補種更有種一次一顆不出至種第三次始出者此非引泄不驗良由小兒先天毒氣太盛根深蒂固一時難於引拔尤須隨期複種倘不再引恐毒已微動不得其苗引發必須惹出天花雖有痘科醫治亦無牛痘之從容自在也余所見不一為父母者不可自誤憶盧澹庵農部囑予為其子女數人齊種獨其少君連種三次不出隔年餘天行時出痘症不出則吾見亦僅矣種痘之初四五日宜食火腿臘鴨瘦豬肉鮮魚素菜豆腐冬筍芫荽荸薺甘蔗清湯粥飯一切清淡各物肚瀉則不宜食魚腥灌漿後亦不宜食芫荽冬筍及豆腐甘蔗荸薺諸涼物到灌水時觀其似弱則稍食鮮蝦鮮蟹催助漿水壯旺者不食亦可忌食生雞鯉魚牛肉誤食恐痘破成坑不能合口又恐結痂後痂旁紅腫如類痘疱及一切煎炒熱毒麵食凝滯之物放苗之初太酸太鹹各物不宜食豆腐食多亦恐致癢出痘後須知種痘後斷不再出間有出者名曰小痘非真痘也猶之天花之後亦有水痘必先發熱一兩日然後發出仍亦灌水其中或有數顆略大亦似灌漿痘腳亦似有淡淡紅線但六七日必結靨靨薄如紙萬無妨礙幸勿誤聽人言認為再出其有先天毒盛發泄未清出麻疹時必密延醫用一二發表之劑疏解之即安然無事間有痘後即出麻疹等類亦須延醫治之非恐大礙特要孩童不致辛苦耳又間有結痂後臂上痘痂之旁紅腫略類痘疱此固萬中無一宜用豆心渣即豆腐渣或三豆散紫花地丁芙蓉膏四圍敷之留頂勿敷使其毒由頂出憶予所種惟常博何公夢谿少君又本坊崔渭生令媛及中協兵弁張耀清之孫有此按藥治之無不立效十數年來種小兒以萬計所見者僅三人此外不復有矣或腠理氣血凝結致枝節生瘡用棉繭散敷之即愈無論諸瘡如濕爛用金華散糝之瘡干則以豬油調敷若生瘢癬燒乾陳牛糞敷之或問天花忌抓破此獨不忌何也予曰此原是針刺法毒以刺而引出刺且不妨抓破何害又問取鮮漿時於取漿之小兒有妨礙否曰予已試驗諸千萬人俱未見其有妨礙也其所以疑有妨礙者緣種痘之人見有好痘捏破痘漿盜以作種其取漿之時或手力太重或捏入太深或漿水未灌滿而取之非其時或筋脈有關而取之非其處如是則或致有礙耳若牛痘之法則不然俟其八九日灌漿滿足輕輕點取於己無損於人有益何樂而不為乎蓋痘之患在毒痘漿既滿則毒已盡泄取之得法斷然無礙且予之行此亦不過以善方濟人耳若損此而益彼即予亦不肯為也遇有抓破者系在第七日以前仍必灌復漿水如在八九日以後則不能灌復然其毒已引動泄破亦無妨礙或有隨而結痂者倘成膿不幹用武夷茶煎濃洗之或黃豆皮煎水洗之或胭脂膏鯽魚膏蠟梅油貼之皆可若成膿而不能合口用生肌散糝之外洋原有藥水藥膏治此立效因不能常得故不錄以上各條皆予所親試而立效者引無不出出無不佳不患後災不憂復發以醫痘至難之事今變而為至易莫非上蒼愛憐赤子有意使然夫父母之於子未有不欲其以生以長以至成人顧聽其自出天花症有險易醫有賢愚懸懸莫必孰若趁其毒之未發引而出之不費一錢不受一嚇何等放心何等快意耶所願為父母者深信勿疑同志者廣為傳布此則予之厚望亦凡為父母者所厚望也夫方藥治痘損破膿水不止棉繭散取出蠶蛾繭不拘多少將生明礬為末填入繭內燒煅成灰研為細末糝之其水自干或用甘草水浸過其灰俟干復研為末糝之其性更醇又方每繭入明礬五分煅過其礬一兩加配陀僧五錢白芷一錢為末以蜜調敷卷舒散綠豆一兩茶葉五錢雄黃三分冰片二分共為細末如痘干用芙蓉花油或臘梅花油調搽若痘濕則用末糝之又方松花粉二錢黃丹一錢研勻糝之又方用武夷茶煎濃水洗清膿拭乾以京都胭脂膏貼之或用鯽魚膏貼之或用蠟梅花油潤紙貼之亦可治痘潰爛灰草散荔枝殼微燎存性草紙燒灰存性多年陳茅草曬乾三味共為細末糝於爛處即收水結痂白龍散用陳久干牛糞燒過取中間白者研末敷之豆灰散黃豆燒灰研為細末糝之治痘潰爛流血不止敗毒散取多年蓋牆屋之爛草或稻草洗淨泥垢曬乾為末此久經風霜雨露之滋而感天地陰陽之氣善解瘡毒收濕氣也治痘破成坑不能合口生肌散黃連二錢黃柏二錢甘草三錢以上俱生用地骨皮二錢五倍子二錢枯礬二錢共為細末糝之治痘後諸瘡金華散黃連黃柏黃芩黃丹大黃以上生用輕粉各等分麝香少許共為細末瘡干則用豬油調敷濕則糝之治痘疔拔毒膏雄黃輕粉共為細末用胭脂水調敷治痘風癬黃豆衣殼煎水洗之自散治餘毒紅腫凡敷藥皆留頂勿敷使其毒由頂出以下皆同三豆散綠豆黑小豆赤小豆共為末調醋敷之或以七夕水調敷又方用豆腐渣敷患處又方口嚼爛白豆敷之又方用紫花地丁搗爛外敷任無名腫毒無有不退芙蓉膏用芙蓉花或葉或皮或根俱可花更佳黃荊子各等分共搗爛用雞蛋白調敷兩三次立效必勝膏馬齒莧搗汁豬膏蜜糖共熬膏敷之如意膏南星八錢半夏一兩大黃一兩以上俱生用白芷五錢鬱金五錢薑黃五錢蒼朮五錢共為末用醋調敷又方黃豆薑蔥共搗敷之亦消周景明識南海邱浩川先生牛痘一法自西洋傳中夏行之而驗者不可更僕數余曩聞其術而以為未獲見其書為憾歲戊子負笈麓山始得其書於吳君葆元以呈歐陽坦齋夫子夫子善之於是同硯諸友咸踴躍醵金樓版以廣其傳其書原有諸名公題詠約數千百言皆身受其益而贊其妙者茲因簡帙太繁未及備錄第即其圖說方法刊焉余惟世之苦痘久矣吹鼻之法往往得失參半而是書乃計出萬全轉難為易轉危為安誠發千古未發之蘊而有以躋一世之嬰孩於仁壽之域也遵而行之是所望於慈幼者道光八年歲在戊子七月既望衡山周景明春臺氏識於嶽麓書院之居業齋引痘撮要痘科之流傳久矣自昔遵用鼻苗由肺傳肝及脾腎相攻相伐逆傳命門攻出先天伏毒毒因逆攻而出發無定處設遇矇頭鎖項纏腰以致變症叢生調治不善在在驚其險巇近有西洋傳漿新法點於兩臂以兩臂消爍諸穴屬手少陽三焦故漿自少陽傳膽相引相導順傳命門引出先天伏毒毒隨順引而出發於兩臂按日亮水灌漿結痂所以症無煩雜獲效不勞人人安於磐石洵保赤萬全之善術也此法留傳中夏今師其術而行之者日益廣僕閱歷斯道有年頗於其理有得細考引痘略書晦而不顯但國師邱君原繪點痘之圖雖指明其所當然尚未透發其所以然故後之學者點法不一不能無訛傳之弊然此道以審穴為要著不得其審穴之法其何以行之無誤耶按宋詔命明醫所鑄銅人明堂之圖穴有至當不易之理其理固不可強不知以為知又何可秘所知而不冀人以共知於是謹遵針灸大成御纂醫宗金鑑錄集同身寸法銅人背面兩圖鐫刻於後俾有志斯道者閱圖知臟腑之分別按經知穴分之所在既辨其所當然復深究其所以然由是尋經審穴傳點得法不致有毫釐之謬此不惟精明其術之可嘉實保全嬰赤之功甚大也豈非僕之所深幸也哉醴陵黃之檀齡馨氏識並點痘穴法附載於後中指同身寸法宋鑄銅人七尺六寸四分按指五分為度實則身長三尺八寸二分至今點痘論男左女右手中指與大指相屈如環取內側紋兩角為一寸各隨長短量度再加精細無論老幼手臂肩至肘長各為一尺七寸以一歸七除扣算兼中指互考比量未有穴不妥當銅人面圖手太陰肺經中府至少商手厥陰心包天池至中衝手少陰心經極泉至少衝足少陰腎經湧泉至俞府足太陰脾經隱白至大包足厥陰肝經大敦至期門銅人背圖手陽明大腸商陽至迎香手少陽三焦關衝至耳門手太陽小腸少澤至聽官足太陽膀胱睛明至至陰足陽明胃經頭維至厲兌足少陽膽經瞳子至竅陰手少陽三焦經起於關衝終於耳門共二十三穴內錄三穴點苗余穴不點故不錄其餘十四經十五絡小穴多亦不全錄消爍肩下臂外間腋斜肘分下又云分肉間此穴雖無寸法總須審其的是清冷淵肘上二寸伸肘舉臂取之但人有大小肥瘦之分其間不可以不辨四瀆肘前五寸扳肩取之然取之更捷非顯而易識以上所載穴分雖屬明白然亦僅指其所當然而其中之所以然尤必經口授乃更得其穴之真的庶點種不致有誤邇來醫家業是術者最宜慎之按經取穴論人身一十二經氣血陰陽攸分按經點痘獨點少陽三焦經者何備要云少陽主氣諸藥入膽經氣分者併入三焦惟點兩臂三穴蓋取配合上中下三焦其理最妙內經曰上焦如霧氣之源也點消爍上配膻中中焦如漚血之源也點冷淵中配胃脘下焦如瀆水之源也點四瀆下配丹田丹田即命門也總之不離乎三焦者是故易曰仰觀於天其星辰之奠麗不如凡幾而其要則以七宿為經二十四曜為緯俯察於地其山川之流峙又不如凡幾而其要則以五嶽為宗四瀆為委天地且然人身何獨不然細考其法甚善理的無疑洵保萬全之良方也毋庸予贅西洋點痘推原說人身背脊十四椎下名為命門為督脈之穴前與臍對臍下丹田為三焦之募穴分與命門相表裡命門為生氣之門出而治臍下分三歧上衝夾臍過天樞上至膻中兩乳間元氣所繫焉三焦有臟無腑上焦在胃上口治在膻中中焦在胃管治在臍旁下焦在臍下膀胱上口治在臍三焦命門原一氣相貫通者也故經曰元氣者三焦之使李瀕湖曰三焦即命門之用王海藏曰三焦命門為一府其脈同診以是觀之三焦命門真相須而為用者也點痘家故點自三焦之穴其初藉三焦而引入命門其後由命門而轉達三焦理確而當法奇而便若審穴的實則較穩吹苗家萬萬矣大清道光十七年歲次丁酉夏四月醴陵圖南子識按是書所稱引種萬人並無再出天花之患固非虛語然近亦間或千人中有一復出者吹苗家即肆詆譭謂其術不足憑嬰兒父母雖明知牛痘甚便猶未敢以輕試也抑知千中間或有一復出者其弊非由於立法之不密實由於奉行之不善以邇來業牛痘者粗心浮氣偶爾刺穴稍偏致胎毒未能出盡後又不為之再引所誤也近得復引一法最為穩妥凡小兒引痘一次後或逾數月或至下年復引一次如仍上漿結痂者尚須再引總以傳漿後越三宿而刺處微見紅盤再過二三日而紅盤自退並不起頂上漿者為胎毒已盡之證此後雖遇自行天花永不沾染矣
