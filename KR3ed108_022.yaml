body:
  text: 卷二十二痧症刪訂痧書序古無痧字本作沙俗或作痧又作痧痧無專書雖古有絞腸痧乾霍亂青筋白虎中惡等症治而禁忌未明剖析未盡千古如在暗室醫家托為怪症稍知推拿焠刮者又禁人服藥迷誤就斃可勝悼哉康熙初林藥樵始以痧書授王養吾丙寅刻晰微補化全書未廣流傳乾隆丙午江寧有重梓施送者沈氏尊生書亦已收入而見者卒鮮爰為刪纂開雕較原書詞理簡淨視沈刻眉目清疏中有疊出數見者便於倉猝檢閱對症施治毋嫌煩複也方名原取六十四卦今改八音分紀省字數易記查耳家置一冊庶幾識所忌宜無誤身命倘有同志益廣其傳可也嘉慶三年歲次戊午泰興何汾丹流氏志附原書正誤一條醫家不信有痧頭痛則用紫蘇麻黃髮汗腹痛則用木香枳實溫中不語直視則認為陰症而用桂附乾薑卒倒脈伏認為中風而用牛黃蘇合小兒則誤作驚風痘症婦人則誤為經阻血凝立刻殺人可勝惜哉人只知絞腸痛是痧不知有下肚疼而種種雜症之兼現疑似之間必當詳究也原敘節錄吾師林姓其先閩人諱森號藥樵自號深山野人性韜晦有山水癖佳句妙楷時與邱壑爭奇一日遇於荊溪之南嶽拂石對語片晌投洽徐而叩之凡天文術數地理方藥無不精貫予追隨不忍釋野人曰偉男子立身行己豈得虛生於天地必將世上人維持調護所貴一點真心耳出痧書一冊付予曰子知醫是書不道人所已言不經人所已試持此以往可與古人頡頏霄漢間矣既又授我手法予復綜覈古今即所聞見編成是書幸得張子一庵詳加訂繹紫崖詹子概為梓傳二十年來始得相與有成以廣野人之惠澤豈偶然哉康熙丙寅養吾山人王凱偉仙志續著刮痧辨並添刻痧藥方及扯痧法序余刻痧症全書前已印刷於千部送人人得其書者依法治療效驗甚速諒君諸亦有所聞無如間有識字不多之人將刮字認作割字竟任意用刀在病人手足彎割裂殊不知刮者系用光圓無破損之清銅錢一文或用香油在手足彎上拍濕或用涼水在手足彎上拍濕然後將錢在手足彎上輕輕刮之如果是痧略刮一二十下必有紫黑點現於皮上則痧氣已出如病仍不減則是痧毒太深即用瓷鋒在黑點上將皮略為刺破一點放出黑血則病必松並不用刀也查書內並無痧藥統治方及扯痧法茲施鐵珊兄贈余消劫警世編內有痧藥妙香方又三弟卿臣寄到所敘扯痧法特一併刻入並再印千部以廣其傳是書治病甚多伏望得是書者存濟世活人之心平時實力講求臨時對症發藥其有操刀妄割者尤宜善刀而藏免增余之罪戾也同治三年三月初九日退一步想齋主人又識痧藥妙香丸蘇合香一兩如無以藿香代之曬乾不見火硃砂四錢水飛紫厚朴五錢紫河車三錢白麵調裹火煨熟去面真麝香七分半川貝母五分去心曬蠶砂一兩紫蘇葉五錢白滑石七錢五分水飛製半夏五錢橘紅二錢五分赤茯苓二錢五分青皮二錢五分茅山蒼朮二錢五分米泔水浸生甘草一錢五分枳殼二錢五分麩炒粳米粉三兩明雄黃二錢五分水飛淨上藥研為細末用生薑蔥各四兩取汁去渣和粳米粉為丸綠豆大用瓷瓶收貯勿令泄氣痧重者九丸輕者七丸陰陽水吞服孕婦忌服配藥宜用歷載天醫天德吉日麝香宜在大藥行買真時丸時務將各藥末放在擂缽內擂數千下庶幾擂勻然後用蔥薑汁和粳米粉入藥末內揉搓許久使米粉與藥末配合均勻乾溼相宜趕成細條捻綠豆大丸子捻至二百丸即放碗內另備硃砂末為衣用碟蓋住碗口雙手轉搖及丸子捻完夥入一碗多多轉搖搖至丸干如鐵沙子之堅為度扯痧法南方秋夏痧症最多曾見人猝病扯痧不藥立愈其法用水拍濕結喉及兩邊即大迎穴皮上兩手臂彎即曲澤穴在腕中皮上兩腿彎即委中穴皮上將食指中指拳曲夾著結核等處皮上用力揪扯一二十下則痧氣發現皮上露出黑紫顏色若是毒重則皮上必有黑紫點或有黑紫高起一道須用瓷鋒尖在黑紫處輕輕刺破浮皮即流出黑血而愈至於結喉及結喉兩邊萬不可用瓷鐸刺也此外治易知易行之法必有益無損與痧藥均便於行路之人蓋一面吞藥一面自己換手扯痧立即見效較之針灸諸方既簡便而且穩當願仁人君子留心焉痧原大略第一先吐瀉而心腹絞痛者其痧從穢氣發者多先心腹絞痛而吐瀉者從暑氣發者多心胸昏悶痰涎膠結從傷伏熱發者多遍身腫脹疼痛四肢不舉舌強不言從寒氣水過時郁為火毒而發者多痧無補法第二痧者厲氣也入氣分則作腫作脹入血分則為蓄為瘀遇食積痰火則氣阻血滯最忌熱湯熱酒不論犯者虛實皆以有餘治絕無補法用藥克削病自當之中病即已分經絡第三腰背顛頂連及風府脹痛難忍足太陽膀胱經痧兩目赤腫唇乾鼻燥腹中絞痛足陽明胃經痧脅肋腫脹痛連兩耳足少陽膽經痧腹脹板痛不能屈伸四肢無力泄瀉不已足太陰脾經痧心胸吊痛身重難移作腫作脹足厥陰肝經痧痛連腰腎外腎也小腹脹硬足少陰腎經痧咳嗽聲啞氣逆發嗆手太陰肺經痧半身疼痛麻木左足不能屈伸手太陽小腸經痧半身脹痛廢俯仰右足不能屈伸手陽明大腸經痧病重昏沉或狂言不省人事手少陰心經痧或醒或寐或獨語一二句手厥陰心包絡經痧胸腹熱脹揭去衣被乾燥無極手少陽三焦經痧按十二經受病見症隨症施治其引經藥亦不可少今通列手足經脈後手少陰心循手小指內側出其端手太陽小腸起手小指端循外側上行手少陽三焦起手無名指端手厥陰心包絡又名手心主出中指端手陽明大腸起手食指端手太陰肺出手大指端足厥陰肝起足大趾藂毛上足太陰脾起足大趾端足陽明胃起足次趾外間又一支亦入大趾端又一支入中趾外間足少陽膽起足四趾間足太陽膀胱起足小趾外側端足少陰腎起足小趾下閱此便於針刺膀小藁柏羌些須胃大葛樸芷區區脾芍腎獨鹽酒俱膽肝焦絡柴丹青川芎宜少再丁寧肺蔥桔芷心獨辛羌芎白芷少為貴胃腸脾肺升麻廢腎尤切戒毋加桂看涼熱第四痧犯太陽則頭痛發熱犯少陽則耳旁腫脹寒熱往來犯陽明則面目如火但熱不寒犯太陰則腹痛犯厥陰則小腹或胸脅痛犯少陰則腰痛以上皆身涼犯肺則咳嗽痰喘微熱甚則鼻衄犯心則心痛或心脹頭額冷汗如珠而身或熱或涼犯膀胱則小便溺血甚則身熱犯大腸則痢下膿血重則嘔吐身熱犯肝則沉重不能轉側晡熱內熱甚則吐血犯三焦則熱毒內攻上則口渴下則更結凡痧氣壅阻發而為熱若誤為外感傳經熱症而發汗溫飲雖慢痧遲緩亦必變出頭汗發狂譫語種種重症不知外感之脈浮數而緊熱症之脈洪數有力痧症之脈終有不同或有可疑須看痧筋有無辨之痧症身涼而內熱者宜攻其里表實者宜透其肌用藥隨時活變故不主方分表裡第五痧感肌表人不自知則入半表半裡故胸中作悶或作嘔吐而腹痛生焉此可粹刮而愈不愈用金四金五方痧毒入里故欲吐不吐欲瀉不瀉衝心則心胸大痛攻腹則盤腸吊痛可放痧而愈不愈用絲三石六方痧毒中深逆攻心膂立時發暈氣血不流放亦無紫血即有亦不多惟當審脈辨症的系風寒暑濕氣血食積痰飲施治令蘇氣血流動然後扶起放痧如不醒擇用絲五匏一土五方如此重症立時連進湯丸方能有救痧阻於氣分宜刮壅於血分宜放痛而絞動者阻於食積之氣分也痛而不移者壅於血分而有瘀也發於頭面上部毒氣上壅也纏於手足下部毒氣下注也上吐下瀉痧氣衝激也煩悶氣脹痧氣壅塞也惡寒發熱痧氣遏於肌表也胸膈偏痛毒血滯於經絡也為腫為脹食積血瘀結於腸胃也吐血便血痧氣泛溢而憂潰敗也咳嗽喘急痧壅氣分而生痰逆也立時悶絕者毒血攻心也手足軟而不能運者毒血注下也腰脅俱痛者偏痛半身者身重不能轉側者皆毒壅瘀也變成腫毒潰爛者毒血凝滯攻壞肌表也審脈第六痧脈多微緩細澀有時弦數縱浮大亦虛而無力疾徐不倫時或六脈俱伏伏亦無妨痧退脈即漸還如頭痛壯熱脈應洪實而脈反微遲者痧也厥冷不語脈應沉細而反滑數者痧也脈症不符便舍症而從脈診痧盡此兩言按傷寒雜病自有本脈若一兼痧其脈必變病必凶暴然兼痧之脈可知也傷食痧脈多緊實傷血痧脈多芤滑傷暑痧脈多洪滑而疾數傷風痧脈多沉微穢觸痧脈多變異不常傷氣痧脈多沉伏或如雀啄傷寒濕痧脈多沉細或有痧脈似陰症者尤不可不辨如傷寒脈沉遲無力是直中三陰治用熱藥何疑惟傷寒兼痧脈似陰症一服溫補熱藥痧毒變幻悔無及矣故於其外見症候稍有不合便取痧筋驗之有則為痧無則為陰涼熱異施且放痧服藥後經絡無阻脈便不復沉伏然後按脈辨症治其傷寒無不效者至雜症兼痧有沉伏之脈亦准此法凡痧脈微細者生實大急數者重洪大無倫者凶一部無脈者輕一手無脈者重兩手無脈者死六脈無根及諸怪脈現而放痧服藥不應者不治丹溪治雜症以氣血痰為先痧脹何能離此痧脹有氣塞者為喘急為脹滿為嘔噦為頭眼脹其痛緊脈必洪數屬陽有氣閉者為昏冒口噤目翻厥冷雖痛口不能言脈必沉伏屬陰痧有血熱者為煩躁為紫斑為頭面赤為衄口出紅沫脈必實大屬陽有血阻者腰痛脅痛攻心痛手足青紫脈必緊牢乍大乍小屬陰痧有痰寒者喉中漉漉有聲吐咯不出嘔吐酸水清涎脈必弦滑屬陽有痰厥者卒倒手足厥冷肌膚芒刺遍身青筋坐臥不能轉側脈必微細似有似無屬陰亦不得謂陽痧則生陰痧則死痧有脈伏三日亦得救活者在得其竅而已論吐下第七傷寒食未化下之太早反引寒邪入胃變為熱邪固結所食乃成結胸若痧症新食以吐為先至所食既久驟然痧脹雖食消未盡下之無礙盡因痧本火毒在腸胃腸胃部分肌肉作腫作脹盤腸絞痛遍及臟腑故外宜刮放以泄其毒於表內可即下以攻毒於裡則腫脹自當潛消食積因之通利非有寒邪入胃變成結胸之可憂也但下之必先消散食積又宜以漸而進中病即止霍亂症噁心腹痛上吐下瀉瀉如水注此感受暑火暴發升降不利清濁不分所瀉皆五臟津液宜急用五苓散或胃苓湯以分利陰陽清暑火之氣有夾食積者亦不可過下恐津液暴涸元氣損傷也更有吐瀉無物亦有上下關閉竟不吐瀉者為乾霍亂惟心腹絞痛令人立斃急以炒鹽湯深吐通則可救即定後周時勿進粒米得食復發慎之即如嘔盡瀉空倦極當用六和湯調理方補群方末急症第八急症昏迷先觀唇舌色黑者凶黃者重淡紅者略輕蓋黃知內熱黑知熱極淡紅雖熱用藥不可太冷又要看舌苔施治痧症危急放血不流若審無食積血痰阻滯於中用陰陽水或泥漿水晚蠶砂水細辛水白砂糖梅水擇一飲之稍醒扶起再治若有食積血痰破瘀用桃仁紅花童便之類去新食用鹽湯礬湯吐之食久痧脹用楂卜麥芽消之有積阻用檳榔大黃驅之金七方治之或痰血凝結昏迷不醒用菜油麝香調下立蘇阻滯去痧氣行筋自現而後可刮可放當藥即藥蓋緣痧症初發未攻壞臟腑故耳凡痧藥得宜倘有不效者蓋湯劑多帶冷冷則直入腸胃未能達於肌膚血肉故治先刮放也刮放而藥仍不效必刮放未盡也刮已到放已盡而痧猶在則毒惟在陽明胃及脾肝腎三陰經絡非藥何以治之昏迷不醒難施刮放當用藥救夫湯藥帶冷雖不能即周血肉然當熱毒攻心正遇帶冷之物順流而下昏迷自醒有不醒乃食積血痰所阻攻而下之無不醒者痧發無寒症然亦有時為寒非真寒也蓋因痧熱而服大寒之劑以至此夫痧必無食積血阻於中方可服寒飲得效若一有之而飲大寒則食不消積不行血不散而毒反冰伏矣嘗見岩谷中行旅感冒渴飲澗泉而即斃者是名寒痧蓋飲寒毒結多致不救也若幸遇放痧之人毒血一行便無阻滯故方書有服陰陽水者不獨取井水即此故耳是以久服涼飲痧有未痊者略用三香溫和之劑實為權宜之術若驟用桂附乾薑吳萸參耆之屬則又誤矣痧皆屬火火有君相之別手少陰君火也右腎命門為手心主乃手厥陰胞絡之臟經言心之原出於大陵凡刺大陵穴者以瀉手心主相火之原耳又有手少陽三焦合為表裡神脈同出現於右尺二經代君行令故相火之為病居多火性炎烈以致三焦阻塞六脈全乖昏冒痰喘然相火作病猶有可回若犯心君殞在須臾莫謂術疏耳痧犯咽喉則痰喘如鋸先放痧急用薄荷牛蒡山豆根童便之類清之兼吹竹一方餘症且緩治痧症危急大便不通急宜放痧用潤下丸以攻之小便不通宜放痧用土四方以分利之痧有心胸高起如饅餃者不治曾用竹六方愈一婦心胸左右或背心一點痛者凶角弓反張者死腰腎一片痛者死脅肋痛者四肢腫痛者難治鼻如煙煤者舌卷囊縮者環口黎黑者頭汗如珠喘而不休者昏迷甚放無血服藥不應者痧塊大痛服藥不應者俱死此皆實熱之為害耳緒論第九痧感氣分而毒在肌表者或作脹作嘔或微眩微惡寒不飢餓宜急刮之毒氣不致內攻則愈是刮之不可不早也若入血分而毒在血肉者或痛或瀉或懊惱不安或發熱或兩脅脹痛宜急刺之毒氣得以外泄則愈若深入而重者毒滯於臟腑經絡之內直攻心腹呼之不應扶之不起危在須臾雖經刮刺仍不能不用藥救之但有風寒暑濕之宜分食積痰氣之宜辨所當因症而施治者也且先灌涼水使痧氣少降或以陰陽水調白礬灌之而後進藥庶可得生最忌熱湯熱酒粥飲米食若不知禁則輕者必重重者必危或結痧塊以致變出奇症尤必先行刮刺以泄其毒用藥方能取效聞江南溪澗有射工蟲含沙射人影即寒熱頭痛筋急體強悶亂呻吟涎流咳嗽始中便不能言朝輕暮重不識者指為傷寒土人曰此痧病也用真正玉樞丹磨服一錠即安凡渡有毒蟲處先用竹竿擊水面急渡則無妨按射工溪毒中病者狀如傷寒寒熱發瘡偏在一處用紅莧莖葉搗汁飲一升日再服以渣敷之馬齒莧同惟鵝喜食此蟲故鄰近家多畜鵝嶺南煙瘴尤多痧病乃溪毒沙蝨水弩射工蜮短狐蝦鬚之類俱能含沙射人被其毒者憎寒壯熱百體分解肢節痛酸似傷寒初發狀彼土人治法手捫痛處用角筒入肉以口吸出其砂外以大蒜煨熱搗膏封貼瘡口即愈諸蟲惟蝦鬚最毒若不早治十死八九其毒入骨狀若蝦鬚瘡類疔腫彼地有鸂鶒鸀鳿等鳥專食諸蟲以此鳥毛糞煅灰服之及籠此鳥於被毒人身畔吸之其痧聞氣自出而愈其餘治法詳前後各條瘟疫與痧脹皆氣為之或因風雨寒暖不時山澤濕熱蒸動又兵荒積屍之氣隨天地升降流行人在氣交中無可逃避轉相漸染故痧有觸穢一症也凡人尤忌夜行多致犯痧以受陰濁之氣故耳明末癸未京師大疫有胸腹滿生白毛者有頭大如斗眼鼻俱沒者有兩腮紅腫痰喘壅塞者呼吸間死以萬計皆痧類也針挑血出隨愈頃之變為嗽喘症雖輕不半日隨斃用前法挑之亦隨愈放痧之法由來久矣按所謂大頭瘟者下非不病特甚於上耳疙瘩瘟內非不病特見於外耳蝦蟆瘟腹非不病特痹於喉耳症類多端惟以清熱解毒為主治之先上先下從內從外自當因症而施以上諸症用普濟消毒飲最好新增祛瘴闢瘟湯一方辛酉一婦孕幾八月夫不在家黃昏時忽飢不可忍即炊米一升為飯食盡而睡少頃隔房聽其啼叫三聲以為產矣呼之不應持燈照之婦已死腹內依然如此怪症焉知非痧然亦不及措手矣解㑊亦症解者骨節解散㑊者筋不收束似寒似熱困怠煩懣腹疼飲食不美嘔吐酸水或因傷酒中濕或感風寒房勞女人經水不調血氣不和皆成此症即痧類非傷寒也宜先用熱水蘸搭臂膊以苧麻刮之甚者刺十指委中出血或以香油燈照身背有紅點處烙之使腠理開通血氣舒暢而愈又宜服蘇合香丸汾按解㑊不盡為痧然暗痧慢痧每似解㑊人所當知名醫類案更解㑊以痧名未為無見但後附載杭氏說力辨解㑊非痧適與庸醫之見同勿為所誤白虎病凡太歲後一位為白虎如太歲在已則白虎辰太歲在申則白虎在末其神所值之方小兒出入居處或有觸犯則病其身微熱或冷有時啼叫屈指如數物狀以集香湯治之用沉降檀乳四香參草茯神棗仁水煎臨服入麝香少許存滓房內燒之至如小兒出瘄疹一名麻又名痧散見於皮膚與沙粒相似小兒出疹必先身熱咳嗽或嘔吐腹痛時隱時現三日乃平今時痧症亦有細粟紅點或隱或顯額上最多胸脅頸項次之手足腰背又次之在內則心腹脹疼在外則肌膚芒刺其原皆因血熱毒熾故與小兒之痧疹同名若小兒果系痧疹必從本科正治又不當混入此痧症也治痧當明雜症其於兼痧類痧等症方能兼治無誤繆仲醇曰絞腸痧屬胃氣虛猝中邪穢郁遏不得吐瀉以致絞腸異常胸腹驟脹遍體紫黑細尋頭頂心必有紅髮速拔去之急以三稜饞針刺委中擠出熱血可立蘇次用新汲涼水入鹽兩許恣飲得吐瀉即止蛇蟲傷亦有紅髮手法第十脈不明不可亂用藥症不明不可輕用藥手法不明即藥亦不能速效故手法為治痧要著一曰焠痧在肌表未發出者以燈照之隱隱膚間且慢焠若既發出狀如蚊咬粒如㾦麩疏則累累密則連片更有發過一層復發兩三層者焠法看頭額及胸前兩邊或腹上與肩膊處照定紅點以紙捻條或大燈草微蘸香油點灼焠之即時爆響焠畢便覺胸腹寬鬆痛亦隨減一曰刮痧在膚里發不出者則用刮若背脊頸骨上下及胸前脅肋兩肩臂彎用銅錢或碗口蘸香油刮之若在頭額項後兩肘臂膝腕用棉紗線或苧麻繩蘸油戛見紅紫血點起方止大小腹軟肉內痧用食鹽以手擦之痧既刮出痛楚亦輕矣一曰刺古言東南卑濕利用砭以針刺放毒血即砭道也痧重者經鐵器難解放痧當用瓷鋒作針為妥善得法放痧有十處頭頂心百會穴只挑破略見微血以泄毒氣不用針入印堂頭痛甚者用之針鋒微微入肉不須深入兩太陽穴太陽痛甚者用之針入一二分許喉中兩旁惟蝦蟆大頭瘟可用亦勿輕用舌下兩旁惟急喉風喉蛾痧可用急吐惡血不可嚥下兩乳乳頭垂下盡處是穴此處不宜多用不如看有青筋在乳上下者刺之手十指頭用他人兩手扐下不計遍數捏緊近脈處刺十指頂出血一法用線扎十指根刺指近甲處出下血或謂針刺手足無如指頂為妙指頂勿太近甲令人頭眩兩臂彎臂彎中名曲澤腿彎中名委中先蘸溫水拍打其筋自出然後迎刺足十趾頭同手兩腿彎細看腿彎上下前後有細筋深青或紫紅者名痧眼即迎其來處刺之如無青筋用熱水拍打腿彎直刺委中惟此穴可深分許其腿上大筋不可刺刺亦無血令人心煩腿兩邊硬筋不可刺恐令筋吊至臂彎筋色亦如此辨之痧筋現者毒入血分宜放乍隱乍現者毒入氣分及現而放微見者乃毒阻氣分治宜通其腸胃痧筋自現至伏而不現者必從脈症辨之血則散食則消痰積則驅結既解而筋復現然後刺放可也痧筋或現數處或一處必刺去惡血令痧毒盡泄或誤飲熱湯痧筋反隱而不現略現亦刮放不出急飲冷水解之後可刮放痧為食積所阻刮放不出者當先消食積而再刮放熱極血凝瘀阻胸腹刮放不盡者當先散瘀血而再刮放痧發兼遇惱怒傷肝作脹刮放難盡者又當先用破氣藥再刮放如此痧毒皆可漸消矣用藥大法第十一凡治病用藥若得其宜未有不效者痧之為病乃感受四時不正之氣故當以驅邪為主養正非所先也宜疏散不宜大表宜下降不宜升提宜涼解不宜辛熱宜清理不宜滯澀宜消導不宜補益宜開通不宜收斂宜行氣不宜補氣宜活血不宜補血佐之以解毒兼之以清火化氣以消其脹行血以逐其邪此用藥之大法也又須因病制宜用荊芥防風之類者從表而散也用陳皮青皮之類者從中而消也用枳實大黃之類者從大便而下也用木通澤瀉之類者從小便而下也山楂萊菔所以治其食之阻檳榔莪朮所以驅其積之滯香附砂仁所以開其氣之閉紅花銀花所以活其血之凝此因病用藥之大法也藥忌用藥一差凶危立見先知其忌則思過半矣參耆白朮山藥恐補毒氣痧所大禁熟地白芍補血斂血痧所大忌甘草用之恐成痧塊難治一應甘甜之味俱不宜茯苓豬苓恐其滲濕轉實痧氣俱在禁例半夏白芷蒼朮性燥忌用升麻禁用恐提痧氣上升難遏麻黃發表太過禁用肉桂附子吳茱萸禁用恐助毒立時有變乾薑能助熱毒當忌過服冷水宜少用以善散寒氣五味子木瓜酸斂忌用竹瀝性寒忌用用須薑汁方走經絡不如弗用為佳杜仲補骨脂枸杞子即腰疼不可用茯神柏子仁酸棗仁即虛煩不寐亦不可用蓯蓉巴戟尤所大忌評半夏藿香止吐凡治吐症用半夏藿香獨痧症作吐半夏性燥須防益助火邪必不可用藿香惟取其正氣以治穢觸倘腸胃有食積血瘀阻滯痧毒驟用此以止吐反有閉門逐盜之憂藥宜陳皮青皮陳行痧氣青伐肝氣痧氣壅阻鬱結不行者非此不利枳殼枳實破痧氣驅毒氣除脹氣下食氣積滯壅塞者非此不開枳殼性緩枳實性速各有所宜荊芥透肌解表散痧毒痧筋隱隱不發者非此不現防風透肌發表為臣使之功寒熱往來痧毒壅滯郁遏不發者非此不清柴胡和解表裡專治少陽膽經寒熱往來前胡疏風消痰治嗽表熱者宜用乾葛散陽明胃經之邪兼能解渴紫樸寬中治嘔消痰下氣薄荷辛涼利竅消腫解毒消氣清喉紫蘇疏風順氣身熱當用獨活發散治熱其性至頸而還力不能過發且可活血解痧毒是最要之味細辛透竅散痧之妙藥勿以其味辛而疑之汾按細辛極散真氣過服即能殺人壯實而痧重者多止錢許老稚單弱者酌減少用痧輕者可弗用桔梗入肺經其性上而復下故能引枳殼破胸中至高之氣香附行血中之氣恐香燥須便制行血酒炒斂血醋炒延胡索活血行氣理血氣凝滯作痛五靈脂善消宿血血塊凝滯不散非此不破鬱金能入心經散郁消瘀痧毒攻心者非此不能奏功時以價高用薑黃代之終不妙木香行滯氣燥濕氣驅寒氣開鬱氣痧後腹痛不解此要藥也砂仁順氣開鬱散痧消食始終可用烏藥善行周身之氣凡痧所阻滯者得此無處不到秦艽活血驅風消痧毒筋骨疼痛壯實不清者非此不解連翹消痧毒解諸經火邪清熱而不滯治痧要藥梔子涼心去火發斑並痧根紅者可用貝母川貝專治熱痰土貝兼破瘀血白芥子脅下之痰非此不達天冬麥冬潤肺消痰一治其本一治其標去心杏仁瀉肺潤腸胃利氣消痰涎去皮尖桑皮兜鈴治嗽瀉肺汾按兜鈴清熱降氣但肺虛挾寒者大忌曾聞之世醫者云凡治嗽禁用訶子兜鈴紫菀白芍五味等藥小兒尤忌能令肺縮小即貝母亦非風寒濕滯諸痰症所宜誤用反令不愈附志於此以俟別擇赤芍血熱發斑者可用陳香圓破結氣可用丹參亦活血之劑山楂卜子麥芽神麯痧為食壅善消而不暴紅花茜草銀花活血解痧毒桃仁破瘀活血瘀為血阻非此不流痧為血滯非此不順蘇木取惡血新瘀者莫及荊三稜蓬莪朮食積心痛痧毒阻滯痞悶者宜用牛膝活血引痧氣下行香薷通上徹下利水氣治暑傷之要藥說詳金三方牛蒡子解痧毒清喉痧中要藥劉寄奴散瘀血解痧毒下氣消脹破血仙藥多服令人下痢紫花地丁解毒化斑澤蘭葉解痧毒益母草女人胎產俱宜地骨皮退熱除蒸止陰虛骨蒸勞熱菊花清心解熱毒葉亦可用青黛治痧至妙之品晚蠶砂解痧毒治熱穿山甲透痧消痰破瘀托毒善走經絡之神劑經絡諸藥所不到者非此不達土炒末乳香沒藥消瘀血而不傷新血痧症以治血結阿魏破積聚逐惡血其功甚大角刺透毒能引諸藥至於痧毒血瘀之所大麻仁潤大腸腸胃燥結者宜用雄黃牛黃膽星天竺黃消痰丸中宜用麝香開竅散痧功亦甚大明礬解痧毒消痰定痛用之探吐宿食甚妙石膏暑痧暑天最多自汗大渴用白虎湯即解龜甲破宿血在胸用上截在下用下截去肋酥炙末殭蠶活血分之痰佐山甲透經絡以破瘀毒須炒末用一二分童便解痧毒消痰降火最速定痛治血痢痢下血水諸藥莫及板藍根即澱葉普濟消毒飲中用之以解溫毒小青草一名血見愁清熱除疹最速梅花得一元之氣治痧上品取大半開者紙籠當風處陰乾桃花亦可天仙子即紅蓼子治痧塊多用亦去痞積紫荊皮絲一絲七俱用作引惟絲一有之評荊芥細辛防風痧症寒熱不由外感其毒從鼻吸而入搏擊肌表荊芥細辛善能透竅使由竅入者亦由竅泄防風臣使為佐不比麻黃羌活專計發表反有升發火毒之慮也宜忌相半羌活痧忌發表太過若頭痛或因寒起更兼痧症欲引太陽經用半分至二分川芎上行頭目頭角骨痛者必需下通血海肝臟不榮者當用用一分至三分止多則恐提痧氣藿香痧症作吐取其正氣以治穢觸然必痧毒無阻乃可俟冷飲之沉香檀香丁香痧始發忌用若痧後心腹疼痛不休胸脅脹悶寒凝氣滯得此可舒用一分至三分生地涼血血熱者可用血瘀者非宜當歸頭身尾各有所宜用須斟酌歸尾不妨黃連心脈洪實者可用能解熱毒黃芩肌熱不退者可用上二味冷性凝滯痧中忌用用須酒炒元參咽痛犯腫毒者可用色黑紫血痧有瘀血忌用亦能清氣消痰滋陰潤肺花粉口乾渴連飲水不能止者可用性沉寒痧毒未清者忌恐凝滯痧氣也木通車前澤瀉痧氣鬱阻小便不利在所當求若鬱熱太重不因小水禁用黑醜通上徹下痧毒脹滿必須用此丸散中奏效凡破氣之味俱莫能及但耗散真氣恐人有宜有不宜故方中不載大黃治食積阻痧毒為丸以備急用其功莫大若痧脹之極必須急服此以攻之恐病有宜有不宜故方中雖載不及細加補原本未列藥注取本草薑黃理血中之氣破血下氣性烈於鬱金血虛者勿用片子者入手臂金七石一絲二三土二三六革八檳榔破滯散邪消食行痰墜諸氣至於下極氣虛下陷者勿用金七八石六絲三竹七匏五土一白蒺藜散肝風瀉肺氣破血消症通乳墜胎去刺酒蒸用石四絲三四六竹五匏四六革一降香辟邪惡療創傷止血定痛消腫生肌金七石二四五絲四竹五丹皮瀉陰胞中火治無汗骨蒸地骨治有汗骨蒸金六竹二土四革二蒲黃性滑行血消瘀通經脈利小便無瘀勿服炒黑性澀止一切血絲六七土三四白豆蔻利三焦暖脾胃散滯氣消酒積若火升作嘔因熱腹痛氣虛諸症咸宜禁之金八石一絲一旋覆花軟堅下氣行痰水通血脈肺與大腸藥虛者勿多服冷利大腸宜戒絹包紮煎金一土六栝蔞降痰治嗽蕩熱滌垢清咽利腸胃虛脾瀉者忌金一加石七歌竹八大腹皮下氣行水治痞脹稍涉虛者勿用酒洗再黑大豆汁洗曬灰火煨金一加竹四威靈仙善走十二經絡治諸風痰積浮腫閉結大走真氣耗血忌茶麵金一飲食第十二痧氣壅滿胸膈甚者十日五日不飲食亦無妨惟俟痧氣盡然後與之初退覺餓設驟進飲食立能變重必忍耐一二日乃可萬全痧後多戒葷腥數日庶無屢發之患痛後亦有不喜食者有食而作脹復疼者又有或疑傷寒而餓壞者其間飲食最要斟酌宜忌不可不審也食忌生薑痧所大忌勿作藥引圓眼大棗俱習作引辣醬花胡椒煙茶火酒醋面索粉麵筋糯米糰粽豬羊肉雞魚蒜蔥芥菜瓜茄水紅菱糖食桃梅李杏發痧若飲粥湯熱湯熱酒輕者必重重者必危吃米食諸物恐結成痧塊日久變出他疾難於救療忌用熱湯洗澡愈洗愈將毒氣趕入腹內食宜黑砂糖活瘀血解痧毒凡瘀血作痛者得此則安食鹽解痧毒定痛用之吐去新食芋艿治痧熱解毒有痧患者生食之甘美燈芯湯口渴者飲之作藥引可用蘆粟湯山楂湯蘿蔔子湯蘆柴根湯荸薺百合藕西瓜待痛止後知飢方可吃飯湯清水米粥米糊湯亦宜少用且須冷吃不然則復發陳大麥煮粥為妙救急小方第十三芋艿帶毛生嚼不麻方斑痧已驗生黃豆細嚼不豆腥上二方可試痧亦解毒燒鹽湯待冷灌下探吐或鹽放鏟頭燒紅碎水中飲明礬末陰陽水調服二錢多至三錢服之取吐不吐再服上二方乃吐新食阻隔痧毒之法必多飲吐善救急陰陽湯涼水滾湯各半對衝陰陽水井水河水各半中隔者可飲泥漿水服路上受暑起脹用仰天皮水攪清飲之白砂糖攪梅水服細辛末同砂仁湯冷服此法治氣阻受寒痧晚蠶砂為末白滾湯冷服頭髮數十根燒灰白礬二錢研末用涼水調服取吐陳佛手柑煎湯涼服陳香櫞煎湯涼服羊糞一把滾湯泡以碗對合一時濾去渣待冷極飲之童便連飲碗許蘿蔔纓子煎湯服蘆柴根煎湯微溫服蘆粟子或粟根煎湯待冷服綠豆煎湯溫服做綠豆粉泔水亦可生豆腐漿吃碗許麻油一盞灌下菜油二兩麝香一錢昏迷欲死者調下立蘇絲瓜葉搗汁飲又可止霍亂伏龍肝即灶心土泡水飲止嘔吐蚱蜢五六個煎湯溫服陳樟木陳皮等分東壁土水煎連進三四服銀硃擂細點眼角愈蕎麥炒焦去殼為末溫湯調三錢服蕎麥與皂礬相反日後謹防有犯此方勿忌痧分症治第十四痧不盡系六氣七情或因飢飽勞逸或為穢觸疫染皆可成痧痧無定脈凡脈與症不應者即為痧脈亦無定症不論風食勞痰而以本症治之不效者皆痧症也風痧頭疼腿痠身熱自汗咳嗽腹痛此時氣所感不可同傷風治法純用疏風當刮痧為先用金一方暑痧頭眩噁心自汗如雨脈洪拍拍上吐下瀉腹痛或緊或慢金二方主之暑脹不已者金三方如竹葉石膏湯六一散俱可選用陰痧腹痛而手足冷宜粹或因穢觸用金四方陽痧腹痛而手足暖出血即安或因鬱氣不通用金五方陰陽痧此症猝然從腰腿起至心腹痛上身熱下身冷者易治上身冷下身熱者難治急令強健人將熱手盡力向下順捋並熨足心急用油錢刮兩腿彎穴刮出現點再用瓷針刺出涎水再針十足趾尖出血如無血必須再拍再捋再刮再針以見血為度即用滑石末一錢麻油一兩服之服後吐出涎痰宿食自然大小便俱通下身漸熱矣如心腹痛仍不減方用灶心土檳榔藿香木通枳殼蘆粟砂仁等分燈芯三十寸以陰陽水煎服即愈已經效驗紅痧膚隱紅點如瘼疹痧在肌表外用焠刮內服金五方斑痧頭眩眼花噁心嘔吐身有紫斑痧在血肉急用刮放遲則入里生變當用金五方烏痧滿身脹痛面色塵黑身有黑斑毒在臟腑氣滯血凝以致疼痛難忍用金七丸外用老薑汁點眼角男左女右汗出即愈吐痧湯水入口即吐研伏龍肝泡水澄飲即定藥亦以此水煎用金四方瀉痧水瀉不計遍數不可下又不可止澀惟分理陰陽用五苓散去桂白朮換蒼朮加車前木通之類緊痧急痛霎時暈倒半刻即死急為放痧焠刮服滌痧丸亦得救活慢痧痧之慢者或十日半月而死甚至三四月而死必須速治遲則痧毒蔓延滯結在內者先壞臟腑在中者先損經絡在表者先潰肌肉一若失治便成死症初犯痧症邪氣勝元氣衰或旬日輒發久則日近一月蓋由胃氣本弱故爾數犯待痧退後當用木八方充其胃氣則痧自斷矣暈痧一時暈昏跌倒乃痧毒所攻毒血一沖必壞臟腑蓋毒血與食積痰氣結聚心腹胸膈之間而經絡不轉氣血不通雖欲刮放而痧不出治法視其食積痰血氣阻及暑熱伏熱穢觸之類急用藥消散俟胸膈一鬆昏迷自醒然後驗筋刺之用金八石一丸絞腸痧心腹絞腸大痛如板硬如繩轉如筋吊如錐如割輕者亦微微絞痛脹悶非常放痧可愈若不愈必審脈症辨暑穢食積血痰所阻施治須連進數劑俟少安方可漸為調理石二至八一婦絞痛危急刮放不愈右手脈伏放痧三十針用石二末金八丸清茶飲之並用石三方服下熟睡愈一婦口吐痰涎腹中絞痛刮之少安用藥不效次日復昏沉大痛先刺指頭出血用石四末沖砂仁湯下並用金一方加丹參山豆根茜銀楂卜服下而安一人盤腸絞痛脈伏刮痧用石五石六方稍愈黃昏復絞痛叫喊又有石七石八方而痊抽筋痧兩足抽筋疼甚忽至一身青筋脹起如箸粗將處處大放毒血用絲一丸暗痧心中悶悶不已欲食不食行坐如常即飲溫熱不見凶處並無心腹腰背疼痛但憔悴日甚若不知治亦成大害此痧之慢而輕者放之即愈更有頭痛發熱心中作脹類於傷寒有寒熱往來似瘧非瘧悶悶不已有咳嗽煩悶似乎傷風有頭面腫脹兩目如火有四肢紅腫身體重滯不能轉側此痧之慢而重者誤吃熱物遂沉重昏迷或喘急狂亂此等當審脈辨症在表者刮在中者放在裡者或丸散或煎劑須連進數服俟少安漸為調理絲二三四一孀婦四月間忽昏迷沉重顏色變黑左脈洪大右脈沉微此暗痧也腿彎青筋三條刺紫黑血如注不醒次日用石二方稍蘇至五日復刺痧用絲二方乃能大醒再調理愈一老人六月發熱沉重昏迷不省舌上黑苔芒刺狂罵不絕六脈俱伏刺血不流用石二方絲三方稍冷飲之又用金三方次日少蘇但身重如石苔刺不退用金六方而痊一少婦重娠夜聞火下樓墜僕悶絕竟不作聲安胎治驚藥俱不效經兩日而死胎下延予診之無脈細按如蛛絲但四體溫軟如睡急放手足血便作呻吟投滌痧散一服遂蘇更用絲三並四方而痊一十一歲婢六日不食頭面微腫索消食方予曰脈微面腫其殆痧乎刺腿彎二針用石二方一服愈悶痧痧毒衝心發暈悶地似中暑中風即時而斃此痧之急者如略有甦醒扶起放痧不愈審脈服藥施療若不醒扶不能起必辨症的確用藥數劑灌醒扶起放痧再為調治一五旬外女人目閉牙緊冷至肩膀但胸腹微暖六脈毫無間忽睜目苦叫數聲灌藥亦稍受如此三日醫用烏藥順氣散牛黃丸罔效予為刺十指血紫黑相間投滌痧丸一脈呻吟再服脈起或云是痓症用他藥脈伏病如初又來索丸與之人漸醒脈復起投石二方石一方而愈落弓痧倏忽昏迷不醒或痰喘眼吊形如小兒落弓症此暗痧難識必審脈辨症再看身體涼熱唇舌潤燥何如然後治之絲五六七一人發熱口渴昏迷不醒兩目上翻六脈微細而伏用石二方砂仁湯冷下而蘇扶起放痧用石七方痧尚未盡又用絲五方加銀花丹參山楂而痊一人時常身熱微渴煎滾茶飲之倏然沉重昏迷左尺沉細動止不勻右寸浮而芤此腎虛而痧犯之腎水之痧逆行於肺故痰氣壅盛而發暈也用絲六方加牛膝貝母和童便飲更用絲七方而醒然後扶起放痧愈噤口痧默默不語語亦無聲此乃痧氣壅盛熱痰上升阻逆氣管咽喉閉塞而熱宜先放痧審肺腎脾三經脈次推詳余經絲八一女日為後母所詈痧脹煩悶昏沉左關有力右脈沉伏語無聲乃傷氣痧也煎陳香圓一個微冷飲稍有聲次日左關弦長而動蓋因怒傷肝痧氣猶阻肝經之故刺腿彎三針血如注又刺頂心腎指十餘針乃用絲二方與絲八方加延胡香附微溫服乃痊撲蛾痧痰涎壅盛喘急如鋸痛若喉蛾但喉蛾喉內腫脹痧只痛而無腫脹形若急喉風但喉痛而不移痧則痛無一定且痧有痧筋可辨也竹一二三一人痰氣壅盛脈多怪異吹吊痰藥益凶暴痛極此三焦命門痧也刺臂指腿彎青筋紫黑血甚多不愈用石五絲五方外吹竹一方又用竹二方三服而愈一人喉痛極痰涎壅盛余視之痧也不信延喉科治之且飲熱湯至夕殂此症用竹三方必效角弓痧心胸脹極痧毒內攻故頭頂向後形如角弓反張是臟腑已壞死症也急用白酒將毛青布蘸抹手足拘急處再噴其遍體少頃鬆動然後用藥或可回生藥用石二絲二之類附歌手足拘縮角弓張臟腑攻衝毒勢強火酒遍噴兼蘸抹死中求治石絲方瘟痧寒氣鬱伏肌肉間至春而發暑熱凝滯血肉中至秋而發皆名瘟痧秋瘟尤易傳染其症寒熱似瘧腹或痛或不痛或喘急飽悶頭面腫脹或變下痢膿血輕者纏綿重者危急宜放痧消食積為主俟痧毒已泄然後和解清裡除其寒熱健脾養血補其中虛竹四一人於九月惡寒發熱痰嗽煩悶口渴舌苔刺血不流臥床沉重此誤飲熱也用陰陽水加明礬一錢飲之又用消食去積藥加熟軍二錢微冷飲少愈次日復刺臂指痧筋去血用活血解毒藥漸愈其妻同時寒熱煩悶頭面腫脹脈伏放痧不愈飲微冷礬湯次用透竅消毒下氣藥加牛膝三錢二服愈其子亦寒熱如瘧心腹絞痛吐瀉不已六脈沉緊用石一方並竹四方入大黃一錢次日再服愈滿痧初起跌倒牙關緊閉不省人事捧心拱起鼻扇耳鳴急為大放毒血用金七石一丸竹五味竹五脫陽痧小腹急痛腎縮面黑氣滯出冷汗名為脫陽有似發痧用連須蔥白三莖研爛酒四碗煮二碗作三服又炒鹽熨臍下氣海穴令氣熱羊毛痧腹脹連背心或腰胯如芒刺痛用燒酒罈頭泥研篩細和燒酒作團輥擦痛處即有細白毛黏團上羊筋痧腹脹渾身板痛此二症胸前或腰背用小針穿皮挑出筋毛自愈只揀疼處看有毫毛聚起者便是藥用滌痧丸普濟消毒飲一人傴僂不前自謂鬼箭打藥樵視其疼處用小針貫紅綠絲線就膚間穿過二三分許即拽斷亦不見血豁處露絨毛狀挑三四針後其行如駛紫疱痧痧不內攻則外潰為腫為毒之外又有發為紫疱血者亦異症也竹六一養媳手足下半身俱腫大腹亦脹發出兩腿足紫血疱如圓眼密布皆云爛麻瘋服藥益甚及見腿彎痧筋發現遂放五針又指頭十餘針盡去毒血診脈俱和用竹六方二服結痂愈瘋痧一人犯大麻瘋眉發脫面目敗手足攣遇老人為放痧三次曰此痧瘋也傳一方曰日服之以漸而痊方附竹六後血沫痧脹悶廢食兩脅疼甚口出痰血沫如西瓜瓤汁用薰陸香為君佐以寄奴茜草之類治之即愈薰陸即丹陽所產零陵香湘聞京師曾患時症凡吐唾淡紅色旋病不數日死有乩仙傳方但知其和豬膽汁作錠錠可活三人適一醫用豬膽作引亦立愈遂屢用得效症與此類附記蛔結痧痧毒攻胃蛔死入大腸與宿糞相結腹中大痛又有胃中熱脹之甚蛔不能存因而上湧乘吐而出或蛔結腹痛不大便或由大便出與傷寒吐蛔伏陰在內者不同治宜清痧脹為主加熟大黃竹七一女痧發痛極頭汗如雨脈芤而洪實放刮不出用竹二方次日筋現放痧用石七方下死蛔三條結糞亦下腹痛遂止一婦發熱心疼口多痰涎吐蛔二條投竹七方痰遂退銅痧渾身上下頭面眼珠盡如薑黃色者邪熱散乎脾胃而土之本色現乎外也蓋脾為陰臟以土主燥胃為陽腑戊土主濕一濕一燥濕熱熏蒸如𨠭面狀故發黃也竹八一羽士時疫七八日遍身發黃目瞪體僵六脈如無忽又如沸二便久閉奄奄待斃以滌痧散撬灌刺臂指血點滴如墨委中絕無勉與竹八方竟霍然汾按本草從新云黃疸須分陰陽陽黃宜茵陳陰黃鬚溫補若用茵陳多致不救葉氏臨證指南論之尤詳此書專為痧症言之痧皆屬火如前所言羽士脈症故當無陰陽之分也其稍輕者非便閉亦不必大黃又可參用五苓之類鐵痧頭面手足十指如鍋煤色不治以血凝也或用火酒擦身法委中刺出紫黑血兩茶杯竟有立愈者痧塊氣痞痛血塊痛食積塊痛皆因刮放未盡不用藥消以致毒流滯成塊治法在氣分用沉香砂仁之類血分用桃仁紅花之類食積用檳卜之類相兼者當並治匏一二又有不忌食物痧毒裹食成塊兩脅下痛其痧塊變症甚多故為難治且治痧惟在初發若飲熱湯毒血凝結即慢痧不致脹急傷人亦成脅痛瘀之日久勢必難散一婦腹痛放痧二次忽左脅有塊屢痛不止坐臥不安脈芤沉微此毒滯不行之故用竹五並匏一方與石一方加貝母白芥子二服而痊一人身熱吐痰脅痛喘嘔不已左脈洪數右脈似伏刺過二針服童便喘嘔稍減用金七丸潤下丸身熱吐痰俱已又用匏二方三服而痊身重痧痧症始發雖暴未必身重若飲熱毒阻遍身重痛不能轉側放痧後急宜消瘀解毒久則難治放痧不效者死匏三四一人臘月腹微痛嘔酸水飲薑湯大痛脹重不能轉側右脈伏放痧用匏三方痧減又放痧服匏四方愈心煩嗜睡痧痧衝心胸故心煩或嗜睡此等俱慢痧若誤以心煩嗜睡治之日甚一日倘飲熱物必漸凶險遂成不起之疾治法刺血為主可不藥而痊遍身青筋痧一羸瘦人慣發痧一月數發發則面青如靛滿身青筋脹起如箸痛自小腹攻上胸脅困倦難伏向作虛損溫補憊益甚針曲池委中黯血如注少蘇用火酒進滌痧丸立效後連進數服竟絕根遍身腫脹痧暑熱疫毒攻裡則為痰喘為血瘀昏沉不省若元氣實內不受邪即散於肌肉為腫為脹誤飲熱湯便成大害此痧之暗者宜從脈異處辨之一女手足俱腫將逮於腹六脈弦細沉遲此慢痧變症緣不肯放血數日腫脹益甚勉強放二十餘處紫黑血出用石二方並散痧解毒消瘀順氣藥以痧久綿延服十餘帖腫脹始消一婢久患瘡腹大如臌手足俱腫左脈微數右歇止夫瘡毒入內腫脹脈必洪數有力今脈症不合此慢痧為患也腿彎果有青筋刺五針未愈又刺指頭十餘針用石二方並匏四方五服遂如舊痧別兼類變第十五痧有兼症類症變症非望聞問切所能盡惟看痧筋辨之夫痧筋所見者青紫之色也痧症所原者血中之毒也血中之毒既無可消則百病生治之自宜刮放刮放不盡則宜用藥先去其痧後理其病其或當兼治當預防者務詳審之傷寒兼痧凡傷寒頭痛寒熱諸症或受暑觸穢感疫忽兼犯痧惟認脈看筋必先治痧痧退乃治傷寒若誤飲熱湯姜引慢者猶可緊者立見凶危匏五一人傷寒十四日忽昏沉身重醫治不醒予曰痧氣衝心故昏迷痧入血分經絡故不能轉側先放痧用匏五方痧退治傷寒而痊一女頭痛發熱屬太陽症用羌活沖和湯稍愈至四日藥忽不應更面赤身熱煩悶六脈洪大無倫此傷寒兼犯痧症刺青筋一針流流黑血余細筋隱隱服匏二方兩帖稍松次日痧筋大現刺九針服絲七方少安後驟進飲食復發熱面赤又刺兩足青筋用匏二方兩帖稍愈偶飲溫茶立刻狂言令飲冷井水二碗更服數帖痧氣乃清但病久身虛發暈服參湯而蘇痧類傷寒傷寒集中有四症類傷寒未若痧類傷寒之凶暴夫傷寒頭痛寒熱屬足太陽膀胱經是寒從肌表而入故宜發散為先若痧症頭痛是毒氣上攻不因個感寒氣其寒熱雖在肌表乃時氣由呼吸而入郁為熱毒搏擊肌表內熱則外寒故亦惡寒宜先刺顛頂放痧泄毒用藥透竅解毒順氣為主若誤用羌活麻黃髮表太甚反助痧焰勢必攻衝腫脹立時見凶要知痧症宜清涼而痧毒可內解傷寒宜辛散則寒氣可外舒斷不可以互混匏六七一人寒熱昏沉面色紅黑指頭青黑脈洪數皆曰新昏症必屬陰予曰非也脈洪數痧毒搏擊也指青黑毒血流注也面紅黑痧毒升發頭面三陽也視痧筋放之微見紫黑血用石二方晚蠶砂湯服漸醒復刺血如注但發熱身重肩背痛用大劑匏六方漸能轉運猶身熱大便不通用卜實軍樸麥芽桃仁溫服便通熱減痊一婦頭痛寒熱煩悶喘渴頭汗如雨面黑指青氣口脈虛歇止左三部洪數無倫若非痧而有是脈恐不能生刺頂心一針臂腿數針不愈彼因飯後起病用礬湯吐之煩悶喘汗俱除餘症未愈用匏七方二帖大便通而安後十餘日腹中大痛口吐涎沫又因穢觸而然刮痧用金四方而愈傷風咳嗽痧痧感時氣咳嗽肺經受傷不可同傷風治法當刮痧為先清喉順氣涼肺散痧為主匏八一人傷風咳嗽日晡微寒發熱脈芤虛而無力乃肺經痧也刮放稍可不服藥至十餘日嗽不止用匏八方加前胡山豆根愈咳嗽嘔穢痧痧凌肺經氣逆發嗆痰涎嘔噦或面目浮腫或心胸煩悶此熱毒入氣分痧筋往往不現當刮之間有入血分者必待痧筋方刺之急宜理其痧毒若從傷風治則誤一人嗆不絕聲面目腫嘔痰不已更吐鮮血脈弦緊且數此痧氣搏激於筋脈間令多刮之用石二方加童便微冷服又用絲四方而痊一女子發熱咳嗽嘔吐痰涎胸中脹悶面目浮腫服風嗽藥心益脹悶延及一月知為痧之變症刮訖用金一方加貝母薄荷童便飲之即愈霍亂痧痛而不吐瀉者名乾霍亂毒入血分宜放痧新食宜吐久食宜消食消下結宜攻痛而吐瀉者毒入氣分宜刮痧有痧筋則放宜調其陰陽之氣須知腸胃食積宜驅不宜止止則益痛若吐瀉而後痛者此因瀉糞穢觸宜用藿香正氣須防食積血滯或消或攻或活血彼山藥茯苓及燥濕之劑溫暖之藥皆不可亂投乾霍亂盤腸大痛先放痧用石二方與潤下丸妙一人晚覺腹痛吐瀉數十次痛益甚宿食雖吐瀉盡乃毒入血分血瘀作痛也用絲六絲七方少平次日再服愈痧痢夏傷於暑秋必瘧痢痢初必先泄瀉腸胃空虛則易感穢氣即成痧痛或炎熱疫癘因積而發亦致痧痛夫痢不兼痧積去便輕若一兼犯必絞痛異常止治痢無效或變如豬肝色如屋漏水或惟血水或變噤口不食嘔噦凶危或休息久痢綿延歲月惟先治痧兼治積則痧消而積易去積去而痧可清矣一人發熱痢血水日百餘次肛門窘迫腹痛異常嘔噦不食六脈遲數不常或時歇止此痧痢也刮放後痛減半用石一方砂仁湯下煎用竹六方去赤白滯甚多諸症悉愈一人發熱脹悶沉重痢下紫血醫但治痢甚危篤見六脈洪大不勻令刮痧用匏三方入童便飲次以蘇木紅花五靈脂茜草烏藥香附當歸導瘀乃安痧類瘧疾痧有寒熱往來類乎瘧疾或昏沉或狂亂或痰喘或煩悶叫喊或嘔噦吐痰睡臥不安或大小便結舌黑生芒如此重極脈必有變不與瘧同宜細辨一人日晡寒熱昏沉脹悶大便不通舌焦苔厚左脈浮大而虛右沉細而澀不似瘧脈視乳下有青筋刺出毒血用散痧消毒活血藥諸症退又用潤下丸二錢大便通惟寒熱未退用小柴胡湯而痊瘧疾兼痧瘧忽兼犯乎痧瘧必因痧而變苟慢以為瘧而忽視之必至傷人是非先治其痧即輕痧亦必有遺患土一一少男患瘧凶暴驗筋放痧稍松用石二金八方兩服扶而起次日傷食患益甚更放痧用散痧消食順氣解毒藥三服稍安後又傷食發熱用楂卜青陳紫樸白芥四服大便不通加大黃枳實便通熱減但病久虛暈心跳用棗仁茯神參耆熟地之類調補一月痊一婦瘧八日忽壯熱不已昏沉不醒左脈不勻右虛澀非瘧脈也刺臂青筋流紫黑血不愈服金五方加藿樸檳卜並土一方稍醒次日又刺指頭服金五方加軍枳熱退後用絲二方運動其氣痊頭痛痧毒中臟腑之氣閉塞不通上攻三陽顛頂故痛入腦髓發暈沉重不省人事名真頭痛旦夕死急刺顛頂泄毒藥惟破毒清臟為主毒中臟腑之血壅瘀不流上衝三陽頭面肌肉故肌肉腫脹目閉耳塞心胸煩悶急刺顛頂及其餘青筋藥宜清血分破壅阻為要土二三一人頭痛發暈沉重脈伏刺顛頂及痧筋少蘇脈沉實而上魚際用土二方一婦頭面紅腫發熱頭痛迷悶脈芤而疾刺左腿彎三針血如注冷服紅花膏半杯用土三方心痛痧屬氣則時疼時止痰涎迷悶刺手臂服順氣藥為主屬血則大痛不已昏沉不醒刺腿彎服活血藥為主遲則難救一人心中暴痛痰涎迷悶兩寸沉伏關尺洪緊刺痧筋二十針用石三方四帖而安腰痛痧痧毒入腎腰痛不能俯仰若誤飲熱必煩躁昏迷搦搐舌短耳聾垂斃而已一婦腰中大痛板硬誤飲熱酒發熱煩躁昏沉痰湧左尺虛微右尺洪實脈兼歇止刺血不流用石四方腿彎筋現刺二針血流再服二帖痛減小腹痛痧毒入大小腸則小腹大痛不止形如板硬絞絞不已治須分左右二股屈伸為驗土四夏月不頭痛發熱但小腹疼或心腹俱痛脹痞不能屈伸此皆暑火流注臟腑故先小腹痛遍及心腹宜六和湯清解之或四苓加香薷木瓜紫蘇和散之或正氣散加黑梔或炒鹽和陰陽水探吐痰涎可耳一少年小腹大痛每每左臥左足不能屈伸太陽小腸經痧也服土四方三帖筋始現刺左腿彎二針用絲七方冷服愈一人小腹大痛每每右臥右足不能屈伸陽明大腸經痧也刺腿彎青筋四針血流不愈用竹八方冷服半夜痧退而安頭眩偏痛痧痧氣慢者常覺頭眩內熱或半邊頭痛心煩不安宜刮痧不愈用清熱下氣之劑流火流痰痧痧毒傳變忽足忽手忽發肌膚忽為痰喘隱現無定來去不常而痧脈又不現最難識認有熱似流火腫似流痰而不比流火流痰之輕緩或痛極難忍或癢痛不已此等驗於痧筋發現刺之無疑然後憑脈所犯風寒暑濕及食積痰血氣阻分治之斯能有效一婦日間左小腿紅腫大痛暮即腹痛而足痛止次日右小腿紅腫大痛腹痛又止六脈如常難據為痧腿彎有青筋三條刺血甚多反加痰喘此放痧未盡之故用竹二方加土貝母二錢兩服稍愈次日左腿彎又刺痧筋一條顛頂一針服前湯加牛膝三錢痧即退更服絲七方俱痊一人晚間右腿紅腫痛方已喉旁腫痛不覺為痧只見時症犯此者多細看兩臂痧筋刺血用石八方倍楂卜加大黃一錢食消便下而安痰喘氣急痧先有痰喘氣急痧脹因之先治痧後治痰氣無令痧為本病之助先有痧脹痰喘氣急因之但治痧而痰氣自愈若痧有寒熱不清痰喘氣急者兼和解痧有但熱無寒喘急者兼消食順氣有大便不通小便不利喘急者又有痢下膿血喘急者俱宜攻裡有瘀血凝滯小便利大便黑喘急者當慮痧毒攻壞臟腑不痛可治痛而不已難治服藥不應者死土五一人發熱頭痛脹悶昏迷痰喘氣急六脈無根若痧脹則有救因放痧用石五方絲四方稍冷服又用土五方一服昏迷即醒脹喘俱平更用金一方加青翹楂卜熟軍發熱頭疼俱已脈復舊一婦痰喘氣急脹悶不已刺乳下二針出紫黑血稍可用竹四方三服愈一人痰喘氣急發熱身重腹中絞痛刮放不愈用金四方並石六方加大黃服之愈半身不遂痧慢痧遲緩中於血分未至攻心留滯經絡或在左在右半身疼痛或麻痹遂成半身不遂見痧筋急刺破用藥散毒活血消瘀土六一人朝涼夜熱氣急半年服藥不應加右半身疼不能俯仰痰嗽食減成勞弱病然脈症不符閱痧筋刺二十餘針用土六方二服後疼痛吐痰俱除後朝用六味丸夕用補中益氣寒熱愈臌脹兼痧先有臌脹忽痧乘之臌脹益甚痧宜早治一人臍突筋青心坎將平知為血臌其指頭黑色兼痧無疑刺二十餘針腿臂血出略鬆服絲三方臍下青筋漸退後用臌症藥導去惡水日服治臌香櫞丸二月餘臌症盡平痧變臌脹慢痧遷延時日留滯肌膚腸胃中若不早治即成真臌一人急氣作脹飽悶臍下青筋突起心坎將平此慢痧成臌也刺二十餘針出毒血臍筋即淡腹內覺鬆用石二方脹漸消老病兼痧先有痰火嗽疾忽喘急如鋸或頭汗如油煩悶莫狀雖是痰火危篤然有兼感時氣穢觸驟然勢盛者必宜察脈按症先清痧次治痰漸補氣血可耳一嫗素抱痰火老弱病忽痰壅喘急如鋸六脈不勻如雀啄此兼痧症尚有挽回刺出惡血用散痧消食豁痰順氣藥並進土五方漸安後大補氣血而痊弱症兼痧先有勞弱症或時吐血或微干嗽顴唇鮮紅或骨蒸發熱不已一染時氣穢觸必兼痧症或痰喘或喉鯁或脹悶煩熱較平時不足之症益覺沉重宜治痧為主令痧退盡方治本症一勞弱吐紅症脈洪實有力醫謂此脈是症之所忌予見勢暴凝焉視腿彎筋青色先放痧脈和症平又用散痧消食去積藥飲食漸進後用六味丸及十全湯勞弱亦愈蓋向病俱從痧氣而泄所以用補得效也一婦吐血乾嗽晝涼夜熱已久因怒午後忽發熱脹悶痰喘昏迷左關微緩餘脈應指不勻夫怒氣左關必有力勞弱脈亦宜弦數內有瘀血寸關亦當見芤脈不對症兼痧明矣刺痧筋倍用石二方清茶飲之神清喘已但勞弱未愈耳內傷兼痧先辨痧症治其標後審內傷治其本土七一老婦爭產相毆發熱嗽痰胸中脹悶診知內傷兼痧刺痧筋二十餘針服石二方稍松用土七方治其內傷服後下黑糞瘀消症平後用木六方並前虛症亦除痧變癆瘵痧惡飲熱有反喜熱湯者症益莫識慢痧所以漸成癆瘵也毒入氣分傷肺喘嗽吐痰發熱聲啞肺為嬌臟若不知治變為百日緊勞輕者數年終殆毒入血分重者兆變在即輕者歲月延捱若毒瘀胃口必須去盡乃愈毒瘀肝經損壞內潰吐血數發勢極多危毒瘀心包絡更加凶險不待時日毒瘀腎經腰脊疼痛嗽痰咯血日甚一日凡痧毒遣患總成勞瘵治須識之於始莫咎其終一人痧脹不服藥惟放痧三次胃脘間成一塊咳嗽吐痰發熱不食日漸尫瘦右關芤而緊余俱數此內有瘀血必吐出方解用桃仁蘇木澤蘭白蒺香附烏藥酒煎服吐出紫黑血碗許更用活血引下之劑加童便酒服愈痧變吐血鼻衄便紅痧毒衝心則昏迷痧毒沖肺則氣喘痰壅甚則鼻衄痧毒入肝則胸脅疼痛不能轉側甚而血湧吐出痧毒流於大腸則大便血流於膀胱則小便血治宜先清痧毒順其所出之路則氣自順而血自寧土八革一一人放痧不服藥變筋骨疼痛十日後吐血甚多疼痛不愈診其脈芤此痧退尚存瘀血用匏四方一幼兒痧痛大便紅令放痧用土八方一女痧痛溺血甚多放痧不愈用革一方加銀花連翹牛膝益母而痊一人痧脹鼻衄是痧氣由衄而泄用金六方痧變發斑痧粒不過紅點而已至有渾身成片斑爛發熱頭暈者金五方主之犯痧小便不通毒結膀胱溺水不利小腹脹痛難忍用土四方一八歲小兒發熱眼竄不語或以驚風治以傷寒治一無效予用滌痧散燈心湯調灌下便作呻吟已經十日大小便閉小腹脹急手不可按用潤下丸五分小便去數升再用一錢大去宿糞遂愈眼目怪症痧毒火上衝幸心君不受邪而逆犯厥陰肝母故兩目紅腫如桃甚則眼珠突出然他症患目惟在於目痧必心中煩悶而目疾因之苟不早治則痧毒已參陽位其火勢炎極輕則壞目重則殞命宜先刺顛頂以泄毒氣用清火活血順氣之劑加牛膝石斛以引火歸原若心中煩熱頭眩兩目紅腫大痛眼珠掛出左目尤甚至晚即昏暈用革二方加童便服眼珠始收若兩目通紅甚至起障翳此痧之餘毒在肝用革三寸加燈心白芙蓉葉水煎溫服一婦頭痛身熱眼珠突出半寸痛不可忍眼科療之更甚予為刺頂門一針太陽睛明合谷三穴各二針痛減半竟投痧症藥珠收痛止惜治已遲竟失明矣痧後牙疳用革四方神效痧後胸膈痛痧已退盡留瘀胸膈作痛用失笑散婦人倒經痧遇痧經阻或鼻紅或吐紅腹腫脹不能轉側者是也腹不痛亦為暗痧若攻壞臟腑不治急放痧再用藥革五附胎產痧論孕婦痧易傷胎產後痧防惡阻救療俱為尤急若暗痧陡發則胎前痧脈溷於有孕產後痧脈雜於惡阻又無心腹痛據須究症候察聲色看有痧筋急宜刺破肌膚痧壅焠割兼施攻壞臟腑莫能挽矣胎前痧痛胎前痧痛沖絞可畏凡安胎藥如白朮當歸茯苓之類痧所大禁其治痧破氣破血之劑又胎所忌斟酌其間活血解毒用銀花丹參益母紅花寄生順氣用香附陳皮紫樸砂仁烏藥散痧用荊芥防風獨活細辛消食積用楂卜神麯麥芽採擇於中最為穩當若勢盛難效權用一二味克伐恐於胎氣有防不可不慎革六紅花細辛少用一婦娠六月寒熱煩悶痧在初發未現用藥不應忽爾昏沉次日左手脈伏面目微黑乃刺腿彎六針少愈服革六方而安後用小柴胡湯退熱又參苓歸地健脾養血乃痊產後痧痛產後藥須溫暖痧脹藥惟清涼既屬相反則方毋執一今制方為臨症法散痧用獨活細辛破血用桃仁紅花順氣用香附烏藥陳皮解毒用銀花紫地丁消食用楂卜神麯麥芽如產後利用薑炭肉桂以溫血痧症所禁也痧症利用荊芥防風以散痧連翹薄荷以清熱產後不宜也況痧症脹極尤貴大黃枳實檳榔以通積滯而產後之藥更不可用蓋痧而用溫脹者益脹產而用冷瘀者益瘀惟取微溫之氣則兩不相妨更加童便以清熱消瘀豈非良法乎革七八一產婦三日後腹絞痛脹如臌惡露不通夫產後痛當在小腹今大腹絞痛異常非產婦本病脈洪數有力兼痧無疑先飲童便一杯少蘇刺出毒血痛稍定用絲六方痧退而惡露通一產後數日去血過多忽寒熱脹悶甚危脹洪大無倫念惡血去盡不宜得此脈視痧筋果有紅紫二條放過便不復洪大又刺指臂十餘針用革七方四服痊一產婦六日遍體疼痛寒熱如瘧昏悶異常六脈歇止見指甲帶黑刺指七針舌底紫黑血一針稍緩用革八方四服全瘳小兒夾驚痧小兒一時痰壅氣急不語眼目上翻發搐脹滿人盡作驚治不愈速看痧筋放血額上現痧急用火焠先令痧退然後治驚用土五方可也若執驚風治必死痘前痧脹痘本先天因時而發痧亦時氣所感而胎元之毒因之俱發凡痘未現點前痧脹必煩悶痰涎甚至昏迷沉重不省人事此其候也小兒滑疾之脈類於痧症厥厥動搖之脈雖若疑似難明然有痧筋可辨不可針單用藥清之宜木一方透痧兼發其痘痧自退痘自起矣若痘點既形觸穢痘隱者諸痘科自悉痘後痧脹痘後氣虛尤宜防護嘗有收靨結痂安然無事一遇暑侵穢觸即成痧脹忽然生變人多認為惡痘所致大誤一七歲子脫痂光潔飲食行步如舊迨二十五朝忽叫喊發暈脈微細而伏若惡痘餘毒兆變脈當沉緊有力今脈症不合痧筋歷歷可指用竹二合竹四方即蘇後小腹痛變痢用當歸五錢山楂一錢熟軍五分童便微溫飲之即愈痘前痘後見有痧筋止可用藥切忌針刺瘡症兼痧瘡痛者心火血熱所致膿腫作痛必漸而來非若兼痧之驟而可畏況瘡脈多洪數兼痧脈固不同筋又可驗一女患瘡半載一日酒後血熱且食雞鵝膿瘡大盛與涼血解毒藥更覺昏迷飽悶脈不洪數反沉微必痧使然刺頭頂一針指頂數針稍清爽猶脹悶用木二方木三方愈痧變腫毒痧毒留滯腠理即成腫毒宜先放痧用解毒散痧藥以除其根然後審十二經絡臟腑分陰陽寒熱處治輕則消之重則托之虛則補之實則瀉之紅腫甚者屬陽用木三方白色平腫不起發者屬陰用木四方毒有半陽半陰用木二方穿破後貼太乙膏若無膿只流毒水或膿少血多用飛龍奪命丹研碎些須填太乙膏中拔去毒水膿血後單貼膏毒口難收摻紅玉散木四五一人遍身疼痛背發一毒黑爛痛苦脈沉微指頭黑色而惡熱飲此痧變惡毒用冷圍藥而成背疽也令去圍藥放痧訖俟痧氣已絕用木四方溫托之外敷如前法另有木五方選用附痧後調理說見後木六七八方六十四方第十六加總歌風暑陰陽斑烏暈金接石頭絞腸並暑暈各二絞腸七絲首抽筋尾噤痰暗痧落弓中各三入竹三喉次瘟滿六疱七蛔八黃疸匏中塊重症俱重傷寒兼類又傷風土瘧頭頭小腹喘更有不遂傷紅轉革連血目牙婦科木排痘瘍痧後和按七十二症絲方者半或一症數方或一方數症今症案專匯中卷歌方另編分類便查金一金一風痧腹痛頻頭疼汗熱腿痠臻荊防細殼陳旋等煩嗽早先匏八陳痧脹春夏多暑尤甚故首風暑荊芥防風細辛枳殼陳皮旋覆花等分水兩杯煎七分稍冷服湯飲冷溫見用藥第十一加減法大同小異余可類推後不具載頭面腫時荷與菊腫歸手足膝威銀渴須