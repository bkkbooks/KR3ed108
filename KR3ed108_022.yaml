茶梅擂服痧脹面赤身熱喘急昏迷者服下即蘇鬱金丸隨常痧症腹痛者一服見功且治九種心疼五靈脂醋炒兩延胡索八錢砂仁炒生明礬各五錢木香不見火真鬱金勿用薑黃代雄黃為衣各三錢神麯糊丸卜子大每用五六丸唾津嚥下須少用溫水水不可丸竟用神麯糊亦得煉石丹痧脹通用千年石即陳石灰水飛兩松根石即真琥珀三錢水骨石即白滑石水飛二錢水滴為丸表熱煩躁者青黛為衣眩暈心悶者硃砂為衣每二錢垂頭蘆粟湯下硫礬丸硫黃明礬各四兩同人罐用豆腐漿煮一日夜去腐渣再慢火熬至乾燥連罐埋地三尺三日取出成紫金色下一層有泥渣不用茯苓山藥各三兩二味同蒸曬乾露一宿當歸酒洗炒燥四兩白蒺藜酒浸一宿炒燥四兩烏藥略炒三兩半夏水浸一宿入薑汁二兩明礬五錢角刺切碎兩同煮多用水煎乾三兩杏仁去皮尖焙兩半陳皮去白兩小茴炒燥兩共細末同制硫礬用膠棗肉丸綠豆大每清晨鹽湯下錢半臨臥白湯下一錢有人病痧十年發則叫喊暈死或用醋炭熏鼻或鹽湯探吐並用華佗危病方略得解醒後服此丸全愈除根予屢行多效真神方也附華佗危病方吳茱萸木瓜食鹽各五錢同炒焦砂罐水三碗煮百沸隨病人冷熱任意服之即蘇潤下丸治大腸燥實二便秘結痧毒壅盛者大黃酒製四兩黑醜炒頭末二兩牙皂煎汁丸鳳仙子大每服一錢多至二錢止燈心湯上不獨潤腸兼利小便治臌香圓丸或水或食或氣俱治蘿蔔子炒六兩陳香圓四兩醋製香附三兩廣皮去白荊三稜醋炒蓬莪朮醋炒澤瀉茯苓各二兩山楂去核青皮去瓤各兩神麯糊丸豌豆大每服五六十丸米飲下大羌活湯經云兩感者死不治一日太陽與少陰俱病頭痛發熱惡寒口乾煩懣而渴太陽者府也自背俞而入人所共知少陰者臟也自鼻息而入人所不知也鼻氣通於天故寒邪無形之氣從鼻而入腎為水水流濕故腎受之又云天之邪氣感則害人五臟以是知內外兩感臟腑俱病欲表之則有里欲下之則有表表裡既不能一治故死矣然所稟有虛實所感有淺深虛而感之深必死實而感之淺猶或可治羌活獨活防風防己黃芩黃連蒼朮白朮細辛炙草各等分知母川芎生地倍之俱片每服兩半煎一大盞熱飲之不解再服此解利兩感神方也若痧症與此彷彿亦以是方加減而選用之加減聖效散治傷寒時疫風濕陰陽兩感表裡未辨或外熱內寒或外寒內熱肢節拘急頭項腰脊疼痛發熱惡寒嘔逆喘咳鼻塞聲重及食飲生冷傷在胃脘胸膈飽懣腸脅脹痛心下痞結手足逆冷腸鳴泄瀉不穀不消小溲不利等症東坡蒞杭多疫設劑活眾原名聖散子今有痧症相類療之悉效卜子炒砂仁炒研檳榔陳皮延胡各八錢厚朴防風蒼朮藁本藿香葉柴胡獨活石菖蒲澤瀉枳殼細辛各五錢草豆蔻去殼十個共粗末每五錢水盞半煎一盞去滓溫服不計時候取遍身微汗即愈時氣不和空心飲之可辟邪疫如聖散治當心而痛遍身骨節牽痛或嘔吐噁心不時發作者兼治疝氣勞根此方可補痧脹所不逮枳殼麵炒三兩小茴微炒三錢鹽磚鏟上燒紅三分為細末每服二錢溫酒調下如不止再服一錢失笑散治血迷心竅不知人事婦人產後心腹絞痛及腹中瘀積血作痛者男婦慣發痧脹服此永不再犯靈脂去砂炒蒲黃炒等分為末每一二錢溫酒調下普濟消毒飲太和間疫癘初憎寒壯熱體重次傳頭面腫盛目合喉喘舌乾口燥俗云大頭傷寒諸藥莫治東垣云身半以上天之氣也邪熱客於心肺上攻頭面而為腫耳制方活眾刻石以傳醫方集解此方微有不同黃芩黃連各酒炒五錢牛蒡大黃各三錢陳皮去白元參生甘草連翹板藍根各二錢馬勃錢川芎防風各八分殭蠶炒升麻柴胡各七分薄荷五分桔梗三分共細末半用湯調頻服半用蜜丸噙化盡劑而愈或水煎食遠溫服原無大黃便秘加用酒煨祛瘴闢瘟丹治時疫痧瘴老幼男婦皆同者厚朴蒼朮羌活防風陳皮枳實香附牛蒡子各錢檳榔白芷各八分藿香川芎各五分細辛四分甘草三分薑蔥煎服無汗加蘇葉薄荷口渴花粉葛根身重汗出防己石膏溫瘧柴胡半夏遍身疙瘩腫痛藍葉大黃殭蠶肌肉發紅黑紫斑元參大青連翹大便秘結大黃先中熱又中暑加白虎香薷頭痛川芎風溫身體灼熱芩連梔子咳嗽涕唾頭目昏眩荊芥金沸草金沸草即旋覆花白虎湯治溫病身熱自汗口乾脈來洪大霍亂傷暑發痧神妙石膏煨五錢知母三錢甘草錢粳米一撮病在陽明肌肉則巨陽之表邪已解故外不惡寒又無頭痛身疼之症但自汗而發熱也經曰熱淫所勝佐以苦甘以知母甘草解其熱蓋熱則傷氣用粳米甘草之甘以益其氣且治不眠煩躁也煩者肺躁者腎也以石膏為君佐知母之苦以清腎之源因石膏體堅而重墜知母沉寒而走下故用米草之甘以緩之使不速達於下焦也白虎金神司秋者也暑火至秋而衰且知母苦寒又能保太陰肺金之氣故名白虎以為三陽經一解表藥耳雖是三陽解表藥切記有汗當施無汗當戒蓋無汗者必須柴葛升麻以解表邪不可見其身熱誤用白虎以郁遏其熱使不能外越也汾嘗驗溫病久而無汗有必兼白虎乃解者溫瘧宜桂枝白虎醫方集解明言之矣至於柴葛升麻亦自各有所宜傷寒論注等書自悉記異症方案一條靖江劉姓年四旬遇疫遭數喪自外歸母病旋卒遂成驚悸不寐略睡去即叫跳其心如蕩如撞服天王補心丹之類半月不效予用奇方制就琥珀丸三服遂定每服三分三釐共錢又變怪症飲食如故忽然目翻涎流喊如羊其頭側過左肩手亦向左反張突起旋走面如土色食頃稍蘇日夜百番或曰羊癇曰痙病然癇症當見怪脈今無脈非五癇可知若作痙治用麻黃髮汗續命祛風恐立斃耳予書原載角弓痧症略相似即投煉石丹一服日夜各減半二服日中不發晚只數次三服全愈但面色不正另立丸方調理而痊真琥珀同燈芯研四錢辰砂研細取豬心血和仍放入心內濕紙包煨心熟為度取出曬乾五錢整大半夏兩洗淨同薑汁半盞牙皂白礬各三錢煮透心極熟曬乾用八錢膽星六錢石菖蒲炙草各五錢棗仁二兩遠志肉白茯神橘紅歸身柏子仁山藥麥冬各兩煮棗肉丸梧子大金箔為衣每服三十丸臨臥圓眼燈心湯下此丸兼治怔忡健忘驚悸癲癇等症加味活命飲一切痧後留滯熱毒發為癰腫發背疔疽穿山甲土炒銀花大黃各三錢歸尾陳皮各錢半花粉赤芍生地薄荷防風白芷貝母甘草節乳香各錢沒藥淨角刺各五分以上三味後下毒在背加角刺錢半在腹加白芷在胸加蔞仁二錢在頭面手足加銀花五錢水入大瓦瓶封口煎溫服側睡忌鐵器酸味諸毒物一方無軍地荷好酒煎大潰勿服六一散降火利竅解煩渴無濕者多服反耗津液加渴水飛滑石六兩粉草末兩夏月涼水調飲加硃砂名益元散治小兒身熱咳嗽微帶驚風燈心湯調服屢效治腹痛法取大公雞一隻其人仰臥放肚上雞即伏如疼止即跳下而愈此法試過亦驗又法凡痧屬肝經者多肝附於背第七骨節間遇犯痧者先循其七節骨縫中將大指甲重掐入候內骨節響方止以鹽塗之如不響即將鹽重擦必便透入遂能止疼補原本未列方五苓胃苓六和正氣見論吐下瀉痧霍亂痧水腹痛痧五苓散加減去桂即四苓白朮換蒼朮加末二味豬苓茯苓澤瀉蒼朮泔浸車前木通胃苓湯去白朮桂草即前上四味加製厚朴陳皮去白六和湯厚朴錢五分赤苓藿香扁豆木瓜蒼朮各錢砂仁半夏人參杏仁甘草各五分暑加香薷冷加紫蘇一方無蒼朮一方有白朮藿香正氣散藿香紫蘇白芷茯苓腹皮各二錢桔梗紫樸陳皮白朮土炒半夏曲各二錢甘草錢每五錢水煎此與六和薑棗引勿輕用或加木瓜傷食重者加消食藥元氣虛弱人慎用續附絡痛方案一客匠年十六發熱久之胸脅痛脈細弱或作勞怯治嘔噦便秘小腹脹急或參用左金便溺通而痛愈緊夜尤甚小便赤色投痧症藥亦未效儒醫孫敬承云脈無變而胸前不可手近其痛在絡用金鈴子肉一個元胡錢蔞皮錢生香附錢半陳大麥仁三錢煎飲一服而愈金鈴入絡佐以元胡氣血俱通似與痧宜而書中未收附記於此又海浮石治痰甚妙並附後金鈴子即川楝子苦寒能導小腸膀胱之熱因引心包相火下行通利小便脾胃虛寒者忌肉與核不並用海石一名浮石咸軟堅寒潤下止嗽止渴通淋化上焦老痰消結核多服損人血氣原敘言康熙庚戍有滌痧丸引刻於毗陵此書症案中屢言滌痧散而方竟失載續當訪補附景岳刮痧新案向余荊人年近四旬於八月終初寒之時偶因暴雨後中陰寒痧毒之氣忽於二鼓時上為嘔惡下為胸腹攪痛勢不可當擋時值暮夜藥餌不及因以鹽湯探吐之痛不為減遂連吐數次其氣愈升則其痛愈劇因而上塞喉嗌甚至聲不能出水藥毫不可入危在頃刻間矣余忽憶先年曾得秘傳刮痧法乃擇一光滑細口瓷碗別用熱湯一鍾入香油一二匙卻將碗口蘸油湯內令其暖而且滑乃兩手覆托其碗於病者背心輕輕向下刮之以漸加重碗干而寒則再浸再刮良久覺胸中脹滯漸有下行之間稍見寬舒始能出聲頃之忽腹中大響遂大瀉如傾其痛遂減幸而得活瀉後得睡一飯頃復通身瘙癢之極隨發出疙瘩風餅如錢大者不計其數至四鼓而退愈後細窮其義蓋以五臟之系咸附於背故向下刮之則邪氣亦隨而降凡毒氣上行則逆下行則順改逆為順所以得愈雖近有兩臂刮痧之法亦能治痛然毒深病急者非治背不可也至若風餅疙瘩之由正以寒毒之氣充塞表裡經臟俱閉故致危劇今其臟毒既解然後經氣得行而表裡俱散也可見寒邪外感之毒凡臟氣未調則表亦不解表邪未散則臟必不和此其表裡相關義自如此故治分緩急權衡在人矣繼後數日一魏姓者亦於二鼓忽患此症治不得法竟至五鼓痛極而斃遇與不遇此其所以為命也又針灸法刺委中穴出血或刺十指頭出血皆是良法今西北人凡病傷寒熱入血分而不解者悉刺兩手摑中出血謂之打寒蓋寒隨血去亦即紅汗之類也故凡病傷寒霍亂者亦宜此法治之今東南人有刮痧之法以治心腹急痛蓋使寒隨血去則邪達於外而臟氣始安此亦出血之意也霍亂吐瀉不止灸天樞氣海中脘三穴立愈霍亂危急將死用鹽填臍中灸二七壯立愈轉筋十指拘攣不能屈伸灸足外踝骨尖上七壯救急良方霍亂絞腸痧以針刺其手指近甲處一分半許出血即安仍先自兩臂捋下令惡血聚於指頭後刺之
