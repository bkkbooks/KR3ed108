頭自出箭簇及針物不出或在咽喉用螻蛄即濕地上夜鳴拉拉呼腦子搗泥敷上不過三五次即出毒箭傷方飲麻油一杯外以雄黃塗之其毒自消又方以犀角削尖入傷口內飲金汁一杯瘡外亦塗之如無金汁以糞汁代之鐵針入肉方用山間轉糞蟲所轉牛糞丸堅圓如彈者研細香油調敷一夜而針仍退出即箭鏃入肉亦效又鼠肝鼠腦搗膏敷又搗雙杏仁以豬脂調貼即出竹木製入喉故鋸燒紅浸酒中乘熱飲之又抓本人頭垢敷之即化又木屑搶喉方鐵斧磨水灌之治刀箭入肉及咽喉胸膈曲隱等處不出方搗杏仁敷之即出奇效治諸竹木及針刺入肉不出生薑橘皮食鹽各等分研為膏塗之自出刺入肉內不出蜣螂蟲搗爛敷患處自出又方鹿角燒存性為末水調敷之又羊屎燒為末和豬油敷之或以牛膝草嚼爛敷之亦妙又桐油頻塗脹腫即止次日刺亦出又砂糖厚敷刺亦出又土狗搗敷又牛膝嚼敷箭簇入目用寒食餳糖清明前一日所作餳糖點入目待其發癢一鉗即出鐵珠入肉用泥鰍打爛敷之亦效槍子傷肉方蜂蜜八兩煎滾加好燒酒一斤儘量熱服取汗安臥次日自出外敷方肥老臘肉搗爛加指甲末象牙末各少許拌勻敷之即出又方山中牛屎上所出菌菰曬乾為末蜜調敷之自出又方用米作寒食餳敷上痛止而癢即出又方巴豆半粒蜣螂一個同搗爛塗癢極即出若錫彈傷入肉內用水銀灌入傷口錫彈自化凡箭鏃斷骨肉間者須用麻藥服之使不知痛庶可鉗出若小刺不出以黑神散名百草霜即鍋臍煤炒盡煙清油調敷即出
