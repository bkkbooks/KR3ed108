亦好木瓜當歸自然銅煅石菖蒲以上各六兩三七沉香防已母丁香廣木香以上各二兩紅花三兩接骨草接骨靈即土牛膝落得打劉寄奴以上各四兩鮮者更妙上藥忌見火須曬乾為細末用蘇木四兩煎水並陳米湯為丸如圓眼大血竭四兩燒酒煮透研末為衣黃酒調服一丸或童便亦可跌打損傷青松絲不拘多少用陳酒糟搗爛敷患處又方榆樹皮搗爛醋調敷患處跌打傷昏迷不省人事此藥灌下立愈蘇木白麻皮細木耳以上各二錢俱用瓦焙焦共為末黃酒同黑糖調服之後將酒飲醉避風睡一宿即愈八釐散良方治一切損傷自然銅醋煅七次研末血竭乳香去油沒藥去油各三錢紅花番木鱉油灼去毛土炒半兩錢醋煅七次蘇木屑各一錢丁香五分麝香二分共為細末每服傷重者五六分輕者三四分紹酒調服三黃寶蠟丸專治一切跌打損傷及破傷風並傷力成癆婦人産後惡露不盡致生怪症瘀血奔心痰迷心竅危在旦夕重者一錢輕者三分無灰酒送下立刻全生如被鳥槍打傷鉛子在內危在頃刻服一錢吃酒數杯睡一時汗出即愈忌涼水生冷燒酒三口天竺黃劉寄奴紅芽大戟各三兩雄黃二兩歸尾一兩五錢孩兒茶上辰砂人參三七各一兩血竭三兩琥珀明乳香去油淨末當門子真山羊血輕粉各三錢水銀同輕粉研不見星三錢藤黃二兩以紗包之入羊血內隔湯燉一炷香每日再以血燉藤黃只留三錢為度各取淨末用好黃蠟二十四兩燉化入前藥末離火攪習滾水燉化為丸大丸每重一錢中丸每重五分小丸每重三分瓷器收貯重物壓打傷凡人手足肩背被重物打傷或青腫紫赤血痕疼痛用蘇木煎汁磨真降香塗之不可落水連搽數日其腫自消散即愈屢試屢驗真神方也降香一名紫金藤軍營中多備以治刀斧損傷之用大西洋十寶散冰片麝香各一分二釐辰砂乳香去油各一錢二分子紅花四錢血竭一錢六分雄黃四錢兒茶二分四釐歸尾一兩沒藥一錢四分以上十味共為細末貯瓷瓶黃蠟封口勿令走氣一治跌打損傷皮骨青腫未破者用陳醋調敷患處即愈一治刀傷並各器械傷皮破出血者以藥末摻上包裹不可見風血止即愈一治內傷骨碎或骨已斷折先將骨節湊準用陳醋調藥末厚敷患處以紙裹外加老棉絮包好再用薄板片夾護將繩慢慢捆緊不可移動藥性一到骨自接矣須靜養百日如犯房事必成殘疾一治刀傷深重末致透膜者先用桑皮線縫好多摻藥末於上以活雞皮急急貼護如前骨損養法即愈一遇跌打昏迷不醒急用少許以陳酒沖服自然醒轉以便調治此方神奇雖遇至重之傷鮮有不起生內再進三黃寶蠟丸更美刀瘡藥降香節白松脂各一兩血竭一錢五分文蛤炒五錢沒藥五分共為細末掩傷處即愈跌打傷骨碎補五加皮川續斷威靈仙各三錢酒煎服跌打損傷垂危方陳皮厚朴桃仁各一錢紅花二錢半蘇木三錢蒲黃二錢歸尾二錢赤芍一錢大黃六分水酒各半煎服欲吐將生薑嚼之牙關不開以薑擦之又方五靈脂元胡索生大黃各等分為細末用上米先將醋熬成稀糊調藥敷傷處干則再敷即愈跌打血瘀大黃一兩當歸一兩傷在上用頭在下用尾在中用身周身全用酒煮服血散則愈跌撲等傷蔥薑韭菜汁松香銅緑米醋燒酒煎成膏烘貼即愈損傷立效土鱉半夏巴豆各一個共搗為丸每服二丸酒送下刀瘡藥方千年石灰三兩韭菜汁拌勻做餅貼牆陰乾赤石脂五錢龍骨五錢人指甲二錢冰片麝香各五分共研末擦之此係宮內祕方極其神效立效散專治跌打內傷並閃挫風氣一切疼痛當歸二錢通草一錢桃仁二錢穿山甲二錢懷牛膝一錢五分製大黃二錢五分中青皮一錢骨碎補去毛淨二錢乳香二錢沒藥二錢白芷一錢五分蘇子一錢紅花一錢五分杜仲二錢降香一錢甘草一錢血竭三錢三七一錢五分地鱉蟲二錢米店內多有石南枝頭三錢共煎湯加童便一酒鍾老酒一酒鍾溫服極重者二服可愈今改為末子藥如遇病不重者只需每服吃末子藥五錢外加童便一杯老酒一杯送下輕者三服重者仍照方前服脅破腸出凡人或因跌打脅破腸出急以油抹入煎人參枸杞淋之連食羊腎粥十日愈冷水噴面更妙內傷久發凡跌撲夯傷胸脅腰肋等處並肩挑負重失足蹬筋初時不覺延至經年纍月忽然疼痛浮面按之不痛撳重方覺或咳嗽吸氣牽掣吊痛此乃內傷氣逆血滯日久恐患壅毒用生大黃一兩只可烘勿火炒以老薑二兩舂爛串滾水一杯絞汁隔湯燉溫調大黃末如膏塗於痛處不必留頭蓋以粗紙外用棉系之一日一換三日即愈神效無比預製金槍藥凡刀斧傷跌撲打碎敷上即時止血止痛更不作膿患處不可見水屢經試驗有力者可合以濟急雄豬油一斤四兩熬化去渣松香六兩熬化去渣黃蠟六兩熬化去渣樟腦三兩研麝香六分冰片六分乳香沒藥各一兩去油真血竭兒茶各一兩研極細末輕粉四兩炒研先將黃蠟松香豬油熬化待冷入煎藥拌勻瓷瓶收貯勿令泄氣待用救殺傷凡殺傷末透膜者用乳香沒藥各一塊加皂角子研爛以童便半盞好酒半盞同煎溫服然後以花蕊石散或烏賊魚骨為末敷瘡口上立止附花蕊石散沒藥羌活紫蘇細辛草烏厚朴白芷降香當歸蘇木檀香龍骨南星輕粉以上各二錢蛇含石三錢童便煅三次花蕊石五錢童便煅七次真麝香三分共研極細末用蔥湯洗過傷處以此摻之軟棉紙蓋一日一換神效軍門丹治刀傷第一方降香挫屑牡蠣白蠟五倍去蟲屎各一兩乳香四錢生半夏血竭各五錢真三七一兩無真者用草三七二兩代象皮研五錢上研極細末瓷瓶收貯止血止痛無瘢金瘡切忌飲水但食肥膩物解渴而已若食熱薄粥血沸必死跌打諸傷凡撲壓跌打或從高墜下及竹木磕傷墜落馬下覆車等傷皆瘀血凝滯大小便通者輕不通者重以淡豆豉一合煎湯飲之或用生薑自然汁和麻油溫服之再將淨土蒸微熱以舊布重裹分作兩包更換尉之不可太熱若骨節打折離脫搗生蟹極爛用淡酒沖服任量飲之即以蟹渣敷患處或用大蝦蟆生搗如泥敷患處縛定其骨自合又方用地鱉蟲十個酒炙蚯蚓十條焙乾自然銅二錢醋煅骨碎補三錢乳香五分共為末加蘇末三錢酒煎服此方有加用沒藥紅花血竭各三分者金刃跌打神效方馬前子一斤枳殼半斤以上藥二味先將馬前子用童便浸二十四日加入枳殼又同浸二十五日取起清水洗淨馬前子去皮枳殼去瓤並切成細片晾乾用黃土拌炒成黃黑色共研細末瓦瓶裝好聽用刃傷見血無論輕重皆可敷摻用布裹好傷輕者立時止血結痂切忌見水重者或不能登時止血仍用藥加敷傷口自然血止若甚重之傷用藥一小茶匙體壯者二茶匙加麝香一釐研勻查明後開引子另煎取汁和藥用黃酒沖服能飲者服藥後不妨盡醉而睡用棉被蓋緊切忌受風俟汗出即愈次日以鮮豬肉做湯與傷者食跌打重傷並末見血者亦查明後開引子照服即愈此方無論敷摻沖服所有飲食均不禁口尚須以發物與食免其日後發傷作疼作痛附服藥引子傷在頭引用川芎傷在手引用桂枝傷在腰引用杜仲傷在腎引用破故紙傷在腳引用川牛膝每用各三錢刀傷急治方柿餅搗爛塗之損爛寸余深者千年石灰輕粉血竭白蠟象皮等分研末摻上刃傷出血不止真降香瓷瓦刮末於石碾研細敷之骨斷折碎活蟹一隻選肥大而多膏者連殼搗如泥入生薑四兩入醋一杯帶糟更妙老酒一碗連糟亦可搗勻擠出汁煎滾灌下其渣炒熱敷患處扎定如只損破不曾折斷者只吃汁不敷渣凡骨斷折碎俱極神效能令骨節歸完真妙方也龍睛丹治金刃等傷血出不止桂圓核炒去亮黑皮磨極細摻之神效跌打損傷敷藥方劉寄奴川烏草烏薄荷骨各四錢生梔子三錢生大黃沒藥各二錢上藥酌加蔥一把薑一塊面酒同搗極爛再量加醋皮破不腫者不用醋鍋內炒熱敷患處外用布裹好板片夾住對時一換治刀斧傷血不止方紫降香用瓷瓦鐮刮下石碾研細忌鐵敷上即止又無瘢痕又方天南星血竭等分研細末敷即止治折傷先用止痛法白礬為末每用一匙沸湯化之以帕蘸熱尉傷處少時痛止然後排整筋骨貼藥治磕傷折傷疼痛不止用蔥白連葉煨熟或炒各熱搗爛敷之冷即再易一人傷指血出淋漓再易而疼止隨愈凡殺傷氣未絶者用之即愈又方灶內小灰一盆用水一碗半拌勻火上燉熱將灰攤在患處冷即易之潤一時日二次皮上青色出即愈又方薑汁和酒調生面貼之治刀箭傷出血甚多若血冰冷則殺人磁石末敷之止疼斷血又方宜用炒鹽三撮酒調服之刀口箭簇傷大五倍子真降香等分為末敷傷處止血結痂不怕下水加象皮一兩更妙咽喉戳傷飲食不下雞蛋一個鑽一個孔去黃留白入生半夏一個以微火煨熱將蛋白服之即愈刀斧傷不可見水用車前葉搗爛敷之可以止血用生半夏末帶血敷上立止痛能生肌收口或韭菜汁拌陳石灰陰乾摻之又方山奈研細末瓶收固封遇患者敷之立效又方羌活焙為細末亦妙又方羌活防風口嚼爛和白糖敷之止血止痛又方石灰半斤莊黃切片酒濕一兩五錢同炒以灰變色為度有血乾摻無血水調敷已驗又方烏賊魚骨即墨魚骨又名海螵蛸乾摻極效又妙方治刀斧或打破重傷用頂好蘇柿餅土餅不可用鐵舂臼杵融以人更換連搗三日三夜取出瓷瓶收貯固封遇患者敷用雖重傷易愈已驗治金瘡流血多必發渴切不可飲水飲則立亡生地當歸麥冬玄參各三兩人參二兩甘草制乳香沒藥劉寄奴花蕊石各三錢三七根末續斷白木各五錢地榆一兩四劑愈真神方切不可忽視金瘡方瀝青不拘多少為末加響銅屑和勻摻之立愈又方刀械殺傷悶絶氣未絶者急用蔥白熱鍋內炒熱遍敷傷處繼而呻吟易蔥再敷俟蘇定用真三七研末以口津調敷立愈治刀斧斬神效祕方專治刀斧斬並跌打損破一切水火誤傷無不立愈用飛過五六次之黃丹四兩樟腦末二兩共研極細貯瓷罐遇有諸症蜜調二茶匙敷患處即痛止過夜結痂腰閃作痛及一切手足傷損不出血但有青紫內傷先以蔥白搗爛炒熱將痛處擦遍隨以大黃研末生薑汁調敷儘量飲以好酒即三個月半年不愈者皆效跌傷簡便方煙店內捆煙爛麻索燒研每服二錢黃酒送下重者三服即愈跌破刃傷取冬日絲瓜葉陰乾擂末敷上無痕跌打刀箭傷洗藥方防風荊芥甘草等分煎湯無風處洗之金瘡救急方白棉花絮燒灰塞患處止血定痛神效跌打金槍出血頭髮一撮燒灰白氈帽戴過多年者燒灰共為細末搽上即效刀槍傷牛膽一個石灰不拘白芨五錢為末入牛膽內陰乾每用少許生肌止痛切不可經婦人手營官祕傳刀槍藥方千年石灰一兩上白石膏一斤火煅用三錢淨板松香一斤提淨用五錢白蠟八錢獨活三錢冰片一錢珍珠一兩豆腐煮過一錢共為細末神效定風散治破傷風金槍刀斧打破損傷並能生肌並治癲狗咬天南星防風各等分為末如破傷風瘡口敷之再難溫酒調服一錢角弓反張童便調服一錢打傷欲死心頭微溫童便調灌二錢癲狗咬破先水洗淨用絹拭乾上藥患處必不再發大有神效跌撲折骨雄雞血和淡酒熱飲至醉痛即止閃腰挫氣以下三方屢試皆驗番葡萄乾一兩好酒煎服重者兩服即愈又方硼砂研細末點眼睛四角亦愈又方王不留行一錢二分炒研細末好酒調服即愈夯傷腳域蜈蚣一條研末荸薺一個去皮蔥管七寸共搗如膏貼患處周時一換五日其域根脫出少林寺僧傳奪命丹治跌撲重傷不能言語大小便俱閉鼻有一絲氣者服此神效當歸草烏明沒藥滴乳香血竭半兩錢醋淬數十次自然銅醋淬七次各等分為細末每用二三分黃酒送下傷重極者二三服即愈百日內忌荸薺如出血過多神氣虛極者不可服五靈散治跌打損傷止血生肌最效海螵蛸川貝母血竭乳香沒藥等分為末敷之四生散凡刀斧跌打損傷研細末敷之立愈黃丹六兩明松香六兩生半夏六兩石膏生三兩熟三兩閃跌疼痛並風寒襲入經絡舉動不便諸症梔子七枚杏仁七粒研細末入雞蛋清一個量加燒酒麥面打成稠糊敷患處隔宿拔出藍色即愈打傷瘡口散血或初打傷浮腫疼痛亦用此敷乳香沒藥赤石脂白芷羌活獨活滑石煅共研細末麻油調敷打破頭傷結口白礬煅白蠟水粉各等分為末搽之立效生肌散治打破頭上白蜜八錢香獨活生石膏大黃各五錢陳石灰一兩陰陽瓦焙紅合細末搽之打傷破血生肌桃花散龍骨火煅五錢花蕊石隨分乳香沒藥去油各一錢石膏一兩輕粉二錢靈草削皮雞肉骨筋五錢大黃五錢赤脂一兩煨石乳隨分共為細末加血竭研麻油調塗如血不止者將細紫草末敷即止破傷風蟬蛻為末蔥涎調敷破處即時去惡水立效又方防風白芷共為末內服外敷極妙金瘡煎藥方赤芍桃仁南星甘草當歸白頭翁秦艽牛膝羌活茯苓加皮靈仙防風白芷丹皮薑皮引水煎服二劑破傷風邪初傳在表羌活川芎防風藁本當歸芍藥各一錢水煎服如內熱大便祕加大黃一錢三分自效跌打九斧破皮黃丹飛過四兩潮腦二兩共研細末瓷瓶內收貯遇傷蜜調一二茶匙敷之刀口方白蠟四錢飛甘石五錢冰片五分月石三錢藥珍珠一錢共為末敷之此萬應神方也金瘡傷重久不結口火腿腳爪五倍子各五錢俱燒灰共為細末搽上即愈金瘡方陳皮一兩金毛狗脊五錢黃丹五錢初生紅鼠二個共為細末用百草汁搗成餅陰乾為末敷上止血止痛又方金毛狗上之毛貼破處即止血定痛結口生肌又方生明礬為末撮上即止血定痛又方生半夏六錢白蠟四錢為末敷之又方陳黃丹陳石灰各六錢桂片乳香沒藥發灰各一錢炒為紫色共研細末止刀箭出血木器損傷極其神效跌打損傷蝦蟆草又名皺百草又名荔枝草治跌打擂融取汁糯米酒參入服渣敷患處其餘刀斧傷湯火包癤一切無名腫毒均搗爛敷之甚效凡撞打跌破傷風者名破傷風外用生南星防風嚼爛敷之內用制星片防風煎水服又方舊蒲扇燒灰白砂糖和勻糯米酒沖服治跌打又祕方治跌打蚯蚓三條焙乾為末酒沖服只要氣未絶可救又方八九月取大蟹殼線穿挂當風處陰乾為末凡遇跌打好酒沖服三四錢神效又方芥辣菜子擂末調雞蛋清抹痛處數次自安打跌有傷胸膈不食以生豬肉切成細末溫酒送下一錢即思食跌打手足折斷急以杉板夾住手足不可顧人之痛急為之扶正湊合停當或用厚杉樹皮緊縛不可移動用接骨至神丹大黃三錢當歸白芍紅花各三錢丹皮二錢生地五錢土狗捶碎十個地蝨搗爛三十個羊躑躅炒黃三錢自然銅煅醋淬為末先將前藥煎好然後入自然銅末調服一錢連湯吞之一夜生合二劑可愈此神方也打傷白蠟一兩藤黃三錢入麻油溶化塗傷處此方止痛止血及湯火傷皆炒跌打及牆壁壓傷神驗方川麻一分木香二分紅花三分甘草四分研末黃酒送下均生用損傷久不愈冬瓜仁炒研末酒沖服墮撲損傷瘀血在內煩悶蒲黃五錢研末空心溫酒服三錢一切損傷急救方不拘金石木器手足及騾馬咬傷等類見血敷上即封口止痛生半夏松香或煮或壓去油各等分為末敷傷處墜車落馬筋骨痛不止玄胡索末好酒調服二錢日進二次桃花散治跌損刀傷狗咬爛腳等症年久風化石灰一斤炒至桃花色存性錦紋大黃一兩焙脆研末上藥將真麻油調敷當日敷更效軍中第一仙方治跌打損傷刀箭傷人指甲灰血餘炭各一錢陳松香五錢生狗頭一個刮淨肉露天火煅存性上研細末摻傷處斷骨即續刀傷即愈或用酒沖服亦可治跌打損傷閃挫時即於無風處將紙捻觸鼻內用力打嚏二三十次則氣升而痛自止再用胡桃肉搗爛傾入熱酒內儘量一醉即愈又方用韭菜打汁與童便各半和熱酒飲醉或有折傷脫節外用糟湯浸洗忍痛搽上用竹木綁扎急尋地鱉蟲炙脆為末酒調服又方治一切跌打損傷遍身青腫瘀停作痛及墮撲內傷歸尾一兩三錢滴乳香去油洋沒藥去油辰砂水飛血竭瓦上醋炒兒茶研末瓦上焙各一錢五分明雄黃五錢冰片麝香各一分七釐上共為細末瓷瓶收貯每服五分重者二服好酒隨量下又方並治金刃傷雞骨炭即條炭擇堅而長者紅糖上味量傷大小約用炭八兩紅糖三兩先將炭扇極紅極透即傾入血中入紅糖搗如泥乘熱敷傷處止痛活血神效如皮破出血不止以敗葫蘆內白膜貼之上再敷藥治折傷斷筋損骨生地黃搗取汁好酒和服一日二三次最炒又搗爛蒸熟封貼傷處二日筋骨即連續蓋地黃屬骨也救刃傷凡殺傷不透膜者用乳香沒藥各一皂角子大研爛以小便半盞好酒半盞同煎至半盞溫服然後用烏賊魚骨或龍骨為末敷傷處即愈刀斧破傷韭菜同石灰搗成餅貼牆上乾透研末極細血流不止摻上立愈金瘡腸出多用小麥煮水濾汁待極冷令病人臥席上含汁噴其背則腸漸入初噴勿令病人知如腸末入抬席四角輕搖自入既入用麻油潤線縫之仍潤帛扎束慎勿驚動免瘡口迸裂又大麥湯洗腸納入桑白皮線縫住飲粥百日愈金刃傷用好雞骨炭擲地有聲者同好松香各等分搗成一塊用老韭菜子汁拌濕陰乾如此搗拌三四次為細末收貯每遇金瘡敷之立愈切不可飲冷水及稀粥只食乾飯治刀剁落手指並治金瘡奇驗有加血竭四分者真降香六分荔枝核燒存性四分拌勻將剁下手指頭用口含以津潤之將藥敷上用大筆管或竹筒兩半個合捆直外用布敷之勿搖動七日愈治顛墜拗損桑根白皮焙為末一