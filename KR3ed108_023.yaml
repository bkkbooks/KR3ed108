body:
  text: 卷二十三跌打損傷總論六脈綱領曰浮沉遲數滑澀浮沉以部位言而虛實濡弱革牢六脈從之遲數以至數言而緊緩促結代五脈從之滑澀以形象言而長短洪微芤弦動伏散細十脈從之此脈之大概也又有解索雀啄屋漏魚翔彈石蝦遊等名皆死脈人有四海腦為髓海丹田為精海臍為氣海脾為血海人有五餘頭髮屬心血之餘眉毛屬肝筋之餘須屬腎精之餘腋毛屬脾肌肉之餘陰毛屬肺氣之餘也又指爪筋之餘筋乃骨之餘骨乃精之餘皮乃血之餘脈乃氣之餘骨節乃五臟之餘也五臟之竅舌為心苗心寄竅於耳眼為肝竅口為脾竅鼻為肺竅耳為腎竅腎又開竅於二陰焉五臟絶症鼻孔向上而黑者肺絶也嘴唇反起黑色者脾絶也魚目定睛人中陷者肝絶也舌尖黑色芒刺有胎心絶也兩耳黑色腎囊吊起腎絶也以上五絶之症不治頭為諸陽之會正額屬心心主血最畏見風若破傷風頭額腫者即死治法總論夫跌打損傷氣血不流行或人事昏沉往來寒熱或日輕夜重變作多端昧者不審原因妄投猛劑枉死多人誠可惜也治宜及早半月後才醫瘀血已固水道不通難為力矣既表不可復表要仔細看明隨輕重用藥青腫轉紅色血活將愈若牙關緊閉不能進藥萬無生理坐臥避風忌一切生冷牛肉縮筋豬肉發病亦不宜食遇有重傷解衣諦視遍身血道形色若何診脈調和與否脈絶不至者死沉細者生山根好陰囊有子可治腎子入小腹無治頂門一破骨陷難存囟門被傷髓出即死心胸緊痛青色勝裹心乃偏心受傷可治紅色勝裹心乃心口受傷不治上心口青腫一七即死傷小腹而不及肚可治若陰陽不分糞下不止氣出不收則肚傷矣食管雖斷在飽食之後延二日不死者可治若鼻孔黑色舌大神昏則臟腑絶矣耳後為制命之處脊骨無續斷之方男子乳傷猶非重症婦人乳傷卻是危機正腰受傷笑者多凶小腹受傷孕婦最忌以上姑述其大者在醫者臨症制宜可也十二時氣血流注歌寅時氣血注於肺卯時大腸辰時胃巳脾午心未小腸膀胱申注酉腎注戌時包絡亥三焦子膽醜肝各定位血頭行走穴道歌周身之血有一頭日夜行走不停留遇時遇穴若損傷一七不治命要休子時走往心窩穴丑時須向泉井求井口是寅山根卯辰到天心巳鳳頭午時卻與中原會左右蟾宮分在未鳳尾屬申屈井酉丹腎俱為戌時位六宮直等亥時來不教亂縛斯為貴左右論凡受傷不知左右若有吐血症見血自明血黑者左受傷血鮮者右受傷若無血吐出即看眼珠亦可知其定所烏珠包醜者傷在左白珠包醜又加紅大者傷在右左屬肝右屬肺烏珠屬肝白珠屬肺瞳人屬腎常見右邊受傷發時左邊便痛不可單治一邊必左右兼治其病始愈用藥歌歸尾兼生地檳榔赤芍宜四味堪為主加減任遷移乳香並沒藥骨碎以補之頭上加羌活防風白芷隨胸中加枳殼枳實又云皮腕下用桔梗菖蒲厚朴治背上用烏藥靈仙妙可施兩手要續斷五加連桂枝兩脅柴胡進膽草紫荊醫大茴與故脂杜仲入腰支大茴與木香肚痛不須疑大便若阻隔大黃枳實推小便如閉塞車前木通提假使實見腫澤蘭效最奇倘然傷一腿咎膝木瓜知全身有丹方飲酒貴滿卮苧麻燒存性桃仁何纍纍紅花少不得血竭也難離此方真是好編成一首詩庸流不肯傳毋乃心有私藥中禁忌乳香沒藥二味方中屢用務要去油若不去油恐其再發凡皮破傷用象皮須滑石炒以免作膿凡損傷骨斷皮破者藥用水煎皮不破者藥用酒煎必加童便以活瘀血發散方凡跌打損傷先用發散為主川芎羌活枳殼澤蘭荊芥防風獨活歸尾乾薑各一錢加蔥白三莖水煎服十三味總方三稜五錢赤芍骨碎補各一錢五分當歸傷上中二部用全歸傷下部用歸尾蓬朮元胡索木香烏藥青皮桃仁蘇木各一錢若傷重者大便不通加大黃四錢恐有瘀血入內澀滯通瘀為主用陳酒半斤煎又加縮砂仁三錢同煎服十四味加減方菟絲子肉桂劉寄奴蒲黃杜仲元胡索青皮枳殼香附五靈脂歸尾縮砂仁各一錢五加皮一錢五分廣皮二錢酒水各半煎服七釐散地鱉蟲去頭足血竭硼砂各八錢蓬朮醋炒五加皮酒炒菟絲子木香五靈脂醋炒廣皮各五錢生大黃土狗各六錢硃砂猴骨各四錢巴豆霜三稜青皮肉桂去粗皮不見火各三錢赤芍酒炒烏藥炒枳殼當歸酒炒蒲黃生熟各半各二錢麝香一錢五分以上各制共為末傷輕者服七釐重者服一分四釐最重者服二分一釐陳酒沖服仍可加入十三味總方內服之內瘀血攻心者即醒飛龍奪命丹硼砂地鱉蟲自然銅醋炙七次血竭各八錢木香六錢當歸桃仁蓬朮五加皮酒炒猴骨制各五錢元胡索醋炒三稜醋炒蘇木各四錢五靈脂醋炒赤芍酒炒韭子炒蒲黃生熟各半破故紙鹽水炒廣皮炒川貝枳殼硃砂葛根炒桑寄生炒各三錢肉桂去粗皮不見火烏藥羌活麝香杜仲鹽水炒秦艽炒前胡炒土狗不見火青皮醋炒各二錢以上各制共為細末傷重者服三錢輕者服一錢五分老酒沖服仍可加入十三味方內服之地鱉紫金丹地鱉蟲硼砂血竭自然銅各八錢烏藥土狗元胡索醋炒當歸酒炒桃仁威靈仙酒炒川牛膝各五錢麝香香附制木香各四錢川續斷鹽水炒五加皮炒猴骨制蘇木貝母廣皮炒澤蘭五靈脂醋炒各三錢菟絲子不見火二錢以上各制共為細末傷重者服三錢輕者服一錢五分酒送下損傷用藥論凡跌打損傷之症不可概論也青腫不痛或腫不消退者氣血虛弱也用十全大補湯若腫或作寒熱者血傷而肝火動也用四物加山梔柴胡血出不止或又發寒熱者用四君子湯加川芎當歸柴胡寒熱而痛甚者欲潰膿也用參耆內補散若膿出而痛甚者氣虛也用八珍湯瘡口赤肉突出者血虛而肝火生風也用柴胡梔子散若膿不止瘡口白肉突出者氣虛而有邪感也用補中益氣湯若膿潰而痛或潰而不斂者皆脾胃虛也用六君子湯苟徒知服涼藥而不潰不斂所以致敗症也受傷若腸中作痛按之不能寧者內有瘀血也用承氣湯下之下後仍痛瘀血猶未盡也用加味四物湯調之按之不痛血氣傷也用四物湯加參耆白朮下後胸脅作痛肝血傷也四君子湯加川芎當歸下後發熱氣血皆虛也用八珍湯加當歸半夏胸脅脹滿飲食不思者肝脾氣滯也用六君子湯加柴胡枳殼咬牙發搐者肝盛脾虛也用蜈蚣散加川芎山梔鉤藤天麻以上須要謹慎不可妄用也各方載後十全大補湯人參茯苓川芎當歸白芍地黃黃耆肉桂各一錢白朮一錢五分炙草五分水煎服四物湯當歸地黃各三錢炒白芍二錢川芎一錢五分水煎服四君子湯人參焦術各二錢茯苓炙草各一錢薑三片棗二枚水煎服八珍湯人參茯苓川芎當歸炒白芍地黃各一錢白朮一錢五分炙甘草五分水煎服補中益氣湯黃耆二兩人參一錢炙草八分半夏一兩炒白芍獨活防風各五錢炒白朮茯苓澤瀉柴胡各三錢連翹二錢羌活一錢五分生薑三片棗二枚水煎服六君子湯即四君子湯加陳皮一錢製半夏一錢五分水煎服加味承氣湯治瘀血在內者大黃厚朴枳實羌活防風當歸生地朴硝各一錢水煎空心服多寡隨量加減加味四物湯治瘀血未盡者當歸川芎白芷生地桃仁紅花枳殼牛膝大黃蘇木羌活各一錢水煎早服逍遙散柴胡土炒白朮茯苓各一錢當歸酒拌二錢炙草五分薄荷六分加煨薑三片水煎服異功散即六君子湯去半夏獨參湯人參一兩水二鍾棗十枚或蓮肉龍眼肉同煎服六味湯地黃四兩山茱萸山藥各二兩茯苓丹皮各一兩澤瀉一兩五錢水煎服若破傷出血不止者加麥冬五味子各三錢托裡散金銀花五錢當歸二兩大黃花粉連翹各五錢牡蠣皂角刺各三錢黃芩赤芍各一錢朴硝五錢酒水各半煎服跌打損傷辨生死訣頭頂受傷口鼻出血手足不動急灌童便一碗若能知痛手足轉動者可治若手足難動言語不明不治氣喘厄塞者七日必死頂門傷破骨未陷入者可治骨碎陷入者不治氣出不收者不治囟門出髓者即死食後受傷七日不死可治眼閉者不治太陽受傷暈倒在地急灌童便一碗若能知痛者可治不知痛者七日死如知痛頃刻又暈者二十一日死耳後受傷血入內者不治兩目受傷可治山根受傷不斷者可治斷者不治食管斷者不治氣管全斷者不治未斷者十可救五色紅者可治發青黑色不治兩肩受傷血入內者不治心口受傷青色者七日死服藥三日後轉紅黃色者可治食飽受傷三日不死可治心窩骨斷者不治兩脅受傷痛緊急者七日死傷入肺者十四日死傷入肝膽面青發暈口吐黃水者不滿五日死如痰冷者四十九日死筋骨麻木身熱如火飲食不進者不治破傷血入內者不治血流出盡者不治出黑血黑水者不治兩乳受傷男人可救宜急治女人難治大腹受傷不發暈口內吐飯者可治若不吐飯腹內作痛不絶四十日死發熱亂言至夜發厥者三日死小腹受傷血入內者其脈不實不治孕婦犯胎者胎必下不治大腸受傷糞從口出當日死若便出尿四十九日死不能語二十日死眼目眩暈手足皆冷難治過一時能轉熱者可治小腸受傷昏暈發熱口中亂言七日死不分陰陽者不治腹破腸出未斷半斷者可治全斷者不治不臭者可治臭者不治色不變者可治變紫黑色者不治腰傷嘔血急飲童便一碗自知痛者可治不知痛而發笑者三日內死夾脊骨受傷斷者不治腎經受傷嘔吐不出全身難動掙坐不起睡臥不安七日死若吐鮮血十日死外腎傷囊內有子者可知子入小腹者不治子碎囊內者不治囊腫不從上痛者可治時日久長連腹內作痛者四十九日死若發熱發暈三日死人事不知手足不動一時死囊破子入小腹者不治子未入腹雖垂縣於外可救老人左股壓碎者不治凡受傷後魚際骨有脈者可治脈不動者死脈大而緩不治汗出不止形象變者防五日死目暈青色者不治魚口傳風不治頭目青黑額汗不流眼小目瞪身汗如油謂之四逆不治仙授外傷見血主方按症加減歸尾川芎地黃白芍益母草藁本各二錢乳香炙沒藥各二錢五分川續斷三錢蘇木一錢五分白芷一錢甘草五分生薑三片水煎服頭頂傷加升麻一錢肉桂二錢頭骨沉陷加白芷三錢腦門腫痛加茯苓白朮各二錢腦髓出加香附二錢白附子蒼耳子牡蠣各一錢面青懶食腹痛加柴胡茯苓各一錢五分陳皮八分升麻半夏黃耆各一錢破處生蛀加細辛青黛蟬蛻各一錢蛀即化為黃水滾出腦側近耳邊寒熱作痛加丹皮一錢石棗澤蘭各二錢目傷出血不止用人乳飯上蒸過塗之如黑睛脫出用手掌趁熱按進將絹緊緊包住三日不開外用生地黃搗爛貼退其血內服方加木賊草石決明菊花各一錢目眶傷損胬肉脫出用杏仁去皮尖嚼細吐手掌上趁熱以棉裹筋頭按胬肉上四五次送安目內再用鮮地膚子汁點之自愈如無鮮者即濃煎熬膏亦可後以清水調生半夏末搽六七日眉毛即生目傷青腫水調生半夏末塗立愈耳傷加磁石一錢鼻傷加辛夷二錢鱉甲三錢頰傷加獨活細辛各二錢唇傷加升麻秦艽各二錢牛膝三錢舌傷加石膏二錢升麻三錢用黃芩片貼舌上含之以斷其血齒傷加獨活細辛穀精草血流不止用燈心緊咬立止左肩傷加青皮一錢右肩傷加升麻一錢喉項傷加羌活獨活穀精草各一錢手傷加桂枝禹餘糧各一錢薑汁五匙胸傷加川貝三錢柴胡一錢枳殼二錢乳傷加川貝百合各二錢漏蘆一錢胸腹傷強言亂語加辰砂茯神各一錢遠志一錢五分金銀箔十張盆子二錢為引吐黃水加木香木瓜扁豆大茴各一錢大黃二錢砂仁十四粒左脅傷加北芥子一錢柴胡一錢五分右脅傷加北芥子一錢升麻二錢腹傷加大腹皮二錢如腹破腸出加黃耆鹿茸各二錢其腸將手輕輕按入不可犯指甲其傷口用柿餅衆人嚼碎填塞七日全愈若不便以手按者用磁石末滑石粉各二錢米飲調服其腸自入如不入將病人臥席上四角用人拿定舉搖其腸自入或以小麥煎濃湯待冷不令病人知含噴其背漸漸自入不令多人相見並止旁人説話腹破脂膜出用銅刀割去傷口用竹片夾住十日自愈腸入後食羊腎粥十日不可大飽若傷口燥裂以熱雞血塗之腹傷倒𦚩者將病人橫臥被上被四角用人拿定打懸一頭提起一頭放下彼此上下令病人左右轉旋數次其罔奄即歸原處矣小腹傷加小茴一錢槐花二錢背傷加香附木香各一錢羌活一錢五分腰傷加木鱉子一個杜仲牛蒡子破故紙小茴白芷各一錢大茴八分巴戟二錢臀傷加白蠟自然銅各二錢腎囊破睪丸跌出血筋未斷者將手輕輕托入用桑白皮取絲成線以針縫合其皮外用生肌散塗之如睪丸墜地無血筋相連取起搗碎早米飯搗糊為丸空心黃柏湯送下傷口仍用上法縫之三五日如舊寒熱發搐咬牙唇口牽動加天麻升麻各一錢柴胡八分囊腫痛不愈飲食少思加人參白朮柴胡各一錢兩足腿傷加牛膝二錢木瓜苡仁五加皮檳榔石斛蘇梗各一錢傷口作癢加乾葛一錢防風荊芥連翹殼各一錢五分赤芍二錢血出多瘦弱加人參麥冬各一錢煩躁不止加柴胡五分丹皮一錢面黑喘急加人參五分蘇梗一錢膿出口噤流涎加人參三錢柴胡升麻各一錢膿出不幹加滑石蒼朮各一錢白朮一錢五分手足微搐眉目微動加鉤藤柴胡各一錢手撒目閉汗出如雨加人參一兩附子五錢眼開能言氣不相接加人參黃耆白朮各一錢外敷生肌散炙乳香炙沒藥白芷赤石脂兒茶龍骨貓頭骨五倍子各一錢共研細末補唇方法龍骨乳香沒藥白芨白蘞文蛤黃連黃柏各三錢麝香少許人乳調敷先將麻藥敷缺處一刻再用竹片夾住兩邊缺弦用快刀削去薄皮將繡針二枚上下合正拴定用線緊緊扎住外敷藥散三四日後其肉生牢去針又用藥摻針孔處痊愈若新打破者不必用麻藥去皮依法敷藥即效破傷總論夫刀傷雖易實難筋斷腹破皮連骨削刺入骨間箭簇斷在肉內或破後傷風如此等症最宜良手皮開而長者必用細針將兩邊新破皮慢慢扯合以針拴好內外搽藥不可用膏藥貼蓋恐敗血成膿肉爛難斂如燥痛時以豬油或麻油拭之腹破腸出者令平臥避風處選用油搽傷口四旁緩緩將腸送入腹內用藥線將皮縫好然後敷藥三日內不可轉側須待藥氣流通不見疼痛方可箭簇斷骨肉間者須用麻藥服之使不知痛庶可鉗出若小刺不出以黑寶散敷之即出指節或骱骨被傷而偏者或連皮屈折者必要傷時理正若至潰則不可整矣敷貼扎縛均須仔細勿令黏連至後成膿老年虛弱羸瘦不忍痛苦者須以救生為本不必定施整理也凡頭上傷或筋管穴道之處血來必湧須預調備止血之藥打開看時內有碎骨斷髮等類必要盡行取出速以藥敷好必用玉真散蓋護防其傷風爛壞者用收斂藥至肉滿不得結痂肌有小孔流膿不合者必有碎骨或芒刺斷髮之類纏住新肉故也必用烏金膏三品錠插入潰開好肉細察取出方能收疔結痂或生疔或內有膿窠者亦用此法治之刎斷喉者傷及內喉飲食不可進則難治矣先以血竭末撒內喉四旁勿令漏入管喉以桑線縫合外皮再用風流散蓋一層補血膏貼之四圍周密不可泄氣內服參竹飲以接元氣並清氣血之藥自然全愈玉真散南星白芷防風天麻羌活白附子各等分為末敷用護風亦可調服二錢風流散降香節四兩血竭二兩五錢蘇木二兩乳香五錢沒藥三錢龍骨二錢紅花一錢桔梗少許燈芯一把哺成形雞蛋十個連毛醋煮黃泥封固文武火煨各為細末和勻再研乾摻上血止後燥痛用清油調敷血不止者以血竭末獨敷立止整骨接骨夾縛手法夫腦者諸陽所聚其太陽囟門腦蓋等處一有破傷即宜分開發尋傷處剪去近傷之發方好用藥若血湧出用燈心嚼成團蘸桃花散塞之無不止矣小則不必若或臭爛先煎消風散服之又煎辛香散洗之洗時切忌當風處猶恐寒熱增重難醫若頭面皆腫此風入里也宜服消風散患處有腫用蜜調聖神散或薑汁醇酒調貼亦可若髓出用安髓散清茶調敷二藥合用尤妙若腦骨沉陷用白金散加淮烏散貼之即時吸起服藥取效夫面有七孔眼居第一為人生一世之最要者治宜詳慎如睛出胞外者趁熱送入但用聖神散貼退其血與腫內仍服藥若黑睛破水出者其目必壞若翻轉在胞內可輕輕撥轉歸原亦用聖神散貼之若血侵睛用桃柳嫩枝生地黃地龍煎水浸豬腿精肉貼眼上祕傳常服活血住痛散及清頭面藥余皆照外傷見血治之夫頰骨脫令患人坐定揉以百十下令口張開醫者以兩手大拇指入口中合手掇定往下一伸復還上一送即入臼矣仍用手巾兜住一時可解夫牙床骨被傷用手揣搦令相按歸原用聖神散貼之外用絹手巾兜住下頰直上縛在頭頂上牙落者去之搖動者以箸撥正血出不止用五倍子白礬煎湯含口中止之以米湯調白金散噙化或用桃花散塞之夫頭頸從高墜鴟縮者先用消風散或住痛散加痹藥昏昏散服之令患人仰臥用絹帶兜其下頰直上頭頂再將頭髮解伸同絹帶拿作一把令其頭睡得平正醫者坐於地下伸直兩腳踏患人肩上用力徐徐拔伸歸原合好用生薑自然汁韭汁酒醋調聖神散貼之綁縛牢固常服尋痛住痛散取效夫肩井欄骨折斷者先消風散住痛散加痹藥昏昏散服之揣搦相接歸原次用蜜調聖神散貼之卻用毛竹一節長短闊狹以患處為度破開兩片用一大片削去稜角闞入骨用棉絮一團實股下以絹帶從股下纏至那邊肩上扎住服藥取效夫肩膊鐵鍬骨破傷出者以消風散住痛散加痹藥服之次削甲辦藥用手巾袱蘸辛香散藥湯洗酓其肩上以舒其肩骨令患人側臥以一人立其面前帶伸患人之手與肩並齊以足撑開患人之脅如此則伸骨而易入也醫者居其肩後用手搦令患骨相接要折試其手上至腦下腦後又過胸前令其掌於心脘下不許搖動卻用薑汁韭汁調聖神散貼之用紙裹杉木皮一大片按住藥上用絹帶一條從患處脅下綁至那邊肩上其大杉木皮亦要穿數孔庶好摻濕內面藥日服加減活血尋痛散取效夫肩脾骨脫出腕外者此骨下段是杵上段身骨是臼治法先用住痛散加痹藥昏昏散服之次削甲辦藥用布手巾袱蘸辛香散藥湯酓洗患處令筋骨舒軟如左手骨脫者令患人臥一人坐其左膝之側曲其左足踏患人左脅下用帶綁住患人肘上繫於坐者腰間坐者以手扶平患人之肘卻低頭向前倒腰向後用力徐徐拔伸患人之骨按正入於脅下如骨脫向內斂脅不開者令患人側臥於地用踏腳凳一條夾其腳背令其轉動著一人曲腰坐於凳子上用絹帶繃住患人肘股上懸於坐者之肩伸腳踏患人脅下然後抬肩帶肘徐徐用力拔伸患骨用手按正其肩腕務要折轉又試其手上到腦後下過胸前反手於臂方是歸原然後調聖神散貼之用絹帶一條從患處綁至那邊脅下縛住又一條從患處脅下綁至這邊肩上亦用棉絮一團實其脅下方得穩固日服消風散住痛散取效夫兩臂骨折斷或破碎者先用消風散住痛散加痹藥昏昏散服之用杉木皮三片削去粗皮捏令微薄如指面大長短以患處為則用棉紙包束黏定用油透甲紙上用左綁繩四部編成柵子如此通漏內面藥干庶可摻濕編畢用熱藥湯酓軟其筋骨令患人臥於地用絹帶縛患人肘臂繫於醫者腰間醫者坐其膝側雙手捉定患肘腳踏其腋下倒腰向後徐徐用力拔伸斷骨用於揣令歸原以薑汁韭汁醋調聖神散攤於油布上貼之外用甲縛寬緊如法帶兜其手肘懸於項下要時常屈伸肘腕不強否則日久筋強難以屈伸日服加減活血住痛散若甲兩頭泡起不可挑破用黑神散油調貼即消夫兩手肘腕骨絡俗名胖㿗若骨出於腕外者先用住痛散加痹藥昏昏散服之後用藥湯酓軟筋骨令患人仰臥醫者居其側用絹帶縛其臂繫於腰間伸腳踏其腋下捉住其股倒腰徐徐用力拔伸揣令相按歸原就以大拇指著力張按其腕中餘四指分四處托其胖㿗後又用兩手指托其骨內卻隨折試其曲肱使能伸屈其骨不再去方是歸原試兩手合掌一齊復舊方好用油紙攤聖神散貼之加甲其甲要闊杉木皮一片可托得胖㿗過其長要至上下臂骨腰間為則杉木皮中間對㿗處剮一大孔容㿗尖轉折可動其孔兩旁皮弦另用皮紙包束黏定復用皮紙包束其甲兩頭亦黏定如此則可屈伸用左綁紙繩編上四部先編大片居中作紙甲兩頭各編繩兩部兩旁余繩復編小甲作兩頭短甲其短甲編作上下兩截每編繩兩部將上截甲綁住上臂骨上下截甲綁住下臂骨上腕間各空二分庶甲不相撞屈手無礙日服活血住痛散取效夫兩手腕骨斷極難調理用藥不可過涼夾後不可時常兜挂項下要時常屈伸坐則令其舒於几案之上或屈或伸臥則令其舒於床席之間時上時下三日後令其折轉上過腦後又反手轉於背上漸漸折試方是活動歸原若過三日能如此轉動亦不為遲縱有腫貼藥切忌過涼恐筋寒貼肉難伸難屈也夫兩手背骨折斷而碎者服酓如前令患人仰臥醫者坐其膝側伸腳踏患人腋下左手托住患人中間三指同作一把著力拔伸右手揣令歸原即與貼藥加夾用杉木皮一大闊片可托掌背過骨其長短從臂骨中間起至掌背拳尖骨為則杉木皮中間對腕骨處剮一橫孔令可屈伸又用杉木皮數小片如指面大其長從臂骨起至掌邊上又兩小片夾臂側邊者略長半寸各用紙束定用左綁繩五部編之將兩部縛其托掌背大甲並兩臂側小甲梢其中一部縛於大拇指根掌兩邊弦上其骨按得牢外四部皆要寬舒用帶懸於項下三日後亦要折轉屈伸活動服藥取效夫兩手掌骨碎肉爛服酓如前揣正相接用麻油調白金生肌散貼之用蜜調聖神散敷四圍紙裹用杉木皮一大片按於掌上又將紙裹軟竹箬一大片蓋於掌背用手巾綁縛如法不必服藥可也夫手指骨斷者先整筋骨合皮用桃花散止其血以竹箬軟者一大片要包得指頭過紙裹定用麻油調白金生肌散攤箬紙上包束患指用帛纏之次日藥干再用麻油透潤三日後再用麻油調白金生肌散貼之仍服活血住痛散取效或蜜調聖神散貼之亦可取效夫肩膊骨脫出如左手脫出醫者以右手叉其左手右手脫出醫者以左手叉其右手以膝跪其脅用手帶伸如骨向上以手托其上要如故搦軟其手可齊頭上肩方可貼藥以紙塊實其腋下用帶二條一條從這邊肩上纏至那邊腋下一條從那邊患處腋下纏至這邊肩上日服住痛散自安夫腰骨背脊骨折斷者令患人覆臥凳上用大研米錘置於腹下用絹帶縛其兩肓胛於凳腦上又縛其兩足於凳腳橫檔上如此則鞠曲其腰斷骨自起而易入也再用曲扁擔一條從背脊趁直壓其斷骨徐徐按入相接歸原然後用聖神散貼之再用紙裹杉木皮一大片按在藥上以暖肚緊緊縛之日服加減活血住痛散取效夫兩脅筋骨折斷者不必夾縛日服加減住痛散取效夫兩腿環跳骨脫出者此最難治之症也足短者易治足長者難治日服加減活血住痛散取效夫兩足腿骨折斷者酓服如前令其仰臥綁其胸腋繫於凳腦上如右足患直伸左足豎屈右足醫者側立右手凳弦邊揳其右足踏患人右臀尖一人以帶系患人右足脛骨正坐凳頭著力挽帶拔伸患骨醫者揣捫患骨歸原即按定雙手按住莫動令伸其足試其齊否然後貼藥如法夾縛定日服加減活血住痛散取效夫兩足膝蓋足碎斷或斡脫者服酓如前用箍傘蔑圈一個其大要箍得膝蓋骨住四圍絹包旁安帶二條令患人仰臥直伸其足醫者揣捫相按居位用圈子箍住膝蓋骨上制定不解後用聖神散敷於圈子內外再用草紙裹束則不汙梁日服活血住痛散取效夫兩足脛骨折斷而碎者與接腿骨同夫兩踝骨及掌斡脫而若蹣跚者服酓如前用杉木皮二大片其長從小腿肚下起至腳底為則中間對踝骨處剮一圓孔要箍得踝骨過又用杉木皮一大片要托得腳掌過從趾下起至㿗後轉折直上夾住後㿗要留兩旁邊弦又用杉木皮三四片如指面大編作柵欄子甲夾住筋骨面前大小杉木皮皆紙包油透如法用左綁繩編踝上兩部腳下兩部先拔伸患骨揣正歸原夾之其腳底用布兜掌前繫於膝下合腳掌不直伸下仍令腳掌時常伸屈日服活血住痛散取效夫十足趾折斷者法與手指同應用諸方開後聖神散淮烏白芷赤芍白芨枇杷葉芙蓉葉各三錢韭根韭菜各一兩用薑汁韭汁老酒同調敷桃花散止血大黃黃柏黃芩各五兩石灰半斤同炒至灰如桃花色退火收貯候用消風散人參防風川芎川朴殭蠶桔梗獨活半夏肉桂各一錢羌活蟬蛻當歸各一錢五分南星白芷各二錢黃芩三錢柴胡七分甘草五分水煎童便老酒沖服辛香散酓洗防風荊芥穗各十兩劉寄奴二兩獨活乳香明礬倍子苦參各五錢柏葉當歸白芷銀花蒼耳子澤蘭細茶各少許水煎入飛鹽一捻洗之安髓散川芎香附白附子甘草白芷相草牡蠣各一兩共為細末每服兩錢清茶調服白金散白芷梢一味為末香油調敷淮烏散淮烏川芎白芷各等分共為細末薑汁和酒調服痹藥昏昏散草烏一錢五分骨碎補二錢香附川芎各一錢共為細末薑汁和酒調服飲醋冷水即解住痛散杜仲小茴大茴各四兩共為細末每服二錢老酒調服活血住痛散白芷山甲小茴甘草各三錢當歸川芎各二錢獨活羌活各一錢五分木瓜山谷桂淮烏各一錢草烏麝香各三共為細末薑酒調作一次服尋痛住痛散乳香沒藥淮烏川烏川芎山甲木香虎骨自然銅赤芍紫荊皮各二錢當歸一錢五分小茴大茴沉香白朮桔梗牛膝烏藥各一錢枳殼八分甘草香附降香節各五分生薑三片水煎服加減活血住痛散當歸山甲木瓜牛膝各三錢乳香沒藥各二錢獨活羌活枳殼各一錢五分小茴甘草淮烏川芎白芷人參大茴血竭各一錢肉桂八分麝香一分生薑五片小煎酒沖服黑神散百草霜即鍋臍煤一味炒至煙盡存性清油調敷三十六圖穴凡人身上有一百零八穴內七十二次不致命不具論其三十六大穴俱致命之處受傷者須用調治之藥法開後頭額前屬心經心主血不可損損後最怕風打重血不止者血出見風發腫者三五日或六七日死不見風不腫者不死用川羌川芎防風各一錢加前十三味方內同煎服再用奪命丹三四服愈兩眉中間為眉心穴打重者頭大如斗三日死用前十三味方加川芎川羌防風荊芥各一錢五分煎服如不服藥者不腫不死浮腫出血者必死頭額兩邊為兩太陽打重者七日死或半月死損耳目其血凝成膿者不死不可見風見風則發腫而死宜用川芎川羌各一錢加入十三味方內煎服仍沖七釐散二分再用奪命丹二服外敷桃花散頭腦後為枕骨管十二經又名督脈一身之主不可損傷打重者腦骨髓傷多則七日少則五日必死極重者或一日即死用前十三味方加當歸川藥各一錢同煎服衝入七釐散三分又奪命丹三五服不吃藥雖愈後腦痛不止腦後兩邊屬太陽經有藏血穴近耳後又屬肝膽經有厥陰穴打重者損其血見風又損其氣浮腫者四十日必死用前十三味方加生地川芎當歸各一錢煎服仍沖七釐散三分再用奪命丹三服心口上為華蓋穴屬心經直拳打重人事不省血迷心竅不治必死此乃傷胃氣致心胃氣血不能行走宜用枳殼三錢良薑一錢加前十三味方內同煎服又加七釐散二分五釐行走心胃中瘀血瘀血走動泄瀉三五次即瘥瀉不止用冷粥止之又用奪命丹二服全愈如不斷根三十六個月而死心口中名黑虎偷心穴屬心經上擦下拳打重者兩眼昏花人事不省用前十三味方加肉桂一錢丁香五分同煎再用七釐散三分沖服又用奪命丹三服再用紫金丹三五服如不服藥一百二十日必死又方金竹葉二錢柴胡一錢五分鉤藤一錢當歸陳皮楂肉苡仁麥冬各五分沉香炙草荊芥防風各三分加青柿蒂三個酒水各半煎又加膽星五分調服效心口下一寸五分為巨闕穴為心幕打重者人事不省當用打法向右邊肺底穴下半分劈拳一梆即醒用前十三味方加桔梗八分川貝一錢同煎二服再用奪命丹五六服又紫金丹二三服若不愈一百二十日死臍上水分穴屬小腸胃二經打重者不服藥二十八日死宜用前十三味方加桃仁元胡索各一錢同煎沖七釐散三分服再用奪命丹三服臍下一寸五分名氣海穴打重者九日死用前十三味方加木通一錢三稜一錢五分同煎沖七釐散一分五釐服又加減十四味方二服如不服藥四十八日必死臍下三寸名關元穴傷重者五日死用前十三味方加青皮車前子各一錢五分同煎沖七釐散三分服再用奪命丹三服痊愈若不服藥草四日必死臍下四寸名中極穴傷重者大小便不通十二日死用前十三味方加三稜蓬朮生大黃各一錢同煎沖七釐散一分五釐服再用紫金丹二服如不服藥一百零八日必死左乳上一寸六分為膺窗穴屬肝經拳打重者十二日死用前十三味方加青皮乳香各一錢同煎沖七釐散三分服再用奪命丹三服每服三錢仍沖十三味方內服愈不服藥四十八日必死右乳上一寸六分膺窗穴屬肺經金槍傷重者一百十六日死用前十三味方加木香一錢五分同煎沖七釐散二分服可以行走瘀血再用奪命丹三