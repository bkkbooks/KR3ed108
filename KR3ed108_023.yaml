服連服數日而好凡年久者皆效入腎經則成白濁用三聖丸治之即愈凡遺精夢泄者皆效對門穴左敝骨下一寸五分巨闕旁各開二寸即不容穴足陽明屬心肺二經木香當歸赤芍澤蘭陳皮烏藥秦艽紅花肉桂薑黃藿香元胡索傷重者五日死輕者四十九日死俱用原方若呼吸稍痛加蘇木生地各三錢扇門穴與對門對男人左對門右扇門女人左扇門右對門足陽明屬肺經澤蘭紅花當歸五加皮烏藥陳皮薑黃續斷赤芍威靈仙傷重者渾身發熱氣斷口齒皆焦黑髮臭七日死口舌必爛不爛用原方若爛加門冬萆薢射干元參輕者四十九日咽喉閉塞飲食不能進而死血浪穴在乳直上二寸即膺窗穴足陽明胃經紅花劉寄奴歸尾陳皮赤芍薑黃烏藥銀花五加皮續斷骨碎補傷重者浮腫輕者但痛不腫俱六十日死重者原方加桃仁蘇木或加大黃輕者止用原方丹田穴在臍下一寸五分即氣海穴任脈屬腎經紅花當歸澤蘭續斷威靈仙赤芍木通豬苓澤瀉烏藥陳皮薑黃受傷痛如刀刺積血甚重小便不通用原方治之過九日者不效期門穴在乳下第二肋端蔽骨下一寸五分巨闕旁三寸五分不容旁一寸五分足厥陰屬心腎二經紅花當歸骨碎補烏藥陳皮威靈仙薑黃肉桂劉寄奴五加皮三稜莪朮赤芍重者三日即死輕者草二日死當日即醫用原方第二日原方加半夏第三日外用蔥薑搗爛鋪傷處用火尉七次原方去三稜莪朮加歸尾桃仁破血為主破之仍痛用大黃下之自愈章門穴在期門下五寸五分直臍端足厥陰屬肝肺心三經紅花當歸續斷澤蘭赤芍骨碎補烏藥陳皮銀花五加皮薑黃威靈仙三稜莪朮傷重者五日死輕者九日亡二三日醫用原方四五日醫原方去三稜莪朮加肉桂附子然附子看人稟氣厚者可用薄者不可用若腫痛不住加破血藥破之仍痛用蔥薑照法尉六七次再加升降之藥服之七勞穴在期門下二寸即腹哀穴足太陰屬肝經赤芍澤蘭當歸紅花烏藥五加皮陳皮骨碎補薑黃威靈仙銀花肉桂傷重者七竅流紅輕者發狂傷左邊者左臂不能動傷右邊者亦然重者用原方治之不退加三稜川芎香附元胡索去威靈仙輕者原方加桔梗蘇木再輕者只加蘇木俱照前法蔥薑尉之七孔流血者一日即死初流時用四生湯止之緩用原方京門穴在監骨腰中季脅本俠脊也期門穴下三寸二分足少陽屬心肝二經歸尾紅花續斷威靈仙赤芍五加皮骨碎補陳皮烏藥澤蘭傷重者日半死輕者三日亡當日即醫原方加破血之藥二三日加大黃下之五定穴在京門下四寸八分即五樞穴足少陽屬脾肝二經當歸紅花澤蘭赤芍五加皮烏藥銀花骨碎補三稜莪朮陳皮桂枝傷重者立發寒熱三次即死一次者照前法蔥薑尉之原方去三稜莪朮桂枝加肉桂草烏二次除肉桂草烏加大黃神麯三次去大黃神麯加桃仁桂枝升麻其血稍松去桃仁桂枝仍以大黃下之輕者竟用原方伯勞穴在大椎下二椎上節間陷中即陶道穴督脈屬五臟劉寄奴紅花當歸薑黃五加皮烏藥續斷川芎赤芍骨碎補陳皮銀花傷重發腫其首俱不能動用原方膏上刺數孔貼之傷輕不醫其傷反要傳入臟腑傳入心經嘔血甚多一方梨十斤藕節十斤搗爛水煎成膏白糖霜攪勻每清晨服一鍾自愈傳入肝經渾身發熱不能行動兩目昏花口齒出血先將熱血藥服數劑後用涼藥傳入脾經身似蛇皮發瘋病用蘄蛇一條童雞一隻干撏毛腸不可見水將蛇入雞肚內蒸熟去蛇淡吃雞肉即愈傳入肺經似痰火而無痰微有紫血嘔出先服四生湯數劑後用六味丸自好傳入腎經似怯症腎水阻滯使然先用原方四劑後服六味丸肺使穴在第三椎下兩旁各開一寸五分即肺腧穴足太陽膀胱經紅花當歸薑黃三稜莪朮肉桂陳皮烏藥威靈仙赤芍五加皮傷時不痛不腫渾身酸癢者無救三日死腫痛者可救用原方重者加桃仁改歸尾甚者再加蘇木膏盲腧穴在第四椎下近第五椎上兩旁各開三寸足太陽膀胱經防風赤芍當歸威靈仙薑黃銀花陳皮桔梗肉桂烏藥柴胡此穴平時負重肩挑俱不能傷倘或受傷手臂不能舉動如脫樣須用膏藥二張一貼穴內一貼肋下用原方加升麻對心穴在第七椎下節間伯勞下六寸即至陽穴督脈屬心經陳皮烏藥骨碎補當歸紅花威靈仙薑黃肉桂五加皮赤芍三稜莪朮木香藿香傷時即刻悶死不醒微有氣息救法在百會穴內用艾火灸之以醒為度不可再灸重灸頭要爆開醒時用原方加桔梗命門穴在十四椎下對心下八分督脈屬心腎二經歸尾杜仲紅花澤蘭肉桂赤芍骨碎補續斷五加皮烏藥薑黃陳皮傷重者九日死以原方治之即愈輕者不醫後必發毒名為腎癰先去其傷血後以腫毒藥托之稍松易治不松難治後必腎水耗盡自死鸛口穴在尾底骨上脊骨盡處督脈屬肺腎二經歸尾劉寄奴紅花赤芍陳皮木通續斷骨碎補五加皮五靈脂烏藥澤蘭傷重者立時軟癱不痛者凶痛者次之凶者須在百勞穴灸三壯後以原方治之不醫五日死輕者不醫後發毒名鸛口疽用黃耆湯治之若出毒入內不救海底穴在糞門前陰囊後即會陰穴一名屏翳任脈屬心經紅花當歸澤蘭續斷威靈仙赤芍豬苓木通澤瀉骨碎補乳香沒藥傷處虛腫積血甚重小便不通龜頭腫脹用銀絲打通六寸離龜頭一寸上用艾火灸一壯將銀絲取出一寸再灸一壯再出一寸如是四次取出銀絲其血即出再以原方治之環跳穴在髀樞中大腿上骱足少陽屬肝脾二經歸尾銀花續斷生地骨碎補陳皮五加皮紅花木瓜石斛烏藥牛膝傷重者不能行動痠痛非常腿足皆縮用原方先服一劑後尉九次再以原方服之即愈如傷輕不醫後必發骨疽先用黃耆加之後加香附又以白朮湯服之蓋膝穴在蓋骨元胡索丹皮赤芍續斷歸尾紅花骨碎補銀花牛膝烏藥五加皮蘇木傷重者立刻坐倒腿不能伸直筋縮痠痛用原方加升麻服之一貼後去升麻加桃仁破血為主數劑即愈膝眼穴在膝臏上內廉白肉陷中即血海穴足太陰屬心經歸尾紅花萆薢澤蘭牛膝五加皮骨碎補石斛續斷烏藥陳皮威靈仙傷重者周身紫脹周時即死立刻就醫原方加蘇木桃仁輕者三日嚼碎舌頭而死期內再加升麻桂枝照前法蔥薑尉之膝底穴在膝下內側輔骨下陷中即陰陵泉穴足太陰經紅花烏藥歸尾骨碎補木瓜陳皮銀花續斷牛膝五加皮赤芍肉桂澤蘭丹皮傷重者三日內不腫不痛三日後其色發紫已在內作膿用原方治之傷左用左方傷右用右方二三分傷者人不知覺雖其傷自愈但傷血上行攻心主一百六十日後中焦必發背其毒先痛久然後成形其色胭脂見形之後反不痛皆因傷血內凝之故治法先用內傷藥一二劑破血為主後用腫毒藥治之但毒愈後其腿無小肚子不能行動終成廢人矣竹柳穴在內踝上二寸即交信穴足少陰屬五臟歸尾澤蘭紅花赤芍廣皮銀花續斷牛膝木瓜威靈仙烏藥丹皮傷重者原方治之輕者不醫病有五種傷入心經癡呆發癇症不省人事治法於原穴內灸三壯後在百會穴內灸三壯先以原方服數劑後以天王補心丹服之即好入肝經膽經者遍身虛黃浮腫治法未詳入脾經者遍身筋骨縮痠麻治法用舒筋養血方入肺經者發佛頂珠用上部活血藥服一二劑再用腫毒藥治之入腎經者小便流血治法原方去續斷牛膝木瓜靈仙烏藥丹皮加澤泄木通連翹黃芩豬苓甘草治之腳住穴在腳面上有骨高起似豆之旁元胡索當歸尾丹皮赤芍續斷紅花骨碎補牛膝生地澤蘭陳皮五加皮傷重者立時痛倒七日後入經絡七日先用原方七日後加升麻桂枝傷輕者不醫變為腳發背若用腫毒藥治之腐爛不能收功須用補為妙當用人參在身邊護燥為末摻上即好不爛者用養血藥治之湧泉穴在足底心陷中足少陰腎經屬五臟澤蘭紅花當歸骨碎補烏藥陳皮生地牛膝肉桂五加皮赤芍羌活傷輕重者俱不知覺頂重者其血不能流通大關一周時遍身猶如蟲鑽原方加川芎即愈若不醫傷入心經則眼紅鼻內流血以生芥子煎湯先服後以原方治之入肝經則半身軟癱猶如半身不遂用原方加香附元胡索治之入脾經則渾身發瘡猶如水泡其泡穿作爛臭不可聞先用活血藥加脾經引藥治之外以水龍衣即螺螄殼煨灰研末生鵝油調敷瘡上即愈入肺經肺氣脹痛十五日轉入脾經即發流注治法未詳入腎經則小便不利小腹作痛用原方去牛膝羌活骨碎補加木通豬苓澤瀉小腹上用蔥薑照前法尉之立愈方藥分門頭面門頭破腫痛發熱歸尾川芎生地赤芍防風白芷蔓荊子羌活連翹花粉各一錢五分甘草一錢如血出過多昏為不省倍加歸芎水煎服頭破傷風腫大先服紅藥用雞肝飯上蒸熟酒調後服回生丹肉桂自然銅當歸白芷防風升麻花粉大茴羌活甘草水煎酒對服百會穴傷腦頂也金沙銀沙自然銅參三七血竭各一錢山羊血如無以地鱉蟲代之甘草五分虎骨桔梗人中白各一錢五分燈芯引水酒對煎又方人參地鱉蟲地龍當歸升麻白芷自然銅水煎服腦門受傷血瘀七孔雞湯洗淨將馬蹄子調敷後用八寶丹硃砂瑪瑙龍骨象皮鹿角膠地鱉蟲白蠟乳香沒藥若無血水用人乳調敷即愈囟門穴傷天麻白芷藁本羌活木香青皮骨碎補赤芍紅花川烏甘草共為末蔥引酒下五分太陽太陰穴傷血竄兩目暈死先服七釐散猴骨硃砂參三七琥珀自然銅血竭各二錢人中白沉香紅花乳香沒藥羊血各一錢共為末好酒送服外用八寶丹點眼太陽三麼穴歸尾桃仁大黃杜仲破故紙青皮羌活獨活肉桂章子功勞千里馬薑引酒燉服太陰三星穴三稜莪朮肉桂參三七蘇子元胡萊蔔子木香茜草乳香沒藥地鱉蟲甘草不加引水煎服開空穴傷兩耳也威靈仙當歸山藥木通虎茨各一錢五分茯苓腳樟各二錢大腹皮甘草各一錢木香八分童便引酒燉服喬空穴傷耳後跟也天麻藁本白芷羌活荊芥麝香血竭紅花甘草共為末酒下五分左眉尖穴五加皮桂枝柴胡龍膽草羌活陳皮荊芥薄荷甘草共為末酒下右眉尖穴五加皮桂枝柴胡龍膽草細辛五味威靈仙木香麝香共為末酒下眼角穴傷眼梢也當歸茯苓川芎茜草地鱉蟲各五錢川烏三錢青木香二錢肉桂甘草各一錢參三七五分共為末酒下三分眼角左右方天麻白芷柴胡桔梗川芎獨活兒茶各一錢三稜莪朮各二錢甘草五分共為末酒下大中穴傷鼻中也香附紅花桂皮蘇梗澤蘭半夏升麻白芷陳皮甘草蔥引酒燉服天平穴傷大中穴之上此穴斷不治硃砂七分砂仁六分石乳枳殼各一錢童便引酒對服駕梁穴傷鼻梁也當歸生地川芎白芍尋骨風天麻白芷肉桂參三七甘草共為末酒下蔥引山根穴傷鼻梁之上當歸生地川芎細辛白芷茯苓虎骨陳皮甘草共為末蔥引酒下三分咽空穴傷鼻下也血竭茜草桔梗獨活杜仲白朮紅花柏葉連翹蔥引水煎酒對服人中穴傷升麻白芷上力自然銅肉桂地鱉蟲木香冰片蔥引水煎酒對服上力疑即血竭牙關穴傷唇口四穴白芍山藥連藁神麯麥冬五味檳榔赤茯苓細辛陳皮各三錢共為末酒下牙背牙腮二穴分左右在左邊移掇向右在右邊移掇向左鐵馬鞭骨碎補五加皮劉寄奴純麻麻骨活血丹牛膝腳樟白牙丹澤蘭金不換七枝生酒燉服咽喉穴傷飲食不通要開他關節用五虎下西川方麝香二分馬兜鈴青木香半夏山楂元參各一錢共為末服之不納用千金分氣散半夏桂枝赤芍羌活桑皮腹皮陳皮各一錢茯苓紅花乳香沒藥各一錢五分木通甘草青皮紫蘇各一錢好酒燉服如氣血不行再用後方麝香木香羌活桃仁茯苓木通生地獨活參三七陳皮甘草藕節引酒燉服將臺穴傷咽喉左右當歸川芎防風