body:
  text: 卷二十四王洪緒先生全生集自序明劉誠意伯言藥不對症枉死者多余曾祖若谷公祕集云癰疽無一死症而諸書所載患生何處病屬何經故治乳岩而用羚羊犀角治橫痃而用生地防已治瘰癧惡核而用夏枯連翹概不論陰虛陽實惟以引經藥治以致乳岩橫痃成功不救瘰癧惡核潰久成怯全不悔引經之藥誤反諉言白疽百人百可到泉鄉夫紅癰乃陽實之症氣血熱而毒滯白疽乃陰虛之症氣血寒而毒凝二者以開腠理為要腠理開紅癰解毒止痛即消白疽解寒化凝立愈若憑經而失症治者藥雖之經而實背症也世之患陰疽而斃命者豈乏人乎如以陰虛陽實別治癰疽無死症之語確矣余曾祖留心此道以臨危救活之方大患初起立消之藥一一筆之於書為傳家珍寶余幼讀之與世諸書治法迥別歷症四十餘年臨危者救之初起者消之疼痛癢極者止之潰爛不堪者斂之百治百靈萬無一失因思癰疽憑經並治久遍天下分別陰陽兩治惟餘一家且余之治止於村境若遍通邑分身無術偶聞枉死無不痛惜特以祖遺之祕自己臨症並藥到病愈之方精製藥石之法和盤托出盡登是集並序而梓之以質諸世之留心救人者依方修合依法法制依症用藥庶免枉死使天下後世知癰疽果無死症云爾又全生集凡例一癰與疽之治截然兩途世人以癰疽連呼並治夫癰疽二字之連呼即夫妻二字之連呼也若以癰藥治疽猶以安胎之藥治其夫矣是集以癰疽分別兩治皆執症執方之治法如照法法制照症用藥救人之功余不敢分害人之罪余當獨認情願萬劫披毛甘受屠家誅戮一輯是集專論陰虛陽實認定紅白兩色是癰是疽治即全愈所載諸方皆藥到病愈切勿增減並貴重之物少分逐症治法開卷一目瞭然不必投師人人可精此道一諸書惟馮氏錦囊內附陰疽論與余家遺祕相符獨無消疽之方惟以溫補兼托為法且疽初起即如平塌安可用托托則成功余家之治以消為貴以托為畏即流注瘰癧惡核倘有潰者仍不敢托托則潰者雖斂增出者又何如耶故以消為貴也一外科之虛實發現在患治患之法集中詳細不諳脈息儘可救人故痘症之險悶順逆眼科之心肝脾肺腎皆現於外故亦不診脈也好學者察患色則知症照症治無不痊一醫可寄生死閲坊刻外科妄稱正宗載云症現七惡即死又載以桐油燒紅衣針針入痰塊半寸用降藥為條插入針孔七日塊自開裂再以條插七日其核自落又稱毒在皮里肉內刀割深要寸許方能泄毒殊不知毒在皮裡膜外或應開刀尚忌深過三分恐傷內膜若深入寸許傷透內腑病人何能堪極刑七惡之現頃刻世之宗其法治盡屬劊徒此集惟疔用刺其外概不輕用刀針並禁升降痛爛三藥一遍身患只有紅白兩色紅者癰白者疽癰疽即其名也有謂無名腫毒因未識症而云一是書無論背項腰腹色白者言疽以疽藥愈之紅腫者言癰以癰藥愈之坊刻書稱以某藥與服不應再易某藥豈非以人試藥乎倘患生要緊穴道安可遭醫試望高明詳之一世無爛久之癰惟疽初起失消或遭降灸針割以致年久不斂治之方藥集中細詳一此集流到之處好學者自然以初起者消潰者斂余恐遲到處醫未經目人未習見是以坊翻刻速遍海內使醫有生人之治而患無枉死之人遂余願矣一載癰疽咽喉疔毒結毒諸瘡痔漏等症皆藥到病愈之方另有雜症五十方專愈五十病一服即效者附梓集中內無以人試藥之誤望有力者照方合就遇病施送或只取藥本如抄方傳人注明法制一是書所有之藥悉登末卷法制處不可忽略宜細心照法精製藥純效速一傷寒症有轉經傳變故有醫不執方之說至如外科雜症全賴識症執方餘年七十有二治病經歷四十餘年用藥從無一錯故敢輯是集以公諸世因名症治全生癰毒門應與卷十一癰毒諸症合併參看經驗簡便方治一切癰疽發背疔瘡魚口無名腫毒諸般惡瘡但未成膿一服即消治人甚衆屢見奇效用生白礬末三錢以飯少許同搗為丸蔥白七根煎湯送下少頃再煎蔥湯一碗服之蓋被取汗立愈雖味澀難服其效如神凡窮鄉僻壤及車船馬跡之間不便醫藥者將此方廣為傳送功德無量凡一切腫毒瘡癤以皮紙蘸生明礬水頻頻搭患處其瘡毒可消又治背疽方栝蔞一個乳香沒藥各五錢甘草三錢用好陳酒煎服即愈又治一切奇瘡異毒並無名腫毒用肥皂莢去子弦去筋搗爛以好醋調敷立愈不愈再敷又方用赤小豆研末以雞蛋白調塗初起者消已成者敷四圍即收小出膿已潰者敷之即收口易愈又用芙蓉花或葉或皮或根搗爛敷之初起即消已成即潰已潰即斂奇驗奇效或加入赤小豆末敷之更妙治瘡癤方凡瘡癤初起用明礬雄黃各半研極細末摻膏藥上貼之即愈又治一切熱癤方用芙蓉葉菊花葉各半搗爛敷之極效一切腫毒驗方杏仁不拘甜苦皆可用剖開兩瓣選邊角全者數枚塗以溏雞糞加麝香末些須罨在瘡上即吸住不脫移時毒聚則杏仁迸起隨以第二枚罨之如仍前吸住迸起乃毒未盡也即以第三枚罨之其毒起必輕一觸即脫無不愈者又方用山藥搗成泥敷之又方蔥白七根蜂蜜一兩同搗爛敷之又方大黃薑黃草烏各等分曬乾研末同蔥蜜搗爛敷之又方田州三七用醋磨濃汁塗之瘡毒即散如已破者即研末乾摻之又方生芋頭一個獨核肥皂一個蔥白七個同搗爛敷之如干即換過一日未成者即散已成者略出膿血即愈又方用馬牙煅灰存性研末黃酒沖服或以劃下馬蹄片煅灰存性研末酒服亦可未成能消已成定痛出頭又方初起即用雞蛋一個取蛋清去蛋黃黃不可用在粗碗內粗鉢亦可用生明礬一大塊磨濃汁不時塗搽患處如未消再磨雞蛋一個搽之三個即消若已患多日此方不治又方先用陳米醋洗過再用整根白鳳仙花即指甲花搗爛敷之凡惡瘡初起者急用爛溏雞糞雄雞糞更妙連敷數次即消雞糞最能敗毒或加荔枝核研末調敷尤效屢試屢驗夜深鄉僻一時無處覓藥者誠救苦靈丹也治一切無名腫毒方澤蘭一兩廣膠炒珠五錢白芨三錢用酒水各半煎服發汗即愈上身加白芷下身加牛膝各三錢連服數劑腫消痛止雖發背等症均見奇效又方用大栝蔞一個頂上切去一片將子挖盡裝入婦人篦下油膩亂髮一大團再入生明礬三錢以滿為度仍將切不之片蓋口通身以黃泥包裹新瓦上微火煅存性去泥研細末黃酒送下末潰者內消將漬者出膿收口重者不過三服即愈又方白芨一味不拘多少為細末溫水攪之澄清去水棉紙攤貼又方豬膽汁生薑汁蜂蜜各半酒杯共和勻不住手塗抹四圍一夜即消又方鮮牛蒡子根葉搗爛敷之又方七葉黃荊五葉不用或葉或梗燒灰存性麻油調搽瘡濕即用末乾摻之此治無名腫毒外科不傳之祕藥又方治無名腫毒大黃三兩黃芩三兩黃柏三兩陳小粉二兩上藥俱炒黑共研細末用醋調敷治搭手發背臁瘡方蔥白一斤石灰二斤馬齒莧一斤三味濕搗如泥作餅陰乾研細末調貼瘡上馬齒莧膏一名長命菜或服或敷能解百毒鮮者搗成膏乾者水浸透熬成膏亦可治楊梅瘡遍身如癩喉硬如管者用馬齒莧一大把或酒或水煎服蓋被取汗即愈並搗膏敷之治發背諸瘡毒及疔毒用馬齒莧半斤酒水煎服一服取汗二服退熱三服腫消全愈外仍搗膏敷之治多年頑腫臁瘡疼痛不收口者以馬齒莧搗膏頻敷一日一換數日後腫消腐盡內有紅肉如珠時再另上生肌藥治丹毒熱瘡面腫唇緊俱搗濃汁頻塗之治癬疥極癢無藥可愈搗汁服之立止治男婦臍下生瘡痛癢連及陰戶搗膏四兩抖青黛一兩烘熱敷患處治濕癬白禿搗膏加炒紅石灰一分調敷干則再蘸汁濕潤金銀花酒一名忍冬藤治一切無名腫毒及異瘡惡毒以金銀花搗汁沖黃酒熱服又方治癰疽發背初起用金銀花連藤帶葉一大把搗爛入酒少許塗敷患處四圍只留一口泄其毒氣再用金銀花五兩生甘草節一兩水三碗淡酒一碗慢火煎至兩碗去渣分作三服一晝夜服完病勢重者連服三劑至大小便通利則藥力始到而瘡自消矣屢見奇效治口乾煩渴或食後即飢將來必發癰疽宜預解諸毒用金銀花或熬膏或煎汁早晚酒沖服治熱毒血痢將金銀花藤煎汁服之治腳氣作痛並治婦女下淋均用金銀花研為末熱酒沖服蒲公英方一名黃花地丁鄉間到處皆有正中獨出一莖一顆開黃花一朵者即是治婦科吹乳乳癰乳痛等症要藥用蒲公英水煎濃汁兌酒沖服並將渣搗敷患處即消治痔瘡疼痛將蒲公英煮熟壓干切碎麻油拌食二斤即愈治發背雖青黑色者搗爛貼之三日內肉色如初即愈惟已破者不可敷貼治一切無名腫毒新鮮搗爛敷之乾者熬膏敷貼亦妙治婦女熱淋蒲公英搗汁黃酒送下以上馬齒莧金銀花蒲公英三品為瘡家之要藥隨地皆有不費分文預為收存能治大症銀花甘草湯金銀花二兩生甘草三錢水煎清酒沖服若毒在下焦加牛膝二錢孕婦忌加牛膝凡腫毒初起急服此方外敷遠志膏見卷十一癰毒諸方一切惡毒無不立消但宜早服方可消散遲則瘡毒已成膿必外潰無從消散又方治癰疽腫毒不問寒熱虛實用遠志肉米泔水浸洗去心為末每服三錢酒二杯煎服渣敷患處治瘡毒初起凡癰疽腫毒肚癰發背臟毒騎馬癰魚口等症初起三天之內照方一服即行消散如毒勢旺者連服三服無不盡消用雞子一枚傾入碗內攪勻入芒硝二錢隔湯燉熟用好酒送食酒隨量飲食盡為度消毒神效丹凡發背癰疽瘡毒初起敷之即散已成者搽三次收小出毒隨愈能易收功用生鮮山藥五兩不見火土紅朱一兩松香一兩全蠍十個白糖一兩共搗如泥周圍敷之中間露出瘡頂不敷藥上加蓋油紙周時一換消毒神效屢試屢驗諸瘡內消散金銀花一兩蒲公英五錢皂角刺八分白芷天花粉大黃乳香木別沒藥防風赤芍甘草各一錢水煎服內消丸治一切腫毒止痛神效雄黃研細一兩滴乳香研細一兩蟾酥二分酒煎化和飯研如泥入前二味為丸如梧子大每服八丸蔥白煎湯送下又方治一切癰疽發背瘰癧疔瘡漏瘡衛護心膜驅解諸毒自然內消用生明礬二兩為末黃蠟一兩二錢熔化就爐上入礬拌勻衆手趕急作丸如梧子大每服十五丸溫水或冷酒送下數服痛即止如漏瘡以雞肫內黃皮研末塞孔瘡毒初起解散方蒲公英當歸身生黃耆甘草節各五錢水酒各半煎服發汗即愈治一切大毒初起槐花子一大把砂鍋內炒褐色好酒一碗衝入乘熱飲之取汗即愈未散再服又治一切大瘡無名腫毒經驗方用豆腐渣在砂鍋內炒熱看紅腫處大小作餅子貼上冷即更換以愈為度又方天南星生貝母芙蓉葉狼毒各等分俱研末春夏用蜂蜜蛋清調冬用陳醋調敷患中留出一孔最效治瘡毒簡便奇方不論線香棒香研成細末以燒酒調和敷患處即愈治癰疽發背初起或已結或未結赤熱腫痛未見頭頂或有一粒黃如傑米者先以濕紙貼上視其紙先干之處者即是結疽頭頂處也取獨頭大蒜切片如三個錢厚放在疽頂上用艾火灸三壯換一片再灸痛者灸至不痛如不痛者灸至痛為度最要早覺早灸方發一二日者十灸十愈過七日則不可灸矣若有十數頭者用大蒜搗成膏作餅鋪上聚艾燒之亦能安也惟頭上及腎俞穴生毒不可灸元氣大虛之人亦不可灸又方穿山甲四片黃明牛皮膠四兩新瓦上炒焦研細和勻用酒調從容服完保無大患外用牛皮膠少加薑汁熬如稀糊以布攤貼極妙此方濟人已多未潰者微出黃水已潰者即能收口又方生甘草節五錢金銀花三兩當歸一兩元參五錢花粉二錢白礬一錢附子一片水煎服初起者一服即消腫起者兩服即消發背疔毒無名腫毒金銀花一兩浙貝母六錢赤芍五錢當歸尾四錢黃芩二錢甘草節三錢黃酒半碗水二碗煎服即愈清涼膏治癰疽發背一切無名疔腫惡瘡皆效芙蓉花不拘多少看瘡大小搗爛敷患處周圍留一頭出膿如未成形並敷之收小即消如無花之時乾者亦可或葉根皮皆妙加赤小豆少許為末蜜茶調敷極效術家不肯傳方多以此珍祕之又方凡癰疽腫毒疼痛連心日夜叫號睡眠不得者取獨大蒜兩個搗爛和麻油厚敷瘡上干則換之龜蠟丹治一切無名腫毒對口疔瘡發背流注無論初起將潰已潰皆有效驗血龜板一大個白蠟一兩將龜板安置爐上烘熱將白蠟漸漸摻上摻完板自炙枯即移下退火氣研為細末每服三錢日服三次黃酒調下以醉為度服後必臥得大汗一身其病必愈此方神效神功沃雪湯治一切無名腫毒其效如神當歸最重者用八兩輕者用二兩白芷重者用四兩輕者用一兩夏枯草重者二兩殭蠶重者一兩輕者二錢五分用水酒各半同煎服頸以上加川芎膝以下加牛膝余者不加又方治癰疽發背及一切無名腫毒廣陳皮生甘草歸尾赤芍金銀花檳榔栝蔞仁白芷川芎五倍子燒灰存性去火氣以上各五錢臺黨參五錢新汲井水五碗用砂鍋漫火煎至二碗半再加入乳香二錢去淨油研末加入毒在上食後溫服在中食遠服在下食前服再用暖酒儘量飲蓋被取汗即愈重者不過兩劑忌房勞惱怒發物又方治癰疽腫毒已成未成者俱效金銀花當歸生甘草節天花粉各三錢皂角刺二錢川椒開口者九粒用無灰酒煎服未成能散已成出毒神效無比如疔毒加紫花地丁三錢服三四劑一筆勾雄黃二兩麝香三錢藤黃一兩人中白五錢飛辰砂二錢蟾酥一兩白芨二錢生白蘞二錢共研極細末用廣膠三錢煬化和藥末作為錠遇一切無名腫毒初起即將此錠用醋磨搽患處立刻止痛消散極效又凡男婦不拘四時如身上有塊疼痛無頭無腦可將榆樹根頭之皮搗極爛米醋調和敷上痛處中留一小頭過一日有毒者略出少許而愈無毒者即能消散立效爛泥丸專治一切無名腫毒或痛或癢簡便良方用生大蒜一枚如有獨蒜更妙選多人行走地土上用口唾沫將蒜在地上磨爛即以蒜泥塗敷患處如已見頭即留出頭塗敷四圍無論紅腫痛癢立刻見效久患惡瘡焮痛不已者用馬齒莧搗爛敷之不過數次即能取效鐵井闌九月九日收取木芙蓉葉陰乾研末五月五日收取蒼耳草燒灰存性研末二味等分用時以蜜水調塗四圍無論惡毒疔瘡敷之其毒自不走散疔瘡部疔瘡總論疔瘡乃外科迅速之症倘治之不急多不可救疔者如丁釘之狀其形小其根深隨處可生其瘡最惡其毒最烈由恣食厚味積熱而成或中蛇蟲及疫死牲畜之毒毒有淺深部位形色尤有緩急若不指明分辨人多疏忽貽誤為害不小如生頭頂胸背者最急生手足骨節者稍緩一疔之外別生一小瘡者名曰應候四圍赤腫而不散漫者名曰護場四旁多生小瘡者名曰滿天星有此者緩無此者急又看初起至三五日間由白色而至青紫色疔頭潰膿形似蜂窩內無七惡等症者為順若初起似疔非疔灰色頂陷如魚臍青紫黑泡軟陷無膿內見七惡等症者逆此辨疔之大略也總之凡患疔瘡貴乎早治忌服辛熱之藥恐反助其邪也外面忌敷寒涼之藥恐逼毒內攻也膏藥不宜早貼惟在將潰已潰時貼之為呼膿長肉以御風寒也初潰時忌用生肌藥恐毒未盡反增潰爛也潰後不宜補早雖見真虛只可平補尤須斟酌忌食薑椒酒肉雞魚鵝羊海味暈腥辛辣煎炒生冷發物戒氣怒房勞臭穢經婦等項犯之必至反復慎之為要五疔分治並紅絲疔羊毛疔喑疔各症五疔者心肝脾肺腎五臟之毒火而成也火焰疔多生於唇口及手掌指節間初生一點紅黃小泡癢痛麻木甚則寒熱交作頭暈眼花心煩發躁言語昏憒此屬心經之毒火而成也紫燕疔多生於手足骨節及腰脅筋骨之間初生便作紫泡次日破流血水串筋爛骨疼痛苦楚重則眼紅目昧指甲純青舌強神昏睡語驚惕此屬肝經之毒火而成也黃鼓疔多生口角腮頰眼胞上下及太陽正面之處初生黃泡光亮明潤四圍紅色纏繞發時便作麻癢繃急硬強重則噁心嘔吐肢體木痛寒熱煩渴此屬脾經之毒火而成也白刃疔多生鼻孔及兩手臂膊之處初生白泡頂硬根突麻癢兼痛破流脂水易腐易陷重則腮損咽焦咳吐痰涎鼻掀氣急等症此屬肺經之毒火面成也治法同鼻疔黑黶疔多生耳竅牙縫及胸腹腰腎偏僻軟肉之處初生黑斑紫泡毒竄皮膚漸攻肌肉頑硬如釘痛徹骨髓重則手足青紫驚悸沉困軟陷孔深目睛透露此屬腎經之毒火而成也治法詳耳疔紅絲疔多生手掌及諸骨節間初起形如小瘡漸發紅絲上攻手膊寒熱交作甚則噁心嘔吐遲治必攻心腹不救急尋至紅絲盡處用針挑斷出血再將初起瘡上亦挑破即用蟾酥丸擦入以萬應膏蓋之如輕者只搽擦拔疔散亦可內服黃連解毒湯加生大黃一錢五分蔥頭五個煎服急尋看頭髮中有紅頭髮一根當即拔去羊毛疔初起惡寒發熱狀類傷寒當先驗其前心後心起有紫黑斑點或如疹子者急用針挑破刮出如羊毛方是疔苗前心後心共挑數處用黑豆蕎麥研末塗之內服五味消毒飲取汗次服化疔內消散輕者用拔疔法重者按前內治要雇各方服藥又羊毛疔急救方初起一黑點其跡頗微內有長毛數根即發寒熱心中極不好過其毒最易攻心每每一暈而死其症似傷寒若誤投發散藥即無救矣慎之慎之治法用銅鏡放胸口撲打三四下即有長毛二三根隨鏡光而出即愈如一時不得銅鏡即用酒罈上泥頭或黃泥亦可用水和濕干潤相宜成團如飯之黏滯用手將泥在胸口上滾擦其毛隨泥滾帶而出再用紫花地丁草一兩水煎服渣敷患處即愈暗疔未發之先腋下忽然堅腫散漫無頭次腫陰囊睪丸突兀狀如筋頭身發寒熱筋脈拘急腫處焮痛治法忌用針灸先以蟾酥丸含化令盡以冷水漱去毒涎再用三丸嚼蔥白三寸裹藥黃酒送下蓋被取汗汗若不出飲熱酒催之仍無汗系毒熱滯結急用霹靂火法燒紅大石子放瓦鉢內安桶中及醋淬石將患處覆桶上厚衣密蓋勿令泄氣熱氣微再添紅石加醋淬之務使熱氣熏蒸至汗其毒減半再用大黃一兩白芷三錢共研細末為丸每服三四錢蔥頭三個酒煎作湯送下蓋被取汗大便行時即效內疔先發寒熱漸次腹痛數日間忽然腫起一塊如積聚是也治法同暗疔凡暗內二疔人所易忽本屬難辨慎勿誤作傷寒雜病若初起即牙關緊急者急用蟾酥丸三五粒蔥頭煎湯研化灌之凡人暴死者多是疔毒急取燈遍照其身若有小瘡即是其毒宜急灸之急以奪命丹或蟾酥丸研化水調灌之亦有復蘇再照前法治之治疔初起疔瘡初起最小凡手足胸背及頭面忽起瘡泡或癢或痛作寒作熱或麻木不痛此極惡之症切不可用燈火如用火灸則毒走難治急用巴豆一粒米飯一粒搗勻黏貼瘡上立時拔疔此法簡便神效用野菊花梗葉搗汁服一碗死可回生或生菊花梗葉搗汁用熱酒拌服取醉而睡將渣敷患處一宿即愈菊花乃疔瘡之聖藥冬月無葉用根亦可飲麻油一鍾菜油亦可可無性命之憂又多年尿缸內垽刮下敷患處留頭敷四五次即愈又生山藥同白糖搗爛塗敷可消又方取蒼耳草根葉搗爛入童便絞出汁冷服一鍾日服三次仍取根莖苗葉一大把燒灰存性研末用米醋並藍澱和如泥先將疔中心及四邊刺破令血出極盡拭淨敷之不過十次連根拔出為諸方第一神驗又方用患者耳垢齒垢刮手足指甲屑和勻作丸如豆大放茶匙內燈火上微炙用銀針挑開疔頭納入外用棉紙一層津濕覆之痛立止又方指甲五錢盡本人指甲外再將他人指甲湊足瓦上焙乾為末酒調服其患處出膿頭用鑷子拔出膿線可保無虞疔瘡初起用生明礬雄黃等分研細末將絲瓜葉搗爛取汁調勻以鴨翎毛掃敷瘡上隨干隨掃一日即消又方生鐵鏽三錢為末廣木香磨酒調下分病上下部以食前食後服之微汗即愈又方皂莢子仁為末醋調敷之五日即愈治魚臍疔瘡其症四面發赤中央黑色絲瓜葉連須蔥韭菜等分同入石鉢內研爛取汁熱酒和服以渣敷貼患處如疔在左手貼左腋下疔在右手貼右腋下疔在左腳貼左胯疔在右腳貼右胯疔在中貼心臍用帛縛住候肉下紅線處皆白則毒散如有潮熱亦用此法須令人抱住恐其顫倒則難救矣又魚臍瘡頭黑皮破黃水流出四圍浮漿用蛇蛻燒存性研細雞子清調敷極效治疔瘡腫毒不破則毒入腹其症手足不住煩躁發狂嘔吐欲死急用甘草節緑豆粉硃砂各等分為細末每服三錢開水調下自安又方蟬蛻研末蜜水調服一錢仍以津和蟬蛻末塗之治諸疔紅絲疔用鍋底灰黑墨少許黑魚鱗一錢焙研細末以麻油調勻用筆依線而劃惟走頭之處用黑魚鱗一二片貼之止處即不走矣其紅絲漸散疔瘡內消設遇鄉間不及用藥者即用慈菰葉搗汁依紅線路劃之亦佳真良方也又法紅絲疔將疔頭挑破擠盡惡血用浮萍草搗爛塗其兩頭亦效治血疔血出者真麻油一鍾服下即止治鼻上生疔用爛溏雞糞荔枝肉同搗爛敷上即效又耳生疔鼻生疔用蔡煙或黃煙點燃吹熄熏之蛇頭疔用小泥鰍一條或蜒蝣搗爛敷之又方白芨研細末一錢蟾酥三分和勻用雞子清調塗均極效治暗疔其人昏狂瘡頭凸紅急取當行路處烏柏樹根二尺去皮搗爛井花水調下一鍾服後瀉一二次即愈治魚臍疔用銀硃和為丸如芡實大每服一丸溫酒送下治疔瘡胬肉凸出者用烏梅肉煅灰存性研末摻之即愈凡患疔瘡誤食豬肉法在不治急搗芭蕉根汁服之可救治疔良方蒼耳草梗內之蟲於立秋後五日內捉者更妙不拘多少搗極爛再用土貝母研極細粉看蟲之多少酌量加入再搗成丸如緑豆大臨時捏扁放患處頂上外用膏藥蓋貼次日疔即拔在膏上即愈又方牛糞曬乾研末水調敷患處其毒漸消不走入臟腑又方陳梅乾一個荔枝一個銀硃一錢共搗爛敷患處又方用多年糞坑內黑磚數塊帶水磨細同生甘草煎濃汁去渣服服後大便解下黑水即愈疔瘡內治要訣五疔雖屬五臟要皆純火之症內治之法惟在審其輕重汗之瀉之清之解之消之散之而已但服藥必須從脈從證脈浮數者散之脈沉實者下之表裡俱實者解表攻裡麻木或大痛或不痛者宜灸之更兼攻毒不可顛倒混施無太過不及也凡疔瘡初起先宜汗之若誤用他方發汗非徒無益反令走黃故必用蟾酥丸見前卷十一癰毒諸方如法取汗汗未透者再以蔥酒催之毒甚者可再進一服如取汗後毒勢不盡憎寒壯熱仍作者宜服五味消毒飲用銀花三錢野菊花蒲公英紫花地丁紫背天葵子各錢半酒水煎服再為取汗如發熱口渴便祕脈沉實者服黃連解毒湯見前卷十一備用諸方加生大黃錢半蔥頭五個清之如症輕者照各簡便方服之取汗再服化疔內消散以消散之凡疔潰後餘毒未解致五心煩熱者宜服人參清神湯清解之疔瘡外治要訣書去疔瘡先刺血內毒宜汗瀉禁灸不禁針惶棉不怕鐵又云治疔貴及早汗瀉毋顛倒下灸上宜針陰陽須熟曉針入棉軟不知痛者為逆症凡疔生項以上者三陽受毒忌用灸法初起即用挑疔法令出惡血疔根脫出為妙如項以下生者三陰受毒可用艾灸以殺其勢火日不可灸如灸之不痛亦須針刺出血以蟾酥丸擦之如旁腫頑硬推之不動用針遍刺頑硬處令多出惡血外塗金箍散否則必致走黃凡患忽然瘡腫以針刺之不痛無血者即是疔也急用針刺破擠出惡血更令一人食飽再飲火酒數杯口含涼水向刺處以口吮盡惡血水溫吐出再含再吮至痛癢方住此治疔絶妙之法也窮鄉僻壤一時無醫無藥者以此傳人功德無量疔毒走黃手足冷六脈暴絶不省人事系毒氣閉塞元氣不能宣通也仍宜蟾酥丸以取汗倘深夜鄉僻一時醫藥不及先將溏雞屎塗敷腫處可暫保然急須按症醫治疔毒走黃經驗方犀角三錢羚羊角二錢此二味先煎濃汁再加入桃仁金銀花連翹黑山梔當歸生甘草赤芍各三錢川黃連錢半蘇子防已各一錢生大黃一兩體弱者或八錢共入前二味並用水煎服如行下血水或下血者可治如無血者不治之症也挑疔法凡挑疔瘡須用鈹針取其尖鋒平正也要先當頂刺開十字口搽上提疔膏少頃疔必髮長再將鈹針當頂刺入以到根知痛為度針入腎硬如鐵者順更挑疔根須用毫針或縫衣針取其尖小利便也先出紫黑血再挑至鮮血出備要挑斷以知痛為止隨填入拔疔散上蓋萬應膏過三四時撥出舊藥再換新藥倘藥干無水不作痛者此挑法未斷疔根也再深挑之不可留根必以上藥知痛藥入水流為率至三四日後瘡頂乾燥換貼歿珀膏待疔根脫出方另研煅石膏九錢兌黃靈藥一錢撒之名九一丹周圍常塗黃連膏外蓋白膏藥生肌斂口拔疔散諸疔針破即用此搽之磠砂硃砂各一錢另研末食鹽白礬各錢半研勻鐵鏽刀燒紅將鹽礬二味放刀上煅枝擇丁日午時合磠砂硃砂共研細末每用少許搽疔上拔疔除根方萆麻子一粒去油滴乳香一分去油共研或軟飯或棗肉為小餅貼疔上外用膏藥蓋之三四時即拔其根甚妙又方鰣魚靨用手刮下不可見水陰乾收貯用時以銀針撥開疔頭將一片貼上以清涼膏藥蓋之過一宿揭開其疔連根拔出後用生肌散收功余治兩婦人大腳趾患瘡三年不收功皆因瘡根不曾拔出之故也即將鰣魚靨一片以銀花湯浸軟拭乾貼之不數日而愈拔疔膏治一切紅絲蛇頭疔及諸疽毒去油乳香去油沒藥血竭人言即砒石兒茶飛淨青黛蟾酥象皮焙燥各二錢麝香六分冰片四分共為極細末用棗肉以石捶打極勻為丸如芡實大飛淨硃砂為衣每用一丸加蜜少許調勻塗於親頂以膏蓋之一宿即消如毒盛明日再塗一次如有寒熱口渴等症內服梅花點舌丹取汗無不立效拔疔紅膏銀硃三錢水飛曬乾萆麻仁二錢嫩松香五錢黃丹一錢曬乾輕粉五分共搗成膏以根針將疔頭挑破用紅膏一小團安膏藥當中貼之疔即拔出或畏痛者不挑破亦可並治無名腫毒已成未成已潰未潰俱效又方蜒蝣五錢銀硃一錢雄黃八分冰片一分共搗如泥搽患處立消另以菊花葉搗汁飲之極效神驗疔毒丸此方屢試屢驗救人無算雄黃三錢大黃三錢巴豆去心皮三錢以上三味共合一處用石臼石杵舂爛如泥以飛羅面陳醋煮糊同藥搗極細爛為丸如鳳仙子大病重者每服二十三丸輕者二十一丸再輕者十九丸單數為度放在舌上熱水送下服後打噯則愈如腹瀉更好俟瀉三四次即以新汲井水飲之則止如病重不省人事將二十三丸用滾水和開從口角邊灌入服後將人扶正端坐藥入腹中片刻即使蘇醒至輕者可以不服初服藥時勿吃涼物冷水恐不泄瀉忌雞魚蔥蒜牛羊犬肉並煎炙辛熱飲酒行房等事追疔奪命湯姚理堂曰疔瘡一症正宗論證最詳以五疔分五色為五臟所發而主方惟一黃連解毒湯平常之疔未嘗不效獨有一種疔發唇部其唇腫若豬咀堅硬無膿唇之內外起細頭黃泡無數作寒作熱神氣不定七八日間七惡疊見而不救者醫家遇此等疔症但書黃連解毒湯及犀角地黃湯治之勢必走黃百不一治惟追疔奪命湯及雄麝湯二方為治此疔之妙藥遵而用之屢見奇效追疔奪命湯蟬蛻一錢青皮一錢澤蘭葉一錢防風錢半黃連二錢細辛三分羌活一錢殭蠶二錢鮮首烏兩錢草河車藕節各錢半加蔥姜用水煎入酒一杯服之服後蓋被取汗如大便閉結加生大黃二錢雄麝湯地丁根即大薊有開黃花者有開紫花者或用黃花地丁或用紫花地丁用水洗淨二錢白芷牡蠣牛蒡子金銀花殭蠶山梔荊芥穗青木香茜草根以上各二錢甘草一錢用酒水二碗煎至一碗去渣再加入雄黃乳香各一錢麝香二分俱另研細末和勻服如大便閉結其人體氣壯實者再加生大黃二錢芒硝一錢此方孕婦忌服奪命丹治疔瘡發背諸大惡症蟾酥酒化輕粉麝香各五分枯礬寒水石煅銅緑乳香沒藥各一錢硃砂三錢蝸牛二十個或少亦可共研或蝸牛或酒糊搗為丸緑豆大每服二三十丸溫酒蔥湯送下無論麻木嘔吐昏憒病重者此藥服之立可起死回生不痛者能痛痛甚者即減昏憒者即蘇嘔吐者即止未成者即散已成者即潰實有奪命之功誠瘡科之至寶也對口瘡方並與卷一頸項部對口方合看初起用水仙花根搗爛敷四圍中留一孔未成即消已成或出膿少許立愈又鯽魚仙方治對口瘡並治一切白色陰疽初起用活鯽魚一個生山藥一段與魚一樣長白糖二錢同搗極爛敷上神效再瘰癧及乳癰初起加臘糟同搗敷之並效又方白菊花四兩生草節四錢水煎服之即時消散又方烏羊角燒灰存性為末用糖酒調敷立愈又方大活鯽魚一個入瓦盆內搗爛加入頭上篦下發垢四兩和勻極厚敷之外以紙貼一二日即愈加生山藥一條同搗並治乳癰瘰癧又方取公豬眼梢處臭肉形如腰子有花紋者量瘡大小用多少個和糯米飯同搗成餅緊貼不留頭已潰者拔毒收功又方取公豬腰一個乘熱切開貼對口瘡處用帛包緊一二時再換豬腰貼上又有人腰間生一毒癰紅腫未破皮痛不可忍俯躬而行一人取新宰牡豬肝切片如瘡大貼上外用布纏定一對日其病即愈肝色變黑臭不可聞又方治對口瘡用新鮮夏枯草入鹽津唾少許搗爛敷患處已成留頭未成滿敷三次即愈凡對口初起不論偏正用蛇蛻一條煅灰以好酒調服即愈或用癩蝦蟆放瘡上拔毒法對口發背俱效三星湯治對口瘡不論陰陽症皆可服金銀花五錢蒲公英一兩生甘草節三錢水煎連服三劑可消或已潰者用七聖湯真臺黨制白朮生黃耆當歸身各一兩金銀花二兩白芥子三錢上安桂去粗皮一錢六服可愈又方滑皮蟲即蜒蝣搗爛加冰片敷之能止痛又方取灶上偷油婆即蟑螂去翅足搗爛加冰片以爛飯和作餅敷之亦效又方用蕻菜即空心菜搗爛敷無梗葉時搗根蔸亦可治瘡毒攻心凡瘡毒攻心心神不安飲食難下大蝦蟆一個取下蟾酥用棗去核將酥裹入棗內再用大蔥白一根破開將棗夾入蔥內酒煮去棗不用將蔥食之極效又方地骨皮研末滾蜜水調服即安鐵箍散圍諸腫毒極效大黃三兩白芷二兩川烏草烏南星半夏黃柏白芨白蘞各一兩五倍子兩半小粉四兩要酸臭者用醋炒以上共研細末米醋調勻周圍箍轉留出頭又方生大黃五錢木鱉子土炒三錢共為細末用真米醋調敷患處留出頭又方乳香沒藥麝香各三分蜒蝣二條共搗爛敷患處即消此方極效上中下三發背俱屬督脈經皆由火毒而成上發背火毒傷肺生天柱骨下其形橫廣如肚中發背火毒傷肝生在背心其形中闊兩頭有尖如瓜不發背火毒傷腎生在腰中其形平漫如龜其初起皆形如粟米焮痛麻癢周身拘急寒熱往來因循數日突然大腫氣實者多焮痛氣虛者多麻癢初起治法不論虛實即宜隔蒜艾火灸之不應則就患頂當肉灸之至知痛為效是以大化小移深居淺之法灸後用針當瘡頂點破一孔隨用藥竹筒拔法務使毒氣內外疏通不致內致如有表症發熱惡寒脈浮無汗者服荊防敗毒散汗之如有里症發熱惡熱大便燥結脈數者服內疏黃連湯下之表裡兼有脈浮數者服神授衛生湯雙解之膿勢將成必行托裡服托裡透膿湯已潰服托裡排膿湯如潰破腐肉不去外貼巴膏以化之潰後總宜補養氣血腐盡生肌法按匯方選用此三症無論老少總以高腫紅活焮痛者為順若漫腫塌陷焦枯紫黑者為逆雖云由火毒而成然未有不由陰虛而致者經去督脈經虛從腦而出膀胱經虛從背而出故不可專泥如火治法所以禁用寒涼也治發背經驗方經霜桑葉用水浸以好米醋拌蒸七次貼患處干又換之拔毒收口屢見奇效又方用桐葉醋蒸貼之退熱止痛漸漸生肌收口雖癰疽發背大如盤腐臭不可近者亦極神妙又方治癰疽發背欲死用冬瓜切去頭合瘡上瓜當爛再切去又合之使其拔去瘡毒瓜未盡瘡已小斂矣然後再用膏藥貼之此法甚妙又方用牛皮膠二兩酒二斤同煮候溶化放溫徐徐飲盡未結成者能消已潰者易愈又發背如神真祕方先用生蔥熬湯洗瘡再用狗牙要大者炒黑研細末以好醋調敷患處又方車前子豨蘞草巴山虎草金銀花各等分以多年陳米粉為糊調敷患處又方全黑公牛糞黑芝麻等分同搗極細用鴨翎蘸掃患處已潰未潰俱效發背對口及一切癰疽潰爛宮粉一兩輕粉銀硃雄黃制乳香制沒藥各二分半共研極細末用豬腰子一個切開摻藥末五分於腰子上蓋貼患處待藥如蒸良久取去一日一次拔毒減痛潰出膿穢不可手擠每貼先用茶葉煎濃湯洗淨患處輕者貼兩三次得者七八次可愈發背諸毒澤蘭葉二三十片做一疊用銀簪扎數十孔好醋一鉢將葉放醋內同蒸爛冷後取一葉貼毒上將干即換雖穿心及諸背毒皆治能去死肉生新肉神方也夏月發背癰瘡口不起脈大無力發熱作渴自汗盜汗用助陰消毒湯真臺黨參八兩生黃耆一斤當歸白芍各四兩陳皮一兩附片五錢水煎成膏作二劑服頓退數劑瘡起而潰將分量減半又數劑可愈發背對口並一切癰疽腫毒用五倍子二兩煮爛肥皂二兩去筋子焙研制乳香制沒藥各一兩均研末合數味用好醋同煮爛敷之亦可共捶成錠好醋磨汁塗搽干則再搽內服大歸湯附大歸湯當歸八錢生黃耆五錢銀花一兩半草梢三錢上部加川芎一錢下部加牛膝一錢中部加桔梗一錢酒煎服並治蛇毒蟲毒犬毒服之毒不內攻又神功托裡散分量加倍更妙背癰潰後洞見肺腑瘡口黑陷不能臥口渴思飲倘胃氣健能食猶可救真臺黨參熟地麥冬去心各二兩生耆當歸棗皮去核各一兩肉桂去粗皮志肉真茯苓各三錢焦白朮銀花各四兩五味一錢一劑胃開能食可救若藥無驗者死治搭背對口五背瘡症路東廣即大路東面人糞曬乾用瓦缸裝入以黃泥固封用火煅漏小孔看出青煙即止燒過性者不可用大黃瓦焙存性各一兩馬蜂窩摘去蒡上小蟲干灰瓦焙焦不可過性一兩血餘焙焦存性枯礬各一錢用生蜜調膏貼患處初起未過七日即消已爛者半去毒半生肌此仙方也屢驗兩背忽生瘡成癰陽症易治用三星湯銀花五錢生甘草四錢蒲公英一兩二劑可消癢甚者陰症難治宜大補氣血用消陰助陽湯真臺黨參五錢生甘草花粉各三錢焦白朮生黃耆各一兩銀花二兩肉桂去粗皮乳香各一錢當歸五錢三劑可消此與七賢湯同義各異七賢湯治已潰以生肉為主此方治未潰以護肌為主七賢無乳香湯治已潰以生肉為主此方治未潰以護肌為主七賢無乳香花粉背癰愈後口不能收百藥不效此陰不濟陽也生膚散麥冬去心當歸各一兩熟地銀花各二兩棗皮三兩臺黨參八錢肉桂去粗皮三錢焦白朮五錢六劑可愈背癰愈後肉長口平忽開裂流水此不謹色欲也用定變回生湯真臺黨參四錢黃耆三兩當歸制白朮麥冬去心忍冬藤即金銀花藤茯苓各二兩五味二錢肉桂三錢棗皮五錢四服平復勿再犯色欲背心發瘰癢甚已而背神功散治發背癰疽諸瘡腫潰皆效炒黃柏炒草烏各一兩合研末用漱口水調入香油少許搽患處如干仍又潤之即愈諸瘡收口摻藥方有患背疽者大潰五臟僅隔膜耳皆謂必死後用鯽魚去腸裝入羯羊糞烘燥研細末乾摻上之瘡口自收而愈阻疽發背不疼者艾葉一斤硫黃五錢雄黃五錢同煮搗爛溫敷再煮再敷接連無間至知痛者可止瘰癧諸方即瘍子生在頸上未潰者內消已潰者可愈夏枯草八兩元參五兩青鹽五兩火煅海藻天花粉生地酒洗川大黃酒蒸貝母海粉白蘞薄荷葉連翹桔梗當歸酒洗枳殼麩炒焰硝甘草各一兩共研細末酒跌為丸如緑豆大食後臨臥低枕白湯吞下百餘丸向患處側臥一時又瘰癧結構至胸者生何首烏洗淨日日生嚼食自愈外用葉搗爛敷之又方野菊根搗爛酒煎服又以渣敷之又方肥皂子仁半斤去黑皮夏枯草一斤元參一斤共研細末蜜丸桐子大食遠後每服三錢至重者二劑必愈忌食栗子豬頭肉肝腸醋及一切發物又瘰癧未破者雄黃蚯蚓糞小麥面等分研末醋調塗敷又方用蒜片貼著瘰癧上以上筷頭大艾火灸七壯如蒜片灸熟又換生蒜多灸更妙又方用白亮松香研極細末以雄豬骨髓調搽雖三五年各藥不愈者此方極效非關松香一味之靈惟在研調搽敷之手法大有祕訣最關緊要如用左手即以左手一順到底如用右手即以右手一順到底總要一手一順不可換手不可回轉調敷亦要一順到底切忌婦人經手又方真川貝母去心八兩竹瀝兩大碗以貝母泡入竹瀝浸透取出陰乾再浸再幹以瀝盡為度研成細末每日食遠後淡薑湯服二錢四十日必愈潰者以濃茶蘸洗不必貼膏藥肌膚如舊並無疤痕取竹瀝法以生竹切作每段尺余長去兩頭節中有節無礙放水內浸一二日用兩塊磚架起中用炭火炙則竹瀝從兩頭流出以碗接之或以一頭高者向火一頭低者流出竹瀝亦可痰核瀝串羊角一斤劖碎新瓦上炙黃研末每早調服三錢瘰癧不論已破未破萆麻子仁四十九粒瀝青一兩苦杏仁十三粒去皮尖共搗千下自然成膏攤貼患處又內消瘰癧經驗方土貝母白芷各五錢共研末糖霜調陳酒下三錢重者三服即愈又方胡桃一枚劈分兩半將一半挖去肉以蟬蛻塞實對合用山泥包好煅存性研細每日服一枚陳酒送下服一月愈消毒神效方土鮮山藥五兩不見水土朱一兩松香一兩全蠍十個白洋糖一兩共搗爛圍患處敷之留頂不敷藥上蓋紙周時一換初起即散已成者搽二次可以收小出毒隨愈屢試輒驗治癬初起方用燈芯以口涎潤濕擦之有小蟲入燈芯內即以火化之多擦數次自愈又方韭菜炒焙存性研末以豬脂和塗之又方雞蛋一個開一小孔去白存黃入硫黃三錢川椒末三錢將濕紙封固火灰內煨熟為末先用麻線將癬刮破以樹皮漿或羊蹄根俗名牛舌頭根汁調藥末塗上又方皂礬不拘多少炒極干為末豬油調敷又方多年竹掛燈一個向火上烤出汁如膠者取之將五倍子去蟲炒研為末再加陳醋和勻溫熱塗之又方白芨木鱉子土槿皮白糖等分為末醋調塗之又方生半夏醋磨濃搽之永不再發治諸癬各種癬瘡新鮮羊蹄葉俗名牛舌頭葉不拘多少搗爛加川椒白糖並食鹽少許以布包之浸好陳醋內半日取布包擦之牛皮風癬用石榴皮蘸生明礬末多擦之又牛皮血癬枯礬水銀各二錢川椒一錢土大黃根食鹽豬油同搗爛敷患處又牛皮癬及瘌痢頭先用浸豬湯洗淨再以煙膠即煙屎川椒研末各三錢香油調搽又牛皮癬香油一兩全蠍七個巴豆二十枚斑蝥十個同熬至焦黑色濾去渣入黃蠟一錢候溶收起朝擦暮好又方紅棗七枚去核斑蝥七個同搗如泥敷患處自愈又蛇皮癬以新米糠用火燒取滴下之油擦之又圓癬皂礬炒乾為末豬膽調搽又方穀皮樹剪圓如癬大以有毛一面黏口唾貼上用手時時撲擦之又年久癬瘡煮熟雞蛋黃十個放生鐵器內焙出油取蛋黃油搽之先艇桑條火熏後再擦極效又多年頑癬五倍子研細以陳米醋熬成膏將癬抓破以膏敷上干則再敷以不癢為度去藥之時其患處之處一同黏起盡除甚效又方用蒜子煎水洗之其效又惡癬瘡癩十年不瘥者苦瓜一枚煮汁擦之每日三度又一切風瘡頑癬疥癩年久不愈者黑魚一個去腸雜洗淨以蒼耳葉填滿外以蒼耳安鍋內置魚於蒼耳上少著水慢火煨熟去皮骨淡食勿加鹽醬功效甚大又身面惡癬紫背天葵草加入生明礬研敷數次愈又五般諸癬用韭根燒存性搗末豬脂調敷又頭面花癬生白果仁切開頻擦極效又方牛蹄甲騾糞各一兩燒存性研末酒調抓破敷之又下體癬瘡艌船陳石灰牛糞燒煙燻之一日一次又方明礬生熟各半輕粉二錢銀硝三分共研末將生大黃根搗爛布包蘸藥末搽之又惡癬有蟲癢不可忍早起採帶露絲瓜葉七片每片在患處擦七下神效忌食雞魚發物又頑癬用糠殼燒取油擦之兼治癩頭瘡神效又方用米泔水洗淨以穿山甲刮破再以白糖和甘草汁調敷又方鐵鏽粉三分密陀僧雄黃明礬各二錢加冰片麝香研細末醋調用生薑蘸擦之治疥瘡方凡疥瘡不論乾溼用胡椒硫黃等分為末以生豬油同搗如膏用布包向微火上烤熱搽患處三五日痂落即愈又疥瘡及癬方用石灰淋汁洗之數次即愈又方嚼食鹽搽之又疥瘡滿身久不愈何首烏艾葉等分水煎濃湯沐之又疥瘡方豬肚一個裝入牙皂五錢煮爛去皂食肚一月吃十個瘡永不發若嫌味淡難吃略蘸川椒鹽食亦可又方白薇三錢白芷川椒炒各二錢大黃明礬各五錢蛇床子雄黃各一錢細茶葉百部各二錢寒水石二錢另研樟腦一錢臨用加入共研細末用生豬脂油去衣膜和勻搗爛擦之甚效又方蛇床子大楓子肉皮硝樟腦各三錢銀硝一錢油核桃五個共研細末用夏布包搽患處又薄荷百部煎水洗以生白果嚼爛敷楊梅瘡楊梅初起結腫筋骨疼痛時宜先服疏風解毒湯輕者可以消散土茯苓二兩白蘚皮皂角子炙焦金銀花防風木通木瓜苡仁各二錢酒引水煎服血虛加川芎氣虛加參耆若遍身破爛臭穢兼筋骨疼痛氣實毒甚者服化毒散數劑化毒散大黃一兩穿山甲炙歸尾各五炒殭蠶三錢蜈蚣炙焦一條共研末每服二錢酒調日三服若毒攻咽喉或遍身腫痛潰爛浸淫成片腐臭不堪者用蜒蝣十餘條加入白糖同搗爛以井泉冷水沖服無須另服他藥此方有起死回生之功屢試屢驗又方內服馬齒莧膏外用馬齒莧搗爛敷之最效又方治結毒潰爛先用黑豆生甘草等分煎濃湯先熏後洗再用鵝黃散摻之輕粉熟石膏川柏等分研末加入冰片研勻濕則摻干則用膽汁或麻油調搽如翻花楊梅再加入雄黃末又楊梅結毒方大蝦蟆一隻口內入雄黃末三錢陳酒五斤共入瓦瓶扎封瓶口隔水煮三炷香久量飲溫服又楊梅毒初起用土茯苓數十斤童便浸一宿晾乾每服四兩用水煎當茶飲忌飲茶久服自愈又方楊梅初起即治即愈奇效羊角黑桃殼俱燒灰存性等分研細末每服錢半用酒調早晚各一服四日後毒從大便出如血如膿半月毒盡後量人虛實虛則以八珍湯補之又方明雄黃錢半杏仁去皮三十個輕粉一錢共研細末洗淨後以雄黃豬膽汁調搽極為神效凡前陰等處患生楊梅紅腫潰痛者用疳瘡方以黑豆生甘草或節或梢煎湯以鯉魚膽汁頻搽極效又楊梅下疳損破腐臭用鳳凰衣散鳳凰衣一錢輕粉四分黃丹一錢冰片三分共研極細末頻頻干撒之又楊梅瘡極妙方金銀花皂角刺殭蠶蟬蛻各七錢杏仁去皮尖七粒土茯苓一斤水十四碗煎至七碗一日服完不可見風七服全愈永不再發又楊梅瘡神效方水銀一兩入乳鉢中用津唾乳成泥再入頂高真麻油同乳分為七分每日取一分以兩手心搓之七日之內須避風禁油膩發物凡治楊梅瘡毒切勿服丹藥嚴禁一切發物及房勞等事體氣壯實者以解毒為主虛弱者以兼補為法輕者半年重者一載始獲全愈切不可妄求速效強服輕粉水銀妄用熏罨劫藥免致餘毒藏入骨髓關竅中倒發楊梅結毒戒之慎之為要土茯苓為楊梅瘡必要之藥然亦不可服之過多恐難生育又神方朴硝六一散各等分研細末每服三錢早晚二服魚口便毒正在小腹與大腿折紋縫中交界之際兩胯合縫之間初起如核漸大如卵堅硬木痛微熱不紅寒熱交作多由強力房勞忍精不泄或欲念不遂以致精搏血液聚於中途壅遏而成或因暴怒傷肝氣滯血凝而發生在左為魚口生在右為便毒生在小腹之下陰毛之旁者名曰橫痃又名曰外疝非魚口便毒也生於腎囊之後肛門之前名曰懸癰又名曰海底漏治法宜散滯行瘀通利初起宜內服加減消毒散加延胡索二錢外用三奈香附共研末蜜調敷之如已潰即宜補養氣血之劑不然恐變生別症加減消毒散陽毒初起者皆可用之蒲公英三錢金銀花二錢元參一錢赤芍二錢連翹一錢炒山甲一片皂角刺尖七分前胡一錢防風一錢制香附一錢生甘草七分加延胡索二錢水煎服之自能消散魚口便毒初起即大於核桃者可以敷消飛羅面黃豆麵雞蛋清調敷外用桑皮紙蓋貼每日早晚換二次又方遠志肉一兩用甘草湯炒以酒水各半碗煎服次日可消又方生大黃一兩研細末枯礬三錢酒調沖服又方鬧羊花其人強壯者用七分體氣虛弱者用四分芫花錢半金銀花三錢淮牛膝獨活各一錢水煎服吃酒者加黃酒入內更妙初起三日內者不過三服即消凡服此藥者忌服甘草蔥蜜散凡魚口便毒不論已成未成隨即消散先用木鱉子煎湯熏洗更用蔥搗成涎和白蜜塗之隨即消散有人患此連敷數次其病如失又方生白礬三錢重者五錢研末好酒送下欲吐忍之出汗即愈一半次日全消極效魚口初起栝蔞燒存性研末用黃酒沖服又方槐子七錢或槐花亦可用黃酒煎熱服取汗即愈又方白礬研末和寒食麵調敷患處腫消即愈又方百草霜五倍子炒黃研末等分用陳醋調敷又方牛牙煅灰研末每服一兩黃酒調服又方瓦松焙乾研末雞蛋清調敷初起即敷自能消散又方便桶鹼即例桶底下尿硝刮下為末磨坊飛面錢半蔥汁調敷治便毒奇方地榆四兩川通草一兩白酒三碗煎一碗空心服又方胡桃七個焙燥研末用酒調服不過三四服即愈又方牛蒡子二錢炒研加入白蜜一匙空心溫酒沖服又方全蠍去頭足米炒生大黃穿山甲白芷等分水煎服外用蔥白搗爛和蜜敷此藥不可入口又方用鹿角燒灰存性三錢核桃皮燒灰存性三錢和勻好酒下九龍丹治懸癰橫痃魚口便毒初起木香血竭制乳香制沒藥巴豆肉兒茶各等分研細末用生蜜糊丸緑豆大每用九丸空心熱酒下候便瀉三五次後方可食米粥腫甚者間日須再服治橫痃便毒茜草一兩當歸銀花各五錢穿山甲二片甘草節小木通各三錢黃明膠二條用水酒各一碗煎服以出汗為度外再用皂莢三枚去筋核金銀花一握用醋煎同搗爛敷患處立愈又橫痃神方雞蛋一個白蒺藜一合和好酒煮蛋熟去愨連酒服即愈又懸癰初起如松子漸如蓮子十餘日赤腫如桃李成膿即破破則難愈延久成弱症初起急用大粉甘草四兩切寸段用急流水一碗文武火漫漫蘸水炙透劈開口心有水潤為度捶碎每服一兩用無灰酒二碗煎一碗溫服次日再服如未消盡再服一料無不全消者極有效驗又一少年患懸癰用全蠍二十個洗去鹽瓦上焙研配胡桃肉二兩共搗勻用好酒送下一頓食完次日腫痛減去大半又將前藥減半連服兩日其患若失蓋治病原要審人體氣強弱毒起遲速而施療治不必拘於甘草之方一例而論也附告同志留意察之痔瘡腫痛治痔漏馬齒莧煎水洗內服生熟荸薺又苦參茵陳等分煎水熏洗兼治脫肛又鳳尾草赤皮蔥川椒共搗爛煎汁熏洗又白礬三分研用熱童便二杯調化洗痔上兼治肛門邊腫硬痛癢又桃樹根或魚腥草或梓桐樹皮葉或豨蘞草連根或萵苣菜或枳殼皆可煎湯熏洗均極效又蜒蝣搗爛加冰片少許搽痔瘡上立時效又內痔落下用大團魚頭一個火煅為末或加冰片搽之痔即縮上又外痔腫痛用隔年風乾橙子桶內燒煙燻之以冰片銅緑膽礬等分研細先將痔用前各煎水洗後再以藥末搽之又蒼耳研末每服一錢和粥空心飲之又方桃仁杏仁各七粒緑礬一錢共研末將燒酒杯許浸之以鴨翅鴒掃於患處日掃數次三日即愈又方冰片二分青黛三錢乳香三錢元明粉一兩作小絹袋數個盛藥日坐患處覺濕即易再換一個久而自愈又熊膽五分冰片二分研細井花水調雞翎掃痔上痛即止治偷糞老鼠貓屎井底泥和勻圍之立愈治坐板瘡方硃砂雄黃各一輕粉枯礬黃柏各五錢共研末先用川椒煎水洗後以藥摻之又方南瓜藤一枝瓦上焙乾研細末以桐油調敷如燥裂時用真麻油搽之一周時盡脫下永不復發又方緑礬一把放盆內滾水沖化候溫浸洗癢止起坐草紙上待乾洗數次自愈又方用絲瓜皮焙乾為末燒酒調搽又方蜂殼燒灰存性研末和冰片少許摻上又方松香宮粉硫黃寒水石等分研末用熟豬板油調敷又方輕粉一錢萊蔔子三錢冰片半分杏仁十四粒共研末以手搽瘡口又方以瓦磚燒紅用堆花好酒浸紙殼蓋上乘熱氣先熏待溫即坐之又嫩蚯蚓和白砂糖搗爛塗之又以井底涼泥糊瘡上干即換之三五次愈又治坐板瘡方先用砂仁殼煎湯洗淨再用茅廁坑坎上之泥刮下曬燥研細以麻油調搽三次即愈又方蘆薈一兩炙甘草五錢共研細末先用豆腐泔水洗瘡抹乾再以藥末敷之候乾即瘥此方系西域僧人傳授並治濕瘍浸淫諸瘡均效坐板瘡並連及陰囊發癢陳荷葉煎湯加入白礬頻洗之臁瘡羊屎煅枯存性研末麻油調敷癢則加柘礬輕粉少許又久患臁瘡用蔥白犍豬油去膜樟腦五六錢共搗極爛先用防風金銀花甘草節煎湯淋洗患處拭乾後將前藥厚厚敷上用油紙裹好再用舊棉花扎緊一日兩換不可見風忌食發物數日生肌長肉全愈藥用瓷瓶封口莫漏香氣又治杖瘡並治跌打皮破肉爛損傷俱極效又多年臁瘡大蒜瓣子燒存性為末麻油調敷又方柿葉燒灰存性同川椒末塗患處又方驢蹄剔下蹄皮或舊爛破鞋底牛皮俱可用瓦炒黑存性研末瘡濕則乾摻瘡干則麻油調敷或有人腳下剔落之皮更妙此方並治鱔拱癤用菜油調敷又臁瘡有蟲蛀爛馬齒莧研末蜜調敷蟲自出又臁瘡腫爛牛蹄甲燒灰麻油調搽又方豆腐渣炒熱敷冷再更換以愈為度又方面做油炸饊子研末和蔥白搗爛敷之極效又方黃蠟溶化油紙攤成膏十二個半日一換換時仍以先貼者加其上不待盡即愈又方韭菜地上蚯蚓糞干為末入清油調敷臁瘡拔毒方凡治臁瘡須先用此方拔去毒水然後再用收口藥可以取效坐板瘡及流膿瘡並可治用瀝青四兩紅礬二兩共為細末香油調搽則瘡內出水其毒可拔惟略有疼痛須忍耐之臁瘡收口方如前方拔毒盡後瘡不起邊內有紅肉即用此藥收口用石決明煅二錢川黃連一錢血竭五分琥珀末一錢乳香一錢寒水石煅三錢黃柏五錢冰片三分如癢甚者再加飛礬五分共研細末先用溫苦茶洗瘡上藥一次即洗一次不數日收口神效附毒瘡凡人因誤服附桂之藥以致或生癰疽名曰附毒瘡慎不可服敗毒涼劑等藥並不必貼膏藥為要任其腐潰只用六一散一味摻之即能去腐收功不必更換他藥斜橋狄東升年近人旬乾隆庚戍夏因誤服附桂等藥以致腰患附毒大似冰盤臭腐難近豫授此法兩月全愈並未更換他藥附載於此以備參考如見信者自受益也癰大如盤臭不可近取桐樹葉用醋蒸貼之退熱止痛漸漸收口而愈癰疽惡瘡膿血不止生枸杞根皮洗淨先將皮內白瓤成片颳起留用以粗皮及根梗煎湯洗之令膿血盡淨倘有惡血隨洗隨出切勿畏懼洗淨以白瓤貼之其血自止即結痂而愈惡瘡無頭皂角刺燒灰存性為末酒調服三錢菜子三五粒送下皮厚不出頭麻雀屎量瘡大小或一粒或數粒安瘡當中即穿破或用蛇蛻燒灰存性為末豬油和塗即出頭諸瘡潰爛後疼痛難忍天南星為末遍擦之即止瘡破風傷水傷作痛用牛屎燒煙燻之令汗出即愈癰疽作癢難忍用食鹽干摩其四圍可止用蟬蛻研末搽或煎汁洗止癢瘡痂作癢白扁豆搗末厚敷之腫毒疼痛難忍芭蕉根搗爛塗之瘡口不合秦艽研末摻之醋煮桑葉一滾即撈起貼之臍瘡不幹生白礬龍骨等分煅存性研細末摻之或用當歸焙乾研末敷之亦妙或舊棉花或亂頭髮燒灰並效臍中出血白石脂微炒研末摻之干後須聽其自落不可用手剝去疥癩白蠟二錢柏樹膠三錢水銀二錢黑鉛一錢溶化投入水銀內共研為丸有疥癩處搽之血風瘡久不愈老南瓜去皮煮爛布包擠去水用瓜瓤敷之又方陳石灰研敷亦效黃水羊胡屢驗方宮粉松香共研末燈盞油調搽極效白蛇瘡遍身或腰間細白泡形如白蛇相纏白芨水龍骨即多年糞船板上干陳朽石灰更佳共研細末用無根水即未落地之水調塗又豬脂苦杏仁共搗成膏絹包搽之又用一掃光調搽俱效又方明雄黃六錢明礬三錢共研末津唾調塗膝上生癰名牛頭癰連須蔥頭切碎用糯米飯乘熱拌敷重者五六次必消惡瘡有肉如飯粒突出破之流血隨生馬齒莧燒枯研末以豬脂油調敷極效永戒食鵝肉天疱瘡生大黃磨濃汁時時搽之又方小麥一合炒黑研末加冰片少許以清茶調敷又方白花百合搗爛敷之又方老菱殼燒枯為末蚯蚓泥麻油調敷均極效又荷花瓣口津潤濕貼之天泡濕熱肥瘡等類滑石一兩生甘草五錢研末敷天泡加生緑豆末治濕熱肥瘡再加枯礬少許專治肥瘡俱極效天火瘡初起似痱子漸如水泡熱如火燒其色赤用蕓薹根苗蔓菁根苗各等分搗如泥以雞蛋清調敷如無蔓菁用商陸根亦效藝臺即今油菜臺也丹毒因生瘡服過丹藥以致火毒發作水中絲草搗爛敷之干又再換極效驢馬汗瘡瘡愈後因聞驢馬汗氣而毒發腫痛枯礬黃丹水飛炒紫等分研末敷之膿泡瘡絲瓜取汁調宮粉塗之或柳花汁調塗亦妙疥瘡膿窠肥瘡皆治松香一兩雄黃一錢為末入竹紙捲成條子浸菜油內一宿取出倒吊燒之取滴下油候溫頻搽皆效惡瘡及癬騾糞燒灰為末摻之瘡毒初起青荷花瓣將唾沫舐濕貼瘡上即消已潰者貼之即收口青荷花瓣夾在簿中陰乾可用破傷風凡瘡破及損傷破皆須禁風若受風則痛欲死用蟬蛻去頭足翅淨六錢瓦上焙乾為末陳酒調服取汗即愈翻花瘡肉如飯粒破之血出隨生蒼耳葉搗汁服三合並日塗汁數次即愈蛇纏瘡或纏手足腰腿燕窩泥研末水調敷之又雄黃研末好醋調搽又雞冠血日塗數次又生百合和白糖搗爛塗敷即消又鯽魚燒灰和醋搽之均極效天行發斑狀如豌豆熱如火燒頭面及身須臾周遍皆載白漿蜂蜜升麻水煎每服一杯日三四服再以棉蘸升麻蜜汁時時遍拭之自愈火珠瘡其瘡如珠始生髮中相染不已亦有傷命者用生蘿蔔搗爛滴醋少許和勻敷之自愈痘爛生蛆嫩柳葉鋪席上臥之蛆盡出而愈消化瘡毒驗方魚鰾切成寸段用香油炸脆每食數錢初起輕者三服即消重者五六服亦消已成形者亦可輕減一半惟已穿潰出膿後不可服曾見頸上腮旁或包或癤腫毒疼痛此方服之自消屢試屢驗業已經驗多人肚癰發背奇方肥皂子七個燒枯蜈蚣一條雄黃密陀僧各一錢雞蛋殼一個共研末雞蛋清調搽即愈癰疽腫硬如牛皮南星半夏草烏豬腦髓各等分共搗爛敷留出瘡頭即愈惡瘡胬肉烏梅肉燒灰存性研末敷惡肉上一夜即盡或微加輕粉頑瘡腫焮多年不已生馬齒莧搗爛敷之三次即愈多年惡瘡冬瓜葉陰乾瓦上焙研細末瘡濕即乾摻之或用多年石灰研細雞子清調成塊火煅過候冷再為末薑汁調敷又枸杞根為細末用鹽茶洗瘡後乾摻之或馬齒莧或蒲公英均可搗爛敷之膿窩疥瘡水銀大楓子肉油核桃燭油各三錢研作五丸每夜將一丸總在心口滾擦通身皆好膿窩瘡神效方用最舊齷齪鞋一雙最舊年久絲棉絮筋二種俱燒成灰候冷再用大楓子肉為末共以香油調勻敷之瘡濕乾摻無論大人小兒身上膿窩瘡流黃水瘙癢不止延蔓無已均效又方宮粉一兩炒黑冰片三分共為末敷之灸瘡出血有人灸火至五壯血出不止如尿手冷欲絶以酒炒黃芩二錢為末酒調服血即止身上無故一孔出血用鮮豬肉切一厚片貼之外用布帶縛住勿使移動其血即止再服生血清熱藥凡針灸疤內發拱出血及一切血管出血不止者用熱黃牛烘塗之即止凡毛竅出血甲片炒成珠研細末乾摻之以帛扎住血即止隨服補血湯數劑即愈陰疽外敷藥白疽皮色不變不燒熱不疼痛是也艾葉一斤硫黃雄黃各五錢水煎半日搗爛候溫敷上再煮再敷連易十數次常敷無間至知痛者可生諸般瘡毒多年不收口羅細石灰末入桐油調成塊再用活鱉魚一個切去頭將血頃入灰內再加好陳醋和勻成膏敷於瘡上即結痂收功矣又方用龍眼肉即桂元肉不拘多少若男患瘡用女人口嚼女人患瘡用男人口嚼爛成膏貼患處即收口又合口生肌散方取山上久經風雨漂白之牛糞研細末摻上三五次此方簡便而極效又方龜甲煅枯研末摻之即能生肌收口又多年瘡口不收流黃水者用冬瓜葉烘乾研末摻之又白槿花煅枯存性研末摻之雖碗大瘡口用之皆效又方熟石膏一兩黃丹五錢象皮用滑石炒焦三錢共研細末摻上即愈又惡瘡久不愈者用金銀花浸酒或用金銀花煎水當茶日日飲之久瘡必愈又方金銀花連根帶葉一把雄黃五錢水二碗用罐煎之紙封罐口六七層中穿一小孔將瘡向孔熱氣熏約三個時辰流出黃水後再上生肌散無不效驗瘡已愈後復起紅泡不結痂用陳臘肉油搽之又生半夏醋磨塗並治癬除根黃水瘡初如粟米癢而兼痛破流黃水浸淫成片隨處可生用青黛殭蠶輕粉蛤粉黃柏滑石浮水石寒水石熟石膏甘草白芷梢各一錢共研末麻油同豬膽汁調搽又方老菱殼燒灰用小磨麻油調搽火赤天疱瘡初起小如芡實大如棋子燎漿水疱色赤者為火赤瘡頂白根赤名天疱瘡俱能延及遍身焮熱疼痛破流毒水上身多生者屬風熱盛頻服解毒瀉心湯下身多生者屬濕熱盛頻服清脾除濕飲初起未破外搽如意金黃散已破流水外摻石珍散破爛自干多煎甘草湯洗淨瘡痂方好上藥各方俱見後主治及敷貼匯方黃水瘡並鬧瘡土硫黃一兩人言鐵鏽各五錢韭菜根蔥白各錢半共搗極爛塗碗內覆小磚灶上燒艾葉熏干麻油調和放藥手心內兩手搓極熱時時以鼻嗅之然後搽瘡極效又方真紅粉輕粉牙硝麻油調搽又方雄黃輕粉銀硃白礬牙硝松香密陀僧銅緑油頭髮用鐵盞盛桐油熬藥末傾地上槽孔中候冷結條磨搽極效如癢再加椒殼末手足瘭疽此疽常生手足肩背纍纍如赤豆刺之汁出用蕓薹菜葉煮汁服一碗並食干熟菜數頓少與鹽醬冬月用子研服腦漏鼻流臭膿破瓢白雞冠花白螺絲殼各燒存性等分血竭麝香各五分為末以好酒潤濕熟艾連葉揉成餅貼在頂門上以尉斗火尉之以愈為度異疽似癰惟有小異膿如小豆汁今日去明日滿用蕓薹即油菜薹搗爛布袋盛於熱灰中煨熱更換尉之即愈無葉時用乾者亦可天火熱瘡初起似痱音費漸如水泡似火燒瘡色赤急用蕓薹菜葉搗汁調大黃芒硝生鐵衣等分塗之黃水瘡紅棗燒灰二錢飛黃丹松香枯礬各一錢共研細末麻油調敷瘡爛成孔凡小兒或頭面遍身形似楊梅瘡者取蒸糯米甑上汽水滴下以盤盛取頻頻搽之數日即愈漆瘡發熱作癢芒硝泡湯搽之或白礬泡湯洗之或乾荷葉或川椒煎湯洗之俱極神效或螃蟹殼煎湯洗亦妙漆瘡腫腐以新鐵釘一斤浸水一宿搽之立愈又白果葉煎湯洗數次腫消全愈如已腐潰成瘡者生石膏一兩水粉一兩輕粉一錢共研細末韭菜搗取汁調搽凡遇有漆處先用燈油搽入鼻孔內或用七醋炒飯或用茶炒飯食之可免漆瘡又用真香油調樟搽之腫消痛止又漆毒成瘡作癢取打鐵店磨鐵槽中泥塗之極效凍瘡生薑不拘多少搗取汁入銅鍋內熬濃塗患處覺熱辣難當即愈又桐油熬熟調密陀僧敷之極效又冬瓜皮茄子蒂煎湯洗之又大蘿蔔一個挖空入桕油或蠟燭油於蘿蔔內放爐火上炙熟候冷取油搽患處或加白芨末搽之能治一切凍瘡破裂又鴿子糞煎水洗又凍裂方五倍子研末和牛骨髓填入裂縫內即愈又亂頭髮一大握桐油一碗入瓦器內熬候油沸頭髮溶化出火以瓦器收貯蓋好莫令灰塵入每用百沸湯泡洗凍瘡抹乾後即用油發膏敷之即愈汗斑生黃瓜蘸硼砂末搽之又方刺蒺藜一味研極細末過篩去刺用醋調搽以手指用力推擦黑斑隨手而愈連擦五六次即除根愈後戒食各種飛禽野鳥又方芋頭葉上露不拘多少將手蘸露在斑處重擦又方取溺壺垢和生薑汁抓破搽之又方密陀僧硫黃各一錢研末醋調以生薑一塊蘸搽之其斑立消雀斑汗斑硫黃密陀僧各等分研細末燒酒調搽奇效八寶丹一名珍珠散治瘡毒膿腐已盡用此摻上即能生肌長肉平口收功珠母即大蚌殼拾取露天大蚌殼左顧者半斤刮去背後黑衣放火上煅過研爐甘石三兩以黃連二錢煎汁煅淬爐甘石共研血竭三錢粉口兒茶一兩煅石膏三兩赤石脂三兩煅陳年吐絲渣一兩煅存性梅花冰片臨用時每藥末五錢加入冰片一分上藥共研勻極細研如香灰樣以不見星為妙瓷瓶收貯聽用外科多呼為珍珠西黃八寶丹最寶重之不肯傳人豫屢用之功效竟比珍珠散尤妙藥味雖微功效甚大幸勿輕視遍身生瘡及遍身麻木疼痛諸病遍身熱毒瘡或痛而不癢手足尤甚黏著衣被夜不得睡用菖蒲數斗研多鋪於席上使患者恣臥其間仍以衣被覆之數日其痛如失神效又遍身風癢生瘡用浮萍煎汁浸洗或茵陳煎水洗俱效又遍身生疥癩用生明礬雄黃川椒硫黃各等分為細末取雞蛋黃炒油調搽又遍身生白疹瘙癢不止用小枸橘不拘多少切作片麩皮炒黃研末每服二錢以酒浸多時去枸橘只飲酒另以枸橘煎湯洗患處又遍身癬疥疼痛用白殭蠶一兩二錢炒黃色研末分作四服用酒調服又方生礬朴硝為末井水調勻以雞翎掃敷又遍身風癢苦參一兩生甘草節一兩皮硝五錢煎水洗之又遍身發癢不止胡麻子威靈仙何首烏石菖蒲甘草節各一錢共研末酒沖服又遍身麻木當歸酒芍熟地川芎白朮荊芥防風各二錢水煎服又遍身筋骨疼痛如夾板狀痛不可忍者取騾子修下爪甲燒灰存性研末黃酒調服又遍身瘙癢用蒼耳子煎水洗之又身上無故一孔出血用豬精肉不用肥肉一片貼之即止治大麻瘋方麻瘋一症古名癘風亦曰大風乃天地惡濁敗癘之氣為極危極惡難治之病也患之者肉爛皮壞肢解節斷形容可憎自身有性命之憂妻孥有絶嗣之慘其症福建廣東最多初起或一處或數處痠麻漸次面目四肢浮腫皮肉瘙癢似有蟲行浸淫既久皮傷則毛髮脫落筋傷則手足拳曲骨傷則身萎不能起立皮死則麻木不仁肉死則刀割不痛血死則潰爛成膿筋死則肢節脫落骨死則鼻梁崩塌蟲入臟腑至心則喉舌喑啞眼紅色枯至肝則面發紫泡指甲脫落至脾則遍身癬癢口唇外翻至肺則大便燥結鼻塞不通天根倒塌臭氣難聞至腎則牙齒脫落足底先穿眼昏耳聾由上身先發者在氣分由下身先發者在血分或從上或從下漸漸而來者輕上下同時而發者得世之治此病率多用蘄蛇烏蛇花蛇等毒物以毒攻毒或用麻黃硝黃等大表大下峻劑以虛其本元在體壯者間或得效即詫為神奇而氣血怯弱者愈服愈甚性命去矣近獲一方極平極淡以殺蟲祛風為主雖極重極久危險之症服之屢見奇效不敢私祕付諸棗梨以公於世得此方者切勿視為泛常誠心服之自有奇驗且藥味不偏不峻可以多服價亦不昂貧者亦易購辦大楓子十二兩去殼取淨肉以豆腐乾二斤四兩同煮一時許去豆腐曬乾研末紙包壓淨油為度倘不壓淨油為丸服之作吐但症輕者只可用八兩再輕者只可用六兩豆腐照減北防風一兩荊芥穗一兩五錢刺蒺藜去刺三錢漂生白朮一兩川芎一兩川牛膝一兩當歸身一兩甘草五錢大胡麻三兩小胡麻三兩威靈仙二兩以上各藥切忌火烘以日曬乾共研細末用真草糯米水酒灑為丸如緑豆大每早晚用糯米水酒送下一錢重者服二錢酒須隨量盡飲當令微醉日日服之不可間斷病從上身發者再加白芷防風各一兩從下身發者再加白朮木瓜各一兩兩手甚者再加桂枝五錢兩足甚者再加牛膝五加皮各一兩忌一切發物謹戒房勞自服藥起即宜另室居處所有沐浴器具飯碗煙筒衣服廁缸不可與人共之恐藥祛毒蟲毒氣傳染他人倘初服此丸或有嘔吐此係藥勢行動切勿停止宜減少緩緩服之一旬半月即不嘔矣後仍照原每服一錢重者二錢服之後有雞魚蝦蟹牛羊野物等肉薑椒發物生冷水果概當禁口將愈之際戒色尤更緊要倘再發不救須刻骨謹記大楓子方驗案章日榮浙江人年二十餘歲腳根麻木腳底爛成一孔遍身斑點已年餘矣百治無效得此方服之兩月斑點全消半年腳底平復二年後麻木全愈劉理和廣東人年三十餘歲眉毛脫落腳根麻木腳底爛穿深寸許頭面腫大如斗潰爛流水醫禱三年絶無寸效得服此方自知嚴守禁忌三月後腫脹全消眉毛復生一年後腿底合口腳跟麻木亦愈此毒全發於外外症雖重其收功反易也孫文柏福建人年四十歲遍身麻木手足拳曲不伸頭面腫大如疙瘩以此方服之半年手足如常一年頭面全消三年後麻木全愈聞興仁江西人其家風水所出每代必有一二人患麻風者而興仁已手指不能屈伸遍身麻木將此方服之三月手指已伸半年後麻木亦愈其家數世患此莫不各費數百金醫治卒之無效惟興仁平日存心廣行方便遇有利於人者無不盡心竭力為之故能誠信久服此方得以保痊亦天之福佑善人也熊姓妻安徽人年二十四歲遍身麻木且多紫黑斑點服此方兩月斑點全消一年後麻木全愈麻瘋又方麻瘋全身腫脹鬚眉俱落兩腳臭爛不堪者蝦蟆一隻泥裹火內燒熟放瓷蓋碗內用滾黃酒沖泡將瓷蓋蓋半時只服酒取汗為度日服一次數日即愈又方癩蝦蟆一個米一升二樣共裝入一缸封好過七日開缸將蝦蟆放去將米餵雞雞吃米後其毛自脫將雞用竹刀宰殺洗淨煮熟儘量吃酒將雞吃下取大汗後將舊衣燒去更換新衣即好又麻瘋外治法蘄艾半斤明礬四兩楝樹皮白椿皮各半斤上煎湯常洗浴亦效木香餅尉法治一切氣滯結腫及風所傷作痛並效木香五錢生地一兩以木香為末生地杵膏如干以酒潤之和勻量患處大小作餅貼腫處以熱尉斗尉之或以錫壺盛滾水尉之香附餅尉法治瘰癧流注腫塊或風寒襲於經絡結腫作痛並效用香附為末酒和量瘡毒大小作餅敷患處以熱尉斗尉之未成者內消已成者自潰若風寒濕毒宜用薑汁和作餅神仙截法治癰疽發背一切惡瘡預服則毒不入內真麻油一斤銀器內熬十數沸候冷用酒兩碗入油五盞攪勻通口熱服一日用盡緩則數日服之吳安世云吾家三世用之無有不效又聞獵者云凡中藥箭急飲麻油藥毒即消屢用甚驗按上方凡大便祕結而毒蓄於內者最宜用之以疏通其毒若陰毒及大便不實乃非所宜制寒食麵灰面一斤再用半斤水調成稠趕成薄片兩塊將灰麵包合在內周圍捏緊勿漏縫於清明日蒸熟布條摟住懸掛當風處陰乾入缸收藏隨瘡大小研末或水或油蜜調敷治諸瘡神效洗藥神效方洗陰濕諸瘡蛇床子二兩朴硝一兩每用一兩水煎數沸洗瘡拭乾摻生肌藥雄黃解毒散治一切癰疽潰爛毒勢甚者先用此藥二三次以後用集香散或豬蹄湯雄黃一兩白礬四兩寒水石煅一兩五錢共為末用滾湯二三碗乘熱入藥末一兩洗患處以太乙膏或神異膏貼之集香散洗癰疽潰爛白芷藿香茅香香附防風各三錢木香甘草各一錢用水煎數沸去粗淋洗患處薛立齊曰此乃馨香之劑也氣血聞香則行聞臭則逆也凡瘡將盡未盡宜用之若有瘀肉宜先用雄黃解毒散解之後用此方洗之須即用膏藥貼護勿使風入肌肉易生直至收口為度最忌用生肌之藥乳香定痛散治瘡瘍潰爛疼痛不可忍諸藥不效者乳香沒藥各二錢寒水石煅滑石各四錢冰片一分為細末搽敷患處痛即止此方乳沒性溫佐以寒劑制之故寒熱之痛皆妙生肌散治瘡口不合木香輕粉各二錢黃丹枯礬各五錢共為細末用豬膽汁拌勻曬乾再研細摻患處立齊曰此乃解毒去腐搜膿之劑非竟自生肌藥也蓋毒盡則肉自生常見患者往往用龍骨血竭之類以求生肌殊不知餘毒未盡肌肉何以得生反增腐爛耳若此方誠有見也按以上二方合而用之不惟止痛且能生肌實有奇驗消疔散治疔毒並一切惡瘡腫痛細辛牙皂硼砂洋茶上片各等分為末初起者用泉水調敷未成可消已成毒不走散祕傳迎香散治諸般惡瘡潰爛臭不堪聞漢防已一兩通草一兩莊黃一兩共為末或煎水洗或水調敷或乾摻之神效碧玉錠一名碧玉膏治一切年久潰爛疼痛不斂者輕粉一兩杭粉一兩白蠟五錢乳香沒藥各一錢豬油四兩同白醋熬化頃入大碗內以余藥和勻冷定取起收貯用時挑一匙以油紙或絹帛攤開先用蔥湯洗淨對患貼之碧玉散治小兒天泡瘡滑石黃柏共為末以青澱調如泥用皂刺挑破泡水次敷藥神效或用布針挑破泡水以黃連蒸水雞翎掃之效烏金散去腐肉不傷新肉且不甚焮痛最為平善巴豆去殼新瓦上炒黑研爛聽用多寡看瘡勢酌量貼瘡頭上用萬應膏蓋之若有膿管以棉紙捻裹藥紝入頻換數條即化祛耳亦有頑硬之極非烏金散所能去者則用化腐紫霜膏搽之然終不若烏金散為至穩遠志膏凡一切癰疽腫毒初起之時隨用遠志肉二三兩去心清酒煮爛搗如泥敷患處用油紙隔布扎定越一宿其毒立消屢試屢驗其效如神銀花甘草湯治腫毒初起時皆可立消內服此藥外敷遠志膏一切惡毒無不消散但宜早服為妙倘瘡已成膿必須外潰無從消散金銀花二兩甘草二錢水煎清酒沖服若毒在下焦加牛膝二錢海浮散敷此腐肉自去新肉自生此外科回生保命之靈丹也明乳香真沒藥等分上二味安箬皮上火炙乾為極細末敷患處再貼膏藥此散毒淨則收口毒不盡則提膿外出其神妙難以言喻芙蓉膏腫勢漫延者周圍敷之只留瘡頂赤小豆四兩芙蓉葉四兩香附四兩菊花葉四兩白芨四兩為細末每末一兩加麝香一分米醋調塗住根腳雞子清調亦可其瘡頂貼烏金散上蓋萬應膏療牙止痛散牙硝三錢硼砂三錢明雄黃二錢冰片一分五釐麝香五釐共為末每用少許擦牙止痛神效消瘰丸治肝經鬱火頸生瘰癘元參蒸牡蠣煅醋淬研貝母去心蒸各四兩共為末煉蜜為丸每服三錢開水下日二服此方奇效治愈多人加味逍遙散治肝經鬱火頸生瘰癘並胸脅脹痛或作寒熱甚至肝木生風眩暈振搖或咬牙發痙諸症經云木鬱達之是已服前丸兼服此散更妙柴胡茯苓當歸白朮甘草白芍丹皮黑山梔各一錢薄荷五分水煎服神功托裡散一名金銀花散治癰疽發背腸癰乳癰及一切腫毒或焮痛憎寒壯熱金銀花黃耆上部酒炙透下部鹽水炙當歸各五錢甘草二錢酒水各半煎服分病上下食前後服之再服一劑渣敷患處不問老少虛實皆可服若為末酒調服尤妙景嶽清涼膏治一切瘡瘍潰後宜用之當歸二兩白芷白芨木鱉子黃柏白蘞乳香白膠香各五錢黃丹五兩麻油十二兩上用油煎前六味以槐柳枝順攪油熟丹收然後下乳香等二味收口摻藥李氏曰同遊有患背疽者大潰五臟僅隔膜耳自謂必死用鯽魚去腸實以羯羊糞烘燥為末乾摻之瘡口自收此出洪氏方屢用有效故附於此須俟膿少欲生肌肉時用之黑末子治癤毒用羊角連肉骨燒存性為末酒調三錢分上下服之瘡可散立齊曰此方未嘗用蓋祕方也嘗治面上或身卒得赤斑或癢或瘭毒皆可治或以羖羊角燒存性研為極細末以雞子清調塗之甚效本草亦云然藜蘆膏治一切瘡疽胬肉突出不問大小長短用藜蘆一味為末以生豬脂和研如膏塗患處周日易之治頭面黃水肥瘡方小兒頭面患瘡膿汁作癢痂厚者名曰黏瘡當用此方或只用礬丹二味亦可若作癢出水水到即潰者名曰黃水瘡當用後一方松香枯礬宮粉飛丹等分為末麻油調敷或為香烟垢更效於香爐蓋上刮取用之一方用緑豆松香等分為末麻油調敷極效或內服荊防敗毒散等藥又方用益元散加枯礬少許麻油調敷大黃揭毒散敷熱壅腫毒大黃一兩半白芨一兩朴硝二兩為末井水調搽干則潤之草烏揭毒散草烏貝母花粉南星芙蓉葉等分為分末醋調搽四圍中留頭出毒如干用油潤之治一切癰疽腫毒效神功散黃柏炒草烏炒各一兩為末漱口水調入香油少許搽患處干則以水潤之癰疽腫潰皆效治白虎丹發則頭面眼目四肢俱腫而惟額上指尖兩耳不腫及不見赤色者方是其症先將馬桶洗淨用沸湯傾入蓋少頃傾出盆內浴之數次即退再用車前草九里香馬蹄香枸杞苗即雁稜菜同搗爛和麻油遍身自上而下擦之又方生香附末冷茶調服三錢即愈又方擂緑豆水去渣飲二三碗妙大忌雞魚生冷炙爆日色火光燈煙湯氣慎之抑陽散一名洪寶丹治瘡瘍純陽腫痛發熱天花粉二兩薑黃白芷赤芍各一兩上為末茶湯調搽患處陰陽散治瘡屬半陰半陽紫荊皮五兩炒獨活去節炒三兩赤芍藥炒二兩白芷石菖蒲各一兩上為末蔥酒調搽此方一名沖和膏治一切瘡腫不甚焮熱積日不消用之效安神散凡惡瘡攻心心神不定者用地骨皮研末滾蜜水調服即安透骨丹此潰膿藥外科不可缺蟾酥硼砂輕粉巴豆各五錢蝸牛二個麝香一分先將巴豆研如泥入蝸牛麝香再研入各藥研極細以小瓷瓶收貯每用少許以乳汁化開先用針輕輕撥破毒頭挑藥米粒許納於瘡口外用清涼膏貼之癰疽無頭者蠶繭燒灰酒服一枚出一頭二枚出二頭面生癰疽其斑痕不易即退宜用鮮橄欖切斷蘸麝香少許頻頻擦之一二日即可無痕此良法也不然面上留疤其何以使人見之哉凡瘡已愈復起紅泡不結痂用陳醋肉油擦之立愈多年惡瘡百方不痊或焮痛不已者並搗爛馬齒莧敷上三兩遍痊癰疽發背未成者用活蟾蜍系瘡上半日蟾必昏憒置水中救其命再易一個三易則毒散矣勢重者剖蟾蜍合瘡上不久必臭不可聞如此三易其腫自愈火瘡方生大黃生黃柏生黃芩等分研細末先用冬月淡豬油熬桎木嫩枝候木枯去木勿用先將油搽患處搽油上藥內服藥方羌活防風白芷川芎荊芥薄荷紫蘇甘草如火毒甚再服生大黃川黃連黃柏黃芩梔仁各等分水煎服痂厚不脫用桐子葉為末豬油調搽痂自落一切惡瘡百藥不效者陳米飯緊作團火煅存性麻油膩粉調敷萬效仙方一名神功托裡散癰疽方無論已潰未潰皆治方宮保傳金銀花四兩生黃耆當歸身各二兩蒲公英元參各一兩白芷五錢酒煎儘量飲毒在頭加川芎五錢中部加杜仲五錢下部加川牛膝五錢在手加桂枝五錢止痛消腫方生半夏細辛為末醋調敷又生半夏為君生大黃二錢共末灰面薑汁燒酒調餅貼薑蔥膏治流痰疼痛不紅不腫皮肉冰冷生薑一斤取自然汁四兩蔥汁四兩共煎成膏入牛膠少許麝香一分攤布上貼癰腫結熱芭蕉根為末麻油調敷霜後者佳四妙湯即前神功托裡散後附隨症加味藥治一切瘡瘍腫痛微惡寒時內熱口中無味大便如常皆氣血內虛之故此方益氣和血解毒托裡之神方也潰後用之排膿去瘀生肌長肉逐餘毒通經絡尤驗黃耆五錢當歸八錢二分金銀花五錢甘草一錢八分上銼一大劑酒水各半煎服寒熱脈浮加防風柴胡腫瘍痛甚加乳香沒藥腫處堅塊白色加半夏南星土貝母泄瀉加蒼白朮嘔噁心加陳皮半夏蒼朮惡寒加桂皮若膿成不潰加防風穿山甲潰後膿少膿多不斂加牛皮膠五錢飲食不思不化加陳皮白朮虛甚加人參肉赤口渴脈數加人參麥冬五味熱甚加黃連山梔肉白肉紫手足冷脈微細無力或嘔加人參白朮陳皮肉桂炮姜寒甚加熟附子外科洗滌匯方蔥歸溻腫湯治癰疽諸瘡初腫將潰之時日洗數次以瘡內熱癢為度當歸獨活白芷甘草各五錢蔥頭十個封缸口水煎湯軟棉溻洗豬蹄湯癰疽諸毒已潰流膿洗此助血氣消腫散風脫腐止痛若腐肉已盡勿用只用米泔溫洗令瘡潔淨然亦不可過洗恐皮膚揩破難斂條芩甘草節當歸尾赤芍白芷羌活露蜂房各三錢蔥頭五個研為粗末豬前蹄二隻煮軟濾汁吹去油花投藥末封口煎數十沸布濾去渣待溫時傾放盆中軟絹帛蘸洗輕揉孔內溻出敗膿再折軟帛數重蘸湯覆於瘡上輕按片時冷則再蘸熱湯覆按三五次方用軟帛拭乾上貼膏藥又方用防風白芷甘草赤芍川芎當歸尾各一錢雄豬蹄一節連須蔥白五根水煎以絹片蘸洗其深曲處用羊毛筆洗之新方癰疽腐盡洗此長肉生肌當歸白芷獨活生甘草蔥頭等分切碎煎湯軟帛蘸洗輕輕溻盡膿水拭乾上撒生肌藥外貼膏蛇床湯洗腎囊風麻癢熱痛蛇床子威靈仙歸尾大黃苦參地膚子砂仁殼各二錢蔥頭七個煎湯熏洗二次日用一劑溻癢湯治陰戶起疙瘩內生小蟲陰中癢甚蛇床子威靈仙歸尾苦參狼毒各五錢鶴蝨草一兩水十碗煎至五碗去渣貯盆內乘熱熏蒸稍溫時又下豬膽汁一枚和勻用棉蘸洗陰內後用銀杏散蔥朴湯洗一切痔漏及風熱脫肛連須蔥頭七個搗如泥朴硝二兩水煎濃湯乘熱先熏後洗日數次漏蘆湯洗腳氣瘡焮腫痛癢破流黃水漏蘆白蘞甘草節五加皮槐根皮各一兩蒺藜三兩切碎水煎濃湯先熏後洗冷則燙熱再熏洗洗諸瘡毒方防風黃連黃柏大黃銀花土茯苓甘草節各三錢煎水盡洗外科敷貼匯方如意金黃散治癰疽發背疔毒諸瘡大頭瘟腫跌僕損傷濕痰流毒火丹漆瘡風熱天泡乾溼腳氣婦女乳癰小兒丹毒一切肌膚腫赤頑惡熱瘡大黃黃柏白芷薑黃各一兩南星蒼朮厚朴陳皮甘草各四錢天花粉二兩共切碎研極細末收貯謹封隨症加引調敷凡紅腫焮痛發熱未成膿及夏月火令俱用茶湯兌蜜調攪如膏敷之漫腫無頭皮色不變濕痰流毒附骨疽鶴膝風俱用酒煎蔥汁調敷天泡火丹赤遊黃水漆瘡疔毒惡血壅腫俱搗藍根葉汁加蜜調敷如風熱諸毒皮膚亢熱遊走不定色赤而亮俱用蜜水調豬油調更妙如焮腫欲作膿搗蔥汁和蜜調敷湯潑火燒皮膚潰爛麻油調敷真君妙貼散治癰疽諸毒頑硬惡瘡漫不作膿敷此不痛者即痛痛者即止並治皮破血流濕爛痛苦天泡火丹肺風粉刺白灰面蕎麥粉各五兩淨硫黃十兩共研極細井水拌濕要乾燥得宜趕成薄片捲起略曬外用薄皮紙包裹掛風中陰乾臨用量瘡大小研末水調成膏敷貼如皮破血流濕爛粉刺用麻油調天泡火丹用靛汁調二青散治陽毒諸瘡紅腫痛癢臖熱未成者立消水龍骨白蘚皮黃柏青黛白芷白芨白蘞白薇朴硝各三錢花粉大黃芙蓉花葉各一兩研極細醋調敷已成者留頂未成者遍塗五龍膏治癰疽陰陽等毒腫痛未潰時敷此追膿拔毒五龍草即烏蘞莓欲名五爪龍江浙多産之生銀花豨蘞草車前根葉四味俱用鮮草等分搗如泥再拌陳小粉一兩鹽五分再搗成膏遍貼腫處中留一孔外用棉紙蓋定以避風寒此方內五龍草或缺少不便倍豨蘞草亦效蝌蚪拔毒散治無名腫毒火毒瘟腫寒水石皮硝大黃各二兩共研極細初夏預取蝌蚪瓦缸收貯封口埋土中三尺至秋化水每用一碗和藥成團陰乾再研細每用水調敷貼腫處或蜜調敷二味拔毒散治風濕熱毒紅腫痛癢疥痱瘡癤初起明雄黃一兩白礬八錢共研極細茶清調塗頻蘸潤濕或豬油或蜜調敷不燥裂白礬生用解毒煅用生肌回陽玉龍膏治癰疽陰瘡不熱不痛不腫不膿及寒痰流注冷痛痹風寒濕腳氣手足頑麻筋骨悶痛鶴膝風等症凡漫腫無頭皮色不變但無肌熱赤痛者皆可敷貼良薑草烏赤芍切片炒黃各二兩南星煨白芷嫩桂枝各一兩共研極細熱酒調成膏敷貼患處上用熱酒浸棉紙蓋定坐臥要向暖處忌犯風寒沖和膏治癰疽諸發陰陽不和冷熱相凝敷此行氣疏風活血定痛散瘀消腫祛寒軟堅紫荊皮五兩獨活三兩赤芍二兩共切片炒黃白芷石膏菖蒲各三兩共研極細酒煎蔥汁調膏敷貼頻頻蘸熱酒潤之鐵桶膏治發背將潰已潰時根腳走散不收用此箍之膽礬白礬各三錢銅緑白芨各五錢炒倍子一兩輕粉鬱金各二錢麝香三分共研極細末醋一碗銅杓內慢火熬至一杯候起金色泡稍溫調藥數錢筆蘸塗瘡根腳上蓋棉紙塗束數次毒不散大烏龍膏治諸瘡毒焮腫赤暈不消木鱉肉半夏各一兩草烏三錢陳小粉二兩四味同炒焦黃研細篩末水調成膏自外向內塗之須留瘡頂千槌膏瘡瘍疔毒初起貼之即消貼瘰癧連根拔出及男女臁瘡小兒蟺䶎頭木鱉肉五枚巴豆肉五粒萆麻仁七錢去皮杏仁乳香沒藥各二錢銅緑一錢淨松香四兩共入石臼內槌數千下俟成膏時取浸水中隨瘡大小捻作薄片敷貼瘡上用絹蓋之清涼消毒散治面發諸毒紅硬熱痛白芨乳香花粉雄黃烏藥川柏山慈菰各二錢研細兌麝香三分蜜水調敷碧玉散治下頦粟瘡及浸淫黃水瘡棗肉燒灰存性五錢黃柏研末五錢共研篩勻麻油調搽辰砂定痛散治鼻竅腫痛生瘡胡連二錢熟石膏一錢辰砂三分冰片二釐共研極細紙捻蘸點患處鼻外潰痛用此撒之穿粉散治旋耳月蝕輕粉隔紙微炒穿山甲酒炙水粉黃丹等分研細干則麻油調搽濕則撒之小薊散治牙衄出血小薊草百草霜炒蒲黃醋煮香附等分研細末頻頻搽牙良久以溫茶漱去搽愈為度胡桐淚散治牙齦腐爛流白膿胡桐淚白芷川芎細辛各錢半寒水石焦地黃各二錢青鹽一分共研末頻搽牙根良久鹽湯漱去再搽再漱牢齒散治牙齦動搖兼疼痛者酒浸膽草一兩半羌活地骨皮各一兩升麻四錢曬研極細日搽三次良久溫水漱去牙疳散治牙疳蟲牙痛焙人中白煅皂礬五倍子檳榔片各二錢冰片五釐共研細末甘草湯先漱口頻頻搽之一笑丸治蟲牙諸牙痛川椒七粒巴豆肉一粒共研極細搗飯糊作一丸薄棉包裹咬在痛齒上下靜坐勿動俟吐出惡涎良久取下用茶湯漱口三次自愈一字散治小兒重齦腫如水泡用針刺破棉蘸鹽湯拭淨搽此硃砂硼砂各五分朴硝一分冰片五釐共研極細每搽一字必勝散治舌上生孔衄血或腐螺青一錢另研細生蒲黃一錢半合共研勻頻頻塗搽後以鹽湯漱口碧雪散治重舌木舌先用銀針從旁刺破出血茶水漱淨搽此蒲黃青黛硼砂朴硝甘草等分研末或吹或搽治小舌掉下加硃砂涼心散治舌下近根處腫痛者焙人中白乳炒黃連川柏硼砂青黛各一錢朴硝五分冰片一分共研極細頻頻吹搽皂礬散治翣舌脹大腫硬氣息不通皂礬一兩瓦上焙紅刮取研細時時塗搽自消中毒舌脹出口雞冠血趁熱頻塗白礬末塗亦效集成方治舌斷亦可復生活螃蟹炭火煅焦研極細末頻塗斷處小舌掉下腫痛色赤用