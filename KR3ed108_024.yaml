頻搽之鐵粉散治足跟冷疔潰爛針砂三錢黃丹輕粉松香各一錢麝香一分共研極細蔥湯先洗淨麻油調成膏塗之上貼油紙軟帛縛住龍骨散治腳氣瘡焮腫痛癢破流黃水龍骨煅輕粉各二錢五分檳榔切片錢半干豶豬糞燒灰存性淨末五錢共研極細先以鹽湯洗淨患處拭乾麻油調藥頻搽自效立馬回疔丹治陽毒生疔乾蟾酥白丁香硇砂輕粉各一錢乳香六分雄黃硃砂麝香各三分炙焦蜈蚣一條金頂砒五分詳丹藥門共研細煮麵糊丸麥子大先用銀針當頂刺破出血拭乾將丹插入孔內疔自枯爛割疔法提疔膏祕傳方詳後河束疔金箍散治疔瘡什刺之後八毒走散作腫鬱金白芨白蘞白芷大黃各五錢緑豆粉黃柏各三錢輕粉五分共研末生蜜調膏厚塗疔腫周圍箍束餘毒頂插前丹或填拔疔散拔疔法治羊毛疔初起明雄黃研末三錢青布包扎蘸熱燒酒先擦前心自外圈入內揉擦片時其疔毛即奔至後心旋蘸熱酒再向後心如法盡搽其羊毛俱拔出黏在布上連包埋之忌茶一日類聚祛風散治大麻瘋總方寒水石硫黃枯礬貫衆各四兩蛇床子二兩朴硝一兩共研極細豬油調成膏先煎芥穗苦參細辛地骨皮濃湯熏洗拭乾日塗搽三次繡球丸治乾疥燥癢川椒輕粉樟腦雄黃枯礬水銀各二錢同研至水銀不見星大楓子淨肉另搗如泥拌勻藥末加柏子仁油一兩如無或豬油麻油糊藥以兩掌合搓如圓眼大先以鼻吸其氣入腹次捻碎遍搽患處數次自愈臭靈丹治濕疥腫痛硫黃桃肉豬板油各一兩水銀一錢共搗成膏頻塗患處經效方治五種疥瘡蛇床子五倍子蒼朮檳榔花椒各三錢樟腦雄黃枯礬硫黃各錢半先研極細大楓子肉杏仁各五錢水浸透盡搗如泥豬膽汁一合豬油一兩煎溶和諸藥共搗成團縫布袋裝藥扎口烘熱頻搽患處或放被內蒸溶擦之一掃光諸瘡風濕癢痛癬疥痧痱苦參川柏各一兩大楓子肉木鱉肉蛇床子吊揚塵枯礬雄黃川椒硫黃樟腦輕粉各二錢共研極細豬油調膏烘熱塗搽或布包扎緊通身擦之必效散治類癬不愈川槿皮四兩大黃海桐皮各二兩百藥煎一兩半巴豆肉一錢半雄黃輕粉各四錢斑蝥一隻共研極細先將癬抓破溫水調藥頻頻搽之干則再搽勿入口中搽癬方羊跟根八錢枯礬二錢共研極細醋調成糊頻頻搽入或搽生鹽消風玉容散治桃花癬春月始發者緑豆粉三兩白菊花白附子白芷梢各一兩炒鹽五錢冰片五分共研細水調搽之良久洗去再搽石珍散治天疱火丹一切濕熱潰爛熟石膏輕粉各二兩用柏片青黛各五錢共研極細甘草湯洗淨拭乾頻頻搽之如聖膏治穀道風疳如癬作癢破流黃水歸尾三錢巴豆肉錢半麻油四兩浸藥文火炸枯去渣下黃蠟兩半化盡布濾入碗中又投輕粉細末二錢盡攪成膏頻頻搽之三白散治漆瘡焮痛斑爛流水水粉一兩熟石膏輕粉各五錢共研極細搗韭菜汁或蘿蔔汁或油調搽搗馬齒莧成膏敷之亦效金蟾散治諸瘡已潰誤沾馬汗皂汁糞穢毒水或竹木撣刺焮腫大痛大幹蝦蟆一個胡椒十五粒皂角子七粒砂缸裝定瓦片蓋口炭火煅至煙盡成灰存性取出研極細溫水洗淨瘡口拭乾撒藥入內上貼太乙膏良久毒水流盡有刺亦出姜礬散治諸瘡發癢枯礬乾薑等分研末以鹽茶洗淨頻撒之化蟲散治潰久郁化生蛆焙燥海參研極細頻頻撒之或撒皂礬末治痘爛生蛆先用溫茶洗淨寒水石研極細頻頻撒之清涼膏治湯火傷凡赤腫無皮搽之解毒止痛角子石灰水化開數升水浸攪渾沒水半寸許露一宿水面必起云片輕輕帶水掠取每一鍾兌麻油一鍾雙筯順攪成膏雞翎蘸掃患處拈痛膏治杖跌打後腫痛焮紫已破未破者皆貼此膏上蓋紙包好日一換取如意金黃散一兩加樟腦末三錢用前清涼膏調敷追風散治瘋犬微咬初時用熱尿淋洗擠出惡血隨敷此散追風拔毒北細辛川烏草烏防風白芷川芎薄荷蒼朮各一錢南星雄黃各五分共研極細熱酒調敷蓋紙扎定日換二次朴硝散治小兒臍瘡煅牡蠣大黃各三錢朴硝一錢共研極細用活螺螄五個洗淨以清水一碗養一夜將螺放出取水調敷數次立消散治小兒陰腫赤小豆枳殼赤芍商陸朴硝等分勿見火曬燥研極細柏葉煎湯日常調服蟠龍散治小兒脫肛乾地蟠龍一兩帶土焙燥朴硝二錢共研極細水調雞翎蘸搽數次肛腫乾燥用蔥湯洗淨麻油調塗蚯蚓一名地龍味鹹性寒無毒白頸者良取用須鹽水洗淨又方烏龜頭或鱉頭燒灰存性麻油調搽又方吊揚塵和干鼠糞燒煙放桶中坐上熏之救苦散治痘風瘡爛陀僧滑石各二兩白芷五錢共研極細濕則撒之干則蜜水調搽烏雲膏治風濕潰瘡善甚浸淫者松香末二兩硫黃末二兩麻油拌溫攤放青布條上卷作筒子以線縫定再浸油中取起刮去余油鐵鉗夾住點燃一頭下用碗接其膏液須陸續剪去布灰冷水浸膏聽用太乙瘰癧膏斑蝥五錢去頭足黑牽牛一錢五分昆布三錢去淨耖土炒海藻二錢去淨砂土炒皂角二錢乳香二錢輕粉一錢沒藥二錢樟腦一錢黃丹一兩飛淨後入諸藥研極細末用青油一斤先將諸藥入熬待滾用柳枝不住攪然後將蔥白七個先以一個放下待焦然後次第照放以盡為度再和入黃丹收膏取出放冷水內浸一日使其火毒拔盡然後隨後攤貼此治瘰癧第一良方也外科要訣凡治初起之毒順手醫去便易見效如毒患已久及被人醫得反復者必須究其初起何因及一向所服何藥且何藥見效何藥不見效仔細問明看清陰陽兼診脈之虛實方好用藥凡治毒必須按經加引經藥方能奏效正氣盛者消毒為主正氣虛者扶正為主消毒佐之上身之毒當歸川芎常用腳下之毒用當歸不用川芎足下之毒十有八九初起以濕熱論久後以氣虛論發背不宜用白朮上身之毒總不宜用白朮恐燥腎閉氣排膿作痛臍以下可用並可重用委中毒不可用黃耆用則足不能伸傷寒時毒不可用耆術開口之毒不宜用皂刺恐其翻口陽毒初起通用加減消毒散冬天有外感加前胡防風蘇葉夏天有暑氣加香茹扁豆陰毒初起血虛者通用陽和湯此方不必加減惟初起略加銀花甘草或貧士無力買好玉桂換用當歸二錢亦可氣虛者通用加味四妙湯通經絡用山甲清熱解毒用元參赤芍銀花甘草消陽毒堅腫用蒲公英此乃陽明經主藥陽明之毒有堅腫者可以重用消陰毒堅腫用續斷散寒濕用防風前胡頭腦上引經蘢用藁本手上用桂枝胸前口上用桔梗腰上用杜仲腳上用牛膝耳內用菖蒲耳後用柴胡夏枯鼻孔用辛夷桔梗顴骨用公英唇口用山梔白果頸背側膀胱經用羌活乳房用公英有兒吃乳者宜加漏蘆以通乳竅或山甲亦可腰眼用獨活濕熱毒不宜用丹腳上初起忌用輕粉並升丹火毒不宜用丹對口忌用丹下疳初起忌用丹顴口疽忌用丹龜蛇初開口不宜用丹魚口是空處不宜用降腦項上不宜用追毒散腹上不宜用降恐其傷膜腳上濕熱毒不宜用膏藥貼用則熱氣閉寒從內橫走四邊起吻久後則可用乳房不宜用針恐其傷絡毒氣未清不宜用生肌散面上不宜用生肌散耳後不可上藥線發背陽毒易治陰毒居多初起連服陽和湯數貼自可消散即或不消亦易潰膿而收功也萬不可服真人活命飲此方多剝削脾胃凡患陰背發者多由腎氣虧損蓋先天既壞復用連翹花粉剝削脾腎安得不死凡毒肉滿毒盡久不收口而色白者多是肌肉寒冷用薑炭玉桂末摻之方能收口凡毒鮮紅者多痛凡毒不可單用水洗必須煎藥恐其傷濕凡服大黃小便必紅而濁須向病定說清恐其驚惶麻黃荊芥祛風散熱大頭瘟症可用此煎水沖人中黃大頭瘟要藥氣閉作痛者用追毒散膿閉作痛者用冰翠散上牙屬腎下牙屬大腸牙肉亦然交牙亦屬胃上齶屬脾舌下屬心瘡口久後變黑無膿乃氣血大敗之候不治陰毒誤事多因妄用降丹點頭蓋陰毒初起宜溫經通絡以圖內消日久宜用補劑托裡使其轉陽潰膿不可妄行點降開刀氣薄者不宜重用銀花恐其傷氣發汗凡遇毒頭在上者未出之時先用降丹點於垂正處向下順出方不至成倒胎膿難盡出服涼藥而厄逆者脾胃敗也服暖藥而厄逆者火毒攻也暖藥中用荊芥必須炒黑取其和腠理之血凡患毒最忌熱食火酒犯之則紅腫焮痛銀花不可洗毒洗則變爛腿牙頭患毒徹骨痛者以腎經為主天柱痛者以肝經為主漫腫者以脾經為主又有咬骨疽生魚口下些此症疼痛徹骨凡欲追散毒氣不論陰陽服藥內必須加山甲皂刺解降丹毒用蚱行同冰片搗爛敷並能解諸火毒蔥搗蜜乃相反之藥頭頸上不宜用別處寒毒可敷肺癰服白芨須曬乾研末候藥水略溫再放下攪勻即服不可久停恐黏成膏無論各處瘡毒有黃膿痂者皆是有癢之症或用消毒散刷凡毒無論已潰未潰忽咬牙寒戰系氣虛不能勝毒毒陷攻裡之兆或潰後膿水忽多忽少瘡口如蟹吐沫者系內膜已透俱為逆症初起瘡口變黑者或上壞升丹或遇用黃丹常有此弊瘡口如豬肝色者多是過用黃丹所致出桐油水者氣血大虛宜參歸鹿茸湯補之瘡口深而有腫硬流桐油水者必有管久毒口細而深無腫硬流桐油水者必是漏浮皮爛流桐油水者是濕氣堅腫出南瓜水結成珠者亦是濕氣久毒瘡頭流血乃肝氣將敗之候宜重劑補藥加五味子收之陽毒通用涼藥則變為半陰半陽但比純陰毒更易轉身培補正氣即轉為陽天庭中心雖屬督脈但此處又是離宮用藥必須帶住心經人中患毒以陽明為主鼻梁內外以肺為主玉莖屬肝馬口屬小腸囊屬肝子屬腎子之系屬肝凡毒生空處最易生管成漏凡寒症先酸息而後經腫濕熱毒紅腫堅緊按之有納純濕者皮色不變氣虛者不紅紫不作緊按之有納初中益氣湯主之腿上患毒貧苦者多是風濕富者多有肝腎虛但風濕之症多有寒熱作體三陰經患毒雖是陽症仍宜調理血分口內有白色用硼砂末搽之口內腐爛亦見白色宜用柳花散搽之冬天亦有暑毒暈紅作燒如暑天一樣不會作寒口內生疔仍有癢有頭起得暴治法先針疔頭用降丹點之俟膿頭拑用柳花散收功凡毒麻木有濕痹血痹氣虛之分重墜有納者是氣虛手足初起者多濕痹血熱者多作痛血虛者下午更甚亦有納傷寒狐惑嘴唇腐爛不論蟲之食臟食肛小兒總以瀉積熱為主如胡連臭夷谷蟲蘆薈等藥皆可酌用用太極黑銅膏須避燈火敷之更驗凡手足叉龜濕熱毒雖膿腐盡時不宜用生肌散恐其復腫而痛光膏貼之可也凡陽毒初潰堅硬有腐者宜用化管丸提之以結其毒聽其自脫後用烏雲散蓋膏徐即收功肛門患毒服藥內須入枳殼方效凡毒坐久而痛血不行也行而痛者氣血虛也下午痛者血虛也潰後仍痛者氣血虧也初起痛者凡寒濕熱客於肉裡而作膿也凡毒癢有濕癢有風癢有虛癢血行亦作癢凡毒內作寒者乃陰寒之毒補藥內須加鹿茸玉桂身上作寒兼有頭痛者乃外感風寒之候宜疏表之空處及多筋骨處降丹宜少用腹上不可輕用降丹凡刺毒須要膿透時方可刺開刀太早則泄氣反痛毒有臭氣須用洗藥陽毒多有臭氣陰毒有臭氣必流血乃氣血大敗多不治陽毒有臭而生蛆者須用生豬油搗寒水石末貼之或用清油調杏仁末刷亦可凡毒起蘿圈塍有上壞丹藥而起者多紫黑作緊乃閉住瘀血故也宜用線針刺去紫血再按症用藥有過服補澀藥而起者內外清解即可平復若起淺白塍者無妨瘡口出血不止有肝敗而流血者有氣血虧而流血者俱宜用重劑歸脾湯治之有未熟誤針而出血者宜用托裡散治之瘡口無膿有氣血虛而無膿者有風濕痹而無膿者有誤服白朮閉住毒氣而無膿者四邊必堅硬宜用清熱瀉火通竅之藥治之瘡口紫黑有上壞醜丹而然者須換好丹蓋膏自轉紅活有上多黃丹而然者換藥刷之自轉有氣血大虛而然者多難治治之則宜大補凡瘡毒有腐肉須用冰翠散重者宜用降丹點之久後結成腐骨者宜用託管丸治之凡毒胬肉多因開刀太早傷其好肉所致亦有毒將愈時未避風水新肉強出只須用膏蓋護可以平復凡久毒成漏宜內服大補氣血之藥外用川烏洗淨蒸乾切片二分厚用口涎潤濕貼毒口上用艾圓灸之令毒口溫暖稍稍覺痛即住手勿灸須用八寶丹蓋膏灸法須用五七日為止久毒成管先用化管丸納入蓋膏六七日方可拑去換用拔毒散以消餘毒內服托裡散治之如五六日後腫未消則管未離岩再照法用化管丸一次斷無不起如無化管丸或用降丹線插入蓋膏但不如化管丸能入彎曲之處凡刺毒須認有膿無膿皮色皺黃用手按之手起而即復者有膿手起而不復者無膿重按乃痛膿之深也輕按即痛膿之淺也至於用刀手法刀口勿嫌闊大深則深開淺則淺開如開魚口便毒背癰臍癰腹癰宜淺開之若遇肉厚處宜深開之凡毒用藥當分初中末之異初宜散熱解毒通經為主以圖消散中宜排托為主以圖逐毒成膿末宜溫補為主以圖易於收功此大法也若純陰之毒始終概宜溫補調理一切清涼寒凝之藥不可輕投並不可外敷寒涼末藥冰寒氣血不能消散外科脈候浮數之脈應發熱其不發熱而反惡寒者若有痛處癰疽之證也洪大之脈其主血實積熱瘡腫凡洪大者癰疽之病進也膿未成者宜下之膿潰之後脈見洪大則難治若兼自利尤為凶矣數脈主熱浮而數者為表熱沉而數者為裡熱諸緊數之脈應發熱而反惡寒者癰疽也仲景曰數脈不時見則生惡瘡也又曰肺脈數者生瘡也凡諸瘡脈至洪數其內必有膿也實脈主邪盛邪氣盛則實也瘡疽得此可下之若久病虛人則最忌之以正不勝邪也滑脈多陽或為熱或為虛瘡疽得此膿未成者可內消膿已潰者宜托裡所謂始為熱終為虛也散脈為血虛有表無里也凡瘡毒膿潰之後脈見洪滑粗散而煩痛不除者難治以其正氣虛邪氣實也又曰肢體沉得肺脈大則斃謂其浮散而無根也長脈主陽氣充實傷寒得之將欲汗解也長而緩者胃脈也百病得之皆愈故曰長則氣治也芤脈主陰虛血虛膿潰後得之為宜以脈病相應也弦脈主肝邪瘡疽論曰弦洪相搏內寒外熱欲發瘡疽也腎脈主切痛積癖凡瘡疽得此則氣血留滯邪結不散多為痛也短脈主虛經曰短則氣病以其乏胃氣也瘡瘍脈短真氣虛也諸病見之皆為難治尤不可攻也澀脈主血虛氣澀瘡瘍潰後得之無妨沉脈為陰瘡瘍得之邪氣深也遲脈主陽氣不足瘡瘍得之潰後自愈緩脈無邪長而緩者百病皆宜瘡瘍得此則易愈以其有胃氣也弱脈主氣血俱虛形精不足大抵瘡家之脈凡沉遲濡弱者皆宜托裡微脈主虛真氣復則生邪氣勝則死瘡瘍潰後微而和者將愈也細脈主陽衰瘡腫脈細而沉者裡虛而欲變證也虛脈空而無力脈虛則血虛血虛生寒陽氣不足也瘡瘍得之只宜托裡補血養氣也軟脈少神元氣弱也凡瘡瘍之脈但見虛遲軟弱者悉宜補虛排膿托裡牢脈堅強陰之虧也凡瘰癧結核之類診得牢脈者皆不可內消也結促之脈凡陰衰則促陽衰則結大抵結促之脈由氣血俱虛而斷續者居多瘡瘍得之多宜托裡然有素稟結促者又當以有力無力辨其虛實實者可下虛者不可不補上癰疽脈二十二種大都微弱虛細遲緩知澀者必氣血皆虛形精不足俱當用補用托不可妄攻無待言也即如浮滑弦洪結促等脈此中最有疑似亦不得以全實論治必須詳審形症或攻或補庶無誤也齊氏曰瘡瘍之證若不論候何以知陰陽勇怯血氣聚散又曰脈洪大而數者實也細微而數者虛也河間曰脈沉實者其邪在臟浮大者其邪在表立齊曰癰疽未潰而脈先弱者何以收斂部分毒見於背見於腦中屬督脈旁屬足太陽經見於鬢屬手足少陽經見於眉屬手足太少陽經見於頤見於髭屬手足陽明經見於腮頷屬手陽明經見於顴屬手太陽經見於穿襠屬督沖任三經見於腿外跗屬足三陽內跗屬足三陰見於臂從手背赤肉屬手三陽從手心白肉屬手三陰見於乳內屬陽明外屬少陽頭屬厥陰逐部推求治療自驗諸經惟少陽厥陰之瘍理宜預防以其氣多血少也其血本少肌肉難長少陽更有相火遞用驅毒之劑禍不旋踵訣曰多血多氣君須記手經大腸足經胃多氣少血有六經三焦膽腎心脾肺多血少氣心包絡膀胱小腸肝無異記此則知氣血多少之異矣五指經脈所屬大指屬肺食指屬大腸中指屬心包無名指屬三焦小指內側屬心外側屬小腸各部引經用藥引經報使手太陰肺桔梗升麻白芷蔥白手陽明大腸葛根白芷升麻石膏足陽明胃白芷升麻葛根石膏足太陰脾升麻蒼朮葛根酒芍手少陰心黃連細辛手太陽小腸藁本羌活黃柏足太陽膀胱麻黃黃柏行下羌活行上足少陰腎獨活肉桂知母細辛手厥陰心包絡柴胡丹皮手少陽三焦上柴胡中連翹下青皮地骨皮足少陽膽上川芎柴胡下青皮足厥陰肝上柴胡川芎下青皮太陽倍羌活防風陽明倍白芷升麻少陽倍柴胡太陰加芍藥升麻少陰只宜獨活厥陰加青皮柴胡皆佐以肉桂庶藥力直達患處各部引經頭部加藁本項部加白芷胸部加桔梗腰部加杜仲脅部加白芥子手部加桂枝手指加桂枝尖下部加桂心足部加牛膝俱各一錢為引經藥外科主治匯方神授衛生湯治癰疽發背對口疔瘡一切丹瘤惡毒焮腫赤痛脈浮而數者服之宣熱散瘀行瘀活血消腫解毒疏通臟腑乃表裡兼治之劑也羌活銀花天花粉歸尾皂刺甘草節各一錢石決明煅穿山甲炙沉香乳香紅花白芷連翹防風各六分大黃酒拌炒二錢如氣虛便利不用大黃病在上部先飲酒一杯後服藥在下部先服藥後飲酒一杯以行藥力余俱仿此一方有荊芥牛蒡貝母無石決明羌活沉香山甲皂刺名衛生湯內疏黃連湯治癰疽陽毒在裡初起發熱便祕唇焦舌乾煩渴嘔噦脈沉數有力者用此下之黃連梔子連翹薄荷條芩白芍當歸桔梗檳榔各一錢木香甘草各五分大黃二錢煎服時加白蜜一二匙大黃檳榔非脈沉實者不可妄用若脈浮數澀者主氣血皆虛尤不可用雙解復生散治癰疽發背諸般腫毒初起惡寒發熱四肢拘急內熱煩渴便祕用此發表攻裡芥穗防風白芷川芎麻黃梔仁黃耆甘草各六分連翹銀花羌活薄荷當歸白芍焦朮人參滑石末各一錢大黃芒硝各二錢表重薑蔥引里重白蜜引服取汗下內消散治癰疽發背對口疔瘡乳癰無名腫毒一切惡瘡能令癰腫內消使毒內化從小便而出尿色赤汙勢大者雖不全消亦可轉重為輕知母貝母花粉乳香半夏制白芨皂刺穿山甲炙銀花各一錢酒兌煎服留藥渣搗爛加秋芙蓉花葉一兩為細末加白蜜五匙同渣搗勻調敷瘡上一宿即消重者再服再敷清熱消風散治諸瘡已成未成之際無表無里故外不惡寒內不便祕惟紅腫焮痛高硬有頭者服此清解之皂刺防風陳皮連翹柴胡生黃耆蒼朮炒各一錢花粉川芎白芍甘草當歸金銀花紅花各五分水煎服若婦人加香附子用童便炒竹葉黃耆湯治癰疽疔毒諸瘡表裡夾熱口大渴者人參生耆條芩甘草當歸川芎法半夏麥冬白芍竹葉各一錢生地石膏煅各二錢薑燈心引乳香黃耆散治諸腫毒疼痛難忍者氣虛不能勝毒也服此未成即消已成即潰不用刀針惡肉自脫並治跌撲損傷人參生黃耆當歸白芍炒川芎熟地甘草陳皮粟殼蜜炙各一錢乳香沒藥各五分水煎服回陽三建湯治癰疽諸發初起不紅不熱不腫不疼堅如頑石硬若牛皮色似土朱粟頂多孔孔或流血根腳平散軟陷無膿皮肉不腐身涼脈細用此溫散之人參附子當歸川芎黃耆枸杞棗皮茯苓陳皮各一錢紅花紫草厚朴甘草獨活蒼朮木香各五分煨姜三片皂角樹根白皮二錢酒兌煎服用厚棉覆蓋瘡上常令溫暖宜灸不宜針雙解貴金丸治背疽諸毒初起堅硬木悶便祕脈沉實大黃兩半白芷一兩共研極細末水丸緑豆大每用三四錢酒煎蔥頭三個取湯送下蓋被靜臥取汗良久大便行一二次方效行後以四君子湯補之老弱人減半服用人參加生薑煎湯送下得睡得汗則已保安萬靈丹治癰疽疔毒附骨流注風寒溫痹及鶴膝風左癱右瘓半身不遂口眼歪斜遍身走痛步履艱辛頭風疝氣破傷風牙關緊急傷寒感冒壯熱憎寒服之俱效製蒼朮八兩制何首烏金叉石戽北細辛川烏草烏泡全蠍天麻麻黃炙草當歸川芎芥穗防風羌活各一兩明雄黃六錢為細末蜜丸每重三錢硃砂為衣癰疽及感冒初起表重者蔥白九莖煎湯化服一丸蓋被臥取大汗汗聽自收切忌露風瘡未成者立消將成者即高腫潰膿傷寒感冒瘟疫初起服此邪從汗解如病無表裡相兼不必發散只用熱酒化服老人小兒減半麥靈丹治癰疽腫毒疔瘡回里煩悶神昏婦人初發乳症小兒痘後餘毒一切暴腫鮮蟾酥三錢黑大蜘蛛二十一個兩頭尖鼠糞一錢飛羅面六面共研極勻用菊花熬成膏布絞去渣糊藥捻為麥子狀陰乾每服七丸小兒五丸上部白湯送下下部酒送下六一散治癰疽初起煩燥口渴小便不通體盛濕多者滑石六兩甘草一兩研末燈心湯調服三錢加辰砂少許名益元散山甲內消散治臍腹生疽色紫堅硬初起用此山甲炙三錢歸尾大黃甘草節各二錢土鱉三個殭蠶炒黑醜末各一錢酒水煎空心服大便行三五次方吃粥補住不下再煎服瘡科流氣飲治下脘穴疽初起色赤高腫人參厚朴炒防風桔梗生耆酒芍當歸川芎蘇葉枳殼各一錢木香烏藥桂心檳榔甘草各五分生薑引治流注加白芷內補十宣散治七情火鬱臍下生疽初起紅腫牽痛老弱脈虛者人參生耆當歸各二錢桂心川芎白芷防風桔梗厚朴甘草各一錢酒引頻服將成令其速潰免透肉膜此方加白芷連翹木香乳香沒藥名托裡散治發背疔瘡形羸脈無力者後有一方治實症化斑解毒湯治肝脾風熱盛極內發丹毒升麻酒炒牛子炒研石膏末人中黃黃連連翹元參知母淡竹葉葶藶大棗湯治肺癰喘滿不得臥者葶藶五錢紅棗五個煎服千金葦莖湯治肺癰咳而有熱胸中煩悶膿欲成者葦莖二錢炒苡仁三錢冬瓜仁去殼桃仁去皮尖炒研各一錢煎服得吐為效桔梗湯治肺癰吐膿如米粥狀桔梗甘草等分服以排余膿桔梗白散治肺癰吐膿腥臭胸滿而咳巴豆淨肉另研如泥一錢桔梗貝母各三錢先研末和巴豆研勻白湯每下一錢金鯉湯治肺癰咯吐膿血午後煩熱金色活鯉重四兩者破去腸肚勿沾生水研貝母末二錢遍擦魚肚內以線縛定童便一大盞浸魚在內蒸至魚眼突出取起檢去魚鱗與諸骨又將童便浸魚肉再蒸空心連肉與湯二次服盡可服數尾寧肺桔梗湯治癰膿不盡而兼肺虛栝蔞仁去油貝母去心桑皮蜜炒枳殼麵炒甘草節苡仁炒防己百合桔梗生耆當歸各一錢五味子地骨皮知母葶藶炒杏仁炒各五分生薑引身熱加柴胡條芩大便祕加蜜炒大黃煩躁痰血加茅根尿祕加木通痛加白芷紫菀湯治咳嗽咽乾咯吐痰血紫菀人參犀角炒黃連代炙甘草款冬花炒阿膠制杏仁桑葉百合貝母法半夏蒲黃生薑等分煎服清金寧肺丸治肺癰日久膿痰不盡形氣虛者沙參貝母茯苓陳皮桔梗片芩胡連川芎炒芍銀柴胡地骨皮各五錢麥冬天冬五味子當歸炙耆煨焦熟地各一兩炙草三錢研末蜜丸每服三錢大黃湯治腸癰初起酒炒大黃制炒桃仁白芥子丹皮滑石末各錢半煎服以利下膿血為度未下再服薏苡附子湯治腸癰已成泡附子敗醬草炒苡仁等分研末每用三錢空心白湯調服小水當利下薏