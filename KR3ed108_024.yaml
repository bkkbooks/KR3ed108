兩黃柏鹽水炒知母砂仁煨木香各三錢曬研細末酒煮鹿角膠四兩加煉蜜和生地膏拌藥為丸酒水每下三錢早晚服千金指迷丸因濕痰氣鬱致皮裡膜外生結核如果狀堅硬不痛者半夏薑汁製四兩茯苓枳殼煨各三兩朴硝三錢共研末麵糊為小丸白湯下每二錢常服自消若專服苦寒必致潰破白花蛇散治白癩白花蛇肉酒炙焦一兩白蘚皮威靈仙晚蠶砂蔓荊子槐米天麻防風羌活枳殼炙草各八錢研末酒下二錢日三服苦參酒烏白癩皆可常服苦參五斤露蜂房五兩刺蝟一具酥炙焦共研粗末水熬濃湯一斗去渣浸灰面五斤先蒸米三斗將面拌入加曲沃汁如平常釀酒法酒熟去糟空心溫飲日三服醉仙散治白癩便祕及大麻瘋炒研牛子胡麻仁蔓荊子枸杞子各一兩苦參蒺藜花粉防風各五錢輕粉三錢共研極細末每服錢半早午晚各一服酒調下七日後牙縫出臭涎渾身疼悶如醉後則利下膿血惡臭病根乃除麻瘋藥酒方秦艽防風當歸牛膝羌活苦參松節殭蠶蒼朮山甲炙虎骨枸杞白茅根各二兩萆麻仁一兩用陳酒二十五斤浸藥謹封壇口坐滾湯鍋中煮三炷香久取浸水內一夜早中晚常服自效通天再造散治大麻瘋煨大黃一兩皂刺兩半白醜半生半炒鬱金各八錢曬研細末每晨朝東酒調下三錢平時服後三方消風散全蠍白芷沙參等分曬研細末酒下二錢日三服追風散大黃三錢皂刺鬱金朴硝大楓子各一錢酒煎服取泄利磨風丸何首烏豨蘞草牛蒡子蒼耳子蔓荊子威靈仙北細辛車前子羌活獨活芥尾防風天麻麻黃當歸川芎等分曬研細末麵糊為丸緑豆大酒水送下三錢日二服換肌散治大麻瘋鼻梁塌壞烏梢蛇白花蛇酒炙焦淨肉各一兩蚯蚓焙燥一兩北細辛木鱉肉威靈仙何首烏石菖蒲草烏泡胡麻仁蒼朮制蒺藜炒白芷天麻赤芍荊子當歸川芎芥尾菊花苦參元參沙參丹皮木賊炙草不灰木各四錢共研細末酒調三錢日二服何首烏酒麻風久虛常飲自除炮何首烏四兩歸身歸尾生地熟地穿山甲炙干蝦蟆各一兩側柏葉五加皮泡川烏草烏松葉各四錢切碎裝夏布袋內扎定入壇中浸酒十斤謹封口坐滾湯鍋內煮三炷香久取埋土內七日後每日飲數次透骨搜風散治楊梅初起白花透骨草即鳳仙花生脂麻羌活獨活黑豆卡萄白糖槐米核桃肉六安茶各錢半薑棗煎成露一宿早晨燙熱服一劑散治楊梅初起脈證實者蜜炙麻黃一兩威靈仙八錢大黃七錢羌活白芷皂刺銀花防風蟬蛻炙山甲各五錢共研碎聽用先用爛羊肉一斤取清湯二碗兌海一碗入前藥末煎至剩湯一碗空心蒸熟肉淡食令飽隨飲前湯被蓋臥取大汗切忌露風必效散治梅瘡高腫稠密濕熱盛形氣實者芥穗防風連翹防己銀花槐花花粉皂刺白芷木通木瓜白蘚皮大風藤製蒼朮各一錢甘草翻白草各五分大黃二錢土茯苓四兩酒引服後靜臥以取汗下升麻解毒湯治梅瘡腫痛潰爛形氣尚強者升麻皂刺各一錢土茯苓四兩麻油一匙煎服毒生項以上加白芷生咽喉加桔梗生胸腹加白芍生肩背加羌活生下部加牛膝甚者十劑必效歸靈散治虛弱人患楊梅瘡即八珍湯加防己木瓜苡米銀花花粉白蘚皮威靈仙各一錢土茯苓二兩下部加牛膝升麻消毒飲治黃水瘡浸淫成片升麻桔梗羌活防風白芷當歸甘草赤芍銀花連翹紅花梔仁牛子炒研等分初起加川連蒼朮生化湯治産後癰疽初起當歸八錢川芎四錢炙草一錢黑姜八分桃仁去皮尖炒研十粒或加丹參酒水煎服清魂散治産後癰疽表盛脈浮芥穗四錢川芎二錢澤蘭葉錢半炙草一錢人參五分葳蕤三錢代酒水煎服回生丹治癰疽裡熱脈症強實水煎黑豆三升取殼曬燥留湯聽用切碎蘇木三兩煎濃湯瀝去渣研大黃末一斤醋三碗拌入鍋內慢火熬干然後下前豆湯蘇木湯攪勻熬至焦乾連鍋粑剷起聽用另用酒炒紅花三兩焙焦地黃當歸川芎茯苓元胡烏藥香附蒼朮蒲黃牛膝炒桃仁各二兩炒芍炙草羌活陳皮地榆三稜炒五靈脂各五錢木香青皮乳香沒藥參良薑木瓜炙白朮各三錢共切成薄片同前黑豆殼大黃膏曬燥磨為細末蜜丸重三錢陰乾酒水化服地黃飲治血風瘡火燥血虧夜不得寐制首烏熟地生地各三錢當歸錢半丹參元參沙蒺藜炒殭蠶各一錢甘草紅花各五分早晚服土茯苓湯治楊梅結毒初起筋骨疼痛及已潰肌肉臭爛土茯苓四兩芥穗防風當歸川芎銀花花粉苡仁蒺藜威靈仙各一錢梔子黃連連翹白芷甘草條芩乾薑各六分下部加牛膝酒引正宗新方治前症誤服劫劑癱瘓骨疼不能動履及楊梅初起形氣虛者皆可常服土茯苓二兩當歸川芎苡仁木瓜防風銀花木通白蘚皮威靈仙各一錢甘草五分炙焦皂角子五個下部加牛膝疏風清熱飲治婦女面生桃花癬苦參酒蒸曬二錢全蠍土炒皂角刺芥穗防風蟬蛻銀花白芷桔梗各一錢蔥白三寸酒引不換金正氣散治瘴疽生筋骨上先黑變青狀如拳打製蒼朮炒厚朴藿香香附法半夏陳皮各二錢炙甘草一錢薑棗引臨服兌羚羊角一錢調勻服解毒瀉心湯治風熱天疱多生上體牛子炒研熟石膏川連條芩梔仁知母芥穗防風元參木通甘草滑石末等分燈草引清脾除濕飲治濕熱天疱多生下體製蒼朮白朮赤茯苓生地生梔子澤瀉茵陳連翹苦參枳殼甘草麥冬元明淡竹葉等分搜風順氣丸治白疕瘡抓起白屑者大黃二兩酒蒸曬山藥炒棗皮牛膝菟絲麻仁枳殼郁李仁泡去皮羌活防風獨活車前子檳榔各一兩曬研細末蜜為小丸茶酒任下每服二錢日二服清肌滲濕湯治貓眼瘡痛癢而無膿血製蒼朮炒厚朴陳皮甘草柴胡白芷澤瀉木通升麻炙朮梔仁川連等分姜引化斑解毒湯治漆瘡腫痛及諸辛熱斑疹牛子炒研石膏末人中黃升麻川連連翹元參知母薄荷淡竹葉等分煎服涼血地黃湯治血痣血箭凡流鮮血者生地三錢當歸條芩元參各二錢川連梔子甘草丹參各一錢大連翹飲治赤遊丹諸毒初起連翹防風當歸赤芍滑石木通炒研牛子石膏甘草芥穗條芩蟬蛻柴胡梔子瞿麥車前子等分燈芯引消毒犀角飲治一切丹毒犀角無則升麻代炒研牛子川連甘草生地赤芍各一錢防風二錢便祕加大黃五福化毒丹治小兒丹毒胎瘤𤼏瘡熱盛脈實元參赤苓桔梗各三錢膽草牙硝青黛川連甘草各一兩人參硃砂各三錢冰片五分共研細末蜜丸每重一錢薄荷湯化服小兒只服半丸紫雪散治丹毒入里腹痛音啞煩熱狂叫及口瘡腳氣瘴毒熱毒急驚癲癇寒水石即石膏滑石磁石各三兩研細水煎瀝渣留汁再拌後藥升麻元參炙草各一兩川連木香沉香烏藥羚羊角屑各三錢切碎曬燥研細末入前汁中煮成稠湯布絞去渣方下提淨朴硝七石末各二兩慢火再煎柳枝盡攪至水氣將盡欲凝結時傾放大盤中預研震砂三錢麝香一錢金箔二十張共篩入藥內柳枝攪勻將盤坐冷水中候凝結如雪方取入瓷瓶收貯大人用一二錢冷水調糊徐徐咽下小兒只用三五分每用少許吹搽口瘡消風導赤湯治小兒奶鮮血熱受風諸斑疹炒研牛子白蘚皮生地赤茯苓銀花木通薄荷各一錢川連甘草梢淡竹葉各五分羚羊角散治小兒葡萄疫及牙疳羚羊角末麥冬去心牛子炒研淡竹葉知母元參防風條芩甘草等分胃脾湯治葡萄疫日久虛弱白朮土炒麥冬去心遠志沙參茯神陳皮各錢半炙草五味子各一錢自汗加黃耆百解散治丹毒攻裡痰喘驚搐葛根八錢升麻赤芍各五錢麻黃蜜炒條芩桂心甘草各二錢研細末蔥湯每調一二錢服取汗五和湯大黃枳殼煨赤茯苓當歸炙草等分煎服以便取利保和丸治滯熱丹毒傷食積滯神麯炒山楂肉法半夏茯苓各一兩蘿蔔子炒陳皮連翹各五錢研極細末米湯糊為小丸白湯每下二錢犀角飲治滯熱下後丹毒仍作犀角無真者川連代升麻防己梔子條芩生耆朴硝淡竹葉等分煎服白芍湯治臍腫如吹驚悸多啼白芍酒炒苡仁炒鉤藤鉤茯苓各一錢澤瀉桂心甘草各五分姜引桃仁丸治小兒陰腫桃仁去皮尖炒七錢蒺藜炒去刺丹皮桂心各五錢黑丑三錢研極細末蜜丸緑豆大酒水每吞十丸日二服烏梅散治陰囊腫痛腎子縮入痛止方出烏梅肉炒燥元胡炙草各五錢淨勾子乳香沒藥俱炙去油各三錢研末白湯下每一錢勻氣散治陰腫陰縮桔梗焙一兩陳皮六錢砂仁炒小茴炒甘草炙各三錢黑姜錢半曬研極細水下一錢裡寒陰縮當服理中湯白醜散治囊腫便祕及四肢俱腫白醜錢半半生半炒桑皮蜜炙甘草炙陳皮各一錢白朮土炒木通各二錢水煎頻頻服沆瀣丹治嬰兒內蘊胎熱口舌生瘡及陽水浮腫便祕尿赤用此疏利臟腑大黃酒炒川柏炒條芩炒川芎各九錢黑醜炒赤芍炒枳殼炒薄荷葉滑石連翹檳榔各六錢共研細末煉蜜為丸每重一錢茶水化服嬰兒只服半丸天保采薇湯治嬰兒癍痧麻疹諸初起及風痰驚搐用此清解表裡羌活獨活柴胡前胡枳殼桔梗法夏茯苓陳皮甘草升麻葛根川芎赤芍藿香葉厚朴炒蒼朮制等分薑棗引或作丸服薑湯下以上匯方治癰疽諸毒七日以前瘡勢未成形體強壯脈症俱實者或汗下或清解或溫散隨症選用但得腫消痛止表裡俱解毒自內消矣若腫過七日之後形勢已成者則宜托裡消毒透膿排膿等方使毒現於外以速其效倘仍用散下之劑恐傷元氣致生變證也慎之透膿散治癰疽諸毒內膿已成不能穿破服此即潰可以代針生耆四錢炙山甲打碎一錢當歸二錢川芎三錢皂刺一錢半如病在上部先飲酒後服藥以升之在下部先服藥後飲酒以行之中部酒兌服托裡消毒散治癰疽諸瘡七日之後腫痛如前服此未成可消已成即潰腐肉易出新肉易生人參生耆當歸川芎茯苓焦白朮白芍銀花各一錢皂刺甘草白芷桔梗各六分托裡透膿湯治癰疽將潰人參炙朮炙山甲皂刺白芷各一錢生耆二錢當歸二錢青皮升麻甘草節各五分酒引頂之上用白芷胸腹上用白芍腰部加杜仲下部加桂心足部加牛膝咽內加桔梗肩背加羌活托裡排膿湯治癰疽初潰生耆二錢人參炙朮當歸炒芍銀花連翹茯苓陳皮貝母各一錢白芷桔梗各錢半桂心甘草各五分千金內托湯治腦疽諸發毒惡等症已成者服此易潰人參生耆當歸川芎白芍防風銀花花粉白芷桔梗各一錢甘草桂心各五分痛甚加乳香沒藥人參養榮湯治潰後發熱惡寒或倦怠消瘦面黃氣短飲食不甘一切虛弱脈症人參蜜耆焦朮炙草當歸茯苓陳皮志肉炒五味各一錢白芍熟地各錢半桂心八分薑棗引陽春酒治腦疽諸發已潰流膿腐肉盡時脾胃虛弱肌肉生遲或氣血久虧瘡肉色白不能長髮收斂凡大瘡潰後皆宜服此長肌肉潤皮膚人參一兩焦朮熟地當歸各五錢天冬枸杞遠志肉柏子仁去油各三錢共切碎裝絹袋內線扎口瓷壇盛酒五斤浸藥十餘日早午晚各燙熱飲數杯飲完加酒再浸浸至藥淡無味為度
